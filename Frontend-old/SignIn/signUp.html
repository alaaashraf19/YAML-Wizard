    <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="signUp.css">
</head>

<body>
    <div class="form-container">
        <form id="form" method="post">
            <div class="field">
                <label for="username">Username:</label>
                <input type="text" id="username" class="input" name="username" required>
            </div>
            <div class="field">
                <label for="email">Email: </label>
                <input type="email" id="email" class="input" name="email" required>
            </div>
            <div class="field">
                <label for="password">Password: </label>
                <input type="password" id="password" class="input" name="password" required>
            </div>
            <div class="field">
                <label for="confirmPassword">Confirm Password: </label>
                <input type="password" id="confirmPassword" class="input" name="confirmPassword" required>
            </div>
            <button id="submit" type="submit">Sign Up</button>
        </form>
    </div>
</body>
