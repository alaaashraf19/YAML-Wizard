Coverity:
  artifacts:
    expire_in: 1 week
    paths:
    - cov-int/*.txt
    when: on_failure
  image: $CI_REGISTRY/$BUILD_IMAGES_PROJECT:$CENTOS8_BUILD
  only:
  - schedules
  - coverity
  script:
  - wget --quiet https://scan.coverity.com/download/linux64 --post-data "token=$COVERITY_SCAN_TOKEN&project=$COVERITY_SCAN_PROJECT_NAME"
    -O /tmp/coverity_tool.tgz
  - tar xfz /tmp/coverity_tool.tgz
  - git submodule update --init
  - autoreconf -fvi
  - CFLAGS="-g -O0" ./configure --disable-maintainer-mode --enable-latency-stats
  - cov-analysis-linux64-*/bin/cov-build --dir cov-int make -j$JOBS
  - tar cfz cov-int.tar.gz cov-int
  - curl https://scan.coverity.com/builds?project=$COVERITY_SCAN_PROJECT_NAME --form
    token=$COVERITY_SCAN_TOKEN --form email=n.mavrogiannopoulos@gmail.com --form file=@cov-int.tar.gz
    --form version="`git describe --tags`" --form description="CI build"
  stage: preliminaries
  tags:
  - saas-linux-small-amd64
Debian:
  artifacts:
    expire_in: 1 week
    paths:
    - ./*.log
    - ./tests/*.log
    when: on_failure
  except:
  - tags
  - schedules
  image: $CI_REGISTRY/$BUILD_IMAGES_PROJECT:$DEBIAN_BUILD
  script:
  - chmod -R o-w tests/data/raddb
  - git submodule update --init
  - autoreconf -fvi
  - ./configure --enable-oidc-auth
  - make -j$JOBS
  - export OCSERV_ALLOW_BROKEN_CLIENTS=1
  - make check -j$JOBS
  stage: testing
  tags:
  - saas-linux-small-amd64
Fedora:
  artifacts:
    expire_in: 1 day
    untracked: true
    when: always
  coverage: '/coverage lines: \d+\.\d+/'
  except:
  - tags
  image: $CI_REGISTRY/$BUILD_IMAGES_PROJECT:$FEDORA_BUILD
  script:
  - umask 000
  - chmod -R o-w tests/data/raddb
  - git submodule update --init
  - autoreconf -fvi
  - CFLAGS="-g -O0" ./configure --enable-code-coverage --with-kerberos-tests --enable-oidc-auth
  - make -j$JOBS
  - make check -j$JOBS COVERAGE=1 VERBOSE=1
  - make local-code-coverage-output
  stage: testing
  tags:
  - saas-linux-small-amd64
Signoff:
  script:
  - 'echo "Checking for new commits without Signed-off-by: tags as described in https://gitlab.com/openconnect/ocserv/-/blob/master/CONTRIBUTING.md"'
  - git log 7c8abd2e2ca6ec0dffb8c7768c3839e057f21ee7.. --grep "(^Signed-off-by)|(^Merge
    branch)|(^This reverts commit)" --extended-regexp --invert-grep --exit-code
  - echo "None (good)"
  stage: preliminaries
