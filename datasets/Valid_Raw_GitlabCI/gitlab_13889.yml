pages:
  artifacts:
    paths:
    - public
  dependencies:
  - Fedora
  image: $CI_REGISTRY/$BUILD_IMAGES_PROJECT:$FEDORA_BUILD
  only:
  - master@openconnect/ocserv
  script:
  - mkdir -p public/coverage
  - make V=1 CODE_COVERAGE_OUTPUT_DIRECTORY=public/coverage CODE_COVERAGE_BRANCH_COVERAGE=1
    code-coverage-capture
  - make CODE_COVERAGE_OUTPUT_DIRECTORY=public/coverage local-code-coverage-output
  stage: deploy
  tags:
  - saas-linux-small-amd64
seccomp/Fedora:
  artifacts:
    expire_in: 1 week
    untracked: true
    when: on_failure
  except:
  - tags
  - schedules
  image: $CI_REGISTRY/$BUILD_IMAGES_PROJECT:$FEDORA_BUILD
  script:
  - chmod -R o-w tests/data/raddb
  - git submodule update --init
  - autoreconf -fvi
  - ./configure --with-kerberos-tests --enable-oidc-auth --with-seccomp-trap
  - make -j$JOBS
  - make check -j$JOBS
  stage: testing
  tags:
  - saas-linux-small-amd64
stages:
- preliminaries
- testing
- deploy
static-analyzer/Fedora:
  artifacts:
    expire_in: 1 week
    paths:
    - scan-build-src/*
    when: on_failure
  except:
  - tags
  - schedules
  image: $CI_REGISTRY/$BUILD_IMAGES_PROJECT:$FEDORA_BUILD
  script:
  - autoreconf -fvi -Werror
  - scan-build ./configure --enable-oidc-auth --enable-latency-stats --without-protobuf
  - scan-build --status-bugs -o scan-build-src make -j$JOBS
  stage: preliminaries
  tags:
  - saas-linux-small-amd64
triage:
  image: $CI_REGISTRY/$BUILD_IMAGES_PROJECT:$FEDORA_BUILD
  only:
  - schedules
  script:
  - gem install gitlab-triage
  - gitlab-triage --source-id $CI_PROJECT_ID --token "$API_TOKEN"
  stage: preliminaries
  tags:
  - saas-linux-small-amd64
ubsan/Fedora:
  artifacts:
    expire_in: 1 week
    paths:
    - ./*.log
    - tests/*.log
    when: on_failure
  except:
  - tags
  - schedules
  image: $CI_REGISTRY/$BUILD_IMAGES_PROJECT:$FEDORA_BUILD
  script:
  - chmod -R o-w tests/data/raddb
  - git submodule update --init
  - autoreconf -fvi
  - export UBCFLAGS="-Wall -Wextra -fsanitize=undefined -fsanitize=bool -fsanitize=alignment
    -fsanitize=null -fsanitize=bounds-strict -fsanitize=enum -fno-sanitize-recover
    -g -O2 -Werror"
  - CFLAGS="$UBCFLAGS" ./configure
  - make -j$JOBS
  - make check -j$JOBS CFLAGS="$UBCFLAGS -Wno-unused-function -Wno-unused-parameter"
  stage: testing
  tags:
  - saas-linux-small-amd64
variables:
  ALPINE_BUILD: buildenv-alpine
  BUILD_IMAGES_PROJECT: openconnect/build-images
  CENTOS6_BUILD: buildenv-centos6
  CENTOS7_BUILD: buildenv-centos7
  CENTOS8_BUILD: buildenv-centos8
  CENTOS9_BUILD: buildenv-centos9
  DEBIAN_BUILD: buildenv-debian
  DEBIAN_X86_CROSS_BUILD: buildenv-debian-x86
  FEDORA_BUILD: buildenv-fedora41
  JOBS: 2
  MINIMALCONFIG: --without-protobuf --without-libtalloc-prefix --without-libnl --without-maxmind
    --without-geoip --without-libreadline-prefix --without-liboath --without-libc-prefix
    --without-pam --without-radius --without-libcrypt-prefix --without-utmp --without-libutil-prefix
    --without-libwrap --without-libwrap-prefix --without-libseccomp-prefix --without-libsystemd-prefix
    --without-llhttp --without-lz4 --without-gssapi --without-pcl-lib --disable-rpath
    --disable-seccomp --disable-anyconnect-compat --disable-compression
  UBUNTU16_BUILD: buildenv-ubuntu
  UBUNTU20_BUILD: buildenv-ubuntu20
  UBUNTU22_BUILD: buildenv-ubuntu22
