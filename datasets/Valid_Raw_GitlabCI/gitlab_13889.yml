codingstyle/Fedora:
  except:
  - tags
  - schedules
  image: $CI_REGISTRY/$BUILD_IMAGES_PROJECT:$FEDORA_BUILD
  script:
  - find src/ tests/ -name '*.[ch]'| grep -Ev '^(src/http-heads.h|src/pcl|src/protobuf|src/ccan|src/gnulib|src/inih|src/llhttp)'|
    xargs -I{} clang-format -style=file --dry-run {} -Werror
  stage: preliminaries
  tags:
  - saas-linux-small-amd64
