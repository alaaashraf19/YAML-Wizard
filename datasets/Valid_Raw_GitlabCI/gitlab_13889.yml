.FreeBSD:
  artifacts:
    expire_in: 1 week
    paths:
    - build/*.log
    - build/tests/*.log
    when: on_failure
  except:
  - tags
  - schedules
  only:
  - branches@openconnect/ocserv
  script:
  - git submodule update --init
  - sh autogen.sh
  - mkdir build
  - cd build
  - LIBS="-L/usr/local/lib" ../configure --disable-nls --without-root-tests
  - gmake -j$JOBS
  - gmake check -j$JOBS
  stage: testing
  tags:
  - freebsd
Centos7:
  artifacts:
    expire_in: 1 week
    paths:
    - ./*.log
    - ./tests/*.log
    when: on_failure
  except:
  - tags
  - schedules
  image: $CI_REGISTRY/$BUILD_IMAGES_PROJECT:$CENTOS7_BUILD
  script:
  - git submodule update --init
  - autoreconf -fvi
  - ./configure
  - make -j$JOBS
  - make check -j$JOBS
  stage: testing
  tags:
  - saas-linux-small-amd64
