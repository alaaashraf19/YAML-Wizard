before_script:
- apt-get update -qq
- apt-get -qq -y install python3-pip
- pip3 install --upgrade --only-binary=numpy,scipy numpy scipy
cache:
  key: $CI_JOB_NAME-$CI_COMMIT_REF_NAME
coverage:
  artifacts:
    expire_in: 1 week
    paths:
    - $COVERAGE_STATIC_DIR
  coverage: /TOTAL.*\s+(\d+\%)/
  script:
  - pip3 install coveralls
  - coverage run setup.py test
  - coverage html
  - coverage report
  - mv htmlcov/ $COVERAGE_STATIC_DIR
  stage: test
dist:
  artifacts:
    expire_in: 1 week
    paths:
    - dist/*
  dependencies: []
  script:
  - apt-get update && apt-get -y install gettext
  - pip install '.[dev]'
  - make dist
  stage: package
image: python
include:
- https://gitlab.com/nobodyinperson/ci-templates/raw/master/pypi-upload.yml
pages:
  artifacts:
    paths:
    - $PAGES_DIR/
  before_script: []
  dependencies:
  - sphinx
  - coverage
  only:
  - tags
  script:
  - rm -rf $PAGES_DIR/
  - mv $SPHINX_DOC_DIR $PAGES_DIR/
  - mv $COVERAGE_STATIC_DIR $PAGES_DIR/
  stage: deploy
pip-install-local:
  script:
  - pip3 install --prefix=~/.local .
  - pip3 install --prefix=~/.local '.[gui]'
  stage: test
pypi-upload:
  dependencies:
  - dist
  environment:
    name: production
    url: https://pypi.python.org
  only:
  - tags
  stage: deploy
sphinx:
  artifacts:
    expire_in: 1 week
    paths:
    - $SPHINX_DOC_DIR
  dependencies: []
  script:
  - pip3 install sphinx sphinx_rtd_theme matplotlib ipython
  - apt-get -y -qq install python3-gi python3-cairocffi gir1.2-gtk-3.0
  - make docs
  - mv docs/build/html $SPHINX_DOC_DIR
  stage: package
stages:
- test
- package
- deploy
variables:
  COVERAGE_STATIC_DIR: coverage-report
  PAGES_DIR: public
  SPHINX_DOC_DIR: sphinx-doc
