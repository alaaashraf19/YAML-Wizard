before_script:
- nix-channel --add https://nixos.org/channels/nixpkgs-unstable
- nix-channel --update
build:
  artifacts:
    paths:
    - public
  script: nix-shell --run make
  stage: build
image: nixos/nix
pages:
  artifacts:
    paths:
    - public
  only:
  - master
  script: ':'
  stage: deploy
