image: alpine
pages:
  artifacts:
    paths:
    - public
  only:
  - master
  script:
  - apk --no-cache add $(cat apk-requirements.txt)
  - pip install -r requirements.txt
  - echo $CI_COMMIT_TAG > .version
  - pip install -e .
  - make html -C docs
  - mv docs/build/html/ public/
  stage: deploy
publish to pypi:
  artifacts:
    paths:
    - dist
  only:
  - tags
  script:
  - apk --no-cache add $(cat apk-requirements.txt)
  - pip install twine
  - echo $CI_COMMIT_TAG > .version
  - python setup.py sdist
  - twine upload dist/*
  stage: deploy
run pylint:
  script:
  - apk --no-cache add $(cat apk-requirements.txt)
  - pip install -r requirements.txt
  - pip install -e .
  - python tests/run_pylint.py
  stage: test
