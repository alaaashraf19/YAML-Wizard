before_script:
- apt update && apt -y install make protobuf-compiler
- mkdir -p $GOPATH/src/$(dirname $REPO_NAME)
- ln -svf $CI_PROJECT_DIR $GOPATH/src/$REPO_NAME
- cd $GOPATH/src/$REPO_NAME
- go version
- go get -u google.golang.org/grpc
- go get -u github.com/golang/protobuf/protoc-gen-go
- go get -u github.com/grpc-ecosystem/grpc-gateway/protoc-gen-grpc-gateway
- go get -u github.com/grpc-ecosystem/grpc-gateway/protoc-gen-swagger
- go get -u gopkg.in/robfig/cron.v2
compile:
  artifacts:
    paths:
    - dscheduler/dscheduler
    - gateway/gateway
  script:
  - go build -race -ldflags "-extldflags '-static'" -o dscheduler/dscheduler gitlab.com/andreynech/dsched/dscheduler
  - go build -race -ldflags "-extldflags '-static'" -o gateway/gateway gitlab.com/andreynech/dsched/gateway
  stage: build
format:
  script:
  - go fmt $(go list ./... | grep -v /vendor/)
  - go vet $(go list ./... | grep -v /vendor/)
  - go test -race $(go list ./... | grep -v /vendor/)
  stage: test
image: golang:latest
stages:
- test
- build
variables:
  REPO_NAME: gitlab.com/andreynech/dsched
