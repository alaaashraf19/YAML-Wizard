.analyzer:
  except:
    variables:
    - $SAST_DISABLE_DIND == 'false'
  extends: .sast
  script:
  - /analyzer run
.sast:
  allow_failure: true
  artifacts:
    reports:
      sast: gl-sast-report.json
  only:
    refs:
    - branches
    variables:
    - $GITLAB_FEATURES =~ /\bsast\b/
  stage: test
bandit-sast:
  extends: .analyzer
  image:
    name: $SAST_ANALYZER_IMAGE_PREFIX/bandit
  only:
    variables:
    - $CI_PROJECT_REPOSITORY_LANGUAGES =~ /python/
brakeman-sast:
  extends: .analyzer
  image:
    name: $SAST_ANALYZER_IMAGE_PREFIX/brakeman
  only:
    variables:
    - $CI_PROJECT_REPOSITORY_LANGUAGES =~ /ruby/
eslint-sast:
  extends: .analyzer
  image:
    name: $SAST_ANALYZER_IMAGE_PREFIX/eslint
  only:
    variables:
    - $CI_PROJECT_REPOSITORY_LANGUAGES =~ /javascript/
flawfinder-sast:
  extends: .analyzer
  image:
    name: $SAST_ANALYZER_IMAGE_PREFIX/flawfinder
  only:
    variables:
    - $CI_PROJECT_REPOSITORY_LANGUAGES =~ /\b(c\+\+|c\b)/
gosec-sast:
  extends: .analyzer
  image:
    name: $SAST_ANALYZER_IMAGE_PREFIX/gosec
  only:
    variables:
    - $CI_PROJECT_REPOSITORY_LANGUAGES =~ /go/
nodejs-scan-sast:
  extends: .analyzer
  image:
    name: $SAST_ANALYZER_IMAGE_PREFIX/nodejs-scan
  only:
    variables:
    - $CI_PROJECT_REPOSITORY_LANGUAGES =~ /javascript/
phpcs-security-audit-sast:
  extends: .analyzer
  image:
    name: $SAST_ANALYZER_IMAGE_PREFIX/phpcs-security-audit
  only:
    variables:
    - $CI_PROJECT_REPOSITORY_LANGUAGES =~ /php/
pmd-apex-sast:
  extends: .analyzer
  image:
    name: $SAST_ANALYZER_IMAGE_PREFIX/pmd-apex
  only:
    variables:
    - $CI_PROJECT_REPOSITORY_LANGUAGES =~ /apex/
sast:
  except:
    variables:
    - $SAST_DISABLED
    - $SAST_DISABLE_DIND == 'true'
  extends: .sast
  image: docker:stable
  script:
  - export SAST_VERSION=${SP_VERSION:-$(echo "$CI_SERVER_VERSION" | sed 's/^\([0-9]*\)\.\([0-9]*\).*/\1-\2-stable/')}
  - "if ! docker info &>/dev/null; then\n  if [ -z \"$DOCKER_HOST\" -a \"$KUBERNETES_PORT\"\
    \ ]; then\n    export DOCKER_HOST='tcp://localhost:2375'\n  fi\nfi\n"
  - "function propagate_env_vars() {\n  CURRENT_ENV=$(printenv)\n\n  for VAR_NAME;\
    \ do\n    echo $CURRENT_ENV | grep \"${VAR_NAME}=\" > /dev/null && echo \"--env\
    \ $VAR_NAME \"\n  done\n}\n"
  - "docker run \\\n  $(propagate_env_vars \\\n    SAST_BANDIT_EXCLUDED_PATHS \\\n\
    \    SAST_ANALYZER_IMAGES \\\n    SAST_ANALYZER_IMAGE_PREFIX \\\n    SAST_ANALYZER_IMAGE_TAG\
    \ \\\n    SAST_DEFAULT_ANALYZERS \\\n    SAST_PULL_ANALYZER_IMAGES \\\n    SAST_BRAKEMAN_LEVEL\
    \ \\\n    SAST_FLAWFINDER_LEVEL \\\n    SAST_GITLEAKS_ENTROPY_LEVEL \\\n    SAST_GOSEC_LEVEL\
    \ \\\n    SAST_EXCLUDED_PATHS \\\n    SAST_DOCKER_CLIENT_NEGOTIATION_TIMEOUT \\\
    \n    SAST_PULL_ANALYZER_IMAGE_TIMEOUT \\\n    SAST_RUN_ANALYZER_TIMEOUT \\\n\
    \    SAST_JAVA_VERSION \\\n    ANT_HOME \\\n    ANT_PATH \\\n    GRADLE_PATH \\\
    \n    JAVA_OPTS \\\n    JAVA_PATH \\\n    JAVA_8_VERSION \\\n    JAVA_11_VERSION\
    \ \\\n    MAVEN_CLI_OPTS \\\n    MAVEN_PATH \\\n    MAVEN_REPO_PATH \\\n    SBT_PATH\
    \ \\\n    FAIL_NEVER \\\n  ) \\\n  --volume \"$PWD:/code\" \\\n  --volume /var/run/docker.sock:/var/run/docker.sock\
    \ \\\n  \"registry.gitlab.com/gitlab-org/security-products/sast:$SAST_VERSION\"\
    \ /app/bin/run /code\n"
  services:
  - docker:stable-dind
  variables:
    DOCKER_DRIVER: overlay2
    DOCKER_TLS_CERTDIR: ''
secrets-sast:
  extends: .analyzer
  image:
    name: $SAST_ANALYZER_IMAGE_PREFIX/secrets
security-code-scan-sast:
  extends: .analyzer
  image:
    name: $SAST_ANALYZER_IMAGE_PREFIX/security-code-scan
  only:
    variables:
    - $CI_PROJECT_REPOSITORY_LANGUAGES =~ /c\#/ || $CI_PROJECT_REPOSITORY_LANGUAGES
      =~ /visual basic/
sobelow-sast:
  extends: .analyzer
  image:
    name: $SAST_ANALYZER_IMAGE_PREFIX/sobelow
  only:
    variables:
    - $CI_PROJECT_REPOSITORY_LANGUAGES =~ /elixir/
spotbugs-sast:
  extends: .analyzer
  image:
    name: $SAST_ANALYZER_IMAGE_PREFIX/spotbugs
  only:
    variables:
    - $CI_PROJECT_REPOSITORY_LANGUAGES =~ /java\b/
tslint-sast:
  extends: .analyzer
  image:
    name: $SAST_ANALYZER_IMAGE_PREFIX/tslint
  only:
    variables:
    - $CI_PROJECT_REPOSITORY_LANGUAGES =~ /typescript/
variables:
  SAST_ANALYZER_IMAGE_PREFIX: registry.gitlab.com/gitlab-org/security-products/analyzers
  SAST_DISABLE_DIND: 'false'
