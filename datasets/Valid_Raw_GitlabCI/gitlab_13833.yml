include:
- path:
  - docker-compose-common.yml
services:
  celery-worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: celery-worker
    env_file:
    - env/secret_locations.env
    - env/common.env
    - env/b-dev.env
    volumes:
    - secrets:/run/secrets:ro
  django-server:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: django-server
    env_file:
    - env/secret_locations.env
    - env/common.env
    - env/b-dev.env
    volumes:
    - secrets:/run/secrets:ro
  nginx-with-static:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: nginx-with-static
    environment:
    - UWSGI_HOST=django-server
    ports:
    - 8000:80
    - 80:80
    - 443:443
    volumes:
    - secrets:/run/secrets:ro
