before_script:
- pip install tox setuptools
cache:
  paths:
  - /root/.cache
flake8:
  image: python:3.6
  script:
  - tox -e flake8
  stage: style
py35:
  image: python:3.5
  script:
  - tox -e py35
  stage: test
py36:
  image: python:3.6
  script:
  - tox -e py36
  stage: test
stages:
- style
- test
