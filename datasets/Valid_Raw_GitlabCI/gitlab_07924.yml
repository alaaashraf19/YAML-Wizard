docker-build:
  script:
  - docker build -t registry.gitlab.com/freundchen/spring-boot-and-react .
  - docker login -u gitlab-ci-token -p $CI_BUILD_TOKEN registry.gitlab.com
  - docker push registry.gitlab.com/freundchen/spring-boot-and-react
  stage: package
image: docker:latest
k8s-deploy:
  image: google/cloud-sdk
  script:
  - echo "$GOOGLE_KEY" > key.json
  - gcloud auth activate-service-account --key-file key.json
  - gcloud config set compute/zone europe-west3-b
  - gcloud config set project spring-boot-and-react
  - gcloud config set container/use_client_certificate True
  - gcloud container clusters get-credentials spring-boot-and-react
  - kubectl create secret docker-registry registry.gitlab.com --docker-server=https://registry.gitlab.com
    --docker-username=freundchen --docker-password=$REGISTRY_PASSWD --docker-email=christian.draeger1@gmail.com
  - kubectl apply -f deployment.yml
  stage: deploy
maven-build:
  artifacts:
    paths:
    - target/*.jar
  image: maven:3-jdk-8
  script: mvn package -B
  stage: build
services:
- docker:dind
stages:
- build
- package
- deploy
variables:
  DOCKER_DRIVER: overlay
  SPRING_PROFILES_ACTIVE: gitlab-ci
