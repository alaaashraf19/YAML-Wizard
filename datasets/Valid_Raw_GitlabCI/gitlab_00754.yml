cache:
  paths:
  - node_modules/
code_quality:
  allow_failure: true
  artifacts:
    reports:
      codequality:
      - gl-code-quality-report.json
  image: docker:stable
  script:
  - export SP_VERSION=$(echo "$CI_SERVER_VERSION" | sed 's/^\([0-9]*\)\.\([0-9]*\).*/\1-\2-stable/')
  - docker run --env SOURCE_CODE="$PWD" --volume "$PWD":/code --volume /var/run/docker.sock:/var/run/docker.sock
    "registry.gitlab.com/gitlab-org/security-products/codequality:$SP_VERSION" /code
  services:
  - docker:stable-dind
  variables:
    DOCKER_DRIVER: overlay2
dast:
  allow_failure: true
  artifacts:
    paths:
    - gl-dast-report.json
  image: registry.gitlab.com/gitlab-org/security-products/zaproxy
  script:
  - mkdir /zap/wrk/
  - /zap/zap-baseline.py -J gl-dast-report.json -t $website --auth-url $login_url
    --auth-username $username --auth-password $password || true
  - cp /zap/wrk/gl-dast-report.json .
  variables:
    login_url: https://example.com/login
    password: '42'
    username: john.doe@example.com
    website: https://example.com
image: node:latest
sast:
  allow_failure: true
  artifacts:
    paths:
    - gl-sast-report.json
  image: docker:stable
  script:
  - export SP_VERSION=$(echo "$CI_SERVER_VERSION" | sed 's/^\([0-9]*\)\.\([0-9]*\).*/\1-\2-stable/')
  - docker run --env SAST_CONFIDENCE_LEVEL="${SAST_CONFIDENCE_LEVEL:-3}" --volume
    "$PWD:/code" --volume /var/run/docker.sock:/var/run/docker.sock "registry.gitlab.com/gitlab-org/security-products/sast:$SP_VERSION"
    /app/bin/run /code
  services:
  - docker:stable-dind
  variables:
    DOCKER_DRIVER: overlay2
test_core:
  script:
  - yarn global add node-gyp
  - yarn install
  - yarn test
  - yarn build
