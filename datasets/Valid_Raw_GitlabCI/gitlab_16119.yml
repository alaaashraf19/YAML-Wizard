before_script:
- apt-get update
- apt-get install -y make gcc g++ libboost-dev liblua5.3-dev git
- apt-get install -y curl
- curl -sL https://deb.nodesource.com/setup_20.x | bash
- apt-get install -y nodejs
- node -v
- npm -v
- npm install -g eclint
compile:
  script:
  - make
  - make install
  - bash ./src/ci_test.sh
image: debian:stable-slim
validate:
  script:
  - bash ./validate.sh
