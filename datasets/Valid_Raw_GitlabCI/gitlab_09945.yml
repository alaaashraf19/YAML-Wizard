before_script:
- mkdir -p $GOPATH/src/$(dirname $REPO_NAME)
- ln -svf $CI_PROJECT_DIR $GOPATH/src/$REPO_NAME
- cd $GOPATH/src/$REPO_NAME
- git submodule init
- git submodule update
compile:
  artifacts:
    paths:
    - target
  script:
  - GOOS=linux GOARCH=amd64 go build -race -ldflags "-extldflags '-static'" -o $CI_PROJECT_DIR/target/hostedprometheus_linux_amd64
    internal/cmd/hostedprometheus/main.go
  stage: build
format:
  script:
  - go fmt $(go list ./... | grep -v /vendor/)
  - go vet $(go list ./... | grep -v /vendor/)
  - go test -race $(go list ./... | grep -v /vendor/)
  stage: test
image: golang:1.11.1
stages:
- test
- build
variables:
  REPO_NAME: gitlab.com/hostedprometheus/hostedprometheus
