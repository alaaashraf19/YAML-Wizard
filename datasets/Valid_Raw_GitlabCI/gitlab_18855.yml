before_script:
- pip install -r requirements.txt
image: python:3.8-buster
pages:
  artifacts:
    paths:
    - public
  rules:
  - if: $CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH
  script:
  - mkdocs build --strict --verbose
  stage: deploy
test:
  artifacts:
    paths:
    - test
  rules:
  - if: $CI_COMMIT_REF_NAME != $CI_DEFAULT_BRANCH
  script:
  - mkdocs build --strict --verbose --site-dir test
  stage: test
