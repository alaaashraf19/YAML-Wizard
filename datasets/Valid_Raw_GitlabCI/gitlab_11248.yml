cache:
  key: $CI_JOB_NAME
  paths:
  - _build
  - deps
  untracked: true
deploy:
  image: ruby:latest
  only:
  - master
  script:
  - gem install dpl
  - dpl --provider=heroku --app=sprout-tree --api-key=$HEROKU_API_KEY
  stage: deploy
image: registry.gitlab.com/robin-good/docker-build-image:latest
stages:
- test
- deploy
test:
  before_script:
  - mix deps.get
  script:
  - mix test
  services:
  - postgres:9.3-alpine
  stage: test
  variables:
    MIX_ENV: test_gitlab
variables:
  POSTGRES_DB: sprout_tree_test
  POSTGRES_PASSWORD: postgres
  POSTGRES_USER: postgres
