image: fedora:latest
pkg_build:
  artifacts:
    expire_in: 5d
    paths:
    - ./*/*/*.sdeb
    - ./*/*/*/*.deb
    when: on_success
  dependencies:
  - tito_prep
  image: ubuntu:18.04
  script:
  - ./.gitlab-ci/setup-apt-sources.sh
  - ./.gitlab-ci/get-debbuild.sh
  - ./.gitlab-ci/get-deb-buildreqs.sh
  - ./.gitlab-ci/build-packages.sh
  stage: build
  tags:
  - docker
stages:
- prep
- build
tito_prep:
  artifacts:
    expire_in: 1h
    paths:
    - ./*/*.tar.gz
    when: on_success
  script:
  - ./.gitlab-ci/get-tarballs.sh
  stage: prep
  tags:
  - docker
