beta:
  image: scorpil/rust:beta
  script:
  - cargo build
  - cargo build --release
  - apt-get update
  - apt-get -y install python python-pip
  - pip install 'CppHeaderParser>=2.7.2,<3.0.0'
  - cargo test
  stage: test
nightly:
  image: scorpil/rust:nightly
  script:
  - cargo build
  - cargo build --release
  - apt-get update
  - apt-get -y install python python-pip
  - pip install 'CppHeaderParser>=2.7.2,<3.0.0'
  - cargo test
  stage: test
pages:
  artifacts:
    paths:
    - public
  image: scorpil/rust:stable
  only:
  - master
  script:
  - cargo doc
  - cp -R target/doc public
  - echo "<meta http-equiv=refresh content=0;url=cheddar/index.html>" > public/index.html
  stage: deploy
stable:
  image: scorpil/rust:stable
  script:
  - cargo build
  - cargo build --release
  - apt-get update
  - apt-get -y install python python-pip
  - pip install 'CppHeaderParser>=2.7.2,<3.0.0'
  - cargo test
  stage: test
