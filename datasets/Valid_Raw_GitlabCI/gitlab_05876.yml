before_script:
- docker login -u gitlab-ci-token -p $CI_JOB_TOKEN $CI_REGISTRY
build:
  script:
  - echo "IMAGE_TAG=$IMAGE_TAG"
  - docker build -t $IMAGE_TAG .
  - docker push $IMAGE_TAG
  stage: build
deploy:
  script:
  - docker -v
  - docker login -u gitlab-ci-token -p $CI_JOB_TOKEN $CI_REGISTRY
  - docker pull $IMAGE_TAG
  - sh deploy.sh
  stage: deploy
image: docker:latest
services:
- docker:dind
variables:
  IMAGE_TAG: $CI_REGISTRY_IMAGE:$CI_COMMIT_REF_NAME
