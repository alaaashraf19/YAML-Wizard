.chatops:
  image: &id001
    name: $CI_REGISTRY_IMAGE:latest
    pull_policy: always
  rules: &id002
  - if: $CI_PIPELINE_SOURCE == "chat"
    when: always
  - when: never
  script: &id003
  - cd /app
  - bundle exec ruby /app/bin/chatops $CI_JOB_NAME
  tags: &id004
  - chatops
  variables: &id005
    GIT_STRATEGY: none
    GIT_SUBMODULE_STRATEGY: none
.ruby:
  before_script: &id006
  - apk add --update build-base postgresql-dev linux-headers
  - gem install bundler --no-document
  - ruby --version
  - gem --version
  - bundle --version
  - bundle install --path vendor --retry=3
  cache: &id007
    paths:
    - vendor/ruby
  needs: &id008 []
  rules: &id009
  - if: $CI_PIPELINE_SOURCE == "chat" || $CI_PIPELINE_SOURCE == "schedule" || $CI_PIPELINE_SOURCE
      == "pipeline" || $CI_PIPELINE_SOURCE == "web" || $CI_PIPELINE_SOURCE == "api"
    when: never
  - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    when: always
  - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE == "push"
    when: always
