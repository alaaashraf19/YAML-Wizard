my_build_job_1:
  artifacts:
    paths:
    - date.txt
  script:
  - /bin/echo This is a mock build job
  - date > date.txt
  - ls -lh date.txt
  stage: build
  tags:
  - docker
my_build_job_2:
  script:
  - /bin/echo This is a mock test job
  - ls -lh date.txt
  stage: test
  tags:
  - docker
my_build_job_3:
  script:
  - /bin/echo This is a mock deploy job
  - ls -lh date.txt
  stage: deploy
  tags:
  - docker
