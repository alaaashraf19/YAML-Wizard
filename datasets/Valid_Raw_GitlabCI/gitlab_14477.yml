before_script:
- rustup component add rustfmt-preview
- rustup component add clippy-preview
cache:
  key: $CI_JOB_NAME
  paths:
  - $HOME/.cargo/
  - target/
  untracked: true
image: rustdocker/rust:nightly
test:cargo:
  script:
  - rustc --version && cargo --version
  - cargo fmt -- --check
  - cargo clippy
  - cargo t
variables:
  RUST_BACKTRACE: '1'
