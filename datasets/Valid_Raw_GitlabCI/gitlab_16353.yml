before_script:
- mkdir -p /go/src/gitlab.com/sebidude /go/src/_/builds
- cp -r $CI_PROJECT_DIR /go/src/gitlab.com/sebidude/public-page
- ln -s /go/src/gitlab.com/sebidude /go/src/_/builds/sebidude
image: golang:1.10
linux-app:
  artifacts:
    expire_in: 10m
    paths:
    - build/
  script:
  - make build
  stage: build
pages:
  artifacts:
    expire_in: 10m
    paths:
    - public
  dependencies:
  - linux-app
  script:
  - make update-releasepage
  - ls -laR public
  stage: publish
stages:
- build
- publish
