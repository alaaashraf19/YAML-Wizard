artefact:
  artifacts:
    expire_in: 1 week
    paths:
    - build/libs/*.jar
  script:
  - ./gradlew -i -g .gradle assemble
  stage: artefact
build:
  script:
  - ./gradlew -i -g .gradle classes
  stage: build
cache:
  paths:
  - .gradle/wrapper
  - .gradle/caches
publish:
  artifacts:
    expire_in: 1 week
    paths:
    - build/libs/*.jar
    - build/publications/mavenJava/*.xml
  only:
  - master
  script:
  - "\n./gradlew -i -g .gradle \n-PbintrayUser=$BINTRAY_USER \n-PbintrayKey=$BINTRAY_KEY\
    \ \n-PsonatypeOssUser=$SONATYPE_OSS_USER \n-PsonatypeOssPassword=$SONATYPE_OSS_PASSWORD\n\
    bintrayUpload\n"
  stage: publish
  when: manual
stages:
- build
- test
- artefact
- publish
test:
  artifacts:
    expire_in: 1 week
    paths:
    - build/reports/tests
    when: always
  script:
  - ./gradlew -i -g .gradle check
  stage: test
