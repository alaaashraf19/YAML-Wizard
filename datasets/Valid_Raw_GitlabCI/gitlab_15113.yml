before_script: null
build_master:
  script:
  - ./gradlew build
  stage: build
image: gradle:jdk8
pages:
  artifacts:
    paths:
    - public
  dependencies:
  - build_master
  script:
  - ./gradlew test-extensions:asciidoctor
  - mkdir public
  - cp -R test-extensions/build/docs/asciidoc/* public
  stage: deploy
  when: manual
