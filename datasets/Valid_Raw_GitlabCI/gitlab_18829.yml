build:
  before_script:
  - apk add --no-cache py-pip
  - pip install docker-compose
  script:
  - docker build -t avs_backend .
  - ash .ci_scripts/push.sh
  stage: build
image: docker:latest
services:
- docker:dind
- postgres:10-alpine
- redis:4-alpine
stages:
- build
- test
test_cov:
  image: ${TAGGED_IMAGE}
  script:
  - py.test -v --cov
  stage: test
  variables:
    DJANGO_SETTINGS_MODULE: settings.settings
    POSTGRES_HOST: postgres
    RAVEN_DSN: https://5f1717b7a0b8451794cbba68b4de395b:d51c5c8994624af39d2c5325a30852f2@sentry.io/301454
    REDIS_HOST: redis
    REDIS_PORT: '6379'
test_lint:
  image: ${TAGGED_IMAGE}
  script:
  - pycodestyle --exclude='*/migrations/*, settings/*' .
  stage: test
variables:
  DOCKER_DRIVER: overlay2
  IMAGE: ${CI_REGISTRY_IMAGE}/${CI_COMMIT_REF_NAME}
  POSTGRES_DB: project_ci_test
  POSTGRES_PORT: '5432'
  POSTGRES_USER: postgres
  TAGGED_IMAGE: ${CI_REGISTRY_IMAGE}/${CI_COMMIT_REF_NAME}:CI_${CI_PIPELINE_ID}
