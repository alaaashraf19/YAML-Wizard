before_script:
- yarn install
build:
  artifacts:
    paths:
    - lib/
    - src/*.bs.js
    - __tests__/*.bs.js
  script:
  - yarn clean
  - yarn build
  stage: build
cache:
  paths:
  - node_modules/
image: node:latest
pages:
  artifacts:
    expire_in: 30 days
    paths:
    - public
  dependencies:
  - test
  only:
  - master
  script:
  - mv coverage/lcov-report public/
  stage: deploy
stages:
- build
- test
- deploy
test:
  artifacts:
    paths:
    - coverage/
  dependencies:
  - build
  script:
  - yarn test
  - yarn coverage
  services:
  - mariadb:latest
  stage: test
  variables:
    JEST_MYSQL_HOST: mariadb
    MYSQL_ALLOW_EMPTY_PASSWORD: 1
    MYSQL_DATABASE: test
