ubuntu-22.04-s390x-all-linux:
  extends: .custom_runner_template
  needs: []
  rules:
  - if: $CI_PROJECT_NAMESPACE == "qemu-project" && $CI_COMMIT_BRANCH =~ /^staging/
  - if: $S390X_RUNNER_AVAILABLE
  script:
  - mkdir build
  - cd build
  - ../configure --enable-debug --disable-system --disable-tools --disable-docs ||
    { cat config.log meson-logs/meson-log.txt; exit 1; }
  - make --output-sync -j`nproc`
  - make --output-sync check-tcg
  - make --output-sync -j`nproc` check
  stage: build
  tags:
  - ubuntu_22.04
  - s390x
ubuntu-22.04-s390x-all-system:
  extends: .custom_runner_template
  needs: []
  rules:
  - if: $CI_PROJECT_NAMESPACE == "qemu-project" && $CI_COMMIT_BRANCH =~ /^staging/
  - if: $S390X_RUNNER_AVAILABLE
  script:
  - mkdir build
  - cd build
  - ../configure --disable-user || { cat config.log meson-logs/meson-log.txt; exit
    1; }
  - make --output-sync -j`nproc`
  - make --output-sync -j`nproc` check
  stage: build
  tags:
  - ubuntu_22.04
  - s390x
  timeout: 75m
ubuntu-22.04-s390x-alldbg:
  extends: .custom_runner_template
  needs: []
  rules:
  - allow_failure: true
    if: $CI_PROJECT_NAMESPACE == "qemu-project" && $CI_COMMIT_BRANCH =~ /^staging/
    when: manual
  - allow_failure: true
    if: $S390X_RUNNER_AVAILABLE
    when: manual
  script:
  - mkdir build
  - cd build
  - ../configure --enable-debug || { cat config.log meson-logs/meson-log.txt; exit
    1; }
  - make clean
  - make --output-sync -j`nproc`
  - make --output-sync -j`nproc` check
  stage: build
  tags:
  - ubuntu_22.04
  - s390x
