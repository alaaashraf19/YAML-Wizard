    -o clang_headers:shared=False -o clang_executables:shared=False -o llvm_demangle:shared=False
    -o llvm_support:shared=False -o llvm_binary_format:shared=False -o llvm_core:shared=False
    -o llvm_mc:shared=False -o llvm_bit_reader:shared=False -o llvm_mc_parser:shared=False
    -o llvm_object:shared=False -o llvm_profile_data:shared=False -o llvm_analysis:shared=False
    -o llvm_transform_utils:shared=False -o llvm_instcombine:shared=False -o llvm_bit_writer:shared=False
    -o llvm_option:shared=False -o llvm_scalar_opts:shared=False -o llvm_target:shared=False
    -o llvm_x86_utils:shared=False -o llvm_codegen:shared=False -o llvm_debuginfo_codeview:shared=False
    -o llvm_debuginfo_msf:shared=False -o llvm_mc_disassembler:shared=False -o llvm_x86_asm_printer:shared=False
    -o llvm_x86_info:shared=False -o llvm_asm_printer:shared=False -o llvm_global_isel:shared=False
    -o llvm_selection_dag:shared=False -o llvm_x86_desc:shared=False -o llvm_x86_asm_parser:shared=False
    -o llvm_x86_codegen:shared=False -o clang_basic:shared=False -o clang_lex:shared=False
    -o clang_ast:shared=False -o clang_analysis:shared=False clang_analysis clang_analysis/6.0.1@Manu343726/testing
    --build=missing --build=clang_analysis
