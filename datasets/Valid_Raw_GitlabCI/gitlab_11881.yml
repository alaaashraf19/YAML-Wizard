before_script:
- export PATH=$PATH:$HOME/.local/bin/
- pip install --user manu343726-conan-tools
- pip install --user --upgrade conan
- conan --version
- conan remote add Manu343726 https://api.bintray.com/conan/manu343726/conan-packages
- conan remote add bincrafters  https://api.bintray.com/conan/bincrafters/public-conan
- conan profile new --detect default
- if [[ ! -z "$manu343726_bintray_key" ]]; then echo remote password variable "manu343726_bintray_key"
  not empty, ok; else echo remote password variable "manu343726_bintray_key" empty,
  error && exit 1; fi
- conan user Manu343726 -p $manu343726_bintray_key -r Manu343726
build_clang_6.0.1_clang60_build_type=Release+shared=False:
  image: conanio/clang60
  script:
  - conan profile update settings.build_type=Release default
  - CONAN_VERSION_OVERRIDE=6.0.1 conan create --profile=default -o llvm:shared=False
    -o compiler-rt:shared=False -o clang:shared=False clang clang/6.0.1@Manu343726/testing
    --build=missing --build=clang
  - conan remove -b -s -f "*"
  - conan upload clang/6.0.1@Manu343726/testing -r Manu343726 --all --force --retry
    3
  stage: clang
  tags:
  - linux
  - docker
build_clang_6.0.1_clang60_build_type=Release+shared=True:
  image: conanio/clang60
  script:
  - conan profile update settings.build_type=Release default
