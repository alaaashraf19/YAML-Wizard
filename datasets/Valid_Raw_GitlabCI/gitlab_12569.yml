build:
  artifacts:
    name: kubehiera-${CI_COMMIT_TAG}
    paths:
    - kubehiera*
  only:
  - tags
  script:
  - mkdir gopath && docker run --rm -v "$PWD/gopath":/go -v "$PWD":/usr/src/kubehiera
    -w /usr/src/kubehiera golang:1.8 go get -d -v .
  - docker run --rm -v "$PWD/gopath":/go -v "$PWD":/usr/src/kubehiera -w /usr/src/kubehiera
    -e GOOS=darwin -e GOARCH=amd64 golang:1.8 go build -v -o kubehiera-darwin-amd64
  - docker run --rm -v "$PWD/gopath":/go -v "$PWD":/usr/src/kubehiera -w /usr/src/kubehiera
    -e GOOS=linux -e GOARCH=amd64 golang:1.8 go build -v -o kubehiera-linux-amd64
  - docker run --rm -v "$PWD/gopath":/go -v "$PWD":/usr/src/kubehiera -w /usr/src/kubehiera
    -e GOOS=windows -e GOARCH=amd64 golang:1.8 go build -v -o kubehiera-windows-amd64
  stage: build
image: docker:latest
services:
- docker:dind
variables:
  DOCKER_DRIVER: overlay2
