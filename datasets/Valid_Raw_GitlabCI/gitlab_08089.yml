build:
  artifacts:
    paths:
    - _site
  image: gioxa/odagrun-jekyll-build-image:20190901
  script:
  - ./build.sh
  stage: build
  tags:
  - odagrun
  variables:
    GIT_CACHE_STRATEGY: push-pull
    GIT_STRATEGY: push-pull
    ODAGRUN_POD_SIZE: large
production:
  environment:
    name: production
    url: https://$DEPLOY_DOMAIN
  only:
  - master
  script:
  - deployctl static
  stage: production
  tags:
  - deployctl-gioxapp.com
  when: manual
review:
  environment:
    name: review/$CI_BUILD_REF_NAME
    on_stop: stop_review
    url: http://$CI_ENVIRONMENT_SLUG.$CI_PROJECT_PATH_SLUG.$DEPLOY_DOMAIN_APP
  except:
  - master
  only:
  - branches
  script:
  - deployctl static
  stage: review
  tags:
  - deployctl-gioxapp.com
stages:
- build
- review
- staging
- production
staging:
  environment:
    name: staging
    on_stop: stop_staging
    url: http://staging.$CI_PROJECT_PATH_SLUG.$DEPLOY_DOMAIN_APP
  only:
  - master
  script:
  - deployctl static
  stage: staging
  tags:
  - deployctl-gioxapp.com
stop_review:
  dependencies: []
  environment:
    action: stop
    name: review/$CI_BUILD_REF_NAME
  except:
  - master
  only:
  - branches
  script:
  - deployctl delete
  stage: review
  tags:
  - deployctl-gioxapp.com
  when: manual
stop_staging:
  dependencies: []
  environment:
    action: stop
    name: staging
  only:
  - master
  script:
  - deployctl delete
  stage: staging
  tags:
  - deployctl-gioxapp.com
  variables:
    GIT_STRATEGY: none
  when: manual
variables:
  CI_PROJECT_PATH_SLUG: gioxa-odagrun-website
  DEPLOY_CONFIG_HTTPS: 'True'
  DEPLOY_DOMAIN: www.odagrun.com
  DEPLOY_DOMAIN_APP: gioxapp.com
  DEPLOY_PUBLISH_PATH: '["/":"_site/"]'
  GIT_STRATEGY: none
  ODAGRUN_POD_SIZE: micro
