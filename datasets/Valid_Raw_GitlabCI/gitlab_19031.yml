Linux_x64:
  artifacts:
    name: GitAddonsManager_Linux_x64-$CI_COMMIT_SHA
    paths:
    - GitAddonsManager
  script:
  - zypper -q install -y find libgit2-devel make gcc gcc-c++ qt6-concurrent-devel
    qt6-core-devel qt6-gui-devel qt6-quickcontrols2-devel qt6-base-devel qt6-qml-devel
    qt6-quick-devel qt6-quick-private-devel quazip-qt6-devel ninja
  - make -f CI.mk linuxdeploy
  - make -f CI.mk finalize
  stage: build
Win64:
  artifacts:
    name: GitAddonsManager_Win64-$CI_COMMIT_SHA
    paths:
    - GitAddonsManager
  cache:
    paths:
    - Qt/
    - wine
    - libgit2-0.27.2
  script:
  - zypper -q install -y find wine-staging wine-staging-32bit wget make p7zip tar
    gzip git || true
  - make -f CI.mk windeploy
  - make -f CI.mk finalize
  stage: build
before_script:
- zypper -q install -y git
image: opensuse/tumbleweed
