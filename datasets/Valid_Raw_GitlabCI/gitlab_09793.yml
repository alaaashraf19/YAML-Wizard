before_script:
- apk update && apk add git
- pip3 install '.[dev]'
docs:
  artifacts: &id001
    paths:
    - public
  script: &id002
  - sphinx-build docs/sphinx public
  stage: test
image: python:alpine
lint:
  script:
  - pylint src
  stage: test
pages:
  artifacts: *id001
  rules:
  - if: $CI_COMMIT_BRANCH == "main"
  script: *id002
  stage: deploy
stages:
- test
- deploy
test:
  script:
  - pytest
  stage: test
typecheck:
  script:
  - mypy src
  stage: test
