.job_template:
  rules: &id001
  - if: $CI_PIPELINE_SOURCE != "schedule"
  stage: build
  tags: &id002
  - gitlab-org
AsciiDoc-classic-Python2:
  image: $CI_REGISTRY/ntpsec/ntpsec/python2
  rules: *id001
  script:
  - apt-get update
  - DEBIAN_FRONTEND="noninteractive" apt-get install -y python2-dev asciidoc-base
  - python2 ./waf configure --enable-warnings --enable-Werror --enable-doc --enable-manpage
    build --disable-nts --pyshebang "/usr/bin/env python3"
  stage: build
  tags: *id002
AsciiDoc-classic3-Debian-Old:
  image: $CI_REGISTRY/ntpsec/ntpsec/debian-oldstable
  rules: *id001
  script:
  - apt-get update
  - DEBIAN_FRONTEND="noninteractive" apt-get install -y python3-dev asciidoc-base
  - python3 ./waf configure --enable-warnings --enable-Werror --enable-doc --enable-manpage
    build --disable-nts --pyshebang "/usr/bin/env python3"
  stage: build
  tags: *id002
AsciiDoc-no:
  image: alpine
  rules: *id001
  script:
  - apk update && apk add gcc bison musl-dev openssl-dev libcap-dev python3-dev pythonispython3
  - python ./waf configure --enable-warnings --enable-Werror --disable-doc --disable-manpage
    build
  stage: build
  tags: *id002
AsciiDoc-py3-Alpine:
  image: $CI_REGISTRY/ntpsec/ntpsec/alpine
  rules: *id001
  script:
  - apk update && apk add python3-dev asciidoc
  - python3 ./waf configure --enable-warnings --enable-Werror --enable-doc --enable-manpage
    build
  stage: build
  tags: *id002
alpine-basic:
  image: $CI_REGISTRY/ntpsec/ntpsec/alpine
