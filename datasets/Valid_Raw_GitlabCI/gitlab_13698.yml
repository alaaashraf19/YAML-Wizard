pages:
  artifacts:
    paths:
    - public
  image: $CI_REGISTRY/ntpsec/ntpsec/alpine-pages
  script:
  - echo /tmp/docbot-local/lib/python3.12/site-packages > /usr/lib/python3.12/site-packages/ntpsec.pth
  - mkdir -p public/latest
  - python3 ./waf configure --prefix=/tmp/docbot-local --htmldir=`pwd`/public/latest/
    --enable-doc --disable-manpage build install
  - tar -C /tmp/docbot-local/share/doc/ntpsec/ -cf - .|tar -C public/latest/ -xf -
  - cp www/favicon.ico public
  - cp docs/top.html.in public/index.html
  - cp docs/top-asciidoc.css public/asciidoc.css
  - mv public/latest/404.html public/404.html
  - sed -i -E -e 's!\./(asciidoc\.(js|css))!\./latest/\1!g' public/404.html
  - find public -type f -iregex '.*\.\(htm\|html\|txt\|text\|js\|css\)$' -execdir
    gzip -f --keep {} \;
  stage: build
  tags:
  - gitlab-org
prisoner-0:
  image: $CI_REGISTRY/ntpsec/ntpsec/alpine
  rules: *id001
  script:
  - python3 ./waf configure --enable-warnings --enable-Werror --disable-doc --disable-manpage
    build --pyshebang "/usr/bin/env python3"
  - DESTDIR=prison python3 ./waf install uninstall
  - DESTDIR=build/prison python3 ./waf install uninstall
  - DESTDIR=../prison python3 ./waf install uninstall
  stage: build
  tags: *id002
python-coverage:
  rules: *id001
  script:
  - apt-get update -qq && apt-get install -y -qq netbase bison python-dev-is-python3
    python3-coverage
  - python ./waf configure --enable-warnings --enable-Werror --disable-doc --disable-manpage
    build
  - for i in build/main/tests/pylib/test_*; do python3-coverage run -a --source build/main/pylib
    "$i"; done
  - python3-coverage report
  stage: build
  tags: *id002
