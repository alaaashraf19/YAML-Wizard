coverity-scan:
  image: $CI_REGISTRY/ntpsec/ntpsec/coverity
  rules:
  - if: $COVERITY_TOKEN
  script:
  - curl -o /tmp/cov-analysis-linux64.tgz --form project=ntpsec --form token="${COVERITY_TOKEN}"
    https://scan.coverity.com/download/linux64
  - tar zxf /tmp/cov-analysis-linux64.tgz
  - python3 ./waf configure --enable-warnings --enable-Werror --disable-doc --disable-manpage
    --refclock=all
  - cov-analysis-linux64-*/bin/cov-build --dir cov-int python3 ./waf build
  - tar czf ntpsec_coverity.tgz cov-int
  - curl --form token="${COVERITY_TOKEN}" --form email=security@ntpsec.org --form
    file=@ntpsec_coverity.tgz --form version="$(git rev-parse --short HEAD)" --form
    description="Automatic submission by gitlab-ci" https://scan.coverity.com/builds?project=ntpsec
  tags:
  - gitlab-org
cross-armhf-build:
  allow_failure: true
  image: $CI_REGISTRY/ntpsec/ntpsec/cross-armhf
  rules: *id001
  script:
  - pyver=$(python3 -c 'import sys;print(f"{sys.version_info.major}.{sys.version_info.minor}")')
  - PYTHON_VERSION=${pyver} PYTAG=cpython3 pyext_PATTERN="%s.so" PYTHON_LDFLAGS='-lpthread
    -ldl' ./waf configure --disable-doc --disable-manpage --disable-nts --cross-compiler=arm-linux-gnueabihf-gcc
    --cross-ldflags="-L/usr/libhf" --cross-cflags="-I/usr/include/ -I/usr/include/python${pyver}"
    --pythondir=/usr/libhf/python${pyver}/dist-packages --pythonarchdir=/usr/libhf/python${pyver}/dist-packages
    build --enable-pylib=ext
  - PYTHON_VERSION=${pyver} PYTAG=cpython3 pyext_PATTERN="%s.so" PYTHON_LDFLAGS='-lpthread
    -ldl' ./waf configure --disable-doc --disable-manpage --disable-nts --cross-compiler=arm-linux-gnueabihf-gcc
    --cross-ldflags="-L/usr/libhf" --cross-cflags="-I/usr/include/ -I/usr/include/python${pyver}"
    --pythondir=/usr/libhf/python${pyver}/dist-packages --pythonarchdir=/usr/libhf/python${pyver}/dist-packages
    build --enable-pylib=ffi
  stage: build
  tags: null
