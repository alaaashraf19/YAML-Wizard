macos-basic:
  rules:
  - if: $CI_COMMIT_BRANCH && $CI_PROJECT_PATH == "NTPsec/ntpsec"
  script:
  - PKG_CONFIG_PATH=${HOMEBREW_PREFIX}/opt/openssl/lib/pkgconfig python ./waf configure
    --enable-warnings --enable-Werror --disable-doc --disable-manpage build --pyshebang
    "/usr/bin/env python3"
  - DESTDIR=build/prison python ./waf install
  - DESTDIR=./prison python ./waf install
  - DESTDIR=../prison python ./waf install
  - sudo python ./waf install
  - sudo python ./waf uninstall
  - rm -rvf build/prison ./prison ../prison
  stage: build
  tags:
  - saas-macos-medium-m1
macos-refclocks:
  rules:
  - if: $CI_COMMIT_BRANCH && $CI_PROJECT_PATH == "NTPsec/ntpsec"
  script:
  - PKG_CONFIG_PATH=${HOMEBREW_PREFIX}/opt/openssl/lib/pkgconfig python ./waf configure
    --enable-warnings --enable-Werror --disable-doc --disable-manpage --refclock=all
    build  --pyshebang "/usr/bin/env python3" || cat build/config.log
  stage: build
  tags:
  - saas-macos-medium-m1
