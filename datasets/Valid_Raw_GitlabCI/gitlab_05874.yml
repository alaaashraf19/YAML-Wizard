build:
  artifacts:
    expire_in: 1 week
    paths:
    - dist
    when: always
  before_script:
  - apt-get update && apt-get install git-lfs
  - pip install "$GITLAB_CI_PYPI_TOX"
  image: ${GITLAB_CI_IMAGE_PYTHON}
  script:
  - rm -rf dist
  - tox -e "build"
  stage: build
build_report_application:
  artifacts:
    paths:
    - polaris/reports/application/build/
  image: node:latest
  only:
    refs:
    - tags
  script:
  - cd polaris/reports/application
  - yarn install
  - unset CI
  - yarn build
  - cd ../../../
  stage: build_report_application
  variables:
    GIT_SUBMODULE_STRATEGY: recursive
deploy:
  before_script:
  - apt-get update && apt-get install git-lfs
  - pip install "$GITLAB_CI_PYPI_TWINE"
  image: ${GITLAB_CI_IMAGE_PYTHON}
  only:
    refs:
    - tags
    variables:
    - $PYPI_USERNAME
    - $PYPI_PASSWORD
  script:
  - rm -rf dist
  - python setup.py bdist_wheel
  - twine upload -u "$PYPI_USERNAME" -p "$PYPI_PASSWORD" dist/*
  stage: deploy
flake8:
  before_script:
  - apt-get update && apt-get install git-lfs
  - pip install "$GITLAB_CI_PYPI_TOX"
  image: ${GITLAB_CI_IMAGE_PYTHON}
  script:
  - tox -e "flake8"
  stage: static
integration:
  artifacts:
    expire_in: 1 week
    paths:
    - robot/output
    - robot/gl.log
    when: always
  before_script:
  - apt-get update && apt-get install git-lfs
  - pip install "$GITLAB_CI_PYPI_TOX"
  image: ${GITLAB_CI_IMAGE_PYTHON}
  script:
  - tox -e "robot"
  stage: integration
isort:
  before_script:
  - apt-get update && apt-get install git-lfs
  - pip install "$GITLAB_CI_PYPI_TOX"
  image: ${GITLAB_CI_IMAGE_PYTHON}
  script:
  - tox -e "isort"
  stage: static
pylint:
  before_script:
  - apt-get update && apt-get install git-lfs
  - pip install "$GITLAB_CI_PYPI_TOX"
  image: ${GITLAB_CI_IMAGE_PYTHON}
  script:
  - tox -e "pylint"
  stage: static
stages:
- static
- build
- test
- integration
- build_report_application
- deploy
static_js_css:
  image: ${GITLAB_CI_IMAGE_NODE}
  script:
  - npm install -g prettier
  - prettier --check "./polaris/**/*.html"
  stage: static
test:
  before_script:
  - apt-get update && apt-get install git-lfs
  - pip install "$GITLAB_CI_PYPI_TOX"
  coverage: /^TOTAL.*\s+(\d+\%)$/
  image: ${GITLAB_CI_IMAGE_PYTHON}
  script:
  - tox -e "pytest"
  stage: test
variables:
  GITLAB_CI_IMAGE_NODE: node:12.13.1
  GITLAB_CI_IMAGE_PYTHON: python:3.9
  GITLAB_CI_PYPI_TOX: tox==3.14.5
  GITLAB_CI_PYPI_TWINE: twine==3.1.1
yapf:
  before_script:
  - apt-get update && apt-get install git-lfs
  - pip install "$GITLAB_CI_PYPI_TOX"
  image: ${GITLAB_CI_IMAGE_PYTHON}
  script:
  - tox -e "yapf"
  stage: static
