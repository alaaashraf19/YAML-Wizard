.build_template:
  image: docker
  rules: &id001
  - if: $CI_PIPELINE_SOURCE == "schedule"
  script: &id002
  - IMAGE_NAME=${CI_JOB_NAME/build-/}
  - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  - docker pull $CI_REGISTRY_IMAGE/$IMAGE_NAME:latest || true
  - 'docker build --pull --cache-from $CI_REGISTRY_IMAGE/$IMAGE_NAME:latest --rm=false
    --tag $CI_REGISTRY_IMAGE/$IMAGE_NAME:latest . --file .dockerfiles/$IMAGE_NAME

    '
  - docker push $CI_REGISTRY_IMAGE/$IMAGE_NAME:latest
  services: &id003
  - docker:dind
  stage: build
  variables: &id004
    GIT_DEPTH: '1'
build-alpine:
  image: docker
  rules: *id001
  script: *id002
  services: *id003
  stage: build
  variables: *id004
