create-pages:
  pages: true
  rules:
  - if: $CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH
  script:
  - hugo --minify
  stage: deploy
default:
  before_script:
  - hugo version
  - hugo mod get -u $THEME_URL
image: hugomods/hugo:exts
test:
  rules:
  - if: $CI_COMMIT_REF_NAME != $CI_DEFAULT_BRANCH
  script:
  - hugo --minify
variables:
  HUGO_ENV: production
  THEME_URL: github.com/adityatelange/hugo-PaperMod
