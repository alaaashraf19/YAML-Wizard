before_script:
- echo "starting build for %PROJECT_NAME%"
- echo "Restoring NuGet Packages..."
- nuget restore "src/%PROJECT_NAME%.sln"
build:
  artifacts:
    name: '%CI_PROJECT_NAME%_%CI_BUILD_ID%-%CI_BUILD_REF_NAME%'
    paths:
    - src/%PROJECT_NAME%/obj/%CONFIG_TYPE%/Package/PackageTmp/
    untracked: false
  only:
  - master
  script:
  - echo "Building artifacts..."
  - '"C:\Program Files (x86)\MSBuild\14.0\Bin\MsBuild.exe" /consoleloggerparameters:ErrorsOnly
    /maxcpucount:1 /p:Configuration=%CONFIG_TYPE% /p:DeployOnBuild=true /p:PublishProfile="C:\temp\PublishProfiles\%PROJECT_NAME%\publish.pubxml"
    "src/%PROJECT_NAME%.sln"'
  stage: build
stages:
- build
- validateBuild
validateBuild:
  except:
  - master@baldvinth/eve.singlesignon
  only:
  - branches@baldvinth/eve.singlesignon
  script:
  - echo "Validating build..."
  - '"C:\Program Files (x86)\MSBuild\14.0\Bin\MsBuild.exe" /consoleloggerparameters:ErrorsOnly
    /maxcpucount:1 /p:Configuration=Debug "src/%PROJECT_NAME%.sln"'
  stage: validateBuild
variables:
  CONFIG_TYPE: Release
  PROJECT_NAME: EVE.SingleSignOn
