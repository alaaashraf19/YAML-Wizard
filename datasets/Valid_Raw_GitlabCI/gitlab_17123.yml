.job:
  coverage: /TOTAL.+ ([0-9]{1,3}%)/
  script: &id002
  - export PYTHONVERSION=$(${PYTHON} -c "import platform ; print(platform.python_version()[:3])")
  - echo PYTHONVERSION=${PYTHONVERSION}
  - export INSTALL_DIR=${CI_PROJECT_DIR}/../tare_install
  - export SITE_PACKAGES_DIR=${INSTALL_DIR}/lib/python${PYTHONVERSION}/site-packages/
  - mkdir -p ${SITE_PACKAGES_DIR}
  - export PYTHONPATH="${SITE_PACKAGES_DIR}:${PYTHONPATH}"
  - ${PYTHON} -m pip install --upgrade pip
  - ${PYTHON} -m pip install ${PIP_PACKAGES} --user
  - ${PYTHON} setup.py build_sphinx
  - ${PYTHON} setup.py install --prefix=${INSTALL_DIR}
  - ${PYTHON} -m pytest -svv
.packages_py2:
  before_script: &id001
  - export PIP_PACKAGES="pytest pytest-cov pytest-pycodestyle Sphinx sphinx_rtd_theme
    mock future"
  - export PYTHON="python"
.packages_py3:
  before_script: &id003
  - export PIP_PACKAGES="pytest pytest-cov pytest-pycodestyle Sphinx sphinx_rtd_theme"
  - export PYTHON="python3"
python27:
  before_script: *id001
  coverage: /TOTAL.+ ([0-9]{1,3}%)/
  image: python:2.7
  script: *id002
python35:
  before_script: *id003
  coverage: /TOTAL.+ ([0-9]{1,3}%)/
  image: python:3.5
  script: *id002
python36:
  before_script: *id003
  coverage: /TOTAL.+ ([0-9]{1,3}%)/
  image: python:3.6
  script: *id002
python37:
  before_script: *id003
  coverage: /TOTAL.+ ([0-9]{1,3}%)/
  image: python:3.7
  script: *id002
