.artifacts_template:
  artifacts: &id002
    name: $CI_JOB_NAME
    paths:
    - .out/bin/
.linux-dub_template:
  cache: &id003
    paths:
    - .dub/
  image: aurorafossorg/dlang:latest
  script: &id004
  - dub add-local .
  - ./tools/dub.sh $BUILD_DUB_FLAGS
.x86-linux-deps_template:
  before_script: &id005
  - pacman -Syu lib32-libsndfile lib32-libx11 lib32-libxcursor lib32-libxxf86vm --noconfirm
  - sudo -u user yay -S libsoundio --noconfirm
.x86_64-linux-deps_template:
  before_script: &id001
  - pacman -Syu libsndfile libx11 libxcursor libxxf86vm --noconfirm
  - sudo -u user yay -S libsoundio --noconfirm
examples:
  artifacts:
    name: $CI_JOB_NAME
    paths:
    - examples/.out/bin/
  before_script: *id001
  cache:
    paths:
    - .dub/
  image: aurorafossorg/dlang:latest
  script:
  - ./tools/do-examples.sh
  stage: test
image: aurorafossorg/archlinux:latest
include:
- template: License-Scanning.gitlab-ci.yml
- template: Jobs/Code-Quality.gitlab-ci.yml
- template: Dependency-Scanning.gitlab-ci.yml
- file: dlang.yml
  project: aurorafossorg/core/ci-templates
  ref: master
- file: jobs/editorconfig.yml
  project: aurorafossorg/core/ci-templates
  ref: master
stages:
- check
- build
- test
- production
- deploy
unittests:
  after_script:
  - bash <(curl -s https://codecov.io/bash)
  artifacts: *id002
  before_script: *id001
  cache: *id003
  image: aurorafossorg/dlang:latest
  script: *id004
  stage: test
  variables:
    BUILD_DUB_FLAGS: $CI_JOB_STAGE --build=unittest-cov --coverage -- -v
    TERM: xterm
x86-linux-dub-dmd-debug:
  artifacts: *id002
  before_script: *id005
  cache: *id003
  image: aurorafossorg/dlang:latest
  script: *id004
  stage: build
  variables:
    BUILD_DUB_FLAGS: $CI_JOB_STAGE --arch=x86 --compiler=dmd --build=debug
x86-linux-dub-dmd-release:
  artifacts: *id002
  before_script: *id005
  cache: *id003
  image: aurorafossorg/dlang:latest
  script: *id004
  stage: production
  variables:
    BUILD_DUB_FLAGS: build --arch=x86 --compiler=dmd --build=release
x86-linux-dub-gdc-debug:
  allow_failure: true
  artifacts: *id002
  before_script: *id005
  cache: *id003
  image: aurorafossorg/dlang:latest
  script: *id004
  stage: build
  variables:
    BUILD_DUB_FLAGS: $CI_JOB_STAGE --arch=x86 --compiler=gdc --build=debug
