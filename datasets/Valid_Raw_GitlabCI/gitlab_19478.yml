before_script:
- set -xe
- apt-get update -yqq
build:
  artifacts:
    paths:
    - dist/
  only:
  - master
  script:
  - apt-get install -yqq zip unzip
  - curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin
    --filename=composer
  - composer install
  - cp -R src/ dist/
  - cp -R vendor/ dist/version-1/php/vendor/
  stage: build
  tags:
  - docker
cache:
  paths:
  - vendor
deploy:
  dependencies:
  - build
  only:
  - master
  script:
  - apt-get install -yqq lftp
  - mkdir ~/.lftp
  - echo "set ssl:verify-certificate no" > ~/.lftp/rc
  - lftp -e "mirror --no-perms --exclude-glob .git* --exclude .git/ -R dist/ htdocs/"
    -u unaux_27147990,$PROFREEHOST_FTP_PASSWORD ftpupload.net
  stage: deploy
  tags:
  - docker
image: php:5.6
stages:
- build
- deploy
