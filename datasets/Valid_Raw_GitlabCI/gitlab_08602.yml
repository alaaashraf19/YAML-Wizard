.amd64_platform:
  tags:
  - distribution-runner
  - amd64
.arm_v7_platform:
  rules:
  - if: $DISABLE_RPI_BUILDS == "true"
    when: never
  tags:
  - distribution-runner
  - armhf
  variables:
    DOCKER_EXTRA_ARGS: --platform linux/arm/v7
    USE_BUILDX: 'true'
.build_and_deploy:
  needs: []
  retry: 1
  rules:
  - if: $PIPELINE_TYPE =~ "/(CANONICAL|MIRROR)_TAG_PIPELINE/"
    when: always
  script:
  - export IMAGE_TAG=${CI_COMMIT_TAG}
  - export DOCKERFILE=Dockerfile_${CI_JOB_NAME}
  - export DOCKERFILE_ERB=Dockerfile_${CI_JOB_NAME%"_fips"}.erb
  - if [ -z "${SKIP_CACHE}" ]; then
  - docker pull "$CI_REGISTRY_IMAGE/$CI_JOB_NAME:latest" || true
  - docker pull "$CI_REGISTRY_IMAGE/$CI_JOB_NAME-ruby:latest" || true
  - docker pull "$CI_REGISTRY_IMAGE/$CI_JOB_NAME:builder-latest" || true
  - if docker pull "$CI_REGISTRY_IMAGE/$CI_JOB_NAME-ruby:${IMAGE_TAG}"; then
  - export BUILD_RUBY_IMAGE=false;
  - fi
  - fi
  - if [[ -z ${CI_JOB_NAME##*_fips} ]]; then
  - export GENERATE_ARGS="--fips"
  - fi
  - ./docker/scripts/generate-dockerfile docker/${DOCKERFILE_ERB} ${GENERATE_ARGS}
  - cd docker
  - BUILDER_ARGS=""
  - for filename in builders/${DOCKERFILE}_*; do
  - if [ -e "$filename" ]; then
  - fileBase=$(basename $filename .erb)
  - builderImage=${fileBase//Dockerfile_/}
  - ./scripts/generate-dockerfile $filename ${GENERATE_ARGS}
  - dockerFileSha=$(sha256sum builders/$fileBase | awk '{ print $1; }')
  - rm builders/$fileBase
  - BUILDER_ARGS="$BUILDER_ARGS --build-arg ${builderImage}_image=$CI_REGISTRY_IMAGE/builders/$builderImage:$dockerFileSha"
  - fi
  - done
  - if [ "$BUILD_RUBY_IMAGE" == "true" ]; then
  - docker build $DOCKER_EXTRA_ARGS --cache-from "$CI_REGISTRY_IMAGE/$CI_JOB_NAME-ruby:latest"
    -t "$CI_REGISTRY_IMAGE/$CI_JOB_NAME-ruby:latest" -t "$CI_REGISTRY_IMAGE/$CI_JOB_NAME-ruby:${IMAGE_TAG}"
    -f "$DOCKERFILE" --target ruby-image . --build-arg RMT_HOST=$RMT_HOST $BUILDER_ARGS
  - docker push "$CI_REGISTRY_IMAGE/$CI_JOB_NAME-ruby:${IMAGE_TAG}"
  - docker push "$CI_REGISTRY_IMAGE/$CI_JOB_NAME-ruby:latest"
  - fi
  - docker build $DOCKER_EXTRA_ARGS --cache-from "$CI_REGISTRY_IMAGE/$CI_JOB_NAME:builder-latest"
    -t "$CI_REGISTRY_IMAGE/$CI_JOB_NAME:builder-latest" -f "$DOCKERFILE" --target
    builder . --build-arg RMT_HOST=$RMT_HOST $BUILDER_ARGS
  - docker build $DOCKER_EXTRA_ARGS --cache-from "$CI_REGISTRY_IMAGE/$CI_JOB_NAME:builder-latest"
    --cache-from "$CI_REGISTRY_IMAGE/$CI_JOB_NAME:latest" -t "$CI_REGISTRY_IMAGE/$CI_JOB_NAME:${IMAGE_TAG}"
    -t "$CI_REGISTRY_IMAGE/$CI_JOB_NAME:latest" -f "${DOCKERFILE}" . --build-arg RMT_HOST=$RMT_HOST
    $BUILDER_ARGS
  - docker push "$CI_REGISTRY_IMAGE/$CI_JOB_NAME:builder-latest"
  - docker push "$CI_REGISTRY_IMAGE/$CI_JOB_NAME:${IMAGE_TAG}"
  - docker push "$CI_REGISTRY_IMAGE/$CI_JOB_NAME:latest"
  stage: final_images
.build_and_deploy_amd64:
  extends:
  - .build_and_deploy
  - .amd64_platform
.build_and_deploy_arm64:
  extends:
  - .build_and_deploy
  tags:
  - distribution-runner
  - ${ARM64_RUNNER_TAG}
.build_and_deploy_armv7:
  extends:
  - .build_and_deploy
  - .arm_v7_platform
.build_and_deploy_with_ruby_amd64:
  extends:
  - .build_and_deploy_amd64
  variables:
    BUILD_RUBY_IMAGE: 'true'
.dep_build:
  needs: []
  retry: 1
  rules:
  - if: $PIPELINE_TYPE =~ "/(CANONICAL|MIRROR)_TAG_PIPELINE/"
    when: always
  script:
  - export DOCKERFILE=Dockerfile_${CI_JOB_NAME}
  - export DOCKERFILE_ERB=Dockerfile_${CI_JOB_NAME%"_fips"}.erb
  - if [[ -z ${CI_JOB_NAME##*_fips} ]]; then
  - export GENERATE_ARGS="--fips"
  - fi
  - ./docker/scripts/generate-dockerfile docker/builders/${DOCKERFILE_ERB} ${GENERATE_ARGS}
  - cd docker/builders
  - dockerFileSha=$(sha256sum $DOCKERFILE | awk '{ print $1; }')
  - if [ -z "${SKIP_CACHE}" ]; then
  - if $(docker pull "$CI_REGISTRY_IMAGE/builders/$CI_JOB_NAME:$dockerFileSha" > /dev/null);
    then
  - echo "Builder already up-to-date"
  - exit 0
  - fi
  - docker pull "$CI_REGISTRY_IMAGE/builders/$CI_JOB_NAME:latest" || true
  - fi
  - docker build $DOCKER_EXTRA_ARGS --cache-from "$CI_REGISTRY_IMAGE/builders/$CI_JOB_NAME:latest"
    -f "$DOCKERFILE" -t "$CI_REGISTRY_IMAGE/builders/$CI_JOB_NAME:$dockerFileSha"
    -t "$CI_REGISTRY_IMAGE/builders/$CI_JOB_NAME:latest" .
  - docker push "$CI_REGISTRY_IMAGE/builders/$CI_JOB_NAME:$dockerFileSha"
  - docker push "$CI_REGISTRY_IMAGE/builders/$CI_JOB_NAME:latest"
  stage: dependency_images
.dep_build_armv7:
  extends:
  - .dep_build
  - .arm_v7_platform
  stage: dependency_images
.dev-branch-only:
  rules:
  - if: $PIPELINE_TYPE =~ "/MIRROR_(FEATURE_BRANCH|MERGE_REQUEST|PROTECTED_BRANCH)_PIPELINE/"
    when: always
.dev-tag-only:
  rules:
  - if: $PIPELINE_TYPE == "MIRROR_TAG_PIPELINE"
    when: always
.test_build:
  artifacts:
    expire_in: 5 days
    paths:
    - .build/*
    untracked: false
    when: always
  needs:
  - job: danger-review
    optional: true
  retry: 1
  rules:
  - if: $PIPELINE_TYPE =~ "/(CANONICAL|MIRROR)_(FEATURE_BRANCH|MERGE_REQUEST|PROTECTED_BRANCH)_PIPELINE/"
    when: always
  script:
  - set -- $CI_JOB_NAME
  - export DOCKERFILE=Dockerfile_$1
  - export DOCKERFILE_ERB=Dockerfile_${1%"_fips"}.erb
  - if [[ -z ${1##*_fips} ]]; then
  - export GENERATE_ARGS="--fips"
  - fi
  - if [ -z "${SKIP_CACHE}" ]; then
  - docker pull "$CI_REGISTRY_IMAGE/staging/$1:builder-latest" || docker pull "$CI_REGISTRY_IMAGE/$1:builder-latest"
    || true
  - docker pull "$CI_REGISTRY_IMAGE/staging/$1-ruby:latest" || docker pull "$CI_REGISTRY_IMAGE/$1-ruby:latest"
    || true
  - docker pull "$CI_REGISTRY_IMAGE/staging/$1:$CI_COMMIT_REF_SLUG" || docker pull
    "$CI_REGISTRY_IMAGE/$1:latest" || true
  - fi
  - ./docker/scripts/generate-dockerfile docker/${DOCKERFILE_ERB} ${GENERATE_ARGS}
    >> filelist
  - mkdir -p .build
  - for f in $(cat filelist); do cp ${f} .build/ ; done
  - cd docker
  - BUILDER_ARGS=""
  - for filename in builders/${DOCKERFILE}_*; do
  - if [ -e "$filename" ]; then
  - fileBase=$(basename $filename .erb)
  - builderImage=${fileBase//Dockerfile_/}
  - ./scripts/generate-dockerfile $filename ${GENERATE_ARGS}
  - dockerFileSha=$(sha256sum builders/$fileBase | awk '{ print $1; }')
  - rm builders/$fileBase
  - BUILDER_ARGS="$BUILDER_ARGS --build-arg ${builderImage}_image=$CI_REGISTRY_IMAGE/staging-builders/$builderImage:$dockerFileSha"
  - fi
  - done
  - if [ "$BUILD_RUBY_IMAGE" == "true" ]; then
  - docker build $DOCKER_EXTRA_ARGS --cache-from "$CI_REGISTRY_IMAGE/staging/$1-ruby:latest"
    --cache-from "$CI_REGISTRY_IMAGE/$1-ruby:latest" -t "$CI_REGISTRY_IMAGE/staging/$1-ruby:latest"
    -t "$CI_REGISTRY_IMAGE/staging/$1-ruby:${CI_COMMIT_REF_SLUG}" -f "$DOCKERFILE"
    --target ruby-image . --build-arg RMT_HOST=$RMT_HOST $BUILDER_ARGS
  - docker push "$CI_REGISTRY_IMAGE/staging/$1-ruby:latest"
  - docker push "$CI_REGISTRY_IMAGE/staging/$1-ruby:${CI_COMMIT_REF_SLUG}"
  - fi
  - docker build $DOCKER_EXTRA_ARGS --cache-from "$CI_REGISTRY_IMAGE/staging/$1:builder-latest"
    --cache-from "$CI_REGISTRY_IMAGE/$1:builder-latest" -t "$CI_REGISTRY_IMAGE/staging/$1:builder-latest"
    -f "$DOCKERFILE" --target builder . --build-arg RMT_HOST=$RMT_HOST $BUILDER_ARGS
  - docker build $DOCKER_EXTRA_ARGS --cache-from "$CI_REGISTRY_IMAGE/staging/$1:builder-latest"
    --cache-from "$CI_REGISTRY_IMAGE/staging/$1:$CI_COMMIT_REF_SLUG" --cache-from
    "$CI_REGISTRY_IMAGE/$1:latest" -f "$DOCKERFILE" -t "$CI_REGISTRY_IMAGE/staging/$1:$CI_COMMIT_REF_SLUG"
    . --build-arg RMT_HOST=$RMT_HOST $BUILDER_ARGS
  - docker push "$CI_REGISTRY_IMAGE/staging/$1:builder-latest"
  - docker push "$CI_REGISTRY_IMAGE/staging/$1:${CI_COMMIT_REF_SLUG}"
  stage: final_images
.test_build_amd64:
  extends:
  - .test_build
  - .amd64_platform
.test_build_arm64:
  extends:
  - .test_build
  tags:
  - distribution-runner
  - ${ARM64_RUNNER_TAG}
.test_build_armv7:
  extends:
  - .test_build
  - .arm_v7_platform
.test_build_with_ruby_amd64:
  extends:
  - .test_build_amd64
  variables:
    BUILD_RUBY_IMAGE: 'true'
.test_dep_build:
  needs:
  - job: danger-review
    optional: true
  retry: 1
  rules:
  - if: $PIPELINE_TYPE =~ "/(CANONICAL|MIRROR)_(FEATURE_BRANCH|MERGE_REQUEST|PROTECTED_BRANCH)_PIPELINE/"
    when: always
  script:
  - set -- $CI_JOB_NAME
  - export DOCKERFILE=Dockerfile_$1
  - export DOCKERFILE_ERB=Dockerfile_${1%"_fips"}.erb
  - if [[ -z ${1##*_fips} ]]; then
  - export GENERATE_ARGS="--fips"
  - fi
  - ./docker/scripts/generate-dockerfile docker/builders/${DOCKERFILE_ERB} ${GENERATE_ARGS}
  - cd docker/builders
  - dockerFileSha=$(sha256sum $DOCKERFILE | awk '{ print $1; }')
  - if [ -z "${SKIP_CACHE}" ]; then
  - if $(docker pull "$CI_REGISTRY_IMAGE/staging-builders/$1:$dockerFileSha" > /dev/null);
    then
  - echo "Builder already up-to-date"
  - exit 0
  - fi
  - docker pull "$CI_REGISTRY_IMAGE/staging-builders/$1:$CI_COMMIT_REF_SLUG" || docker
    pull "$CI_REGISTRY_IMAGE/builders/$1:latest" || true
  - fi
  - docker build $DOCKER_EXTRA_ARGS --cache-from "$CI_REGISTRY_IMAGE/staging-builders/$1:$CI_COMMIT_REF_SLUG"
    --cache-from "$CI_REGISTRY_IMAGE/builders/$1:latest" -f "$DOCKERFILE" -t "$CI_REGISTRY_IMAGE/staging-builders/$1:$dockerFileSha"
    -t "$CI_REGISTRY_IMAGE/staging-builders/$1:$CI_COMMIT_REF_SLUG" .
  - docker push "$CI_REGISTRY_IMAGE/staging-builders/$1:$dockerFileSha"
  - docker push "$CI_REGISTRY_IMAGE/staging-builders/$1:$CI_COMMIT_REF_SLUG"
  stage: dependency_images
.test_dep_build_armv7:
  extends:
  - .test_dep_build
  - .arm_v7_platform
  stage: dependency_images
