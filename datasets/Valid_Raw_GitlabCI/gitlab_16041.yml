.buildandtest: 'cmake -H. -B$CI_JOB_NAME -DCMAKE_BUILD_TYPE=RelWithDebInfo -DBUILD_LIGHTER_TESTS=OFF
  $EXTRA_OPTS

  make -C $CI_JOB_NAME

  $CI_JOB_NAME/bin/graph-tests -r xml -o $CI_JOB_NAME/testresults.xml

  '
.buildbase:
  artifacts:
    reports:
      junit:
      - $CI_JOB_NAME/testresults.xml
  script:
  - 'cmake -H. -B$CI_JOB_NAME -DCMAKE_BUILD_TYPE=RelWithDebInfo -DBUILD_LIGHTER_TESTS=OFF
    $EXTRA_OPTS

    make -C $CI_JOB_NAME

    $CI_JOB_NAME/bin/graph-tests -r xml -o $CI_JOB_NAME/testresults.xml

    '
  stage: build
.gccbuild:
  before_script:
  - echo "deb http://ftp.debian.org/debian stretch-backports main" >> /etc/apt/sources.list.d/backports.list
  - apt-get update -qq
  - apt-get install -y -qq --no-install-recommends $STRETCH_PKGS
  - apt-get install -y -qq --no-install-recommends -t stretch-backports $STRETCH_BPO_PKGS
  extends: .buildbase
build:clang:3.9:
  before_script:
  - apt-get update -qq
  - apt-get install -y -qq --no-install-recommends $STRETCH_PKGS clang-3.9
  - apt-get install -y -qq --no-install-recommends -t stretch-backports $STRETCH_BPO_PKGS
  extends: .buildbase
  image: debian:stretch-backports
  variables:
    EXTRA_OPTS: -DCMAKE_CXX_COMPILER=/usr/bin/clang++-3.9 -DCMAKE_C_COMPILER=/usr/bin/clang-3.9
build:clang:buster:
  artifacts:
    paths:
    - $CI_JOB_NAME/tests/coverage-tests/
    - $CI_JOB_NAME/docs/html/
  before_script:
  - apt-get update -qq
  - apt-get install -y -qq --no-install-recommends $BUSTER_PKGS gcovr
  extends: .buildbase
  image: debian:buster
  script:
  - cmake -H. -B$CI_JOB_NAME -DCMAKE_BUILD_TYPE=Debug -DBUILD_LIGHTER_TESTS=OFF -DCMAKE_CXX_COMPILER=/usr/bin/clang++
    -DCMAKE_C_COMPILER=/usr/bin/clang
  - make -C $CI_JOB_NAME coverage-tests doc
  - cd $CI_JOB_NAME && gcovr -r . --gcov-executable 'llvm-cov-8 gcov' --filter ../include/
build:gcc:7:
  extends: .gccbuild
  image: gcc:7
build:gcc:8:
  extends: .gccbuild
  image: gcc:8
pages:
  artifacts:
    paths:
    - public
  dependencies:
  - build:clang:buster
  only:
  - master
  script:
  - mv build:clang:buster/docs/html public
  - mv build:clang:buster/tests/coverage-tests public/coverage
  stage: deploy
stages:
- build
- deploy
variables:
  BUSTER_PKGS: cmake make clang llvm librange-v3-dev doxygen
  EXTRA_OPTS: ''
  STRETCH_BPO_PKGS: librange-v3-dev
  STRETCH_PKGS: cmake make
