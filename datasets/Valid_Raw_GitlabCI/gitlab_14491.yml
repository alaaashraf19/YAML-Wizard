.common_test_job_template:
  extends: .base_job_template
  image: $CI_REGISTRY_IMAGE/qemu/$IMAGE:$QEMU_CI_CONTAINER_TAG
  script:
  - source scripts/ci/gitlab-ci-section
  - section_start buildenv "Setting up to run tests"
  - scripts/git-submodule.sh update roms/SLOF
  - build/pyvenv/bin/meson subprojects download $(cd build/subprojects && echo *)
  - cd build
  - find . -type f -exec touch {} +
  - if [ "x${QEMU_TEST_CACHE_DIR}" != "x" ]; then $MAKE precache-functional ; fi
  - section_end buildenv
  - section_start test "Running tests"
  - $MAKE NINJA=":" $MAKE_CHECK_ARGS
  - section_end test
  stage: test
.functional_test_job_template:
  after_script:
  - cd build
  - du -chs ${CI_PROJECT_DIR}/*-cache
  artifacts:
    expire_in: 7 days
    name: $CI_JOB_NAME-$CI_COMMIT_REF_SLUG
    paths:
    - build/tests/results/latest/results.xml
    - build/tests/results/latest/test-results
    - build/tests/functional/*/*/*.log
    reports:
      junit: build/tests/results/latest/results.xml
    when: always
  before_script:
  - mkdir -p ~/.config/avocado
  - echo "[datadir.paths]" > ~/.config/avocado/avocado.conf
  - echo "cache_dirs = ['${CI_PROJECT_DIR}/avocado-cache']" >> ~/.config/avocado/avocado.conf
  - echo -e '[job.output.testlogs]\nstatuses = ["FAIL", "INTERRUPT"]' >> ~/.config/avocado/avocado.conf
  - if [ -d ${CI_PROJECT_DIR}/avocado-cache ]; then du -chs ${CI_PROJECT_DIR}/*-cache
    ; fi
  - export AVOCADO_ALLOW_UNTRUSTED_CODE=1
  - export QEMU_TEST_ALLOW_UNTRUSTED_CODE=1
  - export QEMU_TEST_CACHE_DIR=${CI_PROJECT_DIR}/functional-cache
  cache:
    key: ${CI_JOB_NAME}-cache
    paths:
    - ${CI_PROJECT_DIR}/avocado-cache
    - ${CI_PROJECT_DIR}/functional-cache
    policy: pull-push
  extends: .common_test_job_template
  variables:
    QEMU_JOB_AVOCADO: 1
.native_build_artifact_template:
  artifacts:
    exclude:
    - build/**/*.p
    - build/**/*.a.p
    - build/**/*.c.o
    - build/**/*.c.o.d
    expire_in: 2 days
    paths:
    - build
    - .git-submodule-status
    when: on_success
.native_build_job_template:
  before_script:
  - source scripts/ci/gitlab-ci-section
  - section_start setup "Pre-script setup"
  - JOBS=$(expr $(nproc) + 1)
  - cat /packages.txt
  - section_end setup
  cache:
    key: $CI_JOB_NAME
    paths:
    - ccache
    when: always
  extends: .base_job_template
  image: $CI_REGISTRY_IMAGE/qemu/$IMAGE:$QEMU_CI_CONTAINER_TAG
  script:
  - export CCACHE_BASEDIR="$(pwd)"
  - export CCACHE_DIR="$CCACHE_BASEDIR/ccache"
  - export CCACHE_MAXSIZE="500M"
  - export PATH="$CCACHE_WRAPPERSDIR:$PATH"
  - du -sh .git
  - mkdir build
  - cd build
  - ccache --zero-stats
  - section_start configure "Running configure"
  - ../configure --enable-werror --disable-docs --enable-fdt=system ${TARGETS:+--target-list="$TARGETS"}
    $CONFIGURE_ARGS || { cat config.log meson-logs/meson-log.txt && exit 1; }
  - if test -n "$LD_JOBS"; then pyvenv/bin/meson configure . -Dbackend_max_links="$LD_JOBS"
    ; fi || exit 1;
  - section_end configure
  - section_start build "Building QEMU"
  - $MAKE -j"$JOBS"
  - section_end build
  - section_start test "Running tests"
  - if test -n "$MAKE_CHECK_ARGS"; then $MAKE -j"$JOBS" $MAKE_CHECK_ARGS ; fi
  - section_end test
  - ccache --show-stats
  stage: build
.native_test_job_template:
  artifacts:
    expire_in: 7 days
    name: $CI_JOB_NAME-$CI_COMMIT_REF_SLUG
    paths:
    - build/meson-logs/testlog.txt
    reports:
      junit: build/meson-logs/testlog.junit.xml
    when: always
  extends: .common_test_job_template
