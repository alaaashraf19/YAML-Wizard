build:
  before_script:
  - dotnet restore
  image: microsoft/dotnet:latest
  only:
  - master
  script:
  - dotnet build
  stage: build
pages:
  artifacts:
    paths:
    - public
  before_script:
  - npm install gitbook-cli -g
  - gitbook install
  cache:
    paths:
    - node_modules/
  image: node:8.11.4
  only:
  - master
  script:
  - gitbook build . public
  stage: deploy
stages:
- build
- test
- deploy
test:
  before_script:
  - dotnet restore
  image: microsoft/dotnet:latest
  only:
  - master
  script:
  - dotnet test test/FactoryMethodTest/FactoryMethodTest.csproj
  - dotnet test test/AbstractFactoryTest/AbstractFactoryTest.csproj
  - dotnet test test/BuilderTest/BuilderTest.csproj
  - dotnet test test/PrototypeTest/PrototypeTest.csproj
  stage: test
