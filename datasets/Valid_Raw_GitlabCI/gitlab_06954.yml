docker_images:
  image: docker:latest
  script:
  - docker login -u gitlab-ci-token -p $CI_JOB_TOKEN $CI_REGISTRY
  - docker build -f Dockerfile-prod -t $IMAGE_TAG_PROD .
  - docker push $IMAGE_TAG_PROD
  services:
  - docker:dind
  stage: build
  variables:
    IMAGE_TAG_DEV: $CI_REGISTRY_IMAGE/dev:$CI_COMMIT_REF_SLUG
    IMAGE_TAG_PROD: $CI_REGISTRY_IMAGE/prod:$CI_COMMIT_REF_SLUG
run_spec_tests:
  image: ruby:2.7.0
  script:
  - apt-get update && apt-get install -y apt-transport-https
  - curl -sL https://deb.nodesource.com/setup_8.x | bash -
  - apt-get install -y nodejs
  - curl -sS https://dl.yarnpkg.com/debian/pubkey.gpg | apt-key add -
  - echo "deb https://dl.yarnpkg.com/debian/ stable main" | tee /etc/apt/sources.list.d/yarn.list
  - apt-get update
  - apt-get install yarn
  - yarn
  - gem install bundler
  - bundle config --local build.nokogiri --use-system-libraries
  - bundle install
  - bundle audit check --update --ignore CVE-2018-1000544
  services:
  - postgres:12
  stage: test
  variables:
    DB_HOST: postgres
stages:
- test
- build
