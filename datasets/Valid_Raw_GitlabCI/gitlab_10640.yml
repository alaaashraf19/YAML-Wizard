before_script:
- docker volume create --name bundler_data
- docker network create frontend
- docker network create backend
build:
  script:
  - cd /builds/isqad/ubastation
  - docker-compose -f docker-compose.yml -f docker-compose.development.yml up -d uba-pg
  - docker-compose -f docker-compose.yml -f docker-compose.development.yml run --rm
    uba-app bundle install --without production --deployment --jobs 4
  - until docker-compose -f docker-compose.yml -f docker-compose.development.yml run
    --rm uba-app nc -z uba-pg 5432; do echo 'Waiting pg...'; sleep 3; done
  - docker-compose -f docker-compose.yml -f docker-compose.development.yml run --rm
    uba-app bundle exec rake db:migrate
  - docker-compose -f docker-compose.yml -f docker-compose.development.yml run --rm
    uba-app bundle exec rspec
  stage: build
image:
  entrypoint:
  - /bin/sh
  - -c
  name: docker/compose:1.23.2
services:
- docker:dind
stages:
- build
variables:
  BUNDLE_GEMFILE: Gemfile
  DOCKER_DRIVER: overlay2
  DOCKER_HOST: tcp://docker:2375/
  POSTGRES_IMAGE_TAG: '9.4'
  RAILS_ENV: test
  RUBY_IMAGE_TAG: 2.1.9
