deploy to production:
  environment:
    name: Production
    url: http://shaunbur.ch
  image: ruby:latest
  only:
  - master
  script:
  - gem install dpl
  - dpl --provider=s3 --acl=public_read --bucket=$S3_BUCKET_NAME --region=$S3_REGION
  stage: deploy
pages:
  artifacts:
    paths:
    - public
  environment: Test
  script:
  - mkdir .public
  - cp -r * .public
  - mv .public public
  stage: deploy
variables:
  S3_BUCKET_NAME: shaunbur.ch
  S3_REGION: us-east-1
