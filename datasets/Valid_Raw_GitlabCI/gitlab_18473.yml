before_script:
- ln -s /builds /go/src/gitlab.com
- cd /go/src/gitlab.com/varikin/romen
- glide install
image: varikin/golang-glide-alpine
package:
  artifacts:
    paths:
    - bin/
  only:
  - tags
  script:
  - go get github.com/GeertJohan/go.rice/rice
  - make VERSION=$CI_COMMIT_TAG bundle package
  stage: package
stages:
- test
- package
test:
  script:
  - make check
  stage: test
