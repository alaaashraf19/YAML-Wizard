before_script:
- cat /etc/*release
- apt --quiet update --yes
- export GRADLE_USER_HOME=`pwd`/tmp/.gradle
- chmod +x ./gradlew
build_debug:
  artifacts:
    paths:
    - android/build/outputs/
  rules:
  - if: $CI_PIPELINE_SOURCE != "schedule"
  script:
  - . ./scripts/setup-android-sdk.sh
  - ./gradlew assembleDebug
  stage: build
build_release:
  artifacts:
    paths:
    - android/build/outputs/
  rules:
  - if: $CI_PIPELINE_SOURCE != "schedule"
  script:
  - . ./scripts/setup-android-sdk.sh
  - ./gradlew assembleRelease
  stage: build
cache:
  paths:
  - tmp/.gradle/wrapper
  - tmp/.gradle/caches
image: openjdk:17-ea-17-jdk-buster
licensecheck:
  rules:
  - if: $CI_PIPELINE_SOURCE != "schedule"
  script:
  - echo skipped
  stage: sanitychecks
merge_trans:
  rules:
  - if: $CI_PIPELINE_SOURCE == "schedule"
  script:
  - echo "This job runs only on a specific schedule."
  - pwd
  - ls -la
  - git checkout master
  - git remote -v
  - git remote add github https://github.com/ar-/gdroidclient.git
  - git remote -v
  - git fetch github
  - git remote set-url origin https://gdroidbot:${CI_PUSH_TOKEN}@gitlab.com/gdroid/gdroidclient.git
  - git config --global user.email 'gdroidbot@abga.be'
  - git config --global user.name 'G-Droid Bot'
  - git branch
  - git merge github/weblate
  - git branch
  - git push --follow-tags origin master
  - echo "Incrementing version..."
  - GRADLE_FILE="app/build.gradle"
  - current_version_code=$(grep versionCode $GRADLE_FILE | awk '{print $2}')
  - current_version_name=$(grep versionName $GRADLE_FILE | awk '{print $2}' | tr -d
    '"')
  - new_version_code=$((current_version_code + 1000))
  - IFS='.' read -r major minor patch <<< "$current_version_name"
  - new_minor=$((minor + 1))
  - new_version_name="$major.$new_minor.$patch"
  - sed -i "s/versionCode $current_version_code/versionCode $new_version_code/" $GRADLE_FILE
  - sed -i "s/versionName \"$current_version_name\"/versionName \"$new_version_name\"/"
    $GRADLE_FILE
  - git diff
  - git commit -m "new version v$new_version_name" .
  - git tag "v$new_version_name"
  - git push --follow-tags origin master
  - git push --tags
  stage: scheduled
stages:
- sanitychecks
- build
- scheduled
