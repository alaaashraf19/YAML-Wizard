cache:
  paths:
  - .cache/pip
  - .tox
image: python:3.10-alpine
services:
- postgres:alpine
tests:
  before_script:
  - python -V
  - time apk --update add --no-cache build-base gcc libgcc libffi-dev openssl-dev
    git postgresql-client jpeg-dev openjpeg-dev zlib-dev freetype-dev lcms2-dev freetype-dev
    gifsicle rust cargo
  - time pip3 install --upgrade pip
  - time pip3 install wheel tox
  script:
  - ls
  - cp config.ci.py config.py
  - time tox
variables:
  PIP_CACHE_DIR: $CI_PROJECT_DIR/.cache/pip
  POSTGRES_HOST_AUTH_METHOD: trust
