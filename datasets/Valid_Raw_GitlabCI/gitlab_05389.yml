docker-debian:
  before_script:
  - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  except:
    variables:
    - $NO_DOCKER_BUILD
  image: docker:latest
  only:
    changes:
    - Dockerfile
  script:
  - docker build -t $IMAGE_TAG debian
  - docker push $IMAGE_TAG
  services:
  - docker:dind
  stage: docker
  tags:
  - docker
  variables:
    IMAGE_TAG: $CI_REGISTRY_IMAGE:debian_$CI_COMMIT_REF_NAME
kernel-debian:
  artifacts:
    name: $CI_COMMIT_REF_SLUG
    paths:
    - debian/*.log
    - debian/*.deb
    when: always
  dependencies:
  - build-docker
  image: $CI_REGISTRY_IMAGE:debian_$CI_COMMIT_REF_NAME
  only:
    changes:
    - debian/Dockerfile
    - debian/kernel.mk
    - debian/kernel_settings.mk
    - debian/.config
  script:
  - cd debian
  - make -f kernel.mk all
  stage: kernel
  tags:
  - docker
stages:
- docker
- kernel
