after_script:
- echo "End CI"
before_script:
- export GRADLE_USER_HOME=`pwd`/.gradle
build:
  artifacts:
    expire_in: 1 week
    paths:
    - build/libs/*.jar
  script:
  - ./gradlew build install
  stage: build
cache:
  paths:
  - .gradle/wrapper
  - .gradle/caches
image: java:8-jdk
stages:
- build
