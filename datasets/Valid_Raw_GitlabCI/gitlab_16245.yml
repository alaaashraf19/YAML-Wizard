build_job:
  artifacts:
    expire_in: 1 week
    paths:
    - saycle.server/bin/Release/netcoreapp2.0/ubuntu.16.04-x64
    - saycle.server/bin/Release/netcoreapp2.0/ubuntu.16.10-x64
  script:
  - ./build.sh
  stage: build
deploy_job:
  dependencies:
  - build_job
  - test_job
  image: ruby:2.2
  only:
  - master
  script:
  - gem install dpl
  - dpl --provider=heroku --app=saycle-server-live --api-key=$HEROKU_PRODUCTION_API_KEY
  stage: deploy
image: microsoft/aspnetcore-build:2.0
stages:
- build
- test
- deploy
test_job:
  artifacts:
    expire_in: 1 week
  script:
  - ./test.sh
  stage: test
