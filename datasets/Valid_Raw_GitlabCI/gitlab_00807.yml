.test_template:
  before_script: &id001
  - apt-get update -yqq
  - apt-get install git zip unzip -yqq
  - pecl install xdebug-${XDEBUG_VERSION}
  - docker-php-ext-enable xdebug
  - curl -sS https://getcomposer.org/installer | php
  - php composer.phar install --no-interaction
  - curl -L https://github.com/PHP-CS-Fixer/PHP-CS-Fixer/releases/download/v3.15.1/php-cs-fixer.phar
    -o php-cs-fixer
  - chmod a+x php-cs-fixer
  - ./php-cs-fixer --allow-risky=yes -v --dry-run fix config
  - ./php-cs-fixer --allow-risky=yes -v --dry-run fix database
  - ./php-cs-fixer --allow-risky=yes -v --dry-run fix src
  - ./php-cs-fixer --allow-risky=yes -v --dry-run fix tests
  cache: &id002
    paths:
    - vendor/
  script: &id003
  - php vendor/bin/phpunit --coverage-text --coverage-clover clover.xml --testdox
  - bash <(curl -s https://codecov.io/bash)
pages:
  artifacts:
    paths:
    - public
  cache:
    paths:
    - node_modules/
  image: node:16
  only:
  - master
  script:
  - yarn install
  - yarn build
test:8.1:
  before_script: *id001
  cache: *id002
  image: php:8.1
  script: *id003
  variables:
    PHP_CS_FIXER_IGNORE_ENV: 1
    XDEBUG_VERSION: 3.3.1
test:8.2:
  before_script: *id001
  cache: *id002
  image: php:8.2
  script: *id003
  variables:
    PHP_CS_FIXER_IGNORE_ENV: 1
    XDEBUG_VERSION: 3.3.1
test:8.3:
  before_script: *id001
  cache: *id002
  image: php:8.3
  script: *id003
  variables:
    PHP_CS_FIXER_IGNORE_ENV: 1
    XDEBUG_VERSION: 3.3.1
test:8.4:
  before_script: *id001
  cache: *id002
  image: php:8.4
  script: *id003
  variables:
    PHP_CS_FIXER_IGNORE_ENV: 1
    XDEBUG_VERSION: 3.4.0
variables:
  XDEBUG_MODE: coverage
