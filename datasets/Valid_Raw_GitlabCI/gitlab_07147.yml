cache:
  paths:
  - node_modules/
image: node:10
publish:
  environment:
    name: npm
    url: https://www.npmjs.com/package/cryptography
  only:
  - tags
  - triggers
  script:
  - echo '//registry.npmjs.org/:_authToken=${NPM_TOKEN}'>.npmrc
  - npm publish
  stage: deploy
stages:
- test
- deploy
test_node_10:
  script:
  - npm install
  - npm test
  stage: test
