.nginx_builder_kaniko:
  image:
    entrypoint:
    - ''
    name: gcr.io/kaniko-project/executor:debug
  script:
  - git clone https://github.com/TinkoffCreditSystems/Nginx-builder.git
  - echo "{\"auths\":{\"$CI_REGISTRY\":{\"username\":\"gitlab-ci-token\",\"password\":\"$CI_BUILD_TOKEN\"}}}"
    > /kaniko/.docker/config.json
  - '/kaniko/executor --context dir://${CI_PROJECT_DIR}/Nginx-builder --dockerfile
    ${CI_PROJECT_DIR}/Nginx-builder/Dockerfile --destination ${CI_REGISTRY_IMAGE}/nginx_builder:latest

    '
  stage: build_image
  tags:
  - docker
  when: manual
centos7:
  artifacts:
    paths:
    - '*.rpm'
  image: ${CI_REGISTRY_IMAGE}/nginx_builder:latest
  script:
  - /nginx-builder/main.py build -f nginx_build_config.yml -r ${CI_COMMIT_SHORT_SHA}
  stage: build_nginx
  tags:
  - docker
  when: manual
image: docker:git
nginx_builder:
  script:
  - git clone https://github.com/vadikgo/Nginx-builder.git
  - cd Nginx-builder
  - docker build -t ${CI_REGISTRY_IMAGE}/nginx_builder:latest -f Dockerfile.centos
    .
  - docker login -u gitlab-ci-token -p $CI_BUILD_TOKEN registry.gitlab.com
  - docker push ${CI_REGISTRY_IMAGE}/nginx_builder:latest
  stage: build_image
  tags:
  - docker
  when: manual
services:
- docker:dind
stages:
- build_image
- build_nginx
