.with-docker:
  before_script: &id001
  - which make || ( apk add --no-cache make > /dev/null )
  - mkdir -p "${CI_PROJECT_DIR}/.build"
  - docker login -u gitlab-ci-token -p "$CI_JOB_TOKEN" registry.gitlab.com
  cache: &id002 {}
  script: /bin/true
  services: &id003
  - docker:dind
Build service images (branch):
  before_script: *id001
  cache: *id002
  except: &id004
    variables:
    - $CI_COMMIT_TITLE =~ /\[skip.?build\]/i
  only: &id006
  - branches
  script: &id005
  - make PULL_TAG="$PULL_TAG" PUBLISH_TAGS="$PUBLISH_TAGS" app-push
  - make PULL_TAG="$PULL_TAG" PUBLISH_TAGS="$PUBLISH_TAGS" nginx-push
  services: *id003
  stage: prepare
  variables:
    PUBLISH_TAGS: $CI_COMMIT_REF_SLUG
    PULL_TAG: $CI_COMMIT_REF_SLUG
Build service images (latest):
  before_script: *id001
  cache: *id002
  except: *id004
  only: &id007
    refs:
    - master
  script: *id005
  services: *id003
  stage: prepare
  variables:
    PUBLISH_TAGS: latest
    PULL_TAG: latest
Build service images (stable):
  before_script: *id001
  cache: *id002
  except: &id009
  - branches
  only: &id010
  - /^v\d+\.\d+\.\d+$/
  script: *id005
  services: *id003
  stage: prepare
  variables:
    PUBLISH_TAGS: $CI_COMMIT_REF_NAME stable
    PULL_TAG: $CI_COMMIT_REF_NAME
Build sources image (branch):
  before_script: *id001
  cache: *id002
  except: *id004
  only: *id006
  script: &id008
  - docker run --rm -u "$(id -u):$(id -g)" -v "$(pwd)/src:/app:rw" $APP_IMAGE:$TAG_NAME
    composer install --no-interaction --ansi --no-suggest --prefer-dist --no-dev
  - docker run --rm -u "$(id -u):$(id -g)" -v "$(pwd)/src:/app:rw" --workdir "/app"
    $NODE_IMAGE sh -c "npm install && npm run production"
  - make PUBLISH_TAGS="$PUBLISH_TAGS" sources-push
  services: *id003
  stage: build
  variables:
    PUBLISH_TAGS: $CI_COMMIT_REF_SLUG
    TAG_NAME: $CI_COMMIT_REF_SLUG
Build sources image (latest):
  before_script: *id001
  cache: *id002
  except: *id004
  only: *id007
  script: *id008
  services: *id003
  stage: build
  variables:
    PUBLISH_TAGS: latest
    TAG_NAME: latest
Build sources image (stable):
  before_script: *id001
  cache: *id002
  except: *id009
  only: *id010
  script: *id008
  services: *id003
  stage: build
  variables:
    PUBLISH_TAGS: $CI_COMMIT_REF_NAME stable
    TAG_NAME: $CI_COMMIT_REF_NAME
Execute npm build (branch):
  except: &id011
    variables:
    - $CI_COMMIT_TITLE =~ /\[skip.?test\]/i
  image: $NODE_IMAGE
  only: *id006
  script: &id012
  - cd ./src
  - npm install
  - npm run production
  stage: test
Execute npm build (stable):
  except: *id011
  image: $NODE_IMAGE
  only: *id010
  script: *id012
  stage: test
Execute phpstan (branch):
  except: *id011
  image: $APP_IMAGE:$CI_COMMIT_REF_SLUG
  only: *id006
  script: &id013
  - cd ./src
  - composer_install
  - php ./vendor/bin/phpstan analyze --ansi --level=2 ./app
  stage: test
Execute phpstan (stable):
  except: *id011
  image: $APP_IMAGE:$CI_COMMIT_REF_NAME
  only: *id010
  script: *id013
  stage: test
Execute phpunit (branch):
  coverage: /^\s*Lines:\s*\d+.\d+\%/
  except: *id011
  image: $APP_IMAGE:$CI_COMMIT_REF_SLUG
  only: *id006
  script: &id014
  - docker-php-ext-enable xdebug
  - cd ./src
  - composer_install
  - php ./vendor/bin/phpunit --colors=never --coverage-text
  services: &id015
  - $POSETGRES_IMAGE
  - $REDIS_IMAGE
  stage: test
  variables: &id016
    DB_CONNECTION: pgsql
    DB_DATABASE: app
    DB_HOST: postgres
    DB_PASSWORD: app
    DB_PORT: 5432
    DB_USERNAME: app
    POSTGRES_DB: app
    POSTGRES_PASSWORD: app
    POSTGRES_USER: app
    REDIS_HOST: redis
    REDIS_PORT: 6379
Execute phpunit (stable):
  coverage: /^\s*Lines:\s*\d+.\d+\%/
  except: *id011
  image: $APP_IMAGE:$CI_COMMIT_REF_NAME
  only: *id010
  script: *id014
  services: *id015
  stage: test
  variables: *id016
before_script:
- mkdir -p "${CI_PROJECT_DIR}/.build"
- function composer_install() { composer install --no-interaction --ansi --no-suggest
  --prefer-dist; }
cache:
  key: ${CI_PROJECT_PATH_SLUG}-${CI_COMMIT_REF_SLUG}
  paths:
  - ${CI_PROJECT_DIR}/.build/
  - src/vendor/
  - src/node_modules/
image: docker:stable
stages:
- prepare
- test
- build
variables:
  APP_IMAGE: $CI_REGISTRY_IMAGE/app
  NGINX_IMAGE: $CI_REGISTRY_IMAGE/nginx
  NODE_IMAGE: tarampampam/node:10.10-alpine
  POSETGRES_IMAGE: postgres:9.6.10-alpine
  REDIS_IMAGE: redis:4.0.11-alpine
  SOURCES_IMAGE: $CI_REGISTRY_IMAGE/sources
