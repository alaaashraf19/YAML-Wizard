baseurl: ''
defaults:
- scope:
    path: ''
    type: posts
  values:
    is_post: true
description: 'Penang Hokkien is a variant of the Hokkien dialect that is unique to
  Penang, Malaysia. As a vernacular dialect, it is hardly written down, neither in
  Chinese characters nor romanised as Latin text. As in integral part of Penang''s
  cultural heritage, we must ensure the survival of Penang Hokkien for generations
  to come.

  '
email: kakyou_tensai@yahoo.com
exclude:
- .jekyll-cache
- vendor
- Gemfile
- Gemfile.lock
- node_modules
- gulpfile.js
- package.json
- README.md
- yarn.lock
include:
- _pages
markdown: kramdown
paginate: 8
paginate_path: /stories/page:num
permalink: /stories/:title/
plugins:
- jekyll-feed
- jekyll-sitemap
- jekyll-paginate
relative_permalinks: false
title: "Penang Hokkien | \u69DF\u57CE\u798F\u5EFA\u8BDD"
url: http://penang-hokkien.gitlab.io
