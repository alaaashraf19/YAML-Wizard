.define-build-rules:
  rules:
  - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    when: always
  - if: $CI_PIPELINE_SOURCE != "merge_request_event" && $CI_PIPELINE_SOURCE != "schedules"
    when: manual
.define-cores:
  script:
  - cores=$(LC_ALL=C lscpu | awk '/^Core\(s\) per socket:/ {print $4}')
  - sockets=$(LC_ALL=C lscpu | awk '/^Socket\(s\):/ {print $2}')
  - N_PROC=$((cores * sockets))
  - "if [ \"$N_PROC\" -lt 4 ]; then\n  M=$((N_PROC / 2))\n  export NEW_DALTON_LAUNCHER=\"\
    mpirun -n 2\"\nelse\n  M=$((N_PROC / 4))\n  export NEW_DALTON_LAUNCHER=\"mpirun\
    \ -n 4\"\nfi\nif [[ -v DALTON_LAUNCHER ]]; then\n  echo \"DALTON_LAUNCHER defined\
    \ by the build.\"\nelse\n  echo \"DALTON_LAUNCHER defined by define-cores function.\"\
    \n  echo \"DALTON_LAUNCHER=\\\"$NEW_DALTON_LAUNCHER\\\"\" > var_cores.env\nfi\n\
    echo \"N_PROC=$N_PROC\" >> var_cores.env\necho \"M=$M\" >> var_cores.env\n"
  - source var_cores.env
  - export DALTON_LAUNCHER=$DALTON_LAUNCHER
  - echo "The total number of physical cores is $N_PROC"
  - echo "DALTON_LAUNCHER was set to $DALTON_LAUNCHER"
.intel-install:
  before_script:
  - dnf -y update
  - dnf -y install git python python3 python3-pip wget pkg-config ca-certificates
    gnupg cmake environment-modules
  - wget https://yum.repos.intel.com/intel-gpg-keys/GPG-PUB-KEY-INTEL-SW-PRODUCTS.PUB
  - rpm --import GPG-PUB-KEY-INTEL-SW-PRODUCTS.PUB
  - echo -e "[oneAPI]\nname=Intel(R) oneAPI repository\nbaseurl=https://yum.repos.intel.com/oneapi\nenabled=1\ngpgcheck=1\nrepo_gpgcheck=1\ngpgkey=https://yum.repos.intel.com/intel-gpg-keys/GPG-PUB-KEY-INTEL-SW-PRODUCTS.PUB"
    | sudo tee /etc/yum.repos.d/oneAPI.repo
  - dnf -y update
  - dnf -y install intel-oneapi-compiler-dpcpp-cpp intel-oneapi-compiler-fortran intel-oneapi-mkl
    intel-oneapi-mpi intel-oneapi-mpi-devel
  - . /etc/profile.d/modules.sh
  - /opt/intel/oneapi/modulefiles-setup.sh --ignore-latest --output-dir=~/intel-oneapi-modulefiles
    --force
  - module use ~/intel-oneapi-modulefiles
  - module purge
  - echo "=== Available modules ==="
  - module avail
  - module load tbb/2022.3 compiler-rt/2025.3.0 compiler/2025.3.0 mkl/2025.3 mpi/2021.17
