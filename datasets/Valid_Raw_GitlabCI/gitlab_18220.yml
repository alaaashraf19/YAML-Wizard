before_script:
- curl -sSf https://static.rust-lang.org/rustup.sh | sh -s -- --channel=nightly --disable-sudo
  --yes
pages:
  artifacts:
    paths:
    - public
  only:
  - master
  script:
  - cargo doc
  - mv target/doc public
  stage: deploy
stages:
- test
- deploy
test:
  script:
  - cargo test
  stage: test
