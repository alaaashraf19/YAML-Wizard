image: base/archlinux
pages:
  artifacts:
    paths:
    - public
  only:
  - master
  script:
  - pacman -Sy --noconfirm npm git python-pip graphviz make
  - npm install gitbook-cli
  - ./node_modules/.bin/gitbook install
  - pip install -r requirements.txt
  - PATH=$PATH:`pwd`/bin make all
  stage: deploy
