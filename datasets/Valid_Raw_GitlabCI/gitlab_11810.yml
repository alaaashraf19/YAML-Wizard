before_script:
- apt-get update -y
- apt-get install -y python3-pip python-dev python3-dev build-essential mariadb-client
  libmariadbclient-dev-compat virtualenv nodejs npm
- virtualenv -p python3 venv
- source venv/bin/activate
- pip install -r requirements.txt
- pip install pylint
- pip install pylint-flask
- npm install
cache:
  paths:
  - node_modules/
  - venv/
css_lint:
  script: tests/css-lint.sh
image: ubuntu:18.04
import_database:
  script: tests/import_database.sh $MYSQL_DATABASE mariadb root $MYSQL_ROOT_PASSWORD
js_lint:
  script: tests/javascript-lint.sh
python_lint:
  script: tests/python-lint.sh
services:
- mariadb:latest
variables:
  DEBIAN_FRONTEND: noninteractive
  MYSQL_DATABASE: filmlogdev
  MYSQL_ROOT_PASSWORD: filmlogdevtestrunnerpassword
