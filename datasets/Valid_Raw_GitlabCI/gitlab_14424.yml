before_script:
- export GRADLE_USER_HOME=`pwd`/.gradle
build:
  artifacts:
    expire_in: 1 day
    paths:
    - build/libs
  script: gradle --build-cache assemble
  stage: build
image: gradle:alpine
test:
  dependencies:
  - build
  script:
  - gradle check
  - grep -Eo "Total.*?%" build/reports/jacoco/test/html/index.html
  stage: test
variables:
  GRADLE_OPTS: -Dorg.gradle.daemon=false
