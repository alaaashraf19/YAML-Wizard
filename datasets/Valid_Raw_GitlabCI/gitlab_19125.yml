.assets-compile-cache:
  cache:
    paths:
    - vendor/ruby/
    - .yarn-cache/
    - tmp/cache/assets/sprockets
.compile-assets-metadata:
  artifacts:
    expire_in: 7d
    paths:
    - node_modules
    - public/assets
  cache:
    key: assets-compile:test:vendor_ruby:.yarn-cache:tmp_cache_assets_sprockets:v6
  extends:
  - .default-tags
  - .default-retry
  - .default-only
  - .default-before_script
  - .assets-compile-cache
  - .only-code-qa-changes
  - .use-pg
  script:
  - node --version
  - retry yarn install --frozen-lockfile --cache-folder .yarn-cache --prefer-offline
  - free -m
  - retry bundle exec rake gitlab:assets:compile
  - scripts/clean-old-cached-assets
  stage: prepare
  variables:
    NODE_OPTIONS: --max_old_space_size=3584
.gitlab:assets:compile-metadata:
  artifacts:
    expire_in: 31d
    name: webpack-report
    paths:
    - webpack-report/
    - public/assets/
  cache:
    key: assets-compile:production:vendor_ruby:.yarn-cache:tmp_cache_assets_sprockets:v6
  dependencies:
  - setup-test-env
  extends:
  - .default-tags
  - .default-retry
  - .default-only
  - .default-before_script
  - .assets-compile-cache
  - .only-code-qa-changes
  image: dev.gitlab.org:5005/gitlab/gitlab-build-images:ruby-2.6.3-git-2.22-chrome-73.0-node-12.x-yarn-1.16-graphicsmagick-1.3.33-docker-18.06.1
  needs:
  - setup-test-env
  only:
    variables:
    - $CI_SERVER_HOST == "gitlab.com" && $CI_PROJECT_NAMESPACE == "gitlab-org"
    - $CI_SERVER_HOST == "dev.gitlab.org"
  script:
  - node --version
  - retry yarn install --frozen-lockfile --production --cache-folder .yarn-cache --prefer-offline
  - free -m
  - retry bundle exec rake gitlab:assets:compile
  - time scripts/build_assets_image
  - scripts/clean-old-cached-assets
  - rm -f /etc/apt/sources.list.d/google*.list
  services:
  - docker:19.03.0-dind
  stage: test
  tags:
  - gitlab-org
  - docker
  variables:
    DOCKER_DRIVER: overlay2
    DOCKER_HOST: tcp://docker:2375
    NODE_ENV: production
    NODE_OPTIONS: --max_old_space_size=3584
    RAILS_ENV: production
    SETUP_DB: 'false'
    SKIP_STORAGE_VALIDATION: 'true'
    WEBPACK_REPORT: 'true'
.only-code-frontend-job-base:
  dependencies:
  - compile-assets
  - compile-assets pull-cache
  - setup-test-env
  extends:
  - .default-tags
  - .default-retry
  - .default-cache
  - .default-only
  - .default-before_script
  - .only-code-changes
  - .use-pg
.qa-frontend-node:
  cache:
    key: $CI_JOB_NAME
    paths:
    - .yarn-cache/
    policy: pull-push
  dependencies: []
  extends:
  - .default-tags
  - .default-retry
  - .default-cache
  - .default-only
  - .only-code-changes
  script:
  - date
  - yarn install --frozen-lockfile --cache-folder .yarn-cache --prefer-offline
  - date
  - yarn run webpack-prod
.qa-job-base:
  before_script:
  - cd qa/
  - bundle install
  dependencies: []
  extends:
  - .default-tags
  - .default-retry
  - .default-cache
  - .default-only
  - .only-code-qa-changes
  stage: test
compile-assets:
  cache:
    policy: pull-push
  extends: .compile-assets-metadata
  only:
    refs:
    - master
compile-assets pull-cache:
  cache:
    policy: pull
  except:
    refs:
    - master
  extends: .compile-assets-metadata
gitlab:assets:compile:
  cache:
    policy: pull-push
  extends: .gitlab:assets:compile-metadata
  only:
    refs:
    - master
gitlab:assets:compile pull-cache:
  cache:
    policy: pull
  except:
    refs:
    - master
  extends: .gitlab:assets:compile-metadata
jest:
  artifacts:
    expire_in: 31d
    name: coverage-frontend
    paths:
    - coverage-frontend/
    - junit_jest.xml
    - tmp/tests/frontend/
    reports:
      junit: junit_jest.xml
    when: always
  cache:
    key: jest
    paths:
    - tmp/jest/jest/
    policy: pull-push
  extends: .only-code-frontend-job-base
  script:
  - scripts/gitaly-test-spawn
  - date
  - bundle exec rake frontend:fixtures
  - date
  - yarn jest --ci --coverage
karma:
  artifacts:
    expire_in: 31d
    name: coverage-javascript
    paths:
    - chrome_debug.log
    - coverage-javascript/
    - tmp/tests/frontend/
    reports:
      junit: junit_karma.xml
    when: always
  coverage: '/^Statements *: (\d+\.\d+%)/'
  extends: .only-code-frontend-job-base
  script:
  - export BABEL_ENV=coverage CHROME_LOG_FILE=chrome_debug.log
  - date
  - scripts/gitaly-test-spawn
  - date
  - bundle exec rake karma
  variables:
    NODE_OPTIONS: --max_old_space_size=3584
qa-frontend-node:10:
  extends: .qa-frontend-node
  image: node:dubnium
qa-frontend-node:8:
  extends: .qa-frontend-node
  image: node:carbon
qa-frontend-node:latest:
  allow_failure: true
  extends: .qa-frontend-node
  image: node:latest
qa:internal:
  extends: .qa-job-base
  script:
  - bundle exec rspec
qa:selectors:
  extends: .qa-job-base
  script:
  - bundle exec bin/qa Test::Sanity::Selectors
webpack-dev-server:
  dependencies:
  - setup-test-env
  - compile-assets
  - compile-assets pull-cache
  extends:
  - .default-tags
  - .default-retry
  - .default-cache
  - .default-only
  - .only-code-changes
  script:
  - node --version
  - node --expose-gc node_modules/.bin/webpack-dev-server --config config/webpack.config.js
  variables:
    WEBPACK_MEMORY_TEST: 'true'
