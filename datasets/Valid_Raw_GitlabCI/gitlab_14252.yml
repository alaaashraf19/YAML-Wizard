package:
  artifacts:
    paths:
    - $CI_PROJECT_DIR/*.deb
  image: ruby:alpine
  only:
  - tags
  script:
  - apk --no-cache add bash curl
  - $CI_PROJECT_DIR/.gitlab-ci/package.sh
  stage: create_package
stages:
- create_package
- upload_package
upload_packages:
  image: docker:git
  only:
  - tags
  script:
  - apk --no-cache add bash
  - $CI_PROJECT_DIR/.gitlab-ci/upload.sh
  stage: upload_package
