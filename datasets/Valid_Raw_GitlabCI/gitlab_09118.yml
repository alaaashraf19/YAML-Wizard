build branch:
  except:
  - master
  extends: .build
  only:
  - branches
  variables:
    IMAGE_TAG: $CI_COMMIT_REF_NAME
    SAST_ANALYZER_IMAGE_TAG: $MAJOR
build edge:
  extends: .build
  only:
  - master
  variables:
    IMAGE_TAG: edge
    SAST_ANALYZER_IMAGE_TAG: edge
build major:
  allow_failure: false
  extends: .build
  only:
  - tags
  variables:
    IMAGE_TAG: $MAJOR
    SAST_ANALYZER_IMAGE_TAG: $MAJOR
  when: manual
build tag:
  before_script:
  - echo "Checking that $CI_COMMIT_TAG is last in the changelog"
  - test "$(grep '^## v' CHANGELOG.md |head -n 1)" = "## $CI_COMMIT_TAG"
  - export IMAGE_TAG=${CI_COMMIT_TAG/v/}
  extends: .build
  only:
  - tags
  variables:
    SAST_ANALYZER_IMAGE_TAG: $MAJOR
go build:
  artifacts:
    paths:
    - sast
  extends: .go
  script:
  - go build -o ${CI_PROJECT_DIR}/sast
  variables:
    CGO_ENABLED: 0
go lint:
  extends: .go
  script:
  - go get -u golang.org/x/lint/golint
  - golint -set_exit_status
go test:
  extends: .go
  script:
  - go test -race -cover -v ./...
services:
- docker:stable-dind
stages:
- go
- test
- build
- deploy
tag latest:
  before_script:
  - docker info
  - docker login -u gitlab-ci-token -p $CI_JOB_TOKEN $CI_REGISTRY
  - export SOURCE_IMAGE=$CI_REGISTRY_IMAGE:$MAJOR
  - export TARGET_IMAGE=$CI_REGISTRY_IMAGE:latest
  image: docker:stable
  only:
  - tags
  script:
  - docker pull $SOURCE_IMAGE
  - docker tag $SOURCE_IMAGE $TARGET_IMAGE
  - docker push $TARGET_IMAGE
  stage: deploy
test:
  artifacts:
    paths:
    - test/fixtures/gl-sast-report.json
  dependencies:
  - go build
  image: docker:stable
  script:
  - ./test.sh
  stage: test
  variables:
    SAST_ANALYZER_IMAGE_TAG: $MAJOR
variables:
  DOCKER_DRIVER: overlay2
  MAJOR: 2
