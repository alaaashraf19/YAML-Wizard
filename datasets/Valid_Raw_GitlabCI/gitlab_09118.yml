.build:
  dependencies:
  - go build
  image: docker:stable
  script:
  - docker info
  - docker login -u gitlab-ci-token -p $CI_JOB_TOKEN $CI_REGISTRY
  - export IMAGE=$CI_REGISTRY_IMAGE:$IMAGE_TAG
  - docker build -t $IMAGE --build-arg SAST_ANALYZER_IMAGE_TAG=$SAST_ANALYZER_IMAGE_TAG
    .
  - docker push $IMAGE
  stage: build
.deploy:
  before_script:
  - docker info
  - docker login -u gitlab-ci-token -p $CI_JOB_TOKEN $CI_REGISTRY
  - export IMAGE=$CI_REGISTRY_IMAGE:$CI_JOB_NAME
  image: docker:stable
  only:
  - tags
  script:
  - docker build -t $IMAGE -f $DOCKERFILE --build-arg SAST_ANALYZER_IMAGE_TAG=$MAJOR
    --build-arg SAST_DEFAULT_ANALYZERS=$SAST_DEFAULT_ANALYZERS .
  - docker push $IMAGE
  stage: deploy
.go:
  image: golang:1.13.7
  stage: go
