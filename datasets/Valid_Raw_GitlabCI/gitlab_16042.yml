before_script:
- apt-get update -qy
- apt-get install -y make
- make install-tools-from-apt
- make install-pear-from-apt
- make install-phpcs-from-pear
build:
  script:
  - make all
  - make clean
  - make doc
  - make archives
  - make dist
  - make tar-xz
  - make tar-bz2
  - make tar-gz
  - make zip
  - make 7z
  - make clean
  stage: tests
stages:
- tests
