deploy_anaconda:
  image: continuumio/miniconda:latest
  only:
  - /^v\d+\.\d+\.\d+([abc]\d*)?$/
  script:
  - conda create -n py36 python=3.6 conda-build anaconda-client -y
  - source activate py36
  - conda build --user $ANACONDA_USERNAME --token $ANACONDA_TOKEN .conda
  stage: deploy
deploy_pypi:
  image: python:3.6
  only:
  - /^v\d+\.\d+\.\d+([abc]\d*)?$/
  script:
  - pip install -U twine setuptools
  - python setup.py sdist bdist_wheel
  - twine upload dist/*
  stage: deploy
pages:
  artifacts:
    paths:
    - public
  image: python:3.6
  only:
  - master
  script:
  - pip install sphinx sphinx_rtd_theme
  - pip install -e .
  - mkdir public
  - cd docs
  - make apidocs
  - make html
  - cp -r _build/html/* ../public
  stage: docs
stages:
- test
- deploy
- docs
test:
  image: python:3.6
  script:
  - python setup.py test --addopts="--cov=fizzbuzz"
  stage: test
variables:
  TWINE_PASSWORD: SECURE
  TWINE_REPOSITORY_URL: https://test.pypi.org/legacy/
  TWINE_USERNAME: SECURE
