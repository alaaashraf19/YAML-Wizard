before_script:
- npm install
build:
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    policy: pull
  script:
  - npm run load-data
  - npm run build-dist
  stage: build
cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
  - node_modules
  untracked: true
image: node:8
install:
  cache:
    key: ${CI_COMMIT_REF_SLUG}
  script:
  - npm install
  stage: prepare
lint:
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    policy: pull
  script:
  - npm run lint
  stage: check
pages:
  artifacts:
    paths:
    - public
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    policy: pull
  only:
  - master
  script:
  - npm run load-data
  - npm run build-storybook
  stage: build
stages:
- prepare
- check
- build
test-ci:
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    policy: pull
  script:
  - npm run load-data
  - npm run test-ci
  stage: check
test-format:
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    policy: pull
  script:
  - npm run test-format
  stage: check
