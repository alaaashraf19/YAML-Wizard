before_script:
- apt update && apt upgrade -y && apt install -y libncurses5 curl libarchive-tools
  make file && rm -rf /var/lib/apt/lists/*
- mkdir -p $PWD/android-sdk
- if [ ! -d "./android-sdk/bin" ]; then curl https://dl.google.com/android/repository/sdk-tools-linux-${ANDROID_SDK_VERSION}.zip
  | bsdtar -xpf- -C $PWD/android-sdk ; fi
- export ANDROID_SDK_HOME="$PWD/android-sdk"
- export ANDROID_HOME="$ANDROID_SDK_HOME"
- export NDK_HOME="$ANDROID_SDK_HOME/ndk-bundle"
- export ANDROID_NDK="$NDK_HOME"
- export ANDROID_NDK_HOME="$NDK_HOME"
- export ANDROID_NDK_ROOT="$NDK_HOME"
- export PATH="${ANDROID_SDK_HOME}/tools/bin:${ANDROID_SDK_HOME}/platform-tools:${ANDROID_NDK_HOME}:${PATH}"
- chmod -R 777 ${ANDROID_HOME}
- mkdir -p $PWD/android-sdk/.android && touch $PWD/android-sdk/.android/repositories.cfg
- 'yes | sdkmanager --licenses || :'
- 'yes | sdkmanager "build-tools;${ANDROID_SDK_TOOLS}" "platform-tools" "platforms;android-${ANDROID_COMPILE_SDK}"
  || :'
- 'yes | sdkmanager "ndk;$NDK_VER" || :'
- 'yes | sdkmanager "ndk-bundle;$NDK_VER" || :'
- 'ls $PWD/android-sdk || :'
- 'ls $PWD/android-sdk/ndk || :'
- 'ln -s $ANDROID_HOME/ndk/$NDK_VER $ANDROID_NDK || :'
- 'ls $PWD/android-sdk/ndk-bundle || :'
build:
  artifacts:
    paths:
    - build/outputs/
  script:
  - TARGET_BUILD_APPS=true ./gradlew assembleDebug
  stage: build
cache:
  key: s${ANDROID_SDK_VERSION}-n${ANDROID_NDK_VERSION}
  paths:
  - .gradle
  - android-sdk
image: openjdk:8-jdk
stages:
- build
variables:
  ANDROID_COMPILE_SDK: '33'
  ANDROID_NDK_VERSION: '21'
  ANDROID_SDK_TOOLS: 33.0.1
  ANDROID_SDK_VERSION: '3859397'
  GIT_SUBMODULE_STRATEGY: recursive
  NDK_VER: 21.4.7075529
