deploy-preview:
  before_script:
  - npm install -g netlify-cli@2.6.6
  environment:
    name: netlify-preview
  except:
    refs:
    - master
    variables:
    - $CI_PROJECT_NAMESPACE == "denkmal"
  image: registry.gitlab.com/denkmal/docker-denkmal-build:v1.1.0
  interruptible: true
  retry: 1
  script:
  - yarn install
  - yarn run generate
  - netlify deploy --site="$NETLIFY_SITE" --auth="$NETLIFY_AUTH_TOKEN" --dir=dist/
    --message="$CI_COMMIT_MESSAGE"
  stage: test
deploy-production:
  before_script:
  - npm install -g firebase-tools@6.7.1
  environment:
    name: production
    url: $DENKMAL_WEBSITE_URL
  image: registry.gitlab.com/denkmal/docker-denkmal-build:v1.1.0
  interruptible: true
  only:
    refs:
    - master
    variables:
    - $CI_PROJECT_NAMESPACE == "denkmal"
  retry: 1
  script:
  - yarn install
  - yarn run generate
  - firebase deploy --project "${FIREBASE_PROJECT}" --token "${FIREBASE_TOKEN}" --message
    "$CI_COMMIT_MESSAGE" --non-interactive
  stage: release
lighthouse:
  except:
  - schedules
  image: cypress/browsers:node10.16.0-chrome77
  interruptible: true
  script:
  - yarn global add @lhci/cli@0.3.x
  - lhci autorun --upload.target=temporary-public-storage --collect.settings.chromeFlags="--no-sandbox"
  stage: performance_audit
lint:
  except:
  - schedules
  image: registry.gitlab.com/denkmal/docker-denkmal-build:v1.1.0
  interruptible: true
  script:
  - yarn install
  - yarn run lint
  stage: test
stages:
- test
- performance_audit
- release
test:
  after_script:
  - mv ./dist ./build/dist-mock
  artifacts:
    expire_in: 1 week
    paths:
    - build/dist-mock/
    - test/logs/*
    - test/screenshots/*
    when: always
  except:
  - schedules
  image: registry.gitlab.com/denkmal/docker-denkmal-build:v1.1.0
  interruptible: true
  script:
  - podman-compose up -d
  - podman ps -a
  - yarn install
  - yarn run serve &
  - yarn run generate
  - yarn run specs
  stage: test
  variables:
    DENKMAL_API_URL: http://localhost:8010/graphql
    DENKMAL_MOCK_NOW: '2019-07-01T20:00:00+02:00'
    WDIO_BASEURL: http://localhost:3000
    WDIO_WEBDRIVER_HOST: localhost
variables:
  DENKMAL_API_URL: https://api.denkmal.org/graphql
  DENKMAL_WEBSITE_URL: https://denkmal.org
  DENKMAL_WEBSITE_VERSION: $CI_COMMIT_SHORT_SHA
  FIREBASE_PROJECT: denkmal-website-3f677
  GOOGLE_MAPS_API_KEY: AIzaSyC5s-73wOdKqfCzNXV6YNJ-RNgJOl6HL80
  NETLIFY_SITE: 7e292fb9-d837-4606-b4a2-ed7f09e59fcc
