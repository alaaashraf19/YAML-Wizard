.validate:
  script: &id001
  - mvn $MAVEN_CLI_OPTS test-compile
  stage: build
.verify:
  except:
  - master
  script:
  - mvn $MAVEN_CLI_OPTS verify site site:stage
  stage: test
cache:
  paths:
  - .m2/repository
stages:
- build
- test
unit-test:
  artifacts:
    paths:
    - target/staging
  image: maven:3-jdk-10
  only:
  - master
  script:
  - mvn $MAVEN_CLI_OPTS test
  stage: test
validate:jdk10:
  image: maven:3-jdk-10
  script: *id001
  stage: build
variables:
  MAVEN_CLI_OPTS: --batch-mode --errors --fail-at-end --show-version -DinstallAtEnd=true
    -DdeployAtEnd=true
  MAVEN_OPTS: -Dmaven.repo.local=.m2/repository -Dorg.slf4j.simpleLogger.log.org.apache.maven.cli.transfer.Slf4jMavenTransferListener=WARN
    -Dorg.slf4j.simpleLogger.showDateTime=true -Djava.awt.headless=true
