cache:
  paths:
  - ~/.m2/repository
compile:
  script:
  - mvn $MAVEN_CLI_OPTS -U compile
  stage: build
  tags:
  - aws
nexus:
  except:
  - master
  script:
  - mvn $MAVEN_CLI_OPTS deploy
  stage: deploy
  tags:
  - aws
release:
  only:
  - master
  script:
  - git checkout -B $CI_COMMIT_REF_NAME
  - mvn $MAVEN_CLI_OPTS -B -DreleaseVersion=$RELEASE_VER release:prepare -DskipTests
    -DautoVersionSubmodules=true -DdryRun=false -DscmCommentPrefix="[ci skip] [maven-release-plugin]"
  - mvn $MAVEN_CLI_OPTS -B release:perform -DskipTests -DautoVersionSubmodules=true
    -DdryRun=false -DscmCommentPrefix="[ci skip] [maven-release-plugin]"
  - git fetch
  - git push ssh://git@gitlab.com/${CI_PROJECT_PATH}.git HEAD:develop
  stage: release
  tags:
  - aws
stages:
- build
- deploy
- release
variables:
  MAVEN_CLI_OPTS: --batch-mode --errors --fail-at-end --show-version -DinstallAtEnd=true
    -DdeployAtEnd=true
  RELEASE_VER: 1.0.0
