.verify:
  except: &id001
  - master
  script: &id002
  - mvn $MAVEN_CLI_OPTS verify
  stage: test
cache:
  paths:
  - .m2/repository
deploy:jdk8:
  only:
  - master
  script:
  - if [ ! -f ci_settings.xml ]; then echo "CI settings missing\! If deploying to
    GitLab Maven Repository, please see https://docs.gitlab.com/ee/user/project/packages/maven_repository.html#creating-maven-packages-with-gitlab-cicd
    for instructions."; fi
  - mvn $MAVEN_CLI_OPTS deploy -s ci_settings.xml
  stage: deploy
image: maven:3.3.9-jdk-8
variables:
  MAVEN_CLI_OPTS: --batch-mode --errors --fail-at-end --show-version -DinstallAtEnd=true
    -DdeployAtEnd=true
  MAVEN_OPTS: -Dhttps.protocols=TLSv1.2 -Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository
    -Dorg.slf4j.simpleLogger.log.org.apache.maven.cli.transfer.Slf4jMavenTransferListener=WARN
    -Dorg.slf4j.simpleLogger.showDateTime=true -Djava.awt.headless=true
verify:jdk8:
  except: *id001
  script: *id002
  stage: test
