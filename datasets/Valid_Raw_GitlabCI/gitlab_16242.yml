.build_container:
  before_script: &id001
  - mkdir ~/.docker
  - echo "{ \"auths\":{ \"$CI_REGISTRY\":{\"auth\":\"$(echo -n ${CI_REGISTRY_USER}:${CI_REGISTRY_PASSWORD}
    | base64)\"}, \"eu.gcr.io\":{\"auth\":\"${DOCKER_AUTH}\"}}, \"credHelpers\":{\"eu.gcr.io\":\"gcloud\"}}"
    > ~/.docker/config.json
  image: &id002
    name: eu.gcr.io/third-rock/bronto-crane:1.1.0
  script: &id004
  - buildctl --addr tcp://buildkitd:1234 build --frontend dockerfile.v0 --local context=${CI_PROJECT_DIR}
    --local dockerfile=${CI_PROJECT_DIR} --opt filename=./${DOCKERFILE} --export-cache
    type=inline --import-cache type=registry,ref=${CONTAINER_CACHE_IMAGE} --import-cache
    type=registry,ref=${CONTAINER_LATEST_IMAGE} --output type=image,\"name=${OUTPUT_IMAGES}\",push=true,compression=estargz
    --opt build-arg:git_tag=${CI_COMMIT_REF_NAME}
  services: &id005
  - alias: buildkitd
    command:
    - --oci-worker-snapshotter=stargz
    - --addr
    - tcp://0.0.0.0:1234
    name: moby/buildkit
  tags: &id006
  - cicd-k8s-buildkit
.default_rules: &id003
- if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $GITLAB_USER_LOGIN !~ /^project_.*_bot.*$/
- if: $CI_MERGE_REQUEST_IID != null
- if: $CI_COMMIT_TAG != null
build:
  before_script: *id001
  image: *id002
  rules:
  - *id003
  - if: $CI_COMMIT_BRANCH =~ /^fixes_.*$/ && $GITLAB_USER_LOGIN !~ /^project_.*_bot.*$/
  script: *id004
  services: *id005
  stage: build
  tags: *id006
  variables:
    DOCKERFILE: Dockerfile
    OUTPUT_IMAGES: $CONTAINER_TEST_IMAGE,$CONTAINER_CACHE_IMAGE
build_singularity_builder:
  before_script: *id001
  image: *id002
  rules:
  - if: $CI_COMMIT_TAG != null
  script: *id004
  services: *id005
  stage: build
  tags: *id006
  variables:
    DOCKERFILE: Dockerfile_singularity
    OUTPUT_IMAGES: $SINGULARITY_BUILDER_IMAGE
check_changelog:
  image:
    entrypoint:
    - ''
    name: alpine
  rules:
  - changes:
    - CHANGES.*
    when: never
  - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    when: never
  - if: $CI_MERGE_REQUEST_IID == null
    when: never
  - when: always
  script:
  - echo -e "Changelog seems not to be updated!\n~~~\n$_MESSAGE_TEXT" && exit 1
  stage: validate
  tags:
  - cicd-k8s-default
  variables:
    _MESSAGE_TEXT: Please add your change(s) to CHANGELOG file.\n\ne.g.:\n\n<some_version>\n----\n\n-
      Added feature (x)
latest:
  before_script: *id001
  image: *id002
  rules:
  - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  - if: $CI_COMMIT_BRANCH == "master"
  script: *id004
  services: *id005
  stage: release
  tags: *id006
  variables:
    DOCKERFILE: Dockerfile
    OUTPUT_IMAGES: $CONTAINER_LATEST_IMAGE
lint:
  image: $CONTAINER_TEST_IMAGE
  rules:
  - *id003
  script:
  - cd /app
  - pip3 install -r requirements_dev.txt
  - pylint classifier tests
  stage: test
  tags:
  - cicd-k8s-default
mypy:
  image: $CONTAINER_TEST_IMAGE
  rules:
  - *id003
  script:
  - cd /app
  - pip3 install -r requirements_dev.txt
  - bin/mypy.sh classifier $MYPY_FAIL_OVER
  stage: test
  tags:
  - cicd-k8s-default
pages:
  artifacts:
    paths:
    - public
  image: $CONTAINER_TEST_IMAGE
  rules:
  - if: $CI_COMMIT_TAG != null
  script:
  - cd /app
  - pip3 install -r /app/requirements_dev.txt
  - mkdir -p $CI_PROJECT_DIR/public
  - make -C docs html
  - cp -r /app/docs/_build/html/*  $CI_PROJECT_DIR/public/
  stage: release
  tags:
  - cicd-k8s-default
pypi:
  image: $CONTAINER_RELEASE_IMAGE
  rules:
  - if: $CI_COMMIT_TAG != null
  script:
  - cd /app
  - python3 -m pip install -r requirements_dev.txt
  - sh bin/release-to-pypi.sh RELEASE $PYPI_USERNAME $PYPI_PASSWORD
  stage: release
  tags:
  - cicd-k8s-default
release:
  before_script:
  - pip3 install --upgrade pip && pip3 install -r requirements_dev.txt
  image: $CONTAINER_TEST_IMAGE
  rules:
  - if: $CI_COMMIT_BRANCH =~ /^fixes_.*$/ && $GITLAB_USER_LOGIN !~ /^project_.*_bot.*$/
  script:
  - bin/auto-release.sh
  stage: release
  tags:
  - cicd-k8s-default
singularity:
  image:
    name: $SINGULARITY_BUILDER_IMAGE
  rules:
  - if: $CI_COMMIT_TAG != null
  script:
  - bash /app/create-singularity.sh $CI_COMMIT_TAG
  stage: release
  tags:
  - cicd-k8s-default
stages:
- validate
- build
- test
- release
- deploy
tag:
  before_script: *id001
  image: *id002
  rules:
  - if: $CI_COMMIT_TAG != null
  script: *id004
  services: *id005
  stage: build
  tags: *id006
  variables:
    DOCKERFILE: Dockerfile
    OUTPUT_IMAGES: $CONTAINER_RELEASE_IMAGE,$CONTAINER_LATEST_IMAGE
test_pages:
  artifacts:
    paths:
    - test_pages
  image: $CONTAINER_TEST_IMAGE
  rules:
  - if: $CI_MERGE_REQUEST_IID != null
  script:
  - cd /app
  - pip3 install -r /app/requirements_dev.txt
  - mkdir -p $CI_PROJECT_DIR/test_pages
  - make -C docs html
  - cp -r /app/docs/_build/html/*  $CI_PROJECT_DIR/test_pages/
  stage: test
  tags:
  - cicd-k8s-default
unittest:
  image: $CONTAINER_TEST_IMAGE
  rules:
  - *id003
  script:
  - cd /app
  - pip3 install -r requirements_dev.txt
  - pytest
  stage: test
  tags:
  - cicd-k8s-default
variables:
  CONTAINER_CACHE_IMAGE: $CI_REGISTRY_IMAGE:latest-${CI_MERGE_REQUEST_IID}_${CI_COMMIT_REF_NAME}
  CONTAINER_LATEST_IMAGE: $CI_REGISTRY_IMAGE:latest
  CONTAINER_RELEASE_IMAGE: $CI_REGISTRY_IMAGE:$CI_COMMIT_TAG
  CONTAINER_TEST_IMAGE: $CI_REGISTRY_IMAGE:${CI_COMMIT_REF_NAME}_${CI_BUILD_REF}_${CI_COMMIT_SHORT_SHA}
  SINGULARITY_BUILDER_IMAGE: $CI_REGISTRY_IMAGE:singularity_${CI_COMMIT_REF_NAME}_${CI_BUILD_REF}
