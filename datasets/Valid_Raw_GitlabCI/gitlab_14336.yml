before_script:
- mkdir -p /go/src/gitlab.com/pantomath-io /go/src/_/builds
- cp -r $CI_PROJECT_DIR /go/src/gitlab.com/pantomath-io/pantomath
- ln -s /go/src/gitlab.com/pantomath-io /go/src/_/builds/pantomath-io
- export CC=clang-5.0
- make dep
build:
  artifacts:
    paths:
    - demo-tools
  script:
  - make
  stage: build
cache:
  paths:
  - /apt-cache
  - /go/src/github.com
  - /go/src/golang.org
  - /go/src/google.golang.org
  - /go/src/gopkg.in
code_coverage:
  script:
  - make coverage
  stage: test
code_coverage_report:
  only:
  - master
  script:
  - make coverhtml
  stage: test
image: registry.gitlab.com/pantomath-io/demo-tools:latest
lint_code:
  script:
  - make lint
  stage: test
memory_sanitizer:
  script:
  - make msan
  stage: test
race_detector:
  script:
  - make race
  stage: test
stages:
- test
- build
unit_tests:
  script:
  - make test
  stage: test
