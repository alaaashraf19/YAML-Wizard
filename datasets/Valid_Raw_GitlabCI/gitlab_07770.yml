.build:
  artifacts: &id001
    expire_in: 30 days
    paths:
    - app/build/reports
    - app/build/outputs/apk
  before_script: &id002
  - export GRADLE_USER_HOME=$(pwd)/.gradle
  - echo "sdk.dir=/opt/sdk" > local.properties
  - mkdir -p app/src/main/resources
  - echo "dsn=$SENTRY_DSN" > app/src/main/resources/sentry.properties
  - apk update && apk add -u curl bash
  - '[[ -f vars ]] && source vars'
  - echo export VERSION_CODE="$(git rev-list HEAD --count)" >> vars
  - echo export VERSION_NAME="${CHANGELOG_VERSION:-unknown}-$CI_COMMIT_SHORT_SHA"
    >> vars
  - source vars
  - cat vars
  cache: &id003
    key: build
    paths:
    - .gradle
    - android-build-cache
  image: alvrme/alpine-android:android-33-jdk17
  interruptible: true
  stage: build
.ruby:
  before_script: &id004
  - apk update && apk add build-base
  - gem install bundler
  - bundle config set --local path 'vendor'
  - bundle install
  - '[[ -f vars ]] && source vars'
  cache: &id005
    key: ruby
    paths:
    - vendor
  image: ruby:3.2.2-alpine
build:branch:
  artifacts: *id001
  before_script: *id002
  cache: *id003
  environment:
    name: debug
    url: https://slack.com/app_redirect?channel=CE171RL3G
  except:
  - tags
  image: alvrme/alpine-android:android-33-jdk17
  interruptible: true
  script:
  - ./gradlew ktlintCheck lint testPlayDebug testFossDebug assembleFossDebug
  - (cd app/build/outputs/apk/foss/debug && mv app-foss-debug.apk app-debug.$CI_COMMIT_SHORT_SHA.apk)
  - ./slacknotify.sh
  stage: build
  variables:
    GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.caching=true
    SENTRY_DSN: https://a26ed9ed05954d37bc487a83b41ede29@sentry.io/1325852
build:master:
  artifacts: *id001
  before_script: *id002
  cache: *id003
  image: alvrme/alpine-android:android-33-jdk17
  interruptible: true
  only:
  - master@foodsharing-dev/foodsharing-android
  script:
  - echo "$STORE_FILE_CONTENTS" | base64 -d > "app/$STORE_FILE"
  - ./gradlew ktlintCheck lint testPlayDebug assemblePlayBeta testFossDebug assembleFossBeta
  stage: build
  variables:
    GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.caching=true
    SENTRY_DSN: https://a26ed9ed05954d37bc487a83b41ede29@sentry.io/1325852
    STORE_FILE: upload.keystore
build:tag:
  artifacts: *id001
  before_script: *id002
  cache: *id003
  image: alvrme/alpine-android:android-33-jdk17
  interruptible: true
  only:
  - tags
  script:
  - echo "$STORE_FILE_CONTENTS" | base64 -d > "app/$STORE_FILE"
  - ./gradlew ktlintCheck lint testPlayDebug assemblePlayRelease testFossDebug assembleFossRelease
  stage: build
  variables:
    GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.caching=true
    SENTRY_DSN: https://461eedc4e91e4eefacd321b6e52b5910@sentry.io/1400921
    STORE_FILE: upload.keystore
release:beta:
  before_script: *id004
  cache: *id005
  image: ruby:3.2.2-alpine
  only:
  - master@foodsharing-dev/foodsharing-android
  script:
  - bundle update fastlane
  - source vars
  - cat vars
  - echo "Releasing version"
  - echo "  version code $VERSION_CODE"
  - echo "  version name $VERSION_NAME"
  - echo "$GOOGLE_KEY_CONTENTS" | base64 -d > app/google-key.json
  - bundle exec ./scripts/print-latest-changelog > ./fastlane/metadata/android/de-DE/changelogs/$VERSION_CODE.txt
  - bundle exec fastlane beta
  stage: release
  variables:
    LANG: en_US.UTF-8
    LC_ALL: en_US.UTF-8
release:create_release:
  environment:
    name: beta
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  only:
  - tags
  release:
    description: $CI_COMMIT_TAG
    name: $CI_COMMIT_TAG
    tag_name: $CI_COMMIT_TAG
  script:
  - echo "Creating a release in GitLab"
  stage: release
release:release:
  before_script: *id004
  cache: *id005
  environment:
    name: beta
    url: https://play.google.com/apps/internaltest/4701634005546839846
  image: ruby:3.2.2-alpine
  only:
  - tags
  script:
  - bundle update fastlane
  - source vars
  - cat vars
  - echo "Releasing version"
  - echo "  version code $VERSION_CODE"
  - echo "  version name $VERSION_NAME"
  - echo "$GOOGLE_KEY_CONTENTS" | base64 -d > app/google-key.json
  - bundle exec ./scripts/print-latest-changelog > ./fastlane/metadata/android/de-DE/changelogs/$VERSION_CODE.txt
  - bundle exec fastlane release
  stage: release
  variables:
    LANG: en_US.UTF-8
    LC_ALL: en_US.UTF-8
stages:
- vars
- build
- release
vars:
  artifacts:
    expire_in: 1 hour
    paths:
    - vars
  before_script: *id004
  cache: *id005
  image: ruby:3.2.2-alpine
  script:
  - echo export CHANGELOG_VERSION=$(bundle exec ./scripts/latest-changelog-version)
    >> vars
  - source vars
  - '[[ -z "$CI_COMMIT_TAG" ]] || [[ "$CI_COMMIT_TAG" = "v$CHANGELOG_VERSION" ]] ||
    (echo "Tag does not match changelog version" && exit 1)'
  stage: vars
