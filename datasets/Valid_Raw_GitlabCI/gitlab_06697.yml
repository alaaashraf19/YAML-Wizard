code quality:
  script:
  - npm install
  - npm run lint
  stage: test
image: node:8.11.4
package:
  artifacts:
    paths:
    - ./*.tgz
  only:
  - tags
  script:
  - npm pack
  stage: publish
publish:
  environment:
    name: npm
    url: https://www.npmjs.com/package/vue-app-env
  only:
  - tags
  - triggers
  script:
  - echo '//registry.npmjs.org/:_authToken=${NPM_TOKEN}' > .npmrc
  - npm publish
  stage: publish
stages:
- test
- publish
test & coverage:
  artifacts:
    paths:
    - coverage/
  coverage: /All files[^|]*\|[^|]*\s+([\d\.]+)/
  script:
  - npm it
  stage: test
