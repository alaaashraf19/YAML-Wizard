production:
  only:
  - tags
  script:
  - apt-get update -qy
  - apt-get install -y ruby-dev
  - gem install dpl
  type: deploy
staging:
  only:
  - master
  script:
  - apt-get update -qy
  - apt-get install -y ruby-dev
  - gem install dpl
  type: deploy
test:
  script:
  - export DATABASE_URL=postgres://postgres:@postgres:5432/python-test-app
  - apt-get update -qy
  - apt-get install -y python-dev python-pip
  - pip install -r requirements.txt
