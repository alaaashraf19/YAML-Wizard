before_script:
- gem install bundler
- bundle install
- bundle exec rake db:create
dockerhub:
  only:
  - branches
  script: curl http://dockerhub/URL
  tags:
  - ruby
  - postgres
  type: notify
image: ruby:2.1
production:
  only:
  - master
  - /^deploy-.*$/
  script:
  - cap deploy production
  - cap notify
  tags:
  - ruby
  - mysql
  type: deploy
  variables:
    DB_NAME: mysql
rspec:
  only:
  - branches
  script: rake spec
  tags:
  - ruby
  - postgres
services:
- postgres
spinach:
  allow_failure: true
  except:
  - tags
  script: rake spinach
  tags:
  - ruby
  - mysql
staging:
  except:
  - stable
  script: cap deploy stating
  tags:
  - ruby
  - mysql
  type: deploy
  variables:
    KEY1: value1
    KEY2: value2
types:
- test
- deploy
- notify
variables:
  DB_NAME: postgres
