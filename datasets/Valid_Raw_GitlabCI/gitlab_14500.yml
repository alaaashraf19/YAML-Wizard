.cross_accel_build_job:
  before_script:
  - source scripts/ci/gitlab-ci-section
  - JOBS=$(expr $(nproc) + 1)
  cache:
    key: $CI_JOB_NAME
    paths:
    - ccache/
  extends: .base_job_template
  image: $CI_REGISTRY_IMAGE/qemu/$IMAGE:$QEMU_CI_CONTAINER_TAG
  script:
  - export CCACHE_BASEDIR="$(pwd)"
  - export CCACHE_DIR="$CCACHE_BASEDIR/ccache"
  - export CCACHE_MAXSIZE="500M"
  - export PATH="$CCACHE_WRAPPERSDIR:$PATH"
  - mkdir build
  - cd build
  - section_start configure "Running configure"
  - ../configure --enable-werror --disable-docs $QEMU_CONFIGURE_OPTS --disable-tools
    --enable-${ACCEL:-kvm} $EXTRA_CONFIGURE_OPTS
  - section_end configure
  - section_start build "Building QEMU"
  - make -j"$JOBS" all check-build
  - section_end build
  - section_start test "Running tests"
  - if test -n "$MAKE_CHECK_ARGS"; then $MAKE -j"$JOBS" $MAKE_CHECK_ARGS ; fi
  - section_end test
  stage: build
  timeout: 60m
.cross_system_build_job:
  before_script:
  - source scripts/ci/gitlab-ci-section
  - section_start setup "Pre-script setup"
  - JOBS=$(expr $(nproc) + 1)
  - cat /packages.txt
  - section_end setup
  cache:
    key: $CI_JOB_NAME
    paths:
    - ccache
    when: always
  extends: .base_job_template
  image: $CI_REGISTRY_IMAGE/qemu/$IMAGE:$QEMU_CI_CONTAINER_TAG
  script:
  - export CCACHE_BASEDIR="$(pwd)"
  - export CCACHE_DIR="$CCACHE_BASEDIR/ccache"
  - export CCACHE_MAXSIZE="500M"
  - export PATH="$CCACHE_WRAPPERSDIR:$PATH"
  - mkdir build
  - cd build
  - ccache --zero-stats
  - section_start configure "Running configure"
  - ../configure --enable-werror --disable-docs --enable-fdt=system --disable-user
    $QEMU_CONFIGURE_OPTS $EXTRA_CONFIGURE_OPTS --target-list-exclude="arm-softmmu
    i386-softmmu microblaze-softmmu mips-softmmu mipsel-softmmu mips64-softmmu ppc-softmmu
    riscv32-softmmu sh4-softmmu sparc-softmmu xtensa-softmmu $CROSS_SKIP_TARGETS"
  - section_end configure
  - section_start build "Building QEMU"
  - make -j"$JOBS" all check-build
  - section_end build
  - section_start test "Running tests"
  - if test -n "$MAKE_CHECK_ARGS"; then $MAKE -j"$JOBS" $MAKE_CHECK_ARGS ; fi
  - section_end test
  - section_start installer "Building the installer"
  - if grep -q "EXESUF=.exe" config-host.mak; then make installer; version="$(git
    describe --match v[0-9]* 2>/dev/null || git rev-parse --short HEAD)"; mv -v qemu-setup*.exe
    qemu-setup-${version}.exe; fi
  - section_end installer
  - ccache --show-stats
  stage: build
  timeout: 80m
.cross_test_artifacts:
  artifacts:
    expire_in: 7 days
    name: $CI_JOB_NAME-$CI_COMMIT_REF_SLUG
    paths:
    - build/meson-logs/testlog.txt
    reports:
      junit: build/meson-logs/testlog.junit.xml
    when: always
.cross_user_build_job:
  before_script:
  - source scripts/ci/gitlab-ci-section
  - JOBS=$(expr $(nproc) + 1)
  cache:
    key: $CI_JOB_NAME
    paths:
    - ccache/
  extends: .base_job_template
  image: $CI_REGISTRY_IMAGE/qemu/$IMAGE:$QEMU_CI_CONTAINER_TAG
  script:
  - export CCACHE_BASEDIR="$(pwd)"
  - export CCACHE_DIR="$CCACHE_BASEDIR/ccache"
  - export CCACHE_MAXSIZE="500M"
  - mkdir build
  - cd build
  - section_start configure "Running configure"
  - ../configure --enable-werror --disable-docs $QEMU_CONFIGURE_OPTS --disable-system
    --target-list-exclude="aarch64_be-linux-user alpha-linux-user m68k-linux-user
    microblazeel-linux-user or1k-linux-user ppc-linux-user sparc-linux-user xtensa-linux-user
    $CROSS_SKIP_TARGETS"
  - section_end configure
  - section_start build "Building QEMU"
  - make -j"$JOBS" all check-build
  - section_end build
  - section_start test "Running tests"
  - if test -n "$MAKE_CHECK_ARGS"; then $MAKE -j"$JOBS" $MAKE_CHECK_ARGS ; fi
  - section_end test
  stage: build
