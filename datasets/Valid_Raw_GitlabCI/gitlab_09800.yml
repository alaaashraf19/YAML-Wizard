python pypy3:
  before_script:
  - rm /usr/bin/python && ln -s /usr/local/bin/pypy3 /usr/bin/python
  - *id001
  - apt install -y libpq-dev
  - pip install -U psycopg2cffi
  - rm -rf /opt/pypy/lib/pypy3.10/site-packages/psycopg2
  - ln -s /opt/pypy/lib/pypy3.10/site-packages/psycopg2cffi /opt/pypy/lib/pypy3.10/site-packages/psycopg2
  - *id002
  - *id005
  image: pypy:slim
  only:
  - pypy
  script: *id006
variables:
  PIP_CACHE_DIR: $CI_PROJECT_DIR/.cache/pip
  PROTOCOL_BUFFERS_PYTHON_IMPLEMENTATION: python
  PYTHONUNBUFFERED: '1'
