.base_install: &id001
- adduser --disabled-password --shell /bin/bash --gecos "ubuntu" ubuntu
- apt update
- apt install -y build-essential zlib1g-dev git
- python -V
- pip install -U setuptools pip wheel
.final_install: &id005
- pip install -U "typing_extensions>=4.6.3" "grpcio>=1.56.2" "protobuf>=4.0"
- pip install --force git+https://gitlab.com/skitai/atila-ext/atila-vue.git
- cd .. && git clone https://gitlab.com/skitai/atila.git && cd atila && pip3 install
  --force . && cd ../skitai
- pip install --force git+https://gitlab.com/skitai/rs4.git
- pip install -e .
- python -c 'from rs4.protocols.sock.impl.grpc import discover'
.install_tf_base: &id004
- apt install -y libgl1-mesa-glx
- pip install -U --pre --no-cache-dir tfserver dnn
.postgres_install: &id003
- apt install -y postgresql postgresql-contrib
- export MYDB="skitai:12345678@localhost/skitai"
- service postgresql start
- su - postgres -c "psql -c \"drop database if exists skitai;\""
- su - postgres -c "psql -c \"create database skitai;\""
- su - postgres -c "psql -c \"create user skitai with encrypted password '12345678';\""
- su - postgres -c "psql -c \"grant all privileges on database skitai to skitai;\""
- su - postgres -c "psql -c \"alter database skitai owner to skitai;\""
- cd tools/benchmark
- python3 bench/manage.py migrate
- python3 bench/init_db.py
- cd ../..
.requirements_install: &id002
- pip install -Ur tools/benchmark/requirements.txt
- pip install -Ur tests/requirements.txt
- pip install -U --pre --no-cache-dir sqlphile delune
.test_template:
  script: &id006
  - cd tests
  - chown -R ubuntu:ubuntu . && su ubuntu
  - ./test-all.sh --disable-pytest-warnings
findout:
  image: python:3.9-buster
  only:
  - findout
  script:
  - pwd
  - cd ..
  - pwd
  - ls -al
  - printenv
python 3.10:
  before_script:
  - *id001
  - *id002
  - *id003
  - *id004
  - pip install -U tensorflow-cpu==2.13.1 keras==2.13.1
  - *id005
  image: python:3.10-slim
  only:
  - master
  - py310
  script: *id006
