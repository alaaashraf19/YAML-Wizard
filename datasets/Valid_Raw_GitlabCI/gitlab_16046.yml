build:
  artifacts:
    paths:
    - build/*
  before_script:
  - apt update
  - apt-get install -y gnupg ca-certificates
  - apt-get update
  - apt-get install -y devscripts dpkg-sig gnupg curl
  - apt-get remove -y golang
  - curl -o /tmp/go1.22.0.linux-amd64.tar.gz -L https://go.dev/dl/go1.22.0.linux-amd64.tar.gz
    && rm -rf /usr/local/go && tar -C /usr/local -xzf /tmp/go1.22.0.linux-amd64.tar.gz
  image: debian:bullseye
  script:
  - export PATH=$PATH:/usr/local/go/bin
  - mk-build-deps --install --tool="$TOOL_ARGS" debian/control
  - ./build-deb.sh
  - make
  stage: build
  tags:
  - merge
  - docker
  variables:
    DEBUILD_ARGS: --prepend-path /usr/local/go/bin
    TOOL_ARGS: apt-get -o Debug::pkgProblemResolver=yes --no-install-recommends --yes
fedora-38-rpm:
  artifacts:
    paths:
    - build/RPMS/**/*.rpm
  image: fedora:38
  script:
  - dnf update -y --refresh
  - dnf install -y dnf-plugins-core rpmdevtools
  - mkdir -p /root/rpmbuild
  - ln -s `pwd` /root/rpmbuild/SOURCES
  - dnf builddep -y --spec fedora/raven.spec
  - rpmbuild -vv -ba fedora/raven.spec
  - mkdir -p build
  - cp -r /root/rpmbuild/RPMS build/
  stage: publish
  tags:
  - merge
  - docker
fedora-39-rpm:
  artifacts:
    paths:
    - build/RPMS/**/*.rpm
  image: fedora:39
  script:
  - dnf update -y --refresh
  - dnf install -y dnf-plugins-core rpmdevtools
  - mkdir -p /root/rpmbuild
  - ln -s `pwd` /root/rpmbuild/SOURCES
  - dnf builddep -y --spec fedora/raven.spec
  - rpmbuild -vv -ba fedora/raven.spec
  - mkdir -p build
  - cp -r /root/rpmbuild/RPMS build/
  stage: publish
  tags:
  - merge
  - docker
rhel-rpm:
  artifacts:
    paths:
    - build/RPMS/**/*.rpm
  before_script:
  - dnf -y install dnf-plugins-core
  - dnf -y install https://dl.fedoraproject.org/pub/epel/epel-release-latest-9.noarch.rpm
  - /usr/bin/crb enable
  image: quay.io/centos/centos:stream9
  script:
  - dnf update -y --refresh
  - dnf install -y dnf-plugins-core rpmdevtools git
  - mkdir -p /root/rpmbuild
  - ln -s `pwd` /root/rpmbuild/SOURCES
  - dnf builddep -y --spec fedora/raven.spec
  - rpmbuild -vv -ba fedora/raven.spec
  - mkdir -p build
  - cp -r /root/rpmbuild/RPMS build/
  stage: publish
  tags:
  - merge
  - docker
stages:
- build
- test
- publish
test:
  after_script:
  - cd models/2net/
  - sudo -E ../../build/rvn destroy
  dependencies:
  - build
  script:
  - cd models/2net/
  - sudo -E ../../build/rvn build
  - sudo -E ../../build/rvn deploy
  - sudo -E ../../build/rvn pingwait n0 n1 nimbus
  - sudo -E ../../build/rvn configure
  stage: test
  tags:
  - merge
  - shell
