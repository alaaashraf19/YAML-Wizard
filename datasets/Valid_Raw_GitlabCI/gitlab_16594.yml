.job_template:
  script: &id001
  - bundle exec rake lint || /bin/true
  - bundle exec rake syntax
  - bundle exec rake validate
  - bundle exec rake spec
before_script:
- bundle install --jobs $(nproc) --without system_tests --path=/var/cache/gitlab-runner/
  "${FLAGS[@]}"
image: ruby:2.1
test:puppet37:
  script: *id001
  variables:
    FACTER_VERSION: ~> 2.2.0
    PUPPET_VERSION: ~> 3.7.2
test:puppet38_future_parser:
  script: *id001
  variables:
    FACTER_VERSION: ~> 2.2.0
    FUTURE_PARSER: 'yes'
    PUPPET_VERSION: ~> 3.8
test:puppet45:
  script: *id001
  variables:
    FACTER_VERSION: ~> 2.4.6
    PUPPET_VERSION: ~> 4.5.2
test:puppet4x:
  script: *id001
  variables:
    FACTER_VERSION: '> 2'
    PUPPET_VERSION: '> 4'
