.selenium-template:
  after_script:
  - sleep 3
  - pkill Xvfb
  artifacts:
    paths:
    - $SELENIUM_DIR/log/*
    - $SELENIUM_DIR/recording/*
    when: always
  before_script:
  - cd $SELENIUM_DIR
  - pipenv install --dev
  - export DISPLAY=:0
  - Xvfb :0 -screen 0 1920x1080x24 -ac -listen tcp &
  - sleep 3
  - 'cat << EOF > .env

    SERVER_ADDRESS=$SIP_HOST

    SCENIC1_URL="http://scenic:8080"

    SWITCHER1_HOST="scenic-core-1"

    SWITCHER1_PORT="8000"

    USER1_SIP_SOURCE_PORT="5060"

    USER1_NAME=$SIP_USER1

    USER1_PASSWORD=$SIP_PASSWORD

    SCENIC2_URL="http://scenic:8080"

    SWITCHER2_HOST="scenic-core-2"

    SWITCHER2_PORT="8000"

    USER2_SIP_SOURCE_PORT="5060"

    USER2_NAME=$SIP_USER2

    USER2_PASSWORD=$SIP_PASSWORD

    SCENIC3_URL="http://scenic:8080"

    SWITCHER3_HOST="scenic-core-3"

    SWITCHER3_PORT="8000"

    USER3_SIP_SOURCE_PORT="5060"

    USER3_NAME=$SIP_USER3

    USER3_PASSWORD=$SIP_PASSWORD

    PATH_TO_DOWNLOADS_FOLDER="/home/$USER/Downloads"

    EOF

    '
  image: $SCENIC_SELENIUM_IMAGE:$SCENIC_SELENIUM_TAG
  script:
  - $SELENIUM_SCRIPT scenic_webdriver/scenic_boot_test.py false
  - $SELENIUM_SCRIPT scenic_webdriver/source_tests/user_should_be_able_to_instantiate_and_power_on_a_source_test.py
    false
  - $SELENIUM_SCRIPT scenic_webdriver/sip_tests/user_should_be_able_to_login_to_sip_test.py
    false
  - $SELENIUM_SCRIPT scenic_webdriver/sip_tests/user_should_be_able_to_make_a_unilateral_sip_call_test.py
    false
  - $SELENIUM_SCRIPT scenic_webdriver/selector_tests/user_should_be_presented_with_basic_ui_test.py
    false
  - $SELENIUM_SCRIPT scenic_webdriver/selector_tests/user_should_be_presented_with_compression_menu_test.py
    false
  - $SELENIUM_SCRIPT scenic_webdriver/selector_tests/user_should_be_presented_with_destinations_menu_test.py
    false
  - $SELENIUM_SCRIPT scenic_webdriver/selector_tests/user_should_be_presented_with_side_bar_test.py
    false
  - $SELENIUM_SCRIPT scenic_webdriver/selector_tests/user_should_be_presented_with_sources_menu_test.py
    false
  - $SELENIUM_SCRIPT scenic_webdriver/selector_tests/user_should_be_presented_with_status_bar_test.py
    false
  - $SELENIUM_SCRIPT scenic_webdriver/page_tests/user_should_be_able_to_open_the_settings_page_test.py
    false
  - $SELENIUM_SCRIPT scenic_webdriver/selector_tests/user_should_be_presented_with_page_menu_test.py
    false
  - $SELENIUM_SCRIPT scenic_webdriver/page_tests/user_should_be_able_to_open_the_help_page_test.py
    false
  - $SELENIUM_SCRIPT scenic_webdriver/selector_tests/user_should_be_presented_file_drawer_test.py
    false
  - $SELENIUM_SCRIPT scenic_webdriver/selector_tests/user_should_be_presented_with_sip_drawer_test.py
    false
  services:
  - alias: scenic
    name: $SCENIC_IMAGE:$SCENIC_TAG
  - alias: scenic-core-1
    name: $SCENIC_CORE_IMAGE:$SCENIC_CORE_TAG
  - alias: scenic-core-2
    name: $SCENIC_CORE_IMAGE:$SCENIC_CORE_TAG
  - alias: scenic-core-3
    name: $SCENIC_CORE_IMAGE:$SCENIC_CORE_TAG
  stage: selenium
  tags:
  - ${RUNNER_HOSTNAME}
  timeout: 30 minute
  variables:
    CI_DEBUG_SERVICES: 'false'
    FF_NETWORK_PER_BUILD: 'true'
    SCENIC_CORE_IMAGE: registry.gitlab.com/sat-mtl/tools/scenic/scenic-core
    SCENIC_IMAGE: registry.gitlab.com/sat-mtl/tools/scenic/scenic
    SCENIC_SELENIUM_IMAGE: registry.gitlab.com/sat-mtl/tools/scenic/scenic/selenium
    SCENIC_SELENIUM_TAG: develop
    SELENIUM_DIR: test/selenium
    SELENIUM_SCRIPT: scripts/ci/test-and-record.sh
    SIP_HOST: $CI_SIP_HOST
    SIP_PASSWORD: $CI_SIP_PASSWORD
    SIP_USER1: scenic-ci1
    SIP_USER2: scenic-ci2
    SIP_USER3: scenic-ci3
manual-selenium-from-branch:
  allow_failure: true
  extends:
  - .selenium-template
  needs: []
  stage: selenium
  variables:
    SCENIC_CORE_TAG: develop
    SCENIC_TAG: $CI_COMMIT_REF_SLUG
  when: manual
selenium:
  extends:
  - .selenium-template
  needs:
  - release-docker-image
  only:
  - tags
  - develop
  - master
  stage: selenium
  variables:
    SCENIC_CORE_TAG: $CI_COMMIT_REF_NAME
    SCENIC_TAG: $CI_COMMIT_REF_NAME
stages:
- selenium
variables:
  RUNNER_HOSTNAME:
    description: The specific GitLab runner hostname. Each runner needs to have a
      tag manually defined with its hostname.
