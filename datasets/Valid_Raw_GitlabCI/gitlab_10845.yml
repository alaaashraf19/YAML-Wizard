before_script:
- export GO_PROJECT_PATH="$GOPATH/src/gitlab.com/$CI_PROJECT_NAMESPACE"
- echo $GO_PROJECT_PATH
- mkdir -p $GO_PROJECT_PATH
- ln -s $(pwd) $GO_PROJECT_PATH
- export GO_PROJECT_PATH="$GO_PROJECT_PATH/$CI_PROJECT_NAME"
- echo $GO_PROJECT_PATH
- cd $GO_PROJECT_PATH
- glide install -v
go_build:
  script:
  - go build
  stage: build
  tags:
  - docker
go_publish:
  artifacts:
    paths:
    - $CI_PROJECT_NAME
  only:
  - tags
  script:
  - go build
  stage: publish
  tags:
  - docker
go_test:
  script:
  - go test -cover $(go list ./... | grep -v "vendor")
  stage: verify
  tags:
  - docker
image: billyteves/alpine-golang-glide:1.2.0
stages:
- build
- verify
- publish
