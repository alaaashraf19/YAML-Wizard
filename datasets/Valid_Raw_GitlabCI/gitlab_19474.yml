before_script:
- apt-get update -yqq
- apt-get install -yqq --no-install-recommends  libsodium-dev
cache:
  paths:
  - cargo/
rust_nightly:
  allow_failure: true
  image: rustlang/rust:nightly
  script:
  - rustc --version && cargo --version
  - cargo build --verbose
  - cargo test --verbose
  stage: build
rust_stable:
  image: rust:latest
  script:
  - rustc --version && cargo --version
  - cargo build --verbose
  - cargo test --verbose
  stage: build
stages:
- build
variables:
  CARGO_HOME: $CI_PROJECT_DIR/cargo
