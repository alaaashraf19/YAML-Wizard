Build Output:
  artifacts:
    name: DocBook-Tutorial
    paths:
    - build/docbook-tutorial.pdf
    - build/docbook-tutorial.html
    when: on_success
  script:
  - ./.gitlab/build.sh
  stage: build
before_script:
- ./.gitlab/opensuse-install.sh
- cp .gitlab/jing.conf /etc/java/
cache:
  key: zypper
  paths:
  - /var/cache/zypper/**
  - /var/cache/zypp/**
image: opensuse:latest
stages:
- build
variables:
  MAIN_CATALOG: /etc/xml/catalog
