before_script:
- eval $(ssh-agent -s)
- ssh-add <(echo $CI_PRIVATE_KEY |base64 -d)
- mkdir -p ~/.ssh
- echo -e "Host *\n\tStrictHostKeyChecking no\n\n" > ~/.ssh/config
- ruby -v
- which ruby
- gem install bundler
- bundle install --jobs $(nproc)  "${FLAGS[@]}" --path vendor
cache:
  paths:
  - vendor
cookstyle:
  script:
  - bundle exec cookstyle
  stage: test
image: ruby:2.6
kitchen:
  script:
  - apt-get -qq update && apt-get -yqq install openssh-client rsync make jq
  - make gems
  - make kitchen
  stage: test
push-cookbook:
  only:
    refs:
    - master
    variables:
    - $OPS_CLONE_USERNAME
    - $OPS_CLONE_PASSWORD
  script:
  - git clone https://$OPS_CLONE_USERNAME:$OPS_CLONE_PASSWORD@ops.gitlab.net/gitlab-cookbooks/cookbook-publisher.git
    /tmp/cookbook-publisher
  - cp /tmp/cookbook-publisher/publisher.rb .
  - ruby publisher.rb
  stage: publish
rspec:
  script:
  - bundle exec rspec -f d
  stage: test
stages:
- test
- publish
