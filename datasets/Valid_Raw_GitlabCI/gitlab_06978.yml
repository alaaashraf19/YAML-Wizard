.only-default:
  only: &id001
  - merge_requests
code format:
  image: alpine:3.12
  needs: []
  only: *id001
  script:
  - apk add clang python3
  - clang-format --version
  - python3 ./tools/run-clang-format.py -j 1 -r --exclude tests/doctest.h src tests
    examples
  stage: linting
  tags:
  - docker
header updated:
  image: amd64/alpine:3.12
  needs: []
  only: *id001
  script:
  - apk add m4
  - ./tools/is_header_up_to_date.sh
  stage: linting
  tags:
  - docker
linux gcc v9.3 x86:
  artifacts:
    paths:
    - ./build/tests_linux_gcc_x86
    - ./build/tests_header_only_linux_gcc_x86
  image: i386/alpine:3.12
  needs: []
  only: *id001
  script:
  - apk add cmake g++ ninja m4
  - mkdir build && cd build
  - cmake -G "Ninja" ../ -DCMAKE_VERBOSE_MAKEFILE=ON -DTCS_ENABLE_TESTS=ON -DTCS_ENABLE_EXAMPLES=ON
    -DTCS_WARNINGS_AS_ERRORS=OFF
  - cmake --build .
  - mv ./tests/tests ./tests_linux_gcc_x86
  - mv ./tests/tests_header_only ./tests_header_only_linux_gcc_x86
  stage: build
  tags:
  - docker
