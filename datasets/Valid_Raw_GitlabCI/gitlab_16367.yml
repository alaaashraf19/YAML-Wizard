before_script:
- npm install
cache:
  paths:
  - node_modules/
image: node:9
npm_test:
  script:
  - echo Running test
  stage: test
release:
  only:
  - master
  script:
  - echo '//registry.npmjs.org/:_authToken=${NPM_TOKEN}'>.npmrc
  - npm publish
  - rm -f .npmrc
  stage: deploy
stages:
- test
- deploy
