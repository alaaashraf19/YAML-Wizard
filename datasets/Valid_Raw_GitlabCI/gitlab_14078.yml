.go test:
  coverage: /^total:\s*\(statements\)\s*(\d+.\d+)\%/
  script: &id001
  - mkdir -p $COVERAGEREPORTDIR
  - go test -cover --covermode=atomic --coverprofile=$COVERAGEREPORTDIR/main.cover
    ./...
  - go tool cover -func $COVERAGEREPORTDIR/main.cover
  - go tool cover -html $COVERAGEREPORTDIR/main.cover -o $COVERAGEREPORTDIR/main.html
  stage: checks
  variables: &id002
    GOTESTFLAGS: -v
default:
  image: golang:1.24
dev build:
  artifacts:
    expire_in: 1 week
    paths:
    - .build/dist/
  before_script:
  - apk add --update docker-cli
  image:
    entrypoint:
    - ''
    name: goreleaser/goreleaser
  rules:
  - if: $CI_COMMIT_BRANCH
  script:
  - goreleaser release --clean --snapshot --skip=publish
  services:
  - docker:dind
  stage: build
  variables:
    DOCKER_DRIVER: overlay2
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ''
go test:
  artifacts:
    expire_in: 1 week
    paths:
    - $COVERAGEREPORTDIR/
  coverage: /^total:\s*\(statements\)\s*(\d+.\d+)\%/
  only:
  - branches
  script: *id001
  stage: checks
  variables: *id002
go test release:
  artifacts:
    expire_in: 1 year
    paths:
    - $COVERAGEREPORTDIR/
  coverage: /^total:\s*\(statements\)\s*(\d+.\d+)\%/
  only:
  - tags
  script: *id001
  stage: checks
  variables: *id002
govulncheck:
  script:
  - go mod tidy
  - go tool govulncheck -show color ./...
  stage: checks
lint:
  script:
  - go tool golangci-lint run
  stage: checks
release:
  before_script:
  - apk add --update py3-pip jq docker-cli
  - pip install --upgrade --break-system-packages cloudsmith-cli
  - echo "$DOCKER_HUB_TOKEN" | docker login --username $DOCKER_HUB_USER --password-stdin
  image:
    entrypoint:
    - ''
    name: goreleaser/goreleaser
  rules:
  - if: $CI_COMMIT_TAG && '$CI_COMMIT_TAG =~ /^v\d+.\d+.\d+$/'
  script:
  - goreleaser release --clean
  - test -f .build/dist/metadata.json
  - test -f .build/dist/artifacts.json
  - export VERSION="$(cat .build/dist/metadata.json | jq -r '.version')"
  - "cat .build/dist/artifacts.json | jq -r '[.[] | select((.type == \"Binary\") and\
    \ (.extra.ID==\"gitlab-ci-linter\"))] | sort_by(.goos, .goarch) | .[] | [.goos,\
    \ .goarch, .path] | @tsv' | while read GOOS GOARCH ARTIFACT_PATH\ndo\n  echo \"\
    -> Uploading artifact $ARTIFACT_PATH $VERSION for ${GOOS}/${GOARCH}\"\n  cloudsmith\
    \ push raw --republish --version \"$VERSION\" --name \"gitlab-ci-linter_${GOOS}_${GOARCH}\"\
    \ --tags \"${GOOS},${GOARCH}\" orobardet/gitlab-ci-linter \"$ARTIFACT_PATH\" ||\
    \ exit 1\ndone\n"
  services:
  - docker:dind
  stage: build
  variables:
    DOCKER_DRIVER: overlay2
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ''
    GIT_DEPTH: 0
stages:
- checks
- build
variables:
  CGO_ENABLED: 0
  COVERAGEREPORTDIR: _build/coverage
