.integration:
  parallel:
    matrix:
    - RUBY_VERSION: '2.7'
    - RUBY_VERSION: '3.0'
  script:
  - cd tests/reliability
  - bundle exec ruby reliability_test.rb
  services:
  - redis:alpine
  stage: test
before_script:
- ruby -v
- which ruby
- gem install bundler
- bundle install --jobs $(nproc)  "${FLAGS[@]}"
default:
  image: ruby:${RUBY_VERSION}
integration_reliable:
  extends: .integration
  variables:
    JOB_FETCHER: reliable
integration_semi:
  extends: .integration
  variables:
    JOB_FETCHER: semi
kill_interruption:
  parallel:
    matrix:
    - RUBY_VERSION: '2.7'
    - RUBY_VERSION: '3.0'
  script:
  - cd tests/interruption
  - bundle exec ruby test_kill_signal.rb
  services:
  - redis:alpine
  stage: test
rspec:
  artifacts:
    expire_in: 31d
    paths:
    - coverage/
    when: always
  coverage: /LOC \((\d+\.\d+%)\) covered.$/
  parallel:
    matrix:
    - RUBY_VERSION: '2.7'
    - RUBY_VERSION: '3.0'
  script:
  - bundle exec rspec
  services:
  - redis:alpine
  stage: test
term_interruption:
  parallel:
    matrix:
    - RUBY_VERSION: '2.7'
    - RUBY_VERSION: '3.0'
  script:
  - cd tests/interruption
  - bundle exec ruby test_term_signal.rb
  services:
  - redis:alpine
  stage: test
variables:
  REDIS_URL: redis://redis
