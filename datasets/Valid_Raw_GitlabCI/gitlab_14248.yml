before_script:
- ln -s /builds /go/src/gitlab.com
- cd /go/src/gitlab.com/pablo-ruth/go-init
compile_master:
  artifacts:
    expire_in: 1 day
    paths:
    - go-init
  only:
    refs:
    - master
  script:
  - make build VERSION=$CI_JOB_ID
  stage: build
  tags:
  - docker
compile_tags:
  artifacts:
    paths:
    - go-init
  only:
  - tags
  script:
  - make build VERSION=$CI_COMMIT_TAG
  - make upx
  stage: build
  tags:
  - docker
image: golang:1.9
lint_code:
  script:
  - make lint
  stage: test
  tags:
  - docker
package_master:
  before_script: []
  only:
    refs:
    - master
  script:
  - make fpm_install
  - make fpm
  - make fpm_upload_dev
  stage: package
  tags:
  - docker
  variables:
    VERSION: $CI_JOB_ID
package_tags:
  before_script: []
  only:
  - tags
  script:
  - make fpm_install
  - make fpm
  - make fpm_upload_tag
  stage: package
  tags:
  - docker
  variables:
    VERSION: $CI_COMMIT_TAG
race_detector:
  script:
  - make race
  stage: test
  tags:
  - docker
stages:
- test
- build
- package
unit_tests:
  script:
  - make test
  stage: test
  tags:
  - docker
