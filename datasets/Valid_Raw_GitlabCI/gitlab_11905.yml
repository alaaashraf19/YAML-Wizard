before_script:
- export APT_CACHE_DIR=`pwd`/apt-cache && mkdir -pv $APT_CACHE_DIR
- apt-get update -yq && apt-get -o dir::cache::archives="$APT_CACHE_DIR" install -yq
  gcc make pkg-config
- apt-get -o dir::cache::archives="$APT_CACHE_DIR" install -yq doxygen check lcov
build_amd64:
  artifacts:
    paths:
    - ./
  script:
  - make -j4 COVERAGE=1
  stage: build
cache:
  key: apt-cache
  paths:
  - apt-cache/
image: ubuntu:xenial
pages:
  artifacts:
    paths:
    - public
  dependencies:
  - test_amd64
  only:
  - master
  script:
  - make doc
  - mkdir public
  - cp -a coveragereport public/coverage
  - cp -a docs/html/* public/
  stage: deploy
test_amd64:
  artifacts:
    paths:
    - ./
  dependencies:
  - build_amd64
  script:
  - make check
  - make coverage-html
  stage: test
