cache:
  key: $CI_PIPELINE_ID
  paths:
  - target/
  - ./.m2/repository
image: maven:3.3.9-jdk-8
package:
  script: mvn package $MAVEN_CLI_OPTS
  stage: build
stages:
- build
- test
test:
  script: mvn test $MAVEN_CLI_OPTS
  stage: test
variables:
  MAVEN_CLI_OPTS: --batch-mode --errors --fail-at-end --show-version -DinstallAtEnd=true
    -DdeployAtEnd=true
  MAVEN_OPTS: -Dorg.slf4j.simpleLogger.log.org.apache.maven.cli.transfer.Slf4jMavenTransferListener=WARN
    -Dorg.slf4j.simpleLogger.showDateTime=true -Djava.awt.headless=true -Dmaven.repo.local=./.m2/repository
