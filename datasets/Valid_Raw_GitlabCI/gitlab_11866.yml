coverage:
  artifacts:
    expire_in: 5 days
    paths:
    - coverage
  script:
  - tox -e cov-git
  stage: test
image: ghcr.io/maxking/mailman-ci-runner
include:
- template: SAST.gitlab-ci.yml
qa:
  script:
  - tox -e qa
  stage: quality-assurance
released:
  allow_failure: true
  script:
  - tox -e py313-django52
  stage: test
stages:
- quality-assurance
- test
test-django42:
  parallel:
    matrix:
    - PYTHON_VER:
      - '39'
      - '310'
      - '311'
      - '312'
  script:
  - tox -e "py$PYTHON_VER-django42-git"
  stage: test
test-django52:
  parallel:
    matrix:
    - PYTHON_VER:
      - '310'
      - '311'
      - '312'
      - '313'
  script:
  - tox -e "py$PYTHON_VER-django52-git"
  stage: test
upstream-client:
  only:
    variables:
    - $MAILMANCLIENT_COMMIT_SHA
  script:
  - tox -e upstream-client
  stage: test
upstream-django-mailman3:
  only:
    variables:
    - $DJANGO_MAILMAN3_COMMIT_SHA
  script:
  - tox -e upstream-django-mailman3
  stage: test
variables:
  SAST_DEFAULT_ANALYZERS: bandit,secrets
