Windows tests:
  before_script:
  - choco feature enable -n allowGlobalConfirmation
  - choco install python
  - py -c "import os, sys, pathlib; os.symlink(pathlib.Path(sys.executable).parent.name,
    r'C:\Python')"
  - $env:PATH = 'C:\Python;C:\Python\Scripts;' + $env:PATH
  - choco install python --side-by-side --version=3.8.6
  - choco install python --side-by-side --version=3.7.6
  - choco install python --side-by-side --version=3.6.8
  - choco install python --side-by-side --version=3.5.4.20200110
  - choco install python2
  - py -m pip install -U pip
  - py -m pip install tox
  extends: tests
  tags:
  - windows
codecov:
  dependencies:
  - coverage
  script:
  - codecov --token $CODECOV_TOKEN
  stage: codecov
  when: on_success
coverage:
  artifacts:
    paths:
    - coverage.xml
  script:
  - tox -e py27-cov,py35-cov,py36-cov,py37-cov,py38-cov,py39-cov
diffcov:
  script:
  - tox -e py27-diffcov,py35-diffcov,py36-diffcov,py37-diffcov,py38-diffcov,py39-diffcov
docs:
  script:
  - tox -e docs
image: quay.io/python-devs/ci-image
qa:
  script:
  - tox -e qa
release:
  only:
  - /^v\d+\.\d+(\.\d+)?([abc]\d*)?$/
  script:
  - tox -e release
  stage: deploy
stages:
- test
- codecov
- deploy
tests:
  script:
  - tox -e py27,py35,py36,py37,py38,py39
