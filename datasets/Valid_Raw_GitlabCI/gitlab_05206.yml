.v134_base:
  environment:
    name: gkevc_134/$REVIEW_REF_PREFIX$CI_COMMIT_SHORT_SHA
    url: https://gitlab${DOMAIN}
  extends:
  - .vcluster_base
  variables:
    DOMAIN: -${HOST_SUFFIX}.${KUBE_INGRESS_BASE_DOMAIN}
    HOST_SUFFIX: ${CI_ENVIRONMENT_SLUG}-vc134
    VARIABLES_FILE: variables/review_v134
    VCLUSTER_K8S_VERSION: v1.34.0
    VCLUSTER_NAME: v134-${REVIEW_REF_PREFIX}${CI_COMMIT_SHORT_SHA}
create_review_v134:
  environment:
    action: start
    auto_stop_in: $REVIEW_APPS_AUTO_STOP_IN
    on_stop: stop_review_v134
  extends: .v134_base
  image: ${BUSYBOX_IMAGE}
  script:
  - echo "Configuring gkevc_134/$REVIEW_REF_PREFIX$CI_COMMIT_SHORT_SHA to automatically
    stop in $REVIEW_APPS_AUTO_STOP_IN."
  stage: review
  variables:
    GIT_STRATEGY: none
include:
- component: gitlab.com/gitlab-org/quality/pipeline-common/allure-report@9.6.3
  inputs:
    allure_results_glob: gitlab-qa-run-*/**/allure-results
    aws_access_key_id_variable_name: QA_ALLURE_AWS_ACCESS_KEY_ID
    aws_secret_access_key_variable_name: QA_ALLURE_AWS_SECRET_ACCESS_KEY
    gitlab_auth_token_variable_name: DANGER_GITLAB_API_TOKEN
    job_name: e2e-test-v134
    job_stage: qa-report
  rules:
  - if: $CI_SERVER_HOST != "gitlab.com"
    when: never
  - if: $CI_PIPELINE_SOURCE == "pipeline" || $CI_PIPELINE_SOURCE == "parent_pipeline"
qa_v134:
  environment:
    action: access
  extends:
  - .qa_branch
  - .v134_base
  needs:
  - review_v134
  - artifacts: false
    job: review_specs_v134
  variables:
    TEST_SUITE: $QA_SANITY_SUITE_OPTIONS
qa_v134_full_suite_manual_trigger:
  extends: .qa_full_suite_manual_trigger
  script: echo 'The job will trigger Full E2E suite against GKE134 vcluster'
qa_v134_manual_full_suite:
  environment:
    action: access
  extends:
  - .qa_branch
  - .v134_base
  needs:
  - qa_v134_full_suite_manual_trigger
  parallel: 7
  variables:
    TEST_SUITE: $QA_FULL_SUITE_OPTIONS
review_specs_v134:
  environment:
    action: access
  extends:
  - .vcluster_specs_template
  - .v134_base
  needs:
  - review_v134
review_v134:
  environment:
    action: access
  extends:
  - .vcluster_review_template
  - .v134_base
stop_review_v134:
  environment:
    action: stop
  extends:
  - .stop_vcluster_review_template
  - .v134_base
