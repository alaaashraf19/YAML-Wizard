before_script:
- apt-get update
- sudo apt-get install -y build-essential
- apt-get install -y libboost-all-dev
compile_auto:
  artifacts:
    paths:
    - ./tools/auto/auto
  script:
  - cd tools/auto/
  - make
compile_main:
  artifacts:
    paths:
    - ./bin/*
  script:
  - cd src/
  - make all
  - cd ..
image: ubuntu:24.04
