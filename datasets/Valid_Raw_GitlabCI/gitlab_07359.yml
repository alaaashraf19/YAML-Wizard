mariadb_run_latest_gcc10:
  artifacts:
    expire_in: 3 week
    untracked: true
    when: always
  image: debian:unstable
  needs: []
  script:
  - export CC=gcc-10
  - export HERCCPPFLAGS=" -Wno-format-overflow"
  - export ASAN_OPTIONS=detect_stack_use_after_return=true:strict_init_order=true:detect_odr_violation=0
  - ./.tools/jobs/install.sh "mysql-client gcc-10 git-core make autoconf automake
    autopoint libtool libmariadbclient-dev-compat libz-dev libpcre3-dev"
  - ./.tools/jobs/cloneall.sh
  - ./.tools/jobs/initdb.sh mariadb
  - ./.tools/jobs/build.sh "--enable-packetver=${packetver} --enable-epoll --enable-debug
    --enable-sanitize=full --disable-manager --enable-Werror --enable-buildbot" "--enable-werror
    --enable-lto --enable-sanitize"
  - ./.tools/jobs/runserver.sh mariadb
  services:
  - mariadb:latest
  stage: test
mariadb_run_valgrind_latest:
  artifacts:
    expire_in: 3 week
    untracked: true
    when: always
  image: debian:stretch
  needs: []
  script:
  - export CC=gcc-6
  - ./.tools/jobs/install.sh "mysql-client gcc-6 git-core make autoconf automake autopoint
    libtool mariadb-client libmariadbclient-dev-compat libz-dev libpcre3-dev valgrind"
  - ./.tools/jobs/cloneall.sh
  - ./.tools/jobs/initdb.sh mariadb
  - ./.tools/jobs/build.sh "--enable-packetver=${packetver} --enable-epoll --enable-debug
    --disable-manager --enable-Werror --enable-buildbot" "--enable-werror"
  - ./.tools/jobs/runservervalgrind.sh mariadb
  services:
  - mariadb:latest
  stage: test
newlines:
  artifacts:
    expire_in: 3 week
    untracked: true
    when: always
  image: debian:unstable
  script:
  - ./.tools/jobs/install.sh "dos2unix git-core"
  - ./.tools/jobs/newlines.sh
  stage: lint
spaces:
  artifacts:
    expire_in: 3 week
    untracked: true
    when: always
  image: debian:unstable
  script:
  - ./.tools/jobs/install.sh "sed git-core"
  - cd npc
  - ../.tools/jobs/spaces.sh
  stage: lint
stages:
- lint
- test
variables:
  ARTIFACT_DOWNLOAD_ATTEMPTS: '5'
  GET_SOURCES_ATTEMPTS: '5'
  MYSQL_ROOT_PASSWORD: root
  packetver: '20170517'
