image: jnijhof/kitchen-docker
openvpn ubuntu 16.04:
  script:
  - kitchen test default-ubuntu-1604
  stage: test
push-cookbook:
  only:
    refs:
    - master
    variables:
    - $OPS_CLONE_USERNAME
    - $OPS_CLONE_PASSWORD
  script:
  - git clone https://$OPS_CLONE_USERNAME:$OPS_CLONE_PASSWORD@ops.gitlab.net/gitlab-cookbooks/cookbook-publisher.git
    /tmp/cookbook-publisher
  - cp /tmp/cookbook-publisher/publisher.rb .
  - ruby publisher.rb
  stage: publish
rspec:
  script:
  - rspec -f d
  stage: test
stages:
- test
- publish
