before_script:
- pip install tox
test:36:
  image: python:3.6
  script: tox -e $TOX_ENV
  variables:
    TOX_ENV: py36
  when: always
test:manifest:
  image: python:3.6
  script: tox -e $TOX_ENV
  variables:
    TOX_ENV: manifest
  when: always
test:pep8:
  image: python:3.6
  script: tox -e $TOX_ENV
  variables:
    TOX_ENV: pep8
  when: always
