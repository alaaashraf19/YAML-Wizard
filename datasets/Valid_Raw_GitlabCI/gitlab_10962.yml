before_script:
- mkdir -p .cache
- export GOPATH="$CI_PROJECT_DIR/.cache"
- go mod vendor
cache:
  paths:
  - .cache
gitlab_inbox:
  image: registry.gitlab.com/jramsay/git-lab:build
  only:
  - schedules
  parallel:
    matrix:
    - HOST: gitlab.com
      PROJECT:
      - gitlab-org/gitaly
      - gitlab-org/gitlab
      - gitlab-org/git
      - gitlab-org/gitlab-shell
      - gitlab-org/gitlab-workhorse
      - gitlab-org/gitlab-runner
      - gitlab-org/omnibus-gitlab
      - gitlab-org/gitlab-build-images
  script:
  - go build ./cmd/...
  - BUNDLE_PATH="$HOST/$PROJECT/bundle.tar.gz"
  - ./git-lab fetch --host "$HOST" --project "$PROJECT" --bundle-url "https://gitlab-inbox.s3.amazonaws.com/$BUNDLE_PATH"
    || true
  - ./git-lab bundle --host "$HOST" --project "$PROJECT" bundle.tar.gz
  - aws s3 cp "$PWD/bundle.tar.gz" "s3://gitlab-inbox/$BUNDLE_PATH"
  stage: generate
  variables:
    GITLAB_CACHE_SKIP_HOOKS: 'true'
image: golang:1.14
stages:
- test
- generate
unit_tests:
  after_script:
  - bash <(curl -s https://codecov.io/bash) -t "${CODECOV_TOKEN}"
  except:
  - schedules
  script:
  - go test -coverprofile=coverage.txt -covermode=atomic ./...
  stage: test
