before_script:
- echo "start inTime2 CI"
- export GRADLE_USER_HOME=`pwd`/.gradle
deploy-push-docker-gitlab-image:
  allow_failure: true
  before_script:
  - mkdir deployment/build
  - echo $CI_REGISTRY_USER $CI_REGISTRY $CI_REGISTRY_IMAGE
  - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" $CI_REGISTRY
  - docker version
  dependencies:
  - package-spring-boot-jar
  environment:
    name: openshift-deply
    url: http://intime2-image-manathome.193b.starter-ca-central-1.openshiftapps.com
  image: docker:latest
  only:
  - master
  script:
  - cp -v backend/build/libs/*.jar deployment/build
  - docker image build --build-arg JAR_FILE=backend-0.0.4.jar --tag $CI_REGISTRY_IMAGE
    --file deployment/src/main/docker/DOCKERFILE --pull deployment/build
  - docker images
  - docker push $CI_REGISTRY_IMAGE
  services:
  - docker:dind
  stage: deploy
  when: on_success
package-react-frontend:
  allow_failure: false
  artifacts:
    expire_in: 1 days
    name: $CI_JOB_STAGE-$CI_COMMIT_REF_NAME-packaged-frontend
    paths:
    - frontend/build
    when: on_success
  cache:
    key: $CI_COMMIT_REF_SLUG-node
    paths:
    - frontend/node_modules
  image: node:latest
  script:
  - cd frontend
  - npm install
  - today=$(date +%Y-%m-%dT%H:%M)
  - sed "s/TBUILD/${today}/g" .env.production
  - npm run build
  stage: package-frontend
package-spring-boot-jar:
  allow_failure: false
  artifacts:
    expire_in: 1 days
    name: $CI_JOB_STAGE-$CI_COMMIT_REF_NAME-backend
    paths:
    - backend/build/libs
    when: on_success
  cache:
    key: $CI_COMMIT_REF_SLUG-java
    paths:
    - .gradle/wrapper
    - .gradle/caches
  dependencies:
  - package-react-frontend
  image: java:8-jdk
  script:
  - ./gradlew backend:includeReactFrontend
  - ./gradlew backend:bootJar
  stage: package
pages:
  artifacts:
    expire_in: 1 days
    name: $CI_JOB_STAGE-$CI_COMMIT_REF_NAME-gitlabpages
    paths:
    - public
  cache:
    key: $CI_COMMIT_REF_SLUG-java
    paths:
    - .gradle/wrapper
    - .gradle/caches
  environment:
    name: gitlab-pages
    url: https://spare-time-demos.gitlab.io/intime2/
  image: java:8-jdk
  only:
  - master
  script:
  - ./gradlew backend:test
  - ./gradlew backend:testreports
  - ./gradlew backend:dokka
  - ./gradlew backend:liquibaseUpdate
  - ./gradlew backend:liquibaseDbdoc
  - ./gradlew generateDbDocWithSchemaSpy
  - ./gradlew --build-file backend/build.docs.gradle apidocs
  - ./gradlew --build-file docs/build.slides.gradle slides --info
  - ./gradlew docs:docs
  stage: deploy
  when: always
qa-test-e2e-cypress:
  allow_failure: true
  artifacts:
    expire_in: 1 days
    name: $CI_JOB_STAGE-$CI_COMMIT_REF_NAME-e2e-cypress
    paths:
    - qa/e2e-cypress/cypress/videos/
    - qa/e2e-cypress/cypress/screenshots/
    when: always
  image: cypress/base
  script:
  - cd qa/e2e-cypress
  - npm install
  - $(npm bin)/cypress run
  stage: test
  when: always
qa-test-e2e-testcafe:
  allow_failure: true
  artifacts:
    expire_in: 1 days
    name: $CI_JOB_STAGE-$CI_COMMIT_REF_NAME-qa-e2e-testcafe
    paths:
    - qa/e2e/TestResult
    - qa/e2e/reports
    - qa/e2e/screenshots
    when: always
  cache:
    key: $CI_COMMIT_REF_SLUG-e2e
    paths:
    - qa/e2e/node_modules
  image: circleci/node:10.3.0-stretch-browsers
  script:
  - cd qa/e2e
  - echo "install"
  - npm install
  - mkdir reports
  - npm run test:browsers
  - echo "now running e2e tests test:ci (chrome headless, spec reporter, screenshots)"
  - npm run test:ci -- --baseUrl=http://intime2-intime2.7e14.starter-us-west-2.openshiftapps.com/?lang=en-US
  stage: test
  when: always
stages:
- test
- package-frontend
- package
- deploy
test-backend:
  after_script:
  - bash <(curl -s https://codecov.io/bash) -s backend/build/reports/jacoco/test
  allow_failure: true
  artifacts:
    expire_in: 1 days
    name: $CI_JOB_STAGE-$CI_COMMIT_REF_NAME-backend
    paths:
    - backend/build/reports
    when: always
  cache:
    key: $CI_COMMIT_REF_SLUG-java
    paths:
    - .gradle/wrapper
    - .gradle/caches
  image: java:8-jdk
  script:
  - ./gradlew backend:test
  - ./gradlew backend:testreports
  - cat backend/build/reports/jacoco/test/html/index.html
  stage: test
  when: always
test-frontend:
  after_script:
  - bash <(curl -s https://codecov.io/bash) -s frontend/coverage
  allow_failure: true
  artifacts:
    expire_in: 1 days
    name: $CI_JOB_STAGE-$CI_COMMIT_REF_NAME-frontend
    paths:
    - frontend/coverage
    - frontend/build-typedoc
    when: always
  cache:
    key: $CI_COMMIT_REF_SLUG-node
    paths:
    - frontend/node_modules
  image: node:latest
  script:
  - cd frontend
  - npm install
  - npm run test:ci
  - npm run sonar-scanner:ci sonar.login=$SONAR_LOGIN_FRONTEND
  - npx typedoc --out build-typedoc --name inTime2 --ignoreCompilerErrors --exclude
    **/coverage/**
  stage: test
  when: always
