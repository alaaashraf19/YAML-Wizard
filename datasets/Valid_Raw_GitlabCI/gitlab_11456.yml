.build:
  artifacts:
    paths:
    - build/
  before_script:
  - mkdir -p "${CI_PROJECT_DIR}"
  except:
  - schedules
  interruptible: true
  script:
  - meson --werror --warnlevel 2 -Dgtk_doc=enabled --prefix=$PREFIX -Db_coverage=true
    build/
  - ninja -C build/
  stage: build
  variables:
    PREFIX: ${CI_PROJECT_DIR}/libnice-prefix
.build msvc:
  artifacts:
    paths:
    - build/meson-logs/
    reports:
      junit: build/meson-logs/testlog-*.junit.xml
    when: on_failure
  extends: .build windows
  script:
  - $env:MESON_ARGS = $env:MESON_ARGS.replace("`n"," ")
  - cmd.exe /C "C:\BuildTools\Common7\Tools\VsDevCmd.bat -host_arch=amd64 -arch=$env:ARCH
    && meson subprojects download && meson wrap promote subprojects\glib-$env:GLIB_VERSION\subprojects\libffi.wrap
    && meson wrap promote subprojects\glib-$env:GLIB_VERSION\subprojects\proxy-libintl.wrap
    && meson subprojects download"
  - cmd.exe /C "C:\BuildTools\Common7\Tools\VsDevCmd.bat -host_arch=amd64 -arch=$env:ARCH
    && meson build $env:MESON_ARGS && ninja -C build && meson test -C build --print-errorlogs
    --suite libnice"
  variables:
    GLIB_VERSION: 2.64.2
.build msvc openssl:
  extends: .build windows
  script:
  - $env:MESON_ARGS = $env:MESON_ARGS.replace("`n"," ")
  - $env:MESON_ARGS += " -Dcrypto-library=openssl"
  - New-Item -Path subprojects -Name openssl.wrap -Value "[wrap-git]`r`ndirectory=openssl`r`nurl=https://gitlab.freedesktop.org/libnice/openssl-binaries-for-ci.git`r`nrevision=1.1.1c`r`n"
  - cmd.exe /C "C:\BuildTools\Common7\Tools\VsDevCmd.bat -host_arch=amd64 -arch=$env:ARCH
    && meson subprojects download && meson wrap promote subprojects\glib-$env:GLIB_VERSION\subprojects\libffi.wrap
    && meson wrap promote subprojects\glib-$env:GLIB_VERSION\subprojects\proxy-libintl.wrap
    && meson subprojects download"
  - cmd.exe /C "C:\BuildTools\Common7\Tools\VsDevCmd.bat -host_arch=amd64 -arch=$env:ARCH
    && meson build $env:MESON_ARGS && ninja -C build && meson test -C build --print-errorlogs
    --suite libnice"
  variables:
    GLIB_VERSION: 2.64.2
.build windows:
  image: registry.freedesktop.org/gstreamer/gstreamer/amd64/windows:2023-08-24.0-main
  interruptible: true
  stage: build
  tags:
  - docker
  - windows
  - '2022'
  variables:
    ErrorActionPreference: Stop
    MESON_ARGS: '--prefix=${CI_PROJECT_DIR}/libnice-prefix

      '
    WarningPreference: Stop
.libnice.centos:8:
  variables:
    FDO_DISTRIBUTION_TAG: 2025-05-26-3
    FDO_DISTRIBUTION_VERSION: '8'
    FDO_UPSTREAM_REPO: libnice/libnice
.libnice.fedora:42:
  variables:
    FDO_DISTRIBUTION_TAG: '2025-08-11'
    FDO_DISTRIBUTION_VERSION: '42'
    FDO_UPSTREAM_REPO: libnice/libnice
.test:
  after_script:
  - ninja -C build coverage
  - lcov_cobertura build/meson-logs/coverage.info -o build/meson-logs/coverage.xml
  artifacts:
    paths:
    - build/meson-logs/
    reports:
      coverage_report:
        coverage_format: cobertura
        path: build/meson-logs/coverage.xml
      junit: build/meson-logs/testlog-*.junit.xml
    when: on_failure
  before_script:
  - ifconfig
  coverage: '/lines......: \d+\.\d+% /'
  except:
  - schedules
  extends: null
  interruptible: true
  script:
  - ninja -C build/
  - meson test -C build/ --setup debug
  stage: test
build centos:8:
  extends:
  - .fdo.distribution-image@centos
  - .libnice.centos:8
  - .build
build fedora:42:
  extends:
  - .fdo.distribution-image@fedora
  - .libnice.fedora:42
  - .build
build msvc amd64:
  extends: .build msvc
  variables:
    ARCH: amd64
build msvc amd64 openssl:
  extends: .build msvc openssl
  variables:
    ARCH: amd64
build msvc x86:
  extends: .build msvc
  variables:
    ARCH: x86
build msvc x86 openssl:
  extends: .build msvc openssl
  variables:
    ARCH: x86
build msys2:
  allow_failure: true
  artifacts:
    paths:
    - build/meson-logs/
    - build/build.ninja
    when: on_failure
  before_script:
  - $ErrorActionPreference = "Stop"
  - $env:PATH += ';C:\msys64\usr\bin;C:\msys64\mingw64\bin;C:\msys64\mingw32\bin'
  - C:\msys64\usr\bin\bash -c "pacman-key --init && pacman-key --populate msys2 &&
    pacman-key --refresh-keys || true"
  - C:\msys64\usr\bin\bash -c "pacman-key --init && pacman-key --populate msys2"
  - C:\msys64\usr\bin\bash -c "pacman-key --refresh-keys || true"
  - C:\msys64\usr\bin\bash -c "pacman -Sy --noconfirm --needed mingw-w64-x86_64-toolchain
    ninja"
  extends: .build windows
  script:
  - $ErrorActionPreference = "Stop"
  - $env:PATH += ';C:\msys64\usr\bin;C:\msys64\mingw64\bin;C:\msys64\mingw32\bin'
  - $env:MESON_ARGS = $env:MESON_ARGS.replace("`n"," ")
  - $env:PATH += ";C:\msys64\usr\bin;C:\msys64\mingw64/bin;C:\msys64\mingw32/bin"
  - $env:CI_PROJECT_DIR = $env:CI_PROJECT_DIR.replace('\','/')
  - $env:MESON_ARGS = $env:MESON_ARGS.replace('\','/')
  - C:\msys64\usr\bin\bash -c "meson build $env:MESON_ARGS"
  - C:\msys64\usr\bin\bash -c "ninja -j 1 -C build"
  - C:\msys64\usr\bin\bash -c "meson test -C build --print-errorlogs --suite libnice"
build-centos-container:8:
  extends:
  - .fdo.container-build@centos
  - .libnice.centos:8
  stage: containers
  variables:
    FDO_DISTRIBUTION_EXEC: tests/docker/centos8/pip-installs.sh
    FDO_DISTRIBUTION_PACKAGES: git gnutls-devel gstreamer1-devel gstreamer1-plugins-base
      gobject-introspection-devel valgrind net-tools graphviz python3-pip
build-fedora-container:42:
  extends:
  - .fdo.container-build@fedora
  - .libnice.fedora:42
  stage: containers
  variables:
    FDO_DISTRIBUTION_EXEC: tests/docker/fedora42/pip-installs.sh
    FDO_DISTRIBUTION_PACKAGES: git gtk-doc gnutls-devel gupnp-igd-devel gstreamer1-devel
      gstreamer1-plugins-base gobject-introspection-devel valgrind net-tools graphviz
      meson ninja-build lcov python3-pip coturn file
doc-and-install centos:8:
  artifacts:
    paths:
    - build/docs/reference/libnice/html/
  except:
  - schedules
  extends:
  - .fdo.distribution-image@centos
  - .libnice.centos:8
  interruptible: true
  needs:
  - build centos:8
  script:
  - ninja -C build/ libnice-doc
  - ninja -C build/ install
  - ls -lR ${PREFIX}
  stage: test
  variables:
    PREFIX: ${CI_PROJECT_DIR}/libnice-prefix
include:
- file: /templates/centos.yml
  project: freedesktop/ci-templates
  ref: 48c2c583a865bd59be21e8938df247faf460099c
- file: /templates/fedora.yml
  project: freedesktop/ci-templates
  ref: 48c2c583a865bd59be21e8938df247faf460099c
pages:
  artifacts:
    expire_in: 1 year
    paths:
    - public
  dependencies:
  - doc-and-install centos:8
  only:
  - latest-release
  script:
  - mkdir public/
  - mv build/docs/reference/libnice/html/ public/libnice/
  stage: deploy
stages:
- containers
- build
- test
- deploy
submit-to-coverity:
  before_script:
  - mkdir -p "${CI_PROJECT_DIR}"
  dependencies: []
  extends:
  - .fdo.distribution-image@fedora
  - .libnice.fedora:42
  only:
  - schedules
  - web
  script:
  - curl -v https://scan.coverity.com/download/linux64  -o coverity_tool.tgz  --data
    "token=${COVERITY_TOKEN}&project=${COVERITY_PROJECT}" && tar xf coverity_tool.tgz
    && rm coverity_tool.tgz
  - mv cov-analysis-linux64-* cov-analysis-linux64
  - meson --werror --warnlevel 2 -Dgtk_doc=disabled -Dintrospection=disabled --prefix=$PREFIX
    cov-build/
  - export PATH="$PATH:${CI_PROJECT_DIR}/cov-analysis-linux64/bin"
  - echo $PATH
  - cov-build --dir cov-int ninja -C cov-build
  - tar czvf libnice.tgz cov-int
  - curl --form token=$COVERITY_TOKEN --form email=olivier.crete@ocrete.ca --form
    file=@libnice.tgz --form version="${CI_COMMIT_REF_NAME}-${CI_COMMIT_SHA}" --form
    description="CI weekly run" https://scan.coverity.com/builds?project=libnice
  stage: test
  variables:
    COVERITY_PROJECT: libnice
    PREFIX: ${CI_PROJECT_DIR}/libnice-prefix
test centos:8:
  extends:
  - .fdo.distribution-image@centos
  - .libnice.centos:8
  - .test
  needs:
  - build centos:8
test fedora:42:
  extends:
  - .fdo.distribution-image@fedora
  - .libnice.fedora:42
  - .test
  needs:
  - build fedora:42
test valgrind centos:8:
  extends: test centos:8
  script:
  - meson configure build -Dgtk_doc=disabled
  - ninja -C build/
  - meson test -C build/ --setup valgrind --print-errorlogs
test valgrind fedora:42:
  extends: test fedora:42
  script:
  - meson configure build -Dgtk_doc=disabled
  - ninja -C build/
  - meson test -C build/ --setup valgrind --print-errorlogs
workflow:
  rules:
  - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  - if: $CI_COMMIT_BRANCH == "latest-release"
  - if: $CI_PIPELINE_SOURCE == "web"
