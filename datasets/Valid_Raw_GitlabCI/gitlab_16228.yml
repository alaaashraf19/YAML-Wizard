.gradle:
  artifacts: &id001
    paths:
    - app/build/outputs/
    - app/build/reports/
    when: always
  image: saraedum/android-sdk
buildAlpha:
  artifacts: *id001
  image: saraedum/android-sdk
  script:
  - for flavour in ${CI_FLAVOURS};do ./gradlew assemble${flavour}; done
  stage: build
cache:
  paths:
  - /root/.gradle/caches/
checkstyle:
  artifacts: *id001
  image: saraedum/android-sdk
  script:
  - ./gradlew checkstyle
  stage: check
instrumentationTest:
  artifacts: *id001
  image: saraedum/android-sdk
  script:
  - echo "no" | avdmanager create avd -n test -k "system-images;android-25;google_apis;x86"
    --tag google_apis
  - emulator64-x86 -avd test -no-window -no-boot-anim -noaudio -accel on &
  - /android-wait-for-emulator
  - for flavour in ${CI_FLAVOURS};do ./gradlew grantPermission${flavour} connected${flavour}AndroidTest;
    done
  stage: test
  tags:
  - kvm
  - vmx
lint:
  artifacts: *id001
  image: saraedum/android-sdk
  script:
  - for flavour in ${CI_FLAVOURS};do ./gradlew lint${flavour}; done
  stage: lint
stages:
- check
- build
- lint
- test
unitTest:
  artifacts: *id001
  image: saraedum/android-sdk
  script:
  - for flavour in ${CI_FLAVOURS};do ./gradlew test${flavour}UnitTest; done
  stage: test
variables:
  CI_FLAVOURS: AlphaWikipediaDebug AlphaWikivoyageDebug AlphaWikipediaRelease AlphaWikivoyageRelease
