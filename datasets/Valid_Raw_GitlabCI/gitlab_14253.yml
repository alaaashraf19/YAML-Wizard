production:
  before_script:
  - cd automation
  script:
  - ansible-playbook playbooks/deploy.yaml --tags update
  - sleep 15
  - netq check bgp
  - netq check evpn
  - netq check mtu
  stage: deploy
  tags:
  - production
stages:
- test
- deploy
staging:
  before_script:
  - cd automation
  script:
  - ansible-playbook playbooks/deploy.yaml --tags update
  - sleep 15
  - netq check bgp
  - netq check evpn
  - netq check mtu
  stage: test
  tags:
  - staging
