.shared_libs_test_base:
  before_script:
  - apt-get -q update
  - apt-get -y install cmake liblz4-dev libsnappy-dev
  script:
  - ./deps/rebar3 eunit
  variables:
    ERLANG_ROCKSDB_OPTS: -DWITH_LZ4=ON -DWITH_SNAPPY=ON
.test_base:
  before_script:
  - apt-get -q update
  - apt-get -y install cmake
  script:
  - ./deps/rebar3 eunit
  variables:
    ERLANG_ROCKSDB_OPTS: -DWITH_BUNDLE_LZ4=ON -DWITH_BUNDLE_SNAPPY=ON
erlang23:
  extends: .test_base
  image: erlang:23
erlang23_shared_libs:
  extends: .shared_libs_test_base
  image: erlang:23
erlang24:
  extends: .test_base
  image: erlang:24
erlang25:
  extends: .test_base
  image: erlang:25
