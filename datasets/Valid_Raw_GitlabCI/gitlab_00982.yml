build_apk:
  artifacts:
    paths:
    - app-debug.apk
  dependencies:
  - key_build
  - install_dependencies
  image: docker.io/aossie/react-native-ci:version1.3
  script:
  - mkdir -p android/app/src/main/assets
  - react-native bundle --platform android --dev false --entry-file index.js --bundle-output
    android/app/src/main/assets/index.android.bundle --assets-dest android/app/src/main/res
  - cd android && ./gradlew assembleDebug
  - cd ..
  - mv android/app/build/outputs/apk/debug/app-debug.apk app-debug.apk
  stage: build
  when: always
deploy_android:
  artifacts:
    paths:
    - app-release.apk
  dependencies:
  - key_build
  - install_dependencies
  image: docker.io/aossie/react-native-ci:version1.3
  script:
  - cd android && ./gradlew assembleRelease -PMYAPP_RELEASE_STORE_PASSWORD = "$RELEASE_STORE_PASSWORD"
    -PMYAPP_RELEASE_KEY_PASSWORD = "$RELEASE_KEY_PASSWORD"
  - cd ..
  - mv android/app/build/outputs/apk/release/app-release.apk app-release.apk
  stage: production_android
  when: always
image: node:6.10.3
install_dependencies:
  artifacts:
    paths:
    - node_modules/
  script:
  - npm install
  stage: install
key_build:
  artifacts:
    paths:
    - android/
    - src/
  script:
  - npm install -g envsub
  - bash createKeys-CI.sh
  stage: prebuild
  when: always
stages:
- install
- test
- prebuild
- build
- production_android
- production_iOS
unit_test:
  dependencies:
  - install_dependencies
  script:
  - npm test
  stage: test
  when: on_success
