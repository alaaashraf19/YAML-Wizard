package:archlinux:
  artifacts:
    expire_in: 1d
    paths:
    - archlinux/version*
  script:
  - pacman -Sy sudo git python-gitpython python-yaml python-docopt fakeroot systemd
    binutils python-setuptools --noconfirm
  - useradd -m -G users -s /bin/bash package
  - chown -R package:users archlinux
  - cd archlinux
  - sudo -H -u package makepkg -f
  stage: package
  tags:
  - archlinux
package:debian:
  artifacts:
    expire_in: 1d
    paths:
    - deb_dist/*.deb
  script:
  - apt-get update -qy
  - apt-get install -y python3-git python-all python3-stdeb git python3-docopt python3-yaml
    dh-python
  - rm -rf "./deb_dist"
  - python3 setup.py --command-packages=stdeb.command bdist_deb
  stage: package
  tags:
  - debian
repoupdate:
  before_script:
  - which ssh-agent || ( apt-get update -y && apt-get install openssh-client -y )
  - eval $(ssh-agent -s)
  - ssh-add <(echo "$SSH_PRIVATE_KEY")
  - mkdir -p ~/.ssh
  - '[[ -f /.dockerenv ]] && echo -e "Host *\n\tStrictHostKeyChecking no\n\n" > ~/.ssh/config'
  dependencies:
  - package:archlinux
  - package:debian
  only:
  - tags
  script:
  - ssh www-data@repository 'rm -rf /var/www/repository.salamek.cz/www/arch/pub/any/version*.pkg.tar.zst'
  - ssh www-data@repository 'rm -rf /var/www/repository.salamek.cz/cache/deb/pub/all/version*.deb'
  - scp archlinux/version*.pkg.tar.zst www-data@repository:/var/www/repository.salamek.cz/www/arch/pub/any
  - scp deb_dist/*.deb www-data@repository:/var/www/repository.salamek.cz/cache/deb/pub/all
  - ssh www-data@repository '/var/www/repository.salamek.cz/deb-pub-update.sh'
  - ssh www-data@repository '/var/www/repository.salamek.cz/arch-pub-update.sh'
  stage: deploy
  tags:
  - docker
  variables:
    GIT_STRATEGY: none
stages:
- test
- package
- deploy
test:archlinux:
  script:
  - pacman -Sy python-pip --noconfirm
  - pip install -r requirements.txt
  - python setup.py test
  stage: test
  tags:
  - archlinux
test:debian:
  script:
  - apt-get update -qy
  - apt-get install -y python3-pip
  - pip3 install -r requirements.txt
  - python3 setup.py test
  stage: test
  tags:
  - debian
