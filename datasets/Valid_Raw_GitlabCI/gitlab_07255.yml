before_script:
- npm install
cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
  - node_modules/
image: node:10.11.0
pages:
  artifacts:
    paths:
    - public
  only:
  - master
  script:
  - npm run build
  - mv build/* public/
  stage: deploy
stages:
- test
- deploy
tests:
  script:
  - npm run test
  stage: test
