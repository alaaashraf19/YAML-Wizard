.pytest:
  except: &id001
  - tags
  script: &id002
  - pip install -r requirements/dev.txt
  - pytest
  stage: test
build-public-docker-image:
  image: docker:latest
  only:
  - tags
  script:
  - if [ "$CI_PROJECT_NAMESPACE" != "attakei" ] ; then exit 0; fi
  - IMAGE_TAG=${CI_COMMIT_REF_NAME/\//-}
  - docker build -t attakei/yagura:$IMAGE_TAG .
  - docker build -t attakei/yagura:$IMAGE_TAG-mysqlclient --build-arg USE_MYSQLCLIENT=1
    .
  - echo $DOCKER_HUB_TOKEN | docker login -u attakei --password-stdin
  - docker push attakei/yagura
  services:
  - docker:dind
  stage: build-docker
build-testpypi-packages:
  only:
  - master
  - /^release\/.*$/
  script:
  - if [ "$CI_PROJECT_NAMESPACE" != "attakei" ] ; then exit 0; fi
  - bin/gen-pypirc
  - bin/gen-devver
  - pip install -r requirements/packaging.txt -r requirements.txt
  - apt-get update
  - apt-get install -y gettext
  - python manage.py compilemessages
  - python setup.py sdist bdist_wheel
  - twine upload -r testpypi dist/*
  stage: build-package
  variables:
    DJANGO_SETTINGS_MODULE: yagura.settings.base
flake8:
  except:
  - tags
  script:
  - pip install -r requirements/dev.txt
  - flake8
  stage: lint
image: python:3.6-slim
migration-test:
  allow_failure: true
  except:
  - tags
  script:
  - pip install yagura django-bulma
  - cp yagura/tests/migration_testing.py ./
  - ./manage.py migrate
  - pip uninstall -y yagura
  - pip install -e .
  - ./manage.py migrate
  stage: test
  variables:
    DJANGO_SETTINGS_MODULE: migration_testing
package-to-pypi:
  only:
  - tags
  script:
  - if [ "$CI_PROJECT_NAMESPACE" != "attakei" ] ; then exit 0; fi
  - bin/gen-pypirc
  - pip install -r requirements/packaging.txt -r requirements.txt
  - apt-get update
  - apt-get install -y gettext
  - python manage.py compilemessages
  - python setup.py sdist bdist_wheel
  - twine upload dist/*
  stage: build-package
  variables:
    DJANGO_SETTINGS_MODULE: yagura.settings.base
pytest-cp36:
  except: *id001
  image: python:3.6-slim
  script: *id002
  stage: test
pytest-cp37:
  except: *id001
  image: python:3.7-slim
  script: *id002
  stage: test
stages:
- lint
- test
- build-package
- build-docker
