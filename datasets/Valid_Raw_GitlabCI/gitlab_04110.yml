build_job:
  artifacts:
    expire_in: 1 week
    paths:
    - $env:EXE_RELEASE_FOLDER\YourApp.exe
    - $env:MSI_RELEASE_FOLDER\YourApp Setup.msi
    - $env:TEST_FOLDER\
  only:
  - tags
  script:
  - '& "$env:NUGET_PATH" restore'
  - '& "$env:MSBUILD_PATH" /p:Configuration=Release'
  stage: build
deploy_job:
  dependencies:
  - build_job
  - test_job
  only:
  - tags
  script:
  - $commitSubject = git log -1 --pretty=%s
  - $deployFolder = $($env:DEPLOY_FOLDER) + "\" + $($env:CI_BUILD_TAG) + " - " + $commitSubject
    + "\"
  - xcopy /y ".\$env:EXE_RELEASE_FOLDER\YourApp.exe" "$deployFolder"
  - xcopy /y ".\$env:MSI_RELEASE_FOLDER\YourApp Setup.msi" "$deployFolder"
  - xcopy /y ".\TestResult.xml" "$deployFolder"
  stage: deploy
stages:
- build
- test
- deploy
test_job:
  artifacts:
    expire_in: 1 week
    paths:
    - .\TestResult.xml
  dependencies:
  - build_job
  only:
  - tags
  script:
  - '& "$env:NUNIT_PATH" ".\$env:TEST_FOLDER\Tests.dll"'
  stage: test
variables:
  DEPLOY_FOLDER: P:\Projects\YourApp\Builds
  EXE_RELEASE_FOLDER: YourApp\bin\Release
  MSBUILD_PATH: C:\Program Files (x86)\MSBuild\14.0\Bin\msbuild.exe
  MSI_RELEASE_FOLDER: Setup\bin\Release
  NUGET_PATH: C:\NuGet\nuget.exe
  NUNIT_PATH: C:\Program Files (x86)\NUnit.org\nunit-console\nunit3-console.exe
  TEST_FOLDER: Tests\bin\Release
