.cache_python:
  cache:
    key: $CI_JOB_NAME-$CI_COMMIT_REF_SLUG
    paths:
    - $PIP_CACHE_DIR
  variables:
    FF_USE_FASTZIP: 1
    PIP_CACHE_DIR: $CI_PROJECT_DIR/.cache/pip
.test:
  rules:
  - changes:
    - musicpd.py
    - test.py
  - if: $CI_PIPELINE_SOURCE == "schedule"
  script:
  - python -m venv venv
  - source venv/bin/activate
  - pip install pytest-cov
  - py.test -q --cov=musicpd test.py
  stage: test
before_script:
- python -V
build:
  artifacts:
    expire_in: 1 week
    paths:
    - dist/*.*
  extends:
  - .cache_python
  image: python:$VERSION
  parallel:
    matrix:
    - VERSION:
      - '3.9'
      - '3.11'
      - '3.13'
  rules:
  - changes:
    - .gitlab-ci.yml
    - musicpd.py
    - test.py
    - MANIFEST.in
    - pyproject.toml
    if: $CI_PIPELINE_SOURCE == "push"
  - if: $CI_PIPELINE_SOURCE == "schedule"
  script:
  - python -m venv venv
  - source venv/bin/activate
  - pip install build
  - python3 -m build -s -w
  - pip install dist/*.whl
  - pip install twine
  - twine check dist/*
  stage: build
build_doc:
  rules:
  - changes:
    - doc/source/*
    if: $CI_PIPELINE_SOURCE == "push"
  - if: $CI_PIPELINE_SOURCE == "schedule"
  script:
  - pip install sphinx sphinx_rtd_theme
  - sphinx-build doc/source -b html ./html -D html_theme=sphinx_rtd_theme -E -W -n
    --keep-going
  stage: build
image: python:latest
pages:
  artifacts:
    paths:
    - public
  rules:
  - if: $CI_COMMIT_BRANCH == "master"
  script:
  - pip install sphinx sphinx_rtd_theme
  - sphinx-build -d ./build/doctrees doc/source -b html ./public -D html_theme=sphinx_rtd_theme
  stage: build
stages:
- test
- build
tag_release:
  artifacts:
    name: $CI_PROJECT_NAME-$CI_COMMIT_TAG
    paths:
    - dist/*.*
  extends:
  - .cache_python
  rules:
  - if: $CI_COMMIT_TAG
  script:
  - python -m venv venv
  - source venv/bin/activate
  - pip install build
  - python3 -m build -s -w
  stage: build
tests:
  extends:
  - .cache_python
  - .test
  image: python:$VERSION
  parallel:
    matrix:
    - VERSION:
      - '3.6'
      - '3.7'
      - '3.8'
      - '3.9'
      - '3.10'
      - '3.11'
      - '3.12'
      - '3.13'
