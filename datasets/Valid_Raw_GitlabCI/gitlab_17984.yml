build:
  artifacts:
    paths:
    - src/polygnome
  before_script:
  - apt-get update && apt-get -y install autoconf g++ make librtaudio-dev libstk-dev
    libgtkmm-3.0-dev
  cache:
    paths:
    - src/*.o
  script:
  - ./autogen.sh && ./configure && make && make check && make distcheck
  stage: build
default:
  image: ubuntu:oracular-20241120
