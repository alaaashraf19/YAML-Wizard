python36:
  allow_failure: true
  image: python:3.6
  script:
  - apt-get update -q -y
  - apt-get install -y  python3-dev python3-pip python3-setuptools
  - pip install -r requirements.txt
  - python3 setup.py install
  - superchaind start > /dev/null 2>&1 &
  - sleep 2
  - python3 setup.py test
  stage: python36
  when: always
stages:
- python36
