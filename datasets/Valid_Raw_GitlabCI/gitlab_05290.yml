before_script:
- ruby -v
- apt-get update -q && apt-get install nodejs -yqq
- gem install bundler  --no-ri --no-rdoc
- RAILS_ENV=test bundle install -j $(nproc) --path vendor
- RAILS_ENV=test bundle exec rails db:create db:schema:load
- RAILS_ENV=test bundle exec rails db:migrate
- RAILS_ENV=test bundle exec rails db:seed
cache:
  paths:
  - vendor/ruby
image: ruby:2.5.1
rails:
  script:
  - RAILS_ENV=test bundle exec rails test
  stage: test
rspec:
  script:
  - RAILS_ENV=test bundle exec rspec spec
  stage: test
rubocop:
  script:
  - RAILS_ENV=test bundle exec rubocop
  stage: test
services:
- postgres:latest
stages:
- build
- test
- deploy
variables:
  DATABASE_HOST: postgres
  DATABASE_NAME: $POSTGRES_DB
  DATABASE_PASSWORD: $POSTGRES_PASSWORD
  DATABASE_PORT: 5432
  DATABASE_USER: $POSTGRES_USER
  POSTGRES_DB: soul_medicine
  POSTGRES_PASSWORD: ''
  POSTGRES_USER: runner
  SECRET_KEY_BASE: d6ec6cfde5ba9ac3f3d7427b2c01e6a4a95015094ca1b1f3266b2ef69acb63c5e3eea74e7cca6444905755b8c10d1bc37a86f4e593261488e014f2c632c1f9b4
