before_script:
- docker info
build_laravel-ci:
  script:
  - docker build -t claystation/laravel-gitlab-ci-docker .
  - docker login -u ${docker_username} -p ${docker_password}
  - docker push claystation/laravel-gitlab-ci-docker
  stage: build_base
image: docker:latest
services:
- docker:dind
stages:
- build_base
variables:
  DOCKER_DRIVER: overlay2
