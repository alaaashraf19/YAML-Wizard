.only-default:
  only: &id001
  - master
  - branches
  - merge_requests
before_script:
- apt-get update && apt-get install redis-server -y
- redis-server --daemonize yes
- python -V
- pip install wheel tox
build-image:
  before_script: []
  image: docker:24.0
  rules:
  - if: $CI_COMMIT_TAG
    start_in: 10 minutes
    when: delayed
  script: 'CURRENT_DATE=$(echo $CI_COMMIT_TIMESTAMP | head -c 10 | tr -d -)

    IMAGE_TAG=$CI_REGISTRY_IMAGE/auth:$CURRENT_DATE-$CI_COMMIT_SHORT_SHA

    CURRENT_TAG=$CI_REGISTRY_IMAGE/auth:$CI_COMMIT_TAG

    MINOR_TAG=$CI_REGISTRY_IMAGE/auth:$(echo $CI_COMMIT_TAG | cut -d ''.'' -f 1-2)

    MAJOR_TAG=$CI_REGISTRY_IMAGE/auth:$(echo $CI_COMMIT_TAG | cut -d ''.'' -f 1)

    LATEST_TAG=$CI_REGISTRY_IMAGE/auth:latest


    docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY

    docker run --privileged --rm tonistiigi/binfmt --uninstall qemu-*

    docker run --privileged --rm tonistiigi/binfmt --install all

    docker buildx create --use --name new-builder

    docker buildx build . --tag $IMAGE_TAG --tag $CURRENT_TAG --tag $MINOR_TAG --tag
    $MAJOR_TAG --tag $LATEST_TAG --file docker/Dockerfile --platform linux/amd64,linux/arm64
    --push --build-arg AUTH_VERSION=$(echo $CI_COMMIT_TAG | cut -c 2-)

    '
  services:
  - docker:24.0-dind
  stage: docker
build-image-dev:
  before_script: []
  image: docker:24.0
  rules:
  - if: $CI_MERGE_REQUEST_SOURCE_BRANCH_NAME == ""
    when: manual
  - if: $CI_MERGE_REQUEST_SOURCE_BRANCH_NAME != ""
    when: never
  script: 'CURRENT_DATE=$(echo $CI_COMMIT_TIMESTAMP | head -c 10 | tr -d -)

    IMAGE_TAG=$CI_REGISTRY_IMAGE/auth:$CURRENT_DATE-$CI_COMMIT_BRANCH-$CI_COMMIT_SHORT_SHA


    docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY

    docker run --privileged --rm tonistiigi/binfmt --uninstall qemu-*

    docker run --privileged --rm tonistiigi/binfmt --install all

    docker buildx create --use --name new-builder

    docker buildx build . --tag $IMAGE_TAG --file docker/Dockerfile --platform linux/amd64,linux/arm64
    --push --build-arg AUTH_PACKAGE=git+https://gitlab.com/allianceauth/allianceauth@$CI_COMMIT_BRANCH

    '
  services:
  - docker:24.0-dind
  stage: docker
build-image-mr:
  before_script: []
  image: docker:24.0
  rules:
  - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    when: manual
  - if: $CI_PIPELINE_SOURCE != "merge_request_event"
    when: never
  script: 'CURRENT_DATE=$(echo $CI_COMMIT_TIMESTAMP | head -c 10 | tr -d -)

    IMAGE_TAG=$CI_REGISTRY_IMAGE/auth:$CURRENT_DATE-$CI_MERGE_REQUEST_SOURCE_BRANCH_NAME-$CI_COMMIT_SHORT_SHA


    docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY

    docker run --privileged --rm tonistiigi/binfmt --uninstall qemu-*

    docker run --privileged --rm tonistiigi/binfmt --install all

    docker buildx create --use --name new-builder

    docker buildx build . --tag $IMAGE_TAG --file docker/Dockerfile --platform linux/amd64,linux/arm64
    --push --build-arg AUTH_PACKAGE=git+$CI_MERGE_REQUEST_SOURCE_PROJECT_URL@$CI_MERGE_REQUEST_SOURCE_BRANCH_NAME

    '
  services:
  - docker:24.0-dind
  stage: docker
build-test:
  artifacts:
    expire_in: 1 year
    name: $CI_JOB_NAME-$CI_COMMIT_REF_SLUG
    paths:
    - dist/*
    when: always
  before_script:
  - python -m pip install --upgrade pip
  - python -m pip install --upgrade build
  - python -m pip install --upgrade setuptools wheel
  image: python:3.11-trixie
  script:
  - python -m build
  stage: test
dependency_scanning:
  before_script:
  - apt-get update && apt-get install redis-server libmariadb-dev -y
  - redis-server --daemonize yes
  - python -V
  - pip install wheel tox
  stage: gitlab
deploy_production:
  before_script:
  - python -m pip install --upgrade pip
  - python -m pip install --upgrade build
  - python -m pip install --upgrade setuptools wheel twine
  image: python:3.11-trixie
  rules:
  - if: $CI_COMMIT_TAG
  script:
  - python -m build
  - python -m twine upload dist/*
  stage: deploy
include:
- template: Dependency-Scanning.gitlab-ci.yml
- template: Security/SAST.gitlab-ci.yml
- template: Security/Secret-Detection.gitlab-ci.yml
pre-commit-check:
  image: python:3.11-trixie
  only: *id001
  script:
  - pip install pre-commit
  - pre-commit run --all-files
  stage: pre-commit
sast:
  before_script: []
  stage: gitlab
secret_detection:
  before_script: []
  stage: gitlab
stages:
- pre-commit
- gitlab
- test
- deploy
- docker
test-3.10-all:
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    when: always
  image: python:3.10-trixie
  only: *id001
  script:
  - tox -e py310-all
