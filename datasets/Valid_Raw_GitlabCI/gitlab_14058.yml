.keepalived_template:
  script: &id001
  - RU_ENV_IMAGE=${CI_JOB_NAME/*_/} tests/bash_unit tests/tests_keepalived_${CI_JOB_NAME/_*/}
before_script:
- apk add py-dnspython
- apk add ipvsadm
cluster_debian8:
  script: *id001
cluster_debian9:
  script: *id001
image: registry.gitlab.com/role_unit/role_unit_containers:build
services:
- docker:dind
single_debian8:
  script: *id001
single_debian9:
  script: *id001
syntax_debian8:
  script: *id001
syntax_debian9:
  script: *id001
variables:
  DEBIAN_FRONTEND: noninteractive
  DOCKER_DRIVER: overlay2
