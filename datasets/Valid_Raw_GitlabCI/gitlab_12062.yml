1.26.0:
  image: rust:1.26.0
  script: cargo test --all
1.27.0:
  image: rust:1.27.0
  script: cargo test --all
1.28.0:
  image: rust:1.28.0
  script: cargo test --all
before_script:
- cd hardware-simulator
- rustc --version && cargo --version && rustup --version
beta:
  before_script:
  - cd hardware-simulator
  - rustup default beta
  - rustc --version && cargo --version && rustup --version
  image: rust:slim
  script: cargo test --all
cache:
  paths:
  - '*/target/'
  - $HOME/.cargo/
clippy:
  before_script:
  - cd hardware-simulator
  - rustup default nightly
  - rustup component add clippy-preview
  - rustc --version && cargo --version && rustup --version
  image: rust:slim
  script: cargo clippy
latest:
  image: rust:slim
  script: cargo test --all
nightly:
  allow_failure: true
  before_script:
  - cd hardware-simulator
  - rustup default nightly
  - rustc --version && cargo --version && rustup --version
  image: rust:slim
  script: cargo test --all
