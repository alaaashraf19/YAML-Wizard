after_script:
- rm -f "$GRADLE_USER_HOME/caches/**/"{*.lock,gc.properties}
- find "$GRADLE_USER_HOME/caches/" -type d -empty -delete
- sha256sum /usr/bin/gradle > gradle_checksum.txt
before_script:
- if [[ ! -f gradle_checksum.txt || $(sha256sum /usr/bin/gradle) != $(cat gradle_checksum.txt)
  ]]; then
- rm -rf $GRADLE_USER_HOME/caches/ .gradle/*.*/
- fi
- mkdir -p "$KONAN_DEPS_CACHE" "$KONAN_DATA_DIR/dependencies/"
- for DEP in $KONAN_DEPS; do
- if [ ! -f "$KONAN_DEPS_CACHE/$DEP.tar.gz" ]; then
- wget -nv "https://download.jetbrains.com/kotlin/native/$DEP.tar.gz" -P "$KONAN_DEPS_CACHE"
- fi
- tar -xzf "$KONAN_DEPS_CACHE/$DEP.tar.gz" -C "$KONAN_DATA_DIR/dependencies/"
- echo "$DEP" >> "$KONAN_DATA_DIR/dependencies/.extracted"
- done
build:
  cache:
    key: one-key-to-rule-them-all
    paths: &id001
    - $GRADLE_USER_HOME/caches/modules-*/{files,metadata}-*/
    - $GRADLE_USER_HOME/caches/*.*/{file-changes,fileHashes,generated-gradle-jars,gradle-kotlin-dsl,gradle-kotlin-dsl-accessors}/
    - $GRADLE_USER_HOME/caches/{build-cache,jars}-*/
    - $KONAN_DEPS_CACHE/
    - .gradle/{*.*,buildOutputCleanup}/
    - ./**/build/{classes,bin,libs}/
    - gradle_checksum.txt
    policy: pull-push
  script: gradle allTests
  stage: build
cache:
  key: one-key-to-rule-them-all
  paths: *id001
  policy: pull
deploy-release:
  dependencies:
  - build
  environment:
    name: deploy-release
  only:
    refs:
    - release
  script: gradle publishAllPublicationsToPublicRepository
  stage: deploy
  when: manual
deploy-snapshot:
  dependencies:
  - build
  environment:
    name: deploy-snapshot
  only:
    refs:
    - master
  script: gradle publishAllPublicationsToSnapshotRepository
  stage: deploy
  variables:
    SNAPSHOT_VERSION: dev-$CI_COMMIT_SHORT_SHA
image: registry.gitlab.com/serebit/strife
pages:
  artifacts:
    paths:
    - public
  dependencies:
  - build
  environment:
    name: deploy-pages
  only:
    refs:
    - release
  script: gradle dokkaHtml
  stage: deploy
  when: manual
variables:
  GRADLE_OPTS: -Dorg.gradle.daemon=false
  GRADLE_USER_HOME: $CI_PROJECT_DIR/.gradle_home
  KONAN_DATA_DIR: $CI_PROJECT_DIR/.konan_home
  KONAN_DEPS: clang-llvm-8.0.0-linux-x86-64 libffi-3.2.1-2-linux-x86-64 target-gcc-toolchain-3-linux-x86-64
    lldb-2-linux
  KONAN_DEPS_CACHE: $CI_PROJECT_DIR/.konan_deps
