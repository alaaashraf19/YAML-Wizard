analytics:
  provider: false
atom_feed:
  path: null
author:
  avatar: /assets/images/logo.png
  bio: We are a grass-roots movement of Machine Learning practitioners in Dresden,
    Germany.
  location: Dresden, Germany
  name: mlcdresden
baseurl: /pages
category_archive:
  path: /categories/
  type: liquid
collections:
  docs:
    output: true
    permalink: /:collection/:path/
  pets:
    output: true
    permalink: /:collection/:path/
  portfolio:
    output: true
    permalink: /:collection/:path/
  recipes:
    output: true
    permalink: /:collection/:path/
comments:
  discourse:
    server: null
  disqus:
    shortname: null
  facebook:
    appid: null
    colorscheme: null
    num_posts: null
  provider: 'false'
  utterances:
    issue_term: null
    theme: null
compress_html:
  clippings: all
  ignore:
    envs: development
defaults:
- scope:
    path: ''
    type: posts
  values:
    author_profile: false
    comments: false
    layout: single
    read_time: true
    related: true
    share: true
    show_date: true
- scope:
    path: ''
    type: pages
  values:
    author_profile: true
    layout: single
- scope:
    path: ''
    type: docs
  values:
    author_profile: false
    comments: false
    layout: single
    read_time: false
    share: false
    sidebar:
      nav: docs
- scope:
    path: ''
    type: recipes
  values:
    author_profile: true
    comments: true
    layout: single
    share: true
- scope:
    path: ''
    type: pets
  values:
    author_profile: true
    comment: true
    layout: single
    share: true
- scope:
    path: ''
    type: portfolio
  values:
    author_profile: false
    layout: single
    share: true
description: We are a grass-roots movement of Machine Learning practitioners in Dresden,
  Germany.
email: mlc@mailbox.tu-dresden.de
encoding: utf-8
excerpt_separator: '


  '
exclude:
- '*.sublime-project'
- '*.sublime-workspace'
- vendor
- .asset-cache
- .bundle
- .jekyll-assets-cache
- .sass-cache
- assets/js/plugins
- assets/js/_main.js
- assets/js/vendor
- Capfile
- CHANGELOG
- config
- Gemfile
- Gruntfile.js
- gulpfile.js
- LICENSE
- log
- node_modules
- package.json
- Rakefile
- README
- tmp
footer:
  links:
  - icon: fab fa-fw fa-gitlab
    label: GitLab
    url: https://gitlab.com/mlcdresden
gitlab_username: mlcdresden
highlighter: rouge
include:
- .htaccess
- _pages
incremental: false
keep_files:
- .git
kramdown:
  auto_ids: true
  enable_coderay: false
  entity_output: as_char
  footnote_nr: 1
  hard_wrap: false
  input: GFM
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  toc_levels: 1..6
locale: en-US
logo: /assets/images/logo.png
lsi: false
markdown: kramdown
markdown_ext: markdown,mkdown,mkdn,mkd,md
masthead_title: null
minimal_mistakes_skin: default
name: mlcdresden
og_image: /assets/images/logo.png
paginate: 6
paginate_path: /page:num/
permalink: /:categories/:title/
plugins:
- jekyll-paginate
- jekyll-sitemap
- jekyll-gist
- jekyll-feed
- jemoji
- jekyll-include-cache
reCaptcha:
  secret: null
  siteKey: null
remote_theme: mmistakes/minimal-mistakes@4.22.0
repository: mmistakes/minimal-mistakes
sass:
  sass_dir: _sass
  style: compressed
search: true
search_full_content: true
search_provider: lunr
subtitle: For ML enthusiasts by ML enthusiasts
tag_archive:
  path: /tags/
  type: liquid
teaser: /assets/images/800x-mlc-background.jpg
timezone: Europe/Berlin
title: MLC - Machine Learning Community Dresden
title_separator: '-'
twitter:
  username: mmistakes
url: https://mlcdresden.gitlab.io
whitelist:
- jekyll-paginate
- jekyll-sitemap
- jekyll-gist
- jekyll-feed
- jemoji
- jekyll-include-cache
words_per_minute: 200
