cache:
  paths:
  - .cache
image: python:3
include:
- local: .gitlab/gitlab-templates.yml
- local: .gitlab/pylint.yml
- template: Jobs/SAST.gitlab-ci.yml
smoketest:
  artifacts:
    expire_in: 1 hour
    paths:
    - dist/*.whl
    - dist/*.tar.gz
    - dist/*.zip
    - ./mpd-sima.pid
    - ./mpd-sima.log
  script:
  - pip install requests python-musicpd sphinx
  - python setup.py test
  - python setup.py bdist_wheel sdist
  - sphinx-build -d ./build/doctrees doc/source -b man ./build/man/
  - sphinx-build -d ./build/doctrees doc/source -b html ./build/html/
  - pip install dist/*.whl
  - mpd-sima --help
  - TRACE=y ./mpd-sima -d --pid ./mpd-sima.pid -l ./mpd-sima.log
  - sleep 10
  - test -f ./mpd-sima.pid && kill $(cat ./mpd-sima.pid)
  stage: test
stages:
- test
- build
tag_release:
  artifacts:
    name: $CI_PROJECT_NAME-$CI_COMMIT_TAG
    paths:
    - dist/*.whl
    - dist/*.tar.gz
    - dist/*.zip
  cache: {}
  dependencies:
  - smoketest
  only:
  - tags
  script:
  - python -V
  stage: build
unittests:
  artifacts:
    reports:
      junit: report.xml
    when: always
  coverage: /(?i)total.*? (100(?:\.0+)?\%|[1-9]?\d(?:\.\d+)?\%)$/
  script:
  - pip install pytest-cov requests python-musicpd
  - py.test -q --cov=sima --junitxml=report.xml tests
  stage: test
variables:
  PIP_CACHE_DIR: $CI_PROJECT_DIR/.cache
  SAST_EXCLUDED_ANALYZERS: brakeman, flawfinder, kubesec, mobsf, nodejs-scan, phpcs-security-audit,
    pmd-apex, sobelow, spotbugs
