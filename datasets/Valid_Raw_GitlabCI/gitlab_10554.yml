build page:
  artifacts:
    paths:
    - dist
  image: node:8.1.3
  only:
  - master
  script:
  - npm i --progress=false
  - npm run build
  stage: build
pages:
  artifacts:
    paths:
    - public
  only:
  - master
  script:
  - mkdir .public
  - cp -r dist/* .public
  - mv .public public
  stage: deploy
