.release:
  script:
  - sed -i "s|{VERSION}|$(echo ${CI_COMMIT_TAG:-0a${CI_JOB_ID}} | tr -d 'v')|g" setup.py
    async_thumbnail/__init__.py
  - python setup.py sdist
  - twine upload dist/*
  stage: release
.test-run:
  after_script:
  - docker-compose -p ci${CI_JOB_ID} rm -f -v python
  artifacts:
    expire_in: 1 day
    paths:
    - coverage/
  script:
  - sed -i '/volumes:/d' docker-compose.yml
  - sed -i '/- .:\/package/d' docker-compose.yml
  - docker-compose -p ci${CI_JOB_ID} build --pull --build-arg PYTHON_VERSION --build-arg
    PIP_DJANGO python
  - docker-compose -p ci${CI_JOB_ID} up --no-start python
  - docker cp . ci${CI_JOB_ID}_python_1:/package
  - docker start -a ci${CI_JOB_ID}_python_1
  - docker cp ci${CI_JOB_ID}_python_1:/package/coverage .
  stage: test
  tags:
  - docker
