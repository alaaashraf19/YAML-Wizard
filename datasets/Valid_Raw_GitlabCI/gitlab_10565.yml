.fedora.latest.template:
  before_script: &id001
  - dnf install -y GeoIP-devel libmaxminddb-devel make meson ninja-build gcc libasan
    geolite2-{city,country} rubygem-ronn
  image: fedora:38
  tags: &id002
  - saas-linux-small-amd64
fedora.dyn_geoip:
  before_script: *id001
  image: fedora:38
  script:
  - meson setup build -Duse_maxminddb=disabled -Duse_geoip=enabled -Duse_runtime_linking=enabled
    --buildtype=plain -Dc_args="-O2 -g -Werror"
  - ninja -C build
  - ninja -C build test
  - USE_GEOIP=yes USE_RUNTIME_LINKING=yes USE_MAXMIND=no CFLAGS="-O2 -g -Werror" make
  stage: generate
  tags: *id002
fedora.dyn_maxmind:
  before_script: *id001
  image: fedora:38
  script:
  - meson setup build -Duse_maxminddb=enabled -Duse_geoip=disabled -Duse_runtime_linking=enabled
    --buildtype=plain -Dc_args="-O2 -g -Werror"
  - ninja -C build
  - ninja -C build test
  - USE_GEOIP=no USE_RUNTIME_LINKING=yes USE_MAXMIND=yes CFLAGS="-O2 -g -Werror" make
  stage: generate
  tags: *id002
fedora.dyn_maxmind_with_asan:
  before_script: *id001
  image: fedora:38
  script:
  - export ASAN_OPTIONS="detect_leaks=0"
  - meson setup build -Db_sanitize=address -Dwerror=true
  - ninja -C build test
  - ./build/ipcalc -g 217.31.205.50
  stage: generate
  tags: *id002
fedora.geoip:
  before_script: *id001
  image: fedora:38
  script:
  - meson setup build -Duse_maxminddb=disabled -Duse_geoip=enabled -Duse_runtime_linking=disabled
    --buildtype=plain -Dc_args="-O2 -g -Werror"
  - ninja -C build
  - ninja -C build test
  - USE_GEOIP=yes USE_RUNTIME_LINKING=no USE_MAXMIND=no CFLAGS="-O2 -g -Werror" make
  stage: generate
  tags: *id002
fedora.maxmind:
  before_script: *id001
  image: fedora:38
  script:
  - meson setup build -Duse_maxminddb=enabled -Duse_geoip=disabled -Duse_runtime_linking=disabled
    --buildtype=plain -Dc_args="-O2 -g -Werror"
  - ninja -C build
  - ninja -C build test
  - USE_GEOIP=no USE_RUNTIME_LINKING=no USE_MAXMIND=yes CFLAGS="-O2 -g -Werror" make
  stage: generate
  tags: *id002
fedora.nogeo:
  before_script: *id001
  image: fedora:38
  script:
  - meson setup build -Duse_maxminddb=disabled -Duse_geoip=disabled --buildtype=plain
    -Dc_args="-O2 -g -Werror"
  - ninja -C build
  - ninja -C build test
  - USE_MAXMIND=no USE_GEOIP=no USE_RUNTIME_LINKING=no CFLAGS="-O2 -g -Werror" make
  stage: generate
  tags: *id002
pages:
  artifacts:
    paths:
    - public
    when: on_success
  before_script: *id001
  coverage: '/coverage lines: \d+\.\d+/'
  image: fedora:38
  only:
  - master
  script:
  - dnf install -y lcov
  - meson setup build -Db_coverage=true -Duse_maxminddb=enabled -Duse_geoip=disabled
    -Duse_runtime_linking=enabled --buildtype=plain -Dc_args="-Og -g -Werror"
  - ninja -C build
  - ninja -C build test
  - ninja -C build coverage-html && mv build/meson-logs/coveragereport public
  - tests/run-coverage.sh
  stage: deploy
  tags: *id002
pages-test:
  before_script: *id001
  except:
  - master
  image: fedora:38
  script:
  - dnf install -y lcov
  - meson setup build -Db_coverage=true -Duse_maxminddb=enabled -Duse_geoip=disabled
    -Duse_runtime_linking=enabled --buildtype=plain -Dc_args="-Og -g -Werror"
  - ninja -C build
  - ninja -C build test
  - ninja -C build coverage-html && mv build/meson-logs/coveragereport public
  - tests/run-coverage.sh
  stage: deploy
  tags: *id002
stages:
- generate
- deploy
