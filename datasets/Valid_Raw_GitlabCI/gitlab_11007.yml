before_script:
- julia --version
- echo $TRAVIS_BRANCH
- echo $TRAVIS_PULL_REQUEST
- echo $TRAVIS_REPO_SLUG
- echo $TRAVIS_OS_NAME
- echo $TRAVIS_JULIA_VERSION
image: julia:1.10
pages:
  artifacts:
    paths:
    - public
  script:
  - julia --project=doc --check-bounds=yes --color=yes -e 'include("doc/make.jl")'
  - mv doc/build public
  stage: deploy
