build:
  before_script:
  - apk --update add make nodejs-npm
  image: clojure:tools-deps-1.9.0.391-alpine
  script:
  - make compile
  stage: build-and-test
  tags:
  - docker
cache:
  paths:
  - .m2/repository
release:
  artifacts:
    paths:
    - pom.xml
  before_script:
  - apk --update add make
  image: maven:3-jdk-8-alpine
  only:
  - tags
  script:
  - export RELEASE_VERSION=$(if [[ "${CI_COMMIT_TAG}" = v* ]]; then echo "${CI_COMMIT_TAG#v}";else
    echo "${CI_COMMIT_TAG#pre}-SNAPSHOT";fi)
  - echo "Releasing ${RELEASE_VERSION}"
  - make mvn-deploy version="${RELEASE_VERSION}" tag="${CI_COMMIT_TAG}"
  stage: release
  tags:
  - docker
  variables:
    MAVEN_CLI_OPTS: -s .m2/settings.xml --batch-mode
    MAVEN_OPTS: -Dmaven.repo.local=.m2/repository
stages:
- build-and-test
- release
test:
  before_script:
  - apk --update add make nodejs-npm yarn
  - yarn add websocket
  image: clojure:tools-deps-1.9.0.391-alpine
  script:
  - make test
  stage: build-and-test
  tags:
  - docker
variables:
  CLJ_CONFIG: ./config/ci
  GIT_SUBMODULE_STRATEGY: recursive
