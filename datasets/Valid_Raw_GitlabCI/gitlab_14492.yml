build-oss-fuzz:
  extends: .native_build_job_template
  needs:
    job: amd64-fedora-container
  script:
  - mkdir build-oss-fuzz
  - export LSAN_OPTIONS=suppressions=scripts/oss-fuzz/lsan_suppressions.txt
  - CC="clang" CXX="clang++" CFLAGS="-fsanitize=address" ./scripts/oss-fuzz/build.sh
  - export ASAN_OPTIONS="fast_unwind_on_malloc=0"
  - failures=0
  - for fuzzer in $(find ./build-oss-fuzz/DEST_DIR/ -executable -type f | grep -v
    slirp); do grep "LLVMFuzzerTestOneInput" ${fuzzer} > /dev/null 2>&1 || continue
    ; echo Testing ${fuzzer} ... ; "${fuzzer}" -runs=1 -seed=1 || { echo "FAILED:""
    ${fuzzer} exit code is $?"; failures=$(($failures+1)); }; done
  - echo "Number of failures:"" $failures"
  - test $failures = 0
  variables:
    IMAGE: fedora
build-previous-qemu:
  after_script:
  - mv build build-previous
  artifacts:
    exclude:
    - build-previous/**/*.p
    - build-previous/**/*.a.p
    - build-previous/**/*.c.o
    - build-previous/**/*.c.o.d
    expire_in: 2 days
    paths:
    - build-previous
    when: on_success
  before_script:
  - source scripts/ci/gitlab-ci-section
  - export QEMU_PREV_VERSION="$(sed 's/\([0-9.]*\)\.[0-9]*/v\1.0/' VERSION)"
  - git remote add upstream https://gitlab.com/qemu-project/qemu
  - git fetch upstream refs/tags/$QEMU_PREV_VERSION:refs/tags/$QEMU_PREV_VERSION
  - git checkout $QEMU_PREV_VERSION
  extends: .native_build_job_template
  needs:
    job: amd64-opensuse-leap-container
  variables:
    GIT_FETCH_EXTRA_FLAGS: --prune --quiet
    IMAGE: opensuse-leap
    TARGETS: x86_64-softmmu aarch64-softmmu
