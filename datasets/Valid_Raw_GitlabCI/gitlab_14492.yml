coverity:
  allow_failure: true
  before_script:
  - dnf install -y curl wget
  image: $CI_REGISTRY_IMAGE/qemu/fedora:$QEMU_CI_CONTAINER_TAG
  needs:
  - job: amd64-fedora-container
    optional: true
  rules:
  - if: $COVERITY_TOKEN == null
    when: never
  - if: $COVERITY_EMAIL == null
    when: never
  - if: $CI_PROJECT_NAMESPACE == $QEMU_CI_UPSTREAM && $CI_PIPELINE_SOURCE == "schedule"
    when: on_success
  - if: $CI_PROJECT_NAMESPACE == $QEMU_CI_UPSTREAM
    when: never
  - if: $QEMU_CI != "1" && $QEMU_CI != "2"
    when: never
  - when: manual
  script:
  - scripts/coverity-scan/run-coverity-scan --check-upload-only || { exitcode=$?;
    if test $exitcode = 1; then exit 0; else exit $exitcode; fi; }; scripts/coverity-scan/run-coverity-scan
    --update-tools-only > update-tools.log 2>&1 || { cat update-tools.log; exit 1;
    }; scripts/coverity-scan/run-coverity-scan --no-update-tools
  stage: build
  timeout: 3h
crash-test-debian:
  extends: .native_test_job_template
  needs:
  - artifacts: true
    job: build-system-debian
  script:
  - cd build
  - make NINJA=":" check-venv
  - pyvenv/bin/python3 scripts/device-crash-test -q --tcg-only ./qemu-system-i386
