.migration-compat-common:
  allow_failure: true
  extends: .common_test_job_template
  needs:
  - job: build-previous-qemu
  - job: build-system-opensuse
  script:
  - cd build-previous
  - unset PYTHON
  - QTEST_QEMU_BINARY_SRC=./qemu-system-${TARGET} QTEST_QEMU_BINARY=../build/qemu-system-${TARGET}
    ./tests/qtest/migration-test
  - QTEST_QEMU_BINARY_DST=./qemu-system-${TARGET} QTEST_QEMU_BINARY=../build/qemu-system-${TARGET}
    ./tests/qtest/migration-test
  variables:
    IMAGE: opensuse-leap
    MAKE_CHECK_ARGS: check-build
build-cfi-aarch64:
  extends:
  - .native_build_job_template
  - .native_build_artifact_template
  needs:
  - job: amd64-fedora-container
  timeout: 90m
  variables:
    AR: llvm-ar
    CONFIGURE_ARGS: --cc=clang --cxx=clang++ --enable-cfi --enable-cfi-debug --enable-safe-stack
      --disable-slirp
    IMAGE: fedora
