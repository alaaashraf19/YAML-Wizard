  needs:
    job: amd64-centos9-container
  script:
  - mkdir build
  - cd build
  - ../configure --disable-tcg --audio-drv-list="" --with-coroutine=ucontext --disable-docs
    --disable-sdl --disable-gtk --disable-vnc || { cat config.log meson-logs/meson-log.txt
    && exit 1; }
  - make -j"$JOBS"
  - make check-unit
  - make check-qapi-schema
  - cd tests/qemu-iotests/
  - ./check -raw 001 002 003 004 005 008 009 010 011 012 021 025 032 033 048 052 063
    077 086 101 104 106 113 148 150 151 152 157 159 160 163 170 171 184 192 194 208
    221 226 227 236 253 277 image-fleecing
  - ./check -qcow2 028 051 056 057 058 065 068 082 085 091 095 096 102 122 124 132
    139 142 144 145 151 152 155 157 165 194 196 200 202 208 209 216 218 227 234 246
    247 248 250 254 255 257 258 260 261 262 263 264 270 272 273 277 279 image-fleecing
  - cd ../..
  - make distclean
  variables:
    IMAGE: centos9
build-tci:
  extends: .native_build_job_template
  needs:
    job: amd64-debian-user-cross-container
  script:
  - TARGETS="aarch64 arm hppa m68k microblaze ppc64 s390x x86_64"
  - mkdir build
  - cd build
  - ../configure --enable-tcg-interpreter --disable-kvm --disable-docs --disable-gtk
    --disable-vnc --target-list="$(for tg in $TARGETS; do echo -n ${tg}'-softmmu ';
    done)" || { cat config.log meson-logs/meson-log.txt && exit 1; }
  - make -j"$JOBS"
  - make tests/qtest/boot-serial-test tests/qtest/cdrom-test tests/qtest/pxe-test
  - for tg in $TARGETS ; do export QTEST_QEMU_BINARY="./qemu-system-${tg}" ; ./tests/qtest/boot-serial-test
    || exit 1 ; ./tests/qtest/cdrom-test || exit 1 ; done
  - QTEST_QEMU_BINARY="./qemu-system-x86_64" ./tests/qtest/pxe-test
  - QTEST_QEMU_BINARY="./qemu-system-s390x" ./tests/qtest/pxe-test -m slow
