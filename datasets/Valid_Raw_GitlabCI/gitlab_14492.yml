gcov:
  after_script:
  - cd build
  - gcovr --xml-pretty --exclude-unreachable-branches --print-summary -o coverage.xml
    --root ${CI_PROJECT_DIR} . *.p
  artifacts:
    expire_in: 2 days
    name: ${CI_JOB_NAME}-${CI_COMMIT_REF_NAME}-${CI_COMMIT_SHA}
    paths:
    - build/meson-logs/testlog.txt
    reports:
      coverage_report:
        coverage_format: cobertura
        path: build/coverage.xml
      junit: build/meson-logs/testlog.junit.xml
    when: always
  coverage: /^\s*lines:\s*\d+.\d+\%/
  extends: .native_build_job_template
  needs:
    job: amd64-ubuntu2204-container
  timeout: 80m
  variables:
    CONFIGURE_ARGS: --enable-gcov
    IMAGE: ubuntu2204
    MAKE_CHECK_ARGS: check-unit check-softfloat
    TARGETS: aarch64-softmmu ppc64-softmmu s390x-softmmu x86_64-softmmu
include:
- local: /.gitlab-ci.d/buildtest-template.yml
migration-compat-aarch64:
  extends: .migration-compat-common
  variables:
    QEMU_JOB_SKIPPED: 1
    TARGET: aarch64
migration-compat-x86_64:
  extends: .migration-compat-common
  variables:
    TARGET: x86_64
pages:
  artifacts:
    paths:
    - public
    when: on_success
  extends: .base_job_template
  image: $CI_REGISTRY_IMAGE/qemu/debian:$QEMU_CI_CONTAINER_TAG
  needs:
  - job: build-tools-and-docs-debian
  script:
  - mkdir -p public
  - make gtags
  - CI_COMMIT_MESSAGE= CI_COMMIT_TAG_MESSAGE= htags -anT --tree-view=filetree -m qemu_init
    -t "Welcome to the QEMU sourcecode"
  - mv HTML public/src
  - make -C build install DESTDIR=$(pwd)/temp-install
  - mv temp-install/usr/local/share/doc/qemu/* public/
  stage: test
  variables:
    QEMU_JOB_PUBLISH: 1
tsan-build:
  extends: .native_build_job_template
  needs:
    job: amd64-ubuntu2204-container
  variables:
    CONFIGURE_ARGS: --enable-tsan --cc=clang --cxx=clang++ --enable-trace-backends=ust
      --disable-slirp
    IMAGE: ubuntu2204
    MAKE: setarch -R make
    TARGETS: x86_64-softmmu ppc64-softmmu riscv64-softmmu x86_64-linux-user
