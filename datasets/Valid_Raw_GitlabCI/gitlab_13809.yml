build:
  image: registry.gitlab.com/offa/docker-images/${COMPILER}:${VERSION}
  parallel:
    matrix:
    - COMPILER: gcc
      VERSION:
      - 15
      - 14
    - COMPILER: clang
      VERSION:
      - 21
      - 20
  script:
  - script/ci_setup.sh
  - script/ci_build.sh -asan -ubsan
coverage:
  coverage: /^\s*lines:\s*\d+.\d+\%/
  image: registry.gitlab.com/offa/docker-images/gcc:15
  script:
  - script/ci_setup.sh
  - script/ci_build.sh -cov
formatting:
  before_script:
  - apk add --no-cache git
  - git clone --depth=1 https://github.com/DoozyX/clang-format-lint-action.git
  - docker build -t clang-format-lint clang-format-lint-action
  image: docker:latest
  script:
  - docker run --rm --workdir /src -v ${PWD}:/src clang-format-lint --clang-format-executable
    /clang-format/clang-format${CLANGFORMAT_VERSION} -r --exclude .git .
  services:
  - docker:dind
  variables:
    CLANGFORMAT_VERSION: 19
variables:
  GTEST_COLOR: 'yes'
