before_script:
- export NPM_API_KEY=$NPM_API_KEY
- echo "//registry.npmjs.org/:_authToken=$NPM_API_KEY" > ~/.npmrc
build:
  artifacts:
    expire_in: 1 weeks
    paths:
    - dist/
    when: on_success
  image: node:latest
  script:
  - npm run build
  stage: build
npm_publish:
  image: node:latest
  script:
  - npm publish
  stage: npm_publish
  when: manual
stages:
- unit_testing
- build
- npm_publish
unit_testing:
  artifacts:
    expire_in: 1 weeks
    paths:
    - node_modules/
    when: on_success
  image: node:latest
  script:
  - npm install
  - npm test
  stage: unit_testing
