lint:
  allow_failure: true
  image: golang
  script:
  - go get github.com/golang/lint/golint
  - golint -set_exit_status ./...
  stage: vetting
production:
  environment:
    name: Production
    url: https://gitlab-heroku-deploy-prod.herokuapp.com/
  only:
  - master
  script:
  - apt-get update -qy
  - apt-get install -y ruby-dev
  - gem install dpl
  - dpl --provider=heroku --app=gitlab-heroku-deploy-prod --api-key=$HEROKU_API_KEY
  stage: deploy
  when: manual
stages:
- vetting
- tests
- deploy
staging:
  environment:
    name: Staging
    url: https://gitlab-heroku-deploy-staging.herokuapp.com/
  only:
  - master
  script:
  - apt-get update -qy
  - apt-get install -y ruby-dev
  - gem install dpl
  - dpl --provider=heroku --app=gitlab-heroku-deploy-staging --api-key=$HEROKU_API_KEY
  stage: deploy
unit_race_tests:
  image: golang
  script:
  - go test -race ./...
  stage: tests
vet:
  image: golang
  script:
  - go vet ./...
  stage: vetting
