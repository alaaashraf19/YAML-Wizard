build:
  before_script:
  - apt update && apt install -y -qq make autoconf cmake build-essential libboost-dev
    python3 python3-pip ninja-build
  - pip3 install meson
  script:
  - meson setup build_release -DBUILD_EXAMPLES=true -DBUILD_BENCHMARKS=true -DBUILD_TESTS=true
  - cd build_release
  - ninja
  - ninja test
  - ./benchmarks/benchmark_discreture
  - ./benchmarks/benchmark_parallel
  stage: build
image: gcc
