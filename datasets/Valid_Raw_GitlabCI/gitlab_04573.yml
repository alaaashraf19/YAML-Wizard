pages:
  artifacts:
    paths:
    - public
  dependencies:
  - unit_test
  image: alpine
  only:
  - master
  script:
  - mkdir public
  - mv coverage/ public/coverage/
  stage: deploy
stages:
- test
- deploy
unit_test:
  artifacts:
    paths:
    - coverage/
  image: brianegan/flutter_lcov:v9
  script:
  - flutter test --coverage
  - genhtml coverage/lcov.info --output=coverage
  stage: test
