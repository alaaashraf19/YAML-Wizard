cache:
  paths:
  - node_modules/
deploy_prod:
  only:
  - master
  script:
  - yarn install
  - yarn run setup
  - yarn run build
  - firebase use sirkit-app --token $FIREBASE_TOKEN
  - firebase deploy --only hosting -m "Pipe $CI_PIPELINE_ID Build $CI_BUILD_ID" --token
    $FIREBASE_TOKEN
  stage: deploy
image: node:10-alpine
stages:
- deploy
