cache:
  key:
    files:
    - package-lock.json
    prefix: ${CI_COMMIT_REF_SLUG}
  paths:
  - node_modules/
check:code:
  script:
  - npm run lint
  stage: check
check:version:
  only:
  - master
  script:
  - ./scripts/check_semantic_versioning.sh
  stage: check
  variables:
    GITLAB_MERGE_REQUEST_API: https://gitlab.com/api/v4/projects/${CI_PROJECT_ID}/merge_requests?source_branch=${CI_COMMIT_REF_NAME}
image: node:lts
pages:
  artifacts:
    paths:
    - public
  before_script:
  - apk add git
  image: node:lts-alpine
  script:
  - npm run doc:build
  - cp -r assets static/assets
  - sed -i 's#/assets#assets#g' static/ui-components.css
  - mv static public
  stage: release
release:package:
  only:
  - tags
  script:
  - echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > .npmrc
  - npm publish
  stage: release
setup:dependencies:
  artifacts:
    expire_in: 1 month
    paths:
    - node_modules/
  script:
  - npm ci
  stage: setup
stages:
- setup
- check
- test
- release
test:units:
  artifacts:
    name: ui-components-coverage-${CI_BUILD_REF_NAME}
    paths:
    - coverage
  script:
  - npm test
  stage: test
