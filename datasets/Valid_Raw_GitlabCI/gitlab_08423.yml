report-built-images:
  artifacts:
    expire_in: 90d
    paths:
    - all-built-images.txt
  image: ${ALPINE_IMAGE}
  script:
  - "set -- \"${CI_PROJECT_DIR}\"/*-built-image.txt\n\nwhile [ \"$#\" -gt 0 ] && [\
    \ ! -f \"$1\" ]; do\n  shift\ndone\n\nif [ -f \"$1\" ]; then\n  cat *-built-image.txt\
    \ > all-built-images.txt\n  cat all-built-images.txt\nelse\n  echo \"No images\
    \ built\";\nfi\n"
  stage: report
