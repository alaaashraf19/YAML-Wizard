production:build:
  artifacts:
    paths:
    - public
  before_script:
  - yarn
  image: registry.gitlab.com/4geit/docker/lerna
  only:
  - production@<(group)>/<(name)>
  script:
  - yarn build
  - rm -rf public && mv build public
  stage: build
  variables:
    API_URL: http://<(name)>-api.vc1s.4ge.it/v1
production:deploy:
  before_script:
  - ${S3CMD} rb -rf s3://$AWS_BUCKET_NAME
  - ${S3CMD} mb s3://$AWS_BUCKET_NAME
  - echo $AWS_POLICY | envsubst > /tmp/policy.txt && ${S3CMD} setpolicy /tmp/policy.txt
    s3://$AWS_BUCKET_NAME
  - ${S3CMD} ws-create --ws-index=index.html --ws-error=index.html s3://$AWS_BUCKET_NAME
  environment:
    name: production
    url: http://$AWS_BUCKET_NAME
  image: registry.gitlab.com/4geit/docker/aws
  only:
  - production@<(group)>/<(name)>
  script:
  - ${S3CMD} put -r public/ s3://$AWS_BUCKET_NAME
  stage: deploy
  variables:
    AWS_BUCKET_NAME: <(name)>.ws3.4ge.it
release:
  image: registry.gitlab.com/4geit/docker/semantic-release-gitlab
  only:
  - master@<(group)>/<(name)>
  script:
  - DEBUG=* semantic-release-gitlab
  stage: release
review:build:
  artifacts:
    paths:
    - public
  before_script:
  - yarn
  except:
  - master@<(group)>/<(name)>
  - production@<(group)>/<(name)>
  image: registry.gitlab.com/4geit/docker/lerna
  only:
  - branches@<(group)>/<(name)>
  script:
  - yarn build
  - rm -rf public && mv build public
  stage: build
  variables:
    API_URL: http://<(name)>-api-mock.vc1s.4ge.it/v1
review:deploy:
  before_script:
  - ${S3CMD} rb -rf s3://$AWS_BUCKET_NAME
  - ${S3CMD} mb s3://$AWS_BUCKET_NAME
  - echo $AWS_POLICY | envsubst > /tmp/policy.txt && ${S3CMD} setpolicy /tmp/policy.txt
    s3://$AWS_BUCKET_NAME
  - ${S3CMD} ws-create --ws-index=index.html --ws-error=index.html s3://$AWS_BUCKET_NAME
  environment:
    name: review/$CI_COMMIT_REF_SLUG
    on_stop: stop_review
    url: http://$CI_ENVIRONMENT_SLUG.<(name)>.ws3.4ge.it
  except:
  - master@<(group)>/<(name)>
  - production@<(group)>/<(name)>
  image: registry.gitlab.com/4geit/docker/aws
  only:
  - branches@<(group)>/<(name)>
  script:
  - ${S3CMD} put -r public/ s3://$AWS_BUCKET_NAME
  stage: deploy
  variables:
    AWS_BUCKET_NAME: $CI_ENVIRONMENT_SLUG.<(name)>.ws3.4ge.it
stages:
- test
- release
- build
- deploy
staging:build:
  artifacts:
    paths:
    - public
  before_script:
  - yarn
  image: registry.gitlab.com/4geit/docker/lerna
  only:
  - tags@<(group)>/<(name)>
  script:
  - yarn build
  - rm -rf public && mv build public
  stage: build
  variables:
    API_URL: http://<(name)>-api-mock.vc1s.4ge.it/v1
staging:deploy:
  before_script:
  - ${S3CMD} rb -rf s3://$AWS_BUCKET_NAME
  - ${S3CMD} mb s3://$AWS_BUCKET_NAME
  - echo $AWS_POLICY | envsubst > /tmp/policy.txt && ${S3CMD} setpolicy /tmp/policy.txt
    s3://$AWS_BUCKET_NAME
  - ${S3CMD} ws-create --ws-index=index.html --ws-error=index.html s3://$AWS_BUCKET_NAME
  environment:
    name: staging
    url: http://$AWS_BUCKET_NAME
  image: registry.gitlab.com/4geit/docker/aws
  only:
  - tags@<(group)>/<(name)>
  script:
  - ${S3CMD} put -r public/ s3://$AWS_BUCKET_NAME
  stage: deploy
  variables:
    AWS_BUCKET_NAME: staging.<(name)>.ws3.4ge.it
stop_review:
  environment:
    action: stop
    name: review/$CI_COMMIT_REF_SLUG
  except:
  - master@<(group)>/<(name)>
  - production@<(group)>/<(name)>
  image: registry.gitlab.com/4geit/docker/aws
  only:
  - branches@<(group)>/<(name)>
  script:
  - ${S3CMD} rb -rf s3://$AWS_BUCKET_NAME
  stage: deploy
  variables:
    AWS_BUCKET_NAME: $CI_ENVIRONMENT_SLUG.<(name)>.ws3.4ge.it
    GIT_STRATEGY: none
  when: manual
test:
  before_script:
  - yarn
  except:
  - master@<(group)>/<(name)>
  - production@<(group)>/<(name)>
  image: registry.gitlab.com/4geit/docker/lerna
  only:
  - branches@<(group)>/<(name)>
  script:
  - yarn lint && yarn test --ci
  stage: test
variables:
  AWS_POLICY: "{\n  \"Version\": \"2012-10-17\",\n  \"Statement\": [\n    {\n    \
    \  \"Effect\": \"Allow\",\n      \"Principal\": \"*\",\n      \"Action\": \"s3:GetObject\"\
    ,\n      \"Resource\": \"arn:aws:s3:::${AWS_BUCKET_NAME}/*\"\n    }\n  ]\n}\n"
  S3CMD: s3cmd --access_key=${AWS_ACCESS_KEY} --secret_key=${AWS_SECRET_KEY} --region=eu-west-1
    --quiet
