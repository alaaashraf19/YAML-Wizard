before_script:
- apt-get update -qq && apt-get install -y -qq texlive texlive-xetex texlive-fonts-recommended
  texlive-fonts-extra
- xelatex -v
latex:
  artifacts:
    expire_in: 1 month
    paths:
    - learn_linux_amr.pdf
  only:
  - master
  - tags
  script:
  - xelatex -synctex=1 -interaction=nonstopmode learn_linux_amr.tex
  - xelatex -synctex=1 -interaction=nonstopmode learn_linux_amr.tex
  stage: deploy
