.template:publish-npm:
  dependencies: &id002
  - build:pack
  script: &id003
  - echo "//registry.npmjs.org/:_authToken=$NPM_TOKEN" > ~/.npmrc
  - npm publish --ignore-scripts --tag $tag ./build/*.tgz
  stage: publish
  tags: &id001
  - docker
.template:tag-docker:
  tags: *id001
build:pack:
  artifacts:
    expire_in: 1 day
    paths:
    - build
  dependencies:
  - generate
  script:
  - npm config set unsafe-perm true
  - mkdir build
  - node ./scripts/update-generated-code.js
  - cd gen
  - npm install
  - npm pack
  - cp *.tgz ../build/
  stage: build
  tags: *id001
cache:
  paths:
  - gen/node_modules/
generate:
  artifacts:
    expire_in: 1 hour
    paths:
    - gen
  image: java:8
  script:
  - prerelease="-ci.$CI_BUILD_REF"
  - if [ $CI_BUILD_REF_NAME = "develop" ]; then prerelease="-dev.$CI_BUILD_ID"; fi
  - if [ -n "$CI_BUILD_TAG" ]; then prerelease=''; fi
  - 'sed -i -r "s/\"npmVersion\": \"([0-9\.]+)-local\",/\"npmVersion\": \"\1$prerelease\",/"
    config.json'
  - if grep -q -- "-local" config.json; then echo "Version wasn't changed"; exit 1;
    fi
  - ./scripts/generate.sh
  stage: generate
  tags: *id001
image: node:4
publish:npm-dev:
  dependencies: *id002
  environment: dev
  only:
  - develop@janslow/gitlab-swagger-client
  script: *id003
  stage: publish
  tags: *id001
  variables:
    tag: dev
publish:npm-latest:
  dependencies: *id002
  environment: latest
  only:
  - tags@janslow/gitlab-swagger-client
  script: *id003
  stage: publish
  tags: *id001
  variables:
    tag: latest
stages:
- generate
- build
- publish
