before_script:
- npm i
cache:
  paths:
  - node_modules
  - .meteor
  untracked: true
deploy:
  image: node:latest
  only:
  - master
  script:
  - echo $METEOR_TOKEN > meteor_session_file.json
  - echo $METEOR_SETTINGS > meteor_settings.json
  - curl https://install.meteor.com/ | sh
  - METEOR_PROFILE=1 DEPLOY_HOSTNAME=$DEPLOY_HOSTNAME METEOR_SESSION_FILE=meteor_session_file.json
    meteor deploy magic.modweb.io --settings meteor_settings.json
  stage: deploy
mocha:
  image: node:latest
  script:
  - npm t
  stage: test
stages:
- test
- deploy
