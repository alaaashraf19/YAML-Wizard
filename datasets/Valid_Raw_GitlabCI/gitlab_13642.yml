build:
  artifacts:
    paths:
    - build/
  before_script:
  - echo "building branch:$CI_BUILD_REF_NAME tag:$CI_BUILD_TAG"
  image: node:9.2.0
  script:
  - npm install
  - NODE_ENV=production npm run build
  stage: build
cache:
  key: ${CI_BUILD_REF_NAME}
  paths:
  - node_modules/
  untracked: true
docker:
  image: docker:latest
  only:
  - master
  script:
  - apk add --update py-pip && pip install docker-compose
  - docker login -u gitlab-ci-token -p $CI_BUILD_TOKEN registry.gitlab.com
  - docker-compose up --build prod
  - docker push registry.gitlab.com/nlabbe/gold
  services:
  - docker:dind
  stage: docker
stages:
- build
- test
- docker
test:
  image: node:9.2.0
  only:
  - branches
  - tags
  script:
  - npm run coverage
  stage: test
