build:
  artifacts:
    paths:
    - build/
    - node_modules/
  image: node:8
  script:
  - npm install
  - npm run prepare
  stage: build
deploy:
  environment:
    name: ${CI_COMMIT_REF_NAME}
  image: obezuk/gitlab-ci-cloudflare:latest
  only:
  - staging
  - production
  script:
  - echo "Deploying to ${CI_ENVIRONMENT_NAME}"
  - "if [ \"${NEEDS_SET_ENV}\" = \"true\" ]; then eb setenv\n  TIER=${CI_ENVIRONMENT_NAME}\n\
    \  COOKIE_SECRET=${COOKIE_SECRET}\n  GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}\n  GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}\n\
    \  WOOCOMMERCE_CLIENT_ID=${WOOCOMMERCE_CLIENT_ID}\n  WOOCOMMERCE_CLIENT_SECRET=${WOOCOMMERCE_CLIENT_SECRET}\
    \        \n  WORLDBRAIN_WP_CLIENT_ID=${WORLDBRAIN_WP_CLIENT_ID}\n  WORLDBRAIN_WP_CLIENT_SECRET=${WORLDBRAIN_WP_CLIENT_SECRET}\n\
    \  ADMIN_ACCESS_CODE=${ADMIN_ACCESS_CODE}\n  AWS_SES_KEY=${AWS_SES_KEY}\n  AWS_SES_SECRET=${AWS_SES_SECRET}\n\
    \  RDS_USERNAME=${RDS_USERNAME}\n  RDS_PASSWORD=${RDS_PASSWORD};\nfi\n"
  - eb deploy memex-root-service-${CI_ENVIRONMENT_NAME}
  stage: deploy
post-deploy-hooks:
  environment:
    name: ${CI_COMMIT_REF_NAME}
  image: sequenceiq/alpine-dev
  only:
  - staging
  - production
  script:
  - 'curl -v "https://staging.memex.cloud/admin/hooks/post-deploy?tier=${CI_ENVIRONMENT_NAME}"
    --data "code=${ADMIN_ACCESS_CODE}" --cookie "mirgrationAccessCode=${ADMIN_ACCESS_CODE}"

    '
  stage: post-deploy-hooks
pre-deploy-hooks:
  environment:
    name: ${CI_COMMIT_REF_NAME}
  image: sequenceiq/alpine-dev
  only:
  - staging
  - production
  script:
  - 'curl -v "https://staging.memex.cloud/admin/hooks/pre-deploy?tier=${CI_ENVIRONMENT_NAME}"
    --data "code=${ADMIN_ACCESS_CODE}" --cookie "mirgrationAccessCode=${ADMIN_ACCESS_CODE}"

    '
  stage: pre-deploy-hooks
stages:
- build
- pre-deploy-hooks
- deploy
- post-deploy-hooks
variables:
  GIT_SUBMODULE_STRATEGY: recursive
