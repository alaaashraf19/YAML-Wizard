.if-internal-release-release:
  if: ($CI_PIPELINE_SOURCE =~ /^(pipeline|web|api)$/) && ($INTERNAL_RELEASE_PIPELINE
    =~ /^(release|true)$/)
.internal-release-release-base:
  extends: .common-job-setup
  needs:
  - internal_release_release:start
  rules:
  - if: ($CI_PIPELINE_SOURCE =~ /^(pipeline|web|api)$/) && ($INTERNAL_RELEASE_PIPELINE
      =~ /^(release|true)$/)
  stage: internal_release:release
internal_release_release:build_package:
  needs:
  - internal_release_release:create_dynamic_pipeline
  rules:
  - if: ($CI_PIPELINE_SOURCE =~ /^(pipeline|web|api)$/) && ($INTERNAL_RELEASE_PIPELINE
      =~ /^(release|true)$/)
  stage: internal_release:release
  trigger:
    forward:
      pipeline_variables: true
    include:
    - artifact: dynamic-gitlab-ci.yml
      job: internal_release_release:create_dynamic_pipeline
    - local: .gitlab/ci/include/secrets-self-contained.yml
    strategy: depend
internal_release_release:create_dynamic_pipeline:
  artifacts:
    paths:
    - dynamic-gitlab-ci.yml
  extends:
  - .internal-release-release-base
  script:
  - 'set -eo pipefail


    # Generate dynamic pipeline YAML

    bundle exec rake "internal:release:generate_dynamic_pipeline" # Writes dynamic-gitlab-ci.yml


    # Display generated YAML content

    echo -e "section_start:$(date +%s):generated_dynamic_pipeline[collapsed=true]\r\e[0KGenerated
    dynamic-gitlab-ci.yml"

    cat dynamic-gitlab-ci.yml

    echo -e "section_end:$(date +%s):generated_dynamic_pipeline\r\e[0K"

    '
internal_release_release:start:
  extends: .common-job-setup
  rules:
  - if: ($CI_PIPELINE_SOURCE =~ /^(pipeline|web|api)$/) && ($INTERNAL_RELEASE_PIPELINE
      =~ /^(release|true)$/)
  script:
  - bundle exec rake 'internal:release:start'
  stage: internal_release:release:start
  when: manual
