build:
  before_script:
  - docker login -u gitlab-ci-token -p $CI_JOB_TOKEN registry.gitlab.com
  - docker run --rm --privileged multiarch/qemu-user-static:register || true
  only:
  - pushes
  - tags
  script:
  - docker pull $CONTAINER_IMAGE:$CI_COMMIT_REF_SLUG || true
  - docker build --build-arg AWS_ACCESS_KEY=$AWS_ACCESS_KEY --build-arg AWS_SECRET_KEY=$AWS_SECRET_KEY
    -f Dockerfile --no-cache --tag $CONTAINER_IMAGE:$CI_COMMIT_REF_SLUG-$CI_COMMIT_SHA
    --tag $CONTAINER_IMAGE:$CI_COMMIT_REF_SLUG .
  - test -n "$CI_COMMIT_TAG" && docker tag $CONTAINER_IMAGE:$CI_COMMIT_REF_SLUG-$CI_COMMIT_SHA
    $CONTAINER_IMAGE:$CI_COMMIT_TAG || true
  - docker push $CONTAINER_IMAGE:$CI_COMMIT_REF_SLUG-$CI_COMMIT_SHA
  - docker push $CONTAINER_IMAGE:$CI_COMMIT_REF_SLUG
  - test -n "$CI_COMMIT_TAG" && docker push $CONTAINER_IMAGE:$CI_COMMIT_TAG || true
  stage: build
deploy-prod:
  image: alpine:3.7
  only:
  - master
  - tags
  script:
  - if [ "$CI_COMMIT_REF_NAME" != "master" ]; then exit 0; fi
  - apk update  && apk add --no-cache curl
  - curl -LO https://storage.googleapis.com/kubernetes-release/release/$(curl -s https://storage.googleapis.com/kubernetes-release/release/stable.txt)/bin/linux/amd64/kubectl
  - chmod +x ./kubectl && mv ./kubectl /usr/local/bin/kubectl
  - mkdir -p $HOME/.kube
  - echo -n $KUBE_CONFIG_PROD | base64 -d > $HOME/.kube/config
  - kubectl -n default set image deploy/pv-prod-pantahub-docs pantahub-docs=$CONTAINER_IMAGE:$CI_COMMIT_REF_SLUG-$CI_COMMIT_SHA
  stage: deploy
image: docker:stable
services:
- docker:dind
stages:
- upgrade
- build
- deploy
upgrade:
  before_script:
  - apk update && apk add git python3 python3-dev py3-pip npm
  - pip3 install --upgrade pip && pip3 install boto3
  - npm i json2md
  only:
  - triggers
  script:
  - git clone -b $CI_COMMIT_REF_NAME --single-branch $CI_PROJECT_URL
  - python3 scripts/populate-json.py $AWS_ACCESS_KEY $AWS_SECRET_KEY
  - node scripts/json2md.js initial-images.json > docs/content/initial-images.md
  - cd docs
  - git config --global user.name "Pantacor CI Bot"
  - git config --global user.email "${CI_USEREMAIL}"
  - git add content/initial-images.md
  - git commit -m "auto commit of initial-images.md" || exit 0
  - git push https://${CI_USERNAME}:${CI_USERTOKEN}@$CI_SERVER_HOST/$CI_PROJECT_PATH
    HEAD:$CI_COMMIT_REF_NAME
  stage: upgrade
variables:
  CONTAINER_IMAGE: registry.gitlab.com/$CI_PROJECT_PATH
  DOCKER_DRIVER: overlay2
  GIT_SUBMODULE_STRATEGY: recursive
