build:
  only:
  - branches
  script:
  - command build
  services:
  - docker:dind
  stage: build
  variables:
    DOCKER_DRIVER: overlay
    DOCKER_HOST: tcp://docker:2375
image: registry.gitlab.com/gitlab-examples/openshift-deploy
review:
  environment:
    name: review/$CI_BUILD_REF_NAME
    on_stop: stop_review
    url: http://$CI_ENVIRONMENT_SLUG.ruby-openshift-example.tanukionline.com
  except:
  - master
  only:
  - branches
  script:
  - command deploy
  stage: deploy
  variables:
    CI_ENVIRONMENT_URL: http://${CI_ENVIRONMENT_SLUG}.ruby-openshift-example.tanukionline.com
staging:
  environment:
    name: staging
    url: http://$CI_ENVIRONMENT_SLUG.ruby-openshift-example.tanukionline.com
  only:
  - master
  script:
  - command deploy
  stage: deploy
  variables:
    CI_ENVIRONMENT_URL: http://${CI_ENVIRONMENT_SLUG}.ruby-openshift-example.tanukionline.com
stop_review:
  environment:
    action: stop
    name: review/$CI_BUILD_REF_NAME
  except:
  - master
  only:
  - branches
  script:
  - command remove_deploy
  stage: deploy
  variables:
    GIT_STRATEGY: none
variables:
  KUBE_DOMAIN: ruby-openshift-example.tanukionline.com
