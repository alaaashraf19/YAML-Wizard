before_script:
- cd source
- bundle install
image: ruby:2.3
pages:
  artifacts:
    paths:
    - public
  only:
  - master
  script:
  - bundle exec jekyll build -d public
  - cd ..
  - mv source/public ./public
  stage: deploy
test:
  artifacts:
    paths:
    - source/test
  except:
  - master
  script:
  - bundle exec jekyll build -d test
  stage: test
variables:
  JEKYLL_ENV: production
