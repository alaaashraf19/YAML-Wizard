download_deps_npm:
  artifacts:
    paths:
    - node_modules/
  image: node:latest
  script:
  - npm install
  services:
  - docker:19.03.1-dind
  stage: pre-build
  tags:
  - npm
run_infopack:
  artifacts:
    name: output_files
    paths:
    - output_files/
  dependencies:
  - download_deps_npm
  image: node:latest
  script:
  - npm start
  services:
  - docker:19.03.1-dind
  stage: build
  tags:
  - npm
stages:
- pre-build
- build
- deploy
