before_script:
- "apt-get update -qq &&\napt-get install -qq \\\n    bison \\\n    build-essential\
  \ \\\n    curl \\\n    dosfstools \\\n    flex \\\n    fuse \\\n    genisoimage\
  \ \\\n    git \\\n    gnupg \\\n    libfuse-dev \\\n    nasm \\\n    pkg-config\
  \ \\\n    software-properties-common \\\n    syslinux \\\n    syslinux-utils \\\n\
  \    texinfo \\\n    wget &&\ncurl https://sh.rustup.rs -sSf | sh -s -- -y --default-toolchain\
  \ none\n"
img:
  artifacts:
    expire_in: 1 week
    paths:
    - build/img/
  script:
  - 'source "$HOME/.cargo/env" &&

    rustup update &&

    rustup component add rust-src &&

    cargo install cargo-config cargo-xbuild xargo &&

    pushd bootloader-efi &&

    rustup update &&

    rustup component add rust-src &&

    popd &&

    make ci-img IMG_TAG=$CI_COMMIT_REF_NAME

    '
variables:
  GIT_CHECKOUT: 'true'
  GIT_STRATEGY: pull
  GIT_SUBMODULE_STRATEGY: recursive
