adf-validator-deploy:
  artifacts:
    expire_in: 14 days
    name: adf-validator
    paths:
    - adf-validator/target
  only:
  - master
  script:
  - mvn $MAVEN_CLI_OPTS clean deploy
  stage: deploy
  when: manual
adf-validator-validate:
  artifacts:
    expire_in: 120 minutes
    name: adf-validator-validate
    paths:
    - adf-validator/target
  script:
  - mvn $MAVEN_CLI_OPTS clean compile
  stage: build
image: maven:latest
stages:
- build
- deploy
variables:
  MAVEN_CLI_OPTS: -s .m2/settings.xml --batch-mode --errors --fail-at-end --show-version
  MAVEN_OPTS: -Dmaven.repo.local=.m2/repository -Dorg.slf4j.simpleLogger.log.org.apache.maven.cli.transfer.Slf4jMavenTransferListener=WARN
    -Dorg.slf4j.simpleLogger.showDateTime=true -Djava.awt.headless=true
