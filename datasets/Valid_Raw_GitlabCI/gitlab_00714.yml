build:
  script:
  - cargo build
  stage: build
cache:
  paths:
  - apt/
  - cargo/
  - target/
image: rust:latest
info:
  cache: {}
  script:
  - rustc --version
  - cargo --version
  stage: info
stages:
- info
- test
- build
test:
  script:
  - cargo test --all-features
  stage: test
variables:
  CARGO_HOME: $CI_PROJECT_DIR/cargo
  GIT_STRATEGY: fetch
  GIT_SUBMODULE_STRATEGY: none
