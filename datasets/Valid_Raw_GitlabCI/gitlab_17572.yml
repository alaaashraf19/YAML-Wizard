Wiki2PDF:
  artifacts:
    untracked: true
  before_script:
  - 'printf -- "\n\n\n"

    printf -- " ___________________________________________________\n"

    printf -- "/                                                   \\ \n"

    printf -- "|                  Wiki2PDF v${SCRIPT_VERSION}                  |\n"

    printf -- "|                                                   |\n"

    printf -- "#===================================================#\n"

    printf -- "|                                                   |\n"

    printf -- "|         Turns GitLab''s Wiki pages into PDF        |\n"

    printf -- "|                                                   |\n"

    printf -- "|                                                   |\n"

    printf -- "|                                                   |\n"

    printf -- "|             Created by Andrea Ligios              |\n"

    printf -- "|            Released under MIT License             |\n"

    printf -- "|                                                   |\n"

    printf -- "|    https://gitlab.com/Andrea.Ligios/Wiki2PDF/     |\n"

    printf -- "\\___________________________________________________/\n\n\n\n"

    '
  - apt-get update -y
  - apt-get install -y rubygems
  - gem install kramdown
  - gem install prawn
  - gem install prawn-table
  only:
  - triggers
  - web
  script:
  - git clone http://gitlab-ci-token:${CI_BUILD_TOKEN}@${GITLAB_DOMAIN}/${CI_PROJECT_NAMESPACE}/${CI_PROJECT_NAME}.wiki.git
  - mkdir tmp
  - mkdir uploads
  - mkdir http
  - "if [ \"$(grep -oh '!\\[.*](/uploads/[^\\)]*' ${CI_PROJECT_NAME}.wiki/*.md)\"\
    \ == \"\" ]; then \n  echo \"No Wiki resources to download\"\nelse\n  # Matching\
    \ only markdown images \"![]()\" (not markdown URLs like \"[]()\")\n  grep -oh\
    \ '!\\[.*](/uploads/[^\\)]*' ${CI_PROJECT_NAME}.wiki/*.md > tmp/tmp-wiki-1.txt\n\
    \  \n  # Printing all the Wiki images crawled in all the files.\n  # Using printf\
    \ because \"echo -e\" is inconsistent between different echo implementations\n\
    \  printf \"\\n-------------------------------------\\nDETECTING WIKI IMAGES:\\\
    n-------------------------------------\\n\"\n  echo | cat tmp/tmp-wiki-1.txt\n\
    \  # Using -- is necessary to explicit that options are over (since the row is\
    \ starting with \"--... and gets interpreted as an unrecognized option)\n  printf\
    \ -- \"-------------------------------------\\n\\n\"\n\n  # Removing the textual\
    \ part so that subsequent greps won't get false positive with \"uploads/\" in\
    \ textual part, eg. [foo uploads/bar](/uploads/...)\n  grep -oh '\\](/uploads/.*'\
    \ tmp/tmp-wiki-1.txt > tmp/tmp-wiki-2.txt\n  # Extracting the files to download\n\
    \  grep -oh 'uploads\\/[^\\)]*' tmp/tmp-wiki-2.txt > tmp/wiki-resources-files-to-download.txt\n\
    \  # Extracting the folders to create\n  grep -oh 'upload.*[\\\\\\/]' tmp/wiki-resources-files-to-download.txt\
    \ > tmp/wiki-resources-folders-to-create.txt\n\n  # Creating /uploads subfolders\n\
    \  printf \"\\n-------------------------------------\\nCREATING FOLDERS STRUCTURE:\\\
    n-------------------------------------\\n\"\n  while IFS='' read -r line || [[\
    \ -n \"$line\" ]]; do\n    if [ ! -d ${line} ]; then\n      mkdir -p ${line}\n\
    \      printf \"NEW FOLDER ========> Folder ${line} has been created\\n\"\n  \
    \  else\n      printf \"DUPLICATE FOLDER ==> Folder ${line} exists, safely skipping\
    \ it...\\n\"\n    fi\n  done < \"tmp/wiki-resources-folders-to-create.txt\"\n\
    \  printf -- \"-------------------------------------\\n\\n\"\n\n  # Filling those\
    \ subfolders with the resources\n  printf \"\\n-------------------------------------\\\
    nDOWNLOADING WIKI IMAGES:\\n-------------------------------------\\n\"\n  while\
    \ IFS='' read -r line || [[ -n \"$line\" ]]; do\n    if [ ! -f ${line} ]; then\n\
    \      wget -O ${line} ${GITLAB_SCHEME}://${GITLAB_DOMAIN}/${CI_PROJECT_NAMESPACE}/${CI_PROJECT_NAME}/${line}\n\
    \    else\n      printf \"DUPLICATE FILE ====> File ${line} exists, safely skipping\
    \ it...\\n\\n\"\n    fi \n  done < \"tmp/wiki-resources-files-to-download.txt\"\
    \nfi\n"
  - "if [ \"$(grep -oh '!\\[.*](http[s]\\?://[^\\)]*' ${CI_PROJECT_NAME}.wiki/*.md)\"\
    \ == \"\" ]; then \n  echo \"No HTTP/HTTPS resources to download\"\nelse\n\n \
    \ # Matching only markdown images \"![]()\" (not markdown URLs like \"[]()\")\n\
    \  grep -oh '!\\[.*](http[s]\\?://[^\\)]*' ${CI_PROJECT_NAME}.wiki/*.md > tmp/tmp-http-1.txt\n\
    \  \n  # Printing all the HTTP/HTTPS images crawled in all the files.\n  printf\
    \ \"\\n-------------------------------------\\nDETECTING HTTP/HTTPS IMAGES:\\\
    n-------------------------------------\\n\"\n  echo | cat tmp/tmp-http-1.txt\n\
    \  printf -- \"-------------------------------------\\n\\n\"\n\n  # Removing the\
    \ textual part so that subsequent greps won't get false positive with \"uploads/\"\
    \ in textual part, eg. [foo http://bar](http://foobar/...)\n  grep -oh '\\](http[s]\\\
    ?://.*' tmp/tmp-http-1.txt > tmp/tmp-http-2.txt\n  \n  # Extracting the files\
    \ to download\n  grep -oh 'http[s]\\?://.*[^\\)]*' tmp/tmp-http-2.txt > tmp/http-resources-files-to-download.txt\n\
    \  \n  # Extracting the folders to create\n  grep -oh 'http[s]\\?://.*[\\\\\\\
    /]' tmp/http-resources-files-to-download.txt > tmp/http-resources-folders-to-create.txt\n\
    \  \n  # Renaming all the URLS except the downloading ones into real folders paths\n\
    \  sed -i 's/http:\\//http/g'  ${CI_PROJECT_NAME}.wiki/*.md\n  sed -i 's/http:\\\
    //http/g'  tmp/http-resources-folders-to-create.txt\n  sed -i 's/https:\\//http/g'\
    \ ${CI_PROJECT_NAME}.wiki/*.md       \n  sed -i 's/https:\\//http/g' tmp/http-resources-folders-to-create.txt\n\
    \n  # Creating /http subfolders\n  printf \"\\n-------------------------------------\\\
    nCREATING FOLDERS STRUCTURE:\\n-------------------------------------\\n\"\n  while\
    \ IFS='' read -r line || [[ -n \"$line\" ]]; do\n    if [ ! -d ${line} ]; then\n\
    \      mkdir -p ${line}\n      printf \"NEW FOLDER ========> Folder ${line} has\
    \ been created\\n\"\n    else\n      printf \"DUPLICATE FOLDER ==> Folder ${line}\
    \ exists, safely skipping it...\\n\"\n    fi\n  done < \"tmp/http-resources-folders-to-create.txt\"\
    \n  printf -- \"-------------------------------------\\n\\n\"\n\n  # Filling those\
    \ subfolders with the resources\n  printf \"\\n-------------------------------------\\\
    nDOWNLOADING HTTP/HTTPS IMAGES:\\n-------------------------------------\\n\"\n\
    \  while IFS='' read -r line || [[ -n \"$line\" ]]; do\n    echo ${line}\n   \
    \ declare localPath\n    localPath=$(sed 's/http[s]\\?:\\//http/' <<< ${line})\n\
    \    if [ ! -f ${localPath} ]; then\n      wget -O ${localPath} ${line}\n    else\n\
    \      printf \"DUPLICATE FILE ====> File ${localPath} exists, safely skipping\
    \ it...\\n\\n\"\n    fi \n  done < \"tmp/http-resources-files-to-download.txt\"\
    \n  printf -- \"-------------------------------------\\n\\n\"\nfi\n"
  - mkdir -p wikis/source
  - cp ${CI_PROJECT_NAME}.wiki/*.md wikis/source
  - rm -rf ${CI_PROJECT_NAME}.wiki
  - find ./wikis/source -name '*.md' -exec sh -c 'kramdown $0 --output pdf > $0.pdf'
    {} \;
  - mv wikis/source/*.pdf wikis
  - mv uploads wikis/source
  - mv http wikis/source
  - mv tmp wikis/source
  variables:
    GITLAB_DOMAIN: gitlab.com
    GITLAB_SCHEME: https
    SCRIPT_VERSION: 1.2.0
image: tgalopin/maven-javafx
maven_jar:
  script:
  - echo "[+] Building Project Jar With Maven"
  - cd Notes
  - mvn jfx:jar -B -Dmaven.test.skip=true
  - echo "[-] Building Jar Done"
  stage: build
maven_native:
  only:
  - release
  script:
  - echo "[+] Building Project Native With Maven"
  - cd Notes
  - mvn jfx:native -B -Dmaven.test.skip=true
  - echo "[-] Building Native Done"
  stage: build
maven_test:
  artifacts:
    paths:
    - Notes/target/surefire-reports/
  script:
  - echo "[+] Testing Project"
  - cd Notes
  - mvn test -B
  - echo "[-] Finished Testing"
  stage: test
pages:
  artifacts:
    expire_in: 14 days
    paths:
    - public
  dependencies:
  - reports
  only:
  - master
  script:
  - mkdir -p public/loc/
  - mv scripts/loc/ public/
  - mv scripts/test/ public/
  stage: deploy
reports:
  artifacts:
    paths:
    - scripts/loc/
    - scripts/test/
  dependencies:
  - maven_test
  image: node:4.2.2
  only:
  - master
  script:
  - cd ./scripts
  - npm install
  - ./loc.sh
  - ./test.sh
  stage: report
stages:
- build
- test
- report
- deploy
