stages:
- build
stow:
  image: debian:11
  script:
  - apt-get -qq update; apt-get -y install git openssh-client stow
  - stow --adopt -t ~ */
  stage: build
test:
  before_script:
  - export PATH="/root/.cask/bin:$PATH"
  image: alpine:3.18
  script:
  - apk update && apk add openssh make git curl python3 emacs openssh bash git stow
  - git clone https://github.com/cask/cask ~/.cask
  - stow --adopt -t ~ */
  - ./.circleci/emacs.sh
  stage: build
