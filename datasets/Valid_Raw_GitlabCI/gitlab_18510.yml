.Test:
  before_script:
  - npm ci
  stage: test
.build_tarball:
  artifacts:
    paths:
    - vikserver-${VIKSERVER_COMMIT_NAME}.tar
  before_script:
  - npm ci
  image: node:latest
  script:
  - bash stages.sh tarball "vikserver-${VIKSERVER_COMMIT_NAME}.tar"
  stage: build
Build current tarball:
  except:
  - tags
  extends: .build_tarball
  variables:
    VIKSERVER_COMMIT_NAME: ${CI_COMMIT_REF_NAME}
Build tagged tarball:
  extends: .build_tarball
  only:
  - tags
  variables:
    VIKSERVER_COMMIT_NAME: ${CI_COMMIT_TAG}
Test CSS:
  extends: .Test
  script:
  - npm run stylelint
Test JS:
  extends: .Test
  script:
  - npm test
  - npm run eslint
image: node:alpine
include:
- template: SAST.gitlab-ci.yml
- template: Dependency-Scanning.gitlab-ci.yml
stages:
- test
- build
