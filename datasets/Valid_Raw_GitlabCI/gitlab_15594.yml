build_lib_release:
  artifacts:
    expire_in: 5 yrs
    name: mast-unity-project
    paths:
    - pack
  image: mcr.microsoft.com/dotnet/core/sdk:3.1-buster
  only:
  - /^.*-release$/
  script:
  - export BUILD_VERSION=$(echo $CI_COMMIT_REF_NAME | sed  's/\([0-9]\+\.[0-9]\+\.[0-9]\+\)\-release$/\1/g')
  - echo $BUILD_VERSION
  - sed -i -e "s/0.5.1.0/$BUILD_VERSION.0/g" build/Rayark.Mast.csproj
  - ./build.sh
  stage: build
  tags:
  - docker
build_lib_test:
  except:
  - tags
  image: mcr.microsoft.com/dotnet/core/sdk:3.1-buster
  script:
  - ./build.sh
  stage: build
  tags:
  - docker
document:
  artifacts:
    expire_in: 5 yrs
    paths:
    - public
  image: alvinsay/docfx:2.32.1
  only:
  - /^.*-release$/
  script:
  - docfx doc/docfx.json
  - mv doc/_site public
  stage: build
  tags:
  - docker
mast-release:
  artifacts:
    expire_in: 5 yrs
    paths:
    - Rayark.Mast.dll
  dependencies:
  - build_lib_release
  image: bash
  only:
  - /^.*-release$/
  script:
  - cp pack/Assets/Plugins/Rayark/Mast/Rayark.Mast.dll .
  stage: release
  tags:
  - docker
pages:
  artifacts:
    paths:
    - public
  image: alvinsay/docfx:2.32.1
  only:
  - master
  script:
  - docfx doc/docfx.json
  - mv doc/_site public
  stage: release
  tags:
  - docker
stages:
- build
- release
variables:
  DOCFX_SOURCE_BRANCH_NAME: $CI_BUILD_REF_NAME
