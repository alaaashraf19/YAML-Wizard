before_script:
- export CLOUDSDK_CORE_DISABLE_PROMPTS=1
- export CLOUDSDK_PYTHON_SITEPACKAGES=1
- export GCP_PROJECT=gae-lab-001
- export GCP_PROJECT_VERSION=uat
deploy:
  only:
  - master
  script:
  - sh ./scripts/deploy.sh
  stage: deploy
image: cage1016/gitlab-ci-gcp:v1.5
test:
  script:
  - sh ./scripts/tests.sh
  stage: test
types:
- test
- deploy
