.rust-build-test:
  before_script:
  - rustc --version
  - cargo --version
  script:
  - cargo build --verbose
  - cargo test --verbose
cache:
  paths:
  - apt/
  - cargo/
  - target/
fmt-check:
  allow_failure: true
  before_script:
  - rustup component add rustfmt-preview --toolchain nightly
  image: rustlang/rust:nightly
  script:
  - cargo +nightly fmt --all -- --check
  stage: build
pages:
  allow_failure: true
  artifacts:
    paths:
    - public
  cache:
    key: nightly
  image: rustlang/rust:nightly
  only:
  - master
  script:
  - cargo doc --document-private-items
  - mv target/doc/ public/
  - echo '<meta http-equiv="refresh" content="0; url=node_amqp/">' > public/index.html
  stage: build
rust-latest:
  cache:
    key: latest
  extends: .rust-build-test
  image: rust:latest
  stage: build
rust-nightly:
  allow_failure: true
  cache:
    key: nightly
  extends: .rust-build-test
  image: rustlang/rust:nightly
  stage: build
stages:
- build
variables:
  APT_CACHE_DIR: $CI_PROJECT_DIR/apt
  CARGO_HOME: $CI_PROJECT_DIR/cargo
