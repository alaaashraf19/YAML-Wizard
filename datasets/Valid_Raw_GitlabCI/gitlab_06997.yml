.auto_devops: "# Auto DevOps variables and functions\n[[ \"$TRACE\" ]] && set -x\n\
  auto_database_url=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${CI_ENVIRONMENT_SLUG}-postgres:5432/${POSTGRES_DB}\n\
  export DATABASE_URL=${DATABASE_URL-$auto_database_url}\nexport CI_APPLICATION_REPOSITORY=$CI_REGISTRY_IMAGE/$CI_COMMIT_REF_SLUG\n\
  export CI_APPLICATION_TAG=$CI_COMMIT_SHA\nexport CI_CONTAINER_NAME=ci_job_build_${CI_JOB_ID}\n\
  export TILLER_NAMESPACE=$KUBE_NAMESPACE\n\nfunction codeclimate() {\n  cc_opts=\"\
  --env CODECLIMATE_CODE=\"$PWD\" \\\n           --volume \"$PWD\":/code \\\n    \
  \       --volume /var/run/docker.sock:/var/run/docker.sock \\\n           --volume\
  \ /tmp/cc:/tmp/cc\"\n\n  docker run ${cc_opts} codeclimate/codeclimate init\n  docker\
  \ run ${cc_opts} codeclimate/codeclimate analyze -f json > codeclimate.json\n}\n\
  \nfunction deploy() {\n  track=\"${1-stable}\"\n  name=\"$CI_ENVIRONMENT_SLUG\"\n\
  \n  if [[ \"$track\" != \"stable\" ]]; then\n    name=\"$name-$track\"\n  fi\n\n\
  \  replicas=\"1\"\n  service_enabled=\"false\"\n  postgres_enabled=\"$POSTGRES_ENABLED\"\
  \n  # canary uses stable db\n  [[ \"$track\" == \"canary\" ]] && postgres_enabled=\"\
  false\"\n\n  env_track=$( echo $track | tr -s  '[:lower:]'  '[:upper:]' )\n  env_slug=$(\
  \ echo ${CI_ENVIRONMENT_SLUG//-/_} | tr -s  '[:lower:]'  '[:upper:]' )\n\n  if [[\
  \ \"$track\" == \"stable\" ]]; then\n    # for stable track get number of replicas\
  \ from `PRODUCTION_REPLICAS`\n    eval new_replicas=\\$${env_slug}_REPLICAS\n  \
  \  service_enabled=\"true\"\n  else\n    # for all tracks get number of replicas\
  \ from `CANARY_PRODUCTION_REPLICAS`\n    eval new_replicas=\\$${env_track}_${env_slug}_REPLICAS\n\
  \  fi\n  if [[ -n \"$new_replicas\" ]]; then\n    replicas=\"$new_replicas\"\n \
  \ fi\n\n  helm upgrade --install \\\n    --wait \\\n    --set service.enabled=\"\
  $service_enabled\" \\\n    --set releaseOverride=\"$CI_ENVIRONMENT_SLUG\" \\\n \
  \   --set image.repository=\"$CI_APPLICATION_REPOSITORY\" \\\n    --set image.tag=\"\
  $CI_APPLICATION_TAG\" \\\n    --set image.pullPolicy=IfNotPresent \\\n    --set\
  \ application.track=\"$track\" \\\n    --set application.database_url=\"$DATABASE_URL\"\
  \ \\\n    --set service.url=\"$CI_ENVIRONMENT_URL\" \\\n    --set replicaCount=\"\
  $replicas\" \\\n    --set postgresql.enabled=\"$postgres_enabled\" \\\n    --set\
  \ postgresql.nameOverride=\"postgres\" \\\n    --set postgresql.postgresUser=\"\
  $POSTGRES_USER\" \\\n    --set postgresql.postgresPassword=\"$POSTGRES_PASSWORD\"\
  \ \\\n    --set postgresql.postgresDatabase=\"$POSTGRES_DB\" \\\n    --namespace=\"\
  $KUBE_NAMESPACE\" \\\n    --version=\"$CI_PIPELINE_ID-$CI_JOB_ID\" \\\n    \"$name\"\
  \ \\\n    chart/\n}\n\nfunction install_dependencies() {\n  apk add -U openssl curl\
  \ tar gzip bash ca-certificates git\n  wget -q -O /etc/apk/keys/sgerrand.rsa.pub\
  \ https://raw.githubusercontent.com/sgerrand/alpine-pkg-glibc/master/sgerrand.rsa.pub\n\
  \  wget https://github.com/sgerrand/alpine-pkg-glibc/releases/download/2.23-r3/glibc-2.23-r3.apk\n\
  \  apk add glibc-2.23-r3.apk\n  rm glibc-2.23-r3.apk\n\n  curl https://kubernetes-helm.storage.googleapis.com/helm-v2.6.1-linux-amd64.tar.gz\
  \ | tar zx\n  mv linux-amd64/helm /usr/bin/\n  helm version --client\n\n  curl -L\
  \ -o /usr/bin/kubectl https://storage.googleapis.com/kubernetes-release/release/$(curl\
  \ -s https://storage.googleapis.com/kubernetes-release/release/stable.txt)/bin/linux/amd64/kubectl\n\
  \  chmod +x /usr/bin/kubectl\n  kubectl version --client\n}\n\nfunction setup_docker()\
  \ {\n  if ! docker info &>/dev/null; then\n    if [ -z \"$DOCKER_HOST\" -a \"$KUBERNETES_PORT\"\
  \ ]; then\n      export DOCKER_HOST='tcp://localhost:2375'\n    fi\n  fi\n}\n\n\
  function setup_test_db() {\n  if [ -z ${KUBERNETES_PORT+x} ]; then\n    DB_HOST=postgres\n\
  \  else\n    DB_HOST=localhost\n  fi\n  export DATABASE_URL=\"postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${DB_HOST}:5432/${POSTGRES_DB}\"\
  \n}\n\nfunction download_chart() {\n  if [[ ! -d chart ]]; then\n    auto_chart=${AUTO_DEVOPS_CHART:-gitlab/auto-deploy-app}\n\
  \    auto_chart_name=$(basename $auto_chart)\n    auto_chart_name=${auto_chart_name%.tgz}\n\
  \  else\n    auto_chart=\"chart\"\n    auto_chart_name=\"chart\"\n  fi\n\n  helm\
  \ init --client-only\n  helm repo add gitlab https://charts.gitlab.io\n  if [[ !\
  \ -d \"$auto_chart\" ]]; then\n    helm fetch ${auto_chart} --untar\n  fi\n  if\
  \ [ \"$auto_chart_name\" != \"chart\" ]; then\n    mv ${auto_chart_name} chart\n\
  \  fi\n\n  helm dependency update chart/\n  helm dependency build chart/\n}\n\n\
  function ensure_namespace() {\n  kubectl describe namespace \"$KUBE_NAMESPACE\"\
  \ || kubectl create namespace \"$KUBE_NAMESPACE\"\n}\n\nfunction check_kube_domain()\
  \ {\n  if [ -z ${AUTO_DEVOPS_DOMAIN+x} ]; then\n    echo \"In order to deploy, AUTO_DEVOPS_DOMAIN\
  \ must be set as a variable at the group or project level, or manually added in\
  \ .gitlab-cy.yml\"\n    false\n  else\n    true\n  fi\n}\n\nfunction build() {\n\
  \  if [[ -f Dockerfile ]]; then\n    echo \"Building Dockerfile-based application...\"\
  \n    docker build -t \"$CI_APPLICATION_REPOSITORY:$CI_APPLICATION_TAG\" .\n  else\n\
  \    echo \"Building Heroku-based application using gliderlabs/herokuish docker\
  \ image...\"\n    docker run -i --name=\"$CI_CONTAINER_NAME\" -v \"$(pwd):/tmp/app:ro\"\
  \ gliderlabs/herokuish /bin/herokuish buildpack build\n    docker commit \"$CI_CONTAINER_NAME\"\
  \ \"$CI_APPLICATION_REPOSITORY:$CI_APPLICATION_TAG\"\n    docker rm \"$CI_CONTAINER_NAME\"\
  \ >/dev/null\n    echo \"\"\n\n    echo \"Configuring $CI_APPLICATION_REPOSITORY:$CI_APPLICATION_TAG\
  \ docker image...\"\n    docker create --expose 5000 --env PORT=5000 --name=\"$CI_CONTAINER_NAME\"\
  \ \"$CI_APPLICATION_REPOSITORY:$CI_APPLICATION_TAG\" /bin/herokuish procfile start\
  \ web\n    docker commit \"$CI_CONTAINER_NAME\" \"$CI_APPLICATION_REPOSITORY:$CI_APPLICATION_TAG\"\
  \n    docker rm \"$CI_CONTAINER_NAME\" >/dev/null\n    echo \"\"\n  fi\n\n  if [[\
  \ -n \"$CI_REGISTRY_USER\" ]]; then\n    echo \"Logging to GitLab Container Registry\
  \ with CI credentials...\"\n    docker login -u \"$CI_REGISTRY_USER\" -p \"$CI_REGISTRY_PASSWORD\"\
  \ \"$CI_REGISTRY\"\n    echo \"\"\n  fi\n\n  echo \"Pushing to GitLab Container\
  \ Registry...\"\n  docker push \"$CI_APPLICATION_REPOSITORY:$CI_APPLICATION_TAG\"\
  \n  echo \"\"\n}\n\nfunction install_tiller() {\n  echo \"Checking Tiller...\"\n\
  \  helm init --upgrade\n  kubectl rollout status -n \"$TILLER_NAMESPACE\" -w \"\
  deployment/tiller-deploy\"\n  if ! helm version --debug; then\n    echo \"Failed\
  \ to init Tiller.\"\n    return 1\n  fi\n  echo \"\"\n}\n\nfunction create_secret()\
  \ {\n  kubectl create secret -n \"$KUBE_NAMESPACE\" \\\n    docker-registry gitlab-registry\
  \ \\\n    --docker-server=\"$CI_REGISTRY\" \\\n    --docker-username=\"$CI_REGISTRY_USER\"\
  \ \\\n    --docker-password=\"$CI_REGISTRY_PASSWORD\" \\\n    --docker-email=\"\
  $GITLAB_USER_EMAIL\" \\\n    -o yaml --dry-run | kubectl replace -n \"$KUBE_NAMESPACE\"\
  \ --force -f -\n}\n\nfunction delete() {\n  track=\"${1-stable}\"\n  name=\"$CI_ENVIRONMENT_SLUG\"\
  \n\n  if [[ \"$track\" != \"stable\" ]]; then\n    name=\"$name-$track\"\n  fi\n\
  \n  helm delete \"$name\" || true\n}\n"
.canary:
  environment:
    name: production
    url: http://$CI_PROJECT_PATH_SLUG.$AUTO_DEVOPS_DOMAIN
  only:
    kubernetes: active
    refs:
    - master
  script:
  - check_kube_domain
  - install_dependencies
  - download_chart
  - ensure_namespace
  - install_tiller
  - create_secret
  - deploy canary
  stage: canary
  when: manual
.staging:
  environment:
    name: staging
    url: http://$CI_PROJECT_PATH_SLUG-staging.$AUTO_DEVOPS_DOMAIN
  only:
    kubernetes: active
    refs:
    - master
  script:
  - check_kube_domain
  - install_dependencies
  - download_chart
  - ensure_namespace
  - install_tiller
  - create_secret
  - deploy
  stage: staging
