build:
  image: docker:git
  only:
  - branches
  script:
  - setup_docker
  - build
  services:
  - docker:dind
  stage: build
  variables:
    DOCKER_DRIVER: overlay2
codequality:
  allow_failure: true
  artifacts:
    paths:
    - codeclimate.json
  image: docker:latest
  script:
  - setup_docker
  - codeclimate
  services:
  - docker:dind
  variables:
    DOCKER_DRIVER: overlay2
image: python:3.4
production:
  environment:
    name: production
    url: http://$CI_PROJECT_PATH_SLUG.$AUTO_DEVOPS_DOMAIN
  only:
    kubernetes: active
    refs:
    - master
  script:
  - check_kube_domain
  - install_dependencies
  - download_chart
  - ensure_namespace
  - install_tiller
  - create_secret
  - deploy
  - delete canary
  stage: production
review:
  environment:
    name: review/$CI_COMMIT_REF_NAME
    on_stop: stop_review
    url: http://$CI_PROJECT_PATH_SLUG-$CI_ENVIRONMENT_SLUG.$AUTO_DEVOPS_DOMAIN
  except:
  - master
  only:
    kubernetes: active
    refs:
    - branches
  script:
  - check_kube_domain
  - install_dependencies
  - download_chart
  - ensure_namespace
  - install_tiller
  - create_secret
  - deploy
  stage: review
stages:
- build
- test
- review
- staging
- canary
- production
- cleanup
stop_review:
  allow_failure: true
  environment:
    action: stop
    name: review/$CI_COMMIT_REF_NAME
  except:
  - master
  only:
    kubernetes: active
    refs:
    - branches
  script:
  - install_dependencies
  - delete
  stage: cleanup
  variables:
    GIT_STRATEGY: none
  when: manual
test:
  image: gliderlabs/herokuish:latest
  only:
  - branches
  script:
  - setup_test_db
  - cp -R . /tmp/app
  - /bin/herokuish buildpack test
  services:
  - postgres:latest
  stage: test
  variables:
    POSTGRES_DB: test
variables:
  POSTGRES_DB: $CI_ENVIRONMENT_SLUG
  POSTGRES_ENABLED: 'true'
  POSTGRES_PASSWORD: testing-password
  POSTGRES_USER: user
