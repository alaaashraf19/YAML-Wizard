build:
  artifacts:
    paths:
    - build/snigl
    - build/libsnigl.a
    - build/libsnigl.so
  before_script:
  - apt update && apt -y install make cmake
  script:
  - mkdir build && cd build && cmake .. && make all
  stage: build
image: gcc
test:
  script:
  - build/snigl test/all.sl
  stage: test
