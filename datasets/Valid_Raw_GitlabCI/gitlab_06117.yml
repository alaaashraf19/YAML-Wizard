trigger_docs_generation:
  image: registry.gitlab.com/datadrivendiscovery/images/testing-docker:ubuntu-bionic
  only:
  - master
  script:
  - if [ -n "$DOCS_TRIGGER_TOKEN" ]; then curl --fail -X POST -F token=$DOCS_TRIGGER_TOKEN
    -F ref=master https://gitlab.com/api/v4/projects/7130595/trigger/pipeline; fi
  stage: deploy
trigger_primitives_tests:
  image: registry.gitlab.com/datadrivendiscovery/images/testing-docker:ubuntu-bionic
  only:
  - master
  script:
  - if [ -n "$PRIMITIVE_TESTS_TRIGGER_TOKEN" ]; then curl -X POST -F token=$PRIMITIVE_TESTS_TRIGGER_TOKEN
    -F ref=master https://gitlab.com/api/v4/projects/17019004/trigger/pipeline; fi
  stage: deploy
