.build_image:
  before_script:
  - docker info
  - docker login -u gitlab-ci-token -p "$CI_JOB_TOKEN" "$CI_REGISTRY"
  image: registry.gitlab.com/datadrivendiscovery/images/testing-docker:ubuntu-bionic
  only:
  - master
  services:
  - alias: docker
    name: registry.gitlab.com/datadrivendiscovery/images/docker:19-dind
  variables:
    DOCKER_DRIVER: overlay2
    DOCKER_HOST: tcp://docker:2375
    GIT_SUBMODULE_STRATEGY: recursive
base:ubuntu-bionic-python36:
  extends: .build_image
  needs: []
  script: ./build.sh base ubuntu-bionic-python36
  stage: base
base:ubuntu-bionic-python37:
  extends: .build_image
  needs: []
  script: ./build.sh base ubuntu-bionic-python37
  stage: base
base:ubuntu-bionic-python38:
