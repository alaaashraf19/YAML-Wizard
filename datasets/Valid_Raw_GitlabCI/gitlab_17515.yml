before_script:
- bundle check --path=${BUNDLE_CACHE} || bundle install --path=${BUNDLE_CACHE} --jobs=2
  --retry=3
cache:
  key: $CI_BUILD_NAME
  paths:
  - vendor/bundle/
  untracked: true
image: drecom/centos-ruby:2.4.0
pages:
  artifacts:
    paths:
    - public
  only:
  - master
  script:
  - bundle exec rake generate
  stage: deploy
stages:
- deploy
variables:
  BUNDLE_CACHE: vendor/bundle/
