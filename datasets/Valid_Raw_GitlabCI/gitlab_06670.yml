WetSponge:
  artifacts:
    name: ${CI_JOB_NAME}_${CI_COMMIT_REF_NAME}
    paths:
    - ./*.jar
  image: gradle
  only:
  - tags
  script:
  - gradle build
  - sh deploy.sh
  stage: deploy
cache:
  paths:
  - .m2/
pages:
  artifacts:
    paths:
    - public
  image: webdevops/sphinx
  only:
  - master
  script:
  - cd docs
  - make html
  - cd ..
  - cp -rl docs/_build/html public/
  - ls public
  stage: deploy
stages:
- deploy
