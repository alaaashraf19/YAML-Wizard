build-clang6:
  before_script:
  - sudo apt update
  - sudo apt install -y --no-install-recommends gcovr
  image: lasote/conanclang60
  script:
  - mkdir -p build && cd build
  - conan install ..
  - cmake ..
  - cmake --build .
  - cmake --build . --target test
  - cmake --build . --target memcheck
  - cmake --build . --target coverage
  stage: test
build-gcc7:
  artifacts:
    paths:
    - build/coverage/
    - build/test/Testing/Temporary/
  before_script:
  - sudo apt update
  - sudo apt install gcovr
  image: lasote/conangcc7
  script:
  - mkdir -p build && cd build
  - conan install ..
  - cmake ..
  - cmake --build .
  - cmake --build . --target test
  - cmake --build . --target memcheck
  - cmake --build . --target coverage
  stage: test
clang-tidy:
  before_script:
  - pacman -Syu --needed --noconfirm clang-tools-extra=6.0.1-2
  - clang-tidy --version
  image: base/archlinux:2018.09.01
  script:
  - clang-tidy -warnings-as-errors="*" -checks="-*,clang-analyzer-*,-clang-analyzer-alpha*"
    lib/hello.cpp -- -Iinclude
  stage: analysis
  variables:
    CC: clang
    CXX: clang++
cppcheck:
  before_script:
  - apt update
  - apt install -y --no-install-recommends cppcheck=1.82-1
  - cppcheck --version
  image: ubuntu:bionic
  script:
  - cppcheck lib/*.cpp --verbose --enable=all --inconclusive --language=c++ --error-exitcode=1
  stage: analysis
deploy-bintray:
  after_script:
  - curl -T build/hello-0.1.0.deb -uuilianries:${BINTRAY_API_KEY} "https://api.bintray.com/content/uilianries/dpkg/hello/0.1.0/pool/main/h/hello/hello_0.1.0_amd64.deb;deb_distribution=testing;deb_component=main;deb_architecture=i386,amd64;publish=1"
  artifacts:
    paths:
    - build/*.deb
  before_script:
  - sudo apt update
  - sudo apt install -y --no-install-recommends curl
  image: lasote/conangcc7
  script:
  - mkdir -p build && cd build
  - cmake .. -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTS=OFF
  - cmake --build .
  - cpack -G DEB .
  stage: deploy
doxygen:
  artifacts:
    paths:
    - build/docs/html/
  before_script:
  - apk update
  - apk add --no-cache -t .required_apks doxygen=1.8.13-r1 graphviz=2.40.1-r0
  - mkdir -p build/docs
  image: alpine:3.7
  script:
  - doxygen docs/Doxyfile
  stage: analysis
stages:
- analysis
- test
- deploy
