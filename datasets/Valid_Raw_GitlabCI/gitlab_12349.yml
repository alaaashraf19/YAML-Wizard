before_script:
- cat /etc/os-release
- python -V
- export DEBIAN_FRONTEND=noninteractive
- export TZ=Europe/London
- export QT_QPA_PLATFORM_PLUGIN_PATH=/usr/local/lib/python3.10/dist-packages/PySide6/Qt/plugins/platforms
- export DISPLAY=:99.0
- apt-get update -y && apt-get install -y ffmpeg libsm6 libxext6 libxrender1 libxi6
  libfontconfig1 libglib2.0-0 xvfb libxcb1 libxcb-composite0 libxcb-dpms0 libxcb-ewmh2
  libxcb-glx0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-render-util0 libxcb-shape0
  libxcb-xinerama0 libxcb-xkb1 libxcb-xtest0 libxcb-xv0 libxcb-xvmc0 libxcb-cursor0
  libxcb-imdkit1 libxcb-xrm0 libxkbcommon-x11-0 libopengl0 libegl1
- pip install virtualenv
- virtualenv venv
- source venv/bin/activate
- pip install .[dev]
- Xvfb :99 -ac &
- sleep 3
cache:
  paths:
  - .cache/pip
  - venv/
image: python:3.10
test:
  artifacts:
    paths:
    - .coverage
  coverage: /(?i)total.*? (100(?:\.0+)?\%|[1-9]?\d(?:\.\d+)?\%)$/
  script:
  - make coverage
variables:
  PIP_CACHE_DIR: $CI_PROJECT_DIR/.cache/pip
