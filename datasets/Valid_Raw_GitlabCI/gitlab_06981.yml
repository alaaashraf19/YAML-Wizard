java 0 3:
  artifacts:
    reports:
      junit: junit-example/TEST-CalculatorTest.xml
  image: openjdk:11-jdk
  script:
  - apt-get update && apt-get install -y ant
  - cd junit-example
  - ant test
  stage: test
rspec 0 3:
  artifacts:
    reports:
      junit: rspec.xml
  script:
  - bundle install
  - bundle exec rspec spec/test_spec.rb --format RspecJunitFormatter --out rspec.xml
  stage: test
rspec 1 3:
  artifacts:
    reports:
      junit: rspec.xml
  script:
  - bundle install
  - bundle exec rspec spec/string_helper_spec.rb --format RspecJunitFormatter --out
    rspec.xml
  stage: test
rspec 2 3:
  artifacts:
    reports:
      junit: rspec.xml
  script:
  - bundle install
  - bundle exec rspec spec/hash_scan_spec.rb --format RspecJunitFormatter --out rspec.xml
  stage: test
