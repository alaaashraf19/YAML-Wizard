author: ILUG-BOM
baseurl: ''
defaults:
- scope:
    path: ''
    type: posts
  values:
    layout: post
desc: 'The GNU/Linux Users Group, Mumbai, India, also called ILUG-BOM, is an informal
  mailing list of over 1000 members from all over India, but mostly from Mumbai.

  '
email: webmaster@ilug-bom.org.in
exclude:
- README.md
- vendor
- Gemfile
- Gemfile.lock
gems:
- octopress-paginate
gitlab_project: www.ilug-bom.org.in
gitlab_username: ilug-bom
include:
- _pages
kramdown:
  hard_wrap: false
  input: GFM
  parse_block_html: true
markdown: kramdown
navigation:
- desc: Homepage
  title: Home
  url: /
- desc: Linuxers mailing list
  title: Mailing list
  url: /linuxers/
- desc: A schedule of forthcoming meet or event
  title: Events
  url: /events/
- desc: Blog posts, tutorials and other notes
  title: Posts
  url: /posts/
- desc: Contact us
  title: Contact
  url: /contact/
pagination:
  limit: false
  per_page: 5
permalink: /:year/:title/
title: ILUG-BOM
twitter_username: ilugbom
url: http://www.ilug-bom.org.in
