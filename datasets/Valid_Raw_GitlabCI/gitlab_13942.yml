build:
  script:
  - ./gradlew jar
  stage: build
codacy:
  only:
  - master
  script: ./gradlew jacocoTestReportUpload
  stage: upload
image: java:8
javadoc:
  artifacts:
    expire_in: 1d
    paths:
    - build/docs
  script:
  - ./gradlew javadoc
  stage: build
pages:
  artifacts:
    paths:
    - public
  only:
  - master
  script:
  - mv build public
  stage: deploy
  when: always
stages:
- build
- test
- upload
- deploy
test:
  artifacts:
    expire_in: 1w
    paths:
    - build/reports
    when: always
  script:
  - ./gradlew check
  stage: test
