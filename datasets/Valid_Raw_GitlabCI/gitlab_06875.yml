build:
  image:
    entrypoint:
    - ''
    name: gcr.io/kaniko-project/executor:debug
  rules:
  - if: $CI_COMMIT_TAG =~ /^image-v.+/
  script:
  - /kaniko/executor --context "${CI_PROJECT_DIR}" --dockerfile "${CI_PROJECT_DIR}/Dockerfile"
    --destination "${CI_REGISTRY_IMAGE}:${CI_COMMIT_TAG}"
  stage: image
pages:
  artifacts:
    paths:
    - public
  image:
    entrypoint:
    - ''
    name: ${CI_REGISTRY_IMAGE}:image-v1
  rules:
  - if: $CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH
  - when: manual
  script:
  - make
  - echo "PDFs generated, well done machine!"
  stage: deploy
stages:
- image
- deploy
