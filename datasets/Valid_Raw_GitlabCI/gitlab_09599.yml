before_script:
- ruby -v
- gem update bundler
cache:
  paths:
  - vendor/cache
image: ruby:2.6.9
rails:
  script:
  - bundle install -j $(nproc) --path vendor/bundle
  - export RAILS_ENV=test
  - export RAILS_DATABASE_HOST=mysql
  - bin/rails db:setup
  stage: test
services:
- mysql:8.0
stages:
- test
- bundle
variables:
  GIT_SUBMODULE_STRATEGY: recursive
  MYSQL_DATABASE: mirrOS_api_test
  MYSQL_ROOT_PASSWORD: glancr
