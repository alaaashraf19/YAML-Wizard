build:
  artifacts:
    name: Build
    paths:
    - dist/*.whl
  cache:
    key: $CI_COMMIT_REF_SLUG
    paths:
    - venv
    policy: pull
  only:
  - master
  - release/*
  - tags
  - schedules
  script:
  - . venv/bin/activate
  - python setup.py bdist_wheel
  stage: build
dependencies:
  allow_failure: true
  before_script:
  - pip install pipenv
  - if [ ! -d "venv" ]; then virtualenv venv; fi
  cache:
    key: $CI_COMMIT_REF_SLUG
    paths:
    - venv
  script:
  - git diff --name-only `cat venv/last_sha || git log --oneline | tail -1 | awk '{print
    $1}'` | grep Pipfile; if [ "$? " = "1 " ]; then exit 0; fi
  - . venv/bin/activate
  - export LC_ALL=C.UTF-8; export LANG=C.UTF-8
  - pipenv install --dev
  - git rev-parse HEAD >> venv/last_sha
  stage: setup
deploy:
  before_script:
  - pip install twine
  dependencies:
  - build
  only:
  - master
  script:
  - twine upload -u $TWINE_USERNAME
  stage: deploy
  variables:
    GIT_STRATEGY: none
deploy-test:
  before_script:
  - pip install twine
  dependencies:
  - build
  only:
  - release/*
  script:
  - twine upload --repository-url https://test.pypi.org/legacy/ -u $TWINE_USERNAME
    TerrainLib/*
  stage: deploy
  variables:
    GIT_STRATEGY: none
    TWINE_PASSWORD: $TWINE_PASSWORD_TEST
image: python:3.6
pages:
  allow_failure: true
  artifacts:
    name: HTML Documentation
    paths:
    - public
  before_script:
  - apt-get update
  - apt-get install graphviz -y
  - . venv/bin/activate
  cache:
    key: $CI_COMMIT_REF_SLUG
    paths:
    - venv
    policy: pull
  dependencies:
  - test/unit
  except:
  - schedules
  only:
  - develop
  script:
  - sphinx-apidoc -o docs_src/api terrainlib
  - make html
  - cp -r docs/html/ public/
  - coverage html
  - cp -r htmlcov public/coverage
  stage: deploy
stages:
- setup
- build
- test
- deploy
test/install:
  before_script:
  - pip install virtualenv
  - virtualenv venv
  - . venv/bin/activate
  dependencies:
  - build
  only:
  - master
  - release/*
  - tags
  - schedules
  script:
  - pip install `ls dist/TerrainLib*.whl`
  - python -c "from terrainlib.terrain import Terrain; Terrain(size=512)"
  stage: test
  variables:
    GIT_STRATEGY: none
test/lint:
  allow_failure: true
  before_script:
  - . venv/bin/activate
  cache:
    key: $CI_COMMIT_REF_SLUG
    paths:
    - venv
    policy: pull
  script:
  - flake8 terrainlib
  stage: test
test/unit:
  after_script:
  - coverage report
  - coverage xml
  - python-codacy-coverage -r coverage.xml
  allow_failure: true
  artifacts:
    paths:
    - .coverage
    when: always
  before_script:
  - . venv/bin/activate
  - pip install coverage codacy-coverage
  cache:
    key: $CI_COMMIT_REF_SLUG
    paths:
    - venv
    policy: pull
  coverage: /TOTAL.+ ([0-9]{1,3}%)/
  except:
  - schedules
  script:
  - coverage run --source terrainlib setup.py test
  stage: test
