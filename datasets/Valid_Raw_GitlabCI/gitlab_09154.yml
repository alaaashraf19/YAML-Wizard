code_check:
  except:
  - master
  image: python:3.5-alpine
  script:
  - pip install 'coala-bears[alldeps]'
  - coala --ci
image: python:3
pages:
  artifacts:
    paths:
    - public
  only:
  - master
  script:
  - pip install -r requirements.txt
  - mkdocs build
  - mv site public
tests:
  except:
  - master
  script:
  - pip install -r requirements.txt
  - mkdocs build
