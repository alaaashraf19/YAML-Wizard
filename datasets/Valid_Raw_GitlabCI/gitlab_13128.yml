before_script:
- git config --global url."https://".insteadOf git://
- export PATH=$PATH:node_modules/.bin
- npm install --unsafe-perm
build:
  artifacts:
    expire_in: 1 week
    paths:
    - dist
  script:
  - npm build
  stage: build
cache:
  key: $CI_BUILD_REF_NAME
  paths:
  - node_modules/
  - bower_components/
  untracked: true
image: node:11.6.0
pages:
  artifacts:
    expire_in: 30 days
    paths:
    - public
  only:
  - master
  script:
  - rm -rf public/*
  - mkdir -p public/
  - mv landing-page/* public/
  - mv coverage/ public/
  stage: deploy
production:
  dependencies:
  - build
  environment: production
  only:
  - production
  script: echo "DEPLOY PRODUCTION"
  stage: deploy
staging:
  dependencies:
  - build
  environment: staging
  only:
  - staging
  script: echo "DEPLOY STAGING"
  stage: deploy
test:
  artifacts:
    expire_in: 1 week
    paths:
    - coverage/*
  script:
  - wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | apt-key add
    -
  - sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main"
    >> /etc/apt/sources.list.d/google.list'
  - apt update && apt-get install -y google-chrome-stable
  - npm run test:ci
  stage: test
variables:
  GIT_SSL_NO_VERIFY: 'true'
