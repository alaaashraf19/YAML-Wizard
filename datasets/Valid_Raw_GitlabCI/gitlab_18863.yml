  \ application.initializeCommand=\"\" \\\n      --set application.migrateCommand=\"\
  $DB_MIGRATE\" \\\n      --namespace=\"$KUBE_NAMESPACE\" \\\n      \"$name\" \\\n\
  \      chart/\n  else\n    helm upgrade --install \\\n      --wait \\\n      --set\
  \ service.enabled=\"$service_enabled\" \\\n      --set releaseOverride=\"$CI_ENVIRONMENT_SLUG\"\
  \ \\\n      --set image.repository=\"$CI_APPLICATION_REPOSITORY\" \\\n      --set\
  \ image.tag=\"$CI_APPLICATION_TAG\" \\\n      --set image.pullPolicy=IfNotPresent\
  \ \\\n      --set image.secrets[0].name=\"$secret_name\" \\\n      --set application.track=\"\
  $track\" \\\n      --set application.database_url=\"$DATABASE_URL\" \\\n      --set\
  \ service.url=\"$CI_ENVIRONMENT_URL\" \\\n      --set replicaCount=\"$replicas\"\
  \ \\\n      --set postgresql.enabled=\"$postgres_enabled\" \\\n      --set postgresql.nameOverride=\"\
  postgres\" \\\n      --set postgresql.postgresUser=\"$POSTGRES_USER\" \\\n     \
  \ --set postgresql.postgresPassword=\"$POSTGRES_PASSWORD\" \\\n      --set postgresql.postgresDatabase=\"\
  $POSTGRES_DB\" \\\n      --set application.migrateCommand=\"$DB_MIGRATE\" \\\n \
  \     --namespace=\"$KUBE_NAMESPACE\" \\\n      \"$name\" \\\n      chart/\n  fi\n\
  \n  kubectl rollout status -n \"$KUBE_NAMESPACE\" -w \"deployment/$name\"\n}\n\n\
  function scale() {\n  track=\"${1-stable}\"\n  percentage=\"${2-100}\"\n  name=\"\
  $CI_ENVIRONMENT_SLUG\"\n\n  if [[ \"$track\" != \"stable\" ]]; then\n    name=\"\
  $name-$track\"\n  fi\n\n  replicas=$(get_replicas \"$track\" \"$percentage\")\n\n\
  \  if [[ -n \"$(helm ls -q \"^$name$\")\" ]]; then\n    helm upgrade --reuse-values\
  \ \\\n      --wait \\\n      --set replicaCount=\"$replicas\" \\\n      --namespace=\"\
  $KUBE_NAMESPACE\" \\\n      \"$name\" \\\n      chart/\n  fi\n}\n\nfunction install_dependencies()\
  \ {\n  apk add -U openssl curl tar gzip bash ca-certificates git\n  curl -L -o /etc/apk/keys/sgerrand.rsa.pub\
  \ https://alpine-pkgs.sgerrand.com/sgerrand.rsa.pub\n  curl -L -O https://github.com/sgerrand/alpine-pkg-glibc/releases/download/2.28-r0/glibc-2.28-r0.apk\n\
  \  apk add glibc-2.28-r0.apk\n  rm glibc-2.28-r0.apk\n\n  curl \"https://kubernetes-helm.storage.googleapis.com/helm-v${HELM_VERSION}-linux-amd64.tar.gz\"\
  \ | tar zx\n  mv linux-amd64/helm /usr/bin/\n  mv linux-amd64/tiller /usr/bin/\n\
  \  helm version --client\n  tiller -version\n\n  curl -L -o /usr/bin/kubectl \"\
  https://storage.googleapis.com/kubernetes-release/release/v${KUBERNETES_VERSION}/bin/linux/amd64/kubectl\"\
  \n  chmod +x /usr/bin/kubectl\n  kubectl version --client\n}\n\nfunction setup_docker()\
  \ {\n  if ! docker info &>/dev/null; then\n    if [ -z \"$DOCKER_HOST\" -a \"$KUBERNETES_PORT\"\
  \ ]; then\n      export DOCKER_HOST='tcp://localhost:2375'\n    fi\n  fi\n}\n\n\
  function setup_test_db() {\n  if [ -z ${KUBERNETES_PORT+x} ]; then\n    DB_HOST=postgres\n\
  \  else\n    DB_HOST=localhost\n  fi\n  export DATABASE_URL=\"postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${DB_HOST}:5432/${POSTGRES_DB}\"\
  \n}\n\nfunction download_chart() {\n  if [[ ! -d chart ]]; then\n    auto_chart=${AUTO_DEVOPS_CHART:-gitlab/auto-deploy-app}\n\
  \    auto_chart_name=$(basename $auto_chart)\n    auto_chart_name=${auto_chart_name%.tgz}\n\
  \    auto_chart_name=${auto_chart_name%.tar.gz}\n  else\n    auto_chart=\"chart\"\
  \n    auto_chart_name=\"chart\"\n  fi\n\n  helm init --client-only\n  helm repo\
  \ add gitlab https://charts.gitlab.io\n  if [[ ! -d \"$auto_chart\" ]]; then\n \
  \   helm fetch ${auto_chart} --untar\n  fi\n  if [ \"$auto_chart_name\" != \"chart\"\
  \ ]; then\n    mv ${auto_chart_name} chart\n  fi\n\n  helm dependency update chart/\n\
  \  helm dependency build chart/\n}\n\nfunction ensure_namespace() {\n  echo \"Namespace\
  \ is $KUBE_NAMESPACE\"\n  kubectl describe namespace \"$KUBE_NAMESPACE\" || kubectl\
  \ create namespace \"$KUBE_NAMESPACE\"\n}\n\nfunction ensure_persistentvolume()\
  \ {\n  if [[ $(kubectl get persistentvolumes | grep google-backup | wc -l) == 0\
  \ ]]; then\n    kubectl apply -f deployment/Kubernetes-PersistentVolume.yaml\n \
  \   kubectl apply -f deployment/Kubernetes-PersistentVolumeClaim.yaml\n  fi\n}\n\
  \nfunction check_kube_domain() {\n  if [ -z ${AUTO_DEVOPS_DOMAIN+x} ]; then\n  \
  \  echo \"In order to deploy or use Review Apps, AUTO_DEVOPS_DOMAIN variable must\
  \ be set\"\n    echo \"You can do it in Auto DevOps project settings or defining\
  \ a variable at group or project level\"\n    echo \"You can also manually add it\
  \ in .gitlab-ci.yml\"\n    false\n  else\n    true\n  fi\n}\n\nfunction build()\
  \ {\n  registry_login\n\n  if [[ -f Dockerfile ]]; then\n    echo \"Building Dockerfile-based\
  \ application...\"\n    docker build \\\n      --build-arg HTTP_PROXY=\"$HTTP_PROXY\"\
  \ \\\n      --build-arg http_proxy=\"$http_proxy\" \\\n      --build-arg HTTPS_PROXY=\"\
  $HTTPS_PROXY\" \\\n      --build-arg https_proxy=\"$https_proxy\" \\\n      --build-arg\
  \ FTP_PROXY=\"$FTP_PROXY\" \\\n      --build-arg ftp_proxy=\"$ftp_proxy\" \\\n \
  \     --build-arg NO_PROXY=\"$NO_PROXY\" \\\n      --build-arg no_proxy=\"$no_proxy\"\
  \ \\\n      -t \"$CI_APPLICATION_REPOSITORY:$CI_APPLICATION_TAG\" .\n  else\n  \
  \  echo \"Building Heroku-based application using gliderlabs/herokuish docker image...\"\
  \n    docker run -i \\\n      -e BUILDPACK_URL \\\n      -e HTTP_PROXY \\\n    \
  \  -e http_proxy \\\n      -e HTTPS_PROXY \\\n      -e https_proxy \\\n      -e\
  \ FTP_PROXY \\\n      -e ftp_proxy \\\n      -e NO_PROXY \\\n      -e no_proxy \\\
  \n      --name=\"$CI_CONTAINER_NAME\" -v \"$(pwd):/tmp/app:ro\" gliderlabs/herokuish\
  \ /bin/herokuish buildpack build\n    docker commit \"$CI_CONTAINER_NAME\" \"$CI_APPLICATION_REPOSITORY:$CI_APPLICATION_TAG\"\
  \n    docker rm \"$CI_CONTAINER_NAME\" >/dev/null\n    echo \"\"\n\n    echo \"\
  Configuring $CI_APPLICATION_REPOSITORY:$CI_APPLICATION_TAG docker image...\"\n \
  \   docker create --expose 5000 --env PORT=5000 --name=\"$CI_CONTAINER_NAME\" \"\
  $CI_APPLICATION_REPOSITORY:$CI_APPLICATION_TAG\" /bin/herokuish procfile start web\n\
  \    docker commit \"$CI_CONTAINER_NAME\" \"$CI_APPLICATION_REPOSITORY:$CI_APPLICATION_TAG\"\
  \n    docker rm \"$CI_CONTAINER_NAME\" >/dev/null\n    echo \"\"\n  fi\n\n  echo\
  \ \"Pushing to GitLab Container Registry...\"\n  docker push \"$CI_APPLICATION_REPOSITORY:$CI_APPLICATION_TAG\"\
  \n  echo \"\"\n}\n\nfunction screw_helm() {\n  kubectl get pods -o wide --all-namespaces\n\
  \  kubectl apply -f deployment/Kubernetes-Deployment.yaml\n}\n\nfunction initialize_tiller()\
  \ {\n  echo \"Checking Tiller...\"\n\n  export HELM_HOST=\"localhost:44134\"\n \
  \ tiller -listen ${HELM_HOST} -alsologtostderr > /dev/null 2>&1 &\n  echo \"Tiller\
  \ is listening on ${HELM_HOST}\"\n\n  if ! helm version --debug; then\n    echo\
  \ \"Failed to init Tiller.\"\n    return 1\n  fi\n  echo \"\"\n}\n\nfunction create_secret()\
  \ {\n  echo \"Create secret...\"\n  if [[ \"$CI_PROJECT_VISIBILITY\" == \"public\"\
  \ ]]; then\n    return\n  fi\n\n  kubectl create secret -n \"$KUBE_NAMESPACE\" \\\
  \n    docker-registry gitlab-registry \\\n    --docker-server=\"$CI_REGISTRY\" \\\
  \n    --docker-username=\"${CI_DEPLOY_USER:-$CI_REGISTRY_USER}\" \\\n    --docker-password=\"\
  ${CI_DEPLOY_PASSWORD:-$CI_REGISTRY_PASSWORD}\" \\\n    --docker-email=\"$GITLAB_USER_EMAIL\"\
  \ \\\n    -o yaml --dry-run | kubectl replace -n \"$KUBE_NAMESPACE\" --force -f\
  \ -\n}\n\nfunction dast() {\n  export CI_ENVIRONMENT_URL=$(cat environment_url.txt)\n\
  \n  mkdir /zap/wrk/\n  /zap/zap-baseline.py -J gl-dast-report.json -t \"$CI_ENVIRONMENT_URL\"\
  \ || true\n  cp /zap/wrk/gl-dast-report.json .\n}\n\nfunction performance() {\n\
  \  export CI_ENVIRONMENT_URL=$(cat environment_url.txt)\n\n  mkdir gitlab-exporter\n\
  \  wget -O gitlab-exporter/index.js https://gitlab.com/gitlab-org/gl-performance/raw/10-5/index.js\n\
  \n  mkdir sitespeed-results\n\n  if [ -f .gitlab-urls.txt ]\n  then\n    sed -i\
  \ -e 's@^@'\"$CI_ENVIRONMENT_URL\"'@' .gitlab-urls.txt\n    docker run --shm-size=1g\
  \ --rm -v \"$(pwd)\":/sitespeed.io sitespeedio/sitespeed.io:6.3.1 --plugins.add\
  \ ./gitlab-exporter --outputFolder sitespeed-results .gitlab-urls.txt\n  else\n\
  \    docker run --shm-size=1g --rm -v \"$(pwd)\":/sitespeed.io sitespeedio/sitespeed.io:6.3.1\
  \ --plugins.add ./gitlab-exporter --outputFolder sitespeed-results \"$CI_ENVIRONMENT_URL\"\
  \n  fi\n\n  mv sitespeed-results/data/performance.json performance.json\n}\n\nfunction\
  \ persist_environment_url() {\n    echo $CI_ENVIRONMENT_URL > environment_url.txt\n\
  }\n\nfunction delete() {\n  track=\"${1-stable}\"\n  name=\"$CI_ENVIRONMENT_SLUG\"\
  \n\n  if [[ \"$track\" != \"stable\" ]]; then\n    name=\"$name-$track\"\n  fi\n\
  \n  if [[ -n \"$(helm ls -q \"^$name$\")\" ]]; then\n    helm delete --purge \"\
  $name\"\n  fi\n}\n"
build:
  image: docker:stable-git
  only:
  - branches
  script:
  - setup_docker
  - build
  services:
  - docker:stable-dind
  stage: build
image: alpine:latest
production:
  artifacts: *id001
  environment: *id002
  except:
    variables:
    - $STAGING_ENABLED
    - $CANARY_ENABLED
    - $INCREMENTAL_ROLLOUT_ENABLED
    - $INCREMENTAL_ROLLOUT_MODE
    - $KUBECONFIG == null
  only:
    refs:
    - master
  script: *id003
  stage: production
services:
- docker:dind
stages:
- build
- production
- performance
- cleanup
variables:
  DOCKER_DRIVER: overlay2
  HELM_VERSION: 2.11.0
  KUBERNETES_VERSION: 1.13.0
