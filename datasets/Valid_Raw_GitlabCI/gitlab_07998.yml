build_image:
  image: docker:git
  script:
  - docker login -u gitlab-ci-token -p $CI_BUILD_TOKEN registry.gitlab.com
  - docker build -t registry.gitlab.com/gbraad/gauth:latest .
  - docker push registry.gitlab.com/gbraad/gauth:latest
  services:
  - docker:dind
  stage: build
image: mhart/alpine-node:0.10
pages:
  artifacts:
    paths:
    - public
  only:
  - master
  stage: build
stages:
- test
- build
- deploy
test:
  artifacts:
    paths:
    - public
  script:
  - npm -d install
  - npm test
  - mkdir .public
  - cp -r * .public
  - mv .public public
  stage: test
