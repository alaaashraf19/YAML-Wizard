image: registry.gitlab.com/oer/docker/debian-emacs-tex-org:v1.0
pages:
  artifacts:
    expire_in: 4 weeks
    paths:
    - public
  before_script:
  - git submodule sync --recursive
  - git submodule update --init --recursive
  only:
  - master
  script:
  - emacs --batch --load elisp/publish.el --funcall org-publish-all
  stage: deploy
