build-lib:
  artifacts:
    expire_in: 1 week
    paths:
    - $CI_PROJECT_DIR/lib/*
  script:
  - mkdir build && cd build
  - cmake ..
  - make
  stage: build
build-python-2:
  artifacts:
    expire_in: 1 week
    paths:
    - $CI_PROJECT_DIR/lib/*
    - $CI_PROJECT_DIR/lib/python/*
    - $CI_PROJECT_DIR/bin/*
  script:
  - mkdir bin
  - mkdir build && cd build
  - cmake -Dpython=2 ..
  - make
  stage: build
build-python-3:
  artifacts:
    expire_in: 1 week
    paths:
    - $CI_PROJECT_DIR/lib/*
    - $CI_PROJECT_DIR/lib/python/*
    - $CI_PROJECT_DIR/bin/*
  script:
  - mkdir bin
  - mkdir build && cd build
  - cmake -Dpython=3 ..
  - make
  stage: build
build-test:
  artifacts:
    expire_in: 1 week
    paths:
    - $CI_PROJECT_DIR/lib/*
    - $CI_PROJECT_DIR/bin/*
  script:
  - mkdir build && cd build
  - cmake -Dtests=true ..
  - make
  stage: build
deploy-coverage:
  after_script:
  - lcov --capture --directory . --output-file coverage.info
  - lcov --remove coverage.info '/usr/*' --output-file coverage.info
  - lcov --list coverage.info
  - bash <(curl -s https://codecov.io/bash) -f coverage.info || echo "Codecov did
    not collect coverage reports"
  dependencies:
  - build-lib
  script:
  - mkdir build && cd build
  - cmake -Dreport=true ..
  - cmake --build . --config Debug
  - ctest --output-on-failure
  stage: deploy
deploy-install:
  dependencies:
  - build-test
  script:
  - mkdir build && cd build
  - cmake -Dtests=true ..
  - make && make install
  - ldconfig /usr/local/lib
  - cr-tests
  stage: deploy
image: owan/corerobotics:latest
stages:
- build
- test
- deploy
test-lib:
  dependencies:
  - build-test
  script:
  - $CI_PROJECT_DIR/bin/cr-tests
  stage: test
test-python-2:
  dependencies:
  - build-python-2
  script:
  - $CI_PROJECT_DIR/bin/cr-examples --python2
  stage: test
test-python-3:
  dependencies:
  - build-python-3
  script:
  - $CI_PROJECT_DIR/bin/cr-examples --python3
  stage: test
