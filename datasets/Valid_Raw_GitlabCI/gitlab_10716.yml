image: docker.io/jangorecki/r-data.table
pages:
  artifacts:
    paths:
    - public
  only:
  - master
  script:
  - apt-get update -qq
  - apt-get -qq install -y libpq-dev
  - R CMD build .
  - Rscript -e 'install.packages("RPostgreSQL", repos="https://cran.rstudio.com")'
  - Rscript -e 'install.packages(c("microbenchmarkCore","logR"), repos=paste0("https://",
    c("cran.rstudio.com","olafmersmann.github.io/drat","jangorecki.gitlab.io/logR")))'
  - R CMD check $(ls -1t *.tar.gz | head -n 1) --no-build-vignettes --no-manual --as-cran
  - Rscript -e 'install.packages("drat", repos="https://jangorecki.gitlab.io/drat")'
  - Rscript -e 'drat::insertArtifacts(repodir="public", repo.url="https://jangorecki.gitlab.io/big.data.table",
    repo.cran=TRUE)'
services:
- postgres
variables:
  POSTGRES_DB: postgres
  POSTGRES_HOST: postgres
  POSTGRES_PASSWORD: postgres
  POSTGRES_PORT: '5432'
  POSTGRES_USER: postgres
