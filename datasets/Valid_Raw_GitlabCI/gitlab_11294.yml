image: ghcr.io/astral-sh/uv:python3.10-alpine
lint:
  cache:
  - key:
      files:
      - uv.lock
    paths:
    - $UV_CACHE_DIR
  interruptible: true
  script:
  - export PATH="$UV_INSTALL_DIR:$PATH"
  - uv sync
  - uv run ruff format --diff .
  - uv run ruff check .
  - uv cache prune --ci
  stage: test
stages:
- test
tests:
  cache:
  - key:
      files:
      - uv.lock
    paths:
    - $UV_CACHE_DIR
  coverage: /TOTAL.+ ([0-9]{1,3}%)/
  interruptible: true
  script:
  - export PATH="$UV_INSTALL_DIR:$PATH"
  - uv sync
  - uv run mypy m3d tests
  - uv run pytest --cov=m3d --cov-report=term
  - uv cache prune --ci
  stage: test
variables:
  UV_CACHE_DIR: .uv-cache
  UV_INSTALL_DIR: $CI_PROJECT_DIR/.uv-bin
