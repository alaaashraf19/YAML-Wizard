.if-security-release-tag:
  if: ($CI_PIPELINE_SOURCE =~ /^(pipeline|web|api)$/) && ($SECURITY_RELEASE_PIPELINE
    =~ /^(tag|true)$/)
.security-release-tag-base:
  extends: .common-job-setup
  needs:
  - security_release_tag:start
  rules:
  - if: ($CI_PIPELINE_SOURCE =~ /^(pipeline|web|api)$/) && ($SECURITY_RELEASE_PIPELINE
      =~ /^(tag|true)$/)
  stage: security_release:tag
security_release_tag:check_component_branch_pipeline_status:
  allow_failure: false
  extends: .security-release-tag-base
  needs: []
  script:
  - bundle exec rake 'security:check_component_branch_pipeline_status'
  stage: security_release:tag:start
  when: manual
security_release_tag:check_omnibus_packages_tagging:
  extends:
  - .security-release-tag-base
  - .common-ci-tokens
  needs:
  - security_release_tag:generate_tag_jobs
  rules:
  - if: ($CI_PIPELINE_SOURCE =~ /^(pipeline|web|api)$/) && ($SECURITY_RELEASE_PIPELINE
      =~ /^(tag|true)$/)
    start_in: 150 minutes
    when: delayed
  script:
  - bundle exec rake 'security:tag:check_omnibus_packages_tagging'
security_release_tag:create_dynamic_pipeline:
  artifacts:
    paths:
    - dynamic-tag-gitlab-ci.yml
  extends:
  - .security-release-tag-base
  - .common-ci-tokens
  script:
  - 'set -eo pipefail


    # Generate dynamic pipeline YAML

    bundle exec rake "security:tag:generate_dynamic_pipeline" # Writes dynamic-tag-gitlab-ci.yml


    # Display generated YAML content

    echo -e "section_start:$(date +%s):generated_dynamic_pipeline[collapsed=true]\r\e[0KGenerated
    dynamic-tag-gitlab-ci.yml"

    cat dynamic-tag-gitlab-ci.yml

    echo -e "section_end:$(date +%s):generated_dynamic_pipeline\r\e[0K"

    '
security_release_tag:disable_components_update_task:
  extends:
  - .security-release-tag-base
  - .common-ci-tokens
  needs:
  - security_release_tag:generate_tag_jobs
  rules:
  - if: ($CI_PIPELINE_SOURCE =~ /^(pipeline|web|api)$/) && ($SECURITY_RELEASE_PIPELINE
      =~ /^(tag|true)$/)
  script:
  - bundle exec rake 'security:disable_components_update_task'
security_release_tag:generate_tag_jobs:
  needs:
  - security_release_tag:create_dynamic_pipeline
  rules:
  - if: ($CI_PIPELINE_SOURCE =~ /^(pipeline|web|api)$/) && ($SECURITY_RELEASE_PIPELINE
      =~ /^(tag|true)$/)
  stage: security_release:tag
  trigger:
    forward:
      pipeline_variables: true
    include:
    - artifact: dynamic-tag-gitlab-ci.yml
      job: security_release_tag:create_dynamic_pipeline
    - local: .gitlab/ci/include/secrets-self-contained.yml
    strategy: depend
security_release_tag:start:
  extends: .common-job-setup
  needs: []
  rules:
  - if: ($CI_PIPELINE_SOURCE =~ /^(pipeline|web|api)$/) && ($SECURITY_RELEASE_PIPELINE
      =~ /^(tag|true)$/)
  script:
  - bundle exec rake 'security:tag:start'
  stage: security_release:tag:start
  when: manual
security_release_tag:verify_release_deploy:
  extends: .common-job-setup
  needs:
  - security_release_tag:generate_tag_jobs
  rules:
  - if: ($CI_PIPELINE_SOURCE =~ /^(pipeline|web|api)$/) && ($SECURITY_RELEASE_PIPELINE
      =~ /^(tag|true)$/)
    start_in: 100 minutes
    when: delayed
  script:
  - bundle exec rake 'security:validate_release_deployment'
  stage: security_release:verify_release_deploy
  timeout: 2h
