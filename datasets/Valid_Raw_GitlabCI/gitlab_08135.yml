.build_teampage:
  artifacts:
    paths:
    - public
  script:
  - apk add --update --no-cache curl bash gzip
  - bash ./build.sh
  - ls public/
  stage: build
build_teampage:
  extends:
  - .build_teampage
  rules:
  - if: $CI_COMMIT_BRANCH != $CI_DEFAULT_BRANCH
default:
  tags:
  - gitlab-org
image: node:12-alpine
include:
- file: .gitlab-ci-template.yml
  project: gitlab-org/frontend/untamper-my-lockfile
pages:
  extends:
  - .build_teampage
  rules:
  - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
workflow:
  rules:
  - if: $CI_MERGE_REQUEST_IID
  - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
