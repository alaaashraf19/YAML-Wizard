cache:
  key: $CI_PROJECT_NAME
  paths:
  - $HOME/.cache/pip
include:
- component: gitlab.com/thelabnyc/thelab-ci-components/review@0.6.1
- component: gitlab.com/thelabnyc/thelab-ci-components/precommit@0.6.1
- component: gitlab.com/thelabnyc/thelab-ci-components/publish-gitlab-release@0.6.1
- component: gitlab.com/thelabnyc/thelab-ci-components/publish-to-pypi@0.6.1
services:
- postgres:latest@sha256:5ec39c188013123927f30a006987c6b0e20f3ef2b54b140dfa96dac6844d883f
stages:
- test
- release
test:
  coverage: /^TOTAL.+?(\d+\%)$/
  image: registry.gitlab.com/thelabnyc/python:${IMAGE}
  parallel:
    matrix:
    - IMAGE: '3.12'
      TOX_SKIP_ENV: ^(?!py312-)
    - IMAGE: '3.13'
      TOX_SKIP_ENV: ^(?!py313-)
    - IMAGE: '3.14'
      TOX_SKIP_ENV: ^(?!py314-)
  script:
  - uv sync --all-extras
  - uv run tox
  stage: test
variables:
  POSTGRES_DB: postgres
  POSTGRES_HOST_AUTH_METHOD: trust
  POSTGRES_PASSWORD: ''
  POSTGRES_USER: postgres
workflow:
  rules:
  - if: $CI_COMMIT_REF_PROTECTED == "true"
  - if: $CI_PIPELINE_SOURCE == "merge_request_event"
