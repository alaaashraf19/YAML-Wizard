before_script:
- npm install --progress=false
build:
  artifacts:
    expire_in: 1 week
    paths:
    - dist
  script:
  - npm run clear
  - npm run build -- --production
  stage: build
cache:
  paths:
  - node_modules/
deploy:
  dependencies:
  - build
  only:
  - tags
  script:
  - cp @types/i18next-tui.d.ts index.d.ts
  - echo '//registry.npmjs.org/:_authToken=${NPM_TOKEN}'>.npmrc
  - npm publish
  stage: deploy
image: node:9.3.0
lint:
  script:
  - npm run lint
  stage: test
pages:
  artifacts:
    paths:
    - public
  dependencies:
  - build
  only:
  - master
  - tags
  script:
  - cp -R demo public
  - cp -R dist public/dist
  - mkdir -p ./public/node_modules/react/umd/
  - mkdir -p ./public/node_modules/react-dom/umd/
  - cp ./node_modules/react/umd/react.development.js ./public/node_modules/react/umd/react.development.js
  - cp ./node_modules/react-dom/umd/react-dom.development.js ./public/node_modules/react-dom/umd/react-dom.development.js
  stage: deploy
stages:
- build
- test
- deploy
test:
  script:
  - npm run test
  stage: test
