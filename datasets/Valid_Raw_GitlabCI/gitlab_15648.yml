image: gradle:4.8.0-jdk8
job1:
  after_script:
  - mv build/libs/saturnshell-0.0.5-SNAPSHOT.jar build/libs/SaturnShell.jar
  artifacts:
    paths:
    - build/libs/SaturnShell.jar
  script: gradle clean assemble
  stage: build
job2:
  only:
  - master@Redrield/SaturnShell
  script: gradle clean test
  stage: test
stages:
- build
- test
