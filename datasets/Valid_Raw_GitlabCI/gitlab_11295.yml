build:documents:
  artifacts:
    untracked: true
  image: ${CI_REGISTRY}/${CI_PROJECT_PATH}:${CI_COMMIT_REF_SLUG}
  script:
  - cmake -DCMAKE_BUILD_TYPE=Release -DCMAKE_VERBOSE_MAKEFILE=1 -G "Unix Makefiles"
  - cmake --build . --config Release
  - ./build.py
  - "find ./ -type f -printf \"%P\\n\" | egrep \"[\u0410-\u042F]{4}\\.[0-9]{6}\\.[0-9]{3}\\\
    \ ([0-9\u0410-\u042F]+\\ )?\\([\u0410-\u042F\u0430-\u044F ]+\\)\\.pdf\" > .gitignore"
  - git add .gitignore
  - git clean -f -d -q
  - git rm -f .gitignore
  stage: build
  tags:
  - docker
  - linux
prepare:image:
  image:
    entrypoint:
    - ''
    name: gcr.io/kaniko-project/executor:debug
  rules:
  - changes:
    - Dockerfile
    when: always
  - allow_failure: true
    when: manual
  script:
  - mkdir -p /kaniko/.docker
  - export CONTEXT_PATH=${CI_PROJECT_DIR}
  - export DOCKERFILE_PATH=${CI_PROJECT_DIR}/Dockerfile
  - export DESTINATION_PATH=${CI_REGISTRY}/${CI_PROJECT_PATH}:${CI_COMMIT_REF_SLUG}
  - echo "{\"auths\":{\"${CI_REGISTRY}\":{\"username\":\"${CI_REGISTRY_USER}\",\"password\":\"${CI_REGISTRY_PASSWORD}\"}}}"
    > /kaniko/.docker/config.json
  - /kaniko/executor --context ${CONTEXT_PATH} --dockerfile ${DOCKERFILE_PATH} --destination
    ${DESTINATION_PATH}
  stage: prepare
  tags:
  - docker
  - linux
stages:
- prepare
- build
