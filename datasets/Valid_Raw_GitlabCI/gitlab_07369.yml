.base:
  artifacts:
    paths:
    - dist/
    - .quasar/
  before_script:
  - npm i -g yarn@^1.9
  - yarn
  cache:
    paths:
    - node_modules/
  image: node:lts-jessie
build:
  extends: .base
  script:
  - yarn build
  stage: build
lint:
  extends: .base
  script:
  - yarn lint
  stage: test
pages:
  artifacts:
    paths:
    - public
  except:
  - schedules
  extends: .base
  only:
  - master
  script:
  - PUBLIC=vuenote yarn build
  - mkdir public
  - mv dist/pwa-mat/* public
  stage: deploy
stages:
- test
- build
- deploy
