.example-template:
  before_script:
  - rustc --version --verbose
  - cargo --version --verbose
  - cargo build --example ${EXAMPLE:?} --color always
  interruptible: true
  only:
  - branches
  script:
  - RUST_LOG=trace cargo run --example ${EXAMPLE:?} &
  - sleep 5
  - nc localhost 2525 <"$INPUT" >client.log
  - cat "$INPUT"
  - cat client.log
  - find tmp/samotop/spool/new/ -type f -print -exec cat {} \; || true
  - test -z "$OUTPUT" || diff tmp/samotop/spool/new/* "$OUTPUT"
  stage: build
  variables:
    INPUT: samotop/examples/mailsession.txt
audit-test:
  extends: check-test
  script:
  - cargo audit --deny warnings --color always
check-test:
  extends: release-build
  only:
  - branches
  script:
  - cargo check --all-targets --all-features --bins --tests --benches --examples --color
    always
  - cargo clippy --all-targets --all-features --color always -- -Dclippy::all
  - ./fix.sh
debug-build:
  artifacts:
    paths:
    - target/debug/samotop-server
    - Cargo.lock
  cache:
    key: &id002
      files:
      - Cargo.lock
    paths: &id001
    - target/
    - $CARGO_HOME
    policy: pull-push
  extends: release-build
  only:
  - branches
  script:
  - cargo build --all-targets --all-features --color always
  - cargo test --all-targets --all-features --color always
  - ./clean.sh
example-cmd:
  extends: .example-template
  script:
  - cargo run --example ${EXAMPLE:?} <"$INPUT" >client.log
  - cat "$INPUT"
  - cat client.log
  - find tmp/samotop/spool/new/ -type f -print -exec cat {} \;
  - test -z "$OUTPUT" || diff tmp/samotop/spool/new/* "$OUTPUT"
  variables:
    EXAMPLE: on-cmd
    INPUT: samotop/examples/mailsessionlmtp.txt
    OUTPUT: samotop/examples/mailbody.txt
example-default:
  extends: .example-template
  variables:
    EXAMPLE: default
example-dir:
  extends: .example-template
  variables:
    EXAMPLE: to-dirmail
    OUTPUT: samotop/examples/mailbody.txt
example-lmtp:
  extends: .example-template
  services:
  - alias: dovecot
    name: dovecot/dovecot:2.3.11
  variables:
    EXAMPLE: to-lmtp-tcp
example-prudence:
  allow_failure: true
  extends: .example-template
  script:
  - RUST_LOG=trace cargo run --example ${EXAMPLE:?} &
  - sleep 5
  - echo ehlo booo | nc -C localhost 2525 | tee bad-client.log
  - nc -w 10 -C 127.0.0.1 2525 | tee good-client.log
  - diff bad-client.log samotop/examples/prudence-bad.txt
  - diff good-client.log samotop/examples/prudence-good.txt
  variables:
    EXAMPLE: prudent
include:
- /.gitlab-ci.builder.yml
nightly-test:
  allow_failure: true
  before_script:
  - rustup default nightly
  - rustc --version --verbose
  - cargo --version --verbose
  cache:
    key:
      files:
      - Cargo.lock
      prefix: nightly
    paths: *id001
    policy: pull-push
  interruptible: true
  only:
  - branches
  script:
  - cargo test --all-targets --all-features --color always
  - cargo clippy --all-features --color always -- -Dclippy::all
  - cargo check --all-targets --all-features --bins --tests --benches --examples --color
    always
  - ./clean.sh
  stage: build
  variables:
    RUST_BACKTRACE: 1
publish-crates:
  artifacts:
    paths:
    - tmp/publish-pipeline.yml
  before_script:
  - rustc --version --verbose
  - cargo --version --verbose
  - mkdir -p tmp
  interruptible: true
  script:
  - "# =====  List crates in publishing order ===================\ntruncate --size\
    \ 0 tmp/crates\n(cargo tree -p samotop-server --all-features && cargo tree -p\
    \ samotop --all-features) | \ntac | grep -o 'samotop.*' | cut -d ' ' -f1-2 | sed\
    \ 's/ v/ /g' |\nxargs -I {} sh -c 'egrep \"^{}$\" tmp/crates >/dev/null || echo\
    \ \"{}\" >> tmp/crates'\ncat tmp/crates\n"
  - '# ===== List published crates ==============================

    cat tmp/crates |

    cut -d '' '' -f1 |

    xargs -I {} curl -sSLf https://crates.io/api/v1/crates/{} |

    jq -r ''.crate.name  + " " + .versions[].num'' | tee tmp/crates-released

    '
  - "# ===== Crates that need to be released in order ===========\n(diff -d  --changed-group-format='%<'\
    \ --unchanged-group-format='' tmp/crates tmp/crates-released || true) | \ntee\
    \ tmp/crates-unreleased\n"
  - cp .gitlab-ci.publish.yml tmp/publish-pipeline.yml
  - "# ===== Create publish jobs ================================\ncat tmp/crates-unreleased\
    \ | tr ' ' '/' | \n  sed -r 's/(.*)\\/(.*)/\\0: \\n  extends: .publish-crate\\\
    n  needs: [\"\\0 test\"]\\n  dependencies: [\"\\0 test\"]\\n  environment: crate\\\
    /\\1\\n/g' |\n  tee -a tmp/publish-pipeline.yml\n"
  - "# ===== Create test jobs ===================================\ncat tmp/crates\
    \ | tr ' ' '/' | \n  sed 's/.*/\\0 test: \\n  extends: .test-crate\\n/g' |\n \
    \ tee -a tmp/publish-pipeline.yml\n"
  stage: build
publish-crates-trigger:
  stage: release
  trigger:
    include:
    - artifact: tmp/publish-pipeline.yml
      job: publish-crates
release-build:
  artifacts:
    paths:
    - target/release/samotop-server
    - Cargo.lock
  before_script:
  - rustc --version --verbose
  - cargo --version --verbose
  - mkdir -p target
  - mkdir -p "$CARGO_HOME"
  - du -shx target
  - du -shx "$CARGO_HOME"
  cache:
    key: *id002
    paths: *id001
    policy: pull
  interruptible: true
  only:
  - /^release\/*/
  - /^hotfix\/*/
  - develop
  - master
  - tags
  script:
  - cargo build --all-features --release --color always
  - cargo test --all-features --release --color always
  stage: build
server-docker-image:
  environment:
    name: server-docker-image
    url: https://gitlab.com/BrightOpen/Samotop/container_registry/1510406
  extends: .kaniko-build-template
  interruptible: true
  only:
    changes:
    - samotop-server/**/*
    - Dockerfile
    - .gitlab-ci.yml
  stage: release
  variables:
    BUILD_ARGS: ''
    COMPONENT: samotop
    CONTEXT: .
    DOCKERFILE: Dockerfile
server-version:
  artifacts:
    reports:
      dotenv: vars.env
  interruptible: true
  script:
  - SAMOTOP_VERSION=$(cargo run -p samotop-server -- --version | cut -d' ' -f2)
  - echo "SAMOTOP_VERSION=$SAMOTOP_VERSION" > vars.env
  - echo "SAMOTOP_IMAGE=$CI_REGISTRY_IMAGE/samotop:$SAMOTOP_VERSION" >> vars.env
  - cat vars.env
  stage: build
