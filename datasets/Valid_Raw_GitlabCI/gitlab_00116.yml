build_amd64:
  artifacts:
    paths:
    - build/
  before_script:
  - export APT_CACHE_DIR=`pwd`/apt-cache && mkdir -pv $APT_CACHE_DIR
  - "apt-get update -yq && apt-get -o dir::cache::archives=\"$APT_CACHE_DIR\" install\
    \ -y \\\n    qt5-qmake qttools5-dev-tools qtbase5-dev qtchooser pkg-config doxygen\
    \ wget libglib2.0-dev libsqlite3-dev libxml2-dev gtk-doc-tools libgirepository1.0-dev\
    \ gobject-introspection libxml2-utils python3-gi python-gi-dev valac check python3-pip\n"
  - apt-get -o dir::cache::archives="$APT_CACHE_DIR" install -y dbus-test-runner lcov
    gcovr
  dependencies:
  - build_dependencies
  image: ubuntu:bionic
  script:
  - STAGING="$PWD/staging"
  - export PKG_CONFIG_PATH="$STAGING/lib/pkgconfig:$PKG_CONFIG_PATH"
  - export LD_LIBRARY_PATH="$STAGING/lib:$LD_LIBRARY_PATH"
  - export QT_SELECT=qt5
  - mkdir build
  - cd build
  - qmake CONFIG+=debug CONFIG+=coverage ..
  - make -j 4
  stage: build
build_amd64_qt6:
  artifacts:
    paths:
    - build/
  before_script:
  - export APT_CACHE_DIR=`pwd`/apt-cache && mkdir -pv $APT_CACHE_DIR
  - apt-get update -yq && apt-get -o dir::cache::archives="$APT_CACHE_DIR" install
    -y qmake6 qt6-base-dev pkg-config libqt6sql6-sqlite doxygen libdbus-1-dev g++
    make libglib2.0-dev gtk-doc-tools libgirepository1.0-dev gobject-introspection
    libxml2-utils python3-gi python-gi-dev valac check python3-pip libsqlite3-dev
    libxml2-dev
  dependencies:
  - build_dependencies
  image: ubuntu:jammy
  script:
  - STAGING="$PWD/staging"
  - find $STAGING
  - export PKG_CONFIG_PATH="$STAGING/lib/pkgconfig:$PKG_CONFIG_PATH"
  - export LD_LIBRARY_PATH="$STAGING/lib:$LD_LIBRARY_PATH"
  - mkdir build
  - cd build
  - qmake6 CONFIG+=debug CONFIG+=coverage ..
  - make -j 4
  stage: build
build_dependencies:
  artifacts:
    paths:
    - staging
  before_script:
  - export APT_CACHE_DIR=`pwd`/apt-cache && mkdir -pv $APT_CACHE_DIR
  - PACKAGES+=" wget"
  - PACKAGES+=" libglib2.0-dev libsqlite3-dev libxml2-dev gtk-doc-tools libgirepository1.0-dev
    gobject-introspection libxml2-utils python3-gi python-gi-dev valac check python3-pip"
  - apt-get update -yq && apt-get -o dir::cache::archives="$APT_CACHE_DIR" install
    -y $PACKAGES
  - pip3 install meson ninja
  image: ubuntu:bionic
  script:
  - STAGING="$PWD/staging"
  - LIBACCOUNTS_VERSION="master"
  - LIBACCOUNTS_ARCHIVE="libaccounts-glib-${LIBACCOUNTS_VERSION}.tar.bz2"
  - mkdir libaccounts-glib && cd libaccounts-glib
  - if [ ! -d "libaccounts-glib-${LIBACCOUNTS_VERSION}" ]; then
  - if [ ! -f "$LIBACCOUNTS_ARCHIVE" ]; then
  - wget -c -nv "https://gitlab.com/accounts-sso/libaccounts-glib/-/archive/master/$LIBACCOUNTS_ARCHIVE"
  - fi
  - tar xjf "$LIBACCOUNTS_ARCHIVE"
  - fi
  - cd "libaccounts-glib-${LIBACCOUNTS_VERSION}"
  - mkdir build
  - meson build --prefix $STAGING --libdir lib
  - cd build
  - ninja
  - ninja install || true
  stage: deps
cache:
  key: apt-cache
  paths:
  - apt-cache/
  - libaccounts-glib
pages:
  artifacts:
    paths:
    - public
  before_script:
  - export APT_CACHE_DIR=`pwd`/apt-cache && mkdir -pv $APT_CACHE_DIR
  - "apt-get update -yq && apt-get -o dir::cache::archives=\"$APT_CACHE_DIR\" install\
    \ -y \\\n    qt5-qmake qttools5-dev-tools qtbase5-dev qtchooser pkg-config doxygen\
    \ wget libglib2.0-dev libsqlite3-dev libxml2-dev gtk-doc-tools libgirepository1.0-dev\
    \ gobject-introspection libxml2-utils python3-gi python-gi-dev valac check python3-pip\n"
  - apt-get -o dir::cache::archives="$APT_CACHE_DIR" install -y dbus-test-runner lcov
    gcovr
  dependencies:
  - test_amd64
  image: ubuntu:bionic
  only:
  - master
  script:
  - find build | xargs touch
  - cd build
  - make docs
  - cd ..
  - mkdir public
  - cp -a build/coverage-html public/coverage
  - cp -a build/doc/html/* public/
  stage: deploy
stages:
- deps
- build
- test
- deploy
test_amd64:
  artifacts:
    paths:
    - build/
  before_script:
  - export APT_CACHE_DIR=`pwd`/apt-cache && mkdir -pv $APT_CACHE_DIR
  - PACKAGES+=" wget"
  - "apt-get update -yq && apt-get -o dir::cache::archives=\"$APT_CACHE_DIR\" install\
    \ -y \\\n    qt5-qmake qttools5-dev-tools qtbase5-dev qtchooser pkg-config doxygen\
    \ \\\n    $PACKAGES\n"
  - apt-get -o dir::cache::archives="$APT_CACHE_DIR" install -y dbus-test-runner lcov
    gcovr
  dependencies:
  - build_dependencies
  - build_amd64
  image: ubuntu:bionic
  script:
  - STAGING="$PWD/staging"
  - export LD_LIBRARY_PATH="$STAGING/lib:$LD_LIBRARY_PATH"
  - find build | xargs touch
  - cd build
  - make coverage-html
  stage: test
test_amd64_qt6:
  artifacts:
    paths:
    - ./
  before_script:
  - export APT_CACHE_DIR=`pwd`/apt-cache && mkdir -pv $APT_CACHE_DIR
  - export DEBIAN_FRONTEND=noninteractive
  - apt-get update -yq && apt-get -o dir::cache::archives="$APT_CACHE_DIR" install
    -y dbus-test-runner libqtdbusmock1-dev libqtdbustest1-dev lcov gcovr make qmake6
    qt6-base-dev pkg-config libqt6sql6-sqlite doxygen libdbus-1-dev g++ make libsqlite3-dev
    libxml2-dev libglib2.0-dev
  dependencies:
  - build_dependencies
  - build_amd64_qt6
  image: ubuntu:jammy
  script:
  - STAGING="$PWD/staging"
  - export LD_LIBRARY_PATH="$STAGING/lib:$LD_LIBRARY_PATH"
  - find build | xargs touch
  - cd build
  - make coverage-html
  stage: test
