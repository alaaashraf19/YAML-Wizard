before_script:
- export APT_CACHE_DIR=`pwd`/apt-cache && mkdir -pv $APT_CACHE_DIR
- export DEBIAN_FRONTEND=noninteractive
- apt-get update -yq && apt-get -o dir::cache::archives="$APT_CACHE_DIR" install -yq
  software-properties-common
- "if [ \"$CI_JOB_IMAGE\" == \"ubuntu:xenial\" ]; then\n  add-apt-repository \"deb\
  \ http://archive.ubuntu.com/ubuntu/ xenial-backports main restricted universe multiverse\"\
  \ -u -s\n  apt-get -o dir::cache::archives=\"$APT_CACHE_DIR\" -t xenial-backports\
  \ install -yq meson\nelse\n  apt-get -o dir::cache::archives=\"$APT_CACHE_DIR\"\
  \ install -yq meson\nfi\n"
- apt-get -o dir::cache::archives="$APT_CACHE_DIR" install -yq gobject-introspection
  gtk-doc-tools libgirepository1.0-dev libglib2.0-dev libsqlite3-dev libxml2-dev libxml2-utils
  python3 python3-gi python-gi-dev valac
- apt-get -o dir::cache::archives="$APT_CACHE_DIR" install -yq check dbus-test-runner
  lcov gcovr
- apt-get -o dir::cache::archives="$APT_CACHE_DIR" install -yq sudo
- useradd -m tester
- adduser tester sudo
- apt-get -o dir::cache::archives="$APT_CACHE_DIR" install -yq locales
- echo "en_US UTF-8" > /etc/locale.gen
- locale-gen en_US.UTF-8
- export LANG=en_US.UTF-8
- export LANGUAGE=en_US:en
- export LC_ALL=en_US.UTF-8
- "if [ \"$CI_JOB_IMAGE\" == \"ubuntu:xenial\" ]; then\n  apt-get -o dir::cache::archives=\"\
  $APT_CACHE_DIR\" install -yq python3-pip\n  pip3 install meson==0.56.2\nfi\n"
build_amd64:
  artifacts:
    paths:
    - ./
  script:
  - export PYTHON=python3
  - meson build -Db_coverage=true
  - cd build
  - ninja
  stage: build
build_jammy_amd64:
  artifacts:
    paths:
    - ./
  image: ubuntu:jammy
  script:
  - export PYTHON=python3
  - meson build -Db_coverage=true
  - cd build
  - ninja
  stage: build
cache:
  key: apt-cache
  paths:
  - apt-cache/
image: ubuntu:xenial
pages:
  artifacts:
    paths:
    - public
  dependencies:
  - test_amd64
  only:
  - master
  script:
  - mkdir public
  - cp -a build/meson-logs/coveragereport public/coverage
  - cp -a build/docs/reference/html/* public/
  stage: deploy
test_amd64:
  artifacts:
    paths:
    - ./
  dependencies:
  - build_amd64
  script:
  - cd build
  - chmod a+rw -R .
  - sudo -u tester ninja test
  - sudo -u tester ninja coverage-html
  - sudo ninja install
  stage: test
test_jammy_amd64:
  artifacts:
    paths:
    - ./
  dependencies:
  - build_jammy_amd64
  image: ubuntu:jammy
  script:
  - cd build
  - chmod a+rw -R .
  - sudo -u tester ninja test
  - sudo -u tester ninja coverage-html
  - sudo ninja install
  stage: test
