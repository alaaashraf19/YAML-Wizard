Golang Compile - Native:
  artifacts:
    expire_in: 1 year
    paths:
    - slackr
  script:
  - 'go build -ldflags="${LDFLAGS_GITVERSION} ${LDFLAGS_WEBHOOK}" -o slackr

    '
  stage: build
Golang Compile - darwin_amd64:
  artifacts:
    expire_in: 1 year
    paths:
    - slackr
  only:
  - master
  script:
  - 'go build -ldflags="${LDFLAGS_GITVERSION} ${LDFLAGS_WEBHOOK}" -o slackr

    '
  stage: build
  variables:
    GOARCH: amd64
    GOOS: darwin
Golang Compile - linux_amd64:
  artifacts:
    expire_in: 1 year
    paths:
    - slackr
  only:
  - master
  script:
  - 'go build -ldflags="${LDFLAGS_GITVERSION} ${LDFLAGS_WEBHOOK}" -o slackr

    '
  stage: build
  variables:
    GOARCH: amd64
    GOOS: linux
Golang Compile - linux_armv7l:
  artifacts:
    expire_in: 1 year
    paths:
    - slackr
  only:
  - master
  script:
  - 'go build -ldflags="${LDFLAGS_GITVERSION} ${LDFLAGS_WEBHOOK}" -o slackr

    '
  stage: build
  variables:
    GOARCH: arm
    GOARM: '7'
    GOOS: linux
Golang Compile - linux_mips64:
  artifacts:
    expire_in: 1 year
    paths:
    - slackr
  only:
  - master
  script:
  - 'go build -ldflags="${LDFLAGS_GITVERSION} ${LDFLAGS_WEBHOOK}" -o slackr

    '
  stage: build
  variables:
    GOARCH: mips64
    GOOS: linux
Syntax Check:
  script:
  - gofmt -e *.go
  stage: test
Test Call to Version Command:
  script:
  - go run slackr.go -version
  - 'go run -ldflags="${LDFLAGS_GITVERSION}" slackr.go -version

    '
  stage: test
Test Message to Slackbot:
  script:
  - 'go run slackr.go -target @slackbot -message "Test" -verbose

    '
  stage: test
before_script:
- "[ -z \"${BUILD_WEBHOOK_URL}\" ] && {\n  >&2 echo \"BUILD_WEBHOOK_URL empty, clearing\
  \ LDFLAGS_WEBHOOK.\"\n  unset LDFLAGS_WEBHOOK\n}\n"
image: golang:1.11-alpine
stages:
- test
- build
variables:
  LDFLAGS_GITVERSION: -X main.git_version='${CI_COMMIT_SHA}'
  LDFLAGS_WEBHOOK: -X main.build_webhook_url="${BUILD_WEBHOOK_URL}"
