cache:
  paths:
  - .m2/repository/
compile:
  script: mvn $MAVEN_CLI_OPTS compile
  stage: build
  tags:
  - docker
deploy_release:
  artifacts:
    paths:
    - target/
  before_script:
  - export PROJECT_VERSION=$(mvn -q -Dexec.executable=echo -Dexec.args='${project.version}'
    --non-recursive exec:exec)
  - gpg -v --import <(echo "$GPG_SIGNING_KEY")
  - gpg --list-key
  only:
  - tags
  script:
  - mvn $MAVEN_CLI_OPTS -P release -DskipTests=true deploy
  stage: deploy
  tags:
  - docker
deploy_snapshot:
  artifacts:
    paths:
    - target/
  before_script:
  - export PROJECT_VERSION=$(mvn -q -Dexec.executable=echo -Dexec.args='${project.version}'
    --non-recursive exec:exec)
  - "if [[ \"$PROJECT_VERSION\" != *SNAPSHOT ]]; then\n  echo \"not a snapshot version,\
    \ not deploying\"\n  exit 1\nfi\n"
  - gpg -v --import <(echo "$GPG_SIGNING_KEY")
  - gpg --list-key
  only:
  - master
  script:
  - mvn $MAVEN_CLI_OPTS -P release -DskipTests=true deploy
  stage: deploy
  tags:
  - docker
image: maven:3.6-jdk-11
integration_tests:
  artifacts:
    reports:
      junit:
      - target/surefire-reports/TEST-*.xml
      - target/failsafe-reports/TEST-*.xml
  script:
  - mvn $MAVEN_CLI_OPTS -DhttpBinDomain=httpbin -P integration-test verify
  - cat target/site/jacoco/index.html
  services:
  - alias: httpbin
    name: kennethreitz/httpbin
  stage: test
  tags:
  - docker
stages:
- verify_source
- build
- test
- deploy
unit_tests:
  artifacts:
    reports:
      junit:
      - target/surefire-reports/TEST-*.xml
      - target/failsafe-reports/TEST-*.xml
  script: mvn $MAVEN_CLI_OPTS verify
  stage: test
  tags:
  - docker
variables:
  MAVEN_CLI_OPTS: -s .m2/settings.xml --batch-mode
  MAVEN_OPTS: -Dmaven.repo.local=.m2/repository -Djava.awt.headless=true
verify_release:
  only:
  - tags
  script:
  - export PROJECT_VERSION=$(mvn -q -Dexec.executable=echo -Dexec.args='${project.version}'
    --non-recursive exec:exec)
  - "if [[ \"$PROJECT_VERSION\" == *SNAPSHOT ]]; then\n  echo \"a release version\
    \ can't be a snapshot (project.version=$PROJECT_VERSION)\"\n  exit 1\nfi\n"
  - "if [ \"$PROJECT_VERSION\" != \"$CI_COMMIT_TAG\" ]; then\n  echo \"project.version\
    \ doesn't match git tag (project.version=$PROJECT_VERSION, git.tag=$CI_COMMIT_TAG)\"\
    \n  exit 1\nfi\n"
  stage: verify_source
  tags:
  - docker
