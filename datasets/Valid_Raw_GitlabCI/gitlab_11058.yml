.binary_artifact: &id001
  paths:
  - build/marcfs
.build_script: &id002
- mkdir -pv build
- meson setup --buildtype=release --prefix=/usr build .
- meson compile --jobs=$(nproc) -C build
- ./build/apitest
.fstest_after: &id003
- userdel fstest
.fstest_script: &id004
- su --whitelist-environment=MARCFS_TEST_USERNAME,MARCFS_TEST_PASSWORD -c 'python3
  fstest.py -v' - fstest
aur package for arch:
  artifacts:
    paths:
    - '*.tar.zst'
  before_script:
  - pacman -Syu --noconfirm
  - pacman -S --noconfirm awk git meson cmake pkgconf gcc fuse3 libcurl-gnutls jsoncpp
    fakeroot
  - useradd --create-home build
  - cp distribution/archlinux/PKGBUILD ~build
  image: archlinux:base
  needs: []
  script:
  - su -c 'makepkg -s' - build
  - cp -v ~build/*.tar.zst .
  stage: build
build on arch:
  artifacts: *id001
  before_script:
  - pacman -Syu --noconfirm
  - pacman -S --noconfirm git meson cmake pkgconf gcc fuse3 libcurl-gnutls jsoncpp
  image: archlinux:base
  needs: []
  script: *id002
  stage: build
  variables:
    MARCFS_TEST_PASSWORD: $MARCFS_ARCH_TEST_PASSWORD
    MARCFS_TEST_USERNAME: $MARCFS_ARCH_TEST_USERNAME
build on fedora:
  artifacts: *id001
  before_script:
  - yum -y install git-all meson cmake pkg-config gcc-c++ fuse3-devel libcurl-devel
    jsoncpp-devel
  image: fedora
  needs: []
  script: *id002
  stage: build
  variables:
    MARCFS_TEST_PASSWORD: $MARCFS_FEDORA_TEST_PASSWORD
    MARCFS_TEST_USERNAME: $MARCFS_FEDORA_TEST_USERNAME
build on ubuntu:
  artifacts: *id001
  before_script:
  - apt-get update -qq
  - apt-get install -y -qq git g++ meson cmake pkg-config libfuse3-dev libcurl4-openssl-dev
    libjsoncpp-dev
  image: ubuntu:22.04
  needs: []
  script: *id002
  stage: build
  variables:
    DEBIAN_FRONTEND: noninteractive
    MARCFS_TEST_PASSWORD: $MARCFS_UBUNTU_TEST_PASSWORD
    MARCFS_TEST_USERNAME: $MARCFS_UBUNTU_TEST_USERNAME
deb package for ubuntu:
  artifacts:
    paths:
    - '*.deb'
  before_script:
  - apt-get update -qq
  - apt-get install -y -qq git g++ meson cmake pkg-config libfuse3-dev libcurl4-openssl-dev
    libjsoncpp-dev dh-make
  image: ubuntu:22.04
  needs: []
  script:
  - dh_make -p marcfs_0.8.1 --createorig --single --yes --copyright gpl3
  - 'sed -E -i ''s|^Section: .*|Section: otherosfs|g'' debian/control'
  - 'sed -E -i ''s|^Homepage: .*|Homepage: https://gitlab.com/Kanedias/MARC-FS|g''
    debian/control'
  - 'sed -E -i ''s|^Description: .*|Description: Mail.ru Cloud filesystem written
    for FUSE|g'' debian/control'
  - cp README.md debian/README.Debian
  - dpkg-buildpackage -rfakeroot --unsigned-source --unsigned-changes --build=binary
  - cp ../*.deb .
  stage: build
  variables:
    DEBEMAIL: kanedias@gmx.net
    DEBFULLNAME: Oleg (Kanedias) Chernovskiy
    DEBIAN_FRONTEND: noninteractive
    DEB_BUILD_OPTIONS: nocheck
fstest on arch:
  after_script: *id003
  before_script:
  - pacman -Syu --noconfirm
  - pacman -S --noconfirm fuse3 fuse2 libcurl-gnutls jsoncpp python
  - useradd --create-home fstest
  - cp build/marcfs tests/fstest.py ~fstest
  - 'chown -R fstest: ~fstest'
  image: archlinux:base
  needs:
  - build on arch
  script: *id004
  stage: fstest
  variables:
    MARCFS_TEST_PASSWORD: $MARCFS_ARCH_TEST_PASSWORD
    MARCFS_TEST_USERNAME: $MARCFS_ARCH_TEST_USERNAME
fstest on fedora:
  after_script: *id003
  before_script:
  - yum -y install fuse fuse-libs fuse3 fuse3-libs libcurl jsoncpp python util-linux
  - useradd --create-home fstest
  - cp build/marcfs tests/fstest.py ~fstest
  - 'chown -R fstest: ~fstest'
  image: fedora
  needs:
  - build on fedora
  script:
  - export NSS_STRICT_NOFORK=DISABLED
  - su --whitelist-environment=MARCFS_TEST_USERNAME,MARCFS_TEST_PASSWORD,NSS_STRICT_NOFORK
    -c 'python3 fstest.py -v' - fstest
  stage: fstest
  variables:
    MARCFS_TEST_PASSWORD: $MARCFS_FEDORA_TEST_PASSWORD
    MARCFS_TEST_USERNAME: $MARCFS_FEDORA_TEST_USERNAME
fstest on ubuntu:
  after_script: *id003
  before_script:
  - apt-get update -qq
  - apt-get install -y -qq fuse3 libcurl4 libjsoncpp25 python3
  - useradd --create-home fstest
  - cp build/marcfs tests/fstest.py ~fstest
  - 'chown -R fstest: ~fstest'
  image: ubuntu:22.04
  needs:
  - build on ubuntu
  script: *id004
  stage: fstest
  variables:
    DEBIAN_FRONTEND: noninteractive
    MARCFS_TEST_PASSWORD: $MARCFS_UBUNTU_TEST_PASSWORD
    MARCFS_TEST_USERNAME: $MARCFS_UBUNTU_TEST_USERNAME
rpm package for fedora:
  artifacts:
    paths:
    - '*.rpm'
  before_script:
  - dnf -y install git meson cmake pkgconf-pkg-config gcc-c++ fuse3-devel libcurl-devel
    jsoncpp-devel jemalloc-devel rpm-build
  image: fedora
  needs: []
  script:
  - version=$(grep Version distribution/fedora/fuse-marcfs.spec | grep -oP "\d.*")
  - tar --transform "s|^|fuse-marcfs-$version/|g" -cvaf fuse-marcfs-$version.tar.zst
    *
  - mkdir -pv ~/rpmbuild/{RPMS,SRPMS,BUILD,SOURCES,SPECS,tmp}
  - mv -v fuse-marcfs-$version.tar.zst ~/rpmbuild/SOURCES
  - rpmbuild -ba distribution/fedora/fuse-marcfs.spec
  - cp -v /root/rpmbuild/RPMS/*/*.rpm .
  stage: build
stages:
- build
- fstest
static binary test:
  after_script: *id003
  before_script:
  - apt-get update --quiet && apt-get install python3 ca-certificates libcap2-bin
    fuse --yes
  - useradd --create-home fstest
  - cp build/marcfs tests/fstest.py ~fstest
  - 'chown -R fstest: ~fstest'
  - setcap cap_sys_admin+ep ~fstest/marcfs
  image: ubuntu
  needs:
  - static binary universal build
  script: *id004
  stage: fstest
  variables:
    MARCFS_TEST_PASSWORD: $MARCFS_UNIVERSAL_TEST_PASSWORD
    MARCFS_TEST_USERNAME: $MARCFS_UNIVERSAL_TEST_USERNAME
static binary universal build:
  artifacts: *id001
  before_script:
  - apk add git meson cmake pkgconf g++ make curl perl linux-headers
  - git clone https://github.com/open-source-parsers/jsoncpp contrib/jsoncpp
  - cd $CI_PROJECT_DIR
  - cd contrib/jsoncpp
  - meson --buildtype release --default-library static --prefix /usr . build
  - ninja -C build install
  - cd $CI_PROJECT_DIR
  - git clone --branch fuse-3.5.0 --depth 1 https://github.com/libfuse/libfuse contrib/libfuse
  - cd contrib/libfuse
  - meson --buildtype release --default-library static --prefix /usr -Dudevrulesdir=/nonexistent
    . build
  - ninja -C build install
  - cd $CI_PROJECT_DIR
  - curl -L https://www.openssl.org/source/openssl-1.1.1b.tar.gz | tar -xz -C contrib
  - cd contrib/openssl-1.1.1b
  - ./config --prefix=/usr no-shared
  - make -j$(nproc)
  - make -j$(nproc) install_sw
  - cd $CI_PROJECT_DIR
  - curl -L https://zlib.net/zlib-1.2.13.tar.gz | tar -xz -C contrib
  - cd contrib/zlib-1.2.13
  - ./configure --static --prefix=/usr
  - make -j$(nproc)
  - make -j$(nproc) install
  - cd $CI_PROJECT_DIR
  - curl -L https://curl.haxx.se/download/curl-7.64.1.tar.gz | tar -xz -C contrib
  - cd contrib/curl-7.64.1
  - ./configure --disable-shared --prefix=/usr --with-ssl=$CI_PROJECT_DIR/contrib/openssl-1.1.1b/
    --with-zlib=$CI_PROJECT_DIR/contrib/zlib-1.2.13
  - make -j$(nproc) install
  - cd $CI_PROJECT_DIR
  image: alpine
  needs: []
  script:
  - mkdir -pv build
  - meson setup --buildtype=release --default-library=static --prefix=/usr build .
  - meson compile --jobs=$(nproc) -C build
  - ./build/apitest
  stage: build
  variables:
    MARCFS_TEST_PASSWORD: $MARCFS_UNIVERSAL_TEST_PASSWORD
    MARCFS_TEST_USERNAME: $MARCFS_UNIVERSAL_TEST_USERNAME
variables:
  GET_SOURCES_ATTEMPTS: '3'
  GIT_SSL_NO_VERIFY: 'true'
  GIT_SUBMODULE_STRATEGY: recursive
