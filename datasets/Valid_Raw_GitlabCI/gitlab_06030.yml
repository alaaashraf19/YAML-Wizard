demo:
  artifacts:
    expire_in: 1 day
    paths:
    - demo/*.out
  before_script:
  - mkdir -p $PGDATA
  - mkdir -p $EXTDIR
  - chown postgres $PGDATA
  - gosu postgres initdb
  - gosu postgres pg_ctl start
  script:
  - apt-get update
  - apt-get install -y --no-install-recommends make gcc postgresql-server-dev-13 postgresql-contrib-13  pgxnclient
  - make extension
  - make install
  - psql -c "ALTER SYSTEM SET session_preload_libraries = 'anon'"
  - psql -c "SELECT pg_reload_conf();"
  - make demo
  stage: test
  when: manual
lint-markdown:
  image: ruby:alpine
  script:
  - gem install mdl
  - mdl docs/*.md *.md
  stage: lint
variables:
  EXTDIR: /usr/share/postgresql/13/extension/
  PGDATA: /var/lib/postgresql/data
  PGPASSWORD: CHANGEME
  PGUSER: postgres
  POSTGRES_DB: nice_marmot
  POSTGRES_PASSWORD: plop
  POSTGRES_USER: runner
  PSQL: psql -v ON_ERROR_STOP=1
