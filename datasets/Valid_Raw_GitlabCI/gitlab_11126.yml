before_script:
- apt update -qq
- DEBIAN_FRONTEND=noninteractive apt install --no-install-recommends -y -qq -o=Dpkg::Use-Pty=0
  libc-dev gcc make autoconf automake libncurses-dev gnutls-dev
image: debian:stretch
stages:
- test
test:
  script:
  - ./autogen.sh autoconf
  - ./configure --without-makeinfo
  - make check
  stage: test
