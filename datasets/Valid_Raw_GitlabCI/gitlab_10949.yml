image: node:6
pages:
  artifacts:
    paths:
    - public
  cache:
    paths:
    - node_modules/
  only:
  - master
  script:
  - npm install hexo-cli -g
  - npm install -g hexo
  - npm install hexo
  - npm install hexo-generator-feed
  - npm install
  - hexo generate
  - hexo deploy
  tags:
  - gitlab-org
