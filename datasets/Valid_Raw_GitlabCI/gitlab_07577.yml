.image_release:
  script: &id001
  - docker login -u gitlab-ci-token -p $CI_JOB_TOKEN $CI_REGISTRY
  - docker pull $IMAGE
  - docker tag $IMAGE $RELEASE_IMAGE
  - docker push $RELEASE_IMAGE
.release_template:
  image: docker:latest
  services: &id002
  - docker:dind
  stage: release
build-sha:
  image: docker:latest
  script:
  - docker login -u gitlab-ci-token -p $CI_JOB_TOKEN $CI_REGISTRY
  - docker build --pull -t $IMAGE .
  - docker push $IMAGE
  services:
  - docker:dind
  stage: build
release-latest:
  image: docker:latest
  only:
  - master
  script: *id001
  services: *id002
  stage: release
  variables:
    RELEASE_IMAGE: $CI_REGISTRY_IMAGE:latest
release-tag:
  image: docker:latest
  only:
  - tags
  script: *id001
  services: *id002
  stage: release
  variables:
    RELEASE_IMAGE: $CI_REGISTRY_IMAGE:$CI_COMMIT_TAG
stages:
- build
- test
- release
test basic:
  image: $IMAGE
  script: "bitrise-trigger \\\n  --api-token=\"$API_TOKEN\" \\\n  --build-token=\"\
    $BUILD_TOKEN\" \\\n  -r \"$REF\" \\\n  -e foo=bar \\\n  -e other=ignored \\\n\
    \  -w \"$WORKFLOW\" \\\n  -c $CI_COMMIT_SHA \\\n  -m \"triggered by `$CI_JOB_NAME/$REF`\
    \ $CI_JOB_URL\" \\\n  \"$APP_ID\"\n"
  stage: test
test detached:
  image: $IMAGE
  script: "bitrise-trigger \\\n  -d \\\n  --build-token=\"$BUILD_TOKEN\" \\\n  -r\
    \ \"$REF\" \\\n  -w no-env \\\n  -c $CI_COMMIT_SHA \\\n  -m \"triggered by `$CI_JOB_NAME/$REF`\
    \ $CI_JOB_URL\" \\\n  \"$APP_ID\"\n"
  stage: test
unit test:
  image: $IMAGE
  script:
  - pytest
  stage: test
variables:
  API_TOKEN: $BITRISE_API_TOKEN
  APP_ID: a1c82fc91e4dfe93
  BUILD_TOKEN: $BITRISE_BUILD_TRIGGER_TOKEN
  IMAGE: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA
  REF: $CI_COMMIT_REF_NAME
  WORKFLOW: primary
