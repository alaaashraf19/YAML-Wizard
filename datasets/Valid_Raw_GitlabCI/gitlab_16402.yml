.deploy-conditions:
  dependencies: &id001
  - build
  only: &id002
    refs:
    - master
    variables:
    - $BINTRAY_KEY
before_script:
- rm -f $GRADLE_USER_HOME/caches/modules-2/modules-2.lock
- rm -f $GRADLE_USER_HOME/caches/build-cache-1/build-cache-1.lock
build:
  artifacts:
    paths:
    - buildSrc/build/classes
    - build/bin
    - build/classes
    - build/libs
    - build/test-results
  script: ./gradlew build
  stage: build
cache:
  key: one-key-to-rule-them-all
  paths:
  - $GRADLE_USER_HOME/wrapper/dists/
  - $GRADLE_USER_HOME/caches/modules-2/
  - $GRADLE_USER_HOME/caches/build-cache-1/
  - $KONAN_DATA_DIR/kotlin-native-*
deploy-release:
  dependencies: *id001
  only: *id002
  script: ./gradlew publishAllPublicationsToPublicRepository
  stage: deploy
  when: manual
deploy-snapshot:
  dependencies: *id001
  only: *id002
  script: ./gradlew publishAllPublicationsToSnapshotRepository
  stage: deploy
  variables:
    SNAPSHOT_VERSION: $CI_COMMIT_REF_NAME-$CI_COMMIT_SHORT_SHA
image: adoptopenjdk:11-jdk-hotspot
pages:
  artifacts:
    paths:
    - public
  dependencies: *id001
  only: *id002
  script: ./gradlew dokkaHtml
  stage: deploy
  when: manual
variables:
  GRADLE_OPTS: -Dorg.gradle.daemon=false
  GRADLE_USER_HOME: $CI_PROJECT_DIR/.gradle
  KONAN_DATA_DIR: $CI_PROJECT_DIR/.konan
