.takeoff_deploy:
  image: ${CI_REGISTRY_IMAGE}:latest
  only:
    refs:
    - triggers
    - manual
  script:
  - /app/bin/ci_deploy
  tags:
  - release
  variables:
    GIT_STRATEGY: none
    GIT_SUBMODULE_STRATEGY: none
    TAKEOFF_VERBOSE: 'true'
    ci_token: do not git pull the takeoff repo again
QA:
  image: registry.gitlab.com/gitlab-org/gitlab-build-images:gitlab-qa-alpine
  only:
    refs:
    - triggers
    - manual
    variables:
    - $DEPLOY_ENVIRONMENT == "gstg"
    - $GITLAB_QA_ACCESS_TOKEN
    - $GITLAB_PASSWORD
    - $GITLAB_QA_ACCESS_TOKEN
    - $GITLAB_QA_DEV_ACCESS_TOKEN
  script:
  - gem install gitlab-qa --no-document --version $GITLAB_QA_VERSION
  - gitlab-qa Test::Instance::Staging -- --tag smoke
  services:
  - docker:1.13-dind
  stage: QA
  variables:
    DOCKER_DRIVER: overlay2
    DOCKER_HOST: tcp://docker:2375
    GITLAB_QA_VERSION: 2.9.0
    GITLAB_USERNAME: gitlab-qa
    QA_ARTIFACTS_DIR: $CI_PROJECT_DIR
    QA_DEBUG: 1
    SIGNUP_DISABLED: 'true'
build_image:
  except:
  - triggers
  image: docker:git
  only:
  - master
  script:
  - ./bin/docker "${CI_REGISTRY_IMAGE}:latest"
  services:
  - docker:dind
  stage: build_image
deploy:
  extends: .takeoff_deploy
  only:
    variables:
    - $SSH_PUBLIC_KEY
    - $SSH_PRIVATE_KEY
    - $SSH_USERNAME
    - $CHEF_USERNAME
    - $CHEF_PEM_KEY
  stage: deploy
image: ruby:2.5-alpine
rspec:
  before_script:
  - apk add --update build-base git curl jq
  - bundle install
  except:
  - triggers
  script:
  - bundle exec rspec --color --format documentation
  stage: test
rubocop:
  allow_failure: true
  before_script:
  - apk add --update build-base
  - bundle install
  except:
  - triggers
  script:
  - bundle exec rubocop
  stage: test
stages:
- test
- build_image
- warmup
- deploy
- QA
warmup:
  extends: .takeoff_deploy
  only:
    variables:
    - $DEPLOY_ENVIRONMENT == 'gstg'
    - $SSH_PUBLIC_KEY
    - $SSH_PRIVATE_KEY
    - $SSH_USERNAME
    - $CHEF_USERNAME
    - $CHEF_PEM_KEY
  stage: warmup
  variables:
    TAKEOFF_WARMUP: 1
