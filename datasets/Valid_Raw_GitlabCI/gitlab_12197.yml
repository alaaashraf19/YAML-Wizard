.fast_test:
  extends: .test
  image:
    entrypoint:
    - ''
    name: python:${PYTHON_IMAGE_VERSION}
  needs: []
.pytest:
  artifacts:
    paths:
    - htmlcov/
    when: on_success
  extends: .test
  script:
  - poetry run pytest -v --cov-report= --cov meltano -m "$PYTEST_MARKERS"
  - poetry run coverage combine .coverage
  - poetry run coverage report
  - poetry run coverage html
.pytest_concurrent:
  tags:
  - concurrent
  variables:
    PYTEST_MARKERS: concurrent
  when: manual
.pytest_postgres:
  extends: .pytest
  services:
  - postgres:11
  variables:
    PG_ADDRESS: $POSTGRES_ADDRESS
    PG_DATABASE: $POSTGRES_DB
    PG_PASSWORD: $POSTGRES_PASSWORD
    PG_PORT: $POSTGRES_PORT
    PG_USERNAME: $POSTGRES_USER
    POSTGRES_ADDRESS: postgres
    POSTGRES_DB: pytest_warehouse
    POSTGRES_HOST_AUTH_METHOD: trust
    POSTGRES_PASSWORD: ''
    POSTGRES_PORT: 5432
    POSTGRES_USER: runner
    PYTEST_BACKEND: postgresql
.pytest_sqlite:
  extends: .pytest
  variables:
    PYTEST_BACKEND: sqlite
    SQLITE_DATABASE: pytest_warehouse
.test:
  before_script:
  - pip install poetry
  - poetry config experimental.new-installer false
  - poetry install
  extends: .parallel:python_image_version
  image:
    entrypoint:
    - ''
    name: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA-python$PYTHON_IMAGE_VERSION
  stage: test
lint_eslint:
  extends: .test
  parallel:
    matrix:
    - PYTHON_IMAGE_VERSION:
      - '3.8'
  script:
  - make show_lint_eslint
lint_python:
  before_script: []
  extends: .fast_test
  parallel:
    matrix:
    - PYTHON_IMAGE_VERSION:
      - '3.8'
  script:
  - git remote add meltano https://gitlab.com/meltano/meltano.git || return 0
  - 'git fetch meltano $CI_DEFAULT_BRANCH;

    echo "Comparing to $CI_DEFAULT_BRANCH";

    REF="meltano/${CI_DEFAULT_BRANCH}";

    '
  - declare FILES=$(git diff --name-only ${CI_COMMIT_SHA} $REF | grep "\.py$")
  - "if [ -n \"${FILES}\" ]; then\n  echo \"Changed files are\\n$FILES\";\n  pip install\
    \ poetry;\n  poetry install --no-root;\n  make show_lint_python $(echo $FILES\
    \ | xargs);\nelse\n  echo \"Nothing to lint\"\nfi\n"
pytest_fast:
  extends:
  - .pytest_sqlite
  - .fast_test
  variables:
    PYTEST_MARKERS: not concurrent
pytest_postgres:
  extends: .pytest_postgres
  variables:
    PYTEST_MARKERS: not concurrent
pytest_postgres_concurrent:
  extends:
  - .pytest_postgres
  - .pytest_concurrent
pytest_sqlite:
  extends: .pytest_sqlite
  variables:
    PYTEST_MARKERS: not concurrent
pytest_sqlite_concurrent:
  extends:
  - .pytest_sqlite
  - .pytest_concurrent
