deploy_production:
  environment:
    name: production
    url: http://192.168.1.1
  only:
  - master
  script:
  - which ssh-agent || ( apt-get update -y && apt-get install openssh-client -y )
  - eval $(ssh-agent -s)
  - ssh-add <(echo "$SSH_PRIVATE_KEY")
  - mkdir -p ~/.ssh
  - '[[ -f /.dockerenv ]] && echo -e "Host *\n\tStrictHostKeyChecking no\n\n" > ~/.ssh/config'
  - ~/.composer/vendor/bin/envoy run deploy
  stage: deploy
  when: manual
image: registry.gitlab.com/mehranrasulian/laravel-sample:latest
services:
- mysql:5.7
stages:
- test
- deploy
unit_test:
  script:
  - composer install
  - cp .env.example .env
  - php artisan key:generate
  - php artisan migrate
  - vendor/bin/phpunit
  stage: test
variables:
  DB_HOST: mysql
  DB_USERNAME: root
  MYSQL_DATABASE: homestead
  MYSQL_ROOT_PASSWORD: secret
