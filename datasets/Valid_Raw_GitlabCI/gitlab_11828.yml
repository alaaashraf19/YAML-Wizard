deploy-dists:
  after_script:
  - ./ci/test.sh
  - ./ci/deploy.sh
  before_script:
  - docker info
  - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  - apk add make
  - chmod +x ./ci/*
  image: docker:git
  only:
  - /^v[0-9]+[\.0-9]*[\.0-9]*$/
  script:
  - ./ci/build.sh
  services:
  - docker:dind
  stage: deploy
stages:
- deploy
