.build_job:
  artifacts: &id001
    expire_in: 1 day
    paths:
    - result/*
  script: &id002
  - ci-build-pkg
  stage: build
  tags: &id003
  - docker
before_script:
- unset http_proxy ; unset https_proxy
- env | grep ^CI_
build_centos_6:
  artifacts: *id001
  image: buildpkg/centos:6
  script: *id002
  stage: build
  tags: *id003
