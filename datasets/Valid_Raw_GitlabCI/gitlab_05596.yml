  - oc delete dc,svc,secret "${DEPLOYMENT_PREFIX}-db"
  - "ansible-playbook \\\n  -e aws_prefix=\"${CI_COMMIT_REF_SLUG}\" \\\n  -e bucket_state=absent\
    \ \\\n  -e ec2_asg_name=\"${HOUNDIGRADE_AWS_AUTOSCALING_GROUP_NAME}\" \\\n  -e\
    \ ec2_asg_state=absent \\\n  -e ec2_launch_configuration_name=\"${HOUNDIGRADE_LAUNCH_CONFIG_NAME}\"\
