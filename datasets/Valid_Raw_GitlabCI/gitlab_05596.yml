NGINX S2i:
  before_script:
  - apk --no-cache add git
  - mkdir /opt && cd /opt
  - wget https://github.com/openshift/source-to-image/releases/download/${S2I_VERSION}/${S2I_RELEASE}.tar.gz
    -O /opt/s2i.tar.gz
  - tar --strip-components=1 -xzvf /opt/s2i.tar.gz -C /opt/
  - mv /opt/s2i /usr/bin/
  except:
  - chat
  - trigger
  image: docker:stable
  script:
  - s2i build --context-dir=${CONTEXT_DIR} --ref ${CI_COMMIT_REF_NAME} ${CI_PROJECT_URL}
    ${NGINX_S2I_IMAGE} ${IMAGE_NAME}:latest
  services:
  - docker:dind
  stage: test
  variables:
    CONTEXT_DIR: deployment/prod/
    NGINX_S2I_IMAGE: centos/nginx-112-centos7:latest
    S2I_RELEASE: source-to-image-v1.1.10-27f0729d-linux-amd64
    S2I_VERSION: v1.1.10
Push Cloudigrade Image:
  before_script:
