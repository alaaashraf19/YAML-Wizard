.CleanReviewTemplate:
  before_script: &id001
  - oc login ${OPENSHIFT_URL} --token ${KUBE_TOKEN}
  - cd /opt/shiftigrade
  environment: &id002
    action: stop
    name: review/master-${CHAT_INPUT}
  except: &id003
  - tags@cloudigrade/cloudigrade
  image: ${SHIFTIGRADE_IMAGE}:${SHIFTIGRADE_VERSION}
  script: &id004
  - "if [ -n \"${CHAT_INPUT}\" ]; then\n  export API_REPO_REF=master\n  export NGINX_REPO_REF=master\n\
    \  export CI_COMMIT_REF_SLUG=master-${CHAT_INPUT}\n  export DEPLOYMENT_PREFIX=$(echo\
    \ ${CI_COMMIT_REF_SLUG} | cut -c 1-36)\n  export API_ROUTE_HOST=${CI_COMMIT_REF_SLUG}.5a9f.insights-dev.openshiftapps.com\n\
    \  export AUTH_ROUTE_HOST=${CI_COMMIT_REF_SLUG}.5a9f.insights-dev.openshiftapps.com\n\
    \  export AWS_S3_BUCKET_NAME=${CI_COMMIT_REF_SLUG}-cloudigrade-s3\n  export CLOUDTRAIL_EVENT_URL=https://sqs.${AWS_DEFAULT_REGION}.amazonaws.com/${AWS_ACCOUNT_NUMBER}/${CI_COMMIT_REF_SLUG}-cloudigrade-cloudtrail-sqs\n\
    \  export DB_SECRETS_FILE_NAME=${DEPLOYMENT_PREFIX}-db\n  export DJANGO_DATABASE_HOST=${DEPLOYMENT_PREFIX}-db.${OPENSHIFT_PROJECT}.svc\n\
    \  export EC2_HOST_NAME=${CI_COMMIT_REF_SLUG}-houndigrade-host\n  export GITLAB_DEPLOYMENT=${CI_COMMIT_REF_SLUG}-cloudigrade\n\
    \  export HOUNDIGRADE_AWS_AUTOSCALING_GROUP_NAME=${CI_COMMIT_REF_SLUG}-houndigrade-asg\n\
    \  export HOUNDIGRADE_ECS_CLUSTER_NAME=${CI_COMMIT_REF_SLUG}-houndigrade\n  export\
    \ HOUNDIGRADE_LAUNCH_CONFIG_NAME=${CI_COMMIT_REF_SLUG}-houndigrade-lc\nelse\n\
    \  echo -e \"section_start:$( date +%s ):chat_reply\\r\\033[0K\\nPlease provide\
    \ a name for the deployment.\\nsection_end:$( date +%s ):chat_reply\\r\\033[0K\"\
    \n  exit 1\nfi\n"
  - oc delete bc,cm,dc,is,routes,secrets,svc -l gitlab-deployment="${CI_COMMIT_REF_SLUG}-cloudigrade"
  - oc delete dc,svc,secret "${DEPLOYMENT_PREFIX}-db"
  - "ansible-playbook \\\n  -e aws_prefix=\"${CI_COMMIT_REF_SLUG}\" \\\n  -e bucket_state=absent\
    \ \\\n  -e ec2_asg_name=\"${HOUNDIGRADE_AWS_AUTOSCALING_GROUP_NAME}\" \\\n  -e\
    \ ec2_asg_state=absent \\\n  -e ec2_launch_configuration_name=\"${HOUNDIGRADE_LAUNCH_CONFIG_NAME}\"\
    \ \\\n  -e ec2_lc_state=absent \\\n  -e ecs_cluster_name=\"${HOUNDIGRADE_ECS_CLUSTER_NAME}\"\
    \ \\\n  -e ecs_state=absent \\\n  -e sqs_state=absent \\\n  ansible/provision-aws-resources.yaml\n"
  - ansible-playbook -e aws_prefix="${CI_COMMIT_REF_SLUG}" -e sqs_state=absent ansible/clean-sqs.yaml
  - echo -e "section_start:$( date +%s ):chat_reply\r\033[0K\nCloudigrade master review
    - ${CHAT_INPUT} - cleaned up.\nsection_end:$( date +%s ):chat_reply\r\033[0K"
  stage: review
  variables: &id005
    GIT_STRATEGY: none
.ReviewTemplate:
  before_script: &id006
  - oc login ${OPENSHIFT_URL} --token ${KUBE_TOKEN}
  - cd /opt/shiftigrade
  except: &id007
  - tags@cloudigrade/cloudigrade
  image: ${SHIFTIGRADE_IMAGE}:${SHIFTIGRADE_VERSION}
  script: &id008
  - "if [ -n \"${CHAT_INPUT}\" ]; then\n  export API_REPO_REF=master\n  export NGINX_REPO_REF=master\n\
    \  export CI_COMMIT_REF_SLUG=master-${CHAT_INPUT}\n  export DEPLOYMENT_PREFIX=$(echo\
    \ ${CI_COMMIT_REF_SLUG} | cut -c 1-36)\n  export API_ROUTE_HOST=${CI_COMMIT_REF_SLUG}.5a9f.insights-dev.openshiftapps.com\n\
    \  export AUTH_ROUTE_HOST=${CI_COMMIT_REF_SLUG}.5a9f.insights-dev.openshiftapps.com\n\
    \  export AWS_S3_BUCKET_NAME=${CI_COMMIT_REF_SLUG}-cloudigrade-s3\n  export CLOUDTRAIL_EVENT_URL=https://sqs.${AWS_DEFAULT_REGION}.amazonaws.com/${AWS_ACCOUNT_NUMBER}/${CI_COMMIT_REF_SLUG}-cloudigrade-cloudtrail-sqs\n\
    \  export DB_SECRETS_FILE_NAME=${DEPLOYMENT_PREFIX}-db\n  export DJANGO_DATABASE_HOST=${DEPLOYMENT_PREFIX}-db.${OPENSHIFT_PROJECT}.svc\n\
    \  export EC2_HOST_NAME=${CI_COMMIT_REF_SLUG}-houndigrade-host\n  export GITLAB_DEPLOYMENT=${CI_COMMIT_REF_SLUG}-cloudigrade\n\
    \  export HOUNDIGRADE_AWS_AUTOSCALING_GROUP_NAME=${CI_COMMIT_REF_SLUG}-houndigrade-asg\n\
    \  export HOUNDIGRADE_ECS_CLUSTER_NAME=${CI_COMMIT_REF_SLUG}-houndigrade\n  export\
    \ HOUNDIGRADE_LAUNCH_CONFIG_NAME=${CI_COMMIT_REF_SLUG}-houndigrade-lc\nelse\n\
    \  echo -e \"section_start:$( date +%s ):chat_reply\\r\\033[0K\\nPlease provide\
    \ a name for the deployment.\\nsection_end:$( date +%s ):chat_reply\\r\\033[0K\"\
    \n  exit 1\nfi\n"
  - "ansible-playbook \\\n  -e application_name=houndigrade \\\n  -e aws_prefix=\"\
    ${CI_COMMIT_REF_SLUG}\" \\\n  -e ec2_ami_id=\"${RECOMMENDED_AMI}\" \\\n  -e ec2_asg_availability_zones=\"\
    ${HOUNDIGRADE_AWS_AVAILABILITY_ZONE}\" \\\n  -e ec2_asg_desired_capacity=0 \\\n\
    \  -e ec2_asg_max_size=0 \\\n  -e ec2_asg_min_size=0 \\\n  -e ec2_asg_name=\"\
    ${HOUNDIGRADE_AWS_AUTOSCALING_GROUP_NAME}\" \\\n  -e ec2_asg_vpc_subnets=\"${SUBNET_NAME}\"\
    \ \\\n  -e ec2_instance_name=\"${EC2_HOST_NAME}\" \\\n  -e ec2_instance_type=\"\
    ${INSTANCE_TYPE}\" \\\n  -e ec2_launch_configuration_name=\"${HOUNDIGRADE_LAUNCH_CONFIG_NAME}\"\
    \ \\\n  -e ec2_security_groups=\"${SECURITY_GROUP_NAME}\" \\\n  -e ecs_cluster_name=\"\
    ${HOUNDIGRADE_ECS_CLUSTER_NAME}\" \\\n  -e key_name=\"${SSH_KEY_NAME}\" \\\n \
    \ -e vpc_name=\"${VPC_NAME}\" \\\n  -e bucket_name=\"${AWS_S3_BUCKET_NAME}\" \\\
    \n  ansible/provision-aws-resources.yaml\n"
  - "if ! oc rollout status dc/${DEPLOYMENT_PREFIX}-db; then\n  oc process openshift//postgresql-ephemeral\
    \ \\\n    -p DATABASE_SERVICE_NAME=${DEPLOYMENT_PREFIX}-db \\\n    -p POSTGRESQL_DATABASE=postgres\
    \ \\\n    -p POSTGRESQL_VERSION=9.6 \\\n    -l app=${CI_COMMIT_REF_SLUG} \\\n\
    \  | oc apply -f - && \\\n  oc rollout status dc/${DEPLOYMENT_PREFIX}-db;\nelse\n\
    \  echo \"${DEPLOYMENT_PREFIX}-db already exists, keeping.\"\nfi\n"
  - kontemplate template ocp/review.yaml -i cloudigrade | oc apply -f -
  - oc start-build -F c-${DEPLOYMENT_PREFIX}-api
  - oc start-build -F c-${DEPLOYMENT_PREFIX}-nginx
  - if ! oc rollout status dc/c-${DEPLOYMENT_PREFIX}-a; then oc rollout latest dc/c-${DEPLOYMENT_PREFIX}-a
    && oc rollout status dc/c-${DEPLOYMENT_PREFIX}-a; fi;
  - if ! oc rollout status dc/c-${DEPLOYMENT_PREFIX}-b; then oc rollout latest dc/c-${DEPLOYMENT_PREFIX}-b
    && oc rollout status dc/c-${DEPLOYMENT_PREFIX}-b; fi;
  - if ! oc rollout status dc/c-${DEPLOYMENT_PREFIX}-w; then oc rollout latest dc/c-${DEPLOYMENT_PREFIX}-w
    && oc rollout status dc/c-${DEPLOYMENT_PREFIX}-w; fi;
  - echo "from django.contrib.auth import get_user_model; User = get_user_model();
    User.objects.create_superuser('admin@example.com', 'admin@example.com', '${CLOUDIGRADE_PASSWORD}')"
    | oc rsh -c c-${DEPLOYMENT_PREFIX}-a $(oc get pods -o jsonpath='{.items[*].metadata.name}'
    -l name=c-${DEPLOYMENT_PREFIX}-a) scl enable rh-python36 -- python manage.py shell
    || true
  - echo -e "section_start:$( date +%s ):chat_reply\r\033[0K\nDeployed [cloudigrade]
    ${CHAT_INPUT}, available at https://${CI_COMMIT_REF_SLUG}.5a9f.insights-dev.openshiftapps.com/api/v1/
    If both cloudigrade and frontigrade are deployed you can login with username 'admin@example.com'
    and the current Red Hat Guest WiFi password as the password.\nsection_end:$( date
    +%s ):chat_reply\r\033[0K"
  stage: review
  variables: &id009
    GIT_STRATEGY: none
Clean Up Review:
  before_script:
  - oc login ${OPENSHIFT_URL} --token ${KUBE_TOKEN}
  - cd /opt/shiftigrade
  environment:
    action: stop
    name: review/${CI_COMMIT_REF_NAME}
  except:
  - master@cloudigrade/cloudigrade
  - tags@cloudigrade/cloudigrade
  - chat
  - trigger
  image: ${SHIFTIGRADE_IMAGE}:${SHIFTIGRADE_VERSION}
