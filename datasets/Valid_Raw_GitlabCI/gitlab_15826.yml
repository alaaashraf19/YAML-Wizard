cache:
  paths:
  - node_modules/
image: node:latest
job:
  only:
  - master@RJain12/rishab-jain
  script:
  - apt-get update -qy
  - apt-get install -y ruby ruby-dev rubygems-integration
  - npm install
  - gem install --no-rdoc --no-ri dpl
  - dpl --provider=heroku --app=rishab-jain --api-key=9ebbcf81-4594-46e5-9736-2cfe165465ee
