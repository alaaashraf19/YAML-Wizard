after_script:
- emacs --version | head -n 1
before_script:
- cask list
- make cask
image: bandresen/alpine-emacs
make_build:
  artifacts:
    expire_in: 5 minutes
    paths:
    - .cask/
    - build.log
  script:
  - make build 2>&1 | tee build.log
  - '[ $(grep '':Error:'' build.log | wc -l) -eq 0 ]'
  stage: build
make_build_warnings:
  script:
  - cat build.log
  - '[ $(grep '':Warning:'' build.log | wc -l) -eq 0 ]'
  stage: test
make_checkdoc:
  script:
  - make checkdoc 2>&1 | tee checkdoc.log
  - '[ $(grep ''Warning'' checkdoc.log | wc -l) -eq 0 ]'
  stage: test
make_test:
  script:
  - make test
  stage: test
