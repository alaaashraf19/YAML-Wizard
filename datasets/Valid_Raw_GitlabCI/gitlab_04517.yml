a11y:
  coverage: /"passes":\d+,"errors":\d+,/
  image: docker:stable
  script:
  - docker run -d --name db  $CONTAINER_IMAGE/db:$CI_BUILD_REF
  - docker run -p 80:80 -d --link db:db --name web  $CONTAINER_IMAGE/web:$CI_BUILD_REF
  - docker run --rm -v $(pwd)/pa11y:/home/node/app --link web:web civicactions/docker-pa11y
    pa11y-ci --config ci.json
  services:
  - docker:dind
  stage: test
before_script:
- docker login -u gitlab-ci-token -p $CI_JOB_TOKEN registry.gitlab.com
build:
  except:
  - master
  image: docker:stable
  script:
  - docker build --no-cache -t $CONTAINER_IMAGE/web ./php/ --tag $CONTAINER_IMAGE/web:$CI_BUILD_REF
    --tag $CONTAINER_IMAGE/web:latest
  - docker build --no-cache -t $CONTAINER_IMAGE/db ./sql/ --tag $CONTAINER_IMAGE/db:$CI_BUILD_REF
    --tag $CONTAINER_IMAGE/db:latest
  - docker push $CONTAINER_IMAGE/web:$CI_BUILD_REF
  - docker push $CONTAINER_IMAGE/web:latest
  - docker push $CONTAINER_IMAGE/db:$CI_BUILD_REF
  - docker push $CONTAINER_IMAGE/db:latest
  services:
  - docker:dind
  stage: build
build-stable:
  image: docker:stable
  only:
  - master
  script:
  - docker build --no-cache -t $CONTAINER_IMAGE/web ./php/ --tag $CONTAINER_IMAGE/web:$CI_BUILD_REF
    --tag $CONTAINER_IMAGE/web:latest --tag $CONTAINER_IMAGE/web:stable
  - docker build --no-cache -t $CONTAINER_IMAGE/db ./sql/ --tag $CONTAINER_IMAGE/db:$CI_BUILD_REF
    --tag $CONTAINER_IMAGE/db:latest --tag $CONTAINER_IMAGE/db:stable
  - docker push $CONTAINER_IMAGE/web:$CI_BUILD_REF
  - docker push $CONTAINER_IMAGE/web:latest
  - docker push $CONTAINER_IMAGE/web:stable
  - docker push $CONTAINER_IMAGE/db:$CI_BUILD_REF
  - docker push $CONTAINER_IMAGE/db:latest
  - docker push $CONTAINER_IMAGE/db:stable
  services:
  - docker:dind
  stage: build
stages:
- build
- test
variables:
  CONTAINER_IMAGE: registry.gitlab.com/$CI_PROJECT_PATH
