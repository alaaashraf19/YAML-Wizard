.openssh_template:
  artifacts: &id001
    paths:
    - packages/
  script: &id002
  - scripts/build_openssh.sh
  stage: package
CentOS 6:
  artifacts: *id001
  image: centos:centos6
  script: *id002
  stage: package
CentOS 7:
  artifacts: *id001
  image: centos:centos7
  script: *id002
  stage: package
stages:
- package
