.cuda_base_template:
  artifacts: &id003
    reports:
      dotenv: tags.env
  image: gitlab-master.nvidia.com:5005/cuda-installer/cuda/gitlab-cuda-builder
  script: &id005
  - "# How gitlab handles errors: https://gitlab.com/gitlab-org/gitlab-runner/-/issues/25394\n\
    # prevent exit codes from killing the pipeline completely, errors must now be\
    \ handled manually\nset +e\nif [[ \"${NO_OS_SUFFIX}\" == \"true\" ]]; then\n \
    \ export TAG_BASE=\" -t ${IMAGE_NAME}:${CUDA_VERSION}-base${IMAGE_TAG_SUFFIX}\
    \ \"\n  export TAG_RUNTIME=\" -t ${IMAGE_NAME}:${CUDA_VERSION}-runtime${IMAGE_TAG_SUFFIX}\
    \ \"\n  export TAG_DEVEL=\" -t ${IMAGE_NAME}:${CUDA_VERSION}-devel${IMAGE_TAG_SUFFIX}\
    \ \"\n  export CUDA_TAGS=\"${CUDA_VERSION}-base${IMAGE_TAG_SUFFIX} ${CUDA_VERSION}-runtime${IMAGE_TAG_SUFFIX}\
    \ ${CUDA_VERSION}-devel${IMAGE_TAG_SUFFIX} \"\nfi\nexport DIST_BASE_PATH=\"${DIST_BASE_PATH}/${OS//.}\"\
    \nif [ ! -z $KITMAKER ] && [ ! -z $TRIGGER ]; then\n    export DIST_BASE_PATH=\"\
    kitpick/${OS//.}\"\n    rm -rf kitpick || true\n    run_cmd mkdir -p kitpick/${OS//.}/{devel,runtime,base}\n\
    \n    NEW_CANDIDATE_URL=\"${CANDIDATE_URL}/${OS/./}\"\n    # Ensure the url ends\
    \ with a slash! This prevents wget from getting everything (and bringing apache\
    \ to its knees)\n    [[ \"${NEW_CANDIDATE_URL}\" != */ ]] && NEW_CANDIDATE_URL=\"\
    ${NEW_CANDIDATE_URL}/\"\n    echo \"NEW_CANDIDATE_URL: ${NEW_CANDIDATE_URL}\"\n\
    \n    if ! retry 3 10 run_cmd wget --no-verbose --recursive --directory-prefix=\"\
    kitpick_dl\" --reject=\"index.html*\" --no-parent ${NEW_CANDIDATE_URL}; then\n\
    \        echo \"Could not download files from '${CANDIDATE_URL}'!!\"\n       \
    \ # kitmaker_webhook_failed\n        exit 1\n    fi\n\n    run_cmd cp -R kitpick_dl/${NEW_CANDIDATE_URL#\"\
    https://\"}/{base,devel,runtime} ${DIST_BASE_PATH}/\n    echo \"Contents of ${DIST_BASE_PATH}/\"\
    \n    find ${DIST_BASE_PATH}/\nfi\nexport PLATFORM_ARG=`printf '%s ' '--platform';\
    \ for var in $(echo $ARCHES | sed \"s/,/ /g\"); do printf 'linux/%s,' \"$var\"\
    ; done | sed 's/,*$//g'`\necho \"PLATFORM_ARG: ${PLATFORM_ARG}\"\necho \"DIST_BASE_PATH:\
    \ ${DIST_BASE_PATH}\"\necho \"TAG_BASE: ${TAG_BASE}\"\necho \"TAG_RUNTIME: ${TAG_RUNTIME}\"\
    \necho \"TAG_DEVEL: ${TAG_DEVEL}\"\n# COPY the NGC DEEP LEARNING CONTAINER LICENSE\n\
    run_cmd cp -v ./NGC-DL-CONTAINER-LICENSE \"${DIST_BASE_PATH}/base\"\n# COPY the\
    \ entrypoint scripts\nrun_cmd cp -R entrypoint.d nvidia_entrypoint.sh ${DIST_BASE_PATH}/runtime/\n\
    # --driver-opt flag is needed to workaround https://github.com/docker/buildx/issues/386\n\
    if ! run_cmd retry 3 10 docker buildx create --use ${PLATFORM_ARG} --driver-opt\
    \ image=moby/buildkit:v0.10.3 --name cuda; then\n    echo \"Failed creating buildx\
    \ instance!\"\n    # kitmaker_webhook_failed\n    exit 1\nfi\necho \"####################################################################\"\
    \necho \"BASE\"\necho \"####################################################################\"\
    \nif [[ -z ${NO_CACHE} ]]; then export PLZ_CACHE=\"--cache-from=type=registry,ref=${IMAGE_NAME}:${CUDA_VERSION}-base-${OS}${IMAGE_TAG_SUFFIX}\"\
    ; fi\nif ! run_cmd retry 3 10 docker buildx build --pull --push ${PLATFORM_ARG}\
    \ -t \"${IMAGE_NAME}:${CUDA_VERSION}-base-${OS}${IMAGE_TAG_SUFFIX}\" ${TAG_BASE}\
    \ \\\n                      --build-arg BUILDKIT_INLINE_CACHE=1 --progress plain\
    \ \\\n                      ${PLZ_CACHE} ${NO_CACHE:+\"--no-cache\"} \\\n    \
    \                  \"${DIST_BASE_PATH}/base\"; then\n    echo \"Failed building\
    \ the base image!\"\n    # kitmaker_webhook_failed\n    exit 1\nfi\necho \"####################################################################\"\
    \necho \"RUNTIME\"\necho \"####################################################################\"\
    \nif [[ -z ${NO_CACHE} ]]; then export PLZ_CACHE=\"--cache-from=type=registry,ref=${IMAGE_NAME}:${CUDA_VERSION}-runtime-${OS}${IMAGE_TAG_SUFFIX}\"\
    ; fi\nif ! run_cmd retry 3 10 docker buildx build --pull --push ${PLATFORM_ARG}\
    \ -t \"${IMAGE_NAME}:${CUDA_VERSION}-runtime-${OS}${IMAGE_TAG_SUFFIX}\" ${TAG_RUNTIME}\
    \ \\\n                      --build-arg \"IMAGE_NAME=${IMAGE_NAME}\" \\\n    \
    \                  --build-arg BUILDKIT_INLINE_CACHE=1 --progress plain \\\n \
    \                     ${PLZ_CACHE} ${NO_CACHE:+\"--no-cache\"} \\\n          \
    \            \"${DIST_BASE_PATH}/runtime\"; then\n    echo \"Failed building the\
    \ runtime image!\"\n    # kitmaker_webhook_failed\n    exit 1\nfi\necho \"####################################################################\"\
    \necho \"DEVEL\"\necho \"####################################################################\"\
    \nif [[ -z ${NO_CACHE} ]]; then export PLZ_CACHE=\"--cache-from=type=registry,ref=${IMAGE_NAME}:${CUDA_VERSION}-devel-${OS}${IMAGE_TAG_SUFFIX}\"\
    ; fi\nif ! run_cmd retry 3 10 docker buildx build --pull --push ${PLATFORM_ARG}\
    \ -t \"${IMAGE_NAME}:${CUDA_VERSION}-devel-${OS}${IMAGE_TAG_SUFFIX}\" ${TAG_DEVEL}\
    \ \\\n                      --build-arg \"IMAGE_NAME=${IMAGE_NAME}\" \\\n    \
    \                  --build-arg BUILDKIT_INLINE_CACHE=1 --progress plain \\\n \
    \                     ${PLZ_CACHE} ${NO_CACHE:+\"--no-cache\"} \\\n          \
    \            \"${DIST_BASE_PATH}/devel\"; then\n    echo \"Failed building the\
    \ devel image!\"\n    # kitmaker_webhook_failed\n    exit 1\nfi\necho \"CUDA_TAGS=\\\
    \"${CUDA_TAGS} ${CUDA_VERSION}-base-${OS}${IMAGE_TAG_SUFFIX} ${CUDA_VERSION}-runtime-${OS}${IMAGE_TAG_SUFFIX}\
    \ ${CUDA_VERSION}-devel-${OS}${IMAGE_TAG_SUFFIX}\\\"\" >> tags.env\ncat tags.env\n"
  stage: cuda
.cuda_template_depricated:
  artifacts:
    reports:
      dotenv: tags.env
  image: gitlab-master.nvidia.com:5005/cuda-installer/cuda/gitlab-cuda-builder
  script:
  - if [[ "${NO_OS_SUFFIX}" == "true" ]]; then export TAG_RUNTIME=" -t ${IMAGE_NAME}:${CUDA_VERSION}-runtime
    "; export TAG_DEVEL=" -t ${IMAGE_NAME}:${CUDA_VERSION}-devel "; export CUDA_TAGS="${CUDA_VERSION}-runtime
    ${CUDA_VERSION}-devel "; fi
  - export DIST_BASE_PATH="${DIST_BASE_PATH}/${OS//.}";
  - export PLATFORM_ARG=`printf '%s ' '--platform'; for var in $(echo $ARCHES | sed
    "s/,/ /g"); do printf 'linux/%s,' "$var"; done | sed 's/,*$//g'`
  - 'echo "PLATFORM_ARG: ${PLATFORM_ARG}"'
  - run_cmd cp -v ./NGC-DL-CONTAINER-LICENSE "${DIST_BASE_PATH}/runtime"
  - run_cmd retry 3 10 docker buildx create --use ${PLATFORM_ARG} --driver-opt image=moby/buildkit:v0.10.3
    --name cuda
  - if [[ -z ${NO_CACHE} ]]; then export PLZ_CACHE="--cache-from=type=registry,ref=${IMAGE_NAME}:${CUDA_VERSION}-runtime-${OS}";
    fi
  - run_cmd retry 3 10 docker buildx build --pull --push ${PLATFORM_ARG} -t "${IMAGE_NAME}:${CUDA_VERSION}-runtime-${OS}"
    ${TAG_RUNTIME} --build-arg BUILDKIT_INLINE_CACHE=1 --progress plain ${PLZ_CACHE}
    ${NO_CACHE:+"--no-cache"} "${DIST_BASE_PATH}/runtime"
  - if [[ -z ${NO_CACHE} ]]; then export PLZ_CACHE="--cache-from=type=registry,ref=${IMAGE_NAME}:${CUDA_VERSION}-devel-${OS}";
    fi
  - run_cmd retry 3 10 docker buildx build --pull --push ${PLATFORM_ARG} -t "${IMAGE_NAME}:${CUDA_VERSION}-devel-${OS}"
    ${TAG_DEVEL} --build-arg "IMAGE_NAME=${IMAGE_NAME}" --build-arg BUILDKIT_INLINE_CACHE=1
    --progress plain ${PLZ_CACHE} ${NO_CACHE:+"--no-cache"} "${DIST_BASE_PATH}/devel"
  - echo "CUDA_TAGS=\"${CUDA_TAGS} ${CUDA_VERSION}-runtime-${OS} ${CUDA_VERSION}-devel-${OS}\""
    >> tags.env
  - cat tags.env
  stage: cuda
.cudnn_template:
  artifacts: &id007
    reports:
      dotenv: cudnn_tags.env
  image: gitlab-master.nvidia.com:5005/cuda-installer/cuda/gitlab-cuda-builder
  script: &id008
  - "# no set +e necessary here since we don't use this yet for kitmaker builds\n\
    DIST_BASE_PATH=\"${DIST_BASE_PATH}/${OS/./}\";\nif [ ! -z $KITMAKER ] && [ ! -z\
    \ $TRIGGER ]; then\n    export DIST_BASE_PATH=\"kitpick/${OS/./}\"\n    rm -rf\
    \ kitpick || true\n    run_cmd mkdir -p kitpick/${OS/./}/{devel,runtime,base}\n\
    \    NEW_CANDIDATE_URL=\"${CANDIDATE_URL}/${OS/./}\"\n    # Ensure the url ends\
    \ with a slash! This prevents wget from getting everything (and bringing apache\
    \ to its knees)\n    [[ \"${CANDIDATE_URL}\" != */ ]] && NEW_CANDIDATE_URL=\"\
    ${NEW_CANDIDATE_URL}/\"\n    echo \"NEW_CANDIDATE_URL: ${NEW_CANDIDATE_URL}\"\n\
    \    if ! retry 3 10 run_cmd wget --no-verbose --recursive --directory-prefix=\"\
    kitpick_dl\" --reject=\"index.html*\" --no-parent ${NEW_CANDIDATE_URL}; then\n\
    \        echo \"Could not download files from '${CANDIDATE_URL}'!!\"\n       \
    \ # kitmaker_webhook_failed\n        exit 1\n    fi\n    run_cmd cp -R kitpick_dl/${NEW_CANDIDATE_URL#\"\
    https://\"}/{base,devel,runtime} ${DIST_BASE_PATH}/\n    echo \"Contents of ${DIST_BASE_PATH}/\"\
    \n    find kitpick/\n    export CUDNN_VERSION=\"cudnn$(grep -r \"CUDNN_VERSION\"\
    \ kitpick/ | head -n 1 | cut -f 3 -d\" \" | tr -d '[:space:]' | cut -c 1)\"\n\
    fi\necho \"DIST_BASE_PATH: ${DIST_BASE_PATH}\"\necho \"CUDNN_VERSION: ${CUDNN_VERSION}\"\
    \nif [[ \"${NO_OS_SUFFIX}\" == \"true\" ]]; then\n    TAG_CUDNN_RUNTIME=\" -t\
    \ ${IMAGE_NAME}:${CUDA_VERSION}-${CUDNN_VERSION}-runtime${IMAGE_TAG_SUFFIX} \"\
    ;\n    TAG_CUDNN_DEVEL=\" -t ${IMAGE_NAME}:${CUDA_VERSION}-${CUDNN_VERSION}-devel${IMAGE_TAG_SUFFIX}\
    \ \";\n    export CUDA_EXTRA_TAGS=\"${CUDA_EXTRA_TAGS} ${CUDA_VERSION}-${CUDNN_VERSION}-runtime${IMAGE_TAG_SUFFIX}\
    \ ${CUDA_VERSION}-${CUDNN_VERSION}-devel${IMAGE_TAG_SUFFIX}\";\nfi\nexport PLATFORM_ARG=`printf\
    \ '%s ' '--platform'; for var in $(echo $ARCHES | sed \"s/,/ /g\"); do printf\
    \ 'linux/%s,' \"$var\"; done | sed 's/,*$//g'`\necho \"PLATFORM_ARG: ${PLATFORM_ARG}\"\
    \nif ! run_cmd retry 3 10 docker buildx create --use ${PLATFORM_ARG} --driver-opt\
    \ image=moby/buildkit:v0.10.3 --name cuda; then\n    echo \"Failed creating buildx\
    \ instance!\"\n    # kitmaker_webhook_failed\n    exit 1\nfi\necho \"####################################################################\"\
    \necho \"CUDNN RUNTIME\"\necho \"####################################################################\"\
    \nif [[ -z ${NO_CACHE} ]]; then export PLZ_CACHE=\"--cache-from=type=registry,ref=${IMAGE_NAME}:${CUDA_VERSION}-${CUDNN_VERSION}-runtime-${OS}${IMAGE_TAG_SUFFIX}\"\
    ; fi\nif ! run_cmd retry 3 10 docker buildx build --pull --push ${PLATFORM_ARG}\
    \ -t \"${IMAGE_NAME}:${CUDA_VERSION}-${CUDNN_VERSION}-runtime-${OS}${IMAGE_TAG_SUFFIX}\"\
    \ ${TAG_CUDNN_RUNTIME} \\\n            --build-arg \"IMAGE_NAME=${IMAGE_NAME}\"\
    \ \\\n            --build-arg BUILDKIT_INLINE_CACHE=1 --progress plain \\\n  \
    \          ${PLZ_CACHE} ${NO_CACHE:+\"--no-cache\"} \\\n            \"${DIST_BASE_PATH}/runtime/${CUDNN_VERSION}\"\
    ; then\n    echo \"Failed building the cudnn runtime image!\"\n    # kitmaker_webhook_failed\n\
    \    exit 1\nfi\necho \"####################################################################\"\
    \necho \"CUDNN DEVEL\"\necho \"####################################################################\"\
    \nif [[ -z ${NO_CACHE} ]]; then export PLZ_CACHE=\"--cache-from=type=registry,ref=${IMAGE_NAME}:${CUDA_VERSION}-${CUDNN_VERSION}-devel-${OS}${IMAGE_TAG_SUFFIX}\"\
    ; fi\nif ! run_cmd retry 3 10 docker buildx build --pull --push ${PLATFORM_ARG}\
    \ -t \"${IMAGE_NAME}:${CUDA_VERSION}-${CUDNN_VERSION}-devel-${OS}${IMAGE_TAG_SUFFIX}\"\
    \ ${TAG_CUDNN_DEVEL} \\\n            --build-arg \"IMAGE_NAME=${IMAGE_NAME}\"\
    \ \\\n            --build-arg BUILDKIT_INLINE_CACHE=1 --progress plain \\\n  \
    \          ${PLZ_CACHE} ${NO_CACHE:+\"--no-cache\"} \\\n            \"${DIST_BASE_PATH}/devel/${CUDNN_VERSION}\"\
    ; then\n    echo \"Failed building the cudnn devel image!\"\n    # kitmaker_webhook_failed\n\
    \    exit 1\nfi\n# this is not a great way to pass information between stages,\
    \ but it is currently the only way\necho \"CUDA_TAGS=${CUDA_TAGS}\" > cudnn_tags.env\n\
    echo \"CUDA_${CUDNN_VERSION}_TAGS=\\\"${CUDA_VERSION}-${CUDNN_VERSION}-devel-${OS}${IMAGE_TAG_SUFFIX}\
    \ ${CUDA_VERSION}-${CUDNN_VERSION}-runtime-${OS}${IMAGE_TAG_SUFFIX}\\\"\" >> cudnn_tags.env\n\
    echo \"CUDA_EXTRA_${CUDNN_VERSION}_TAGS=\\\"${CUDA_EXTRA_TAGS}\\\"\" >> cudnn_tags.env\n\
    cat cudnn_tags.env\n"
  stage: cudnn
.deploy_template:
  artifacts: &id009
    paths:
    - ${TAG_MANIFEST_PATH}
  image: gitlab-master.nvidia.com:5005/cuda-installer/cuda/gitlab-cuda-builder
  script: &id010
  - "set -x\n# How gitlab handles errors: https://gitlab.com/gitlab-org/gitlab-runner/-/issues/25394\n\
    # prevent exit codes from killing the pipeline completely, errors must now be\
    \ handled manually\nset +e\nif [[ -z ${TAG_MANIFEST_PATH} ]]; then export TAG_MANIFEST_PATH=TAG_MANIFEST;\
    \ fi\nfor tag in $(env | grep 'CUDA.*_TAGS' | cut -f2 -d=); do\n    echo ${tag//\\\
    \"} >> ${TAG_MANIFEST_PATH}\ndone\necho \">>> BEGIN ${TAG_MANIFEST_PATH} <<<\"\
    \ncat ${TAG_MANIFEST_PATH}\necho \">>> END ${TAG_MANIFEST_PATH} <<<\"\nif [ !\
    \ -z $KITMAKER ] && [ ! -z $TRIGGER ]; then\n    manifest_file=\"manifest.yml\"\
    \n    if ! retry 3 10 wget --no-verbose --directory-prefix=\"kitpick\" --reject=\"\
    index.html*\" --no-parent ${CANDIDATE_URL}/${manifest_file}; then\n        echo\
    \ \"Could not download files from '${CANDIDATE_URL}'!!\"\n        # kitmaker_webhook_failed\n\
    \        exit 1\n    fi\n    export MANIFEST=\"kitpick/${manifest_file}\";\nfi\n\
    run_cmd skopeo --version\nif [[ \"${CI_DEFAULT_BRANCH}\" != \"${CI_COMMIT_BRANCH}\"\
    \ ]]; then\n    echo -e \"\\e[31m\\e[1m>>>> WARNING <<<<\\e[0m\"\n    echo -e\
    \ \"\\e[31m\\e[1m>>>> Push uses protected variables and the current branch (${CI_COMMIT_BRANCH})\
    \ IS NOT the default branch! (${CI_DEFAULT_BRANCH}) Failures may occur! <<<<\\\
    e[0m\"\n    echo -e \"\\e[31m\\e[1m>>>> WARNING <<<<\\e[0m\"\nfi\n# TODO: switch\
    \ to zippapp or pipx, this is just silly\nexport PATH=$PATH:/root/.local/bin\n\
    source /root/cuda_manager_env/bin/activate\nif ! run_cmd retry 3 10 poetry run\
    \ ./manager.py ${MANIFEST:+`echo \"--manifest ${MANIFEST}\"`} push \\\n      \
    \  --tag-manifest ${TAG_MANIFEST_PATH} \\\n        --image-name \"${IMAGE_NAME}\"\
    \ \\\n        --os-name \"${OS_NAME}\" \\\n        ${OS_VERSION:+`echo \"--os-version\
    \ ${OS_VERSION}\"`} \\\n        --cuda-version \"${CUDA_VERSION}\" \\\n      \
    \  ${PIPELINE_NAME:+`echo \"--pipeline-name ${PIPELINE_NAME}\"`} \\\n        ${IMAGE_TAG_SUFFIX:+`echo\
    \ \"--tag-suffix ${IMAGE_TAG_SUFFIX}\"`} ${NO_PUSH:+\"-n\"}; then\n    echo \"\
    Error pushing images!\"\n    # kitmaker_webhook_failed\n    exit 1\nfi\ncat $MANIFEST\
    \ | grep \".*urm.nvidia.com\\/sw-gpu-cuda-installer-docker-local\\/\" | cut -f2\
    \ -d: | head -n 1 | xargs >> ${TAG_MANIFEST_PATH}\nrun_cmd cat ${TAG_MANIFEST_PATH}\n\
    set +x\n# kitmaker_cleanup_webhook_success\n"
  stage: deploy
  tags: &id002
  - docker
