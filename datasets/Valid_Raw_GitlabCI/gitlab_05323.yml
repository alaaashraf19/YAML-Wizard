before_script:
- export GOPATH=$(pwd)
go-build-1.4:
  image: golang:1.4
  script:
  - go get gitlab.com/chriseaton/malk-storage
  - git submodule update --init
  - go build
  stage: build
go-build-1.5:
  image: golang:1.5
  script:
  - go get gitlab.com/chriseaton/malk-storage
  - git submodule update --init
  - go build
  stage: build
go-test-1.4:
  image: golang:1.4
  script:
  - go get github.com/stretchr/testify
  - go get gitlab.com/chriseaton/malk-storage
  - go test
  stage: test
go-test-1.5:
  image: golang:1.5
  script:
  - go get github.com/stretchr/testify
  - go get gitlab.com/chriseaton/malk-storage
  - go test
  stage: test
stages:
- build
- test
vet:
  image: golang:1.5
  script:
  - for f in $(find ./ -name '*.go'); do go tool vet -composites=false -unusedresult=false
    $f; done
  stage: build
