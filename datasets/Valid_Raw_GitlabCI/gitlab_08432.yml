.binaries: &id005
  artifacts:
    expire_in: 7d
    paths:
    - out/binaries/
  script:
  - source ci/touch_make_dependencies
  - export platforms=$(echo $CI_JOB_NAME | sed 's|binaries ||')
  - make build BUILD_PLATFORMS="-osarch='$platforms'"
  stage: build
  tags:
  - docker
.docker:
  services: &id001
  - docker:dind
  tags: &id006
  - docker
  variables: &id002
    CI_IMAGE: registry.gitlab.com/gitlab-org/gitlab-ci-multi-runner:ci-1.8
    DOCKER_DRIVER: overlay
    DOCKER_HOST: tcp://docker:2375
.packages: &id014
  artifacts:
    expire_in: 7d
    paths:
    - out/deb/
    - out/rpm/
  script:
  - mkdir -p out/docker
  - touch out/docker/prebuilt-x86_64.tar.xz
  - touch out/docker/prebuilt-arm.tar.xz
  - touch executors/docker/bindata.go
  - source ci/touch_make_dependencies
  - make ${CI_JOB_NAME}
  stage: package
  tags:
  - docker
.release:
  before_script: &id003
  - source ci/touch_make_dependencies
  stage: release
  tags: &id004
  - release
.release_bleeding_edge:
  only: &id007
  - master@gitlab-org/gitlab-ci-multi-runner
  - /\Av[0-9]+\.[0-9]+\.[0-9]+-rc\.[0-9]+\Z/@gitlab-org/gitlab-ci-multi-runner
.release_development:
  except: &id012
  - master@gitlab-org/gitlab-ci-multi-runner
  only: &id013
  - branches@gitlab-org/gitlab-ci-multi-runner
.release_docker_images:
  script: &id009
  - source ci/touch_make_dependencies
  - make release_docker_images
  services: *id001
  stage: release
  tags: &id010
  - release
  variables: *id002
.release_packagecloud:
  before_script: *id003
  script: &id011
  - make release_packagecloud
  stage: release
  tags: *id004
.release_s3:
  before_script: *id003
  script: &id008
  - make release_s3
  stage: release
  tags: *id004
.release_stable:
  only: &id015
  - /\Av[0-9]+\.[0-9]+\.[0-9]+\Z/@gitlab-org/gitlab-ci-multi-runner
before_script:
- source ci/prepare
binaries darwin/386 darwin/amd64: *id005
binaries freebsd/386 freebsd/amd64 freebsd/arm: *id005
binaries linux/386 linux/amd64 linux/arm: *id005
binaries windows/386 windows/amd64: *id005
bindata:
  artifacts:
    expire_in: 7d
    paths:
    - out/docker/prebuilt-x86_64.tar.xz
    - out/docker/prebuilt-arm.tar.xz
    - executors/docker/bindata.go
  script:
  - make docker
  services: *id001
  stage: prebuild
  tags: *id006
  variables: *id002
bleeding edge S3:
  before_script: *id003
  environment:
    name: bleeding_edge/s3
    url: https://gitlab-ci-multi-runner-downloads.s3.amazonaws.com/${CI_COMMIT_REF_NAME}/index.html
  only: *id007
  script: *id008
  stage: release
  tags: *id004
bleeding edge docker images:
  environment:
    name: bleeding_edge/docker_images
    url: https://hub.docker.com/r/gitlab/gitlab-runner/tags/
  only: *id007
  script: *id009
  services: *id001
  stage: release
  tags: *id010
  variables: *id002
bleeding edge packagecloud:
  before_script: *id003
  environment:
    name: bleeding_edge/packagecloud
    url: https://packages.gitlab.com/runner/unstable
  only: *id007
  script: *id011
  stage: release
  tags: *id004
clone test repo:
  artifacts:
    expire_in: 7d
    paths:
    - tmp/gitlab-test
  script:
  - mkdir tmp
  - succeed=0
  - for i in {1..3}; do git clone https://gitlab.com/gitlab-org/gitlab-test.git tmp/gitlab-test
    && succeed=1 && break; echo "retrying"; done
  - '[[ "$succeed" -eq 1 ]]'
  stage: prebuild
development S3:
  before_script: *id003
  environment:
    name: development/s3/${CI_COMMIT_REF_NAME}
    url: https://gitlab-ci-multi-runner-downloads.s3.amazonaws.com/${CI_COMMIT_REF_NAME}/index.html
  except: *id012
  only: *id013
  script: *id008
  stage: release
  tags: *id004
docker executor:
  script:
  - source ci/touch_make_dependencies
  - go test -cover ./executors/docker/
  services: *id001
  stage: test
  tags: *id006
  variables: *id002
docs check links:
  before_script: []
  cache: {}
  dependencies: []
  image: registry.gitlab.com/gitlab-org/gitlab-build-images:nanoc-bootstrap-ruby-2.4-alpine
  script:
  - mv docs/ /nanoc/content/
  - cd /nanoc
  - bundle exec nanoc
  - bundle exec nanoc check internal_links
  stage: test
image: $CI_IMAGE
integration windows:
  allow_failure: true
  before_script:
  - $GODIR = "$env:GOPATH\src\gitlab.com\gitlab-org"
  - $target_path = "$GODIR\gitlab-ci-multi-runner"
  - $current_path = pwd
  - md $GODIR -Force
  - if (Test-Path $target_path) { cmd /c rmdir $target_path }
  - cmd /c mklink /D $target_path $current_path
  - cd $GODIR\gitlab-ci-multi-runner
  only:
  - /.*/@gitlab-org/gitlab-ci-multi-runner
  script:
  - $packages = (go list ./... | findstr -v "\/vendor\/" | Out-String | %{$_ -replace
    "\r\n"," "})
  - $testCommand = "go test $packages"
  - Invoke-Expression $testCommand
  - if ( $LASTEXITCODE -ne 0 ) { exit $LASTEXITCODE }
  stage: test
  tags:
  - integration
  - windows
package-deb: *id014
package-rpm: *id014
prepare ci image:
  before_script: []
  image: docker:git
  only:
  - /\Adocker-ci-image\/.*/
  script:
  - source ./ci/build_ci_image
  services: *id001
  stage: prepare
  tags: *id006
  variables: *id002
stable S3:
  before_script: *id003
  environment:
    name: stable/s3
    url: https://gitlab-ci-multi-runner-downloads.s3.amazonaws.com/${CI_COMMIT_REF_NAME}/index.html
  only: *id015
  script: *id008
  stage: release
  tags: *id004
stable docker images:
  environment:
    name: stable/docker_images
    url: https://hub.docker.com/r/gitlab/gitlab-runner/tags/
  only: *id015
  script: *id009
  services: *id001
  stage: release
  tags: *id010
  variables: *id002
stable packagecloud:
  before_script: *id003
  environment:
    name: stable/packagecloud
    url: https://packages.gitlab.com/runner/gitlab-ci-multi-runner
  only: *id015
  script: *id011
  stage: release
  tags: *id004
stages:
- prepare
- prebuild
- test
- build
- package
- release
static code analysis:
  script:
  - source ci/touch_make_dependencies
  - make static_code_analysis
  stage: test
  tags:
  - docker
unit tests:
  script:
  - source ci/touch_make_dependencies
  - make test
  stage: test
  tags:
  - docker
variables:
  CI_IMAGE: registry.gitlab.com/gitlab-org/gitlab-ci-multi-runner:ci-1.8
  GOROOT: /usr/local/go
