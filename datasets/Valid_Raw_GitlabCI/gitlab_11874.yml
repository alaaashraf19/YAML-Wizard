.job-always:
  artifacts:
    expire_in: 3 week
    paths:
    - logs
    when: always
  dependencies: []
.job-push:
  artifacts: *id001
  dependencies: *id002
  except: *id003
before_script:
- :; uname -a
- :; cat /etc/os-release
- :; pwd
- :; cat /proc/sys/kernel/core_pattern
- :; mkdir logs || true
- :; ${UPDATEREPOS}
- :; ${DOCKERRETRY} ${PMUPDATE} >logs/apt.log
- :; ${DOCKERRETRY} ${PMINSTALL} ${PACKAGES} >>logs/apt.log
