before_script:
- pip install -r requirements.txt
coverage:
  artifacts:
    paths:
    - coverage
  coverage: /TOTAL.+ ([0-9]{1,3}%)/
  script:
  - py.test --cov-report=html:coverage --cov prob140 --verbose
  - py.test --cov prob140
  - coverage report -m
  stage: test
image: python:3.5
pages:
  artifacts:
    paths:
    - public
  dependencies:
  - coverage
  only:
  - master
  script:
  - rm -rf public
  - mkdir public
  - cp -rf coverage public
  - cp -rf docs/_build/html/* public
  stage: deploy
stages:
- test
- deploy
