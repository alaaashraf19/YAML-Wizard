before_script:
- bash ci/docker_install.sh
build_nightly:
  artifacts:
    paths:
    - gpxpod-nightly.tar.gz
  only:
    refs:
    - build
  script:
  - npm install -g npm
  - make
  - version=nightly make appstore
  - mv /tmp/build/gpxpod-nightly.tar.gz ./
  stage: build
image: ubuntu:20.04
pages:
  artifacts:
    paths:
    - public
  before_script:
  - echo 'nothing to install for pages jobs'
  dependencies:
  - test_nc_sqlite
  only:
    refs:
    - master
  script:
  - sleep 5
  - mkdir public
  - mv coverage public/
  stage: deploy
stages:
- test
- deploy
- build
test_nc_mysql:
  only:
    refs:
    - master
    - test
  script:
  - DEBIAN_FRONTEND=noninteractive apt-get install mariadb-server php7.4-mysql -yqq
    > /dev/null 2>&1
  - service mysql start
  - mysql -u root -e 'create database oc_autotest;'
  - mysql -u root -e "CREATE USER 'oc_autotest'@'localhost' IDENTIFIED BY '';"
  - mysql -u root -e "grant all on oc_autotest.* to 'oc_autotest'@'localhost';"
  - cp -r . /tmp/gpxpod
  - mkdir -p /var/www/html ; pushd /var/www/html
  - git clone https://github.com/nextcloud/server.git --recursive --depth 1 -b master
    nextcloud
  - sed -i $'s|if (substr($fullPath, 0, strlen($root) + 1) === $root . \'/\')|if (is_string($root)
    and substr($fullPath, 0, strlen($root) + 1) === $root . \'/\')|g' nextcloud/lib/autoloader.php
  - chown -R www-data:www-data nextcloud && pushd nextcloud/apps && mv /tmp/gpxpod
    ./
  - sudo -u www-data php /var/www/html/nextcloud/occ maintenance:install --database
    "mysql" --database-name oc_autotest --database-user oc_autotest --database-pass=""
    --admin-user "admin" --admin-pass "password"
  - sudo -u www-data php /var/www/html/nextcloud/occ app:enable gpxpod
  - sudo -u www-data php /var/www/html/nextcloud/occ maintenance:mode --off
  - sudo -u www-data php /var/www/html/nextcloud/occ app:check-code gpxpod
  - jshint --verbose gpxpod/js/gpxpod.js && echo "jshint OK" || echo "jshint has complaints"
  - popd ; popd ; mkdir coverage
  - phpunit --configuration /var/www/html/nextcloud/apps/gpxpod/phpunit.xml
  stage: test
test_nc_pgsql:
  only:
    refs:
    - master
    - test
  script:
  - DEBIAN_FRONTEND=noninteractive apt-get install php7.4-pgsql postgresql-client
    -yqq > /dev/null 2>&1
  - cp -r . /tmp/gpxpod
  - mkdir -p /var/www/html ; pushd /var/www/html
  - git clone https://github.com/nextcloud/server.git --recursive --depth 1 -b master
    nextcloud
  - sed -i $'s|if (substr($fullPath, 0, strlen($root) + 1) === $root . \'/\')|if (is_string($root)
    and substr($fullPath, 0, strlen($root) + 1) === $root . \'/\')|g' nextcloud/lib/autoloader.php
  - chown -R www-data:www-data nextcloud && pushd nextcloud/apps && mv /tmp/gpxpod
    ./
  - sudo -u www-data php /var/www/html/nextcloud/occ maintenance:install --database
    "pgsql" --database-host "postgres:5432" --database-name oc_autotest --database-user
    postgres --database-pass="toto" --admin-user "admin" --admin-pass "password"
  - sudo -u www-data php /var/www/html/nextcloud/occ app:enable gpxpod
  - sudo -u www-data php /var/www/html/nextcloud/occ maintenance:mode --off
  - sudo -u www-data php /var/www/html/nextcloud/occ app:check-code gpxpod
  - jshint --verbose gpxpod/js/gpxpod.js && echo "jshint OK" || echo "jshint has complaints"
  - popd ; popd ; mkdir coverage
  - phpunit --configuration /var/www/html/nextcloud/apps/gpxpod/phpunit.xml
  services:
  - postgres:latest
  stage: test
  variables:
    POSTGRES_DB: plop
    POSTGRES_PASSWORD: toto
    POSTGRES_USER: postgres
test_nc_sqlite:
  artifacts:
    paths:
    - coverage
  coverage: /^\s*Lines:\s*(\d+.\d+)\%/
  only:
    refs:
    - master
    - test
  script:
  - cp -r . /tmp/gpxpod
  - mkdir -p /var/www/html ; pushd /var/www/html
  - git clone https://github.com/nextcloud/server.git --recursive --depth 1 -b master
    nextcloud
  - sed -i $'s|if (substr($fullPath, 0, strlen($root) + 1) === $root . \'/\')|if (is_string($root)
    and substr($fullPath, 0, strlen($root) + 1) === $root . \'/\')|g' nextcloud/lib/autoloader.php
  - chown -R www-data:www-data nextcloud && pushd nextcloud/apps && mv /tmp/gpxpod
    ./
  - sudo -u www-data php /var/www/html/nextcloud/occ maintenance:install --database
    "sqlite" --admin-user "admin" --admin-pass "password"
  - sudo -u www-data php /var/www/html/nextcloud/occ app:enable gpxpod
  - sudo -u www-data php /var/www/html/nextcloud/occ maintenance:mode --off
  - sudo -u www-data php /var/www/html/nextcloud/occ app:check-code gpxpod
  - jshint --verbose gpxpod/js/gpxpod.js && echo "jshint OK" || echo "jshint has complaints"
  - popd ; popd ; mkdir coverage
  - phpunit --configuration /var/www/html/nextcloud/apps/gpxpod/phpunit.xml --coverage-text
    --color=never --coverage-html coverage
  stage: test
