build_and_test:
  artifacts:
    expire_in: 1 month
    paths:
    - tagcloud.flatpak
  before_script:
  - "sed -e \"/  track: .*/ a \\\\\n  ref: $CI_COMMIT_SHA\" -i flatpak/elements/tagcloud.bst\n"
  script:
  - cd flatpak
  - 'bst build tagcloud-flatpak.bst

    '
  - "bst build tagcloud-test-environment.bst\nbst shell tagcloud-test-environment.bst\
    \ --mount $CI_PROJECT_DIR /src \\\n    -- sh -c 'cd /src; mkdir build; meson ./build\
    \ --prefix=/app'\nbst shell tagcloud-test-environment.bst --mount $CI_PROJECT_DIR\
    \ /src \\\n    -- sh -c 'cd /src/build; xvfb-run dbus-launch meson test --verbose'\n"
  - 'flatpak remote-add flathub --from https://flathub.org/repo/flathub.flatpakrepo

    flatpak install --runtime flathub org.gnome.Platform//3.28

    '
  - 'bash -x ./deploy.sh

    flatpak run uk.me.afuera.Tagcloud --help

    '
  - flatpak build-bundle ./tagcloud-flatpak/repo ../tagcloud.flatpak uk.me.afuera.Tagcloud
  tags:
  - flatpak
cache:
  paths:
  - ${XDG_CACHE_HOME}/buildstream/sources/
image: ssssam/buildstream-flatpak:3
variables:
  BST: bst --colors
  XDG_CACHE_HOME: ${CI_PROJECT_DIR}/cache
