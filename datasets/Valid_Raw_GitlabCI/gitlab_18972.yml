before_script:
- nix-channel --add https://nixos.org/channels/nixos-19.09 nixpkgs
- nix-channel --update
- mkdir -p ~/.config/nixpkgs
- cp -r . ~/.config/nixpkgs/
image: nixos/nix:2.3
stages:
- build
user-environment:
  script:
  - nix-env -i user-environment
  stage: build
variables:
  GIT_SUBMODULE_STRATEGY: recursive
