.no-ubi-artifacts:
  artifacts:
    exclude:
    - artifacts/ubi/*
.preflight-certification:
  allow_failure: true
  artifacts:
    paths:
    - reports/*
  before_script:
  - podman login -u ${CI_REGISTRY_USER} -p ${CI_REGISTRY_PASSWORD} ${CI_REGISTRY}
  - podman login -u ${CI_REGISTRY_USER} -p ${COM_REGISTRY_PASSWORD} ${COM_REGISTRY}
  - '[[ -d reports ]] || mkdir reports'
  dependencies: []
  extends:
  - .redhat_certification
  image: ${PREFLIGHT_IMAGE_REGISTRY_PREFIX}/${PREFLIGHT_IMAGE_PREFIX}/preflight:${PREFLIGHT_IMAGE_TAG}
  needs:
  - sync-images-gitlab-com
  retry: 1
  script:
  - 'echo "Scanning image: ${COM_REGISTRY}/${COM_CNG_REGISTRY_PATH}/${IMAGE_NAME}:${CI_COMMIT_REF_NAME}"'
  - '[[ -z "${PROJECT_ID}" ]] && PROJECT_ID=$(yq .${IMAGE_NAME}.pid redhat-projects.yaml)'
  - preflight check container --pyxis-api-token=${REDHAT_API_TOKEN} --docker-config
    /run/containers/0/auth.json --certification-project-id ${PROJECT_ID} --submit
    ${COM_REGISTRY}/${COM_CNG_REGISTRY_PATH}/${IMAGE_NAME}:${CI_COMMIT_REF_NAME} >
    reports/${IMAGE_NAME}-cert.yaml
  - test $(jq .passed reports/${IMAGE_NAME}-cert.yaml) == 'true'
  stage: container-scanning
.ubi-skipped:
  rules:
  - when: never
  script:
  - echo "NOOP"; exit 1
  stage: phase-zero
