.tests-common:
  artifacts:
    reports:
      junit: junit-test-report.xml
  extends: .common
  needs:
  - download deps
  stage: test
.tests-matrix:
  extends: .tests-common
  image: golang:${GO_VERSION}
  parallel:
    matrix:
    - GO_VERSION:
      - '1.24'
      - '1.25'
build-package-and-qa:
  inherit:
    variables: false
  needs: []
  rules:
  - allow_failure: false
    changes:
    - go.mod
    - go.sum
    if: $CI_MERGE_REQUEST_IID
    variables:
      BUILD_ON_ALL_OS: 'true'
      MANUAL_QA_TEST: 'true'
  - allow_failure: true
    if: $CI_MERGE_REQUEST_IID
    when: manual
  - when: never
  stage: test
  trigger:
    branch: master
    project: gitlab-org/build/omnibus-gitlab-mirror
    strategy: depend
  variables:
    GITLAB_PAGES_VERSION: $CI_MERGE_REQUEST_SOURCE_BRANCH_SHA
    TOP_UPSTREAM_SOURCE_JOB: $CI_JOB_URL
    TOP_UPSTREAM_SOURCE_PROJECT: $CI_PROJECT_PATH
    TOP_UPSTREAM_SOURCE_REF: $CI_COMMIT_REF_NAME
    ee: 'true'
check deps:
  before_script:
  - echo skipping
  extends: .tests-common
  script:
  - make deps-check
check mocks:
  cache: []
  extends: .tests-common
  script:
  - make mocks-check
code_quality:
  artifacts:
    paths:
    - ${REPORT_FILE}
    reports:
      codequality: ${REPORT_FILE}
  cache: []
  extends: .tests-common
  image: golangci/golangci-lint:v1.64.6
  script:
  - golangci-lint run ./... --out-format ${OUT_FORMAT} ${LINT_FLAGS} | tee ${REPORT_FILE}
  timeout: 15 minutes
  variables:
    LINT_FLAGS: --color never --timeout=15m
    OUT_FORMAT: code-climate
    REPORT_FILE: gl-code-quality-report.json
cover:
  artifacts:
    paths:
    - coverage.html
  coverage: /total:.+\(statements\).+\d+\.\d+/
  extends: .tests-common
  script:
  - echo "Running coverage testing"
  - make cover
race:
  extends: .tests-common
  script:
  - echo "Running race detector"
  - make race
tests:
  extends: .tests-matrix
  script:
  - echo "Running all unit tests..."
  - make unit-test
tests-acceptance:
  extends: .tests-matrix
  script:
  - echo "Running just the acceptance tests...."
  - make acceptance
