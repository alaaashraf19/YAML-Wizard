.code:
  only:
    changes:
    - src/**/*
    - tests/**/*
    - pyproject.toml
    - pylintrc
    - pytest.ini
    - tox.ini
before_script:
- apt -y install libxml2-dev libxslt-dev
- pip install poetry
- pip install tox
- pip install codecov
build:package:
  artifacts:
    expire_in: 1 week
    paths:
    - dist
  script:
  - tox -e build
  stage: build
image: python:3.7
lint:flake8:
  extends: .code
  script: tox -e flake8
  stage: lint
lint:pylint:
  extends: .code
  script: tox -e pylint
  stage: lint
lint:radon:
  extends: .code
  script: tox -e radon
  stage: lint
pages:
  artifacts:
    paths:
    - public
  only:
  - main
  script:
  - pip install mkdocs
  - pip install mkdocs-cinder
  - mkdocs build -d public/
  stage: deploy
release:pypi:
  only:
  - tags
  script:
  - poetry publish -u $PYPI_USERNAME -p $PYPI_PASSWORD
  stage: release
stages:
- lint
- test
- build
- deploy
- release
test:python310:
  allow_failure: true
  extends: .code
  image: python:3.10
  retry: 1
  script:
  - tox -e py310
  - codecov --token=$COVERAGE_TOKEN
  stage: test
test:python36:
  extends: .code
  image: python:3.6
  retry: 1
  script:
  - tox -e py36
  stage: test
test:python37:
  extends: .code
  retry: 1
  script:
  - tox -e py37
  stage: test
test:python38:
  extends: .code
  image: python:3.8
  retry: 1
  script:
  - tox -e py38
  - codecov --token=$COVERAGE_TOKEN
  stage: test
test:python39:
  extends: .code
  image: python:3.9
  retry: 1
  script:
  - tox -e py39
  - codecov --token=$COVERAGE_TOKEN
  stage: test
