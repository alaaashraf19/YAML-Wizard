.build_package_template:
  except: &id004
  - branches
  only: &id005
  - /^stable-.*$/
  - /^testing-.*$/
  script: &id006
  - conan install . $CONAN_REFERENCE $CONAN_BUILD_CONFIG --build=$PROJECT_NAME --build=outdated
    -e build=true
  - conan upload $CONAN_REFERENCE $CONAN_UPLOAD_CONFIG --confirm --force --all
  stage: build
  variables:
    GIT_STRATEGY: none
.export_template:
  except: &id001
  - branches
  only: &id002
  - /^stable-.*$/
  - /^testing-.*$/
  script: &id003
  - conan export . $CONAN_LOGIN_USERNAME/$CONAN_PACKAGE_CHANNEL
  - conan upload $CONAN_REFERENCE $CONAN_UPLOAD_CONFIG --confirm --force
  stage: export
  tags:
  - docker
after_script:
- export CONAN_USER_HOME=$(pwd)
- conan remove \* --force
before_script:
- export PROJECT_NAME=$CI_PROJECT_NAME
- export CONAN_USER_HOME=$(pwd)
- export CONAN_PACKAGE_VERSION=${CI_COMMIT_TAG##*-}
- export CONAN_PACKAGE_CHANNEL=${CI_COMMIT_TAG%-*}
- export CONAN_REFERENCE=$PROJECT_NAME/$CONAN_PACKAGE_VERSION@$CONAN_LOGIN_USERNAME/$CONAN_PACKAGE_CHANNEL
- export PYTHON=python3
- git clone --branch release/v1 https://gitlab-ci-token:$CI_BUILD_TOKEN@gitlab.com/omicronns.main/conan/conan-home.git
  .conan
export:
  except: *id001
  only: *id002
  script: *id003
  stage: export
  tags:
  - docker
gcc7_x86_64:
  except: *id004
  only: *id005
  script: *id006
  stage: build
  tags:
  - docker
  variables:
    CONAN_BUILD_CONFIG: --profile gcc7_x86_64
image: registry.gitlab.com/omicronns.main/cpp-project-template-docker
stages:
- test
- export
- build
test:
  script:
  - conan install -if build . -e build=true
  - conan build -bf build .
  - build/bin/$PROJECT_NAME-test
  stage: test
  tags:
  - docker
