before_script:
- which ssh-agent || ( apt-get update -y && apt-get install openssh-client -y )
- eval $(ssh-agent -s)
- echo "$SSH_PRIV_KEY" | tr -d '\r' | ssh-add - > /dev/null
- mkdir -p ~/.ssh
- chmod 700 ~/.ssh
- echo -e "Host *\n\tStrictHostKeyChecking no\n\n" > ~/.ssh/config
cache:
  paths:
  - node_modules/
deploy_prod:
  environment:
    name: production
    url: https://leviolson.com
  only:
  - master
  script:
  - echo "Deploying to Production"
  - npm install
  - ssh root@68.183.173.226 "cd /opt/website && git pull && npm install && bash -c
    \"pm2 stop LeviOlson && pm2 delete LeviOlson && pm2 start app.js --name LeviOlson
    --watch && pm2 logs --nostream --lines 2 LeviOlson && exit 0\" && exit 0"
  stage: deploy
image: node:latest
stages:
- test
- deploy
test_coverage:
  script:
  - npm install
  - npm install --global mocha nyc
  - npm run coverage
  stage: test
