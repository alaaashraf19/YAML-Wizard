before_script:
- apt-get update && apt-get install xz-utils make
- export STACK_ROOT=`pwd`/.stack
- stack setup
- stack install --only-dependencies
- stack build
build:
  cache:
    paths:
    - _cache
    - .stack
  rules:
  - if: $CI_COMMIT_REF_NAME != $CI_DEFAULT_BRANCH
  script:
  - stack exec site build
image: haskell:latest
pages:
  artifacts:
    paths:
    - public
  cache:
    paths:
    - _cache
    - .stack
  rules:
  - if: $CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH
  script:
  - stack exec site build
