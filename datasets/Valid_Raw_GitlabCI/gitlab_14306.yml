image: python:3.12-alpine
pages:
  artifacts:
    paths:
    - public/
  rules:
  - if: $CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH
  script:
  - apk add --update --no-cache make subversion
  - pip install -r requirements.txt
  - make publish
  stage: deploy
test:
  rules:
  - if: $CI_COMMIT_REF_NAME != $CI_DEFAULT_BRANCH
  script:
  - apk update && apk add make
  - pip install -r requirements.txt
  - make publish
  stage: test
