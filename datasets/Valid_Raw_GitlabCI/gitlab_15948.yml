.distribution:
  extends: .script
  only:
  - tags
  - web
  stage: dist
.pass: &id001
- wget https://git.zx2c4.com/password-store/snapshot/password-store-$PASS_VERSION.tar.xz
- tar -xf password-store-$PASS_VERSION.tar.xz
- make --directory=password-store-$PASS_VERSION install
.script:
  script:
  - pip3 install green coverage requests zxcvbn
  - make tests
  - make
  - make install
  - cd ~
  - pass audit --help
.tests:
  before_script:
  - apt-get update -q && apt-get install -y make pass python3-pip grep
  extends: .script
  stage: tests
archlinux:
  before_script:
  - pacman -Syu --noconfirm --noprogressbar make python-pip which grep pass
  extends: .distribution
  image: archlinux
bash:
  image: koalaman/shellcheck-alpine
  script:
  - shellcheck --shell=bash audit.bash
  stage: lint
debian:
  before_script:
  - apt-get update -q && apt-get install -y make pass python3-pip grep wget
  - *id001
  extends: .distribution
  image: debian
fedora:
  before_script:
  - dnf -y install --setopt=install_weak_deps=False make gpg pass python-setuptools
    python3-pip grep which
  extends: .distribution
  image: fedora
include:
- template: Security/SAST.gitlab-ci.yml
pages:
  artifacts:
    expire_in: 1 day
    paths:
    - public
  dependencies:
  - python 3.10
  only:
  - master
  script:
  - mv htmlcov/ public/
  stage: deploy
prospector:
  allow_failure: true
  before_script:
  - pip install prospector[with_everything] requests zxcvbn
  image: python:latest
  script:
  - make lint
  stage: lint
python 3.10:
  artifacts:
    expire_in: 2 days
    paths:
    - htmlcov/
  coverage: /\d+\%\s*$/
  extends: .tests
  image: python:3.10
python 3.6:
  extends: .tests
  image: python:3.6
python 3.7:
  extends: .tests
  image: python:3.7
python 3.8:
  extends: .tests
  image: python:3.8
python 3.9:
  extends: .tests
  image: python:3.9
sast:
  stage: lint
stages:
- lint
- tests
- dist
- deploy
ubuntu:
  before_script:
  - apt-get update -q && apt-get install -y make pass python3-pip grep
  extends: .distribution
  image: ubuntu
variables:
  PASS_VERSION: 1.7.3
