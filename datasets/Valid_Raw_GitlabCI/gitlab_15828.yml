before_script:
- conda install -c conda-forge mamba
- mamba update -y -n base conda
- mamba install conda-build
- apt-get update
- apt-get -o dir::cache::archives=".apt-cache" install -y texlive-lang-german texlive-xetex
  texlive-fonts-extra texlive-science
- bash gitlab-ci.sh
- source activate $CI_PROJECT_DIR/.conda_cache/mapping-4
- pip install -e .
cache:
  paths:
  - $CI_PROJECT_DIR/.conda_cache
  - $CI_PROJECT_DIR/.apt-cache
image: continuumio/miniconda3:latest
make_new_release:
  before_script:
  - apt-get update
  - apt-get -y install software-properties-common
  - apt-get update
  - apt-get -y install php php-json git openssh-client curl
  only:
  - master
  script:
  - VERSION="$( git tag | grep -E 'v[0-9]+\.[0-9]+\.[0-9]+$' | tail -n1 )"
  - DESCRIPTION="$( git cat-file -p $VERSION )"
  - MESSAGE="$(php -r "echo json_encode(['name' => '$VERSION', 'tag_name' => '$VERSION',
    'description' => '$DESCRIPTION']);")";
  - echo $MESSAGE
  - "curl --header 'Content-Type: application/json' --header \"JOB-TOKEN: ${CI_JOB_TOKEN}\"\
    \ \\\n     --data \"$MESSAGE\" \\\n     --request POST ${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/releases\n"
  stage: gitlab-release
stages:
- test
- test_conda_build
- gitlab-release
test:
  only:
  - unstable_development
  - master
  script:
  - cd test
  - ./test_mapping.py
  stage: test
test_conda_build:
  only:
  - test_conda_build
  - stage_conda_release
  script:
  - cd .conda && conda build . -c conda-forge -c bioconda
  stage: test_conda_build
