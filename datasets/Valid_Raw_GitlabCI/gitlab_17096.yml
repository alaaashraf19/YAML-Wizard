before_script:
- npm install
cache:
  paths:
  - node_modules/
coverage:
  allow_failure: false
  only:
  - pushes
  script:
  - npm run coverage
  stage: push
  tags:
  - linux
  - docker
  - nodejs
functionnal-test:
  allow_failure: false
  only:
  - develop
  - master
  script:
  - npm run TF
  stage: functionnal-test
  tags:
  - linux
  - docker
  - nodejs
linter:
  allow_failure: false
  except:
  - tags
  script:
  - npm run linter
  stage: code-check
  tags:
  - linux
  - docker
  - nodejs
stages:
- code-check
- push
- functionnal-test
- deploy
unit-tests:
  allow_failure: false
  except:
  - tags
  script:
  - npm test
  stage: code-check
  tags:
  - linux
  - docker
  - nodejs
