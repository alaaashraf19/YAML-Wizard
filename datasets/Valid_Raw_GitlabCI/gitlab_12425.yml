before_script: null
docker:alpine:
  image: docker:latest
  script:
  - cd docker/alpine
  - docker build -t mizux/cpp-101/alpine:$CI_COMMIT_REF_NAME .
  services:
  - docker:dind
  stage: docker
docker:archlinux:
  image: docker:latest
  script:
  - docker info
  - cd docker/archlinux
  - docker build -t mizux/cpp-101/archlinux:$CI_COMMIT_REF_NAME .
  services:
  - docker:dind
  stage: docker
docker:ubuntu:
  image: docker:latest
  script:
  - cd docker/ubuntu
  - docker build -t mizux/cpp-101/ubuntu:$CI_COMMIT_REF_NAME .
  services:
  - docker:dind
  stage: docker
stages:
- docker
