build_script:
  script:
  - dnf update -y
  - dnf install automake -y
  - dnf install make -y
  - dnf install texinfo -y
  - dnf install java-1.8.0-openjdk-devel -y
  - dnf install git -y
  - dnf install ant -y
  - dnf install gcc -y
  - ./buildKawa
  - cd Kawa-git
  - make check
  stage: build_and_test
image: fedora:latest
stages:
- build_and_test
