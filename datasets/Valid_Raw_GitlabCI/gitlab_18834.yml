code quality:
  script:
  - yarn install
  - yarn run lint
  stage: tests
dependencies outdated:
  allow_failure: true
  script:
  - yarn install
  - yarn outdated
  stage: tests
image: node:lts-alpine
package:
  artifacts:
    paths:
    - ./*.tgz
  needs:
  - security audit
  script:
  - yarn install
  - yarn pack
  stage: publish
publish:
  needs:
  - security audit
  only:
  - tags
  - triggers
  script:
  - echo '//registry.npmjs.org/:_authToken=${NPM_TOKEN}' > .npmrc
  - yarn install
  - yarn publish
  stage: publish
security audit:
  needs:
  - code quality
  - dependencies outdated
  - tests & coverage
  script:
  - yarn audit --level high --groups dependencies
  stage: security
stages:
- tests
- security
- publish
tests & coverage:
  artifacts:
    paths:
    - coverage/
  coverage: /All files[^|]*\|[^|]*\s+([\d\.]+)/
  script:
  - yarn install
  - yarn coverage
  stage: tests
