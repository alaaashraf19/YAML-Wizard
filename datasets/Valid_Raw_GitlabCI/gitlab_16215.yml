.build_template:
  before_script: &id001
  - echo "$CI_REGISTRY_PASSWORD" | docker login --username "$CI_REGISTRY_USER" --password-stdin
    "$CI_REGISTRY"
  - apk add --no-cache make
  script: &id002
  - make bootstrap
  - make $CI_JOB_NAME
  - docker-compose push $CI_JOB_NAME
  stage: build
alpine-3.17-musl:
  before_script: *id001
  script: *id002
  stage: build
alpine-3.18-musl:
  before_script: *id001
  script: *id002
  stage: build
debian-bookworm-full:
  before_script: *id001
  script: *id002
  stage: build
debian-bookworm-mini:
  before_script: *id001
  script: *id002
  stage: build
fedora-38-clang:
  before_script: *id001
  script: *id002
  stage: build
fedora-39-clang:
  before_script: *id001
  script: *id002
  stage: build
image: tmaier/docker-compose:latest
services:
- docker:dind
ubuntu-lunar-dist:
  before_script: *id001
  script: *id002
  stage: build
ubuntu-mantic-dist:
  before_script: *id001
  script: *id002
  stage: build
variables:
  DOCKER_TLS_CERTDIR: /certs
