before_script:
- yarn install
- bundle install --path=vendor
- cp spec/dummy/config/database.ci.yml spec/dummy/config/database.yml
- cd spec/dummy && yarn install
- cd -
brakeman:
  dependencies:
  - bundle
  script:
  - bundle exec brakeman
  stage: test
bundle:
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths: &id001
    - vendor/
    - node_modules/
    - spec/dummy/node_modules/
    policy: push
    untracked: true
  script:
  - echo "This job only fills the cache"
  stage: prepare
bundle_outdated:
  allow_failure: true
  script:
  - rm -rf .bundle
  - bundle install
  - bundle outdated --strict
  stage: dependencies-check
cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths: *id001
  policy: pull
  untracked: true
cucumber:
  dependencies:
  - bundle
  script:
  - RAILS_ENV=test bundle exec rails db:migrate
  - bundle exec cucumber
  stage: test
dummy/yarn_outdated:
  allow_failure: true
  script:
  - cd spec/dummy
  - yarn outdated
  stage: dependencies-check
es_lint:
  dependencies:
  - bundle
  script: yarn run lint:js
  stage: code-lint
factory_bot_lint:
  dependencies:
  - bundle
  script:
  - bundle exec rails db:test:prepare
  - bundle exec rake app:factory_bot:lint
  stage: code-lint
haml_lint:
  dependencies:
  - bundle
  script: bundle exec haml-lint app/views
  stage: code-lint
i18n_attributes:
  dependencies:
  - bundle
  script:
  - bundle exec rails db:test:prepare
  - bundle exec rails runner lib/runners/generate_i18n_model_attributes.rb
  - git diff
  - git diff-index --quiet HEAD
  stage: test
image: starefossen/ruby-node:2-8
rspec:
  dependencies:
  - bundle
  script:
  - bundle exec rails db:test:prepare
  - bundle exec rspec
  stage: test
rubocop:
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths: *id001
    policy: pull
    untracked: true
  dependencies:
  - bundle
  script: bundle exec rubocop
  stage: code-lint
sass_lint:
  dependencies:
  - bundle
  script: yarn run lint:sass
  stage: code-lint
services:
- postgres:latest
stages:
- prepare
- code-lint
- test
- dependencies-check
variables:
  POSTGRES_DB: elcms_ci
  POSTGRES_PASSWORD: ''
  POSTGRES_USER: runner
yarn_outdated:
  allow_failure: true
  script:
  - yarn outdated
  stage: dependencies-check
