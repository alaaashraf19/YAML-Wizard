before_script:
- apk add --no-cache git zip coreutils
compile:
  artifacts:
    paths:
    - forematerial.osk
  script:
  - cd ${CI_PROJECT_DIR}
  - mkdir -p ../artifacts/forematerial
  - mv -f -t ../artifacts/forematerial/ *
  - zip -r forematerial.zip ../artifacts/forematerial/
  - mv forematerial.zip forematerial.osk
  stage: build
image: alpine
stages:
- build
