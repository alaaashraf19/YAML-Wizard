cache:
  paths:
  - .cargo/
  - target/
image: rust:1.26-slim
mc-wrap:
  artifacts:
    name: mc-wrap
    paths:
    - mc-wrap
  script:
  - cargo build --release
  - strip target/release/mc-wrap
  - mv target/release/mc-wrap ./
  stage: build
stages:
- build
variables:
  CARGO_HOME: ${CI_PROJECT_DIR}/.cargo
