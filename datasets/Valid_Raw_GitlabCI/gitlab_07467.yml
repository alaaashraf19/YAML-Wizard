.build_base:
  artifacts: &id001
    paths:
    - basebox-*-*.box
  only: &id002
    variables:
    - $RUN_IN_VIRTUALBOX_EXECUTOR
  script: sudo /usr/bin/python3 fdroid_basebox.py --target $TARGET --provider $PROVIDER
    --verbose
  stage: build
  tags: &id003
  - virtualbox
.simple_base:
  dependencies: &id004 []
  image: alpine:latest
  needs: &id005 []
build_buster_libvirt:
  artifacts: *id001
  only: *id002
  script: sudo /usr/bin/python3 fdroid_basebox.py --target $TARGET --provider $PROVIDER
    --verbose
  stage: build
  tags: *id003
  variables:
    PROVIDER: libvirt
    TARGET: buster64
build_buster_virtualbox:
  artifacts: *id001
  only: *id002
  script: sudo /usr/bin/python3 fdroid_basebox.py --target $TARGET --provider $PROVIDER
    --verbose
  stage: build
  tags: *id003
  variables:
    PROVIDER: virtualbox
    TARGET: buster64
build_stretch_libvirt:
  artifacts: *id001
  only: *id002
  script: sudo /usr/bin/python3 fdroid_basebox.py --target $TARGET --provider $PROVIDER
    --verbose
  stage: build
  tags: *id003
  variables:
    PROVIDER: libvirt
    TARGET: stretch64
build_stretch_virtualbox:
  artifacts: *id001
  only: *id002
  script: sudo /usr/bin/python3 fdroid_basebox.py --target $TARGET --provider $PROVIDER
    --verbose
  stage: build
  tags: *id003
  variables:
    PROVIDER: virtualbox
    TARGET: stretch64
reuse:
  dependencies: *id004
  image: alpine:latest
  needs: *id005
  script:
  - apk add --no-cache bash dash ca-certificates python3
  - python3 -m ensurepip
  - python3 -m pip install reuse
  - reuse lint
  stage: licence
stages:
- build
- test
- licence
tests:
  dependencies: *id004
  image: alpine:latest
  needs: *id005
  script:
  - apk add --no-cache bash dash ca-certificates python3
  - python3 -m ensurepip
  - python3 -m pip install flake8
  - tests/run-tests
  stage: test
