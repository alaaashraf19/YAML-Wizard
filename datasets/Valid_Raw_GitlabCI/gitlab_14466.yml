.test:
  before_script: &id001
  - apk add git --update
  - php -r "copy('https://getcomposer.org/composer.phar', 'composer.phar');"
  - php composer.phar config cache-files-dir /cache/composer
  - php composer.phar config minimum-stability ${COMPOSER_STABILITY}
  - php composer.phar require ${TYPO3_VERSION} --update-with-dependencies
  - php composer.phar require --dev squizlabs/php_codesniffer
  image: php:$DOCKER_TAG
  only: &id002
  - branches
  script: &id003
  - .Build/bin/phpcs --standard=PSR2 --ignore="Resources/Private/Php/*,public/*,.Build/*"
    --exclude="Generic.Files.LineLength" --extensions=php *
  stage: test
  variables:
    COMPOSER_CACHE_DIR: cache/composer
    TYPO3_PATH_ROOT: $PWD/.Build/Web
    TYPO3_PATH_WEB: $PWD/.Build/Web
before_script:
- apk add git --update
cache:
  key: $CI_COMMIT_REF_NAME-$CI_JOB_STAGE
  paths:
  - cache/
stages:
- test
- release
ter-upload:
  before_script:
  - php -r "copy('https://getcomposer.org/composer.phar', 'composer.phar');"
  - export COMPOSER_CACHE_DIR=.cache/composer
  image: webdevops/php
  only:
  - tags
  script:
  - php composer.phar require namelesscoder/typo3-repository-client
  - "if [ -n \"$CI_COMMIT_TAG\" ] && [ -n \"$T3O_USERNAME\" ] && [ -n \"$T3O_PASSWORD\"\
    \ ]; then\n  echo -e \"Preparing upload of release ${CI_COMMIT_TAG} to TER\\n\"\
    \n  # Cleanup before we upload\n  git reset --hard HEAD && git clean -fx\n  #\
    \ Upload\n  TAG_MESSAGE=`git tag -n10 -l $CI_COMMIT_TAG | sed 's/^[0-9.]*[ ]*//g'`\n\
    \  echo \"Uploading release ${CI_COMMIT_TAG} to TER\"\n  .Build/bin/upload . \"\
    $T3O_USERNAME\" \"$T3O_PASSWORD\" \"$TAG_MESSAGE\"\nfi;"
  stage: release
test:php70:typo3_8:
  before_script: *id001
  image: php:$DOCKER_TAG
  only: *id002
  script: *id003
  stage: test
  variables:
    COMPOSER_STABILITY: stable
    DOCKER_TAG: 7.0-alpine
    NIMUT_TESTFRAMEWORK_VERSION: ^2
    TYPO3_VERSION: typo3/cms-core:^8
