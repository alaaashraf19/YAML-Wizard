build:
  artifacts:
    paths:
    - tg/bin/
    - tg/server.pub
  before_script:
  - apt-get update -y
  - apt-get install -y git make python
  - apt-get install -y libreadline-dev libconfig-dev libssl-dev lua5.2 liblua5.2-dev
    libevent-dev libjansson-dev libpython-dev
  - git clone --recursive https://github.com/vysheng/tg.git tg
  script:
  - cd tg/
  - ./configure && make
  stage: build
  when: manual
image: debian
stages:
- build
