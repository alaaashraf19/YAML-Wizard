pages:
  artifacts:
    paths:
    - public
  image: python:3.7
  only:
  - master
  script:
  - pip install -e .[docs]
  - ./setup.py build_sphinx
  - mkdir public
  - mv build/sphinx/html/* public/
  stage: deploy
python 3.4:
  image: python:3.4
  script:
  - python --version
  - ./setup.py install
  - ./setup.py test -v
  stage: test
python 3.5:
  image: python:3.5
  script:
  - python --version
  - ./setup.py install
  - ./setup.py test -v
  stage: test
python 3.6:
  image: python:3.6
  script:
  - python --version
  - ./setup.py install
  - ./setup.py test -v
  stage: test
python 3.7:
  image: python:3.7
  script:
  - python --version
  - ./setup.py install
  - ./setup.py test -v
  stage: test
