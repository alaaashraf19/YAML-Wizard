build_image:
  image: docker:git
  only:
  - master
  script:
  - docker login -u gitlab-ci-token -p $CI_BUILD_TOKEN registry.gitlab.com
  - docker build -t registry.gitlab.com/ognarb/docugen .
  - docker push registry.gitlab.com/ognarb/docugen:latest
  services:
  - docker:dind
  stage: compose
stages:
- compose
- documentation
