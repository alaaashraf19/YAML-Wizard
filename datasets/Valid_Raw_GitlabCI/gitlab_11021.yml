pypi:
  image: python:3.6
  only:
  - tags
  script:
  - pip install -U twine
  - python setup.py sdist
  - twine upload dist/*
  stage: deploy
  variables:
    TWINE_PASSWORD: $TWINE_PASSWORD
    TWINE_USERNAME: $TWINE_USERNAME
stages:
- test
- deploy
test:
  image: python:3.6
  script:
  - apt-get update -qy
  - pip3 install -r requirements.txt
  - pip3 install pytest
  - pytest
