.job_template:
  before_script: &id001
  - export PATH="$CI_PROJECT_DIR/orchestration/:$PATH"
  - echo $BRANCH_NAME
  - if [ $BRANCH_NAME = "master" ]; then export SNOWFLAKE_LOAD_DATABASE="RAW"; else
    export SNOWFLAKE_LOAD_DATABASE="${CI_COMMIT_REF_NAME^^}_RAW"; fi
  - echo $SNOWFLAKE_LOAD_DATABASE
  - echo $BRANCH_NAME
  - if [ $BRANCH_NAME = "master" ]; then export SNOWFLAKE_PREP_DATABASE="PREP"; else
    export SNOWFLAKE_PREP_DATABASE="${CI_COMMIT_REF_NAME^^}_PREP"; fi
  - if [ $BRANCH_NAME = "master" ]; then export SNOWFLAKE_PROD_DATABASE="PROD"; else
    export SNOWFLAKE_PROD_DATABASE="${CI_COMMIT_REF_NAME^^}_PROD"; fi
  - echo $SNOWFLAKE_PREP_DATABASE
  - echo $SNOWFLAKE_PROD_DATABASE
  - export GCP_SERVICE_CREDS=$(echo "$ENCODED_GCP" | base64 -d)
  image: registry.gitlab.com/gitlab-data/data-image/data-image:v1.0.31
  stage: "\U0001F682 Extract"
  tags: &id002
  - analytics
qualtrics_sheetload:
  before_script: *id001
  image: registry.gitlab.com/gitlab-data/sheetload:v0.1.5
  only:
  - merge_requests
  script:
  - python3 /sheetload/src/sheetload.py qualtrics --load_type test
  stage: "\U0001F682 Extract"
  tags: *id002
  when: manual
"\U0001F480boneyard_sheetload":
  before_script: *id001
  image: registry.gitlab.com/gitlab-data/sheetload:v0.1.5
  only:
  - merge_requests
  script:
  - python3 /sheetload/src/sheetload.py sheets --sheet_file extract/sheetload/boneyard/sheets.yml
    --schema boneyard --database PROD
  stage: "\U0001F682 Extract"
  tags: *id002
  when: manual
"\U0001F4DCdriveload":
  before_script: *id001
  image: registry.gitlab.com/gitlab-data/sheetload:v0.1.5
  only:
  - merge_requests
  script:
  - python3 /sheetload/src/sheetload.py drive --drive_file extract/sheetload/drives.yml
  stage: "\U0001F682 Extract"
  tags: *id002
  when: manual
"\U0001F4DCsheetload":
  before_script: *id001
  image: registry.gitlab.com/gitlab-data/sheetload:v0.1.5
  only:
  - merge_requests
  script:
  - python3 /sheetload/src/sheetload.py sheets --sheet_file extract/sheetload/sheets.yml
  stage: "\U0001F682 Extract"
  tags: *id002
  when: manual
"\U0001F6E2gitlab_ops_pgp_test":
  before_script: *id001
  image: registry.gitlab.com/gitlab-data/data-image/data-image:v2.0.12
  only:
  - merge_requests
  - $MANIFEST_NAME
  script:
  - echo $MANIFEST_NAME
  - cd extract/gitlab_saas_postgres_pipeline/
  - python ../../orchestration/ci_helpers.py use_proxy --instance_name ops-db-restore
    --command "python postgres_pipeline/main.py tap manifests/${MANIFEST_NAME}_db_manifest.yaml
    --load_type test manifests/el_saas_connection_info.yaml ops"
  stage: "\U0001F682 Extract"
  tags: *id002
  when: manual
"\U0001F6E2gitlab_saas_pgp_test":
  before_script: *id001
  image: registry.gitlab.com/gitlab-data/data-image/data-image:v2.0.12
  only:
  - merge_requests
  - $MANIFEST_NAME
  script:
  - echo $MANIFEST_NAME
  - echo $DATABASE_TYPE
  - cd extract/gitlab_saas_postgres_pipeline/
  - python postgres_pipeline/main.py tap manifests/${MANIFEST_NAME}_db_manifest.yaml
    --load_type test manifests/el_saas_connection_info.yaml $DATABASE_TYPE
  stage: "\U0001F682 Extract"
  tags: *id002
  when: manual
