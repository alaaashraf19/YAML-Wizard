pages:
  artifacts:
    paths:
    - public
  dependencies:
  - pdf
  only:
  - master
  script:
  - mkdir .public
  - cp -r * .public
  - mv .public public
  stage: deploy
pdf:
  artifacts:
    paths:
    - '*.pdf'
  image: blang/latex
  script:
  - latexmk -shell-escape -pdf skript.tex uebung*.tex sloesung*.tex archimedes*.tex
    beweistechniken.tex
