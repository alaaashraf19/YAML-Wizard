anaconda:
  before_script:
  - conda init bash
  dependencies:
  - conda
  image: conda/miniconda3
  rules:
  - if: $CI_COMMIT_BRANCH == "master"
  script:
  - ./conda/release.sh upload
  stage: deploy
conda:
  artifacts:
    paths:
    - conda/build
  before_script:
  - conda init bash
  dependencies: []
  image: conda/miniconda3
  script:
  - ./conda/release.sh build
  stage: prepare
coverage:
  artifacts:
    paths:
    - htmlcov
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
  before_script:
  - pacman -Syu --noconfirm python-coverage
  coverage: /^TOTAL.+?(\d+\.\d+\%)$/
  dependencies:
  - test_cplex
  - test_cvxopt
  - test_ecos
  - test_glpk
  - test_gurobi_legacy
  - test_gurobi_matrix
  - test_mosek
  - test_mskfsn
  - test_osqp
  - test_qics
  - test_scip
  - doctests
  needs:
  - test_cplex
  - test_cvxopt
  - test_ecos
  - test_glpk
  - test_gurobi_legacy
  - test_gurobi_matrix
  - test_mosek
  - test_mskfsn
  - test_osqp
  - test_qics
  - test_scip
  - doctests
  script:
  - coverage combine
  - coverage report --precision=2
  - coverage xml
  - coverage html --precision=2
  stage: prepare
default:
  image: archlinux:base-devel
doctests:
  artifacts:
    paths:
    - .coverage.*
  before_script:
  - 'pacman -Syu --noconfirm python-coverage python-cvxopt python-networkx python-numpy
    python-setuptools

    '
  script:
  - 'coverage run -p --source picos ./test.py -u -vv

    '
  stage: test
documentation:
  artifacts:
    paths:
    - html
    - latex/picos.pdf
  before_script:
  - 'pacman -Syu --noconfirm git glpk graphviz python-cvxopt python-matplotlib python-networkx
    python-numpy python-pillow python-pip python-scipy python-wheel swig texlive

    '
  - pip install docutils==0.16 sphinx==5.3.0 standard-imghdr --break-system-packages
  - pip install autoapi picos-sphinx-theme swiglpk --break-system-packages
  - pip install qics --break-system-packages
  dependencies: []
  script:
  - sphinx-build -b doctest doc doctest
  - sphinx-build -b doctest doc doctest
  - sphinx-build -W -b html doc html
  - sphinx-build -W -b latex doc latex
  - make -C latex
  - ln -rs html/_* html/api/
  stage: prepare
leftovers:
  script:
  - (! grep -qr XXX picos tests)
  stage: test
linelength:
  allow_failure: true
  script:
  - (! find picos tests -name '*.py' -print0|xargs -0 grep '^.\{81,\}$')
  stage: test
pages:
  artifacts:
    paths:
    - public
  dependencies:
  - coverage
  - documentation
  rules:
  - if: $CI_COMMIT_BRANCH == "master"
  script:
  - mkdir public
  - mv -v html/* public
  - mv -v latex/picos.pdf public
  - mv -v htmlcov public/coverage
  stage: deploy
pypi:
  before_script:
  - 'pacman -Syu --noconfirm python-rich python-setuptools-scm python-wheel twine

    '
  dependencies:
  - sdist
  rules:
  - if: $CI_COMMIT_BRANCH == "master"
  script:
  - cd dist
  - twine upload picos-*.tar.gz
  stage: deploy
sdist:
  artifacts:
    paths:
    - dist/picos-*.tar.gz
  before_script:
  - 'pacman -Syu --noconfirm git python-cvxopt python-numpy python-rich python-setuptools-scm
    python-wheel twine

    '
  dependencies: []
  script:
  - ./setup.py sdist
  - cd dist
  - twine check picos-*.tar.gz
  - mkdir test
  - tar xf picos-*.tar.gz -C test
  - cd test/picos-*
  - python -c "import picos"
  stage: prepare
stages:
- test
- prepare
- deploy
style:
  allow_failure: true
  before_script:
  - pip install ruff
  image: python
  script:
  - 'ruff check --select D,E --ignore D105,D203,D213,D401,E221,E226,E271,E272,E501,E702,E741
    picos tests

    '
  stage: test
test_cplex:
  artifacts:
    paths:
    - .coverage.*
  before_script:
  - pip install coverage cplex cvxopt numpy
  image: python:3.8
  script:
  - 'coverage run -p --source picos ./test.py -p -vv -s cplex -o _ dualize=True

    '
  stage: test
test_cvxopt:
  artifacts:
    paths:
    - .coverage.*
  before_script:
  - pip install coverage cvxopt numpy
  image: python:3.9
  script:
  - 'coverage run -p --source picos ./test.py -p -vv -s cvxopt -o _ dualize=True

    '
  stage: test
test_ecos:
  artifacts:
    paths:
    - .coverage.*
  before_script:
  - pip install coverage cvxopt ecos numpy
  image: python:3.9
  script:
  - 'coverage run -p --source picos ./test.py -p -vv -s ecos -o _ dualize=True

    '
  stage: test
test_glpk:
  artifacts:
    paths:
    - .coverage.*
  before_script:
  - pip install coverage cvxopt numpy swiglpk
  image: python:3.9
  script:
  - 'coverage run -p --source picos ./test.py -p -vv -s glpk -o _ dualize=True

    '
  stage: test
test_gurobi_legacy:
  artifacts:
    paths:
    - .coverage.*
  before_script:
  - pip install coverage cvxopt numpy
  image: gurobi/python
  script:
  - 'coverage run -p --source picos ./test.py -p -vv -s gurobi -o gurobi_matint=False

    '
  stage: test
test_gurobi_matrix:
  artifacts:
    paths:
    - .coverage.*
  before_script:
  - pip install coverage cvxopt numpy scipy
  image: gurobi/python
  script:
  - 'coverage run -p --source picos ./test.py -p -vv -s gurobi -o gurobi_matint=True

    '
  stage: test
test_mosek:
  artifacts:
    paths:
    - .coverage.*
  before_script:
  - pip install coverage cvxopt mosek numpy
  image: python:3.9
  script:
  - 'coverage run -p --source picos ./test.py -p -vv -s mosek -o ''mosek_server="http://solve.mosek.com:30080"''
    ''mosek_server="http://solve.mosek.com:30080";dualize=True''

    '
  stage: test
test_mskfsn:
  artifacts:
    paths:
    - .coverage.*
  before_script:
  - pip install coverage cvxopt mosek numpy
  image: python:3.9
  script:
  - 'coverage run -p --source picos ./test.py -p -vv -s mskfsn -o ''mosek_server="http://solve.mosek.com:30080"''
    ''mosek_server="http://solve.mosek.com:30080";dualize=True''

    '
  stage: test
test_osqp:
  artifacts:
    paths:
    - .coverage.*
  before_script:
  - pip install coverage cvxopt osqp
  image: python:3.9
  script:
  - 'coverage run -p --source picos ./test.py -p -vv -s osqp -o _ dualize=True

    '
  stage: test
test_qics:
  artifacts:
    paths:
    - .coverage.*
  before_script:
  - pip install coverage cvxopt qics
  image: python:3.9
  script:
  - 'coverage run -p --source picos ./test.py -p -vv -s qics -o _ dualize=True

    '
  stage: test
test_scip:
  artifacts:
    paths:
    - .coverage.*
  before_script:
  - pip install coverage cvxopt numpy
  image: scipoptsuite/scipoptsuite:7.0.2
  script:
  - 'coverage run -p --source picos ./test.py -p -vv -s scip -o _ dualize=True

    '
  stage: test
