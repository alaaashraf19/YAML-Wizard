before_script:
- pip3 install tox
dist:
  artifacts:
    name: ${CI_PROJECT_NAME}-{$CI_BUILD_REF_NAME}
    paths:
    - dist/
  before_script:
  - pip3 install -rreqs/requirements-deploy.txt
  only:
  - tags
  - triggers
  script:
  - python3 setup.py sdist
  - python3 setup.py bdist_wheel
  - twine upload dist/* -u "$PYPI_USER" -p "$PYPI_PASS"
  stage: deploy
docker:
  before_script:
  - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" $CI_REGISTRY
  image: docker:latest
  only:
  - tags
  - triggers
  script:
  - docker build --pull -t "$CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG" -t "$CI_REGISTRY_IMAGE:latest"
    .
  - docker push "$CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG"
  - docker push "$CI_REGISTRY_IMAGE:latest"
  services:
  - docker:dind
  stage: deploy
image: mgoral/super-ci-runner:latest
pages:
  allow_failure: true
  artifacts:
    expire_in: 30 days
    paths:
    - public
  before_script:
  - pwd
  dependencies:
  - test-coverage
  only:
  - master
  script:
  - mv htmlcov/ public/
  stage: publish
stages:
- test
- publish
- deploy
test:
  script:
  - tox -e py35
  - tox -e py36
  stage: test
test-coverage:
  allow_failure: true
  artifacts:
    expire_in: 30 days
    name: coverage
    paths:
    - coverage.xml
    - htmlcov/
  script:
  - tox -e coverage
  stage: test
