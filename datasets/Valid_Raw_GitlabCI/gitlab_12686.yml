before_script:
- export GRADLE_USER_HOME=$(pwd)/.gradle
- chmod +x ./gradlew
- apt-get --quiet update --yes
- apt-get --quiet install --yes wget
build:
  artifacts:
    paths:
    - app/build/outputs/apk/debug/app-debug.apk
  script:
  - ./gradlew assembleDebug
  stage: build
cache:
  key: ${CI_PROJECT_ID}
  paths:
  - .gradle/
image: jangrewe/gitlab-ci-android
stages:
- build
- test
unitTests:
  script:
  - ./gradlew test
  stage: test
