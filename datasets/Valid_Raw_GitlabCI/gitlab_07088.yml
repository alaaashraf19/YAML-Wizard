build_using_dependencies_script_on_sistem:
  artifacts:
    paths:
    - build/
  before_script:
  - apt-get update -qq && apt-get install -qq -y $BUILD_SCRIPT_DEPENDENCIES $DEPENDENCIES_GUI
  image: ubuntu:artful
  script:
  - echo y | bash build_dependencies.sh --install_to /usr/local
  - mkdir build && cd build
  - cmake -DCMAKE_INSTALL_PREFIX=/usr -DCMAKE_BUILD_TYPE=Release -DOPHIDIAN_GUI=ON
    ..
  - make -j2
  - cd test
  - ./ophidian_tests
  stage: build
build_using_dependencies_script_on_source:
  artifacts:
    paths:
    - build/
  before_script:
  - apt-get update -qq && apt-get install -qq -y $BUILD_SCRIPT_DEPENDENCIES $DEPENDENCIES_GUI
  image: ubuntu:artful
  script:
  - echo "y" | bash build_dependencies.sh
  - mkdir build && cd build
  - cmake -DCMAKE_INSTALL_PREFIX=/usr -DCMAKE_BUILD_TYPE=Release -DOPHIDIAN_GUI=ON
    ..
  - make -j2
  - cd test
  - ./ophidian_tests
  stage: build
pages:
  artifacts:
    paths:
    - public
  before_script:
  - apk update
  - apk add doxygen
  image: alpine
  only:
  - master
  script:
  - cd doc
  - doxygen Doxyfile
  - cd ..
  - mv doc/documentation/html/ public/
  stage: build
stages:
- build
variables:
  BUILD_SCRIPT_DEPENDENCIES: build-essential git cmake libboost1.63-dev libz-dev flex
    bison libbison-dev
  DEPENDENCIES_GUI: libsfml-dev qtbase5-dev
  DEPENDENCIES_UBUNTU_ARTFUL: build-essential git cmake libboost1.63-dev liblemon-dev
    def lef ophidian-units libflute-dev libverilog-parser-dev
  DEPENDENCIES_UBUNTU_BIONIC: build-essential git cmake libboost-dev liblemon-dev
    def lef ophidian-units libflute-dev libverilog-parser-dev
  GIT_SUBMODULE_STRATEGY: recursive
