build_on_debian-sid:
  artifacts:
    paths:
    - build/
  before_script:
  - apt-get update -qq && apt-get install -qq -y software-properties-common gpg
  - apt-key adv --keyserver keyserver.ubuntu.com --recv-keys A62C1A5EFCB3D41A1FDB35758179B53998C15E64
    && apt-get update -qq
  - add-apt-repository -y -u -m "deb http://ppa.launchpad.net/eclufsc/ophidian/ubuntu
    artful main"
  - apt-get install -qq -y $DEPENDENCIES_UBUNTU_ARTFUL $DEPENDENCIES_GUI
  image: debian:sid
  script:
  - mkdir build && cd build
  - cmake -DCMAKE_INSTALL_PREFIX=/usr -DCMAKE_BUILD_TYPE=Release -DOPHIDIAN_GUI=ON
    ..
  - make -j2
  - cd test
  - ./ophidian_tests
  stage: build
build_on_ubuntu-artful:
  artifacts:
