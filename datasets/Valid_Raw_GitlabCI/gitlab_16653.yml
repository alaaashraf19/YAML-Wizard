  - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  - echo $CI_REGISTRY_IMAGE  $CI_REGISTRY
  - if [ -s todo-Fedora_$FREL.txt ]; then docker build --file todo-Fedora_$FREL.txt
    -t $CI_REGISTRY_IMAGE:Fedora_$FREL ; fi
  - if [ -s todo-Fedora_$FREL.txt ]; then docker push $CI_REGISTRY_IMAGE:Fedora_$FREL
    ; fi
  services:
  - docker:20.10.16-dind
  stage: build_docker_image
  variables:
    GIT_DEPTH: '1'
.check_commit_Archlinux:
  artifacts:
    expire_in: 1 day
    paths:
    - todo-Archlinux_$FREL.txt
  image:
    entrypoint:
    - ''
    name: alpine/git
  script:
  - rm -rf todo-Archlinux_$FREL.txt
  - git log -1 | grep ArchlinuxDockerfile$FREL | head -n 1 >> todo-Archlinux_$FREL.txt
    || touch todo-Archlinux_$FREL.txt
  - git diff --name-only HEAD HEAD~1 | grep CI/Archlinux/Dockerfile | head -n 1 >>
    todo-Archlinux_$FREL.txt || touch todo-Archlinux_$FREL.txt
  - if [ -s todo-Archlinux_$FREL.txt ]; then cat CI/Archlinux/Dockerfile  > todo-Archlinux_$FREL.txt;
    fi
  - if [ $CI_PIPELINE_SOURCE == "schedule" ]; then cat CI/Archlinux/Dockerfile  >
    todo-Archlinux_$FREL.txt; fi
  - cat todo-Archlinux_$FREL.txt
  - exit 0
  stage: check_if_dockerfile_updated
  variables:
    GIT_DEPTH: '3'
.check_commit_CentOS:
  artifacts:
    expire_in: 1 day
    paths:
    - todo-CentOS_$FREL.txt
  image:
    entrypoint:
    - ''
    name: alpine/git
  script:
  - rm -rf todo-CentOS_$FREL.txt
  - git log -1 | grep CentOSDockerfile$FREL | head -n 1 >> todo-CentOS_$FREL.txt ||
    touch todo-CentOS_$FREL.txt
  - git diff --name-only HEAD HEAD~1 | grep CI/CentOS/Dockerfile$FREL | head -n 1
    >> todo-CentOS_$FREL.txt || touch todo-CentOS_$FREL.txt
  - if [ -s todo-CentOS_$FREL.txt ]; then cat CI/CentOS/Dockerfile$FREL  > todo-CentOS_$FREL.txt;
    fi
  - if [ $CI_PIPELINE_SOURCE == "schedule" ]; then cat CI/CentOS/Dockerfile$FREL  >
    todo-CentOS_$FREL.txt; fi
  - cat todo-CentOS_$FREL.txt
  - exit 0
  stage: check_if_dockerfile_updated
  variables:
    GIT_DEPTH: '3'
.check_commit_Fedora:
  artifacts:
    expire_in: 1 day
    paths:
    - todo-Fedora_$FREL.txt
  image:
    entrypoint:
    - ''
    name: alpine/git
  script:
  - rm -rf todo-Fedora_$FREL.txt
  - git log -1 | grep FedoraDockerfile$FREL | head -n 1 >> todo-Fedora_$FREL.txt ||
    touch todo-Fedora_$FREL.txt
  - git diff --name-only HEAD HEAD~1 | grep CI/Fedora/Dockerfile | head -n 1 >> todo-Fedora_$FREL.txt
    || touch todo-Fedora_$FREL.txt
  - if [ -s todo-Fedora_$FREL.txt ]; then cat CI/Fedora/Dockerfile | sed 's/fedora:35/fedora:'$FREL'/g'
    > todo-Fedora_$FREL.txt; fi
  - if [ $CI_PIPELINE_SOURCE == "schedule" ]; then cat CI/Fedora/Dockerfile | sed
    's/fedora:35/fedora:'$FREL'/g' > todo-Fedora_$FREL.txt; fi
  - cat todo-Fedora_$FREL.txt
  - exit 0
  stage: check_if_dockerfile_updated
  variables:
    GIT_DEPTH: '3'
