pages:
  artifacts:
    paths:
    - public
  image: $CI_REGISTRY_IMAGE:Fedora_42
  rules:
  - changes:
    - Manual/**/*
    if: $CI_SERVER_HOST=="gitlab.com"
    when: always
  - when: never
  script:
  - cd Manual
  - git branch -r --contains 'origin/master~50' | grep -v '\->' | while read remote;
    do git branch --track "${remote#origin/}" "$remote"; done
  - git fetch --all
  - git checkout master
  - git pull
  - bash .build_versioned.sh build
  - mv build/_multi ../public
  stage: deploy
