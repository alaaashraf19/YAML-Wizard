.any:
  artifacts:
    expire_in: 2 days
    paths:
    - BUILD/Tests/*/*.pdf
    - BUILD/Tests/*/rivet-plots
    - BUILD/Tests/coverage.info
    - BUILD/Tests/html
    when: on_failure
  before_script:
  - set -x
  - uname -a
  - cat /etc/issue
  - export GIT_DEPTH=1
  coverage: '/^\s*lines\.+: (\d+\.\d+)%/'
  image: $CI_REGISTRY_IMAGE:${OS}_${FREL}
  stage: build
.any-cmake:
  extends: .any
  script:
  - &id001
    - if [ "${TOOLSET}" == "LLVM" ]; then export CXX=clang++; export CC=clang; export
      FC=gfortran; fi
    - if [ "${TOOLSET}" == "GNU" ]; then export CXX=g++; export CC=gcc; export FC=gfortran;
      fi
  - &id002
    - export CMAKE=cmake3
    - export CTEST=ctest3
    - if [ "${FREL}" == "7" ]; then export CMAKE=cmake3; CTEST=ctest3; fi
    - if [ "${FREL}" == "0" ]; then export CMAKE=cmake; CTEST=ctest; fi
    - export COMPILATIONSTART=$(date +%s)
    - $CMAKE --version
    - $CMAKE -S . -B BUILD -DCMAKE_INSTALL_PREFIX=$(pwd)/CM  $EXTRACMAKEFLAGS $CACHINGFLAGS
    - $CMAKE --build BUILD -j $NCOMPILATION_JOBS
    - export COMPILATIONEND=$(date +%s)
    - $CMAKE --install BUILD
    - echo $COMPILATIONSTART $COMPILATIONEND $(echo $COMPILATIONEND-$COMPILATIONSTART
      | bc -l)
    - $CTEST --test-dir BUILD --output-on-failure
    - if [[ $EXTRACMAKEFLAGS == *"ENABLE_COVERAGE"* ]]; then $CMAKE --build BUILD
      --target coverage; fi
    - if [[ $EXTRACMAKEFLAGS == *"ENABLE_COVERAGE"* ]]; then lcov --summary BUILD/Tests/coverage.info;
      fi
    - if [ "$BUILDDOCS" ]; then $CMAKE --build BUILD --target docs; fi
.any-cmake-ccache:
  before_script:
  - *id001
  - if [ "$CI_COMMIT_MESSAGE" = "cleancache" ]; then rm -rf cmake-$TOOLSET-cache-$FREL;
    fi
  - if [ "$CI_PIPELINE_SOURCE" = "schedule" ]; then rm -rf cmake-$TOOLSET-cache-$FREL;
    fi
  - df -h ./
  - df -h /tmp
  - export CCACHE_BASEDIR=`pwd`/cmake-$TOOLSET-cache-$FREL
  - export CCACHE_DIR=`pwd`/cmake-$TOOLSET-cache-$FREL/ccache
  - export CCACHE_MAXSIZE=${CCACHE_MAXSIZE:-500M}
  - export CCACHE_COMPRESS=${CCACHE_COMPRESS:-1}
  - export CCACHE_COMPILERCHECK=${CCACHE_COMPILERCHECK:-content}
  - mkdir -p ${CCACHE_DIR}
  - mkdir -p ${CCACHE_BASEDIR}
  - export F90CACHE_DIR=`pwd`/cmake-$TOOLSET-cache-$FREL/f90cache
  - export F90CACHE_TMPDIR=`pwd`/tmpf90cache
  - export F90CACHE_MAXSIZE=300M
  - mkdir -p ${F90CACHE_DIR}
  - mkdir -p ${F90CACHE_TMPDIR}
  - export CACHINGFLAGS="-DCMAKE_CXX_COMPILER_LAUNCHER=ccache -DCMAKE_C_COMPILER_LAUNCHER=ccache
    -DCMAKE_Fortran_COMPILER_LAUNCHER=f90cache"
  - if [ "${FREL}" == "7" ]; then export CACHINGFLAGS="-DCMAKE_CXX_COMPILER_LAUNCHER=ccache
    -DCMAKE_C_COMPILER_LAUNCHER=ccache "; fi
  - if [ "${FREL}" == "0" ]; then export CACHINGFLAGS="-DCMAKE_CXX_COMPILER_LAUNCHER=ccache
    -DCMAKE_C_COMPILER_LAUNCHER=ccache "; fi
  - ccache -s || true
  cache:
  - key: cmake-$TOOLSET-cache-$FREL
    paths:
    - cmake-$TOOLSET-cache-$FREL/
    policy: pull
    when: on_success
  extends: .any
  script:
  - *id002
.any-cmake-ccache-main:
  cache:
  - key: cmake-$TOOLSET-cache-$FREL
    paths:
    - cmake-$TOOLSET-cache-$FREL/
    policy: pull-push
    when: on_success
  extends: .any-cmake-ccache
.build_image_Archlinux:
  image:
    entrypoint:
    - ''
    name: gcr.io/kaniko-project/executor:debug
  retry: 2
  script:
  - echo "{\"auths\":{\"$CI_REGISTRY\":{\"username\":\"$CI_REGISTRY_USER\",\"password\":\"$CI_REGISTRY_PASSWORD\"}}}"
    > /kaniko/.docker/config.json
  - if [ -s todo-Archlinux_$FREL.txt ]; then /kaniko/executor --context $CI_PROJECT_DIR
    --dockerfile todo-Archlinux_$FREL.txt --destination $CI_REGISTRY_IMAGE:Archlinux_$FREL
