build:
  cache:
    key: $CI_COMMIT_REF_NAME
    paths:
    - img.tar
    - build/
  image: docker:latest
  script:
  - docker load -i img.tar
  - docker run --rm -v $(pwd):/project img:latest /bin/sh -c \ "cd /project && mkdir
    build && echo 'Hello World' > build/file.txt"
  services:
  - docker:dind
  stage: build
clean:
  image: docker:latest
  script:
  - (cd /cache && rm -rf *) || true
  stage: clean
docker:
  cache:
    key: $CI_COMMIT_REF_NAME
    paths:
    - img.tar
    policy: push
  image: docker:latest
  script:
  - docker build -t img:latest .
  - docker save img:latest -o img.tar
  services:
  - docker:dind
  stage: docker
stages:
- docker
- build
- test
- clean
test:
  cache:
    key: $CI_COMMIT_REF_NAME
    paths:
    - img.tar
    - build/
  image: docker:latest
  script:
  - docker load -i img.tar
  - docker run --rm -v $(pwd):/project img:latest /bin/sh -c \ "cat /project/build/file.txt"
  services:
  - docker:dind
  stage: test
