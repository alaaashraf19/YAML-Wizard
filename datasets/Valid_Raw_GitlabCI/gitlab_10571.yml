.cargo_test_template:
  script: &id001
  - cargo test --verbose --jobs 1 --all
  stage: test
beta:cargo:
  allow_failure: true
  image: registry.gitlab.com/iron-oxide/docker/rust-codecov:beta
  script: *id001
  stage: test
build:
  artifacts:
    paths:
    - target/release
  image: rust
  script:
  - cargo build --release --all
  stage: build
nightly:cargo:
  allow_failure: true
  image: registry.gitlab.com/iron-oxide/docker/rust-codecov:nightly
  script: *id001
  stage: test
pages:
  artifacts:
    paths:
    - public
  image: rust
  only:
  - master
  script:
  - cargo doc --all --no-deps
  - rm -rf public
  - mkdir public
  - cp -R target/doc/* public
  stage: deploy
stable:cargo:
  after_script:
  - 'for file in target/debug/cogwheel-*[^\.d]; do mkdir -p "target/cov/$(basename
    $file)"; kcov --exclude-pattern=/.cargo,/usr/lib --verify "target/cov/$(basename
    $file)" "$file"; done &&

    bash <(curl -s https://codecov.io/bash) -t $CODECOV_TOKEN &&

    echo "Uploaded code coverage"

    '
  image: registry.gitlab.com/iron-oxide/docker/rust-codecov:stable
  script: *id001
  stage: test
stages:
- build
- test
- deploy
