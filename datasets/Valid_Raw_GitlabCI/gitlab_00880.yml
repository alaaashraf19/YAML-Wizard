archive_project:
  artifacts:
    paths:
    - build/GitLab-CI-for-iOS.ipa
  script:
  - xcodebuild clean archive -archivePath build/Gitlab-CI-for-iOS -scheme GitLab-CI-for-iOS
  - xcodebuild -exportArchive -exportFormat ipa -archivePath "build/Gitlab-CI-for-iOS.xcarchive"
    -exportPath "build/GitLab-CI-for-iOS.ipa"
  stage: archive
  tags:
  - ios_9-2
  - xcode_7-2
  - osx_10-11
build_project:
  script:
  - xcodebuild test -project GitLab-CI-for-iOS.xcodeproj -scheme GitLab-CI-for-iOS
    -destination 'platform=iOS Simulator,name=iPhone 6s,OS=9.2' | xcpretty -s
  stage: build
  tags:
  - ios_9-2
  - xcode_7-2
  - osx_10-11
stages:
- build
- archive
