before_script:
- export BUILD_DIR="$(realpath $(pwd))"
- export NUGET_PACKAGES="$BUILD_DIR/.nuget"
build-job:
  artifacts:
    paths:
    - ./*/*/bin
    - ./*/*/obj
    - ./*/*/project.lock.json
  script:
  - dotnet restore
  - . ./build-all.sh
  stage: build
cache:
  key: $CI_BUILD_REF_NAME
  paths:
  - ./.nuget
deploy-job:
  artifacts:
    paths:
    - ./*/*/bin/*/*.nupkg
  script:
  - dotnet restore
  - . ./publish-all.sh
  stage: deploy
image: microsoft/dotnet:1.0.1-sdk-projectjson
stages:
- build
- test
- deploy
- deploy-docker
unittest-job:
  artifacts:
    paths:
    - ./*/*/bin
    - ./*/*/obj
    - ./*/*/project.lock.json
  dependencies:
  - build-job
  script:
  - dotnet restore
  - . ./test-all.sh
  stage: test
