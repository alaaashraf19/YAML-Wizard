pages:
  artifacts:
    paths:
    - public
  before_script:
  - apk add -U curl bash git openssh-client openssl yq
  - curl -fsSL https://raw.githubusercontent.com/helm/helm/master/scripts/get-helm-3
    | bash
  - 'mkdir -p "${HOME}"/.ssh

    echo "$(ssh-keyscan gitlab.com)" > "${HOME}"/.ssh/known_hosts

    echo "${SSH_PUSH_KEY}" > "${HOME}"/.ssh/id_rsa

    chmod 0700 "${HOME}"/.ssh

    chmod 600 "${HOME}"/.ssh/id_rsa

    '
  - 'git config --global user.name "Gitlab Runner"

    git config --global user.email "support@castlecraft.in"

    git remote remove ssh_origin || true

    git remote add ssh_origin ssh://git@gitlab.com/$CI_PROJECT_PATH

    '
  - npm i -g lerna docpress
  - yarn
  - rm -fr apps/**/node_modules && rm -fr frontends/**/node_modules
  - yarn --cwd apps/authorization-server
  - yarn --cwd apps/communication-server
  - yarn --cwd apps/identity-provider
  - yarn --cwd apps/infrastructure-console
  - yarn --cwd frontends/admin-client
  - yarn --cwd frontends/authorization-client
  - yarn --cwd frontends/identity-client
  image: node:alpine
  only:
  - main
  script:
  - docpress b
  - yarn docs
  - export CURRENT_CHART_VERSION=$(yq ".entries.blocks.[0].version" helm-repo/index.yaml)
  - "helm package kubernetes/helm-chart --destination helm-repo\nhelm repo index helm-repo\
    \ --url https://castlecraft.gitlab.io/building-blocks\nexport GENERATED_CHART_VERSION=$(yq\
    \ \".entries.blocks.[0].version\" helm-repo/index.yaml)\nif [ \"${CURRENT_CHART_VERSION}\"\
    \ != \"${GENERATED_CHART_VERSION}\" ]; then\n  git add helm-repo\n  git commit\
    \ -m \"chore: archive helm chart\"\n  git pull ssh_origin main --rebase\n  git\
    \ push ssh_origin HEAD:main -o ci.skip\nelse\n  git checkout helm-repo\nfi\n"
  - cp -f helm-repo/* public
  stage: docs
services:
- alias: mongo
  name: bitnami/mongodb:latest
- alias: docker
  name: docker:20.10.16-dind
- alias: events
  name: emqx/emqx:latest
stages:
- tests
- pack
- docs
test_admin_client:
  before_script:
  - "apt update && apt install -y \\\n  libnss3 \\\n  libnspr4 \\\n  libatk1.0-0 \\\
    \n  libatk-bridge2.0-0 \\\n  libcups2 \\\n  libdrm2 \\\n  libxkbcommon0 \\\n \
    \ libxcomposite1 \\\n  libxdamage1 \\\n  libxfixes3 \\\n  libxrandr2 \\\n  libgbm1\
    \ \\\n  libasound2 \\\n  libgtk2.0-0 \\\n  libgtk-3-0 \\\n  libgbm-dev \\\n  libnotify-dev\
    \ \\\n  libgconf-2-4 \\\n  libxss1 \\\n  libxtst6 \\\n  xauth \\\n  xvfb && \\\
    \nwget https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb\
    \ -O /tmp/chrome.deb && \\\napt install -y /tmp/chrome.deb && rm /tmp/chrome.deb\n"
  - cd frontends/admin-client
  - yarn
  cache:
    key: $CI_JOB_NAME-$CI_COMMIT_REF_SLUG
  image: node:latest
  only:
    changes:
    - frontends/admin-client/**/*
    refs:
    - merge_requests
  script:
  - yarn lint
  - yarn format:check
  - NODE_ENV=test yarn test
  - NODE_ENV=test yarn e2e
  stage: tests
  tags:
  - docker
test_authorization_client:
  before_script:
  - "apt update && apt install -y \\\n  libnss3 \\\n  libnspr4 \\\n  libatk1.0-0 \\\
    \n  libatk-bridge2.0-0 \\\n  libcups2 \\\n  libdrm2 \\\n  libxkbcommon0 \\\n \
    \ libxcomposite1 \\\n  libxdamage1 \\\n  libxfixes3 \\\n  libxrandr2 \\\n  libgbm1\
    \ \\\n  libasound2 \\\n  libgtk2.0-0 \\\n  libgtk-3-0 \\\n  libgbm-dev \\\n  libnotify-dev\
    \ \\\n  libgconf-2-4 \\\n  libxss1 \\\n  libxtst6 \\\n  xauth \\\n  xvfb && \\\
    \nwget https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb\
    \ -O /tmp/chrome.deb && \\\napt install -y /tmp/chrome.deb && rm /tmp/chrome.deb\n"
