test_authorization_server:
  before_script:
  - apt-get update && apt-get install -y gettext-base
  - cd apps/authorization-server
  - yarn
  cache:
    key: $CI_JOB_NAME-$CI_COMMIT_REF_SLUG
    paths:
    - apps/authorization-server/node_modules/
  image: node:latest
  only:
    changes:
    - apps/authorization-server/**/*
    refs:
    - merge_requests
  script:
  - yarn lint
  - yarn format:check
  - yarn test:server
  - envsubst '${NODE_ENV} ${SESSION_SECRET} ${COOKIE_MAX_AGE} ${SESSION_NAME} ${TOKEN_VALIDITY}
    ${DB_HOST} ${DB_NAME} ${DB_USER} ${DB_PASSWORD}' < docker/env.tmpl > .env
  - envsubst '${EVENTS_PROTO} ${EVENTS_HOST} ${EVENTS_PORT} ${EVENTS_USER} ${EVENTS_PASSWORD}'
    < docker/env-events.tmpl >> .env
  - export NODE_ENV=test
  - yarn test:e2e
  stage: tests
  tags:
  - docker
  variables:
    COOKIE_MAX_AGE: '43200'
    DB_HOST: mongo
    DB_NAME: authorization-server
    DB_PASSWORD: admin
    DB_USER: admin
    EVENTS_HOST: events
    EVENTS_PASSWORD: changeit
    EVENTS_PORT: '1883'
    EVENTS_PROTO: mqtt
    EVENTS_USER: user
    NODE_ENV: development
    SESSION_NAME: E2E_SESSION
    SESSION_SECRET: secret
    TOKEN_VALIDITY: '3600'
