before_script:
- git config user.email "builds@dietsodasoftware.com"
- git config user.name "Diet Soda GitLab CI"
- which ssh-agent || ( apt-get update -y && apt-get install openssh-client -y )
- eval $(ssh-agent -s)
- ssh-add <(echo "$SSH_PRIVATE_KEY")
- mkdir -p ~/.ssh
- '[[ -f /.dockerenv ]] && echo -e "Host *\n\tStrictHostKeyChecking no\n\n" > ~/.ssh/config'
cache:
  paths:
  - .m2/repository
image: maven:3.5.4-jdk-8
release_artifact:
  cache:
    paths:
    - .m2/repository
  environment:
    name: apple-sauce
    url: apple-sauce-url
  only:
  - master
  script:
  - ./bintray_release.sh
  stage: deploy
stages:
- deploy
variables:
  MAVEN_OPTS: -Dmaven.repo.local=.m2/repository -Dorg.slf4j.simpleLogger.log.org.apache.maven.cli.transfer.Slf4jMavenTransferListener=WARN
    -Dorg.slf4j.simpleLogger.showDateTime=true -Djava.awt.headless=true
  MVN_CLI_OPTS: -s .m2/settings.xml
  PROJECT_BRANCH: $CI_COMMIT_REF_NAME
  REVISION: $CI_PIPELINE_IID
