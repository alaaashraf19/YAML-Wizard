.job_template:
  image: antmounds/cd-builder
  services: &id001
  - docker:dind
build_app:
  before_script:
  - docker login -u gitlab-ci-token -p $CI_JOB_TOKEN registry.gitlab.com
  cache:
    paths:
    - image.tar
    policy: push
  image: docker:stable-git
  only:
  - master
  - develop
  - cloud
  - lite
  script: '

    echo "Building image..."


    DEV=$(echo $GITLAB_USER_NAME | tr ''[:upper:]'' ''[:lower:]'')


    docker pull $CI_REGISTRY_IMAGE/dev:$DEV || true


    docker build --rm -f docker/Dockerfile --cache-from ${CI_REGISTRY_IMAGE}/dev:$DEV
    -t $CI_REGISTRY_IMAGE -t $CI_REGISTRY_IMAGE/dev --build-arg BUILD=$CI_PIPELINE_IID
    --build-arg BUILD_DATE="$(date --utc +%FT%TZ)" --build-arg METEOR_SETTINGS="$(cat
    src/tools/settings.json)" --build-arg VCS_REF="$(git rev-parse --short HEAD)"
    --build-arg RELEASE=$APP_RELEASE --build-arg VERSION=$APP_VERSION .


    docker save $CI_REGISTRY_IMAGE -o image.tar


    docker tag $CI_REGISTRY_IMAGE $CI_REGISTRY_IMAGE:$CI_PIPELINE_IID


    docker tag $CI_REGISTRY_IMAGE/dev $CI_REGISTRY_IMAGE/dev:$DEV


    docker push $CI_REGISTRY_IMAGE/dev

    '
  services: &id002
  - docker:dind
  stage: build
deploy_app:
  environment:
    name: production
    url: http://app.getantennae.com
  image: antmounds/cd-builder
  only:
  - cloud
  script: '

    aws --version


    docker --version


    docker-compose --version


    terraform --version


    cd infrastructure/aws-ecs


    terraform init -backend=true -input=false -lock=true -upgrade=true


    terraform plan -input=false -lock=true -refresh=true


    terraform apply -input=false -lock=true -refresh=true -auto-approve -target=aws_ecs_service.app_service_hot
    -var app_version_hot=${CI_PIPELINE_IID}

    '
  services: *id001
  stage: deploy
  when: manual
deploy_dev:
  environment:
    name: dev
    url: http://dev.getantennae.com
  image: antmounds/cd-builder
  only:
  - develop
  script: '

    aws --version


    docker --version


    docker-compose --version


    terraform --version


    cd infrastructure/aws-ecs


    terraform init -backend=true -input=false -lock=true -upgrade=true


    terraform plan -input=false -lock=true -refresh=true


    terraform apply -input=false -lock=true -refresh=true -auto-approve -target=aws_ecs_service.app_service_dev
    -var app_version_dev=${CI_PIPELINE_IID}

    '
  services: *id001
  stage: deploy
deploy_infrastructure:
  environment:
    name: terraform
  image: antmounds/cd-builder
  only:
    changes:
    - infrastructure/*
  script: '

    cd infrastructure/aws-ecs


    terraform init -backend=true -input=false -lock=true -upgrade=true


    terraform plan -input=false -lock=true -refresh=true


    #terraform apply -input=false -lock=true -refresh=true -auto-approve -target=resource
    -var app_version_warm=${CI_PIPELINE_IID}

    '
  services: *id001
  stage: deploy
  variables:
    AWS_ACCESS_KEY_ID: $AWS_ACCESS_KEY_ID
    AWS_DEFAULT_REGION: us-east-1
    AWS_SECRET_ACCESS_KEY: $AWS_SECRET_ACCESS_KEY
  when: manual
deploy_new:
  environment:
    name: staging
    url: http://new.getantennae.com
  image: antmounds/cd-builder
  only:
  - cloud
  script: '

    aws --version


    docker --version


    docker-compose --version


    terraform --version


    cd infrastructure/aws-ecs


    terraform init -backend=true -input=false -lock=true -upgrade=true


    terraform plan -input=false -lock=true -refresh=true


    terraform apply -input=false -lock=true -refresh=true -auto-approve -target=aws_ecs_service.app_service_warm
    -var app_version_warm=${CI_PIPELINE_IID}

    '
  services: *id001
  stage: deploy
push_aws:
  before_script:
  - $(aws ecr get-login --no-include-email --region us-east-1)
  - docker load -i image.tar
  cache:
    paths:
    - image.tar
    policy: pull
  image: antmounds/cd-builder
  only:
  - master
  - develop
  - cloud
  - lite
  script: '

    echo "Pushing app to AWS Elastic Container Registry"


    docker tag $CI_REGISTRY_IMAGE $AWS_IMAGE_URI


    docker tag $AWS_IMAGE_URI $AWS_IMAGE_URI:$APP_IMAGE_VERSION


    docker tag $AWS_IMAGE_URI $AWS_IMAGE_URI:$APP_RELEASE


    docker tag $AWS_IMAGE_URI $AWS_IMAGE_URI:$CI_PIPELINE_IID


    docker push $AWS_IMAGE_URI

    '
  services: *id001
  stage: push
  variables:
    AWS_ACCESS_KEY_ID: $AWS_ACCESS_KEY_ID
    AWS_SECRET_ACCESS_KEY: $AWS_SECRET_ACCESS_KEY
push_dockerhub:
  before_script:
  - echo $DOCKER_HUB_PASSWORD | docker login -u $DOCKER_HUB_USERNAME --password-stdin
  - docker load -i image.tar || true
  cache:
    paths:
    - image.tar
    policy: pull
  image: docker:stable-git
  only:
  - master
  - lite
  script:
  - echo "Pushing app to Dockerhub registry"
  - docker tag $CI_REGISTRY_IMAGE $DOCKERHUB_IMAGE_NAME
  - docker tag $DOCKERHUB_IMAGE_NAME $DOCKERHUB_IMAGE_NAME:$APP_IMAGE_VERSION
  - docker tag $DOCKERHUB_IMAGE_NAME $DOCKERHUB_IMAGE_NAME:$APP_RELEASE
  - docker push $DOCKERHUB_IMAGE_NAME
  services: *id002
  stage: push
push_gitlab:
  before_script:
  - DEV=$(echo $GITLAB_USER_NAME | tr '[:upper:]' '[:lower:]')
  - echo $CI_JOB_TOKEN | docker login -u gitlab-ci-token --password-stdin registry.gitlab.com
  - docker pull $CI_REGISTRY_IMAGE/dev:$DEV || true
  image: docker:stable-git
  only:
  - master
  - cloud
  - lite
  script: '

    echo "Pushing app to Gitlab registry"


    docker tag $CI_REGISTRY_IMAGE/dev:$DEV $CI_REGISTRY_IMAGE


    docker tag $CI_REGISTRY_IMAGE $CI_REGISTRY_IMAGE:$APP_IMAGE_VERSION


    docker tag $CI_REGISTRY_IMAGE $CI_REGISTRY_IMAGE:$APP_RELEASE


    docker tag $CI_REGISTRY_IMAGE $CI_REGISTRY_IMAGE:$CI_PIPELINE_IID


    docker push $CI_REGISTRY_IMAGE

    '
  services: *id002
  stage: push
push_quay:
  before_script:
  - echo $QUAY_PASSWORD | docker login -u $QUAY_USERNAME --password-stdin quay.io
  - docker load -i image.tar || true
  cache:
    paths:
    - image.tar
    policy: pull
  image: docker:stable-git
  only:
  - master
  - lite
  script: '

    echo "Pushing image to Quay registry..."


    docker tag $CI_REGISTRY_IMAGE $QUAY_IMAGE_NAME


    docker tag $QUAY_IMAGE_NAME $QUAY_IMAGE_NAME:$APP_IMAGE_VERSION


    docker tag $QUAY_IMAGE_NAME $QUAY_IMAGE_NAME:$APP_RELEASE


    docker push $QUAY_IMAGE_NAME

    '
  services: *id002
  stage: push
stages:
- build
- push
- deploy
variables:
  APP_IMAGE_VERSION: 1
  APP_RELEASE: lite
  APP_VERSION: '1.0'
  AWS_IMAGE_URI: 166964003196.dkr.ecr.us-east-1.amazonaws.com/${IMAGE_NAME}
  DOCKERHUB_IMAGE_NAME: ${USERNAME}/${IMAGE_NAME}
  DOCKER_DRIVER: overlay2
  DOCKER_HOST: tcp://docker:2375/
  IMAGE_NAME: antennae
  QUAY_IMAGE_NAME: quay.io/${USERNAME}/${IMAGE_NAME}
  USERNAME: antmounds
