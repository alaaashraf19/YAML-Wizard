Debian Package Ubuntu 20.04:
  artifacts:
    name: shmdata_package_${CI_BUILD_REF_NAME}
    paths:
    - libshmdata_latest_amd64.deb
  image: ubuntu:20.04
  only:
  - master
  script:
  - DEBIAN_FRONTEND=noninteractive apt update -y
  - DEBIAN_FRONTEND=noninteractive apt install -y --no-install-recommends file
  - DEBIAN_FRONTEND=noninteractive apt install -y --no-install-recommends cmake build-essential
    git libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev gstreamer1.0-plugins-base
    python3-dev
  - rm -rf build && mkdir build && cd build
  - cmake -DCMAKE_INSTALL_PREFIX=/usr ..
  - make package
  - mv *.deb ../libshmdata_latest_amd64.deb
  stage: package
Test Ubuntu 22.04:
  except:
  - develop
  - master
  image: ubuntu:22.04
  script:
  - DEBIAN_FRONTEND=noninteractive apt update -y
  - DEBIAN_FRONTEND=noninteractive apt install -y --no-install-recommends cmake build-essential
    git libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev gstreamer1.0-plugins-base
    python3-dev
  - rm -rf build && mkdir build && cd build
  - cmake ..
  - make -j${nproc}
  - make test
  stage: test
Test package Ubuntu 20.04:
  image: ubuntu:20.04
  only:
  - develop
  - master
  script:
  - DEBIAN_FRONTEND=noninteractive apt update -y
  - DEBIAN_FRONTEND=noninteractive apt install -y --no-install-recommends cmake build-essential
    git libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev gstreamer1.0-plugins-base
    python3-dev
  - rm -rf build && mkdir build && cd build
  - cmake ..
  - make package_source_test
  stage: test
coverage:
  artifacts:
    name: shmdata_coverage_${CI_BUILD_REF_NAME}
    paths:
    - coverage.zip
  image: ubuntu:20.04
  only:
  - develop
  script:
  - DEBIAN_FRONTEND=noninteractive apt update -y
  - DEBIAN_FRONTEND=noninteractive apt install -y --no-install-recommends lcov zip
  - DEBIAN_FRONTEND=noninteractive apt install -y --no-install-recommends cmake build-essential
    git libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev gstreamer1.0-plugins-base
    python3-dev
  - rm -rf build && mkdir build && cd build
  - cmake -DTEST_COVERAGE=ON ..
  - make -j$(nproc)
  - make check_coverage
  - zip -r coverage.zip coverage
  - mv coverage.zip ../
  stage: coverage
pages:
  artifacts:
    paths:
    - public
  image: ubuntu:20.04
  only:
  - website
  - master
  script:
  - DEBIAN_FRONTEND=noninteractive apt update -y
  - DEBIAN_FRONTEND=noninteractive apt install -y --no-install-recommends file
  - DEBIAN_FRONTEND=noninteractive apt install -y --no-install-recommends ca-certificates
    python3-pip git build-essential
  - git clone https://gitlab.com/sat-mtl/documentation/shmdata.git shmdata-doc
  - pushd shmdata-doc
  - git pull origin master
  - pip install -U sphinx
  - pip install -r requirements.txt
  - make htmlgitlab
  - popd
  - DEBIAN_FRONTEND=noninteractive apt install -y --no-install-recommends cmake build-essential
    git libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev gstreamer1.0-plugins-base
    python3-dev doxygen
  - mkdir build && pushd build && cmake .. && make doc
  - popd
  - mv shmdata-doc/public public
  - mv html public/doxygen
  stage: deploy
stages:
- test
- coverage
- package
- deploy
variables:
  CTEST_OUTPUT_ON_FAILURE: '1'
