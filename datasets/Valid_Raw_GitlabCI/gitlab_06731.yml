.job_template_test_hotsite:
  before_script: &id001
  - hugo version
  image: registry.gitlab.com/osinfs/containerize:base-hugo-0.17
before_script:
- docker login -u gitlab-ci-token -p $CI_BUILD_TOKEN registry.gitlab.com
- 'curl -u "${C_ACCESS_KEY}:${C_SECRET_KEY}" -X POST -H "Accept: application/json"
  -H "Content-Type: application/json" -d "{}" "http://${C_SERVER_URL}:${C_SERVER_URL_PORT}/v1/projects/${HOMOLOG_PROJECT_ID}/services/${HOMOLOG_SERVICE_ID}/?action=finishupgrade"'
- 'curl -u "${C_ACCESS_KEY}:${C_SECRET_KEY}" -X POST -H "Accept: application/json"
  -H "Content-Type: application/json" -d "{}" "http://${C_SERVER_URL}:${C_SERVER_URL_PORT}/v1/projects/${PRODUCTION_PROJECT_ID}/services/${PRODUCTION_SERVICE_ID}/?action=finishupgrade"'
build to homolog:
  environment: homolog
  except:
  - master
  only:
  - branches
  script:
  - docker build -f Dockerfile-hugo -t $CONTAINER_TEST_IMAGE .
  - docker push $CONTAINER_TEST_IMAGE
  stage: build:hugo
build to realease:
  environment: production
  only:
  - tags
  script:
  - sed -e "s/#Ganalytics/Ganalytics/" -i config.toml
  - docker build -f Dockerfile-hugo -t $CONTAINER_TEST_IMAGE .
  - docker push $CONTAINER_TEST_IMAGE
  stage: build:hugo
deploy to homolog:
  environment: homolog
  except:
  - master
  - tags
  only:
  - /beta\d+/
  script:
  - 'curl -u "${C_ACCESS_KEY}:${C_SECRET_KEY}" -X POST -H "Accept: application/json"
    -H "Content-Type: application/json" -d "{ \"inServiceStrategy\": { \"launchConfig\":
    { \"environment\": { \"HUGO_BASE_URL\": \"${HOMOLOG_URL}\", \"HUGO_BUILD_DRAFTS\":
    \"-D\" }, \"imageUuid\": \"docker:${CONTAINER_TEST_IMAGE}\" } } }" "http://${C_SERVER_URL}:${C_SERVER_URL_PORT}/v1/projects/${HOMOLOG_PROJECT_ID}/services/${HOMOLOG_SERVICE_ID}/?action=upgrade"'
  stage: deploy
deploy to production:
  environment: production
  only:
  - tags
  script:
  - 'curl -u "${C_ACCESS_KEY}:${C_SECRET_KEY}" -X POST -H "Accept: application/json"
    -H "Content-Type: application/json" -d "{ \"inServiceStrategy\": { \"launchConfig\":
    { \"environment\": { \"HUGO_BASE_URL\": \"${PRODUCTION_URL}\", \"HUGO_BASE_URL_PORT\":
    \"80\" }, \"imageUuid\": \"docker:${CONTAINER_TEST_IMAGE}\" } } }" "http://${C_SERVER_URL}:${C_SERVER_URL_PORT}/v1/projects/${PRODUCTION_PROJECT_ID}/services/${PRODUCTION_SERVICE_ID}/?action=upgrade"'
  stage: deploy
image: docker:git
release-image:
  environment: production
  only:
  - tags
  script:
  - docker pull $CONTAINER_TEST_IMAGE
  - docker tag $CONTAINER_TEST_IMAGE $CONTAINER_RELEASE_IMAGE
  - docker push $CONTAINER_RELEASE_IMAGE
  stage: release
services:
- docker:dind
stages:
- test
- build:hugo
- release
- deploy
test config:
  before_script: *id001
  image: registry.gitlab.com/osinfs/containerize:base-hugo-0.17
  script:
  - hugo --verbose --config config.toml
  stage: test
test contentbuild:
  before_script: *id001
  image: registry.gitlab.com/osinfs/containerize:base-hugo-0.17
  script:
  - hugo
  stage: test
variables:
  CONTAINER_RELEASE_IMAGE: $CI_REGISTRY_IMAGE:latest
  CONTAINER_TEST_IMAGE: $CI_REGISTRY_IMAGE:hugo-$CI_BUILD_REF_NAME
