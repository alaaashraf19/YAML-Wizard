all_test:
  script:
  - ./linux_downloader.sh --test
all_torrent:
  script:
  - ./linux_downloader.sh --torrent
archlinux_iso:
  script:
  - ./linux_downloader.sh --test --iso --archlinux
  - ./linux_downloader.sh --iso --aria2 --parallel 5 --archlinux
archlinux_torrent:
  script:
  - ./linux_downloader.sh --test --torrent --archlinux
  - ./linux_downloader.sh --torrent --archlinux
before_script:
- apk add --update bash curl wget aria2
- chmod +x linux_downloader.sh
debian_iso:
  script:
  - ./linux_downloader.sh --test --iso --debian
  - ./linux_downloader.sh --iso --aria2 --parallel 5 --debian
