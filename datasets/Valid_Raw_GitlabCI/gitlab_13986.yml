build-linux:
  image: ibmcom/swift-ubuntu:4.2
  script:
  - time swift build -c release
  stage: build-linux
build-macos:
  script:
  - time swift build -c release
  stage: build-macos
  tags:
  - ios
cache:
  paths:
  - .build/checkouts
  - .build/dependencies-state.json
  - .build/repositories
  - Package.resolved
coverage-report:
  script:
  - echo "MACOSX_DEPLOYMENT_TARGET=10.13" > config.xcconfig
  - swift package generate-xcodeproj --enable-code-coverage --xcconfig-overrides config.xcconfig
  - xcodebuild -project SlackHook.xcodeproj -scheme SlackHook-Package -derivedDataPath
    Build/ clean build test
  - zsh -c "xcrun xccov view --only-targets Build/Logs/Test/**/*.xccovreport"
  stage: coverage-report
  tags:
  - ios
stages:
- build-linux
- test-linux
- build-macos
- test-macos
- coverage-report
test-linux:
  image: ibmcom/swift-ubuntu:4.2
  script:
  - swift test
  stage: test-linux
test-macos:
  script:
  - swift test -Xswiftc -target -Xswiftc x86_64-apple-macosx10.13
  stage: test-macos
  tags:
  - ios
variables:
  IMAGE_TAG: $CI_REGISTRY_IMAGE:$CI_COMMIT_TAG
