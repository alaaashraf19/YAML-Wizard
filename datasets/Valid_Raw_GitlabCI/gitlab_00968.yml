.defs:
- ANTORA_VERSION=${ANTORA_VERSION:-$(curl -s 'https://gitlab.com/api/v4/projects/4180516/repository/tags?order_by=updated&sort=desc&per_page=1'
  | jq -rM '.[].name[1:]')}
- sed -i "s/@latest/@$ANTORA_VERSION/g" Dockerfile
- '[[ $ANTORA_VERSION == "3.2."* ]] && sed -i "s/^FROM node:16-/FROM node:18-/" Dockerfile

  '
- 'if [ -z "${ANTORA_VERSION/*-*}" ]; then CI_REGISTRY_IMAGE_TAG=testing; else CI_REGISTRY_IMAGE_TAG=latest;
  fi

  '
- docker buildx install && docker buildx create --name docker-antora --use
- docker build --pull --platform "$CI_REGISTRY_IMAGE_PLATFORM" -t "$CI_REGISTRY_IMAGE:$ANTORA_VERSION"
  -t "$CI_REGISTRY_IMAGE:$CI_REGISTRY_IMAGE_TAG" .
- docker build --push --platform "$CI_REGISTRY_IMAGE_PLATFORM" -t "$CI_REGISTRY_IMAGE:$ANTORA_VERSION"
  -t "$CI_REGISTRY_IMAGE:$CI_REGISTRY_IMAGE_TAG" .
- docker buildx imagetools inspect "$CI_REGISTRY_IMAGE:$ANTORA_VERSION"
before_script:
- apk --no-cache -q add curl git jq
build:
  rules:
  - if: $CI_PROJECT_PATH == 'antora/docker-antora' && $CI_COMMIT_BRANCH == 'main'
    when: never
  - when: on_success
  script:
  - ANTORA_VERSION=${ANTORA_VERSION:-$(curl -s 'https://gitlab.com/api/v4/projects/4180516/repository/tags?order_by=updated&sort=desc&per_page=1'
    | jq -rM '.[].name[1:]')}
  - sed -i "s/@latest/@$ANTORA_VERSION/g" Dockerfile
  - '[[ $ANTORA_VERSION == "3.2."* ]] && sed -i "s/^FROM node:16-/FROM node:18-/"
    Dockerfile

    '
  - 'if [ -z "${ANTORA_VERSION/*-*}" ]; then CI_REGISTRY_IMAGE_TAG=testing; else CI_REGISTRY_IMAGE_TAG=latest;
    fi

    '
  - docker buildx install && docker buildx create --name docker-antora --use
  - docker build --pull --platform "$CI_REGISTRY_IMAGE_PLATFORM" -t "$CI_REGISTRY_IMAGE:$ANTORA_VERSION"
    -t "$CI_REGISTRY_IMAGE:$CI_REGISTRY_IMAGE_TAG" .
  stage: build
deploy:
  rules:
  - if: $CI_PROJECT_PATH == 'antora/docker-antora' && $CI_COMMIT_BRANCH == 'main'
  script:
  - echo "Antora version requested:" ${ANTORA_VERSION:-none}
  - ANTORA_VERSION=${ANTORA_VERSION:-$(curl -s 'https://gitlab.com/api/v4/projects/4180516/repository/tags?order_by=updated&sort=desc&per_page=1'
    | jq -rM '.[].name[1:]')}
  - echo "Antora version resolved:" $ANTORA_VERSION
  - sed -i "s/@latest/@$ANTORA_VERSION/g" Dockerfile
  - '[[ $ANTORA_VERSION == "3.2."* ]] && sed -i "s/^FROM node:16-/FROM node:18-/"
    Dockerfile

    '
  - 'if [ -z "${ANTORA_VERSION/*-*}" ]; then CI_REGISTRY_IMAGE_TAG=testing; else CI_REGISTRY_IMAGE_TAG=latest;
    fi

    '
  - docker buildx install && docker buildx create --name docker-antora --use
  - docker build --pull --platform "$CI_REGISTRY_IMAGE_PLATFORM" -t "$CI_REGISTRY_IMAGE:$ANTORA_VERSION"
    -t "$CI_REGISTRY_IMAGE:$CI_REGISTRY_IMAGE_TAG" .
  - "while [ -n \"$CI_REGISTRY_TAGS_RESOURCE\" ]; do\n  _tags=$(curl -s $CI_REGISTRY_TAGS_RESOURCE)\n\
    \  _published=$(echo $_tags | jq -rM '.results[].name | select(. == \"'$ANTORA_VERSION'\"\
    )')\n  if [ \"$_published\" == \"$ANTORA_VERSION\" ]; then\n    echo \"Skipping\
    \ publishing. $CI_REGISTRY_IMAGE:$ANTORA_VERSION has already been published.\"\
    \n    exit 0\n  else\n    CI_REGISTRY_TAGS_RESOURCE=$(echo $_tags | jq -rM 'select(.next\
    \ != null) | .next')\n  fi\ndone\n"
  - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin
    "$CI_REGISTRY"
  - echo "Publishing $CI_REGISTRY_IMAGE:$ANTORA_VERSION as $CI_REGISTRY_IMAGE:$CI_REGISTRY_IMAGE_TAG"
  - docker build --push --platform "$CI_REGISTRY_IMAGE_PLATFORM" -t "$CI_REGISTRY_IMAGE:$ANTORA_VERSION"
    -t "$CI_REGISTRY_IMAGE:$CI_REGISTRY_IMAGE_TAG" .
  - docker buildx imagetools inspect "$CI_REGISTRY_IMAGE:$ANTORA_VERSION"
  stage: deploy
image: docker:27
services:
- docker:27-dind
variables:
  CI_REGISTRY_IMAGE: antora/antora
  CI_REGISTRY_IMAGE_PLATFORM: linux/amd64,linux/arm64
  CI_REGISTRY_TAGS_RESOURCE: https://registry.hub.docker.com/v2/repositories/$CI_REGISTRY_IMAGE/tags/?page_size=25
