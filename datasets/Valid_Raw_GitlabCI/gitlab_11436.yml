generate_stats:
  artifacts:
    paths:
    - public
    - results
    - tmp
    when: always
  script:
  - apk --update --no-cache add git jq bash gzip curl tree coreutils grep
  - bash ./analysis.sh
  - mv dist public
  stage: build
image: node:12-alpine
pages:
  artifacts:
    paths:
    - public
  only:
  - master
  script:
  - ls public
  stage: deploy
shellcheck:
  image: koalaman/shellcheck-alpine
  script:
  - shellcheck ./analysis.sh
  stage: build
