smoke_test:
  image: python:3
  rules:
  - if: $CI_PIPELINE_SOURCE == "push"
  - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  - if: $CI_PIPELINE_SOURCE == "web"
  - if: $CI_COMMIT_TAG
  script:
  - echo "Running smoke tests..."
  - python3 ./spw.py --help
  - python3 ./spw.py
  - python3 ./spw.py 20 5
  - python3 ./spw.py -1
  - python3 ./spw.py --single
  - python3 ./spw.py -E
  - python3 ./spw.py -E 20 5
  - python3 ./spw.py -s 20 5
  - python3 ./spw.py -e 20 5
  - python3 ./spw.py -b 20 5
  - python3 ./spw.py -seb 20 5
  - python3 ./spw.py -seba 20 5
  - python3 ./spw.py -sebam 20 5
  - python3 ./spw.py -u 20 5
  - python3 ./spw.py -l 20 5
  - python3 ./spw.py -d 20 5
  - python3 ./spw.py -a 20 5
  - python3 ./spw.py -v 20 5
  - python3 ./spw.py -m 20 5
  - python3 ./spw.py --dictionary ./dict/spw_small -r 30 3
  - python3 ./spw.py --dictionary ./dict/spw_small -rd 30 3
  - python3 ./spw.py --dictionary ./dict/spw_small -rud 30 3
  - python3 ./spw.py --dictionary ./dict/spw_small -x 5 3
  - python3 ./spw.py --dictionary ./dict/spw_small -x --min 3 --max 5 5 3
  - python3 ./spw.py --dictionary ./dict/spw_small -x --min 3 --max 5 --separator
    '*' 5 3
  - python3 ./spw.py --dictionary ./dict/spw_small -x --min 4 --max 6 --separator
    '_' 5 3
  - python3 ./spw.py --dictionary ./dict/spw_small -x -E 5 3
  - python3 ./spw.py --dictionary ./dict/spw_small -x -S 5 3
  - python3 ./spw.py --dictionary ./dict/spw_small -x -O 5 3
  - python3 ./spw.py --dictionary ./dict/spw_small -x --overwrite 5 3
  - python3 ./spw.py --sha1 './dict/spw_en#salt1'
  - python3 ./spw.py --sha1 './dict/spw_en#salt1' 20 1
  - python3 ./spw.py --sha256 './dict/spw_en#salt2'
  - python3 ./spw.py --sha256 './dict/spw_en#salt2' 20 1
  - python3 ./spw.py --sha256 './dict/spw_en#different_salt' 20 1
  - python3 ./spw.py 1 1
  - python3 ./spw.py 100 1
  - python3 ./spw.py 10 100
  - python3 ./spw.py -ud 20 5
  - python3 ./spw.py -seba 25 5
  - python3 ./spw.py -av 20 5
  - python3 ./spw.py -mavd 20 5
  - python3 ./spw.py -1 10 20
  - python3 ./spw.py --single 10 20
  - python3 ./spw.py -E -seb 20 5
  - python3 ./spw.py -E -1 20 5
  - python3 ./spw.py --dictionary ./dict/spw_small -x -E -S 5 3
  - python3 ./spw.py --dictionary ./dict/spw_small -x -E --overwrite 5 3
  - python3 ./spw.py --dictionary ./dict/spw_small -x -S -O 5 3
  - python3 ./spw.py --dictionary ./dict/spw_small -r -E 30 3
  - python3 ./spw.py --dictionary ./dict/spw_small -r -s 30 3
  - python3 ./spw.py --dictionary ./dict/spw_small -r -seb 30 3
  - python3 ./spw.py --dictionary ./dict/spw_small -r -u 30 3
  - python3 ./spw.py --dictionary ./dict/spw_small -r -l 30 3
  - python3 ./spw.py --dictionary ./dict/spw_small -r -1 30 3
  - python3 ./spw.py -v
  - python3 ./spw.py --version
  stage: smoke
stages:
- test
- smoke
test_all:
  image: python:3
  rules:
  - if: $CI_PIPELINE_SOURCE == "push"
  - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  - if: $CI_PIPELINE_SOURCE == "web"
  - if: $CI_COMMIT_TAG
  script:
  - echo "Running all tests..."
  - make test
  stage: test
test_integration:
  image: python:3
  rules:
  - if: $CI_PIPELINE_SOURCE == "push"
  - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  - if: $CI_PIPELINE_SOURCE == "web"
  - if: $CI_COMMIT_TAG
  script:
  - echo "Running integration tests..."
  - make test-integration
  stage: test
test_security:
  image: python:3
  rules:
  - if: $CI_PIPELINE_SOURCE == "push"
  - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  - if: $CI_PIPELINE_SOURCE == "web"
  - if: $CI_COMMIT_TAG
  script:
  - echo "Running security tests..."
  - make test-security
  stage: test
