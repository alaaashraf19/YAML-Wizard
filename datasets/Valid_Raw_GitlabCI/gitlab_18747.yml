deploy:
  only:
  - master
  script:
  - lein with-profile ci deploy clojars
  stage: deploy
image: clojure:lein-2.8.1
pages:
  artifacts:
    paths:
    - public
  only:
  - master
  script:
  - lein do clean, codox
  - mv ./target/doc ./public
  stage: deploy
test:
  script:
  - lein test
  stage: test
