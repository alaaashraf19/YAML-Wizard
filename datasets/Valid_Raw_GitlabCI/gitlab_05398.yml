before_script:
- node -v
- npx yarn install --pure-lockfile --emoji false --no-progress --non-interactive
cache:
  paths:
  - node_modules/
image: node:8
pages:
  artifacts:
    paths:
    - public
  only:
  - master
  script:
  - npx yarn build --prod --pure-lockfile --emoji false --no-progress --non-interactive
  - npx next export -o public
  stage: deploy
  variables:
    NODE_ENV: production
yarn_lint:
  script:
  - npx yarn lint
