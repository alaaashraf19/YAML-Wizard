before_script:
- apt-get update -qq
- export DEBIAN_FRONTEND=noninteractive
- apt-get install -y tzdata
- ln -fs /usr/share/zoneinfo/America/New_York /etc/localtime
- dpkg-reconfigure --frontend noninteractive tzdata
- apt-get -qq -y install build-essential python3 python3-numpy python3-dev gsl-bin
  libgsl-dev libgsl23 python3-scipy python3-matplotlib python3-mpi4py python3-coverage
  openmpi-bin libopenmpi-dev cython python3-pkgconfig libhdf5-openmpi-103 libhdf5-openmpi-dev
  hdf5-tools git python3-astropy python3-pip python3-sphinx
- pip3 install Pillow
- pip3 install sphinxcontrib.programoutput
- pip3 install nbsphinx sphinx_rtd_theme
- export LHOME=`pwd`
- mkdir python
- git clone https://github.com/h5py/h5py.git
- cd h5py
- git checkout tags/2.7.0
- export CC=mpicc
- python3 setup.py configure --mpi
- python3 setup.py build
- python3 setup.py install --user
- cd $LHOME
- git clone https://gitlab.com/revaz/pNbody.git
- cd pNbody
- python3 setup.py install --user
- cd $LHOME
- git clone https://gitlab.com/revaz/Ptools.git
- cd Ptools
- python3 setup.py install --user
- cd $LHOME
- python3 setup.py install --user
- mkdir -p ~/.config/matplotlib/
- 'echo "backend: Agg" > ~/.config/matplotlib/matplotlibrc'
build:
  script:
  - ./coverage.sh
  stage: build
image: ubuntu:latest
