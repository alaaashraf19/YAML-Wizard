cache:
  paths:
  - src/node_modules/
  - src/kakugen.json
default:
  image:
    name: public.ecr.aws/docker/library/node:22-trixie
    pull_policy: always
  tags:
  - saas-linux-small-arm64
stages:
- test
test_skill:
