.build:
  script: &id001
  - docker build -t $GL_IMAGE_NAME:$GL_IMAGE_TAG .
  - docker push $GL_IMAGE_NAME:$GL_IMAGE_TAG
  stage: build
  tags: &id002
  - docker
.deploy:
  script: &id003
  - docker build -t $CI_JOB_ID -f bin/dockerfile.kubectl .
  - docker run --env CI_BUILD_REF_NAME="$CI_BUILD_REF_NAME" --env CI_PROJECT_NAME="$CI_PROJECT_NAME"
    --env CI_REGISTRY="$CI_REGISTRY" --env GCLOUD_KEY_FILE="$KEY_FILE" --env GL_DOMAIN="$GL_DOMAIN"
    --env GL_ENV_URL="$GL_ENV_URL" --env GL_IMAGE_TAG="$GL_IMAGE_TAG" --env KUBE_ENV="$KUBE_ENV"
    --env KUBE_NAME="$KUBE_NAME" --env KUBE_NAMESPACE="fampinheiro" --env PORT="$PORT"
    $CI_JOB_ID ./kubectl-inside-docker.sh $CMD_DOCKERFILE
  stage: deploy
  tags: &id004
  - docker
.test:
  script: &id005
  - docker pull $GL_IMAGE_NAME:$GL_IMAGE_TAG
  - docker run $GL_IMAGE_NAME:$GL_IMAGE_TAG npm run test
  stage: test
  tags: &id006
  - docker
before_script:
- docker login -u gitlab-ci-token -p $CI_JOB_TOKEN $CI_REGISTRY
build:dev:
  script: *id001
  stage: build
  tags: *id002
  variables:
    GL_IMAGE_TAG: $CI_COMMIT_SHA
deploy:dev:
  environment:
    name: dev/$CI_COMMIT_REF_SLUG
    on_stop: stop:dev
    url: https://dev-hello-$CI_COMMIT_REF_SLUG.$GL_DOMAIN
  script: *id003
  stage: deploy
  tags: *id004
  variables:
    CMD_DOCKERFILE: apply
    GL_ENV_URL: dev-hello-$CI_COMMIT_REF_SLUG.$GL_DOMAIN
    GL_IMAGE_TAG: $CI_COMMIT_SHA
release:production:
  allow_failure: false
  environment:
    name: production
    url: https://hello.$GL_DOMAIN
  only:
  - master
  script: *id003
  stage: release
  tags: *id004
  variables:
    CMD_DOCKERFILE: apply
    GL_ENV_URL: hello.$GL_DOMAIN
    GL_IMAGE_TAG: $CI_COMMIT_SHA
    KUBE_ENV: production
    KUBE_NAME: hello
  when: manual
stages:
- build
- test
- deploy
- release
stop:dev:
  environment:
    action: stop
    name: dev/$CI_COMMIT_REF_SLUG
  script: *id003
  stage: deploy
  tags: *id004
  variables:
    CMD_DOCKERFILE: delete
    GL_ENV_URL: dev-hello-$CI_COMMIT_REF_SLUG.$GL_DOMAIN
    GL_IMAGE_TAG: $CI_COMMIT_SHA
  when: manual
test:dev:
  script: *id005
  stage: test
  tags: *id006
  variables:
    GL_IMAGE_TAG: $CI_COMMIT_SHA
variables:
  GL_DOMAIN: fampinheiro.com
  GL_IMAGE_NAME: $CI_REGISTRY/fampinheiro/$CI_PROJECT_NAME
