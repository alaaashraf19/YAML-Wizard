.target-build-template:
  image: registry.gitlab.com/ercom/docker:17.12.0-ce-git
  script: &id001
  - tools/gitlab-ci/run.sh
  services: &id002
  - alias: docker
    name: registry.gitlab.com/ercom/docker:17.12.0-ce-dind
  stage: build
  tags: &id003
  - docker
  variables: &id004
    CITBX_JOB_RUN_FILE_NAME: target-build.sh
    DOCKER_DRIVER: overlay
    DOCKER_HOST: tcp://docker:2375
.target-mksquashfs-template:
  artifacts:
    expire_in: 1 day
    paths:
    - artifacts
  image: registry.gitlab.com/ercom/docker:17.12.0-ce-git
  script:
  - tools/gitlab-ci/run.sh
  services:
  - alias: docker
    name: registry.gitlab.com/ercom/docker:17.12.0-ce-dind
  stage: mksquashfs
  tags:
  - docker
  variables:
    CITBX_JOB_RUN_FILE_NAME: target-mksquashfs.sh
    DOCKER_DRIVER: overlay
    DOCKER_HOST: tcp://docker:2375
bootp-registry:
  image: registry.gitlab.com/ercom/docker:17.12.0-ce-git
  only:
  - /^bootp-registry\/.*$/
  script:
  - tools/gitlab-ci/run.sh
  services:
  - alias: docker
    name: registry.gitlab.com/ercom/docker:17.12.0-ce-dind
  stage: build
  tags:
  - docker
  variables:
    DOCKER_DRIVER: overlay
    DOCKER_HOST: tcp://docker:2375
stages:
- build
- mksquashfs
- deploy
target-base-build:
  image: registry.gitlab.com/ercom/docker:17.12.0-ce-git
  only:
  - /^target-base\/.*$/
  script: *id001
  services: *id002
  stage: build
  tags: *id003
  variables: *id004
