.stage_image_beforeScript_artifacts_only_webapp:
  artifacts: &id001
    paths:
    - dist
  before_script: &id002
  - npm install --silent
  - mv ./config/dev.env.example.js ./config/dev.env.js
  - mv ./config/prod.env.example.js ./config/prod.env.js
  image: node:6
  only: &id003
  - master
  stage: build
AWS Stack:
  dependencies:
  - webapp:ga
  environment:
    name: live.ganttlab.org
    url: https://live.ganttlab.org/
  image: alpine:3.7
  only:
  - master
  script:
  - apk -v --no-cache add python py-pip groff less
  - pip --no-cache-dir install --upgrade awscli s3cmd python-magic
  - THE_ENVIRONMENT=$(if [ "$CI_COMMIT_REF_NAME" == "master" ]; then echo "production";
    fi)
  - THE_STACK_NAME="live-dot-ganttlab-dot-org-${THE_ENVIRONMENT}"
  - THE_S3_BUCKET="${THE_STACK_NAME}"
  - aws cloudformation deploy --stack-name ${THE_STACK_NAME} --template-file devops/deploy/AWS/CloudFormation/stack.yaml
    --no-fail-on-empty-changeset --tags billing-project=live-dot-ganttlab-dot-org
  - aws cloudformation update-termination-protection --enable-termination-protection
    --stack-name ${THE_STACK_NAME}
  - aws s3 sync dist/ "s3://${THE_S3_BUCKET}" --delete
  - CLOUDFRONT_DISTRIBUTION_ID=$(aws cloudformation describe-stack-resource --stack-name
    ${THE_STACK_NAME} --logical-resource-id CloudFrontDistribution | grep PhysicalResourceId
    | cut -d \" -f4)
  - aws cloudfront create-invalidation --distribution-id ${CLOUDFRONT_DISTRIBUTION_ID}
    --paths /index.html
  stage: deploy
Docker Hub Image:
  dependencies:
  - webapp
  image: docker:git
  only:
  - master
  script:
  - docker info
  - docker login -u "${DOCKER_HUB_USER}" -p "${DOCKER_HUB_PASSWORD}" docker.io
  - docker build -f devops/deploy/DockerHub/Dockerfile -t "ganttlab/ganttlab-live:latest"
    .
  - docker push index.docker.io/ganttlab/ganttlab-live:latest
  services:
  - docker:dind
  stage: deploy
  variables:
    DOCKER_DRIVER: overlay2
stages:
- build
- deploy
webapp:
  artifacts: *id001
  before_script: *id002
  image: node:6
  only: *id003
  script:
  - npm run build
  stage: build
webapp:ga:
  artifacts: *id001
  before_script: *id002
  image: node:6
  only: *id003
  script:
  - sed -i "s#^\(.*mounted.*function.*$\)#\1\n${GA_TRACKING}#" ./src/App.vue
  - npm run build
  stage: build
