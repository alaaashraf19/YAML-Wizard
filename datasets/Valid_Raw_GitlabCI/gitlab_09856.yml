deploy:
  image: python:latest
  only:
  - master
  script:
  - pip install awscli
  - aws s3 cp ./ s3://$S3_BUCKET_NAME/public --recursive  --include "/public/*"
  stage: deploy
pages:
  artifacts:
    paths:
    - public
  before_script:
  - npm install gitbook-cli -g
  - gitbook install
  cache:
    paths:
    - node_modules/
  image: node:8.11.4
  only:
  - master
  script:
  - gitbook build . public
  stage: pages
stages:
- pages
- deploy
variables:
  S3_BUCKET_NAME: primeros-pasos-de-python
