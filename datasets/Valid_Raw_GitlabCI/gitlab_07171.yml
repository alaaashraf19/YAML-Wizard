build-and-push:
  image: docker:18.09-rc
  script:
  - docker build -t $IMAGE_NAME .
  - docker login -u gitlab-ci-token -p $CI_BUILD_TOKEN registry.gitlab.com
  - docker push $IMAGE_NAME
  services:
  - docker:dind
  stage: build-and-push
  when: manual
stages:
- build-and-push
variables:
  IMAGE_NAME: registry.gitlab.com/emcrp/src
