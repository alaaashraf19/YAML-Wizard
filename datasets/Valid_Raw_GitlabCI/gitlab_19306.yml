.unit_tests:
  artifacts:
    expire_in: 7 days
    paths:
    - artifacts
  script: "export YDB_GO_SKIP_TIMED_TESTS=\"yes\"\ncd ${TEST_VERSION}\ngo get -t\n\
    latest=$(wget -qO - https://go.dev/VERSION?m=text | head -n1 | cut -c3-)\nversions=\"\
    ${TEST_GO_VERSIONS//latest/$latest}\"\nversions=$(echo -e \"${versions// /\\\\\
    n}\" | sort --version-sort --unique) # remove duplicates\nfor ver in $versions;\
    \ do\n  go install golang.org/dl/go$ver@latest && go$ver download\n  go$ver test\
    \ -v\n  # the following ls tests for the existence of the wildcard to prevent\
    \ cp error when no file exists\n  mkdir -p $CI_PROJECT_DIR/artifacts/go$ver\n\
    \  ls /tmp/ydbgo* &>/dev/null && cp -r /tmp/ydbgo* $CI_PROJECT_DIR/artifacts/go$ver\n\
    \  ls m_routines  &>/dev/null && cp -r m_routines  $CI_PROJECT_DIR/artifacts/go$ver\n\
    \  find $CI_PROJECT_DIR/artifacts/go$ver\ndone\n# Verify that bench tests run\
    \ (avoids adding erroneous benchmarks) -- it's unnecessary to run them against\
    \ every Go version in the loop above\ngo$ver test -bench . -short -timeout 60s\
    \ -benchtime 0.1s"
  stage: test
before_script: 'apt-get update && apt-get install -y --no-install-recommends wget
  ca-certificates git g++ gcc libc6-dev make pkg-config && rm -rf /var/lib/apt/lists/*

  export GOPROXY=https://proxy.golang.org/cached-only

  export GOPATH=/go

  export GOBIN=${GOPATH}/bin

  export PATH=${GOBIN}:/usr/local/go/bin:$PATH

  wget -O go.tgz -q https://golang.org/dl/go${GOLANG_VERSION}.linux-amd64.tar.gz

  tar -C /usr/local -xzf go.tgz

  rm go.tgz

  go version

  export ydb_dist=/opt/yottadb/current

  mkdir -p $CI_PROJECT_DIR/artifacts'
build:
  script: 'go build -v

    go build -C v2 -v'
  stage: build
commit-verify:
  before_script: apt-get update -qq && apt-get install -y -qq git wget gnupg
  image: ubuntu:24.04
  script: '# Copy commit gpg key verify script to build directory and execute

    wget https://gitlab.com/YottaDB/DB/YDB/-/raw/master/ci/commit_verify.sh

    chmod +x commit_verify.sh

    ./commit_verify.sh scripts/needs_copyright.sh https://gitlab.com/YottaDB/Lang/YDBGo'
  stage: test
error_codes:
  script: 'go generate

    git diff --exit-code error_codes.go || (echo "There is a difference between the
    latest YottaDB master and the currently committed error_codes.go, please run ''go
    generate'' and commit error_codes.go" && exit 1)'
  stage: test
image: yottadb/yottadb-base:latest-master
lint_code:
  script: 'go install honnef.co/go/tools/cmd/staticcheck@latest

    staticcheck -checks inherit,-ST1017,-SA4006,-S1006,-S1005,-S1000,-S1008

    (cd v2; staticcheck -checks -SA1019)'
  stage: test
pages:
  artifacts:
    expire_in: 30 days
    paths:
    - public
  dependencies:
  - v1_coverage
  - v2_coverage
  only:
  - master
  script: 'mkdir $CI_PROJECT_DIR/public

    mv cover/coverage.html $CI_PROJECT_DIR/public/'
  stage: deploy
race_detector:
  script: '# Test v1

    go get -t

    go test -v -race

    go test -v -asan

    # Test v2

    go get -C v2 -t

    go test -C v2 -v -race

    go test -C v2 -v -asan'
  stage: test
stages:
- test
- build
- deploy
v1_coverage:
  artifacts:
    expire_in: 2 years
    paths:
    - cover/${TEST_VERSION}/coverage.cov
    - cover/${TEST_VERSION}/coverage.html
    reports:
      coverage_report:
        coverage_format: cobertura
        path: $CI_PROJECT_DIR/cover/${TEST_VERSION}/coverage.xml
  coverage: '/coverage: \d+(?:\.\d+)?/'
  script: 'mkdir -p $CI_PROJECT_DIR/cover/${TEST_VERSION}

    go get -C ${TEST_VERSION} -t

    go test -C ${TEST_VERSION} -covermode=count -coverprofile "$CI_PROJECT_DIR/cover/${TEST_VERSION}/coverage.cov"

    go tool -C ${TEST_VERSION} cover -func=$CI_PROJECT_DIR/cover/${TEST_VERSION}/coverage.cov

    go tool -C ${TEST_VERSION} cover -html=$CI_PROJECT_DIR/cover/${TEST_VERSION}/coverage.cov
    -o $CI_PROJECT_DIR/cover/${TEST_VERSION}/coverage.html

    # Visualization instructions: https://docs.gitlab.com/ci/testing/code_coverage/?tab=Go

    go get github.com/boumenot/gocover-cobertura

    go install github.com/boumenot/gocover-cobertura

    (cd ${TEST_VERSION} && gocover-cobertura < $CI_PROJECT_DIR/cover/${TEST_VERSION}/coverage.cov
    > $CI_PROJECT_DIR/cover/${TEST_VERSION}/coverage.xml)'
  stage: test
  variables:
    TEST_VERSION: .
v1_unit_tests:
  extends: .unit_tests
  variables:
    TEST_GO_VERSIONS: 1.18.10 latest
    TEST_VERSION: .
v2_coverage:
  artifacts:
    expire_in: 2 years
    paths:
    - cover/${TEST_VERSION}/coverage.cov
    - cover/${TEST_VERSION}/coverage.html
    reports:
      coverage_report:
        coverage_format: cobertura
        path: ${COVERDIR}/coverage.xml
  coverage: '/coverage: \d+(?:\.\d+)?/'
  script: 'make -C ${TEST_VERSION} coverage

    # Visualization instructions: https://docs.gitlab.com/ci/testing/code_coverage/?tab=Go

    go get github.com/boumenot/gocover-cobertura

    go install github.com/boumenot/gocover-cobertura

    (cd ${TEST_VERSION} && gocover-cobertura < ${COVERDIR}/coverage.cov > ${COVERDIR}/coverage.xml)'
  stage: test
  variables:
    COVERDIR: ${CI_PROJECT_DIR}/cover/${TEST_VERSION}
    TEST_VERSION: v2
v2_unit_tests:
  extends: .unit_tests
  script:
  - "export YDB_GO_SKIP_TIMED_TESTS=\"yes\"\ncd ${TEST_VERSION}\ngo get -t\nlatest=$(wget\
    \ -qO - https://go.dev/VERSION?m=text | head -n1 | cut -c3-)\nversions=\"${TEST_GO_VERSIONS//latest/$latest}\"\
    \nversions=$(echo -e \"${versions// /\\\\n}\" | sort --version-sort --unique)\
    \ # remove duplicates\nfor ver in $versions; do\n  go install golang.org/dl/go$ver@latest\
    \ && go$ver download\n  go$ver test -v\n  # the following ls tests for the existence\
    \ of the wildcard to prevent cp error when no file exists\n  mkdir -p $CI_PROJECT_DIR/artifacts/go$ver\n\
    \  ls /tmp/ydbgo* &>/dev/null && cp -r /tmp/ydbgo* $CI_PROJECT_DIR/artifacts/go$ver\n\
    \  ls m_routines  &>/dev/null && cp -r m_routines  $CI_PROJECT_DIR/artifacts/go$ver\n\
    \  find $CI_PROJECT_DIR/artifacts/go$ver\ndone\n# Verify that bench tests run\
    \ (avoids adding erroneous benchmarks) -- it's unnecessary to run them against\
    \ every Go version in the loop above\ngo$ver test -bench . -short -timeout 60s\
    \ -benchtime 0.1s"
  - tmpdir=$(mktemp -d --tmpdir ydbgo_testapps_XXXXX)
  - export ydb_gbldir=$tmpdir/mumps.gld
  - $ydb_dist/mumps -run ^GDE change -seg DEFAULT -file=${ydb_gbldir/.gld/.dat}
  - $ydb_dist/mupip create
  - $ydb_dist/mupip extend -blocks=8192 DEFAULT
  - go run test/wordfreq.go <test/wordfreq_input.txt | diff - test/wordfreq_output.txt
  - go run test/pseudoBank.go --timeout=2 --verbose
  - rm -rf $tmpdir
  variables:
    TEST_GO_VERSIONS: 1.24.0 latest
    TEST_VERSION: v2
variables:
  GOLANG_VERSION: 1.24.0
