RAT:
  needs:
  - artifacts: false
    job: Ubuntu-22.04-branch
    optional: true
  - artifacts: false
    job: Ubuntu-22.04
    optional: true
  - artifacts: true
    job: generate-facts
  rules:
  - allow_failure: true
    if: $PIPELINE_TYPE == "TRIGGERED_EE_PIPELINE"
    when: manual
  - allow_failure: true
    if: $PIPELINE_TYPE == "EE_NIGHTLY_BUILD_PIPELINE"
    variables:
      NIGHTLY: 'true'
  - allow_failure: true
    if: $PIPELINE_TYPE =~ /^EE_(RC|TAG)_BUILD_PIPELINE$/
    variables:
      PACKAGE_VERSION: ${RAT_PACKAGE_VERSION}
      PRE_RELEASE: 'true'
  stage: qa
  trigger:
    branch: master
    forward:
      pipeline_variables: false
      yaml_variables: true
    project: ${RAT_PROJECT_PATH}
    strategy: depend
  variables:
    PACKAGE_URL: ${RAT_PACKAGE_URL}
    QA_IMAGE: ${QA_IMAGE}
    REFERENCE_ARCHITECTURE: ${RAT_REFERENCE_ARCHITECTURE}
RAT:FIPS:
  extends: RAT
  needs:
  - artifacts: false
    job: Ubuntu-20.04-fips-branch
  - artifacts: true
    job: generate-facts
  rules:
  - allow_failure: true
    if: $PIPELINE_TYPE == "TRIGGERED_EE_PIPELINE"
    when: manual
  - allow_failure: true
    if: $PIPELINE_TYPE == "EE_NIGHTLY_BUILD_PIPELINE"
    variables:
      NIGHTLY: 'true'
  variables:
    PACKAGE_URL: ${RAT_FIPS_PACKAGE_URL}
    REFERENCE_ARCHITECTURE: ${RAT_FIPS_REFERENCE_ARCHITECTURE}
RAT:ref_arch_envs:
  extends: RAT
  parallel:
    matrix:
    - REFERENCE_ARCHITECTURE:
      - 1k
      - 2k
      - 3k
      - 10k
  rules:
  - allow_failure: true
    if: $PIPELINE_TYPE == "TRIGGERED_EE_PIPELINE"
    when: manual
