docker-build:
  image: docker:latest
  only:
  - master
  script:
  - echo $CI_REGISTRY_PASSWORD | docker login -u $CI_REGISTRY_USER --password-stdin
    $CI_REGISTRY
  - docker build -t $CI_REGISTRY_IMAGE:${CI_COMMIT_SHA:0:6} .
  - docker push $CI_REGISTRY_IMAGE
  services:
  - docker:dind
  stage: docker
k8s-deploy:
  image: google/cloud-sdk
  only:
  - master
  script:
  - echo "$GOOGLE_CLOUD_KEY" > key.json
  - gcloud auth activate-service-account --key-file key.json
  - gcloud config set compute/zone europe-west3-c
  - gcloud config set project $GCLOUD_PROJECT
  - gcloud container clusters get-credentials $GCLOUD_CLUSTER
  - /bin/sh deploy.sh $CI_REGISTRY_IMAGE:${CI_COMMIT_SHA:0:6}
  stage: deploy
maven-build:
  artifacts:
    paths:
    - target/*.jar
  cache:
    paths:
    - .m2/repository
  image: maven:3.5-jdk-10-slim
  only:
  - master
  - triggers
  script: mvn $MAVEN_CLI_OPTS package -B
  stage: build
stages:
- build
- docker
- deploy
variables:
  DOCKER_DRIVER: overlay2
  DOCKER_HOST: tcp://localhost:2375
  GCLOUD_CLUSTER: guestbook
  GCLOUD_PROJECT: dictionaryproject-33
  MAVEN_CLI_OPTS: --batch-mode --errors --fail-at-end --show-version -DinstallAtEnd=true
    -DdeployAtEnd=true
  MAVEN_OPTS: -Dhttps.protocols=TLSv1.2 -Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository
    -Dorg.slf4j.simpleLogger.log.org.apache.maven.cli.transfer.Slf4jMavenTransferListener=WARN
    -Dorg.slf4j.simpleLogger.showDateTime=true -Djava.awt.headless=true
  SPRING_PROFILES_ACTIVE: local
  USER_GITLAB: burakb
