.test_template:
  script: &id001
  - julia -e 'using Pkg; Pkg.clone(pwd()); Pkg.build("MyPackage"); Pkg.test("MyPackage";
    coverage = true)'
  - julia -e 'using Pkg; Pkg.add("Coverage"); import MyPackage; cd(joinpath(dirname(pathof(MyPackage)),
    "..")); using Coverage; cl, tl = get_summary(process_folder()); println("(", cl/tl*100,
    "%) covered")'
pages:
  artifacts:
    paths:
    - public
  image: julia:0.7
  only:
  - master
  script:
  - apt-get update -qq && apt-get install -y git
  - julia -e 'using Pkg; Pkg.clone(pwd()); Pkg.build("MyPackage");'
  - julia -e 'using Pkg; import MyPackage; Pkg.add("Documenter")'
  - julia --color=yes docs/make.jl
  - mv docs/build public
  stage: deploy
test:0.7:
  image: julia:0.7
  script: *id001
test:1.0:
  image: julia:1.0
  script: *id001
