.build_job:
  artifacts: &id001
    expire_in: 1 day
    paths:
    - result/*
  script: &id002
  - ci-build-pkg
  stage: build
  tags: &id003
  - docker
before_script:
- unset http_proxy ; unset https_proxy
- env | grep ^CI_
- PATH="`pwd`/gitlab-buildpkg-tools/usr/bin/:$PATH"
- CI_BUILDPKG_BOOTSTRAP=yes
- export PATH CI_BUILDPKG_BOOTSTRAP
- ./gitlab-buildpkg-tools/install-dependencies.sh
build_centos_6:
  extends: .build_job
  image: buildpkg/centos:6
build_centos_7:
  extends: .build_job
  image: buildpkg/centos:7
build_centos_8:
  extends: .build_job
  image: buildpkg/centos:8
build_debian_bookworm:
  artifacts: *id001
  image: buildpkg/debian:bookworm
  script: *id002
  stage: build
  tags: *id003
build_debian_bullseye:
  extends: .build_job
  image: buildpkg/debian:bullseye
build_debian_buster:
  extends: .build_job
  image: buildpkg/debian:buster
build_debian_jessie:
  extends: .build_job
  image: buildpkg/debian:jessie
build_debian_stretch:
  extends: .build_job
  image: buildpkg/debian:stretch
build_fedora_24:
  extends: .build_job
  image: buildpkg/fedora:24
build_fedora_25:
  extends: .build_job
  image: buildpkg/fedora:25
build_fedora_26:
  extends: .build_job
  image: buildpkg/fedora:26
build_fedora_27:
  extends: .build_job
  image: buildpkg/fedora:27
build_fedora_28:
  extends: .build_job
  image: buildpkg/fedora:28
build_fedora_29:
  extends: .build_job
  image: buildpkg/fedora:29
build_fedora_30:
  extends: .build_job
  image: buildpkg/fedora:30
build_ubuntu_bionic:
  extends: .build_job
  image: buildpkg/ubuntu:bionic
build_ubuntu_focal:
  artifacts: *id001
  image: buildpkg/ubuntu:focal
  script: *id002
  stage: build
  tags: *id003
build_ubuntu_jammy:
  artifacts: *id001
  image: buildpkg/ubuntu:jammy
  script: *id002
  stage: build
  tags: *id003
build_ubuntu_kinetic:
  artifacts: *id001
  image: buildpkg/ubuntu:kinetic
  script: *id002
  stage: build
  tags: *id003
build_ubuntu_lunar:
  artifacts: *id001
  image: buildpkg/ubuntu:lunar
  script: *id002
  stage: build
  tags: *id003
deploy_production:
  dependencies:
  - deploy_staging
  - sign
  environment:
    name: Production
    url: http://www.example.com
  image: buildpkg/debian:stretch
  only:
  - master
  script:
  - cd $CI_PROJECT_DIR
  - ci-deploy-pkg production
  stage: production
  tags:
  - docker
  when: manual
deploy_staging:
  dependencies:
  - pages
  - sign
  environment:
    name: Staging
    url: http://www.example.com
  image: buildpkg/ubuntu:xenial
  only:
  - master
  script:
  - cd $CI_PROJECT_DIR
  - ci-deploy-pkg staging
  stage: staging
  tags:
  - docker
  when: manual
pages:
  artifacts:
    paths:
    - public
  dependencies:
  - sign
  environment:
    name: PPA
    url: http://${CI_PROJECT_NAMESPACE}.${PAGES_HOST}/${CI_PROJECT_NAME}
  except:
    changes:
    - README.md
    - LICENSE
    - tests
  image: buildpkg/debian:stretch
  only:
  - master
  script:
  - cd $CI_PROJECT_DIR
  - ci-pages-ppa
  - ci-pages-home
  - ci-pages-tree
  stage: deploy
  tags:
  - docker
  variables:
    PAGES_DIR: public
    PAGES_HOST: gitlab.io
sign:
  artifacts:
    expire_in: 1 day
    paths:
    - result/*
  dependencies:
  - build_debian_jessie
  - build_debian_stretch
  - build_debian_buster
  - build_debian_bullseye
  - build_ubuntu_trusty
  - build_ubuntu_xenial
  - build_ubuntu_zesty
  - build_ubuntu_artful
  - build_ubuntu_bionic
  - build_ubuntu_cosmic
  - build_ubuntu_disco
  - build_ubuntu_eoan
  - build_ubuntu_focal
  - build_centos_6
  - build_centos_7
  - build_centos_8
  - build_fedora_24
  - build_fedora_25
  - build_fedora_26
  - build_fedora_27
  - build_fedora_28
  - build_fedora_29
  - build_fedora_30
  image: buildpkg/debian:stretch
  only:
  - master
  script:
  - cd $CI_PROJECT_DIR
  - ci-sign-pkg
  stage: sign
  tags:
  - docker
stages:
- build
- sign
- deploy
- staging
- production
