before_script:
- apt-get update
run-build-clang:
  image: silkeh/clang
  script:
  - clang --version
  - CC=clang make
  - cd tests && ./RunTests
  stage: build-and-test
run-build-gcc:
  image: gcc
  script:
  - gcc --version
  - make
  - cd tests && ./RunTests
  stage: build-and-test
stages:
- build-and-test
