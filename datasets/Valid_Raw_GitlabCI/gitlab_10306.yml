.website_tests_job:
  before_script: &id001
  - eval "$(pyenv init -)"; eval "$(pyenv virtualenv-init -)";
  - cd /var/www/html/website
  - mv .docker/testing.env .env
  - .docker/prepareTests.sh
  image: &id002
    entrypoint:
    - ''
    name: $DOCKER_IMAGE
  services: &id003
  - alias: mysql
    name: mariadb:latest
  variables: &id004
    GIT_STRATEGY: none
    MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
    MYSQL_DATABASE: test_whoswho4
Black:
  before_script: *id001
  image: *id002
  script:
  - export LC_ALL=C.UTF-8; export LANG=C.UTF-8
  - black -S --check --diff --exclude whoswhopy/gen/ pytest scripts whoswhopy
  services: *id003
  stage: test
  variables: *id004
Make Docker image:
  image: docker:stable
  retry:
    max: 1
    when: script_failure
  script:
  - docker login -u gitlab-ci-token -p $CI_JOB_TOKEN registry.gitlab.com
  - docker build -t $DOCKER_IMAGE .
  - docker push $DOCKER_IMAGE
  services:
  - docker:dind
  stage: build
  variables:
    DOCKER_DRIVER: overlay2
    DOCKER_HOST: tcp://docker:2375
PHPUnit:
  allow_failure: true
  artifacts:
    reports:
      junit: phpunit-results.xml
  before_script: *id001
  image: *id002
  script:
  - www/vendor/bin/phpunit --verbose -c phpunit.xml --coverage-text --color=never
    --log-junit phpunit-results.xml
  - mv phpunit-results.xml $CI_PROJECT_DIR
  services: *id003
  stage: test
  variables: *id004
Pytest:
  allow_failure: true
  artifacts:
    reports:
      junit: pytest-results.xml
  before_script: *id001
  image: *id002
  script:
  - pytest --junitxml=pytest-results.xml
  - mv pytest-results.xml $CI_PROJECT_DIR
  services: *id003
  stage: test
  variables: *id004
Zet live:
  environment:
    name: Productie
    url: https://a-eskwadraat.nl
  only:
  - master
  script:
  - cd $DEPLOY_FOLDER
  - git fetch
  - git checkout $CI_COMMIT_SHA
  - cd www
  - ./composer.phar install --no-progress
  - ./minify
  - cd ../gettext
  - ./update
  - cd $DEPLOY_FOLDER
  - source venv/bin/activate
  - pip install -r requirements.txt
  - alembic upgrade head
  - chown -R --from=gitlab-runner :apache $DEPLOY_FOLDER
  stage: deploy
  tags:
  - vm-www3
  variables:
    DEPLOY_FOLDER: /website
    GIT_STRATEGY: none
  when: manual
stages:
- build
- test
- deploy
variables:
  DOCKER_IMAGE: registry.gitlab.com/iba-aes/webcie/website:$CI_COMMIT_SHORT_SHA
