before_script:
- yarn install
build-commit:
  artifacts:
    name: $CI_PROJECT_NAME-$CI_COMMIT_REF_SLUG-$CI_COMMIT_SHORT_SHA
    paths:
    - dist/
  except:
  - tags
  script:
  - yarn run build
build-tag:
  artifacts:
    name: $CI_PROJECT_NAME-$CI_COMMIT_TAG
    paths:
    - dist/
  only:
  - tags
  script:
  - yarn run build
  stage: build
cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
  - node_modules/
image: node:lts-alpine
lint:
  script:
  - yarn lint
  stage: test
stages:
- test
- build
