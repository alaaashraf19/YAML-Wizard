doc-build:
  only:
  - master
  script:
  - curl -X POST http://readthedocs.org/build/sir-bot-a-lot
  stage: deploy
doc-test:
  script:
  - pip install -r requirements_dev.txt
  - sphinx-build -nW -b html -d docs/_build/doctrees docs/ docs/_build/html
  stage: test
image: python:3.5
lint:
  script:
  - python setup.py flake8
  stage: lint
stages:
- lint
- test
- deploy
test:
  script:
  - python setup.py test
  stage: test
