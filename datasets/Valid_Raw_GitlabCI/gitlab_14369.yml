before_script:
- bundle install
image: ruby:2.4
pages:
  artifacts:
    paths:
    - public
  only:
  - master
  script:
  - jekyll build -d public/ --config _config.yml,_config-gitlab.yml
  stage: deploy
test:
  artifacts:
    paths:
    - test
  except:
  - master
  script:
  - bundle exec jekyll build -d public/ --config _config.yml,_config-gitlab.yml
  stage: test
variables:
  JEKYLL_ENV: production
