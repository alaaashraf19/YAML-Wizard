.behat_template:
  cache: &id001
    key: common
    paths:
    - .cache
    - vendor
  image: $CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG
  script: &id002
  - composer install -o --ansi --no-progress
  - vendor/bin/behat --colors
  stage: test
  tags: &id003
  - docker
Behat PHP 5.6:
  cache: *id001
  image: registry.gitlab.com/dmore/docker-chrome-headless:5.6
  script: *id002
  stage: test
  tags: *id003
Behat PHP 7.0:
  cache: *id001
  image: registry.gitlab.com/dmore/docker-chrome-headless:7.0
  script: *id002
  stage: test
  tags: *id003
Behat PHP 7.1:
  cache: *id001
  image: registry.gitlab.com/dmore/docker-chrome-headless:7.1
  script: *id002
  stage: test
  tags: *id003
variables:
  COMPOSER_CACHE_DIR: .cache/composer
  DOCROOT: ${CI_PROJECT_DIR}/web
