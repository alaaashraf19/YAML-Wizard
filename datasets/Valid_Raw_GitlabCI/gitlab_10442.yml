build:
  image: docker:latest
  script:
  - IMAGE_TAG_LOWERCASE=`echo "${IMAGE_TAG}" | tr '[:upper:]' '[:lower:]'`
  - docker login -u ${CI_REGISTRY_USER} -p ${CI_REGISTRY_PASSWORD} ${CI_REGISTRY}
  - docker build --build-arg=CI --pull -t ${IMAGE_TAG_LOWERCASE} .
  - docker push ${IMAGE_TAG_LOWERCASE}
  services:
  - docker:dind
  stage: build
variables:
  IMAGE_TAG: ${CI_REGISTRY}/${CI_PROJECT_NAMESPACE}/${CI_PROJECT_NAME}/${CI_COMMIT_REF_SLUG}:latest
