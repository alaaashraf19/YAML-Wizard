build-docker:
  only:
  - master
  script:
  - docker login -u gitlab-ci-token -p $CI_JOB_TOKEN registry.gitlab.com
  - docker build -t $DOCKER_IMAGE .
  - docker push $DOCKER_IMAGE
  stage: build
image: docker:latest
services:
- docker:dind
stages:
- build
variables:
  DOCKER_IMAGE: registry.gitlab.com/gfelbing/openwall:latest
