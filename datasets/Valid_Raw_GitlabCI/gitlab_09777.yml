build:
  artifacts:
    paths:
    - dist
  script:
  - python setup.py sdist bdist_wheel
  stage: build
image: registry.gitlab.com/haboustak/glartifacts/build-env:1.2
stages:
- build
- test
test:
  script:
  - pylint glartifacts --ignore proto -j 8
  - su -c "python -m unittest -v" postgres
  stage: test
