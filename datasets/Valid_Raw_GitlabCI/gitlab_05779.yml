build:frontend:
  image: docker:git
  only:
  - tags
  script:
  - docker login -u gitlab-ci-token -p $CI_BUILD_TOKEN $CI_REGISTRY
  - docker build -t $CI_REGISTRY/$CI_PROJECT_PATH:$CI_COMMIT_TAG .
  - docker push $CI_REGISTRY/$CI_PROJECT_PATH:$CI_COMMIT_TAG
  services:
  - docker:dind
  stage: deploy
build:index:
  artifacts:
    paths:
    - build/
  image: python:3.6
  script:
  - python scripts/site-generator.py
  stage: build-index
compile:polymer:
  artifacts:
    paths:
    - build/
  image: costrouc/polymer-cli:1.6.0
  script:
  - bower --allow-root install
  - polymer build
  stage: compile-frontend
pages:
  artifacts:
    paths:
    - public
  image: null
  only:
  - master
  script:
  - echo "building chrisostrouchov.com old polymer site"
  - mkdir -p public
  - cp -r build/es5-bundled/* public/
  stage: deploy
stages:
- compile-frontend
- build-index
- deploy
