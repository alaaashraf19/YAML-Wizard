build:
  image: node:14
  script:
  - node --version
  - npm --version
  - npm ci --cache .npm --prefer-offline
  stage: build
  tags:
  - docker
  - shared
cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
  - .npm/
  - node_modules/
  untracked: true
stages:
- build
- test
test:
  image: node:14
  script:
  - npm test
  stage: test
  tags:
  - docker
  - shared
