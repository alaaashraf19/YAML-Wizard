build-branch:
  artifacts:
    paths:
    - build/
  before_script:
  - apt-get update -y
  - apt-get install -y make python3-pip
  - pip3 install -r requirements.txt
  except:
  - tags
  script:
  - make otf ttf webfonts
  stage: build
build-tag:
  artifacts:
    expire_in: 1000 yrs
    paths:
    - build/
  before_script:
  - apt-get update -y
  - apt-get install -y make python3-pip zip
  - pip3 install -r requirements.txt
  only:
  - tags
  script:
  - make ttf otf webfonts
  - sh tools/artifacts.sh
  stage: build
create-gitlab-release:
  image: ruby:3.2-alpine
  only:
  - tags
  script:
  - gem install --no-document gitlab
  - ruby release.rb
  stage: release
image: registry.gitlab.com/smc/dockerfiles:font-builder
release:
  only:
  - tags
  stage: release
  trigger: smc/smc.org.in
stages:
- build
- test
- release
test:
  before_script:
  - apt-get update -y
  - apt-get install -y make libharfbuzz-bin python3-pip
  - pip3 install -r requirements.txt
  script:
  - make test
  stage: test
