build:
  artifacts:
    paths:
    - ./
  before_script:
  - apt-get update
  - apt-get install -y git build-essential cmake qt5-default libopencv-dev libyaml-cpp-dev
  - git submodule update --init
  - mkdir build
  - cd build
  except:
  - tags
  script:
  - cmake ..
  - make -j4
  stage: build
  tags:
  - docker
image: ros:kinetic-perception
stages:
- build
- test
test:
  before_script:
  - apt-get update
  - apt-get install -y cmake libopencv-dev libyaml-cpp-dev
  except:
  - tags
  script:
  - cd build
  - ctest -VV
  stage: test
  tags:
  - docker
