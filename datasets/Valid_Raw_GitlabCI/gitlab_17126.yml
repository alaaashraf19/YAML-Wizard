.acceptance_base:
  before_script: &id001
  - 'ruby -e "puts %(\n\n), %q(=)*80, %(\nSIMP-relevant Environment Variables:\n\n#{e=ENV.keys.grep(/^PUPPET|^SIMP|^BEAKER|MATRIX/);
    pad=((e.map{|x| x.size}.max||0)+1); e.map{|v| %(    * #{%(#{v}:).ljust(pad)} #{39.chr
    + ENV[v] + 39.chr}\n)}.join}\n),  %q(=)*80, %(\n\n)" || :'
  - echo -e "\e[0Ksection_start:`date +%s`:before_script10[collapsed=true]\r\e[0KDiagnostic
    ruby & gem information"
  - 'which ruby && ruby --version || :'
  - '[[ $- == *i* ]] && echo ''Interactive shell session'' || echo ''Non-interactive
    shell session'''
  - shopt -q login_shell && echo 'Login shell' || echo 'Not a login shell'
  - 'rvm ls || :'
  - echo -e "\e[0Ksection_end:`date +%s`:before_script10\r\e[0K"
  - echo -e "\e[0Ksection_start:`date +%s`:before_script20[collapsed=true]\r\e[0KEnsure
    RVM & ruby is installed"
  - if command -v rvm; then if declare -p rvm_path &> /dev/null; then source "${rvm_path}/scripts/rvm";
    else source "$HOME/.rvm/scripts/rvm" || source /etc/profile.d/rvm.sh; fi; fi
  - 'if command -v rvm && ! grep rvm_install_on_use_flag=1 ~/.rvmrc; then echo rvm_install_on_use_flag=1
    >> ~/.rvmrc || echo ''== WARNING: ~/.rvmrc is missing rvm_install_on_use_flag=1
    and I failed to add it''; fi'
  - if command -v rvm; then rvm use "$MATRIX_RUBY_VERSION"; else echo "rvm not detected;
    skipping 'rvm use'"; fi
  - 'ruby --version || :'
  - 'gem list sync || :'
  - echo -e "\e[0Ksection_end:`date +%s`:before_script20\r\e[0K"
  - echo -e "\e[0Ksection_start:`date +%s`:before_script30[collapsed=true]\r\e[0KBundle
    gems (preferring cached > local > downloaded resources)"
  - declare GEM_BUNDLER_VER=(-v "~> ${BUNDLER_VERSION:-2.2.6}")
  - declare GEM_INSTALL_CMD=(gem install --no-document)
  - declare BUNDLER_INSTALL_CMD=(bundle install --no-binstubs --jobs $(nproc) "${FLAGS[@]}")
  - mkdir -p ${GEM_HOME} ${BUNDLER_BIN}
  - gem list -ie "${GEM_BUNDLER_VER[@]}" --silent bundler || "${GEM_INSTALL_CMD[@]}"
    --local "${GEM_BUNDLER_VER[@]}" bundler || "${GEM_INSTALL_CMD[@]}" "${GEM_BUNDLER_VER[@]}"
    bundler
  - 'rm -rf pkg/ || :'
  - 'bundle check || rm -f Gemfile.lock && ("${BUNDLER_INSTALL_CMD[@]}" --local ||
    "${BUNDLER_INSTALL_CMD[@]}" || bundle pristine ||  "${BUNDLER_INSTALL_CMD[@]}")
    || { echo "PIPELINE: Bundler could not install everything (see log output above)"
    && exit 99 ; }'
  - echo -e "\e[0Ksection_end:`date +%s`:before_script30\r\e[0K"
  - echo -e "\e[0Ksection_start:`date +%s`:before_script40[collapsed=true]\r\e[0KDiagnostic
    bundler, ruby, and gem checks"
  - 'bundle exec rvm ls || :'
  - 'bundle exec which ruby || :'
  - 'bundle show sync || :'
  - 'bundle exec gem list sync || :'
  - echo -e "\e[0Ksection_end:`date +%s`:before_script40\r\e[0K"
  cache: &id002
    key: ${CI_PROJECT_NAMESPACE}_ruby-${MATRIX_RUBY_VERSION}_bundler
    paths:
    - .vendor
  stage: acceptance
  tags: &id003
  - beaker
.compliance_base:
  before_script: *id001
  cache: *id002
  stage: compliance
  tags:
  - beaker
.lint_tests:
  before_script: *id001
  cache: *id002
  script:
  - bundle exec rake metadata_lint
  stage: validation
  tags:
  - docker
.only_with_SIMP_FULL_MATRIX:
  only:
    variables:
    - $SIMP_FULL_MATRIX
.only_with_SIMP_FULL_MATRIX_or_SIMP_IPA_TEST:
  only: &id006
    variables:
    - $SIMP_FULL_MATRIX
    - $SIMP_IPA_TEST
.only_with_SIMP_FULL_MATRIX_or_SIMP_LITE_TEST:
  only: &id007
    variables:
    - $SIMP_FULL_MATRIX
    - $SIMP_LITE_TEST
.only_with_SIMP_RELEASE_TESTS:
  only: &id005
    variables:
    - $SIMP_RELEASE_TESTS
.pup_6_pe:
  image: ruby:2.5
  variables: &id004
    BEAKER_PUPPET_COLLECTION: puppet6
    MATRIX_RUBY_VERSION: '2.5'
    PUPPET_VERSION: 6.22.1
.pup_6_x:
  image: ruby:2.5
  variables: &id009
    BEAKER_PUPPET_COLLECTION: puppet6
    MATRIX_RUBY_VERSION: '2.5'
    PUPPET_VERSION: ~> 6.0
.pup_7_x:
  image: ruby:2.7
  variables: &id008
    BEAKER_PUPPET_COLLECTION: puppet7
    MATRIX_RUBY_VERSION: '2.7'
    PUPPET_VERSION: ~> 7.0
.setup_bundler_env:
  before_script: *id001
  cache: *id002
.unit_tests:
  before_script: *id001
  cache: *id002
  script:
  - bundle exec rake spec
  stage: validation
  tags:
  - docker
