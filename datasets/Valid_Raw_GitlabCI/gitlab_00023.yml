before_script:
- bundle install --path vendor
cache:
  paths:
  - vendor/
image: ruby:2.3
pages:
  artifacts:
    paths:
    - public
  only:
  - master
  script:
  - jekyll build -d public
  stage: deploy
test:
  artifacts:
    paths:
    - test
  except:
  - master
  script:
  - jekyll build -d test
  stage: test
