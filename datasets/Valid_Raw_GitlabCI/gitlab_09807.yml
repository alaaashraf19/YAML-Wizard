build:centos6:
  artifacts:
    paths:
    - packages
  image: harbottle/omnibus:centos6
  script:
  - bundle install
  - bundle exec omnibus build bolt
  - mkdir -p packages/centos6
  - mkdir -p packages/rhel6
  - cp -f pkg/*.rpm packages/centos6
  - cp -f pkg/*.rpm packages/rhel6
  stage: build
