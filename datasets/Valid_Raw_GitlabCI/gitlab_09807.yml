build:macos:
  artifacts:
    paths:
    - packages
  script:
  - bundle install
  - sudo bundle exec omnibus build bolt
  - mkdir -p packages/macos
  - cp -f pkg/*.pkg packages/macos
  - sudo rm -rf pkg
  stage: build
  tags:
  - mac
  variables:
    GIT_STRATEGY: clone
