before_script:
- apt-get update -yqq
- apt-get install git -yqq
- apt-get install wget -yqq
- apt-get install phpunit -yqq
- wget https://raw.github.com/splitbrain/dokuwiki-travis/master/travis.sh
- sh travis.sh
image: php:5.6
runtest:
  script:
  - cd _test && phpunit --stderr --group plugin_userprofile
variables:
  DOKUWIKI: stable
