include:
- path:
  - docker-compose-common.yml
services:
  celery-worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: celery-worker-nosrc
    env_file:
    - env/secret_locations.env
    - env/common.env
    - env/${ENV_FILENAME}.env
    volumes:
    - secrets:/run/secrets:ro
    - ../:/home/container/workdir:rw
  django-server:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: django-server-dbg
    command: /bin/sh -c "python docker/wait_for/wait_for_postgres_60.py && python
      manage.py migrate && ${DJANGO_SERVER_SCRIPT}"
    env_file:
    - env/secret_locations.env
    - env/common.env
    - env/cypress-ibo-data.env
    ports:
    - ${DJANGO_PORT:-8000}:8000
    - ${DEBUGPY_PORT:-5678}:5678
    volumes:
    - secrets:/run/secrets:ro
    - ../:/home/container/workdir:rw
  testing-cypress:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: cypress
    command: /bin/sh -c "npx wait-on http-get://localhost:8000 && cypress run --headless
      -b firefox --spec "${CYPRESS_SPEC_SCRIPT}""
    depends_on:
    - django-server
    env_file:
    - env/common.env
    - env/${ENV_FILENAME}.env
    environment:
    - ELECTRON_EXTRA_LAUNCH_ARGS=--js-flags=--expose_gc
    hostname: testing-cypress
    image: testing-cypress
    ipc: host
    network_mode: host
    shm_size: 4gb
    volumes:
    - ../:/home/container/workdir:rw
    working_dir: /home/container/workdir/e2e
