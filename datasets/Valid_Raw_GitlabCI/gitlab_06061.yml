lint:
  allow_failure: true
  image: python:3
  script:
  - pip install -e .[dev]
  - flake8 --config=.flake8
  - mypy categories/ tests/test_*
  stage: lint
stages:
- test
- lint
test_3.4:
  image: python:3.4
  script:
  - pip3 install -e .[dev]
  - python3 setup.py test
  stage: test
test_3.5:
  image: python:3.5
  script:
  - pip3 install -e .[dev]
  - python3 setup.py test
  stage: test
test_3.6:
  image: python:3.6
  script:
  - pip3 install -e .[dev]
  - python3 setup.py test
  stage: test
test_current:
  image: python:3
  script:
  - python3 --version
  - pip3 install -e .[dev]
  - python3 setup.py test
  stage: test
