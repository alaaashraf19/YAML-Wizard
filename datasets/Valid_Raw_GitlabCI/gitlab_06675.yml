click:armhf:
  artifacts:
    expire_in: 1 week
    paths:
    - '*.click'
    when: on_success
  cache:
    paths:
    - Qt/
    - .build/
  image: clickable/ubuntu-sdk:16.04-armhf
  script:
  - sh ./scripts/ci-click-build.sh
  stage: clickbuild
  tags:
  - docker
stages:
- clickbuild
variables:
  GIT_SUBMODULE_STRATEGY: normal
