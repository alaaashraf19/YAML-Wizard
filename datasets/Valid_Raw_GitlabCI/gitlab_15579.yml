pages:
  artifacts:
    paths:
    - public
  image: node:24
  needs:
  - pages:docs
  only:
  - master
  script:
  - yarn config set unsafe-perm true
  - yarn global --ignore-optional add gulp-cli netlify-cli
  - yarn install
  - yarn run build
  - cp -rT build/ public/
  - netlify deploy --site $NETLIFY_SITE_ID --auth $NETLIFY_AUTH_TOKEN --prod --dir
    public/
  stage: deploy
pages:docs:
  artifacts:
    paths:
    - public
  image: ruby:3.4
  only:
  - master
  script:
  - mkdir -p public/docs
  - cd documentation
  - bundle install
  - bundle exec jekyll build
  - cp -rT _site/ ../public/docs
  - cd ..
  stage: deploy
stages:
- test
- deploy
test:data:
  except:
  - master
  image: oven/bun:1.2.16
  only:
  - merge_requests
  script:
  - bun install
  - bun test
  stage: test
test:doc:
  except:
  - master
  image: ruby:3.4
  only:
  - merge_requests
  script:
  - cd documentation
  - bundle install
  - bundle exec jekyll build
  stage: test
test:inventory:
  except:
  - master
  image: node:24
  only:
  - merge_requests
  script:
  - yarn global add gulp-cli
  - yarn install
  - yarn run build
  stage: test
