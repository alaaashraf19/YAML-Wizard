beta:
  image: scorpil/rust:beta
  script:
  - cargo build
  - cargo build --release
  - cargo test
  stage: test
nightly:
  image: scorpil/rust:nightly
  script:
  - cargo build
  - cargo build --release
  - cargo test
  stage: test
pages:
  artifacts:
    paths:
    - public
  image: scorpil/rust:stable
  only:
  - master
  script:
  - cargo doc
  - cp -R target/doc public
  - echo "<meta http-equiv=refresh content=0;url=binder/index.html>" > public/index.html
  stage: deploy
stable:
  image: scorpil/rust:stable
  script:
  - cargo build
  - cargo build --release
  - cargo test
  stage: test
