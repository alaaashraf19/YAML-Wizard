.hydra-cli:
  image: docker.nix-community.org/nixpkgs/nix-flakes
  script:
  - nix run --inputs-from ./. nixpkgs#hydra-cli -- -H https://hydra.nix-community.org
    jobset-wait simple-nixos-mailserver "${jobset}"
hydra-master:
  extends: .hydra-cli
  only:
  - master
  variables:
    jobset: master
hydra-pr:
  extends: .hydra-cli
  only:
  - merge_requests
  variables:
    jobset: $CI_MERGE_REQUEST_IID
