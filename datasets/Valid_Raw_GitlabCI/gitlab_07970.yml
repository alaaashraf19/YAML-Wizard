.build:
  retry: 2
  script: &id001
  - ci/build.sh
  stage: build
before_script:
- docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" $CI_REGISTRY
image: docker:19.03.2
services:
- docker:19.03.2-dind
stages:
- test
- prepare
- build
test-ci-generator:
  artifacts:
    paths:
    - ci-generator/htmlcov
  before_script:
  - cd ci-generator
  - python -V
  - pip install virtualenv
  - virtualenv venv
  - source venv/bin/activate
  - pip install -r requirements.txt
  cache:
    paths:
    - .cache/pip
    - ci-generator/venv/
  coverage: /^TOTAL.*\s+(\d+\%)$/
  image: python:3.7-alpine
  script:
  - coverage run -m unittest tests/test*.py
  - coverage report
  - coverage html
  stage: test
  variables:
    PIP_CACHE_DIR: $CI_PROJECT_DIR/.cache/pip
unity_2019_3_3f1-android:
  retry: 2
  script: *id001
  stage: build
  variables:
    BASE_IMAGE: gableroux/unity3d:2019.3.3f1
    BUILD: f1
    COMPONENTS: Android
    DOCKERFILE_NAME: unitysetup-android
    DOCKER_DRIVER: overlay2
    DOCKER_TLS_CERTDIR: /certs
    DOWNLOAD_URL: https://beta.unity3d.com/download/7ceaae5f7503/UnitySetup-2019.3.3f1
    RELEASE_NOTES: https://unity3d.com/unity/whats-new/2019.3.3f1
    RELEASE_URL: https://beta.unity3d.com/download/7ceaae5f7503/public_download.html
    SHA1: 68d3c58e977e71cdd00bd0100fcd60c02762ec04
    TAG: 2019.3.3f1-android
    VERSION: 2019.3.3
variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: /certs
