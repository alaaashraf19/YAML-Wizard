hybrid-gcc-int64:
  artifacts:
    paths:
    - build/build.log
    - build/full_ctest_output.log
  before_script:
  - uname -a
  - free -m
  - df -h
  - ulimit -a
  - ulimit -s unlimited
  - lscpu | egrep 'Thread|Core|Socket|^CPU\('
  - cmake --version
  - python3 -V
  - mpifort --version
  - mpicc --version
  - mpic++ --version
  - echo BUILD_NAME=${BUILD_NAME}
  image: registry.gitlab.com/robertodr/lsdalton-ci:b1d36238
  script:
  - mkdir -p ${DALTON_TMPDIR}
  - python3 -m pip install mpi4py
  - 'python3 setup --fc=mpifort --cc=mpicc --cxx=mpic++ --mpi --omp --type=debug --check
    --int64 -DENABLE_DEC=ON -DENABLE_TENSORS=ON -DTENSORS_ENABLE_BRUTE_FORCE_FLUSH=ON
    -DENABLE_RSP=ON -DENABLE_XCFUN=ON -DENABLE_PCMSOLVER=ON -DENABLE_PYTHON_INTERFACE=ON
    -DCMAKE_INSTALL_PREFIX=/Software/lsdalton -DBUILDNAME="${BUILD_NAME}"

    '
  - cd build
  - echo Build step executing
  - cmake --build . --target install -- | tee build.log
  - echo Test step executing
  - 'env LSDALTON_LAUNCHER="mpirun -np 3 -oversubscribe --allow-run-as-root" OMP_NUM_THREADS=2
    ctest --output-on-failure -L ContinuousIntegration -LE pylsdalton | tee full_ctest_output.log

    '
  - 'env LSDALTON_LAUNCHER="mpirun -np 3 -oversubscribe --allow-run-as-root" OMP_NUM_THREADS=2
    LD_PRELOAD="$MATH_ROOT/lib/intel64/libmkl_rt.so:/lib/x86_64-linux-gnu/libgomp.so.1"
    ctest --output-on-failure -L pylsdalton | tee -a full_ctest_output.log

    '
  variables:
    BUILD_NAME: build-hybrid-gcc-int64-mkl_user=${GITLAB_USER_ID}_branch=${CI_COMMIT_REF_NAME}
