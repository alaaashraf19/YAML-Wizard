before_script:
- apt-get update --yes
- apt-get install --yes --no-install-recommends build-essential cmake libtool autoconf
  automake git unzip wget ca-certificates
- apt-get clean
image: ubuntu:16.04
job_build:
  artifacts:
    paths:
    - build/liberpiko.linux.tar.xz
  cache:
    paths:
    - build
  script:
  - cat /etc/debian_version
  - ./scripts/build-deps-unix.sh
  - ./scripts/build.sh
  - cd build
  - make
  - cd tests
  - make test
  - cd ..
  - cp -a ../include .
  - cp src/liberpiko.a liberpiko.a
  - cp ../deps/libressl/crypto/.libs/libcrypto.a .
  - cp ../deps/libressl/ssl/.libs/libssl.a .
  - tar cJf liberpiko.linux.tar.xz include liberpiko.a libcrypto.a libssl.a
  stage: build
stages:
- build
- deploy
