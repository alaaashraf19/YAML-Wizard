build:
  script:
  - mvn $MAVEN_CLI_OPTS package -DskipTests -DskipITs
  stage: build
cache:
  key: $CI_JOB_NAME-$CI_COMMIT_REF_SLUG
  paths:
  - .m2/repository
  - target
deploy:
  only:
  - /^release/.*$/
  - /^master$/
  script:
  - mvn $MAVEN_CLI_OPTS deploy -s ci_settings.xml -Pdeploy -DskipTests -DskipITs
  stage: deploy
image: maven:3.6-jdk-8-alpine
include:
- template: Jobs/Code-Quality.gitlab-ci.yml
- template: Security/Dependency-Scanning.gitlab-ci.yml
- template: Security/License-Management.gitlab-ci.yml
- template: Security/SAST.gitlab-ci.yml
manual deploy:
  before_script:
  - "if [ \"$CI_COMMIT_REF_NAME\" != \"master\" ] && ! [[ $CI_COMMIT_REF_NAME =~ release\\\
    /.* ]]; then\n  mvn $MAVEN_CLI_OPTS versions:set -DgenerateBackupPoms=false -DnewVersion=${CI_COMMIT_REF_SLUG}-SNAPSHOT\n\
    fi\n"
  extends: deploy
  only:
  - /^feature\/.*$/
  - /^bugfix\/.*$/
  - /^hotfix\/.*$/
  when: manual
test:
  after_script:
  - 'echo "Test Coverage Total: $(cat $CI_PROJECT_DIR/target/site/jacoco/index.html
    | grep -oP ''Total.*?\K([0-9]{1,3})%'')"

    '
  before_script:
  - apk add grep
  script:
  - mvn $MAVEN_CLI_OPTS verify -DskipITs
  stage: test
variables:
  MAVEN_CLI_OPTS: -B -e -fae -V -DinstallAtEnd=true -DdeployAtEnd=true
  MAVEN_OPTS: '-Dhttps.protocols=TLSv1.2 -Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository
    -Dorg.slf4j.simpleLogger.log.org.apache.maven.cli.transfer.Slf4jMavenTransferListener=WARN
    -Dorg.slf4j.simpleLogger.showDateTime=true -Djava.awt.headless=true

    '
