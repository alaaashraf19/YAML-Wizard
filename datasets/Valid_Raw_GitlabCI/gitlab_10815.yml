build-android:
  artifacts:
    paths:
    - bin/dawn_arrival.apk
  image: nitlang/nit:latest-full
  script:
  - "GITLAB_USER_NAME=`echo $GITLAB_USER_NAME | tr \xE8 e` make bin/dawn_arrival.apk"
build-linux:
  artifacts:
    paths:
    - bin/dawn_arrival
    - assets/
  image: nitlang/nit:latest-full
  script: NO_STACKTRACE=True make bin/dawn_arrival
unit-tests:
  image: nitlang/nit:latest
  script: make check
