build_envoy:
  before_script:
  - docker info
  image: registry.gitlab.com/datadrivendiscovery/images/testing-docker:ubuntu-bionic
  only:
  - master
  script:
  - docker login -u gitlab-ci-token -p "$CI_JOB_TOKEN" "$CI_REGISTRY"
  - docker build --cache-from="$CI_REGISTRY_IMAGE/envoy:latest" -t "$CI_REGISTRY_IMAGE/envoy:latest"
    -f envoy.dockerfile .
  - docker push "$CI_REGISTRY_IMAGE/envoy:latest"
  services:
  - alias: docker
    name: registry.gitlab.com/datadrivendiscovery/images/docker:19-dind
  stage: build
  variables:
    DOCKER_HOST: tcp://docker:2375
    GIT_SUBMODULE_STRATEGY: recursive
