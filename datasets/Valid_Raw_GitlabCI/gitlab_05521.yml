before_script:
- npm install --silent
image: node:6
npm-publish:
  allow_failure: true
  environment:
    name: npm package
    url: https://www.npmjs.com/package/vue-gitlab-api
  only:
  - master
  script:
  - npm run build
  - echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
  - npm publish
  - rm ~/.npmrc
  stage: deploy
pages:
  artifacts:
    paths:
    - public
  environment:
    name: JSDoc API Documentation
    url: https://clorichel.gitlab.io/vue-gitlab-api/
  only:
  - master
  script:
  - ./node_modules/.bin/jsdoc src/GitLabAPI.js
  - mv out public
  stage: deploy
stages:
- test
- deploy
testing:
  script:
  - npm run unit
  stage: test
