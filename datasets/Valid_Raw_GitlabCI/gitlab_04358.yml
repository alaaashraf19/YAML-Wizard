build:
  artifacts:
    expire_in: 1 week
    paths:
    - octaaf
  image: golang:1.12
  script:
  - go build -mod vendor -ldflags "-s -w -X main.Version=${CI_COMMIT_TAG}" -o octaaf
  stage: build
deploy-stable:
  dependencies:
  - build
  image: docker:stable
  only:
    variables:
    - $CI_COMMIT_TAG =~ /^release-.*$/
  script:
  - docker login -u gitlab-ci-token -p $CI_JOB_TOKEN $CI_REGISTRY
  - docker pull "${CONTAINER_IMAGE}:latest" || true
  - docker build --cache-from "${CONTAINER_IMAGE}:latest" --tag "${CONTAINER_IMAGE}:${CI_COMMIT_TAG/\//-}"
    --tag "${CONTAINER_IMAGE}:latest" .
  - docker push "${CONTAINER_IMAGE}:${CI_COMMIT_TAG/\//-}"
  - docker push "${CONTAINER_IMAGE}:latest"
  services:
  - docker:dind
  stage: deploy
deploy-unstable:
  dependencies:
  - build
  except:
    variables:
    - $CI_COMMIT_TAG =~ /^release-.*$/
  image: docker:stable
  script:
  - docker login -u gitlab-ci-token -p $CI_JOB_TOKEN $CI_REGISTRY
  - docker pull "${CONTAINER_IMAGE}:unstable-${CI_COMMIT_REF_NAME/\//-}" || true
  - docker build --cache-from "${CONTAINER_IMAGE}:unstable-${CI_COMMIT_REF_NAME/\//-}"
    --tag "${CONTAINER_IMAGE}:unstable-${CI_COMMIT_REF_NAME/\//-}" .
  - docker push "${CONTAINER_IMAGE}:unstable-${CI_COMMIT_REF_NAME/\//-}"
  services:
  - docker:dind
  stage: deploy
stages:
- build
- deploy
test:
  image: golang:1.12
  script:
  - go test -mod vendor ./...
  stage: build
variables:
  CONTAINER_IMAGE: ${CI_REGISTRY}/${CI_PROJECT_PATH}
