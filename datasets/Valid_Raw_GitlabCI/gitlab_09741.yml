before_script:
- make hex
compile:
  artifacts:
    expire_in: 30 minutes
    paths:
    - _build
  dependencies:
  - deps
  script:
  - make compile
  stage: Build
deps:
  artifacts:
    expire_in: 30 minutes
    paths:
    - deps
    - mix.lock
  script:
  - make deps
  stage: Setup
image: elixir:1.6
lint:
  allow_failure: true
  dependencies:
  - deps
  - compile
  script:
  - make lint
  stage: Test
stages:
- Setup
- Build
- Test
tests:
  coverage: /\[TOTAL\]\s+(\d+\.\d+)%/
  dependencies:
  - deps
  - compile
  script:
  - make test
  services:
  - mongo:3.6
  stage: Test
variables:
  MIX_ENV: test
