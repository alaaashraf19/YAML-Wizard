build:
  except:
  - /^\d+\.\d+\.\d+$/
  - /^\d+\.\d+\.\d+-alpha\.\d+$/
  - /^\d+\.\d+\.\d+-beta\.\d+$/
  script:
  - yarn install
  - yarn lint
  - yarn test
  - yarn run build
  stage: build
build:release:
  artifacts:
    expire_in: 1 week
    paths:
    - functions/dist
  only:
  - /^\d+\.\d+\.\d+$/
  - /^\d+\.\d+\.\d+-alpha\.\d+$/
  - /^\d+\.\d+\.\d+-beta\.\d+$/
  script:
  - cd functions
  - yarn install
  - yarn run build
  stage: build
cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
  - node_modules/
  policy: pull
deploy:
  dependencies:
  - build:release
  environment: npm_publish
  only:
  - /^\d+\.\d+\.\d+$/
  - /^\d+\.\d+\.\d+-alpha\.\d+$/
  - /^\d+\.\d+\.\d+-beta\.\d+$/
  script:
  - cp .npmrc.sample .npmrc
  - yarn copy-package-json
  - yarn publish dist --new-version $CI_COMMIT_TAG
  stage: publish
image: node:alpine
install:
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
    - node_modules/
    policy: pull-push
  script:
  - yarn install
  stage: install
stages:
- install
- build
- publish
