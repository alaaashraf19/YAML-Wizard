.if-security-release-prepare:
  if: ($CI_PIPELINE_SOURCE =~ /^(pipeline|web|api)$/) && ($SECURITY_RELEASE_PIPELINE
    =~ /^(prepare|true)$/)
.security-release-prepare-base:
  extends: .common-job-setup
  needs:
  - security_release_prepare:start
  rules:
  - if: ($CI_PIPELINE_SOURCE =~ /^(pipeline|web|api)$/) && ($SECURITY_RELEASE_PIPELINE
      =~ /^(prepare|true)$/)
  stage: security_release:prepare
security_release_prepare:appsec_issue:
  extends:
  - .security-release-prepare-base
  - .common-ci-tokens
  needs:
  - security_release_prepare:start
  - security_release_prepare:comms_issue
  script:
  - bundle exec rake 'security:prepare:appsec_issue'
security_release_prepare:check_component_branch_pipeline_status:
  extends:
  - .security-release-prepare-base
  - .common-ci-tokens
  script:
  - bundle exec rake 'security:check_component_branch_pipeline_status'
security_release_prepare:comms_issue:
  extends:
  - .security-release-prepare-base
  - .common-ci-tokens
  script:
  - bundle exec rake 'security:prepare:comms_issue'
security_release_prepare:mirror_status:
  extends:
  - .security-release-prepare-base
  - .common-ci-tokens
  script:
  - bundle exec rake 'mirror:status'
security_release_prepare:notify_dedicated:
  extends:
  - .security-release-prepare-base
  - .common-ci-tokens
  script:
  - bundle exec rake 'security:prepare:notify_stage_team'
  variables:
    STAGE_TEAM: dedicated
security_release_prepare:notify_developer_experience:
  extends:
  - .security-release-prepare-base
  - .common-ci-tokens
  script:
  - bundle exec rake 'security:prepare:notify_stage_team'
  variables:
    STAGE_TEAM: developer_experience
security_release_prepare:notify_development_analytics:
  extends:
  - .security-release-prepare-base
  - .common-ci-tokens
  script:
  - bundle exec rake 'security:prepare:notify_stage_team'
  variables:
    STAGE_TEAM: development_analytics
security_release_prepare:notify_jihu:
  extends:
  - .security-release-prepare-base
  - .common-ci-tokens
  script:
  - bundle exec rake 'security:prepare:notify_jihu'
security_release_prepare:notify_releases:
  extends:
  - .security-release-prepare-base
  - .common-ci-tokens
  script:
  - bundle exec rake 'security:prepare:notify_stage_team'
  variables:
    STAGE_TEAM: releases
security_release_prepare:notify_runner:
  extends:
  - .security-release-prepare-base
  - .common-ci-tokens
  script:
  - bundle exec rake 'security:prepare:notify_stage_team'
  variables:
    STAGE_TEAM: runner
security_release_prepare:review_security_fixes:
  extends:
  - .security-release-prepare-base
  - .common-ci-tokens
  script:
  - bundle exec rake 'security:prepare:review_security_fixes'
security_release_prepare:start:
  extends: .common-job-setup
  needs: []
  rules:
  - if: ($CI_PIPELINE_SOURCE =~ /^(pipeline|web|api)$/) && ($SECURITY_RELEASE_PIPELINE
      =~ /^(prepare|true)$/)
  script:
  - bundle exec rake 'security:prepare:start'
  stage: security_release:start
  when: manual
