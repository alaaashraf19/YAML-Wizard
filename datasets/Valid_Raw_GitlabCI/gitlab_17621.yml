apk:
  artifacts:
    paths:
    - install/build/outputs/apk/*/*.apk
  image: registry.gitlab.com/tales/tales-client-ci:android-34
  script:
  - export VERSION_NUMBER=$(git log --pretty=oneline | wc -l)
  - sed -i "s/ANDROID_VERSION_CODE = .*/ANDROID_VERSION_CODE = $VERSION_NUMBER/" example/example.pro
  - if [ -n "$ANDROID_KEYSTORE_FILE" ]; then echo "$ANDROID_KEYSTORE_FILE" | base64
    -d > android_release.keystore; export KEYSTORE="$PWD/android_release.keystore";
    fi
  - ./ci-build-apk.sh
  stage: build
appimage:
  artifacts:
    paths:
    - Source_of_Tales-*.AppImage
  image: registry.gitlab.com/tales/tales-client-ci:qt-linux
  script:
  - ./ci-build-appimage.sh
  stage: build
gplay:
  image: node:18
  only:
  - master
  script:
  - echo "$SERVICE_JSON" | base64 -d > /service.json
  - npm install apkup@1.3.1
  - npx apkup --key /service.json --track alpha --apk install/build/outputs/apk/release/install-release-signed.apk
  stage: deploy
stages:
- build
- deploy
variables:
  GIT_SUBMODULE_STRATEGY: recursive
