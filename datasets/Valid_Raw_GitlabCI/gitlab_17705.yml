before_script:
- dotnet tool restore
- dotnet restore
build_job:
  artifacts:
    name: ServerManager-$CI_COMMIT_TAG
    paths:
    - out/
  only:
  - tags
  script:
  - dotnet publish -c Release -o out/server-manager src/Server
  stage: build
cache:
  paths:
  - packages/
  - paket-files/
image: mcr.microsoft.com/dotnet/sdk:9.0
review_build_job:
  artifacts:
    expire_in: 1 day
    name: ServerManager-MR$CI_MERGE_REQUEST_ID-$CI_COMMIT_SHORT_SHA
    paths:
    - out/
  dependencies:
  - test_job
  only:
  - merge_requests
  script:
  - dotnet publish -c Debug -o out/server-manager src/Server
  stage: build
  when: manual
stages:
- test
- build
test_job:
  artifacts:
    expire_in: 1 day
    reports:
      junit: testResults/*.xml
  only:
  - merge_requests
  - main
  - tags
  script:
  - dotnet run --project src/Domain.Specs --nunit-summary testResults/Domain.xml
  - dotnet run --project src/Infrastructure.Specs --nunit-summary testResults/Infrastructure.xml
  - dotnet run --project src/Server.Specs --nunit-summary testResults/Server.xml
  services:
  - mysql:latest
  stage: test
  variables:
    MYSQL_DATABASE: testDB
    MYSQL_HOST: mysql
    MYSQL_PASSWORD: testpw
    MYSQL_RANDOM_ROOT_PASSWORD: 'yes'
    MYSQL_USER: test
