apidocs:
  artifacts:
    expire_in: 31d
    name: apidocs
    paths:
    - build/docs/
  only:
  - master@grabl/grabl
  script:
  - ./gradlew -Prelease.useLastTag=true groovydoc
  stage: build
build:
  allow_failure: false
  script:
  - ./gradlew clean assemble
  stage: build
cache:
  paths:
  - .gradle
image: openjdk:8-jdk
pages:
  artifacts:
    paths:
    - public
  dependencies:
  - apidocs
  - test
  only:
  - master@grabl/grabl
  script:
  - test ! -d public || mv public .public
  - mkdir public
  - mv build/docs/groovydoc public/api
  - mv build/reports public/
  stage: deploy
test:
  artifacts:
    expire_in: 31d
    name: reports
    paths:
    - build/reports/
  script:
  - ./gradlew check
  stage: test
variables:
  GRADLE_OPTS: -Dorg.gradle.daemon=false
  GRADLE_USER_HOME: ./.gradle
