build_and_run_automated_test_scenarios_with_preinstalled_image:
  image: glondu/beleniosbase-tests:20210706-1
  script:
  - source ~/env.sh
  - make build-debug-tool
  - make build-release-server
  - python3 -m venv venv
  - source venv/bin/activate
  - pip install -r requirements.txt
  - python3 ./tests/selenium/test_scenario_4.py
  - python3 ./tests/selenium/test_scenario_3.py
  - python3 ./tests/selenium/test_scenario_2.py
  - python3 ./tests/selenium/test_scenario_1.py
  stage: test
build_and_run_automated_test_scenarios_with_preinstalled_image_and_prepared_database:
  image: glondu/beleniosbase-tests:20210706-1
  rules:
  - changes:
    - VERSION
  script:
  - source ~/env.sh
  - mkdir -p _run/spool
  - wget https://gitlab.inria.fr/belenios/belenios-prepared-database/-/archive/$PREPARED_DATABASE_VERSION/belenios-prepared-database-$PREPARED_DATABASE_VERSION.tar.gz
    && tar -zxf belenios-prepared-database-$PREPARED_DATABASE_VERSION.tar.gz && mv
    belenios-prepared-database-$PREPARED_DATABASE_VERSION/* _run/spool && rm -rf belenios-prepared-database-$PREPARED_DATABASE_VERSION.tar.gz
    belenios-prepared-database-$PREPARED_DATABASE_VERSION
  - make build-debug-tool
  - make build-release-server
  - python3 -m venv venv
  - source venv/bin/activate
  - pip install -r requirements.txt
  - python3 ./tests/selenium/test_scenario_4.py
  - python3 ./tests/selenium/test_scenario_3.py
  - python3 ./tests/selenium/test_scenario_2.py
  - python3 ./tests/selenium/test_scenario_1.py
  stage: deploy
  variables:
    PREPARED_DATABASE_VERSION: v0.01
build_and_run_fuzz_tests_and_monkey_tests_with_preinstalled_image:
  image: glondu/beleniosbase-tests:20210706-1
  rules:
  - changes:
    - VERSION
  script:
  - source ~/env.sh
  - make build-debug-tool
  - make build-release-server
  - touch $SENT_EMAILS_TEXT_FILE_RELATIVE_PATH
  - ./demo/run-server.sh &
  - python3 -m venv venv
  - source venv/bin/activate
  - pip install -r requirements.txt
  - LOGIN_MODE=local python ./tests/selenium/test_fuzz_login.py
  - python ./tests/selenium/test_clicker_monkey.py
  stage: deploy
  variables:
    BELENIOS_SENDMAIL: tests/selenium/tools/sendmail_fake_to_static.sh
    CLEAN_UP_POLICY: DO_NOTHING
    FAKE_SENT_EMAILS_FILE_RELATIVE_URL: static/mail.txt
    SENT_EMAILS_TEXT_FILE_ABSOLUTE_PATH: $CI_PROJECT_DIR/$SENT_EMAILS_TEXT_FILE_RELATIVE_PATH
    SENT_EMAILS_TEXT_FILE_RELATIVE_PATH: _run/usr/share/belenios-server/mail.txt
    START_SERVER: '0'
    USE_HEADLESS_BROWSER: '1'
    WAIT_TIME_BETWEEN_EACH_STEP: '0.02'
build_and_test_with_debian_image:
  image: ocaml/opam2:debian-10-ocaml-4.08
  script:
  - sudo apt-get update -qq && sudo apt-get install -y -qq build-essential libgmp-dev
    libpcre3-dev pkg-config m4 libssl-dev libsqlite3-dev wget ca-certificates unzip
    libncurses-dev zlib1g-dev jq npm
  - git -C /home/opam/opam-repository pull
  - opam update
  - eval `grep "opam install" ./opam-bootstrap.sh`
  - make build-debug-tool
  - make build-release-server
  - ./demo/run-server.sh &
  - first_access_index_page_output=$(wget --retry-connrefused --no-check-certificate
    -T 30 http://localhost:8001 -O-)
  - echo $first_access_index_page_output
  - if [ "$(echo \"$first_access_index_page_output\" | grep '>Belenios</a>' | wc -l)"
    != "1" ]; then echo "[First page access] First page access does not show a single
    '>Belenios</a>' text, but it should" && exit 1; else echo "[First page access]
    First page access shows a single '>Belenios</a>' text, as expected"; fi
  stage: test
build_and_test_with_preinstalled_image:
  image: glondu/beleniosbase:20210706-1
  script:
  - source ~/env.sh
  - make check
  - make build-release-server
  - ./demo/run-server.sh &
  - first_access_index_page_output=$(wget --retry-connrefused --no-check-certificate
    -T 30 http://localhost:8001 -O-)
  - echo $first_access_index_page_output
  - if [ "$(echo \"$first_access_index_page_output\" | grep '>Belenios</a>' | wc -l)"
    != "1" ]; then echo "[First page access] First page access does not show a single
    '>Belenios</a>' text, but it should" && exit 1; else echo "[First page access]
    First page access shows a single '>Belenios</a>' text, as expected"; fi
  stage: test
stages:
- test
- deploy
