image: ruby:2.3
pages:
  artifacts:
    paths:
    - public
  dependencies:
  - rspec
  only:
  - master
  script:
  - mkdir public
  - mv coverage/ public/coverage
  stage: deploy
rspec:
  artifacts:
    paths:
    - coverage/
  script:
  - gem install bundler --no-ri --no-rdoc
  - bundle install --jobs $(nproc)  "${FLAGS[@]}"
  - bundle exec rspec
  stage: test
