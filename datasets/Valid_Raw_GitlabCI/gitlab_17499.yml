sonar-cloud:
  before_script:
  - export GO_PROJECT_DIR="$GOPATH/src/$PROJECT_PATH"
  - time git clone $CI_REPOSITORY_URL $GO_PROJECT_DIR
  - cd $GO_PROJECT_DIR
  - git checkout $CI_COMMIT_REF_NAME
  dependencies:
  - test-project
  - lint-source
  image: niklaskhf/sonar-runner-docker
  script:
  - VERSION=$(./_scripts/ci/get_version.sh)
  - sonar-scanner -Dsonar.projectVersion=$VERSION -Dsonar.projectKey=systemtestportal-gitlab   -Dsonar.organization=systemtestportal-gitlab   -Dsonar.sources=.   -Dsonar.host.url=https://sonarcloud.io
    -Dsonar.login=$SONAR_CLOUD -Dsonar.go.coverage.reportPaths=$CI_PROJECT_DIR/coverage.out
    -Dsonar.coverage.exclusions=**/*.js,**/*_test.go,**/*bootstrap*,**/libraries/**,**/bootstrap*.css,**/bootstrap*,**/*.sql
    -Dsonar.branch.name=$CI_COMMIT_REF_NAME -Dsonar.go.gometalinter.reportPaths=$CI_PROJECT_DIR/linter.log
    -Dsonar.test.exclusions=**/*_test.go
  stage: analysis
stages:
- test
- compile
- package
- save-to-cubi
- analysis
- review
- cleanup-review
- staging
- cleanup-staging
