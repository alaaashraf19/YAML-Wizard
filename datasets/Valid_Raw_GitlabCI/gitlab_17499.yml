test-project:
  artifacts:
    paths:
    - coverage.out
    - coverage.html
    when: always
  coverage: /total:\s+\(statements\)\s+\d+\.\d+%/
  dependencies: *id021
  script:
  - goverage -coverprofile=coverage.out ./...
  - go tool cover -html coverage.out -o coverage.html
  - go tool cover -func=coverage.out
  - cp coverage.out coverage.html $CI_PROJECT_DIR
  stage: test
variables:
  GIT_STRATEGY: none
  NAME: systemtestportal
  PROJECT_PATH: gitlab.com/stp-team/systemtestportal-webapp
xgo:
  artifacts:
    name: stp-binaries
    paths:
    - binaries/
  before_script:
  - docker info
  - apk add --no-cache bash gpgme go musl-dev zip
  - go get github.com/niklaskhf/xgo
  - export GOPATH=~/go
  - export PATH=$PATH:$GOPATH/bin
  - go version
  - export GO_PROJECT_DIR="$GOPATH/src/$PROJECT_PATH"
  - time git clone $CI_REPOSITORY_URL $GO_PROJECT_DIR
  - cd $GO_PROJECT_DIR
  - git checkout $CI_COMMIT_REF_NAME
  - deps="$(./_scripts/list_deps.sh)"
  - echo "${deps}"
  - go get -d ${deps}
  image: docker:stable-git
  only: *id003
  script:
  - NIGHTLY="$(./_scripts/ci/test_if_nightly_build_required.sh)"
  - if [[ $NIGHTLY == "abort" ]]; then exit 0; fi
  - pwd
  - RELEASE_TAG=$(git describe --tags)
  - BUILD_NAME="systemtestportal-$RELEASE_TAG"
  - echo $GOPATH
  - cd $GOPATH
  - cd src
  - cd gitlab.com/stp-team/systemtestportal-webapp/cmd/stp
  - time ~/go/bin/xgo -out $BUILD_NAME -tags 'netgo' -tag $RELEASE_TAG -ldflags="-X
    gitlab.com/stp-team/systemtestportal-webapp/config.version=$(./../../_scripts/ci/get_version.sh)
    -linkmode external -extldflags "-static"" --dest=/builds/stp-team/systemtestportal-webapp/binaries/
    --targets=windows/*,linux/* gitlab.com/stp-team/systemtestportal-webapp/cmd/stp
  - time ~/go/bin/xgo -out $BUILD_NAME -tags 'netgo' -tag $RELEASE_TAG -ldflags="-X
    gitlab.com/stp-team/systemtestportal-webapp/config.version=$(./../../_scripts/ci/get_version.sh)"
    --dest=/builds/stp-team/systemtestportal-webapp/binaries/ --targets=darwin/* gitlab.com/stp-team/systemtestportal-webapp/cmd/stp
  - ./../../_scripts/ci/pack_binary.sh
  - cd /builds/stp-team/systemtestportal-webapp/binaries/
  - ls -l
  services:
  - docker:dind
  stage: compile
  tags:
  - cubietruck
  variables:
    DOCKER_DRIVER: overlay2
