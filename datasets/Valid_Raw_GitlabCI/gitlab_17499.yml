before_script:
- go version
- export GO_PROJECT_DIR="$GOPATH/src/$PROJECT_PATH"
- time git clone $CI_REPOSITORY_URL $GO_PROJECT_DIR
- cd $GO_PROJECT_DIR
- git checkout $CI_COMMIT_REF_NAME
- deps="$(./_scripts/list_deps.sh)"
- echo "${deps}"
- go get -d ${deps}
build-project:
  dependencies: *id021
  script:
  - go build ./...
  stage: test
demo_master:
  before_script: *id009
  dependencies: *id010
  environment:
    name: $CI_COMMIT_REF_NAME
    on_stop: stop_demo
    url: http://$CI_ENVIRONMENT_SLUG.reviews.kammhoff.com
  image: google/cloud-sdk
  only: *id022
  script: *id023
  stage: staging
  variables: *id011
docker-signed:
  before_script: *id024
  dependencies:
  - xgo
  image: docker:stable
  only: *id003
  script:
  - NIGHTLY="$(./_scripts/ci/test_if_nightly_build_required.sh)"
  - if [[ $NIGHTLY == "abort" ]]; then exit 0; fi
  - ./_scripts/ci/build_docker.sh
  services: *id025
  stage: package
  tags: *id026
  variables: *id027
docker-unsigned:
  before_script: *id024
  dependencies:
  - linux-amd64-unsigned
  except:
  - tags
  image: docker:stable
  script:
  - cp "${CI_PROJECT_DIR}/systemtestportal-linux-amd64_${CI_COMMIT_REF_NAME}.tar.gz"
    ./stp.tar.gz
  - docker login -u gitlab-ci-token -p $CI_JOB_TOKEN $CI_REGISTRY
  - docker build --build-arg BINARY_NAME="systemtestportal-linux-amd64_${CI_COMMIT_REF_NAME}"
    -t $CI_REGISTRY_IMAGE/unsigned:$CI_COMMIT_REF_SLUG .
  - docker push $CI_REGISTRY_IMAGE/unsigned:$CI_COMMIT_REF_SLUG
  services: *id025
  stage: package
  tags: *id026
  variables: *id027
image: golang:bullseye
lint-source:
  allow_failure: true
  artifacts:
    expire_in: 2 weeks
    paths:
    - linter.log
    when: always
  dependencies: *id021
  script:
  - 'gometalinter --config=''gometalinter.conf'' --deadline=600s $GO_PROJECT_DIR/...
    | sort -t: -k ''1,1'' -k ''2,2g'' -k ''3,3g'' > $CI_PROJECT_DIR/linter.log'
  stage: test
linux-amd64-unsigned:
  artifacts: *id001
  dependencies: *id002
  except: *id018
  image: golang:1.10
  script: *id008
  stage: compile
  variables: *id013
package-source:
  artifacts:
    name: stp-source
    paths:
    - source/
  image: golang:1.10
  only: *id003
  script:
  - NIGHTLY="$(./_scripts/ci/test_if_nightly_build_required.sh)"
  - if [[ $NIGHTLY == "abort" ]]; then exit 0; fi
  - chmod +x ./_scripts/ci/pack_source.sh
  - mkdir /builds/stp-team/systemtestportal-webapp/source/
  - ./_scripts/ci/pack_source.sh
  stage: package
  tags: *id004
  variables:
    FILE_NAME: stp-src_${CI_COMMIT_REF_NAME}.tar.gz
save-to-cubi:
  before_script:
  - ls
  dependencies:
  - xgo
  - package-source
  image: golang:1.10
  only: *id003
  script:
  - NIGHTLY="$(./_scripts/ci/test_if_nightly_build_required.sh)"
  - if [[ $NIGHTLY == "abort" ]]; then exit 0; fi
