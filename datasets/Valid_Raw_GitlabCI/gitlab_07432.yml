cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
  - .public/
pages:
  artifacts:
    paths:
    - public
  only:
  - main
  script:
  - mv .public public
  stage: deploy
test:
  before_script:
  - apt-get update && apt-get -y install cmake lcov
  only:
  - main
  script:
  - cmake -DWITH_COVERAGE=on .
  - make
  - ./pre-commit-tests
  - lcov --directory . --capture --output-file coverage.info
  - "lcov --remove coverage.info \"/usr/*\" \\\n                            \"${PWD}/run/*\"\
    \ \\\n                            \"${PWD}/test/*\" \\\n                     \
    \       \"${PWD}/src/csiphash.c\" \\\n                            \"${PWD}/src/lily_alloc.c\"\
    \ \\\n                            \"${PWD}/src/lily_pkg_core.c\" \\\n     --output-file\
    \ coverage.info"
  - genhtml -o .public coverage.info
  - lcov --list coverage.info
  stage: test
