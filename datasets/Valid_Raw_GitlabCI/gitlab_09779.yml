before_script:
- apt-get update && apt-get install -y hugo git-core
- git submodule init
- git submodule update --force
image: debian:testing-slim
pages:
  artifacts:
    paths:
    - public
  only:
  - master
  script:
  - hugo -s web/hacklabcormano/
  - mkdir public
  - cp -r web/hacklabcormano/public/* public
test:
  except:
  - master
  script:
  - hugo -s web/hacklabcormano/
