default:
  image: continuumio/miniconda3
pages:
  artifacts:
    paths:
    - public
  rules:
  - if: $CI_COMMIT_REF_NAME == "release"
    when: on_success
  - when: never
  script:
  - apt update
  - apt-get install -qy python3-pip python3-sphinx python3-sphinx-rtd-theme build-essential
  - pip3 install .
  - cd doc
  - make html
  - cd ..
  - mv doc/_build/html public
  stage: deploy
pages_development:
  artifacts:
    paths:
    - public_development
  rules:
  - if: $CI_COMMIT_REF_NAME == "master"
    when: on_success
  - when: never
  script:
  - apt update
  - apt-get install -qy python3-pip python3-sphinx python3-sphinx-rtd-theme build-essential
  - pip3 install .
  - cd doc
  - make html
  - cd ..
  - mv doc/_build/html public_development
  stage: deploy
run_style_and_lint_check:
  script:
  - conda install ruff black -c conda-forge -y
  - python3 -m ruff check merlin_interface/
  - python3 -m black merlin_interface/ --diff --check --quiet
run_tests:
  script:
  - conda install pytest -c conda-forge -y
  - pip3 install -e .
  - python3 -m pytest --doctest-modules merlin_interface/
