before_script:
- apt update &>/dev/null
- apt install -qq -y sudo qttools5-dev qt5-default >/dev/null
- ./.wiringPi.bash >/dev/null
cmake_build:
  script:
  - mkdir -p build
  - cd build
  - cmake ..
  - make -j2
  stage: build
cmake_install:
  script:
  - mkdir -p build
  - cd build
  - cmake ..
  - make -j2 install
  - ls $HOME/.local/share/applications
  stage: deploy
image: rikorose/gcc-cmake
