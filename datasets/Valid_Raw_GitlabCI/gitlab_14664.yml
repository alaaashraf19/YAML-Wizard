build:
  artifacts:
    paths:
    - app/build/outputs/
  before_script:
  - chmod +x CI/android_sdk.sh
  - ./CI/android_sdk.sh
  - export ANDROID_HOME=$PWD/android-sdk-linux
  - chmod +x ./gradlew
  image: openjdk:8-jdk
  script:
  - ./gradlew assembleDebug
  stage: deploy
  tags:
  - linux
  - docker
pages:
  artifacts:
    paths:
    - public
  script:
  - mv app/build/reports/jacoco/testDebugUnitTestCoverage/html/ public/
  stage: deploy
stages:
- test
- deploy
unitTest:API:
  before_script:
  - chmod +x CI/install_phpunit.sh
  - CI/install_phpunit.sh > /dev/null
  - composer install -d ./API
  cache:
    paths:
    - API/vendor/
  image: php:7.0
  script:
  - phpunit API/test/BatikTest.php
  stage: test
unitTest:app:
  artifacts:
    paths:
    - app/build/reports/
  before_script:
  - chmod +x CI/android_sdk.sh
  - ./CI/android_sdk.sh
  - export ANDROID_HOME=$PWD/android-sdk-linux
  - chmod +x ./gradlew
  image: openjdk:8-jdk
  script:
  - ./gradlew test
  - ./gradlew testDebugUnitTestCoverage
  - cat app/build/reports/jacoco/testDebugUnitTestCoverage/html/index.html
  stage: test
variables:
  ANDROID_BUILD_TOOLS: 25.0.0
  ANDROID_SDK_TOOLS: 24.4.1
  ANDROID_TARGET_SDK: '24'
