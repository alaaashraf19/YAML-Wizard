.build:environment:
  before_script: &id001
  - dpkg --add-architecture i386
  - apt-get update
  - apt-get install -y -f binutils-dev gcc-multilib wget git
  - "if [ ! -f wine/wine.deb ]; then\n  rm -rf wine\n  mkdir -p wine\n  export DVERNAME=$(apt-cache\
    \ policy | fgrep o=Debian, | fgrep ,l=Debian, | fgrep ,c=main, | egrep -o 'n=[^,\
    \ ]*' | awk -F= '{print $2}' | uniq)\n  wget -O wine/wine-i386.deb https://dl.winehq.org/wine-builds/debian/pool/main/wine-${WBRANCH}-i386_${WVERSION}~${DVERNAME}_i386.deb\n\
    \  wget -O wine/wine-amd64.deb https://dl.winehq.org/wine-builds/debian/pool/main/wine-${WBRANCH}-amd64_${WVERSION}~${DVERNAME}_amd64.deb\n\
    \  wget -O wine/wine-dev.deb https://dl.winehq.org/wine-builds/debian/pool/main/wine-${WBRANCH}-dev_${WVERSION}~${DVERNAME}_amd64.deb\n\
    \  wget -O wine/wine.deb https://dl.winehq.org/wine-builds/debian/pool/main/wine-${WBRANCH}_${WVERSION}~${DVERNAME}_amd64.deb\n\
    \  wget -O wine/winehq.deb https://dl.winehq.org/wine-builds/debian/pool/main/winehq-${WBRANCH}_${WVERSION}~${DVERNAME}_amd64.deb\n\
    fi\nfor p in wine wine-dev wine-i386 wine-amd64 winehq; do\n  if [ -f wine/$p.deb\
    \ ]; then dpkg --force-all -i wine/$p.deb; fi\ndone\nln -s /opt/wine-${WBRANCH}/include/wine\
    \ /usr/include/wine\nln -s /opt/wine-${WBRANCH}/lib{,32}\n"
  - "if [ ! -x nim-${NIMBRANCH}/bin/nim ]; then\n  git clone -b ${NIMBRANCH} --depth\
    \ 1 git://github.com/nim-lang/nim nim-${NIMBRANCH}/\n  cd nim-${NIMBRANCH}\n \
    \ git clone --depth 1 git://github.com/nim-lang/csources csources/\n  cd csources\n\
    \  sh build.sh\n  cd ..\n  rm -rf csources\n  bin/nim c koch\n  ./koch boot -d:release\n\
    \  ./koch nimble\nelse\n  cd nim-${NIMBRANCH}\n  git fetch origin\n  if ! git\
    \ merge FETCH_HEAD | grep \"Already up-to-date\"; then\n    bin/nim c koch\n \
    \   ./koch boot -d:release\n    ./koch nimble\n  fi\nfi\ncd ..\nexport PATH=\"\
    $PWD/nim-${NIMBRANCH}/bin${PATH:+:$PATH}\"\n"
  cache: &id002
    key: nim-${NIMBRANCH}
    paths:
    - nim-${NIMBRANCH}
    - wine
.test:
  before_script: *id001
  cache: *id002
  script: &id003
  - nim-${NIMBRANCH}/bin/nim -v
  - winegcc -v
  - wine64 --version
  - 'export libs="$(find / -name ''crti.o'' | sed -z -e ''s/\n/:/g'' -e ''s%/crti.o%%g''
    -e ''s/:$//'')"

    export LIBRARY_PATH="$libs${LIBRARY_PATH:+:$LIBRARY_PATH}"

    export LD_LIBRARY_PATH="$libs${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}"

    winegcc -print-search-dirs

    make ARCH=64 DESTDIR=redist PREFIX= install

    '
  stage: test
cache:
  key: wine
  paths:
  - wine
deploy:
  artifacts:
    name: SteamForwarder-$CI_COMMIT_TAG
    paths:
    - redist/
  before_script: *id001
  cache: *id002
  except: null
  only:
  - tags
  script: *id003
  stage: deploy
  variables: &id004
    NIMBRANCH: master
image: debian:sid
test:devel:
  allow_failure: true
  before_script: *id001
  cache: *id002
  except:
  - tags
  script: *id003
  stage: test
  variables:
    NIMBRANCH: devel
test:master:
  artifacts:
    expire_in: 1 week
    name: SteamForwarder-devel-$CI_COMMIT_SHA
    paths:
    - redist/
  before_script: *id001
  cache: *id002
  except:
  - tags
  script: *id003
  stage: test
  variables: *id004
variables:
  WBRANCH: stable
  WVERSION: 3.0.1
