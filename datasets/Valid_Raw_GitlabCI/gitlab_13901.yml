.Windows_MSBuild_Base:
  after_script:
  - Get-Volume
  - Copy-Item C:\ProgramData\chocolatey\logs\chocolatey.log
  artifacts:
    paths:
    - '*.zip'
    - '*.log'
    - MSVC2022_64/*.log
    - MSVC2022_64/**/*.log
    when: always
  before_script:
  - Get-Volume
  - Import-Module "$env:ChocolateyInstall\helpers\chocolateyProfile.psm1"
  - choco source add -n=openmw-proxy -s="https://repo.openmw.org/repository/Chocolatey/"
    --priority=1
  - choco source disable -n=chocolatey
  - choco install git --force --params "/GitAndUnixToolsOnPath" -y
  - choco install 7zip -y
  - choco install vswhere -y
  - choco install python -y
  - choco install awscli -y --version=2.22.35
  - refreshenv
  - "function Make-SafeFileName {\n  param(\n    [Parameter(Mandatory=$true)]\n  \
    \  [String]\n    $FileName\n  )\n  [IO.Path]::GetInvalidFileNameChars() | ForEach-Object\
    \ {\n    $FileName = $FileName.Replace($_, '_')\n  }\n  return $FileName\n}\n"
  cache:
    key: msbuild-2022-v13
    paths:
    - deps
    - MSVC2022_64/deps/Qt
  rules:
  - if: $CI_PIPELINE_SOURCE == "push" || $CI_PIPELINE_SOURCE == "merge_request_event"
  script:
  - Get-Volume
  - $time = (Get-Date -Format "HH:mm:ss")
  - echo ${time}
  - echo "started by ${GITLAB_USER_NAME}"
  - New-Item -Type File -Force -Path MSVC2022_64\.cmake\api\v1\query\codemodel-v2
  - sh CI/before_script.msvc.sh -c $config -p Win64 -v 2022 -k -V -b -t -C $multiview
    -E
  - cd MSVC2022_64
  - Get-Volume
  - cmake --build . --config $config --target $targets
  - cd $config
  - echo "CI_COMMIT_REF_NAME ${CI_COMMIT_REF_NAME}`nCI_JOB_ID ${CI_JOB_ID}`nCI_COMMIT_SHA
    ${CI_COMMIT_SHA}" | Out-File -Encoding UTF8 CI-ID.txt
  - $artifactDirectory = "$(Make-SafeFileName("${CI_PROJECT_NAMESPACE}"))/$(Make-SafeFileName("${CI_COMMIT_REF_NAME}"))/$(Make-SafeFileName("${CI_COMMIT_SHORT_SHA}-${CI_JOB_ID}"))/"
  - Get-ChildItem -Recurse *.ilk | Remove-Item
  - aws --version
  - "if (Get-ChildItem -Recurse *.pdb) {\n  7z a -tzip \"..\\..\\$(Make-SafeFileName(\"\
    OpenMW_MSVC2022_64_${config}_${CI_COMMIT_REF_NAME}_${CI_JOB_ID}_symbols.zip\"\
    ))\" '*.pdb' CI-ID.txt\n  if(!$?) { Exit $LASTEXITCODE }\n  if (Test-Path env:AWS_ACCESS_KEY_ID)\
    \ {\n    aws --endpoint-url https://rgw.ctrl-c.liu.se s3 cp \"..\\..\\$(Make-SafeFileName(\"\
    OpenMW_MSVC2022_64_${config}_${CI_COMMIT_REF_NAME}_${CI_JOB_ID}_symbols.zip\"\
    ))\" s3://openmw-artifacts/${artifactDirectory}\n    if(!$?) { Exit $LASTEXITCODE\
    \ }\n  }\n  Push-Location ..\n  ..\\CI\\Store-Symbols.ps1 -SkipCompress\n  if(!$?)\
    \ { Exit $LASTEXITCODE }\n  7z a -tzip \"..\\$(Make-SafeFileName(\"OpenMW_MSVC2022_64_${config}_${CI_COMMIT_REF_NAME}_${CI_JOB_ID}_sym_store.zip\"\
    ))\" '.\\SymStore\\*' $config\\CI-ID.txt\n  if(!$?) { Exit $LASTEXITCODE }\n \
    \ Pop-Location\n  Get-ChildItem -Recurse *.pdb | Remove-Item\n}\n"
  - 7z a -tzip "..\..\$(Make-SafeFileName("OpenMW_MSVC2022_64_${config}_${CI_COMMIT_REF_NAME}.zip"))"
    '*'
  - "if (Test-Path env:AWS_ACCESS_KEY_ID) {\n  aws --endpoint-url https://rgw.ctrl-c.liu.se\
    \ s3 cp \"..\\..\\$(Make-SafeFileName(\"OpenMW_MSVC2022_64_${config}_${CI_COMMIT_REF_NAME}.zip\"\
    ))\" s3://openmw-artifacts/${artifactDirectory}\n  if(!$?) { Exit $LASTEXITCODE\
    \ }\n}\n"
  - "if ($executables) {\n  foreach ($exe in $executables.Split(',')) {\n    & .\\\
    $exe\n    if(!$?) { Exit $LASTEXITCODE }\n  }\n}\n"
  stage: build
  tags:
  - saas-windows-medium-amd64
  timeout: 2h
  variables:
    targets: ALL_BUILD
.Windows_MSBuild_Debug:
  extends:
  - .Windows_MSBuild_Base
  variables:
    config: Debug
.Windows_MSBuild_Release:
  extends:
  - .Windows_MSBuild_Base
  variables:
    config: Release
