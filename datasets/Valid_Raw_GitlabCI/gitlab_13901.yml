Coverity:
  artifacts:
    expire_in: 1 day
    paths:
    - /builds/OpenMW/openmw/cov-int/build-log.txt
    - /builds/OpenMW/openmw/cov-int.tar.gz
    reports:
      dotenv: build.env
  before_script:
  - CI/install_debian_deps.sh coverity openmw-deps openmw-deps-dynamic
  - curl -o /tmp/cov-analysis-linux64.tgz https://scan.coverity.com/download/linux64
    --form project=$COVERITY_SCAN_PROJECT_NAME --form token=$COVERITY_SCAN_TOKEN
  - tar xfz /tmp/cov-analysis-linux64.tgz
  cache:
    key: Coverity.ubuntu_24.04.v2
    paths:
    - apt-cache/
    - ccache/
  image: ubuntu:24.04
  interruptible: false
  rules:
  - if: $CI_PIPELINE_SOURCE == "schedule"
  script:
  - export CCACHE_BASEDIR="$(pwd)"
  - export CCACHE_DIR="$(pwd)/ccache"
  - export COVERITY_NO_LOG_ENVIRONMENT_VARIABLES=1
  - mkdir -pv "${CCACHE_DIR}"
  - ccache -z -M "${CCACHE_SIZE}"
  - CI/before_script.linux.sh
  - cov-analysis-linux64-*/bin/cov-configure --template --comptype prefix --compiler
    ccache
  - cov-analysis-linux64-*/bin/cov-build --dir cov-int cmake --build build -- -j $(nproc)
  - ccache -svv
  - tar cfz cov-int.tar.gz cov-int
  - echo "OPENMW_JOB_ID=$CI_JOB_ID" >> build.env
  stage: build
  tags:
  - saas-linux-medium-amd64
  variables:
    CC: clang
    CCACHE_SIZE: 2G
    CMAKE_BUILD_TYPE: Debug
    CMAKE_CXX_FLAGS_DEBUG: -O0
    CXX: clang++
Coverity_Upload:
  before_script:
  - CI/install_debian_deps.sh coverity_upload
  image: ubuntu:24.04
  interruptible: false
  needs:
  - Coverity
  rules:
  - if: $CI_PIPELINE_SOURCE == "schedule"
  script:
  - echo "$CI_API_V4_URL/projects/$CI_PROJECT_ID/jobs/$OPENMW_JOB_ID/artifacts/cov-int.tar.gz"
  - curl https://scan.coverity.com/builds?project=$COVERITY_SCAN_PROJECT_NAME --form
    token=$COVERITY_SCAN_TOKEN --form email=$GITLAB_USER_EMAIL --form version="$CI_COMMIT_REF_NAME:$CI_COMMIT_SHORT_SHA"
    --form description="CI_COMMIT_SHORT_SHA / $CI_COMMIT_TITLE / $CI_COMMIT_REF_NAME:$CI_PIPELINE_ID"
    --form url="$CI_API_V4_URL/projects/$CI_PROJECT_ID/jobs/$OPENMW_JOB_ID/artifacts/cov-int.tar.gz"
  stage: build
