.Compress_And_Upload_Symbols_Base:
  extends: .Ubuntu_Image
  script:
  - apt-get update
  - apt-get install -y curl gcab unzip
  - curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64-2.22.35.zip" -o awscli-exe-linux-x86_64.zip
  - unzip -d awscli-exe-linux-x86_64 awscli-exe-linux-x86_64.zip
  - pushd awscli-exe-linux-x86_64
  - ./aws/install
  - popd
  - aws --version
  - unzip -d sym_store *sym_store.zip
  - shopt -s globstar
  - "for file in sym_store/**/*.exe; do\n  if [[ -f \"$file\" ]]; then\n    gcab --create\
    \ --zip --nopath \"${file%.exe}.ex_\" \"$file\"\n  fi\ndone\n"
  - "for file in sym_store/**/*.dll; do\n  if [[ -f \"$file\" ]]; then\n    gcab --create\
    \ --zip --nopath \"${file%.dll}.dl_\" \"$file\"\n  fi\ndone\n"
  - "for file in sym_store/**/*.pdb; do\n  if [[ -f \"$file\" ]]; then\n    gcab --create\
    \ --zip --nopath \"${file%.pdb}.pd_\" \"$file\"\n  fi\ndone\n"
  - "if [[ -v AWS_ACCESS_KEY_ID ]]; then\n    aws --endpoint-url https://rgw.ctrl-c.liu.se\
    \ s3 cp --recursive --exclude '*' --include '*.ex_' --include '*.dl_' --include\
    \ '*.pd_' sym_store s3://openmw-sym\nfi\n"
  stage: build
  variables:
    GIT_STRATEGY: none
.FindMissingMergeRequests:
  before_script:
  - pip3 install --user --break-system-packages requests click discord_webhook
  cache:
    key: FindMissingMergeRequests.v1
    paths:
    - .cache/pip
  image: python:latest
  rules:
  - if: $CI_PIPELINE_SOURCE == "schedule"
  script:
  - scripts/find_missing_merge_requests.py --project_id=$CI_PROJECT_ID --ignored_mrs_path=$CI_PROJECT_DIR/.resubmitted_merge_requests.txt
  stage: build
  variables:
    PIP_CACHE_DIR: $CI_PROJECT_DIR/.cache/pip
.MacOS:
  artifacts:
    paths:
    - build/OpenMW-*.dmg
  cache:
    paths:
    - ccache/
  image: macos-15-xcode-16
  rules:
  - if: $CI_PROJECT_ID != "7107382"
    when: never
  - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    when: manual
  - if: $CI_PIPELINE_SOURCE == "push" || $CI_PIPELINE_SOURCE == "schedule"
  script:
  - CI/before_install.macos.sh
  - brew install ccache
  - export CCACHE_BASEDIR="$(pwd)"
  - export CCACHE_DIR="$(pwd)/ccache"
  - mkdir -pv "${CCACHE_DIR}"
  - ccache -z -M "${CCACHE_SIZE}"
  - CI/before_script.macos.sh -C
  - CI/macos/build.sh
  - cd build
  - for dmg in *.dmg; do mv "$dmg" "${dmg%.dmg}_${DMG_IDENTIFIER}_${CI_COMMIT_REF_NAME##*/}.dmg";
    done
  - brew install s3cmd
  - "if [[ -n \"${AWS_ACCESS_KEY_ID}\" ]]; then\n  echo \"[default]\" > ~/.s3cfg\n\
    \  echo \"access_key = ${AWS_ACCESS_KEY_ID}\" >> ~/.s3cfg\n  echo \"secret_key\
    \ = ${AWS_SECRET_ACCESS_KEY}\" >> ~/.s3cfg\n  echo \"host_base = rgw.ctrl-c.liu.se\"\
    \ >> ~/.s3cfg\n  echo \"host_bucket = %(bucket)s.rgw.ctrl-c.liu.se\" >> ~/.s3cfg\n\
    \  echo \"use_https = True\" >> ~/.s3cfg\n\n  artifactDirectory=\"${CI_PROJECT_NAMESPACE//[\\\
    \"<>|$'\\t'\\/\\\\?*]/_}/${CI_COMMIT_REF_NAME//[\\\"<>|$'\\t'\\/\\\\?*]/_}/${CI_COMMIT_SHORT_SHA//[\\\
    \"<>|$'\\t'\\/\\\\?*]/_}-${CI_JOB_ID//[\\\"<>|$'\\t'\\/\\\\?*]/_}/\"\n  for dmg\
    \ in *.dmg; do\n    s3cmd put \"${dmg}\" s3://openmw-artifacts/${artifactDirectory}\n\
    \  done\nfi\n"
  - ccache -svv
  stage: build
  tags:
  - saas-macos-medium-m1
.Ubuntu:
  artifacts:
    paths:
    - build/install/
  cache:
    paths:
    - apt-cache/
    - ccache/
  extends: .Ubuntu_Image
  script:
  - df -h
  - export CCACHE_BASEDIR="`pwd`"
  - export CCACHE_DIR="`pwd`/ccache" && mkdir -pv "$CCACHE_DIR"
  - ccache -z -M "${CCACHE_SIZE}"
  - CI/before_script.linux.sh
  - cd build
  - cmake --build . -- -j $(nproc)
  - df -h
  - du -sh .
  - find . | grep '\.o$' | xargs rm -f
  - df -h
  - du -sh .
  - cmake --install .
  - if [[ "${BUILD_TESTS_ONLY}" ]]; then ./components-tests --gtest_output="xml:components-tests.xml";
    fi
  - if [[ "${BUILD_TESTS_ONLY}" ]]; then ./openmw-tests --gtest_output="xml:openmw-tests.xml";
    fi
  - if [[ "${BUILD_TESTS_ONLY}" ]]; then ./openmw-cs-tests --gtest_output="xml:openmw-cs-tests.xml";
    fi
  - if [[ "${BUILD_TESTS_ONLY}" && ! "${BUILD_WITH_CODE_COVERAGE}" ]]; then ./openmw_detournavigator_navmeshtilescache_benchmark;
    fi
  - if [[ "${BUILD_TESTS_ONLY}" && ! "${BUILD_WITH_CODE_COVERAGE}" ]]; then ./openmw_esm_refid_benchmark;
    fi
  - if [[ "${BUILD_TESTS_ONLY}" && ! "${BUILD_WITH_CODE_COVERAGE}" ]]; then ./openmw_settings_access_benchmark;
    fi
  - ccache -svv
  - df -h
  - if [[ "${BUILD_WITH_CODE_COVERAGE}" ]]; then ~/.local/bin/gcovr --xml-pretty --exclude-unreachable-branches
    --gcov-ignore-parse-errors=negative_hits.warn_once_per_file --print-summary --root
    "${CI_PROJECT_DIR}" -j $(nproc) -o ../coverage.xml; fi
  - ls | grep -v -e '^extern$' -e '^install$' -e '^components-tests.xml$' -e '^openmw-tests.xml$'
    -e '^openmw-cs-tests.xml$' | xargs -I '{}' rm -rf './{}'
  - cd ..
  - df -h
  - du -sh build/
  - du -sh build/install/
  - du -sh apt-cache/
  - du -sh ccache/
  stage: build
  variables:
    CMAKE_EXE_LINKER_FLAGS: -fuse-ld=mold
    OPENMW_CXX_FLAGS: -Werror -Werror=implicit-fallthrough
