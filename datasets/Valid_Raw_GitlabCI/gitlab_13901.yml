.Ubuntu_Clang_Tidy_Base:
  artifacts:
    expire_in: 12h
    paths:
    - build/
  before_script:
  - CI/install_debian_deps.sh clang clang-tidy openmw-deps openmw-deps-dynamic
  cache:
    key: Ubuntu_Clang_Tidy.ubuntu_24.04.v2
  extends: Ubuntu_Clang
  rules:
  - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  - if: $CI_PIPELINE_SOURCE == "push" && $CI_PROJECT_ID != "7107382"
  script:
  - mkdir -pv "${CCACHE_DIR}"
  - ccache -z -M "${CCACHE_SIZE}"
  - CI/before_script.linux.sh
  - mkdir -p build/extern build/apps/launcher build/apps/opencs build/apps/wizard
  - cp extern/.clang-tidy build/extern/
  - cp extern/.clang-tidy build/apps/launcher/
  - cp extern/.clang-tidy build/apps/opencs/
  - cp extern/.clang-tidy build/apps/wizard/
  - cd build
  - find . -name *.o -exec touch {} \;
  - cmake --build . -- -j $(nproc) ${BUILD_TARGETS}
  - ccache -svv
  timeout: 3h
  variables:
    CCACHE_BASEDIR: $CI_PROJECT_DIR
    CCACHE_DIR: $CI_PROJECT_DIR/ccache
    CI_CLANG_TIDY: 1
    CMAKE_BUILD_TYPE: Debug
    CMAKE_CXX_FLAGS_DEBUG: -O0
