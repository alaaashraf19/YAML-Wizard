before_script:
- apt-get update -yqq
- apt-get install gnupg -yqq
- curl -sL https://deb.nodesource.com/setup_8.x | bash -
- apt-get install git nodejs libcurl4-gnutls-dev libicu-dev libmcrypt-dev libvpx-dev
  libjpeg-dev libpng-dev libxpm-dev zlib1g-dev libfreetype6-dev libxml2-dev libexpat1-dev
  libbz2-dev libgmp3-dev libldap2-dev unixodbc-dev libpq-dev libsqlite3-dev libaspell-dev
  libsnmp-dev libpcre3-dev libtidy-dev -yqq
- docker-php-ext-install mbstring pdo_mysql curl json intl gd xml zip bz2 opcache
- pecl install xdebug
- docker-php-ext-enable xdebug
- curl -sS https://getcomposer.org/installer | php
- php composer.phar install
- npm install
- cp .env.testing .env
- npm run dev
- php artisan key:generate
- php artisan config:cache
- php artisan migrate
- php artisan db:seed
cache:
  paths:
  - vendor/
  - node_modules/
image: php:latest
integration-backend:
  script:
  - php vendor/bin/phpunit --testsuite=Feature --coverage-text --colors=never
  stage: integration
services:
- mariadb:10
stages:
- test
- integration
- deploy
test-backend:
  script:
  - php vendor/bin/phpunit --testsuite=Unit --coverage-text --colors=never
  stage: test
test-frontend:
  script:
  - npm test
  stage: test
variables:
  MYSQL_DATABASE: kommunalcrowd_platfrom
  MYSQL_ROOT_PASSWORD: secret
