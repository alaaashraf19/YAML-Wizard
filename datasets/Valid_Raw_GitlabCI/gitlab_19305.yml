.clang-tidy:
  artifacts:
    expire_in: 1 month
    paths:
    - build/warnings/
    - ci/
    when: always
  image: ubuntu:24.04
  interruptible: true
  script:
  - apt-get update -q
  - apt-get -q install -y --no-install-recommends >/dev/null ca-certificates clang-14
    clang-tidy-14 file cmake make git tcsh libconfig-dev libelf-dev libgcrypt-dev
    libgpg-error-dev libgpgme11-dev libicu-dev libncurses-dev libssl-dev moreutils
    shellcheck zlib1g-dev libreadline-dev gawk libjansson4 libjansson-dev
  - ci/build.sh
  stage: build
.docker-create:
  only:
  - master@YottaDB/DB/YDB
  script:
  - docker build --platform=${PLATFORM} ${ARGS} --provenance=false --pull -t yottadb/${REPO}:${DOCKERHUBTAG}
    -f ${DOCKERFILE} .
  - echo "$HUB_PASSWORD" | docker login --password-stdin -u "$HUB_USERNAME"
  - docker push yottadb/${REPO}:${DOCKERHUBTAG}
  - echo -e "FROM yottadb/${REPO}:${DOCKERHUBTAG}\n ENTRYPOINT []" > BareDockerfile
  - docker build --platform=${PLATFORM} --provenance=false --pull -t yottadb/${REPO}-base:${DOCKERHUBTAG}
    -f BareDockerfile .
  - docker push yottadb/${REPO}-base:${DOCKERHUBTAG}
  stage: docker-create
.docker-create-aarch64:
  extends: .docker-create
  tags:
  - aarch64
  variables:
    DOCKERHUBTAG: latest-master-aarch64
    PLATFORM: linux/aarch64
.docker-create-aarch64-release:
  extends: .docker-create
  only:
  - tags
  tags:
  - aarch64
  variables:
    DOCKERHUBTAG: latest-aarch64
    PLATFORM: linux/aarch64
.docker-create-amd64:
  extends: .docker-create
  tags:
  - amd64
  variables:
    DOCKERHUBTAG: latest-master-amd64
    PLATFORM: linux/amd64
.docker-create-amd64-release:
  extends: .docker-create
  only:
  - tags
  tags:
  - amd64
  variables:
    DOCKERHUBTAG: latest-amd64
    PLATFORM: linux/amd64
.docker-manifest:
  only:
  - master@YottaDB/DB/YDB
  script:
  - echo "$HUB_PASSWORD" | docker login --password-stdin -u "$HUB_USERNAME"
  - docker pull --platform=linux/amd64 yottadb/${REPO}:${DOCKERHUBTAG}-amd64
  - docker pull --platform=linux/aarch64 yottadb/${REPO}:${DOCKERHUBTAG}-aarch64
  - docker manifest create yottadb/${REPO}:${DOCKERHUBTAG} yottadb/${REPO}:${DOCKERHUBTAG}-amd64
    yottadb/${REPO}:${DOCKERHUBTAG}-aarch64
  - docker manifest inspect yottadb/${REPO}:${DOCKERHUBTAG}
  - docker manifest push yottadb/${REPO}:${DOCKERHUBTAG}
  - docker pull --platform=linux/amd64 yottadb/${REPO}-base:${DOCKERHUBTAG}-amd64
  - docker pull --platform=linux/aarch64 yottadb/${REPO}-base:${DOCKERHUBTAG}-aarch64
  - docker manifest create yottadb/${REPO}-base:${DOCKERHUBTAG} yottadb/${REPO}-base:${DOCKERHUBTAG}-amd64
    yottadb/${REPO}-base:${DOCKERHUBTAG}-aarch64
  - docker manifest inspect yottadb/${REPO}-base:${DOCKERHUBTAG}
  - docker manifest push yottadb/${REPO}-base:${DOCKERHUBTAG}
  stage: docker-manifest
  tags:
  - amd64
.docker-manifest-commit:
  extends: .docker-manifest
  stage: docker-manifest
  variables:
    DOCKERHUBTAG: latest-master
.docker-manifest-release:
  extends: .docker-manifest
  only:
  - tags
  stage: docker-manifest
  variables:
    DOCKERHUBTAG: latest
.docker-manifest-tag-with-version:
  only:
  - tags
  script:
  - echo "$HUB_PASSWORD" | docker login --password-stdin -u "$HUB_USERNAME"
  - docker buildx imagetools create -t yottadb/${REPO}:$(grep YDB_ZYRELEASE sr_*/release_name.h
    | grep -o '\(r[0-9.]*\)' | grep -v '^r$' | sort -u) yottadb/${REPO}:latest
  stage: docker-tag
build-test:
  artifacts:
    expire_in: 1 month
    paths:
    - testarea1/
    - testarea2/
    - testarea3/
    - pipeline-test-ydb-build.out
    - coverage.xml
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    when: always
  image:
    entrypoint:
    - ''
    name: registry.gitlab.com/yottadb/db/ydbtest
  script:
  - /usr/library/gtm_test/T999/docker/pipeline-test-ydb.csh
  stage: build
clang-tidy-amd64:
  extends: .clang-tidy
commit-verify:
  before_script:
  - apt-get update -qq && apt-get install -y -qq git wget gnupg
  image: ubuntu:24.04
  interruptible: true
  script:
  - ci/commit_verify.sh ci/needs_copyright.sh https://gitlab.com/YottaDB/DB/YDB
  stage: build
