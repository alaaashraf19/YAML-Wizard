before_script:
- apt-get update
- apt-get install -y sshpass
- git config --global url."https://".insteadOf git://
- export PATH=$PATH:node_modules/.bin
- npm install --unsafe-perm
- ls -la
- ls node_modules/
build:
  artifacts:
    expire_in: 1 week
    paths:
    - dist
  script:
  - ng build
  stage: build
cache:
  key: $CI_COMMIT_REF_NAME
  paths:
  - node_modules/
development:
  dependencies:
  - build
  environment: development
  only:
  - master
  script:
  - echo "DEPLOY DEVELOPMENT"
  - echo "$SSH_PRIVATE_KEY"
  - ls -la
  - ls node_modules/
  - sshpass -e scp -o StrictHostKeyChecking=no -r dist $SERVER_USER@$SERVER_HOST:/opt/personal-dashboard/current/
  stage: deploy
image: node:8
production:
  dependencies:
  - build
  environment: production
  only:
  - production
  script: echo "DEPLOY PRODUCTION"
  stage: deploy
staging:
  dependencies:
  - build
  environment: staging
  only:
  - staging
  script: echo "DEPLOY STAGING"
  stage: deploy
test:
  artifacts:
    expire_in: 1 week
    paths:
    - coverage/*
  script:
  - echo "RUNNING TESTS"
  - ng test --code-coverage --single-run
  stage: test
variables:
  GIT_SSL_NO_VERIFY: 'true'
  SSHPASS: $SERVER_PASSWORD
