.setup_branch: *id001
.snap_publish_template:
  artifacts:
    paths:
    - ${CI_PROJECT_DIR}/cache/buildstream/logs
    when: always
  rules:
  - if: $CI_PIPELINE_SOURCE == "schedule"
    when: never
  - if: $CI_COMMIT_TAG || $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  script:
  - '[ -n "${SNAPCRAFT_LOGIN_FILE}" ]

    '
  - '[ -n "${SNAP_RELEASE}" ]

    '
  - make export-snap
  - mkdir -p ".snapcraft/"
  - echo "${SNAPCRAFT_LOGIN_FILE}" | base64 --decode --ignore-garbage > ".snapcraft/snapcraft.cfg"
  - "push() {\n  if ! snapcraft push \"${1}\" --release \"${SNAP_RELEASE}\" 2>&1 |\
    \ tee output.log; then\n    cmp -s <(tail -n2 output.log) - <<EOF\nPlease check\
    \ the errors and some hints below:\n  - (NEEDS REVIEW) type 'base' not allowed\n\
    EOF\n  fi\n}\nfailed=false\nfor snap in platform sdk glxinfo vulkaninfo clinfo\
    \ vainfo; do\n  if ! push \"snap/${snap}.snap\"; then\n    failed=true\n  fi\n\
    done\n[ \"${failed}\" == false ]\n"
  stage: publish
.vm_efi_image_template:
