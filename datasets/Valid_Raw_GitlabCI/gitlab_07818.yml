before_script:
- ulimit -n 1048576
- export PATH=~/.local/bin:${PATH}
- 'if cp --reflink=always README.md .reflink-test; then

  echo Reflinks supported, disabling buildbox-fuse

  chmod -x /usr/bin/buildbox-fuse

  rm .reflink-test

  fi

  '
- 'mkdir -p ~/.config

  echo $CACHE_TOKEN > ~/.config/freedesktop-sdk.token

  [ -S /run/casd/casd.sock ] && export LOCAL_CAS=true

  python3 -mmako.cmd templates/buildstream.conf --output-file ~/.config/buildstream.conf

  cat ~/.config/buildstream.conf

  '
- 'source utils/publisher_env.sh

  '
bootstrap_ppc64:
  allow_failure: true
  extends:
  - .bootstrap_template
  - .builder-ppc64le
  variables:
    ARCH: ppc64
check_mirrors:
  allow_failure: true
  before_script:
  - mkdir -p ~/.config
  - "cat > ~/.config/buildstream.conf << EOF\n# Get a lot of output in case of errors\n\
    logging:\n  message-format: '[%{elapsed}][%{key}][%{element}] %{action} %{message}'\n\
    \  error-lines: 80\nscheduler:\n  network-retries: 4\n  on-error: continue\n#\
    \ We want to test that everything is mirrored\nfetch:\n  source: mirrors\nsource-caches:\n\
    \  override-project-caches: true\nEOF\n"
  rules:
  - if: $CI_PIPELINE_SOURCE == "schedule" && $SCHEDULE_TASK == "daily"
  script:
  - "${BST} source fetch --deps all flatpak-release-repo.bst components.bst \\\n \
    \      components/rust-stage1-{x86_64,i686,aarch64,powerpc64le}.bst \\\n     \
    \  oci/layers/{flatpak,debug,platform,sdk}.bst\n"
  stage: update
  timeout: 1h
