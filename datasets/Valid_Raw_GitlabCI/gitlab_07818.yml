.check-snap:
  allow_failure: true
  artifacts:
    paths:
    - ${CI_PROJECT_DIR}/cache/buildstream/logs
    when: always
  rules:
  - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    when: manual
  script:
  - make export-snap
  - python3 utils/parse_review.py snap/sdk.snap
  - python3 utils/parse_review.py snap/platform.snap
  - python3 utils/parse_review.py snap/glxinfo.snap
  - python3 utils/parse_review.py snap/vulkaninfo.snap
  - python3 utils/parse_review.py snap/clinfo.snap
  - python3 utils/parse_review.py snap/vainfo.snap
  stage: snap
.check_snap_i686:
  extends:
  - .check-snap
  - .builder-i686
.check_snap_x86_64:
  extends:
  - .check-snap
  - .builder-x86_64
.check_update_elements:
  interruptible: false
  script:
  - "if [ \"${CI_COMMIT_REF_NAME}\" = \"${CI_DEFAULT_BRANCH}\" ] && [ -n \"${SKIP_DAY_NUM}\"\
    \ ]; then\n  if [ \"$(date +%u)\" -eq \"${SKIP_DAY_NUM}\" ]; then\n    echo \"\
    Skipping job on day ${SKIP_DAY_NUM} of the week\"\n    exit 0\n  fi\nfi\n"
  - &id001
    - git remote set-url origin "https://gitlab-ci-token:${FREEDESKTOP_API_KEY}@gitlab.com/freedesktop-sdk/freedesktop-sdk.git"
    - git config user.name "freedesktop_sdk_updater"
    - git config user.email "freedesktop_sdk_updater@libreml.com"
    - git branch -f "${CI_COMMIT_REF_NAME}" "origin/${CI_COMMIT_REF_NAME}"
    - git fetch --prune --quiet
    - cleanup_leftover_branches.py
    - python utils/assign_marge.py
  - "case \"${CI_COMMIT_REF_NAME}\" in\n  \"${CI_DEFAULT_BRANCH}\")\n  ;;\n  release/*)\n\
    \  ;;\n  *)\n    false\n  ;;\nesac\n"
  - "if [ \"$SCHEDULE_TASK\" = \"daily\" ] && [ \"$STABLE_ABI\" = \"true\" ]; then\n\
    \    TRACK_ELEMENTS=\"$TRACK_ELEMENTS abi/reference-abi.bst\"\nfi\nGITLAB_TOKEN=$FREEDESKTOP_API_KEY\
    \ auto_updater --verbose \\\n--base_branch \"${CI_COMMIT_REF_NAME}\" \\\n--nobuild\
    \ \\\n--overwrite \\\n--push \\\n--create_mr \\\n--shuffle-branches \\\n--gitlab_project=\"\
    freedesktop-sdk/freedesktop-sdk\" \\\n--max_merge_requests=${MAX_MERGE_REQUESTS}\
    \ \\\n--on_track_error continue \\\n$EXTRA_TRACK_ARGS \\\n$TRACK_ELEMENTS\n"
  stage: update
  variables:
    GIT_SUBMODULE_STRATEGY: none
.desktop_efi_vm_image_loongarch64:
