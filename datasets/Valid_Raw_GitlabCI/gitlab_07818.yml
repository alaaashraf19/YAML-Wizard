  variables:
    VM_ARTIFACT_BOOT: vm/boot/virt.bst
    VM_ARTIFACT_FILESYSTEM: vm/desktop/virt.bst
  when: manual
.docker_publish_template:
  artifacts:
    paths:
    - ${CI_PROJECT_DIR}/cache/buildstream/logs
    - docker-pushed-digests
    when: always
  retry: 2
  rules:
  - if: $CI_COMMIT_TAG && $CI_PIPELINE_SOURCE != "schedule"
  script:
  - '[ -n "${DOCKER_HUB_USER}" ]

    '
  - '[ -n "${DOCKER_HUB_PASSWORD}" ]

    '
  - '[ -n "${DOCKER_HUB_ADDRESS}" ]

    '
  - "OCI_IMAGES=(platform sdk debug flatpak toolbox)\nBST_ELEMENTS=$(printf 'oci/%q-oci.bst\
    \ ' ${OCI_IMAGES[@]})\n\n${BST} -o target_arch ${ARCH} build ${BST_ELEMENTS[@]}\n\
    for element in ${BST_ELEMENTS[@]}; do\n   ${BST} -o target_arch ${ARCH} artifact\
    \ checkout ${element} --tar - | podman load\ndone\n"
  - podman login -u "${DOCKER_HUB_USER}" -p "${DOCKER_HUB_PASSWORD}" "${DOCKER_HUB_ADDRESS}"
  - "set -eu\nfor name in ${OCI_IMAGES[@]}; do\n  full_name=freedesktopsdk/${name}\n\
    \  podman push ${full_name}:latest docker://docker.io/${full_name}:\"${DOCKER_VERSION}\"\
    -\"${ARCH}\" \\\n  --digestfile digest.txt\n  mkdir -p \"docker-pushed-digests/${DOCKER_VERSION}\"\
    \n  digest=$(<digest.txt)\n  echo \"${full_name}@${digest}\" \\\n      >\"docker-pushed-digests/${DOCKER_VERSION}/${name}-${ARCH}.txt\"\
    \ndone\n"
  stage: publish
.flatpak_template:
  artifacts:
    paths:
    - ${CI_PROJECT_DIR}/cache/buildstream/logs/**/*-build.*.log
    - ${CI_PROJECT_DIR}/cache/buildstream/logs/_casd
    - ${CI_PROJECT_DIR}/libabigail-tars
    when: always
  rules:
  - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  script:
  - test -x arch-test && arch-test
  - ./utils/validate_aliases.py include/_private/aliases.yml include/_private/mirrors.yml
  - "if [ \"${ARCH}\" != \"i686\" ];then\n  make build\nelse\n  make build-repo\n\
    fi\n"
  - make check-debuginfo
  - export FLATPAK_USER_DIR="${PWD}/tmp-flatpak"
  - "# https://github.com/flatpak/flatpak/issues/5045\nif [ \"${ARCH}\" = \"i686\"\
    \ ]; then\n  make export\nelse\n  make test-apps test-codecs test-ldd test-minimal-oci\n\
    fi\n"
  - "ABI_SKIP=$(git log -n 1 | grep -E \"\\[abi skip\\]|\\[skip abi\\]\" || true)\n\
    if [ \"${STABLE_ABI}\" != \"false\" ]; then\n  if [ -z \"${ABI_SKIP}\" ]; then\n\
    \    make check-abi\n  else\n    echo ABI check skipped\n  fi\nfi\n"
  stage: flatpak
.license_checker:
  artifacts:
    paths:
    - ${XDG_CACHE_HOME}/buildstream/logs
    - ${OUTPUT_DIR}
    when: always
  cache:
    key: license_checker
    paths:
    - ${WORK_DIR}
  extends:
  - .builder-aarch64
  needs: []
  rules:
  - if: $CI_PIPELINE_SOURCE == "schedule" && $SCHEDULE_TASK == "weekly"
  - when: never
  script:
  - '${BST} build ${TARGETS}

    bst_license_checker --deps "${DEPS}" -w ${WORK_DIR} -o ${OUTPUT_DIR} --ignorelist
    ${IGNORE_LIST} ${TARGETS}

    '
  stage: update
  variables:
    DEPS: all
    IGNORE_LIST: files/bst_license_checker_ignorelist
    OUTPUT_DIR: ${CI_PROJECT_DIR}/buildstream_license_checker_output
    TARGETS: manifests/release-url-manifest.bst
    WORK_DIR: ${CI_PROJECT_DIR}/buildstream_license_checker_working_directory
  when: manual
