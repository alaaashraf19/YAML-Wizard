weekly_update_combined:
  rules:
  - if: $CI_PIPELINE_SOURCE == "schedule" && $SCHEDULE_TASK == "weekly" && $CI_COMMIT_REF_NAME
      == $CI_DEFAULT_BRANCH
  script:
  - *id001
  - bst-single-updater --base-branch "$CI_DEFAULT_BRANCH" --element "$TRACK_ELEMENTS"
    --create-mr --skip-open-updates
  stage: update
  timeout: 1h
  variables:
    GITLAB_MR_BOT_USER_ID: '4969990'
    GIT_SUBMODULE_STRATEGY: none
    TRACK_ELEMENTS: track-elements.bst
weekly_update_elements:
  extends:
  - .check_update_elements
  rules:
  - if: $CI_PIPELINE_SOURCE == "schedule" && $SCHEDULE_TASK == "weekly" && $CI_COMMIT_BRANCH
      =~ /^release\/.*/
  timeout: 1h
  variables:
    EXTRA_TRACK_ARGS: --bstignore=/dev/null
    TRACK_ELEMENTS: track-elements-weekly.bst
workflow:
