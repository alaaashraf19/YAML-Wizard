.bootstrap_template:
  artifacts:
    paths:
    - ${CI_PROJECT_DIR}/cache/buildstream/logs
    when: always
  rules:
  - if: $CI_PIPELINE_SOURCE == "schedule"
    when: never
  - if: $CI_COMMIT_TAG || $CI_COMMIT_BRANCH =~ /^release\/.*/
    when: never
  - when: manual
  script:
  - make bootstrap
  stage: bootstrap
