publish_flatpak:
  after_script:
  - 'test -s publish_build.txt

    source utils/publisher_env.sh

    flat-manager-client purge "$(cat publish_build.txt)"

    '
  artifacts:
    paths:
    - ${CI_PROJECT_DIR}/cache/buildstream/logs
    when: always
  interruptible: false
  rules:
  - if: $CI_PIPELINE_SOURCE == "schedule"
    when: never
  - if: $CI_COMMIT_REF_PROTECTED == "true"
    start_in: 1 minute
    when: delayed
  script:
  - make export ARCH=x86_64 BOOTSTRAP_ARCH=x86_64
  - make export ARCH=i686 BOOTSTRAP_ARCH=x86_64
  - make export ARCH=aarch64 BOOTSTRAP_ARCH=aarch64
  - "case \"$RELEASES_SERVER_ADDRESS\" in\n  https://hub.flathub.org/)\n    for ref\
    \ in $(ostree --repo=repo refs --list); do\n      case \"${ref}\" in\n       \
    \ */*/ppc64le/*) ;&\n        */*/i386/*)\n          echo \"Deleting ${ref}\"\n\
    \          ostree --repo=repo refs --delete \"${ref}\"\n          ;;\n       \
    \ */org.freedesktop.Sdk*/*/*) ;&\n        */org.freedesktop.Platform*/*/*)\n \
    \         echo \"Keeping ${ref}\"\n          ;;\n        */*/*/*)\n          echo\
    \ \"Deleting ${ref}\"\n          ostree --repo=repo refs --delete \"${ref}\"\n\
    \          ;;\n      esac\n    done\n    ;;\n  https://releases.freedesktop-sdk.io/)\n\
    \    for ref in $(ostree --repo=repo refs --list); do\n      case \"${ref}\" in\n\
    \        */*/i386/*)\n          echo \"Deleting ${ref}\"\n          ostree --repo=repo\
    \ refs --delete \"${ref}\"\n          ;;\n        */*/*/*)\n          echo \"\
    Keeping ${ref}\"\n          ;;\n      esac\n    done\n    ;;\n  *)\n    false\n\
    \    ;;\nesac\n"
  - python utils/validate_repo.py --path repo
  - flatpak build-update-repo --generate-static-deltas repo
  - flat-manager-client -v create "$RELEASES_SERVER_ADDRESS" "${RELEASE_CHANNEL}"
    --build-log-url ${CI_PIPELINE_URL} > publish_build.txt
  - flat-manager-client push "$(cat publish_build.txt)" repo --build-log-url ${CI_PIPELINE_URL}
  - "if [ \"${EXPIRED}\" = \"1\" ]; then\n  EOL_MESSAGE=$(utils/eol-message.py ${RUNTIME_VERSION})\n\
    \  flat-manager-client -v commit --wait \"$(cat publish_build.txt)\" \\\n    --end-of-life\
    \ \"${EOL_MESSAGE}\"\nelse\n  flat-manager-client -v commit --wait \"$(cat publish_build.txt)\"\
    \nfi\n"
  - flat-manager-client -v publish --wait-update "$(cat publish_build.txt)"
  stage: publish
publish_gitlab_release:
  after_script: []
  allow_failure: true
  before_script: []
  rules:
  - if: $CI_COMMIT_TAG && $CI_COMMIT_REF_PROTECTED == "true" && $CI_PIPELINE_SOURCE
      != "schedule"
  script:
  - "git tag -l \"$CI_COMMIT_TAG\" --format='%(contents)' \\\n  | sed '/^-----BEGIN/,$d'\
    \ \\\n  | sed 's/\"/\\\\\"/g' \\\n  > tag_message.txt\n"
  - glab auth login --hostname "$CI_SERVER_HOST" --job-token "$CI_JOB_TOKEN"
  - "glab release create \"$CI_COMMIT_TAG\" --name \"$CI_COMMIT_TAG\" \\\n  --notes-file\
    \ tag_message.txt --ref \"$CI_COMMIT_SHA\"\n"
  stage: publish
  timeout: 10 minutes
  variables:
    GLAB_CHECK_UPDATE: 'false'
    GLAB_SEND_TELEMETRY: 'false'
publish_i686_tar:
  extends:
  - .publish_tar_template
  - .builder-i686
  needs: []
publish_snap_aarch64:
