before_script:
- npm install
cache:
  paths:
  - node_modules/
image: node:latest
pages:
  artifacts:
    paths:
    - public
  only:
  - master
  script:
  - npm run jsdoc
  - npm run build
  - mkdir -p .public/docs
  - cp -r docs .public/docs
  - cp -r build .public
  - mv public react_public
  - mv .public public
  stage: deploy
test:
  script:
  - npm run test
  stage: test
