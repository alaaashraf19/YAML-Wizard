.if-post-deploy-pipeline:
  if: ($CI_PIPELINE_SOURCE == "pipeline" || $CI_PIPELINE_SOURCE == "trigger") && $POSTDEPLOY_PIPELINE
    == "true"
.post_deploy_migrations:metrics:environment-lock-state:
  allow_failure: true
  extends:
  - .common-job-setup
  - .mimir-query-auth
  resource_group: set-environment-locked-state-metric-$DEPLOY_ENVIRONMENT
  rules:
  - if: ($CI_PIPELINE_SOURCE == "pipeline" || $CI_PIPELINE_SOURCE == "trigger") &&
      $POSTDEPLOY_PIPELINE == "true"
  script:
  - bundle exec rake "metrics:environment_lock_state[$DEPLOY_ENVIRONMENT, $LOCK_STATE]"
  tags:
  - release
.post_deploy_migrations:metrics:environment-state:
  allow_failure: true
  extends:
  - .common-job-setup
  - .mimir-query-auth
  resource_group: set-environment-state-metric-$DEPLOY_ENVIRONMENT
  rules:
  - if: ($CI_PIPELINE_SOURCE == "pipeline" || $CI_PIPELINE_SOURCE == "trigger") &&
      $POSTDEPLOY_PIPELINE == "true"
  script:
  - bundle exec rake "metrics:environment_state[$DEPLOY_ENVIRONMENT, $ENV_STATE]"
  tags:
  - release
.post_deploy_notify_base:
  allow_failure: true
  extends:
  - .with-bundle
  - .common-ci-tokens
  script:
  - bundle exec rake 'post_deploy_migrations:notify'
  variables:
    DEPLOY_USER: deployer
    TRIGGER_REF: master
.post_deploy_notify_failure:
  extends:
  - .post_deploy_notify_base
  - .common-ci-tokens
  rules:
  - if: ($CI_PIPELINE_SOURCE == "pipeline" || $CI_PIPELINE_SOURCE == "trigger") &&
      $POSTDEPLOY_PIPELINE == "true"
    when: on_failure
.post_deploy_notify_start:
  extends:
  - .post_deploy_notify_base
  - .common-ci-tokens
  rules:
  - if: ($CI_PIPELINE_SOURCE == "pipeline" || $CI_PIPELINE_SOURCE == "trigger") &&
      $POSTDEPLOY_PIPELINE == "true"
    when: on_success
.post_deploy_notify_success:
  extends:
  - .post_deploy_notify_base
  - .common-ci-tokens
  rules:
  - if: ($CI_PIPELINE_SOURCE == "pipeline" || $CI_PIPELINE_SOURCE == "trigger") &&
      $POSTDEPLOY_PIPELINE == "true"
    when: on_success
.post_deploy_track_base:
  allow_failure: true
  extends:
  - .with-bundle
  - .common-ci-tokens
  script:
  - bundle exec rake 'post_deploy_migrations:track_deployment'
.post_deploy_track_failure:
  extends:
  - .post_deploy_track_base
  - .common-ci-tokens
  rules:
  - if: ($CI_PIPELINE_SOURCE == "pipeline" || $CI_PIPELINE_SOURCE == "trigger") &&
      $POSTDEPLOY_PIPELINE == "true"
    when: on_failure
  variables:
    DEPLOY_STATUS: failed
.post_deploy_track_running:
  extends:
  - .post_deploy_track_base
  - .common-ci-tokens
  rules:
  - if: ($CI_PIPELINE_SOURCE == "pipeline" || $CI_PIPELINE_SOURCE == "trigger") &&
      $POSTDEPLOY_PIPELINE == "true"
    when: on_success
  variables:
    DEPLOY_STATUS: running
.post_deploy_track_success:
  extends:
  - .post_deploy_track_base
  - .common-ci-tokens
  rules:
  - if: ($CI_PIPELINE_SOURCE == "pipeline" || $CI_PIPELINE_SOURCE == "trigger") &&
      $POSTDEPLOY_PIPELINE == "true"
    when: on_success
  variables:
    DEPLOY_STATUS: success
fetch-migrations-artifact:
  artifacts:
    reports:
      dotenv: PENDING_POST_DEPLOY_MIGRATIONS
  needs:
  - fetch-post-migrations
  - artifacts: true
    job: gprd:fetch-pending-migrations
    project: gitlab-com/gl-infra/k8s-workloads/gitlab-com
    ref: master
  rules:
  - if: ($CI_PIPELINE_SOURCE == "pipeline" || $CI_PIPELINE_SOURCE == "trigger") &&
      $POSTDEPLOY_PIPELINE == "true"
  script:
  - echo "Fetching artifacts from downstream pipeline"
  - echo "PENDING_POST_DEPLOY_MIGRATIONS=$(cat pending-migrations.json)" >> PENDING_POST_DEPLOY_MIGRATIONS
  - cat PENDING_POST_DEPLOY_MIGRATIONS
  stage: post_deploy:prepare
fetch-post-migrations:
  rules:
  - if: ($CI_PIPELINE_SOURCE == "pipeline" || $CI_PIPELINE_SOURCE == "trigger") &&
      $POSTDEPLOY_PIPELINE == "true"
  stage: post_deploy:prepare
  trigger:
    project: gitlab-com/gl-infra/deployer
    strategy: depend
  variables:
    FETCH_PENDING_MIGRATIONS: 'true'
notify_failure:post_deploy_migrations:gprd:
  extends: .post_deploy_notify_failure
  needs:
  - notify_start:post_deploy_migrations:gprd
  - post_deploy_migrations:gprd
  stage: post_deploy:finish:production
  variables:
    DEPLOY_ENVIRONMENT: gprd
notify_failure:post_deploy_migrations:gstg:
  extends: .post_deploy_notify_failure
  needs:
  - notify_start:post_deploy_migrations:gstg
  - post_deploy_migrations:gstg
  stage: post_deploy:finish:staging
  variables:
    DEPLOY_ENVIRONMENT: gstg
notify_failure:qa:post_deploy_migrations:gstg:
  extends: .post_deploy_notify_failure
  needs:
  - qa:smoke:post_deploy_migrations:gstg
  script:
  - bundle exec rake 'post_deploy_migrations:qa_notify'
  stage: post_deploy:finish:staging
  variables:
    DEPLOY_ENVIRONMENT: gstg
notify_start:post_deploy_migrations:gprd:
  extends:
  - .post_deploy_notify_start
  needs:
  - notify_success:post_deploy_migrations:gstg
  stage: post_deploy:start:production
  variables:
    DEPLOY_ENVIRONMENT: gprd
notify_start:post_deploy_migrations:gstg:
  extends:
  - .post_deploy_notify_start
  needs:
  - post_deploy_migrations:prepare
  stage: post_deploy:start:staging
  variables:
    DEPLOY_ENVIRONMENT: gstg
notify_success:post_deploy_migrations:gprd:
  extends: .post_deploy_notify_success
  needs:
  - notify_start:post_deploy_migrations:gprd
  - post_deploy_migrations:gprd
  stage: post_deploy:finish:production
  variables:
    DEPLOY_ENVIRONMENT: gprd
notify_success:post_deploy_migrations:gstg:
  extends: .post_deploy_notify_success
  needs:
  - notify_start:post_deploy_migrations:gstg
  - qa:smoke:post_deploy_migrations:gstg
  stage: post_deploy:finish:staging
  variables:
    DEPLOY_ENVIRONMENT: gstg
post_deploy_migrations:gprd:
  needs:
  - notify_success:post_deploy_migrations:gstg
  rules:
  - if: ($CI_PIPELINE_SOURCE == "pipeline" || $CI_PIPELINE_SOURCE == "trigger") &&
      $POSTDEPLOY_PIPELINE == "true"
  stage: post_deploy:start:production
  trigger:
    project: gitlab-com/gl-infra/deployer
    strategy: depend
  variables:
    CHECKMODE: $TEST
    DEPLOY_ENVIRONMENT: gprd
    DEPLOY_USER: deployer
    POSTDEPLOY_MIGRATIONS: 'true'
    TRIGGER_REF: master
post_deploy_migrations:gstg:
  needs:
  - post_deploy_migrations:prepare
  rules:
  - if: ($CI_PIPELINE_SOURCE == "pipeline" || $CI_PIPELINE_SOURCE == "trigger") &&
      $POSTDEPLOY_PIPELINE == "true"
  stage: post_deploy:start:staging
  trigger:
    project: gitlab-com/gl-infra/deployer
    strategy: depend
  variables:
    CHECKMODE: $TEST
    DEPLOY_ENVIRONMENT: gstg
    DEPLOY_USER: deployer
    POSTDEPLOY_MIGRATIONS: 'true'
    TRIGGER_REF: master
post_deploy_migrations:metrics:environment-lock-state:failed:gprd:
  extends:
  - .post_deploy_migrations:metrics:environment-lock-state
  - .common-ci-tokens
  needs:
  - post_deploy_migrations:gprd
  rules:
  - if: ($CI_PIPELINE_SOURCE == "pipeline" || $CI_PIPELINE_SOURCE == "trigger") &&
      $POSTDEPLOY_PIPELINE == "true"
    when: on_failure
  stage: post_deploy:finish:production
  variables:
    DEPLOY_ENVIRONMENT: gprd
    LOCK_STATE: locked_post_deploy_migration_failed
