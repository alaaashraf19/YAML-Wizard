post_deploy_migrations:metrics:environment-state:start:gprd:
  extends:
  - .post_deploy_migrations:metrics:environment-state
  stage: post_deploy:start:production
  variables:
    DEPLOY_ENVIRONMENT: gprd
    ENV_STATE: start
post_deploy_migrations:metrics:environment-state:start:gstg:
  extends:
