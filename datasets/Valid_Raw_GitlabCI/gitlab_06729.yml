ci:create:
  before_script:
  - docker login -u gitlab-ci-token -p $CI_BUILD_TOKEN registry.gitlab.com
  cache:
    key: ${CI_JOB_NAME}-${CI_COMMIT_REF_SLUG}
    paths:
    - docker/.previous-hash
  image: docker:latest
  script: "cd docker\nif [ \"false\" = $(./update-required.sh) ]; then\n  echo \"\
    Skipping docker build...\"\n  exit 0\nelse\n  echo \"New build required with hash...\"\
    \n  cat .previous-hash\nfi\ndocker build -t registry.gitlab.com/devlife-apps/connect2sql/ci\
    \ .\ndocker push registry.gitlab.com/devlife-apps/connect2sql/ci\n"
  services:
  - docker:dind
  stage: ci
package:debug:
  artifacts:
    expire_in: 1 week
    name: ${CI_COMMIT_SHA}-debug
    paths:
    - app/build/outputs/apk/debug/app-debug.apk
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
    - ${GRADLE_USER_HOME}/caches/
    - ${GRADLE_USER_HOME}/wrapper/
  dependencies:
  - ci:create
  image: registry.gitlab.com/devlife-apps/connect2sql/ci
  script:
  - ./gradlew --no-daemon --stacktrace :app:assembleDebug
  stage: package
package:release:
  artifacts:
    name: ${CI_COMMIT_SHA}-release
    paths:
    - app/build/outputs/apk/release/app-release.apk
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
    - ${GRADLE_USER_HOME}/caches/
    - ${GRADLE_USER_HOME}/wrapper/
  dependencies:
  - ci:create
  image: registry.gitlab.com/devlife-apps/connect2sql/ci
  script:
  - echo "apiSecret=${FABRIC_API_SECRET}" > app/fabric.properties
  - ./gradlew --no-daemon --stacktrace :app:assembleRelease
  stage: package
prepublish:tag:
  before_script:
  - bundle install --path fastlane/bundle
  - eval $(ssh-agent -s)
  - ssh-add <(echo "$GIT_SSH_PRIV_KEY")
  - git config --global user.email "$GIT_USER_EMAIL"
  - git config --global user.name "$GIT_USER_NAME"
  - git remote set-url origin "git@gitlab.com:${CI_PROJECT_PATH}.git"
  - mkdir -p ~/.ssh
  - ssh-keyscan -t rsa gitlab.com >> ~/.ssh/known_hosts
  - git checkout $CI_COMMIT_REF_NAME
  dependencies:
  - package:release
  except:
    refs:
    - tags
  image: registry.gitlab.com/devlife-apps/connect2sql/ci
  only:
  - master
  script:
  - echo "${GPS_KEY}" > app/gps-key.json
  - bundle exec fastlane prep_release
  stage: prepublish
  when: manual
publish:beta:
  before_script:
  - bundle install --path fastlane/bundle
  dependencies:
  - package:release
  image: registry.gitlab.com/devlife-apps/connect2sql/ci
  only:
  - tags
  script:
  - echo "${GPS_KEY}" > app/gps-key.json
  - bundle exec fastlane publish_beta gps_key_path:'app/gps-key.json' apk_path:'app/build/outputs/apk/release/app-release.apk'
  stage: publish
stages:
- ci
- validation
- package
- prepublish
- publish
validation:lint:
  artifacts:
    name: validation-lint-reports
    paths:
    - app/build/reports/
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
    - ${GRADLE_USER_HOME}/caches/
    - ${GRADLE_USER_HOME}/wrapper/
  dependencies:
  - ci:create
  image: registry.gitlab.com/devlife-apps/connect2sql/ci
  script:
  - ./gradlew --no-daemon --stacktrace :app:lint :app:detektCheck
  stage: validation
variables:
  GRADLE_USER_HOME: ${CI_PROJECT_DIR}/.gradle-home
