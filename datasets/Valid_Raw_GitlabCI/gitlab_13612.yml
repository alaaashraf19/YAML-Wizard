.linux_set_path:
  before_script:
  - export PATH=$(pwd)/bin${PATH:+:$PATH}
  tags:
  - linux
.windows_set_path:
  before_script: &id001
  - set PATH=%CD%\bin;%PATH%
  tags:
  - windows
build-windows:
  artifacts:
    expire_in: 1 week
    paths:
    - bin\nim.exe
    - bin\nimd.exe
    - compiler\nim.exe
    - koch.exe
  script:
  - ci\build.bat
  stage: build
  tags:
  - windows
deploy-windows:
  artifacts:
    expire_in: 1 week
    paths:
    - build/*.exe
    - build/*.zip
  script:
  - koch.exe winrelease
  stage: deploy
  tags:
  - windows
  - fast
image: ubuntu:16.04
stages:
- pre-build
- build
- deploy
- test
test-windows:
  before_script: *id001
  script:
  - call ci\deps.bat
  - nim c --taintMode:on tests\testament\tester
  - tests\testament\tester.exe --pedantic all
  stage: test
  tags:
  - windows
  - fast
