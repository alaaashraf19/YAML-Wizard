build menuconfig:
  script:
  - export TERMINFO=/usr/lib/terminfo
  - echo $TERMINFO
  - sudo freedombone menuconfig --noninteractive your-test-domain-name.net
  stage: build
build menuconfig-onion:
  script:
  - export TERMINFO=/usr/lib/terminfo
  - echo $TERMINFO
  - sudo freedombone menuconfig-onion --noninteractive
  stage: build
build qemu64:
