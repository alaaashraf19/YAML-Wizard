build:
  artifacts:
    paths:
    - screens*
    - assets/screens.desktop
  before_script:
  - yes | pacman -Syyu || true
  - yes | pacman -S pkg-config make cmake clang gtk3 gtkmm3 libpng libx11 curl gstreamermm
    glibmm || true
  cache:
    paths:
    - src/*.o
  script:
  - cmake -G "Unix Makefiles" -DCMAKE_BUILD_TYPE=Release
  - make
  stage: build
image: base/archlinux
variables:
  GIT_SUBMODULE_STRATEGY: recursive
