before_script:
- apk add --update --no-cache build-base cmake curl git rust cargo py-pip
- pip --cache-dir=.pip install -U pip
- pip --cache-dir=.pip install transifex-client
cache:
  key: $CI_COMMIT_REF_SLUG
  paths:
  - deps
  - _build
  - .pip
docs:
  artifacts:
    paths:
    - public
  only:
  - develop
  script:
  - make manual-deps
  - MIX_ENV=dev mix deps.get
  - MIX_ENV=dev mix docs
  - mv doc public
  - pip --cache-dir=.pip install awscli
  - if [ ! -z "$DOCS_STAGING_BUCKET" ]; then aws s3 sync public/ s3://${DOCS_STAGING_BUCKET}/docs/server/
    --delete --exclude .git --exclude README.md --acl public-read ; else echo "Skipping...";
    fi
  - if [ ! -z "$DOCS_STAGING_DISTRIBUTION_ID" ]; then aws cloudfront create-invalidation
    --distribution-id ${DOCS_STAGING_DISTRIBUTION_ID} --paths '/docs/server/*' ; else
    echo "Skipping..."; fi
  stage: extras
image: elixir:1.10.2-alpine
l8n-upload:
  artifacts:
    paths:
    - public
  only:
  - master
  script:
  - make manual-deps
  - make dev-l8n-extract
  - if [ ! -z "$TX_TOKEN" ]; then tx push --source --no-interactive ; else echo "Skipping...";
    fi
  stage: extras
stable-build-and-push:
  image:
    name: docker:stable
  only:
  - master
  script:
  - make dev-l8n-download
  - make build
  - docker login -u $CI_REGISTRY_USER -p "$CI_REGISTRY_PASSWORD" $CI_REGISTRY
  - if [ ! -z "$CI_REGISTRY_PASSWORD" ]; then make push_stable ; else echo "Push to
    Docker Hub or skip if login details missing..."; fi
  - make build_hq
  - if [ ! -z "$CI_REGISTRY_PASSWORD" ]; then make push_hq ; else echo "Push to Docker
    Hub or skip if login details missing..."; fi
  - if [ ! -z "$MAIL_KEY" ]; then make hq_deploy_stable ; else echo "Deploy to Moodle
    HQ sites or skip if shared key missing..."; fi
  services:
  - docker:stable-dind
  stage: deploy
stages:
- test
- deploy
- extras
staging-build-and-push:
  image:
    name: docker:stable
  only:
  - develop
  script:
  - if [ ! -z "$TX_TOKEN" ]; then make dev-l8n-download ; else echo "Skipping...";
    fi
  - make build
  - docker login -u $CI_REGISTRY_USER -p "$CI_REGISTRY_PASSWORD" $CI_REGISTRY
  - if [ ! -z "$CI_REGISTRY_PASSWORD" ]; then make push ; else echo "Push to Docker
    Hub or skip if login details missing..."; fi
  - if [ ! -z "$MAIL_KEY" ]; then make hq_deploy_staging ; else echo "Deploy to Moodle
    HQ sites or skip if shared key missing..."; fi
  services:
  - docker:stable-dind
  stage: deploy
unit-testing:
  script:
  - make manual-deps
  - if [ ! -z "$TX_TOKEN" ]; then make dev-l8n-download ; else echo "Skipping...";
    fi
  - mix compile --force
  - mix ecto.create
  - mix ecto.migrate
  - mix coveralls --preload-modules
  services:
  - command:
    - postgres
    - -c
    - fsync=off
    - -c
    - synchronous_commit=off
    - -c
    - full_page_writes=off
    name: postgres:9.6.6
  stage: test
variables:
  DATABASE_HOST: postgres
  HOSTNAME: localhost
  MIX_ENV: test
  POSTGRES_DB: moodle_net_test
  POSTGRES_PASSWORD: postgres
  POSTGRES_USER: postgres
