before_script:
- pip install -r config/requirements.txt
flake8:
  script:
  - make flake8
  stage: static_analysis
image: python:3.6
pylint:
  script:
  - make pylint
  stage: static_analysis
stages:
- static_analysis
- dynamic_analysis
unit_test:
  artifacts:
    paths:
    - cov_html
  coverage: /\d+\%\s*$/
  script:
  - make test
  stage: dynamic_analysis
vulnerabilities:
  script:
  - make vulnerabilities
  stage: static_analysis
