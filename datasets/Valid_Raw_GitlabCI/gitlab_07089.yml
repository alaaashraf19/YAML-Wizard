after_script:
- make clean;
- make distclean;
- cd deb; make clean;
before_script:
- apt-get update -qq && apt-get install -y -qq lazarus
ulm:
  script:
  - ./configure; make ulm;
  stage: build
ulm_deb:
  artifacts:
    paths:
    - deb/*.deb
  script:
  - ./configure;
  - cd deb; make;
  stage: build
ulm_dist:
  artifacts:
    paths:
    - dist/*.tar.gz
  script:
  - ./configure; make dist;
  stage: deploy
ulm_doc:
  script:
  - ./configure; make doc
  stage: build
