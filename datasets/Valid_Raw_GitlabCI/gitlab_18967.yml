.build:
  image: docker:latest
  script: &id001
  - docker login -u gitlab-ci-token -p $CI_BUILD_TOKEN ${DOCKER_TAG}
  - docker build -t ${CONTAINER_BUILD_IMAGE} -f ${APP_DIRECTORY}/Dockerfile .
  - docker push ${CONTAINER_BUILD_IMAGE}
  services: &id002
  - docker:dind
  stage: build
  tags: &id003
  - dind
.test:
  image: docker:latest
  script: &id004
  - docker login -u gitlab-ci-token -p $CI_BUILD_TOKEN ${DOCKER_TAG}
  - docker pull ${CONTAINER_TEST_IMAGE}
  - docker run ${CONTAINER_TEST_IMAGE} pytest
  services: &id005
  - docker:dind
  stage: test
  tags: &id006
  - dind
build-example-1:
  image: docker:latest
  script: *id001
  services: *id002
  stage: build
  tags: *id003
  variables:
    APP_DIRECTORY: example-1
    CONTAINER_BUILD_IMAGE: ${DOCKER_TAG}:${APP_DIRECTORY}
build-example-2:
  image: docker:latest
  script: *id001
  services: *id002
  stage: build
  tags: *id003
  variables:
    APP_DIRECTORY: example-2
    CONTAINER_BUILD_IMAGE: ${DOCKER_TAG}:${APP_DIRECTORY}
non-dockerized-build-and-test-example-2:
  image: centos
  script:
  - yum install -y python-devel python-virtualenv
  - virtualenv .
  - source bin/activate
  - pip install --upgrade pip
  - cd example-2
  - pip install -r requirements.txt
  - env
  - pytest
  services:
  - redis
  stage: build
stages:
- build
- test
test-example-1:
  image: docker:latest
  script: *id004
  services: *id005
  stage: test
  tags: *id006
  variables:
    CONTAINER_TEST_IMAGE: ${DOCKER_TAG}:example-1
test-example-2:
  image: docker:latest
  script:
  - docker login -u gitlab-ci-token -p $CI_BUILD_TOKEN ${DOCKER_TAG}
  - docker run -d --name redis-${CI_BUILD_ID} redis
  - docker pull ${CONTAINER_TEST_IMAGE}
  - docker run --link redis-${CI_BUILD_ID}:redis ${CONTAINER_TEST_IMAGE} pytest
  services: *id005
  stage: test
  tags: *id006
  variables:
    CONTAINER_TEST_IMAGE: ${DOCKER_TAG}:example-2
