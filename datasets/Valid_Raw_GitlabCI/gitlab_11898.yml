before_script:
- dnf install -y cmake clang clang-tools-extra gsl-devel boost-devel make automake
check:
  script:
  - cmake .
  - make
  - clang-check -analyze -extra-arg -Xclang -extra-arg -analyzer-output=text -extra-arg
    -std=c++14 -extra-arg -Wall src/*.cpp
  - clang-tidy src/*.cpp
  stage: build
image: fedora
make:
  script:
  - cmake .
  - make
  stage: build
stages:
- build
