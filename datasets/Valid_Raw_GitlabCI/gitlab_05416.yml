cache:
  paths:
  - .m2/repository/
deploy-ossrh:
  only:
  - master
  script:
  - mvn clean javadoc:jar source:jar deploy -DskipTests -P dist -Dsettings.security=.m2/settings-security.xml
    --settings .m2/settings.xml -Dmaven.repo.local=.m2/repository/ --batch-mode
  stage: deploy
deploy-webapp:
  only:
  - master
  script:
  - cd classiga-api
  - mvn clean package tomcat7:redeploy -P prod -Dsettings.security=../.m2/settings-security.xml
    --settings ../.m2/settings.xml -Dmaven.repo.local=../.m2/repository/ --batch-mode
  - cd ../classiga-web
  - mvn clean package tomcat7:redeploy -P prod -Dsettings.security=../.m2/settings-security.xml
    --settings ../.m2/settings.xml -Dmaven.repo.local=../.m2/repository/ --batch-mode
  stage: deploy
image: maven:latest
install:
  script:
  - mvn clean install -P dist -Dsettings.security=.m2/settings-security.xml --settings
    .m2/settings.xml -Dmaven.repo.local=.m2/repository/ --batch-mode
  stage: build
