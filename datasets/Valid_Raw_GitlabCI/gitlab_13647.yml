.dind:
  before_script: &id001
  - echo ${CI_JOB_TOKEN} | docker login -u gitlab-ci-token --password-stdin registry.gitlab.com
  - apk add --no-cache bash findutils
  image: docker:latest
  only: &id002
  - schedule
  - web
  - docker
  services: &id003
  - docker:dind
.docker:
  before_script: *id001
  image: docker:latest
  only: *id002
  script: &id004
  - _runner/docker-tester
  services: *id003
  stage: docker
.runner:
  script: &id005
  - _runner/run
  stage: test
