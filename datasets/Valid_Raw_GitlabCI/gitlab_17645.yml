build_image:
  only:
  - tags
  script:
  - docker login -u $DOCKER_USERNAME -p $DOCKER_PASSWORD
  - docker build -t $IMAGE_TAG .
  - docker push $IMAGE_TAG
  stage: build
  tags:
  - linux
image: docker
services:
- docker:dind
stages:
- build
variables:
  IMAGE_TAG: $CI_REGISTRY_IMAGE:$CI_COMMIT_REF_NAME
