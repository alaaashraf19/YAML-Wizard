.caffe_template:
  script: &id001
  - VERSION="${CI_BUILD_NAME:1}"
  - docker build --pull -t "${REPOSITORY}:${VERSION}" --build-arg "repository=nvidia/cuda"
    "${VERSION}"
  - if [[ "${LATEST}" == true ]]; then docker tag "${REPOSITORY}:${VERSION}" "${REPOSITORY}:latest";
    fi
  - docker push "${REPOSITORY}"
  stage: caffe
before_script:
- docker login -u "${REGISTRY_USER}" -p "${REGISTRY_TOKEN}"
digits:
  script:
  - apk add --no-cache curl
  - curl -fsS -X POST -F token="${DIGITS_TRIGGER_TOKEN}" -F ref="master" "${DIGITS_TRIGGER_URL}"
  stage: trigger
image: docker:stable
services:
- docker:stable-dind
stages:
- caffe
- trigger
v0.14:
  script: *id001
  stage: caffe
v0.15:
  script: *id001
  stage: caffe
  variables:
    LATEST: 'true'
variables:
  OS: ${CI_BUILD_REF_NAME}
  REPOSITORY: ${CI_PROJECT_NAMESPACE}/${CI_PROJECT_NAME}
