.pages_template:
  artifacts:
    expire_in: 7 days
    paths:
    - public/
  before_script:
  - python -m pip install -U pip
  - git fetch --tags --prune --quiet
  - git fetch origin "$CI_DEFAULT_BRANCH" --depth 1 --quiet
  - mkdir -p public
  image: $CUSTOM_IMAGE
  script:
  - LATEST_TAG="$(git tag --sort=-v:refname | head -n1)"
  - LATEST_HASH="$(git rev-parse --short HEAD)"
  - git worktree add --force stable "$LATEST_TAG"
  - cd stable
  - pip install ".[documentation]"
  - sphinx-build doc/ "$CI_PROJECT_DIR/public/"
  - cd "$CI_PROJECT_DIR"
  - git worktree remove --force stable
  - git worktree add --force latest "origin/$CI_DEFAULT_BRANCH"
  - cd latest
  - pip install ".[documentation]"
  - sphinx-build doc/ "$CI_PROJECT_DIR/public/dev/"
  - cd "$CI_PROJECT_DIR"
  - git worktree remove --force latest
  - cat doc/switcher.json.template | sed "s/_RELEASE_TAG_/$LATEST_TAG/" | sed "s/_GIT_HASH_/$LATEST_HASH/"
    > public/_static/switcher.json
.test_template:
  artifacts:
    expire_in: 2 days
    paths:
    - htmlcov/
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
      junit: report.xml
  before_script:
  - python -m pip install -U pip
  - pip install ".[test]"
  coverage: /TOTAL.*? (100(?:\.0+)?\%|[1-9]?\d(?:\.\d+)?\%)$/
  image: python:$PYTHON_VERSION
  rules:
  - allow_failure: true
    if: $CI_PIPELINE_SOURCE == "schedule"
    when: always
  - allow_failure: true
    when: manual
  script:
  - xdoctest dynasor
  - coverage run -m pytest --verbose --junitxml=report.xml tests/
  - COVERAGE_OPTIONS="--omit=dynasor/core/rho_j_q_numba.py,dynasor/post_processing/filon.py"
  - coverage report -m $COVERAGE_OPTIONS
  - coverage xml -o coverage.xml $COVERAGE_OPTIONS
  - coverage html $COVERAGE_OPTIONS
  stage: test
build:wheel:
  artifacts:
    expire_in: 7 days
    name: dist-$CI_COMMIT_SHORT_SHA
    paths:
    - dist/
  image: $BARE_IMAGE
  rules:
  - when: always
  script:
  - python -m pip install -U pip build
  - python -m build --wheel --sdist
  - ls -l dist/
  stage: build
cache:
  key:
    files:
    - pyproject.toml
  paths:
  - .pip-cache/
documentation:
  artifacts:
    expire_in: 7 days
    paths:
    - public/
  before_script:
  - python -m pip install -U pip
  - pip install ".[documentation]"
  image: $CUSTOM_IMAGE
  rules:
  - if: $CI_COMMIT_BRANCH != "master" && $CI_COMMIT_TAG == null && $CI_PIPELINE_SOURCE
      != "schedule"
    when: always
  - when: never
  script:
  - mkdir -p public
  - sphinx-build -b doctest -W doc/ public/
  - sphinx-build -W doc/ public/
  stage: test
pages:
  extends: .pages_template
  rules:
  - if: $CI_COMMIT_BRANCH == "master"
    when: always
  - if: $CI_COMMIT_TAG
    when: always
  - if: $CI_PIPELINE_SOURCE == "schedule"
    when: never
  stage: deploy
pages_verification:
  extends: .pages_template
  rules:
  - allow_failure: true
    if: $CI_COMMIT_BRANCH != "master" && $CI_COMMIT_TAG == null && $CI_PIPELINE_SOURCE
      != "schedule"
    when: manual
  - when: never
  stage: test
pypi:
  before_script:
  - python -m pip install -U pip build twine
  - git fetch --tags --quiet
  environment:
    name: pypi-upload
  image: $CUSTOM_IMAGE
  rules:
  - if: $CI_PIPELINE_SOURCE == "schedule"
    when: never
  - if: $CI_COMMIT_TAG
    when: manual
  script:
  - echo "tag=$CI_COMMIT_TAG"
  - if [ -n "$CI_COMMIT_TAG" ]; then git checkout "$CI_COMMIT_TAG"; fi
  - python -m build
  - ls -l dist/
  - twine check dist/*
  - twine upload dist/* -u __token__ -p "$PYPI_TOKEN"
  stage: deploy
stages:
- build
- test
- deploy
style_check:
  image: $BARE_IMAGE
  rules:
  - if: $CI_PIPELINE_SOURCE != "schedule"
    when: always
  - when: never
  script:
  - python -m pip install -U pip flake8
  - flake8 doc/ examples/ dynasor/ tests/
  stage: test
test:py310:
  extends: .test_template
  variables:
    PYTHON_VERSION: '3.10'
test:py311:
  extends: .test_template
  variables:
    PYTHON_VERSION: '3.11'
test:py312:
  extends: .test_template
  variables:
    PYTHON_VERSION: '3.12'
test:py313:
  extends: .test_template
  rules:
  - allow_failure: false
    when: always
  variables:
    PYTHON_VERSION: '3.13'
test:py39:
  extends: .test_template
  variables:
    PYTHON_VERSION: '3.9'
variables:
  BARE_IMAGE: python:3.13-slim-bookworm
  CUSTOM_IMAGE: $CI_REGISTRY/materials-modeling/$CI_PROJECT_NAME/cicd
  PIP_CACHE_DIR: $CI_PROJECT_DIR/.pip-cache
  PIP_DISABLE_PIP_VERSION_CHECK: '1'
  PIP_NO_INPUT: '1'
workflow:
  rules:
  - if: $CI_PIPELINE_SOURCE == "push" && $CI_OPEN_MERGE_REQUESTS
    when: never
  - when: always
