build:cmake-nvhpc:
  image: nvcr.io/nvidia/nvhpc:21.2-devel-cuda11.2-ubuntu20.04
  script:
  - apt-get -qq update
  - apt-get -qq install apt-transport-https ca-certificates gnupg software-properties-common
    wget
  - wget -O - https://apt.kitware.com/keys/kitware-archive-latest.asc 2>/dev/null
    | gpg --dearmor - | tee /etc/apt/trusted.gpg.d/kitware.gpg >/dev/null
  - apt-add-repository 'deb https://apt.kitware.com/ubuntu/ focal main'
  - apt-get install -qq git cmake libfftw3-dev
  - cmake --version
  - mkdir build
  - cd build
  - cmake -DBUILD_SHARED_LIBS=OFF -DCMAKE_Fortran_COMPILER=mpif90 -DCMAKE_C_COMPILER=mpicc
    -DQE_ENABLE_CUDA=ON -DQE_ENABLE_OPENACC=ON -DNVFORTRAN_CUDA_CC=70 .. && make -j
    4
  tags:
  - gitlab-org-docker
  variables:
    DEBIAN_FRONTEND: noninteractive
build:cmake-nvhpc-nocuda:
  image: nvcr.io/nvidia/nvhpc:21.2-devel-cuda11.2-ubuntu20.04
  script:
  - apt-get -qq update
  - apt-get -qq install apt-transport-https ca-certificates gnupg software-properties-common
    wget
  - wget -O - https://apt.kitware.com/keys/kitware-archive-latest.asc 2>/dev/null
    | gpg --dearmor - | tee /etc/apt/trusted.gpg.d/kitware.gpg >/dev/null
  - apt-add-repository 'deb https://apt.kitware.com/ubuntu/ focal main'
  - apt-get install -qq git cmake libfftw3-dev
  - cmake --version
  - mkdir build
  - cd build
  - cmake -DBUILD_SHARED_LIBS=ON -DCMAKE_Fortran_COMPILER=mpif90 -DCMAKE_C_COMPILER=mpicc
    -DQE_ENABLE_CUDA=OFF -DQE_ENABLE_OPENACC=OFF .. && make -j 2
  tags:
  - gitlab-org-docker
  variables:
    DEBIAN_FRONTEND: noninteractive
build:cp:
  image: ubuntu:20.04
  script:
  - apt-get -qq update
  - DEBIAN_FRONTEND=noninteractive TZ=Etc/UTC apt-get -y install tzdata
  - apt-get -qq install m4 make wget curl git gfortran gcc libopenblas-dev libfftw3-dev
    libopenmpi-dev
  - ./configure
  - make -j 2 cp
  tags:
  - gitlab-org-docker
build:pw:
  image: ubuntu:20.04
  script:
  - apt-get -qq update
  - DEBIAN_FRONTEND=noninteractive TZ=Etc/UTC apt-get -y install tzdata
