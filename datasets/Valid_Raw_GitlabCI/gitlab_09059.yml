.if-mirror-status-pipeline:
  if: ($CI_PIPELINE_SOURCE == "pipeline" || $CI_PIPELINE_SOURCE == "web" || $CI_PIPELINE_SOURCE
    == "trigger") && $MIRROR_STATUS == "true"
mirror:status:
  extends:
  - .with-bundle
  - .common-ci-tokens
  rules:
  - if: ($CI_PIPELINE_SOURCE == "pipeline" || $CI_PIPELINE_SOURCE == "web" || $CI_PIPELINE_SOURCE
      == "trigger") && $MIRROR_STATUS == "true"
  script:
  - bundle exec rake 'mirror:status'
  stage: mirror_status
