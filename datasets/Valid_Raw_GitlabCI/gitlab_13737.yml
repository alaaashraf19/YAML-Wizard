before_script:
- which python3 || ( apt-get update -y && apt-get -y install software-properties-common
  && add-apt-repository ppa:deadsnakes/ppa && apt-get install python3.9 python3.9-dev
  python3.9-venv python3-pip -y )
- apt-get install -y ansible libffi-dev libssl-dev
- apt-get install -y pkg-config libavformat-dev libavcodec-dev libavdevice-dev libavutil-dev
  libswscale-dev libavresample-dev libavfilter-dev
- apt-get install -y libudev-dev
- python3.9 -m pip install homeassistant==2021.3.2
hass_check_config:
  script:
  - ansible --version
  - ansible-vault decrypt secrets.yaml --vault-password-file .gitlab-ci/ansible-vault-pass.sh
  - sed -i '/^home_assistant_directory/chome_assistant_directory:\ .gitlab-ci' ./secrets.yaml
  - sed -i '/^homeassistant_db_file/chomeassistant_db_file:\ .gitlab-ci\/blankfile'
    ./secrets.yaml
  - sed -i '/^ssl_cert/cssl_cert:\ .gitlab-ci\/blankfile' ./secrets.yaml
  - sed -i '/^ssl_key/cssl_key:\ .gitlab-ci\/blankfile' ./secrets.yaml
  - sed -i '/^  service_account/c\ \ service_account:\ \!include .gitlab-ci\/service_account.json'
    ./configuration.yaml
  - hass -c . --script check_config
  stage: test
image: ubuntu:20.04
stages:
- test
