build:
  artifacts:
    paths:
    - node_modules/
    - public/
  script:
  - yarn install
  - yarn storybook-static
  - mv storybook public
  stage: build
image: dev.gitlab.org:5005/gitlab/gitlab-build-images:gitlab-puppeteer
lint:
  script:
  - yarn lint
  - yarn prettier --list-different **/*.scss
  stage: test
pages:
  artifacts:
    paths:
    - public
  dependencies:
  - build
  only:
  - master
  script:
  - echo "Deploying to Pages"
  stage: deploy
publish:
  only:
  - master
  script:
  - yarn install
  - $(yarn bin)/semantic-release
  stage: deploy
review:
  dependencies:
  - build
  environment:
    name: review/$CI_COMMIT_REF_SLUG
    on_stop: review_stop
    url: http://$CI_COMMIT_REF_SLUG.$APPS_DOMAIN
  except:
  - master
  only:
  - branches
  script:
  - rsync -av --delete public /srv/nginx/pages/$CI_COMMIT_REF_SLUG
  stage: deploy
  tags:
  - nginx
  - review-apps
  - deploy
review_stop:
  environment:
    action: stop
    name: review/$CI_COMMIT_REF_SLUG
  except:
  - master
  only:
  - branches
  script:
  - rm -rf public /srv/nginx/pages/$CI_COMMIT_REF_SLUG
  stage: deploy
  tags:
  - nginx
  - review-apps
  - deploy
  when: manual
test:
  script:
  - yarn test
  stage: test
update_snapshots:
  script:
  - yarn install
  - yarn visual-test --updateSnapshot
  - git config --global user.email "gitlab-bot@gitlab.com"
  - git config --global user.name "GitLab Bot"
  - git add .
  - git commit -m "Update snapshots"
  - git push https://gitlab-bot:$GITLAB_TOKEN@gitlab.com/gitlab-org/csslab.git HEAD:$CI_COMMIT_REF_NAME
    &>/dev/null
  stage: build
  when: manual
upload_artifacts:
  artifacts:
    paths:
    - csslab.$CI_COMMIT_REF_SLUG.tgz
    when: always
  dependencies:
  - build
  script:
  - yarn install
  - yarn pack --filename csslab.$CI_COMMIT_REF_SLUG.tgz
  - echo "The package.json dependency URL is https://gitlab.com/gitlab-org/csslab/-/jobs/$CI_JOB_ID/artifacts/raw/csslab.$CI_COMMIT_REF_SLUG.tgz"
  stage: deploy
visual:
  artifacts:
    paths:
    - storyshots/__image_snapshots__/
    when: always
  script:
  - yarn visual-test
  stage: test
