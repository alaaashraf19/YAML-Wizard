before_script:
- apt-get update -qq && apt-get install -y -qq python-pip python-setuptools wget unzip
  tar build-essential python-dev
- pip install mkdocs
pages:
  artifacts:
    paths:
    - public
  only:
  - master
  script:
  - mkdir -p public/pub
  - sh ./do get_libs
  - python ./setup.py sdist --dist-dir public/pub
  - mkdocs build -c -d public
test:
  script:
  - sh ./do get_libs
  - mkdocs build -c
