build:
  artifacts:
    paths:
    - Fudaa-Crue-*.zip
    - '*/target/'
    reports:
      junit:
      - '*/target/surefire-reports/TEST-*.xml'
      - '*/target/failsafe-reports/TEST-*.xml'
    when: always
  except:
  - tags
  interruptible: true
  script:
  - mvn $MAVEN_CLI_OPTS -U -Passemble,assemble-linux clean verify install
  - mv ui-application/target/Fudaa-Crue-*.zip ./
  - mv crue-otfa/target/Fudaa-Crue-OTFA-*.zip ./
  - mv crue-aoc/target/Fudaa-Crue-AOC-*.zip ./
  stage: build
cache:
  paths:
  - .m2/repository
  - .sonar/cache
deploy_release:
  artifacts:
    paths:
    - Fudaa-Crue-*.zip
  dependencies: []
  except:
  - branches
  only:
  - /^release-.*$/
  script:
  - bash /ci_scripts/install_gpg.sh
  - mvn $MAVEN_CLI_OPTS -Passemble,assemble-linux install
  - mv ui-application/target/Fudaa-Crue-*.zip ./
  - mv crue-otfa/target/Fudaa-Crue-OTFA-*.zip ./
  - mv crue-aoc/target/Fudaa-Crue-AOC-*.zip ./
  stage: deploy
image: registry.gitlab.com/fudaa/fudaa-scripts:21
release:
  dependencies: []
  except:
  - tags
  script:
  - bash  /ci_scripts/maven_tag_new_version_and_next_snapshot.sh
  stage: release
  when: manual
sonar:
  allow_failure: true
  cache:
    key: ${CI_JOB_NAME}
    paths:
    - .sonar/cache
  dependencies:
  - build
  except:
  - tags
  interruptible: true
  script:
  - mvn sonar:sonar -Dsonar.branch.name=$CI_COMMIT_REF_NAME -Dsonar.projectKey=fudaa-crue
    -Dsonar.organization=fudaa -Dsonar.host.url=https://sonarcloud.io -Dsonar.token=$SONAR_TOKEN
  stage: sonar
  variables:
    GIT_DEPTH: '0'
    SONAR_USER_HOME: ${CI_PROJECT_DIR}/.sonar
stages:
- build
- sonar
- deploy
- release
variables:
  DOCKER_HOST: tcp://docker:2375
  MAVEN_CLI_OPTS: --batch-mode --errors --fail-at-end --show-version -DinstallAtEnd=true
    -DdeployAtEnd=true
  MAVEN_OPTS: -Dhttps.protocols=TLSv1.2 -Dmaven.repo.local=.m2/repository -Dorg.slf4j.simpleLogger.log.org.apache.maven.cli.transfer.Slf4jMavenTransferListener=WARN
    -Dorg.slf4j.simpleLogger.showDateTime=true -Djava.awt.headless=true
