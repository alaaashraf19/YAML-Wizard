build-branch:
  before_script:
  - docker login -u gitlab-ci-token -p $CI_JOB_TOKEN registry.gitlab.com
  - docker run --rm --privileged multiarch/qemu-user-static:register || true
  except:
  - devel
  - master
  - rc
  - tags
  script:
  - docker pull $CONTAINER_IMAGE:$CI_COMMIT_REF_SLUG || true
  - docker build -f Dockerfile ${ENV64:+--build-arg ENV64="$ENV64"} --cache-from $CONTAINER_IMAGE:$CI_COMMIT_REF_SLUG
    --tag $CONTAINER_IMAGE:$CI_COMMIT_REF_SLUG-$CI_COMMIT_SHORT_SHA --tag $CONTAINER_IMAGE:$CI_COMMIT_REF_SLUG
    .
  - test -n "$CI_BUILD_TAG" && docker tag $CONTAINER_IMAGE:$CI_COMMIT_REF_SLUG-$CI_COMMIT_SHORT_SHA
    $CONTAINER_IMAGE:$CI_BUILD_TAG || true
  - docker push $CONTAINER_IMAGE:$CI_COMMIT_REF_SLUG-$CI_COMMIT_SHORT_SHA
  - docker push $CONTAINER_IMAGE:$CI_COMMIT_REF_SLUG
  - test -n "$CI_BUILD_TAG" && docker push $CONTAINER_IMAGE:$CI_BUILD_TAG || true
  stage: build
