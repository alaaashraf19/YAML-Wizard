before_script:
- bundle install
image: ruby:2.3
pages:
  artifacts:
    paths:
    - public
  only:
  - master
  script:
  - chmod +x "./create_models.sh"
  - chmod +x "./create_redirects.sh"
  - ./create_models.sh
  - ./create_redirects.sh
  - bundle exec jekyll build -d public
  stage: deploy
test:
  artifacts:
    paths:
    - test
  except:
  - master
  script:
  - chmod +x "./create_models.sh"
  - chmod +x "./create_redirects.sh"
  - ./create_models.sh
  - ./create_redirects.sh
  - bundle exec jekyll build -d test
  stage: test
variables:
  JEKYLL_ENV: production
