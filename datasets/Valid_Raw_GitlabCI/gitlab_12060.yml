docs:
  image: python:3.6
  script:
  - pip install sphinx
  - cd docs
  - sphinx-build -M singlehtml . _build
  - sphinx-build -M linkcheck  . _build | tee linkcheck.log
  - if grep 'ok.*- unauthorized' linkcheck.log; then false; fi
  stage: test
flake8:
  image: python:3.6
  script:
  - pip install tox
  - tox -e flake8
  stage: test
py27:
  image: python:2.7
  script:
  - pip install tox
  - tox -e 'py27-sphinx_{oldest,latest}'
  stage: test
py36:
  image: python:3.6
  script:
  - pip install tox
  - tox -e 'py36-sphinx_{oldest,fedora,latest}'
  stage: test
stages:
- test
