.deploy:
  before_script:
  - eval $(ssh-agent -s)
  - chmod 400 "$SSH_PRIVATE_KEY"
  - ssh-add "$SSH_PRIVATE_KEY"
  - mkdir -p ~/.ssh
  - chmod 700 ~/.ssh
  - cp "$SSH_KNOWN_HOSTS" ~/.ssh/known_hosts
  - chmod 644 ~/.ssh/known_hosts
  needs: []
  script:
  - apt-get update -y
  - apt-get install -y rsync
  - export GIT_VERSION=$(git describe --tags)
  - mvn versions:set -DgenerateBackupPoms=false -DnewVersion=$GIT_VERSION
  - mvn install -Dmaven.test.skip=true
  - rsync -avz -e "ssh -p2201" target/albina-$GIT_VERSION.jar $SSH_SERVER:$JAR_PATH
  - ssh -p2201 $SSH_SERVER "sudo /usr/bin/systemctl restart $SYSTEMD_SERVICE"
  stage: deploy
build:
  artifacts:
    paths:
    - target/albina.jar
    - target/test-results/
    reports:
      junit:
      - target/surefire-reports/TEST-*.xml
      - target/failsafe-reports/TEST-*.xml
    when: always
  rules:
  - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
  - if: $CI_COMMIT_TAG
  - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  script:
  - apt-get update -y
  - apt-get install -y ghostscript imagemagick webp
  - if [ -e "../avalanche-warning-maps" ]; then rm -rf ../avalanche-warning-maps;
    fi
  - git clone --depth 1 https://gitlab.com/albina-euregio/avalanche-warning-maps.git
    ../avalanche-warning-maps/
  - export GIT_VERSION=$(git describe --tags)
  - mvn versions:set -DgenerateBackupPoms=false -DnewVersion=$GIT_VERSION
  - mvn install
  - mv target/albina*.jar target/albina.jar
  stage: build
cache:
  key:
    files:
    - pom.xml
  paths:
  - .m2/repository
deploy to development:
  environment:
    name: development
  extends: .deploy
  rules:
  - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  - allow_failure: true
    when: manual
  variables:
    JAR_PATH: /opt/albina-server-dev/albina.jar
    SYSTEMD_SERVICE: albina-server-dev.service
deploy to production:
  environment:
    name: production
  extends: .deploy
  rules:
  - allow_failure: true
    if: $CI_COMMIT_TAG
    when: manual
  variables:
    JAR_PATH: /opt/albina-server/albina.jar
    SYSTEMD_SERVICE: albina-server.service
image: maven:3-eclipse-temurin-21
variables:
  MAVEN_ARGS: --batch-mode --errors --fail-at-end --show-version -DinstallAtEnd=true
    -DdeployAtEnd=true
  MAVEN_OPTS: -Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository
workflow:
  rules:
  - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
  - if: $CI_COMMIT_TAG
  - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS
    when: never
  - if: $CI_COMMIT_BRANCH
