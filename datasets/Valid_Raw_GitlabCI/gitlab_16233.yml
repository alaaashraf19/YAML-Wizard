Build -- Ubuntu 22.04:
  artifacts:
    paths:
    - build
  except:
  - develop
  - master
  image: $CONTAINER_TAG_PREFIX-ubuntu2204
  script:
  - cmake -GNinja -B build -DENABLE_GPL="ON" -DPLUGIN_WEBRTC=OFF -DPLUGIN_JACK=OFF
    -DPLUGIN_TIMECODE=OFF -DPLUGIN_VRPN=OFF -DCMAKE_BUILD_TYPE="Release"
  - ninja -C build
  stage: build
Coverage -- Package:
  artifacts:
    name: switcher_coverage_${CI_BUILD_REF_NAME}
    paths:
    - coverage.zip
  image: $CONTAINER_TAG_PREFIX-ubuntu2204
  only:
  - develop
  - test-switcher-ci
  script:
  - DEBIAN_FRONTEND=noninteractive apt update -y && apt install -y lcov zip xvfb
  - rm -rf build
  - cmake -GNinja -B build -DTEST_COVERAGE=ON -DPLUGIN_WEBRTC=OFF -DPLUGIN_JACK=OFF
    -DPLUGIN_TIMECODE=OFF -DPLUGIN_VRPN=OFF -DENABLE_GPL=ON ..
  - ninja -C build && ninja install -C build && ldconfig
  - pulseaudio --start
  - xvfb-run --auto-servernum --server-args='-screen 0 1920x1080x24' ninja check_coverage
    -C build
  - zip -r coverage.zip coverage
  - mv coverage.zip ../
  stage: coverage
Debian -- Package Ubuntu 22.04:
  artifacts:
    name: switcher_package_${CI_BUILD_REF_NAME}
    paths:
    - switcher_ubuntu22.04_latest_amd64.deb
  image: $CONTAINER_TAG_PREFIX-ubuntu2204
  only:
  - master
  - test-switcher-ci
  script:
  - DEBIAN_FRONTEND=noninteractive apt update -y
  - rm -rf build
  - cmake -GNinja -B build -DENABLE_GPL=ON -DPLUGIN_WEBRTC=OFF -DPLUGIN_VRPN=OFF -DCMAKE_INSTALL_PREFIX=/usr
    ..
  - ninja package -C build
  - mv *.deb ../switcher_ubuntu22.04_latest_amd64.deb
  stage: deploy
Docker -- Dependency Image:
  except:
  - develop
  - master
  image: docker:20-git
  script:
  - git diff HEAD:deps origin/develop:deps --quiet && echo "New docker image build
    is not required" && exit 0
  - docker login -u ${CI_REGISTRY_USER} -p ${CI_REGISTRY_PASSWORD} ${CI_REGISTRY}
  - docker build -t $CONTAINER_TAG_PREFIX-ubuntu2204 -f dockerfiles/Dockerfile-deps-Ubuntu-22.04
    .
  - docker push $CONTAINER_TAG_PREFIX-ubuntu2204
  stage: setup
Lint and Format:
  image: registry.gitlab.com/sat-mtl/ptt/dev-tools/lint:latest
  script:
  - pre-commit run --all-files
  stage: setup
Test -- Package Ubuntu 22.04:
  image: $CONTAINER_TAG_PREFIX-ubuntu2204
  only:
  - develop
  - test-switcher-ci
  script:
  - cmake -GNinja -B build -DENABLE_GPL=ON -DPLUGIN_WEBRTC=OFF -DPLUGIN_VRPN=OFF -DCMAKE_BUILD_TYPE="Release"
  - DEBIAN_FRONTEND=noninteractive apt update -y && apt install -y xvfb
  - xvfb-run --auto-servernum --server-args='-screen 0 1920x1080x24' ninja package_source_test
    -C build
  stage: test
Test -- Ubuntu 22.04:
  artifacts:
    paths:
    - build/Testing/Temporary/
    when: on_failure
  except:
  - develop
  - master
  image: $CONTAINER_TAG_PREFIX-ubuntu2204
  needs:
  - Build -- Ubuntu 22.04
  script:
  - DEBIAN_FRONTEND=noninteractive apt update -y && apt install -y xvfb
  - ninja install -C build && ldconfig
  - pulseaudio --start
  - xvfb-run --auto-servernum --server-args='-screen 0 1920x1080x24' ninja test -C
    build
  stage: test
image: docker:20
services:
- docker:20.10-dind
stages:
- setup
- build
- test
- coverage
- deploy
variables:
  BUILD_DIR: /opt/switcher
  CONTAINER_TAG_PREFIX: $CI_REGISTRY_IMAGE:deps
  CTEST_OUTPUT_ON_FAILURE: '1'
  GIT_SUBMODULE_STRATEGY: recursive
