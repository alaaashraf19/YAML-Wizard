macos-options-tester:
  needs: []
  rules:
  - if: $CI_PIPELINE_SOURCE == "schedule" && $CI_COMMIT_BRANCH && $CI_PROJECT_PATH
      == "NTPsec/ntpsec"
  script:
  - PKG_CONFIG_PATH=${HOMEBREW_PREFIX}/opt/openssl/lib/pkgconfig PYTHON=${HOMEBREW_PREFIX}/bin/python3
    tests/option-tester.sh
  stage: test
  tags:
  - saas-macos-medium-m1
make-tarball:
  image: $CI_REGISTRY/ntpsec/ntpsec/debian-stable
  rules:
  - if: $CI_PIPELINE_SOURCE == "schedule"
  script:
  - apt-get update
  - DEBIAN_FRONTEND="noninteractive" apt-get install -y git asciidoctor
  - ln -svf /usr/bin/python{3,}
  - ./waf configure build --enable-doc --enable-man
  - cd devel&&/bin/sh make-tarball
  stage: test
  tags:
  - gitlab-org
