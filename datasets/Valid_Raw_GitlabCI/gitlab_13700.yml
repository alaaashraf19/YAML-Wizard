.deb_oldold_option_tester:
  needs: &id009 []
  rules: &id010
  - if: $CI_PIPELINE_SOURCE == "schedule"
  script: &id011
  - apt-get update
  - apt-get install -y netbase bison gcc libssl-dev libcap-dev pps-tools python2-dev
    python2-minimal libseccomp-dev bash pkg-config python3-dev python3-minimal
  - PYTHON=python2 bash tests/option-tester.sh
  - PYTHON=python3 bash tests/option-tester.sh
  stage: test
  tags: &id012
  - gitlab-org
.deb_option_tester_py3_only:
  needs: &id005 []
  rules: &id006
  - if: $CI_PIPELINE_SOURCE == "schedule"
  script: &id007
  - apt-get update
  - DEBIAN_FRONTEND=noninteractive apt-get install -y netbase bison gcc libssl-dev
    libcap-dev pps-tools libseccomp-dev bash pkg-config python3-dev python3-minimal
  - PYTHON=python3 bash tests/option-tester.sh
  stage: test
  tags: &id008
  - gitlab-org
.option_tester_py3_only:
  needs: &id001 []
  rules: &id002
  - if: $CI_PIPELINE_SOURCE == "schedule"
  script: &id003
  - PYTHON=python3 bash tests/option-tester.sh
  stage: test
  tags: &id004
  - gitlab-org
