freebsd-options-tester:
  needs: []
  rules:
  - if: $CI_PIPELINE_SOURCE == "schedule" && $CI_COMMIT_BRANCH && $CI_PROJECT_PATH
      == "NTPsec/ntpsec"
    when: never
  - when: never
  script:
  - PYTHON=python2.7 tests/option-tester.sh
  - PYTHON=python3 tests/option-tester.sh
  stage: test
  tags:
  - freebsd
gentoo-options-tester:
  before_script:
  - emerge-webrsync
  - emerge -q y sys-libs/libcap sys-devel/bison net-misc/pps-tools app-text/asciidoc
    sys-libs/libseccomp app-shells/bash
  image: gentoo/stage3
  needs: *id001
  rules: *id002
  script: *id003
  stage: test
