everything:
  artifacts:
    paths:
    - typst/*.pdf
    - html
  script:
  - ruby --version
  - export LANG=en_US.UTF-8
  - export LANGUAGE=en_US.UTF-8
  - export LC_ALL=en_US.UTF-8
  - pushd SvgConverter && npm i && popd
  - rake
  stage: build
image: zachgeek/songbook-builder:latest
pages:
  artifacts:
    paths:
    - public
  only:
  - main
  script:
  - mv html public
  - cp public/songbook.html public/index.html
  - cp typst/*.pdf public
  stage: deploy
stages:
- build
- deploy
