flake8:
  image: python:3.6
  script:
  - pip install tox
  - tox -e flake8
  stage: test
py27:
  image: python:2.7
  script:
  - pip install tox
  - pip install ansible
  - tox -e 'py27-{pytest_oldest,pytest_latest}'
  stage: test
py36:
  image: python:3.6
  script:
  - pip install tox
  - pip install ansible
  - tox -e 'py36-{pytest_oldest,pytest_latest}'
  stage: test
stages:
- test
