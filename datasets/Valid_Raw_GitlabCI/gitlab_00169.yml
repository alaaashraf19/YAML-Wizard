before_script:
- pip install -r requirements.txt
build:
  artifacts:
    paths:
    - full.bib
    - abrv.bib
  only:
  - merge_requests
  - master
  script:
  - make all
  stage: build
default:
  tags:
  - gitlab-org-docker
deploy-overleaf:
  dependencies:
  - build
  - test-sort
  script:
  - git clone https://${OVERLEAF_USER}:${OVERLEAF_TOKEN}@git.overleaf.com/${OVERLEAF_REPO}
    overleaf
  - cp full.bib overleaf/full.bib
  - cp abrv.bib overleaf/abrv.bib
  - cd overleaf
  - "if ! git diff-index --quiet HEAD; then \n  git -c user.name=\"gitlab\" -c user.email=\"\
    runner@gilab.com\" commit full.bib abrv.bib -m \"Update bibliography files\"\n\
    \  git push origin master\nfi"
  stage: deploy
image: python:latest
test-sort:
  only:
  - merge_requests
  - master
  script:
  - make sort
  - git diff --quiet || exit $?
  stage: test
