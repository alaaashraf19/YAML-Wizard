before_script:
- apk update
- apk add make tar git zip
image: docker:stable
make-image:
  artifacts:
    name: sdimage-$CI_COMMIT_SHA
    paths:
    - sdcard.img.zip
    - update.zip
    - build.log
    when: always
  cache:
    key: $CI_JOB_NAME-$CI_COMMIT_REF_SLUG
    paths:
    - buildroot/output/
  script:
  - make sdimage-ci &> build.log
  tags:
  - disk-image
rust-tests:
  cache:
    key: $CI_JOB_NAME-$CI_COMMIT_REF_SLUG
    paths:
    - pISO/target/
    - pISO/.cargo/
  script:
  - make test-ci
services:
- docker:dind
variables:
  CARGO_HOME: .cargo
  DOCKER_DRIVER: overlay2
  GIT_SUBMODULE_STRATEGY: recursive
