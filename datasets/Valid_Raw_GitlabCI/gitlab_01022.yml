before_script:
- git submodule sync --recursive
- git submodule update --init --recursive
- apt-get update -qy
- apt-get install -y python-dev python-pip python3-dev python3-pip python-numpy python3-numpy
  g++
stages:
- test
- staging
staging:
  script:
  - bash slsparse.cpp
  - python check.py
  - python3 check.py
  stage: staging
test:
  script:
  - bash lifelib/tests/test_all.sh
  stage: test
