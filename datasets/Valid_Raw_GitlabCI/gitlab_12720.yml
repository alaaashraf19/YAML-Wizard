build:
  script:
  - mvn $MAVEN_CLI_OPTS compile
  stage: build
cache:
  paths:
  - .m2/repository/
  - target/
deploy:
  only:
  - master
  script:
  - mvn $MAVEN_CLI_OPTS deploy
  stage: deploy
image: maven:3.5.3-jdk-8
stages:
- build
- test
- deploy
test:
  script:
  - mvn $MAVEN_CLI_OPTS test
  stage: test
variables:
  MAVEN_CLI_OPTS: -s ci_settings.xml --batch-mode
  MAVEN_OPTS: -Dmaven.repo.local=.m2/repository
