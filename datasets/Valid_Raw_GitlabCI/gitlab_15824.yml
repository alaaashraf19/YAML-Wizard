stages:
- test
test:ubuntu:
  artifacts:
    expire_in: 1 week
    paths:
    - plexus-*.tar.gz
  before_script:
  - apt-get update
  - apt-get install -y gcc git m4 openssl libssl-dev autogen autoconf automake libtool
    libltdl7 libltdl-dev byacc flex check libjansson4 libjansson-dev pkg-config build-essential
  image: ubuntu:24.04
  script:
  - ./autogen.sh
  - ./configure --enable-debugging --enable-assert --enable-libjansson
  - make distcheck
  stage: test
