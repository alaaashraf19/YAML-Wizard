.Test Backend:
  allow_failure: true
  script:
  - npm install
  - export PATH=node_modules/.bin:$PATH
  - ./vikserver-test.sh
  services:
  - mariadb:latest
  stage: test
  variables:
    NODE_ENV: test
Build Docker image:
  image: docker
  script:
  - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  - sh -c 'stat .privado/credenciales.json&>/dev/null&&rm .privado/credenciales.json||return
    0'
  - export BASETAG="$CI_REGISTRY_IMAGE/$CI_COMMIT_REF_NAME"
  - export TAG1="$BASETAG:${CI_COMMIT_SHA}"
  - export TAG2="$BASETAG:latest"
  - docker build -t $TAG1 -t $TAG2 .
  - docker run --rm -i -e ENCRYPTION_KEY="$ENCRYPTION_KEY" -e NODE_ENV='test' -e MYSQL_HOST="$MARIADB_PORT_3306_TCP_ADDR"
    -e MYSQL_USER="$MYSQL_USER" -e MYSQL_PASSWORD="$MYSQL_PASSWORD" -e MYSQL_DATABASE="$MYSQL_DATABASE"
    -e OPENPGP_PASSPHRASE="$OPENPGP_PASSPHRASE" $TAG1 ./vikserver-test.sh
  - docker push $TAG1
  - docker push $TAG2
  services:
  - mariadb:latest
  - docker:dind
  stage: build
  variables:
    NODE_ENV: production
Deploy to Heroku:
  environment: Heroku production
  image: alpine:latest
  only:
    refs:
    - master
  script:
  - apk --update add ruby gnupg ruby-doc ruby-json git git-lfs curl
  - gem install rdoc||gem install rdoc
  - gem install dpl
  - gpg --passphrase "$ENCRYPTION_KEY" --batch  -o .privado/credenciales.json -d .privado/credenciales.json.gpg
  - dpl --provider=heroku --app=vikserver-backend --api-key="$HEROKU_API_KEY" --skip_cleanup
  stage: deploy
  variables:
    NODE_ENV: production
Pass eslint:
  before_script:
  - apk --update add git
  - npm i -g eslint
  image: node:12-alpine
  script:
  - npx eslint .
  stage: test
  variables:
    NODE_ENV: production
Test on Node 10:
  extends: .Test Backend
  image: node:10
Test on Node 10 Alpine:
  allow_failure: false
  before_script:
  - apk --update add git
  extends: .Test Backend
  image: node:10-alpine
Test on Node 11:
  extends: .Test Backend
  image: node:11
Test on Node 11 Alpine:
  before_script:
  - apk --update add git
  extends: .Test Backend
  image: node:11-alpine
Test on Node 12:
  extends: .Test Backend
  image: node:12
Test on Node 12 Alpine:
  allow_failure: false
  before_script:
  - apk --update add git
  - npm i -g mocha eslint
  extends: .Test Backend
  image: node:12-alpine
  variables:
    NODE_ENV: production
code_quality:
  allow_failure: true
  artifacts:
    expire_in: 1 week
    reports:
      codequality: gl-code-quality-report.json
  image: docker:stable
  script:
  - docker run --env SOURCE_CODE="$PWD" --volume "$PWD":/code --volume /var/run/docker.sock:/var/run/docker.sock
    "registry.gitlab.com/gitlab-org/security-products/codequality:11-8-stable" /code
  services:
  - docker:stable-dind
  stage: test
  variables:
    DOCKER_DRIVER: overlay2
container_scanning:
  dependencies:
  - Build Docker image
  stage: check
image: node:latest
include:
- template: Container-Scanning.gitlab-ci.yml
- template: Dependency-Scanning.gitlab-ci.yml
- template: SAST.gitlab-ci.yml
stages:
- test
- build
- check
- deploy
variables:
  MYSQL_DATABASE: vikserver_test
  MYSQL_HOST: mariadb
  MYSQL_PASSWORD: test/password
  MYSQL_RANDOM_ROOT_PASSWORD: 'yes'
  MYSQL_USER: vikserver_test
  OPENPGP_PASSPHRASE: testpassword
