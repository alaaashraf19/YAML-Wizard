.build:
  image: spaceywolfi/ukuvota-node
  stage: build
.deploy:
  image: mrsixw/concourse-rsync-resource
  script: &id001
  - eval $(ssh-agent -s)
  - ssh-add <(echo "$DEPLOY_SSH_KEY")
  - mkdir -p ~/.ssh
  - '[[ -f /.dockerenv ]] && echo -e "Host *\n\tStrictHostKeyChecking no\n\n" > ~/.ssh/config'
  - rsync -av --delete dist/ ukuvota-deploy@yuca.yunity.org:/var/www/ukuvota/$DEPLOY_DIR/frontend/
  - rsync -av --delete storybook-static/ ukuvota-deploy@yuca.yunity.org:/var/www/ukuvota/$DEPLOY_DIR/storybook/
build:
  artifacts:
    paths:
    - dist
  image: spaceywolfi/ukuvota-node
  script: yarn build
  stage: build
build-storybook:
  artifacts:
    paths:
    - storybook-static
  image: spaceywolfi/ukuvota-node
  script: yarn build-storybook
  stage: build
image: alpine:latest
install:
  artifacts:
    expire_in: 20 minutes
    paths:
    - node_modules
  cache:
    paths:
    - node_modules/
  image: spaceywolfi/ukuvota-node
  script: yarn
  stage: install
lint:
  image: spaceywolfi/ukuvota-node
  script: yarn lint
  stage: build
production:
  environment:
    name: production
    url: https://ukuvota.world
  image: mrsixw/concourse-rsync-resource
  only:
  - master
  script: *id001
  stage: production
  variables:
    DEPLOY_DIR: production
  when: manual
stages:
- install
- build
- staging
- production
staging:
  environment:
    name: staging
    url: https://staging.ukuvota.world
  image: mrsixw/concourse-rsync-resource
  only:
  - master
  script: *id001
  stage: staging
  variables:
    DEPLOY_DIR: staging
test:
  image: spaceywolfi/ukuvota-node
  script: yarn test --ci
  stage: build
