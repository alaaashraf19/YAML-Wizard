image: ruby
pages:
  after_script:
  - cp -R ./css ./public ||true
  - cp -R ./demos ./public ||true
  - cp -R ./Images ./public ||true
  - mv public/README.html public/index.html
  artifacts:
    paths:
    - public
  before_script:
  - bundle install --binstubs
  only:
  - master
  script:
  - bundle exec asciidoctor-revealjs README.adoc -D public
  stage: deploy
