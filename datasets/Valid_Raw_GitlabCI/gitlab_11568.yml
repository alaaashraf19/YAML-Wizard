deploy:master:
  environment:
    name: master
    url: https://git.avamac.com/
  image: mwienk/docker-lftp
  only:
  - master
  script:
  - lftp -c "set ftp:ssl-allow no; open -u $USERNAME,$PASSWORD $HOST; mirror -Rev
    web/ ./web  --ignore-time --parallel=10 --exclude-glob .git* --exclude .git/"
  stage: deploy
stages:
- deploy
