  needs:
  - artifacts: false
    job: build:ubuntu:26.04
  - artifacts: false
    job: test:ansible:lint
  when: manual
variables:
  ANSIBLE_FORCE_COLOR: '1'
  CLICOLOR: '1'
workflow:
  rules: *id001
