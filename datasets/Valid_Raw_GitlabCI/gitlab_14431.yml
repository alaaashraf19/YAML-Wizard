  needs:
  - artifacts: false
    job: build:fedora:43
  - artifacts: false
    job: test:ansible:lint
test:fedora:44:
  allow_failure: true
  extends:
  - .test
  - .rules_redhat
  image: ${CI_REGISTRY_IMAGE}/fedora:44-${CI_COMMIT_REF_SLUG}
  needs:
  - artifacts: false
    job: build:fedora:44
  - artifacts: false
    job: test:ansible:lint
  when: manual
test:fedora:rawhide:
