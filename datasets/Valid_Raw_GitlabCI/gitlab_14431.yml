.build_img:
  before_script:
  - echo "${CI_REGISTRY_PASSWORD}" | podman login "${CI_REGISTRY}" -u "${CI_REGISTRY_USER}"
    --password-stdin
  image:
    entrypoint:
    - ''
    kubernetes:
      user: 1000:1000
    name: quay.io/podman/stable:v5.6.2
  needs:
  - artifacts: false
    job: lint:shellcheck
  stage: build
.rules_eol:
  rules:
  - allow_failure: true
    when: manual
.rules_lint:
  rules: &id001
  - if: $CI_COMMIT_TAG
  - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  - if: $CI_MERGE_REQUEST_IID
.rules_only_warn:
  rules:
  - allow_failure: true
.rules_redhat:
  rules: *id001
.rules_secondary_os:
  rules:
  - allow_failure: true
    when: manual
.rules_ubuntu:
  rules: *id001
.test:
  image:
    kubernetes:
      user: 1010:1010
  script:
  - id
  - pwd
  - ls -la
  - stat .
  - "if [[ $(id -u) -ne 1010 ]]; then\n  echo \"ERROR: test is expected to run as\
    \ user 1010\"\n  exit 1\nfi\n"
  - sudo chown -R 1010:1010 .
  - sudo chmod -R go-w .
  - ./setup.sh
  - ./.gitlab/check_versions.bash
  - ./.gitlab/verify_no_changes.sh
  stage: test
build:fedora:42:
  extends:
  - .build_img
  script:
  - ./.gitlab/build_image.sh fedora 42
build:fedora:43:
  extends:
  - .build_img
  script:
  - ./.gitlab/build_image.sh fedora 43
build:fedora:44:
  allow_failure: true
  extends:
  - .build_img
  script:
  - ./.gitlab/build_image.sh fedora 44
  when: manual
build:fedora:rawhide:
  allow_failure: true
  extends:
  - .build_img
  script:
  - ./.gitlab/build_image.sh fedora rawhide
  when: manual
build:linter:
  extends:
  - .build_img
  script:
  - podman build --cache-from "${CI_REGISTRY_IMAGE}/cache" --cache-to "${CI_REGISTRY_IMAGE}/cache"
    --file "${CI_PROJECT_DIR}/.gitlab/linter.dockerfile" --tag "${CI_REGISTRY_IMAGE}/linter:${CI_COMMIT_REF_SLUG}"
    "${CI_PROJECT_DIR}"
  - podman push "${CI_REGISTRY_IMAGE}/linter:${CI_COMMIT_REF_SLUG}"
build:ubuntu:24.04:
  extends:
  - .build_img
  script:
  - ./.gitlab/build_image.sh ubuntu 24.04
build:ubuntu:26.04:
  allow_failure: true
  extends:
  - .build_img
  script:
  - ./.gitlab/build_image.sh ubuntu 26.04
  when: manual
default:
  interruptible: true
  tags:
  - k8s-amd64
deploy:github:
  after_script:
  - rm ~/.ssh/id_rsa
  - rm ~/.ssh/id_rsa.pub
  environment:
    name: github
  image: registry.fedoraproject.org/fedora:latest
  interruptible: false
  resource_group: github
  rules:
  - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  script:
  - dnf install -y git-core openssh-clients
  - mkdir -p ~/.ssh
  - chmod 700 ~/.ssh
  - echo "${GITHUB_KEY}" > ~/.ssh/id_rsa
  - echo "${GITHUB_KEY_PUB}" > ~/.ssh/id_rsa.pub
  - chmod 700 ~/.ssh/id_rsa*
  - ssh-keyscan 'github.com' >> ~/.ssh/known_hosts
  - git remote add github -t main git@github.com:perobertson/setup.git
  - git fetch --all --verbose
  - git checkout -B "${CI_COMMIT_REF_NAME}"
  - git push --set-upstream github "${CI_COMMIT_REF_NAME}"
  stage: deploy
lint:shellcheck:
  extends:
  - .rules_lint
  image: koalaman/shellcheck-alpine
  script:
  - shellcheck --external-sources setup.sh $(find . -name '*.sh' -path '**/latest/**')
  stage: .pre
test:ansible:lint:
  extends:
  - .rules_lint
  image: $CI_REGISTRY_IMAGE/linter:$CI_COMMIT_REF_SLUG
  needs:
  - artifacts: false
    job: build:linter
  script:
  - git config --global --add safe.directory $CI_PROJECT_DIR
  - go-task ans:lint
  - yamllint -f parsable .
  stage: test
test:fedora:42:
  extends:
  - .test
  - .rules_redhat
  image:
    name: ${CI_REGISTRY_IMAGE}/fedora:42-${CI_COMMIT_REF_SLUG}
  needs:
  - artifacts: false
    job: build:fedora:42
  - artifacts: false
    job: test:ansible:lint
