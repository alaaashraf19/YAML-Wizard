before_script:
- npm -v
- node -v
- pwd
- ls -l
image: jkosgei/chrome
install:
  artifacts:
    expire_in: 1 week
    paths:
    - node_modules/
  script:
  - npm install
  stage: dependences
stages:
- dependences
- tests
tests:
  script:
  - npm install chromedriver
  - npm run test
  - npm run e2e
  stage: tests
