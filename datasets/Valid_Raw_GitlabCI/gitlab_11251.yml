build:
  after_script:
  - pwd && whoami
  - pushd build
  - ./kovri --help 1>&2>/dev/null || ./kovri-util --disable-console-log --help &&
    ./kovri-tests
  - lcov --directory . --capture --output-file coverage.info
  - lcov --remove coverage.info "/builds/kovri-project/kovri/deps/cryptopp/*" "/builds/kovri-project/kovri/deps/miniupnp/*"
    "/builds/kovri-project/kovri/deps/webrtc/*" '/usr/*' --output-file coverage.info
  - lcov --list coverage.info
  - bash <(curl -s https://codecov.io/bash) -Z
  before_script:
  - apt update -qq && apt upgrade -y -qq
  - apt install -y -qq --no-install-recommends cmake curl g++ lcov libboost-filesystem-dev
    libboost-log-dev libboost-program-options-dev libboost-python-dev libboost-regex-dev
    libboost-test-dev libssl-dev
  cache: {}
  only:
  - master
  script:
  - make -j$(nproc) coverage
  stage: build
  variables:
    GIT_SUBMODULE_STRATEGY: recursive
image: ubuntu:cosmic
stages:
- build
