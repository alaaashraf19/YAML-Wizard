before_script:
- npm i
image: node:8
pages:
  artifacts:
    expire_in: 30 days
    paths:
    - public
  dependencies:
  - test
  script:
  - mv coverage/ public/
  stage: deploy
services:
- nats:latest
- nats-streaming:latest
test:
  artifacts:
    paths:
    - coverage/
  script:
  - node_modules/.bin/nyc npm test && node_modules/.bin/nyc report --reporter=html
    --reporter=text-summary
variables:
  LOG_LEVEL: error
  NODE_ENV: ci
