cache:
  paths:
  - _build/*/lib
  - deps
  - assets/node_modules
image: hexpm/elixir:1.18.3-erlang-27.3.4-ubuntu-focal-20250404
pages:
  artifacts:
    paths:
    - public
  before_script:
  - apt-get update
  - apt-get -y install git
  - apt-get -y install build-essential
  - mix local.hex --force
  - mix local.rebar --force
  - mix deps.get
  - mix compile
  only:
  - trunk@code-stats/code-stats
  script:
  - mix docs
  - mv doc public
  tags:
  - saas-linux-small-amd64
release:
  artifacts:
    paths:
    - _build/prod/code_stats-*.tar.gz
  before_script:
  - apt-get update
  - apt-get -y install git
  - apt-get -y install build-essential curl
  - curl -sL https://deb.nodesource.com/setup_20.x | bash
  - apt-get -yq install nodejs
  - mix local.hex --force
  - mix local.rebar --force
  - mix deps.get
  - cd assets
  - npm ci
  - cd ..
  only:
  - trunk@code-stats/code-stats
  script:
  - mix compile --force
  - mix frontend.build
  - mix phx.digest
  - mix release --overwrite
  tags:
  - saas-linux-small-amd64
  variables:
    MINIFY: 'true'
    MIX_ENV: prod
test:
  before_script:
  - apt-get update
  - apt-get -y install git
  - apt-get -y install build-essential
  - mix local.hex --force
  - mix local.rebar --force
  - mix deps.get
  script:
  - mix compile
  - mix test
  services:
  - postgres:latest
  tags:
  - saas-linux-small-amd64
  variables:
    MIX_ENV: ci
    POSTGRES_DB: code_stats_ci
    POSTGRES_PASSWORD: postgres
    POSTGRES_USER: postgres
