.before-build:
  before_script: &id001
  - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" $CI_REGISTRY
build:
  before_script: *id001
  except:
  - master
  script:
  - docker build --pull -t "$CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG" .
  - docker push "$CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG"
  stage: build
build-master:
  before_script: *id001
  only:
  - master
  script:
  - docker build --pull -t "$CI_REGISTRY_IMAGE" .
  - docker push "$CI_REGISTRY_IMAGE"
  stage: build
cache:
  key: ${CI_PROJECT_PATH_SLUG}-${CI_COMMIT_REF_SLUG}
  paths:
  - node_modules/
deploy:
  environment:
    name: production
    url: https://collabatube.com/
  except:
    variables:
    - $CI_COMMIT_MESSAGE =~ /skip-deploy/
  image: alpine:latest
  only:
  - master
  script:
  - apk update
  - apk add openssh-client
  - echo "$PROD_SSH_KEY" > key
  - chmod 0600 key
  - ssh -o "StrictHostKeyChecking no" -i key evkon@collaba-tube.northeurope.cloudapp.azure.com
    "cd code/deploy && make pull-frontend start-frontend"
  stage: deploy
image: docker:latest
services:
- docker:dind
stages:
- build
- deploy
