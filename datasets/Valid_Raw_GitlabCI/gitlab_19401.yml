.docker_gitlab:
  before_script: &id001
  - docker login -u gitlab-ci-token -p "$CI_BUILD_TOKEN" "$CI_REGISTRY"
.docker_hub:
  before_script: &id002
  - docker login -u $DOCKER_USER -p $DOCKER_PASS
before_script:
- docker info
build:gitlab:
  before_script: *id001
  only:
  - master
  script:
  - export VERSION=$(grep ' VERSION' 1.0/Dockerfile.arm64|awk -F" " '{ print $3 }')
  - echo ${VERSION}
  - docker build --build-arg CERT_MANAGER_COMPONENT=controller -t "$CI_REGISTRY_IMAGE:controller-v${VERSION}.arm64.latest"
    1.0 -f 1.0/Dockerfile.arm64
  - docker push "$CI_REGISTRY_IMAGE:controller-v${VERSION}.arm64.latest"
  - docker build --build-arg CERT_MANAGER_COMPONENT=acmesolver -t "$CI_REGISTRY_IMAGE:acmesolver-v${VERSION}.arm64.latest"
    1.0 -f 1.0/Dockerfile.arm64
  - docker push "$CI_REGISTRY_IMAGE:acmesolver-v${VERSION}.arm64.latest"
  stage: build
build:hub:
  before_script: *id002
  only:
  - master
  script:
  - export VERSION=$(grep ' VERSION' 1.0/Dockerfile.arm64|awk -F" " '{ print $3 }')
  - echo ${VERSION}
  - docker build --build-arg CERT_MANAGER_COMPONENT=controller -t "zeiot/$CI_PROJECT_NAME:controller-v${VERSION}.arm64.latest"
    1.0 -f 1.0/Dockerfile.arm64
  - docker push "zeiot/$CI_PROJECT_NAME:controller-v${VERSION}.arm64.latest"
  - docker build --build-arg CERT_MANAGER_COMPONENT=acmesolver -t "zeiot/$CI_PROJECT_NAME:acmesolver-v${VERSION}.arm64.latest"
    1.0 -f 1.0/Dockerfile.arm64
  - docker push "zeiot/$CI_PROJECT_NAME:acmesolver-v${VERSION}.arm64.latest"
  stage: build
deploy:gitlab:
  before_script: *id001
  only:
  - tags
  script:
  - export VERSION=$(grep ' VERSION' 1.0/Dockerfile.arm64|awk -F" " '{ print $3 }')
  - echo ${VERSION}
  - docker build --build-arg CERT_MANAGER_COMPONENT=controller -t "$CI_REGISTRY_IMAGE:controller-v${VERSION}.arm64"
    1.0 -f 1.0/Dockerfile.arm64
  - docker push "$CI_REGISTRY_IMAGE:controller-v${VERSION}.arm64"
  - docker build --build-arg CERT_MANAGER_COMPONENT=acmesolver -t "$CI_REGISTRY_IMAGE:acmesolver-v${VERSION}.arm64"
    1.0 -f 1.0/Dockerfile.arm64
  - docker push "$CI_REGISTRY_IMAGE:acmesolver-v${VERSION}.arm64"
  stage: deploy
deploy:hub:
  before_script: *id002
  only:
  - tags
  script:
  - export VERSION=$(grep ' VERSION' 1.0/Dockerfile.arm64|awk -F" " '{ print $3 }')
  - echo ${VERSION}
  - docker build --build-arg CERT_MANAGER_COMPONENT=controller -t "zeiot/$CI_PROJECT_NAME:controller-v${VERSION}.arm64"
    1.0 -f 1.0/Dockerfile.arm64
  - docker push "zeiot/$CI_PROJECT_NAME:controller-v${VERSION}.arm64"
  - docker build --build-arg CERT_MANAGER_COMPONENT=acmesolver -t "zeiot/$CI_PROJECT_NAME:acmesolver-v${VERSION}.arm64"
    1.0 -f 1.0/Dockerfile.arm64
  - docker push "zeiot/$CI_PROJECT_NAME:acmesolver-v${VERSION}.arm64"
  stage: deploy
image: docker:stable
manifest:gitlab:
  before_script: *id001
  only:
  - tags
  script:
  - export VERSION=$(grep ' VERSION' 1.0/Dockerfile.arm64|awk -F" " '{ print $3 }')
  - echo ${VERSION}
  - docker manifest create ${CI_REGISTRY_IMAGE}:controller-v${VERSION} ${CI_REGISTRY_IMAGE}:controller-v${VERSION}.arm
    ${CI_REGISTRY_IMAGE}:controller-v${VERSION}.arm64
  - docker manifest annotate ${CI_REGISTRY_IMAGE}:controller-v${VERSION} ${CI_REGISTRY_IMAGE}:controller-v${VERSION}.arm
    --os linux --arch arm
  - docker manifest annotate ${CI_REGISTRY_IMAGE}:controller-v${VERSION} ${CI_REGISTRY_IMAGE}:controller-v${VERSION}.arm64
    --os linux --arch arm64
  - docker manifest push ${CI_REGISTRY_IMAGE}:controller-v${VERSION}
  - docker manifest create ${CI_REGISTRY_IMAGE}:acmesolver-v${VERSION} ${CI_REGISTRY_IMAGE}:acmesolver-v${VERSION}.arm
    ${CI_REGISTRY_IMAGE}:acmesolver-v${VERSION}.arm64
  - docker manifest annotate ${CI_REGISTRY_IMAGE}:acmesolver-v${VERSION} ${CI_REGISTRY_IMAGE}:acmesolver-v${VERSION}.arm
    --os linux --arch arm
  - docker manifest annotate ${CI_REGISTRY_IMAGE}:acmesolver-v${VERSION} ${CI_REGISTRY_IMAGE}:acmesolver-v${VERSION}.arm64
    --os linux --arch arm64
  - docker manifest push ${CI_REGISTRY_IMAGE}:acmesolver-v${VERSION}
  stage: manifest
services:
- docker:dind
stages:
- build
- deploy
- manifest
variables:
  DOCKER_DRIVER: overlay2
