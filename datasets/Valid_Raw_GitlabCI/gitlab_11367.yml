build:
  after_script:
  - make clean
  script:
  - make test release IMAGE=registry.gitlab.com/leanlabsio/kanban TAG=${CI_BUILD_REF:0:12}
    REGISTRY_USERNAME=gitlab-ci-token REGISTRY_PASSWORD=$CI_BUILD_TOKEN
  stage: build
  tags:
  - docker
image: cnam/make-builder:latest
services:
- docker:dind
stages:
- build
variables:
  DOCKER_DRIVER: overlay
