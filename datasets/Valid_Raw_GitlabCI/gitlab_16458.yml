before_script: null
deploy:
  only:
    refs:
    - master
  script:
  - export PATH="/home/gitlab-runner/.pyenv/bin:$PATH"
  - eval "$(pyenv init -)"
  - eval "$(pyenv init --path)"
  - eval "$(pyenv virtualenv-init -)"
  - pyenv activate venv
  - source /tools/setup_cclass_new_spike.sh
  - pip install --upgrade pip
  - pip uninstall aapg -y
  - pyenv activate venv
  - pip install twine
  - pip install semver
  - pip install python-gitlab
  - python setup.py sdist
  - python -m twine upload --username $shaktipypiusername --password $shaktipypipassword
    dist/*
  - python /scratch/version-extract-rst.py
  stage: deploy
  tags:
  - shakti-runner
stages:
- test
- test_master
- deploy
test:
  only:
    refs:
    - merge_requests
  script:
  - export PATH="/home/gitlab-runner/.pyenv/bin:$PATH"
  - eval "$(pyenv init -)"
  - eval "$(pyenv init --path)"
  - eval "$(pyenv virtualenv-init -)"
  - pyenv activate venv
  - source /tools/setup_cclass_new_spike.sh
  - pip install --upgrade pip
  - pip uninstall aapg -y
  - pip install -r aapg/requirements.txt
  - pip install -e .
  - aapg --help
  - pytest tests/test_aapg.py -m "serial" -v
  tags:
  - shakti-runner
test_master:
  only:
    refs:
    - master
  script:
  - export PATH="/home/gitlab-runner/.pyenv/bin:$PATH"
  - eval "$(pyenv init -)"
  - eval "$(pyenv init --path)"
  - eval "$(pyenv virtualenv-init -)"
  - pyenv activate venv
  - source /tools/setup_cclass_new_spike.sh
  - pip install --upgrade pip
  - pip uninstall aapg -y
  - pip install -r aapg/requirements.txt
  - pip install -e .
  - aapg --help
  - pytest tests/test_aapg.py -m "serial" -v
  tags:
  - shakti-runner
