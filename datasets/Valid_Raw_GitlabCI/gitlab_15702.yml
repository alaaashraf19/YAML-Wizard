build:
  artifacts:
    name: ${CI_PROJECT_NAME}__${CI_COMMIT_TAG}__${CI_COMMIT_REF_NAME}__${CI_COMMIT_SHA}
    paths:
    - _site/*
  image: haskell:8.0.2
  script:
  - cabal update
  - cabal install --enable-tests
  - ./site configure
  - ./site make
  - ./site build
  stage: build
deploy:
  environment:
    name: Rekahsoft Blog
    url: http://blog.rekahsoft.com
  image: cgswong/aws:latest
  only:
  - master
  script:
  - aws s3 sync _site/ s3://$S3_BUCKET
  stage: deploy
  variables:
    S3_BUCKET: blog-rekahsoft-s3bucket-7pigtftqm4v8
stages:
- build
- deploy
variables:
  AWS_DEFAULT_REGION: us-east-1
