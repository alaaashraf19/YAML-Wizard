image:
  name: golang:1.24.2-bookworm
pages:
  artifacts:
    paths:
    - public
  rules:
  - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  script:
  - apt-get update
  - apt-get install -y brotli
  - curl -LJO https://github.com/sass/dart-sass/releases/download/${DART_SASS_VERSION}/dart-sass-${DART_SASS_VERSION}-linux-x64.tar.gz
  - tar -xf dart-sass-${DART_SASS_VERSION}-linux-x64.tar.gz
  - cp -r dart-sass/ /usr/local/bin
  - rm -rf dart-sass*
  - export PATH=/usr/local/bin/dart-sass:$PATH
  - curl -LJO https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb
  - apt-get install -y ./hugo_extended_${HUGO_VERSION}_linux-amd64.deb
  - rm hugo_extended_${HUGO_VERSION}_linux-amd64.deb
  - curl -fsSL https://deb.nodesource.com/setup_${NODE_VERSION} | bash -
  - apt-get install -y nodejs
  - '[[ -f package-lock.json || -f npm-shrinkwrap.json ]] && npm ci || true'
  - git config core.quotepath false
  - hugo --gc --minify --baseURL ${CI_PAGES_URL}
  - find public/ -type f -regextype posix-extended -regex '.+\.(css|html|js|json|mjs|svg|txt|xml)$'
    -print0 > files.txt
  - time xargs --null --max-procs=0 --max-args=1 brotli --quality=10 --force --keep
    < files.txt
  - time xargs --null --max-procs=0 --max-args=1 gzip -9 --force --keep < files.txt
  stage: deploy
variables:
  DART_SASS_VERSION: 1.89.2
  GIT_DEPTH: 0
  GIT_STRATEGY: clone
  GIT_SUBMODULE_STRATEGY: recursive
  HUGO_VERSION: 0.148.0
  NODE_VERSION: 22.x
  TZ: Europe/Berlin
