cache:
  paths:
  - node_modules/
  - yarn.lock
dev:build:
  artifacts:
    expire_in: 1 day
    paths:
    - dist
  dependencies:
  - dev:pre-build
  image: node:8
  only:
  - develop
  script:
  - yarn
  - yarn build
  stage: build
  tags:
  - socrates
dev:docker:
  dependencies:
  - dev:build
  only:
  - develop
  script:
  - mv dist docker/dist
  - cp package.json docker/
  - mv mysql docker/mysql
  - mv email docker/email
  - cp .db-migraterc docker/
  - docker login -u gitlab-ci-token -p $CI_JOB_TOKEN $CI_REGISTRY
  - docker build -t $CI_DEV_IMAGE_NAME --build-arg APP_PORT=4444 docker
  - docker push $CI_DEV_IMAGE_NAME
  services:
  - docker:dind
  stage: docker
  tags:
  - socrates
dev:pre-build:
  artifacts:
    expire_in: 1 hour
    paths:
    - src/config.js
  environment:
    name: socrates-dev
    url: http://18.197.143.144/
  only:
  - develop
  script:
  - sed -e 's/%username%/'"$SQL_USER_DEV"'/g' rancher/dev/config.js > src/config.js
  - sed -i -e 's/%password%/'"$SQL_PWD_DEV"'/g' src/config.js
  - sed -i -e 's/%email_user%/'"$EMAIL_USER"'/g' src/config.js
  - sed -i -e 's/%email_password%/'"$EMAIL_PASSWORD"'/g' src/config.js
  - sed -i -e 's/%email_provider%/'"$EMAIL_PROVIDER"'/g' src/config.js
  - sed -i -e 's/%jwt_secret%/'"$JWT_SECRET_DEV"'/g' src/config.js
  stage: pre-build
  tags:
  - socrates
dev:staging:
  environment:
    name: socrates-dev
    url: http://18.197.143.144/
  image: wzrdtales/ci-rancher-tools:latest
  only:
  - develop
  script:
  - cd rancher/dev
  - export RANCHER_URL=$RANCHER_URL_DEV
  - export RANCHER_ACCESS_KEY=$RANCHER_ACCESS_KEY_DEV
  - export RANCHER_SECRET_KEY=$RANCHER_SECRET_KEY_DEV
  - export DB_ENV=dev
  - export DB_USER=$SQL_USER_DEV
  - export DB_PASS=$SQL_PWD_DEV
  - rancher-compose -p socrates-dev up --force-upgrade -c --batch-size 1 -d --upgrade
    --pull socrates-server
  stage: staging
  tags:
  - socrates
install:
  artifacts:
    expire_in: 1 hour
    paths:
    - node_modules
    - coverage
    - .nyc_output
  image: node:8
  script:
  - yarn --force
  - mkdir coverage
  - mkdir .nyc_output
  stage: install
  tags:
  - socrates
pages:
  artifacts:
    expire_in: 30 days
    paths:
    - public/
  dependencies:
  - test
  only:
  - develop
  script:
  - mv coverage/* public
  - mv public/gitlab_page.html public/index.html
  stage: report
  tags:
  - socrates
  when: always
prod:build:
  artifacts:
    expire_in: 1 day
    paths:
    - dist
  dependencies:
  - prod:pre-build
  image: node:8
  only:
  - master
  script:
  - yarn
  - yarn build
  stage: build
  tags:
  - socrates
prod:docker:
  dependencies:
  - prod:build
  only:
  - master
  script:
  - mv dist docker/dist
  - cp package.json docker/
  - mv mysql docker/mysql
  - mv email docker/email
  - cp .db-migraterc docker/
  - docker login -u gitlab-ci-token -p $CI_JOB_TOKEN $CI_REGISTRY
  - docker build -t $CI_PROD_IMAGE_NAME --build-arg APP_PORT=4444 docker
  - docker push $CI_PROD_IMAGE_NAME
  services:
  - docker:dind
  stage: docker
  tags:
  - socrates
prod:pre-build:
  artifacts:
    expire_in: 1 hour
    paths:
    - src/config.js
  environment:
    name: socrates-prod
    url: http://18.195.152.133/
  only:
  - master
  script:
  - sed -e 's/%username%/'"$SQL_USER_PROD"'/g' rancher/dev/config.js > src/config.js
  - sed -i -e 's/%password%/'"$SQL_PWD_PROD"'/g' src/config.js
  - sed -i -e 's/%email_user%/'"$EMAIL_USER"'/g' src/config.js
  - sed -i -e 's/%email_password%/'"$EMAIL_PASSWORD"'/g' src/config.js
  - sed -i -e 's/%email_provider%/'"$EMAIL_PROVIDER"'/g' src/config.js
  - sed -i -e 's/%jwt_secret%/'"$JWT_SECRET_PROD"'/g' src/config.js
  stage: pre-build
  tags:
  - socrates
prod:staging:
  environment:
    name: socrates-prod
    url: http://18.195.152.133/
  image: wzrdtales/ci-rancher-tools:latest
  only:
  - master
  script:
  - cd rancher/prod
  - export RANCHER_URL=$RANCHER_URL_PROD
  - export RANCHER_ACCESS_KEY=$RANCHER_ACCESS_KEY_PROD
  - export RANCHER_SECRET_KEY=$RANCHER_SECRET_KEY_PROD
  - export DB_ENV=prod
  - export DB_USER=$SQL_USER_PROD
  - export DB_PASS=$SQL_PWD_PROD
  - rancher-compose -p socrates-prod up --force-upgrade -c --batch-size 1 -d --upgrade
    --pull socrates-server
  stage: staging
  tags:
  - socrates
stages:
- install
- test
- pre-build
- build
- docker
- staging
- report
test:
  artifacts:
    expire_in: 1 day
    paths:
    - coverage
    - .nyc_output
  dependencies:
  - install
  image: node:8
  script:
  - yarn test
  stage: test
  tags:
  - socrates
variables:
  CI_DEV_IMAGE_NAME: registry.gitlab.com/socrates-conference/socrates-server/socrates-server-dev
  CI_PROD_IMAGE_NAME: registry.gitlab.com/socrates-conference/socrates-server/socrates-server-prod
  DOCKER_DRIVER: overlay
