build:
  image: docker
  script:
  - ./dockerfiles/build.sh
  - docker login -u btimperman -p $HUB_PASSWORD
  - ./dockerfiles/push.sh
  services:
  - docker:dind
  stage: build
deploy:
  image: btimperman/env:ucp-compose
  script:
  - export COMPOSE_PROJECT_NAME=ab
  - export COMPOSE_FILE=docker-compose.prod.yml
  - docker-compose down
  - docker-compose pull
  - docker-compose up -d
  - export COMPOSE_PROJECT_NAME=registrator
  - export COMPOSE_FILE=registrators.yml
  - docker-compose down
  - docker-compose up -d
  stage: deploy
  variables:
    COMPOSE_FILE: docker-compose.prod.yml
    COMPOSE_PROJECT_NAME: ab
stages:
- build
- deploy
