before_script:
- pip install tox
test:34:
  image: python:3.4
  only:
  - master
  script: tox -e $TOX_ENV
  variables:
    TOX_ENV: py34
  when: always
test:35:
  image: python:3.5
  only:
  - master
  script: tox -e $TOX_ENV
  variables:
    TOX_ENV: py35
  when: always
test:36:
  image: python:3.6
  only:
  - master
  script: tox -e $TOX_ENV
  variables:
    TOX_ENV: py36
  when: always
test:pep8:
  image: python:3.6
  only:
  - master
  script: tox -e $TOX_ENV
  variables:
    TOX_ENV: pep8
  when: always
