before_script:
- dnf --setopt=cachedir=`pwd`/dnf-cache --quiet --assumeyes install /usr/bin/nikola
cache:
  key: dnf-cache
  paths:
  - dnf-cache/
image: fedora:32
pages:
  artifacts:
    paths:
    - public
  only:
  - master
  script:
  - nikola build
  tags:
  - shared
test:
  artifacts:
    paths:
    - public
  except:
  - master
  script:
  - nikola build
  tags:
  - shared
