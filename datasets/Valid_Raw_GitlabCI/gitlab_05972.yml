before_script:
- pip install pipenv
- pip install -r requirements.txt
- pip install tox
cache:
  paths:
  - ~/.cache/pip/
coverage:
  artifacts:
    expire_in: 1 day
    paths:
    - htmlcov
  coverage: /TOTAL.+ ([0-9]{1,3}%)/
  script:
  - pip install coverage
  - coverage run --source='.' manage.py test
  - tox -e py37-django21
  - coverage html
  stage: test
  variables:
    DATABASE_URL: postgresql://$POSTGRES_USER:@postgres:5432/$POSTGRES_DB
docs:
  artifacts:
    expire_in: 1 day
    paths:
    - docs/build/html/
  script:
  - pip install -r requirements.txt
  - pip install sphinx
  - cd docs/
  - rm -rf build/
  - make html
  stage: build
image: python:3.7
pages:
  artifacts:
    paths:
    - public
  dependencies:
  - coverage
  - docs
  only:
  - master
  script:
  - mkdir -p public/coverage
  - cp -fr docs/build/html/* public/
  - cp -fr htmlcov/* public/coverage/
  stage: publish
python37:
  image: python:3.7
  script: tox -epy37-django21
  stage: test
services:
- postgres:latest
stages:
- test
- build
- publish
variables:
  POSTGRES_DB: database_name
  POSTGRES_HOST_AUTH_METHOD: trust
  POSTGRES_PASSWORD: ''
  POSTGRES_USER: runner
