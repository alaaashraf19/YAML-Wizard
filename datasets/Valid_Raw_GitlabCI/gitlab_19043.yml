.activate-deps:
  before_script:
  - apt-get update
  - apt-get -y install libgirepository1.0-dev libpoppler-glib-dev gir1.2-poppler-0.18
  - source venv/bin/activate
build:
  extends: .activate-deps
  script:
  - python -m build -n
  - pip install --upgrade .
  stage: build
cache:
  paths:
  - .cache/pip
  - venv/
image: python:3.10.8
prepare:
  script:
  - apt-get update
  - apt-get -y install libgirepository1.0-dev libpoppler-glib-dev gir1.2-poppler-0.18
  - pip install virtualenv
  - virtualenv venv
  - source venv/bin/activate
  - pip install build
  - pip install -U '.[tests]'
  stage: .pre
test:
  extends: .activate-deps
  script:
  - make check-type
  - make check-code
  - make test
  stage: test
variables:
  PIP_CACHE_DIR: $CI_PROJECT_DIR/.cache/pip
