before_script:
- pip install --editable .
deploy:
  only:
  - tags
  script:
  - pip install -U twine setuptools wheel
  - python setup.py bdist_wheel
  - twine upload -u $PYPI_USER -p $PYPI_PASS dist/*
  stage: deploy
gitlab-release-test:
  environment:
    name: gitlab-release-test
    url: https://gitlab.com/alelec/gitlab-release-test/-/releases
  script:
  - git config --global user.email "ci@gitlab.com"
  - git config --global user.name "Gitlab Release"
  - pip install requests setuptools_scm
  - gitlab-release --version
  - git clone "https://andrewleech:${gitlab_release_test_token}@gitlab.com/alelec/gitlab-release-test.git"
  - cd gitlab-release-test
  - bash ./create_update.sh
  - next_vers=$(<version.txt)
  - cd ..
  - PRIVATE_TOKEN="" python gitlab_release.py --server https://gitlab.com/ --project_id
    28426883 --release_tag "${next_vers}" --ignore_cert gitlab_release.py
  - python gitlab_release.py --server https://gitlab.com/ --project_id 28426883 --release_tag
    ${next_vers} --ignore_cert --private-token "${gitlab_release_test_token}" Readme.rst
  stage: test
  when: manual
image: python:3
stages:
- test
- deploy
test:
  artifacts:
    paths:
    - ./*.whl
  only:
  - tags
  script:
  - pip install -U setuptools wheel
  - python setup.py bdist_wheel
  - pip install dist/*.whl
  - mv dist/*.whl ./
  - gitlab-release --link-artifact --description "https://pypi.python.org/pypi/gitlab-release"
    ./*.whl
  stage: test
