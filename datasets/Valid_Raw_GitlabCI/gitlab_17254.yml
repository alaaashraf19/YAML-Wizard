analyze:flow:
  dependencies:
  - install
  image: node:8
  only:
  - develop
  script:
  - yarn build-css
  - yarn flow
  stage: analyze
  tags:
  - socrates
analyze:lint:
  dependencies:
  - install
  image: node:8
  only:
  - develop
  script:
  - yarn build-css
  - yarn lint
  stage: analyze
  tags:
  - socrates
analyze:react-lint:
  dependencies:
  - install
  image: node:8
  only:
  - develop
  script:
  - yarn build-css
  - yarn react-scripts-build
  stage: analyze
  tags:
  - socrates
cache:
  paths:
  - node_modules/
  - yarn.lock
coverage:collect:
  artifacts:
    expire_in: 1 day
    paths:
    - coverage
  dependencies:
  - test:unit
  - test:cucumber
  image: node:8
  script:
  - yarn test:coverage:collect
  stage: coverage
  tags:
  - socrates
dev:build:
  allow_failure: false
  artifacts:
    expire_in: 1 day
    paths:
    - build
  environment:
    name: socrates-dev
    url: http://18.197.143.144/
  image: node:8
  only:
  - develop
  script:
  - sed -e 's/%jwt_secret%/'"$JWT_SECRET_DEV"'/g' rancher/dev/config.js > src/config.js
  - sed -i -e 's/%instana_key%/'"$INSTANA_API_KEY_DEV"'/g' public/index.html
  - yarn
  - yarn build
  stage: build
  tags:
  - socrates
dev:docker:
  dependencies:
  - dev:build
  only:
  - develop
  script:
  - mv build docker/build
  - docker login -u gitlab-ci-token -p $CI_JOB_TOKEN $CI_REGISTRY
  - docker build -t $CI_DEV_IMAGE_NAME docker
  - docker push $CI_DEV_IMAGE_NAME
  services:
  - docker:dind
  stage: docker
  tags:
  - socrates
dev:staging:
  environment:
    name: socrates-dev
    url: http://18.197.143.144/
  image: wzrdtales/ci-rancher-tools:latest
  only:
  - develop
  script:
  - cd rancher/dev
  - export RANCHER_URL=$RANCHER_URL_DEV
  - export RANCHER_ACCESS_KEY=$RANCHER_ACCESS_KEY_DEV
  - export RANCHER_SECRET_KEY=$RANCHER_SECRET_KEY_DEV
  - rancher-compose -p socrates-dev up --force-upgrade -c --batch-size 1 -d --upgrade
    --pull socrates-attendee-client
  stage: staging
  tags:
  - socrates
install:
  artifacts:
    expire_in: 1 hour
    paths:
    - node_modules
    - coverage
    - .nyc_output
  image: node:8
  script:
  - yarn
  - mkdir coverage
  - mkdir .nyc_output
  stage: install
  tags:
  - socrates
pages:
  artifacts:
    expire_in: 30 days
    paths:
    - public/
  dependencies:
  - coverage:collect
  only:
  - develop
  script:
  - mv coverage/* public
  - mv public/gitlab_page.html public/index.html
  stage: report
  tags:
  - socrates
  when: always
prod:build:
  allow_failure: false
  artifacts:
    expire_in: 1 day
    paths:
    - build
  environment:
    name: socrates-prod
    url: http://18.195.152.133/
  image: node:8
  only:
  - master
  script:
  - sed -e 's/%jwt_secret%/'"$JWT_SECRET_PROD"'/g' rancher/prod/config.js > src/config.js
  - sed -i -e 's/%instana_key%/'"$INSTANA_API_KEY_PROD"'/' public/index.html
  - yarn
  - yarn build
  stage: build
  tags:
  - socrates
prod:docker:
  dependencies:
  - prod:build
  only:
  - master
  script:
  - mv build docker/build
  - docker login -u gitlab-ci-token -p $CI_JOB_TOKEN $CI_REGISTRY
  - docker build -t $CI_PROD_IMAGE_NAME docker
  - docker push $CI_PROD_IMAGE_NAME
  services:
  - docker:dind
  stage: docker
  tags:
  - socrates
prod:staging:
  environment:
    name: socrates-prod
    url: http://18.195.152.133/
  image: wzrdtales/ci-rancher-tools:latest
  only:
  - master
  script:
  - cd rancher/prod
  - export RANCHER_URL=$RANCHER_URL_PROD
  - export RANCHER_ACCESS_KEY=$RANCHER_ACCESS_KEY_PROD
  - export RANCHER_SECRET_KEY=$RANCHER_SECRET_KEY_PROD
  - rancher-compose -p socrates-prod up --force-upgrade -c --batch-size 1 -d --upgrade
    --pull socrates-attendee-client
  stage: staging
  tags:
  - socrates
stages:
- install
- analyze
- test
- coverage
- build
- docker
- staging
- report
test:cucumber:
  artifacts:
    expire_in: 1 hour
    paths:
    - node_modules
    - coverage
    - .nyc_output
  dependencies:
  - install
  image: node:8
  script:
  - yarn test:coverage:cucumber
  stage: test
  tags:
  - socrates
test:unit:
  artifacts:
    expire_in: 1 hour
    paths:
    - node_modules
    - coverage
    - .nyc_output
  dependencies:
  - install
  image: node:8
  script:
  - yarn test:coverage:unit
  stage: test
  tags:
  - socrates
variables:
  CI_DEV_IMAGE_NAME: registry.gitlab.com/socrates-conference/socrates-attendee-client/socrates-attendee-client-dev
  CI_PROD_IMAGE_NAME: registry.gitlab.com/socrates-conference/socrates-attendee-client/socrates-attendee-client-prod
  DOCKER_DRIVER: overlay
