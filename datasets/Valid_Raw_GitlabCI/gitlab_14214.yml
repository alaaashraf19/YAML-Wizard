auto_package:
  interruptible: true
  script:
  - export DELIVERY_ENV=test
  - echo "Commit branch:$CI_COMMIT_BRANCH"
  - if [[ $CI_PROJECT_NAMESPACE == "Oslandia" ]]; then OSGEO4W_REPO_FOLDER="extra";
    else OSGEO4W_REPO_FOLDER="extra-$CI_PROJECT_NAMESPACE-$CI_COMMIT_BRANCH"; fi
  - echo "OSGeo4W repository folder:$OSGEO4W_REPO_FOLDER  "
  - if [[ "$CI_COMMIT_BRANCH" !=  "master"  ]]; then echo "Branch build! "; REF_COMMIT=origin/master;
    else echo "Master build!"; REF_COMMIT=$CI_COMMIT_BEFORE_SHA; export DELIVERY_ENV=release;
    fi
  - echo "Use diff $REF_COMMIT...$CI_COMMIT_SHA to get modified packages list"
  - export PACKAGE_NAMES=$(git diff --name-only $REF_COMMIT...$CI_COMMIT_SHA | grep
    -oP '^packages/\K[^/]*' | uniq | grep -v __inc__ )
  - echo "Following packages has been modified and will be built:"; echo "$PACKAGE_NAMES"
  - if [ -z "$PACKAGE_NAMES" ]; then echo "No package to build !"; exit 0; fi
  - ./scripts/packages.sh $DELIVERY_ENV $PACKAGE_NAMES
  stage: build
  tags:
  - win10-vs2017
  - osgeo4w
triggered_package:
  artifacts:
    paths:
    - output/
  only:
  - triggers
  script:
  - cd packages/${PACKAGE_NAME}
  - if [ -x package.sh ]; then /bin/bash ./package.sh ${DELIVERY_ENV}; else cmd /c
    "package.cmd ${DELIVERY_ENV}"; fi
  - cd ../..
  - scp scripts/genini scripts/gen_setup_ini.sh ci@ci.oslandia.net:~/
  - ssh ci@ci.oslandia.net ./gen_setup_ini.sh ${DELIVERY_ENV}
  stage: build
  tags:
  - win10
  - osgeo4w
