.auto-deploy:
  before_script:
  - 'SLUG=$CI_PROJECT_PATH_SLUG

    [ "$CI_COMMIT_REF_SLUG" = "master" ] || SLUG="${SLUG}-${CI_COMMIT_REF_SLUG}"

    SLUG=$(echo "$SLUG" |cut -b1-53)

    export KUBE_NAMESPACE=default

    export CI_ENVIRONMENT_SLUG=$SLUG

    export CI_ENVIRONMENT_NAME=$SLUG

    export CI_ENVIRONMENT_URL=${SLUG}.${KUBE_INGRESS_BASE_DOMAIN}

    '
  - cd $CI_PROJECT_DIR
  - /build/bin/auto-deploy download_chart
  - 'sed -i ''s/ingress.class: "nginx"/ingress.class: "traefik"/'' chart/values.yaml

    sed -i ''s/^.*secretName: .*$//'' chart/templates/ingress.yaml

    '
  - wget https://gitlab.com/internetarchive/kre8/-/raw/master/ingressroute.yml -qO
    chart/templates/ingressroute.yml
  - sed -i 's/ template "fullname" / template "trackableappname" /' chart/templates/{ingress,service}.yaml
include:
- template: Auto-DevOps.gitlab-ci.yml
variables:
  AUTO_DEVOPS_BUILD_IMAGE_EXTRA_ARGS: --no-cache=true --network=host
  CODE_QUALITY_DISABLED: 'true'
  PERFORMANCE_DISABLED: 'true'
  POSTGRES_ENABLED: 'false'
