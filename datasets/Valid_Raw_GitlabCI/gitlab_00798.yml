job_javascript_node:
  image: almarklein/nodejs
  script:
  - cd javascript
  - pip3 install invoke
  - python3 --version
  - nodejs --version || node --version
  - invoke -l
  - invoke lint
  - invoke test-unit
  - invoke test-shared
job_matlab_octave:
  image: almarklein/octave
  script:
  - cd matlab
  - pip3 install invoke
  - python3 --version
  - octave-cli --version
  - invoke -l
  - invoke test-unit --octave
  - invoke test-shared --octave
job_python_lite_py313:
  image: python:3.13
  script:
  - cd python_lite
  - pip install invoke pytest pytest-cov numpy
  - python --version
  - invoke -l
  - invoke test-unit
  - invoke test-shared
  variables:
    BSDF_TEST_EXCLUDES: ndarray
