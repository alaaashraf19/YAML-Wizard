job_python_py313:
  image: python:3.13
  script:
  - cd python
  - pip install invoke flake8 pytest pytest-cov numpy setuptools
  - python --version
  - invoke -l
  - invoke lint
  - invoke test-unit
  - invoke test-shared
  - python setup.py install
  - cd ~
  - bsdf create foo.bsdf '[2, 3] * 4'
  - bsdf view foo.bsdf
