pages:
  artifacts:
    paths:
    - public
  image: python:3.13
  only:
  - main
  - website
  script:
  - pip install invoke markdown pygments
  - python --version
  - invoke -l
  - invoke python.update-readme
  - invoke python-lite.update-readme
  - invoke build-pages
  - mv _docs/_pages public
  stage: deploy
validation:
  image: python:3.13
  script:
  - pip install invoke
  - python --version
  - invoke -l
  - invoke check-whitespace
  - invoke check-versions
  stage: deploy
