build_base:
  image: gioxa/imagebuilder-c7
  retry: 1
  script:
  - export OS_CONFIG=make_os.conf
  - make_os
  - registry_push --rootfs --ISR --reference=$CI_PIPELINE_ID --config=docker_config.yml
  stage: build
  tags:
  - odagrun
  variables:
    GIT_CACHE_STRATEGY: push-pull
    ODAGRUN_POD_SIZE: medium
    WORK_SPACES: "- name: repocache C${DISTRO_RELEASE}\n  key: x86_64\n  scope: global\n\
      \  path:\n    - cache/yum/x86_64/$DISTRO_RELEASE/base\n    - cache/yum/x86_64/$DISTRO_RELEASE/updates\n\
      \  strategy: push-pull\n  threshold:\n    path:\n      - cache/yum/x86_64/$DISTRO_RELEASE/base/packages/*.rpm\n\
      \      - cache/yum/x86_64/$DISTRO_RELEASE/updates/packages/*.rpm\n"
cleanup:
  allow_failure: true
  dependencies: []
  image: scratch
  script:
  - ImageStream_delete --name="" --allow-fail
  stage: cleanup
  tags:
  - odagrun
  variables:
    GIT_STRATEGY: none
  when: always
push-image-tags:
  environment: production
  image: scratch
  only:
  - master
  script:
  - copy --to_var=DOCKER_CONFIG_YML --from_file=docker_config.yml
  - copy --to_var=MAKE_OS_CONF --from_file=make_os.conf
  - copy --to_var=ODAGRUN_IMAGE_DESCRIPTION --substitute --from_file=./full_description.md.in
  - DockerHub_set_description --allow-fail --image=$DOCKER_NAMESPACE/$ODAGRUN_IMAGE_REFNAME
    --set-private=no
  - registry_push --from_ISR --from_reference=$CI_PIPELINE_ID --image=$DOCKER_NAMESPACE/$ODAGRUN_IMAGE_REFNAME:$ODAGRUN_SHORT_DATE
    --skip_label
  - registry_tag_image --image=${DOCKER_NAMESPACE}/${ODAGRUN_IMAGE_REFNAME}:${ODAGRUN_SHORT_DATE}
    --tag=latest
  - MicroBadger_Update  --allow-fail --image=$DOCKER_NAMESPACE/$ODAGRUN_IMAGE_REFNAME
  stage: deploy
  tags:
  - odagrun
stages:
- build
- test
- deploy
- cleanup
test_fpm:
  dependencies: []
  image: ImageStream:$CI_PIPELINE_ID
  script:
  - echo $PATH
  - uname -a
  - rpmbuild --version
  stage: test
  tags:
  - odagrun
  variables:
    GIT_STRATEGY: none
variables:
  DISTRO_RELEASE: 7
  DOCKER_NAMESPACE: gioxa
  GIT_CACHE_STRATEGY: pull
  ODAGRUN_IMAGE_LICENSES: MIT
  ODAGRUN_IMAGE_REFNAME: ruby-rpm-build-centos
  ODAGRUN_IMAGE_TITLE: CentOS 7 docker image with all dependencies to build and package
    ruby with rpmbuild.
  ODAGRUN_IMAGE_VENDOR: Gioxa Ltd
  ODAGRUN_POD_SIZE: micro
