gitlab-com-csmerm:missing_attributes:
  extends: .run
  parallel:
    matrix:
    - TRIAGE_SOURCE_PATH: 99832539
      TRIAGE_SOURCE_TYPE: groups
    - TRIAGE_SOURCE_PATH: 99832609
      TRIAGE_SOURCE_TYPE: groups
    - TRIAGE_SOURCE_PATH: 89002054
      TRIAGE_SOURCE_TYPE: groups
    - TRIAGE_SOURCE_PATH: 99832590
      TRIAGE_SOURCE_TYPE: groups
    - TRIAGE_SOURCE_PATH: 12571797
      TRIAGE_SOURCE_TYPE: projects
  rules:
  - if: $TRIAGE_MISSING_ATTRIBUTES
  stage: hygiene
  variables:
    TRIAGE_POLICY_FILE: policies/groups/gitlab-com/csmerm/missing_triage_attributes.yml
gitlab-com-support-forum:auto-closure:
  extends: .run
  rules:
