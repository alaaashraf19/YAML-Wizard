android:
  artifacts:
    paths:
    - app-debug.apk
  image: jangrewe/gitlab-ci-android
  script:
  - mv index.min.html android/app/src/main/assets/www/index.html
  - cd android
  - echo "org.gradle.jvmargs=-Xmx1024m" > gradle.properties
  - echo "org.gradle.daemon=false" >> gradle.properties
  - ./gradlew assembleDebug
  - mv app/build/outputs/apk/debug/app-debug.apk ..
  stage: stage2
cache:
  key: ${CI_PROJECT_ID}
  paths:
  - android/.gradle/
firefox:
  artifacts:
    name: clavem
    paths:
    - clavem
  script:
  - mkdir -p clavem/{public,addon}
  - cp manifest.json clavem
  - cp public/{crypto.js,script.js,launcher-icon-1x.png,launcher-icon-2x.png} clavem/public
  - cp addon/{index.html,script.js,style.css} clavem/addon
  stage: stage1
image: bash:latest
minify:
  artifacts:
    paths:
    - index.min.html
  script:
  - apk update
  - apk add nodejs-npm
  - npm install -g inliner
  - cd public
  - cat index.html | inliner > ../index.min.html
  stage: stage1
pages:
  artifacts:
    paths:
    - public
  only:
  - master
  script:
  - echo "Nothing to do..."
  stage: stage1
stages:
- stage1
- stage2
