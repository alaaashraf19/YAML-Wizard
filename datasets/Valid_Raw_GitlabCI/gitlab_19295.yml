.job_template:
  script: &id001
  - rustc --version
  - cargo check
  stage: build
Integration tests:
  image: library/rust:$RUSTC_STABLE_VERSION
  script:
  - rustc --version
  - cargo test
  services:
  - alias: eventstore
    name: eventstore/eventstore:release-4.1.0
  variables:
    EVENTSTORE_HOST: eventstore
Linting:
  allow_failure: true
  before_script:
  - rustup component add clippy-preview
  image: library/rust:$RUSTC_STABLE_VERSION
  script:
  - cargo clippy -- -D warnings
  stage: lint
Rustc Nightly:
  image: rustlang/rust:nightly
  script: *id001
  stage: build
Rustc Stable:
  image: library/rust:$RUSTC_STABLE_VERSION
  script: *id001
  stage: build
push on crates.io:
  image: library/rust:$RUSTC_STABLE_VERSION
  only:
  - tags
  script:
  - cargo --version
  - cargo login $CRATE_TOKEN
  - cargo package
  - cargo publish
  stage: deploy
stages:
- build
- test
- lint
- deploy
variables:
  RUSTC_STABLE_VERSION: '1.35'
