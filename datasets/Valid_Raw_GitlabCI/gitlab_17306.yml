image_build:
  image: docker:git
  only:
  - tags
  script:
  - IMAGE_VERSION=$(grep "\_VERSION\=" space | cut -d'=' -f2 | cut -d"\"" -f2)
  - docker login -u gitlab-ci-token -p $CI_BUILD_TOKEN $CI_REGISTRY
  - docker build --build-arg VERSION=$IMAGE_VERSION -t $CI_REGISTRY_IMAGE:$IMAGE_VERSION
    -f ./build/Dockerfile .
  - docker push $CI_REGISTRY_IMAGE:$IMAGE_VERSION
  services:
  - docker:dind
  stage: image_build_version
image_release:
  image: docker:git
  only:
  - tags
  script:
  - IMAGE_VERSION=$(grep "\_VERSION\=" space | cut -d'=' -f2 | cut -d"\"" -f2)
  - docker pull $CI_REGISTRY_IMAGE:$IMAGE_VERSION
  - docker login -u gitlab-ci-token -p $CI_BUILD_TOKEN $CI_REGISTRY
  - docker tag $CI_REGISTRY_IMAGE:$IMAGE_VERSION $CI_REGISTRY_IMAGE:latest
  - docker push $CI_REGISTRY_IMAGE:latest
  services:
  - docker:dind
  stage: image_update_latest
image_test:
  image: docker:git
  only:
  - tags
  script:
  - IMAGE_VERSION=$(grep "\_VERSION\=" space | cut -d'=' -f2 | cut -d"\"" -f2)
  - docker pull $CI_REGISTRY_IMAGE:$IMAGE_VERSION
  - sh test/test_build.sh
  services:
  - docker:dind
  stage: image_test_version
stages:
- test
- image_build_version
- image_test_version
- image_update_latest
