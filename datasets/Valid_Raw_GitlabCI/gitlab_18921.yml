cache:
  paths:
  - .m2/repository
  - webapp/node_modules/
  - webapp/node/
image: maven:3.5.3-jdk-8
project_deploy:
  artifacts:
    expire_in: 1 week
    paths:
    - webapp/target/shoppinglist.war
    - shoppinglist-data/target/classes/database.properties
    - shoppinglist-data/target/classes/mysql-liquibase-changelog.xml
  dependencies: []
  only:
  - production
  - deploy-testing
  script:
  - mvn package $MAVEN_CLI_OPTS -P production,frontendCompilation $MAVEN_OPTS
  stage: deploy
project_integration_test:
  artifacts:
    expire_in: 2 days
    paths:
    - webapp/build/reports/tests
    - build/reports/tests
    - webapp/target/shoppinglist.war
    when: on_failure
  dependencies: []
  image: markhobson/maven-chrome:latest
  only:
  - production
  - master
  - change-testing-parameter
  script:
  - mvn package verify $MAVEN_CLI_OPTS -P integrationTests,frontendCompilation,dbForTesting
    $MAVEN_OPTS
  services:
  - mysql:5
  stage: test
  variables:
    MYSQL_DATABASE: shoppinglist_test
    MYSQL_PASSWORD: AE8ffVU8Sh5yjzRDy4UADsWa
    MYSQL_ROOT_PASSWORD: daBRHf2PJYRbkxcZfhPqUQmX
    MYSQL_USER: shoppinglistTesting
project_unit_test:
  artifacts:
    expire_in: 2h
    paths:
    - webapp/target/surefire-reports
  dependencies: []
  script:
  - mvn test $MAVEN_CLI_OPTS -P unit-test,dbForTesting $MAVEN_OPTS
  stage: test
stages:
- test
- deploy
variables:
  MAVEN_CLI_OPTS: --batch-mode --errors --show-version
  MAVEN_OPTS: -Dmaven.repo.local=.m2/repository -Dorg.slf4j.simpleLogger.log.org.apache.maven.cli.transfer.Slf4jMavenTransferListener=WARN
    -Dorg.slf4j.simpleLogger.showDateTime=true -Djava.awt.headless=true
