cert-renewal:
  only:
  - schedules
  script:
  - echo "deb http://deb.debian.org/debian stretch-backports main" >> /etc/apt/sources.list
  - apt-get update
  - apt-get install certbot -t stretch-backports -y
  - apt-get install git curl -y
  - export PATH=$PATH:$CI_PROJECT_DIR
  - git config --global user.name $GITLAB_USER_LOGIN
  - git config --global user.email $GITLAB_USER_EMAIL
  - chmod +x  ./letsencrypt_generate.sh
  - chmod +x  ./letsencrypt_authenticator.sh
  - ./letsencrypt_generate.sh
  variables:
    CERTBOT_RENEWAL_GIT_TOKEN: $CERTBOT_RENEWAL_GIT_TOKEN
hexo:
  artifacts:
    paths:
    - public/
  before_script:
  - npm install gulp -g
  - npm install hexo-cli -g
  - npm install
  cache:
    key: project
    paths:
    - node_modules/
  only:
  - master
  script:
  - gulp build --cwd ./themes/starter
  - hexo generate
  stage: build
htmlproofer:
  dependencies:
  - hexo
  image: bobik/html-proofer-docker:gitlabci
  only:
    variables:
    - $CI_COMMIT_MESSAGE =~ /htmlproofer/
  script:
  - htmlproofer public/ --url-ignore "/fediverse.network/,/howto.disroot.org/,/f-droid.org/"
    --external-only --checks-to-ignore ScriptCheck,ImageCheck
  stage: test
image: node:10.15.0
pages:
  artifacts:
    paths:
    - public/
  dependencies:
  - hexo
  only:
  - master
  script:
  - echo 'Deploying...'
  stage: deploy
  variables:
    GIT_STRATEGY: none
