.anchors:
- mkdir -p $(dirname ${PACKAGE_PATH}) && ln -s ${CI_PROJECT_DIR} ${PACKAGE_PATH} &&
  cd ${PACKAGE_PATH}
build:
  dependencies:
  - dep
  image: docker:17
  script:
  - docker build -t app .
  services:
  - docker:dind
  stage: build
dep:
  artifacts:
    expire_in: 1 hour
    name: vendor-$CI_PIPELINE_ID
    paths:
    - vendor/
  before_script:
  - apk add --no-cache curl git
  - curl -sSL https://github.com/golang/dep/releases/download/v0.5.0/dep-linux-amd64
    -o /go/bin/dep
  - chmod +x /go/bin/dep
  - mkdir -p $(dirname ${PACKAGE_PATH}) && ln -s ${CI_PROJECT_DIR} ${PACKAGE_PATH}
    && cd ${PACKAGE_PATH}
  image: golang:1.10-alpine3.7
  script:
  - dep ensure -v -vendor-only
  stage: dep
stages:
- dep
- test
- build
test:
  before_script:
  - mkdir -p $(dirname ${PACKAGE_PATH}) && ln -s ${CI_PROJECT_DIR} ${PACKAGE_PATH}
    && cd ${PACKAGE_PATH}
  dependencies:
  - dep
  image: golang:1.10-alpine3.7
  script:
  - go test ./...
  stage: test
variables:
  PACKAGE_PATH: /go/src/gitlab.com/hypnoglow/example-go-docker-gitlab
