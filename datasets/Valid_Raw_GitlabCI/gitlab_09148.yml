before_script:
- git config --global user.email "mail@antlike.tech"
- npm install
- npm run build
cache:
  paths:
  - node_modules
check_for_outdated_dependencies:
  only:
  - master
  script:
  - npx npm-check -ps
  stage: test
check_for_vulnerable_dependencies:
  only:
  - master
  script:
  - npm i -g snyk
  - snyk test
  stage: test
create_release_file:
  only:
  - master
  script:
  - 'npm i --no-save semantic-release @semantic-release/gitlab @semantic-release/changelog
    @semantic-release/npm @semantic-release/git @semantic-release/gitlab-config

    '
  - npx semantic-release
  stage: deploy
image: node:10
lint_code:
  script: npm run lint
  stage: test
run_tests_latest:
  image: node:10
  script: npm test
  stage: test
run_tests_lts:
  image: node:8
  script: npm test
  stage: test
run_tests_maintenance:
  image: node:9
  script: npm test
  stage: test
run_tests_maintenance_lts:
  image: node:6
  script: npm test
  stage: test
stages:
- test
- deploy
