deploy-production:
  allow_failure: true
  environment:
    name: production
    url: https://resume.filiosoft.net
  image: filiosoft/aws-cli:latest
  script:
  - aws s3 cp ./ s3://$S3_BUCKET_NAME/ --recursive --exclude ".git" --include "*"
  stage: deploy
  tags:
  - docker
pages:
  artifacts:
    paths:
    - public
  environment:
    name: pages
    url: https://oss.filiosoft.net/resume
  only:
  - master
  script:
  - mkdir .public
  - cp -r * .public
  - mv .public public
  stage: deploy
  tags:
  - docker
variables:
  S3_BUCKET_NAME: resume.filiosoft.net
