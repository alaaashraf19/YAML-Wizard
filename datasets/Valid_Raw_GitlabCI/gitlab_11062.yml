build:
  before_script:
  - apt-get -qq update 1>/dev/null
  - apt-get -qq install make autoconf libgtest-dev cmake libusb-1.0-0-dev libgoogle-glog-dev
    1>/dev/null
  - cd /usr/src/gtest && cmake . && make && mv libg* /usr/lib/ && cd -
  script:
  - make test
  stage: build
image: gcc
lint:
  before_script:
  - apt-get -qq update 1>/dev/null
  - apt-get -qq upgrade 1>/dev/null
  - apt-get -qq install python-pip 1>/dev/null
  - pip -q install cpplint
  script:
  - cpplint --quiet --counting=detailed $( find . -name *.h -or -name *.cpp | grep
    -vE '^./build/' )
  stage: build
