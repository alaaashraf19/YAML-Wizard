build:
  artifacts:
    paths:
    - build/
  image: mhart/alpine-node:8.4
  only:
  - /^(develop|release|master).*$/
  script:
  - npm install
  - npm run build
  stage: build
cache:
  key: ${CI_BUILD_REF_NAME}
  paths:
  - node_modules/
deploy:
  environment:
    name: development
    url: https://dev.nice-app.ml
  image: ekino/docker-buildbox:latest-dind-aws
  only:
  - develop
  script:
  - pip install awscli
  - aws s3 sync ./build s3://dev.nice-app.ml/
  stage: deploy
deploy-master:
  environment:
    name: production
    url: https://nice-app.ml
  image: ekino/docker-buildbox:latest-dind-aws
  only:
  - master
  script:
  - pip install awscli
  - aws s3 sync ./build s3://nice-app.ml/
  stage: deploy
deploy-release:
  environment:
    name: release
    url: https://release.nice-app.ml
  image: ekino/docker-buildbox:latest-dind-aws
  only:
  - release
  script:
  - pip install awscli
  - aws s3 sync ./build s3://release.nice-app.ml/
  stage: deploy
stages:
- test
- build
- deploy
test:
  coverage: /All files\s*\|\s*([\d\.]+)/
  image: mhart/alpine-node:8.4
  only:
  - /^(feat\/|bugfix\/|hotfix\/|develop|release|master).*$/
  script:
  - npm install
  - npm test -- --coverage
  - npm run prettier:check
  stage: test
