image: python:3.5
lint:
  script:
  - python setup.py flake8
  stage: build
stages:
- build
- test
- deploy
staging:
  only:
  - master
  script:
  - apt-get update -qy
  - apt-get install -y --no-install-recommends ruby-dev rubygems
  - gem install dpl
  - dpl --provider=heroku --app=sir-bot-a-lot --api-key=$HEROKU_STAGING_API_KEY
  type: deploy
test:
  script:
  - python setup.py test
  stage: test
