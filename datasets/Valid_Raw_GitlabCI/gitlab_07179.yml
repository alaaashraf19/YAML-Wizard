build to homolog:
  environment: homolog
  only:
  - master
  script:
  - docker run --rm -v $PWD:/app -w /app node:8 npm install
  - docker run --rm -v $PWD:/app -w /app node:8 ./node_modules/.bin/ng build --prod
    --environment=homolog --output-path dist/empurrandojuntos --deploy-url /
  - docker login -u gitlab-ci-token -p $CI_JOB_TOKEN registry.gitlab.com
  - docker create --name frontend nginx
  - docker cp dist/empurrandojuntos/. frontend:/usr/share/nginx/html/
  - docker cp compose/production/nginx/default.conf frontend:/etc/nginx/conf.d/default.conf
  - docker commit frontend $CI_REGISTRY_IMAGE:$CI_BUILD_REF_NAME
  - docker push $CI_REGISTRY_IMAGE:$CI_BUILD_REF_NAME
  stage: build
  tags:
  - docker
build to production:
  environment: production
  only:
  - tags
  script:
  - docker run --rm -v $PWD:/app -w /app node:8 npm install
  - docker run --rm -v $PWD:/app -w /app node:8 ./node_modules/.bin/ng build --prod
    --environment=prod --output-path dist/empurrandojuntos --deploy-url /
  - docker login -u gitlab-ci-token -p $CI_JOB_TOKEN registry.gitlab.com
  - docker create --name frontend nginx
  - docker cp dist/empurrandojuntos/. frontend:/usr/share/nginx/html/
  - docker cp compose/production/nginx/default.conf frontend:/etc/nginx/conf.d/default.conf
  - docker commit frontend $CI_REGISTRY_IMAGE:$CI_BUILD_REF_NAME
  - docker tag $CI_REGISTRY_IMAGE:$CI_BUILD_REF_NAME $CI_REGISTRY_IMAGE:latest
  - docker push $CI_REGISTRY_IMAGE:$CI_BUILD_REF_NAME
  - docker push $CI_REGISTRY_IMAGE:latest
  stage: build
  tags:
  - docker
deploy to homolog:
  environment: homolog
  image: cdrx/rancher-gitlab-deploy
  only:
  - master
  script:
  - upgrade --environment FPAbramo --stack brasilqueopovoquer-empurrandojuntos-dev
    --service frontend --no-finish-upgrade
  stage: deploy
  tags:
  - docker
deploy to production:
  environment: production
  image: cdrx/rancher-gitlab-deploy
  only:
  - tags
  script:
  - upgrade --environment FPAbramo --stack empurrandojuntos-prod --service frontend
    --no-finish-upgrade
  stage: deploy
  tags:
  - docker
image: docker:17.09-git
services:
- docker:17.09-dind
stages:
- build
- test
- deploy
test:
  script:
  - docker run --rm -v $PWD:/app -w /app node:8 npm install
  - docker run --rm -v $PWD:/app -w /app node:8 ./node_modules/.bin/ng build --prod
    --environment=homolog --output-path dist/empurrandojuntos --deploy-url /
  - docker run --rm -v $PWD:/app -w /app node:8 ./node_modules/.bin/ng test --code-coverage
    --single-run
  stage: test
  tags:
  - docker
variables:
  CONTAINER_RELEASE_IMAGE: $CI_REGISTRY_IMAGE:$CI_BUILD_REF_NAME
