pages:
  artifacts:
    paths:
    - public
  image: ubuntu:18.04
  only:
  - release
  script:
  - export DEBIAN_FRONTEND=noninteractive
  - apt-get update -qy
  - apt-get install -y python3-dev python3-pip python3-numpy python3-scipy python3-h5py
    python3-matplotlib xvfb python3-setuptools python3-psutil
  - python3 -m pip install -U pip
  - apt-get install -qy xvfb python3-sphinx python3-sphinx-rtd-theme build-essential
  - pip3 install tqdm scikit-image
  - pip3 install --user .
  - sphinx-apidoc -fT -o ./doc ./fpd/ ./fpd/tests
  - cd doc/
  - make html
  - cd ..
  - mv doc/_build/html public
  stage: deploy
pages_development:
  artifacts:
    paths:
    - pages_development
  image: ubuntu:18.04
  only:
  - master
  script:
  - export DEBIAN_FRONTEND=noninteractive
  - apt-get update -qy
  - apt-get install -y python3-dev python3-pip python3-numpy python3-scipy python3-h5py
    python3-matplotlib xvfb python3-setuptools python3-psutil
  - python3 -m pip install -U pip
  - apt-get install -qy xvfb python3-sphinx python3-sphinx-rtd-theme build-essential
  - pip3 install tqdm scikit-image
  - pip3 install --user .
  - sphinx-apidoc -fT -o ./doc ./fpd/ ./fpd/tests
  - cd doc/
  - make html
  - cd ..
  - mv doc/_build/html pages_development
  stage: deploy
test:p3:
  artifacts:
    paths:
    - coverage.txt
  image: ubuntu:18.04
  script:
  - export DEBIAN_FRONTEND=noninteractive
  - apt-get update -qy
  - apt-get install -y python3-dev python3-pip python3-numpy python3-scipy python3-h5py
    python3-matplotlib xvfb python3-setuptools python3-psutil python3-coverage
  - python3 -m pip install -U pip
  - pip3 install tqdm scikit-image==0.16.2
  - pip3 install hyperspy==1.5.1
  - pip3 install -U numpy
  - pip3 install -U scipy
  - pip3 install --user .
  - xvfb-run python3-coverage run -m unittest discover -p test*.py ./
  - python3-coverage report --include=*fpd* --omit=*test* | tee coverage.txt
