cache:
  paths:
  - .m2/
dependency_scanning:
  allow_failure: true
  artifacts:
    paths:
    - gl-dependency-scanning-report.json
  image: docker:stable
  script:
  - export SP_VERSION=$(echo "$CI_SERVER_VERSION" | sed 's/^\([0-9]*\)\.\([0-9]*\).*/\1-\2-stable/')
  - docker run --env DEP_SCAN_DISABLE_REMOTE_CHECKS="${DEP_SCAN_DISABLE_REMOTE_CHECKS:-false}"
    --volume "$PWD:/code" --volume /var/run/docker.sock:/var/run/docker.sock "registry.gitlab.com/gitlab-org/security-products/dependency-scanning:$SP_VERSION"
    /code
  services:
  - docker:stable-dind
  stage: dependency_scanning
  variables:
    DOCKER_DRIVER: overlay2
maven-build:
  artifacts:
    paths:
    - target/
  image: maven:3-jdk-8
  script: mvn clean verify javadoc:javadoc -B
  stage: maven-build
ossrh-staging:
  except:
  - features/ossrh
  image: maven:3-jdk-8
  only:
  - master
  script:
  - echo "$GPG_PRIVATE_KEY" | gpg --batch --import --passphrase "$GPG_PASSPHRASE"
    -
  - mvn deploy -s settings.xml
  stage: maven-deploy
  variables:
    GPG_TTY: '`tty`'
pages:
  artifacts:
    paths:
    - public
  image: maven:3-jdk-8
  only:
  - master
  script:
  - mkdir public
  - cp -r target/site/apidocs/* public/
  stage: publish-doc
sonar:
  image: maven:3-jdk-8
  script: mvn sonar:sonar -s settings.xml
  stage: sonar
stages:
- dependency_scanning
- maven-build
- sonar
- maven-deploy
- publish-doc
variables:
  MAVEN_OPTS: -Dmaven.repo.local=.m2
