blameMail:
  only:
  - develop
  script:
  - ./mailToDeveloper.sh
  stage: deploy
  when: on_failure
compile:
  artifacts:
    expire_in: 7d
    paths:
    - target/*.jar
  script:
  - mvn compile --batch-mode
  stage: build
image: maven:3.5.0-jdk-8
publish:
  artifacts:
    expire_in: 7d
    paths:
    - '*.jar'
  only:
  - tags
  script:
  - mv target/*.jar
  stage: deploy
  when: on_success
stages:
- build
- test
- deploy
verify:
  artifacts:
    expire_in: 7d
    paths:
    - target/*.jar
  script:
  - mvn verify --batch-mode
