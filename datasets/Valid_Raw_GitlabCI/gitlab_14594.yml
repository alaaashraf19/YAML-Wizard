pok3rtool:linux:
  artifacts:
    name: $CI_JOB_NAME-$CI_COMMIT_REF_SLUG
    paths:
    - build/pok3rtool
    - build/libpok3rlib.so
    - build/rawhid/librawhid.so
    - build/libchaos/chaos/libchaos.so
  before_script:
  - dnf install -y gcc gcc-c++ cmake make openssl-devel libusb-devel
  image: fedora
  script:
  - mkdir build
  - cd build
  - cmake -D CMAKE_BUILD_TYPE="Release" ..
  - make
  stage: build
  tags:
  - linux
  variables:
    GIT_SUBMODULE_STRATEGY: recursive
stages:
- build
- test
test:linux:
  before_script:
  - dnf install -y libstdc++ openssl libusb
  dependencies:
  - pok3rtool:linux
  image: fedora
  script:
  - cd build
  - ./pok3rtool list
  stage: test
  tags:
  - linux
  variables:
    GIT_STRATEGY: none
