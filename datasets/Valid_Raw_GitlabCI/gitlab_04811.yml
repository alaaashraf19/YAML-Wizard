build-1_56:
  dependencies: []
  image: rust:1.56-slim
  script:
  - cargo build --verbose
  - cargo test --verbose
  - cargo doc --verbose
  stage: build
build-beta:
  before_script:
  - rustup default beta
  dependencies: []
  image: rust:latest
  script:
  - cargo build --verbose
  - cargo test --verbose
  - cargo doc --verbose
  stage: build
build-nightly:
  before_script:
  - rustup default nightly
  dependencies: []
  image: rust:latest
  script:
  - cargo build --verbose --locked
  - cargo test --verbose --locked
  - cargo doc --verbose --locked
  stage: build
build-stable:
  dependencies: []
  image: rust:latest
  script:
  - cargo build --verbose
  - cargo test --verbose
  - cargo doc --verbose
  stage: build
stages:
- build
