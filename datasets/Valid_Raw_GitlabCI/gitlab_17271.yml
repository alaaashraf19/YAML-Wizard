before_script:
- export GIT_SSH_URL=`echo $CI_PROJECT_URL | sed 's|http[s]*://[w]*[w]*[w]*[.]*||g'
  | sed '1s|/|:|;t'`.git
master-deploy-user:
  image: appropriate/curl:latest
  only:
  - master
  script:
  - curl -X POST -F token=$DEPLOYMENT_PIPELINE_TRIGGER_TOKEN -F ref=master -F "variables[TRIGGER_REPO_URL]=$GIT_SSH_URL"
    -F "variables[TRIGGER_PACKAGE_NAME]=$CI_PROJECT_NAME" -F "variables[TRIGGER_COMMIT_SHA]=$CI_COMMIT_SHA"
    $DEPLOYMENT_PIPELINE_TRIGGER_URL
  stage: deploy
  when: manual
stages:
- testing
- deploy
tag-deploy-user:
  image: appropriate/curl:latest
  only:
  - tags
  script:
  - curl -X POST -F token=$DEPLOYMENT_PIPELINE_TRIGGER_TOKEN -F ref=master -F "variables[TRIGGER_REPO_URL]=$GIT_SSH_URL"
    -F "variables[TRIGGER_PACKAGE_NAME]=$CI_PROJECT_NAME" -F "variables[TRIGGER_COMMIT_SHA]=$CI_COMMIT_SHA"
    -F "variables[TRIGGER_COMMIT_TAG]=$CI_COMMIT_TAG" $DEPLOYMENT_PIPELINE_TRIGGER_URL
  stage: deploy
  when: manual
test:
  image: registry.gitlab.com/qcad.fi/docker/minimal:latest
  only:
  - master
  - tags
  script:
  - mkdir build && cd build
  - cmake ..
  - make -j4
  - make check
  stage: testing
  when: manual
