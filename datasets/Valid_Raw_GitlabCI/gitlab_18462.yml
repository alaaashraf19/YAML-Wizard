before_script:
- mkdir -p _ccache
- export CCACHE_BASEDIR=${PWD}
- export CCACHE_DIR=${PWD}/_ccache
build-alpine-meson:
  artifacts:
    expire_in: 1 week
    paths:
    - bld/meson-dist/vala-panel*.tar.xz
  image: alpine:edge
  script:
  - apk add --no-cache python3 gtk+3.0-dev vala meson ninja libwnck3-dev gobject-introspection-dev
    build-base git gtk-layer-shell-dev
  - git clone https://gitlab.com/vala-panel-project/vala-panel-appmenu.git
  - meson --prefix=/usr vp-build vala-panel-appmenu/subprojects/appmenu-glib-translator
    && meson install -C vp-build && rm -rf vala-panel-appmenu && rm -rf vp-build
  - meson bld --prefix=/usr && cd bld
  - ninja dist
  stage: build
cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
  - _ccache/
release-main:
  artifacts:
    paths:
    - bld/meson-dist/vala-panel*.tar.xz
  image: alpine:edge
  only:
  - tags
  script:
  - apk add --no-cache python3 py3-pip
  - pip3 install --break-system-packages gitlab-release
  - gitlab-release --link-in-desc --link-artifact *.tar.xz
  stage: release
stages:
- build
- release
