.base-schedules-sync:
  extends: .ruby-before_script
  retry: 2
  script:
  - bundle exec bin/manage_schedules --token $GITLAB_BOT_API_TOKEN_ON_COM $EXTRA_ARGS
  stage: schedules-sync
dry-run:schedules-sync:
  allow_failure: true
  extends: .base-schedules-sync
  rules:
  - changes:
    - pipeline-schedules.yml
    if: $GITLAB_BOT_API_TOKEN_ON_COM && $CI_MERGE_REQUEST_IID
  - when: manual
  variables:
    EXTRA_ARGS: --dry-run
schedules-sync:
  extends: .base-schedules-sync
  rules:
  - if: $CI_COMMIT_REF_NAME == "master" && $CI_PIPELINE_SOURCE != "schedule" && $GITLAB_BOT_API_TOKEN_ON_COM
