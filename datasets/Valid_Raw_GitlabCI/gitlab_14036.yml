  retry: 2
  script:
  - ./run.sh postinstallation
  stage: postinstall
prepare:
  after_script: *id001
  artifacts: *id002
  before_script: *id003
  extends: .ansible_run_tags
  image: ${ANSIBLE_DOCKER_IMAGE}:${ANSIBLE_DOCKER_TAG}
  only:
  - schedules
  - triggers
  - web
  - external
  - pipelines
  retry: 2
  script:
  - ./run.sh prepare
  stage: prepare
stages:
- test
- clean
- prepare
- configure_core
- deploy_core
- wait_core
- configure_small
- deploy_small
- wait_small
- configure_medium
- deploy_medium
- wait_medium
- configure_full
- deploy_full
- wait_full
- postinstall
- postconfigure
variables:
  ANSIBLE_DOCKER_IMAGE: registry.gitlab.com/orange-opensource/lfn/ci_cd/docker_ansible_openstacksdk
  ANSIBLE_DOCKER_TAG: '2.10'
  CHAINED_CI_INIT: scripts/chained-ci-init.sh
  DEPLOYMENT_REQUESTED: full
  GIT_SUBMODULE_STRATEGY: recursive
  branch: master
  jumphost_user: opnfv
  pod: pod4
  pod_description_name: pod4
  pod_fqdn: opnfv.fr
  target_folder: /opt/auto_oom
  use_jumphost: 'true'
wait_for_end_of_install_core:
  after_script: *id001
  allow_failure: true
  artifacts: *id002
  before_script: *id003
  extends: .ansible_run_tags
  image: ${ANSIBLE_DOCKER_IMAGE}:${ANSIBLE_DOCKER_TAG}
  only: *id005
  retry: 2
  script: *id011
  stage: wait_core
  timeout: 1h
wait_for_end_of_install_full:
  after_script: *id001
  allow_failure: true
  artifacts: *id002
  before_script: *id003
  extends: .ansible_run_tags
  image: ${ANSIBLE_DOCKER_IMAGE}:${ANSIBLE_DOCKER_TAG}
  only: *id007
  retry: 2
  script: *id011
  stage: wait_full
  timeout: 1h
wait_for_end_of_install_medium:
  after_script: *id001
  allow_failure: true
  artifacts: *id002
  before_script: *id003
  extends: .ansible_run_tags
  image: ${ANSIBLE_DOCKER_IMAGE}:${ANSIBLE_DOCKER_TAG}
  only: *id008
  retry: 2
  script: *id011
  stage: wait_medium
  timeout: 1h
wait_for_end_of_install_small:
