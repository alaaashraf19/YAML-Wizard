.configure:
  after_script: &id001
  - ./scripts/clean.sh
  artifacts: &id002
    paths:
    - vars/openstack_infos.yml
    - vars/cluster.yml
    when: always
  before_script: &id003
  - curl -s ifconfig.me || true
  - chmod 700 .
  - . ./${CHAINED_CI_INIT} -a -i inventory/infra
  extends: .ansible_run_tags
  image: ${ANSIBLE_DOCKER_IMAGE}:${ANSIBLE_DOCKER_TAG}
  retry: 2
  script: &id006
  - ./run.sh configure
.core:
  only: &id005
    refs:
    - schedules
    - triggers
    - web
    - external
    - pipelines
    variables:
    - $DEPLOYMENT_REQUESTED == "core"
.deploy:
  after_script: *id001
  artifacts: *id002
  before_script: *id003
  extends: .ansible_run_tags
  image: ${ANSIBLE_DOCKER_IMAGE}:${ANSIBLE_DOCKER_TAG}
  retry: 2
  script: &id010
  - ./run.sh deploy
.deployment_and_test:
  after_script: *id001
  artifacts: *id002
  before_script: *id003
  extends: .ansible_run_tags
  image: ${ANSIBLE_DOCKER_IMAGE}:${ANSIBLE_DOCKER_TAG}
  retry: 2
.full:
  only: &id007
    refs:
    - schedules
    - triggers
    - web
    - external
    - pipelines
    variables:
    - $DEPLOYMENT_REQUESTED == "full"
.medium:
  only: &id008
    refs:
    - schedules
    - triggers
    - web
    - external
    - pipelines
    variables:
    - $DEPLOYMENT_REQUESTED == "medium"
.small:
  only: &id009
    refs:
    - schedules
    - triggers
    - web
    - external
    - pipelines
    variables:
    - $DEPLOYMENT_REQUESTED == "small"
.syntax_checking:
  except: &id004
  - schedules
  - triggers
  - web
  - pipelines
  - external
  extends: .syntax_checking_tags
  stage: test
.wait:
  after_script: *id001
  allow_failure: true
  artifacts: *id002
  before_script: *id003
  extends: .ansible_run_tags
  image: ${ANSIBLE_DOCKER_IMAGE}:${ANSIBLE_DOCKER_TAG}
  retry: 2
  script: &id011
  - ./run.sh wait
  timeout: 1h
ansible_linting:
  except: *id004
  extends: .syntax_checking_tags
  image: sdesbure/ansible-lint:latest
  script:
  - ansible-lint -x ANSIBLE0010,ANSIBLE0013 onap-*.yaml
  stage: test
clean:
  after_script: *id001
  artifacts: *id002
  before_script: *id003
  extends: .ansible_run_tags
  image: ${ANSIBLE_DOCKER_IMAGE}:${ANSIBLE_DOCKER_TAG}
  only:
    refs:
    - schedules
    - triggers
    - web
    variables:
    - $CLEAN == 'True'
    - $CLEAN == 'true'
    - $CLEAN == 'Yes'
    - $CLEAN == 'yes'
  retry: 2
  script:
  - ./run.sh clean
  stage: clean
configure_core:
  after_script: *id001
  artifacts: *id002
  before_script: *id003
  extends: .ansible_run_tags
  image: ${ANSIBLE_DOCKER_IMAGE}:${ANSIBLE_DOCKER_TAG}
  only: *id005
  retry: 2
  script: *id006
  stage: configure_core
  variables:
    DEPLOYMENT_TYPE: core
configure_full:
  after_script: *id001
  artifacts: *id002
  before_script: *id003
  extends: .ansible_run_tags
  image: ${ANSIBLE_DOCKER_IMAGE}:${ANSIBLE_DOCKER_TAG}
  only: *id007
  retry: 2
