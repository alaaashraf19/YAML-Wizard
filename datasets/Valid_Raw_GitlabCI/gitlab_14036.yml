  retry: 2
  script:
  - ./run.sh postconfiguration
  stage: postconfigure
postinstallation:
  after_script: *id001
  artifacts: *id002
  before_script: *id003
  extends: .ansible_run_tags
  image: ${ANSIBLE_DOCKER_IMAGE}:${ANSIBLE_DOCKER_TAG}
  only:
  - schedules
