deploy_core:
  after_script: *id001
  artifacts: *id002
  before_script: *id003
  extends: .ansible_run_tags
  image: ${ANSIBLE_DOCKER_IMAGE}:${ANSIBLE_DOCKER_TAG}
  only: *id005
  retry: 2
  script: *id010
  stage: deploy_core
deploy_full:
  after_script: *id001
  artifacts: *id002
  before_script: *id003
  extends: .ansible_run_tags
  image: ${ANSIBLE_DOCKER_IMAGE}:${ANSIBLE_DOCKER_TAG}
  only: *id007
  retry: 2
  script: *id010
  stage: deploy_full
deploy_medium:
  after_script: *id001
  artifacts: *id002
  before_script: *id003
  extends: .ansible_run_tags
  image: ${ANSIBLE_DOCKER_IMAGE}:${ANSIBLE_DOCKER_TAG}
  only: *id008
  retry: 2
  script: *id010
  stage: deploy_medium
deploy_small:
  after_script: *id001
  artifacts: *id002
  before_script: *id003
  extends: .ansible_run_tags
  image: ${ANSIBLE_DOCKER_IMAGE}:${ANSIBLE_DOCKER_TAG}
  only: *id009
  retry: 2
  script: *id010
  stage: deploy_small
postconfiguration:
  after_script: *id001
  allow_failure: true
  artifacts: *id002
  before_script: *id003
  extends: .ansible_run_tags
  image: ${ANSIBLE_DOCKER_IMAGE}:${ANSIBLE_DOCKER_TAG}
  only:
  - schedules
  - triggers
  - web
  - external
