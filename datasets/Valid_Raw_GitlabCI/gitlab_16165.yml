  - samba-fileserver-without-smb1
  - samba-ad-dc-1
  - samba-nt4
  - samba-schemaupgrade
  - samba-addc-mit-1
  - samba-fips
  - samba-no-opath1
  - samba-no-opath2
  - ubuntu2204-samba-o3
  extends: .shared_runner_build_image
  only:
    variables:
    - $SAMBA_CI_AUTOBUILD_ENABLE_COVERAGE == "--enable-coverage"
  script:
  - ls -la *.info
  - ./configure.developer
  - make -j
  - ls -la *.info
  - lcov $(ls *.info | xargs -I{} echo -n "-a {} ") -o all.info
