build_frontend:
  artifacts:
    paths:
    - build/
  script:
  - yarn install --pure-lockfile
  - yarn build
  stage: build
cache:
  paths:
  - node_modules
clean_s3:
  before_script:
  - pip install awscli
  environment:
    action: stop
    name: ${CI_COMMIT_REF_SLUG}
  image: python:latest
  script:
  - aws s3 rm s3://${BUCKET_NAME}/${CI_COMMIT_REF_SLUG} --recursive
  stage: deploy
  when: manual
deploys3:
  before_script:
  - pip install awscli
  dependencies:
  - build_frontend
  environment:
    name: ${CI_COMMIT_REF_SLUG}
    on_stop: clean_s3
    url: http://${BUCKET_NAME}.s3-website.${AWS_DEFAULT_REGION}.amazonaws.com/${CI_COMMIT_REF_SLUG}
  image: python:latest
  script:
  - aws s3 cp build s3://${BUCKET_NAME} --recursive
  stage: deploy
image: node:latest
stages:
- build
- deploy
variables:
  AWS_DEFAULT_REGION: us-east-1
  BUCKET_NAME: jaam.app
