.cargo_build_template:
  artifacts: &id001
    paths:
    - target/release
  script: &id002
  - cargo build --release --all
  stage: build
.cargo_test_template:
  script: &id005
  - cargo test --verbose --jobs 1 --all
  stage: test
.rustfmt_template:
  allow_failure: true
  before_script: &id003
  - rustup component add rustfmt-preview
  script: &id004
  - cargo fmt --all -- --write-mode=diff
  stage: test
build:beta:cargo:
  artifacts: *id001
  cache:
    key: beta
  image: registry.gitlab.com/iron-oxide/docker/rust-codecov:beta
  script: *id002
  stage: build
build:nightly:cargo:
  artifacts: *id001
  cache:
    key: nightly
  image: registry.gitlab.com/iron-oxide/docker/rust-codecov:nightly
  script: *id002
  stage: build
build:stable:cargo:
  artifacts: *id001
  cache:
    key: stable
  image: rust
  script: *id002
  stage: build
cache:
  untracked: true
pages:
  artifacts:
    paths:
    - public
  cache:
    key: stable
    policy: pull
  image: rust
  only:
  - master
  - tags
  script:
  - cargo doc --all --no-deps
  - rm -rf public
  - mkdir public
  - cp -R target/doc/* public
  stage: docs
release:
  cache: {}
  image: rust
  only:
  - tags
  script:
  - cargo login $CRATES_IO_TOKEN
  - cargo publish
  stage: deploy
rustfmt:beta:cargo:
  allow_failure: true
  before_script: *id003
  cache:
    key: beta
    policy: pull
  image: registry.gitlab.com/iron-oxide/docker/rust-codecov:beta
  script: *id004
  stage: test
rustfmt:nightly:cargo:
  allow_failure: true
  before_script: *id003
  cache:
    key: nightly
    policy: pull
  image: registry.gitlab.com/iron-oxide/docker/rust-codecov:nightly
  script: *id004
  stage: test
rustfmt:stable:cargo:
  allow_failure: true
  before_script: *id003
  cache:
    key: stable
    policy: pull
  image: registry.gitlab.com/iron-oxide/docker/rust-codecov:stable
  script: *id004
  stage: test
stages:
- build
- test
- docs
- deploy
test:beta:cargo:
  cache:
    key: beta
    policy: pull
  image: registry.gitlab.com/iron-oxide/docker/rust-codecov:beta
  script: *id005
  stage: test
test:nightly:cargo:
  cache:
    key: nightly
    policy: pull
  image: registry.gitlab.com/iron-oxide/docker/rust-codecov:nightly
  script: *id005
  stage: test
test:stable:cargo:
  after_script:
  - 'for file in target/debug/question-*[^\.d]; do mkdir -p "target/cov/$(basename
    $file)"; kcov --exclude-pattern=/.cargo,/usr/lib --verify "target/cov/$(basename
    $file)" "$file"; done &&

    bash <(curl -s https://codecov.io/bash) -t $CODECOV_TOKEN &&

    echo "Uploaded code coverage"

    '
  cache:
    key: stable
    policy: pull
  image: registry.gitlab.com/iron-oxide/docker/rust-codecov:stable
  script: *id005
  stage: test
