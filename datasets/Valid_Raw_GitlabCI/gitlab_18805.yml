.build_common:
  artifacts:
    name: il2ge-build_${TOOLCHAIN}_${CI_JOB_ID}
    paths:
    - artifacts_${TOOLCHAIN}
  image: ${CI_REGISTRY}/${CI_PROJECT_NAMESPACE}/il2ge-docker-image:main
  script:
  - echo $TOOLCHAIN
  - echo $CMAKE_OPTS
  - mkdir build_${TOOLCHAIN}
  - mkdir install_${TOOLCHAIN}
  - mkdir artifacts_${TOOLCHAIN}
  - cd build_${TOOLCHAIN}
  - cmake $CMAKE_OPTS $CMAKE_EXTRA_OPTS ..
  - make install
  - make dist-archive
  - cp il2ge.zip ../artifacts_${TOOLCHAIN}
  - make installer
  - cp il2ge-installer.exe ../artifacts_${TOOLCHAIN}
  variables:
    CMAKE_OPTS: -DCMAKE_TOOLCHAIN_FILE=../toolchains/${TOOLCHAIN}.cmake -DCMAKE_BUILD_TYPE=Release
      -DCMAKE_INSTALL_PREFIX=../install -DENABLE_WARNINGS=${ENABLE_WARNINGS} -DENABLE_IL2_CORE=$BUILD_IL2_CORE
      -Denable_configurable_atmosphere=1 -Denable_configurable_shadows=1
    ENABLE_WARNINGS: 1
build:
  extends:
  - .build_common
  stage: build
  variables:
    TOOLCHAIN: gnu-mingw
build_llvm_mingw:
  extends:
  - .build_common
  stage: build
  variables:
    CMAKE_EXTRA_OPTS: -DCMAKE_FIND_ROOT_PATH=/opt/llvm-mingw
    ENABLE_WARNINGS: 0
    TOOLCHAIN: llvm-mingw
prepare_release_job:
  artifacts:
    paths:
    - release-notes
  rules:
  - if: $CI_COMMIT_TAG
  script:
  - ./scripts/make-release-notes $CI_COMMIT_TAG CHANGELOG.md > release-notes
  stage: prepare_release
release_job:
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
  - job: upload_job
  - artifacts: true
    job: prepare_release_job
  release:
    assets:
      links:
      - filepath: /il2ge.zip
        link_type: package
        name: il2ge.zip
        url: ${PACKAGE_REGISTRY_URL}il2ge.zip
      - filepath: /il2ge-installer.exe
        link_type: package
        name: il2ge-installer.exe
        url: ${PACKAGE_REGISTRY_URL}il2ge-installer.exe
    description: ./release-notes
    name: Release $CI_COMMIT_TAG
    tag_name: $CI_COMMIT_TAG
  rules:
  - if: $CI_COMMIT_TAG
  script:
  - echo "running release job for $CI_COMMIT_TAG"
  - cat release-notes
  stage: release
stages:
- build
- upload
- prepare_release
- release
upload_job:
  image: curlimages/curl:latest
  needs:
  - artifacts: true
    job: build
  rules:
  - if: $CI_COMMIT_TAG
  script:
  - 'curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" --upload-file ${ARTIFACTS_DIR}/il2ge.zip
    $PACKAGE_REGISTRY_URL

    '
  - 'curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" --upload-file ${ARTIFACTS_DIR}/il2ge-installer.exe
    $PACKAGE_REGISTRY_URL

    '
  stage: upload
  variables:
    ARTIFACTS_DIR: artifacts_${RELEASE_TOOLCHAIN}
variables:
  BUILD_IL2_CORE:
    description: Build il2_core
    value: 0
  GIT_SUBMODULE_STRATEGY: recursive
  PACKAGE_REGISTRY_URL: ${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/il2ge/${CI_COMMIT_TAG}/
  RELEASE_TOOLCHAIN: gnu-mingw
