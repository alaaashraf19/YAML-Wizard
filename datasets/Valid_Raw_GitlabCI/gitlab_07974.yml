.build:
  after_script: &id003
  - chmod +x ./ci/return_license.sh && ./ci/return_license.sh
  artifacts: &id006
    paths:
    - $UNITY_DIR/Builds/
  before_script: &id004
  - chmod +x ./ci/before_script.sh && ./ci/before_script.sh
  cache: &id001
    key: $CI_PROJECT_NAMESPACE-$CI_PROJECT_NAME-$CI_COMMIT_REF_SLUG-$TEST_PLATFORM
    paths:
    - $UNITY_DIR/Library/
    - $UNITY_DIR/../unity-builder
  needs: &id005
  - artifacts: true
    job: get-unity-version
  rules: &id002
  - if: $UNITY_LICENSE != null || $UNITY_SERIAL != null
    when: always
  script: &id007
  - chmod +x ./ci/build.sh && ./ci/build.sh
  stage: build_and_test
  tags: &id008
  - gitlab-org
.cache:
  cache: *id001
.license:
  rules: *id002
.test:
  after_script: *id003
  artifacts: &id009
    expire_in: 2 weeks
    when: always
  before_script: *id004
  cache: *id001
  coverage: /<Linecoverage>(.*?)</Linecoverage>/
  needs: *id005
  rules: *id002
  script: &id010
  - chmod +x ./ci/test.sh && ./ci/test.sh
  stage: build_and_test
  tags: &id011
  - gitlab-org
.test-with-junit-reports:
  after_script: *id003
  artifacts: &id012
    expire_in: 2 weeks
    paths:
    - $UNITY_DIR/$TEST_PLATFORM-coverage/
    reports:
      junit:
      - $UNITY_DIR/$TEST_PLATFORM-junit-results.xml
      - $UNITY_DIR/$TEST_PLATFORM-coverage/coverage.xml
    when: always
  before_script: *id004
  cache: *id001
  coverage: /<Linecoverage>(.*?)</Linecoverage>/
  needs: *id005
  rules: *id002
  script: &id013
  - apt-get update && apt-get install -y default-jre libsaxonb-java
  - chmod +x ./ci/test.sh && ./ci/test.sh
  - saxonb-xslt -s $UNITY_DIR/$TEST_PLATFORM-results.xml -xsl $CI_PROJECT_DIR/ci/nunit-transforms/nunit3-junit.xslt
    >$UNITY_DIR/$TEST_PLATFORM-junit-results.xml
  stage: build_and_test
  tags: &id014
  - gitlab-org
.unity_after_script:
  after_script: *id003
.unity_before_script:
  before_script: *id004
  needs: *id005
.unity_defaults:
  after_script: *id003
  before_script: *id004
  cache: *id001
  needs: *id005
  rules: *id002
