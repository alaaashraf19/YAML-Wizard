get-unity-version:
  artifacts:
    reports:
      dotenv: prepare.env
  image: alpine
  script:
  - echo UNITY_VERSION=$(cat $UNITY_DIR/ProjectSettings/ProjectVersion.txt | grep
    "m_EditorVersion:.*" | awk '{ print $2}') | tee prepare.env
  stage: prepare
  variables:
    GIT_DEPTH: 1
image: $IMAGE:$UNITY_VERSION-base-$IMAGE_VERSION
pages:
  artifacts:
    paths:
    - public
  image: alpine:latest
  only:
  - $CI_DEFAULT_BRANCH
  script:
  - mv "$UNITY_DIR/Builds/WebGL/${BUILD_NAME}" public
  stage: deploy
stages:
- prepare
- build_and_test
- deploy
