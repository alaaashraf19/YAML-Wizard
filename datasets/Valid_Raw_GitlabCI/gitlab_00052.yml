before_script:
- eval $(ssh-agent -s)
- echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add - > /dev/null
- mkdir -p ~/.ssh
- chmod 700 ~/.ssh
- ssh-keyscan $REMOTE_IP >> ~/.ssh/known_hosts
- chmod 644 ~/.ssh/known_hosts
- git config --global user.email "darth@empire.com"
- git config --global user.name "Darth Vader"
deploy:
  script:
  - ssh antil@$REMOTE_IP 'cd /containers/drupal-8-docker; git pull --no-edit; docker-compose
    up -d --build'
  stage: deploy
image: docker:git
services:
- docker:dind
stages:
- test
- deploy
test:
  script:
  - apk add --no-cache py-pip
  - pip install docker-compose
  - docker-compose up -d
  - ssh antil@$REMOTE_IP date
  stage: test
