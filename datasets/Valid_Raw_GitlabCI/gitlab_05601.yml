build-conda-cmake:
  artifacts:
    paths:
    - INSTALL/
  image: mambaorg/micromamba
  script:
  - micromamba install -y gcc gxx sysroot_linux-64 make pkg-config -c conda-forge
  - micromamba install -y -n base -f environment-minimal.yml
  - cmake -S . -B build -DCMAKE_CXX_FLAGS=" -fprofile-arcs -ftest-coverage" -DCMAKE_INSTALL_PREFIX=INSTALL
  - cmake --build build -- -j8
  - cmake --install build
  stage: build
build-conda-pip:
  image: mambaorg/micromamba
  script:
  - micromamba install -y gcc gxx sysroot_linux-64 make pkg-config scikit-build -c
    conda-forge
  - micromamba install -y -n base -f environment-minimal.yml
  - pip install .
  stage: build
build-minimal:
  artifacts:
    paths:
    - INSTALL/
  image: ubuntu:22.04
  script:
  - apt-get update && apt-get install --yes gcc g++ cmake libcfitsio-dev libhealpix-cxx-dev
    libgsl-dev pkg-config
  - cmake -S . -B build -DCMAKE_CXX_FLAGS=" -fprofile-arcs -ftest-coverage" -DCMAKE_INSTALL_PREFIX=INSTALL
  - cmake --build build -- -j8
  - cmake --install build
  stage: build
  variables:
    DEBIAN_FRONTEND: noninteractive
pages:
  artifacts:
    paths:
    - public
  image: mambaorg/micromamba
  only:
  - master
  script:
  - micromamba install -y git gcc gxx sysroot_linux-64 make pkg-config scikit-build
    -c conda-forge
  - micromamba install -y -n base -f environment.yml
  - git config --global --add safe.directory /builds/clumpy/CLUMPY
  - pip install .
  - export CLUMPY_DATA=$PWD/data
  - micromamba install -c conda-forge doxygen tectonic graphviz git easydev sphinx
    sphinx_rtd_theme sphinx-multiversion
  - cd doc/
  - make clean
  - make html
  - make latex
  - cd _build/latex/
  - tectonic clumpy_doc.tex
  - cd ../../..
  - mv doc/_build/html/ public/
  - cp doc/dummy_redirection.html public/index.html
  - ls public
  stage: docs
stages:
- build
- test
- docs
test-minimal:
  dependencies:
  - build-minimal
  image: ubuntu:22.04
  script:
  - apt-get update && apt-get install --yes gcc g++ cmake libcfitsio-dev libhealpix-cxx-dev
    libgsl-dev pkg-config
  - export PATH=$PWD/INSTALL/bin:$PATH
  - export CLUMPY_DATA=$PWD/data
  - clumpy_tests -ALL
  stage: test
