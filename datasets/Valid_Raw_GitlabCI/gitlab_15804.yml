clang-format:
  script:
  - find * -iname '*.hpp' -o -iname '*.cpp' | xargs clang-format -i -style=file
  - git status --porcelain > ../status.log
  - git diff
  - test ! -s ../status.log
  stage: stats
coverage:
  artifacts:
    expire_in: 1 day
    name: $CI_JOB_NAME
    paths:
    - coverage
    when: always
  script:
  - hell --install -r '=' -r "RILI_PATTERN_COVERAGE=ON" -r "RILI_PATTERN_TESTS=ON"
    -i "CMAKE_CXX_STANDARD=11" -G 'Ninja'
  - mkdir build
  - cd build
  - cmake ../ -G"Ninja" -DRILI_PATTERN_COVERAGE=ON -DRILI_PATTERN_TESTS=ON -DCMAKE_INSTALL_PREFIX=../.hell/install
    -DCMAKE_CXX_STANDARD=11
  - ninja install
  - ./rili-pattern_tests
  - cd ..
  - lcov --directory ./build/ --capture --output-file coverage.info
  - lcov --remove coverage.info '/usr/include/*' '*/tests/*' '*/.hell/*' -o coverage.info
  - genhtml coverage.info --output-directory coverage
  - lcov --list coverage.info
  stage: test
cppcheck:
  script:
  - find * -iname '*.cpp' -o -iname '*.hpp' | cppcheck --quiet --std=c++11 --enable=warning
    --enable=style --enable=performance --enable=portability --enable=information
    --suppress=missingIncludeSystem --inline-suppr --file-list=- &> cppcheck.log
  - cat cppcheck.log
  - test ! -s cppcheck.log
  stage: stats
cpplint:
  script:
  - find * -iname '*.cpp' -o -iname '*.hpp' | xargs cpplint.py --linelength=120 --extensions=hpp,cpp
    --filter=-legal/copyright,-build/include_order,-build/c++11,+build/c++14,-runtime/references
  stage: stats
doxygen:
  artifacts:
    expire_in: 1 week
    paths:
    - doxygen/html
  script:
  - doxygen Doxyfile
  stage: docs
image: registry.gitlab.com/rilis/docker-ci:ci-latest
stages:
- stats
- test
- docs
valgrind:
  script:
  - hell --install -i "CMAKE_BUILD_TYPE=Debug" -r '=' -r "RILI_PATTERN_TESTS=ON" -i
    "CMAKE_CXX_STANDARD=11" -G 'Ninja'
  - mkdir build
  - cd build
  - cmake ../ -G"Ninja" -DCMAKE_BUILD_TYPE=Debug -DRILI_PATTERN_TESTS=ON -DCMAKE_INSTALL_PREFIX=../.hell/install
    -DCMAKE_CXX_STANDARD=11
  - ninja install
  - valgrind --leak-check=full --show-leak-kinds=all --error-exitcode=123 ./rili-pattern_tests
  stage: test
