before_script:
- pip install -U pip
- pip install opencv-python-headless
- make clean
- pip install -r develop.txt
- make build cython=1 debug=1
- pip install -e .[segmentation]
cache:
  key: $CI_PROJECT_ID
  paths:
  - $CI_PROJECT_DIR/pip-cache
coverage:
  coverage: /TOTAL.+ ([0-9]{1,3}%)/
  dependencies:
  - test
  rules:
  - if: $CI_SHOULD_DEPLOY == "1" && $CI_COMMIT_BRANCH == "master"
  - if: $CI_SHOULD_DEPLOY == "1" && $CI_COMMIT_BRANCH == "develop"
  - if: $CI_SHOULD_DEPLOY == "1" && $CI_COMMIT_TAG
  script:
  - curl -Os https://uploader.codecov.io/latest/linux/codecov
  - chmod +x codecov
  - coverage xml
  - coverage report
  - ./codecov -t "$CODECOV_TOKEN"
  stage: deploy
image: python:3.7
lint:
  script:
  - make lint
  stage: test
pages:
  artifacts:
    paths:
    - public
  rules:
  - if: $CI_SHOULD_DEPLOY == "1" && $CI_COMMIT_TAG
  script:
  - apt-get update --fix-missing && apt-get install -y pandoc
  - pip install IPython ipykernel matplotlib seaborn
  - make docs notebook=0
  - mv docs/.build/html public/
  stage: deploy
stages:
- test
- deploy
test:
  artifacts:
    expire_in: 1 hour
    paths:
    - .coverage
  script:
  - make unittest number=3 marker=""
  stage: test
variables:
  PIP_CACHE_DIR: $CI_PROJECT_DIR/pip-cache
