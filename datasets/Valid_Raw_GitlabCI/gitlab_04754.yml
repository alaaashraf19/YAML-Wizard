Deploy:
  extends: .Go Service - Deploy Staging
  stage: Staging
Docker Build:
  extends: .Go Service - Docker Build
  stage: Image
Docker Release:
  extends: .Go Service - Docker Release
  stage: Release
Go Build:
  extends: .Go Service - Binary Build
  stage: Prepare
Go Lint:
  extends: .Go Service - Go Lint
  stage: Prepare
Sentry Deploy:
  extends: .Sentry - Sentry Deploy
  stage: Finalise Staging
  variables:
    SENTRY_ENV: staging
Sentry Release:
  extends: .Sentry - Sentry Release
  stage: Release
include:
- file: /go-service.yml
  project: Cacophony/gitlab-ci
  ref: master
- file: /sentry.yml
  project: Cacophony/gitlab-ci
  ref: master
stages:
- Prepare
- Image
- Release
- Staging
- Finalise Staging
variables:
  DEPLOYMENT_NAME: gateway
