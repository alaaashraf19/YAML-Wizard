.ansible-inventory:
  before_script:
  - &id001
    - export ORCHESTRATION_USER="ansible"
    - export SRC_PATH="${CI_PROJECT_DIR}"
    - export TERRAFORM_PREFIX="ci-pipeline-${CI_PIPELINE_ID}"
    - export GCS_PREFIX="ci-pipeline-${CI_PIPELINE_ID}-terraform"
    - export QA_IP_FILE="${SRC_PATH}/${PIPELINE_ARTIFACTS_PATH}/rc_gitlab_application_public_ip_address"
    - export ANSIBLE_PATH="${SRC_PATH}/ansible"
    - export TERRAFORM_PATH="${SRC_PATH}/terraform"
    - export ANSIBLE_ASSETS="${SRC_PATH}/ci/ansible/"
  - mkdir -p "${HOME}/.ssh"
  - chown 0700 "${HOME}/.ssh"
  - export SSH_KNOWN_HOSTS_FILE="${HOME}/.ssh/known_hosts"
  - ${SRC_PATH}/scripts/deploy/assemble-inventory
  only:
  - triggers
.env-init: *id001
ansible-lint:
  only:
  - pushes
  - merge_requests
  script:
  - cd ansible
  - ansible-lint pg_ha.yml
  stage: check
ansible-playbook:
  extends: .ansible-inventory
  retry: 1
  script:
  - ${SRC_PATH}/scripts/deploy/run-orchestration
  stage: configure
fetch-logs:
  allow_failure: true
  artifacts:
    expire_in: 1 week
    paths:
    - ansible/gitlab-logs
    when: always
  extends: .ansible-inventory
  script:
  - mkdir gitlab-logs
  - ${SRC_PATH}/scripts/deploy/fetch-cluster-logs
  stage: cleanup-prep
  variables:
    ANSIBLE_SSH_RETRIES: 3
  when: always
gitlab-qa:
  allow_failure: true
  artifacts:
    expire_in: 6 months
    paths:
    - qa
    when: always
  before_script:
  - *id001
  - gem install gitlab-qa --no-document --version $GITLAB_QA_GEM_VERSION
  image: registry.gitlab.com/gitlab-org/gitlab-build-images:gitlab-qa-alpine-ruby-2.7
  only:
  - triggers
  parallel: 5
  script:
  - . "${QA_IP_FILE}"
  - export GITLAB_QA_DEV_ACCESS_TOKEN="${DEV_REGISTRY_TOKEN}"
  - docker login -u gitlab-ci-token -p "${CI_JOB_TOKEN}" "${CI_REGISTRY}"
  - gitlab-qa Test::Instance::Any "${QA_IMAGE}" "http://${APPLICATION_PUBLIC_IP}/"
  services:
  - docker:stable-dind
  stage: test
  variables:
    DOCKER_DRIVER: overlay2
    GITLAB_QA_GEM_VERSION: 5.13.3
    KNAPSACK_GENERATE_REPORT: 'true'
    KNAPSACK_REPORT_PATH: knapsack/master_report.json
    KNAPSACK_TEST_FILE_PATTERN: qa/specs/features/**/*_spec.rb
    QA_ARTIFACTS_DIR: $CI_PROJECT_DIR/qa
image: ${PUBLIC_BUILDER_IMAGE_REGISTRY}/gitlab_provisioner:${BUILDER_IMAGE_REVISION}
shellcheck:
  before_script:
  - *id001
  only:
  - pushes
  - merge_requests
  script:
  - apt-get install -y shellcheck
  - find "${SRC_PATH}"/scripts/* -type f \( ! -iname "*.md" \) | xargs -I {} shellcheck
    {}
  stage: check
stages:
- check
- create
- configure
- test
- cleanup-prep
- cleanup
terraform-apply:
  allow_failure: false
  artifacts:
    paths:
    - ${PIPELINE_ARTIFACTS_PATH}
  before_script:
  - *id001
  only:
  - triggers
  script:
  - mkdir -p "${PIPELINE_ARTIFACTS_PATH}"
  - ${SRC_PATH}/scripts/deploy/provision-cluster
  stage: create
terraform-destroy:
  before_script:
  - *id001
  only:
  - triggers
  script:
  - ${SRC_PATH}/scripts/deploy/deprovision-cluster
  stage: cleanup
  start_in: 1 day
  when: delayed
terraform-validate:
  before_script:
  - *id001
  only:
  - pushes
  - merge_requests
  script:
  - ${SRC_PATH}/scripts/deploy/validate-provisioner
  stage: check
variables:
  ANSIBLE_BECOME_METHOD: sudo
  BUILDER_IMAGE_REVISION: 0.0.58
  DOCKER_HOST: tcp://docker:2375
  PACKAGE_URL: https://gitlab.com/api/v4/projects/14588374/jobs/${OMNIBUS_JOB_ID}/artifacts/pkg/ubuntu-focal/gitlab.deb
  PIPELINE_ARTIFACTS_PATH: pipeline_artifacts
  PUBLIC_BUILDER_IMAGE_REGISTRY: registry.gitlab.com/gitlab-org/gitlab-omnibus-builder
  QA_CAN_TEST_GIT_PROTOCOL_V2: 'false'
  TF_VAR_prefix: ''
  TF_VAR_ssh_public_key: ''
  postgresql_version: '11'
