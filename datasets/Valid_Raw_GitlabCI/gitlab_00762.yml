build:
  script:
  - rm -rf build
  - rm -rf *.deb
  - rm -rf $VENV_PATH
  - virtualenv $VENV_PATH --python=python3.6
  - $VENV_PATH/bin/pip install -r requirements.txt
  - virtualenv $VENV_PATH --relocatable
  - fpm -s dir -t deb -n pmx-console -v $BASE_VERSION-$CI_JOB_ID -d python3.6 -m "$MAINTAINER"
    --description "$DESC" etc usr
  - ~/add_repository.sh
variables:
  BASE_VERSION: '0.1'
  DESC: Console client for ProxmoxVE
  MAINTAINER: Alexander Teseyko <alexteko@gmail.com>
  VENV_PATH: usr/local/pmx-console/.venv
