before_script:
- chmod +x gradlew
build:gradle:
  artifacts:
    name: ${CI_JOB_NAME}_${CI_COMMIT_REF_NAME}
    paths:
    - build/
  image: openjdk:9-jdk-slim
  script:
  - ./gradlew -s build
  - ./gradlew -s javadoc
  stage: Builds
stages:
- Tests
- Builds
- Deploys
test:gradle:
  image: openjdk:9-jdk-slim
  script:
  - ./gradlew -s check
  stage: Tests
