.verify:
  after_script: &id001
  - rm -rf .m2/repository/net/morimekta/utils/console-util/*-SNAPSHOT/ || /bin/true
  artifacts: &id005
    reports:
      junit:
      - target/surefire-reports/TEST-*.xml
  before_script: &id002
  - mkdir -p .m2/repository
  - 'cat <<EOF > .m2/settings.xml

    <settings>

    </settings>

    EOF

    '
  coverage: /([0-9]{1,3}[.][0-9][0-9]) % covered/
  except: &id003
    variables:
    - $CI_COMMIT_MESSAGE =~ /\[silent-ignore\]/
    - $CI_COMMIT_MESSAGE =~ /\[maven-release-plugin\]/
  script: &id004
  - mvn ${MAVEN_CLI_OPTS} verify
  - awk -F"," '{ instructions += $4 + $5; covered += $5 } END { OFMT = "%.2f"; print
    covered, "/", instructions, " instructions covered"; print 100*covered/instructions,
    "% covered" }' target/site/jacoco-ut/jacoco.csv
  stage: testing
cache:
  key: $CI_PROJECT_NAME
  paths:
  - .m2/repository
pages:
  artifacts:
    paths:
    - public
  before_script:
  - cd docs
  - bundle install --path vendor
  cache:
    key: vendor-$CI_PROJECT_NAME
    paths:
    - docs/vendor/
  dependencies:
  - verify:jdk11
  except:
    variables:
    - $CI_COMMIT_MESSAGE =~ /\[silent-ignore\]/
    - $CI_COMMIT_MESSAGE =~ /\[maven-release-plugin\]/
  image: ruby:2.5
  only:
  - master
  script:
  - bundle exec jekyll build -d public
  - mv public ..
  - mv ../target/site/jacoco-ut ../public/
  - curl --request POST --form "token=$CI_JOB_TOKEN" --form ref=master https://gitlab.com/api/v4/projects/8291815/trigger/pipeline
  stage: post-release
stages:
- testing
- release
- post-release
variables:
  MAVEN_CLI_OPTS: -B -fae --settings .m2/settings.xml
  MAVEN_NO_TESTS: -DskipTests=true
  MAVEN_OPTS: -Dhttps.protocols=TLSv1.2 -Dmaven.repo.local=.m2/repository -Dorg.slf4j.simpleLogger.log.org.apache.maven.cli.transfer.Slf4jMavenTransferListener=WARN
    -Djava.awt.headless=true
verify:jdk11:
  after_script: *id001
  artifacts:
    expire_in: 5 minutes
    paths:
    - target/site/**/*
  before_script: *id002
  coverage: /([0-9]{1,3}[.][0-9][0-9]) % covered/
  except: *id003
  image: maven:3.6-jdk-11-slim
  script: *id004
  stage: testing
verify:jdk14:
  after_script: *id001
  artifacts: *id005
  before_script: *id002
  coverage: /([0-9]{1,3}[.][0-9][0-9]) % covered/
  except: *id003
  image: maven:3.6-jdk-14
  script: *id004
  stage: testing
verify:jdk8:
  after_script: *id001
  artifacts: *id005
  before_script: *id002
  coverage: /([0-9]{1,3}[.][0-9][0-9]) % covered/
  except: *id003
  image: maven:3.6-jdk-8-alpine
  script: *id004
  stage: testing
