before_script:
- export DEBIAN_FRONTEND=noninteractive
- apt-get -qq update
- apt-get install -y apt-utils git libgmp-dev libmpfr-dev libmpc-dev libppl-dev $PKGS
- $PYTHON --version
- $PYTHON -m pip install "gmpy2>=2.1.0b1"
- $PYTHON setup.py sdist
- $PYTHON -m pip -v install dist/pplpy-*.tar.gz
image: ubuntu:20.04
python3:
  script:
  - $PYTHON setup.py test
  - make -w -C docs html
  stage: test
  variables:
    PKGS: python3 python3-dev python3-pip python3-setuptools python3-wheel python3-sphinx
      cython3 python3-cysignals-bare
    PYTHON: python3
