before_script:
- apt update
- echo 'y\r' | apt-get install build-essential
- echo 'y' | apt-get install curl
- pip install -r requirements.txt
- pip install pytest
- apt install unzip
- mkdir -p $GLPK_CACHE_DIR
- '[ -e $GLPK_CACHE_DIR/glpk] || (curl -SLO http://ftp.gnu.org/gnu/glpk/glpk-4.65.tar.gz
  -o $GLPK_CACHE_DIR/glpk && tar -xzf glpk-4.65.tar.gz && cd glpk-4.65 && ./configure
  && make && make check && make install && cd ..)'
cache:
  paths:
  - .cache/glpk
  - .cache/pip
image: continuumio/miniconda3:latest
test:
  script:
  - pytest
variables:
  GLPK_CACHE_DIR: $CI_PROJECT_DIR/.chache/glpk
  LD_LIBRARY_PATH: /usr/lib:/usr/local/lib
  PIP_CACHE_DIR: $CI_PROJECT_DIR/.cache/pip
