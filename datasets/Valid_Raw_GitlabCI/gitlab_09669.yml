.bootstrap:
  artifacts:
    expire_in: 1 day
    untracked: true
  script:
  - devel/preserve-timestamp stamp.pre-bootstrap
  - SUBMODULE_NOFETCH=1 ./bootstrap --copy --skip-po
  stage: bootstrap
.build:
  artifacts:
    expire_in: 1 day
    untracked: true
  stage: build
.debian:
  image: $CI_REGISTRY/$BUILD_IMAGES_PROJECT:$DEBIAN_BUILD
.fedora:
  image: $CI_REGISTRY/$BUILD_IMAGES_PROJECT:$FEDORA_BUILD
.fedora-cross:
  image: $CI_REGISTRY/$BUILD_IMAGES_PROJECT:$FEDORA_CROSS_BUILD
.fedora-cross/build:
  extends:
  - .build
  script:
  - build=$(build-aux/config.guess)
  - host=$(echo $CI_JOB_NAME |cut -d/ -f2)
  - echo "host is $host"
  - export PKG_CONFIG_PATH=/usr/$host/sys-root/lib64/pkgconfig:/usr/$host/sys-root/lib/pkgconfig
  - export PKG_CONFIG_SYSROOT_DIR=/usr/$host/sys-root
  - export CC="ccache $host-gcc"
  - ./configure --host=$host --build=$build --disable-gcc-warnings --cache-file $CCACHE_FILE
    --disable-doc --disable-cxx --disable-full-test-suite --with-pkcs12-iter-count=10000
  - make -j$BUILDJOBS
  - make -j$BUILDJOBS -C tests check TESTS=""
.fedora-cross/test:
  extends:
  - .test
  script:
  - host=$(echo $CI_JOB_NAME |cut -d/ -f2)
  - arch=$(echo $host |cut -d- -f1)
  - mount -t binfmt_misc binfmt_misc /proc/sys/fs/binfmt_misc
  - '[ -e /proc/sys/fs/binfmt_misc/qemu-$arch ] || cat /usr/lib/binfmt.d/qemu-$arch-static.conf
    > /proc/sys/fs/binfmt_misc/register'
  - make pic-check
  - make -j$BUILDJOBS -C tests check
.fedora-doc:
  image: $CI_REGISTRY/$BUILD_IMAGES_PROJECT:$FEDORA_DOC_BUILD
.fedora-i686:
  image: $CI_REGISTRY/$BUILD_IMAGES_PROJECT:$FEDORA_I686_BUILD
.fedora-nettle:
  extends:
  - .fedora
  variables:
    COMPILER: clang
    NETTLE_BRANCH: release-3.10-fixes
    NETTLE_DIR: nettle
.fedora-nettle/build:
  extends:
  - .build
  - .fedora-nettle
  needs:
  - fedora/bootstrap
  script:
  - git clone --depth 1 --branch $NETTLE_BRANCH https://gitlab.com/gnutls/nettle.git
    nettle-git
  - pushd nettle-git
  - rm -rf .git
  - ./.bootstrap
  - ./configure --disable-documentation --prefix=${PWD}/$NETTLE_DIR $NETTLE_CONFIGURE_ARGS
  - make -j$BUILDJOBS
  - make -j$BUILDJOBS install
  - popd
  - PKG_CONFIG_PATH=${PWD}/nettle-git/$NETTLE_DIR/lib64/pkgconfig dash ./configure
    --disable-gcc-warnings --disable-full-test-suite --disable-doc --with-pkcs12-iter-count=10000
  - make -j$BUILDJOBS
  - make -j$BUILDJOBS check TESTS=""
.fedora-nettle/test:
  extends:
  - .test
  - .fedora-nettle
.mingw:
  allow_failure: true
  before_script:
  - &id001
    - mkdir -p cache
    - export CCACHE_BASEDIR=${PWD}
    - export CCACHE_DIR=${PWD}/cache
    - export CCACHE_FILE=${CCACHE_DIR}/config.cache
    - export CC="ccache $COMPILER"
  - "if test -e stamp.pre-bootstrap; then\n  devel/preserve-timestamp --restore stamp.pre-bootstrap\n\
    fi\n"
  image: $CI_REGISTRY/$BUILD_IMAGES_PROJECT:$MINGW_BUILD
  variables:
    WINEPATH: /usr/${arch_name}-w64-mingw32/sys-root/mingw/bin
.mingw/archive:
  artifacts:
    name: ${CI_PROJECT_NAME}-${CI_JOB_NAME}-${CI_COMMIT_REF_NAME}
    paths:
    - win${arch_bits}-build/
  script:
  - mkdir -p win${arch_bits}-build/bin win${arch_bits}-build/lib/includes
  - cp lib/.libs/*.dll src/.libs/*.exe win${arch_bits}-build/bin
  - ${arch_name}-w64-mingw32-strip --strip-unneeded win${arch_bits}-build/bin/*.dll
  - ${arch_name}-w64-mingw32-strip win${arch_bits}-build/bin/*.exe
  - cp /usr/${arch_name}-w64-mingw32/sys-root/mingw/bin/libp11-*.dll win${arch_bits}-build/bin
  - cp /usr/${arch_name}-w64-mingw32/sys-root/mingw/bin/libnettle-*.dll win${arch_bits}-build/bin
  - cp /usr/${arch_name}-w64-mingw32/sys-root/mingw/bin/libhogweed-*.dll win${arch_bits}-build/bin
  - cp /usr/${arch_name}-w64-mingw32/sys-root/mingw/bin/libgmp-*.dll win${arch_bits}-build/bin
  - cp /usr/${arch_name}-w64-mingw32/sys-root/mingw/bin/libgcc*.dll win${arch_bits}-build/bin
  - cp /usr/${arch_name}-w64-mingw32/sys-root/mingw/bin/libssp*.dll win${arch_bits}-build/bin
  - cp /usr/${arch_name}-w64-mingw32/sys-root/mingw/bin/libwinpthread*.dll win${arch_bits}-build/bin
  - cp /usr/${arch_name}-w64-mingw32/sys-root/mingw/bin/libidn2-*.dll win${arch_bits}-build/bin
  - cp /usr/${arch_name}-w64-mingw32/sys-root/mingw/bin/libffi-*.dll win${arch_bits}-build/bin
  - cp /usr/${arch_name}-w64-mingw32/sys-root/mingw/bin/libbrotlicommon.dll win${arch_bits}-build/bin
  - cp /usr/${arch_name}-w64-mingw32/sys-root/mingw/bin/libbrotlienc.dll win${arch_bits}-build/bin
  - cp /usr/${arch_name}-w64-mingw32/sys-root/mingw/bin/libbrotlidec.dll win${arch_bits}-build/bin
  - cp /usr/${arch_name}-w64-mingw32/sys-root/mingw/bin/zlib1.dll win${arch_bits}-build/bin
  - cp /usr/${arch_name}-w64-mingw32/sys-root/mingw/bin/libzstd.dll win${arch_bits}-build/bin
  - cp lib/.libs/*.a lib/*.def lib/gnutls.pc win${arch_bits}-build/lib
  - cp lib/includes/gnutls/*.h win${arch_bits}-build/lib/includes
  stage: archive
.mingw/build:
  extends:
  - .build
  script:
  - mount -t binfmt_misc binfmt_misc /proc/sys/fs/binfmt_misc
  - '[ -e /proc/sys/fs/binfmt_misc/DOSWin ] || echo '':DOSWin:M::MZ::/usr/bin/wine:''
    > /proc/sys/fs/binfmt_misc/register'
  - mingw${arch_bits}-configure --disable-gcc-warnings --host=${arch_name}-w64-mingw32
    --target=${arch_name}-w64-mingw32 --cache-file $CCACHE_FILE --disable-nls --with-included-unistring
    --disable-non-suiteb-curves --disable-full-test-suite --disable-doc --with-pkcs12-iter-count=10000
  - mingw${arch_bits}-make -j$BUILDJOBS
  - mingw${arch_bits}-make -j$BUILDJOBS -C tests check TESTS=""
.mingw/test:
  before_script:
  - mount -t binfmt_misc binfmt_misc /proc/sys/fs/binfmt_misc
  - '[ -e /proc/sys/fs/binfmt_misc/DOSWin ] || echo '':DOSWin:M::MZ::/usr/bin/wine:''
    > /proc/sys/fs/binfmt_misc/register'
  extends:
  - .test
  script:
  - mingw${arch_bits}-make -j$CHECKJOBS -C tests check
  timeout: 3h
.mingw32:
  extends:
  - .mingw
  variables:
    arch_bits: 32
    arch_name: i686
.mingw64:
  extends:
  - .mingw
  variables:
    arch_bits: 64
    arch_name: x86_64
.prepare-ccache: *id001
.test:
  artifacts:
    expire_in: 1 week
    paths:
    - ./*.log
    - ./**/*.log
    when: on_failure
  script:
  - make -j$CHECKJOBS check
  stage: test
cache:
  key: $CI_JOB_NAME-ver46
  paths:
  - cache/
commit-check:
  after_script: []
  before_script: []
  cache: {}
  except:
  - master@gnutls/gnutls
  image: $CI_REGISTRY/$BUILD_IMAGES_PROJECT:$ALPINE_BASE_BUILD
  retry: 0
  script:
  - apk add git bash grep clang19-extra-tools
  - devel/check_if_signed
  - PATH=/usr/lib/llvm19/bin:$PATH devel/indent-gnutls
  - devel/check-headers.sh
  - git diff --exit-code
  stage: .pre
  variables:
    GIT_STRATEGY: clone
    GIT_SUBMODULE_STRATEGY: none
debian/bootstrap:
  extends:
  - .bootstrap
  - .debian
debian/build:
  extends:
  - .build
  - .debian
  needs:
  - debian/bootstrap
  script:
  - dash ./configure --enable-oldgnutls-interop --disable-gcc-warnings --cache-file
    $CCACHE_FILE --disable-doc --with-pkcs12-iter-count=10000 LDFLAGS='-Wl,-Bsymbolic-functions
    -Wl,-z,relro -Wl,-z,now'
  - make -j$BUILDJOBS
  - make -j$BUILDJOBS check TESTS=""
debian/test:
  dependencies:
  - debian/build
  extends:
  - .test
  - .debian
  needs:
  - debian/build
default:
  after_script:
  - *id001
  - ccache -s
  before_script:
  - *id001
  - "if test -e stamp.pre-bootstrap; then\n  devel/preserve-timestamp --restore stamp.pre-bootstrap\n\
    fi\n"
  interruptible: true
fedora-abicoverage/build:
  extends:
  - .build
  - .fedora
  needs:
  - fedora/bootstrap
  script:
  - CFLAGS="-g -Og" dash ./configure --disable-gcc-warnings --cache-file $CCACHE_FILE  --prefix=/usr
    --libdir=/usr/lib64 --enable-code-coverage --disable-maintainer-mode --disable-doc
    --with-pkcs12-iter-count=10000
  - make -j$BUILDJOBS
  - make -j$BUILDJOBS check TESTS=""
fedora-abicoverage/test:
  artifacts:
    expire_in: 1 week
    paths:
    - ./*.xml
    - ./*.log
    - ./**/*.log
    - gnutls-prev-abi.tmp/
    - compat_reports/
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    when: on_failure
  coverage: /^\s*lines:\s*\d+.\d+\%/
  dependencies:
  - fedora-abicoverage/build
  extends:
  - .test
  - .fedora
  needs:
  - fedora-abicoverage/build
  script:
  - make abi-check
  - make pic-check
  - make -j$CHECKJOBS check
  - gcovr -fprofile-update=atomic --xml-pretty --exclude-unreachable-branches --gcov-ignore-parse-errors=negative_hits.warn_once_per_file
    --print-summary -o coverage.xml --root ${CI_PROJECT_DIR}
  - if objdump -R lib/.libs/libgnutls.so | grep INTERNAL ; then false ; fi
fedora-cross/aarch64-linux-gnu/build:
  extends:
  - .fedora-cross/build
  - .fedora-cross
  needs:
  - fedora-cross/bootstrap
  when: manual
fedora-cross/aarch64-linux-gnu/test:
  allow_failure: true
  dependencies:
  - fedora-cross/aarch64-linux-gnu/build
  extends:
  - .fedora-cross/test
  - .fedora-cross
  needs:
  - fedora-cross/aarch64-linux-gnu/build
  timeout: 2h
fedora-cross/bootstrap:
  extends:
  - .bootstrap
  - .fedora-cross
  when: manual
fedora-cross/ppc64le-linux-gnu/build:
  extends:
  - .fedora-cross/build
  - .fedora-cross
  needs:
  - fedora-cross/bootstrap
  when: manual
fedora-cross/ppc64le-linux-gnu/test:
  allow_failure: true
  dependencies:
  - fedora-cross/ppc64le-linux-gnu/build
  extends:
  - .fedora-cross/test
  - .fedora-cross
  needs:
  - fedora-cross/ppc64le-linux-gnu/build
  timeout: 2h
fedora-cross/s390x-linux-gnu/build:
  extends:
  - .fedora-cross/build
  - .fedora-cross
  needs:
  - fedora-cross/bootstrap
  when: manual
fedora-cross/s390x-linux-gnu/test:
  allow_failure: true
  dependencies:
  - fedora-cross/s390x-linux-gnu/build
  extends:
  - .fedora-cross/test
  - .fedora-cross
  needs:
  - fedora-cross/s390x-linux-gnu/build
  timeout: 2h
fedora-docdist/build:
  extends:
  - .build
  - .fedora-doc
  needs:
  - fedora/bootstrap
  script:
  - mkdir -p po/.reference
  - CFLAGS="-std=c99 -O2 -g" dash ./configure --disable-gcc-warnings --cache-file
    $CCACHE_FILE --prefix=/usr --libdir=/usr/lib64 --disable-cxx --disable-non-suiteb-curves
    --enable-gtk-doc --disable-maintainer-mode --with-pkcs12-iter-count=10000
  - make -j$BUILDJOBS -C doc stamp-vti
  - make -j$BUILDJOBS -C doc stamp_enums
  - make -j$BUILDJOBS
  - make -j$BUILDJOBS -C doc gnutls.html
  - make -j$BUILDJOBS -C doc/latex gnutls.pdf
  - DB2EPUBDIR=$(dirname $(find /usr/share/sgml/docbook/xsl-ns-stylesheets-*/epub/bin/
    -name dbtoepub -print))
  - PATH="$PATH:$DB2EPUBDIR" make -C doc gnutls.epub
  when: manual
fedora-docdist/test:
  extends:
  - .test
  - .fedora-doc
  needs:
  - fedora-docdist/build
  script:
  - make -j$CHECKJOBS distcheck
  when: manual
fedora-i686/build:
  extends:
  - .build
  - .fedora-i686
  needs:
  - fedora/bootstrap
  script:
  - setarch i686 -- ./configure --disable-gcc-warnings --cache-file $CCACHE_FILE --disable-doc
    --disable-cxx --without-p11-kit --disable-full-test-suite --without-tpm2 --with-pkcs12-iter-count=10000
    CFLAGS="-m32 -march=i686"
  - setarch i686 -- make -j$BUILDJOBS
  - setarch i686 -- make -j$BUILDJOBS -C tests check TESTS=""
  variables:
    PKG_CONFIG: i686-redhat-linux-gnu-pkg-config
  when: manual
fedora-i686/test:
  dependencies:
  - fedora-i686/build
  extends:
  - .test
  - .fedora-i686
  needs:
  - fedora-i686/build
  script:
  - setarch i686 -- make -j$CHECKJOBS check
fedora-interop/test:
  allow_failure: true
  dependencies:
  - fedora/build
  extends:
  - .test
  - .fedora
  needs:
  - fedora/build
  parallel:
    matrix:
    - COMPONENT: openssl
      SLICEID: 0
      SLICES: 1
      TYPE:
      - 2way
      - 3way
      - basic
      - other
    - COMPONENT: nss
      SLICEID: 0
      SLICES: 1
      TYPE: other
    - COMPONENT: nss
      SLICEID:
      - 0
      - 1
      SLICES: 2
      TYPE: 2way
  script:
  - export PATH=$CI_PROJECT_DIR/src:$PATH
  - echo "PATH=$PATH"
  - which gnutls-cli gnutls-serv
  - cd tests/suite/tls-interoperability/
  - echo "Tests to run:"
  - tmt run plans -n interop tests -f "tag:interop-gnutls" -f "tag:interop-$TYPE"
    -f "tag:interop-$COMPONENT"  discover -v
  - echo "Slicing SLICE_TOTAL=$SLICES SLICE_ID=$SLICEID"
  - echo "Run the tests:"
  - tmt run -a -e "SLICE_TOTAL=$SLICES" -e "SLICE_ID=$SLICEID" plans -n interop tests
    -f "tag:interop-gnutls" -f "tag:interop-$TYPE" -f "tag:interop-$COMPONENT" provision
    -h local --feeling-safe execute -h tmt --interactive
  - if [[ $PATH != $CI_PROJECT_DIR/src:* ]]; then echo "Wrong PATH=$PATH"; false;
    fi
  timeout: 45 minutes
fedora-legacy/build:
  extends:
  - .build
  - .fedora
  needs:
  - fedora/bootstrap
  script:
  - update-crypto-policies --set LEGACY
  - dash ./configure --disable-tls13-interop --disable-gcc-warnings --cache-file $CCACHE_FILE
    --enable-sha1-support --enable-ssl3-support --enable-seccomp-tests --enable-heartbeat-support
    --enable-srp-authentication --disable-doc --disable-strict-der-time --with-pkcs12-iter-count=10000
  - make -j$BUILDJOBS
  - make -j$BUILDJOBS check TESTS=""
fedora-legacy/test:
  dependencies:
  - fedora-legacy/build
  extends:
  - .test
  - .fedora
  needs:
  - fedora-legacy/build
fedora-minimal/build:
  extends:
  - .build
  - .fedora
  needs:
  - fedora/bootstrap
  script:
  - dnf remove -y libunistring-devel libtasn1-devel libidn-devel
  - dnf install -y libtasn1-tools
  - dash ./configure --cache-file $CCACHE_FILE --with-included-libtasn1 --disable-doc
    --disable-dtls-srtp-support --disable-alpn-support --disable-tests --disable-psk-authentication
    --disable-anon-authentication --disable-dhe --disable-ecdhe --disable-ocsp --disable-non-suiteb-curves
    --with-included-unistring --disable-nls --disable-libdane --without-p11-kit --without-tpm
    --without-tpm2 --disable-ssl3-support --disable-ssl2-support --disable-doc --enable-openssl-compatibility
    --disable-gcc-warnings --with-system-priority-file="" --disable-gost --disable-tools
    --with-pkcs12-iter-count=10000
  - make -j$BUILDJOBS
  - make -j$BUILDJOBS check TESTS=""
fedora-minimal/test:
  dependencies:
  - fedora-minimal/build
  extends:
  - .test
  - .fedora
  needs:
  - fedora-minimal/build
fedora-sanitizers/build:
  extends:
  - .build
  - .fedora
  needs:
  - fedora/bootstrap
  script:
  - export UBSAN_OPTIONS=print_stacktrace=1
  - export LSAN_OPTIONS=suppressions=$(pwd)/devel/lsan.supp
  - export CFLAGS="-std=c99 -O1 -g -fno-omit-frame-pointer -fsanitize=undefined,bool,alignment,null,enum,bounds-strict,address,leak,nonnull-attribute
    -fno-sanitize-recover=all -fsanitize-address-use-after-scope"
  - export CXXFLAGS="$CFLAGS"
  - dash ./configure --cache-file $CCACHE_FILE --disable-doc --with-pkcs12-iter-count=10000
    --with-default-trust-store-pkcs11="pkcs11:"
  - make -j$BUILDJOBS
  - make -j$BUILDJOBS check TESTS=""
fedora-sanitizers/test:
  extends:
  - .test
  - .fedora
  needs:
  - fedora-sanitizers/build
  parallel:
    matrix:
    - RECLAIM:
      - reclaim
      - no-reclaim
  script:
  - export UBSAN_OPTIONS=print_stacktrace=1
  - export LSAN_OPTIONS=suppressions=$(pwd)/devel/lsan.supp
  - "case \"$RECLAIM\" in\nreclaim)\n  export GNUTLS_BUFFER_RECLAIM=1\n  ;;\nno-reclaim)\n\
    \  export GNUTLS_BUFFER_RECLAIM=0\n  ;;\nesac\n"
  - make -j$BUILDJOBS check -C fuzz
  - make -j$BUILDJOBS check -C fuzz GNUTLS_CPUID_OVERRIDE=0x1
  - make -j$BUILDJOBS check -C fuzz GNUTLS_CPUID_OVERRIDE=0x2
  - make -j$BUILDJOBS check -C fuzz GNUTLS_CPUID_OVERRIDE=0x4
  - make -j$BUILDJOBS check -C fuzz GNUTLS_CPUID_OVERRIDE=0x8
  - make -j$BUILDJOBS check -C fuzz GNUTLS_CPUID_OVERRIDE=0x20
  - make -j$CHECKJOBS check -C tests
fedora-static-analyzers/build:
  extends:
  - .build
  - .fedora
  needs:
  - fedora/bootstrap
  script:
  - scan-build ./configure --cache-file $CCACHE_FILE --disable-doc --enable-fips140-mode
    --with-pkcs12-iter-count=10000
  - make -j$BUILDJOBS syntax-check gnulib_dir=$PWD/gnulib
  - make -j$BUILDJOBS -C gl
  - scan-build --status-bugs -o scan-build-lib make -j$BUILDJOBS -C lib
  - scan-build --status-bugs -o scan-build-lib make -j$BUILDJOBS -C libdane
  - make -j$BUILDJOBS -C src/gl
  - scan-build --status-bugs -o scan-build-lib make -j$BUILDJOBS -C src
fedora-threadsan/build:
  allow_failure: true
  extends:
  - .build
  - .fedora
  needs:
  - fedora/bootstrap
  script:
  - setarch $(uname -m) -R -- dash ./configure --disable-gcc-warnings --disable-doc
    --cache-file $CCACHE_FILE --disable-non-suiteb-curves --enable-fips140-mode --disable-full-test-suite
    --with-pkcs12-iter-count=10000 CFLAGS="-fsanitize=thread -g -O2" CXXFLAGS=$CFLAGS
  - setarch $(uname -m) -R -- make -j$BUILDJOBS
  - setarch $(uname -m) -R -- make -j$BUILDJOBS -C tests check SUBDIRS=. TESTS=""
    TSAN_OPTIONS="suppressions=$(pwd)/devel/tsan.supp" GNUTLS_SKIP_FIPS_INTEGRITY_CHECKS=1
    GNUTLS_FORCE_FIPS_MODE=1
fedora-threadsan/test:
  allow_failure: true
  dependencies:
  - fedora-threadsan/build
  extends:
  - .test
  - .fedora
  needs:
  - fedora-threadsan/build
  script:
  - setarch $(uname -m) -R -- make -j$CHECKJOBS -C tests check SUBDIRS=. TESTS="tls-pthread
    dtls-pthread fips-mode-pthread rng-pthread" TSAN_OPTIONS="suppressions=$(pwd)/devel/tsan.supp"
    GNUTLS_SKIP_FIPS_INTEGRITY_CHECKS=1 GNUTLS_FORCE_FIPS_MODE=1
fedora/bootstrap:
  extends:
  - .bootstrap
  - .fedora
fedora/build:
  extends:
  - .build
  - .fedora
  needs:
  - fedora/bootstrap
  script:
  - dash ./configure --cache-file $CCACHE_FILE --disable-doc --program-prefix= --disable-dependency-tracking
    --prefix=/usr --exec-prefix=/usr --bindir=/usr/bin --sbindir=/usr/sbin --sysconfdir=/etc
    --datadir=/usr/share --includedir=/usr/include --libdir=/usr/lib64 --libexecdir=/usr/libexec
    --localstatedir=/var --runstatedir=/run --sharedstatedir=/var/lib --mandir=/usr/share/man
    --infodir=/usr/share/info --enable-fips140-mode --with-fips140-module-name='Fedora
    Linux 41 gnutls' --with-fips140-module-version=$(git describe) --enable-gost --enable-sha1-support
    --disable-static --disable-openssl-compatibility --disable-non-suiteb-curves --with-system-priority-file=/etc/crypto-policies/back-ends/gnutls.config
    --with-default-trust-store-pkcs11='pkcs11:' --without-tpm --with-tpm2 --enable-ktls
    --htmldir=/usr/share/doc/manual --with-unbound-root-key-file=/var/lib/unbound/root.key
    --enable-libdane --disable-rpath --with-default-priority-string=@SYSTEM --with-leancrypto
  - make -j$BUILDJOBS
  - make -j$BUILDJOBS check TESTS=""
fedora/test:
  dependencies:
  - fedora/build
  extends:
  - .test
  - .fedora
  needs:
  - fedora/build
  parallel:
    matrix:
    - FIPS:
      - fips
      - no-fips
      KTLS: no-ktls
      PQC:
      - pqc
      - no-pqc
    - FIPS:
      - fips
      - no-fips
      KTLS: ktls
      PQC: no-pqc
  script:
  - "if test \"$KTLS\" = ktls; then\n  cp devel/gnutls-ktls.config /etc/crypto-policies/local.d\n\
    else\n  rm -f /etc/crypto-policies/local.d/gnutls-ktls.config\nfi\nupdate-crypto-policies\n\
    echo \"SYSTEM=NORMAL\" >> tests/system.prio\n"
  - "case \"$FIPS\" in\nfips)\n  export GNUTLS_FORCE_FIPS_MODE=1\n  ;;\nno-fips)\n\
    \  export GNUTLS_FORCE_FIPS_MODE=0\n  ;;\nesac\n"
  - "case \"$PQC\" in\npqc)\n  export TESTS_ENABLED_GROUPS=\"GROUP-X25519-MLKEM768\
    \ GROUP-SECP256R1-MLKEM768 GROUP-SECP384R1-MLKEM1024\"\n  ;;\nno-pqc)\n  ;;\n\
    esac\n"
  - make -j$CHECKJOBS check
mingw/bootstrap:
  extends:
  - .bootstrap
  - .mingw
  when: manual
mingw32/archive:
  dependencies:
  - mingw32/build
  extends:
  - .mingw/archive
  - .mingw32
  needs:
  - mingw32/build
  - mingw32/test
mingw32/build:
  extends:
  - .mingw/build
  - .mingw32
  needs:
  - mingw/bootstrap
mingw32/test:
  dependencies:
  - mingw32/build
  extends:
  - .mingw/test
  - .mingw32
  needs:
  - mingw32/build
mingw64/archive:
  dependencies:
  - mingw64/build
  extends:
  - .mingw/archive
  - .mingw64
  needs:
  - mingw64/build
  - mingw64/test
mingw64/build:
  extends:
  - .mingw/build
  - .mingw64
  needs:
  - mingw/bootstrap
mingw64/test:
  dependencies:
  - mingw64/build
  extends:
  - .mingw/test
  - .mingw64
  needs:
  - mingw64/build
  variables:
    GNUTLS_NO_IMPLICIT_INIT: 1
stages:
- bootstrap
- build
- test
- archive
variables:
  ALPINE_BASE_BUILD: buildenv-alpine-base
  BUILDJOBS: 2
  BUILD_IMAGES_PROJECT: gnutls/build-images
  CHECKJOBS: 16
  COMPILER: gcc
  CPPCHECK_OPTIONS: --enable=warning --enable=performance --enable=portability --std=c99
    --suppressions-list=devel/cppcheck.suppressions --template='{id}:{file}:{line},{severity},{message}'
  DEBIAN_BUILD: buildenv-debian-testing
  FEDORA_BUILD: buildenv-fedora42
  FEDORA_CROSS_BUILD: buildenv-cross-fedora42
  FEDORA_DOC_BUILD: buildenv-doc-fedora42
  FEDORA_I686_BUILD: buildenv-i686-fedora42
  GET_SOURCES_ATTEMPTS: '3'
  GIT_DEPTH: 1
  GIT_SUBMODULE_STRATEGY: recursive
  GNULIB_TOOL_IMPL: py
  MINGW_BUILD: buildenv-mingw-fedora42
