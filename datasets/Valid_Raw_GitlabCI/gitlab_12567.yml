before_script:
- chmod +x gradlew
- export GRADLE_USER_HOME=`pwd`/.gradle
build:
  allow_failure: false
  artifacts:
    paths:
    - ./build/libs/misca-*.jar
  script:
  - ./gradlew assemble
  stage: build
cache:
  paths:
  - .gradle/caches/
  - .gradle/wrapper/
  - ./build/tmp/reobf/
image: java:8
stages:
- build
