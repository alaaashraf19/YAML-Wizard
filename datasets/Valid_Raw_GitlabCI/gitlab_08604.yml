.common:
  cache:
    paths:
    - .GOPATH/pkg/mod/
    policy: pull
  variables:
    GOPATH: $CI_PROJECT_DIR/.GOPATH
default:
  image: golang:1.24
  tags:
  - gitlab-org
download deps:
  cache:
    key:
      files:
      - go.mod
      - go.sum
    paths:
    - .GOPATH/pkg/mod/
    policy: push
  extends: .common
  needs: []
  script:
  - make deps-download
include:
- local: .gitlab/ci/prepare.yml
- local: .gitlab/ci/test.yml
- component: ${CI_SERVER_FQDN}/gitlab-org/components/danger-review/danger-review@2.1.0
  rules:
  - if: $CI_SERVER_HOST == "gitlab.com" && $CI_PROJECT_PATH == "gitlab-org/gitlab-pages"
  - if: $CI_SERVER_HOST == "gitlab.com" && $CI_PROJECT_PATH == "gitlab-org/security/gitlab-pages"
stages:
- prepare
- test
workflow:
  rules:
  - if: $CI_MERGE_REQUEST_IID
  - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  - if: $CI_COMMIT_TAG
  - if: $CI_COMMIT_BRANCH =~ /^[\d-]+-stable(-ee)?$/
  - if: $CI_COMMIT_BRANCH =~ /^security\//
