before_script:
- make prepare
image: ruby:2.7
pages:
  artifacts:
    paths:
    - public
  only:
  - master
  script:
  - bundle exec jekyll build -d public
  stage: deploy
test:
  artifacts:
    paths:
    - test
  before_script:
  - apt update -y -qq && apt install -y imagemagick bash nodejs npm
  - make prepare
  except:
  - master
  script:
  - make site
  - bundle exec jekyll build -d test
  stage: test
variables:
  JEKYLL_ENV: production
