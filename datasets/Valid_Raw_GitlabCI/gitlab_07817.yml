before_script:
- echo "Running before script..."
- export GRADLE_USER_HOME=$(pwd)/gradle-cache
- chmod +x ./gradlew
- echo "" >> gradle.properties
- echo "org.gradle.daemon=false" >> gradle.properties
- echo -n "$KEYSTORE" | base64 -d -w 0 > $(pwd)/android.keystore
- echo -n "$SIGNING_KEY_RING_FILE" | base64 -d -w 0 > $(pwd)/secretRingKey.gpg
- export SIGNING_SECRET_KEY_RING_FILE=$(pwd)/secretRingKey.gpg
- export KEYSTORE_FILE=$(pwd)/android.keystore
- echo "Finished running before script."
cache:
  key: ${CI_PROJECT_ID}
  paths:
  - gradle-cache/wrapper
  - gradle-cache/caches/modules-2/files-2.1
image:
  entrypoint:
  - ''
  name: registry.gitlab.com/fredriklarsen/airbrush/android:2.0.0
library:
  artifacts:
    paths:
    - library/build/outputs/aar/*
    when: on_success
  only:
    refs:
    - tags
  script:
  - ./gradlew assembleRelease
  stage: build
publish:
  only:
    refs:
    - tags
  script:
  - ./gradlew publishReleasePublicationToSonatypeRepository
  stage: deploy
  when: manual
sample-app:
  artifacts:
    paths:
    - sample/build/outputs/apk/debug/*.apk
    when: on_success
  only:
    refs:
    - tags
  script:
  - ./gradlew sample:assembleDebug
  stage: build
stages:
- verify
- build
- deploy
tests:
  artifacts:
    reports:
      junit:
      - '*/build/test-results/*/TEST-*.xml'
  script:
  - ./gradlew clean lintRelease testRelease
  stage: verify
