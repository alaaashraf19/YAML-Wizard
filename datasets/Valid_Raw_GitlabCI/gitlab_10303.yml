before_script:
- npm install
cache:
  paths:
  - node_modules/
image: node:8.9.4
stages:
- test
test_proj:
  artifacts:
    paths:
    - coverage/*
  coverage: /(\d*.?\d+)%/
  script:
  - ./node_modules/.bin/ng lint
  - ./node_modules/.bin/ng test --watch=false --code-coverage=true
  stage: test
  tags:
  - linux
