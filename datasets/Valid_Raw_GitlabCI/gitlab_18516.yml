before_script: null
benchmark:
  artifacts:
    name: benchmark_results_${CI_COMMIT_SHA}
    paths:
    - benchmark_results.json
  cache:
    paths:
    - battleground/
  script:
  - echo -e "\033[36mPerforming benchmarks\033[0m"
  - make benchmark
  stage: benchmark
benchmark-foreign:
  artifacts:
    name: benchmark_results_f_${CI_COMMIT_SHA}
    paths:
    - benchmark_results_f.json
  cache:
    paths:
    - battleground/
  script:
  - echo -e "\033[36mPerforming foreign benchmarks\033[0m"
  - make benchmark-foreign
  stage: benchmark
compile:
  script:
  - echo -e "\033[36mValidating Lua syntax\033[0m"
  - make compile
  stage: smoke-test
lint:
  allow_failure: true
  script:
  - echo -e "\033[36mPerforming static analysis\033[0m"
  - make lint
  stage: smoke-test
stages:
- smoke-test
- build
- test
- benchmark
test:
  script:
  - echo -e "\033[36mRunning tests\033[0m"
  - make test
  stage: test
wipe_cache:
  script:
  - rm -r battleground
  stage: benchmark
  when: on_failure
