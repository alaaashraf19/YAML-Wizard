.connected-template:
  script: &id001
  - ./gradlew assembleFullDebug
  - export AVD_SDK=`echo $CI_JOB_NAME | awk '{print $2}'`
  - export AVD_TAG=`echo $CI_JOB_NAME | awk '{print $3}'`
  - export AVD_ARCH=`echo $CI_JOB_NAME | awk '{print $4}'`
  - export AVD_PACKAGE="system-images;android-${AVD_SDK};${AVD_TAG};${AVD_ARCH}"
  - echo $AVD_PACKAGE
  - emulator -accel-check || true
  - if [[ "$AVD_SDK" == Q ]]; then set -x; echo y | sdkmanager --channel=3 "emulator"
    > /dev/null; set +x; else set -x; rm -rf $ANDROID_HOME/emulator; wget -q http://dl.google.com/android/repository/emulator-linux-5264690.zip;
    echo "48c1cda2bdf3095d9d9d5c010fbfb3d6d673e3ea  emulator-linux-5264690.zip" |
    sha1sum -c; unzip -qq -d $ANDROID_HOME emulator-linux-5264690.zip; set +x; fi
  - grep -v '^License' $ANDROID_HOME/tools/source.properties $ANDROID_HOME/emulator/source.properties
  - alias sdkmanager
  - echo y | sdkmanager "platforms;android-$AVD_SDK" > /dev/null
  - if ! avdmanager list avd | grep "Name. avd$AVD_SDK$"; then set -x; rm -rf ~/.android/avd  $ANDROID_HOME/system-images;
    echo y | sdkmanager "$AVD_PACKAGE" > /dev/null; echo no | avdmanager create avd
    --name avd$AVD_SDK --tag "$AVD_TAG" --package "$AVD_PACKAGE" --sdcard 64M --device
    "Nexus 5"; export RAMSIZE="`sed -n 's,^MemAvailable:[^0-9]*\([0-9][0-9]*\)[^0-9]*$,\1,p'
    /proc/meminfo`"; if [ $RAMSIZE -le 2048 ]; then sed -i '/^hw\.ramSize\s*=.*/d'
    ~/.android/avd/*.avd/config.ini; echo "hw.ramSize=1024" >> ~/.android/avd/*.avd/config.ini;
    fi; avdmanager list avd; set +x; fi
  - grep -v '^License' $ANDROID_HOME/system-images/android-$AVD_SDK/$AVD_TAG/$AVD_ARCH/source.properties
  - adb start-server
  - ls -l ~/.android
  - emulator -version
  - emulator -avd avd$AVD_SDK -no-audio -no-jni -no-snapstorage -no-window -skip-adb-auth
    -verbose -wipe-data -debug all,-hw_control,-qemud,-sensors,-surface &
  - wait-for-emulator
  - adb devices
  - adb shell input keyevent 82 &
  - test $AVD_SDK -ge 25 || export FLAG=-Pandroid.testInstrumentationRunnerArguments.notAnnotation=android.support.test.filters.LargeTest
  - ./gradlew connectedFullDebugAndroidTest $FLAG || ./gradlew connectedFullDebugAndroidTest
    $FLAG || ./gradlew connectedFullDebugAndroidTest $FLAG || (adb -e logcat -d >
    logcat.txt; exit 1)
.kvm-template:
  after_script: &id002
  - echo "Download debug artifacts from https://gitlab.com/${CI_PROJECT_PATH}/-/jobs"
  allow_failure: true
  artifacts: &id003
    expire_in: 1 week
    name: ${CI_PROJECT_PATH}_${CI_JOB_STAGE}_${CI_COMMIT_REF_NAME}_${CI_COMMIT_SHA}
    paths:
    - logcat.txt
    - app/build/reports
    - app/build/outputs/*ml
    - app/build/outputs/apk
    when: on_failure
  only: &id004
  - branches@eighthave/fdroidclient
  script: *id001
  stage: test
  tags: &id005
  - fdroid
  - kvm
.test-template:
  after_script: *id002
  artifacts: *id003
  stage: test
after_script:
- rm -f $GRADLE_USER_HOME/caches/modules-2/modules-2.lock
- rm -fr $GRADLE_USER_HOME/caches/*/plugin-resolution/
before_script:
- export GRADLE_USER_HOME=$PWD/.gradle
- export ANDROID_COMPILE_SDK=`sed -n 's,.*compileSdkVersion\s*\([0-9][0-9]*\).*,\1,p'
  app/build.gradle`
- alias sdkmanager="sdkmanager --no_https"
- echo y | sdkmanager "platforms;android-${ANDROID_COMPILE_SDK}" > /dev/null
cache:
  paths:
  - .gradle/wrapper
  - .gradle/caches
connected 22 default armeabi-v7a:
  after_script: *id002
  artifacts: *id003
  retry: 1
  script: *id001
  stage: test
connected 23 default x86:
  after_script: *id002
  allow_failure: true
  artifacts: *id003
  only: *id004
  script: *id001
  stage: test
  tags: *id005
connected 25 default x86:
  after_script: *id002
  allow_failure: true
  artifacts: *id003
  only: *id004
  script: *id001
  stage: test
  tags: *id005
connected 26 google_apis x86:
  after_script: *id002
  allow_failure: true
  artifacts: *id003
  only:
  - branches@fdroid/fdroidclient
  - branches@eighthave/fdroidclient
  script: *id001
  stage: test
  tags: *id005
connected 27 google_apis_playstore x86:
  after_script: *id002
  allow_failure: true
  artifacts: *id003
  only: *id004
  script: *id001
  stage: test
  tags: *id005
connected 28 default x86_64:
  after_script: *id002
  allow_failure: true
  artifacts: *id003
  only: *id004
  script: *id001
  stage: test
  tags: *id005
connected 29 default x86_64:
  after_script: *id002
  allow_failure: true
  artifacts: *id003
  only: *id004
  script: *id001
  stage: test
  tags: *id005
deploy_nightly:
  only:
  - master
  script:
  - test -z "$DEBUG_KEYSTORE" && exit 0
  - sed -i 's,<string name="app_name">.*</string>,<string name="app_name">F-Nightly</string>,'
    app/src/main/res/values*/strings.xml
  - sed -i -e '/<\/string-array>/d' -e '/<\/resources>/d' app/src/main/res/values/default_repos.xml
  - echo "<item>${CI_PROJECT_PATH}-nightly</item>" >> app/src/main/res/values/default_repos.xml
  - echo "<item>${CI_PROJECT_URL}-nightly/raw/master/fdroid/repo</item>" >> app/src/main/res/values/default_repos.xml
  - cat config/nightly-repo/repo.xml >> app/src/main/res/values/default_repos.xml
  - export DB=`sed -n 's,.*DB_VERSION *= *\([0-9][0-9]*\).*,\1,p' app/src/main/java/org/fdroid/fdroid/data/DBHelper.java`
  - export versionCode=`printf '%d%05d' $DB $(date '+%s'| cut -b4-8)`
  - sed -i "s,^\(\s*versionCode\)  *[0-9].*,\1 $versionCode," app/build.gradle
  - ./gradlew assembleDebug
  - fdroid nightly -v
  stage: deploy
errorprone:
  script:
  - cat config/errorprone.gradle >> app/build.gradle
  - ./gradlew assembleDebug
  stage: test
image: registry.gitlab.com/fdroid/ci-images-client:latest
stages:
- test
- deploy
test_lint_pmd_checkstyle:
  after_script: *id002
  artifacts: *id003
  script:
  - export EXITVALUE=0
  - ./gradlew assemble
  - sed -i -e 's,textReport .*,textReport true,' app/build.gradle
  - ./gradlew testFullDebugUnitTest
  - ./gradlew lint
  - ./gradlew pmd || export EXITVALUE=1
  - ./gradlew checkstyle || export EXITVALUE=1
  - ./tools/check-format-strings.py || export EXITVALUE=1
  - ./tools/check-fastlane-whitespace.py || export EXITVALUE=1
  - ./tools/remove-unused-and-blank-translations.py || export EXITVALUE=1
  - echo "These are unused or blank translations that should be removed:"
  - git --no-pager diff --ignore-all-space --name-only --exit-code app/src/*/res/values*/strings.xml
    || export EXITVALUE=1
  - exit $EXITVALUE
  stage: test
