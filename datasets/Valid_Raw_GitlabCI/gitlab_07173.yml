before_script:
- bundle install --clean --jobs $(nproc) --path vendor/bundle
cache:
  paths:
  - vendor/bundle
image: ruby:2.3
pages:
  artifacts:
    paths:
    - public
  only:
  - master
  script:
  - bundle exec jekyll build -d public
  stage: deploy
test:
  artifacts:
    paths:
    - test
  except:
  - master
  script:
  - bundle exec jekyll build -d test
  stage: test
variables:
  BUNDLE_GEMFILE: Gemfile.gitlab
