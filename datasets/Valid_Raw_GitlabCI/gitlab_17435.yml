.cmake:
  USE_CMAKE: '1'
.ctest:
  TEST_CTEST: '1'
.legion:
  DEBUG: '0'
  LEGION_WARNINGS_FATAL: '1'
  TEST_REGENT: '0'
.nodes1:
  SCHEDULER_PARAMETERS: -A UMS036 -t 1:00:00 -N 1 -n 1 -c 56 -p batch --exclusive
.nodes2:
  SCHEDULER_PARAMETERS: -A UMS036 -t 1:00:00 -N 2 -n 2 -c 56 -p batch --exclusive
.regent:
  CXXFLAGS: -D__HIP_PLATFORM_AMD__
  NO_PRETTY: '1'
  TEST_FUZZER: '0'
  TEST_LEGION_CXX: '0'
  TEST_REALM: '0'
.rocm571:
  ROCM_VERSION: 5.7.1
.rocm600:
  ROCM_VERSION: 6.0.0
.rocm613:
  ROCM_VERSION: 6.1.3
.rocm624:
  ROCM_VERSION: 6.2.4
.rocm631:
  ROCM_VERSION: 6.3.1
.rocm641:
  ROCM_VERSION: 6.4.1
.tests:
  retry: &id002
    max: 0
    when:
    - runner_system_failure
    - unknown_failure
  script: &id003
  - .gitlab/prep_script.sh
  - .gitlab/test_script.sh
.tokens:
  id_tokens: &id001
    OLCF_ID_TOKEN:
      aud: https://code.olcf.ornl.gov
legion_cmake_rocm571:
  id_tokens: *id001
  retry: *id002
  script: *id003
  stage: test
  tags:
  - slurm
  - frontier
  - login12
  variables:
    DEBUG: '0'
    LEGION_WARNINGS_FATAL: '1'
    ROCM_VERSION: 5.7.1
    SCHEDULER_PARAMETERS: -A UMS036 -t 0:30:00 -N 1 -n 1 -c 56 -p batch --exclusive
    TEST_CTEST: '1'
    TEST_REGENT: '0'
    USE_CMAKE: '1'
