equinox_build:debian:
  artifacts:
    paths:
    - build/
  before_script:
  - apt-get update -qq && apt-get install -y -qq  libcppunit-dev cmake pkg-config
    build-essential libconfig++-dev valgrind libeigen3-dev doxygen
  image: debian:latest
  script:
  - mkdir -p build
  - cd build
  - cmake -DCMAKE_BUILD_TYPE=RelWithDebInfo ..
  - make
  - cd ..
  stage: build
equinox_build:opensuse:
  artifacts:
    paths:
    - build/
  before_script:
  - zypper ref && zypper install -y -l gcc-c++ cppunit-devel cmake pkg-config libconfig++-devel
    valgrind eigen3-devel doxygen patterns-devel-C-C++-devel_C_C++
  image: opensuse/tumbleweed
  script:
  - mkdir -p build
  - cd build
  - cmake -DCMAKE_BUILD_TYPE=RelWithDebInfo ..
  - make
  - cd ..
  stage: build
equinox_test:debian:
  before_script:
  - apt-get update -qq && apt-get install -y -qq  libcppunit-dev cmake pkg-config
    build-essential libconfig++-dev valgrind libeigen3-dev doxygen
  dependencies:
  - equinox_build:debian
  image: debian:latest
  script:
  - cd build
  - make CTEST_OUTPUT_ON_FAILURE=1 test
  stage: test
equinox_test:opensuse:
  before_script:
  - zypper ref && zypper install -y -l gcc-c++ cppunit-devel cmake pkg-config libconfig++-devel
    valgrind eigen3-devel doxygen patterns-devel-C-C++-devel_C_C++
  dependencies:
  - equinox_build:opensuse
  image: opensuse/tumbleweed
  script:
  - cd build
  - make CTEST_OUTPUT_ON_FAILURE=1 test
  stage: test
stages:
- build
- test
