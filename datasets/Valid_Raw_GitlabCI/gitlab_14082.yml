build:
  image: gitlab/dind
  script:
  - export IMAGE_TAG=$(echo -en $CI_BUILD_REF_NAME | tr -c '[:alnum:]_.-' '-')
  - docker login -u "$CI_BUILD_USER"  -p "$CI_BUILD_TOKEN" $CI_REGISTRY
  - docker build --pull -t "$CI_REGISTRY_IMAGE:$IMAGE_TAG" .
  - docker push "$CI_REGISTRY_IMAGE:$IMAGE_TAG"
  stage: build
build_front:
  image: node:latest
  script:
  - npm install
  - npm run prod
  stage: build_front
image: docker:latest
services:
- docker:dind
stages:
- build
- build_front
