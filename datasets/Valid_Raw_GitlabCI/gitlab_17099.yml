before_script:
- go version
- export GO_PROJECT_DIR="$GOPATH/src/$PROJECT_PATH"
- git clone $CI_REPOSITORY_URL $GO_PROJECT_DIR
- cd $GO_PROJECT_DIR
- git checkout $CI_COMMIT_REF_NAME
- deps="$(./_scripts/list_deps.sh)"
- echo "${deps}"
- go get -d ${deps}
build-project:
  script:
  - go build ./...
  stage: build
image: silentstorm/golang-coverage
lint-dupl:
  after_script:
  - cat $CI_PROJECT_DIR/linter.log | GREP_COLOR='01;31' egrep --color=always ':error:|$'
    | GREP_COLOR='01;33' egrep --color=always ':warning:|$'
  allow_failure: true
  artifacts:
    expire_in: 2 weeks
    paths:
    - linter.log
    when: on_failure
  dependencies: []
  script:
  - 'gometalinter --config=''gometalinter_dupl.conf'' $GO_PROJECT_DIR/... | sort -t:
    -k ''1,1'' -k ''2,2g'' -k ''3,3g'' > $CI_PROJECT_DIR/linter.log'
  stage: test
lint-source:
  after_script:
  - cat $CI_PROJECT_DIR/linter.log | GREP_COLOR='01;31' egrep --color=always ':error:|$'
    | GREP_COLOR='01;33' egrep --color=always ':warning:|$'
  allow_failure: true
  artifacts:
    expire_in: 2 weeks
    paths:
    - linter.log
    when: on_failure
  dependencies: []
  script:
  - 'gometalinter --config=''gometalinter.conf'' $GO_PROJECT_DIR/... | sort -t: -k
    ''1,1'' -k ''2,2g'' -k ''3,3g'' > $CI_PROJECT_DIR/linter.log'
  stage: test
stages:
- build
- test
test-project:
  artifacts:
    paths:
    - coverage.out
    - coverage.html
    when: always
  coverage: /total:\s+\(statements\)\s+\d+\.\d+%/
  dependencies: []
  script:
  - goverage -coverprofile=coverage.out ./...
  - go tool cover -html coverage.out -o coverage.html
  - go tool cover -func=coverage.out
  - cp coverage.out coverage.html $CI_PROJECT_DIR
  stage: test
variables:
  GIT_STRATEGY: none
  PROJECT_PATH: gitlab.com/silentteacup/congo
