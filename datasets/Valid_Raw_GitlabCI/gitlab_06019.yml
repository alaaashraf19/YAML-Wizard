before_script:
- apt-get -qq update
- apt-get -qq install -y curl python3 python3-venv python3-pip npm nodejs
- curl -LsSf https://astral.sh/uv/install.sh | sh
- source $HOME/.local/bin/env
- uv tool install pebble-tool
- pebble sdk install 4.5
build:
  artifacts:
    expire_in: 1 week
    paths:
    - build/*.pbw
  script:
  - pebble build
  stage: build
cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
  - sdk
image: ubuntu:latest
stages:
- build
