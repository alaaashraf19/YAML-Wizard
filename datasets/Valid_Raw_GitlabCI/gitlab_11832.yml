before_script:
- echo -e "\e[36m\nGitlab job started $(date)\n"
- echo -e "\e[1;34m$CI_PROJECT_NAME - $CI_PROJECT_DIR - $CI_COMMIT_REF_NAME - $SHELL\n\e[0m"
- ls -al
build:
  after_script:
  - echo -e "\e[1m\nVerifying build status ..."
  - if [[ -f build/PharoDebug.log ]]; then echo -e "\e[91m\nErrors detected in load
    process!\n"; ls -al build; echo; cat build/PharoDebug.log; echo; cat build/LoadLocal.log;
    fi
  artifacts:
    paths:
    - build
    - deploy
    when: always
  cache:
    key: ${CI_COMMIT_REF_SLUG}_2018-05-30
    paths:
    - $PHARO_CACHE_DIR
  script:
  - ls -al ./src
  - source ./scripts/build.sh
  - ls -al $CI_PROJECT_DIR
  - ls -al $PHARO_CACHE_DIR
  stage: build
deploy:
  only:
  - master
  script:
  - source ./build/setup_ssh.sh
  - ssh $DOMAIN_LOGIN "ls -al"
  - source ./build/deploy.sh
  stage: deploy
  variables:
    GIT_STRATEGY: none
image: macta/pharo:61_32
stages:
- build
- deploy
variables:
  CI_CACHE_PHARO: 'true'
  DOMAIN_LOGIN: user@domain.com
  PHARO_CACHE_DIR: $CI_PROJECT_DIR/pharo-cache
  PHARO_DIR: /opt/pharo
  PRIVATE_KEY: '-----BEGIN RSA PRIVATE KEY-----'
  PROJECT_NAME: $CI_PROJECT_NAME
  STRIP_IMAGE: 'false'
