before_script:
- pip3 install tox
dist:
  artifacts:
    name: ${CI_PROJECT_NAME}-{$CI_BUILD_REF_NAME}
    paths:
    - dist/
  before_script:
  - pip3 install -rreqs/requirements-deploy.txt
  only:
  - tags
  - triggers
  script:
  - python3 setup.py sdist bdist_wheel
  - twine upload dist/* -u "$PYPI_USER" -p "$PYPI_PASS"
  stage: deploy
image: mgoral/super-ci-runner:latest
stages:
- test
- deploy
test:
  script:
  - tox -e py34
  - tox -e py35
  - tox -e py36
  stage: test
test-coverage:
  allow_failure: true
  artifacts:
    expire_in: 14 days
    name: coverage
    paths:
    - coverage.xml
    - htmlcov/
  script:
  - tox -e coverage
  stage: test
test-flake8:
  script:
  - tox -e flake8
  stage: test
test-pylint:
  script:
  - tox -e pylint
  stage: test
