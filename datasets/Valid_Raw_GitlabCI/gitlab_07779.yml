.test_template:
  artifacts: &id001
    expire_in: 1 hour
    paths:
    - tests
    when: on_failure
  before_script: &id002
  - composer install --no-interaction --no-progress --no-suggest --optimize-autoloader
  - cp app/config/config.test.neon app/config/config.local.neon
  script: &id003
  - php temp/php-parallel-lint/parallel-lint.php -e php,phpt -j $(nproc) app tests
  - vendor/bin/tester -s -p php -c tests/php.ini tests
  services: &id004
  - mysql:latest
  stage: test
cache:
  paths:
  - vendor
deploy to production:
  environment: production
  image: sunfoxcz/docker-php-build:7.1
  only:
  - master
  script:
  - curl -s -X POST https://deployer.sunfox.cz/deploy/$DEPLOYER_KEY
  stage: deploy
download:
  artifacts:
    expire_in: 1 hour
    paths:
    - temp/php-parallel-lint
  image: composer:latest
  script:
  - composer create-project --no-interaction --no-progress --prefer-dist jakub-onderka/php-parallel-lint
    temp/php-parallel-lint ~0.9
  stage: download
stages:
- download
- test
- deploy
test:7.0:
  artifacts: *id001
  before_script: *id002
  image: sunfoxcz/docker-php-build:7.0
  script: *id003
  services: *id004
  stage: test
test:7.1:
  artifacts: *id001
  before_script: *id002
  image: sunfoxcz/docker-php-build:7.1
  script: *id003
  services: *id004
  stage: test
variables:
  GIT_DEPTH: '1'
  GIT_STRATEGY: fetch
  MYSQL_DATABASE: test
  MYSQL_ROOT_PASSWORD: aaa123
