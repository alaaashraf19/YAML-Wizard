.distribution:
  extends: .script
  stage: dist
.fedora:
  before_script:
  - dnf -y install make gpg pass python-setuptools python3-pip grep which dbus dbus-daemon
    gnome-keyring pandoc --setopt=install_weak_deps=False
  extends: .distribution
  image: fedora
.gnome-keyring: &id003
- mkdir -p ~/.local/share/keyrings/
- cp tests/assets/db/gnome-keyring.keyring ~/.local/share/keyrings/pass-import.keyring
.lpass: &id002
- echo -e '#!/usr/bin/env bash\necho lpass' > /usr/bin/lpass
- chmod 755 /usr/bin/lpass
.pip: &id001
- pip3 install --break-system-packages --upgrade pip
- pip3 install --break-system-packages --upgrade coverage cryptography defusedxml
  dominate green pyaml jsonpath-ng pykeepass pypandoc python-magic requests secretstorage
  zxcvbn
.script:
  script:
  - *id001
  - *id002
  - *id003
  - make
  - dbus-run-session -- make tests
  - make docs
  - make install
  - cd ~
  - pass import --help
.sphinx:
- pip3 install --break-system-packages --upgrade pwdsphinx
- ln -s /usr/lib/x86_64-linux-gnu/libsodium.so.23 /usr/lib/x86_64-linux-gnu/libequihash.so
- ln -s /usr/lib/x86_64-linux-gnu/libsodium.so.23 /usr/lib/x86_64-linux-gnu/libsphinx.so
- ldconfig
- cp tests/assets/db/sphinx.cfg ~/.sphinxrc
- sphinx init
.tests:
  before_script:
  - apt-get update -q && apt-get install -y make pass python3-pip grep wget dbus gnome-keyring
    pandoc libsodium23
  extends: .script
  stage: tests
.ubuntu:
  before_script:
  - apt-get update -q && apt-get install -y make gpg pass python3-pip grep wget dbus
    gnome-keyring pandoc
  extends: .distribution
  image: ubuntu:24.04
archlinux:
  before_script:
  - pacman -Syu --noconfirm --noprogressbar which grep make python-pip pass dbus gnome-keyring
    file pandoc python-setuptools
  extends: .distribution
  image: archlinux
debian:
  before_script:
  - apt-get update -q && apt-get install -y make gpg pass python3-pip grep wget dbus
    gnome-keyring pandoc
  extends: .distribution
  image: debian
include:
- template: Security/SAST.gitlab-ci.yml
pages:
  artifacts:
    expire_in: 1 day
    paths:
    - public
  dependencies:
  - python 3.11
  rules:
  - if: $CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH
  script:
  - mv htmlcov/ public/
  stage: deploy
prospector:
  allow_failure: true
  before_script:
  - pip install 'prospector[with_everything]' defusedxml requests zxcvbn dominate
  image: python:latest
  script:
  - make lint
  stage: lint
python 3.10:
  extends: .tests
  image: python:3.10
python 3.11:
  artifacts:
    expire_in: 2 days
    paths:
    - htmlcov/
  coverage: /\d+\%\s*$/
  extends: .tests
  image: python:3.11
python 3.8:
  extends: .tests
  image: python:3.8
python 3.9:
  extends: .tests
  image: python:3.9
sast:
  stage: lint
shellcheck:
  image: koalaman/shellcheck-alpine
  script:
  - shellcheck --shell=bash import.bash
  stage: lint
stages:
- lint
- tests
- dist
- deploy
variables:
  DEBIAN_FRONTEND: noninteractive
  SAST_DEFAULT_ANALYZERS: bandit
