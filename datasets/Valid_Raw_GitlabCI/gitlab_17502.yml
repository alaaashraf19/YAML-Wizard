before_script:
- ci/install-dependencies.sh
clang-x86-nounwind:
  script: ci/run-build-and-tests.sh
  stage: test
  variables:
    CC: clang
    STACKTRACE: 'no'
    TARGET: x86
clang-x86_64-libdw:
  script: ci/run-build-and-tests.sh
  stage: test
  variables:
    CC: clang
    STACKTRACE: libdw
    TARGET: x86_64
clang-x86_64-libunwind:
  script: ci/run-build-and-tests.sh
  stage: test
  variables:
    CC: clang
    STACKTRACE: libunwind
    TARGET: x86_64
clang-x86_64-nounwind:
  script: ci/run-build-and-tests.sh
  stage: test
  variables:
    CC: clang
    STACKTRACE: 'no'
    TARGET: x86_64
gcc-x86-nounwind:
  script: ci/run-build-and-tests.sh
  stage: test
  variables:
    CC: gcc
    STACKTRACE: 'no'
    TARGET: x86
gcc-x86_64-libdw:
  script: ci/run-build-and-tests.sh
  stage: test
  variables:
    CC: gcc
    STACKTRACE: libdw
    TARGET: x86_64
gcc-x86_64-libdw-mainline:
  script: ci/run-build-and-tests.sh
  stage: test
  variables:
    CC: gcc
    KHEADERS: torvalds/linux
    STACKTRACE: libdw
    TARGET: x86_64
gcc-x86_64-libunwind:
  script: ci/run-build-and-tests.sh
  stage: test
  variables:
    CC: gcc
    STACKTRACE: libunwind
    TARGET: x86_64
gcc-x86_64-nounwind:
  script: ci/run-build-and-tests.sh
  stage: test
  variables:
    CC: gcc
    STACKTRACE: 'no'
    TARGET: x86_64
image: ubuntu:18.04
variables:
  GIT_DEPTH: '2147483647'
  SLEEP_A_BIT: sleep 0.2
  VERBOSE: '1'
