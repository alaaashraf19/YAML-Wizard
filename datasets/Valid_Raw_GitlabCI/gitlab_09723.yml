before_script:
- yarn install
cache:
  paths:
  - node_modules/
dist:
  artifacts:
    paths:
    - dist/
  only:
  - tags
  - master
  script:
  - npm run build:dist
  stage: build
image: griest/karma-full-test-env:latest
lint:
  script:
  - npm run lint
  stage: test
pages:
  artifacts:
    paths:
    - public/
  dependencies:
  - test
  only:
  - master
  script:
  - cp -r test/reports public
  - sed -i -e 's/<head>/<head><script type="application\/javascript" src="https:\/\/unpkg.com\/iframe-resizer@3.5.14\/js\/iframeResizer.contentWindow.min.js"><\/script>/g'
    public/reports/{unit,coverage/lcov-report}/index.html
  stage: deploy
publish:
  dependencies:
  - dist
  only:
  - tags
  script:
  - echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
  - cp -r src/renderer/game .
  - npm publish
  stage: deploy
stages:
- test
- build
- deploy
test:
  artifacts:
    paths:
    - test/reports/
  script:
  - npm run test:unit -- --single-run --browsers Chrome
  stage: test
