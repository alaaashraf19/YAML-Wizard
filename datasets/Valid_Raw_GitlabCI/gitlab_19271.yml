.rspec:
  before_script: &id001
  - ruby -v
  - echo "${RSPEC_RAILS_VERSION}"
  - gem install bundler -v "~>${BUNDLER_VERSION:-2.4}" --no-document
  - export BUNDLE_GEMFILE="spec/Gemfile"
  - bundle install --jobs=$(nproc) --path="../cache/bundle"
  - bundle list
  cache: &id002
    key: $CI_JOB_NAME
    paths:
    - cache/
  script: &id003
  - bundle exec rake spec
  stage: test
build:
  artifacts:
    paths:
    - Gemfile.lock
  image: ruby:3.3
  script:
  - gem install bundler --no-document
  - bundle update
  stage: build
dependency_scanning:
  stage: security
include:
- template: Security/SAST.gitlab-ci.yml
- template: Security/Dependency-Scanning.gitlab-ci.yml
- template: Security/Secret-Detection.gitlab-ci.yml
release:
  image: ruby:3.3
  only:
  - tags
  script:
  - gem install bundler --no-document
  - bundle update
  - rake release
  stage: release
rspec-ruby3.2-rails7.2:
  before_script: *id001
  cache: *id002
  image: ruby:3.2
  script: *id003
  stage: test
  variables:
    RSPEC_RAILS_VERSION: '7.2'
rspec-ruby3.3-rails7.2:
  before_script: *id001
  cache: *id002
  image: ruby:3.3
  script: *id003
  stage: test
  variables:
    RSPEC_RAILS_VERSION: '7.2'
rspec-ruby3.3-rails8.0:
  before_script: *id001
  cache: *id002
  image: ruby:3.3
  script: *id003
  stage: test
  variables:
    RSPEC_RAILS_VERSION: '8.0'
rspec-ruby3.3-rails8.1:
  before_script: *id001
  cache: *id002
  image: ruby:3.3
  script: *id003
  stage: test
  variables:
    RSPEC_RAILS_VERSION: '8.1'
rubocop:
  image: ruby:3.0
  script:
  - gem install rubocop rubocop-performance rubocop-rails rubocop-rspec --no-document
  - rubocop
  stage: codequality
sast:
  stage: security
secret_detection:
  stage: security
stages:
- security
- build
- test
- codequality
- release
