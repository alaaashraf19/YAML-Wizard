build app:
  artifacts:
    expire_in: 1 day
    paths:
    - .next
    - build
  cache:
    paths:
    - node_modules
  image: node:12
  script:
  - yarn
  - yarn lint
  - yarn build
  stage: build-app
build image:
  image: docker:latest
  script:
  - docker info
  - echo $CI_REGISTRY_PASSWORD | docker login --username $CI_REGISTRY_USER $CI_REGISTRY
    --password-stdin
  - docker pull $CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG || docker pull $CI_REGISTRY_IMAGE:master
    || true
  - docker build -t $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA --cache-from=$CI_REGISTRY_IMAGE:$CI_BUILD_REF_NAME
    --cache-from=$CI_REGISTRY_IMAGE:master --shm-size 512M .
  - docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA
  - docker tag $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA $CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG
  - docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG
  services:
  - docker:19.03.5-dind
  stage: build-image
stages:
- build-app
- build-image
