"\U0001F39B\uFE0Fcustom_invocation":
  after_script: *id004
  artifacts: *id005
  before_script: *id006
  image: registry.gitlab.com/gitlab-data/dbt-image:v0.1.2
  only: *id008
  script:
  - set +e
  - export SNOWFLAKE_SNAPSHOT_DATABASE="${CI_COMMIT_REF_NAME^^}_RAW"
  - if [ -z $WAREHOUSE ]; then echo "No Warehouse selected." && exit 7; else SNOWFLAKE_TRANSFORM_WAREHOUSE=$WAREHOUSE;
    fi
  - echo $SNOWFLAKE_TRANSFORM_WAREHOUSE
  - export DBT_CI_STATEMENT=""
  - if [ -z "$STATEMENT" ]; then echo "No models selected." && exit 3; else DBT_CI_STATEMENT=$STATEMENT;
    fi
  - echo $DBT_CI_STATEMENT
  - echo $SNOWFLAKE_SNAPSHOT_DATABASE
  - if [ ! -z "$RAW_DB" ]; then SNOWFLAKE_LOAD_DATABASE="${CI_COMMIT_REF_NAME^^}_RAW";
    fi
  - echo $SNOWFLAKE_LOAD_DATABASE
  - dbt deps $CI_PROFILE_TARGET
  - dbt $DBT_CI_STATEMENT $CI_PROFILE_TARGET || FAILED=true
  - if [ $FAILED ]; then echo "Invocation process failed" && exit 5; fi
  stage: "\u2699\uFE0F dbt Run"
  tags: *id007
  when: manual
"\U0001F3D7\uFE0F\U0001F3EDbuild_changes":
  after_script: *id004
  artifacts: *id005
  before_script: *id006
  image: registry.gitlab.com/gitlab-data/dbt-image:v0.1.2
  only: *id008
  script:
  - set +e
  - export SNOWFLAKE_TRANSFORM_WAREHOUSE=${WAREHOUSE:-$SNOWFLAKE_MR_XL_WAREHOUSE}
  - echo $SNOWFLAKE_TRANSFORM_WAREHOUSE
  - export SNOWFLAKE_SNAPSHOT_DATABASE="${CI_COMMIT_REF_NAME^^}_RAW"
  - echo $SNOWFLAKE_SNAPSHOT_DATABASE
  - if [ ! -z "$RAW_DB" ]; then SNOWFLAKE_LOAD_DATABASE="${CI_COMMIT_REF_NAME^^}_RAW";
    fi
  - echo $SNOWFLAKE_LOAD_DATABASE
  - dbt deps $CI_PROFILE_TARGET
  - make build-changes MODE="CI" CONTIGUOUS="$CONTIGUOUS" SELECTION="$SELECTION" EXCLUDE="$EXCLUDE"
    PROFILE_TARGET="$CI_PROFILE_TARGET" FULL_REFRESH="$FULL_REFRESH" FAIL_FAST="$FAIL_FAST"
    VARS="$VARS" DOWNSTREAM="$DOWNSTREAM"
  stage: "\u2699\uFE0F dbt Run"
  tags: *id007
  when: manual
