.auto_dbt_seed: &id002
- SCHEMA_NAME=$(python3 ../../orchestration/yaml_reader.py read_seed_schema --dbt_project_path
  "./dbt_project.yml")
- TABLE_NAME=$(python3 ../../orchestration/yaml_reader.py read_seed_name --seed_file_path
  "./seeds/seed_engineering/seed_engineering.yml")
- RESULT=$(python3 ../../orchestration/manage_snowflake.py check_if_table_exists --database
  $SNOWFLAKE_PREP_DATABASE --schema $SCHEMA_NAME --table_name $TABLE_NAME)
- CLEAN_RESULT=$(echo $RESULT | egrep -o '.{4,5}$')
- if [ $CLEAN_RESULT = "False" ]; then dbt seed --full-refresh $CI_PROFILE_TARGET;
  fi
.clone_raw:
- export SNOWFLAKE_LOAD_DATABASE="${CI_COMMIT_REF_NAME^^}_RAW"
- echo $SNOWFLAKE_LOAD_DATABASE
.dbt_deps: &id001
- dbt deps $CI_PROFILE_TARGET
.dbt_macro_check:
  allow_failure: false
  before_script: &id011
  - cd transform/snowflake-dbt/
  image: registry.gitlab.com/gitlab-data/dbt-image:v0.1.2
  only: &id012
    changes:
    - transform/snowflake-dbt/macros/**/*.sql
    refs:
    - merge_request
  stage: "\U0001F6E0 dbt Misc"
  tags: &id013
  - analytics
.dbt_misc_jobs:
  after_script: &id004
  - cd $CI_PROJECT_DIR/transform/snowflake-dbt/
  - mkdir -p $CI_PROJECT_DIR/public/dbt/
  - cp -r target $CI_PROJECT_DIR/public/dbt/
  artifacts: &id005
    expire_in: 1 week
    name: dbt Compiled Files and logs
    paths:
    - public
    - transform/snowflake-dbt/logs
    when: always
  before_script: &id006
  - cd transform/snowflake-dbt/
  - echo $BRANCH_NAME
  - if [ $BRANCH_NAME = "master" ]; then export SNOWFLAKE_PREP_DATABASE="PREP"; else
    export SNOWFLAKE_PREP_DATABASE="${CI_COMMIT_REF_NAME^^}_PREP"; fi
  - if [ $BRANCH_NAME = "master" ]; then export SNOWFLAKE_PROD_DATABASE="PROD"; else
    export SNOWFLAKE_PROD_DATABASE="${CI_COMMIT_REF_NAME^^}_PROD"; fi
  - echo $SNOWFLAKE_PREP_DATABASE
  - echo $SNOWFLAKE_PROD_DATABASE
  - export SNOWFLAKE_LOAD_DATABASE="RAW"
  - echo $SNOWFLAKE_LOAD_DATABASE
  - export SNOWFLAKE_TRANSFORM_WAREHOUSE=$SNOWFLAKE_MR_XS_WAREHOUSE
  - echo $SNOWFLAKE_TRANSFORM_WAREHOUSE
  - export SNOWFLAKE_SNAPSHOT_DATABASE="SNOWFLAKE"
  - echo $SNOWFLAKE_SNAPSHOT_DATABASE
  - export ENVIRONMENT="CI"
  - echo $ENVIRONMENT
  - export CI_PROFILE_TARGET="--profiles-dir profile --target ci"
  - echo $CI_PROFILE_TARGET
  - export DBT_RUNNER="${GITLAB_USER_ID}-${CI_MERGE_REQUEST_ID}-${CI_JOB_ID}"
  - echo $DBT_RUNNER
  - mkdir -p $CI_PROJECT_DIR/transform/snowflake-dbt/reference_state/
  - curl -o $CI_PROJECT_DIR/transform/snowflake-dbt/reference_state/manifest.json
    http://dbt.gitlabdata.com/manifest.json
  - mkdir -p ~/.ssh
  - touch ~/.ssh/id_rsa
  - chmod 700 ~/.ssh
  - echo "$GIT_DATA_TESTS_SSH_PRIVATE_KEY" | base64 --decode > ~/.ssh/id_rsa
  - chmod 0400 ~/.ssh/id_rsa
  - echo -e "Host *\n\tStrictHostKeyChecking no\n\n" > ~/.ssh/config
  image: registry.gitlab.com/gitlab-data/dbt-image:v0.1.2
  only: &id008
  - merge_requests
  stage: "\U0001F6E0 dbt Misc"
  tags: &id007
  - analytics
  when: manual
.dbt_validate_tags: &id003
- dbt --warn-error run-operation tag_validation --profiles-dir profile --target ci
