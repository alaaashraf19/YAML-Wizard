clear_report:
  extends: .notification_job
  rules:
  - if: $CI_PIPELINE_SOURCE != "merge_request_event"
    when: never
  - if: $CI_MERGE_REQUEST_LABELS =~ /Suppress Results Report/
  script:
  - unset GITLAB_ACCESS_TOKEN
  - transform/snowflake-dbt/clear_dbt_report.zsh
post_report_on_build:
  extends: .notification_job
  rules:
  - if: $CI_PIPELINE_SOURCE != "merge_request_event"
    when: never
  - if: $CI_MERGE_REQUEST_LABELS !~ /Suppress Results Report/
  script:
  - unset GITLAB_ACCESS_TOKEN
  - transform/snowflake-dbt/parse_dbt_results.zsh > msg.txt
  - transform/snowflake-dbt/post_dbt_report.zsh "$(cat msg.txt)"
run_grants:
  after_script: *id004
  artifacts: *id005
  before_script: *id006
  image: registry.gitlab.com/gitlab-data/dbt-image:v0.1.2
  only: *id008
  script:
  - set +e
  - dbt deps $CI_PROFILE_TARGET
  - make run-grants MODE="CI" UPSTREAM="1+" PROFILE_TARGET="$CI_PROFILE_TARGET" GRANT_TO_ROLE="$GRANT_TO_ROLES"
  stage: "\U0001F6E0 dbt Misc"
  tags: *id007
  when: manual
"\U0001F331manual_seed":
