"\U0001F50Dds_exposure_dependencies_query":
  after_script: *id004
  allow_failure: true
  artifacts: *id005
  before_script: *id006
  image: registry.gitlab.com/gitlab-data/dbt-image:v0.1.2
  only: *id010
  script:
  - *id001
  - DIFF=$(git diff origin/$CI_MERGE_REQUEST_TARGET_BRANCH_NAME...HEAD --name-only
    | grep -iEo "(.*)\.sql" | sed -E 's/\.sql//' | awk -F '/' '{print tolower($NF)}'
    | sort | uniq )
  - echo $DIFF
  - if [ -n "$DIFF" ]; then python3 ds_dependency_check.py $DIFF; fi
  stage: "\U0001F6E0 dbt Misc"
  tags: *id007
