before_script:
- apt update -qq && apt install -y git
pages:
  artifacts:
    paths:
    - public
  image: julia
  only:
  - master
  script:
  - julia -e "using Pkg; Pkg.add(\"Documenter\")"
  - julia --project=./ -e "using Pkg; Pkg.build(); include(\"docs/make.jl\")"
  - mv docs/build public
test:
  image: julia
  script:
  - julia --project=./ -e "using Pkg; Pkg.activate(); Pkg.instantiate(); Pkg.test()"
