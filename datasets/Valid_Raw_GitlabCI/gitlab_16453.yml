before_script:
- pip install -r requirements.txt
black:
  script:
  - black .
  stage: style
image: python:3.8
mypy:
  script:
  - mypy --strict serpyco
  stage: style
pages:
  artifacts:
    paths:
    - public
  only:
  - tags
  script:
  - pip install -e "[.build-doc]"
  - apt-get update -qy
  - apt-get install -qy make
  - make html
  - mv _build/html/ public
  stage: doc
ruff:
  script:
  - ruff check .
  stage: style
stages:
- style
- test
- doc
test:
  image: python:${PYTHON_VERSION}
  parallel:
    matrix:
    - PYTHON_VERSION:
      - '3.8'
      - '3.9'
      - '3.10'
      - '3.11'
      - '3.12'
  script:
  - pip install -e ".[dev]"
  - pytest
  stage: test
