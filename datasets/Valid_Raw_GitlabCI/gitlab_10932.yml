before_script: null
build_doc:
  artifacts:
    paths:
    - docu/build/jbake/
  only:
  - publish
  script:
  - apt-get update
  - apt-get -y install graphviz
  - echo '{"allow_root"'  ':'  true '}'   > /root/.bowerrc
  - ./gradlew docu:clean
  - ./gradlew docu:build
  stage: build
image: java:8
pages:
  artifacts:
    paths:
    - public
  dependencies:
  - build_doc
  only:
  - publish
  script:
  - mkdir ./public
  - mkdir -p docu/build/jbake
  - cp -r docu/build/jbake/* ./public
  stage: deploy
