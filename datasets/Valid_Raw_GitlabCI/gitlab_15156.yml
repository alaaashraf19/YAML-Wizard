before_script:
- gem install bundler
- bundle install
image: ruby:2.4
pages:
  artifacts:
    paths:
    - public
  only:
  - master@pygotham/2018
  script:
  - bundle exec jekyll build -d public
  stage: deploy
test:
  artifacts:
    paths:
    - test
  except:
  - master@pygotham/2018
  script:
  - bundle exec jekyll build -d test
  stage: test
variables:
  JEKYLL_ENV: production
  LC_ALL: C.UTF-8
