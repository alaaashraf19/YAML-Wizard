image: archlinux:latest
pages:
  artifacts:
    paths:
    - public
  cache:
    paths:
    - TFSThiagoBR98.AnimeThemeX.Web/node_modules/
  only:
  - NeXT
  script:
  - pacman -Syu --noconfirm --needed nodejs-lts-iron npm python python-poetry python-setuptools
    python-setuptools-scm python-pip python-wheel python-setuptools
  - cp -rv ResultData TFSThiagoBR98.AnimeThemeX.Web/public/api
  - cd TFSThiagoBR98.AnimeThemeX.Web/
  - npm install
  - npx ember build --environment production
  - cd ..
  - mv TFSThiagoBR98.AnimeThemeX.Web/dist public
  stage: deploy
