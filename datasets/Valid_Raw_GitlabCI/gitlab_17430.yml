before_script:
- apt-get update
- apt-get install -y build-essential postgresql-client git
- mix local.hex --force
- mix local.rebar
- mix deps.get
- mix ecto.create
- mix ecto.migrate
image: elixir:1.3.1
services:
- postgres:latest
test:
  script:
  - mix test
variables:
  MIX_ENV: test
  POSTGRESQL_DB: blogie_test
  POSTGRESQL_HOST: postgres
  POSTGRESQL_PASSWORD: ''
  POSTGRESQL_USER: postgres
