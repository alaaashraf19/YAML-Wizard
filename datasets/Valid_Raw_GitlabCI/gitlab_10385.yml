.change_build_dir: &id001
- rm -Rf build
- mkdir build
- cd build
.ubuntu_curr_builder:
  before_script: &id002
  - export CCACHE_DIR="${CI_PROJECT_DIR}/.ccache"
  - export CCACHE_BASEDIR="${CI_PROJECT_DIR}"
  - export CCACHE_COMPILERCHECK="content"
  cache: &id003
    key: ${CI_JOB_NAME}-${CI_COMMIT_REF_SLUG}
    paths:
    - .ccache
    policy: pull-push
  image: registry.gitlab.com/synsense-sys-int/inivation/infra/docker-files/ubuntu:rolling
  rules: &id004
  - if: $CI_MERGE_REQUEST_ID
  - if: $CI_COMMIT_BRANCH
  script: &id005
  - *id001
  - cmake -DCMAKE_INSTALL_PREFIX=/usr -DENABLE_STATIC=1 -DENABLE_OPENCV=1 -DENABLE_SERIALDEV=1
    -DEXAMPLES_INSTALL=1 ..
  - make -j1 -s
  stage: build
.version_name: &id006
- export VERSION_NAME=$([[ -z "${RELEASE_VERSION}"  ]] && echo "${CI_COMMIT_TAG}"
  || echo "${RELEASE_VERSION}")
basic_syntax_check_clang:
  before_script: *id002
  cache: *id003
  image: registry.gitlab.com/synsense-sys-int/inivation/infra/docker-files/ubuntu:rolling
  rules: *id004
  script:
  - cmake -DCMAKE_INSTALL_PREFIX=/usr -DENABLE_OPENCV=1 -DENABLE_SERIALDEV=1 .
  - find include/ -type f -iname '*.hpp' | sort -u > headers.txt
  - find include/ -type f -iname '*.h' | sort -u >> headers.txt
  - for h in $(cat headers.txt) ; do echo "\nChecking === ${h}\n\n" ; ${CXX} -std=c++17
    -O2 -pipe "${h}" $(pkg-config --cflags opencv4) ; rm -f "${h}.gch" ; done
  stage: build
  variables:
    CC: clang-15
    CXX: clang++-15
build_macos_arm:
  cache:
    key: ${CI_JOB_NAME}-${CI_COMMIT_REF_SLUG}
    paths:
    - .ccache
    policy: pull-push
  rules:
  - if: $CI_MERGE_REQUEST_ID
  - if: $CI_COMMIT_BRANCH
  script:
  - *id001
  - /opt/homebrew/bin/cmake -DCMAKE_INSTALL_PREFIX=/opt/homebrew -DENABLE_STATIC=1
    -DENABLE_OPENCV=1 -DENABLE_SERIALDEV=1 -DEXAMPLES_INSTALL=1 ..
  - make -j4
  - if [[ "${CI_COMMIT_BRANCH}" != "master" ]] ; then exit 0; fi
  - rm -Rf /opt/homebrew/lib/${CI_PROJECT_NAME}.so* /opt/homebrew/include/${CI_PROJECT_NAME}/
    /opt/homebrew/include/${CI_PROJECT_NAME}cpp/ /opt/homebrew/lib/cmake/${CI_PROJECT_NAME}/
    /opt/homebrew/share/caer/
  - make install
  stage: build
  tags:
  - macos
  - build
  - arm
  variables:
    CCACHE_BASEDIR: ${CI_PROJECT_DIR}
    CCACHE_COMPILERCHECK: content
    CCACHE_DIR: ${CI_PROJECT_DIR}/.ccache
    PATH: /opt/homebrew/bin:/usr/bin:/bin:/usr/sbin:/sbin:/Library/Apple/usr/bin
build_macos_intel:
  cache:
    key: ${CI_JOB_NAME}-${CI_COMMIT_REF_SLUG}
    paths:
    - .ccache
    policy: pull-push
  rules:
  - if: $CI_MERGE_REQUEST_ID
  - if: $CI_COMMIT_BRANCH
  script:
  - *id001
  - arch -x86_64 /usr/local/bin/cmake -DCMAKE_INSTALL_PREFIX=/usr/local -DENABLE_STATIC=1
    -DENABLE_OPENCV=1 -DENABLE_SERIALDEV=1 -DEXAMPLES_INSTALL=1 ..
  - make -j4
  - if [[ "${CI_COMMIT_BRANCH}" != "master" ]] ; then exit 0; fi
  - rm -Rf /usr/local/lib/${CI_PROJECT_NAME}.so* /usr/local/include/${CI_PROJECT_NAME}/
    /usr/local/include/${CI_PROJECT_NAME}cpp/ /usr/local/lib/cmake/${CI_PROJECT_NAME}/
    /usr/local/share/caer/
  - make install
  stage: build
  tags:
  - macos
  - build
  - x86_64
  variables:
    CCACHE_BASEDIR: ${CI_PROJECT_DIR}
    CCACHE_COMPILERCHECK: content
    CCACHE_DIR: ${CI_PROJECT_DIR}/.ccache
    PATH: /usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin:/Library/Apple/usr/bin
