.build:
  before_script:
  - apt update -qq && apt install -y -qq cmake make git
  stage: build
all builds clang:
  allow_failure: true
  extends: .build
  script:
  - apt install -y -qq clang
  - test/run -v compilation
all builds gcc:
  allow_failure: true
  extends: .build
  script:
  - apt install -y -qq g++
  - test/run -v compilation
build for tests:
  artifacts:
    paths:
    - ./bin/test/install/
  extends: .build
  script:
  - apt install -y -qq g++
  - test/run -v build_for_tests
cmake sanity:
  before_script:
  - apt update -qq && apt install -y -qq make cmake
  script:
  - test/run -v cmake
  stage: test
get dependencies:
  artifacts:
    paths:
    - ./extlib/
  script:
  - apt update -qq && apt install -y -qq git
  - utils/updateDependencies
  stage: get_deps
image: ubuntu:cosmic
stages:
- get_deps
- build
- test
