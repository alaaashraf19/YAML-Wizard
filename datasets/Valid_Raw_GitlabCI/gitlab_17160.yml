before_script:
- docker login -u gitlab-ci-token -p $CI_BUILD_TOKEN registry.gitlab.com
build:
  script:
  - docker run --rm -v "$(pwd):/src" -v /var/run/docker.sock:/var/run/docker.sock
    -e COMPRESS_BINARY=true centurylink/golang-builder $CONTAINER_TEST_IMAGE
  - docker push $CONTAINER_TEST_IMAGE
  stage: build
image: docker:latest
services:
- docker:dind
variables:
  CONTAINER_RELEASE_IMAGE: registry.gitlab.com/sirile/go-image-test:latest
  CONTAINER_TEST_IMAGE: registry.gitlab.com/sirile/go-image-test:$CI_BUILD_REF_NAME
  DOCKER_DRIVER: overlay
