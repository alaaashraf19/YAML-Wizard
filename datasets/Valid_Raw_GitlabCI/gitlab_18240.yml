.amd64:
  variables: &id001
    ARCH: amd64
    ARCH_TRIPLET: x86_64-linux-gnu
.arm64:
  variables: &id002
    ARCH: arm64
    ARCH_TRIPLET: aarch64-linux-gnu
.armhf:
  variables: &id003
    ARCH: armhf
    ARCH_TRIPLET: arm-linux-gnueabihf
.build:
  artifacts:
    expire_in: 1 week
    paths:
    - build/$ARCH_TRIPLET/app
  image: clickable/ci-20.04-$ARCH
  script: clickable build --clean --arch $ARCH --accept-review-errors
  stage: build
build-amd64:
  extends: .build
  variables: *id001
build-arm64:
  extends: .build
  variables: *id002
build-armhf:
  extends: .build
  variables: *id003
default:
  tags:
  - $RUNNER_TAG
publish:
  artifacts:
    expire_in: 30 days
    paths:
    - build/arm-linux-gnueabihf/app/*.click
    - build/aarch64-linux-gnu/app/*.click
    - build/x86_64-linux-gnu/app/*.click
  dependencies:
  - build-armhf
  - build-arm64
  - build-amd64
  image: clickable/ci-20.04-armhf
  rules:
  - if: $CI_COMMIT_TAG
  script:
  - clickable publish "$CI_COMMIT_MESSAGE"
  - clickable publish --arch arm64
  - clickable publish --arch amd64
  stage: publish
stages:
- build
- publish
variables:
  DOCKER_DRIVER: overlay2
  GIT_SUBMODULE_STRATEGY: recursive
workflow:
  rules:
  - if: $CI_PROJECT_NAMESPACE =~ /^ubports\//
    variables:
      RUNNER_TAG: ubports
  - if: $CI_PROJECT_NAMESPACE !~ /^ubports\//
    variables:
      RUNNER_TAG: saas-linux-small-amd64
