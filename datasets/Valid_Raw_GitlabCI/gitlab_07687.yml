before_script:
- export SHORT_SHA=${CI_COMMIT_SHA:0:8}
- echo "\$CI_COMMIT_SHA $CI_COMMIT_SHA"
- echo "\$CI_COMMIT_REF_SLUG $CI_COMMIT_REF_SLUG"
cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
  - node_modules/
docker-build:
  dependencies:
  - ng-build
  script:
  - ls -al
  - ls -al dist
  - docker login -u ${CI_REGISTRY_USER} -p ${CI_BUILD_TOKEN} ${CI_REGISTRY}
  - docker build -f Dockerfile.flightchainui -t ${CI_REGISTRY_IMAGE} --build-arg PROJECT=${CI_PROJECT_NAME}
    --build-arg VERSION=${VERSION} .
  - docker tag ${CI_REGISTRY_IMAGE}:latest ${CI_REGISTRY_IMAGE}:${VERSION}.${SHORT_SHA}
  - docker push ${CI_REGISTRY_IMAGE}
  stage: package
  tags:
  - shared
image: docker:latest
ng-build:
  artifacts:
    paths:
    - dist/
  image: trion/ng-cli-karma
  script:
  - ls -al
  - npm install
  - ./node_modules/@angular/cli/bin/ng build --prod  --configuration=production
  - ls -al
  - ls -al dist
  stage: build
  tags:
  - shared
services:
- docker:dind
stages:
- build
- package
variables:
  APP_NAME: flightchainui
  CLUSTER_NAME: dev.blockchainsandbox.aero
  DOCKER_DRIVER: overlay
  IMG_NAME: flightchain2/flightchainui
  LISTENING_PORT: '4200'
  NAMESPACE: adapters
  SERVICE_NAME: flightchainui
  SPRING_PROFILES_ACTIVE: gitlab-ci
  VERSION: kosversionlabel
