pages:
  artifacts:
    paths:
    - public
  only:
  - master
  script:
  - mkdir .public
  - cp -r * .public
  - mv .public/org-reveal_Readme.html .public/elisp/org-reveal/Readme.html
  - cp -r .public/reveal.js .public/elisp/org-reveal/
  - mv .public public
  stage: deploy
variables:
  GIT_SUBMODULE_STRATEGY: normal
