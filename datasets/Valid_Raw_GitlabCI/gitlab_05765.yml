compile_test:
  except:
  - master
  script:
  - hugo
  stage: test
content_link_check:
  allow_failure: false
  image: nwops/liche
  script:
  - /go/bin/liche -v content/**/*.md
  stage: validate
grammar_check:
  allow_failure: true
  image: node:alpine
  script:
  - npm -g add write-good
  - /usr/local/bin/write-good content/**/*.md
  stage: validate
image: monachus/hugo
layout_link_check:
  allow_failure: true
  image: nwops/liche
  script:
  - /go/bin/liche -v layouts/**/*.html
  stage: validate
pages:
  artifacts:
    expire_in: 1 day
    paths:
    - public
    - resources
  only:
  - master
  script:
  - hugo
  stage: test
production_deploy:
  only:
  - master
  script:
  - hugo
  - aws s3 cp ./public/ s3://$AWS_BUCKET/ --recursive
  - aws cloudfront create-invalidation --distribution-id $AWS_CLOUDFRONT_DISTRIBUTION_ID
    --paths /index.html
  - echo "Site available at $URL_ROOT"
  stage: deploy
  variables: null
  when: manual
spell_check:
  image: tmaier/markdown-spellcheck:latest
  script:
  - mdspell --report "content/**/*.md" --ignore-acronyms --ignore-numbers --en-us
  stage: validate
stages:
- validate
- test
- deploy
