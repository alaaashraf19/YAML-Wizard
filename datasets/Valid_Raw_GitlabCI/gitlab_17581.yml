image: python:3.5
master:
  artifacts:
    expire_in: 10 week
    name: ${CI_JOB_NAME}_${CI_COMMIT_REF_NAME}
    paths:
    - public/
    when: on_success
  script:
  - pip install -r requirements_test.txt --upgrade
  - coverage run --source=dj_auth runtests.py
  - coverage html -d public --title=dj_auth
  - coverage report -m
  tags:
  - docker
