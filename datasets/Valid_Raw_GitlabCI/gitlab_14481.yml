pages:
  artifacts:
    paths:
    - public
  cache:
    key: pages
    paths:
    - $CARGO_HOME/
    untracked: true
  image: rust:latest
  only:
  - master
  script:
  - cargo doc
  - rm -rf public
  - mv target/doc public
  stage: doc
  variables:
    CARGO_HOME: $CI_PROJECT_DIR/cargo
stages:
- test
- doc
tests:
  before_script:
  - rustc --version
  - cargo --version
  - rustup component add rustfmt-preview
  - rustup component add clippy-preview
  cache:
    key: tests
    paths:
    - $CARGO_HOME/
    - target/
    untracked: true
  image: rust:latest
  script:
  - cargo b
  - cargo fmt -- --check
  - cargo clippy
  - cargo t
  stage: test
  variables:
    CARGO_HOME: $CI_PROJECT_DIR/cargo
    RUST_BACKTRACE: '1'
