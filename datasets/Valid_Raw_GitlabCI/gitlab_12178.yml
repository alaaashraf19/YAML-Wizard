demo_project:
  only:
  - branches@meltano/meltano
  - tags@meltano/meltano
  stage: test
  trigger:
    project: meltano/demo-project
    strategy: depend
  variables:
    MELTANO_IMAGE: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA-python3.8
demo_project_forks:
  except:
  - branches@meltano/meltano
  - tags@meltano/meltano
  script:
  - 'curl --request POST --form "token=$CI_JOB_TOKEN" --form "variables[MELTANO_IMAGE]=$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA-python3.8"
    --form ref=master https://gitlab.com/api/v4/projects/meltano%2fdemo-project/trigger/pipeline

    '
  stage: test
  when: manual
