build:avr:
  image: registry.gitlab.com/spoorcc/rocketmock/cmake-avr:latest
  script:
  - mkdir -p build
  - cd build
  - cmake -DBUILD_AVR=ON ..
  - make
  stage: build
build:msp430:
  image: registry.gitlab.com/spoorcc/rocketmock/cmake-msp430:latest
  script:
  - mkdir -p build
  - cd build
  - cmake -DBUILD_MSP430=ON ..
  - make
  stage: build
build:x64:
  image: registry.gitlab.com/spoorcc/rocketmock/ubuntu-gcc:latest
  script:
  - mkdir -p build
  - cd build
  - cmake ..
  - make
  - make test
  stage: build
pages:
  artifacts:
    paths:
    - public
  image: registry.gitlab.com/spoorcc/rocketmock/ubuntu-gcc:latest
  only:
  - master
  script:
  - mkdir -p build
  - cd build
  - cmake .. -DBUILD_ROCKET_MOCK_DOC=ON
  - make doc
