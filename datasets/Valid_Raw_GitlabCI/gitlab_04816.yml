.common-build:
  artifacts:
    expire_in: 1 hrs
    paths:
    - ./catkin_ws
    when: on_success
  script:
  - mkdir ../caros_tmp
  - mkdir catkin_ws
  - mkdir catkin_ws/src
  - mkdir catkin_ws/src/caros
  - cp -r * ../caros_tmp/
  - cp -r ../caros_tmp/* ./catkin_ws/src/caros
  - ln -s /LeapSDK ./catkin_ws/src/caros/hwcomponents/caros_leapmotion/LeapSDK
  - cd catkin_ws
  - catkin_make -j$(nproc --all)
  stage: build
  tags:
  - linux
.common-doc:
  artifacts:
    paths:
    - public
  only:
  - master
  script:
  - cd src/caros/doc
  - ./generate_documentation.sh
  - mv generated/ ${orig}/public/
  stage: deploy
  tags:
  - linux
.common-test:
  script:
  - catkin_make run_tests
  - catkin_make roslint
  - rospack list-names | grep '^caros_' | xargs -L 1 catkin_lint --strict -W 2 --explain
    --ignore header_outside_package_include_path --pkg
  stage: test
  tags:
  - linux
build:ubuntu-2004:
  extends: .common-build
  image: gitlab.sdu.dk:5050/sdurobotics/docker-images/caros-build:ubuntu-2004
default:
  before_script:
  - orig=$(pwd)
  - '[[ -d /opt/ros/noetic ]] && source /opt/ros/noetic/setup.bash || echo no Noetic
    installation'
  - '[[ -d /opt/ros/melodic ]] && source /opt/ros/melodic/setup.bash || echo no Melodic
    installation'
  - '[[ -d ./catkin_ws ]] && cd catkin_ws || echo catkin_ws not there yet'
  - '[[ -d ./devel ]] && source devel/setup.bash || echo devel not there yet'
doc:ubuntu-2004:
  dependencies:
  - test:ubuntu-2004
  - build:ubuntu-2004
  extends: .common-doc
  image: gitlab.sdu.dk:5050/sdurobotics/docker-images/caros-build:ubuntu-2004
  needs:
  - test:ubuntu-2004
  - build:ubuntu-2004
stages:
- build
- test
- deploy
test:ubuntu-2004:
  dependencies:
  - build:ubuntu-2004
  extends: .common-test
  image: gitlab.sdu.dk:5050/sdurobotics/docker-images/caros-build:ubuntu-2004
  needs:
  - build:ubuntu-2004
