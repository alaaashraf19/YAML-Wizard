build_windows_msys:
  after_script:
  - pkill -9 dv-runtime
  artifacts: *id002
  before_script:
  - source /usr/bin/init-paths
  - pip3 install --break-system-packages -U git+https://gitlab.com/inivation/dv/dv-python.git
  cache:
    key: ${CI_JOB_NAME}-${CI_COMMIT_REF_SLUG}
    paths:
    - .ccache
    policy: pull-push
  rules:
  - if: $CI_PIPELINE_SOURCE == "web" && $RELEASE
    when: never
  - if: $CI_MERGE_REQUEST_ID
  - if: $CI_COMMIT_BRANCH
  - if: $CI_COMMIT_TAG
  script:
  - source /usr/bin/init-paths
  - *id001
  - cmake -G "MSYS Makefiles" -DCMAKE_INSTALL_PREFIX=/mingw64 -DPython3_EXECUTABLE=/mingw64/bin/python3
    -DDVR_ENABLE_TCMALLOC=OFF ..
  - make -j8 -s
  - make tests TESTS=noperf
  - if [[ "${CI_COMMIT_BRANCH}" != "master" ]] && [[ -z "${CI_COMMIT_TAG}" ]] ; then
    exit 0; fi
  - export PLATFORM="win"
  - python3 ../packaging/windows/package_deps.py
  - *id009
  stage: build
  tags:
  - windows
  - build
  variables:
    CC: gcc
    CCACHE_BASEDIR: ${CI_PROJECT_DIR}
    CCACHE_COMPILERCHECK: content
    CCACHE_DIR: ${CI_PROJECT_DIR}/.ccache
    CMAKE_BUILD_TYPE: Release
    CTEST_OUTPUT_ON_FAILURE: 1
    CXX: g++
    MSYSTEM: MINGW64
default:
  interruptible: true
  tags:
  - docker
  - ubuntu
  - build
pages:
  artifacts:
    paths:
    - public
  cache:
    key: ${CI_JOB_NAME}
    paths:
    - docs/build
    policy: pull-push
  image: registry.gitlab.com/synsense-sys-int/inivation/infra/docker-files/ubuntu:docs
  interruptible: false
  resource_group: ${CI_JOB_NAME}
  rules:
  - if: $CI_COMMIT_TAG
  - if: $CI_COMMIT_BRANCH
  script:
  - cd docs
  - python3 docs-build.py "${CI_COMMIT_REF_NAME}" "${CI_DEFAULT_BRANCH}"
  - cp -R build ../public
  stage: build
  variables:
    GIT_STRATEGY: clone
pre-commit_check:
  before_script:
  - pre-commit install
  image: registry.gitlab.com/synsense-sys-int/inivation/infra/docker-files/ubuntu:rolling
  rules:
  - if: $CI_COMMIT_BRANCH
  script:
  - pre-commit run -a
  stage: build
release_arch:
  before_script:
  - mkdir -p ~/.ssh/
  - cp "${GITCI_SSH_KEY}" ~/.ssh/id_ed25519
  - chmod 0600 ~/.ssh/id_ed25519
  - ssh-keyscan gitlab.com >> ~/.ssh/known_hosts
  - ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts
  - cp "${GITCI_SSH_CONF}" ~/.gitconfig
  - *id012
  image: registry.gitlab.com/synsense-sys-int/inivation/infra/docker-files/archlinux:latest
  interruptible: false
  needs:
  - release_archive_submodules
  rules:
  - if: $CI_COMMIT_TAG
  - if: $CI_PIPELINE_SOURCE == "web" && $RELEASE == "Arch" && $RELEASE_VERSION
  script:
  - cd packaging/linux/
  - ./arch-release.sh --pkg-name "${CI_PROJECT_NAME}" --pkg-version "${VERSION_NAME}"
  stage: deploy
release_archive_submodules:
  image: registry.gitlab.com/synsense-sys-int/inivation/infra/docker-files/ubuntu:rolling
  interruptible: false
  rules:
  - if: $CI_COMMIT_TAG
  - if: $CI_PIPELINE_SOURCE == "web" && $RELEASE && $RELEASE_VERSION
  script:
  - if [[ -n "${RELEASE}" ]] ; then exit 0; fi
  - git-archive-all "${CI_PROJECT_NAME}-${CI_COMMIT_TAG}.zip"
  - 'curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" --upload-file "${CI_PROJECT_NAME}-${CI_COMMIT_TAG}.zip"
    "${PACKAGE_REGISTRY_URL}/${CI_COMMIT_TAG}/${CI_PROJECT_NAME}-${CI_COMMIT_TAG}.zip"'
  - git-archive-all "${CI_PROJECT_NAME}-${CI_COMMIT_TAG}.tar.gz"
  - 'curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" --upload-file "${CI_PROJECT_NAME}-${CI_COMMIT_TAG}.tar.gz"
    "${PACKAGE_REGISTRY_URL}/${CI_COMMIT_TAG}/${CI_PROJECT_NAME}-${CI_COMMIT_TAG}.tar.gz"'
  - aws s3 cp "${CI_PROJECT_NAME}-${CI_COMMIT_TAG}.zip" "s3://release.inivation.com/runtime/${CI_PROJECT_NAME}-${CI_COMMIT_TAG}.zip"
  - aws s3 cp "${CI_PROJECT_NAME}-${CI_COMMIT_TAG}.tar.gz" "s3://release.inivation.com/runtime/${CI_PROJECT_NAME}-${CI_COMMIT_TAG}.tar.gz"
  stage: deploy
  variables:
    GIT_STRATEGY: clone
release_fedora:
  before_script:
  - mkdir -p ~/.config/
  - cp "${COPR_API_KEY}" ~/.config/copr
  - *id012
  image: registry.gitlab.com/synsense-sys-int/inivation/infra/docker-files/fedora:latest
  interruptible: false
  needs:
  - release_archive_submodules
  rules:
  - if: $CI_COMMIT_TAG
  - if: $CI_PIPELINE_SOURCE == "web" && $RELEASE == "Fedora" && $RELEASE_VERSION
  script:
  - cd packaging/fedora-source-package/
  - ./packageFedora.sh --pkg-name "${CI_PROJECT_NAME}" --pkg-version "${VERSION_NAME}"
  - copr-cli build --nowait inivation/inivation "${CI_PROJECT_NAME}-${VERSION_NAME}-0.fc42.src.rpm"
  stage: deploy
release_gentoo_brew:
  before_script:
  - mkdir -p ~/.ssh/
  - cp "${GITCI_SSH_KEY}" ~/.ssh/id_ed25519
  - chmod 0600 ~/.ssh/id_ed25519
  - ssh-keyscan gitlab.com >> ~/.ssh/known_hosts
  - cp "${GITCI_SSH_CONF}" ~/.gitconfig
  - *id012
  image: registry.gitlab.com/synsense-sys-int/inivation/infra/docker-files/gentoo:latest
  interruptible: false
  needs:
  - release_archive_submodules
  rules:
  - if: $CI_COMMIT_TAG
  - if: $CI_PIPELINE_SOURCE == "web" && $RELEASE == "GentooBrew" && $RELEASE_VERSION
  script:
  - cd packaging/linux/
  - ./gentoo-release.sh --pkg-name "${CI_PROJECT_NAME}" --pkg-version "${VERSION_NAME}"
    --pkg-category "dev-util"
  - ./brew-release.sh --pkg-name "${CI_PROJECT_NAME}" --pkg-version "${VERSION_NAME}"
  stage: deploy
release_ubuntu:
  before_script:
  - gpg --pinentry-mode loopback --passphrase "${PPA_GPG_KEY_PASS}" --import "${PPA_GPG_KEY}"
  - echo -e "5\ny\n" | gpg --no-tty --command-fd 0 --edit-key "${PPA_GPG_KEY_ID}"
    trust quit
  - *id012
  image: registry.gitlab.com/synsense-sys-int/inivation/infra/docker-files/ubuntu:rolling
  interruptible: false
  needs:
  - release_archive_submodules
  rules:
  - if: $CI_COMMIT_TAG
  - if: $CI_PIPELINE_SOURCE == "web" && $RELEASE == "Ubuntu" && $RELEASE_VERSION
  script:
  - cd packaging/ubuntu-source-package/
  - ./packageUbuntu.sh --pkg-name "${CI_PROJECT_NAME}" --pkg-version "${VERSION_NAME}"
    --distro focal --gpg-key-id "${PPA_GPG_KEY_ID}" --gpg-key-pass "${PPA_GPG_KEY_PASS}"
    --upload
  - sleep 60
  - ./packageUbuntu.sh --pkg-name "${CI_PROJECT_NAME}" --pkg-version "${VERSION_NAME}"
    --distro jammy --gpg-key-id "${PPA_GPG_KEY_ID}" --gpg-key-pass "${PPA_GPG_KEY_PASS}"
    --upload
  - sleep 60
  - ./packageUbuntu.sh --pkg-name "${CI_PROJECT_NAME}" --pkg-version "${VERSION_NAME}"
    --distro noble --gpg-key-id "${PPA_GPG_KEY_ID}" --gpg-key-pass "${PPA_GPG_KEY_PASS}"
    --upload
  stage: deploy
