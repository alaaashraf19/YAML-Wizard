.change_build_dir: &id001
- rm -Rf build
- mkdir build
- cd build
.gentoo_musl_llvm_builder:
  artifacts: &id002
    expire_in: 1 week
    paths:
    - build/failed_tests/*
    - build/test-report.xml
    reports:
      junit: build/test-report.xml
    when: always
  before_script: &id007
  - source /etc/profile
  - export CCACHE_DIR="${CI_PROJECT_DIR}/.ccache"
  - export CCACHE_BASEDIR="${CI_PROJECT_DIR}"
  - export CCACHE_COMPILERCHECK="content"
  - packaging/linux/build_dv-processing.sh "master"
  cache: &id003
    key: ${CI_JOB_NAME}-${CI_COMMIT_REF_SLUG}
    paths:
    - .ccache
    policy: pull-push
  image: registry.gitlab.com/synsense-sys-int/inivation/infra/docker-files/gentoo_musl_llvm:latest
  rules: &id004
  - if: $CI_PIPELINE_SOURCE == "web" && $RELEASE
    when: never
  - if: $CI_MERGE_REQUEST_ID
  - if: $CI_COMMIT_BRANCH
  script: &id008
  - source /etc/profile
  - *id001
  - cmake -DCMAKE_INSTALL_PREFIX=/usr -DUSE_CLANG_LIBCPP=ON ..
  - make -j4 -s
  stage: build
.publish_artifacts:
  artifacts: *id002
.ubuntu_curr_builder:
  artifacts: *id002
  before_script: &id005
  - export CCACHE_DIR="${CI_PROJECT_DIR}/.ccache"
  - export CCACHE_BASEDIR="${CI_PROJECT_DIR}"
  - export CCACHE_COMPILERCHECK="content"
  - packaging/linux/build_dv-processing.sh "master"
  - pip3 install --break-system-packages -U git+https://gitlab.com/inivation/dv/dv-python.git
  cache: *id003
  image: registry.gitlab.com/synsense-sys-int/inivation/infra/docker-files/ubuntu:rolling
  rules: *id004
  script: &id006
  - *id001
  - cmake -DCMAKE_INSTALL_PREFIX=/usr ..
  - make -j4 -s
  - make tests TESTS=minimal
  stage: build
.ubuntu_curr_builder_arm32:
  artifacts: *id002
  before_script: *id005
  cache: *id003
  image: registry.gitlab.com/synsense-sys-int/inivation/infra/docker-files/ubuntu:rolling_arm32
  rules: *id004
  script: *id006
  stage: build
  tags: &id010
  - docker-arm
  - ubuntu
  - build
  - arm
.ubuntu_curr_builder_arm64:
  artifacts: *id002
  before_script: *id005
  cache: *id003
  image: registry.gitlab.com/synsense-sys-int/inivation/infra/docker-files/ubuntu:rolling_arm64
