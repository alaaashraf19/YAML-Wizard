build_macos_arm:
  artifacts: *id002
  before_script:
  - /opt/homebrew/bin/pip3 install --break-system-packages -U git+https://gitlab.com/inivation/dv/dv-python.git
  cache:
    key: ${CI_JOB_NAME}-${CI_COMMIT_REF_SLUG}
    paths:
    - .ccache
    policy: pull-push
  rules:
  - if: $CI_PIPELINE_SOURCE == "web" && $RELEASE
    when: never
  - if: $CI_MERGE_REQUEST_ID
  - if: $CI_COMMIT_BRANCH
  - if: $CI_COMMIT_TAG
  script:
  - *id001
  - /opt/homebrew/bin/cmake -DCMAKE_INSTALL_PREFIX=/opt/homebrew -DOPENSSL_ROOT_DIR=/opt/homebrew/opt/openssl
    -DPython3_ROOT_DIR=/opt/homebrew/opt/python@3/ -DDVR_ENABLE_TCMALLOC=OFF ..
  - make -j4 -s
  - make tests TESTS=noperf
  - if [[ "${CI_COMMIT_BRANCH}" != "master" ]] && [[ -z "${CI_COMMIT_TAG}" ]] ; then
    exit 0; fi
  - export PLATFORM="mac-arm"
  - ../packaging/macosx/package_deps.sh
  - *id009
  stage: build
  tags:
  - macos
  - build
  - arm
  variables:
    CCACHE_BASEDIR: ${CI_PROJECT_DIR}
    CCACHE_COMPILERCHECK: content
    CCACHE_DIR: ${CI_PROJECT_DIR}/.ccache
    CMAKE_BUILD_TYPE: Release
    CTEST_OUTPUT_ON_FAILURE: 1
    PATH: /opt/homebrew/bin:/usr/bin:/bin:/usr/sbin:/sbin:/Library/Apple/usr/bin
build_macos_intel:
  artifacts: *id002
  before_script:
  - arch -x86_64 /usr/local/bin/pip3 install --break-system-packages -U git+https://gitlab.com/inivation/dv/dv-python.git
  cache:
    key: ${CI_JOB_NAME}-${CI_COMMIT_REF_SLUG}
    paths:
    - .ccache
    policy: pull-push
  rules:
  - if: $CI_PIPELINE_SOURCE == "web" && $RELEASE
    when: never
  - if: $CI_COMMIT_BRANCH == "master"
  - if: $CI_COMMIT_TAG
  script:
  - *id001
  - arch -x86_64 /usr/local/bin/cmake -DCMAKE_INSTALL_PREFIX=/usr/local -DOPENSSL_ROOT_DIR=/usr/local/opt/openssl
    -DPython3_ROOT_DIR=/usr/local/opt/python@3/ -DDVR_ENABLE_TCMALLOC=OFF ..
  - make -j4 -s
  - make tests TESTS=noperf
  - if [[ "${CI_COMMIT_BRANCH}" != "master" ]] && [[ -z "${CI_COMMIT_TAG}" ]] ; then
    exit 0; fi
  - export PLATFORM="mac-intel"
  - ../packaging/macosx/package_deps.sh
  - *id009
  stage: build
  tags:
  - macos
  - build
  - x86_64
  variables:
    CCACHE_BASEDIR: ${CI_PROJECT_DIR}
    CCACHE_COMPILERCHECK: content
    CCACHE_DIR: ${CI_PROJECT_DIR}/.ccache
    CMAKE_BUILD_TYPE: Release
    CTEST_OUTPUT_ON_FAILURE: 1
    PATH: /usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin:/Library/Apple/usr/bin
