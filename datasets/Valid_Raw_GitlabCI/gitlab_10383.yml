  - build
  - arm
.upload_runtime: &id009
- export VERSION_NAME=$([[ -n "${CI_COMMIT_TAG}"  ]] && echo "${CI_COMMIT_TAG}" ||
  echo "${CI_COMMIT_SHORT_SHA}")
- mv "${CI_PROJECT_NAME}-packaged-${PLATFORM}" "${CI_PROJECT_NAME}-${PLATFORM}-${VERSION_NAME}"
- echo "${CI_COMMIT_SHA}" > "${CI_PROJECT_NAME}-${PLATFORM}-${VERSION_NAME}/git_commit"
- zip -r "${CI_PROJECT_NAME}-${PLATFORM}-${VERSION_NAME}.zip" "${CI_PROJECT_NAME}-${PLATFORM}-${VERSION_NAME}"
- aws s3 cp "${CI_PROJECT_NAME}-${PLATFORM}-${VERSION_NAME}.zip" "s3://release.inivation.com/runtime/${CI_PROJECT_NAME}-${PLATFORM}-${VERSION_NAME}.zip"
.version_name: &id012
- export VERSION_NAME=$([[ -z "${RELEASE_VERSION}"  ]] && echo "${CI_COMMIT_TAG}"
  || echo "${RELEASE_VERSION}")
basic_syntax_check_clang:
  artifacts: *id002
  before_script: *id005
  cache: *id003
  image: registry.gitlab.com/synsense-sys-int/inivation/infra/docker-files/ubuntu:rolling
  rules: *id004
  script:
  - cmake -DCMAKE_INSTALL_PREFIX=/usr .
  - find include/ -type f -iname '*.hpp' | sort -u > headers.txt
  - find include/ -type f -iname '*.h' | sort -u >> headers.txt
  - for h in $(cat headers.txt) ; do echo "\nChecking === ${h}\n\n" ; ${CXX} -std=c++20
    -O2 -pipe -fsyntax-only "${h}" $(pkg-config --cflags opencv4) $(pkg-config --cflags
    eigen3) -I include/ ; rm -f "${h}.gch" ; done
  stage: build
  variables:
    CC: clang-18
    CXX: clang++-18
