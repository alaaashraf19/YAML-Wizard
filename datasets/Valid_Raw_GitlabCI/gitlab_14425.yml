build:
  artifacts:
    expire_in: 1 day
    paths:
    - node
    - umd
  script:
  - npm install
  - npm run build
  stage: build
image: node:latest
pages:
  artifacts:
    paths:
    - public
  dependencies:
  - build
  only:
  - tags
  script:
  - npm install
  - npm run doc
  - mkdir public
  - mv doc/* public
  stage: deploy
publish:
  dependencies:
  - build
  only:
  - tags
  script:
  - npm install
  - echo '//registry.npmjs.org/:_authToken=${NPM_TOKEN}'>.npmrc
  - npm publish
  stage: deploy
test:
  dependencies:
  - build
  script:
  - npm install
  - npm run test:nodejs
  stage: test
