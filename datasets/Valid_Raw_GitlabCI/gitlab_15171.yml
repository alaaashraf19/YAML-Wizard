benchmark:
  script:
  - tox -e perf
codecov:
  dependencies:
  - coverage
  script:
  - codecov
  stage: codecov
  when: on_success
coverage:
  artifacts:
    paths:
    - coverage.xml
  script:
  - tox -e py27-cov,py35-cov,py36-cov,py37-cov,py38-cov
diffcov:
  script:
  - tox -e py27-diffcov,py35-diffcov,py36-diffcov,py37-diffcov,py38-diffcov
docs:
  script:
  - tox -e docs
image: quay.io/python-devs/ci-image
qa:
  script:
  - tox -e qa
release:
  only:
  - /^v\d+\.\d+(\.\d+)?([abc]\d*)?$/
  script:
  - tox -e release
  stage: deploy
stages:
- test
- qa
- docs
- codecov
- deploy
tests:
  script:
  - tox -e py27,py35,py36,py37,py38
