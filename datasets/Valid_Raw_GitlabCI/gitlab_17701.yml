build:
  before_script:
  - mkdir -p $CARGO_HOME && echo "using $CARGO_HOME to cache cargo deps"
  - cargo install cargo-tarpaulin
  cache:
    key: build_cache
    paths:
    - target
    - cargohome
  image: rust:latest
  only:
    changes:
    - Cargo.toml
    - .gitlab-ci.yml
    - src/**/*
    - tests/**/*
    - benches/**/*
    - examples/**/*
  script:
  - rustc --version && cargo --version
  - cargo tarpaulin --all-features --out lcov
  - bash <(curl -s https://codecov.io/bash) -Z
  stage: build
  variables:
    CARGO_HOME: cargohome
compatibility_1_85:
  before_script:
  - mkdir -p $CARGO_HOME && echo "using $CARGO_HOME to cache cargo deps"
  cache:
    key: build_70_cache
    paths:
    - target
    - cargohome
  image: rust:1.85.0
  only:
    changes:
    - .gitlab-ci.yml
    - Cargo.toml
    - src/**/*
    - tests/**/*
    - benches/**/*
    - examples/**/*
  script:
  - rustc --version && cargo --version
  - cargo test --all-features
  stage: build
  variables:
    CARGO_HOME: cargohome
nightly:
  allow_failure: true
  before_script:
  - mkdir -p $CARGO_HOME && echo "using $CARGO_HOME to cache cargo deps"
  cache:
    key: build_nightly_cache
    paths:
    - target
    - cargohome
  image: rustlang/rust:nightly
  only:
    changes:
    - .gitlab-ci.yml
    - Cargo.toml
    - src/**/*
    - tests/**/*
    - benches/**/*
    - examples/**/*
  script:
  - env RUST_BACKTRACE=1 cargo test --all-features
  stage: build
  variables:
    CARGO_HOME: cargohome
stages:
- build
