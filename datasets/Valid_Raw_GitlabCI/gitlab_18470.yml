.alpha_constraint: /^(release\/)[0-9]+\.[0-9]+\.[0-9]+$/
.build_template:
  cache: &id001
    paths:
    - packages/
  stage: build
.pack_template:
  artifacts: &id002
    expire_in: 1 week
  cache: *id001
  stage: pack
.publish_template:
  artifacts: *id002
  cache: *id001
  image: mono:onbuild
  script: &id003
  - 'echo pushing the following packages to NuGet:'
  - find "./pack" -regextype posix-extended -regex ".*[0-9]\.nupkg"
  - 'for fn in $(find "./pack" -regextype posix-extended -regex ".*[0-9]\.nupkg");
    do nuget push "$fn" ${nugetPushTags}; done '
  stage: publish
build:
  cache: *id001
  script:
  - dotnet restore --verbosity quiet
  - dotnet build "src/${fullPackageName}/${fullPackageName}.csproj" -c debug
  - dotnet build "src/${fullPackageName}.Example/${fullPackageName}.Example.csproj"
    -c debug
  stage: build
image: microsoft/aspnetcore-build
pack:alpha:
  artifacts:
    paths:
    - ./pack/${fullPackageName}.$(echo ${CI_BUILD_REF_NAME} | cut -c9-)-alpha-${CI_BUILD_ID}.nupkg
    - ./pack/${fullPackageName}.$(echo ${CI_BUILD_REF_NAME} | cut -c9-)-alpha-${CI_BUILD_ID}.symbols.nupkg
  cache: *id001
  dependencies:
  - build
  environment:
    name: alpha
  only:
  - /^(release\/)[0-9]+\.[0-9]+\.[0-9]+$/
  script:
  - echo "$(echo ${CI_BUILD_REF_NAME} | cut -c9-)-alpha-${CI_BUILD_ID}"
  - dotnet restore --verbosity quiet
  - dotnet pack "src/${fullPackageName}/${fullPackageName}.csproj" -c debug -o "${CI_PROJECT_DIR}/pack/"
    --include-source --include-symbols --verbosity detailed /p:PackageVersion=$(echo
    ${CI_BUILD_REF_NAME} | cut -c9-)-alpha-${CI_BUILD_ID}
  stage: pack
pack:final:
  artifacts:
    paths:
    - ./pack/${fullPackageName}.${CI_BUILD_TAG}.nupkg
    - ./pack/${fullPackageName}.${CI_BUILD_TAG}.symbols.nupkg
  cache: *id001
  dependencies:
  - build
  environment:
    name: final
  only:
  - tags
  script:
  - echo "${CI_BUILD_TAG}"
  - dotnet restore
  - dotnet pack "src/${fullPackageName}/${fullPackageName}.csproj" -c debug -o "./pack/"
  - dotnet restore --verbosity quiet
  - dotnet pack "src/${fullPackageName}/${fullPackageName}.csproj" -c debug -o "${CI_PROJECT_DIR}/pack/"
    --include-source --include-symbols --verbosity detailed /p:PackageVersion=${CI_BUILD_TAG}
  stage: pack
publish:alpha:
  artifacts: *id002
  cache: *id001
  dependencies:
  - pack:alpha
  environment:
    name: alpha
  image: mono:onbuild
  only:
  - /^(release\/)[0-9]+\.[0-9]+\.[0-9]+$/
  script: *id003
  stage: publish
publish:final:
  artifacts: *id002
  cache: *id001
  dependencies:
  - pack:final
  environment:
    name: final
    url: https://www.nuget.org/packages/Valtech.Amsterdam.Labs.AspnetCoreHoneyPot/
  image: mono:onbuild
  only:
  - tags
  script: *id003
  stage: publish
stages:
- build
- pack
- publish
variables:
  CI_DEBUG_TRACE: 'false'
  companyName: Valtech.Amsterdam
  fullPackageName: ${companyName}.${vendorName}.${CI_PROJECT_NAME}
  nugetPushTags: ${NugetAPIKey} -Source ${NugetSource} -NonInteractive -ConfigFile
    Nuget.config
  vendorName: Labs
