.dev:
  script:
  - docker build --tag ${IMAGE_NAME} --build-arg R_VERSION=${CI_BUILD_NAME} .
  - docker run ${IMAGE_NAME} R --version
  - docker push ${IMAGE_NAME}
  stage: build-base
.pkg:
  dependencies:
  - release
  script:
  - docker build --tag ${IMAGE_NAME} --build-arg APK_PKG="${APK_PKG}" --build-arg
    R_CRAN_PKG="${R_CRAN_PKG}" --build-arg R_GITHUB_PKG="${R_GITHUB_PKG}" --file Dockerfile-rpkg
    .
  - docker run ${IMAGE_NAME} Rscript -e "packageVersion('${CI_BUILD_NAME}')"
  - docker push ${IMAGE_NAME}
  stage: build-others
.rel:
  script:
  - apk add jq curl
  - R_VERSION=$(curl -s "https://rversions.r-pkg.org/r-${CI_BUILD_NAME}" | jq -r '.[].version')
  - docker pull ${IMAGE_NAME} || true
  - docker build --cache-from ${IMAGE_NAME} --tag ${IMAGE_NAME} --build-arg R_VERSION=${R_VERSION}
    .
  - docker run ${IMAGE_NAME} R --version
  - docker tag ${IMAGE_NAME} ${IMAGE_NAME}:${R_VERSION}
  - docker tag ${IMAGE_NAME} ${IMAGE_NAME}:${R_VERSION:0:1}
  - docker push ${IMAGE_NAME}
  - docker push ${IMAGE_NAME}:${R_VERSION}
  - docker push ${IMAGE_NAME}:${R_VERSION:0:1}
  stage: build-base
before_script:
- docker login -u gitlab-ci-token -p ${CI_BUILD_TOKEN} ${CI_REGISTRY}
devel:
  extends: .dev
image: docker:20.10
oldrel:
  extends: .rel
patched:
  extends: .dev
release:
  extends: .rel
services:
- docker:20.10-dind
stages:
- build-base
- build-others
tidyverse:
  extends: .pkg
  variables:
    APK_PKG: libxml2-dev libressl-dev
    R_CRAN_PKG: tidyverse data.table dtplyr
variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: /certs
  IMAGE_NAME: ${CI_REGISTRY_IMAGE}/${CI_BUILD_NAME}
