.only-default:
  only:
  - master
  - merge_requests
  - tags
  - web
code-diffcov:
  needs: []
  only:
  - merge_requests
  script:
  - git config --global --add safe.directory "/builds/${CI_PROJECT_NAMESPACE}/mailman"
  - git config safe.directory
  - tox -e py311-diffcov
  stage: code
code-qa:
  extends: .only-default
  needs: []
  script:
  - tox -e qa
  stage: code
docs:
  extends: .only-default
  needs: []
  script:
  - tox -e docs
  stage: docs
image: ghcr.io/maxking/mailman-ci-runner:latest
stages:
- code
- docs
- test
test-mysql:
  extends: .only-default
  needs: []
  parallel:
    matrix:
    - PYTHON_VER:
      - '39'
      - '310'
      - '311'
      - '312'
      - '313'
  script:
  - tox -e "py$PYTHON_VER-nocov-mysql"
  services:
  - mysql:5.6
  stage: test
  variables:
    MAILMAN_EXTRA_TESTING_CFG: /home/runner/configs/mysql.cfg
    MYSQL_DATABASE: test_mailman
    MYSQL_ROOT_PASSWORD: runner
    MYSQL_USER: runner
    MYSQL_USER_PASSWORD: runner
test-postgres:
  extends: .only-default
  needs: []
  parallel:
    matrix:
    - PYTHON_VER:
      - '39'
      - '310'
      - '311'
      - '312'
      - '313'
  script:
  - tox -e "py$PYTHON_VER-nocov-pg"
  services:
  - postgres:latest
  stage: test
  variables:
    MAILMAN_EXTRA_TESTING_CFG: /home/runner/configs/postgres.cfg
    POSTGRES_DB: mailman_test
    POSTGRES_PASSWORD: runner
    POSTGRES_USER: runner
test-sqlite:
  extends: .only-default
  needs: []
  parallel:
    matrix:
    - PYTHON_VER:
      - '39'
      - '310'
      - '311'
      - '312'
      - '313'
  script:
  - tox -e "py$PYTHON_VER-nocov"
  stage: test
variables:
  GIT_CEILING_DIRECTORIES: /builds
  HOME: /builds
  LC_ALL: C.UTF-8
