before_script:
- mkdir output
build_fedora:
  artifacts:
    expire_in: 14d
    paths:
    - ./output/*.snap
  image: fedora:latest
  script:
  - dnf --assumeyes install python3 dnf distribution-gpg-keys squashfs-tools
  - source /etc/os-release; ./mkrpmdistcoresnap -d $ID -r $VERSION_ID -n -o ./output
  stage: build
  tags:
  - shared
build_mageia:
  artifacts:
    expire_in: 14d
    paths:
    - ./output/*.snap
  image: mageia:latest
  script:
  - dnf --assumeyes install python3 dnf distribution-gpg-keys squashfs-tools
  - source /etc/os-release; ./mkrpmdistcoresnap -d $ID -r $VERSION_ID -n -o ./output
  stage: build
  tags:
  - shared
build_opensuse:
  artifacts:
    expire_in: 14d
    paths:
    - ./output/*.snap
  image: opensuse/leap:latest
  script:
  - zypper refresh
  - zypper --non-interactive install python3 dnf distribution-gpg-keys squashfs
  - source /etc/os-release; ./mkrpmdistcoresnap -d $ID -r $VERSION_ID -n -o ./output
  stage: build
  tags:
  - shared
cache:
  paths:
  - /var/cache/dnf
image: fedora:latest
