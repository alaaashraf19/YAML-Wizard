.common_deps_script: 'apk add --no-cache git gcc musl-dev

  $PYTHON -m pip install --constraint test-requirements.txt moban

  $PYTHON -m pip install setuptools==21 pip==9.0.1

  pip install -r test-requirements.txt

  '
.common_script:
  before_script:
  - 'apk add --no-cache git gcc musl-dev

    $PYTHON -m pip install --constraint test-requirements.txt moban

    $PYTHON -m pip install setuptools==21 pip==9.0.1

    pip install -r test-requirements.txt

    '
  retry: 2
  script:
  - $PYTHON -m pytest --cov-fail-under=100
  - $PYTHON -m codecov
cache:
  paths:
  - $CI_PROJECT_PATH/.cache/pip
include: https://gitlab.com/coala/mobans/raw/master/templates/ci/gitlab-ci-base.yml
lint:
  after_script:
  - coala-json --junit -f reports/output.json -o reports/junit_report.xml
  artifacts:
    paths:
    - ./reports/
    reports:
      junit: ./reports/junit_report.xml
    when: always
  before_script:
  - $PYTHON -m pip install setuptools==21 pip==9.0.1
  - apt-get update -qq
  - apt-get -y install shellcheck
  - pip install 'git+https://github.com/coala/coala#egg=coala'
  - pip install 'git+https://github.com/coala/coala-bears#egg=coala-bears'
  - pip install coala-json
  image: python:3.6
  script:
  - mkdir reports
  - coala --json -o reports/output.json
moban:
  before_script:
  - pip install --constraint test-requirements.txt moban
  image: python:3.6
  script:
  - moban
  - git diff --exit-code
tests:2.7:
  coverage: '/Total coverage: \d+\.\d+%/'
  extends: .common_script
  image: python:2.7-alpine
  variables:
    PYTHON: python2
tests:3.4:
  coverage: '/Total coverage: \d+\.\d+%/'
  extends: .common_script
  image: python:3.4-alpine
tests:3.5:
  coverage: '/Total coverage: \d+\.\d+%/'
  extends: .common_script
  image: python:3.5-alpine
tests:3.6:
  coverage: '/Total coverage: \d+\.\d+%/'
  extends: .common_script
  image: python:3.6-alpine
tests:3.7:
  coverage: '/Total coverage: \d+\.\d+%/'
  extends: .common_script
  image: python:3.7-alpine
variables:
  DEBIAN_FRONTEND: noninteractive
  XDG_CACHE_HOME: $CI_PROJECT_DIR/.cache/
