community-contribution-report:
  extends: .run
  rules:
  - if: $COMMUNITY_CONTRIBUTION_REPORT
  stage: report
  variables:
    TRIAGE_POLICY_FILE: policies/stages/report/community-contribution-report.yml
customer-bugs-without-severity:
  extends: .run
  only:
    variables:
    - $CUSTOMER_BUGS_WITHOUT_SEVERITY
  stage: report
  variables:
    TRIAGE_POLICY_FILE: policies/stages/report/customer-bugs-without-severity.yml
missing-categories:
  extends: .run
  rules:
  - if: $TRIAGE_MISSING_CATEGORIES
  stage: report
  variables:
    TRIAGE_POLICY_FILE: policies/stages/report/missing-categories.yml
runner-saas-team-summary:
  extends: .run
  rules:
  - if: $TRIAGE_RUNNER_SAAS_GROUP_SUMMARY
  stage: report
  variables:
    TRIAGE_POLICY_FILE: policies/teams/runner-saas-group-summary.yml
runner-team-summary:
  extends: .run
  rules:
  - if: $TRIAGE_RUNNER_GROUP_SUMMARY
  stage: report
  variables:
    TRIAGE_POLICY_FILE: policies/teams/runner-group-summary.yml
