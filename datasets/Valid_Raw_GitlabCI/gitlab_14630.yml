build:
  artifacts:
    paths:
    - calculator
    - calculator.gcno
  script:
  - gcc -fprofile-arcs -ftest-coverage -fPIC calculator.c -o calculator
  stage: build
functional-test:
  before_script:
  - apt update && apt -y install gcovr
  coverage: /^TOTAL.*\s+(\d+\%)$/
  script:
  - test $(./calculator 1 + 1) = 2
  - test $(./calculator 25 \* 5) = 125
  - gcovr -r .
  stage: test
image: gcc
