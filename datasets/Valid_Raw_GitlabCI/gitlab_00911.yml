cache:
  paths:
  - node_modules
grunt_build:
  artifacts:
    paths:
    - ./${CI_PROJECT_NAME}.zip
    - ./doc
  coverage: /Lines\s*:\s*(\d+\.\d+)%/
  only:
  - master
  - develop
  script:
  - useradd -m -p 123 builder
  - apt-get update
  - apt-get -yq install chromium git zip gzip tar
  - npm install -g bower grunt-cli
  - npm install
  - bower install --allow-root --no-interactive
  - chmod 777 -fR .
  - su builder -c "grunt"
  - find . -name lcov.info | xargs -d '\n' cat | node_modules/.bin/codacy-coverage
    -t $CODACY_PROJECT_TOKEN
  stage: build
image: node:8
marketplace_deploy:
  only:
  - master
  script:
  - useradd -m -p 123 builder
  - npm install -g bower grunt-cli
  - npm install
  - bower install --allow-root --no-interactive
  - chmod 777 -fR .
  - su builder -c "grunt build"
  - curl -F "file=@./${CI_PROJECT_NAME}.zip" http://marketplace.webpich.com/api/v2/marketplace/spas/token-$MARKETPLACE_TOKEN
  stage: deploy
stages:
- build
- deploy
