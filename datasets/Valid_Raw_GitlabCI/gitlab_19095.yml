chefspec:
  script:
  - chef exec rspec spec
  stage: test
cookstyle:
  script:
  - chef exec cookstyle .
  stage: lint
foodcritic:
  script:
  - chef exec foodcritic .
  stage: lint
image: chef/chefdk
services:
- docker:dind
stages:
- build
- lint
- test
- functional
- deploy
variables:
  DOCKER_HOST: tcp://docker:2375
  KITCHEN_LOCAL_YAML: .kitchen.dokken.yml
