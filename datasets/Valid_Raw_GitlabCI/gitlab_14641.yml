cache:
  paths:
  - node_modules/
develop:
  only:
  - develop
  script:
  - apt-get update -qy
  - apt-get install -y rubygems
  - gem install dpl
  - dpl --provider=heroku --app=auto-personalia-development --api-key=$HEROKU_API_KEY
  type: deploy
image: node:latest
pages:
  artifacts:
    paths:
    - public/
  dependencies:
  - test-with-artifact
  only:
  - master
  script:
  - mv coverage/lcov-report/ public/
  type: deploy
staging:
  only:
  - master
  script:
  - apt-get update -qy
  - apt-get install -y rubygems
  - gem install dpl
  - dpl --provider=heroku --app=auto-personalia-staging --api-key=$HEROKU_API_KEY
  type: deploy
test:
  script:
  - npm install
  - npm run-script report
test-with-artifact:
  artifacts:
    paths:
    - coverage/
  only:
  - master
  script:
  - npm install
  - npm run-script test-coverage
variables:
  DATABASE_URL: mysql://root@localhost:3306/auto-personalia
  HEROKU_API_KEY: f88b3a4e-e1b4-461f-a855-2d0e6fb8ebe3
  MYSQL_USERNAME: root
