before_script:
- chmod +x ./build.ps1
- chmod +x ./psake.ps1
build_module:
  artifacts:
    name: documentarian
    paths:
    - documentarian
  script:
  - pwsh
  - ./build.ps1 -TaskList BuildModule
  stage: build
image: michaeltlombardi/documentarian
pages:
  artifacts:
    paths:
    - public
  only:
  - master
  script:
  - ./build.ps1 -TaskList GenerateSite
  stage: deploy
pdf:
  artifacts:
    paths:
    - documentarian.pdf
  only:
  - master
  script:
  - pwsh
  - ./build.ps1 -TaskList GeneratePdf
  stage: deploy
publish_module:
  only:
  - tags@documentarian/documentarian
  - /^v\d+\.\d+\.\d+/
  script:
  - pwsh
  - ./build.ps1 -TaskList PublishModule -ApiKey $ENV:gallerykey
  stage: deploy
stages:
- build
- test
- deploy
test_documentation:
  artifacts:
    paths:
    - documentarian.pdf
    - public
  except:
  - master
  script:
  - pwsh
  - ./build.ps1 -TaskList GenerateBoth
  stage: test
