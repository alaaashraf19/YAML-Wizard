before_script:
- apt-get update -yqq
- apt-get install -yqq git sqlite3 libcurl4-gnutls-dev libicu-dev libmcrypt-dev libvpx-dev
  libjpeg-dev libpng-dev libxpm-dev zlib1g-dev libfreetype6-dev libxml2-dev libexpat1-dev
  libbz2-dev libgmp3-dev libldap2-dev unixodbc-dev libpq-dev libsqlite3-dev libaspell-dev
  libsnmp-dev libpcre3-dev libtidy-dev
- docker-php-ext-install mbstring pdo_mysql curl json intl gd xml zip bz2 opcache
- curl -sS https://getcomposer.org/installer | php
- php composer.phar install
- cp .env.testing.ci .env
- php artisan key:generate
- php artisan config:cache
cache:
  paths:
  - vendor/
image: php:latest
lint:
  script: ./vendor/bin/phpcs --error-severity=1 --warning-severity=8 --extensions=php
  stage: syntax
stages:
- testing
- syntax
test:
  script:
  - php vendor/bin/phpunit --coverage-text --colors=never
  stage: testing
