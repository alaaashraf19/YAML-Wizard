.base_build:
  artifacts:
    name: cordite-build-$CI_PIPELINE_ID
    paths:
    - node/*
    - cordapps/build/gradle.log
  except:
  - 658-refactor-cordite-docker-implementation-to-use-official-corda-image
  - tags
  extends: .docker
  image: dazraf/build-tools:latest
  stage: build
  tags:
  - kubernetes
.base_deploy:
  dependencies:
  - build:jar
  image:
    name: nimmaj/cordite-gcloud-alpine:latest
  script:
  - echo "${GKE_SERVICE_ACCOUNT_KEY}" > key.json
  - gcloud auth activate-service-account --key-file=key.json
  - gcloud config set project cicd-lab577
  - gcloud config set container/cluster naas
  - gcloud config set compute/zone europe-west1-b
  - gcloud container clusters get-credentials naas --internal-ip --region europe-west1
    --project cicd-lab577
  - ./etc/deploy/upgradeGkeEnv.sh ${CI_PIPELINE_ID} ${GCLOUD_ENV}
  stage: deploy
  tags:
  - kubernetes
.docker:
  before_script:
  - docker login -u gitlab-ci-token -p $CI_JOB_TOKEN $CI_REGISTRY
  - docker info
  services:
  - docker:18.09-dind
  variables:
    DOCKER_DRIVER: overlay2
    DOCKER_HOST: tcp://docker:2375/
build:jar:
  extends: .base_build
  only:
    variables:
    - $CI_COMMIT_REF_PROTECTED == "false"
  script:
  - mkdir -p cordapps/build
  - (cd cordapps && ./gradlew clean checkLicense build -x test --parallel --info -PpipelineId=${CI_PIPELINE_ID})
  - (cd cordapps && ./gradlew -x :checkLicense deployNodes buildNode coveralls -PpipelineId=${CI_PIPELINE_ID}
    -PCI_COMMIT_REF_NAME=${CI_COMMIT_REF_NAME} -PCI_COMMIT_SHA=${CI_COMMIT_SHA} -PCI_PIPELINE_ID=${CI_PIPELINE_ID})
  - (cd node && docker build -t ${CI_REGISTRY_IMAGE}:${CI_PIPELINE_ID} .)
  - docker push ${CI_REGISTRY_IMAGE}:${CI_PIPELINE_ID}
build:node-client:
  allow_failure: true
  except:
  - master
  - tags
  - 678-upgrade-to-corda-4-x
  - /v[0-9]+\.[0-9]+\.[0-9]+/
  image: node:latest
  script:
  - date
  - cd clients/cli
  - npm install
  - date
  stage: build
  tags:
  - kubernetes
build:pages:
  allow_failure: true
  except:
  - master
  - tags
  - 678-upgrade-to-corda-4-x
  - /v[0-9]+\.[0-9]+\.[0-9]+/
  image: cordite/rtd:latest
  script:
  - cd docs
  - make clean
  - make html
  stage: build
  tags:
  - kubernetes
build:sign:jar:
  extends: .base_build
  only:
    variables:
    - $CI_COMMIT_REF_PROTECTED == "true"
  script:
  - echo "${GKE_SERVICE_ACCOUNT_KEY}" > key.json
  - gcloud auth activate-service-account --key-file=key.json
  - gcloud config set project cicd-lab577
  - gcloud beta secrets versions access 1  --secret="${SIGNING_STORE_NAME}" | base64
    -d >> /tmp/keystore
  - SIGNING_STORE_PASS=$(gcloud beta secrets versions access 1  --secret="cordite-keystore-password"
    | base64 -d)
  - mkdir -p cordapps/build
  - (cd cordapps && ./gradlew -Dcordapp.signing.enabled=true -Dsigning.alias=${SIGNING_ALIAS}
    -Dsigning.keystore="/tmp/keystore"  -Dsigning.storetype=${SIGNING_STORE_TYPE}
    -Dsigning.storepass=${SIGNING_STORE_PASS} -Dsigning.keypass=${SIGNING_STORE_PASS}
    -Dcustom.sigalg=${SIGNING_ALG} clean checkLicense build -x test --parallel --info
    -PpipelineId=${CI_PIPELINE_ID})
  - rm /tmp/keystore
  - (cd cordapps && ./gradlew -x :checkLicense deployNodes buildNode coveralls -PpipelineId=${CI_PIPELINE_ID}
    -PCI_COMMIT_REF_NAME=${CI_COMMIT_REF_NAME} -PCI_COMMIT_SHA=${CI_COMMIT_SHA} -PCI_PIPELINE_ID=${CI_PIPELINE_ID})
  - (cd node && docker build -t ${CI_REGISTRY_IMAGE}:${CI_PIPELINE_ID} .)
  - docker push ${CI_REGISTRY_IMAGE}:${CI_PIPELINE_ID}
deploy:edge:
  except:
  - tags
  extends: .base_deploy
  only:
  - master
  variables:
    GCLOUD_ENV: edge
deploy:test:
  except:
  - tags
  extends: .base_deploy
  only:
  - /v[0-9]+\.[0-9]+\.[0-9]+/
  variables:
    GCLOUD_ENV: test
edge-release-docker:
  dependencies: []
  extends: .docker
  image: docker:latest
  only:
  - master
  script:
  - date
  - docker login -u gitlab-ci-token -p ${CI_JOB_TOKEN} ${CI_REGISTRY}
  - docker pull ${CI_REGISTRY_IMAGE}:${CI_PIPELINE_ID}
  - docker tag ${CI_REGISTRY_IMAGE}:${CI_PIPELINE_ID} ${CI_REGISTRY_IMAGE}:edge ;
    docker push ${CI_REGISTRY_IMAGE}:edge
  - docker tag ${CI_REGISTRY_IMAGE}:${CI_PIPELINE_ID} ${CI_REGISTRY_IMAGE}:${CI_COMMIT_TAG:-edge}
    ; docker push ${CI_REGISTRY_IMAGE}:${CI_COMMIT_TAG:-edge}
  - docker login -u "${DOCKER_HUB_USER}" -p "${DOCKER_HUB_PASSWORD}"
  - docker tag ${CI_REGISTRY_IMAGE}:${CI_PIPELINE_ID} cordite/cordite:edge ; docker
    push cordite/cordite:edge
  - SLACK_MESSAGE="New cordite docker image with tag edge released on hub.docker.com/r/cordite/cordite/
    by gitlab.com/cordite/cordite/pipelines/${CI_PIPELINE_ID} from gitlab.com/cordite/cordite/commit/${CI_COMMIT_SHA}
    ; Tested on https://nms-edge.cordite.foundation"
  - SLACK_PAYLOAD={\"text\":\"${SLACK_MESSAGE}\"}
  - wget -O- --post-data="${SLACK_PAYLOAD}" --header=Content-Type:application/json
    "https://hooks.slack.com/services/${SLACK_TOKEN}"
  - date
  stage: release-docker
int-test:edge:
  dependencies: []
  extends: .base_build
  only:
  - master
  retry: 2
  script:
  - echo -n "starting integration test on edge at...$(date)"
  - cd test/regression && ./run-remote.sh edge
  - date
  stage: int-test
int-test:test:
  except:
  - tags
  extends: .base_build
  only:
  - /v[0-9]+\.[0-9]+\.[0-9]+/
  retry: 2
  script:
  - echo -n "starting integration test on edge at...$(date)"
  - cd test/regression && ./run-remote.sh test
  - date
  stage: int-test
release:gitlab-docker:
  dependencies: []
  except:
  - tags
  extends: .docker
  image: docker:latest
  only:
  - master
  - /v[0-9]+\.[0-9]+\.[0-9]+/
  - 722-upgrade-to-corda-4-5
  script:
  - date
  - docker login -u gitlab-ci-token -p ${CI_JOB_TOKEN} ${CI_REGISTRY}
  - docker pull ${CI_REGISTRY_IMAGE}:${CI_PIPELINE_ID}
  - docker tag ${CI_REGISTRY_IMAGE}:${CI_PIPELINE_ID} ${CI_REGISTRY_IMAGE}:${CI_PIPELINE_ID}
    ; docker push ${CI_REGISTRY_IMAGE}:${CI_PIPELINE_ID}
  - date
  stage: release
release:maven:
  allow_failure: true
  dependencies: []
  except:
  - tags
  extends: .docker
  image: dazraf/build-tools:latest
  only:
  - master
  - /v[0-9]+\.[0-9]+\.[0-9]+/
  script:
  - echo "${GKE_SERVICE_ACCOUNT_KEY}" > key.json
  - gcloud auth activate-service-account --key-file=key.json
  - gcloud config set project cicd-lab577
  - gcloud beta secrets versions access 1  --secret="${SIGNING_STORE_NAME}" | base64
    -d >> /tmp/keystore.pkcs12
  - SIGNING_STORE_PASS=$(gcloud beta secrets versions access 1  --secret="cordite-keystore-password"
    | base64 -d)
  - rm -rf ~/.gnupg
  - gpg --version
  - gpg --import --batch --passphrase "$GPG_PASSPHRASE" <<< "$GPG_KEY"
  - gpg --import-ownertrust <<< "$GPG_OWNER_TRUST"
  - mkdir -p cordapps/build
  - (cd cordapps && ./gradlew --version && ./gradlew -Dcordapp.signing.enabled=true
    -Dsigning.alias=${SIGNING_ALIAS} -Dsigning.keystore="/tmp/keystore.pkcs12" -Dsigning.storetype=${SIGNING_STORE_TYPE}
    -Dsigning.storepass=${SIGNING_STORE_PASS} -Dsigning.keypass=${SIGNING_STORE_PASS}
    -Dcustom.sigalg=${SIGNING_ALG} clean checkLicense build publish -x test --parallel
    --info -PpipelineId=${CI_PIPELINE_ID})
  - rm /tmp/keystore.pkcs12
  stage: release
release:node-client:
  allow_failure: true
  dependencies: []
  except:
  - tags
  image: node:latest
  only:
  - /v[0-9]+\.[0-9]+\.[0-9]+/
  script:
  - date
  - npm set $NPM_CREDENTIALS
  - cd clients/cli
  - npm install
  - date
  - npm publish
  stage: release
  tags:
  - kubernetes
release:pages:
  allow_failure: true
  artifacts:
    paths:
    - public
  dependencies: []
  except:
  - tags
  image: cordite/rtd:latest
  only:
  - master
  - /v[0-9]+\.[0-9]+\.[0-9]+/
  script:
  - date
  - cd docs
  - make clean
  - make html
  - mv _build/html/ ../public/
  - echo "documentation built here on master build https://cordite.gitlab.io/cordite/"
  - echo "RTD will build automatically here on tagged CIs http://cordite.readthedocs.io/en/latest/"
  - date
  stage: release
stages:
- build
- test
- release
- deploy
- int-test
- release-docker
test-release-docker:
  dependencies: []
  except:
  - tags
  extends: .docker
  image: docker:latest
  only:
  - /v[0-9]+\.[0-9]+\.[0-9]+/
  - 599-bosh-over-to-push-deployments-to-eke
  script:
  - date
  - docker login -u gitlab-ci-token -p ${CI_JOB_TOKEN} ${CI_REGISTRY}
  - docker pull ${CI_REGISTRY_IMAGE}:${CI_PIPELINE_ID}
  - docker tag ${CI_REGISTRY_IMAGE}:${CI_PIPELINE_ID} ${CI_REGISTRY_IMAGE}:test ;
    docker push ${CI_REGISTRY_IMAGE}:test
  - docker login -u "${DOCKER_HUB_USER}" -p "${DOCKER_HUB_PASSWORD}"
  - docker tag ${CI_REGISTRY_IMAGE}:${CI_PIPELINE_ID} cordite/cordite:test ; docker
    push cordite/cordite:test
  - docker tag ${CI_REGISTRY_IMAGE}:${CI_PIPELINE_ID} cordite/cordite:latest ; docker
    push cordite/cordite:latest
  - docker tag ${CI_REGISTRY_IMAGE}:${CI_PIPELINE_ID} cordite/cordite:${CI_COMMIT_TAG:-test}
    ; docker push cordite/cordite:${CI_COMMIT_TAG:-test}
  - SLACK_MESSAGE="New cordite docker image with tag ${CI_COMMIT_TAG:-test} released
    on hub.docker.com/r/cordite/cordite/ by gitlab.com/cordite/cordite/pipelines/${CI_PIPELINE_ID}
    from gitlab.com/cordite/cordite/commit/${CI_COMMIT_SHA} ; Tested on https://nms-test.cordite.foundation
    ; Release notes published on gitlab.com/cordite/cordite/tags ; We value every
    community member's positive contribution of time and effort. Community building,
    communication, documentation, issue management and code contributions are all
    welcome. There is no contribution too small. If you would like to get involved
    please chat to us or dive in with the carefully crafted backlog of starter issues
    - gitlab.com/cordite/cordite/boards/857399"
  - SLACK_PAYLOAD={\"text\":\"${SLACK_MESSAGE}\"}
  - wget -O- --post-data="${SLACK_PAYLOAD}" --header=Content-Type:application/json
    "https://hooks.slack.com/services/${SLACK_TOKEN}"
  - date
  stage: release-docker
test:integration:
  dependencies: []
  except:
  - 291-integration-with-other-ledgers-and-payment-rails
  - tags
  extends: .base_build
  retry: 2
  script:
  - date
  - docker pull cordite/network-map:latest
  - docker pull ${CI_REGISTRY_IMAGE}:${CI_PIPELINE_ID}
  - date
  - cd test/regression && ./run-csl.sh ${CI_REGISTRY_IMAGE}:${CI_PIPELINE_ID} csl
  - date
  stage: test
  variables:
    DOCKER_DRIVER: overlay2
    DOCKER_HOST: tcp://docker:2375/
    KUBERNETES_CPU_LIMIT: 3
    KUBERNETES_CPU_REQUEST: 2
    KUBERNETES_MEMORY_LIMIT: 4Gi
    KUBERNETES_MEMORY_REQUEST: 2Gi
    KUBERNETES_SERVICE_CPU_LIMIT: 5
    KUBERNETES_SERVICE_CPU_REQUEST: 4
    KUBERNETES_SERVICE_MEMORY_LIMIT: 6Gi
    KUBERNETES_SERVICE_MEMORY_REQUEST: 4Gi
test:regression:
  dependencies: []
  except:
  - 291-integration-with-other-ledgers-and-payment-rails
  - tags
  extends: .base_build
  retry: 2
  script:
  - date
  - docker pull cordite/network-map:latest
  - docker pull ${CI_REGISTRY_IMAGE}:${CI_PIPELINE_ID}
  - date
  - cd test/regression && ./run.sh cordite/cordite:v0.5.3 ${CI_REGISTRY_IMAGE}:${CI_PIPELINE_ID}
    min
  - date
  stage: test
  variables:
    DOCKER_DRIVER: overlay2
    DOCKER_HOST: tcp://docker:2375/
    KUBERNETES_CPU_LIMIT: 3
    KUBERNETES_CPU_REQUEST: 2
    KUBERNETES_MEMORY_LIMIT: 4Gi
    KUBERNETES_MEMORY_REQUEST: 2Gi
    KUBERNETES_SERVICE_CPU_LIMIT: 5
    KUBERNETES_SERVICE_CPU_REQUEST: 4
    KUBERNETES_SERVICE_MEMORY_LIMIT: 6Gi
    KUBERNETES_SERVICE_MEMORY_REQUEST: 4Gi
variables:
  DOCKER_DRIVER: overlay2
  KUBERNETES_CPU_LIMIT: 5
  KUBERNETES_CPU_REQUEST: 4
  KUBERNETES_MEMORY_LIMIT: 6Gi
  KUBERNETES_MEMORY_REQUEST: 2Gi
