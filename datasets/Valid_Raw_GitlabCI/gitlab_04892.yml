build:
  dependencies:
  - init
  image: docker:latest
  only:
  - master
  script:
  - docker login -u gitlab-ci-token -p $CI_JOB_TOKEN $CI_REGISTRY
  - docker build -t $CI_REGISTRY_IMAGE:latest .
  - docker run -e TEST='true' $CI_REGISTRY_IMAGE:latest php createRelease.php
  - docker run -e TEST='true' $CI_REGISTRY_IMAGE:latest php uploadBinary.php
  - docker push $CI_REGISTRY_IMAGE:latest
  services:
  - docker:dind
  stage: build
init:
  artifacts:
    expire_in: 10 minutes
    paths:
    - vendor/
  cache:
    paths:
    - vendor/
  image: php:7.2-cli
  script:
  - apt-get update && apt-get install -y unzip git curl
  - if [ ! -f composer ]; then { curl -sS https://getcomposer.org/installer | php
    -- --filename=composer; } fi;
  - php composer install
  stage: init
stages:
- init
- build
