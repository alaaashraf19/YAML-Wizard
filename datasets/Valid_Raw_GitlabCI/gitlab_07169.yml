build:
  artifacts:
    name: emc-$CI_COMMIT_SHORT_SHA-snapshot
    paths:
    - maven
  image: eclipse-temurin:21
  script:
  - ./gradlew publish --stacktrace
  stage: build
  variables:
    GRADLE_OPTS: -Dorg.gradle.daemon=false
deploy:
  before_script:
  - apt update
  - apt install -y git openssh-client rsync
  - eval $(ssh-agent -s)
  - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
  - mkdir -p ~/.ssh
  - chmod 700 ~/.ssh
  - ssh-keyscan gitlab.com >> ~/.ssh/known_hosts
  - chmod 644 ~/.ssh/known_hosts
  - git config --global user.email "$GIT_EMAIL"
  - git config --global user.name "$GIT_NAME"
  dependencies:
  - build
  image: node:latest
  only:
  - 1.21.5
  resource_group: production
  script:
  - git clone git@gitlab.com:EMC-Framework/maven.git maven-remote
  - rsync -r -I maven/* maven-remote
  - cd maven-remote
  - git add .
  - git commit -m "EMC snapshot $CI_COMMIT_SHORT_SHA"
  - git push
  stage: deploy
  variables:
    GIT_EMAIL: ci@gitlab.com
    GIT_NAME: GitLab CI
