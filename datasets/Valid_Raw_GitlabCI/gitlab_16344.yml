installAndRender:
  artifacts:
    paths:
    - docs
  image: rocker/tidyverse
  only:
  - master
  script:
  - apt-get update
  - apt-get install -y libxslt1-dev
  - R -e 'devtools::install_github("ropenscilabs/tinkr")'
  - Rscript -e 'install.packages(c("lme4", "sticky", "here", "tidyverse", "roxygen2",
    "car", "stargazer", "rmarkdown", "knitr", "RColorBrewer", "wesanderson", "hexbin",
    "MASS", "broom.mixed", "kableExtra"))'
  - make install
  - Rscript -e "install.packages('pkgdown')"
  - make pkgdown
  stage: build
pages:
  artifacts:
    paths:
    - public
  only:
  - master
  script:
  - mv docs public
  stage: deploy
stages:
- build
- deploy
