before_script:
- JOB_TIMESTAMP=$(date +'%Y%m%d-%H%M%S')
- COMMIT_HASH_SHORT=${CI_COMMIT_SHA:0:8}
- COMMIT_BRANCH_OR_TAG=$(echo $CI_COMMIT_REF_NAME | sed 's#[/.:() ]#-#g')
- REGISTRY_HOST=$CI_REGISTRY
- REGISTRY_USER=$CI_REGISTRY_USER
- REGISTRY_PASSWORD=$CI_REGISTRY_PASSWORD
- REGISTRY_IMAGE=$CI_REGISTRY_IMAGE
build:
  artifacts:
    paths:
    - build/distributions/*.tar
    - build/reports
  image: openjdk:17-jdk
  script:
  - ./gradlew build
  stage: build
build docker image:
  image: docker:latest
  script:
  - echo "JOB_TIMESTAMP $JOB_TIMESTAMP | COMMIT_HASH_SHORT $COMMIT_HASH_SHORT | COMMIT_BRANCH_OR_TAG
    $COMMIT_BRANCH_OR_TAG | REGISTRY_HOST $REGISTRY_HOST | REGISTRY_USER $REGISTRY_USER
    | REGISTRY_IMAGE $REGISTRY_IMAGE | CERTIFICATE_URL $CERTIFICATE_URL"
  - docker login -u "$REGISTRY_USER" -p "$REGISTRY_PASSWORD" $REGISTRY_HOST
  - docker build --pull -t "$REGISTRY_IMAGE:$COMMIT_BRANCH_OR_TAG-$COMMIT_HASH_SHORT"
    .
  - docker push "$REGISTRY_IMAGE:$COMMIT_BRANCH_OR_TAG-$COMMIT_HASH_SHORT" && echo
    "== Pushed docker image $REGISTRY_IMAGE:$COMMIT_BRANCH_OR_TAG-$COMMIT_HASH_SHORT"
  stage: build
collect SBOM (syft, docker):
  artifacts:
    paths:
    - '*sbom*'
  image: docker:latest
  script:
  - docker login -u "$REGISTRY_USER" -p "$REGISTRY_PASSWORD" $REGISTRY_HOST
  - docker pull "$REGISTRY_IMAGE:$COMMIT_BRANCH_OR_TAG-$COMMIT_HASH_SHORT"
  - apk add curl
  - curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh
    -s -- -b /usr/local/bin
  - syft docker:"$REGISTRY_IMAGE:$COMMIT_BRANCH_OR_TAG-$COMMIT_HASH_SHORT" -o json=docker.sbom.syft.json
    -o table=docker.sbom.syft.table -o table
  stage: sbom
collect SBOM (syft, jar):
  artifacts:
    paths:
    - '*sbom*'
  image: ubuntu:20.04
  script:
  - apt-get update && apt-get install -y curl
  - curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh
    -s -- -b /usr/local/bin
  - syft file:"$(find build/distributions | grep -v shadow | grep tar)" -o json=jar.sbom.syft.json
    -o table=jar.sbom.syft.table -o table
  stage: sbom
push docker image:
  image: docker:latest
  script:
  - docker login -u "$REGISTRY_USER" -p "$REGISTRY_PASSWORD" $REGISTRY_HOST
  - docker pull "$REGISTRY_IMAGE:$COMMIT_BRANCH_OR_TAG-$COMMIT_HASH_SHORT"
  - docker tag "$REGISTRY_IMAGE:$COMMIT_BRANCH_OR_TAG-$COMMIT_HASH_SHORT" "$REGISTRY_IMAGE:$COMMIT_BRANCH_OR_TAG"
  - docker push "$REGISTRY_IMAGE:$COMMIT_BRANCH_OR_TAG" && echo "== Pushed docker
    image $REGISTRY_IMAGE:$COMMIT_BRANCH_OR_TAG"
  stage: release
push docker image on master as latest:
  image: docker:latest
  only:
  - master
  script:
  - docker login -u "$REGISTRY_USER" -p "$REGISTRY_PASSWORD" $REGISTRY_HOST
  - docker pull "$REGISTRY_IMAGE:$COMMIT_BRANCH_OR_TAG-$COMMIT_HASH_SHORT"
  - docker tag "$REGISTRY_IMAGE:$COMMIT_BRANCH_OR_TAG-$COMMIT_HASH_SHORT" "$REGISTRY_IMAGE"
  - docker push "$REGISTRY_IMAGE" && echo "== Pushed docker image $REGISTRY_IMAGE"
  stage: release
scan vulnerabilities (grype, docker):
  artifacts:
    paths:
    - '*vulnerabilities*'
  image: ubuntu:20.04
  script:
  - apt-get update && apt-get install -y curl
  - curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh
    -s -- -b /usr/local/bin
  - grype sbom:./docker.sbom.syft.json -o json > docker.vulnerabilities.grype.json
  - grype sbom:./docker.sbom.syft.json -o table > docker.vulnerabilities.grype.table
  - grype sbom:./docker.sbom.syft.json -o table
  stage: scan
scan vulnerabilities (grype, jar):
  artifacts:
    paths:
    - '*vulnerabilities*'
  image: ubuntu:20.04
  script:
  - apt-get update && apt-get install -y curl
  - curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh
    -s -- -b /usr/local/bin
  - grype sbom:./jar.sbom.syft.json -o json > jar.vulnerabilities.grype.json
  - grype sbom:./jar.sbom.syft.json -o table > jar.vulnerabilities.grype.table
  - grype sbom:./jar.sbom.syft.json -o table
  stage: scan
services:
- command:
  - /bin/sh
  - -c
  - '[[ -z $CERTIFICATE_URL ]] && ( echo Injecting no certificate && dockerd-entrypoint.sh
    || exit ) || ( echo Injecting certificate $CERTIFICATE_URL && wget $CERTIFICATE_URL
    -O /usr/local/share/ca-certificates/cert.crt && update-ca-certificates && dockerd-entrypoint.sh
    || exit )'
  name: docker:dind
stages:
- build
- release
- sbom
- scan
variables: null
