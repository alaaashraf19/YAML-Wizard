build_debian_package:
  image: debian:bullseye
  script:
  - apt-get update -qy
  - 'apt-get install --no-install-recommends -qy build-essential fakeroot lintian
    libapparmor-dev pkg-config gawk | grep -Ev ''^(Selecting|Preparing to unpack|Unpacking)''

    '
  - ./ci/printenv.sh
  - ./configure || (cat config.log; exit 1)
  - make dist
  - ./mkdeb.sh --enable-fatal-warnings
  - dpkg -i ./*.deb
  - make installcheck
  timeout: 10 minutes
  variables:
    DEBIAN_FRONTEND: noninteractive
build_fedora_package:
  image: fedora:latest
  script:
  - dnf update -y
  - dnf install -y rpm-build gcc make
  - ./ci/printenv.sh
  - ./configure || (cat config.log; exit 1)
  - make dist
  - ./platform/rpm/mkrpm.sh --enable-fatal-warnings
  - rpm -i ./*.rpm
  - make installcheck
  timeout: 10 minutes
build_no_apparmor:
  image: ubuntu:latest
  script:
  - apt-get update -qy
  - 'apt-get install --no-install-recommends -qy build-essential fakeroot lintian
    pkg-config gawk | grep -Ev ''^(Selecting|Preparing to unpack|Unpacking)''

    '
  - ./ci/printenv.sh
  - ./configure || (cat config.log; exit 1)
  - make dist
  - './mkdeb.sh --enable-fatal-warnings --disable-apparmor

    '
  - dpkg -i ./*.deb
  - make installcheck
  - make installcheck | grep -F 'AppArmor support is disabled'
  timeout: 10 minutes
  variables:
    DEBIAN_FRONTEND: noninteractive
