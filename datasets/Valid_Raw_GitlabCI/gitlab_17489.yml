before_script:
- apt-get update -qq
- apt-get install libgl1-mesa-dev -y
- python -V
- pip install virtualenv
- virtualenv venv
- source venv/bin/activate
cache:
  paths:
  - .cache/pip
  - venv/
image: python:latest
test:
  script:
  - pip install -e .
  - pip install pytest pytest-cov
  - pytest --cov=ctexplorer ctexplorer/tests/
  - cat .coverage
variables:
  PIP_CACHE_DIR: $CI_PROJECT_DIR/.cache
