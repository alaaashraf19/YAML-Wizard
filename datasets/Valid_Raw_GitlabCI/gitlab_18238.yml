.build:
  artifacts:
    expire_in: 1 week
    paths:
    - build/$ARCH_TRIPLET/app
  script:
  - clickable build --clean --accept-review-errors
  stage: build
.node_anchors:
  amd64:
    variables: &id001
      ARCH: amd64
      ARCH_TRIPLET: x86_64-linux-gnu
  arm64:
    variables: &id002
      ARCH: arm64
      ARCH_TRIPLET: aarch64-linux-gnu
  armhf:
    variables: &id003
      ARCH: armhf
      ARCH_TRIPLET: arm-linux-gnueabihf
build-amd64:
  extends: .build
  variables: *id001
build-arm64:
  extends: .build
  variables: *id002
build-armhf:
  extends: .build
  variables: *id003
default:
  image: clickable/ci-$UT_VERSION-$ARCH:$CLICKABLE_VERSION
  tags:
  - $RUNNER_TAG
publish:
  artifacts:
    expire_in: 1 week
    paths:
    - build/x86_64-linux-gnu/app/*.click
    - build/aarch64-linux-gnu/app/*.click
    - build/arm-linux-gnueabihf/app/*.click
  rules:
  - if: $CI_COMMIT_TAG
  script:
  - clickable publish --arch amd64 -- "$CI_COMMIT_MESSAGE"
  - clickable publish --arch arm64
  - clickable publish --arch armhf
  stage: publish
  variables: *id001
stages:
- build
- publish
variables:
  CLICKABLE_VERSION: '8'
  DOCKER_DRIVER: overlay2
  GIT_SUBMODULE_STRATEGY: recursive
  UT_VERSION: '20.04'
workflow:
  rules:
  - if: $CI_PROJECT_NAMESPACE =~ /^ubports\//
    variables:
      RUNNER_TAG: ubports
  - if: $CI_PROJECT_NAMESPACE !~ /^ubports\//
    variables:
      RUNNER_TAG: saas-linux-small-amd64
