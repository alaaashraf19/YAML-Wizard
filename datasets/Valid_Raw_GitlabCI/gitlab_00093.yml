cache:
  paths:
  - .apt
  - vendor
image: ruby:2.6
pages:
  artifacts:
    paths:
    - public
  before_script:
  - export LC_ALL="C.UTF-8"
  - export LANG="en_US.UTF-8"
  - export LANGUAGE="en_US.UTF-8"
  - echo $CI_PROJECT_DIR
  - export APT_DIR=$CI_PROJECT_DIR/.apt && export APT_STATE_LISTS=$APT_DIR/lists &&
    export APT_CACHE_ARCHIVES=$APT_DIR/archives
  - printf "dir::state::lists    ${APT_STATE_LISTS};\ndir::cache::archives    ${APT_CACHE_ARCHIVES};\n"
    > /etc/apt/apt.conf
  - mkdir -p "${APT_STATE_LISTS}/partial" && mkdir -p "${APT_CACHE_ARCHIVES}/partial"
  - apt-get update -y && apt-get install -yq rsync
  - eval $(ssh-agent -s)
  - ssh-add <(echo "$SSH_KEY_ED25519")
  - mkdir -p ~/.ssh
  - chmod 700 ~/.ssh
  - echo -e "Host *\n\tStrictHostKeyChecking no\n\n" > ~/.ssh/config
  only:
  - master
  script:
  - gem install bundler
  - bundle config set path 'vendor'
  - bundle install
  - bundle exec jekyll build -d public
  - rsync -av --delete public/ git@communitydocs.accessnow.org:./communitydocs
  stage: deploy
