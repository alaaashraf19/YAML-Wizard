Ubuntu-icc21-oneAPI:
  allow_failure: true
  artifacts:
    paths:
    - oneapi_pass.svg
    when: always
  image: andreasga/cbctrecon:icc-21-oneAPI-x86_64
  script:
  - export pre_setvars_path=$PATH
  - source /opt/intel/oneapi/setvars.sh
  - export PATH=$PATH:$pre_setvars_path
  - export CC=icc
  - export CXX=icpc
  - wget -O oneapi_pass.svg https://img.shields.io/badge/oneAPI-failing-red.svg
  - ./ci/ci.sh
  - wget -O oneapi_pass.svg https://img.shields.io/badge/oneAPI-passing-green.svg
  stage: test
  tags:
  - linux
  - docker
Windows10-msvc2019-CUDA:
  artifacts:
    name: $env:CI_JOB_STAGE-$env:CI_COMMIT_REF_NAME
    paths:
    - build/*.msi
  script:
  - Import-Module "C:\Program Files (x86)\Microsoft Visual Studio\2019\Community\Common7\Tools\Microsoft.VisualStudio.DevShell.dll"
  - Enter-VsDevShell 512426f1
  - $env:CUDA_PATH = "C:/Program Files/NVIDIA GPU Computing Toolkit/CUDA/v11.1"
  - mkdir build
  - cd build
  - cmake -G"Visual Studio 16 2019" -A"x64" .. ` -DCMAKE_BUILD_TYPE=Release ` -DCMAKE_INSTALL_PREFIX="../install"
    ` -DCMAKE_CXX_FLAGS_RELEASE="/MT /O2 /Ob2 /DNDEBUG /Zc:__cplusplus" ` -DCMAKE_C_FLAGS_RELEASE="/MT
    /O2 /Ob2 /DNDEBUG" ` -DCMAKE_PREFIX_PATH="C:/Qt/5.15.2/msvc2019_64/" ` -DHUNTER_ENABLED=OFF
    ` -DRTK_USE_OPENCL=ON ` -DUSE_CUDA=ON ` -DITK_DIR="C:/Program Files (x86)/ITK/lib/cmake/ITK-5.2"
    ` -DUSE_SYSTEM_DCMTK=ON ` -DDCMTK_DIR="C:/Program Files (x86)/DCMTK/cmake/" `
    -DUSE_SYSTEM_Plastimatch=OFF ` -DUSE_SYSTEM_ZLIB=ON ` -DUSE_SYSTEM_dlib=ON ` -Ddlib_DIR="C:/Program
    Files (x86)/dlib_project/lib/cmake/dlib/"
  - cmake --build . --config Release -j 12
  - cmake --build . --config Release --target INSTALL
  - ctest -VV -C Release
  - cmake --build . --config Release --target PACKAGE
  stage: test
  tags:
  - windows
  - gpu
  - shell
pages:
  artifacts:
    paths:
    - public
  image: alpine:3.13
  needs:
  - Ubuntu-gcc10-CUDA
  - Ubuntu-clang11-ROCm
  - Ubuntu-icc21-oneAPI
  only:
    refs:
    - master
  script:
  - mkdir public
  - cp *.svg ./public/
  stage: deploy
variables:
  COVERAGE: 'NO'
  CUDA_AVAILABLE: 'NO'
  GIT_STRATEGY: clone
