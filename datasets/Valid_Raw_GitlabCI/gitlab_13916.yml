build:
  script:
  - go build ./...
  stage: build
image: golang:1.22
release:
  rules:
  - if: $CI_COMMIT_TAG != null
  script:
  - ./release.sh
  stage: release
stages:
- build
- test
- release
test:
  script:
  - test -z "$(gofmt -l . | tee /dev/stderr)"
  - go test -cover ./...
  - curl -sfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh
    | sh -s -- -b $(go env GOPATH)/bin v1.59.1
  - golangci-lint run -v
  stage: test
