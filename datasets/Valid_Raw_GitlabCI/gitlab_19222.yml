.docs:
  extends:
  - .show-version
  rules:
  - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    variables:
      CI_DOC_TARGET: $CI_MERGE_REQUEST_IID
  - if: $CI_PIPELINE_SOURCE == 'push' && $CI_COMMIT_REF_NAME == 'main'
    variables:
      CI_DOC_TARGET: main
  script:
  - echo "Building docs to CI_DOC_TARGET=$CI_DOC_TARGET"
  - RUSTDOCFLAGS="--cfg docsrs -D warnings" RUSTFLAGS="--cfg xmpprs_doc_build" cargo
    +nightly doc --no-deps -Zrustdoc-map --all-features
  - apt install -y rsync openssh-client
  - mkdir -p $HOME/.ssh
  - echo -e "Host docs\n\tHostname ssh.docsxmpprs-2025.sotecware.net\n\tPort 1312\n\tUser
    docs\n\tStrictHostKeyChecking no" > $HOME/.ssh/config
  - echo "$SECRET_DOCS_SSH_PRIVATE" > $HOME/.ssh/id_ed25519
  - chmod 400 $HOME/.ssh/id_ed25519
  - rsync -av --rsh=ssh target/doc/ docs::www/$CI_DOC_TARGET
  stage: test
.nightly:
  extends:
  - .show-version
  image: rustlang/rust:nightly-slim
.show-version:
  before_script:
  - apt-get update; apt-get install -y --no-install-recommends pkg-config libssl-dev
  - rustc --version
  - cargo --version
.stable:
  extends:
  - .show-version
  image: rust:slim
.test:
  rules:
  - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
  - if: $CI_PIPELINE_SOURCE == 'push' && $CI_COMMIT_REF_NAME == 'main'
  script:
  - cargo test --verbose
  - cargo test --verbose --no-default-features
  stage: test
changelog-update:
  image: alpine:latest
  rules:
  - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
  - if: $CI_PIPELINE_SOURCE == 'push' && $CI_COMMIT_REF_NAME == 'main'
  script:
  - apk add --no-cache python3 git
  - python3 --version
  - git version
  - git fetch --depth 16 origin main
  - "if ! git log --oneline \"${CI_MERGE_REQUEST_DIFF_BASE_SHA}..\" --; then\n  echo\
    \ \"Failed to find revision ${CI_MERGE_REQUEST_DIFF_BASE_SHA}..\" >&2\n  echo\
    \ \"This likely means that you need to rebase your branch.\" >&2\n  exit 1\nfi\n"
  - python3 .forgejo/workflows/check-changelog.py
  stage: lint
docs:
  extends:
  - .docs
  - .nightly
nightly-test:
  allow_failure: true
  extends:
  - .test
  - .nightly
rustfmt:
  extends:
  - .stable
  rules:
  - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
  - if: $CI_PIPELINE_SOURCE == 'push' && $CI_COMMIT_REF_NAME == 'main'
  script:
  - rustup component add rustfmt
  - cargo fmt --version
  - cargo fmt --check
  stage: lint
stable-test:
  extends:
  - .test
  - .stable
stages:
- lint
- test
- bot
typos:
  extends:
  - .stable
  rules:
  - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
  - if: $CI_PIPELINE_SOURCE == 'push' && $CI_COMMIT_REF_NAME == 'main'
  script:
  - cargo install typos-cli
  - typos
  stage: lint
variables:
  CARGO_TERM_COLOR: always
  DOCS_BASEURL: https://docs.xmpp.rs
  FEATURES: ''
  RUSTDOCFLAGS: ' -D warnings'
  RUSTFLAGS: ' -D warnings'
  RUST_BACKTRACE: full
