cache:
  paths:
  - .m2/repository
compile:
  only:
  - master
  - develop
  script:
  - mvn $MAVEN_CLI_OPTS test-compile
  stage: build
deploy:
  image: docker
  only:
  - master
  - develop
  script:
  - docker login -u gitlab-ci-token -p $CI_BUILD_TOKEN registry.gitlab.com
  - docker build -t registry.gitlab.com/dsncode/filemanager .
  - docker push registry.gitlab.com/dsncode/filemanager
  stage: deploy
  tags:
  - docker
image: maven:3.5-jdk-8
services:
- docker:dind
stages:
- build
- test
- deploy
variables:
  MAVEN_CLI_OPTS: --batch-mode --errors --fail-at-end --show-version -DinstallAtEnd=true
    -DdeployAtEnd=true
  MAVEN_OPTS: -Dmaven.repo.local=.m2/repository -Dorg.slf4j.simpleLogger.log.org.apache.maven.cli.transfer.Slf4jMavenTransferListener=WARN
    -Dorg.slf4j.simpleLogger.showDateTime=true -Djava.awt.headless=true
verify:
  artifacts:
    paths:
    - target/*.jar
  only:
  - master
  - develop
  script:
  - mvn $MAVEN_CLI_OPTS verify
  stage: test
