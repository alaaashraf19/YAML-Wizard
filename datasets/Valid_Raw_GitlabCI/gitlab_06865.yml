build scala-akka:
  script:
  - cd candidates/scala-akka
  - mkdir dist
  - docker build -t scala-akka-builder .
  - docker run --rm --entrypoint cat scala-akka-builder /src/target/scala-2.12/msroyale-scala-akka.jar
    > dist/msroyale-scala-akka.jar
  - docker build -f Dockerfile.prod -t "${CI_REGISTRY_IMAGE}/scala-akka:${VERSION}"
    .
  - docker push "${CI_REGISTRY_IMAGE}/scala-akka:${VERSION}"
  stage: build
image: docker:latest
kitano:
  artifacts:
    expire_in: 1 day
    paths:
    - public
  script:
  - chmod +x bin/kitano
  - for image in $(ls candidates/); do export images="${CI_REGISTRY_IMAGE}/$image:${VERSION}
    $images"; done
  - echo $images
  - ./bin/kitano --images "$images" --timeout 120 --nanocpu 500000000 --healthcheckExpected
    '{"State":"OK"}' --healthcheckEndpoint "/healthcheck" --pull --loadEndpoint "/healthcheck"
    --loadExpected '{"State":"OK"}' --loadThreads 4 --charge 3000 > public/kitano.json
  stage: kitano
pages:
  artifacts:
    paths:
    - public
  script:
  - echo "Deploying to pages"
  stage: deploy
stages:
- build
- kitano
- deploy
