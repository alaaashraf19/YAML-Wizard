build kitano:
  artifacts:
    expire_in: 1 day
    paths:
    - bin
  script:
  - mkdir bin
  - cd kitano
  - docker build -t "${CI_REGISTRY_IMAGE}/kitano-builder:${VERSION}" .
  - docker run --rm --entrypoint cat "${CI_REGISTRY_IMAGE}/kitano-builder:${VERSION}"
    /go/bin/kitano > ../bin/kitano
  stage: build
