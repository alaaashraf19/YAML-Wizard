before_script:
- npm install --quiet
cache:
  key: node622
  paths:
  - node_modules/
image: node:6.2.2
pages:
  artifacts:
    paths:
    - public
  only:
  - master
  script:
  - mkdir public
  - npm run build
  - cp index.html public
  - cp -r dist public
  stage: deploy
stages:
- test
- deploy
test-all:
  script: npm run test
  stage: test
