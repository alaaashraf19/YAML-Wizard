before_script:
- nuget restore -NonInteractive
debug:
  script:
  - msbuild /p:Configuration="Debug" /p:Platform="Any CPU" /p:OutputPath="./../../build/debug/"
    "MyProject.sln"
  - mono packages/NUnit.ConsoleRunner.3.6.0/tools/nunit3-console.exe build/debug/MyProject.Test.dll
  stage: test
image: mono:latest
release:
  artifacts:
    paths:
    - build/release/MyProject.exe
  only:
  - master
  script:
  - msbuild /p:Configuration="Release" /p:Platform="Any CPU" /p:OutputPath="./../../build/release/"
    "MyProject.sln"
  stage: deploy
stages:
- build
- test
- deploy
