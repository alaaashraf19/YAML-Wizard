before_script:
- apt-get update && apt-get -y install postgresql-client
- mix local.rebar --force
- mix local.hex --force
- mix deps.get
- mix ecto.create
- mix ecto.migrate
image: elixir:1.9.1
mix:
  script:
  - mix test --cover
services:
- postgres:latest
variables:
  DATABASE_HOST: postgres
  DATABASE_NAME: gaja_test
  DATABASE_PASSWORD: postgres
  DATABASE_USER: postgres
  MIX_ENV: test
