before_script:
- export IMAGE_NAME="$CI_REGISTRY_IMAGE/$CI_COMMIT_REF_SLUG"
- echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin
  "$CI_REGISTRY"
- mkdir -p ~/.docker/cli-plugins
- wget -O ~/.docker/cli-plugins/docker-buildx "$BUILDX_URL"
- chmod +x ~/.docker/cli-plugins/docker-buildx
- docker run --privileged --rm tonistiigi/binfmt --install all
- docker buildx create --name multiarch --use --driver docker-container --platform
  "$PLATFORMS"
- docker buildx inspect --bootstrap multiarch
- "function get_latest_version() {\n  docker create --name version \"$IMAGE_NAME:latest\"\
  \ >&2\n  docker cp version:/.version . >&2\n  cat .version\n}\n"
buildx.gitlab:
  except:
  - master
  only:
  - branches
  script:
  - docker buildx build -t "$IMAGE_NAME:latest" --push --platform "$PLATFORMS" .
  - docker buildx build -t "$IMAGE_NAME:$(get_latest_version)" --push --platform "$PLATFORMS"
    .
  stage: build
buildx.hub:
  only:
  - master
  script:
  - docker buildx build -t "$IMAGE_NAME:latest" --push --platform "$PLATFORMS" .
  - VERSION="$(get_latest_version)"
  - echo "$DOCKER_HUB_PASSWORD" | docker login -u "$DOCKER_HUB_USER" --password-stdin
    "$DOCKER_HUB"
  - docker buildx build -t "$HUB_IMAGE:latest" -t "$HUB_IMAGE:$VERSION" --push --platform
    "$PLATFORMS" .
  stage: build
image: docker:latest
services:
- command:
  - --experimental
  - --mtu=1300
  name: docker:dind
variables:
  BUILDX_URL: https://github.com/docker/buildx/releases/download/v0.5.1/buildx-v0.5.1.linux-amd64
  DOCKER_CLI_EXPERIMENTAL: enabled
  DOCKER_HUB: docker.io
  DOCKER_HUB_USER: jakesys
  HUB_IMAGE: docker.io/jakesys/aws
  PLATFORMS: linux/amd64,linux/arm64
