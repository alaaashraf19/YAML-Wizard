performance:
  allow_failure: true
  artifacts:
    paths:
    - performance.json
    - sitespeed-results/
  except:
    variables:
    - $PERFORMANCE_DISABLED
  image: docker:stable
  only:
    kubernetes: active
    refs:
    - branches
    - tags
  script:
  - "if ! docker info &>/dev/null; then\n  if [ -z \"$DOCKER_HOST\" -a \"$KUBERNETES_PORT\"\
    \ ]; then\n    export DOCKER_HOST='tcp://localhost:2375'\n  fi\nfi\n"
  - export CI_ENVIRONMENT_URL=$(cat environment_url.txt)
  - mkdir gitlab-exporter
  - wget -O gitlab-exporter/index.js https://gitlab.com/gitlab-org/gl-performance/raw/10-5/index.js
  - mkdir sitespeed-results
  - "if [ -f .gitlab-urls.txt ]\nthen\n  sed -i -e 's@^@'\"$CI_ENVIRONMENT_URL\"'@'\
    \ .gitlab-urls.txt\n  docker run --shm-size=1g --rm -v \"$(pwd)\":/sitespeed.io\
    \ sitespeedio/sitespeed.io:6.3.1 --plugins.add ./gitlab-exporter --outputFolder\
    \ sitespeed-results .gitlab-urls.txt\nelse\n  docker run --shm-size=1g --rm -v\
    \ \"$(pwd)\":/sitespeed.io sitespeedio/sitespeed.io:6.3.1 --plugins.add ./gitlab-exporter\
    \ --outputFolder sitespeed-results \"$CI_ENVIRONMENT_URL\"\nfi\n"
  - mv sitespeed-results/data/performance.json performance.json
  services:
  - docker:stable-dind
  stage: performance
  variables:
    DOCKER_TLS_CERTDIR: ''
