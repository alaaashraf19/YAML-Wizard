build:
  artifacts:
    paths:
    - node_modules/
  cache:
    key: ${CI_BUILD_REF_NAME}
    paths:
    - node_modules/
  script:
  - npm --version
  - npm install
  stage: build
image: node:6
release:
  before_script:
  - npm install gitlab-ci-releaser -g
  only:
  - master
  script:
  - gitlab-ci-releaser --npm
  stage: release
  when: manual
stages:
- build
- validate
- test
- release
test:
  script:
  - npm test
  stage: test
validate:
  script:
  - npm run validate
  stage: validate
