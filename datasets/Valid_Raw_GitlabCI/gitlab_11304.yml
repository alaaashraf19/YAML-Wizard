.apt_setup: 'apt-get -qq update && apt-get -q install -y locales mediainfo

  locale-gen "$LANG"

  locale

  '
before_script:
- python3 -V
cache:
  paths:
  - /root/.cache/pip/
docs:
  script:
  - pip3 install tox
  - tox -e docs
  stage: deploy
image: python:3.4
pages:
  artifacts:
    expire_in: 30 days
    paths:
    - public
  dependencies:
  - tox
  only:
  - master
  script:
  - mv build/cov_html/ public/
  stage: deploy
tox:
  artifacts:
    expire_in: 3 days
    paths:
    - build/cov_html
  script:
  - 'apt-get -qq update && apt-get -q install -y locales mediainfo

    locale-gen "$LANG"

    locale

    '
  - python3 setup.py --version
  - pip3 install -r requirements-dev.txt
  - tox -e lint -- --reports=y
  - tox -e py34
  - hypershot --config-dir=docs/examples templates
  stage: test
variables:
  HYPERSHOT_DEBUG: '1'
  LANG: en_US.UTF-8
  PYTHONIOENCODING: utf-8
