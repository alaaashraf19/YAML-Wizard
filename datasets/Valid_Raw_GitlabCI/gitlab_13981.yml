before_script: null
cache:
  key: $CI_JOB_NAME
  paths:
  - vendor
  - node_modules
  - .install-cache
deploy to production:
  environment:
    name: production
    url: $PRODUCTION_URI
  only:
  - master
  script:
  - echo Deploy production
  - eval $(ssh-agent -s)
  - ssh-add <(echo "$PRODUCTION_SSH_PRIVATE_KEY")
  - $PRODUCTION_DEPLOY_REMOTE_COMMAND
  stage: deploy
image: oprudkyi/laravel-bootstrap-adminlte-starter-kit:test-php-7.0
services: null
test:php70:
  script:
  - ./bootstrap.sh
  - ./configure
  - export COMPOSER_ALLOW_SUPERUSER=1
  - make install-dependencies
  - make -k check-functional
  - make -k check-acceptance
test:php71:
  allow_failure: true
  image: oprudkyi/laravel-bootstrap-adminlte-starter-kit:test-php-7.1
  script:
  - ./bootstrap.sh
  - ./configure
  - export COMPOSER_ALLOW_SUPERUSER=1
  - make install-dependencies
  - make -k check-functional
  - make -k check-acceptance
variables: null
