.artifacts:
  artifacts: &id002
    expire_in: 1 week
    untracked: true
    when: always
.image-build:
  before_script: &id003
  - echo "$CI_REGISTRY_PASSWORD" | docker login --username "$CI_REGISTRY_USER" --password-stdin
    "$CI_REGISTRY"
  image: docker
  script: &id005
  - docker pull "$SDK_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG" || docker pull "$SDK_REGISTRY_IMAGE"
    || true
  - docker build --pull --cache-from "$SDK_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG" --cache-from
    "$SDK_REGISTRY_IMAGE" --tag "$TAG_NAME" .
  - docker push "$TAG_NAME"
  services: &id006
  - docker:dind
.image-build-deps:
  changes: &id004
  - .gitlab-ci.yml
  - .dockerignore
  - Dockerfile
  - install-deps
.touch:
  before_script: &id001
  - git ls-files -z --other | xargs -0 touch
archive:
  artifacts:
    paths:
    - $CI_PROJECT_NAME-*.tar.gz
  before_script: *id001
  only:
  - master
  script:
  - make dist
  stage: archive
build:
  artifacts: *id002
  script:
  - ./bootstrap
  - ./configure
  - make
  stage: build
check:
  artifacts: *id002
  before_script: *id001
  script:
  - make check
  stage: check
image: $SDK_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG
image-branch:
  before_script: *id003
  image: docker
  only:
    changes: *id004
  script: *id005
  services: *id006
  stage: image
  variables:
    DOCKER_TLS_CERTDIR: /certs
    TAG_NAME: $CI_REGISTRY_IMAGE/sdk:$CI_COMMIT_REF_SLUG
image-latest:
  before_script: *id003
  image: docker
  only:
    changes: *id004
    refs:
    - master
  script: *id005
  services: *id006
  stage: image-latest
  variables:
    DOCKER_TLS_CERTDIR: /certs
    TAG_NAME: $CI_REGISTRY_IMAGE/sdk
stages:
- image
- build
- check
- archive
- image-latest
variables:
  SDK_REGISTRY_IMAGE: $CI_REGISTRY_IMAGE/sdk
