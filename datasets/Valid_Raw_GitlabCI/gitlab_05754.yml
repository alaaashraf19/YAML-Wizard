before_script:
- cp -R $CI_PROJECT_DIR /go/src/
- cd /go/src/continuous-evolution
build:binary:
  dependencies:
  - vendor
  script:
  - make
  - ./build/cli -version
  stage: build
build:binary-tag:
  artifacts:
    expire_in: 1 week
    paths:
    - build
  dependencies:
  - vendor
  only:
  - master@ContinuousEvolution/continuous-evolution
  script:
  - make
  - cp -R build $CI_PROJECT_DIR
  stage: build
build:docker:
  dependencies:
  - vendor
  script:
  - make
  - docker build -t $CI_JOB_ID -f Dockerfile .
  - docker run $CI_JOB_ID -version
  services:
  - docker:dind
  stage: build
  variables:
    DOCKER_HOST: tcp://docker:2375
build:docker-tag:
  dependencies:
  - vendor
  only:
  - master@ContinuousEvolution/continuous-evolution
  script:
  - make
  - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  - docker build -t $CI_REGISTRY_IMAGE -f Dockerfile .
  - docker run $CI_REGISTRY_IMAGE -version
  - docker push $CI_REGISTRY_IMAGE
  services:
  - docker:dind
  stage: build
  variables:
    DOCKER_HOST: tcp://docker:2375
image: registry.gitlab.com/continuousevolution/continuous-evolution/build
lint:fmt:
  dependencies:
  - vendor
  script:
  - make lint
  stage: lint
lint:mocks:
  dependencies:
  - vendor
  script:
  - make mocks
  - echo "if this step fail, you should regenerate mocks (make mocks) before commit
    again"
  - git diff --exit-code
  stage: lint
pages:
  artifacts:
    paths:
    - public
  only:
  - master
  script:
  - make doc
  - cp -R public $CI_PROJECT_DIR
  stage: doc
stages:
- vendor
- lint
- test
- build
- tag
- doc
tag:binary:
  artifacts:
    paths:
    - build
  dependencies:
  - vendor
  only:
  - tags
  script:
  - make
  - cp -R build $CI_PROJECT_DIR
  stage: build
tag:docker:
  dependencies:
  - vendor
  only:
  - tags
  script:
  - make
  - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  - docker build -t $CI_REGISTRY_IMAGE:${CI_COMMIT_REF_NAME} -f Dockerfile .
  - docker push $CI_REGISTRY_IMAGE:${CI_COMMIT_REF_NAME}
  services:
  - docker:dind
  stage: build
  variables:
    DOCKER_HOST: tcp://docker:2375
test:coverage:
  coverage: /total[^\d]+(\d+.\d+\%)/
  dependencies:
  - vendor
  script:
  - git config --global user.email "test@botevol.com"
  - git config --global user.name "BotEvol"
  - make cover
  services:
  - docker:dind
  stage: test
  variables:
    DOCKER_HOST: tcp://docker:2375
test:unit:
  artifacts:
    reports:
      junit: report.xml
  dependencies:
  - vendor
  script:
  - git config --global user.email "test@botevol.com"
  - git config --global user.name "BotEvol"
  - go get -u github.com/jstemmer/go-junit-report
  - make test-verbose 2>&1 | go-junit-report > report.xml
  - cp report.xml $CI_PROJECT_DIR
  services:
  - docker:dind
  stage: test
  variables:
    DOCKER_HOST: tcp://docker:2375
vendor:
  artifacts:
    expire_in: 1 week
    paths:
    - vendor
  script:
  - make vendor
  - cp -R vendor $CI_PROJECT_DIR
  stage: vendor
