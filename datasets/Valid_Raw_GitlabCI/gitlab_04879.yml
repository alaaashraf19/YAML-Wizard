image: registry.gitlab.com/ccrpc/plandocument/hugo
pages:
  artifacts:
    paths:
    - public
  only:
  - master
  script:
  - mkdir -p themes/plandocument
  - cd themes/plandocument
  - wget "https://gitlab.com/api/v4/projects/9642800/packages/generic/plandocument/$theme_version/plandocument-$theme_version.zip"
  - unzip plandocument-$theme_version.zip
  - cd ../..
  - hugo
test:
  except:
  - master
  script:
  - mkdir -p themes/plandocument
  - cd themes/plandocument
  - wget "https://gitlab.com/api/v4/projects/9642800/packages/generic/plandocument/$theme_version/plandocument-$theme_version.zip"
  - unzip plandocument-$theme_version.zip
  - cd ../..
  - hugo
variables:
  theme_version: 0.1.16
