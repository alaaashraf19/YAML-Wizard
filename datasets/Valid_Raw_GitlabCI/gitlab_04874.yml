Test:
  coverage: /\d+\.\d+%$/
  script: pytest
  variables:
    DATABASE_URL: postgresql://postgres:secret@postgres:5432/$POSTGRES_DB
before_script:
- python -V
- pip install -U pipenv
- pipenv install --system --deploy
cache:
  paths:
  - ~/.cache/pip/
image: python:2.7
services:
- redis:latest
- postgres:latest
variables:
  POSTGRES_DB: db
  POSTGRES_PASSWORD: secret
  POSTGRES_USER: db_user
