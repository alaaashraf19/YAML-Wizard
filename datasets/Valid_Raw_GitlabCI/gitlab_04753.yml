before_script:
- mkdir -p ${GOPATH}/src/gitlab.com/${CI_PROJECT_NAMESPACE}
- cd ${GOPATH}/src/gitlab.com/${CI_PROJECT_NAMESPACE}
- ln -s ${CI_PROJECT_DIR}
- cd ${CI_PROJECT_NAME}
- apt-get update
- apt-get install libcairo2-dev -y
- go get github.com/bwmarrin/discordgo
- cd ${GOPATH}/src/github.com/bwmarrin/discordgo
- git checkout develop
- cd ${GOPATH}/src/gitlab.com/${CI_PROJECT_NAMESPACE}/${CI_PROJECT_NAME}
- go get -v ./...
- go get -v golang.org/x/tools/cmd/goimports
image: golang:1.10
services:
- redis:latest
stages:
- test
testing:
  script:
  - bash format_go.sh
  - go test -v -race -coverprofile=coverage.txt -covermode=atomic $(go list ./...
    | grep -v /vendor/)
  - bash <(curl -s https://codecov.io/bash)
  stage: test
variables:
  REDIS_ADDRESS: redis:6379
