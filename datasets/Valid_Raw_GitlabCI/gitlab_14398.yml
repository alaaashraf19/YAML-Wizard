cache:
  paths:
  - vendor/
check_php_syntax:
  script:
  - find ./ -name "*.php" -print0 | xargs -0 -n1 -P4 php -l
  stage: test
deploy:
  environment:
    name: production
    url: https://packagist.org/packages/paveltizek/gitlab-api
  script:
  - curl -XPOST -H'content-type:application/json' 'https://packagist.org/api/update-package?username=paveltizek&apiToken=hfFRKKj-cOLs4VZc4xGQ'
    -d'{"repository":{"url":"https://packagist.org/packages/paveltizek/gitlab-api"}}'
  stage: deploy
image: geertw/docker-php-ci:7.1
run:
  before_script:
  - php -v
  script:
  - composer install
  stage: install
stages:
- test
- install
- deploy
