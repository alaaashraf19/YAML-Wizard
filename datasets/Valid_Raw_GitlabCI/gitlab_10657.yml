lint:
  script:
  - make lint
  stage: lint
pages:
  artifacts:
    paths:
    - public
  only:
  - master
  script:
  - make doc
  stage: doc
stages:
- lint
- vendor
- test
- integration
- compile
- doc
test:coverage:
  coverage: /total[^\d]+(\d+.\d+\%)/
  dependencies:
  - vendor
  script:
  - make cover
  stage: test
test:docker:
  dependencies:
  - vendor
  script:
  - ./resources/scripts/buildAllEnv.sh -light --snapshot
  - docker build -t "${CI_REGISTRY_IMAGE}/lorhammer:${CI_PIPELINE_ID}" -f docker/lorhammer/Dockerfile-lorhammer
    .
  - docker build -t "${CI_REGISTRY_IMAGE}/orchestrator:${CI_PIPELINE_ID}" -f docker/lorhammer/Dockerfile-orchestrator
    .
  - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  - docker push "${CI_REGISTRY_IMAGE}/lorhammer:${CI_PIPELINE_ID}"
  - docker push "${CI_REGISTRY_IMAGE}/orchestrator:${CI_PIPELINE_ID}"
  services:
  - docker:dind
  stage: test
  variables:
    DOCKER_HOST: tcp://docker:2375
test:unit:
  dependencies:
  - vendor
  script:
  - make test
  stage: test
vendor:
  artifacts:
    expire_in: 1 week
    paths:
    - vendor
  script:
  - make vendor
  stage: vendor
