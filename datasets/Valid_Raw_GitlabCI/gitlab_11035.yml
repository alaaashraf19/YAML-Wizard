build-app:
  artifacts:
    expire_in: 1d
    paths:
    - build
  cache:
    paths:
    - node_modules
  image: node:8
  script:
  - unset CI
  - yarn install
  - cp .env.dist .env
  - yarn lint
  - yarn build
  stage: build-app
build-image:
  dependencies:
  - build-app
  image: docker:latest
  script:
  - docker login -u gitlab-ci-token -p $CI_JOB_TOKEN registry.gitlab.com || true
  - echo "Image created at:" > build/meta.txt
  - date -u >> build/meta.txt
  - docker pull $CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG || docker pull $CI_REGISTRY_IMAGE:master
    || true
  - docker build --tag=$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA --cache-from=$CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG
    --cache-from=$CI_REGISTRY_IMAGE:master --file=docker/Dockerfile .
  - docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA
  - docker tag $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA $CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG
  - docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG
  services:
  - docker:dind
  stage: build-image
stages:
- build-app
- build-image
