image: lechten/emacs-tex-org:v2
pages:
  artifacts:
    paths:
    - public
  before_script:
  - git submodule sync --recursive
  - git submodule update --init --recursive
  rules:
  - if: $CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH
  script:
  - emacs --batch --load elisp/publish.el --funcall org-publish-all
  stage: deploy
