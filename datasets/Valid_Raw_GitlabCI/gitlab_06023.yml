image: postgres:14
include:
- local: .gitlab/job_templates/doc.yml
- local: .gitlab/job_templates/smoke_tests.yml
- inputs:
    always: 'yes'
    pgver: pg14
  local: .gitlab/job_templates/build_and_test_pgver.yml
- inputs:
    pgver: pg15
  local: .gitlab/job_templates/build_and_test_pgver.yml
- inputs:
    pgver: pg16
  local: .gitlab/job_templates/build_and_test_pgver.yml
- inputs:
    pgver: pg17
  local: .gitlab/job_templates/build_and_test_pgver.yml
- inputs:
    pgver: pg18
  local: .gitlab/job_templates/build_and_test_pgver.yml
- template: Security/SAST.gitlab-ci.yml
- inputs:
    pgver: pg17
  local: .gitlab/job_templates/coverage.yml
- local: dalibo/.gitlab-ci.yml
  rules:
  - exists:
    - dalibo/.gitlab-ci.yml
stages:
- lint
- build
- test
- deploy
- release
workflow:
  rules:
  - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS
    when: never
  - if: $CI_COMMIT_BRANCH
  - if: $CI_COMMIT_TAG
