build:
  before_script:
  - docker login -u gitlab-ci-token -p $CI_JOB_TOKEN registry.gitlab.com
  image: docker:latest
  script:
  - docker build -f ./config/deploy/dockerfiles/base/Dockerfile -t $DOCKER_IMAGE/base:latest
    .
  - docker push $DOCKER_IMAGE/base:latest
  - docker build -f ./config/deploy/dockerfiles/ci/Dockerfile -t $DOCKER_IMAGE/ci:latest
    .
  - docker push $DOCKER_IMAGE/ci:latest
  - docker build -f ./config/deploy/dockerfiles/kubectl/Dockerfile -t $DOCKER_IMAGE/kubectl:latest
    ./config/deploy/dockerfiles/kubectl
  - docker push $DOCKER_IMAGE/kubectl:latest
  - docker system prune -f
  stage: phase1
  tags:
  - build
deploy to production:
  before_script:
  - docker login -u gitlab-ci-token -p $CI_JOB_TOKEN registry.gitlab.com
  environment:
    name: production
    url: https://production.public.market
  image: $DOCKER_IMAGE/kubectl:latest
  only:
  - master
  script:
  - docker build -f ./config/deploy/Dockerfile -t $DOCKER_IMAGE/production:latest
    .
  - docker push $DOCKER_IMAGE/production:latest
  - docker system prune -f
  - kubectl cluster-info
  - kubectl patch sts web -p "{\"spec\":{\"template\":{\"metadata\":{\"labels\":{\"app\":\"$CI_ENVIRONMENT_SLUG\"},
    \"annotations\":{\"date\":\"`date +'%s'`\"}}}}}"
  - kubectl patch sts sidekiq -p "{\"spec\":{\"template\":{\"metadata\":{\"labels\":{\"app\":\"$CI_ENVIRONMENT_SLUG\"},
    \"annotations\":{\"date\":\"`date +'%s'`\"}}}}}"
  - kubectl patch sts sidekiq-uploads -p "{\"spec\":{\"template\":{\"metadata\":{\"labels\":{\"app\":\"$CI_ENVIRONMENT_SLUG\"},
    \"annotations\":{\"date\":\"`date +'%s'`\"}}}}}"
  - kubectl get pod
  - kubectl rollout status sts/web --timeout=5m
  - "curl -s -X POST -d \"payload={\\\"channel\\\":\\\"build-status\\\", \\\"username\\\
    \":\\\"$CI_ENVIRONMENT_NAME\\\",\\\"text\\\":\\\"\U0001F680 Deploy to *$CI_ENVIRONMENT_NAME*\
    \ finished \U0001F680 \\n $CI_JOB_URL\\\"}\" $SLACK_HOOK > /dev/null"
  stage: phase3
  tags:
  - build
  when: manual
rspec:
  artifacts:
    expire_in: 1 day
    paths:
    - coverage/
    - tmp/capybara/
    when: always
  before_script:
  - wget -nc -O ./cc-test-reporter https://codeclimate.com/downloads/test-reporter/test-reporter-latest-linux-amd64
    || true
  - chmod +x ./cc-test-reporter
  - ./cc-test-reporter before-build
  - bundle check || bundle install --deployment --jobs $(nproc) --without development
    staging production
  - yarn
  - bundle exec rake parallel:create
  - bundle exec rake parallel:load_schema
  cache:
    paths:
    - vendor/bundle
    - node_modules
    - cc-test-reporter
  except:
    variables:
    - $CI_COMMIT_MESSAGE =~ /skip-test/
  image: $DOCKER_IMAGE/ci:latest
  retry: 2
  script:
  - bundle exec rake parallel:spec
  - ./cc-test-reporter after-build --coverage-input-type simplecov --exit-code $?
  services:
  - postgres:10.1-alpine
  - elasticsearch:6.4.2
  stage: phase2
  variables:
    DATABASE_CLEANER_ALLOW_REMOTE_DATABASE_URL: 'true'
    DB_HOST: postgres
    ELASTICSEARCH_URL: http://elasticsearch:9200
    RAILS_ENV: test
stages:
- phase1
- phase2
- phase3
variables:
  DOCKER_DRIVER: overlay2
  DOCKER_IMAGE: registry.gitlab.com/publicmarket/public-market-storefront
