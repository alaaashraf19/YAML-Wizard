before_script:
- sudo apt-get -y update
- sudo apt-get -y install m4 pkg-config
image: ocaml/opam2
rotor-build-4.04:
  only:
  - master
  script:
  - opam switch 4.04
  - eval $(opam env)
  - opam repo set-url default https://opam.ocaml.org/
  - opam update
  - opam pin -y --kind=path add rotor .
  stage: build
