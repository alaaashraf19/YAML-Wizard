before_script: null
build_doc:
  artifacts:
    paths:
    - codemidi/build/asciidoc/html5
  only:
  - master
  script:
  - apt-get update
  - apt-get -y install graphviz
  - echo '{"allow_root"'  ':'  true '}'   > /root/.bowerrc
  - ./gradlew codemidi:asciidoctor
  stage: build
image: java:8
pages:
  artifacts:
    paths:
    - public
  dependencies:
  - build_doc
  only:
  - master
  script:
  - mkdir ./public
  - mkdir -p codemidi/build/asciidoc/html5
  - cp -r codemidi/build/asciidoc/html5/* ./public
  stage: deploy
