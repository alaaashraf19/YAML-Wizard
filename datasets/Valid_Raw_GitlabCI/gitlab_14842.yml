.build:
  script: &id001
  - emacs --batch --no-init-file --load publish.el --funcall org-publish-all
development:
  environment: development
  except:
  - master
  image: psachin/emacs-publish:emacs-29.0.50
  script: *id001
  stage: development
pages:
  artifacts:
    paths:
    - public
  environment:
    name: production
    url: https://psachin.gitlab.io/
  image: psachin/emacs-publish:30.0.50
  only:
  - master
  script: *id001
  stage: production
  when: manual
preprod:
  environment: proprod
  image: psachin/emacs-publish:30.0.50
  script: *id001
  stage: preprod
stages:
- development
- test
- preprod
- production
test:
  environment: test
  image: iquiw/alpine-emacs
  script: *id001
  stage: test
