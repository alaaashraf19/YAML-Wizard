.testing:
  before_script: &id001
  - npm install
  cache: &id002
    key: ${CI_COMMIT_REF_SLUG}
    paths:
    - node_modules/
  stage: test
deploy version:
  before_script:
  - echo $NPMRC > ./.npmrc
  only:
  - tags
  script:
  - 'sed -ie "s/\"version\": \"[0-9]\{1,10\}\.[0-9]\{1,10\}\.[0-9]\{1,10\}\(-\(alpha\|beta\)\{1\}\)\{0,1\}\"/\"version\":
    \"$CI_COMMIT_TAG\"/g" package.json'
  - npm publish
  stage: deploy
image: node:alpine
lint:
  before_script: *id001
  cache: *id002
  script:
  - npm run lint
  stage: test
stages:
- test
- deploy
unit test:
  before_script: *id001
  cache: *id002
  script:
  - npm run test -- --color
  stage: test
