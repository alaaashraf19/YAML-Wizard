.default_before_script: &id001
- pip install -cconstraints.txt tox
build:
  artifacts:
    expire_in: 1 week
    paths:
    - dist
    when: always
  before_script:
  - *id001
  image: ${GITLAB_CI_IMAGE_PYTHON}
  needs:
  - artifacts: true
    job: compile
  script:
  - rm -rf dist
  - tox run -e "build"
  stage: build
compile:
  artifacts:
    expire_in: 1 week
    paths:
    - satnogsdecoders/decoder
    when: always
  image:
    entrypoint:
    - ''
    name: ${GITLAB_CI_IMAGE_KAITAI}
  needs: []
  script:
  - /usr/bin/ksc --target python --outdir satnogsdecoders/decoder ksy/*.ksy
  stage: compile
dependency_scanning:
  needs:
  - artifacts: true
    job: compile
  stage: security
  variables:
    DS_EXCLUDED_ANALYZERS: gemnasium-maven
deploy:
  before_script:
  - *id001
  image: ${GITLAB_CI_IMAGE_PYTHON}
  only:
    refs:
    - tags
    variables:
    - $PYPI_USERNAME
    - $PYPI_PASSWORD
  script:
  - rm -rf dist
  - tox run -e "upload"
  stage: deploy
deps:
  before_script:
  - *id001
  image: ${GITLAB_CI_IMAGE_PYTHON}
  needs:
  - artifacts: true
    job: compile
  script:
  - tox run -e "deps"
  stage: test
include:
- template: Workflows/MergeRequest-Pipelines.gitlab-ci.yml
- template: Security/Dependency-Scanning.gitlab-ci.yml
- template: Security/SAST.gitlab-ci.yml
- template: Security/Secret-Detection.gitlab-ci.yml
- file: .gitlab-ci-sign-off.yml
  project: librespacefoundation/templates/gitlab-ci
  ref: ed44d9741ba9d13ff097b85cbd6ce7c11af3ee8c
- file: .gitlab-ci-trigger.yml
  project: librespacefoundation/templates/gitlab-ci
  ref: ed44d9741ba9d13ff097b85cbd6ce7c11af3ee8c
sast:
  needs:
  - artifacts: true
    job: compile
  stage: security
secret_detection:
  needs:
  - artifacts: true
    job: compile
  stage: security
sign_off:
  needs: []
  stage: static
stages:
- compile
- static
- build
- test
- deploy
- trigger
- security
static:
  before_script:
  - *id001
  image: ${GITLAB_CI_IMAGE_PYTHON}
  needs:
  - artifacts: true
    job: compile
  script:
  - tox run-parallel -e "yamllint,flake8,isort,yapf,pylint"
  stage: static
test:
  before_script:
  - *id001
  image: ${GITLAB_CI_IMAGE_PYTHON}
  needs:
  - artifacts: true
    job: compile
  script:
  - tox run -e "pytest"
  stage: test
trigger:
  only:
    refs:
    - tags
    variables:
    - $PIPELINE_TRIGGERS
  stage: trigger
  variables:
    TRIGGER_SOURCE_VERSION: $CI_COMMIT_TAG
    TRIGGER_TARGET_GIT_URL: $SATNOGS_DB_GIT_URL
variables:
  GITLAB_CI_IMAGE_KAITAI: librespace/kaitai:0.10
  GITLAB_CI_IMAGE_PYTHON: python:3.9.12
  GITLAB_CI_SIGN_OFF_EXCLUDE: 5a731984a23981472ef1ec7fddfd2315fe82c9f5
