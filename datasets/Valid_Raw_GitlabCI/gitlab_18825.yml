.image_tamplate:
  script: &id001
  - pip install tox
  - tox
image: python:2-slim-jessie
release_tag:
  only:
  - tags
  script: *id001
  stage: release-tag
services:
- alias: docker_service_host
  name: docker:18.05-dind
stages:
- release-tag
- check-version
- release-version
variables:
  DOCKER_DRIVER: overlay2
