build:
  image: registry.gitlab.com/gitlab-org/cluster-integration/auto-build-image/master:stable
  only:
  - branches
  - tags
  script:
  - "if [[ -z \"$CI_COMMIT_TAG\" ]]; then\n  export CI_APPLICATION_REPOSITORY=${CI_APPLICATION_REPOSITORY:-$CI_REGISTRY_IMAGE/$CI_COMMIT_REF_SLUG}\n\
    \  export CI_APPLICATION_TAG=${CI_APPLICATION_TAG:-$CI_COMMIT_SHA}\nelse\n  export\
    \ CI_APPLICATION_REPOSITORY=${CI_APPLICATION_REPOSITORY:-$CI_REGISTRY_IMAGE}\n\
    \  export CI_APPLICATION_TAG=${CI_APPLICATION_TAG:-$CI_COMMIT_TAG}\nfi\n"
  - /build/build.sh
  services:
  - docker:stable-dind
  stage: build
  variables:
    DOCKER_TLS_CERTDIR: ''
