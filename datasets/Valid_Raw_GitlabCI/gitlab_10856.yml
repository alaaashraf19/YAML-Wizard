after_script:
- echo "End CI"
build:
  artifacts:
    expire_in: 1 week
    paths:
    - book.pdf
    - book.epub
    - book.html
    - book.xml
    - book-kf8.epub
    - book.mobi
    - images/icons/*
    - images/*
    - preview.html
  only:
  - master
  script:
  - ./build -g && ./build -pekdf book.adoc
  stage: build
image: asciidoctor/docker-asciidoctor:latest
stages:
- build
