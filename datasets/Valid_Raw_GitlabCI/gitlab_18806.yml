.branch_tests_template:
  before_script: &id003
  - "if [ \"${CI_COMMIT_REF_NAME}\" != \"master\" -a \"${CI_COMMIT_REF_NAME}\" !=\
    \ \"developer\" ]; then\n  export TOX_ARGS=\"--workdir /tmp/.tox_polemarch_${CI_COMMIT_REF_NAME}\"\
    ;\n  unset BUILD_OPTIMIZATION;\nfi\n"
  - if [ "${TOX_ENVS}" ]; then export TOX_ARGS="${TOX_ARGS} -e ${TOX_ENVS}"; fi
  coverage: /\d+\%\s*$/
  image: registry.gitlab.com/vstconsulting/images:ubuntu-v4
  rules: &id001
  - if: $CI_COMMIT_BRANCH == "master" || $CI_COMMIT_BRANCH =~ /^release_/
    when: on_success
  - if: ($CI_COMMIT_BRANCH != "master" && $CI_COMMIT_BRANCH !~ /^release_/) && ($CI_PIPELINE_SOURCE
      == "merge_request_event" || $CI_PIPELINE_SOURCE == "external_pull_request_event")
    when: on_success
  - if: $CI_PIPELINE_SOURCE == "web" && $CI_COMMIT_TAG == null
    when: on_success
  - when: never
  script: &id004
  - tox $TOX_ARGS
  stage: test
  variables: &id002
    TOX_ENVS: ''
    YARN_CACHE_FOLDER: ${CI_PROJECT_DIR}/yarn
.js_tests_template:
  before_script: &id005
  - yarn install --pure-lockfile --mutex network
  coverage: /\d+\%\s*$/
  image: registry.gitlab.com/vstconsulting/images:node20-tests
  rules: *id001
  script:
  - yarn test
  stage: test
  variables: *id002
code_style:
  before_script: *id003
  coverage: /\d+\%\s*$/
  image: registry.gitlab.com/vstconsulting/images:ubuntu-v4
  rules: *id001
  script: *id004
  stage: code_standarts
  variables:
    TOX_ENVS: flake,pylint
default:
  image: registry.gitlab.com/vstconsulting/images:ubuntu-v4
functional_test:
  before_script: *id003
  coverage: /\d+\%\s*$/
  image: registry.gitlab.com/vstconsulting/images:ubuntu-v4
  needs:
  - code_style
  parallel:
    matrix:
    - TOX_ENVS:
      - py310-install
    - TOX_ENVS:
      - py312-coverage
  rules: *id001
  script: *id004
  stage: test
  variables: *id002
js_style:
  before_script: *id005
  coverage: /\d+\%\s*$/
  image: registry.gitlab.com/vstconsulting/images:node20-tests
  rules: *id001
  script:
  - yarn lint
  stage: code_standarts
  variables: *id002
pages:
  artifacts:
    paths:
    - public
  rules:
  - if: $CI_COMMIT_BRANCH == "developer" && $GIT_ACCESS_USER && $GIT_ACCESS_PASSWORD
    when: always
  - when: never
  script:
  - tox -e builddoc $TOX_ARGS
  - mv doc/_build/html public
  stage: release
publish_docker:
  after_script:
  - werf cr login -u nobody -p ${WERF_IMAGES_CLEANUP_PASSWORD} ${CI_REGISTRY}
  - werf cleanup --repo=$WERF_REPO/storage
  before_script:
  - type werf && source $(werf ci-env gitlab --as-file)
  - werf version
  image: registry.werf.io/werf/werf
  rules:
  - if: $CI_COMMIT_TAG && $POLEMARCH_DOCKER_USER && $POLEMARCH_DOCKER_PASSWORD &&
      $POLEMARCH_DOCKER_IMAGE_NAME && $WERF_IMAGES_CLEANUP_PASSWORD
    when: on_success
  - when: never
  script:
  - werf cr login -u $POLEMARCH_DOCKER_USER -p $POLEMARCH_DOCKER_PASSWORD index.docker.io
  - werf export --repo=$WERF_REPO/storage --tag=$WERF_REPO:$CI_COMMIT_TAG --tag=index.docker.io/$POLEMARCH_DOCKER_IMAGE_NAME:$CI_COMMIT_TAG
  - werf export --repo=$WERF_REPO/storage --tag=$WERF_REPO:latest --tag=index.docker.io/$POLEMARCH_DOCKER_IMAGE_NAME:latest
  stage: publish
publish_release:
  allow_failure: true
  before_script:
  - git config --global user.name "${GITLAB_USER_NAME}"
  - git config --global user.email "${GITLAB_USER_EMAIL}"
  - git push https://${GITHUB_USER}:${GITHUB_TOKEN}@github.com/vstconsulting/polemarch.git
    ${CI_COMMIT_TAG} || echo "Failed to upload to github."
  image: registry.gitlab.com/vstconsulting/images:ubuntu-v4
  needs:
  - release_pypi
  rules:
  - if: $CI_COMMIT_TAG && $PYPI_UPLOAD_PASSWORD && $PYPI_UPLOAD_NAME
    when: on_success
  - when: never
  script:
  - tox -e release
  stage: publish
release:
  before_script:
  - url_host=`echo "${CI_REPOSITORY_URL}" | sed -e "s/https:\/\/gitlab-ci-token:.*@//g"`
  - git config --global user.name "${GITLAB_USER_NAME}"
  - git config --global user.email "${GITLAB_USER_EMAIL}"
  - git remote set-url origin "https://${GIT_ACCESS_USER}:${GIT_ACCESS_PASSWORD}@${url_host}"
  image: registry.gitlab.com/vstconsulting/images:ubuntu-v4
  rules:
  - if: $CI_COMMIT_BRANCH == "master" && $GIT_ACCESS_USER && $GIT_ACCESS_PASSWORD
    when: on_success
  - when: never
  script:
  - bash autorelease.sh
  stage: release
release_pypi:
  artifacts:
    name: release-packages-${CI_BUILD_REF_NAME}.${CI_BUILD_ID}
    paths:
    - dist/
  image: registry.gitlab.com/vstconsulting/images:manylinux_2_17
  rules:
  - allow_failure: true
    if: $CI_COMMIT_TAG && $PYPI_UPLOAD_PASSWORD && $PYPI_UPLOAD_NAME
    when: on_success
  - when: never
  script:
  - tox -c tox_build.ini $TOX_ARGS
  - twine upload -u ${PYPI_UPLOAD_NAME} -p ${PYPI_UPLOAD_PASSWORD} $(find dist/*.{tar.gz,whl})
  stage: release
  variables:
    TOX_ARGS: ''
stages:
- code_standarts
- build
- test
- packaging-test
- release
- publish
variables:
  ARTIFACT_DOWNLOAD_ATTEMPTS: 3
  CCACHE_DIR: /cache/.ccache
  DJANGO_LOG_LEVEL: DEBUG
  DOCKER_DRIVER: overlay2
  DOCKER_HOST: tcp://docker_service_host:2375
  DOCKER_TLS_CERTDIR: ''
  GET_SOURCES_ATTEMPTS: 3
  K8S_INGRESS_DOMAIN: polemarch-$KUBE_NAMESPACE.$KUBE_INGRESS_BASE_DOMAIN
  LANG: en_US.UTF-8
  LC_ALL: en_US.UTF-8
  REGISTRY_IMAGE: ${CI_REGISTRY_IMAGE}
  REGISTRY_IMAGE_TAG: ${KUBE_NAMESPACE}
  REGISTRY_PASSWORD: ${CI_REGISTRY_PASSWORD}
  REGISTRY_URL: ${CI_REGISTRY}
  REGISTRY_USER: ${CI_REGISTRY_USER}
  RESTORE_CACHE_ATTEMPTS: 3
  TOX_ARGS: --workdir /cache/.tox_polemarch_${CI_BUILD_REF_NAME}
