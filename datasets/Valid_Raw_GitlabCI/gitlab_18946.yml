check:
  image: rust:1.28
  script:
  - cargo rustc -- -D warnings
  stage: check
doc:
  image: rustlang/rust:nightly
  script:
  - cargo rustdoc -- --deny warnings
  stage: check
fmt:
  image: rustlang/rust:nightly
  script:
  - rustup component add rustfmt-preview
  - cargo fmt -- --check
  stage: check
stages:
- check
test:
  image: rust:1.28
  script:
  - cargo test
  stage: check
