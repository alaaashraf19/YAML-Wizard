.test:
  after_script: &id001
  - rm -rf .m2/repository/net/morimekta/providence/ || /bin/true
  before_script: &id002
  - apt update && apt install -y zip unzip
  coverage: /([0-9]{1,3}[.][0-9][0-9]) % covered/
  except: &id003
    variables:
    - $CI_COMMIT_MESSAGE =~ /\[silent-ignore\]/
    - $CI_COMMIT_MESSAGE =~ /\[maven-release-plugin\]/
  script: &id004
  - mkdir -p .m2/repository
  - mvn ${MAVEN_CLI_OPTS} ${MAVEN_NO_PACKAGING} ${MAVEN_NO_TESTS} install -Pgenerator-java
  - mvn ${MAVEN_CLI_OPTS} ${MAVEN_NO_PACKAGING} verify -Plib,cli,reporting
  - "awk -F\",\" '{ instructions += $4 + $5; covered += $5 } END { OFMT = \"%.2f\"\
    ; print covered, \"/\", instructions, \" instructions covered\"; print 100*covered/instructions,\
    \ \"% covered\" }' \\\n        */target/site/jacoco-ut/jacoco.csv || /bin/true\n"
  stage: testing
  variables: &id005
    IGNORE_HAZELCAST_TESTS: 'true'
cache:
  key: $CI_PROJECT_NAME
  paths:
  - .m2/repository
pages:
  artifacts:
    paths:
    - public
  dependencies:
  - test:jdk11
  except:
    variables:
    - $CI_COMMIT_MESSAGE =~ /\[silent-ignore\]/
    - $CI_COMMIT_MESSAGE =~ /\[maven-release-plugin\]/
  image: registry.gitlab.com/morimekta/utils-pom/mkdocs:latest
  only:
  - master
  script:
  - rm -rf public
  - mkdocs build
  - mv site public
  - mv reporting/target/site/jacoco-aggregate public/
  stage: post-release
stages:
- testing
- release
- post-release
test:jdk11:
  after_script: *id001
  artifacts:
    expire_in: 12 hours
    paths:
    - reporting/target/site/**/*
    reports:
      junit:
      - '*/target/surefire-reports/TEST-*.xml'
  before_script: *id002
  coverage: /([0-9]{1,3}[.][0-9][0-9]) % covered/
  except: *id003
  image: maven:3.6-openjdk-11-slim
  script: *id004
  stage: testing
  variables: *id005
test:jdk17:
  after_script: *id001
  before_script: *id002
  coverage: /([0-9]{1,3}[.][0-9][0-9]) % covered/
  except: *id003
  image: maven:3.8-openjdk-17-slim
  script: *id004
  stage: testing
  variables: *id005
test:jdk8:
  after_script: *id001
  before_script: *id002
  coverage: /([0-9]{1,3}[.][0-9][0-9]) % covered/
  except: *id003
  image: maven:3.6-openjdk-8-slim
  script: *id004
  stage: testing
  variables: *id005
variables:
  MAVEN_CLI_OPTS: -B -fae -T 1C
  MAVEN_NO_PACKAGING: -Ddisable.distribution.packaging=true
  MAVEN_NO_TESTS: -DskipTests=true
  MAVEN_OPTS: -Dhttps.protocols=TLSv1.2 -Dmaven.repo.local=.m2/repository -Dorg.slf4j.simpleLogger.log.org.apache.maven.cli.transfer.Slf4jMavenTransferListener=WARN
    -Djava.awt.headless=true
