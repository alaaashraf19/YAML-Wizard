.specs:
  before_script:
  - apt update
  - apt install python3 python3-pip python3-venv git build-essential -y
  - apt remove python -y
  - python3 -m venv /tmp/venv
  - source /tmp/venv/bin/activate
  - pip3 install docutils==$DOCUTILS_VERSION
  - bundle install --jobs $(nproc)
  cache:
    key: $CI_JOB_NAME
    paths:
    - vendor/ruby
  script:
  - echo "Testing without posix-spawn..."
  - cp Gemfile Gemfile.orig
  - sed -i -e '/posix-spawn/d' Gemfile
  - bundle install
  - bundle exec rake test
  - echo "Testing with posix-spawn..."
  - mv Gemfile.orig Gemfile
  - bundle install
  - bundle exec rake test
default:
  tags:
  - gitlab-org
gemnasium-dependency_scanning:
  rules: &id001
  - if: $CI_MERGE_REQUEST_IID
  - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  - if: $CI_COMMIT_TAG
include:
- template: SAST.gitlab-ci.yml
- template: Security/Dependency-Scanning.gitlab-ci.yml
- template: Security/Secret-Detection.gitlab-ci.yml
ruby-docutils-spec:
  extends: .specs
  image: ruby:$RUBY_VERSION
  parallel:
    matrix:
    - DOCUTILS_VERSION:
      - 0.21.2
      RUBY_VERSION:
      - '3.0'
      - '3.1'
      - '3.2'
      - '3.3'
      - '3.4'
secret_detection:
  rules: *id001
variables:
  LANG: C.UTF-8
workflow:
  rules: *id001
