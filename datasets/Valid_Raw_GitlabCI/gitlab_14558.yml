.pages:
  artifacts:
    paths:
    - public
  image: poffey21/nikola:7.8.10
  only:
  - master
  script:
  - cd pages && nikola build
  stage: deploy
app:
  image: poffey21/cfcli:6.32.0
  script:
  - echo ${PCF_APP_HOSTNAME}.${PCF_DOMAIN}
  - cf login -a $PCF_API_URL -o $PCF_ORG -s $PCF_SPACE -u $PCF_USER -p $PCF_PASS
  - cf push $PCF_APP_NAME --hostname $PCF_APP_HOSTNAME --no-start
  - cf set-env $PCF_APP_NAME DJANGO_SECRET_KEY $DJANGO_SECRET_KEY > /dev/null
  - cf start $PCF_APP_NAME
  stage: deploy
  variables:
    PCF_APP_HOSTNAME: $CI_PROJECT_PATH_SLUG
    PCF_APP_NAME: $CI_PROJECT_NAME
  when: manual
build:
  artifacts:
    paths:
    - binaries/
  except:
  - triggers
  script:
  - mkdir -p binaries
  - cp -R splash templates www Procfile manage.py manifest.yml requirements.txt runtime.txt
    uwsgi.ini binaries/
  stage: test
cache:
  paths:
  - ~/.cache/pip/
image: python:3.6.2
stages:
- test
- schedule
- deploy
trigger:
  except:
  - triggers
  script:
  - curl -X POST -F token=$TRIGGER_TOKEN -F "ref=$CI_COMMIT_REF_NAME" -F "variables[TRIGGER_VARIABLE]=setcurrently"
    $GITLAB_ORIGIN/api/v4/projects/$CI_PROJECT_ID/trigger/pipeline
  stage: schedule
  variables:
    GIT_STRATEGY: none
  when: manual
trigger_always:
  only:
  - triggers
  script:
  - 'curl --header "JOB-TOKEN: $CI_JOB_TOKEN" "$GITLAB_ORIGIN/api/v4/projects/$CI_PROJECT_ID/jobs/artifacts/master/download?job=build"  --output
    build.zip --silent'
  - ls -l
  - apt-get -qqy update && apt-get -qqy install unzip
  - unzip build.zip
  - ls binaries
  stage: deploy
  variables:
    GIT_STRATEGY: none
trigger_sample:
  only:
  - triggers
  script:
  - if [[ ! -z "$TRIGGER_VARIABLE" ]]; then echo "We will show this to be true only
    if TRIGGER_VARIABLE is set!"; fi
  stage: deploy
  variables:
    GIT_STRATEGY: none
trigger_without_sample:
  except:
  - triggers
  script:
  - curl -X POST -F token=$TRIGGER_TOKEN -F "ref=$CI_COMMIT_REF_NAME" $GITLAB_ORIGIN/api/v4/projects/$CI_PROJECT_ID/trigger/pipeline
  stage: schedule
  variables:
    GIT_STRATEGY: none
  when: manual
unit:
  except:
  - triggers
  script:
  - echo 'Currently disabling unit testing...'
  stage: test
variables:
  GITLAB_ORIGIN: https://gitlab.com
  PCF_API_URL: https://api.run.pivotal.io
  PCF_DOMAIN: cfapps.io
