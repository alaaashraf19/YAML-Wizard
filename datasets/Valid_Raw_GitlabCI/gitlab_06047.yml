nightly-intel:
  allow_failure: true
  before_script:
  - dnf upgrade -y -q
  - dnf install -y -q gcc gcc-c++ gcc-gfortran git make cmake python python3 redhat-rpm-config
    findutils which procps-ng coreutils
  - mv maintenance/oneAPI.repo /etc/yum.repos.d
  - dnf install -y intel-oneapi-compiler-fortran intel-oneapi-compiler-dpcpp-cpp-and-cpp-classic
    intel-oneapi-mkl intel-oneapi-mpi intel-oneapi-mpi-devel
  - set +e
  - . /opt/intel/inteloneapi/setvars.sh
  - set -e
  - uname -a
  - lscpu
  - free -h
  - ifx --version
  - icc --version
  - icpc --version
  - mpirun --version
  - python3 --version
  - git --version
  - cmake --version
  image: fedora:32
  rules:
  - if: $CI_PIPELINE_SOURCE == 'schedules'
  - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    when: never
  script:
  - python setup --fc=mpiifx --cc=mpiicc --cxx=mpiicpc --mpi --mkl=sequential --type=release
    -DSITE=GitLab -DBUILDNAME=$CI_COMMIT_REF_NAME-intel-mpi
  - cd build
  - export CTEST_MAKE_NUM_PROCS=4
  - ctest --output-on-failure -L dalton -M Nightly -T Build -T Test -T Submit
  tags:
  - parallel
  variables:
    DALTON_LAUNCHER: mpirun -n 4
    OMP_NUM_THREADS: '1'
