nightly-gcc-mpi:
  allow_failure: true
  image: fedora:31
  rules:
  - if: $CI_PIPELINE_SOURCE == 'schedules'
  - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    when: never
  script:
  - module load mpi/openmpi-x86_64
  - mpirun --version
  - export FFLAGS="-I/usr/lib64/gfortran/modules"
  - python setup --mpi --blas=none --lapack=none --explicit-libs="-lopenblas -llapack"
    --type=release -DENABLE_PDE=ON -DSITE=GitLab -DBUILDNAME=$CI_COMMIT_REF_NAME-gcc-mpi
  - cd build
  - export CTEST_MAKE_NUM_PROCS=4
  - ctest --output-on-failure -L dalton -M Nightly -T Build -T Test -T Submit
  tags:
  - parallel
  variables:
    DALTON_LAUNCHER: mpirun -n 4 --allow-run-as-root --oversubscribe --bind-to none
    OMP_NUM_THREADS: '1'
