.build:
  before_script:
  - if [ -n "${COMPILER_EDGE}" ]; then opam switch ${COMPILER_EDGE} && eval $(opam
    env); fi
  - opam update -y
  - opam install -y -v -j ${NJOBS} coq-mathcomp-ssreflect
  - opam config list
  - opam repo list
  - opam list
  image: coqorg/${CI_JOB_NAME}
  script:
  - sudo chown -R coq:coq "$CI_PROJECT_DIR"
  - coq_makefile -f _CoqProject -o Makefile
  - make -j "$NJOBS"
  - make install
  stage: build
coq:8.10:
  extends: .build
coq:8.11:
  extends: .build
coq:dev:
  extends: .build
stages:
- build
