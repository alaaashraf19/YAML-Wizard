before_script:
- export GRADLE_USER_HOME=`pwd`/.gradle
build:
  script: gradle --build-cache --full-stacktrace assemble
  stage: build
cache:
  paths:
  - .gradle/
  - build/
  - '*/build/'
image: gradle:7.6.4-jdk17
test:
  script:
  - gradle --build-cache --full-stacktrace check
  - gradle jacocoReport
  stage: test
variables:
  GRADLE_OPTS: -Dorg.gradle.daemon=false
