before_script:
- npm install
cache:
  paths:
  - node_modules
doc:
  artifacts:
    paths:
    - doc
  only:
  - tags
  - triggers
  script:
  - npm run doc
  stage: deploy
image: node:10
publish:
  only:
  - tags
  - triggers
  script:
  - npm run build
  - echo '//registry.npmjs.org/:_authToken=${NPM_TOKEN}'>.npmrc
  - npm publish
  stage: deploy
test:
  script:
  - npm run test
