before_script:
- apt-get update
- apt-get install -qq zim
- cp GitLabPagesTemplate.html /usr/share/zim/templates/html/GitLabPagesTemplate.html
image: debian:jessie
pages:
  artifacts:
    paths:
    - public
  rules:
  - if: $CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH
  script:
  - ./build_zim.sh
  stage: deploy
test:
  rules:
  - if: $CI_COMMIT_REF_NAME != $CI_DEFAULT_BRANCH
  script:
  - ./build_zim.sh
  stage: test
