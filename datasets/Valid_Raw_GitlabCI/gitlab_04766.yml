before_script:
- export _R_CHECK_CRAN_INCOMING_=FALSE
- export _R_CHECK_FORCE_SUGGESTS_=TRUE
- echo 'R_MAX_NUM_DLLS=500' >> ~/.Renviron
- export R_MAX_NUM_DLLS=500
- R -e 'install.packages(c("pdftools"))'
- R -e 'install.packages(c("factoextra"))'
image: itzlacoliuhque/con-campari:latest
pkg_check:
  script:
  - Rscript -e 'devtools::install(upgrade = F)'
  - Rscript -e 'devtools::check(cran = TRUE)'
  stage: check
pkg_codecov:
  script: Rscript -e "covr::codecov(quiet = F, token = '266db23c-b9d1-405f-9aef-c5889ea5227d')"
  stage: codecov
pkg_test:
  script:
  - pwd
  - ls
  - Rscript -e 'devtools::test()'
  stage: test
stages:
- test
- check
- codecov
