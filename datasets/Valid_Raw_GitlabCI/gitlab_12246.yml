image: dmoonfire/mfgames-writing-js:1.0.0
publish:
  artifacts:
    paths:
    - build
  environment:
    name: published
  only:
  - master
  script:
  - npm install
  - ./node_modules/.bin/mfgames-writing-format build
  stage: deploy
  tags:
  - docker
  when: manual
stage:
  artifacts:
    paths:
    - build
  environment:
    name: staging
  only:
  - master
  script:
  - npm install
  - ./node_modules/.bin/mfgames-writing-format build
  stage: deploy
  tags:
  - docker
stages:
- deploy
