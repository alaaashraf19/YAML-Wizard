before_script:
- which ssh-agent || ( apt-get update -y && apt-get install openssh-client -y )
- npm install
deploy:dev:
  only:
  - master
  script:
  - bash deploy/deploy.sh
  stage: deploy
image: node:8.9.0
lint:
  script:
  - npm run lint
  stage: test
stages:
- test
- deploy
test:
  script:
  - npm run test
  stage: test
