apply:
  only:
  - master
  script:
  - export PATH=$PATH:$(pwd)
  - ./terraform init
  - ./terraform apply
  stage: deploy
  when: manual
before_script:
- apk add --update curl unzip git openssh
- curl -O https://releases.hashicorp.com/terraform/0.9.8/terraform_0.9.8_linux_amd64.zip
- unzip terraform_0.9.8_linux_amd64.zip
image: alpine:latest
plan:
  script:
  - export PATH=$PATH:$(pwd)
  - ./terraform init
  - ./terraform plan
  stage: test
