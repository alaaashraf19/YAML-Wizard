.git_refs_develop_only:
  only: &id001
  - develop
.git_refs_of_releases:
  only: &id003
  - /^hotfix\/.+$/
  - /^release\/.+$/
  - /^support\/.*$/
.git_refs_of_snapshots:
  except: &id005
  - master
  - /^hotfix\/.+$/
  - /^release\/.+$/
  - /^support\/.*$/
  - /^v\d+\.\d+(\.\d+)?(-\S*)?/
.script_build:
  script: &id004
  - 'if [[ -z "${CI_OPT_MAVEN_EFFECTIVE_POM}" ]]; then export CI_OPT_MAVEN_EFFECTIVE_POM="true";
    fi;

    time ./mvnw ${MAVEN_GLOBAL_SETTINGS} -e -ntp -U clean verify;

    if type -p column > /dev/null; then find .mvn/profiler-report -name "*.json" |
    xargs cat | jq -r ''.projects[]|"module:", .project, "plugins", (.mojos[]|[.mojo,.time]|@tsv)''
    | column -t; fi; rm -rf .mvn/profiler-report;

    echo archive $(git ls-files -o | grep -Ev ''.+-exec\.jar'' | grep -v ''artifacts.tar.gz''
    | grep -v ''profiler-report'' | wc -l) files into artifacts.tar.gz;

    git ls-files -o | grep -Ev ''.+-exec\.jar'' | grep -v ''artifacts.tar.gz'' | grep
    -v ''profiler-report'' | tar -czf artifacts.tar.gz -T -;

    #git ls-files -o | grep -Ev ''.+-exec\.jar'' | grep -v ''artifacts.tar.gz'' |
    grep -v ''profiler-report'' | xargs rm -f;

    '
.script_publish:
  script: &id006
  - 'if [ -f artifacts.tar.gz ]; then tar -xzf artifacts.tar.gz; fi; ls -ahl;

    time CI_OPT_FAST="true" ./mvnw ${MAVEN_GLOBAL_SETTINGS} -e -ntp -U -Dmaven.clean.skip=true
    deploy;

    if type -p column > /dev/null; then find .mvn/profiler-report -name "*.json" |
    xargs cat | jq -r ''.projects[]|"module:", .project, "plugins", (.mojos[]|[.mojo,.time]|@tsv)''
    | column -t; fi; rm -rf .mvn/profiler-report;


    time CI_OPT_FAST="true" CI_OPT_INFRASTRUCTURE="custom" CI_OPT_MAVEN_PACKAGES_SKIP="true"
    CI_OPT_MVN_DEPLOY_PUBLISH_SEGREGATION="true" CI_OPT_NEXUS2_STAGING="false" ./mvnw
    ${MAVEN_GLOBAL_SETTINGS} -e -ntp -Dmaven.clean.skip=true -Dmaven.install.skip=true
    deploy;

    if type -p column > /dev/null; then find .mvn/profiler-report -name "*.json" |
    xargs cat | jq -r ''.projects[]|"module:", .project, "plugins", (.mojos[]|[.mojo,.time]|@tsv)''
    | column -t; fi; rm -rf .mvn/profiler-report;


    echo archive $(git ls-files -o | grep -Ev ''.+-exec\.jar'' | grep -v ''artifacts.tar.gz''
    | grep -v ''profiler-report'' | wc -l) files into artifacts.tar.gz;

    git ls-files -o | grep -Ev ''.+-exec\.jar'' | grep -v ''artifacts.tar.gz'' | grep
    -v ''profiler-report'' | tar -czf artifacts.tar.gz -T -;

    '
.script_site:
  script: &id007
  - 'if [ -f artifacts.tar.gz ]; then tar -xzf artifacts.tar.gz; fi; ls -ahl;

    time ./mvnw ${MAVEN_GLOBAL_SETTINGS} -e -ntp -Dmaven.clean.skip=true -DskipITs=true
    -DskipTests=true site-deploy;

    if type -p column > /dev/null; then find .mvn/profiler-report -name "*.json" |
    xargs cat | jq -r ''.projects[]|"module:", .project, "plugins", (.mojos[]|[.mojo,.time]|@tsv)''
    | column -t; fi; rm -rf .mvn/profiler-report;

    '
.upload_files_for_latter_stages:
  artifacts: &id002
    expire_in: 1 day
    paths:
    - artifacts.tar.gz
analysis:
  dependencies:
  - build_snapshots
  only: *id001
  script:
  - 'if [ -f artifacts.tar.gz ]; then tar -xzf artifacts.tar.gz; fi; ls -ahl;

    time CI_OPT_SONAR="true" ./mvnw ${MAVEN_GLOBAL_SETTINGS} -e -ntp -Dmaven.clean.skip=true
    sonar:sonar;

    if type -p column > /dev/null; then find .mvn/profiler-report -name "*.json" |
    xargs cat | jq -r ''.projects[]|"module:", .project, "plugins", (.mojos[]|[.mojo,.time]|@tsv)''
    | column -t; fi; rm -rf .mvn/profiler-report;

    '
  stage: analysis
  variables:
    GIT_STRATEGY: fetch
before_script:
- if [ -f ~/env ]; then source ~/env; fi;
- set -ex;
- 'echo "HOST_HOSTNAME ''${HOST_HOSTNAME}'', HOST_IPADDRESS ''${HOST_IPADDRESS}''";

  echo working directory `pwd`;

  echo CI_PROJECT_URL ${CI_PROJECT_URL} CI_COMMIT_REF_NAME ${CI_COMMIT_REF_NAME},
  CI_COMMIT_SHA ${CI_COMMIT_SHA}, CI_PROJECT_NAME ${CI_PROJECT_NAME}, CI_PROJECT_NAMESPACE
  ${CI_PROJECT_NAMESPACE};

  '
- 'export CI_OPT_MVN_DEPLOY_PUBLISH_SEGREGATION="true";

  source circ.sh;

  '
- 'rm -rf ~/.m2/repository/top/infra/maven/maven-build-extension;

  if [[ -z "${MAVEN_OPTS}" ]]; then export MAVEN_OPTS="-XX:+UseParallelGC -Dprofile=title
  -DprofileFormat=JSON,HTML"; fi;

  ls -ahl ~/.m2;

  ./mvnw ${MAVEN_GLOBAL_SETTINGS} -version;

  '
build_releases:
  artifacts: *id002
  only: *id003
  script: *id004
  stage: build
  variables:
    GIT_STRATEGY: fetch
build_snapshots:
  artifacts: *id002
  except: *id005
  script: *id004
  stage: build
  variables:
    GIT_STRATEGY: fetch
publish_releases:
  artifacts: *id002
  dependencies:
  - build_releases
  only: *id003
  script: *id006
  stage: publish
  variables:
    GIT_STRATEGY: fetch
publish_snapshots:
  artifacts: *id002
  dependencies:
  - build_snapshots
  except: *id005
  script: *id006
  stage: publish
  variables:
    GIT_STRATEGY: fetch
site_releases:
  dependencies:
  - publish_releases
  only: *id003
  script: *id007
  stage: site
  variables:
    GIT_STRATEGY: fetch
site_snapshots:
  dependencies:
  - publish_snapshots
  only: *id001
  script: *id007
  stage: site
  variables:
    GIT_STRATEGY: fetch
stages:
- build
- analysis
- publish
- site
