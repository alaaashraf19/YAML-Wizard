build:
  image: microsoft/aspnetcore-build:2.0
  only:
  - master
  script:
  - dotnet restore src/PipelineSample.sln
  - dotnet build -c Release src/PipelineSample.sln
  stage: build
builddockerimage:
  dependencies:
  - publish
  image: docker:latest
  script:
  - ls -la
  - ls -la src/output
  - docker --version
  stage: builddocker
deploy_staging:
  environment:
    name: staging
    url: https://staging.example.com
  only:
  - master
  script:
  - echo "Deploy to staging server"
  stage: deploy
publish:
  artifacts:
    paths:
    - src/output
  dependencies:
  - build
  image: microsoft/aspnetcore-build:2.0
  script:
  - dotnet publish -c Release -o ../output src/PipelineSample.WebApi/PipelineSample.WebApi.csproj
  stage: publish
stages:
- build
- test
- publish
- builddocker
- push
- deploy
test:integrationtests:
  dependencies:
  - build
  image: microsoft/aspnetcore-build:2.0
  script:
  - dotnet test --logger:"trx;LogFileName=testresult_integration.trx" --results-directory
    "../" src/PipelineSample.WebApi.Tests.Integration/PipelineSample.WebApi.Tests.Integration.csproj
  stage: test
test:unittests:
  dependencies:
  - build
  image: microsoft/aspnetcore-build:2.0
  script:
  - dotnet test --logger:"trx;LogFileName=testresult.trx" --results-directory "../"
    src/PipelineSample.WebApi.Tests/PipelineSample.WebApi.Tests.csproj
  stage: test
