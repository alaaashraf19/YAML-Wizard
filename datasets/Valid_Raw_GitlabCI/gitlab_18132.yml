build:
  artifacts:
    paths:
    - public
  only:
  - develop
  - master
  script:
  - echo "module.exports = '/$CI_BUILD_REF_NAME';" > pathPrefix.js
  - yarn install
  - npm run build || true && npm run clean
  - npm run build
  stage: build
cache:
  paths:
  - node_modules/
deploy:
  environment: staging
  image: python:latest
  only:
  - develop
  script:
  - pip install awscli
  - aws s3 cp ./public s3://$S3_BUCKET_NAME/ --recursive
  stage: deploy
image: node:latest
pages:
  artifacts:
    paths:
    - public
  environment: production
  only:
  - master
  script:
  - echo "publish done."
  stage: pages
review deploy:
  environment: review
  image: python:latest
  only:
  - /^text\/.*$/
  - /^feature\/.*$/
  - /^release\/.*$/
  - /^hotfix\/.*$/
  script:
  - pip install awscli
  - aws s3 cp ./public s3://$S3_BUCKET_NAME/$CI_BUILD_REF_NAME --recursive
  stage: deploy
review_build:
  artifacts:
    paths:
    - public
  except:
  - develop
  - master
  script:
  - echo "module.exports = '$CI_BUILD_REF_NAME';" > pathPrefix.js
  - yarn install
  - npm run build || true && npm run clean
  - npm run review_build
  stage: build
stages:
- build
- test
- deploy
- pages
