image: python:2.7.15-jessie
push to pypi:
  only:
  - tags
  script:
  - git pull origin master
  - python setup.py sdist bdist_wheel
  - pip install twine
  - twine upload -u $USERNAME -p $PASSWORD dist/*
  stage: publish
stages:
- upvers
- publish
update version:
  only:
  - tags
  script:
  - pip install requests
  - python publish.py
  stage: upvers
