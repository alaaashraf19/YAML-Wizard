before_script:
- apt update -qq
- apt install -y -qq autoconf automake autopoint dh-autoreconf cppcheck gettext autoconf
  pkg-config libtool m4 autotools-dev perl
- apt install -y -qq help2man asciidoctor asciidoc-base
- apt install -y -qq libsensors4-dev libgtop2-dev libudisks2-dev libatasmart-dev libxnvctrl-dev
- apt install -y -qq libgtk-3-dev libnotify-dev libappindicator3-dev
- apt install -y -qq libmicrohttpd-dev libjson-c-dev libcurl4-gnutls-dev
- autoreconf -i
build:
  script:
  - ./configure
  - make clean all
  stage: build
build-check:
  script:
  - ./configure
  - make clean all
  - make check
  stage: test
build-distcheck:
  script:
  - ./configure
  - make clean all
  - make distcheck
  stage: test
build-without-gsettings:
  script:
  - ./configure --with-gsettings=no
  - make clean all
  stage: test
dist:
  script:
  - ./configure
  - make clean all
  - make dist
  stage: dist
image: debian:stable
stages:
- build
- test
- dist
