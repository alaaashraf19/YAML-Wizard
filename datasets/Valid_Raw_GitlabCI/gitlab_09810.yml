push:
  image: harbottle/puppet-mattermost:latest
  only:
  - master@harbottle/puppet-mattermost
  script:
  - rm -f Vagrantfile
  - rm -rf vagrant
  - bundle exec rake module:push
  stage: push
  when: manual
stages:
- test
- push
test:
  image: harbottle/puppet-mattermost:latest
  script:
  - bundle exec rake spec
  stage: test
