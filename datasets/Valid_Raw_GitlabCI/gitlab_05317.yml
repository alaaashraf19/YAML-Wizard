.job_template:
  cache: &id001
    paths:
    - target/
    - cargo/
  script: &id002
  - cargo test --verbose --jobs 1 --release
before_script:
- rustc --version
- cargo --version
test:beta:
  cache: *id001
  image: scorpil/rust:beta
  script: *id002
test:nightly:
  cache: *id001
  image: scorpil/rust:nightly
  script: *id002
test:stable:
  cache: *id001
  image: scorpil/rust:stable
  script: *id002
variables:
  CARGO_HOME: $CI_PROJECT_DIR/cargo
