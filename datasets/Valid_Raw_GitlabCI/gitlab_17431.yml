before_script:
- apt-get update
- apt-get install -y build-essential postgresql-client git
- mix local.hex --force
- mix local.rebar
- mix deps.get
- mix ecto.create
- mix ecto.migrate
image: elixir
services:
- postgres:latest
test:
  script:
  - mix test
variables:
  MIX_ENV: test
  POSTGRES_DB: grow_journal_test
  POSTGRES_HOST: postgres
  POSTGRES_PASSWORD: ''
  POSTGRES_USER: postgres
