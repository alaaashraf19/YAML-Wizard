before_script:
- apk --update-cache add postgresql-client build-base gcc abuild binutils
- mix local.rebar --force
- mix local.hex --force
- mix deps.get
- mix ecto.reset
image: elixir:1.12-alpine
services:
- postgres:alpine
test:
  script:
  - mix test
variables:
  MIX_ENV: test
  POSTGRES_PASSWORD: postgres
