build-chrome-extension:
  artifacts:
    name: chrome_$CI_COMMIT_REF_NAME
    paths:
    - ./*
  except:
  - schedules
  image: psono-docker.jfrog.io/ubuntu:22.04
  only:
  - branches@esaqa/psono/psono-client
  - /^v[0-9]*\.[0-9]*\.[0-9]*$/
  script:
  - apt-get update && apt-get install -y curl
  - sh ./var/download_translations_from_artifactory.sh
  - sh ./var/prep-build.sh
  - node var/update_public_suffix_list.js
  - npm run buildchrome
  - sh ./var/package-chrome-extension.sh
  - "if [ ! -z \"$artifactory_credentials\" ]; then\n  curl -fL https://getcli.jfrog.io\
    \ | sh &&\n  ./jfrog config add rt-server-1 --artifactory-url=https://psono.jfrog.io/psono\
    \ --user=gitlab --password=$artifactory_credentials --interactive=false &&\n \
    \ ./jfrog rt u --target-props=\"CI_COMMIT_REF_NAME=$CI_COMMIT_REF_NAME;CI_COMMIT_SHA=$CI_COMMIT_SHA;CI_COMMIT_URL=$CI_PROJECT_URL/commit/$CI_COMMIT_SHA;CI_PROJECT_ID=$CI_PROJECT_ID;CI_PROJECT_NAME=$CI_PROJECT_NAME;CI_PROJECT_NAMESPACE=$CI_PROJECT_NAMESPACE;CI_PROJECT_URL=$CI_PROJECT_URL;CI_PIPELINE_ID=$CI_PIPELINE_ID;CI_PIPELINE_URL=$CI_PROJECT_URL/pipelines/$CI_PIPELINE_ID;CI_COMMIT_REF_NAME=$CI_COMMIT_REF_NAME;CI_JOB_ID=$CI_JOB_ID;CI_JOB_URL=$CI_PROJECT_URL/-/jobs/$CI_JOB_ID;CI_JOB_NAME=$CI_JOB_NAME;CI_JOB_STAGE=$CI_JOB_STAGE;CI_RUNNER_ID=$CI_RUNNER_ID;GITLAB_USER_ID=$GITLAB_USER_ID;CI_SERVER_VERSION=$CI_SERVER_VERSION\"\
    \ /builds/esaqa/psono/psono-client/dist/chrome/psono.chrome.PW.zip psono/client/$CI_COMMIT_REF_NAME/chrome-extension.zip\
    \ &&\n  ./jfrog rt sp \"psono/client/$CI_COMMIT_REF_NAME/chrome-extension.zip\"\
    \ \"CI_COMMIT_TAG=$CI_COMMIT_TAG\" || true\nfi\n"
  - mv /builds/esaqa/psono/psono-client/build/chrome ../
  - rm -Rf *
  - rm -Rf .* 2> /dev/null || true
  - mv ../chrome/* ./
  stage: build
build-docker-image:
  except:
  - schedules
  image: psono-docker.jfrog.io/ubuntu:22.04
  only:
  - branches@esaqa/psono/psono-client
  - /^v[0-9]*\.[0-9]*\.[0-9]*$/
  script:
  - apt-get update && apt-get install -y curl iptables libdevmapper1.02.1
  - sh ./var/download_translations_from_artifactory.sh
  - sh ./var/prep-build.sh
  - npm run buildwebclient
  - curl -fSL "https://download.docker.com/linux/ubuntu/dists/jammy/pool/stable/amd64/containerd.io_1.6.28-1_amd64.deb"
    -o containerd.deb && echo "3fcc3e44e6d507c346ae05bbaef8f4bb04dfa8da9f04af658537f7e373c91340
    containerd.deb" | sha256sum -c -
  - curl -fSL "https://download.docker.com/linux/ubuntu/dists/jammy/pool/stable/amd64/docker-buildx-plugin_0.12.1-1~ubuntu.22.04~jammy_amd64.deb"
    -o docker-buildx-plugin.deb && echo "3fb7cd11fd9bf7c31d81c1afa96c023519d9e6e17422192aa4d0aa2767ed0776
    docker-buildx-plugin.deb" | sha256sum -c -
  - curl -fSL "https://download.docker.com/linux/ubuntu/dists/jammy/pool/stable/amd64/docker-ce-cli_25.0.3-1~ubuntu.22.04~jammy_amd64.deb"
    -o docker-ce-cli.deb && echo "624abe860a3d9dd190c278263b3ae115d54ce1135774a79f84026a6ec6ebafd1
    docker-ce-cli.deb" | sha256sum -c -
  - curl -fSL "https://download.docker.com/linux/ubuntu/dists/jammy/pool/stable/amd64/docker-ce_25.0.3-1~ubuntu.22.04~jammy_amd64.deb"
    -o docker-ce.deb && echo "63c7703814558a829ab3cc37c8018c050c9dad56f99c261090500f6c87821fd1
    docker-ce.deb" | sha256sum -c -
  - dpkg -i ./containerd.deb ./docker-ce.deb ./docker-ce-cli.deb ./docker-buildx-plugin.deb
  - docker info
  - echo $CI_JOB_TOKEN | docker login --username=gitlab-ci-token --password-stdin
    registry.gitlab.com
  - docker context create builder
  - docker buildx create builder --use
  - docker buildx build --platform linux/amd64,linux/arm64 -t $CONTAINER_TEST_IMAGE
    --push --pull .
  services:
  - alias: docker
    command:
    - --tls=false
    name: docker:25-dind
  stage: build
  variables:
    DOCKER_DRIVER: overlay2
    DOCKER_HOST: tcp://docker:2375/
    DOCKER_TLS_CERTDIR: ''
build-electron-linux:
  artifacts:
    expire_in: 1 week
    name: electron_linux_$CI_COMMIT_REF_NAME
    paths:
    - ./*
  except:
  - schedules
  image: psono-docker.jfrog.io/ubuntu:22.04
  only:
  - develop@esaqa/psono/psono-client
  - master@esaqa/psono/psono-client
  - /^v[0-9]*\.[0-9]*\.[0-9]*$/
  script:
  - apt-get update && apt-get install -y curl rpm
  - sh ./var/download_translations_from_artifactory.sh
  - sh ./var/prep-build.sh
  - apt-get install -y rpm
  - npm run buildelectron
  - mkdir -p src/electron/src
  - cp -R build/electron/* src/electron/src
  - cd src/electron/
  - npm ci
  - npm run build
  - cd ../..
  - mv ./src/electron/dist ../
  - rm -Rf *
  - rm -Rf .* 2> /dev/null || true
  - mv ../dist/* ./
  stage: build
build-electron-macos:
  artifacts:
    expire_in: 1 week
    name: electron_macos_$CI_COMMIT_REF_NAME
    paths:
    - ./*
  except:
  - schedules
  only:
  - develop@esaqa/psono/psono-client
  - master@esaqa/psono/psono-client
  - /^v[0-9]*\.[0-9]*\.[0-9]*$/
  script:
  - sh ./var/download_translations_from_artifactory.sh
  - npm ci
  - npm run buildelectron
  - mkdir -p src/electron/src
  - cp -R build/electron/* src/electron/src
  - cd src/electron/
  - npm ci
  - npm install appdmg@0.6.6
  - echo "$APPLE_CERTIFICATE_P12" | base64 -d > certificate.p12
  - sha256sum certificate.p12
  - echo -n "$APPLE_CERTIFICATE_P12_PASSWORD" | sha256sum
  - curl -fL -o DeveloperIDG2CA.cer "https://www.apple.com/certificateauthority/DeveloperIDG2CA.cer"
  - security create-keychain -p temp_password build.keychain
  - security list-keychains -s build.keychain
  - security default-keychain -s build.keychain
  - security unlock-keychain -p temp_password build.keychain
  - security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_P12_PASSWORD"
    -T /usr/bin/codesign
  - 'security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k temp_password
    build.keychain'
  - security add-certificates -k build.keychain "DeveloperIDG2CA.cer"
  - security find-identity -p codesigning
  - security find-identity -p codesigning -v
  - npm run build
  - cd ../..
  - mv ./src/electron/dist ../
  - rm -Rf *
  - rm -Rf .* 2> /dev/null || true
  - mv ../dist/* ./
  stage: build
  tags:
  - saas-macos-medium-m1
  variables:
    CSC_KEYCHAIN: build.keychain
build-electron-windows:
  artifacts:
    expire_in: 1 week
    name: electron_windows_$CI_COMMIT_REF_NAME
    paths:
    - ./*
  except:
  - schedules
  only:
  - develop@esaqa/psono/psono-client
  - master@esaqa/psono/psono-client
  - /^v[0-9]*\.[0-9]*\.[0-9]*$/
  script:
  - .\var\download_translations_from_artifactory.ps1
  - npm ci
  - npm run buildelectron
  - mkdir -p src/electron/src
  - cp -R build/electron/* src/electron/src
  - cd src/electron/
  - npm ci
  - npm run build
  - cd ../..
  - mv ./src/electron/dist ../
  - rm -r -force ./*
  - mv ../dist/* ./
  - rm -r -force ../dist
  stage: build
  tags:
  - saas-windows-medium-amd64
