build:
  artifacts:
    paths:
    - Calculator.class
  script:
  - javac -Xlint Calculator.java
  stage: build
image: openjdk
module tests:
  script:
  - test $(java Calculator 1 + 1) = 2
  - test $(java Calculator 100 - 10) = 90
  - test $(java Calculator 25 \* 5) = 125
  - (! java Calculator 30 / 5)
  stage: test
stages:
- build
- test
