before_script:
- apt-get update
- apt-get install --yes ruby-dev ruby
- gem install bundler
- pip install tox==2.3
- bundle install --path vendor --binstubs vendor/bin
- make bootstrap
feature:
  script:
  - make feature
  stage: test
image: python:3.5
publish_binary:
  only:
  - master
  script:
  - make publish-binary
  stage: publish
publish_pypi:
  only:
  - master
  script:
  - make publish-pypi
  stage: publish
stages:
- test
- publish
variables:
  AWS_ACCESS_KEY_ID: SECURE
  AWS_SECRET_ACCESS_KEY: SECURE
  TWINE_PASSWORD: SECURE
  TWINE_USERNAME: SECURE
