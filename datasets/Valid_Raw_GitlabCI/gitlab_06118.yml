pages:
  artifacts:
    paths:
    - public
  image: node:6
  only:
  - master
  script:
  - 'set -o errexit

    cd site

    npm install

    make

    cd ..

    cp -a site/static public

    rm -f public/schemas

    cp -a d3m_metadata/schemas public/schemas

    '
  stage: deploy
style_check:
  image: registry.gitlab.com/datadrivendiscovery/images/testing:ubuntu-xenial-python36
  script:
  - pycodestyle d3m_metadata
  stage: build
tests:
  image: registry.gitlab.com/datadrivendiscovery/images/testing:ubuntu-xenial-python36
  script:
  - python3 setup.py sdist
  - pip3 install --process-dependency-links dist/*
  - rm -rf d3m_metadata
  - python3 ./run_tests.py
  stage: build
  variables:
    GIT_SUBMODULE_STRATEGY: recursive
trigger_images_rebuild:
  image: registry.gitlab.com/datadrivendiscovery/images/testing:ubuntu-xenial-python36
  only:
  - devel
  script:
  - if [ -n "$TRIGGER_TOKEN" ]; then curl -X POST -F token=$TRIGGER_TOKEN -F ref=master
    -F variables[REBUILD_IMAGE]=core:ubuntu-xenial-python36-devel https://gitlab.com/api/v4/projects/5024100/trigger/pipeline;
    fi
  stage: deploy
type_check:
  image: registry.gitlab.com/datadrivendiscovery/images/testing:ubuntu-xenial-python36
  script:
  - git clone https://gitlab.com/datadrivendiscovery/primitive-interfaces.git
  - cd primitive-interfaces
  - git checkout ${DEPENDENCY_REF}
  - cd ..
  - MYPYPATH=primitive-interfaces mypy d3m_metadata
  stage: build
  variables:
    DEPENDENCY_REF: devel
