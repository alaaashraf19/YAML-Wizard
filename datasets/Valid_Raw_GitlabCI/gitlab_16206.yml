.ruby_test:
  script: &id001
  - gem install bundler rake
  - bundle install --jobs $(nproc) --path vendor
  - bundle exec rake
cucumber:
  script:
  - gem install bundler
  - bundle install
  - bundle exec cucumber
  stage: test
docker_build:
  image: docker:20.10.11
  needs: []
  only:
  - master
  script:
  - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  - docker pull --quiet $CI_REGISTRY_IMAGE:latest || true
  - docker build -t $CI_REGISTRY_IMAGE:latest .
  - docker push $CI_REGISTRY_IMAGE:latest
  services:
  - docker:20.10.11-dind
  stage: deploy
  variables:
    DOCKER_HOST: tcp://docker:2376
    DOCKER_TLS_CERTDIR: /certs
doctest:
  script:
  - gem install bundler
  - bundle install
  - bundle exec rake yard:doctest
  stage: test
image: ruby:3.3
include:
- template: Code-Quality.gitlab-ci.yml
pages:
  artifacts:
    expire_in: 30 days
    paths:
    - public
  dependencies:
  - ruby_3.3
  only:
  - master
  script:
  - mv demo/ public/
  - mv coverage/ public/coverage
  stage: deploy
ruby_3.0:
  image: ruby:3.0
  script: *id001
  stage: test
ruby_3.3:
  image: ruby:3.3
  script: *id001
  stage: test
