libchaos:linux-gcc:
  artifacts:
    paths:
    - build/chaos/libchaos.a
    - build/chaos/libchaos.so
    - build/tests/testchaos
  before_script:
  - yum install -y gcc gcc-c++ cmake make openssl-devel libpng-devel libjpeg-devel
    libwebp-devel
  image: fedora
  script:
  - mkdir build
  - cd build
  - cmake -D CMAKE_BUILD_TYPE="Release" ..
  - make
  stage: build
  tags:
  - linux
stages:
- build
- test
test:linux-gcc:
  before_script:
  - yum install -y libstdc++ openssl libpng libjpeg libwebp
  dependencies:
  - libchaos:linux-gcc
  image: fedora
  script:
  - cd build/tests
  - ./testchaos
  stage: test
  tags:
  - linux
  variables:
    GIT_STRATEGY: none
