docs-dissertation:
  artifacts:
    expire_in: 1 week
    paths:
    - dissertation/*.pdf
    - dissertation/*.log
  image: aergus/latex
  only:
  - dissertation
  script:
  - cd dissertation
  - latexmk -pdf
  stage: docs
python_docs:
  artifacts:
    expire_in: 1 week
    paths:
    - docs/_build/html/*
  image: python:3.6.5-alpine
  only:
  - master
  - tags
  script:
  - apk --no-cache add make
  - apk --no-cache add git
  - pip install sphinx sphinx_rtd_theme requests
  - pip install -r requirements.txt
  - cd docs
  - make html
  stage: docs
python_tests:
  artifacts:
    expire_in: 1 week
    paths:
    - cover/*
  except:
  - dissertation
  image: python:3.6.5-alpine
  script:
  - apk --no-cache add git
  - pip install nose coverage requests
  - pip install -r requirements.txt
  - nosetests
  stage: tests
stages:
- tests
- docs
