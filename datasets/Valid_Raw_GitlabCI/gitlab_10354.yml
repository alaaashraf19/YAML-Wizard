.pages:
  artifacts:
    paths:
    - public
  image: rustdocker/rust:stable
  only:
  - master
  script:
  - cargo doc
  - rm -rf public
  - mkdir public
  - cp -R target/doc/* public
  stage: deploy
beta:
  image: rustdocker/rust:beta
  script:
  - cargo test --verbose --jobs 1 --release
  stage: test
nightly:
  image: rustdocker/rust:nightly
  script:
  - cargo test --verbose --jobs 1 --release
  stage: test
stable:
  image: rustdocker/rust:stable
  script:
  - cargo test --verbose --jobs 1 --release
  stage: test
stages:
- test
- deploy
