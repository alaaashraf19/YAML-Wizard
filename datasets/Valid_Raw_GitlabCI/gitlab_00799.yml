before_script:
- sh .gitlab-ci.sh
phpunit:php5.6:mysql5.6:
  image: php:5.6
  script:
  - php vendor/bin/phpunit --colors
  services:
  - mysql:5.6
phpunit:php7.0:mysql5.6:
  image: php:7.0
  script:
  - php vendor/bin/phpunit --colors
  services:
  - mysql:5.6
variables:
  MYSQL_DATABASE: almond
  MYSQL_ROOT_PASSWORD: secret
