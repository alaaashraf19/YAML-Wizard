build:
  artifacts:
    paths:
    - target/release/discord-markov-bot
  before_script:
  - apt-get update -qq && apt-get install -y -qq libssl-dev pkg-config
  - cargo --version
  - rustc --version
  - cargo update
  cache:
    paths:
    - target/
    - cargo/
    untracked: true
  image: rust
  only:
  - master
  script:
  - cargo build --release
  stage: build
check:
  before_script:
  - apt-get update -qq && apt-get install -y -qq libssl-dev pkg-config
  - cargo --version
  - rustc --version
  - cargo update
  cache:
    paths:
    - target/
    - cargo/
    untracked: true
  image: rust
  only:
  - dev
  script:
  - rustup component add clippy
  - cargo clippy
  stage: check
stages:
- build
- check
- deploy
variables:
  CARGO_HOME: $CI_PROJECT_DIR/cargo
