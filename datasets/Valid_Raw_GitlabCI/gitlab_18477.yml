publish_pypi:
  before_script:
  - pip install twine
  - python setup.py sdist
  image: python:3.7-alpine
  only:
  - tags
  script:
  - twine upload dist/*
  stage: publish
  variables:
    TWINE_PASSWORD: $LIVE_PYPI_PASSWORD
    TWINE_USERNAME: $LIVE_PYPI_USERNAME
stages:
- test
- publish
test_tox_34:
  before_script:
  - pip install tox
  image: python:3.4-alpine
  script:
  - tox -e py34
  stage: test
test_tox_35:
  before_script:
  - pip install tox
  image: python:3.5-alpine
  script:
  - tox -e py35
  stage: test
test_tox_36:
  before_script:
  - pip install tox
  image: python:3.6-alpine
  script:
  - tox -e py36
  stage: test
test_tox_37:
  before_script:
  - pip install tox
  image: python:3.7-alpine
  script:
  - tox -e py37
  stage: test
