.deploy:
  before_script: &id001
  - oc login "$OPENSHIFT_SERVER" --token="$OPENSHIFT_TOKEN" --insecure-skip-tls-verify
  - oc project "$CI_PROJECT_NAME" 2> /dev/null || oc new-project "$CI_PROJECT_NAME"
  image: ayufan/openshift-cli
  script: &id002
  - oc get services $APP 2> /dev/null || oc new-app . --name=$APP --strategy=docker
  - oc get routes $APP 2> /dev/null || oc expose service $APP --hostname=$APP_HOST
  - oc start-build $APP --from-dir=. --wait
build:
  script:
  - echo build
  stage: build
image: alpine
production:
  before_script: *id001
  environment:
    name: production
    url: http://$CI_PROJECT_NAME.$OPENSHIFT_DOMAIN
  image: ayufan/openshift-cli
  only:
  - master
  script: *id002
  stage: production
  variables:
    APP: production
    APP_HOST: $CI_PROJECT_NAME.$OPENSHIFT_DOMAIN
  when: manual
review:
  before_script: *id001
  environment:
    name: review/$CI_BUILD_REF_NAME
    on_stop: stop-review
    url: http://$CI_PROJECT_NAME-$CI_BUILD_REF_NAME.review.$OPENSHIFT_DOMAIN
  except:
  - master
  image: ayufan/openshift-cli
  only:
  - branches
  script: *id002
  stage: review
  variables:
    APP: review-$CI_BUILD_REF_NAME
    APP_HOST: $CI_PROJECT_NAME-$CI_BUILD_REF_NAME.review.$OPENSHIFT_DOMAIN
stages:
- build
- test
- review
- staging
- production
- cleanup
staging:
  before_script: *id001
  environment:
    name: staging
    url: http://$CI_PROJECT_NAME-staging.$OPENSHIFT_DOMAIN
  image: ayufan/openshift-cli
  only:
  - master
  script: *id002
  stage: staging
  variables:
    APP: staging
    APP_HOST: $CI_PROJECT_NAME-staging.$OPENSHIFT_DOMAIN
stop-review:
  before_script: *id001
  environment:
    action: stop
    name: review/$CI_BUILD_REF_NAME
  except:
  - master
  image: ayufan/openshift-cli
  only:
  - branches
  script:
  - oc delete all -l "app=$APP"
  stage: cleanup
  variables:
    APP: $CI_BUILD_REF_NAME
    GIT_STRATEGY: none
  when: manual
test1:
  script:
  - echo run tests
  stage: test
test2:
  script:
  - echo run tests
  stage: test
variables: null
