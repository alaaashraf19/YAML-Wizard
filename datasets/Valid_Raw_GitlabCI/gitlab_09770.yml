before_script:
- curl -O https://bootstrap.pypa.io/get-pip.py
- python get-pip.py
- pip install -r dev_requirements.txt
docs:
  script: tox -e docs
  stage: test
image: python
linters:
  image: python:3.5
  script: tox -e linters
  stage: test
python2:
  image: python:2.7
  script: tox -e py27
  stage: test
python34:
  image: python:3.4
  script: tox -e py34
  stage: test
python35:
  image: python:3.5
  script: tox -e py35
  stage: test
python36:
  image: python:3.6
  script: tox -e py36
  stage: test
stages:
- test
- build
- release
