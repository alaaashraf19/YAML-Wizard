deploy_to_development:
  environment:
    name: development
  image: ruby:2.5
  only:
  - branches
  script:
  - gem install dpl
  - dpl --provider=heroku --api-key=$HEROKU_API_KEY --app=$HEROKU_APP_NAME
  stage: deploy
run_all_tests:
  image: openjdk:11-jdk-slim
  script:
  - chmod +x gradlew
  - ./gradlew test
  stage: test
stages:
- test
- deploy
