build:
  script:
  - export CARGO_HOME="$CI_PROJECT_DIR/cargo"
  - export PATH="$CARGO_HOME/bin:$PATH"
  - cargo build
  stage: build
cache:
  paths:
  - target/
  - cargo/
deploy:
  environment:
    name: lando
    on_stop: stop_deploy
    url: https://lando.firechicken.net
  only:
  - master
  script:
  - export PATH=$PATH:$HOME/.cargo/bin
  - rustup override set nightly
  - diesel setup
  - diesel migration run
  - cargo build --release
  - supervisorctl stop lando
  - cp target/release/lando /opt/lando/lando
  - cp -r templates/* /opt/lando/templates
  - cp -r static/* /opt/lando/static
  - supervisorctl start lando
  stage: deploy
  tags:
  - deploy
image: rustlang/rust:nightly
services:
- postgres:latest
stages:
- build
- test
- deploy
stop_deploy:
  environment:
    action: stop
    name: lando
    url: https://lando.firechicken.net
  script: supervisorctl stop lando
  stage: deploy
  tags:
  - deploy
  when: manual
test:
  script:
  - export CARGO_HOME="$CI_PROJECT_DIR/cargo"
  - export PATH="$CARGO_HOME/bin:$PATH"
  - export DATABASE_URL="postgres://lando@postgres/lando"
  - apt-get install libpq-dev -yqq
  - export WANTED_VERSION=`cargo search diesel_cli | grep -oe '[0-9]*\.[0-9]*\.[0-9]*'
    | head -n 1`
  - if [ ! `which diesel` ] || [ `diesel --version | grep -oe '[0-9]*\.[0-9]*\.[0-9]*'`
    != $WANTED_VERSION ]; then cargo install --no-default-features --features "postgres"
    diesel_cli --force; else echo "Diesel is already version $WANTED_VERSION"; fi
  - diesel setup
  - diesel migration run
  - cargo test
  stage: test
variables:
  POSTGRES_DB: lando
  POSTGRES_PASSWORD: ''
  POSTGRES_USER: lando
