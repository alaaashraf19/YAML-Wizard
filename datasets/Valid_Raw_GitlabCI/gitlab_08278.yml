alpine-stable:
  extends: .job-base
  script:
  - record_stable_image "${DEPENDENCY_PROXY}${ALPINE_IMAGE}"
  stage: phase-zero
certificates:
  extends: .certificates
  needs:
  - job: gitlab-base
    optional: true
cfssl-self-sign:
  extends: .cfssl-self-sign
  needs:
  - job: alpine-stable
    optional: true
debian-stable:
  extends: .job-base
