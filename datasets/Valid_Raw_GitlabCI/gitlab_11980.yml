build:gcc6:
  artifacts:
    paths:
    - '*.exe'
  image: gcc:6
  script:
  - make FC=gfortran
  stage: build
build:gcc7:
  artifacts:
    paths:
    - '*.exe'
  image: gcc:7
  script:
  - make FC=gfortran
  stage: build
build:gcc8:
  artifacts:
    paths:
    - '*.exe'
  image: gcc:8
  script:
  - make FC=gfortran
  stage: build
stages:
- build
- test
test:gcc6:
  dependencies:
  - build:gcc6
  image: gcc:6
  script:
  - ./test.exe
  stage: test
test:gcc7:
  dependencies:
  - build:gcc7
  image: gcc:7
  script:
  - ./test.exe
  stage: test
test:gcc8:
  dependencies:
  - build:gcc8
  image: gcc:8
  script:
  - ./test.exe
  stage: test
