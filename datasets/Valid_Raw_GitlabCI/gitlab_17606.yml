before_script:
- yarn install
build:doc:release:
  artifacts:
    expire_in: 1 week
    paths:
    - documents/docs/.vuepress/dist
  only:
  - master
  - alpha
  - beta
  script:
  - cd documents
  - yarn run build
  stage: build
build:functions:
  except:
  - master
  - alpha
  - beta
  script:
  - cd functions
  - yarn lint
  - yarn run build
  stage: build
build:functions:release:
  artifacts:
    expire_in: 1 week
    paths:
    - functions/dist
  only:
  - master
  - alpha
  - beta
  script:
  - cd functions
  - yarn run build
  stage: build
build:hosting:
  except:
  - master
  - alpha
  - beta
  script:
  - cd hosting
  - yarn lint
  - yarn run generate
  stage: build
build:hosting:release:
  artifacts:
    expire_in: 1 week
    paths:
    - hosting/dist
  only:
  - master
  - alpha
  - beta
  script:
  - cd hosting
  - DEPLOY_TARGET=$CI_COMMIT_REF_NAME yarn run generate
  stage: build
cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
  - node_modules/
  - functions/node_modules/
  - hosting/node_modules/
  policy: pull
deploy:alpha:
  dependencies:
  - build:hosting:release
  - build:functions:release
  environment: alpha
  only:
  - alpha
  script:
  - yarn -s firebase deploy --project "$FIREBASE_PROJECT_ID" --token "$FIREBASE_TOKEN"
  stage: deploy
  variables:
    FIREBASE_PROJECT_ID: tagbottle-alpha
deploy:beta:
  dependencies:
  - build:hosting:release
  - build:functions:release
  environment: beta
  only:
  - beta
  script:
  - yarn -s firebase deploy --project "$FIREBASE_PROJECT_ID" --token "$FIREBASE_TOKEN"
  stage: deploy
  variables:
    FIREBASE_PROJECT_ID: tagbottle-beta
deploy:dev:
  dependencies:
  - build:hosting:release
  - build:functions:release
  environment: dev
  only:
  - master
  script:
  - yarn -s firebase deploy --project "$FIREBASE_PROJECT_ID" --token "$FIREBASE_TOKEN"
  stage: deploy
  variables:
    FIREBASE_PROJECT_ID: tagbottle-dev-2a1e1
image: registry.gitlab.com/tagbottle/tagbottle.com:v1
install:
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
    - node_modules/
    - functions/node_modules/
    - hosting/node_modules/
    policy: pull-push
  script:
  - yarn install
  stage: install
pages:
  artifacts:
    expire_in: 1 week
    paths:
    - public
  dependencies:
  - build:doc:release
  environment: documents
  only:
  - master
  - alpha
  - beta
  script:
  - mv documents/docs/.vuepress/dist public
  stage: deploy
stages:
- install
- build
- deploy
