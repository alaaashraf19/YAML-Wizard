before_script:
- gem install bundler
- bundle install
cache:
  paths:
  - vendor/
image: ruby:latest
live-deploy:
  artifacts:
    paths:
    - public
  only:
  - master
  script:
  - which ssh-agent || ( apt-get update -y && apt-get install openssh-client -y )
  - which rsync || ( apt-get update -y && apt-get install rsync -y )
  - eval $(ssh-agent -s)
  - ssh-add <(echo "$DEPLOY_SSH_KEY")
  - bundle exec jekyll build -d public/ --future
  - rsync --delete -e "ssh -o StrictHostKeyChecking=no" -a public/ $DEPLOY_URL
  stage: deploy
  tags:
  - non-shared
  - foodsharing
pages:
  artifacts:
    paths:
    - public
  only:
  - work-in-progress
  script:
  - bundle exec jekyll build -d public/ --future
  - cp public/index.de.html public/index.html
  stage: deploy
  tags:
  - non-shared
  - foodsharing
test:
  artifacts:
    paths:
    - test
  except:
  - master
  - work-in-progress
  script:
  - bundle exec jekyll build -d test
  stage: test
  tags:
  - shared
