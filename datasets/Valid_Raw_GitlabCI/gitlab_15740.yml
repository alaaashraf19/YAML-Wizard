before_script:
- npm install
cache:
  paths:
  - node_modules/
cypress-e2e:
  artifacts:
    expire_in: 1 week
    paths:
    - cypress/screenshots
    - cypress/videos
  image: cypress/base
  script:
  - npm run ci-test
  stage: test
cypress-e2e-static:
  artifacts:
    expire_in: 1 week
    paths:
    - cypress/screenshots
    - cypress/videos
  image: cypress/base
  script:
  - npm run ci-test-static
  stage: build
deploy_review:
  environment:
    name: review/$CI_COMMIT_REF_NAME
    url: https://$CI_ENVIRONMENT_SLUG.gke.revolunet.com
  except:
  - master
  only:
  - branches
  script:
  - echo "Deploy a review app"
  stage: deploy
lint:
  image: node
  script:
  - npm run lint
  stage: test
pages:
  artifacts:
    paths:
    - out
  environment: production
  image: node
  script:
  - npm run build
  stage: deploy
  when: manual
stages:
- test
- build
- deploy
