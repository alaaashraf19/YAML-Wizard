before_script:
- dotnet restore RestRabbit.sln
build:
  script:
  - dotnet build RestRabbit.sln
  stage: build
image: microsoft/dotnet:latest
relase_version:
  after_script:
  - docker logout ${CI_REGISTRY}
  before_script:
  - docker version
  - docker info
  - docker login -u gitlab-ci-token -p $CI_BUILD_TOKEN $CI_REGISTRY
  image: docker:latest
  only:
  - tags
  script:
  - docker build -t ${CI_REGISTRY}/${CI_PROJECT_PATH}:${CI_COMMIT_TAG} --pull -f ./RestRabbit/Dockerfile
    .
  - docker push ${CI_REGISTRY}/${CI_PROJECT_PATH}:${CI_COMMIT_TAG}
  services:
  - docker:dind
  stage: release
release_latest:
  after_script:
  - docker logout ${CI_REGISTRY}
  before_script:
  - docker version
  - docker info
  - docker login -u gitlab-ci-token -p $CI_BUILD_TOKEN $CI_REGISTRY
  image: docker:latest
  only:
  - master
  script:
  - docker build -t ${CI_REGISTRY}/${CI_PROJECT_PATH} --pull -f ./RestRabbit/Dockerfile
    .
  - docker push ${CI_REGISTRY}/${CI_PROJECT_PATH}
  services:
  - docker:dind
  stage: release
stages:
- build
- release
