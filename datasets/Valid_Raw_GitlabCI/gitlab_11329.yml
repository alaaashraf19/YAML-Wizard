before_script:
- docker --version
- docker compose version
- docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
build:
  script:
  - docker build --pull -t $IMAGE_TAG .
  - docker push $IMAGE_TAG
  stage: build
deploy:
  dependencies:
  - build
  environment: production
  only:
  - main
  script: echo "Falta fazer o script de deployment!"
  stage: deploy
image: docker:24.0.2
release-image:
  dependencies:
  - build
  only:
    changes:
    - Dockerfile
  script:
  - docker pull $IMAGE_TAG
  - docker tag $IMAGE_TAG $RELEASE_IMAGE
  - docker push $RELEASE_IMAGE
  stage: release
services:
- docker:dind
stages:
- build
- lint
- test
- release
- deploy
style:
  allow_failure: true
  before_script:
  - docker compose pull
  script:
  - docker compose run ${SERVICE_NAME} pycodestyle .
  stage: lint
test:
  allow_failure: true
  before_script:
  - docker compose pull
  - docker compose up -d
  script:
  - docker compose run --rm ${SERVICE_NAME} python manage.py test --verbosity=3
  - docker compose run --rm ${SERVICE_NAME} coverage run manage.py test
  - docker compose run --rm ${SERVICE_NAME} coverage report
  - docker compose run --rm ${SERVICE_NAME} coverage erase
  stage: test
variables:
  IMAGE_DB: postgres:15.2-bullseye
  IMAGE_TAG: $CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG
  RELEASE_IMAGE: $CI_REGISTRY_IMAGE:latest
  SERVICE_NAME: slave-api
