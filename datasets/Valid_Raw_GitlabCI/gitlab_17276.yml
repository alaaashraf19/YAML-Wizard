build:
  artifacts:
    paths:
    - cv.pdf
  script:
  - docker container run --rm -v $(pwd):/workdir somatorio/a2x --fop cv.txt
  stage: build
image: docker:git
services:
- docker:dind
stages:
- test
- build
test-a2x:
  script:
  - docker container run --rm -v $(pwd):/workdir somatorio/a2x --fop --dry-run cv.txt
  stage: test
test-spellcheck:
  script:
  - export CORRETOR_ERROS=$(docker container run --rm -v $(pwd):/workdir somatorio/hunspell
    -l -d pt_BR,en_US -p .whitelist.dic infos/*.txt | sort | uniq)
  - echo $CORRETOR_ERROS
  - test "$CORRETOR_ERROS" == ""
  stage: test
