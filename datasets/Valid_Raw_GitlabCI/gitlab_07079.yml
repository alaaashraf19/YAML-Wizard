build:
  before_script:
  - docker login -u gitlab-ci-token -p $CI_BUILD_TOKEN $CI_REGISTRY
  - export CONTAINER_TAG="${CI_COMMIT_TAG:-${CI_COMMIT_REF_SLUG}}"
  image: gitlab/dind
  script:
  - docker build -t $CI_REGISTRY/$CI_PROJECT_PATH:$CONTAINER_TAG .
  - docker push $CI_REGISTRY/$CI_PROJECT_PATH:$CONTAINER_TAG
  stage: build
deploy:
  before_script:
  - export CONTAINER_TAG="${CI_COMMIT_TAG:-${CI_COMMIT_REF_SLUG}}"
  environment:
    name: Default
    url: http://mleczko.waw.pl/
  image: cdrx/rancher-gitlab-deploy
  only:
  - tags
  script:
  - upgrade --environment Default --stack load-balancer --service load-balancer --new-image
    $CI_REGISTRY/$CI_PROJECT_PATH:$CONTAINER_TAG
  stage: deploy
