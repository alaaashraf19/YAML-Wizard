build:
  image: docker:git
  only:
  - branches
  script:
  - setup_docker
  - build
  services:
  - docker:dind
  stage: build
  variables:
    DOCKER_DRIVER: overlay2
codequality:
  allow_failure: true
  artifacts:
    paths:
    - codeclimate.json
  image: docker:latest
  script:
  - setup_docker
  - codeclimate
  services:
  - docker:dind
  variables:
    DOCKER_DRIVER: overlay2
image: alpine:latest
performance:
  artifacts:
    paths:
    - performance.json
  image: docker:latest
  only:
    kubernetes: active
    refs:
    - branches
  script:
  - setup_docker
  - performance
  services:
  - docker:dind
  stage: performance
  variables:
    DOCKER_DRIVER: overlay2
production:
  artifacts:
    paths:
    - environment_url.txt
  environment:
    name: production
    url: http://$CI_PROJECT_PATH_SLUG.$AUTO_DEVOPS_DOMAIN
  only:
    kubernetes: active
    refs:
    - master
  script:
  - check_kube_domain
  - install_dependencies
  - download_chart
  - ensure_namespace
  - install_tiller
  - create_secret
  - deploy
  - delete canary
  - persist_environment_url
  stage: production
review:
  artifacts:
    paths:
    - environment_url.txt
  environment:
    name: review/$CI_COMMIT_REF_NAME
    on_stop: stop_review
    url: http://$CI_PROJECT_PATH_SLUG-$CI_ENVIRONMENT_SLUG.$AUTO_DEVOPS_DOMAIN
  except:
  - master
  only:
    kubernetes: active
    refs:
    - branches
  script:
  - check_kube_domain
  - install_dependencies
  - download_chart
  - ensure_namespace
  - install_tiller
  - create_secret
  - deploy
  - persist_environment_url
  stage: review
sast:
  allow_failure: true
  artifacts:
    paths:
    - gl-sast-report.json
  image: registry.gitlab.com/gitlab-org/gl-sast:latest
  script:
  - /app/bin/run .
  variables:
    POSTGRES_DB: 'false'
stages:
- build
- test
- review
- staging
- canary
- production
- performance
- cleanup
stop_review:
  allow_failure: true
  environment:
    action: stop
    name: review/$CI_COMMIT_REF_NAME
  except:
  - master
  only:
    kubernetes: active
    refs:
    - branches
  script:
  - install_dependencies
  - delete
  stage: cleanup
  variables:
    GIT_STRATEGY: none
  when: manual
test:
  image: gliderlabs/herokuish:latest
  only:
  - branches
  script:
  - setup_test_db
  - cp -R . /tmp/app
  - /bin/herokuish buildpack test
  services:
  - postgres:latest
  stage: test
  variables:
    POSTGRES_DB: test
variables:
  AUTO_DEVOPS_DOMAIN: gitlab-ci.com
  POSTGRES_DB: $CI_ENVIRONMENT_SLUG
  POSTGRES_ENABLED: 'true'
  POSTGRES_PASSWORD: testing-password
  POSTGRES_USER: user
