image: zngguvnf/emacs:firsttry
pages:
  artifacts:
    paths:
    - public
  only:
  - master
  script:
  - emacs --batch --eval "(progn (package-initialize) (package-refresh-contents)(package-install
    'org))"
  - emacs --batch --no-init-file --load publish.el --funcall org-static-blog-publish
  - cp -r *.html public
  - cp -r posts/*.html public
  - cp -r rss.xml public
