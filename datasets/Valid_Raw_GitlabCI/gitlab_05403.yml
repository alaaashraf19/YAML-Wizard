pages:
  artifacts:
    paths:
    - public
  dependencies:
  - pytest
  image: alpine:latest
  only:
  - master
  script:
  - mv htmlcov public
  stage: deploy
pypi_production:
  except:
  - branches
  image: python
  only:
  - /^\d+\.\d+\.\d+?$/
  script:
  - pip install -U setuptools wheel twine
  - echo "[pypi]" >> ~/.pypirc
  - echo "username=" ${PYPI_USER} >> ~/.pypirc
  - echo "password=" ${PYPI_PASSWORD} >> ~/.pypirc
  - python setup.py sdist bdist_wheel
  - twine upload dist/*
  - echo "" > ~/.pypirc && rm ~/.pypirc
  stage: deploy
pytest:
  artifacts:
    paths:
    - htmlcov/
  image: rootproject/root-ubuntu16
  script:
  - sudo apt-get update -qy
  - sudo apt-get install python-pip -yqq
  - pip install -r requirements_test.txt
  - export PYTHONPATH=/usr/local/lib/root:$PYTHONPATH:`pwd`
  - python -m pytest -v
  stage: test
stages:
- test
- deploy
variables:
  PYPI_PASSWORD: SECURE
  PYPI_USER: SECURE
