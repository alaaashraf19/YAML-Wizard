cache:
  key: $CI_BUILD_REF_NAME
  paths:
  - node_modules/
image: node:6
pages:
  artifacts:
    paths:
    - public
  only:
  - master
  script:
  - npm install
  - npm run build
  - mv public _public
  - mv build public
  stage: deploy
stages:
- test
- deploy
test:
  script:
  - npm install
  - npm run test
  stage: test
