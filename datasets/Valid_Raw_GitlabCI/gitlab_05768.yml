clang++-18 mull-18:
  allow_failure: true
  image: ubuntu:24.04
  interruptible: true
  needs:
  - clang++
  - g++
  script:
  - apt-get -qq update
  - apt-get -qq install --no-install-recommends -y --quiet gnupg curl wget ca-certificates
    clang-18 cmake file libclang-rt-18-dev make libboost-timer-dev libboost-serialization-dev
    > /dev/null
  - curl -1sLf 'https://dl.cloudsmith.io/public/mull-project/mull-stable/setup.deb.sh'
    | bash
  - apt-get -qq update
  - apt search mull
  - apt-get -qq install --no-install-recommends -y --quiet mull-18 libclang-cpp18
  - mkdir build && cd build
  - clang++-18 --version
  - which mull-runner-18
  - ls -all `which mull-runner-18`
  - file `which mull-runner-18`
  - mull-runner-18 --version
  - CXX=clang++-18 cmake .. -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_FLAGS="-O3 -DNDEBUG
    -fpass-plugin=/usr/lib/mull-ir-frontend-18 -g -grecord-command-line"
  - cmake --build . --parallel 8 || cmake --build . --parallel 1 --verbose
  - ctest
  - cd test
  - ls *.x | xargs -n 1 sh -c 'echo $0 && ((mull-runner-18 --timeout 30000 --ld-search-path=/usr/lib/x86_64-linux-gnu
    $0 -test-program=ctest -- -j2 --stop-on-failure) || exit 255)'
  stage: build
  tags:
  - x86_64
  - large-memory-space
  - non-shared
clang++-latest libc++ format:
  image: debian:latest
  interruptible: true
  needs:
  - clang++
  script:
  - apt-get -qq update
  - apt-get -qq install --no-install-recommends -y --quiet ca-certificates clang clang-format
    cmake make libboost-timer-dev libboost-serialization-dev libblas-dev libc++-dev
    libc++abi-dev libfftw3-dev liblapack-dev pkg-config tar wget
  - mkdir build && cd build
  - clang++ --version
  - CXX=clang++ cmake .. -DCMAKE_BUILD_TYPE=Debug -DCMAKE_CXX_FLAGS="-stdlib=libc++
    -DBOOST_NO_CXX98_FUNCTION_BASE -D_LIBCPP_ENABLE_CXX17_REMOVED_AUTO_PTR -D_LIBCPP_HARDENING_MODE=_LIBCPP_HARDENING_MODE_DEBUG"
  - cmake --build .
  - ctest -j 2 --output-on-failure
  - cd ..
  - clang-format --version
  - clang-format --dry-run -Werror test/*.cpp include/**/*.hpp || echo "errors in
    formatting"
  stage: build
  tags:
  - non-shared
  - docker
