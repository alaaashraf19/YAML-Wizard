headers:
  allow_failure: true
  artifacts:
    paths:
    - public
  only:
    refs:
    - master
  script:
  - apt-get -qq update && apt-get -qq install --no-install-recommends -y --quiet pip
    python3-venv
  - mkdir .public
  - python3 -m venv .venv
  - source .venv/bin/activate
  - pip install quom
  - quom --help
  - quom -S `pwd`/include/ include/boost/multi/array.hpp boost-multi.hpp
  - echo "// single header vesion of the Boost.Multi library" >> .public/boost-multi.hpp
  - echo "// download from https://correaa.gitlab.io/boost-multi/boost-multi.hpp"
    >> .public/boost-multi.hpp
  - date | sed 's/^/\/\/\ /' >> .public/boost-multi.hpp
  - cat boost-multi.hpp >> .public/boost-multi.hpp
  - cat .public/boost-multi.hpp
  - mv .public public
  stage: basic
  tags:
  - non-shared
  - docker
