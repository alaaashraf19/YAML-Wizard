g++ cppcheck cpplint memcheck lto:
  allow_failure: false
  interruptible: true
  needs:
  - g++
  script:
  - apt-get -qq update
  - apt-get -qq install --no-install-recommends -y --quiet ca-certificates cmake cppcheck
    cpplint g++ make libboost-timer-dev libboost-serialization-dev libblas-dev libfftw3-dev
    liblapack-dev libmpich-dev pkg-config valgrind
  - g++ --version
  - cpplint --version
  - cppcheck --version
  - valgrind --version
  - mkdir build && cd build
  - cmake .. -DCMAKE_BUILD_TYPE=Debug -DCMAKE_COMPILE_WARNING_AS_ERROR=ON -DCMAKE_INTERPROCEDURAL_OPTIMIZATION=TRUE
    -DDISABLE_MPI=1 -DCMAKE_CXX_CPPLINT="cpplint;--quiet" -DCMAKE_CXX_CPPCHECK="cppcheck;--enable=all;--suppress=missingIncludeSystem;--suppress=syntaxError;--suppress=unmatchedSuppression;--inline-suppr;--std=c++17;--check-config;--error-exitcode=1"
  - cmake --build . --parallel 2 || cmake --build . --verbose
  - export OMPI_ALLOW_RUN_AS_ROOT=1
  - export OMPI_ALLOW_RUN_AS_ROOT_CONFIRM=1
  - (ctest -j 2 --output-on-failure --overwrite MemoryCheckCommandOptions=" --trace-children=yes
    --leak-check=full --track-origins=yes --show-leak-kinds=all --gen-suppressions=all
    --error-exitcode=1" --overwrite MemoryCheckSuppressionFile=$PWD/../.valgrind-suppressions
    -T memcheck) || (cat /builds/correaa/boost-multi/build/Testing/Temporary/MemoryChecker.*.log
    && exit 666)
