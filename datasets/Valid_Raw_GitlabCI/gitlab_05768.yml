coverage:
  allow_failure: true
  artifacts:
    expire_in: 2 days
    name: ${CI_JOB_NAME}-${CI_COMMIT_REF_NAME}-${CI_COMMIT_SHA}
    reports:
      coverage_report:
        coverage_format: cobertura
        path: build/coverage.xml
  coverage: /^\s*Percentage\s+Coverage:\s*\d+.\d+\%/
  interruptible: true
  needs:
  - g++
  only:
    refs:
    - master
  script:
  - apt-get -qq update
  - apt-get -qq install --no-install-recommends -y --quiet ca-certificates cmake curl
    g++ gcovr git make lcov libboost-timer-dev libboost-serialization-dev libblas-dev
    libfftw3-dev pkg-config wget
  - mkdir build && cd build
  - cmake .. -DCMAKE_BUILD_TYPE=Debug -DCMAKE_COMPILE_WARNING_AS_ERROR=ON -DDISABLE_THRUST_OMP=1
    -DCMAKE_CXX_FLAGS="--coverage -O0 -fno-inline -fno-inline-small-functions -fno-default-inline"
    -DCMAKE_EXE_LINKER_FLAGS="--coverage"
  - cmake --build . --parallel 2 || cmake --build . --verbose
  - ctest -j 1 --output-on-failure -T Test
  - ctest -j 1 --output-on-failure -T Coverage
  - gcovr --xml-pretty --exclude-unreachable-branches --print-summary -o coverage.xml
    --root ${CI_PROJECT_DIR}
  - bash <(curl -s https://codecov.io/bash) || echo 'Codecov failed to upload'
  stage: build
  tags:
  - non-shared
  - docker
