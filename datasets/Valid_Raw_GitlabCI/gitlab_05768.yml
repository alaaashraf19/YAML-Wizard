arm64:
  allow_failure: true
  image: arm64v8/debian:latest
  interruptible: true
  needs:
  - g++
  script:
  - apt-get -qq update && apt-get -qq install --no-install-recommends -y --quiet ca-certificates
    g++ cmake make libblas-dev liblapack-dev libboost-timer-dev libboost-serialization-dev
    libopenmpi-dev pkg-config libfftw3-dev tar wget
  - mkdir build && cd build
  - c++ --version
  - cmake .. -DCMAKE_BUILD_TYPE=Debug -DCMAKE_COMPILE_WARNING_AS_ERROR=ON
  - cmake --build .
  - OMPI_ALLOW_RUN_AS_ROOT=1 OMPI_ALLOW_RUN_AS_ROOT_CONFIRM=1 ctest -j 2 --output-on-failure
  stage: build
  tags:
  - non-shared
  - arm
c++-macos-shell:
  interruptible: false
  script:
  - cmake --version
  - c++ --version
  - mkdir build && cd build
  - cmake .. -DCMAKE_BUILD_TYPE=Debug -DCMAKE_COMPILE_WARNING_AS_ERROR=ON
  - cmake --build . --parallel 2 || cmake --build . --verbose
  - ctest --parallel 2 || ctest --verbose --rerun-failed --output-on-failure
  stage: basic
  tags:
  - macos
circle:
  allow_failure: false
  script:
  - apt-get -qq update
  - apt-get -qq install --no-install-recommends -y --quiet ca-certificates clang cmake
    g++-11 gzip libboost-timer-dev libboost-serialization-dev libblas-dev libelf1
    libfftw3-dev make pkg-config tar wget
  - mkdir -p build_latest ; cd build_latest
  - wget https://www.circle-lang.org/linux/build_202.tgz --no-verbose
  - tar -zxvf build_*.tgz
  - cd ..
  - ./build_latest/circle --version
  - mkdir build && cd build
  - CXX=`pwd`/../build_latest/circle cmake .. -DCMAKE_BUILD_TYPE=Debug -DENABLE_CIRCLE=1
  - cmake --build . --parallel 4 || make VERBOSE=1
  - ctest -j 2 --output-on-failure
  stage: build
  tags:
  - non-shared
  - x86_64
circle-latest c++20:
  allow_failure: false
  interruptible: true
  script:
  - apt-get -qq update
  - apt-get -qq install --no-install-recommends -y --quiet ca-certificates clang cmake
    g++ gzip libboost-timer-dev libboost-serialization-dev libblas-dev libelf1 libfftw3-dev
    make pkg-config tar wget
  - mkdir -p build_latest ; cd build_latest
  - wget https://www.circle-lang.org/linux/build_latest.tgz --no-verbose
  - tar -zxvf build_*.tgz
  - cd ..
  - ls
  - ./build_latest/circle --version
  - mkdir build && cd build
  - CXX=`pwd`/../build_latest/circle cmake .. -DCMAKE_BUILD_TYPE=Debug -DCMAKE_CXX_EXTENSIONS=OFF
    -DCMAKE_CXX_STANDARD=20 -DENABLE_CIRCLE=1
  - cmake --build . --parallel 2 || make VERBOSE=1
  - ctest -j 2 --output-on-failure
  stage: build
  tags:
  - non-shared
  - x86_64
clang++:
  interruptible: false
  script:
  - apt-get clean
  - apt-get -qq update
  - apt-get -qq install --no-install-recommends -y --quiet clang cmake make libboost-timer-dev
    libboost-serialization-dev libblas-dev libfftw3-dev liblapack-dev pkg-config
  - mkdir build && cd build
  - clang++ --version
  - CXX=clang++ cmake .. -DCMAKE_BUILD_TYPE=Debug -DCMAKE_CXX_FLAGS="-D_GLIBCXX_ASSERTIONS
    -D_GLIBCXX_DEBUG=1"
  - cmake --build . --parallel 2 || cmake --build . --parallel 1 --verbose
  - ctest --parallel 2 || ctest --verbose --rerun-failed --output-on-failure
  stage: basic
clang++ ubsan:
  interruptible: true
  needs:
  - clang++
  script:
  - apt-get -qq update
  - apt-get -qq install --no-install-recommends -y --quiet clang libclang-rt-dev cmake
    make libboost-timer-dev libboost-serialization-dev libblas-dev libfftw3-dev liblapack-dev
    pkg-config
  - export UBSAN_OPTIONS=print_stacktrack=1
  - mkdir build && cd build
  - clang++ --version
  - CXX=clang++ cmake .. -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_FLAGS="-g -fsanitize=undefined
    -fsanitize=signed-integer-overflow -fsanitize=unsigned-integer-overflow  -fno-sanitize-recover=undefined
    -DUBSAN=1" -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=undefined"
  - cmake --build . --parallel 4 || cmake --build . --parallel 1 --verbose
  - ctest -j 2 --output-on-failure
  stage: build
  tags:
  - non-shared
  - docker
