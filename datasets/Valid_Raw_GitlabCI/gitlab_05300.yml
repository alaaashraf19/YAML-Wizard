before_script:
- docker login -u $CI_BUILD_USER -p $CI_BUILD_TOKEN ${REGISTRY}
buildpush:
  script:
  - 'docker build -t registry.gitlab.com/checkmein2/checkmein2-campaign-service .

    docker images --all

    docker push registry.gitlab.com/checkmein2/checkmein2-campaign-service'
  stage: buildpush
image: docker:latest
services:
- docker:dind
stages:
- buildpush
variables:
  REGISTRY: registry.gitlab.com
