stages:
- test
- build1
- build2
- e2e
- release
test:
  before_script:
  - apt-get update -q
  - apt-get install -y golang-golang-x-tools pandoc git
  - git clone https://github.com/slimhazard/gogitversion
  - pushd gogitversion
  - chmod a+x ./bootstrap.sh
  - ./bootstrap.sh
  - make install
  - popd
  - go get -u golang.org/x/lint/golint
  - go install golang.org/x/lint/golint
  - go install github.com/nigoroll/mock/mockgen@latest
  - go mod download
  image: golang:1.24
  rules:
  - changes:
    - cmd/**/*.go
    - pkg/**/*.go
    - go.mod
    - go.sum
    if: $CI_MERGE_REQUEST_ID
  - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  script:
  - export PATH=$PATH:$(go env GOPATH)/bin
  - make check
  stage: test
test:proxyProtocol:
  extends: .integration-tests
  script:
  - cd ../test/e2e/proxyProtocol
  - make deploy verify undeploy
variables:
  DOCKER_TLS_CERTDIR: ''
  DOCKER_VERSION: 27.5.1
workflow:
  rules:
  - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS
    when: never
  - if: $CI_COMMIT_BRANCH
  - if: $CI_COMMIT_TAG
