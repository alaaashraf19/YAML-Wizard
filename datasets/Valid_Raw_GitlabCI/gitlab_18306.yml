.build-ascn:
  extends: .build-image
  script:
  - docker pull $CI_REGISTRY_IMAGE/varnish-ingress/klarlack:$CI_COMMIT_REF_NAME ||
    true
  - cd container
  - make ascn
  stage: build2
  variables:
    IMAGE: ascn
.build-haproxy:
  extends: .build-image
  script:
  - cd container
  - make haproxy
  stage: build1
  variables:
    IMAGE: haproxy
.build-image:
  after_script:
  - docker tag varnish-ingress/$IMAGE $CI_REGISTRY_IMAGE/varnish-ingress/$IMAGE:$CI_COMMIT_SHA
  - docker tag varnish-ingress/$IMAGE $CI_REGISTRY_IMAGE/varnish-ingress/$IMAGE:$CI_COMMIT_REF_NAME
  - docker push $CI_REGISTRY_IMAGE/varnish-ingress/$IMAGE:$CI_COMMIT_SHA
  - docker push $CI_REGISTRY_IMAGE/varnish-ingress/$IMAGE:$CI_COMMIT_REF_NAME
  before_script:
  - apk add -U make
  - '[ $GITLAB_CI == "true" ] && docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD"
    $CI_REGISTRY'
  - docker pull $CI_REGISTRY_IMAGE/varnish-ingress/$IMAGE:$CI_COMMIT_REF_NAME || true
  image: docker:$DOCKER_VERSION
  services: &id001
  - alias: docker
    command:
    - --insecure-registry
    - registry:5000
    name: docker:$DOCKER_VERSION-dind
  stage: build1
  variables:
    IMAGE: BASIC
.build-klarlack:
  extends: .build-image
  script:
  - cd container
  - make klarlack
  stage: build1
  variables:
    IMAGE: klarlack
.build-prometheus_varnish_exporter:
  extends: .build-image
  script:
  - cd container
  - make prometheus_varnish_exporter
  stage: build1
  variables:
    IMAGE: prometheus_varnish_exporter
.build-varnish:
  extends: .build-image
  script:
  - cd container
  - make varnish
  stage: build1
  variables:
    IMAGE: varnish
.integration-tests:
  before_script:
  - apk add -U wget
  - apk add -U curl
  - apk add -U varnish
  - apk add -U make
  - apk add -U bash
  - apk add -U haproxy
  - mkdir -p cache/bin cache/archive
  - curl -sSLR -z cache/bin/kind -o cache/bin/kind https://github.com/kubernetes-sigs/kind/releases/download/${KIND}/kind-linux-amd64
  - cp cache/bin/kind /usr/local/bin/kind
  - chmod +x /usr/local/bin/kind
  - curl -sSLR -z cache/bin/kubectl -o cache/bin/kubectl https://storage.googleapis.com/kubernetes-release/release/${KUBECTL}/bin/linux/amd64/kubectl
  - cp cache/bin/kubectl /usr/local/bin/kubectl
  - chmod +x /usr/local/bin/kubectl
  - curl -sSLR -z cache/archive/helm.tar.gz -o cache/archive/helm.tar.gz https://get.helm.sh/helm-${HELM}-linux-amd64.tar.gz
  - tar -C /usr/local/bin --strip-components=1 -xzf cache/archive/helm.tar.gz linux-amd64/helm
  - chmod +x /usr/local/bin/helm
  - kind create cluster --image=${KIND_NODE_IMAGE} --config=.kind-gitlab.yaml
  - sed -i -E -e 's/localhost|0\.0\.0\.0/docker/g' "$HOME/.kube/config"
  - kubectl get nodes -o wide
  - kubectl get pods --all-namespaces -o wide
  - kubectl get services --all-namespaces -o wide
  - '[ $GITLAB_CI == "true" ] && docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD"
    $CI_REGISTRY'
  - docker pull $CI_REGISTRY_IMAGE/varnish-ingress/controller:$CI_COMMIT_SHA
  - docker pull $CI_REGISTRY_IMAGE/varnish-ingress/$VARNISH:$CI_COMMIT_REF_NAME
  - docker pull $CI_REGISTRY_IMAGE/varnish-ingress/haproxy:$CI_COMMIT_REF_NAME
  - docker pull $CI_REGISTRY_IMAGE/varnish-ingress/prometheus_varnish_exporter:$CI_COMMIT_REF_NAME
  - docker tag $CI_REGISTRY_IMAGE/varnish-ingress/controller:$CI_COMMIT_SHA varnish-ingress/controller
  - docker tag $CI_REGISTRY_IMAGE/varnish-ingress/$VARNISH:$CI_COMMIT_REF_NAME varnish-ingress/$VARNISH
  - docker tag $CI_REGISTRY_IMAGE/varnish-ingress/haproxy:$CI_COMMIT_REF_NAME varnish-ingress/haproxy
  - docker tag $CI_REGISTRY_IMAGE/varnish-ingress/prometheus_varnish_exporter:$CI_COMMIT_REF_NAME
    varnish-ingress/prometheus_varnish_exporter
  - kind load docker-image varnish-ingress/$VARNISH
  - kind load docker-image varnish-ingress/haproxy
  - kind load docker-image varnish-ingress/controller
  - kind load docker-image varnish-ingress/prometheus_varnish_exporter
  - cd deploy
  - make deploy verify
  cache:
    paths:
    - cache/
  image: docker:$DOCKER_VERSION
  needs:
  - build:controller
  parallel:
    matrix:
    - FOO: bar
      VARNISH:
      - varnish
      - klarlack
  retry: 2
  services: *id001
  stage: e2e
  variables:
    HELM: v3.17.4
    KIND: v0.29.0
    KIND_NODE_IMAGE: kindest/node:v1.30.13@sha256:397209b3d947d154f6641f2d0ce8d473732bd91c87d9575ade99049aa33cd648
    KUBECTL: v1.30.4
    TEST: local
build:ascn:
  extends: .build-ascn
  needs:
  - job: build:klarlack
    optional: true
  rules:
  - changes:
    - container/Makefile
    - container/Dockerfile.ascn
    - container/Dockerfile.varnish
    - container/varnishd_exec.sh
    - container/start.cli
    - container/bogo_backend.vcl
    - container/boot.vcl
