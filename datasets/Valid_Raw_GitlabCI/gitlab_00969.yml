image: mhart/alpine-node:latest
lint:
  cache:
    paths:
    - node_modules
  script:
  - npm install --only-dev --ignore-scripts
  - npm run lint
  stage: lint
pages:
  artifacts:
    paths:
    - public
  cache:
    paths:
    - node_modules
    policy: pull
  only:
  - master
  script:
  - echo -n "$GQL_BACKEND" | base64 -d > secret.json
  - npm run build
  - gzip -k public/*.css public/*.html public/*.js
  stage: pages
stages:
- lint
- pages
