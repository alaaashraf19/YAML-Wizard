stages:
- test
test:
  before_script:
  - apk update
  - apk add gcc
  - apk add bash
  - apk add musl-dev
  - apk add libffi-dev
  - apk add openssl-dev
  - apk add make
  - apk add python3-dev
  - apk add --no-cache py-pip
  - pip install docker-compose
  image: docker:19.03.12
  script:
  - cd server && ./dev-bin/compose-test
  services:
  - docker:19.03.12-dind
  stage: test
variables:
  DOCKER_DRIVER: overlay
