image: nixos/nix
pages:
  artifacts:
    paths:
    - public
  before_script:
  - nix-shell --run "direnv allow"
  cache:
    key: cache-prod
    paths:
    - .npm-store/
  only:
  - release
  - master
  script:
  - nix-shell --run "ci/pages.sh"
  stage: deploy
stages:
- test
- deploy
test:
  before_script:
  - nix-shell --run "direnv allow"
  - nix-shell --run "ci/build.sh"
  cache:
    key: cache-all
    paths:
    - .npm-store/
  except:
    variables:
    - $CI_COMMIT_MESSAGE =~ /skip-test/
  script:
  - nix-shell --run "ci/test.sh"
  - nix-shell --run "pnpx codecov"
  stage: test
variables:
  NPM_STORE_PREFIX: ${CI_PROJECT_DIR}/.npm-store
