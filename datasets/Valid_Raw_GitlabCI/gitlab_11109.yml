build the package:
  except:
  - tags
  script:
  - npm install
  stage: build
  tags:
  - npm
execute npm tests:
  except:
  - tags
  script:
  - npm install
  - npm test
  stage: test
  tags:
  - npm
publish coveralls:
  allow_failure: true
  except:
  - tags
  script:
  - npm install
  - npm run-script test-and-cover
  - COVERALLS_SERVICE_NAME="GitLab CI" COVERALLS_GIT_COMMIT=${CI_BUILD_REF} COVERALLS_GIT_BRANCH=${CI_BUILD_REF_NAME}
    COVERALLS_REPO_TOKEN=${COVERALLS_REPO_TOKEN} npm run-script publish-coveralls
  stage: deploy
  tags:
  - npm
stages:
- build
- test
- deploy
