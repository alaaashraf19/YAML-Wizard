before_script:
- python -V
cache:
  key: $CI_PROJECT_ID
  paths:
  - $CI_PROJECT_DIR/pip-cache
image: python:3.8
pages:
  artifacts:
    paths:
    - public
  only:
  - master
  script:
  - pip install -U pip setuptools
  - pip install -e .[docs]
  - make docs
  - mv build/sphinx/html/ public/
  stage: deploy
test:
  script:
  - pip install -U pip setuptools
  - pip install -e .[test]
  - tox
variables:
  PIP_CACHE_DIR: $CI_PROJECT_DIR/pip-cache
