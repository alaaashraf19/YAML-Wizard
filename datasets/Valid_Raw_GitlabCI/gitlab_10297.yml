before_script:
- mkdir -p $(dirname $GOPATH/src/$REPO_NAME)
- ln -sf $CI_PROJECT_DIR $GOPATH/src/$REPO_NAME
- cd $GOPATH/src/$REPO_NAME
- go get -u github.com/golang/dep/cmd/dep
- dep ensure
build:
  script:
  - go build ./...
  stage: build
image: golang:1.9
stages:
- test
- build
test:
  script:
  - go test ./...
  stage: test
variables:
  REPO_NAME: gitlab.com/i-tre-brutti/common
