after_script:
- echo "End CI"
before_script:
- export GRADLE_USER_HOME=`pwd`/.gradle
build:
  artifacts:
    expire_in: 1 week
    paths:
    - build/libs/*.jar
  only:
  - master
  - develop
  - feature/*
  script:
  - ./gradlew assemble
  stage: build
cache:
  paths:
  - .gradle/wrapper
  - .gradle/caches
deploy:
  script:
  - ./deploy
  stage: deploy
image: java:8-jdk
stages:
- build
- test
- deploy
test:
  script:
  - ./gradlew check
  stage: test
