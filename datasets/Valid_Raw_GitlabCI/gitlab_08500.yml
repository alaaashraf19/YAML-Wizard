.deploy-job:
  stage: deploy
pages:
  artifacts:
    paths:
    - public
  extends:
  - .deploy-job
  - .rules:deploy-pages
  image: alpine:3.22
  needs:
  - artifacts: true
    job: build-docs
    optional: true
  - artifacts: true
    job: yard
  - artifacts: true
    job: update
    optional: true
  script:
  - echo "Deploying gitlab pages..."
  - ls -lhR public
trigger-rollout-update-daemonset:
  extends:
  - .deploy-job
  - .rules:deploy-image
  inherit:
    variables: false
  needs:
  - build-gitlab-remote-workspace-image
  trigger:
    project: gitlab-org/quality/engineering-productivity-infrastructure
  variables:
    RUN_ROLLOUT_UPDATE_DAEMONSET: 'true'
yard:
  artifacts:
    expire_in: 1 week
    paths:
    - public/yard/*
  cache:
    key: ruby-bundle
    paths:
    - $BUNDLE_PATH
  extends:
  - .deploy-job
  - .rules:deploy-pages
  image: ${GITLAB_DEPENDENCY_PROXY}ruby:${RUBY_VERSION}
  parallel:
    matrix:
    - RUBY_VERSION:
      - '3.2'
      - '3.3'
      - '3.4'
  script:
  - bundle install
  - bundle exec yardoc
