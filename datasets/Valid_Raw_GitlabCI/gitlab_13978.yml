before_script:
- apt-get update && apt-get -y install git openjdk-17-jdk-headless
git-merge-upstream:
  allow_failure: false
  except:
  - pushes
  only:
  - schedules
  - master
  script:
  - git config --global user.name "Git Robot"
  - git config --global user.email "git-robot@opentransitmap.org"
  - eval $(ssh-agent -s)
  - ssh-add <(echo "$SSH_PRIVATE_KEY")
  - mkdir -p ~/.ssh
  - '[[ -f /.dockerenv ]] && echo -e "Host *\n\tStrictHostKeyChecking no\n\n" > ~/.ssh/config'
  - git clone git@gitlab.com:${CI_PROJECT_PATH}.git
  - cd ${CI_PROJECT_NAME}
  - git remote add upstream https://github.com/schildbach/public-transport-enabler.git
  - git fetch upstream
  - git config merge.ours.driver true
  - git merge upstream/master
  - ./gradlew clean build
  - git push --force origin master
  stage: git-robot
gradle-build:
  allow_failure: false
  except:
  - schedules
  only:
  - master
  - pushes
  script:
  - ./gradlew clean build
  stage: build
image: debian:bookworm-slim
stages:
- git-robot
- build
