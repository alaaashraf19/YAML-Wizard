codecov:
  allow_failure: true
  image: python:3.7
  needs:
  - python-3.7
  retry: 2
  script:
  - python -m pip install coverage
  - bash <(curl -s https://codecov.io/bash) -t 5c2b4cbc-5626-4d17-877d-b29bf16032b3
    -Z -f coverage.xml
  stage: coverage
include:
- template: Code-Quality.gitlab-ci.yml
- template: Dependency-Scanning.gitlab-ci.yml
- template: License-Scanning.gitlab-ci.yml
- template: SAST.gitlab-ci.yml
python-3.7:
  artifacts:
    paths:
    - coverage.xml
  image: python:3.7
  interruptible: true
  script:
  - python -m pip install --upgrade pip
  - python -m pip install -r requirements.txt
  - python -m pip install .
  - pytest --cov-config .coveragerc --cov-report term --cov-report xml --cov=pyframe
  stage: test
python-3.8:
  image: python:3.8
  interruptible: true
  script:
  - python -m pip install --upgrade pip
  - python -m pip install -r requirements.txt
  - python -m pip install .
  - pytest
  stage: test
python-3.9:
  image: python:3.9
  interruptible: true
  script:
  - python -m pip install --upgrade pip
  - python -m pip install -r requirements.txt
  - python -m pip install .
  - pytest
  stage: test
stages:
- test
- coverage
variables:
  SAST_BANDIT_EXCLUDED_PATHS: tests
  SAST_EXCLUDED_PATHS: tests
