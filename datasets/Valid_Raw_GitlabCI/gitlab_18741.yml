before_script:
- apt-get update -qy
- apt-get install -y git-core
- make install
build:
  artifacts:
    paths:
    - torrents
  only:
  - tags
  script:
  - make build
  stage: build
build-gui:
  artifacts:
    paths:
    - torrents-tk
  script:
  - make build-gui
  stage: build
e2e:
  only:
  - triggers
  script:
  - make test-end2end
  stage: test
image: daewok/lisp-devel
stages:
- test
- build
test:
  only:
  - tags
  script:
  - make test
  stage: test
