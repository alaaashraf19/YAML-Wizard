build:
  script:
  - mvn install -B
cache:
  paths:
  - .m2/
coverage:
  artifacts:
    paths:
    - target/site/cobertura
  script:
  - mvn cobertura:cobertura
image: maven:3.3.9-jdk-8
pages:
  artifacts:
    expire_in: 30 days
    paths:
    - public
  dependencies:
  - site
  only:
  - master
  script:
  - mv target/site/ public/
  stage: deploy
site:
  artifacts:
    paths:
    - target/site
  script:
  - mvn site
variables:
  MAVEN_OPTS: -Dmaven.repo.local=${CI_PROJECT_DIR}/.m2
