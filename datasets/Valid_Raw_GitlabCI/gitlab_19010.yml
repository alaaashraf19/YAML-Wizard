cache:
  paths:
  - node_modules/
  - /usr/local/lib/node_modules/
image: node:latest
pages:
  artifacts:
    paths:
    - public
  dependencies:
  - test
  only:
  - master
  script:
  - mkdir public/
  - mv coverage/ public/coverage/
  stage: pages
stages:
- test
- pages
test:
  artifacts:
    paths:
    - coverage
  script:
  - yarn install
  - yarn lint
  - yarn test
  stage: test
