.defaults:
  before_script: &id001
  - apk add --update ragel build-base
  - if [ "$INSTALL_OPENJDK" == "true" ]; then apk add openjdk8; fi
  - gem install bundler --no-ri --no-rdoc
  - ruby --version
  - gem --version
  - bundle --version
  - bundle install --path vendor --retry=3
  cache: &id002
    paths:
    - vendor/ruby
  script: &id003
  - bundle exec rake
JRuby 9.1:
  before_script: *id001
  cache: *id002
  image: jruby:9.1-alpine
  script: *id003
  variables:
    INSTALL_OPENJDK: 'true'
Ruby 2.2:
  before_script: *id001
  cache: *id002
  image: ruby:2.2-alpine
  script: *id003
Ruby 2.3:
  before_script: *id001
  cache: *id002
  image: ruby:2.3-alpine
  script: *id003
Ruby 2.4:
  before_script: *id001
  cache: *id002
  image: ruby:2.4-alpine
  script: *id003
