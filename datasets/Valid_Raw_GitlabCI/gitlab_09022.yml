auto_deploy:check_package:
  extends:
  - .with-bundle
  - .common-ci-tokens
  rules:
  - if: $CHECK_PACKAGE == "true"
    when: always
  script:
  - bundle exec rake 'auto_deploy:check_package'
  stage: automation
auto_deploy:check_production:
  allow_failure:
    exit_codes: 10
  cache:
    key: deployment_notification_ts
    paths:
    - SLACK_DEPLOYMENT_MESSAGE_TS
    - vendor/ruby
  extends:
  - .common-job-setup
  - .mimir-query-auth
  rules:
  - if: $CHECK_PRODUCTION == "true"
  script:
  - bundle exec rake 'auto_deploy:check_production'
  stage: automation
  tags:
  - release
auto_deploy:cleanup:
  extends:
  - .with-bundle
  - .common-ci-tokens
  rules:
  - if: $AUTO_DEPLOY_CLEANUP == "true"
    when: always
  script:
  - bundle exec rake 'auto_deploy:cleanup'
  stage: automation
auto_deploy:deploy_latest:
  extends: .common-job-setup
  resource_group: auto-deploy-deploy-latest
  rules:
  - if: $AUTO_DEPLOY_DEPLOY_LATEST == "true"
    when: always
  script:
  - bundle exec rake 'auto_deploy:deploy_latest'
  stage: automation
auto_deploy:deploy_version:
  extends: .common-job-setup
  rules:
  - if: $AUTO_DEPLOY_DEPLOY_VERSION == "true"
    when: always
  script:
  - bundle exec rake "auto_deploy:deploy_version[$VERSION,$FORCE_DEPLOY_VERSION]"
  stage: automation
