manual-release-scenic-core-build-docker-image-from-branch:
  image: docker:20
  rules:
  - allow_failure: true
    if: $CI_PIPELINE_SOURCE != "merge_request_event"
    when: manual
  script:
  - docker context create scenic_core_builder
  - docker buildx create scenic_core_builder
  - docker login -u $CI_REGISTRY_USER -p $CI_JOB_TOKEN $CI_REGISTRY
  - docker buildx build --no-cache --progress plain --provenance false --push --platform
    $PLATFORM -t $IMAGE_PATH -f $DOCKERFILE_PATH --build-arg "CERBERO_TAG=$CERBERO_TAG"
    --build-arg "SCENIC_CORE_BUILD_DEPS_TAG=$SCENIC_CORE_BUILD_DEPS_TAG" --build-arg
    "SHMDATA_TAG=$SHMDATA_TAG" --build-arg "NDI2SHMDATA_TAG=$NDI2SHMDATA_TAG" --build-arg
    "SWITCHER_TAG=$SWITCHER_TAG" --build-arg "GST_PLUGINS_RS_GIT_URL=$GST_PLUGINS_RS_GIT_URL"
    --build-arg "GST_PLUGINS_RS_TAG=$GST_PLUGINS_RS_TAG" --build-arg "GST_PLUGINS_RS_GIT_COMMIT=$GST_PLUGINS_RS_GIT_COMMIT"
    --build-arg "SWITCHER_PIPESPLINT_TAG=$SWITCHER_PIPESPLINT_TAG" .
  - docker manifest inspect $IMAGE_PATH
  services:
  - docker:20.10-dind
  stage: docker-image
  tags:
  - ${RUNNER_HOSTNAME}
  timeout: 4 hour
  variables:
    DOCKERFILE_PATH: docker/scenic-core-build/Dockerfile
    IMAGE_PATH: $CI_REGISTRY_IMAGE/scenic-core-build:$CI_COMMIT_REF_SLUG
