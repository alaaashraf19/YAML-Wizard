release-scenic-core-build-docker-image:
  image: docker:20
  only:
  - tags
  - develop
  script:
  - docker context create scenic_core_builder
  - docker buildx create scenic_core_builder
  - docker login -u $CI_REGISTRY_USER -p $CI_JOB_TOKEN $CI_REGISTRY
  - docker buildx build --no-cache --progress plain --provenance false --push --platform
    $PLATFORM -t $IMAGE_PATH -f $DOCKERFILE_PATH --build-arg "CERBERO_TAG=$CERBERO_TAG"
    --build-arg "SCENIC_CORE_BUILD_DEPS_TAG=$SCENIC_CORE_BUILD_DEPS_TAG" --build-arg
    "SHMDATA_TAG=$SHMDATA_TAG" --build-arg "NDI2SHMDATA_TAG=$NDI2SHMDATA_TAG" --build-arg
    "SWITCHER_TAG=$SWITCHER_TAG" --build-arg "GST_PLUGINS_RS_GIT_URL=$GST_PLUGINS_RS_GIT_URL"
    --build-arg "GST_PLUGINS_RS_TAG=$GST_PLUGINS_RS_TAG" --build-arg "GST_PLUGINS_RS_GIT_COMMIT=$GST_PLUGINS_RS_GIT_COMMIT"
    --build-arg "SWITCHER_PIPESPLINT_TAG=$SWITCHER_PIPESPLINT_TAG" .
  - docker manifest inspect $IMAGE_PATH
  services:
  - docker:20.10-dind
  stage: docker-image
  tags:
  - ${RUNNER_HOSTNAME}
  timeout: 4 hour
  variables:
    DOCKERFILE_PATH: docker/scenic-core-build/Dockerfile
    IMAGE_PATH: $CI_REGISTRY_IMAGE/scenic-core-build:$CI_COMMIT_REF_NAME
release-scenic-core-final-docker-image:
  image: docker:20
  needs:
  - release-scenic-core-build-docker-image
  only:
  - tags
  - develop
  script:
  - docker context create scenic_core_builder
  - docker buildx create scenic_core_builder
  - docker login -u $CI_REGISTRY_USER -p $CI_JOB_TOKEN $CI_REGISTRY
  - docker buildx build --no-cache --progress plain --provenance false --push --platform
    $PLATFORM -t $IMAGE_PATH -f docker/scenic-core/Dockerfile --build-arg "CERBERO_TAG=$CERBERO_TAG"
    --build-arg "SCENIC_CORE_BUILD_TAG=$SCENIC_CORE_BUILD_TAG" --build-arg "SCENIC_CORE_RUNTIME_DEPS_TAG=$SCENIC_CORE_RUNTIME_DEPS_TAG"
    .
  - docker manifest inspect $IMAGE_PATH
  services:
  - docker:20.10-dind
  stage: docker-image
  tags:
  - ${RUNNER_HOSTNAME}
  timeout: 4 hour
  variables:
    DOCKERFILE_PATH: docker/scenic-core/Dockerfile
    IMAGE_PATH: $CI_REGISTRY_IMAGE:$CI_COMMIT_REF_NAME
    SCENIC_CORE_BUILD_TAG: $CI_COMMIT_REF_NAME
stages:
- docker-image
variables:
  CERBERO_TAG: 1.24.2-20240416
  GST_PLUGINS_RS_GIT_COMMIT: '51937124'
  GST_PLUGINS_RS_GIT_URL: https://gitlab.freedesktop.org/gstreamer/gst-plugins-rs.git
  GST_PLUGINS_RS_TAG: main
  NDI2SHMDATA_TAG: v0.7.0
  PLATFORM: linux/amd64
  RUNNER_HOSTNAME:
    description: The specific GitLab runner hostname. Each runner needs to have a
      tag manually defined with its hostname.
  SCENIC_CORE_BUILD_DEPS_TAG: 22.04-20240207
  SCENIC_CORE_RUNTIME_DEPS_TAG: 22.04-20240207
  SHMDATA_TAG: 1.3.74
  SWITCHER_PIPESPLINT_TAG: develop
  SWITCHER_TAG: 4.2.0
