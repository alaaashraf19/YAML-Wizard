pages:
  artifacts:
    paths:
    - public
  image: nixos/nix:latest
  only:
  - master
  script:
  - nix-shell -p gnumake -p pandoc -p perl -p "texlive.combine { inherit (texlive)
    scheme-small pdftex pdfjam a4wide accents adjustbox animate arev arydshln bbding
    bbm bbm-macros biblatex bibtex bibexport blindtext boxedminipage breakurl bussproofs
    calligra cancel catchfile chngcntr cjk cleveref cmll collectbox comment csquotes
    dashrule datatool dirtytalk draftwatermark eepic endfloat enumitem environ everypage
    extpfeil fdsymbol fontawesome fontawesome5 fontaxes footmisc framed fvextra graphbox
    ifmtarg ifoddpage ifplatform ifsym kurier lastpage lazylist libertine lkproof
    logreq makecell manfnt marginnote marvosym mdframed media9 minted mnsymbol moderncv
    multibib multirow mweights needspace newtx newunicodechar nopageno ntheorem ocgx2
    pgfplots polytable preview shadethm siunitx soul stix stmaryrd sttools subfigure
    substr svg tabto-ltx tcolorbox thmtools tikz-cd tikzfill tikzmark tikzpagenodes
    titlesec todonotes trimspaces type1cm ucs upquote vwcol wasy wasysym wrapfig xfor
    xifthen xpatch xstring xypic zref; }" --run make
  - mv build public
  stage: deploy
