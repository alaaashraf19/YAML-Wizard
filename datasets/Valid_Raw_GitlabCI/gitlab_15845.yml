.build_job_template:
  before_script: &id001
  - sed -i package.json -e "s#0\.0\.0-tag#$CI_COMMIT_TAG#g"
  - npm ci
  - npm run webpack
  only: &id002
  - tags
  stage: release
  tags: &id003
  - docker
build:
  except:
  - master
  - tags
  image: node:17
  script:
  - npm ci
  - npm run lint
  - npm run webpack
  stage: build
  tags:
  - docker
package-linux-snap:
  artifacts:
    name: ${CI_PROJECT_NAME}_${CI_COMMIT_TAG}
    paths:
    - '*.snap'
  before_script: *id001
  image: electronuserland/builder
  only: *id002
  script:
  - npm run package-linux-snap
  - mv dist/*.snap .
  stage: release
  tags: *id003
package-linux-snap-test:
  except:
  - tags
  - master
  image: electronuserland/builder
  script:
  - npm ci
  - npm run webpack
  - npm run package-linux-snap
  stage: build
  tags:
  - docker
package-linux-targz:
  artifacts:
    name: ${CI_PROJECT_NAME}_${CI_COMMIT_TAG}
    paths:
    - '*.tar.gz'
  before_script: *id001
  image: electronuserland/builder
  only: *id002
  script:
  - npm run package-linux-targz
  - mv dist/*.tar.gz .
  stage: release
  tags: *id003
package-mac-targz:
  artifacts:
    name: ${CI_PROJECT_NAME}_${CI_COMMIT_TAG}
    paths:
    - '*.tar.gz'
  before_script: *id001
  image: electronuserland/builder
  only: *id002
  script:
  - npm run package-mac-targz
  - mv dist/*.tar.gz .
  stage: release
  tags: *id003
package-win-nsis:
  artifacts:
    name: ${CI_PROJECT_NAME}_${CI_COMMIT_TAG}
    paths:
    - '*.exe'
  before_script: *id001
  image: electronuserland/builder:wine
  only: *id002
  script:
