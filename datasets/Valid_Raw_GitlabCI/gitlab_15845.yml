  - mv dist/*.exe .
  stage: release
  tags: *id003
package-win-zip:
  artifacts:
    name: ${CI_PROJECT_NAME}_${CI_COMMIT_TAG}
    paths:
    - '*.zip'
  before_script: *id001
  image: electronuserland/builder:wine
  only: *id002
  script:
  - npm run package-win-zip
  - mv dist/*.zip .
  stage: release
  tags: *id003
pages:
  artifacts:
    paths:
    - public/
  dependencies: []
  image: node:17
  only:
  - tags
  script:
  - sed -i package.json -e "s#0\.0\.0-tag#$CI_COMMIT_TAG#g"
  - npm ci
  - npm run public
  stage: deploy
  tags:
  - docker
publish-linux-snap:
  dependencies:
  - package-linux-snap
  image: snapcore/snapcraft:stable
  only:
  - tags
  script:
  - echo $SNAPCRAFT_LOGIN_FILE | base64 --decode --ignore-garbage > snapcraft.login
  - snapcraft login --with snapcraft.login
  - snapcraft push *.snap --release beta
  stage: deploy
  tags:
  - docker
release:
  except:
  - tags
  image: node:17
  only:
  - master
  script:
  - npx semantic-release-gitlab
  stage: release
  tags:
  - docker
stages:
- build
- pre-release
- release
- deploy
