default:
  interruptible: true
  timeout: 15m
image: alpine
test:
  before_script:
  - if cat /etc/modules | grep -q ipv6; then echo ipv6 already exists in the file,
    no need to add; else echo "ipv6" >> /etc/modules; fi
  - apk update
  - apk add bash
  - apk add gettext
  script: bash test_compile_po.sh
workflow:
  rules:
  - when: always
