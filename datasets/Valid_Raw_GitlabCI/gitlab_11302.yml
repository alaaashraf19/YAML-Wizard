build_webapp:
  artifacts:
    paths:
    - app/dist/spa-mat
  before_script:
  - node -v
  - npm -v
  image: node:8
  script:
  - cd app
  - npm install --progress=false
  - npm run build
  - secsepoch="$(date +'%y')$(date +%m)$(date +%d):$(date +%-H)$(date +%M)"
  - PACKAGE_VERSION=$(node -p "require('./package.json').version")
  - sed -i -e "s/==GLOBAPPVERSION==/$PACKAGE_VERSION.$secsepoch/g" dist/spa-mat/index.html
  stage: build
deploy_webapp_production:
  artifacts:
    paths:
    - app/dist/spa-mat
  before_script:
  - which ssh-agent || ( apt-get update -y && apt-get install openssh-client -y )
  - eval $(ssh-agent -s)
  - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add - > /dev/null
  - mkdir -p ~/.ssh
  - chmod 700 ~/.ssh
  - echo "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
  - chmod 644 ~/.ssh/known_hosts
  - apt-get install rsync
  environment:
    name: production
    url: https://cashflow.kyani.eu
  image: tetraweb/php:7.1
  script:
  - ssh -p2022 $SSH_SRV "rm -Rf $SSH_WWW_BASE/appserver/_old_production"
  - ssh -p2022 $SSH_SRV "mkdir -p $SSH_WWW_BASE/appserver/_tmp_production"
  - scp -P2022 -r app/dist/spa-mat/* $SSH_SRV:$SSH_WWW_BASE/appserver/_tmp_production
  - ssh -p2022 $SSH_SRV "mv $SSH_WWW_BASE/appserver/production $SSH_WWW_BASE/appserver/_old_production
    && mv $SSH_WWW_BASE/appserver/_tmp_production $SSH_WWW_BASE/appserver/production"
  stage: deploy
  when: manual
deploy_webapp_staging:
  artifacts:
    paths:
    - app/dist/spa-mat
  before_script:
  - which ssh-agent || ( apt-get update -y && apt-get install openssh-client -y )
  - eval $(ssh-agent -s)
  - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add - > /dev/null
  - mkdir -p ~/.ssh
  - chmod 700 ~/.ssh
  - echo "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
  - chmod 644 ~/.ssh/known_hosts
  - apt-get install rsync
  environment:
    name: staging
    url: https://staging.kyani.eu
  image: tetraweb/php:7.1
  script:
  - ssh -p2022 $SSH_SRV "rm -Rf $SSH_WWW_BASE/appserver/_old_staging"
  - ssh -p2022 $SSH_SRV "mkdir -p $SSH_WWW_BASE/appserver/_tmp_staging"
  - scp -P2022 -r app/dist/spa-mat/* $SSH_SRV:$SSH_WWW_BASE/appserver/_tmp_staging
  - ssh -p2022 $SSH_SRV "mv $SSH_WWW_BASE/appserver/staging $SSH_WWW_BASE/appserver/_old_staging
    && mv $SSH_WWW_BASE/appserver/_tmp_staging $SSH_WWW_BASE/appserver/staging"
  stage: deploy
