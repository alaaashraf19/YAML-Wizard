before_script:
- env
- pwd
- ls -la
build_project:
  after_script:
  - slather coverage -s
  only:
  - master
  script:
  - pod update
  - xcodebuild clean -workspace converse.xcworkspace -scheme converse | xcpretty -s
  - xcodebuild clean -workspace converse.xcworkspace -scheme converseApp | xcpretty
    -s
  - xcodebuild test -workspace converse.xcworkspace -scheme converse -destination
    'platform=iOS Simulator,name=iPhone 17 Pro Max,OS=26.0.1' -enableCodeCoverage
    YES | xcpretty -s
  stage: build
  tags:
  - ios
  - converse
stages:
- build
variables: null
