before_script:
- ruby -v
- gem install bundler --no-ri --no-rdoc
- gem install rails
- gem install heroku
- gem install pg
- gem install rubocop
- gem install rspec
- gem install rake
- bundle install
cache:
  paths:
  - vendor/ruby
image: ruby:2.3
pages:
  artifacts:
    expire_in: 30 days
    paths:
    - public
  dependencies:
  - rspec
  script:
  - mv coverage/ public/
  stage: deploy
production:
  script:
  - gem install dpl
  - dpl --provider=heroku --app=mralfred --api-key=fbf1e70c-e72c-433c-95f4-ca332099a60d
  type: deploy
rails:
  script:
  - rails db:migrate
  - rails db:seed
  - rails test
  variables:
    DATABASE_URL: postgresql://postgres:postgres@postgres:5432/$POSTGRES_DB
rspec:
  artifacts:
    paths:
    - coverage/
  script:
  - rake db:migrate RAILS_ENV=test
  - bundle exec rspec spec
  variables:
    DATABASE_URL: postgresql://postgres:postgres@postgres:5432/$POSTGRES_DB
rubocop:
  script:
  - rubocop
services:
- redis:latest
- postgres:latest
staging:
  script:
  - gem install dpl
  - dpl --provider=heroku --app=mralfred-staging --api-key=fbf1e70c-e72c-433c-95f4-ca332099a60d
  type: deploy
variables:
  POSTGRES_DB: mralfred_development
  POSTGRES_PASSWORD: postgres
  POSTGRES_USER: postgres
