build:
  artifacts:
    paths:
    - mybinary
  script:
  - pwd
  - commits=`git log -1 --pretty=format:"%H %P"`
  - git diff --name-only $commits > changed_files.txt
  - changed_dir=`python yenart/scripts/get_dir.py changed_files.txt`
  - echo $changed_dir
  - cd $changed_dir
  - make
  stage: build
image: gcc
