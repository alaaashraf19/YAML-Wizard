deploy:
  before_script:
  - yarn global add react-scripts
  - yarn global add netlify-cli
  - yarn install && yarn build
  image: node:14
  only:
  - master@denkmal/denkmal-website-admin
  script:
  - netlify deploy --site="$NETLIFY_SITE" --auth="$NETLIFY_AUTH_TOKEN" --dir=build/
    --prod --message="$CI_COMMIT_MESSAGE"
  stage: deploy
stages:
- test
- deploy
test:
  cache:
    paths:
    - node_modules/
  image: node:14
  script:
  - yarn install
  - yarn test
  stage: test
variables:
  NETLIFY_SITE: 37fca3f6-1100-4e48-80c0-000670c7cad7
