before_script:
- node -v
- npm -v
- cd client && npm install && cd ..
client_build:
  artifacts:
    expire_in: 2 weeks
    paths:
    - client/dist
  script:
  - cd client
  - npm run build
  stage: client_build
client_lint:
  script:
  - cd client
  - npm run lint
  stage: test
image: node:9
server_deploy:
  artifacts:
    expire_in: 2 weeks
    paths:
    - server
  only:
  - master
  - web
  script:
  - cp -r client/dist server/static
  - cd server
  - git init
  - git config user.name "Gitlab CI"
  - git config user.email "mui.kaien@dhs.sg"
  - git add . && git commit -m "deploy from gitlab"
  - git remote add heroku https://heroku:$HEROKU_API_KEY@git.heroku.com/sccl-dictionary.git
  - git push heroku master -f
  stage: deploy
stages:
- test
- client_build
- deploy
