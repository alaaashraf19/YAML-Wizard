build:
  artifacts:
    paths:
    - app
  image: mcr.microsoft.com/dotnet/sdk:6.0
  script:
  - curl -sL https://deb.nodesource.com/setup_14.x | bash -
  - apt-get install -y --no-install-recommends nodejs
  - dotnet restore
  - dotnet publish -r linux-musl-x64 --self-contained -o app
  stage: build
deploy:
  artifacts:
    paths:
    - app
  before_script:
  - which ssh-agent || ( apt-get update -y && apt-get install openssh-client -y )
  - eval $(ssh-agent -s)
  - ssh-add <(echo "$SSH_PRIVATE_KEY")
  - mkdir -p ~/.ssh
  - '[[ -f /.dockerenv ]] && echo -e "Host *\n\tStrictHostKeyChecking no\n\n" > ~/.ssh/config'
  image: debian:latest
  only:
  - master
  script:
  - "ssh $BUILD_USER@$BUILD_SERVER << EOF\n    docker stop $CONTAINER_NAME || true;\
    \ \n    docker rm $CONTAINER_NAME || true; \n    docker pull $IMAGE_TAG; \n  \
    \  docker run -d --name $CONTAINER_NAME $IMAGE_TAG\nEOF\n"
  stage: deploy
  variables:
    GIT_STRATEGY: none
dockerbuild:
  artifacts:
    paths:
    - app
  image: docker:latest
  script:
  - docker login -u gitlab-ci-token -p $CI_JOB_TOKEN $CI_REGISTRY
  - docker build -t $IMAGE_TAG ./app
  - docker push $IMAGE_TAG
  services:
  - docker:dind
  stage: compose
  variables:
    GIT_STRATEGY: none
stages:
- build
- compose
- deploy
variables:
  IMAGE_TAG: $CI_REGISTRY_IMAGE:$CI_COMMIT_REF_NAME
