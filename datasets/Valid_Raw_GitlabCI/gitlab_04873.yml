build:
  before_script:
  - apt update && apt -y install g++ make libyaml-cpp-dev
  script:
  - make noMEGAlib
  stage: build
debug-build:
  before_script:
  - apt update && apt -y install g++ git make libyaml-cpp-dev libdw-dev
  script:
  - make debug-noMEGAlib
  stage: build
image: ubuntu
pages:
  artifacts:
    paths:
    - public
  only:
    refs:
    - master
  script:
  - apt update && apt -y install make autoconf g++ doxygen doxygen-doc doxygen-latex
    doxygen-gui libyaml-cpp-dev
  - doxygen Doxyfile
  stage: deploy
