.build:android:
  artifacts:
    paths:
    - platforms/android/build/outputs/apk/
  script:
  - ionic cordova platform rm android
  - ionic cordova platform add android
  - npm run android:release
  - ls ./platforms/android/build/outputs/apk/android*.apk
  stage: deploy
.build:ios:
  script:
  - gem install cocoapods
  - pods setup
  - ionic cordova platform rm ios
  - ionic cordova platform add ios
  - npm run ios:release
.est:karma:
  script:
  - npm run test
  stage: test
before_script:
- apt-get update >/dev/null
- apt-get install -y locales >/dev/null
- echo "en_US UTF-8" > /etc/locale.gen
- locale-gen en_US.UTF-8
- export LANG=en_US.UTF-8
- export LANGUAGE=en_US:en
- export LC_ALL=en_US.UTF-8
- yarn config set cache-folder .yarn
- yarn
build:web:
  artifacts:
    paths:
    - www/
  script:
  - npm run build
  stage: build
cache:
  key: $CI_PROJECT_ID
  paths:
  - node_modules/
  - .yarn
  untracked: true
deploy:web:
  only:
  - release
  script:
  - curl $FORGE_DATA
  stage: deploy
image: lkdevelopment/ionic-docker:latest
stages:
- build
- test
- e2e_de
- e2e_en
- deploy
test:e2e:de:
  dependencies:
  - build:web
  script:
  - echo "Start Test for e2e Local 'DE'"
  - TEST_API_KEY=$TEST_API_KEY SCREENSHOTS=false LANG=de node test-config/protractor.server.js
  stage: e2e_de
test:e2e:en:
  dependencies:
  - build:web
  script:
  - echo "Start Test for e2e Local 'EN'"
  - TEST_API_KEY=$TEST_API_KEY SCREENSHOTS=false LANG=en node test-config/protractor.server.js
  stage: e2e_en
