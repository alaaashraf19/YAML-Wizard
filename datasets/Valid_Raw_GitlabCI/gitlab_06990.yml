before_script:
- apt-get update && apt-get install -y openjfx
build_jdk11:
  image: maven:3.9.9-eclipse-temurin-11
  script:
  - mvn verify --batch-mode
  stage: deploy
build_jdk17:
  image: maven:3.9.9-eclipse-temurin-17
  script:
  - mvn verify --batch-mode
  stage: deploy
build_jdk21:
  image: maven:3.9.9-eclipse-temurin-21
  script:
  - mvn verify --batch-mode
  stage: deploy
build_jdk23:
  artifacts:
    expire_in: 6 weeks
    paths:
    - target/*.jar
    reports:
      junit: target/surefire-reports/TEST-*.xml
  image: maven:3.9.9-eclipse-temurin-23
  script:
  - mvn verify --batch-mode
  stage: deploy
