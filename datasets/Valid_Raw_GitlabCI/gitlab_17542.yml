image: node:10.15.0
npm_publish:
  only:
  - master
  script:
  - npm install
  - npx semantic-release
  stage: publish
  when: manual
stages:
- test
- publish
- publish_external
test_icons:
  before_script:
  - npm install
  - npm i -g grunt
  script:
  - grunt test
  stage: test
unit_test:
  before_script:
  - npm install
  - npm i -g mocha
  script:
  - npm run test
  stage: test
update:rubygem:
  needs:
  - npm_publish
  only:
  - master
  stage: publish_external
  trigger:
    project: SUSE-UIUX/eos-icons-rails
    strategy: depend
