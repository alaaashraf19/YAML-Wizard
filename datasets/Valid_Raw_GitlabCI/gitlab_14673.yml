android_unit_test:
  artifacts:
    expire_in: 1 week
    paths:
    - app/build/reports/
  coverage: /Total.*?([0-9]{1,3})%/
  script:
  - ./gradlew clean test jacocoTestReport --stacktrace
  - cat app/build/reports/jacoco/jacocoTestReport/html/index.html
  stage: android_test
api_deploy_development:
  only:
  - sit_uat
  script:
  - apt-get update -qy
  - apt-get install -y ruby-dev
  - gem install dpl
  - dpl --provider=heroku --app=klilink-development --api-key=$HEROKU_API_KEY
  stage: deploy
api_deploy_production:
  only:
  - master
  script:
  - apt-get update -qy
  - apt-get install -y ruby-dev
  - gem install dpl
  - dpl --provider=heroku --app=klilink-api --api-key=$HEROKU_API_KEY
  stage: deploy
before_script:
- apt-get --quiet update --yes
- apt-get --quiet install --yes wget tar unzip lib32stdc++6 lib32z1
- wget --quiet --output-document=android-sdk.zip https://dl.google.com/android/repository/sdk-tools-linux-3859397.zip
- unzip -q android-sdk.zip -d android-sdk-linux
- mkdir android-sdk-linux/licenses
- printf "8933bad161af4178b1185d1a37fbf41ea5269c55\nd56f5187479451eabf01fb78af6dfcb131a6481e"
  > android-sdk-linux/licenses/android-sdk-license
- printf "84831b9409646a918e30573bab4c9c91346d8abd" > android-sdk-linux/licenses/android-sdk-preview-license
- android-sdk-linux/tools/bin/sdkmanager --update > update.log
- android-sdk-linux/tools/bin/sdkmanager "platforms;android-${ANDROID_COMPILE_SDK}"
  "build-tools;${ANDROID_BUILD_TOOLS}" "extras;google;m2repository" "extras;android;m2repository"
  > installPlatform.log
- export ANDROID_HOME=$PWD/android-sdk-linux
- export PATH=$PATH:$PWD/android-sdk-linux/platform-tools/
- chmod +x ./gradlew
- export MINIMUM_COVERAGE=100
- export ANDROID_HOME=$PWD/android-sdk-linux
- export PATH=$PATH:$PWD/android-sdk-linux/platform-tools/
build_debug:
  artifacts:
    paths:
    - app/build/outputs/
  except:
  - master
  script:
  - ./gradlew assembleDebug
  stage: build
build_release:
  artifacts:
    paths:
    - app/build/outputs/
  only:
  - master
  script:
  - ./gradlew assembleRelease
  stage: build
cache:
  paths:
  - .m2/
  - .gradle/
image: openjdk:8-jdk
lint_android:
  artifacts:
    paths:
    - app/build/reports/
  script:
  - ./gradlew lint
  stage: lint
lint_flask:
  before_script:
  - pip install -r requirements.txt
  image: python:3.6
  script:
  - cd api
  - python manage.py lint
  stage: lint
restful_test:
  before_script:
  - pip install -r requirements.txt
  coverage: /\d+\%\s*$/
  image: python:3.6
  script:
  - cd api
  - python manage.py unittest
  stage: api_test
stages:
- lint
- build
- android_test
- deploy
- api_test
variables:
  ANDROID_BUILD_TOOLS: 25.0.2
  ANDROID_COMPILE_SDK: '26'
  ANDROID_SDK_TOOLS: 27.0.1
