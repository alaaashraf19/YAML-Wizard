node-10:
  before_script:
  - npm install
  image: node:10
  script:
  - npm test
  services:
  - alias: dynamodb
    name: cnadiminti/dynamodb-local
  stage: test
  variables:
    AWS_DYNAMODB_ENDPOINT: http://dynamodb:8000
    DATA_DIR: ./test/data
    NODE_ENV: test
