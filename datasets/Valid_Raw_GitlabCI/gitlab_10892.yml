deploy:
  before_script:
  - which ssh-agent || ( apt-get update -y && apt-get install openssh-client -y )
  - mkdir -p ~/.ssh
  - eval $(ssh-agent -s)
  - '[[ -f /.dockerenv ]] && echo -e "Host *\n\tStrictHostKeyChecking no\n\n" > ~/.ssh/config'
  environment:
    name: Production
    url: $PRD_URL
  only:
  - master
  script:
  - ssh-add <(echo "$PRIVATE_KEY")
  - rm -rf .git
  - ssh -o StrictHostKeyChecking=no ubuntu@"$PRD_SERVER" "rm -rf ~/${WORK_DIR}; mkdir
    ~/${WORK_DIR}; git init; git clone -b ${BRANCH} ${REPO}; cd ${WORK_DIR}; npm install;
    npm install forever -g; npm run stop; npm run start-background"
  stage: deploy
image: ubuntu:latest
stages:
- test
- deploy
test:
  before_script:
  - which ssh-agent || ( apt-get update -y && apt-get install openssh-client -y )
  - mkdir -p ~/.ssh
  - eval $(ssh-agent -s)
  - '[[ -f /.dockerenv ]] && echo -e "Host *\n\tStrictHostKeyChecking no\n\n" > ~/.ssh/config'
  environment:
    name: Test
    url: $TST_URL
  except:
  - master
  only:
  - branches
  script:
  - ssh-add <(echo "$PRIVATE_KEY")
  - rm -rf .git
  - ssh -o StrictHostKeyChecking=no ubuntu@"$TST_SERVER" "rm -rf ~/${WORK_DIR}; mkdir
    ~/${WORK_DIR}; git init; git clone -b ${BRANCH} ${REPO}; cd ${WORK_DIR}; npm install;
    npm install forever -g; npm run stop; npm run ci"
  stage: test
variables:
  BRANCH: ${CI_COMMIT_REF_NAME}
  REPO: https://gitlab.com/johandurancerdas/gitlab-cicd-tutorial.git
  WORK_DIR: ${CI_PROJECT_NAME}
