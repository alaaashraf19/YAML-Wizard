buildit:
  artifacts:
    expire_in: 1 week
    name: ${CI_JOB_NAME}_${CI_COMMIT_REF_NAME}
    paths:
    - build
    when: on_success
  except:
  - branchess
  script:
  - npm run build
  stage: build
cache:
  paths:
  - node_modules/
deploytoaws_production:
  environment:
    name: production
    url: http://$S3_BUCKET_NAME_PRODUCTION.s3-website-ap-southeast-2.amazonaws.com/
  image: python:latest
  only:
  - master
  script:
  - pip install awscli
  - aws s3 cp build/ s3://$S3_BUCKET_NAME_PRODUCTION/ --recursive
  stage: deploy
  when: manual
deploytoaws_staging:
  environment:
    name: staging
    url: http://$S3_BUCKET_NAME_STAGING.s3-website-ap-southeast-2.amazonaws.com/
  image: python:latest
  only:
  - master
  script:
  - pip install awscli
  - aws s3 cp build/ s3://$S3_BUCKET_NAME_STAGING/ --recursive
  stage: deploy
image: node:alpine
installit:
  script:
  - npm install
  stage: install
stages:
- install
- test
- build
- review
- deploy
start_review:
  before_script:
  - pip install awscli
  environment:
    name: review/$CI_BUILD_REF_NAME
    on_stop: stop_review
    url: http://$S3_BUCKET_NAME_FEATURE_BRANCH.s3-website-ap-southeast-2.amazonaws.com/$CI_COMMIT_REF_SLUG/
  except:
  - master
  image: python:latest
  only:
  - branches
  script:
  - aws s3 cp build/ s3://$S3_BUCKET_NAME_FEATURE_BRANCH/$CI_COMMIT_REF_SLUG/  --recursive
  stage: review
stop_review:
  before_script:
  - pip install awscli
  environment:
    action: stop
    name: review/$CI_BUILD_REF_NAME
  except:
  - master
  image: python:latest
  only:
  - branches
  script:
  - aws s3 rm s3://$S3_BUCKET_NAME_FEATURE_BRANCH/$CI_COMMIT_REF_SLUG/ --recursive
  stage: review
  variables:
    GIT_STRATEGY: none
  when: manual
testtime:
  script:
  - set CI=true&&npm test
  stage: test
variables:
  AWS_ACCESS_KEY_ID: $AWS_ACCESS_KEY_ID
  AWS_DEFAULT_REGION: ap-southeast-2
  AWS_SECRET_ACCESS_KEY: $AWS_SECRET_ACCESS_KEY
  S3_BUCKET_NAME_FEATURE_BRANCH: $S3_BUCKET_NAME_FEATURE_BRANCH
  S3_BUCKET_NAME_PRODUCTION: $S3_BUCKET_NAME_PRODUCTION
  S3_BUCKET_NAME_STAGING: $S3_BUCKET_NAME_STAGING
