.go-cache:
  before_script:
  - mkdir -p .go
  cache:
    key:
      files:
      - .gitlab-ci.yml
      - go.sum
    paths:
    - .go/pkg/mod/
  variables:
    GOPATH: $CI_PROJECT_DIR/.go
.lint-default:
  image: ${GITLAB_DEPENDENCY_PROXY_ADDRESS}golang:${DEFAULT_GO_VERSION}
  needs: []
  stage: lint
.test-default:
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
  extends: .go-cache
  needs: []
  script:
  - apt-get update && apt-get -yy install libicu-dev
  - make format
  - make cover
  - make
  - make test
  stage: test
  variables:
    ELASTIC_CONNECTION_INFO: '{"url":["http://elasticsearch:9200"], "index_name":"gitlab-test"}'
    ES_JAVA_OPTS: -Xms256m -Xmx256m
    GITALY_CONNECTION_INFO: '{"address":"tcp://gitaly:8075", "storage":"default"}'
    V: '1'
build-package-and-qa:
  inherit:
    variables: false
  needs: []
  rules:
  - allow_failure: false
    changes:
    - go.sum
    if: $CI_MERGE_REQUEST_IID
    variables:
      BUILD_ON_ALL_OS: 'true'
      MANUAL_QA_TEST: 'true'
  - allow_failure: true
    if: $CI_MERGE_REQUEST_IID
    when: manual
  - when: never
  stage: package
  trigger:
    branch: master
    project: gitlab-org/build/omnibus-gitlab-mirror
    strategy: depend
  variables:
    GITLAB_ELASTICSEARCH_INDEXER_VERSION: $CI_MERGE_REQUEST_SOURCE_BRANCH_SHA
    TOP_UPSTREAM_SOURCE_JOB: $CI_JOB_URL
    TOP_UPSTREAM_SOURCE_PROJECT: $CI_PROJECT_PATH
    TOP_UPSTREAM_SOURCE_REF: $CI_COMMIT_REF_NAME
    ee: 'true'
code_navigation:
  allow_failure: true
  artifacts:
    reports:
      lsif: dump.lsif
  image: ${GITLAB_DEPENDENCY_PROXY_ADDRESS}sourcegraph/scip-go:v0.${DEFAULT_GO_VERSION}
  script:
  - go mod download && scip-go
  - 'env \

    TAG="v0.4.0" \

    OS="$(uname -s | tr ''[:upper:]'' ''[:lower:]'')" \

    ARCH="$(uname -m | sed -e ''s/x86_64/amd64/'')" \

    bash -c ''curl --location "https://github.com/sourcegraph/scip/releases/download/$TAG/scip-$OS-$ARCH.tar.gz"''
    \

    | tar xzf - scip

    '
  - chmod +x scip
  - ./scip convert --from index.scip --to dump.lsif
danger-review:
  before_script:
  - bundle init
  - bundle add gitlab-dangerfiles
  needs: []
  stage: lint
default:
  tags:
  - gitlab-org
gemnasium-dependency_scanning:
  needs: []
  rules: &id001
  - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $GITLAB_USER_LOGIN =~ /project_\d+_bot\d*/
    variables:
      GITLAB_DEPENDENCY_PROXY_ADDRESS: ''
  - if: $CI_MERGE_REQUEST_IID
    when: always
  - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    when: always
  - if: $CI_COMMIT_TAG
    when: always
  - when: never
  stage: security
include:
- template: Security/Dependency-Scanning.gitlab-ci.yml
- template: Security/SAST.gitlab-ci.yml
- template: Security/Secret-Detection.gitlab-ci.yml
- component: ${CI_SERVER_FQDN}/gitlab-org/components/danger-review/danger-review@2.1.0
lint:commitlint:
  before_script:
  - apk add --no-cache git
  - npm install -g @commitlint/cli @commitlint/config-conventional
  cache: {}
  image: ${GITLAB_DEPENDENCY_PROXY_ADDRESS}node:lts-alpine
  needs: []
  rules:
  - if: $CI_MERGE_REQUEST_EVENT_TYPE != 'merge_train' && $CI_MERGE_REQUEST_DIFF_BASE_SHA
  script:
  - npx commitlint --from "$CI_MERGE_REQUEST_DIFF_BASE_SHA" --verbose
  stage: lint
lint:go-build-versions:
  extends: .lint-default
  script:
  - ./scripts/check-go-build-versions.sh
lint:go-fmt:
  extends: .lint-default
  script:
  - ./scripts/check-go-format.sh
lint:go-mod:
  extends: .lint-default
  script:
  - go mod tidy
  - "STATUS=$( git status --porcelain go.mod go.sum )\nif [ ! -z \"$STATUS\" ]; then\n\
    \  git diff go.mod go.sum\n  echo \"\"\n  echo \"Running go mod tidy modified\
    \ go.mod and/or go.sum\"\n  exit 1\nfi\n"
lint:golangci:
  image: ${GITLAB_DEPENDENCY_PROXY_ADDRESS}golangci/golangci-lint:v${GOLANGCI_VERSION}
  needs: []
  script:
  - apt-get update && apt-get -yy install libicu-dev
  - make golangci-lint
  stage: lint
lint:mr-title:
  before_script:
  - npm install -g @commitlint/cli @commitlint/config-conventional
  image: ${GITLAB_DEPENDENCY_PROXY_ADDRESS}node:lts-alpine
  needs: []
  rules:
  - if: $CI_MERGE_REQUEST_EVENT_TYPE == 'merge_train'
  script:
  - ./scripts/check-mr-title.sh
  stage: lint
lint:tool-versions:
  needs: []
  script:
  - ./scripts/check-tool-versions.sh
  stage: lint
release_create_mr:
  before_script:
  - apk add --no-cache git curl git-cliff jq
  - curl -L "https://gitlab.com/gitlab-org/cli/-/releases/v${GLAB_VERSION}/downloads/glab_${GLAB_VERSION}_linux_amd64.tar.gz"
    | tar -xz
  - mv bin/glab /usr/local/bin/
  - glab auth login --hostname $CI_SERVER_HOST --token $INDEXER_RELEASE_TOKEN
  - git config --global user.email "gitlab-es-indexer-release-bot@no-reply.gitlab.com"
  - git config --global user.name "GitLab ES Indexer Release Bot"
  - git remote set-url origin $REPO_URL
  - git fetch origin
  - '[ "$(git rev-parse --is-shallow-repository)" = "true" ] && git fetch --tags --unshallow
    || git fetch --tags'
  image: ${GITLAB_DEPENDENCY_PROXY_ADDRESS}alpine:latest
  resource_group: release
  retry: 0
  rules:
  - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE == "schedule"
      && $SCHEDULE_TYPE == "weekly_release"
    when: always
  - when: never
  script:
  - "CURRENT_VERSION=$(git describe --tags --abbrev=0)\nNEXT_VERSION=$(git-cliff --bumped-version)\n\
    \n# Remove 'v' prefix if present for consistent comparison\nCURRENT_VERSION_CLEAN=${CURRENT_VERSION#v}\n\
    NEXT_VERSION_CLEAN=${NEXT_VERSION#v}\n\necho \"Current version: $CURRENT_VERSION_CLEAN\"\
    \necho \"Next version: $NEXT_VERSION_CLEAN\"\n\n# Compare versions to ensure we\
    \ have a version bump\nif [ \"$CURRENT_VERSION_CLEAN\" = \"$NEXT_VERSION_CLEAN\"\
    \ ]; then\n  echo \"No version change detected despite having commits\"\n  echo\
    \ \"This might indicate no conventional commits were found\"\n  echo \"Skipping\
    \ release creation\"\n  exit 0\nfi\n\necho \"Changes detected, preparing to create\
    \ release MR for version $NEXT_VERSION_CLEAN\"\n\n# Create unique branch name\
    \ using timestamp and commit SHA\nTIMESTAMP=$(date +%Y%m%d-%H%M%S)\nRELEASE_BRANCH=\"\
    release_v${NEXT_VERSION_CLEAN}_${TIMESTAMP}_${CI_COMMIT_SHORT_SHA}\"\necho \"\
    Using release branch: $RELEASE_BRANCH\"\n"
  - echo "$NEXT_VERSION_CLEAN" > VERSION
  - git-cliff --bump --output CHANGELOG.md
  - git checkout -b $RELEASE_BRANCH
  - git add CHANGELOG.md VERSION
  - 'git commit -m "chore(release): release v${NEXT_VERSION_CLEAN} [skip ci]"'
  - git push -u origin $RELEASE_BRANCH
  - "RANDOM_REVIEWER=$(glab api /projects/$CI_PROJECT_ID/members | \\\n  jq -r '.[]\
    \ | select(.access_level >= 40 and (.username | contains(\"_bot_\") | not)) |\
    \ .username' | \\\n  shuf -n 1)\n\necho \"Selected random reviewer: $RANDOM_REVIEWER\"\
    \nexport RANDOM_REVIEWER\n"
  - "DESCRIPTION=\"Automated weekly release MR\n\nThis MR updates:\n- VERSION file\
    \ to v${NEXT_VERSION_CLEAN}\n- CHANGELOG.md with new entries\n\nView [all changes](${CI_PROJECT_URL}/-/compare/${CURRENT_VERSION}...${CI_COMMIT_SHA}?from_project_id=${CI_PROJECT_ID})\
    \ included in this release.\n\nMerge this MR to complete the release process.\
    \ A tag will automatically be created by the version_tag CI job.\"\n\necho \"\
    Creating merge request for release v${NEXT_VERSION_CLEAN}\"\n\nglab mr create\
    \ \\\n  --allow-collaboration \\\n  --source-branch \"${RELEASE_BRANCH}\" \\\n\
    \  --target-branch \"${CI_DEFAULT_BRANCH}\" \\\n  --title \"chore(release): automated\
    \ weekly release v${NEXT_VERSION_CLEAN}\" \\\n  --squash-before-merge \\\n  --remove-source-branch\
    \ \\\n  --reviewer \"${RANDOM_REVIEWER}\" \\\n  --label \"group::global search\"\
    \ \\\n  --label \"type::maintenance\" \\\n  --label \"maintenance::release\" \\\
    \n  --description \"$DESCRIPTION\"\n"
  stage: release
  variables:
    REPO_URL: https://oauth2:${INDEXER_RELEASE_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git
secret_detection:
  needs: []
  rules: *id001
  stage: security
semgrep-sast:
  needs: []
  rules: *id001
  stage: security
stages:
- lint
- security
- test
- package
- release
- tag
tests-elasticsearch:
  extends: .test-default
  image: ${GITLAB_DEPENDENCY_PROXY_ADDRESS}golang:${GO_VERSION}
  parallel:
    matrix:
    - ELASTICSEARCH_VERSION:
      - 7.14.2
      - 8.17.4
      GO_VERSION:
      - '1.23'
      - '1.24'
      - '1.25'
  services:
  - alias: elasticsearch
    command:
    - elasticsearch
    - -E
    - discovery.type=single-node
    name: elasticsearch:${ELASTICSEARCH_VERSION}
  - alias: gitaly
    command:
    - bash
    - -c
    - mkdir -p /home/git/repositories && rm -rf /srv/gitlab-shell/hooks/* && exec
      /usr/bin/env GITALY_TESTING_NO_GIT_HOOKS=1 /scripts/process-wrapper
    name: registry.gitlab.com/gitlab-org/build/cng/gitaly:17-7-stable
  variables:
    ES_SETTING_DISCOVERY_TYPE: single-node
    ES_SETTING_XPACK_SECURITY_ENABLED: 'false'
tests-opensearch:
  extends: .test-default
  image: ${GITLAB_DEPENDENCY_PROXY_ADDRESS}golang:${GO_VERSION}
  parallel:
    matrix:
    - GO_VERSION:
      - '1.23'
      - '1.24'
      OPENSEARCH_VERSION:
      - 1.3.13
      - 2.10.0
      - 3.1.0
  services:
  - alias: elasticsearch
    command:
    - bin/opensearch
    - -E
    - discovery.type=single-node
    - -E
    - plugins.security.disabled=true
    - -E
    - cluster.routing.allocation.disk.threshold_enabled=false
    name: opensearchproject/opensearch:${OPENSEARCH_VERSION}
  - alias: gitaly
    command:
    - bash
    - -c
    - mkdir -p /home/git/repositories && rm -rf /srv/gitlab-shell/hooks/* && exec
      /usr/bin/env GITALY_TESTING_NO_GIT_HOOKS=1 /scripts/process-wrapper
    name: registry.gitlab.com/gitlab-org/build/cng/gitaly:17-7-stable
variables:
  DEFAULT_GO_VERSION: '1.24'
  GLAB_VERSION: 1.55.0
  GOLANGCI_VERSION: 2.3.1
version_tag:
  image: registry.gitlab.com/gitlab-org/cli:v${GLAB_VERSION}
  rules:
  - exists:
    - VERSION
    if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  script:
  - VERSION=$(cat VERSION)
  - echo "Checking if tag v${VERSION} already exist"
  - glab auth login --hostname $CI_SERVER_HOST --token $TAG_CREATOR_TOKEN
  - "# Check if version tag exists\nif glab api /projects/$CI_PROJECT_ID/repository/tags/v${VERSION}\
    \ --silent; then\n  echo \"Tag v${VERSION} already exists, skipping creation\"\
    \nelse\n  echo \"Tag v${VERSION} doesn't exist, will create it\"\n  echo \"Creating\
    \ tag v${VERSION}\"\n  glab api /projects/$CI_PROJECT_ID/repository/tags -X POST\
    \ -f \"tag_name=v${VERSION}\" -f \"ref=$CI_COMMIT_SHA\" -f \"message=Release version\
    \ ${VERSION}\"\nfi\n"
  stage: tag
workflow:
  rules: *id001
