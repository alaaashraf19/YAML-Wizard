image: python:3.8
pypi:
  needs:
  - test
  rules:
  - if: $CI_COMMIT_TAG =~ /^v\d+.\d+.\d+$/
    when: on_success
  script:
  - pip install -U twine gitchangelog pystache
  - echo "" >> README.md
  - gitchangelog >> README.md
  - python setup.py sdist bdist_wheel
  - twine upload dist/*
  stage: release
  variables:
    TWINE_USERNAME: __token__
stages:
- test
- release
test:
  before_script:
  - apk update && apk add git
  - wget https://github.com/earthly/earthly/releases/download/v0.6.20/earthly-linux-amd64
    -O /usr/local/bin/earthly
  - chmod +x /usr/local/bin/earthly
  - export FORCE_COLOR=1
  - /usr/local/bin/earthly bootstrap
  - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  image: docker
  script:
  - earthly --ci --push -P +pre-commit
  services:
  - docker:dind
  stage: test
