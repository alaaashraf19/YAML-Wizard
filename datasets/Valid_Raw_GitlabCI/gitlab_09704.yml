lint_clang_format:
  except:
  - tags
  needs: []
  retry:
    max: 1
    when:
    - stuck_or_timeout_failure
    - runner_system_failure
    - job_execution_timeout
  script:
  - env DEBIAN_FRONTEND=noninteractive apt-get update -y
  - env DEBIAN_FRONTEND=noninteractive apt-get install --no-install-recommends -y
    clang-format-19
  - clang-format-19 --version
  - cat /etc/os-release
  - uname -rms
  - python3 ci/clang_format.py
  stage: test
lint_cmake_format:
  except:
  - tags
  needs: []
  retry:
    max: 1
    when:
    - stuck_or_timeout_failure
    - runner_system_failure
    - job_execution_timeout
  script:
  - env DEBIAN_FRONTEND=noninteractive apt-get update -y
  - env DEBIAN_FRONTEND=noninteractive apt-get install --no-install-recommends -y
    python3-venv
  - python3 --version
  - cat /etc/os-release
  - uname -rms
  - python3 -m venv /opt/virtualenv
  - source /opt/virtualenv/bin/activate
  - python3 -m pip install uv
  - python3 -m uv pip install --requirement requirements.txt
  - python3 -m uv pip install --requirement doc/infosrc/requirements.txt
  - git ls-files -z -- ':(glob)**/CMakeLists.txt' ':(glob)**/*.cmake' ':(glob)**/*.cmake.in'
    | xargs -0 -- python3 -m cmakelang.lint
  stage: test
lint_cpplint:
  except:
  - tags
  needs: []
  retry:
    max: 1
    when:
    - stuck_or_timeout_failure
    - runner_system_failure
    - job_execution_timeout
  script:
  - env DEBIAN_FRONTEND=noninteractive apt-get update -y
  - env DEBIAN_FRONTEND=noninteractive apt-get install --no-install-recommends -y
    cpplint
  - cpplint --version
  - cat /etc/os-release
  - uname -rms
  - git ls-files -z -- lib/cgraph++ lib/gvc++ | xargs -0 -- cpplint
  - git ls-files -z -- lib/xdot | xargs -0 -- cpplint --filter=-readability/casting
  stage: test
lint_html:
  except:
  - tags
  needs: []
  retry:
    max: 1
    when:
    - stuck_or_timeout_failure
    - runner_system_failure
    - job_execution_timeout
  script:
  - env DEBIAN_FRONTEND=noninteractive apt-get update -y
  - env DEBIAN_FRONTEND=noninteractive apt-get install --no-install-recommends -y
    libxml2-utils
  - xmllint --version
  - cat /etc/os-release
  - uname -rms
  - git ls-files -z -- '**/*.html' | xargs -0 -- xmllint --nonet --noout --html --valid
  stage: test
lint_python:
  before_script:
  - export build_system="autotools"
  except:
  - tags
  image: $CI_REGISTRY_IMAGE/ubuntu-24.04:$CI_COMMIT_SHA
  needs:
  - artifacts: true
    job: ubuntu-24.04-build
  retry:
    max: 1
    when:
    - stuck_or_timeout_failure
    - runner_system_failure
    - job_execution_timeout
  script:
  - echo 'include-system-site-packages = true' >> /opt/virtualenv/pyvenv.cfg
  - source /opt/virtualenv/bin/activate
  - ci/install-packages.sh
  - python3 --version
  - cat /etc/os-release
  - uname -rms
  - git ls-files -z -- cmd/dot/dot_sandbox '**.py' | xargs -0 -- python3 -m pylint
    --rcfile=.pylintrc --disable=fixme
  - git ls-files -z -- cmd/dot/dot_sandbox '**.py' | xargs -0 -- python3 -m black
    --check
  - git ls-files -z -- cmd/dot/dot_sandbox '**.py' | xargs -0 -- python3 -m isort
    --profile=black --check
  stage: test
  tags:
  - saas-linux-small-amd64
