.build_template:
  artifacts: &id025
    expire_in: 1 week
    reports:
      junit: report.xml
      metrics: metrics.txt
    when: on_success
  except: &id026
  - tags
  needs: &id027 []
  retry: &id028
    max: 1
    when:
    - stuck_or_timeout_failure
    - runner_system_failure
    - job_execution_timeout
  script: &id029
  - $ErrorActionPreference = "Stop"
  - $PSDefaultParameterValues['*:ErrorAction']='Stop'
  - Add-MpPreference -ExclusionPath 'C:\'
  - $PSDefaultParameterValues['Out-File:Encoding'] = 'utf8'
  - python --version
  - if (-not $?) { throw "command failed" }
  - $Env:graphviz_install_dir = "C:\Graphviz"
  - Set-ExecutionPolicy Bypass -Force -Scope Process
  - python ci/windows_build.py --platform $Env:project_platform --configuration $Env:configuration
    --build-shared-libs=$Env:BUILD_SHARED_LIBS
  - if (-not $?) { throw "command failed" }
  stage: build
  tags: &id030
  - saas-windows-medium-amd64
.docker_build_template:
  before_script: &id001
  - echo -n $CI_JOB_TOKEN | docker login -u gitlab-ci-token --password-stdin $CI_REGISTRY
  except: &id002
  - tags
  image: docker:29.0.0-cli@sha256:87858a6dd14149240f4a2c33e0ec0f32a5ac1bb2548c04f5a20694ea25cb6157
  retry: &id003
    max: 1
    when:
    - stuck_or_timeout_failure
    - runner_system_failure
    - job_execution_timeout
  script: &id009
  - docker pull $CI_REGISTRY_IMAGE/$IMAGE:latest || true
  - DOCKER_BUILDKIT=1 docker build -t $CI_REGISTRY_IMAGE/$IMAGE:$CI_COMMIT_SHA --cache-from
    $CI_REGISTRY_IMAGE/$IMAGE:latest -f ci/$IMAGE/Dockerfile --build-arg BUILDKIT_INLINE_CACHE=1
    .
  - docker push $CI_REGISTRY_IMAGE/$IMAGE:$CI_COMMIT_SHA
  services: &id004
  - docker:29.0.0-dind@sha256:96789d56621ae702a2f8aa316c87a1a1875dd3f02bf67cdcb56a524a09fa3af9
  stage: build_docker_images
.docker_push_template:
  before_script: *id001
  except: *id002
  image: docker:29.0.0-cli@sha256:87858a6dd14149240f4a2c33e0ec0f32a5ac1bb2548c04f5a20694ea25cb6157
  only: &id010
    refs:
    - main
  retry: *id003
  script: &id011
  - docker pull $CI_REGISTRY_IMAGE/$IMAGE:$CI_COMMIT_SHA
  - docker tag $CI_REGISTRY_IMAGE/$IMAGE:$CI_COMMIT_SHA $CI_REGISTRY_IMAGE/$IMAGE:latest
  - docker push     $CI_REGISTRY_IMAGE/$IMAGE:latest
  services: *id004
  stage: push_docker_images
  variables:
    GIT_STRATEGY: none
.docker_template:
  before_script: *id001
  except: *id002
  image: docker:29.0.0-cli@sha256:87858a6dd14149240f4a2c33e0ec0f32a5ac1bb2548c04f5a20694ea25cb6157
