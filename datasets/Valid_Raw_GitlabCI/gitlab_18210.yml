create-ami:
  artifacts:
    paths:
    - packer-*-manifest.json
  environment:
    name: production
  only:
  - master
  script:
  - make create-ami
  stage: create-ami
deploy-ami:
  dependencies:
  - create-ami
  environment:
    name: production
  only:
  - master
  script:
  - make deploy-ami
  stage: deploy-ami
image: registry.gitlab.com/tvaughan/gitlab-ci-docker-builder:latest
services:
- docker:dind
- postgres:12
stages:
- test
- create-ami
- deploy-ami
test:
  environment:
    name: testing
  script:
  - make build
  - 'export STARTERKIT_DATABASE_HOSTNAME=$POSTGRES_PORT_5432_TCP_ADDR

    export STARTERKIT_DATABASE_TCP_PORT=$POSTGRES_PORT_5432_TCP_PORT

    export STARTERKIT_DATABASE_USERNAME=$POSTGRES_USER

    export STARTERKIT_DATABASE_PASSWORD=$POSTGRES_PASS

    make lint

    '
  - 'export STARTERKIT_DATABASE_HOSTNAME=$POSTGRES_PORT_5432_TCP_ADDR

    export STARTERKIT_DATABASE_TCP_PORT=$POSTGRES_PORT_5432_TCP_PORT

    export STARTERKIT_DATABASE_USERNAME=$POSTGRES_USER

    export STARTERKIT_DATABASE_PASSWORD=$POSTGRES_PASS

    make test

    '
  - make push
  stage: test
variables:
  POSTGRES_PASS: starterkit
  POSTGRES_USER: starterkit
