build:
  image: maven:latest
  script:
  - mvn $MAVEN_CLI_OPTS compile
  - mvn $MAVEN_CLI_OPTS test
  stage: build
cache:
  paths:
  - .m2/repository/
  - target/
deploy staging:
  image: maven:latest
  only:
  - master
  script:
  - HEROKU_API_KEY=$HEROKU_STAGING_API_KEY mvn heroku:deploy
  stage: deploy staging
stages:
- build
- deploy staging
variables:
  MAVEN_CLI_OPTS: --batch-mode
  MAVEN_OPTS: -Dmaven.repo.local=.m2/repository
