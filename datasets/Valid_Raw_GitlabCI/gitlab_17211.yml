before_script:
- ruby -v
- which ruby
- sh setup.sh
- gem install bundler --no-ri --no-rdoc
- bundle check || bundle install
- bundle exec rake db:create RAILS_ENV=test
- bundle exec rake db:migrate RAILS_ENV=test
image: ruby:2.3
rspec:
  script:
  - bundle exec rspec
services:
- postgres:latest
- redis:latest
variables:
  POSTGRES_DB: data_collector_test
  POSTGRES_PASSWORD: admin
