.aws_login: &id005
- $(aws ecr get-login --no-include-email --region "$AWS_ECR_REGION")
.build_and_push_to_aws_ecr: &id006
- docker build -t ${ECR_REPOSITORY_URL}:${CI_COMMIT_REF_SLUG} .
- docker push ${ECR_REPOSITORY_URL}:${CI_COMMIT_REF_SLUG}
.build_script: &id002
- docker build --pull -t "${CI_REGISTRY_IMAGE}:${CI_COMMIT_REF_SLUG}" .
.deploy_to_platform: &id003
- docker push ${CI_REGISTRY_IMAGE}:${CI_COMMIT_REF_SLUG}
- skopeo copy --all ${CI_REGISTRY_IMAGE}:${CI_COMMIT_REF_SLUG} ${CI_REGISTRY_IMAGE}:${CI_COMMIT_REF_SLUG}-ci-${CI_PIPELINE_IID}
.gitlab_login: &id001
- docker login -u "$CI_REGISTRY_USER" -p "$CI_BUILD_TOKEN" "$CI_REGISTRY"
.push_to_gitlab_registry: &id007
- docker tag ${CI_REGISTRY_IMAGE}:${CI_COMMIT_REF_SLUG}} ${CI_REGISTRY_IMAGE}:${CI_COMMIT_REF_SLUG}
- docker push ${CI_REGISTRY_IMAGE}:${CI_COMMIT_REF_SLUG}
.test_script: &id004
- docker run --rm "${CI_REGISTRY_IMAGE}" prove -lv t
Build and deploy to platform:
  allow_failure: false
  before_script:
  - *id001
  - *id002
  rules:
  - if: $CI_COMMIT_BRANCH =~ /^(master|production|preprod|development)$/
    when: on_success
  - if: $CI_COMMIT_TAG =~ /^release\//
    when: on_success
  script:
  - *id003
  stage: Deploy
  tags:
  - mintlab
Build and test:
  allow_failure: false
  before_script:
  - *id002
  rules:
  - if: $CI_COMMIT_BRANCH !~ /^(master|production|preprod|development)$/ && $CI_COMMIT_TAG
      !~ /^release\//
  - when: always
  script:
  - *id004
  stage: QA
  tags:
  - mintlab
Push to AWS ACR:
  before_script:
  - *id005
  rules:
  - if: $ECR_REPOSITORY_URL == null
    when: never
  - if: $CI_MERGE_REQUEST_ID
    when: never
  - if: $CI_COMMIT_TAG !~ /^release\//
    when: never
  script:
  - *id006
  stage: Release
  tags:
  - mintlab
Push to Gitlab Registry:
  before_script:
  - docker pull ${CI_REGISTRY_IMAGE}:${CI_COMMIT_REF_SLUG}
  - *id001
  rules:
  - if: $ECR_REPOSITORY_URL == null
    when: never
  - if: $CI_MERGE_REQUEST_ID
    when: never
  - if: $CI_COMMIT_TAG !~ /^release\//
    when: never
  script:
  - *id007
  stage: Release
  tags:
  - mintlab
REUSE Compliance:
  allow_failure: false
  image:
    entrypoint:
    - ''
    name: fsfe/reuse:latest
  rules:
  - when: always
  script:
  - reuse lint
  stage: QA
image: ${BUILDER_CONTAINER}:master
stages:
- QA
- Deploy
- Release
