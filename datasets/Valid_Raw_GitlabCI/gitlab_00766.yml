cache:
  paths:
  - cargo/
deploy:
  before_script:
  - eval $(ssh-agent -s)
  - echo "$SSH_DEPLOY_KEY" | ssh-add -
  - apk add tar zstd
  cache: []
  dependencies:
  - release-build
  image: kroniak/ssh-client:3.15
  only:
  - master
  script:
  - 'SSH_DEPLOY_USER=$SSH_DEPLOY_USER SSH_DEPLOY_PORT=$SSH_DEPLOY_PORT mailin-server/deploy/deploy.sh

    '
  stage: deploy
image: rust:latest
release-build:
  artifacts:
    paths:
    - target/release/mailin-server
  only:
  - master
  script:
  - cargo build --release
  stage: release
run-build:
  before_script:
  - rustup component add clippy
  only:
  - master
  - merge_requests
  script:
  - rustc --version && cargo --version
  - cargo test
  - cargo clippy -- --deny warnings
  stage: check
stages:
- check
- release
- deploy
variables:
  CARGO_HOME: $CI_PROJECT_DIR/cargo
