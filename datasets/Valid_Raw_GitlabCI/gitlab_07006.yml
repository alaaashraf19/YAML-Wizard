build-develop:
  only:
  - develop
  script:
  - chmod +x ./devops/scripts/build.sh
  - ./devops/scripts/build.sh
  stage: build
  tags:
  - drim-ci-1
  variables:
    IMAGE_VERSION: develop
build-production:
  only:
  - master
  script:
  - chmod +x ./devops/scripts/build.sh
  - ./devops/scripts/build.sh
  stage: build
  tags:
  - drim-ci-1
  variables:
    IMAGE_VERSION: production
build-release:
  only:
  - /^release\/.*$/
  script:
  - chmod +x ./devops/scripts/build.sh
  - ./devops/scripts/build.sh
  stage: build
  tags:
  - drim-ci-1
  variables:
    IMAGE_VERSION: $CI_COMMIT_REF_SLUG
build-review:
  only:
  - /^feature\/.*$/
  script:
  - chmod +x ./devops/scripts/build.sh
  - ./devops/scripts/build.sh
  stage: build
  tags:
  - drim-ci-1
  variables:
    IMAGE_VERSION: $CI_COMMIT_REF_SLUG
deploy-develop:
  environment:
    name: develop
    url: http://develop.mc0.drim.team:30000
  only:
  - develop
  script:
  - chmod +x ./devops/scripts/deploy.sh
  - ./devops/scripts/deploy.sh
  stage: deploy
  tags:
  - drim-ci-1
  variables:
    APP_HOST: develop.mc0.drim.team
    IMAGE_VERSION: develop
    K8S_NAMESPACE: mc-develop
deploy-production:
  environment:
    name: production
    url: http://mc0.drim.team:30000
  only:
  - master
  script:
  - chmod +x ./devops/scripts/deploy.sh
  - ./devops/scripts/deploy.sh
  stage: deploy
  tags:
  - drim-ci-1
  variables:
    APP_HOST: mc0.drim.team
    IMAGE_VERSION: production
    K8S_NAMESPACE: mc-production
deploy-release:
  environment:
    name: release/$CI_COMMIT_REF_SLUG
    on_stop: stop-release
    url: http://$CI_COMMIT_REF_SLUG.mc0.drim.team:30000
  only:
  - /^release\/.*$/
  script:
  - chmod +x ./devops/scripts/deploy.sh
  - ./devops/scripts/deploy.sh
  stage: deploy
  tags:
  - drim-ci-1
  variables:
    APP_HOST: $CI_COMMIT_REF_SLUG.mc0.drim.team
    IMAGE_VERSION: $CI_COMMIT_REF_SLUG
    K8S_NAMESPACE: mc-$CI_COMMIT_REF_SLUG
deploy-review:
  environment:
    name: review/$CI_COMMIT_REF_SLUG
    on_stop: stop-review
    url: http://$CI_COMMIT_REF_SLUG.mc0.drim.team:30000
  only:
  - /^feature\/.*$/
  script:
  - chmod +x ./devops/scripts/deploy.sh
  - ./devops/scripts/deploy.sh
  stage: deploy
  tags:
  - drim-ci-1
  variables:
    APP_HOST: $CI_COMMIT_REF_SLUG.mc0.drim.team
    IMAGE_VERSION: $CI_COMMIT_REF_SLUG
    K8S_NAMESPACE: mc-review-$CI_COMMIT_REF_SLUG
stages:
- build
- deploy
stop-release:
  environment:
    action: stop
    name: release/$CI_COMMIT_REF_SLUG
  only:
  - /^release\/.*$/
  script:
  - chmod +x ./devops/scripts/stop.sh
  - ./devops/scripts/stop.sh
  stage: deploy
  tags:
  - drim-ci-1
  variables:
    GIT_STRATEGY: none
    K8S_NAMESPACE: mc-$CI_COMMIT_REF_SLUG
  when: manual
stop-review:
  environment:
    action: stop
    name: review/$CI_COMMIT_REF_SLUG
  only:
  - /^feature\/.*$/
  script:
  - chmod +x ./devops/scripts/stop.sh
  - ./devops/scripts/stop.sh
  stage: deploy
  tags:
  - drim-ci-1
  variables:
    GIT_STRATEGY: none
    K8S_NAMESPACE: mc-review-$CI_COMMIT_REF_SLUG
  when: manual
