build:
  image: registry.gitlab.com/ercom/docker:17.11.0-ce-git
  only:
  - tags
  script:
  - docker build -t $CI_REGISTRY_IMAGE:$CI_COMMIT_TAG .
  - if [ -n "$CI_BUILD_TOKEN" ]; then docker login -u gitlab-ci-token -p $CI_BUILD_TOKEN
    $CI_REGISTRY; docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_TAG; fi
  services:
  - alias: docker
    name: registry.gitlab.com/ercom/docker:17.11.0-ce-dind
  stage: build
  variables:
    DOCKER_DRIVER: overlay
    DOCKER_HOST: tcp://docker:2375
