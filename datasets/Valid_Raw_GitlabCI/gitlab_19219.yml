before_script:
- export GOPATH=~/go
- export PATH=$PATH:~/go/bin
- export QT_PKG_CONFIG=true
image: registry.gitlab.com/xiayesuifeng/arch-go-qt:latest
run-build:
  artifacts:
    paths:
    - $CI_PROJECT_DIR/build/*
  script:
  - mkdir -p $CI_PROJECT_DIR/build/config/polkit-1/actions
  - mkdir -p $CI_PROJECT_DIR/build/config/dbus-1/system.d
  - mkdir -p $CI_PROJECT_DIR/build/config/dbus-1/system-services
  - qtdeploy build desktop
  - go build -o $CI_PROJECT_DIR/build/v2rayxplus-helper helper/cmd/main.go
  - mv deploy/linux/v2rayxplus $CI_PROJECT_DIR/build/
  - cp helper/config/me.firerain.v2rayxplus.conf $CI_PROJECT_DIR/build/config/dbus-1/system.d
  - cp helper/config/me.firerain.v2rayxplus.service $CI_PROJECT_DIR/build/config/dbus-1/system-services
  - cp helper/config/me.firerain.v2rayxplus.policy $CI_PROJECT_DIR/build/config/polkit-1/actions
  stage: build
stages:
- build
