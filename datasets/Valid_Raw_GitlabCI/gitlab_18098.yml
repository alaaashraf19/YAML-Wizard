analyze_with_sonar_job:
  dependencies:
  - build_job
  only:
  - branches
  script:
  - '& "$env:SONAR_PATH" begin /k:"justanothernetworklib" /d:sonar.organization="tollstudios"
    /d:sonar.host.url="https://sonarcloud.io" /d:sonar.login="$env:SonarCloud_Token"
    /d:sonar.cs.vscoveragexml.reportsPaths=".\code.coveragexml"'
  - '& "$env:NUGET_PATH" restore "$env:SOLUTION_PATH"'
  - '& "$env:MSBUILD_PATH" "$env:SOLUTION_PATH" /p:Configuration=Release /clp:ErrorsOnly
    /t:Rebuild /m'
  - '& "$env:CODECOVERAGE_PATH" collect /output:".\code.coverage" "$env:NUNIT_PATH\nunit3-console.exe"
    "$env:TEST_FOLDER\JustAnotherNetworkLib.Test.dll"'
  - '& "$env:CODECOVERAGE_PATH" analyze /output:".\code.coveragexml" ".\code.coverage"'
  - '& "$env:SONAR_PATH" end /d:sonar.login="$env:SonarCloud_Token"'
  - Stop-Process -Name "MSBuild"
  stage: analyze
build_job:
  artifacts:
    expire_in: 2 days
    paths:
    - $env:TEST_FOLDER
  only:
  - branches
  script:
  - '& "$env:NUGET_PATH" restore "$env:SOLUTION_PATH"'
  - '& "$env:MSBUILD_PATH" "$env:SOLUTION_PATH" /p:Configuration=Release /clp:ErrorsOnly
    /t:Rebuild /m'
  stage: build
stages:
- build
- test
- analyze
test_job:
  dependencies:
  - build_job
  only:
  - branches
  script:
  - '& "$env:NUNIT_PATH\nunit3-console.exe" "$env:TEST_FOLDER\JustAnotherNetworkLib.Test.dll"'
  stage: test
variables:
  CODECOVERAGE_PATH: C:\Program Files (x86)\Microsoft Visual Studio\2017\Enterprise\Team
    Tools\Dynamic Code Coverage Tools\CodeCoverage.exe
  MSBUILD_PATH: C:\Program Files (x86)\Microsoft Visual Studio\2017\Enterprise\MSBuild\15.0\Bin\MSBuild.exe
  NUGET_PATH: F:\Tools\NuGet\nuget.exe
  NUNIT_PATH: F:\Tools\NUnit\nunit-console
  SOLUTION_PATH: .\JustAnotherNetworkLib\JustAnotherNetworkLib.sln
  SONAR_PATH: F:\Tools\SonarQubeScanner\SonarQube.Scanner.MSBuild.exe
  TEST_FOLDER: .\JustAnotherNetworkLib\JustAnotherNetworkLib.Test\bin\Release
