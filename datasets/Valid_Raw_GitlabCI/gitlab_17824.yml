image: maven:3-jdk-7
package-build:
  artifacts:
    paths:
    - target/melodyexporter.war
  script: mvn package
  stage: package
pages:
  artifacts:
    paths:
    - public
  script:
  - mvn javadoc:javadoc
  - mkdir .public
  - cp -r target/site/apidocs/* .public
  - mv .public public
  stage: documentation
stages:
- package
- documentation
