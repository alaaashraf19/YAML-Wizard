before_script:
- export GRADLE_USER_HOME="$(pwd)/.gradle"
build:
  artifacts:
    paths:
    - '**/build/classes'
    - '**/build/libs/*.jar'
  script:
  - gradle assemble
  stage: build
cache:
  paths:
  - .gradle/caches
image: gradle:4.5.1-jdk9
stages:
- build
- test
test:
  script:
  - gradle check
  stage: test
variables:
  GRADLE_OPTS: -Dorg.gradle.daemon=false
