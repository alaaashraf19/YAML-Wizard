after_script:
- echo "End CI"
before_script:
- export GRADLE_USER_HOME=`pwd`/.gradle
build:
  artifacts:
    expire_in: 1 week
    paths:
    - build/libs/*.jar
  only:
  - master
  script:
  - ./gradlew assemble
  stage: build
cache:
  paths:
  - .gradle/wrapper
  - .gradle/caches
image: sonarqube
stages:
- build
- test
test:
  script:
  - ./gradlew check
  stage: test
