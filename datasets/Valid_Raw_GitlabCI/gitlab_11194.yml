before_script:
- apt update -y && apt install -y clang
- curl https://sh.rustup.rs -sSf | sh -s -- -y
- . "$HOME/.cargo/env"
- ruby -v
- which ruby
- bundle config --local build.zipruby "--with-zlib-include=/usr/include --with-cflags='-Wno-error=implicit-function-declaration
  -Wno-error=implicit-int -Wno-error=incompatible-pointer-types'"
- bundle install --jobs=$(nproc) --path=deps "${FLAGS[@]}" || (cat deps/ruby/3.4.0/extensions/x86_64-linux/3.4.0/zipruby-*/mkmf.log
  && exit 1)
- bundle clean
pages:
  artifacts:
    paths:
    - public
  cache:
    key: ruby:3.4
    paths:
    - deps
  dependencies:
  - test
  image: ruby:3.4
  only:
  - master
  script:
  - bundle exec rake test:test doc:yard
  - mv doc public
  - mv coverage public/
  stage: deploy
test:
  cache:
    key: ruby:$RUBY_VERSION
    paths:
    - deps
  except:
  - tags
  image: ruby:$RUBY_VERSION
  parallel:
    matrix:
    - RUBY_VERSION:
      - '3.1'
      - '3.2'
      - '3.3'
      - '3.4'
  script:
  - bundle exec rake test XML_BACKEND=REXML 2>/dev/null
  - bundle exec rake test XML_BACKEND=Oga 2>/dev/null
  - bundle exec rake test XML_BACKEND=Nokogiri 2>/dev/null
