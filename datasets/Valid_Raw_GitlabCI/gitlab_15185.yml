build-distribution:
  image: docker:latest
  script:
  - docker login -u gitlab-ci-token -p $CI_BUILD_TOKEN $CI_REGISTRY
  - docker build -t $CONTAINER_TEST_IMAGE .
  - docker push $CONTAINER_TEST_IMAGE
  stage: distribution
codequality:
  artifacts:
    paths:
    - codeclimate.json
  image: docker:latest
  script:
  - docker run --env CODECLIMATE_CODE="$PWD" --volume "$PWD":/code --volume /var/run/docker.sock:/var/run/docker.sock
    --volume /tmp/cc:/tmp/cc codeclimate/codeclimate analyze -f json > codeclimate.json
  services:
  - docker:dind
  stage: build
  variables:
    DOCKER_DRIVER: overlay
compile:
  artifacts:
    paths:
    - _output
    when: on_success
  image: qaclana/qaclana-build-image
  script:
  - mkdir -p /go/src/gitlab.com/qaclana
  - ln -s ${CI_PROJECT_DIR} /go/src/gitlab.com/qaclana/${CI_PROJECT_NAME}
  - cd /go/src/gitlab.com/qaclana/${CI_PROJECT_NAME}
  - make ci
  stage: build
image: docker:latest
release-final-image-to-ci-registry:
  image: docker:latest
  only:
  - master
  script:
  - docker login -u gitlab-ci-token -p $CI_BUILD_TOKEN $CI_REGISTRY
  - docker pull $CONTAINER_TEST_IMAGE
  - docker tag $CONTAINER_TEST_IMAGE $CONTAINER_RELEASE_IMAGE
  - docker push $CONTAINER_RELEASE_IMAGE
  stage: release
release-final-image-to-dockerhub:
  image: docker:latest
  only:
  - master@qaclana/qaclana
  script:
  - docker login -u gitlab-ci-token -p $CI_BUILD_TOKEN $CI_REGISTRY
  - docker pull $CONTAINER_TEST_IMAGE
  - docker login -u "${DOCKER_HUB_USERNAME}" -p "${DOCKER_HUB_PASSWORD}"
  - docker tag $CONTAINER_TEST_IMAGE $HUB_CONTAINER_RELEASE_IMAGE
  - docker push $CI_PROJECT_PATH
  stage: release
services:
- docker:dind
stages:
- build
- distribution
- release
variables:
  CONTAINER_RELEASE_IMAGE: $CI_REGISTRY_IMAGE:latest
  CONTAINER_TEST_IMAGE: $CI_REGISTRY_IMAGE:$CI_BUILD_REF_NAME
  DOCKER_DRIVER: overlay
  HUB_CONTAINER_RELEASE_IMAGE: $CI_PROJECT_PATH:latest
  HUB_CONTAINER_TEST_IMAGE: $CI_PROJECT_PATH:$CI_BUILD_REF_NAME
