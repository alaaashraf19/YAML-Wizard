.test:
  before_script:
  - python -V
  - python -m venv env
  - source env/bin/activate
  - pip install --upgrade pip
  - pip install -e '.[dev]'
  interruptible: true
  script:
  - python3 example/manage.py test --settings=example.sqlite_test
.test-postgresql:
  extends: .test
  script:
  - pip install psycopg2
  - python3 example/manage.py test --settings=example.postgresql_test
  services:
  - postgres:latest
  variables:
    POSTGRES_DB: postgres
    POSTGRES_PASSWORD: postgres
    POSTGRES_USER: postgres
build_checks:
  artifacts:
    expire_in: 1 day
    paths:
    - htmlcov
  before_script:
  - python -V
  - python -m venv env
  - source env/bin/activate
  - pip install --upgrade pip
  - pip install -e '.[dev]'
  coverage: /TOTAL.+ ([0-9]{1,3}%)/
  image: python:latest
  interruptible: true
  script:
  - pylint weaverforum || true
  - black weaverforum
  - isort --check-only weaverforum
  - pip-audit .
  - bandit -r weaverforum
  - coverage run example/manage.py test
  - coverage report -m
  - coverage html
  stage: build
cache:
  key: $CI_COMMIT_REF_SLUG-$CI_JOB_IMAGE
  paths:
  - .cache/pip
stages:
- build
- test
test-3.10-sqlite:
  extends: .test
  image: python:3.10
test-3.11-sqlite:
  extends: .test
  image: python:3.10
test-3.12-sqlite:
  extends: .test
  image: python:3.10
test-3.13-sqlite:
  extends: .test
  image: python:3.10
test-3.9-sqlite:
  extends: .test
  image: python:3.9
variables:
  PIP_CACHE_DIR: $CI_PROJECT_DIR/.cache/pip
