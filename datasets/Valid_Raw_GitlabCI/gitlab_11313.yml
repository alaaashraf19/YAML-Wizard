.tpl_test:
  coverage: /Statements\s*:\s*([^%]+)/
  script: &id001
  - npm i
  - npm i @exaprint/logger
  - yarn test
  stage: test
  tags: &id002
  - docker
Build Doc & Analysis:
  artifacts:
    paths:
    - artifacts/jsdoc/
    - artifacts/plato/
  only:
  - master
  script:
  - npm i
  - yarn build
  stage: build
  tags:
  - docker
Check Package Version:
  only:
  - /release\/.*$/
  - /hotfix\/.*$/
  - tags
  script:
  - npm i
  - yarn check-version
  stage: test
  tags:
  - docker
Codacy Coverage Publish:
  script:
  - yarn codacy-coverage
  stage: deploy
  tags:
  - docker
Lint & Security checks:
  except:
  - develop
  - master
  - tags
  script:
  - npm i
  - yarn lint
  stage: test
  tags:
  - docker
cache:
  paths:
  - node_modules/
image: node:7.6
pages:
  artifacts:
    expire_in: 30 days
    paths:
    - public
  dependencies:
  - uTests:node-latest
  - Build Doc & Analysis
  only:
  - master
  script:
  - npm i -g indexifier
  - mkdir public/ public/jsdoc/ public/plato/ public/coverage/
  - mv coverage/ public/
  - mv artifacts/jsdoc/ public/
  - mv artifacts/plato/ public/
  - indexifier ./public --html > public/index.html
  stage: deploy
  tags:
  - docker
publish:
  only:
  - tags
  script:
  - echo "//registry.npmjs.org/:_authToken=$NPM_AUTH_TOKEN" > ~/.npmrc
  - npm publish
  stage: deploy
  tags:
  - docker
stages:
- test
- build
- deploy
uTests:node-4.8:
  coverage: /Statements\s*:\s*([^%]+)/
  image: node:4.8
  script: *id001
  stage: test
  tags: *id002
uTests:node-6.10:
  coverage: /Statements\s*:\s*([^%]+)/
  image: node:6.10
  script: *id001
  stage: test
  tags: *id002
uTests:node-7.6:
  coverage: /Statements\s*:\s*([^%]+)/
  image: node:7.6
  script: *id001
  stage: test
  tags: *id002
uTests:node-latest:
  artifacts:
    name: coverage
    paths:
    - coverage/
  coverage: /Statements\s*:\s*([^%]+)/
  image: node:latest
  script: *id001
  stage: test
  tags: *id002
