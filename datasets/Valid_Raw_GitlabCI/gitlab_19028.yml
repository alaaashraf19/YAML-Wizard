cache:
  paths:
  - .m2/repository/
  - ljprojectbuilder/target/
  - tomee/target/
compile_java:
  artifacts:
    paths:
    - ljprojectbuilder/target/ljprojectbuilder.war
  image: maven:3.3.9-jdk-8
  only:
  - master
  script:
  - echo "building war"
  - cd ljprojectbuilder
  - mvn clean package
  stage: compile
export_drawio:
  image: fjudith/draw.io:latest
  only:
  - master
  script:
  - /opt/draw.io/drawio -x -f png -o documentation/diagrams/lirejarpTemplate_G.png
    documentation/diagrams/lirejarpTemplate.drawio
  stage: compile
image: docker:stable
include:
  template: License-Management.gitlab-ci.yml
license_management:
  allow_failure: true
  artifacts:
    reports:
      license_management: gl-license-management-report.json
  dependencies: []
  except:
    variables:
    - $LICENSE_MANAGEMENT_DISABLED
  image:
    entrypoint:
    - ''
    name: registry.gitlab.com/gitlab-org/security-products/license-management:$CI_SERVER_VERSION_MAJOR-$CI_SERVER_VERSION_MINOR-stable
  only:
    refs:
    - branches
    variables:
    - $GITLAB_FEATURES =~ /\blicense_management\b/
  script:
  - /run.sh analyze .
  stage: pre
  variables:
    SETUP_CMD: $LICENSE_MANAGEMENT_SETUP_CMD
package_docker:
  script:
  - docker login -u gitlab-ci-token -p $REG_TOKEN registry.gitlab.com
  - docker build -t ljprojectbuilder --tag $CONTAINER_IMAGE:$CI_COMMIT_SHA --tag $CONTAINER_IMAGE:latest
    .
  - docker push $CONTAINER_IMAGE:$CI_COMMIT_SHA
  - docker push $CONTAINER_IMAGE:latest
  stage: package
package_tomee:
  artifacts:
    paths:
    - tomee/target/apache-tomee
  image: maven:3.3.9-jdk-8
  only:
  - master
  script:
  - echo "building tomee"
  - cd tomee
  - mvn tomee:build -Pmysql-kubernetes
  - cd target
  - chmod g+w apache-tomee
  - cd apache-tomee
  - chmod g+w logs/ temp/ webapps/ work/
  stage: compile
services:
- docker:dind
stages:
- pre
- compile
- package
- deploy
variables:
  CONTAINER_IMAGE: registry.gitlab.com/$CI_PROJECT_PATH
  DOCKER_DRIVER: overlay2
  DOCKER_HOST: tcp://docker:2375/
  LICENSE_MANAGEMENT_SETUP_CMD: ''
