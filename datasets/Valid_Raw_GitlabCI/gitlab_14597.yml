bundlejs:
  artifacts:
    paths:
    - assets/js
  cache:
    paths:
    - node_modules/
  image: node:7.0.0
  script:
  - npm install --silent
  - npm run-script build
  stage: nodebuild
jekyll:
  artifacts:
    paths:
    - public
  dependencies:
  - bundlejs
  image: ruby:2.3
  script:
  - gem install jekyll jekyll-sitemap jekyll-seo-tag jekyll-feed
  - jekyll build -d public
  stage: jekyllbuild
pages:
  artifacts:
    paths:
    - public
  dependencies:
  - jekyll
  only:
  - master
  stage: deploy
stages:
- nodebuild
- jekyllbuild
- deploy
variables:
  GIT_STRATEGY: fetch
