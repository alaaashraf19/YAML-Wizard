build site:
  artifacts:
    expire_in: 1 week
    paths:
    - dist
  image: node:6
  script:
  - npm install --progress=false
  - npm run build
  stage: build
deploy:
  image: alpine
  script:
  - apk add --no-cache rsync openssh
  - mkdir -p ~/.ssh
  - echo "$SSH_PRIVATE_KEY" >> ~/.ssh/id_dsa
  - chmod 600 ~/.ssh/id_dsa
  - echo -e "Host *\n\tStrictHostKeyChecking no\n\n" > ~/.ssh/config
  - rsync -rav --delete dist/ gitlab@37.187.126.110:~/vue-ci/
  stage: deploy
unit test:
  image: node:6
  script:
  - npm install --progress=false
  - npm run unit
  stage: test
