    texlive-fonts-recommended texlive-font-utils texlive-pictures epstool fig2dev
    octave pstoedit gnuplot-x11 fonts-freefont-otf && rm -rf /var/lib/apt/lists/*\nRUN
    git clone https://gitlab.com/gnss-sdr/gnss-sdr && cd gnss-sdr && git checkout
    $CI_COMMIT_SHA && mkdir build && cd build && cmake -DENABLE_PACKAGING=ON -DENABLE_INSTALL_TESTS=ON
