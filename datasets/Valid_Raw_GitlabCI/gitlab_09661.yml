ASAN-fix-volk:
  allow_failure: true
  before_script:
  - pwd
  image: opensuse/tumbleweed
  script:
  - zypper -n dup
  - zypper -n install cmake git gcc-c++ gcc-fortran ninja boost-devel libboost_atomic-devel
    libboost_filesystem-devel libboost_system-devel libboost_date_time-devel libboost_thread-devel
    libboost_regex-devel libboost_serialization-devel libboost_program_options-devel
    libboost_math-devel libboost_chrono-devel libboost_python3-devel libboost_test-devel
    libboost_headers-devel libboost_test-devel libboost_random-devel libboost_numpy3-devel
    libboost_graph-devel python3-PyYAML python3 python3-qt5 python3-pyqtgraph python3-pybind11-devel
    python3-lxml log4cpp-devel libaio-devel libusb-1_0-devel libserialport-devel libavahi-devel
    libpcap-devel libtool automake hdf5-devel libopenssl-devel python3-Mako protobuf-devel
    gmp-devel fftw3-devel libzstd-devel python3-pyFFTW llvm-clang blas-devel lapack-devel
    bison flex libxml2-devel libsndfile-devel spdlog-devel fmt-devel patch libzmq-devel
    cppzmq-devel
  - mkdir volk && cd volk && git clone --recursive https://github.com/gnuradio/volk
  - cd volk && mkdir build && cd build && cmake .. && make && make install && ldconfig
    && cd ../../../
  - mkdir gnuradio && cd gnuradio && git clone https://github.com/gnuradio/gnuradio
  - cd gnuradio
  - sed -i "s/#include <gnuradio\/blocks\/api\.h>/#include <gnuradio\/blocks\/api\.h>\n#include
    <cstddef>\n#include <vector>\n/" ./gr-blocks/include/gnuradio/blocks/blockinterleaving.h
  - mkdir build && cd build
  - NPROC=$(grep -c ^processor /proc/cpuinfo)
  - cmake -DENABLE_DEFAULT=OFF -DENABLE_GNURADIO_RUNTIME=ON -DENABLE_GR_BLOCKS=ON
    -DENABLE_GR_ANALOG=ON -DENABLE_GR_FFT=ON -DENABLE_GR_FILTER=ON -DENABLE_GR_ZEROMQ=ON
    ..
  - make -j$(($NPROC+1)) && make install && cd ../../../build
  - cmake -DCMAKE_BUILD_TYPE=ASAN -DENABLE_UNIT_TESTING_MINIMAL=ON ..
  - make -j$(($NPROC+1))
  - mkdir asan-test && cd asan-test
  - cp /captures/gitlab_test_signals/static/gnss-sdr_180417100529.A_L1E1L5E5.conf
    ./gnss-sdr_180417100529.A_L1E1L5E5.conf
  - ../../install/gnss-sdr -c=gnss-sdr_180417100529.A_L1E1L5E5.conf --nokeyboard
  stage: test
  tags:
  - gauss
  when: manual
