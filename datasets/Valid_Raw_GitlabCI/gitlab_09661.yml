coverity-scan:
  allow_failure: true
  artifacts:
    paths:
    - build-coverity/gnss-sdr.tgz
  image: ubuntu:noble
  script:
  - apt update
  - export DEBIAN_FRONTEND=noninteractive
  - apt install -y wget curl ca-certificates
  - mkdir -p cov-folder && cd cov-folder && rm -rf * || true
  - wget https://scan.coverity.com/download/linux64 --post-data "token=$COVERITY_SCAN_TOKEN&project=$COVERITY_SCAN_USER%2Fgnss-sdr"
    -O coverity_tool.tgz
  - wget https://scan.coverity.com/download/linux64 --post-data "token=$COVERITY_SCAN_TOKEN&project=$COVERITY_SCAN_USER%2Fgnss-sdr&md5=1"
    -O coverity_tool.md5
  - DOWNLOADED_MD5=$(cat coverity_tool.md5) && echo "$DOWNLOADED_MD5  coverity_tool.tgz"
    > file.md5 && md5sum -c file.md5
  - tar xvzf coverity_tool.tgz
  - export PATH=$PATH:$(pwd)/cov-analysis-linux64-2024.6.1/bin
  - cd ..
  - apt install -y --no-install-recommends build-essential cmake git ca-certificates
    libboost-dev libboost-date-time-dev libboost-system-dev libboost-filesystem-dev
    libboost-thread-dev libboost-chrono-dev libboost-serialization-dev libsndfile1-dev
    gnuradio-dev gr-osmosdr libpugixml-dev libpcap-dev libblas-dev liblapack-dev libarmadillo-dev
    libgflags-dev libgoogle-glog-dev libgnutls-openssl-dev python3-mako jq libmatio-dev
    libgtest-dev libprotobuf-dev protobuf-compiler gr-limesdr libad9361-dev libiio-dev
  - mkdir -p build-coverity && cd build-coverity && rm -rf * || true
  - cmake -DENABLE_OSMOSDR=ON -DENABLE_LIMESDR=ON -DENABLE_RAW_UDP=ON  ..
  - cov-build --dir cov-int make -j2
  - tar czf gnss-sdr.tgz cov-int
  - curl -k --form token=$COVERITY_SCAN_TOKEN --form email=$COVERITY_SCAN_EMAIL --form
    file=@$(pwd)/gnss-sdr.tgz --form version="0.0.19-next" --form description=" "
    https://scan.coverity.com/builds?project=$COVERITY_SCAN_USER%2Fgnss-sdr --progress-bar
    | tee -a "log_upload.txt" ; test ${PIPESTATUS[0]} -eq 0
  stage: build
  tags:
  - gauss
  when: manual
crosscompile:
  allow_failure: true
  artifacts:
    paths:
    - binaries/*
  image: ubuntu:xenial
  script:
  - apt update
  - apt install -y build-essential xz-utils python3 curl git automake libtool g++
  - curl -k https://sites.cttc.es/gnss_files/SDK/Thud/oecore-x86_64-armv7ahf-neon-toolchain-nodistro.0.sh
    --output oecore-x86_64-armv7ahf-neon-toolchain-nodistro.0.sh
  - echo "9bf042cc7481cb0fee9511a2c63751b2  oecore-x86_64-armv7ahf-neon-toolchain-nodistro.0.sh"
    > sdk.md5
  - md5sum -c sdk.md5
  - chmod +x ./oecore-x86_64-armv7ahf-neon-toolchain-nodistro.0.sh
  - sh ./oecore-x86_64-armv7ahf-neon-toolchain-nodistro.0.sh -y
  - . /usr/local/oecore-x86_64/environment-setup-armv7ahf-neon-oe-linux-gnueabi
  - mkdir -p build-xcompile && cd build-xcompile  && rm -rf * || true
  - cmake -DCMAKE_TOOLCHAIN_FILE=../cmake/Toolchains/oe-sdk_cross.cmake -DENABLE_OSMOSDR=ON
    -DENABLE_UNIT_TESTING_EXTRA=ON -DENABLE_SYSTEM_TESTING_EXTRA=ON -DCMAKE_INSTALL_PREFIX=/usr
    -DENABLE_FMCOMMS2=ON -DENABLE_AD9361=ON -DENABLE_RAW_UDP=ON -DENABLE_ZMQ=ON -DENABLE_INSTALL_TESTS=ON
    -DCMAKE_C_FLAGS_RELEASE="-s" -DCMAKE_CXX_FLAGS_RELEASE="-s" -DENABLE_PACKAGING=ON
    -DENABLE_LOG=OFF ..
  - make -j
  - mkdir local_install
  - make install DESTDIR=./local_install
  - rm ./local_install/usr/bin/front-end-cal
  - rm ./local_install/usr/bin/rinex2assist
  - rm ./local_install/usr/bin/volk_gnsssdr-config-info
  - cd ..
  - mkdir binaries
  - mkdir binaries/bin
  - mkdir binaries/share
  - cp build-xcompile/local_install/usr/bin/* binaries/bin/
  - cp build-xcompile/local_install/usr/share/gnss-sim/* binaries/share/
  - rm -rf build-xcompile || true
  stage: build
  tags:
  - gauss
