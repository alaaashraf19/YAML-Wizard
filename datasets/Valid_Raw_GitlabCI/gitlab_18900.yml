benches:
  only:
    variables:
    - $BENCH
  script:
  - cargo bench
  stage: bench
default:
  before_script:
  - apk add build-base
  - rustup install nightly
  - rustup default nightly
image: rust:1.58.1-alpine3.15
release_build:
  artifacts:
    paths:
    - strace-parser
    - sha.txt
  only:
    refs:
    - main
    - tags
  script:
  - cargo build --release
  - mv target/release/strace-parser .
  - strip strace-parser
  - sha256sum strace-parser | tee sha.txt
  stage: build
stages:
- test
- build
- bench
tests:
  script:
  - rustc --version && cargo --version
  - cargo test --all --verbose
  stage: test
