.compose-test-boilerplate:
  after_script: &id007
  - docker-compose --file ${COMPOSE_MANIFEST} stop
  - docker-compose --file ${COMPOSE_MANIFEST} logs
  - docker-compose --file ${COMPOSE_MANIFEST} down
  allow_failure: true
  before_script: &id008
  - dnf install -y docker docker-compose
  - docker-compose --file ${COMPOSE_MANIFEST} up --detach
  image: registry.gitlab.com/buildstream/buildstream-docker-images/testsuite-fedora:32-${DOCKER_IMAGE_VERSION}
  services: &id011
  - docker:stable-dind
.docker-variables-boilerplate:
  DOCKER_DRIVER: overlay2
  DOCKER_HOST: tcp://docker:2375
  DOCKER_TLS_CERTDIR: ''
.overnight-tests:
  artifacts: &id003
    paths:
    - ${HOME}/.cache/buildstream/logs
  before_script: &id004
  - "mkdir -p \"${HOME}/.config\"\ncat <<EOF >\"${HOME}/.config/buildstream.conf\"\
    \nscheduler:\n  fetchers: 2\nEOF\n"
  - dnf install -y ostree
  - "pip3 install \\\n  -r requirements/requirements.txt . \\\n  git+https://gitlab.com/buildstream/bst-plugins-experimental.git@${BST_EXT_REF}#egg=bst_plugins_experimental[cargo]\
    \ \\\n  .\n"
  - git clone https://gitlab.com/freedesktop-sdk/freedesktop-sdk.git
  - git -C freedesktop-sdk checkout ${FD_SDK_REF}
  image: registry.gitlab.com/buildstream/buildstream-docker-images/testsuite-fedora:32-${DOCKER_IMAGE_VERSION}
  only: &id005
  - schedules
  stage: test
  variables: &id006
    BST_EXT_REF: da0417b62ba47ffdaff985b736907373d14cd2c7
    FD_SDK_REF: freedesktop-sdk-20.08beta.1-buildstream2
.tests-template:
  after_script: null
  artifacts: &id001
    paths:
    - .coverage-reports
  before_script: &id002
  - mount
  - df -h
  - tox --version
  except: &id009
  - schedules
  script: &id010
  - mkdir -p "${INTEGRATION_CACHE}"
  - useradd -Um buildstream
  - chown -R buildstream:buildstream .
  - su buildstream -c "${TEST_COMMAND}"
  stage: test
analysis:
  artifacts:
    paths:
    - analysis/
  except:
  - schedules
  script:
  - '# Workaround radon issue not requiring it''s dependency

    pip3 install flake8_polyfill

    pip3 install radon

    mkdir analysis

    '
  - 'echo "Calculating Maintainability Index"

    radon mi -s -j src/buildstream > analysis/mi.json

    radon mi -s src/buildstream

    '
  - 'echo "Calculating Cyclomatic Complexity"

    radon cc -a -s -j src/buildstream > analysis/cc.json

    radon cc -a -s src/buildstream

    '
  - 'echo "Calculating Raw Metrics"

    radon raw -s -j src/buildstream > analysis/raw.json

    radon raw -s src/buildstream

    '
  stage: post
cache:
  key: $CI_JOB_NAME-
  paths:
  - cache/
coverage:
  artifacts:
    paths:
    - coverage-sources/
    - coverage-report/
  coverage: /TOTAL +\d+ +\d+ +(\d+\.\d+)%/
  dependencies:
  - tests-centos-7.7
  - tests-debian-10
  - tests-fedora-31
  - tests-remote-execution
  - tests-ubuntu-18.04
  - tests-userchroot
  except:
  - schedules
  script:
  - cp -a .coverage-reports/ ./coverage-sources
  - tox -e coverage
  - cp -a .coverage-reports/ ./coverage-report
  stage: post
docs:
  artifacts:
    paths:
    - public/
  except:
  - schedules
  script:
  - env BST_SOURCE_CACHE="$(pwd)/cache/integration-cache/sources" tox -e docs
  - mv doc/build/html public
  stage: test
  variables:
    BST_FORCE_SESSION_REBUILD: 1
image: registry.gitlab.com/buildstream/buildstream-docker-images/testsuite-debian:10-${DOCKER_IMAGE_VERSION}
include:
- template: Code-Quality.gitlab-ci.yml
- template: License-Scanning.gitlab-ci.yml
- template: SAST.gitlab-ci.yml
lint:
  before_script:
  - python3 --version
  except:
  - schedules
  image: registry.gitlab.com/buildstream/buildstream-docker-images/testsuite-fedora:32-${DOCKER_IMAGE_VERSION}
  script:
  - tox -e format-check,lint
  stage: test
mypy:
  except:
  - schedules
  script:
  - tox -e mypy
  stage: test
overnight-randomized:
  after_script: null
  artifacts: *id001
  before_script: *id002
  except: []
  image: registry.gitlab.com/buildstream/buildstream-docker-images/testsuite-fedora:32-${DOCKER_IMAGE_VERSION}
  only:
  - schedules
  script:
  - mkdir -p "${INTEGRATION_CACHE}"
  - useradd -Um buildstream
  - chown -R buildstream:buildstream .
  - su buildstream -c "tox -e py36-randomized,py37-randomized,py38-randomized-nocover
    -- --color=yes --integration"
  stage: test
overnight-tests:
  artifacts: *id003
  before_script: *id004
  image: registry.gitlab.com/buildstream/buildstream-docker-images/testsuite-fedora:32-${DOCKER_IMAGE_VERSION}
  only: *id005
  script:
  - "cat > ~/.config/buildstream.conf << EOF\n# Get a lot of output in case of errors\n\
    logging:\n  error-lines: 80\n#\n# Artifacts\n#\nartifacts:\n- url: https://bb-cache.buildstream.build:11002\n\
    \  client-cert: $OVERNIGHT_CACHE_PUSH_CERT\n  client-key: $OVERNIGHT_CACHE_PUSH_KEY\n\
    \  push: true\nEOF\n"
  - make -C freedesktop-sdk
  stage: test
  variables: *id006
overnight-tests-no-cache:
  artifacts: *id003
  before_script: *id004
  image: registry.gitlab.com/buildstream/buildstream-docker-images/testsuite-fedora:32-${DOCKER_IMAGE_VERSION}
  only: *id005
  script:
  - sed -i '/artifacts:/,+1 d' freedesktop-sdk/project.conf
  - make -C freedesktop-sdk
  stage: test
  tags:
  - overnight-tests
  variables: *id006
pages:
  artifacts:
    paths:
    - public/
  dependencies:
  - coverage
  - docs
  except:
  - schedules
  only:
  - master
  script:
  - mkdir -p ${ACME_DIR}
  - echo ${ACME_CHALLENGE} > ${ACME_DIR}/$(echo ${ACME_CHALLENGE} | cut -c1-43)
  - mkdir -p ${COVERAGE_DIR}
  - cp -a ./coverage-report/ ${COVERAGE_DIR}
  stage: publish
  variables:
    ACME_DIR: public/.well-known/acme-challenge
    COVERAGE_DIR: public/coverage
stages:
- test
- post
- publish
