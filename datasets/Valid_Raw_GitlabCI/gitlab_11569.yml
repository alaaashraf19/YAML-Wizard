build:
  artifacts:
    expire_in: 1 week
    paths:
    - main-partition/build/libs/*.jar
  script: ./gradlew build
  stage: build
docker-image:
  dependencies:
  - build
  except:
  - tags
  - master
  image: docker:latest
  script:
  - cd main-partition
  - docker login -u gitlab-ci-token -p $CI_JOB_TOKEN $CI_REGISTRY
  - docker build -t $CI_REGISTRY_IMAGE:$CI_COMMIT_REF_NAME .
  - docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_REF_NAME
  services:
  - docker:dind
  stage: docker
  when: manual
docker-image-master:
  dependencies:
  - build
  image: docker:latest
  only:
  - master
  script:
  - cd main-partition
  - docker login -u gitlab-ci-token -p $CI_JOB_TOKEN $CI_REGISTRY
  - docker build -t $CI_REGISTRY_IMAGE:latest .
  - docker push $CI_REGISTRY_IMAGE:latest
  services:
  - docker:dind
  stage: docker
docker-image-tags:
  dependencies:
  - build
  image: docker:latest
  only:
  - tags
  script:
  - cd main-partition
  - docker login -u gitlab-ci-token -p $CI_JOB_TOKEN $CI_REGISTRY
  - docker build -t $CI_REGISTRY_IMAGE:$CI_COMMIT_REF_NAME .
  - docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_REF_NAME
  services:
  - docker:dind
  stage: docker
image: openjdk:jdk-alpine
stages:
- build
- docker
variables:
  GRADLE_OPTS: -Dorg.gradle.daemon=false
