default:
  before_script:
  - ruby -v
  - gem install -N bundler:2.3.9
  - helm repo add gitlab https://charts.gitlab.io
  - helm repo add jetstack https://charts.jetstack.io
  image: registry.gitlab.com/gitlab-org/gitlab-build-images/debian-bookworm-slim-ruby-3.2:kubectl-1.30-helm-3.10-helm_kubeconform-0.1.17-vcluster-0.19-awscli-1.32.93
pages:
  artifacts:
    paths:
    - public
  before_script:
  - ruby -v
  - gem install -N bundler:2.3.9
  cache:
    key: $CI_JOB_NAME.$CI_BUILD_REF_NAME
    paths:
    - vendor/ruby
  only:
  - master
  - triggers
  resource_group: charts-release
  script:
  - mkdir -p public/unstable
  - aws s3 cp s3://$S3_BUCKET/index.yaml public/index.yaml || true
  - aws s3 cp s3://$S3_BUCKET/unstable/index.yaml public/unstable/index.yaml || true
  - cp ${COSIGN_PUBLIC_KEY} public/cosign.pub || true
  - bundle config set path vendor/ruby
  - bundle install --jobs 4
  - bundle exec kramdown --input GFM --template document --syntax-highlighter rouge
    README.md > public/index.html
  - helm repo index public --merge public/index.yaml --url https://$S3_BUCKET.s3.amazonaws.com
  - cp artifacthub-repo.yml public/artifacthub-repo.yml
  - aws s3 sync public s3://$S3_BUCKET --acl public-read
  - echo "Compressing with GZIP"
  - find public -type f -regex '.*\.\(htm\|html\|yaml\|yml\)$' -exec gzip -9 -f -k
    {} \;
  - rm -f public/*tgz
  stage: deploy
release_chart:
  except:
    variables:
    - $UNSTABLE == "true"
  only:
    refs:
    - pipelines
    - master
    variables:
    - $CHART_NAME
    - $RELEASE_REF
  resource_group: charts-release
  script:
  - mkdir -p public
  - aws s3 cp s3://$S3_BUCKET/index.yaml public/index.yaml
  - CHART_CLONE_SUBPATH=${CHART_CLONE_SUBPATH:-charts/$CHART_NAME}
  - if ! $(git clone "https://gitlab.com/gitlab-org/$CHART_CLONE_SUBPATH.git" -b $RELEASE_REF
    --depth 10 charts/$CHART_NAME); then echo "Chart not found at gitlab-org/$CHART_CLONE_SUBPATH,
    trying gitlab-org/security/$CHART_CLONE_SUBPATH"; git clone "https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlab.com/gitlab-org/security/$CHART_CLONE_SUBPATH.git"
    -b $RELEASE_REF --depth 10 charts/$CHART_NAME; fi
  - if [ -n "${CHART_SOURCE_DIR}" ]; then CHART_LOCATION="charts/$CHART_NAME/$CHART_SOURCE_DIR";
    else CHART_LOCATION="charts/$CHART_NAME"; fi
  - if ! ls $CHART_LOCATION/charts/*.tgz >/dev/null 2>&1; then helm dep up $CHART_LOCATION;
    fi
  - bash scripts/package_charts.sh public $CHART_LOCATION
  - helm repo index public --merge public/index.yaml --url https://$S3_BUCKET.s3.amazonaws.com
  - aws s3 sync public s3://$S3_BUCKET --acl public-read
release_unstable_chart:
  only:
    refs:
    - pipelines
    - master
    variables:
    - $UNSTABLE == "true"
  resource_group: charts-release
  script:
  - mkdir -p public/unstable
  - aws s3 cp s3://$S3_BUCKET/unstable/index.yaml public/unstable/index.yaml || true
  - CHART_CLONE_SUBPATH=${CHART_CLONE_SUBPATH:-charts/$CHART_NAME}
  - if ! $(git clone "https://gitlab.com/gitlab-org/$CHART_CLONE_SUBPATH.git" -b $RELEASE_REF
    --depth 10 charts/$CHART_NAME); then echo "Chart not found at gitlab-org/$CHART_CLONE_SUBPATH,
    trying gitlab-org/security/$CHART_CLONE_SUBPATH"; git clone "https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlab.com/gitlab-org/security/$CHART_CLONE_SUBPATH.git"
    -b $RELEASE_REF --depth 10 charts/$CHART_NAME; fi
  - if ! ls charts/$CHART_NAME/charts/*.tgz >/dev/null 2>&1; then helm dep up charts/$CHART_NAME;
    fi
  - bash scripts/package_charts.sh public/unstable charts/$CHART_NAME
  - helm repo index public/unstable --merge public/unstable/index.yaml --url https://$S3_BUCKET.s3.amazonaws.com/unstable
  - aws s3 sync public/unstable s3://$S3_BUCKET/unstable --acl public-read
test:
  artifacts:
    expire_in: 3d
    paths:
    - public
  except:
  - master
  script:
  - mkdir -p public
  - aws s3 cp s3://$S3_BUCKET/index.yaml public/index.yaml || true
  - bundle config set path vendor/ruby
  - bundle install --jobs 4
  - bundle exec kramdown --input GFM --template document --syntax-highlighter rouge
    README.md > public/index.html
  - while read chart; do if ! $(git clone https://gitlab.com/gitlab-org/charts/$chart.git
    charts/$chart); then echo "Chart $chart not found in gitlab-org/charts group,
    trying gitlab-org/security/charts group."; git clone https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlab.com/gitlab-org/security/charts/$chart.git
    charts/$chart; fi; done < CHARTS_LIST
  - helm lint charts/*
  - for chart in charts/*; do
  - if ! ls $chart/charts/*.tgz >/dev/null 2>&1; then helm dep up $chart; fi
  - done
  - bash scripts/package_charts.sh public charts/*
  - helm repo index public --merge public/index.yaml --url https://$S3_BUCKET.s3.amazonaws.com
