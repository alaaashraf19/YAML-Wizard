image: andrewmackrodt/nodejs:latest
pages:
  artifacts:
    paths:
    - public
  cache:
    paths:
    - node_modules/
    untracked: true
  only:
  - master
  script:
  - git config --global user.name "SMC Webfonts Bot"
  - git config --global user.email "smc-webfonts@kollavarsham.org"
  - npm install gulp -g
  - npm install
  - gulp build-deploy-and-tag
  - ./deploy.sh
  - rm -rf public && mkdir -p public
  - mv dist/* public
