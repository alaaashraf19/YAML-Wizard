before_script:
- bundle install
- npm install
image: ruby:2.3
pages:
  artifacts:
    paths:
    - public
  only:
  - master
  script:
  - bundle exec jekyll build -d public
  - bundle exec jekyll algolia
  stage: deploy
test:
  artifacts:
    paths:
    - test
  except:
  - master
  script:
  - bundle exec jekyll build -d test
  - bundle exec jekyll build && bundle exec htmlproofer --log-level :debug ./_site/
    --assume_extension --http_status_ignore 503 --url-ignore "/www.linkedin.com/,/localhost/"
  stage: test
variables:
  ALGOLIA_API_KEY: $ALGOLIA_API_KEY
  JEKYLL_ENV: production
  LC_ALL: C.UTF-8
