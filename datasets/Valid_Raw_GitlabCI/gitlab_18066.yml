.code_style_script:
  before_script:
  - rustup component add rustfmt
  script:
  - cargo fmt --all -- --check
.test_script:
  script:
  - rustc --version && cargo --version
  - cargo test --all --verbose
latest:
  extends: .test_script
  image: rust:latest
  stage: tests
stable_code_latest:
  extends: .code_style_script
  image: rust:latest
  stage: code_style
stages:
- code_style
- tests
