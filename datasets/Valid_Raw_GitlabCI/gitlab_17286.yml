before_script:
- mkdir -p $GOPATH/src/$REPO_NAME
- ln -svf $CI_PROJECT_DIR/* $GOPATH/src/$REPO_NAME
- cd $GOPATH/src/$REPO_NAME
compile:
  artifacts:
    untracked: true
  script:
  - GOOS=linux CGO_ENABLED=0 go build -o $CI_PROJECT_DIR/seneferu
  stage: build
compile-js:
  artifacts:
    paths:
    - js/
  image: node:9.2.0
  script:
  - cd $CI_PROJECT_DIR
  - npm install
  - npm run build
  stage: build
format:
  script:
  - go fmt ./...
  stage: validate
image: golang:latest
release-image:
  dependencies:
  - compile
  - compile-js
  image: docker:git
  only:
  - master
  script:
  - docker login -u gitlab-ci-token -p $CI_BUILD_TOKEN registry.gitlab.com
  - docker version
  - cd $CI_PROJECT_DIR
  - docker build -t registry.gitlab.com/sorenmat/seneferu:$CI_COMMIT_REF_NAME .
  - docker push registry.gitlab.com/sorenmat/seneferu:$CI_COMMIT_REF_NAME
  services:
  - docker:dind
  stage: release
stages:
- validate
- build
- coverage
- release
test:
  script:
  - go test -race ./...
  services:
  - postgres:latest
  stage: validate
variables:
  CONTAINER_RELEASE_IMAGE: registry.gitlab.com/sorenmat/seneferu:latest
  POSTGRES_DB: seneferu
  POSTGRES_HOST: postgres
  REPO_NAME: gitlab.com/sorenmat/seneferu
vet:
  script:
  - go vet ./...
  stage: validate
