.deploy_release:
  except: &id001
  - tags
  stage: deploy
  variables: &id002
    GIT_STRATEGY: none
build:
  artifacts:
    expire_in: 1 Week
    paths:
    - ${OUTPUT_FOLDER}
  except:
  - tags
  script:
  - apply-vipm "Windows Applications\Application\vipm-pkgs.deps"
  - MGISlnExp build "Windows Applications\Windows Applications.lvsln" Release -gitversion
    Major.Minor.Patch.CommitsSinceVersionSource
  stage: build
  tags:
  - lv2017
clean_s3:
  environment:
    action: stop
    name: ${CI_COMMIT_REF_SLUG}
  except: *id001
  image: python:latest
  script:
  - pip install awscli
  - aws s3 rm s3://${BUCKET_NAME}/${CI_COMMIT_REF_SLUG} --recursive
  stage: deploy
  variables: *id002
  when: manual
deploy:
  environment:
    name: ${CI_COMMIT_REF_SLUG}
    on_stop: clean_s3
    url: https://${AWS_REGION}.amazonaws.com/${BUCKET_NAME}/${CI_COMMIT_REF_SLUG}
  except: *id001
  script:
  - aws s3 cp s3://${BUCKET_NAME}/${CI_COMMIT_REF_SLUG}/Packages "${OUTPUT_FOLDER}/Packages"
    2> nul && aws s3 cp s3://${BUCKET_NAME}/${CI_COMMIT_REF_SLUG}/Packages.stamps
    "${OUTPUT_FOLDER}/Packages.stamps" || echo Empty Bucket
  - '"C:/Program Files/National Instruments/NI Package Manager/nipkg.exe" feed-create
    -a "${OUTPUT_FOLDER}" 2> nul || "C:/Program Files/National Instruments/NI Package
    Manager/nipkg.exe" feed-create "${OUTPUT_FOLDER}"'
  - aws s3 cp "${OUTPUT_FOLDER}" s3://${BUCKET_NAME}/${CI_COMMIT_REF_SLUG} --recursive
    --acl public-read
  stage: deploy
  tags:
  - lv2017
  variables: *id002
variables:
  AWS_REGION: s3-us-west-1
  BUCKET_NAME: gpm-dist
  OUTPUT_FOLDER: Windows Applications\builds\Windows GPM\Package
