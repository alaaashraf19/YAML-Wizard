.production-only:
  only: &id001
  - master
  - STAGE
before_script:
- chmod u+x ./generate_config.sh
- if [ "$CI_COMMIT_REF_NAME" != "master" ]; then export BRANCH_NAME=$(echo -en $CI_COMMIT_REF_NAME
  | tr -c '[:alnum:]_.-' '-'); fi
compile_project:
  artifacts:
    expire_in: 1 day
    paths:
    - public/
    - target/
    when: always
  script:
  - ./generate_config.sh $PROD_HOST $PROD_DB $PROD_USER $PROD_PASS $LOGIN_HOST
  - mvn clean compile -B "$MAVEN_OPTS"
  - cp swagger/swagger.yaml public/
  stage: build
  tags:
  - ita
deploy_the_war:
  after_script:
  - docker volume ls -qf dangling=true | xargs -r docker volume rm
  - docker rm $(docker ps -qa --no-trunc --filter "status=exited")
  before_script:
  - if [ "$CI_COMMIT_REF_NAME" != "master" ]; then export IMAGE_TAG=$(echo -en $CI_COMMIT_REF_NAME
    | tr -c '[:alnum:]_.-' '-'); else export IMAGE_TAG="latest";fi
  - chmod u+x generate_config.sh
  - chmod +x rootfs/app-entrypoint.sh
  - docker login -u "gitlab-ci-token" -p "$CI_JOB_TOKEN" $CI_REGISTRY
  only: *id001
  script:
  - sh generate_config.sh $PROD_HOST $PROD_DB $PROD_USER $PROD_PASS $LOGIN_HOST
  - docker build -t "$CI_REGISTRY_IMAGE:$IMAGE_TAG" .
  - docker push "$CI_REGISTRY_IMAGE:$IMAGE_TAG"
  stage: analyze_and_docker
  tags:
  - container
pack_the_client:
  only: *id001
  script:
  - mvn clean install -B -Dswagger=client -Dmaven.test.skip=true
  stage: analyze_and_docker
  tags:
  - ita
pages:
  artifacts:
    paths:
    - public
  only: *id001
  script:
  - echo 'Publishing Documents'
  stage: documentation
  tags:
  - ita
  when: always
run_tests_and_package:
  artifacts:
    expire_in: 1 day
    paths:
    - target/
    when: always
  dependencies:
  - compile_project
  script:
  - mvn package -B "$MAVEN_OPTS"
  stage: package
  tags:
  - ita
sonar_qube:
  dependencies:
  - run_tests_and_package
  script:
  - mvn sonar:sonar -B -Dsonar.host.url=https://sonarcloud.io -Dsonar.organization=kvjavaxxv
    -Dsonar.login="$SONAR_SECRET" -Dsonar.branch="$BRANCH_NAME" "$MAVEN_OPTS"
  - cat target/site/jacoco/index.html
  stage: analyze_and_docker
  tags:
  - ita
  when: always
stages:
- build
- documentation
- package
- analyze_and_docker
variables:
  MAVEN_OPTS: -Djava.awt.headless=true
