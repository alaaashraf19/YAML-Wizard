build_image:
  allow_failure: true
  image: docker:latest
  only:
  - schedules
  script:
  - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  - docker build -t $CI_REGISTRY_IMAGE .
  - docker push $CI_REGISTRY_IMAGE
  services:
  - docker:dind
  stage: build
pages:
  artifacts:
    paths:
    - public
  image: $CI_REGISTRY_IMAGE
  only:
  - master
  script:
  - JEKYLL_ENV=production jekyll build -d public
  stage: deploy
test:
  artifacts:
    paths:
    - test
  except:
  - master
  image: $CI_REGISTRY_IMAGE
  script:
  - jekyll build -d test
  stage: test
