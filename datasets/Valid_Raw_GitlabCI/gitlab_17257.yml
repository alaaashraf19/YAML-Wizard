analyze:flow:
  dependencies:
  - install
  image: node:11
  only:
  - develop
  script:
  - yarn build-css
  - yarn flow
  stage: analyze
analyze:lint:
  dependencies:
  - install
  image: node:11
  only:
  - develop
  script:
  - yarn build-css
  - yarn lint
  stage: analyze
analyze:react-lint:
  dependencies:
  - install
  image: node:11
  only:
  - develop
  script:
  - yarn build-css
  - yarn react-scripts-build
  stage: analyze
cache:
  paths:
  - node_modules/
  - yarn.lock
coverage:collect:
  artifacts:
    expire_in: 1 day
    paths:
    - coverage
  dependencies:
  - test:unit
  image: node:8
  script:
  - yarn test:coverage:collect
  stage: coverage
dev:build:
  allow_failure: false
  artifacts:
    expire_in: 1 day
    paths:
    - build
  image: node:11
  only:
  - develop
  script:
  - sed -e 's/%jwt_secret%/'"$JWT_SECRET_DEV"'/g' rancher/dev/config.js > src/config.js
  - yarn
  - yarn build
  stage: build
dev:deploy:
  allow_failure: false
  dependencies:
  - dev:build
  image: registry.gitlab.com/gitlab-org/cloud-deploy/aws-base:latest
  only:
  - develop
  script:
  - aws s3 sync ./build/ s3://dev.socrates-conference.de --acl public-read --delete
  stage: deploy
install:
  artifacts:
    expire_in: 1 hour
    paths:
    - node_modules
    - coverage
    - .nyc_output
  image: node:11
  script:
  - yarn
  - mkdir coverage
  - mkdir .nyc_output
  stage: install
pages:
  artifacts:
    expire_in: 30 days
    paths:
    - public/
  dependencies:
  - coverage:collect
  only:
  - develop
  script:
  - mv coverage/* public
  - mv public/gitlab_page.html public/index.html
  stage: report
  when: always
prod:build:
  allow_failure: false
  artifacts:
    expire_in: 1 day
    paths:
    - build
  image: node:11
  only:
  - master
  script:
  - sed -e 's/%jwt_secret%/'"$JWT_SECRET_PROD"'/g' rancher/prod/config.js > src/config.js
  - yarn
  - yarn build
  stage: build
prod:deploy:
  allow_failure: false
  dependencies:
  - prod:build
  image: registry.gitlab.com/gitlab-org/cloud-deploy/aws-base:latest
  only:
  - master
  script:
  - aws s3 sync ./build/ s3://socrates-conference.de --acl public-read --delete
  stage: deploy
stages:
- install
- analyze
- test
- coverage
- build
- deploy
- report
test:unit:
  artifacts:
    expire_in: 1 hour
    paths:
    - node_modules
    - coverage
    - .nyc_output
  dependencies:
  - install
  image: node:11
  script:
  - yarn test:coverage:unit
  stage: test
