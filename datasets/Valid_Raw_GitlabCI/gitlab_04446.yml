before_script:
- apk add gcc musl-dev
- python -m pip install poetry
- poetry install
image: python:3.6-alpine
stages:
- unittest
test py3.6:
  image: python:3.6-alpine
  script:
  - poetry run python -m bgez.__test__
  stage: unittest
test py3.7:
  image: python:3.7-alpine
  script:
  - poetry run python -m bgez.__test__
  stage: unittest
