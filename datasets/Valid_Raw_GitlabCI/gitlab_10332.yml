after_script:
- su -c "dropdb ishtar_test" postgres
- su -c "dropdb test_ishtar_test" postgres
- su -c "dropuser ishtar_test" postgres
before_script:
- apt-get update
- apt-get install -q -y locales locales-all
- echo "fr_FR.UTF-8 UTF-8" >> /etc/locale.gen
- dpkg-reconfigure --frontend=noninteractive locales && update-locale LANG=fr_FR.UTF-8
- apt-get install -q -y git sed python3-pip libpq-dev python3-dev libjpeg-dev zlib1g-dev
  libxml2-dev libxslt1-dev libgeos-dev python3-cairocffi tidy libtidy-dev binutils
  libproj-dev gdal-bin libpangocairo-1.0-0 pandoc graphviz python3-argon2 file gettext
  postgresql postgresql-13-postgis-3
- pip3 install -r requirements.txt
- cp Makefile.example Makefile
- su -c "createuser -w -d ishtar_test" postgres
- su -c "createdb -E UTF8 -O ishtar_test ishtar_test" postgres
- su -c "createdb -E UTF8 -O ishtar_test test_ishtar_test" postgres
- su -c "psql -c \"ALTER ROLE ishtar_test WITH PASSWORD 'ishtar_test';\"" postgres
- su -c "psql -d ishtar_test -c 'CREATE EXTENSION postgis;'" postgres
- su -c "psql -d test_ishtar_test -c 'CREATE EXTENSION postgis;'" postgres
build-v4:
  only:
  - main
  - develop
  script:
  - sed -i -e 's/"registration"/"django_registration"/' example_project/settings.py
  - cp example_project/local_settings.py.gitlab-ci example_project/local_settings.py
  - mkdir -p /var/log/django/
  - make build_gitlab
  stage: build
  tags:
  - bullseye-shell
debian:
  only:
  - bullseye
  script:
  - apt-get install -q -y devscripts build-essential lintian wget dh-python python3-all
    sudo findutils
  - apt-get install -q -y libpq-dev python3-dev libjpeg-dev zlib1g-dev libxml2-dev
    libxslt1-dev libgeos-dev libtidy-dev binutils libproj-dev python3-setuptools
  - wget -O /etc/apt/sources.list.d/iggdrasil.list http://deb.iggdrasil.net/apt/debian/dists/bullseye/iggdrasil.list
  - wget -O - http://deb.iggdrasil.net/iggdrasil.gpg.key | apt-key add -
  - apt-get update
  - python3 -c 'import re;print(" ".join([re.search(r"(^[^(]*)", p).group(1).strip()
    for p in open("debian/control", "r").read().split("python3:Depends}")[1].split("Description:")[0].replace(",",
    "").split("\n") if p and "Recommends" not in p]))' > /tmp/packages.txt
  - xargs apt-get -q -y install < /tmp/packages.txt
  - cp Makefile.example Makefile
  - make deb
  - dpkg -i ../python3-django-ishtar_*_all.deb
  - /etc/init.d/postgresql start
  - INSTANCE=my_ishtar URL=localhost MAX_UPLOAD_SIZE=100 ishtar-prepare-instance
  - sudo -u postgres createdb -E UTF8 -O ishtar-my_ishtar test_ishtar-my_ishtar
  - sudo -u postgres psql -d test_ishtar-my_ishtar -c 'CREATE EXTENSION postgis;'
  - cd /srv/ishtar/my_ishtar && python3 ./manage.py test -k archaeological_operations
    ishtar_common archaeological_context_records archaeological_files archaeological_finds
    archaeological_warehouse
  stage: test
  tags:
  - bullseye
test-v4:
  only:
  - main
  - develop
  script:
  - sed -i -e 's/"registration"/"django_registration"/' example_project/settings.py
  - cp example_project/local_settings.py.gitlab-ci example_project/local_settings.py
  - mkdir -p /var/log/django/
  - make soft_test_gitlab
  stage: test
  tags:
  - bullseye-shell
