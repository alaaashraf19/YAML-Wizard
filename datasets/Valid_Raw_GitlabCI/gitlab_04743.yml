aur:
  before_script: []
  image: archlinux/base:latest
  only:
  - tags
  script:
  - cd deploy/
  - chmod +x pkgbuild-to-aur
  - ./pkgbuild-to-aur
  stage: release
before_script:
- python -V
- pip install tox
cache:
  paths:
  - .cache/pip
image: python:3.7-alpine
linting:
  script:
  - tox -e flake8
  stage: test
package:
  artifacts:
    expire_in: 1 month
    paths:
    - dist/
  script:
  - python setup.py sdist bdist_wheel
  stage: build
pypi:
  only:
  - tags
  script:
  - pip install twine
  - twine upload --skip-existing dist/*
  stage: release
  variables:
    TWINE_PASSWORD: $PYPI_PASSWORD
    TWINE_USERNAME: $PYPI_USERNAME
python36:
  image: python:3.6-alpine
  script:
  - tox -e py36
  stage: test
python37:
  image: python:3.7-alpine
  script:
  - tox -e py37
  stage: test
stages:
- test
- build
- release
variables:
  PIP_CACHE_DIR: $CI_PROJECT_DIR/.cache/pip
