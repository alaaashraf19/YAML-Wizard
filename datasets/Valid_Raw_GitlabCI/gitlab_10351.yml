build:
  artifacts:
    paths:
    - public
  script:
  - mkdir .public
  - cp -r * .public
  - mv .public public
  stage: build
deploy to production:
  environment: production
  image: python:latest
  only:
  - master
  script:
  - pip install awscli
  - aws s3 rm s3://$S3_BUCKET_NAME --recursive
  - aws s3 cp ./public/ s3://$S3_BUCKET_NAME/ --recursive --exclude ".git/*" --include
    "*" --acl public-read
  - aws cloudfront create-invalidation --distribution-id $CLOUDFRONT_DISTRIBUTION_ID
    --paths "/*"
  stage: deploy
  variables:
    S3_BUCKET_NAME: improbible.com
stages:
- build
- deploy
