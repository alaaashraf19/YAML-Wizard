  - name
  - email
  - url
  - message
  branch: master
  commitMessage: New comment.
  filename: comment-{@timestamp}
  format: yml
  generatedFields:
    date:
      options:
        format: iso8601
      type: date
  moderation: true
  path: docs/_data/comments/{options.slug}
  requiredFields:
