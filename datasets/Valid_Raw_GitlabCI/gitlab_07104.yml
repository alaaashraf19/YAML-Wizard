before_script:
- export PUB_CACHE=$PWD/.pub_cache/
- pub version
- pub get
- pub upgrade
cache:
  key: $CI_BUILD_REF_NAME
  paths:
  - packages/
  - web/packages/
  - .pub_cache/
  untracked: true
image: google/dart:1.24.3
pages:
  artifacts:
    paths:
    - public/
  only:
  - master
  script:
  - pub build
  - rm -r -f public
  - mkdir -p public
  - mv -v build/web/* public
  stage: build
  tags:
  - docker
stages:
- build
