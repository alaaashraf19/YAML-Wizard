build:
  image: docker:latest
  script:
  - apk add curl jq
  - export DOCKER_BUILDKIT=1
  - export DOCKER_CLI_EXPERIMENTAL=enabled
  - mkdir -p ~/.docker/cli-plugins/
  - BUILDX_LATEST_BIN_URI=$(curl -s -L https://github.com/docker/buildx/releases/latest
    | grep 'linux-amd64' | grep 'href' | sed 's/.*href="/https:\/\/github.com/g; s/amd64".*/amd64/g')
  - curl -s -L ${BUILDX_LATEST_BIN_URI} -o ~/.docker/cli-plugins/docker-buildx
  - chmod a+x ~/.docker/cli-plugins/docker-buildx
  - BINFMT_IMAGE_TAG=$(curl -s https://registry.hub.docker.com/v2/repositories/docker/binfmt/tags
    | jq '.results | sort_by(.last_updated)[-1].name' -r)
  - docker run -d --rm --privileged docker/binfmt:${BINFMT_IMAGE_TAG}
  - docker buildx create --name multibuilder
  - docker buildx use multibuilder
  - docker login -u ${DOCKERHUB_USER} -p ${DOCKERHUB_PASS}
  - docker buildx build --platform linux/amd64,linux/s390x,linux/386,linux/arm/v6,linux/arm/v7,linux/arm64/v8,linux/ppc64le
    -t docker.io/aapjeisbaas/hello-container:${CI_APPLICATION_TAG} . --push
  - docker buildx imagetools inspect docker.io/aapjeisbaas/hello-container:${CI_APPLICATION_TAG}
  services:
  - docker:dind
  stage: build
  variables:
    CI_APPLICATION_TAG: $CI_COMMIT_SHA
container_scanning:
  artifacts:
    reports:
      container_scanning: gl-container-scanning-report.json
  image: docker:stable
  script:
  - docker run -d --name db arminc/clair-db:latest
  - docker run -p 6060:6060 --link db:postgres -d --name clair --restart on-failure
    arminc/clair-local-scan:v2.0.1
  - apk add -U wget ca-certificates
  - docker pull docker.io/aapjeisbaas/hello-container:${CI_APPLICATION_TAG}
  - wget https://github.com/arminc/clair-scanner/releases/download/v8/clair-scanner_linux_amd64
  - mv clair-scanner_linux_amd64 clair-scanner
  - chmod +x clair-scanner
  - touch clair-whitelist.yml
  - while( ! wget -q -O /dev/null http://docker:6060/v1/namespaces ) ; do sleep 1
    ; done
  - retries=0
  - echo "Waiting for clair daemon to start"
  - while( ! wget -T 10 -q -O /dev/null http://docker:6060/v1/namespaces ) ; do sleep
    1 ; echo -n "." ; if [ $retries -eq 10 ] ; then echo " Timeout, aborting." ; exit
    1 ; fi ; retries=$(($retries+1)) ; done
  - ./clair-scanner -c http://docker:6060 --ip $(hostname -i) -r gl-container-scanning-report.json
    -l clair.log -w clair-whitelist.yml docker.io/aapjeisbaas/hello-container:${CI_APPLICATION_TAG}
    || true
  services:
  - docker:stable-dind
  stage: test
  variables:
    CI_APPLICATION_TAG: $CI_COMMIT_SHA
    DOCKER_DRIVER: overlay2
push_container:
  image: docker:latest
  script:
  - apk add curl jq
  - export DOCKER_BUILDKIT=1
  - export DOCKER_CLI_EXPERIMENTAL=enabled
  - mkdir -p ~/.docker/cli-plugins/
  - BUILDX_LATEST_BIN_URI=$(curl -s -L https://github.com/docker/buildx/releases/latest
    | grep 'linux-amd64' | grep 'href' | sed 's/.*href="/https:\/\/github.com/g; s/amd64".*/amd64/g')
  - curl -s -L ${BUILDX_LATEST_BIN_URI} -o ~/.docker/cli-plugins/docker-buildx
  - chmod a+x ~/.docker/cli-plugins/docker-buildx
  - BINFMT_IMAGE_TAG=$(curl -s https://registry.hub.docker.com/v2/repositories/docker/binfmt/tags
    | jq '.results | sort_by(.last_updated)[-1].name' -r)
  - docker run -d --rm --privileged docker/binfmt:${BINFMT_IMAGE_TAG}
  - docker buildx create --name multibuilder
  - docker buildx use multibuilder
  - docker login -u ${DOCKERHUB_USER} -p ${DOCKERHUB_PASS}
  - docker buildx build --platform linux/amd64,linux/s390x,linux/386,linux/arm/v6,linux/arm/v7,linux/arm64/v8,linux/ppc64le
    -t docker.io/aapjeisbaas/hello-container:latest . --push
  - docker buildx imagetools inspect docker.io/aapjeisbaas/hello-container:latest
  services:
  - docker:dind
  stage: deploy
  variables:
    CI_APPLICATION_TAG: $CI_COMMIT_SHA
stages:
- build
- test
- deploy
