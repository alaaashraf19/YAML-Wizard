cache:
  paths:
  - .cache
image: python:3.6
services:
- postgres:latest
test:
  script:
  - pip install pipenv
  - pipenv sync --dev
  - pipenv run pytest
variables:
  GIT_SUBMODULE_STRATEGY: normal
  PIPENV_CACHE_DIR: $CI_PROJECT_DIR/.cache/pipenv
  PIP_CACHE_DIR: $CI_PROJECT_DIR/.cache/pip
  POSTGRES_DB: nice_marmot
  POSTGRES_HOST: postgres
  POSTGRES_PASSWORD: ''
  POSTGRES_USER: runner
