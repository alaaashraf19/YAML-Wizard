.before_gem_install:
  before_script:
  - gem install bundler --no-document
  - bundle install -j $(nproc) --path vendor
.before_script:
  before_script:
  - echo ${GCP_CREDENTIALS} > credentials.json
  - gcloud auth activate-service-account --project $GCP_PROJECT_ID --key-file credentials.json
  - gcloud config set project $GCP_PROJECT_ID
build:
  image: docker:latest
  only:
  - master
  script:
  - docker login -u gitlab-ci-token -p $CI_JOB_TOKEN registry.gitlab.com
  - docker build -t registry.gitlab.com/gitlab-com/support/toolbox/gitlab-support-bot
    .
  - docker push registry.gitlab.com/gitlab-com/support/toolbox/gitlab-support-bot
  services:
  - docker:dind
  stage: build
cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
  - vendor/ruby
deploy:
  extends: .before_script
  image: google/cloud-sdk
  needs:
  - artifacts: true
    job: get_support_team_size
  only:
  - master
  script:
  - gcloud compute ssh --project $GCP_PROJECT_ID --zone $GCP_ZONE supportbot@gitlab-supportbot
    --command=" docker login -u gitlab-ci-token -p $CI_JOB_TOKEN registry.gitlab.com;
    docker stop supportbot; docker rm supportbot; docker pull registry.gitlab.com/gitlab-com/support/toolbox/gitlab-support-bot:latest;
    docker run -d --env SLACK_API_TOKEN=$SLACK_API_TOKEN --env ZD_TOKEN=$ZD_TOKEN
    --env SUPPORT_TEAM_SIZE=$(cat team_size) --name supportbot --restart always --volume
    /tmp/supportbot:/tmp/supportbot registry.gitlab.com/gitlab-com/support/toolbox/gitlab-support-bot"
  stage: deploy
get_support_team_size:
  artifacts:
    paths:
    - team_size
  only:
  - master
  script:
  - curl --fail --location  "https://about.gitlab.com/company/team/team.yml" > support.yaml
  - ruby -e "require 'yaml'; p YAML.load_file('./support.yaml').select { |crew| crew['departments'].include?
    'Customer Support' }.count" > team_size
  stage: build
image: ruby:2.6.3
include:
- template: Code-Quality.gitlab-ci.yml
rspec:
  extends: .before_gem_install
  script:
  - bundle exec rspec spec
  stage: test
rubocop:
  extends: .before_gem_install
  script:
  - bundle exec rubocop
  stage: test
stages:
- test
- build
- deploy
