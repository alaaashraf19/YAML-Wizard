Check Code Style:
  dependencies:
  - Install Dependencies
  script:
  - source env/bin/activate
  - pycodestyle ctf_api blindfold tests
  type: lint
Install Dependencies:
  artifacts:
    expire_in: 1 day
    paths:
    - env
  script:
  - pip install virtualenv
  - virtualenv -p python3 env
  - source env/bin/activate
  - pip install -r requirements.txt
  type: setup
Test API:
  dependencies:
  - Install Dependencies
  script:
  - source env/bin/activate
  - nose2 -C
  type: test
image: python
stages:
- setup
- lint
- test
