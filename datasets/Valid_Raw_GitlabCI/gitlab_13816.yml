dmd:
  artifacts: &id001
    paths:
    - goinsu
  script: docker run -v$(pwd):/source ohboi/mini$COMPILER bash -c " apt update -qq
    2>&1 > /dev/null                     && apt install -qq -y --no-install-recommends
    make git && dub fetch reggae                                    && dub run reggae
    -- --dc=$(if [[ "$COMPILER" = "ldc" ]]; then echo ldmd2; else echo $COMPILER;
    fi) --backend=make -d STATIC=$STATIC                                 && make &&
    ./goinsu"
  stage: build
  variables:
    COMPILER: dmd
    STATIC: 'false'
dmd-dub:
  script: docker run -v$(pwd):/source ohboi/mini$COMPILER bash -c " dub -b debug             &&
    dub -b release           && dub -b debug   -c static && dub -b release -c static"
  stage: build
  variables:
    COMPILER: dmd
dmd-static:
  artifacts: *id001
  script: docker run -v$(pwd):/source ohboi/mini$COMPILER bash -c " apt update -qq
    2>&1 > /dev/null                     && apt install -qq -y --no-install-recommends
    make git && dub fetch reggae                                    && dub run reggae
    -- --dc=$(if [[ "$COMPILER" = "ldc" ]]; then echo ldmd2; else echo $COMPILER;
    fi) --backend=make -d STATIC=$STATIC                                 && make &&
    ./goinsu"
  stage: build
  variables:
    COMPILER: dmd
    STATIC: 'true'
dmd-static-test:
  dependencies:
  - dmd-static
  script: docker build -f .ci/Dockerfile.test .
  stage: test
dmd-test:
  dependencies:
  - dmd
  script: docker build -f .ci/Dockerfile.test .
  stage: test
