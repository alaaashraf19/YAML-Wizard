.ccache_init:
  before_script: &id001
  - mkdir -p ccache
  - export CCACHE_BASEDIR=${PWD}
  - export CCACHE_DIR=${PWD}/ccache
2geom:
  artifacts:
    expire_in: 1 day
    paths:
    - build
    - opt
  before_script: *id001
  cache:
    paths:
    - ccache/
  script:
  - mkdir -p build opt
  - cd build
  - cmake .. -GNinja -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
    -DCMAKE_CXX_FLAGS="-fsanitize=address -fno-omit-frame-pointer" -DCMAKE_BUILD_TYPE=Debug
    -DCMAKE_INSTALL_PREFIX=../opt -D2GEOM_BOOST_PYTHON=ON -DWITH_COVERAGE=ON
  - ninja
  - ninja perf
  - ninja py2geom
  - ninja install
  stage: build
2geom:as-subproject:
  before_script: *id001
  cache:
    paths:
    - ccache/
  script:
  - mkdir -p opt2
  - cd tests/dependent-project
  - mkdir -p build-as-subproject
  - cd build-as-subproject
  - cmake .. -GNinja -D2GEOM_AS_SUBPROJECT=ON -DCMAKE_INSTALL_PREFIX=../../../opt2
  - ninja main
  - ./main
  - ninja install
  stage: build
2geom:find-package:
  before_script: *id001
  cache:
    paths:
    - ccache/
  dependencies:
  - 2geom
  needs:
  - 2geom
  script:
  - mkdir -p opt3
  - cd tests/dependent-project
  - mkdir -p build-with-find-package
  - cd build-with-find-package
  - cmake .. -GNinja -D2GEOM_AS_SUBPROJECT=OFF -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address"
    -DCMAKE_INSTALL_PREFIX=../../../opt3 -D2Geom_DIR="$PWD/../../../opt/lib/cmake/2Geom"
  - ninja main
  - ./main
  - ninja install
  stage: test
2geom:tests:
  artifacts:
    expire_in: 1 month
    expose_as: Test logs
    name: ${CI_JOB_NAME}-${CI_COMMIT_REF_NAME}-${CI_COMMIT_SHA}
    paths:
    - build/Testing
    reports:
      coverage_report:
        coverage_format: cobertura
        path: build/coverage_xml.xml
    when: on_failure
  coverage: /^\s*lines:\s*\d+.\d+\%/
  dependencies:
  - 2geom
  needs:
  - 2geom
  script:
  - cd build
  - find . -type f -name '*.gcno' | xargs touch
  - ninja coverage_xml
  stage: test
image: registry.gitlab.com/inkscape/inkscape-ci-docker/master
pages:
  artifacts:
    expire_in: 30 days
    paths:
    - public
  dependencies:
  - 2geom
  only:
  - master
  script:
  - cd build
  - find . -type f -name '*.gcno' | xargs touch
  - ninja coverage_html
  - mv coverage_html/ ../public/
  stage: deploy
variables:
  GIT_DEPTH: '10'
  GIT_SUBMODULE_STRATEGY: recursive
