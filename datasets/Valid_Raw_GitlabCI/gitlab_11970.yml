.basic_tests:
  coverage: /TOTAL.+ ([0-9]{1,3}%)/
  script:
  - xdoctest hiphive
  - coverage run -m pytest --verbose --junitxml=report.xml tests/
  - coverage report -m --omit=hiphive/calculators/numba_calc.py
  - coverage html --omit=hiphive/calculators/numba_calc.py
  stage: test
.build:
  artifacts:
    expire_in: 2 days
    paths:
    - local_installation/
  script:
  - pip3 install --target=$INSTDIR .
  stage: build
.test_examples:
  needs:
  - build:linux
  script:
  - basedir=$PWD
  - "for dir in $(find examples/ -name '*.py' | xargs dirname | sort -uk1 | grep -v\
    \ compare_fcs_phono3py) ; do\n  echo \"dir= $dir\"\n  cd $basedir\n  cd $dir\n\
    \  for file in $(ls *.py | sort -gk1) ; do\n    echo \"Running $file -- `date`\"\
    \n    python3 $file\n    echo \"Finished running $file -- `date`\"\n  done\n \
    \ echo\ndone\n"
  stage: test
.test_notebooks:
  needs:
  - build:linux
  script:
  - pytest --nbmake --nbmake-timeout=3600 $(find examples/ -name '*.ipynb')
  stage: test
basic_tests:linux:
  artifacts:
    expire_in: 2 days
    paths:
    - htmlcov/
    reports:
      junit: report.xml
  extends: .basic_tests
  needs:
  - build:linux
before_script:
- export PYTHONPATH=$PWD/$INSTDIR:${PYTHONPATH}
build:linux:
  extends: .build
code_quality:
  artifacts:
    paths:
    - gl-code-quality-report.json
image: $CI_REGISTRY/materials-modeling/$CI_PROJECT_NAME/cicd
include:
- template: Code-Quality.gitlab-ci.yml
pages:
  artifacts:
    expire_in: 14 days
    paths:
    - public
  except:
  - schedules
  only:
  - master
  - tags
  script:
  - mkdir -p public/dev
  - mv doc/google*.html public/
  - git checkout master
  - git pull
  - tag=$(git describe | tail -1)
  - echo "tag= $tag"
  - cp -dr htmlcov/ public/dev/coverage/
  - sed -i "s/version = ''/version = '$tag'/" doc/conf.py
  - cat doc/conf.py
  - sphinx-build -W doc/ public/dev/
  - cd examples
  - find tutorial/ -print | zip ../public/dev/tutorial.zip -@
  - find advanced_topics/ -print | zip ../public/dev/advanced_topics.zip -@
  - cd ..
  - find tests/ -print | zip public/dev/tests.zip tests/structure_databases/*.db -@
  - git checkout -- doc/conf.py
  - tag=$(git tag | tail -1)
  - echo "tag= $tag"
  - git checkout $tag
  - rm -fr $INSTDIR
  - pip3 install --target=$INSTDIR .
  - cp -dr htmlcov/ public/coverage/
  - sphinx-build -W doc/ public/
  - cd examples
  - find tutorial/ -print | zip ../public/tutorial.zip -@
  - find advanced_topics/ -print | zip ../public/advanced_topics.zip -@
  - cd ..
  - find tests/ -print | zip public/tests.zip tests/structure_databases/*.db -@
  - ls -l public/
  - chmod go-rwX -R public/
  stage: deploy
pypi:
  environment:
    name: pypi-upload
  except:
  - schedules
  only:
  - tags
  script:
  - tag=$(git tag | tail -1)
  - echo "tag= $tag"
  - git checkout $tag
  - python3 -m build
  - ls -l dist/
  - twine check dist/*
  - twine upload dist/* -u __token__ -p "$PYPI_TOKEN"
  stage: deploy
  when: manual
style_check:
  script:
  - flake8 doc/ examples/ hiphive/ tests/
  stage: test
test_documentation:
  artifacts:
    expire_in: 1 days
    paths:
    - public
  except:
  - master
  needs:
  - build:linux
  script:
  - mkdir public
  - sphinx-build -b doctest -W doc/ public/
  - sphinx-build -W doc/ public/
  stage: test
test_examples:manual:
  extends: .test_examples
  when: manual
test_examples:schedules:
  extends: .test_examples
  only:
  - schedules
test_notebooks:manual:
  extends: .test_notebooks
  when: manual
test_notebooks:schedules:
  extends: .test_notebooks
  only:
  - schedules
variables:
  INSTDIR: local_installation
