before_script:
- bundle install
image: ruby:2.3
pages:
  artifacts:
    paths:
    - public
  only:
  - master
  script:
  - bundle exec jekyll build -d public
  stage: deploy
test:
  artifacts:
    paths:
    - test
  except:
  - master
  script:
  - bundle exec jekyll build -d test
  stage: test
variables:
  JEKYLL_ENV: production
  LANG: en_US.UTF-8
  LANGUAGE: en_US.UTF-8
  LC_ALL: C.UTF-8
