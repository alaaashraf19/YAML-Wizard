binaries:
  artifacts:
    expire_in: 6 months
    paths:
    - gitaly-bench
    - gitaly-bench-linux-amd64
  image: registry.gitlab.com/gitlab-org/gitlab-build-images:ruby-${RUBY_VERSION}-golang-${GO_VERSION}-git-2.29
  only:
  - tags
  script:
  - make build
  stage: build
compile:
  script: make build
  stage: build
image: golang:1.13
stages:
- build
variables:
  GO_VERSION: '1.14'
  RUBY_VERSION: '2.7'
verify:
  script: make verify
  stage: build
