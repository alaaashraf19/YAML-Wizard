.test-scripts:
  script: &id001
  - bin/run bundle:check
  - bin/run lint:style
  - bin/run lint:maintainability
  - bin/run spec
before_script:
- which ruby
- ruby --version
- bin/install-dependencies
test-2.3:
  image: ruby:2.3
  script: *id001
test-2.4:
  image: ruby:2.4
  script: *id001
test-2.5:
  image: ruby:2.5
  script: *id001
test-2.6:
  image: ruby:2.6
  script: *id001
