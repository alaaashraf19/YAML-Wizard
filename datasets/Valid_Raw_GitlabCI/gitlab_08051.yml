codequality:
  allow_failure: true
  artifacts:
    paths:
    - codeclimate.json
  image: docker:stable
  script:
  - export SP_VERSION=$(echo "$CI_SERVER_VERSION" | sed 's/^\([0-9]*\)\.\([0-9]*\).*/\1-\2-stable/')
  - docker run --env SOURCE_CODE="$PWD" --volume "$PWD":/code --volume /var/run/docker.sock:/var/run/docker.sock
    "registry.gitlab.com/gitlab-org/security-products/codequality:$SP_VERSION" /code
  services:
  - docker:stable-dind
  variables:
    DOCKER_DRIVER: overlay2
image: python:3.6
pages:
  artifacts:
    expire_in: 1 day
    paths:
    - public
  cache:
    key: $CI_PIPELINE_ID
    paths:
    - $CI_PROJECT_DIR/.pip-cache
  dependencies:
  - sphinx
  only:
  - tags
  - master
  script:
  - mv doc/build/html/ public/
  stage: deploy
sphinx:
  artifacts:
    expire_in: 1 day
    paths:
    - doc/build/html
  cache:
    key: $CI_PIPELINE_ID
    paths:
    - $CI_PROJECT_DIR/.pip-cache
  only:
  - tags
  - master
  script:
  - pip install -r requirements.txt
  - sphinx-versioning build doc/source doc/build/html
  stage: doc
stages:
- test
- doc
- deploy
test:2.7:
  allow_failure: false
  image: python:2.7
  script:
  - git --no-pager diff --check `git log --oneline | tail -1 | cut --fields=1 --delimiter='
    '`
  - python -V
  - pip install -r requirements.txt
  - flake8
  - py.test -vv --cov-config .coveragerc --cov geolink_formatter tests
  stage: test
