.setup_android: 'apt-get --quiet update -y

  apt-get --quiet install -y curl unzip lib32stdc++6 lib32z1

  curl -L -o android-sdk.zip https://dl.google.com/android/repository/sdk-tools-linux-3859397.zip

  unzip -q android-sdk.zip -d android-sdk-linux

  mkdir android-sdk-linux/licenses

  yes | android-sdk-linux/tools/bin/sdkmanager --licenses || true

  android-sdk-linux/tools/bin/sdkmanager --verbose "tools" "build-tools;$ANDROID_BUILD_TOOLS"
  "platform-tools" "platforms;android-$ANDROID_COMPILE_SDK" "extras;android;m2repository"
  "extras;google;m2repository"

  export ANDROID_HOME=$PWD/android-sdk-linux

  export PATH=$PATH:$PWD/android-sdk-linux/platform-tools/:$PWD/android-sdk-linux/build-tools/$ANDROID_BUILD_TOOLS/

  '
.setup_rust: 'apt-get update -q

  apt-get install curl python unzip gcc libncurses5 -yq

  curl -Lf https://static.rust-lang.org/rustup/dist/x86_64-unknown-linux-gnu/rustup-init
  -o rustup-init.sh

  chmod +x rustup-init.sh

  ./rustup-init.sh -y

  source $HOME/.cargo/env

  rustup target add armv7-linux-androideabi

  rustup target add aarch64-linux-android

  rustup target add i686-linux-android

  rustup target add x86_64-linux-android

  curl -L https://dl.google.com/android/repository/android-ndk-r17-linux-x86_64.zip
  -o android-ndk

  unzip -q android-ndk

  ./android-ndk-r17/build/tools/make_standalone_toolchain.py --api 28 --install-dir=$ARMV7_TOOLCHAIN
  --arch=arm

  ./android-ndk-r17/build/tools/make_standalone_toolchain.py --api 28 --install-dir=$ARM64_TOOLCHAIN
  --arch=arm64

  ./android-ndk-r17/build/tools/make_standalone_toolchain.py --api 28 --install-dir=$x86_TOOLCHAIN
  --arch=x86

  ./android-ndk-r17/build/tools/make_standalone_toolchain.py --api 28 --install-dir=$x86_64_TOOLCHAIN
  --arch=x86_64

  cd oab-utils

  mkdir .cargo

  printf "[target.armv7-linux-androideabi]\n linker = \""$(realpath ../$ARMV7_TOOLCHAIN)"/bin/arm-linux-androideabi-clang\"\n
  [target.aarch64-linux-android]\n linker = \""$(realpath ../$ARM64_TOOLCHAIN)"/bin/aarch64-linux-android-clang\"\n
  [target.i686-linux-android]\n linker = \""$(realpath ../$x86_TOOLCHAIN)"/bin/i686-linux-android-clang\"\n
  [target.x86_64-linux-android]\n linker = \""$(realpath ../$x86_64_TOOLCHAIN)"/bin/x86_64-linux-android-clang\"\n"
  > .cargo/config

  cd ..

  '
build:
  artifacts:
    paths:
    - apks
  image: openjdk:8-jdk
  script:
  - 'apt-get --quiet update -y

    apt-get --quiet install -y curl unzip lib32stdc++6 lib32z1

    curl -L -o android-sdk.zip https://dl.google.com/android/repository/sdk-tools-linux-3859397.zip

    unzip -q android-sdk.zip -d android-sdk-linux

    mkdir android-sdk-linux/licenses

    yes | android-sdk-linux/tools/bin/sdkmanager --licenses || true

    android-sdk-linux/tools/bin/sdkmanager --verbose "tools" "build-tools;$ANDROID_BUILD_TOOLS"
    "platform-tools" "platforms;android-$ANDROID_COMPILE_SDK" "extras;android;m2repository"
    "extras;google;m2repository"

    export ANDROID_HOME=$PWD/android-sdk-linux

    export PATH=$PATH:$PWD/android-sdk-linux/platform-tools/:$PWD/android-sdk-linux/build-tools/$ANDROID_BUILD_TOOLS/

    '
  - 'apt-get update -q

    apt-get install curl python unzip gcc libncurses5 -yq

    curl -Lf https://static.rust-lang.org/rustup/dist/x86_64-unknown-linux-gnu/rustup-init
    -o rustup-init.sh

    chmod +x rustup-init.sh

    ./rustup-init.sh -y

    source $HOME/.cargo/env

    rustup target add armv7-linux-androideabi

    rustup target add aarch64-linux-android

    rustup target add i686-linux-android

    rustup target add x86_64-linux-android

    curl -L https://dl.google.com/android/repository/android-ndk-r17-linux-x86_64.zip
    -o android-ndk

    unzip -q android-ndk

    ./android-ndk-r17/build/tools/make_standalone_toolchain.py --api 28 --install-dir=$ARMV7_TOOLCHAIN
    --arch=arm

    ./android-ndk-r17/build/tools/make_standalone_toolchain.py --api 28 --install-dir=$ARM64_TOOLCHAIN
    --arch=arm64

    ./android-ndk-r17/build/tools/make_standalone_toolchain.py --api 28 --install-dir=$x86_TOOLCHAIN
    --arch=x86

    ./android-ndk-r17/build/tools/make_standalone_toolchain.py --api 28 --install-dir=$x86_64_TOOLCHAIN
    --arch=x86_64

    cd oab-utils

    mkdir .cargo

    printf "[target.armv7-linux-androideabi]\n linker = \""$(realpath ../$ARMV7_TOOLCHAIN)"/bin/arm-linux-androideabi-clang\"\n
    [target.aarch64-linux-android]\n linker = \""$(realpath ../$ARM64_TOOLCHAIN)"/bin/aarch64-linux-android-clang\"\n
    [target.i686-linux-android]\n linker = \""$(realpath ../$x86_TOOLCHAIN)"/bin/i686-linux-android-clang\"\n
    [target.x86_64-linux-android]\n linker = \""$(realpath ../$x86_64_TOOLCHAIN)"/bin/x86_64-linux-android-clang\"\n"
    > .cargo/config

    cd ..

    '
  - mkdir -p $ASSETS
  - mkdir apks
  - ./gradlew clean build
  - find build/outputs/apk -name *.apk -exec cp -v {} apks \;
  stage: build
  variables:
    ARM64_TOOLCHAIN: arm64_toolchain
    ARMV7_TOOLCHAIN: armv7_toolchain
    ASSETS: src/main/assets
    x86_64_TOOLCHAIN: x86_64_toolchain
    x86_TOOLCHAIN: x86_toolchain
cargo:test:nightly:
  allow_failure: true
  image: rustlang/rust:nightly
  script:
  - cd oab-utils
  - cargo test
  stage: cargo:test:nightly
sign:
  artifacts:
    paths:
    - oandbackup-signed-arm.apk
    - oandbackup-signed-arm64.apk
    - oandbackup-signed-x86.apk
    - oandbackup-signed-x86_64.apk
    - oandbackup-signed-universal.apk
  dependencies:
  - build
  image: openjdk:8-jdk
  only:
  - master
  script:
  - 'apt-get --quiet update -y

    apt-get --quiet install -y curl unzip lib32stdc++6 lib32z1

    curl -L -o android-sdk.zip https://dl.google.com/android/repository/sdk-tools-linux-3859397.zip

    unzip -q android-sdk.zip -d android-sdk-linux

    mkdir android-sdk-linux/licenses

    yes | android-sdk-linux/tools/bin/sdkmanager --licenses || true

    android-sdk-linux/tools/bin/sdkmanager --verbose "tools" "build-tools;$ANDROID_BUILD_TOOLS"
    "platform-tools" "platforms;android-$ANDROID_COMPILE_SDK" "extras;android;m2repository"
    "extras;google;m2repository"

    export ANDROID_HOME=$PWD/android-sdk-linux

    export PATH=$PATH:$PWD/android-sdk-linux/platform-tools/:$PWD/android-sdk-linux/build-tools/$ANDROID_BUILD_TOOLS/

    '
  - echo $ANDROID_KEY_BASE64 | base64 -d > android-release-key.jks
  - zipalign -v -p 4 apks/oandbackup-arm-release-unsigned.apk oandbackup-unsigned-aligned-arm.apk
  - apksigner sign --ks android-release-key.jks --ks-pass pass:$ANDROID_KEY_PASSWORD
    --out oandbackup-signed-arm.apk oandbackup-unsigned-aligned-arm.apk
  - zipalign -v -p 4 apks/oandbackup-arm64-release-unsigned.apk oandbackup-unsigned-aligned-arm64.apk
  - apksigner sign --ks android-release-key.jks --ks-pass pass:$ANDROID_KEY_PASSWORD
    --out oandbackup-signed-arm64.apk oandbackup-unsigned-aligned-arm64.apk
  - zipalign -v -p 4 apks/oandbackup-x86-release-unsigned.apk oandbackup-unsigned-aligned-x86.apk
  - apksigner sign --ks android-release-key.jks --ks-pass pass:$ANDROID_KEY_PASSWORD
    --out oandbackup-signed-x86.apk oandbackup-unsigned-aligned-x86.apk
  - zipalign -v -p 4 apks/oandbackup-x86_64-release-unsigned.apk oandbackup-unsigned-aligned-x86_64.apk
  - apksigner sign --ks android-release-key.jks --ks-pass pass:$ANDROID_KEY_PASSWORD
    --out oandbackup-signed-x86_64.apk oandbackup-unsigned-aligned-x86_64.apk
  - zipalign -v -p 4 apks/oandbackup-universal-release-unsigned.apk oandbackup-unsigned-aligned-universal.apk
  - apksigner sign --ks android-release-key.jks --ks-pass pass:$ANDROID_KEY_PASSWORD
    --out oandbackup-signed-universal.apk oandbackup-unsigned-aligned-universal.apk
  stage: sign
stages:
- test
- cargo:test:nightly
- cargo
- build
- sign
test:cargo:
  image: rust:1.56-slim-buster
  script:
  - cd oab-utils
  - cargo test
  stage: test
variables:
  ANDROID_BUILD_TOOLS: 26.0.2
  ANDROID_COMPILE_SDK: '26'
