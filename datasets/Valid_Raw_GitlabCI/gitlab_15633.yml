.install:
  before_script: &id001
  - curl -L https://github.com/gohugoio/hugo/releases/download/v0.78.1/hugo_0.78.1_Linux-64bit.tar.gz
    > hugo.tar.gz
  - tar -xzf hugo.tar.gz
  - npm install -g netlify-cli@2.9.1
build and prod:
  before_script: *id001
  only:
  - master
  script:
  - ./hugo -b "https://www.recalbox.com/"
  - netlify deploy -d public -s "${NETLIFY_PROJECT_ID}" -a "${NETLIFY_AUTH_TOKEN}"
    --prod
  stage: build
  tags:
  - wwwbuild
build and review:
  before_script: *id001
  except:
  - master
  only:
  - branches
  script:
  - ./hugo
  - netlify deploy -d public -s "${NETLIFY_PROJECT_ID}" -a "${NETLIFY_AUTH_TOKEN}"
  stage: build
  tags:
  - wwwbuild
image: node
variables:
  GIT_SUBMODULE_STRATEGY: recursive
