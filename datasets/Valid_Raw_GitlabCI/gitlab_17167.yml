before_script:
- ./entrypoint.sh
- export PATH="${PATH}:${HOME}/.local/bin"
- export PIP_INSTALL_OPTS="--root-user-action=ignore"
image:
  name: python:3.11-slim-bullseye
  pull_policy: always
pages:
  artifacts:
    paths:
    - public
  only:
  - master
  - main
  script:
  - make -e pre-commit build
  stage: deploy
test:
  artifacts:
    paths:
    - test
  except:
  - master
  - main
  script:
  - make -e pre-commit test
  stage: test
