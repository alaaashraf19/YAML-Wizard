.web-build:
  cache:
    key: $CI_COMMIT_REF_SLUG
    paths:
    - .gradle/wrapper
    - .gradle/caches
  image: java:8
  script:
  - master-sample-web/gradlew -b master-sample-web/build.gradle clean build
  - awk -F',' 'NR>=2{m+=$4; n+=$5}END{printf("Coverage Total %.2f%%\n", n*100/(n+m))}'
    master-sample-web/build/reports/jacoco/jacocoMergedReport/jacocoMergedReport.csv
  stage: check-test-build
  tags:
  - docker
.web-checkstyle:
  cache:
    key: $CI_COMMIT_REF_SLUG
    paths:
    - .gradle/wrapper
    - .gradle/caches
  image: java:8
  script:
  - master-sample-web/gradlew -b master-sample-web/build.gradle clean checkstyleMain
    checkstyleTest
  stage: check-test-build
  tags:
  - docker
.web-spotbugs:
  cache:
    key: $CI_COMMIT_REF_SLUG
    paths:
    - .gradle/wrapper
    - .gradle/caches
  image: java:8
  script:
  - master-sample-web/gradlew -b master-sample-web/build.gradle clean spotbugsMain
    spotbugsTest
  stage: check-test-build
  tags:
  - docker
.web-test:
  cache:
    key: $CI_COMMIT_REF_SLUG
    paths:
    - .gradle/wrapper
    - .gradle/caches
  image: sesela/java8-mysqlclient
  script:
  - echo "CREATE DATABASE IF NOT EXISTS sandbox DEFAULT CHARACTER SET utf8 COLLATE
    utf8_unicode_ci" | mysql --user=root --password="$MYSQL_ROOT_PASSWORD" --host=mysql
  - echo 'show databases' | mysql --user=root --password="$MYSQL_ROOT_PASSWORD" --host=mysql
  - master-sample-web/gradlew -b master-sample-web/build.gradle clean testReport jacocoMergedReport
    -Dspring.profiles.active=mysql -D"mysql.url=jdbc:mysql://mysql:3306/sandbox?useUnicode=true&characterEncoding=utf8"
    -Dmysql.username=root -Dmysql.password=example --info
  - awk -F',' 'NR>=2{m+=$4; n+=$5}END{printf("Coverage Total %.2f%%\n", n*100/(n+m))}'
    master-sample-web/build/reports/jacoco/jacocoMergedReport/jacocoMergedReport.csv
  services:
  - mysql:5.7.24
  stage: check-test-build
  tags:
  - docker
  variables:
    MYSQL_ROOT_PASSWORD: example
before_script:
- chmod +x master-sample-web/gradlew
- export GRADLE_USER_HOME=`pwd`/.gradle
- export TZ='Asia/Tokyo'
- date +\"%Y%m%d-%H%M\" > exectime.txt
job-web-build:
  artifacts:
    expire_in: 1 week
    name: web$(cat exectime.txt)
    paths:
    - master-sample-web/build/reports
    - master-sample-web/build/javadoc
    - web/build/libs
  extends: .web-build
  only:
  - master
  - /^develop.*$/
job-web-checkstyle:
  except:
  - master
  - /^develop.*$/
  extends: .web-checkstyle
job-web-spotbugs:
  except:
  - master
  - /^develop.*$/
  extends: .web-spotbugs
job-web-test:
  except:
  - master
  - /^develop.*$/
  extends: .web-test
stages:
- check-test-build
- deploy
