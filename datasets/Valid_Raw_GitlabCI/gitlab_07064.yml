build:
  only:
  - master
  script:
  - wget https://github.com/gohugoio/hugo/releases/download/v0.105.0/hugo_0.105.0_linux-amd64.tar.gz
    -O hugo.tar.gz
  - tar -xvf hugo.tar.gz hugo
  - git submodule init
  - git submodule update --init
  - ./hugo
  - symlink_path=/home/gitlab-runner/dylangriffith-root
  - new_build=/home/gitlab-runner/www-dylangriffith-public-$CI_JOB_ID
  - mv public $new_build
  - previous_build=$(readlink -f $symlink_path)
  - ln -sfn $new_build $symlink_path
  - rm -rf $previous_build
  stage: build
  tags:
  - deploy
stages:
- test
- build
test:
  except:
  - master
  image: registry.gitlab.com/pages/hugo:0.102.0
  script:
  - apk add git
  - git submodule init
  - git submodule update --init
  - hugo
  stage: test
  tags:
  - docker
