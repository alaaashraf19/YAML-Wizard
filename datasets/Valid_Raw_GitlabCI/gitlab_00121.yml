.build-shell:
  artifacts:
    expire_in: 1 day
    paths:
    - ace
  script:
  - cmake -D TRILINOS_PATH:PATH=$TRILINOS_PATH -D LIBXC_PATH:PATH=$LIBXC_PATH -D GSL_PATH:PATH=$GSL_PATH
    -D CMAKE_CXX_FLAGS:STRING="-std=c++11 -O2 -Wno-unused-parameter -Wno-sign-compare
    -I${MPI_INCLUDE_PATH}"  -D ENABLE_CI:BOOL=FALSE ./
  - make -j2
  stage: build
  tags:
  - build
  - shell
acceptance-test:
  artifacts:
    expire_in: 1 week
    paths:
    - test/acceptance-test/*.log
    when: always
  image: ace-molecule-build:latest
  script:
  - cd test/acceptance-test
  - python3 run-test.py --notemp
  stage: test
  tags:
  - test
build-docker:
  artifacts:
    expire_in: 1 day
    paths:
    - ace
  image: ace-molecule-build:latest
  script:
  - cmake -D TRILINOS_PATH:PATH=/usr/local -D LIBXC_PATH:PATH=/opt/etsf -D MKL_PATH:PATH=/opt/intel/mkl
    -D CMAKE_CXX_FLAGS:STRING="-std=c++11 -fopenmp -O3 -w" .
  - make -j8
  stage: build
  tags:
  - build
  - docker
build-docs:
  artifacts:
    paths:
    - doxygen
  dependencies: []
  image: ace-molecule-build:latest
  script:
  - export GIT_NUMBER=$(git rev-parse HEAD ; git diff-index --quiet HEAD || echo 'dirty')
  - doxygen Doxyfile
  stage: docs
  tags:
  - docs
run-cpplint:
  after_script:
  - echo "Last 5 lines of cpplint output are:"
  - tail -n 5 cpplint.log
  allow_failure: true
  artifacts:
    expire_in: 1 week
    paths:
    - cpplint.log
    when: always
  dependencies: []
  image: ace-molecule-build:latest
  script:
  - cpplint --recursive --exclude=source/Core/Diagonalize/Anasazi* --exclude=source/Core/Diagonalize/Anasazi*/*  --filter=-build,-legal,-readability,-runtime,-whitespace,+whitespace/indent
    source/* >& cpplint.log
  stage: test
  tags:
  - test
stages:
- build
- test
- docs
