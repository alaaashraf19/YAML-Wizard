.use-docker-in-docker:
  image: ${GITLAB_DEPENDENCY_PROXY}docker:${DOCKER_VERSION}
  services:
  - alias: docker
    entrypoint:
    - sh
    - -c
    - dockerd-entrypoint.sh $GL_DOCKER_DIND_OPTIONS
    name: ${GITLAB_DEPENDENCY_PROXY}docker:${DOCKER_VERSION}-dind
  tags:
  - gitlab-org-docker
  variables:
    DOCKER_DRIVER: overlay2
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ''
    GL_DOCKER_DIND_OPTIONS: --registry-mirror=https://mirror.gcr.io
build:triage_runway:
  extends:
  - .docker_buildx_base
  rules:
  - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  stage: build
  variables:
    DOCKER_BUILD_FILE: Dockerfile.rack
    DOCKER_DESTINATION: ${CI_REGISTRY_IMAGE}/triage-ops-runway:${CI_COMMIT_SHORT_SHA}
default:
  cache:
    key:
      files:
      - Gemfile.lock
      prefix: ruby-gems
    paths:
    - vendor/ruby/
  image: registry.gitlab.com/gitlab-org/gitlab-build-images/${BUILD_OS}-${OS_VERSION}-ruby-${RUBY_VERSION}
  tags:
  - gitlab-org
gemnasium-dependency_scanning:
  needs: []
  rules:
  - if: $CI_PIPELINE_SOURCE != "schedule"
include:
- local: .gitlab/ci/*.yml
- local: .gitlab/ci/generated/*.yml
- component: ${CI_SERVER_FQDN}/gitlab-org/components/danger-review/danger-review@2.1.0
- template: Jobs/SAST.gitlab-ci.yml
- template: Jobs/Secret-Detection.gitlab-ci.yml
- template: Jobs/Dependency-Scanning.gitlab-ci.yml
- file: docker.yml
  project: gitlab-com/gl-infra/common-ci-tasks
  ref: v2.92.0
- file: ci-tasks/service-project/runway.yml
  inputs:
    image: $CI_REGISTRY_IMAGE/triage-ops-runway:$CI_COMMIT_SHORT_SHA
    runway_service_id: dx-triage-ops
    runway_version: v4.0.0
  project: gitlab-com/gl-infra/platform/runway/runwayctl
secret_detection:
  needs: []
  rules:
  - if: $CI_PIPELINE_SOURCE != "schedule"
semgrep-sast:
  needs: []
  rules:
  - if: $CI_PIPELINE_SOURCE != "schedule"
stages:
- dry-run
- schedules-sync
- single-run
- test
- pre-hygiene
- hygiene
- report
- close-reports
- one-off
- build
- secrets
- deploy
- health-check
- validate
- runway_staging
- runway_production
variables:
  BUILD_OS: debian
  BUNDLE_FROZEN: 'true'
  BUNDLE_INSTALL_FLAGS: --jobs=$(nproc) --retry=3 --quiet
  BUNDLE_PATH__SYSTEM: 'false'
  COVERAGE_FILE: coverage/coverage.xml
  DOCKER_VERSION: 26.1.4
  JUNIT_RESULT_FILE: rspec/junit_rspec.xml
  OS_VERSION: bookworm
  RUBY_VERSION: 3.2.4
  SIMPLECOV: 'true'
  TRIAGE_WEB_IMAGE_PATH: ${CI_REGISTRY}/${CI_PROJECT_PATH}/web:${CI_COMMIT_REF_SLUG}
workflow:
  name: $PIPELINE_NAME
  rules:
  - if: $CI_MERGE_REQUEST_IID
    variables:
      PIPELINE_NAME: $CI_MERGE_REQUEST_EVENT_TYPE MR pipeline
  - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  - if: $CI_PIPELINE_SOURCE == "trigger"
