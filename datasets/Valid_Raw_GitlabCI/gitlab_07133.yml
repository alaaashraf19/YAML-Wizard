before_script:
- mkdir -p $BINDIR
- mkdir -p $OUTDIR
- mkdir -p $LOGDIR
- mkdir -p $OUTDIR
build:arm:
  artifacts:
    expire_in: 1 week
    paths:
    - $OUTDIR
    when: always
  script:
  - apt-get update
  - apt-get install -y --no-install-recommends -qq $BUILD_DEPS $COMMON_DEPS g++-arm-linux-gnueabihf
  - cd ./depends
  - make HOST=$HOST -j4 | tee $LOGDIR/depends.log
  - cd ..
  - export BITCOIN_CONFIGURE_OPTS="$BITCOIN_CONFIGURE_OPTS_GLOBAL --bindir=$BINDIR
    --libdir=$LIBDIR --prefix=$CI_PROJECT_DIR/depends/$HOST --enable-glibc-back-compat
    --enable-reduce-exports --with-libs=no --disable-tests --disable-bench"
  - export LD_LIBRARY_PATH="$CI_PROJECT_DIR/depends/$HOST/lib"
  - export LDFLAGS="-static-libstdc++"
  - echo $BITCOIN_CONFIGURE_OPTS
  - ./autogen.sh
  - ./configure $BITCOIN_CONFIGURE_OPTS | tee $LOGDIR/configure.log
  - make -j4 install | tee $LOGDIR/build.log
  stage: build
  variables:
    HOST: arm-linux-gnueabihf
build:linux-32:
  artifacts:
    expire_in: 1 week
    paths:
    - $OUTDIR
    when: always
  script:
  - dpkg --add-architecture i386
  - apt-get update
  - apt-get install -y --no-install-recommends -qq $BUILD_DEPS $COMMON_DEPS g++-multilib
    libc6-dev-i386 bc libx11-6:i386 libfontconfig1-dev:i386 libfreetype6-dev:i386
    libx11-dev:i386 libxcursor-dev:i386 libxext-dev:i386 libxfixes-dev:i386 libxft-dev:i386
    libxi-dev:i386 libxrandr-dev:i386 libxrender-dev:i386
  - cd ./depends
  - make HOST=$HOST -j4 | tee $LOGDIR/depends.log
  - cd ..
  - export BITCOIN_CONFIGURE_OPTS="$BITCOIN_CONFIGURE_OPTS_GLOBAL --bindir=$BINDIR
    --libdir=$LIBDIR --prefix=$CI_PROJECT_DIR/depends/$HOST --disable-tests --disable-bench
    --enable-glibc-back-compat"
  - export LD_LIBRARY_PATH="$CI_PROJECT_DIR/depends/$HOST/lib"
  - export LDFLAGS="-static-libstdc++"
  - echo $BITCOIN_CONFIGURE_OPTS
  - ./autogen.sh
  - ./configure $BITCOIN_CONFIGURE_OPTS | tee $LOGDIR/configure.log
  - make -j4 install | tee $LOGDIR/build.log
  - strip $BINDIR/*
  stage: build
  variables:
    HOST: i686-pc-linux-gnu
build:linux-64:
  artifacts:
    expire_in: 1 week
    paths:
    - $OUTDIR
    when: always
  script:
  - apt-get update
  - apt-get install -y --no-install-recommends -qq $BUILD_DEPS $COMMON_DEPS bc
  - cd ./depends
  - make HOST=$HOST -j4 | tee $LOGDIR/depends.log
  - cd ..
  - export BITCOIN_CONFIGURE_OPTS="$BITCOIN_CONFIGURE_OPTS_GLOBAL --bindir=$BINDIR
    --libdir=$LIBDIR --prefix=$CI_PROJECT_DIR/depends/$HOST --enable-glibc-back-compat"
  - export LD_LIBRARY_PATH="$CI_PROJECT_DIR/depends/$HOST/lib"
  - echo $BITCOIN_CONFIGURE_OPTS
  - ./autogen.sh
  - ./configure $BITCOIN_CONFIGURE_OPTS | tee $LOGDIR/configure.log
  - make -j4 install | tee $LOGDIR/build.log
  - strip $BINDIR/*
  stage: build
  variables:
    HOST: x86_64-unknown-linux-gnu
build:osx:
  artifacts:
    expire_in: 1 week
    paths:
    - $OUTDIR
    - e-Gulden-Core.dmg
    when: always
  script:
  - apt-get update
  - apt-get install -y --no-install-recommends -qq $BUILD_DEPS $COMMON_DEPS cmake
    imagemagick libcap-dev librsvg2-bin libz-dev libbz2-dev libtiff-tools
  - pip install ez_setup
  - if [ ! -f "$OSX_SDK_TAR" ]; then mkdir -p depends/sdk-sources && curl --location
    --fail $OSX_SDK_URL -o $OSX_SDK_TAR; fi
  - mkdir -p depends/SDKs && tar -C depends/SDKs -xf $OSX_SDK_TAR
  - cd ./depends
  - make HOST=$HOST -j4 | tee $LOGDIR/depends.log
  - cd ..
  - export BITCOIN_CONFIGURE_OPTS="$BITCOIN_CONFIGURE_OPTS_GLOBAL --bindir=$BINDIR
    --libdir=$LIBDIR --prefix=$CI_PROJECT_DIR/depends/$HOST --with-libs=no --disable-tests
    --disable-bench"
  - export LD_LIBRARY_PATH="$CI_PROJECT_DIR/depends/$HOST/lib"
  - ./autogen.sh
  - ./configure $BITCOIN_CONFIGURE_OPTS | tee $LOGDIR/configure.log
  - make -j4 deploy | tee $LOGDIR/build.log
  stage: build
  variables:
    HOST: x86_64-apple-darwin11
    OSX_SDK_TAR: depends/sdk-sources/MacOSX10.11.sdk.tar.gz
    OSX_SDK_URL: https://bitcoincore.org/depends-sources/sdks/MacOSX10.11.sdk.tar.gz
build:win-32:
  artifacts:
    expire_in: 1 week
    paths:
    - $OUTDIR
    when: always
  script:
  - dpkg --add-architecture i386
  - apt-get update
  - apt-get install -y --no-install-recommends -qq $BUILD_DEPS $COMMON_DEPS nsis wine-stable
    bc g++-mingw-w64-i686 mingw-w64-i686-dev g++-mingw-w64-x86-64 mingw-w64-x86-64-dev
  - cd ./depends
  - make HOST=$HOST -j4 | tee $LOGDIR/depends.log
  - cd ..
  - export BITCOIN_CONFIGURE_OPTS="$BITCOIN_CONFIGURE_OPTS_GLOBAL --bindir=$BINDIR
    --libdir=$LIBDIR --prefix=$CI_PROJECT_DIR/depends/$HOST --with-libs=no --disable-zmq
    --disable-tests --disable-bench"
  - export LD_LIBRARY_PATH="$CI_PROJECT_DIR/depends/$HOST/lib"
  - ./autogen.sh
  - ./configure $BITCOIN_CONFIGURE_OPTS | tee $LOGDIR/configure.log
  - make -j4 deploy | tee $LOGDIR/build.log
  - mv ./egulden-*-setup.exe $OUTDIR/
  stage: build
  variables:
    HOST: i686-w64-mingw32
build:win-64:
  artifacts:
    expire_in: 1 week
    paths:
    - $OUTDIR
    when: always
  script:
  - dpkg --add-architecture i386
  - apt-get update
  - apt-get install -y --no-install-recommends -qq $BUILD_DEPS $COMMON_DEPS nsis wine-stable
    bc g++-mingw-w64-i686 mingw-w64-i686-dev g++-mingw-w64-x86-64 mingw-w64-x86-64-dev
  - cd ./depends
  - make HOST=$HOST -j4 | tee $LOGDIR/depends.log
  - cd ..
  - export BITCOIN_CONFIGURE_OPTS="$BITCOIN_CONFIGURE_OPTS_GLOBAL --bindir=$BINDIR
    --libdir=$LIBDIR --prefix=$CI_PROJECT_DIR/depends/$HOST --with-libs=no --disable-zmq
    --disable-tests --disable-bench"
  - export LD_LIBRARY_PATH="$CI_PROJECT_DIR/depends/$HOST/lib"
  - ./autogen.sh
  - ./configure $BITCOIN_CONFIGURE_OPTS | tee $LOGDIR/configure.log
  - make -j4 deploy | tee $LOGDIR/build.log
  - mv ./egulden-*-setup.exe $OUTDIR/
  stage: build
  variables:
    HOST: x86_64-w64-mingw32
cache:
  key: $CI_JOB_NAME
  paths:
  - depends/
image: ubuntu:bionic
test:linux-64:
  dependencies:
  - build:linux-64
  script:
  - $BINDIR/test_egulden || true
  - $BINDIR/test_egulden-qt || true
  - $BINDIR/test_egulden --run_test=oerushield_tests
  stage: test
variables:
  BINDIR: $CI_PROJECT_DIR/out/bin
  BITCOIN_CONFIGURE_OPTS_GLOBAL: --enable-reduce-exports
  BUILD_DEPS: curl ca-certificates build-essential libtool autotools-dev automake
    pkg-config libssl-dev libevent-dev bsdmainutils
  COMMON_DEPS: python python-pip python-dev python-setuptools python-zmq openjdk-8-jre-headless
  LIBDIR: $CI_PROJECT_DIR/out/libs
  LOGDIR: $CI_PROJECT_DIR/out/logs
  OUTDIR: $CI_PROJECT_DIR/out
