before_script:
- apt-get update
- apt-get install -y --no-install-recommends openjfx
- apt-get install -y --no-install-recommends ant
build_client:
  artifacts:
    paths:
    - client/jar/
  script:
  - cd client
  - ant -buildfile ant-build.xml build package
build_mdt:
  artifacts:
    paths:
    - forteso-mdt/jar/
  script:
  - cd forteso-mdt
  - ant -buildfile ant-build.xml build package
image: openjdk:8
