Build SCSS:
  artifacts:
    paths:
    - lib/theme.css
  script:
  - npm ci
  - npm run build-scss
  stage: build
ESLint:
  script:
  - npm i
  - npx eslint .
  stage: test
Now Deploy:
  environment:
    name: Zeit NOW
    url: https://listas.now.sh
  only:
  - master
  script:
  - npm i --no-save now
  - npx now deploy --token=$NOW_TOKEN
  - npx now alias --token=$NOW_TOKEN
  stage: deploy
Stylelint:
  script:
  - npm i
  - npx stylelint .
  stage: test
Test code:
  script:
  - npm ci
  - npm test
  stage: test
image: node:latest
stages:
- test
- build
- deploy
