pages:
  artifacts:
    paths:
    - .output/public
  before_script:
  - npm ci --cache .npm --prefer-offline
  cache:
    key:
      files:
      - package-lock.json
    paths:
    - .npm/
  image: node
  publish: .output/public
  rules:
  - if: $CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH
  script:
  - npm run generate
  variables:
    NUXT_APP_BASE_URL: /nuxt/
