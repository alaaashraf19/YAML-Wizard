build_and_test:
  artifacts:
    expire_in: 1 day
    paths:
    - coverage/
    - doxygen/
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
  coverage: /^\s*lines:\s*\d+.\d+\%/
  retry: 1
  rules:
  - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME
      == "master"
  - if: $CI_COMMIT_BRANCH == "master"
  script:
  - apt update -qq -y
  - apt install -qq -y lcov gcovr
  - rosdep update
  - mkdir -p $WS_NAME/src && cd $WS_NAME/src
  - git clone -b ${CI_COMMIT_REF_NAME} ${CI_REPOSITORY_URL}
  - cp rdl/.clang-format $HOME
  - cd .. && rosdep install --from-paths src -i -y --as-root apt:false
  - colcon build --symlink-install --cmake-args -DCMAKE_BUILD_TYPE=Debug -DCMAKE_CXX_FLAGS="--coverage"
    -DCMAKE_CXX_OUTPUT_EXTENSION_REPLACE=ON
  - colcon test
  - colcon test-result --verbose
  - cd src/$CI_PROJECT_NAME && doxygen Doxyfile
  - cd $CI_PROJECT_DIR/$WS_NAME
  - mv src/$CI_PROJECT_NAME/doxygen/ $CI_PROJECT_DIR
  - export LCOVDIR=$CI_PROJECT_DIR/$WS_NAME/lcov
  - mkdir -p $LCOVDIR
  - lcov -c --exclude "install" --initial --directory build --output-file ${LCOVDIR}/initialcoverage.info
  - lcov -c --directory build --output-file ${LCOVDIR}/testcoverage.info
  - lcov -a ${LCOVDIR}/initialcoverage.info -a ${LCOVDIR}/testcoverage.info --o ${LCOVDIR}/fullcoverage.info
  - lcov -e ${LCOVDIR}/fullcoverage.info "$CI_PROJECT_DIR/$WS_NAME/src/*" --output-file
    ${LCOVDIR}/projectcoverage.info
  - genhtml $LCOVDIR/projectcoverage.info --output-directory $LCOVDIR/coverage --branch-coverage
    -p $CI_PROJECT_DIR/$WS_NAME
  - mv $LCOVDIR/coverage $CI_PROJECT_DIR
  - gcovr --xml-pretty --exclude-unreachable-branches --print-summary -o $CI_PROJECT_DIR/coverage.xml
    --root $CI_PROJECT_DIR/$WS_NAME
  - cd $CI_PROJECT_DIR
  stage: test
  variables:
    GIT_STRATEGY: none
image: ros:humble
pages:
  artifacts:
    paths:
    - public/
  dependencies:
  - build_and_test
  rules:
  - if: $CI_COMMIT_BRANCH == "master"
  script:
  - mkdir public
  - mv coverage $CI_PROJECT_DIR/public/
  - mv doxygen $CI_PROJECT_DIR/public/
  stage: pages
stages:
- test
- pages
variables:
  WS_NAME: rdl_ws
