build-container-images:
  before_script:
  - apt-get update
  - apt-get install -y buildah ca-certificates
  image: debian:testing
  rules:
  - if: $CI_COMMIT_TAG != null
  - if: $REBUILD_CI_IMAGES =~ /^(1|yes|true)$/
  script:
  - cd .gitlab-ci
  - buildah build --net host --tag $CI_REGISTRY_IMAGE/debian:sid --file Dockerfile.debian
    .
  - buildah build --net host --tag $CI_REGISTRY_IMAGE/fedora:rawhide --file Dockerfile.fedora
    .
  - buildah login -u $CI_REGISTRY_USER -p $CI_JOB_TOKEN $CI_REGISTRY
  - buildah push $CI_REGISTRY_IMAGE/debian:sid
  - buildah push $CI_REGISTRY_IMAGE/fedora:rawhide
  - buildah logout $CI_REGISTRY
  stage: .pre
debian-clang:
  image: $DEBIAN_IMAGE
  rules:
  - if: $CI_COMMIT_TAG != null
  - if: $RUN_ALL_BUILDS =~ /^(1|yes|true)$/
  script:
  - .gitlab-ci/build.sh
  stage: build
  variables:
    CC: clang
debian-gcc:
  image: $DEBIAN_IMAGE
  script:
  - .gitlab-ci/build.sh
  stage: build
debian-gcc-no-feat-hotkeys:
  image: $DEBIAN_IMAGE
  rules:
  - if: $CI_COMMIT_TAG != null
  - if: $RUN_ALL_BUILDS =~ /^(1|yes|true)$/
  script:
  - .gitlab-ci/build.sh -Dfeat-hotkeys=false
  stage: build
debian-gcc-no-ui:
  image: $DEBIAN_IMAGE
  rules:
  - if: $CI_COMMIT_TAG != null
  - if: $RUN_ALL_BUILDS =~ /^(1|yes|true)$/
  script:
  - .gitlab-ci/build.sh -Dui-enabled=false
  stage: build
fedora-clang:
  image: $FEDORA_IMAGE
  rules:
  - if: $CI_COMMIT_TAG != null
  - if: $RUN_ALL_BUILDS =~ /^(1|yes|true)$/
  script:
  - .gitlab-ci/build.sh
  stage: build
  variables:
    CC: clang
fedora-gcc:
  image: $FEDORA_IMAGE
  rules:
  - if: $CI_COMMIT_TAG != null
  - if: $RUN_ALL_BUILDS =~ /^(1|yes|true)$/
  script:
  - .gitlab-ci/build.sh
  stage: build
variables:
  DEBIAN_IMAGE: registry.gitlab.com/goodvibes/goodvibes/debian:sid
  FEDORA_IMAGE: registry.gitlab.com/goodvibes/goodvibes/fedora:rawhide
  REBUILD_CI_IMAGES:
    description: Set to 1 to rebuild the CI images
    value: 0
  RUN_ALL_BUILDS:
    description: Set to 1 to run all the builds
    value: 0
