default:
  before_script:
  - apt-get update && apt-get install -y texlive texlive-xetex texlive-fonts-extra
    latexmk
  image: ghcr.io/prefix-dev/pixi:latest
pages:
  artifacts:
    expire_in: 1 week
    paths:
    - _build/html
  publish: _build/html
  rules:
  - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  script:
  - pixi run build
  - pixi run pdf
  - cp _build/latex/modern-cmake.pdf _build/html/
  stage: deploy
test:
  rules:
  - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  script:
  - pixi run test
  - pixi run build
  - pixi run pdf
variables:
  DEBIAN_FRONTEND: noninteractive
