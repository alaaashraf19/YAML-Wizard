code_quality:
  allow_failure: true
  artifacts:
    expire_in: 1 week
    reports:
      codequality: gl-code-quality-report.json
  dependencies: []
  except:
    variables:
    - $CODE_QUALITY_DISABLED
  extends:
  - .default-retry
  - .default-only
  - .only-code-changes
  image: docker:stable
  script:
  - "if ! docker info &>/dev/null; then\n  if [ -z \"$DOCKER_HOST\" -a \"$KUBERNETES_PORT\"\
    \ ]; then\n    export DOCKER_HOST='tcp://localhost:2375'\n  fi\nfi\n"
  - docker run --env SOURCE_CODE="$PWD" --volume "$PWD":/code --volume /var/run/docker.sock:/var/run/docker.sock
    "registry.gitlab.com/gitlab-org/security-products/codequality:12-0-stable" /code
  services:
  - docker:stable-dind
  stage: test
  variables:
    DOCKER_DRIVER: overlay2
    DOCKER_TLS_CERTDIR: ''
dast:
  allow_failure: true
  artifacts:
    expire_in: 7 days
    paths:
    - gl-dast-report.json
    reports:
      dast: gl-dast-report.json
  before_script:
  - export DAST_WEBSITE="$(cat review_app_url.txt)"
  dependencies:
  - review-deploy
  except:
    variables:
    - $DAST_DISABLED
  extends:
  - .default-retry
  - .default-only
  - .only-code-qa-changes
  - .only-review
  image:
    name: registry.gitlab.com/gitlab-org/security-products/dast:$CI_SERVER_VERSION_MAJOR-$CI_SERVER_VERSION_MINOR-stable
  only:
    variables:
    - $GITLAB_FEATURES =~ /\bdast\b/
  script:
  - export DAST_WEBSITE=${DAST_WEBSITE:-$(cat environment_url.txt)}
  - /analyze -t $DAST_WEBSITE
  stage: qa
  variables: null
dependency_scanning:
  allow_failure: true
  artifacts:
    reports:
      dependency_scanning: gl-dependency-scanning-report.json
  dependencies: []
  except:
    variables:
    - $DEPENDENCY_SCANNING_DISABLED
  extends:
  - .default-retry
  - .default-only
  - .only-code-changes
  image: docker:stable
  only:
    variables:
    - $GITLAB_FEATURES =~ /\bdependency_scanning\b/
  script:
  - export DS_VERSION=${SP_VERSION:-$(echo "$CI_SERVER_VERSION" | sed 's/^\([0-9]*\)\.\([0-9]*\).*/\1-\2-stable/')}
  - "if ! docker info &>/dev/null; then\n  if [ -z \"$DOCKER_HOST\" -a \"$KUBERNETES_PORT\"\
    \ ]; then\n    export DOCKER_HOST='tcp://localhost:2375'\n  fi\nfi\n"
  - "function propagate_env_vars() {\n  CURRENT_ENV=$(printenv)\n\n  for VAR_NAME;\
    \ do\n    echo $CURRENT_ENV | grep \"${VAR_NAME}=\" > /dev/null && echo \"--env\
    \ $VAR_NAME \"\n  done\n}\n"
  - "docker run \\\n  $(propagate_env_vars \\\n    DS_ANALYZER_IMAGES \\\n    DS_ANALYZER_IMAGE_PREFIX\
    \ \\\n    DS_ANALYZER_IMAGE_TAG \\\n    DS_DEFAULT_ANALYZERS \\\n    DS_EXCLUDED_PATHS\
    \ \\\n    DEP_SCAN_DISABLE_REMOTE_CHECKS \\\n    DS_DOCKER_CLIENT_NEGOTIATION_TIMEOUT\
    \ \\\n    DS_PULL_ANALYZER_IMAGE_TIMEOUT \\\n    DS_RUN_ANALYZER_TIMEOUT \\\n\
    \    DS_PYTHON_VERSION \\\n    DS_PIP_DEPENDENCY_PATH \\\n    PIP_INDEX_URL \\\
    \n    PIP_EXTRA_INDEX_URL \\\n  ) \\\n  --volume \"$PWD:/code\" \\\n  --volume\
    \ /var/run/docker.sock:/var/run/docker.sock \\\n  \"registry.gitlab.com/gitlab-org/security-products/dependency-scanning:$DS_VERSION\"\
    \ /code\n"
  services:
  - docker:stable-dind
  stage: test
  variables:
    DOCKER_DRIVER: overlay2
    DOCKER_TLS_CERTDIR: ''
sast:
  allow_failure: true
  artifacts:
    expire_in: 7 days
    paths:
    - gl-sast-report.json
    reports:
      sast: gl-sast-report.json
  dependencies: []
  except:
    variables:
    - $SAST_DISABLED
  extends:
  - .default-retry
  - .default-only
  - .only-code-changes
  image: docker:stable
  only:
    variables:
    - $GITLAB_FEATURES =~ /\bsast\b/
  script:
  - export SAST_VERSION=${SP_VERSION:-$(echo "$CI_SERVER_VERSION" | sed 's/^\([0-9]*\)\.\([0-9]*\).*/\1-\2-stable/')}
  - "if ! docker info &>/dev/null; then\n  if [ -z \"$DOCKER_HOST\" -a \"$KUBERNETES_PORT\"\
    \ ]; then\n    export DOCKER_HOST='tcp://localhost:2375'\n  fi\nfi\n"
  - "function propagate_env_vars() {\n  CURRENT_ENV=$(printenv)\n\n  for VAR_NAME;\
    \ do\n    echo $CURRENT_ENV | grep \"${VAR_NAME}=\" > /dev/null && echo \"--env\
    \ $VAR_NAME \"\n  done\n}\n"
  - "docker run \\\n  $(propagate_env_vars \\\n    SAST_BANDIT_EXCLUDED_PATHS \\\n\
    \    SAST_ANALYZER_IMAGES \\\n    SAST_ANALYZER_IMAGE_PREFIX \\\n    SAST_ANALYZER_IMAGE_TAG\
    \ \\\n    SAST_DEFAULT_ANALYZERS \\\n    SAST_PULL_ANALYZER_IMAGES \\\n    SAST_BRAKEMAN_LEVEL\
    \ \\\n    SAST_FLAWFINDER_LEVEL \\\n    SAST_GITLEAKS_ENTROPY_LEVEL \\\n    SAST_GOSEC_LEVEL\
    \ \\\n    SAST_EXCLUDED_PATHS \\\n    SAST_DOCKER_CLIENT_NEGOTIATION_TIMEOUT \\\
    \n    SAST_PULL_ANALYZER_IMAGE_TIMEOUT \\\n    SAST_RUN_ANALYZER_TIMEOUT \\\n\
    \    SAST_JAVA_VERSION \\\n    ANT_HOME \\\n    ANT_PATH \\\n    GRADLE_PATH \\\
    \n    JAVA_OPTS \\\n    JAVA_PATH \\\n    JAVA_8_VERSION \\\n    JAVA_11_VERSION\
    \ \\\n    MAVEN_CLI_OPTS \\\n    MAVEN_PATH \\\n    MAVEN_REPO_PATH \\\n    SBT_PATH\
    \ \\\n    FAIL_NEVER \\\n  ) \\\n  --volume \"$PWD:/code\" \\\n  --volume /var/run/docker.sock:/var/run/docker.sock\
    \ \\\n  \"registry.gitlab.com/gitlab-org/security-products/sast:$SAST_VERSION\"\
    \ /app/bin/run /code\n"
  services:
  - docker:stable-dind
  stage: test
  variables:
    DOCKER_DRIVER: overlay2
    DOCKER_TLS_CERTDIR: ''
    SAST_BRAKEMAN_LEVEL: 2
    SAST_EXCLUDED_PATHS: qa,spec,doc,ee/spec
