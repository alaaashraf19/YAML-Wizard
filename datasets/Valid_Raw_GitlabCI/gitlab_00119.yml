before_script:
- export APT_CACHE_DIR=`pwd`/apt-cache && mkdir -pv $APT_CACHE_DIR
- export PKG_CONFIG_PATH=/usr/lib64/pkgconfig
- apt-get update -yq && apt-get -o dir::cache::archives="$APT_CACHE_DIR" install -yq
  $LIB_PKGS $GIT_PKGS
- apt-get -o dir::cache::archives="$APT_CACHE_DIR" install -yq $COVERAGE_PKGS $DAEMON_PKGS
  $CI_TOOLS_PKGS
- mkdir -p /builds/accounts-sso
- cd /builds/accounts-sso
- git clone https://gitlab.com/accounts-sso/signond.git
- cd signond
- curl "https://gitlab.com/accounts-sso/signond/-/jobs/artifacts/master/download?job=build_amd64"
  -L -o artifacts.zip
- unzip artifacts.zip
- cd build
- make install
- cd $CI_PROJECT_DIR
build_amd64:
  artifacts:
    paths:
    - ./
  script:
  - export PYTHON=python3
  - meson build -Ddebugging=true -Ddocumentation=true -Db_coverage=true
  - ninja -C build
  stage: build
cache:
  key: apt-cache
  paths:
  - apt-cache/
image: ubuntu:bionic
pages:
  artifacts:
    paths:
    - public
  dependencies:
  - test_amd64
  only:
  - master
  script:
  - mkdir public
  - cp -a build/meson-logs/coveragereport public/coverage
  - cp -a build/docs/reference/html/* public/
  stage: deploy
test_amd64:
  artifacts:
    paths:
    - ./
  dependencies:
  - build_amd64
  script:
  - ninja -C build test || (cat tests/test-suite.log && /bin/false)
  - ninja -C build coverage-html
  - ninja -C build libsignon-glib-doc
  stage: test
variables:
  CI_TOOLS_PKGS: unzip git
  COVERAGE_PKGS: signon-plugin-ssotest check dbus-test-runner lcov gcovr
  DAEMON_PKGS: qt5-qmake qtbase5-dev qtchooser pkg-config libqt5sql5-sqlite doxygen
    libdbus-1-dev curl
  GIT_PKGS: gobject-introspection libgirepository1.0-dev python3-gi python-gi-dev
    valac
  GIT_SUBMODULE_STRATEGY: recursive
  LIB_PKGS: meson gtk-doc-tools libglib2.0-dev python3
