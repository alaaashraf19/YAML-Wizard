job1:
  script:
  - apt-get update
  - apt-get install -y python-virtualenv python-psycopg2
  - virtualenv --system-site-packages venv
  - . venv/bin/activate
  - pip install -r monyt/requirements.pip
  - cd monyt ; python tests_influxdb.py
  stage: test
