bazel_build:
  only:
  - triggers
  script:
  - pwd
  - set +x
  - bash tools/bazel_build_standalone_lib.sh
  - bash tools/bazel_build_standalone_lib.sh --abi=armeabi-v7a --runtimes=cpu
  - bash tools/bazel_build_standalone_lib.sh --abi=armeabi-v7a --runtimes=cpu,gpu
  - LIBMACE32_FULL_SIZE=`stat -c%s build/lib/armeabi-v7a/libmace.so`
  - if (( LIBMACE32_FULL_SIZE > 1500000 )) ; then echo "The libmace.so size too large(LIBMACE32_FULL_SIZE)";
    exit 1; fi
  - bash tools/bazel_build_standalone_lib.sh --abi=armeabi-v7a --runtimes=cpu,gpu,dsp
  - bash tools/bazel_build_standalone_lib.sh --abi=armeabi-v7a --runtimes=cpu,gpu,dsp
    --debug --asan
  - bash tools/bazel_build_standalone_lib.sh --abi=arm64-v8a --runtimes=cpu
  - bash tools/bazel_build_standalone_lib.sh --abi=arm64-v8a --runtimes=cpu,gpu
  - LIBMACE64_FULL_SIZE=`stat -c%s build/lib/arm64-v8a/libmace.so` - if (( LIBMACE64_FULL_SIZE
    > 2300000 )) ; then echo "The libmace.so size too large(LIBMACE64_FULL_SIZE)";
    exit 1; fi
  - bash tools/bazel_build_standalone_lib.sh --abi=arm64-v8a --runtimes=cpu,gpu,dsp
  - bash tools/bazel_build_standalone_lib.sh --abi=arm64-v8a --runtimes=cpu,gpu,apu
  - bash tools/bazel_build_standalone_lib.sh --abi=arm64-v8a --runtimes=cpu,gpu,dsp
    --debug --asan
  - bash tools/bazel_build_standalone_lib.sh --abi=arm64-v8a --runtimes=cpu,gpu,apu
    --debug --asan
  - bash tools/bazel_build_standalone_lib.sh --abi=arm_linux_gnueabihf --runtimes=cpu
  - bash tools/bazel_build_standalone_lib.sh --abi=arm_linux_gnueabihf --runtimes=cpu,gpu
  - bash tools/bazel_build_standalone_lib.sh --abi=aarch64_linux_gnu --runtimes=cpu
  - bash tools/bazel_build_standalone_lib.sh --abi=aarch64_linux_gnu --runtimes=cpu,gpu
  - bash tools/bazel_build_standalone_lib.sh --abi=host
  - bash tools/bazel_build_standalone_lib.sh --static
  - bash tools/bazel_build_standalone_lib.sh --abi=armeabi-v7a --runtimes=cpu --static
  - bash tools/bazel_build_standalone_lib.sh --abi=armeabi-v7a --runtimes=cpu,gpu
    --static
  - bash tools/bazel_build_standalone_lib.sh --abi=armeabi-v7a --runtimes=cpu,gpu,dsp
    --static
  - bash tools/bazel_build_standalone_lib.sh --abi=armeabi-v7a --runtimes=cpu,gpu,dsp
    --static --debug --asan
  - bash tools/bazel_build_standalone_lib.sh --abi=arm64-v8a --runtimes=cpu --static
  - bash tools/bazel_build_standalone_lib.sh --abi=arm64-v8a --runtimes=cpu,gpu --static
  - bash tools/bazel_build_standalone_lib.sh --abi=arm64-v8a --runtimes=cpu,gpu,dsp
    --static
  - bash tools/bazel_build_standalone_lib.sh --abi=arm64-v8a --runtimes=cpu,gpu,dsp
    --static --debug --asan
  - bash tools/bazel_build_standalone_lib.sh --abi=arm64-v8a --runtimes=cpu,gpu,apu
    --static
  - bash tools/bazel_build_standalone_lib.sh --abi=arm64-v8a --runtimes=cpu,gpu,apu
    --static --debug --asan
  - bash tools/bazel_build_standalone_lib.sh --abi=arm_linux_gnueabihf --runtimes=cpu
    --static
  - bash tools/bazel_build_standalone_lib.sh --abi=arm_linux_gnueabihf --runtimes=cpu,gpu
    --static
  - bash tools/bazel_build_standalone_lib.sh --abi=aarch64_linux_gnu --runtimes=cpu
    --static
  - bash tools/bazel_build_standalone_lib.sh --abi=aarch64_linux_gnu --runtimes=cpu,gpu
    --static
  - bash tools/bazel_build_standalone_lib.sh --abi=host --static
  stage: build
build_android_demo:
  only:
  - triggers
  script:
  - pwd
  - set +x
  - ANDROID_NDK_HOME_SAVED=${ANDROID_NDK_HOME}
  - export ANDROID_NDK_HOME=/opt/android-ndk-r17b
  - pushd examples/android/ && bash build.sh static && bash build.sh dynamic && popd
  - export ANDROID_NDK_HOME=${ANDROID_NDK_HOME_SAVED}
  stage: build
build_docs:
  artifacts:
    paths:
    - docs/_build
  script:
  - pwd
  - set +x
  - cd docs
  - pyenv local 3.6.3 && make html
  - CI_LATEST_OUTPUT_PATH=/mace-build-output/$CI_PROJECT_NAME/latest
  - CI_JOB_OUTPUT_PATH=/mace-build-output/$CI_PROJECT_NAME/$CI_PIPELINE_ID
  - rm -rf $CI_JOB_OUTPUT_PATH
  - mkdir -p $CI_JOB_OUTPUT_PATH
  - cp -r _build/html $CI_JOB_OUTPUT_PATH/docs
  - rm -rf $CI_LATEST_OUTPUT_PATH
  - mkdir -p $CI_LATEST_OUTPUT_PATH
  - cp -r _build/html $CI_LATEST_OUTPUT_PATH/docs
  stage: build
cmake_build_android-arm64-v8:
  script:
  - pwd
  - set +x
  - RUNTIME=GPU QUANTIZE=OFF bash tools/cmake/cmake-build-arm64-v8a.sh
  - LIBMACE64_FULL_SIZE=`stat -c%s build/cmake-build/arm64-v8a/install/lib/libmace.so`
  - if (( LIBMACE64_FULL_SIZE > 2400000 )) ; then echo "The libmace.so size too large($LIBMACE64_FULL_SIZE)";
    exit 1; fi
  stage: build
cmake_build_android-armeabi-v7a:
  script:
  - pwd
  - set +x
  - RUNTIME=GPU QUANTIZE=OFF bash tools/cmake/cmake-build-armeabi-v7a.sh
  - LIBMACE32_FULL_SIZE=`stat -c%s build/cmake-build/armeabi-v7a/install/lib/libmace.so`
  - if (( LIBMACE32_FULL_SIZE > 1600000 )) ; then echo "The libmace.so size too large($LIBMACE32_FULL_SIZE)";
    exit 1; fi
  stage: build
cmake_build_host:
  script:
  - pwd
  - set +x
  - RUNTIME=GPU QUANTIZE=OFF bash tools/cmake/cmake-build-host.sh
  - LIBMACE_HOST_FULL_SIZE=`stat -c%s build/cmake-build/host/install/lib/libmace.so`
  - if (( LIBMACE_HOST_FULL_SIZE > 2600000 )) ; then echo "The libmace.so size too
    large($LIBMACE_HOST_FULL_SIZE)"; exit 1; fi
  stage: build
cpplint:
  script:
  - sh tools/cpplint.sh
  stage: linting
dynamic_linking_test:
  only:
  - triggers
  script:
  - pwd
  - set +x
  - export ANDROID_NDK_HOME=/opt/android-ndk-r17b
  - rm -rf mace-models
  - rm -rf generic-mobile-devices
  - GIT_SSH_COMMAND="ssh -o UserKnownHostsFile=/dev/null -o StrictHostKeyChecking=no"
    git clone https://github.com/XiaoMi/mace-models.git
  - CONF_FILE=mace-models/mobilenet-v1/mobilenet-v1.yml
  - "if ping -c 1 v9.git.n.xiaomi.com 1>/dev/null 2>&1; then\n  GIT_SSH_COMMAND=\"\
    ssh -o UserKnownHostsFile=/dev/null -o StrictHostKeyChecking=no\" git clone git@v9.git.n.xiaomi.com:deep-computing/generic-mobile-devices.git\n\
    \  DEVICE_CONF_FILE=generic-mobile-devices/devices.yml\nfi\n"
  - if [ -z "$TARGET_SOCS" ]; then TARGET_SOCS=random; fi
  - python tools/converter.py convert --config=${CONF_FILE}  --target_socs=$TARGET_SOCS
    --model_graph_format=file --model_data_format=file --cl_mem_type=buffer || exit
    1;
  - python tools/converter.py run --config=${CONF_FILE} --target_socs=$TARGET_SOCS
    --device_yml=${DEVICE_CONF_FILE} --round=1 --validate --model_graph_format=file
    --model_data_format=file --mace_lib_type=dynamic || exit 1;
  - rm -rf mace-models
  stage: extra
mace_cc_benchmark:
  only:
  - triggers
  script:
  - pwd
  - set +x
  - if [ -z "$TARGET_SOCS" ]; then TARGET_SOCS=random; fi
  - python tools/bazel_adb_run.py --target="//test/ccbenchmark:mace_cc_benchmark"
    --run_target=True --stdout_processor=ops_benchmark_stdout_processor --target_abis=armeabi-v7a,arm64-v8a
    --target_socs=$TARGET_SOCS --args="--filter=.*SIGMOID.*"
  stage: test
mace_cc_test:
  script:
  - pwd
  - set +x
  - if [ -z "$TARGET_SOCS" ]; then TARGET_SOCS=random; fi
  - "if ping -c 1 v9.git.n.xiaomi.com 1>/dev/null 2>&1; then\n  GIT_SSH_COMMAND=\"\
    ssh -o UserKnownHostsFile=/dev/null -o StrictHostKeyChecking=no\" git clone git@v9.git.n.xiaomi.com:deep-computing/generic-mobile-devices.git\n\
    \  DEVICE_CONF_FILE=generic-mobile-devices/devices.yml\nfi\n"
  - python tools/bazel_adb_run.py --target="//test/ccunit:mace_cc_test" --device_yml=${DEVICE_CONF_FILE}
    --run_target=True --stdout_processor=unittest_stdout_processor --target_abis=armeabi-v7a,arm64-v8a
    --target_socs=$TARGET_SOCS
  stage: test
micro:
  before_script:
  - git submodule deinit -f .
  - git submodule sync
  - git submodule update --init .
  image: mace-micro-dev
  script:
  - pwd
  - set +x
  - bash micro/tools/ci/model_convert.sh
  - bash micro/tools/ci/cross_build.sh
  - bash micro/tools/ci/host_build_and_run_examples.sh
  - bash micro/tools/ci/host_build_and_run_tests.sh
  - bash micro/tools/ci/build_mbed_example.sh
  stage: test
  tags:
  - mace-micro
model_tests:
  script:
  - pwd
  - set +x
  - rm -rf mace-models
  - rm -rf generic-mobile-devices
  - GIT_SSH_COMMAND="ssh -o UserKnownHostsFile=/dev/null -o StrictHostKeyChecking=no"
    git clone https://github.com/XiaoMi/mace-models.git
  - CONF_FILE=mace-models/mobilenet-v1/mobilenet-v1.yml
  - "if ping -c 1 v9.git.n.xiaomi.com 1>/dev/null 2>&1; then\n  GIT_SSH_COMMAND=\"\
    ssh -o UserKnownHostsFile=/dev/null -o StrictHostKeyChecking=no\" git clone git@v9.git.n.xiaomi.com:deep-computing/generic-mobile-devices.git\n\
    \  DEVICE_CONF_FILE=generic-mobile-devices/devices.yml\nfi\n"
  - if [ -z "$TARGET_SOCS" ]; then TARGET_SOCS=random; fi
  - python tools/converter.py convert --config=${CONF_FILE}  --target_socs=$TARGET_SOCS
    --model_graph_format=file --model_data_format=file --cl_mem_type=buffer
  - python tools/converter.py run --config=${CONF_FILE} --target_socs=$TARGET_SOCS
    --device_yml=${DEVICE_CONF_FILE} --round=1 --target_abis=armeabi-v7a --validate
    --model_graph_format=file --model_data_format=file
  - bash test/ci-mace-models/run-ci-test-model.sh
  - CONF_FILE=mace-models/mobilenet-v2/mobilenet-v2-host.yml
  - python tools/converter.py convert --config=${CONF_FILE} --target_socs=$TARGET_SOCS
    --model_graph_format=file --model_data_format=file
  - python tools/converter.py run --config=${CONF_FILE} --target_socs=$TARGET_SOCS
    --round=1 --validate --model_graph_format=file --model_data_format=file --address_sanitizer
  - python tools/converter.py run --config=${CONF_FILE} --target_socs=$TARGET_SOCS
    --round=5 --model_graph_format=file --model_data_format=file --benchmark
  - python tools/converter.py convert --config=${CONF_FILE} --target_socs=$TARGET_SOCS
    --model_graph_format=code --model_data_format=file
  - python tools/converter.py run --config=${CONF_FILE} --target_socs=$TARGET_SOCS
    --round=1 --validate --model_graph_format=code --model_data_format=file
  - python tools/converter.py run --config=${CONF_FILE} --target_socs=$TARGET_SOCS
    --round=5 --model_graph_format=code --model_data_format=file --benchmark
  stage: test
pylint:
  script:
  - pycodestyle . --filename=*.py --exclude=examples,third_party,tools/python/py_proto
    --max-line-length=120
  stage: linting
quantization_tests:
  script:
  - pwd
  - set +x
  - rm -rf mace-models
  - GIT_SSH_COMMAND="ssh -o UserKnownHostsFile=/dev/null -o StrictHostKeyChecking=no"
    git clone https://github.com/XiaoMi/mace-models.git
  - "if ping -c 1 v9.git.n.xiaomi.com 1>/dev/null 2>&1; then\n  GIT_SSH_COMMAND=\"\
    ssh -o UserKnownHostsFile=/dev/null -o StrictHostKeyChecking=no\" git clone git@v9.git.n.xiaomi.com:deep-computing/generic-mobile-devices.git\n\
    \  DEVICE_CONF_FILE=generic-mobile-devices/devices.yml\nfi\n"
  - 'CONF_FILE=mace-models/mobilenet-v1/mobilenet-v1-quantize-retrain-dsp.yml; python
    tools/converter.py convert --config=${CONF_FILE} --target_socs=$TARGET_SOCS --model_graph_format=file
    --model_data_format=file || exit 1; python tools/converter.py run --config=${CONF_FILE}
    --target_socs=$TARGET_SOCS --device_yml=${DEVICE_CONF_FILE} --round=1 --validate
    --model_graph_format=file --model_data_format=file --use_system_libhexagon_nn
    || exit 1;

    '
  - 'CONF_FILE=mace-models/mobilenet-v1/mobilenet-v1-quantize-retrain-hta.yml; GIT_SSH_COMMAND="ssh
    -o UserKnownHostsFile=/dev/null -o StrictHostKeyChecking=no" git clone --single-branch
    --branch hta git@v9.git.n.xiaomi.com:deep-computing/mace.git mace_hta --depth
    1; mv mace_hta/third_party/hta/ third_party/; python tools/converter.py convert
    --config=${CONF_FILE} --model_graph_format=file --model_data_format=file || exit
    1; python tools/converter.py run --config=${CONF_FILE} --round=1 --validate --model_graph_format=file
    --model_data_format=file || exit 1; rm -rf mace_hta third_party/hta;

    '
  - rm -rf mace-models
  stage: test
setenv:
  script:
  - export CCACHE_NOHASHDIR=1
  - export CCACHE_BASEDIR=${CI_PROJECT_DIR}
  stage: prepare
stages:
- prepare
- linting
- build
- test
- extra
