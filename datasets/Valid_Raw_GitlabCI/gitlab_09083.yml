.if-monthly-release-release-day:
  if: ($CI_PIPELINE_SOURCE =~ /^(pipeline|web|api)$/) && ($MONTHLY_RELEASE_PIPELINE
    =~ /^(release_day|true)$/)
.monthly-release-release-day-base:
  extends: .common-job-setup
  needs:
  - monthly_release_release_day:start
  rules:
  - if: ($CI_PIPELINE_SOURCE =~ /^(pipeline|web|api)$/) && ($MONTHLY_RELEASE_PIPELINE
      =~ /^(release_day|true)$/)
  stage: monthly_release:release_day
monthly_release_release_day:notify_release_publish:
  extends:
  - .monthly-release-release-day-base
  - .common-ci-tokens
  script:
  - bundle exec rake 'monthly:release_day:notify_release_publish'
monthly_release_release_day:publish:
  extends: .monthly-release-release-day-base
  needs:
  - monthly_release_release_day:start_publish
  rules:
  - if: ($CI_PIPELINE_SOURCE =~ /^(pipeline|web|api)$/) && ($MONTHLY_RELEASE_PIPELINE
      =~ /^(release_day|true)$/)
    start_in: 10 minutes
    when: delayed
  script:
  - source scripts/setup_ssh.sh
  - source scripts/setup_git.sh
  - bundle exec rake 'monthly:release_day:publish'
monthly_release_release_day:start:
  extends: .common-job-setup
  rules:
  - if: ($CI_PIPELINE_SOURCE =~ /^(pipeline|web|api)$/) && ($MONTHLY_RELEASE_PIPELINE
      =~ /^(release_day|true)$/)
  script:
  - bundle exec rake 'monthly:release_day:start'
  stage: monthly_release:release_day:start
  when: manual
monthly_release_release_day:start_publish:
  extends: .monthly-release-release-day-base
  script:
  - bundle exec rake 'monthly:release_day:start_publish'
