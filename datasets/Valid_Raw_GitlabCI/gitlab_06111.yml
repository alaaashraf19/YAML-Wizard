benchmarks:
  before_script:
  - python3 -c 'import docker; import json; print(json.dumps(docker.from_env().info(),
    indent=True))'
  image: registry.gitlab.com/datadrivendiscovery/images/testing-lite:$IMAGE_TAG
  parallel:
    matrix:
    - IMAGE_TAG:
      - ubuntu-bionic-python36
      - ubuntu-bionic-python37
      - ubuntu-bionic-python38
  script:
  - ./run_benchmarks.sh
  services:
  - alias: docker
    name: registry.gitlab.com/datadrivendiscovery/images/docker:19-dind
  stage: build
  variables:
    DOCKER_HOST: tcp://docker:2375
    GIT_SUBMODULE_STRATEGY: recursive
pages:
  artifacts:
    paths:
    - public
  image: registry.gitlab.com/datadrivendiscovery/images/testing-lite:ubuntu-bionic-python36
  only:
  - devel
  - tags
  script:
  - "set -o errexit\nif [[ ${CI_COMMIT_TAG} == v* ]] || [[ ${CI_COMMIT_REF_NAME} ==\
    \ devel ]]; then\n  ./site/build_site.sh\n  git checkout devel\n  python3 site/build_site_types.py\n\
    fi\n"
  stage: deploy
run_check:
  image: registry.gitlab.com/datadrivendiscovery/images/testing-lite:$IMAGE_TAG
  parallel:
    matrix:
    - IMAGE_TAG:
      - ubuntu-bionic-python36
      - ubuntu-bionic-python37
      - ubuntu-bionic-python38
  script:
  - python3 setup.py sdist
  - pip3 install $(ls dist/*)[tests]
  - rm -rf d3m d3m.*
  - python3 -m d3m --version
  stage: build
style_check:
  image: registry.gitlab.com/datadrivendiscovery/images/testing-lite:$IMAGE_TAG
  parallel:
    matrix:
    - IMAGE_TAG:
      - ubuntu-bionic-python36
      - ubuntu-bionic-python37
      - ubuntu-bionic-python38
  script:
  - pycodestyle d3m
  stage: build
test_datasets:
  before_script:
  - python3 -c 'import docker; import json; print(json.dumps(docker.from_env().info(),
    indent=True))'
  - git -C /data/datasets show -s
  - git -C /data/datasets_public show -s
  image: registry.gitlab.com/datadrivendiscovery/images/testing-lite:$IMAGE_TAG
  parallel:
    matrix:
    - IMAGE_TAG:
      - ubuntu-bionic-python36
      - ubuntu-bionic-python37
      - ubuntu-bionic-python38
  script:
  - python3 setup.py sdist
  - pip3 install $(ls dist/*)[tests]
  - rm -rf d3m
  - find /data/datasets/ -name datasetDoc.json -print0 | xargs -r -0 python3 -m d3m
    dataset describe --continue --list --time
  - find /data/datasets_public/ -name datasetDoc.json -print0 | xargs -r -0 python3
    -m d3m dataset describe --continue --list --time
  - find /data/datasets/ -name problemDoc.json -print0 | xargs -r -0 python3 -m d3m
    problem describe --continue --list --no-print
  - find /data/datasets_public/ -name problemDoc.json -print0 | xargs -r -0 python3
    -m d3m problem describe --continue --list --no-print
  services:
  - alias: docker
    name: registry.gitlab.com/datadrivendiscovery/images/docker:19-dind
  stage: build
  tags:
  - datasets
  variables:
    DOCKER_HOST: tcp://docker:2375
    GIT_SUBMODULE_STRATEGY: recursive
tests:
  before_script:
  - python3 -c 'import docker; import json; print(json.dumps(docker.from_env().info(),
    indent=True))'
  image: registry.gitlab.com/datadrivendiscovery/images/testing-lite:$IMAGE_TAG
  parallel:
    matrix:
    - IMAGE_TAG:
      - ubuntu-bionic-python36
      - ubuntu-bionic-python37
      - ubuntu-bionic-python38
  script:
  - python3 setup.py sdist
  - pip3 install $(ls dist/*)[tests]
  - rm -rf d3m d3m.*
  - pip3 freeze
  - pip3 check
  - python3 ./run_tests.py
  services:
  - alias: docker
    name: registry.gitlab.com/datadrivendiscovery/images/docker:19-dind
  stage: build
  variables:
    DOCKER_HOST: tcp://docker:2375
    GIT_SUBMODULE_STRATEGY: recursive
tests_individually:
  before_script:
  - python3 -c 'import docker; import json; print(json.dumps(docker.from_env().info(),
    indent=True))'
  image: registry.gitlab.com/datadrivendiscovery/images/testing-lite:$IMAGE_TAG
  parallel:
    matrix:
    - IMAGE_TAG:
      - ubuntu-bionic-python36
      - ubuntu-bionic-python37
      - ubuntu-bionic-python38
  script:
  - python3 setup.py sdist
  - pip3 install $(ls dist/*)[tests]
  - rm -rf d3m d3m.*
  - pip3 freeze
  - pip3 check
  - 'set -o errexit

    for FILE in tests/*.py; do echo "$FILE"; python3 "$FILE"; done

    '
  services:
  - docker:dind
  stage: build
  variables:
    DOCKER_HOST: tcp://docker:2375
    GIT_SUBMODULE_STRATEGY: recursive
tests_oldest_dependencies:
  before_script:
  - python3 -c 'import docker; import json; print(json.dumps(docker.from_env().info(),
    indent=True))'
  image: registry.gitlab.com/datadrivendiscovery/images/testing-lite:$IMAGE_TAG
  parallel:
    matrix:
    - IMAGE_TAG:
      - ubuntu-bionic-python36
      - ubuntu-bionic-python37
      - ubuntu-bionic-python38
  script:
  - python3 setup.py sdist
  - pip3 install $(ls dist/*)[tests]
  - rm -rf d3m d3m.*
  - ./oldest_dependencies.py | grep numpy | pip3 install --upgrade --upgrade-strategy
    only-if-needed --exists-action w --requirement /dev/stdin
  - ./oldest_dependencies.py | pip3 install --upgrade --upgrade-strategy only-if-needed
    --exists-action w --requirement /dev/stdin
  - pip3 freeze
  - pip3 check
  - python3 ./run_tests.py
  services:
  - alias: docker
    name: registry.gitlab.com/datadrivendiscovery/images/docker:19-dind
  stage: build
  variables:
    DOCKER_HOST: tcp://docker:2375
    GIT_SUBMODULE_STRATEGY: recursive
tests_windows:
  before_script:
  - choco install python -y --version=$PYTHON_VERSION --no-progress
  - choco install sed -y --version=4.8 --no-progress
  - refreshenv
  - curl $GET_PIP -o get-pip.py
  - py get-pip.py
  - refreshenv
  - $env:Path += ";C:\Python36\Scripts;C:\Python37\Scripts;C:\Python38\Scripts"
  parallel:
    matrix:
    - GET_PIP: https://bootstrap.pypa.io/get-pip.py
      PYTHON_VERSION:
      - 3.7.9
      - 3.8.10
    - GET_PIP: https://bootstrap.pypa.io/pip/3.6/get-pip.py
      PYTHON_VERSION: 3.6.8
  script:
  - py setup.py sdist
  - pip install "$(ls dist/*)[tests]"
  - rm -r -fo d3m,d3m.*
  - pip freeze
  - pip check
  - py run_tests.py
  stage: build
  tags:
  - shared-windows
  - windows
  - windows-1809
  variables:
    GIT_SUBMODULE_STRATEGY: recursive
tests_with_optimize:
  before_script:
  - python3 -c 'import docker; import json; print(json.dumps(docker.from_env().info(),
    indent=True))'
  image: registry.gitlab.com/datadrivendiscovery/images/testing-lite:$IMAGE_TAG
  parallel:
    matrix:
    - IMAGE_TAG:
      - ubuntu-bionic-python36
      - ubuntu-bionic-python37
      - ubuntu-bionic-python38
  script:
  - python3 setup.py sdist
  - pip3 install $(ls dist/*)[tests]
  - rm -rf d3m d3m.*
  - pip3 freeze
  - pip3 check
  - python3 ./run_tests.py
  services:
  - alias: docker
    name: registry.gitlab.com/datadrivendiscovery/images/docker:19-dind
  stage: build
  variables:
    DOCKER_HOST: tcp://docker:2375
    GIT_SUBMODULE_STRATEGY: recursive
    PYTHONOPTIMIZE: 'true'
trigger_docs_generation:
  image: registry.gitlab.com/datadrivendiscovery/images/testing-docker:ubuntu-bionic
  only:
  - devel
  - tags
  script:
  - if [ -n "$DOCS_TRIGGER_TOKEN" ]; then curl --fail -X POST -F token=$DOCS_TRIGGER_TOKEN
    -F ref=master https://gitlab.com/api/v4/projects/7130595/trigger/pipeline; fi
  stage: deploy
trigger_images_rebuild_devel:
  image: registry.gitlab.com/datadrivendiscovery/images/testing-docker:ubuntu-bionic
  only:
  - devel
  script:
  - if [ -n "$TRIGGER_TOKEN" ]; then curl --fail -X POST -F token=$TRIGGER_TOKEN -F
    ref=master -F variables[REBUILD_IMAGE]=core:ubuntu-bionic-python36-devel,core:ubuntu-bionic-python37-devel,core:ubuntu-bionic-python38-devel,core-lite:ubuntu-bionic-python36-devel,core-lite:ubuntu-bionic-python37-devel,core-lite:ubuntu-bionic-python38-devel
    https://gitlab.com/api/v4/projects/5024100/trigger/pipeline; fi
  stage: deploy
trigger_images_rebuild_master:
  image: registry.gitlab.com/datadrivendiscovery/images/testing-docker:ubuntu-bionic
  only:
  - master
  script:
  - if [ -n "$TRIGGER_TOKEN" ]; then curl --fail -X POST -F token=$TRIGGER_TOKEN -F
    ref=master -F variables[REBUILD_IMAGE]=core:ubuntu-bionic-python36-master,core:ubuntu-bionic-python37-master,core:ubuntu-bionic-python38-master,core-lite:ubuntu-bionic-python36-master,core-lite:ubuntu-bionic-python37-master,core-lite:ubuntu-bionic-python38-master
    https://gitlab.com/api/v4/projects/5024100/trigger/pipeline; fi
  stage: deploy
type_check:
  image: registry.gitlab.com/datadrivendiscovery/images/testing-lite:$IMAGE_TAG
  parallel:
    matrix:
    - IMAGE_TAG:
      - ubuntu-bionic-python36
      - ubuntu-bionic-python37
      - ubuntu-bionic-python38
  script:
  - pip3 install .[tests]
  - pip3 install --requirement typing-requirements.txt
  - mypy d3m
  stage: build
