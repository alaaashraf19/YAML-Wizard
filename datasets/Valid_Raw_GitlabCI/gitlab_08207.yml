.deploy-review-tags:
  tags:
  - nginx
  - review-apps
  - deploy
build:
  artifacts:
    expire_in: 3 days
    paths:
    - public
  cache:
    key: ruby-2.5.1
    paths:
    - tmp/cache
    - vendor
    policy: pull-push
  image: ruby:2.5-buster
  rules:
  - if: $CI_MERGE_REQUEST_IID
  - if: $CI_COMMIT_REF_NAME == "master"
  script:
  - ln -sf /usr/share/zoneinfo/Asia/Tokyo /etc/localtime
  - apt-get update -yqqq
  - apt-get install -y nodejs
  - bundle install --path vendor
  - bundle exec middleman build
  stage: build
  variables:
    INCLUDE_GENERATORS: 'true'
    RUBYOPT: -EUTF-8
deploy:production:
  before_script:
  - pip install awscli==${AWSCLI_VERSION}
  environment:
    name: production
    url: https://www.gitlab.jp
  image: python:3.6
  rules:
  - if: $CI_COMMIT_REF_NAME == "master" && $CI_PIPELINE_SOURCE == "schedule"
  - if: $CI_COMMIT_REF_NAME == "master"
    when: manual
  script:
  - aws s3 sync --delete public s3://${BUCKET_NAME}
  - aws cloudfront create-invalidation --distribution-id ${DISTRIBUTION_ID} --paths
    "/*"
  stage: deploy
  variables:
    AWSCLI_VERSION: 1.16.236
deploy:review:
  environment:
    name: review/$CI_BUILD_REF_NAME
    on_stop: stop:review
    url: http://$CI_BUILD_REF_SLUG.$APPS_DOMAIN
  extends: .deploy-review-tags
  rules:
  - if: $CI_MERGE_REQUEST_IID
  script:
  - rsync -av --delete public /srv/nginx/pages/$CI_BUILD_REF_SLUG
  stage: deploy
  variables:
    APPS_DOMAIN: review-www.gitlab.jp
deploy:staging:
  environment:
    name: staging
    url: http://staging.gitlab.jp
  extends: .deploy-review-tags
  rules:
  - if: $CI_COMMIT_REF_NAME == "master"
  script:
  - rsync -av --delete public /srv/nginx/staging
  stage: deploy
post-deploy:update-s3-redirects:
  cache:
    paths:
    - vendor
  image: ruby:2.5.1
  rules:
  - if: $CI_COMMIT_REF_NAME == "master"
  script:
  - bundle install --path vendor
  - bundle exec rake update_s3_redirects
  stage: post-deploy
stages:
- build
- deploy
- post-deploy
stop:review:
  environment:
    action: stop
    name: review/$CI_BUILD_REF_NAME
  extends: .deploy-review-tags
  rules:
  - allow_failure: true
    if: $CI_MERGE_REQUEST_IID
    when: manual
  script:
  - rm -rf public /srv/nginx/pages/$CI_BUILD_REF_SLUG
  stage: deploy
  variables:
    GIT_STRATEGY: none
