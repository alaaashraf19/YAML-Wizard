MinGW/Debian:
  image: $CI_REGISTRY/$BUILD_IMAGES_PROJECT:$MINGW_BUILD
  script:
  - export CFLAGS="$CFLAGS_DEFAULT"
  - export CC="ccache $PREFIX-gcc"
  - ./bootstrap
  - ./configure $CONFIGURE_BASE_FLAGS --build=x86_64-pc-linux-gnu --host=$PREFIX --enable-build-type=release
  - make -j$(nproc)
Sanitizers/Stretch:
  artifacts:
    expire_in: 2 weeks
    paths:
    - ./*.log
    - src/*/*.log
    - src/*/*/*.log
    when: on_failure
  image: $CI_REGISTRY/$BUILD_IMAGES_PROJECT:$DEBIAN_BUILD
  script:
  - export CFLAGS="$CFLAGS_DEFAULT"
  - ./bootstrap
  - export CC="ccache clang"
  - export ASAN_SYMBOLIZER_PATH=/usr/lib/llvm-3.8/bin/llvm-symbolizer
  - ./configure $CONFIGURE_BASE_FLAGS --disable-doc --enable-build-type=debug --enable-sanitizers
  - make -j$(nproc) && make check
Scan-Build/Debian:
  artifacts:
    expire_in: 2 weeks
    paths:
    - scan-build/*
    when: on_failure
  except:
  - tags
  image: $CI_REGISTRY/$BUILD_IMAGES_PROJECT:$DEBIAN_BUILD
  script:
  - export CFLAGS="$CFLAGS_DEFAULT"
  - export CC="clang-3.8"
  - ./bootstrap
  - scan-build --use-cc=clang-3.8 ./configure $CONFIGURE_BASE_FLAGS --enable-build-type=debug
    --disable-sanitizers
  - scan-build --use-cc="ccache clang-3.8" -v -enable-checker security,nullability
    --status-bugs -o scan-build make -j$(nproc)
  - scan-build --use-cc="ccache clang-3.8" -v -enable-checker security,nullability
    --status-bugs -o scan-build make -k check
after_script:
- export CCACHE_BASEDIR="${PWD}"
- export CCACHE_DIR="${PWD}/cache"
- ccache -s
before_script:
- mkdir -p cache
- export CCACHE_BASEDIR="${PWD}"
- export CCACHE_DIR="${PWD}/cache"
- export CC="ccache gcc"
cache:
  key: $CI_JOB_NAME-ver1
  paths:
  - cache/
dist/Stretch:
  artifacts:
    expire_in: 2 weeks
    name: $CI_COMMIT_REF_NAME-$CI_COMMIT_SHORT_SHA
    paths:
    - ./libmicrohttpd-*.*.*.tar.??
    when: on_success
  image: $CI_REGISTRY/$BUILD_IMAGES_PROJECT:$DEBIAN_BUILD
  script:
  - export CFLAGS="$CFLAGS_DEFAULT"
  - ./bootstrap
  - ./configure $CONFIGURE_BASE_FLAGS --enable-build-type=release
  - make -j$(nproc) dist
gcc/Stretch:
  artifacts:
    expire_in: 2 weeks
    paths:
    - ./*.log
    - src/*/*.log
    - src/*/*/*.log
    when: on_failure
  image: $CI_REGISTRY/$BUILD_IMAGES_PROJECT:$DEBIAN_BUILD
  script:
  - export CFLAGS="$CFLAGS_DEFAULT"
  - ./bootstrap
  - ./configure $CONFIGURE_BASE_FLAGS --enable-build-type=debug --disable-sanitizers
  - make -j$(nproc) && make check
variables:
  BUILD_IMAGES_PROJECT: libmicrohttpd/build-images
  CFLAGS_DEFAULT: ''
  CONFIGURE_BASE_FLAGS: --cache-file cache/config.cache
  DEBIAN_BUILD: buildenv-debian-stretch
  GET_SOURCES_ATTEMPTS: '3'
  MINGW_BUILD: buildenv-debian-mingw
