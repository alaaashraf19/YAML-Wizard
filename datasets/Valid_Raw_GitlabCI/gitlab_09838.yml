cache:
  paths:
  - node_modules/
eslint:
  script:
  - npm install
  - $(npm bin)/eslint .
  stage: test
image: node:11
pages:
  artifacts:
    expire_in: 30 days
    paths:
    - public
  dependencies:
  - test
  script:
  - mkdir -p public/$CI_COMMIT_REF_NAME
  - mv coverage/ "public/$CI_COMMIT_REF_NAME"
  stage: reports
stages:
- test
- reports
test:
  artifacts:
    expire_in: 30 days
    paths:
    - coverage/
  script:
  - npm install
  - npm test
  stage: test
