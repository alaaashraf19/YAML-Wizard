.deploy:
  only: &id001
  - master
  script: &id002
  - mvn $MAVEN_CLI_OPTS deploy -P ci-release -s ci/settings.xml
  stage: deploy
.maven-image:
  image: maven:3-eclipse-temurin-17
.test:
  script: &id003
  - mvn $MAVEN_CLI_OPTS test
  stage: test
.validate:
  script: &id004
  - mvn $MAVEN_CLI_OPTS test-compile
  stage: build
.verify:
  except: &id005
  - master
  script: &id006
  - mvn $MAVEN_CLI_OPTS verify
  stage: test
cache:
  paths:
  - .m2/repository
deploy:
  image: maven:3-eclipse-temurin-17
  only: *id001
  script: *id002
  stage: deploy
test:
  image: maven:3-eclipse-temurin-17
  script: *id003
  stage: test
validate:
  image: maven:3-eclipse-temurin-17
  script: *id004
  stage: build
variables:
  MAVEN_CLI_OPTS: --batch-mode --errors --fail-at-end --show-version -DinstallAtEnd=true
    -DdeployAtEnd=true
  MAVEN_OPTS: -Dmaven.repo.local=.m2/repository -Dorg.slf4j.simpleLogger.log.org.apache.maven.cli.transfer.Slf4jMavenTransferListener=WARN
    -Dorg.slf4j.simpleLogger.showDateTime=true -Djava.awt.headless=true
verify:
  except: *id005
  image: maven:3-eclipse-temurin-17
  script: *id006
  stage: test
