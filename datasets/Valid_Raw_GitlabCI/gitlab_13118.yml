image: python:3.7
internal_link_check:
  image:
    entrypoint:
    - /bin/sh
    - -c
    - $0
    name: lycheeverse/lychee:0.14.3-alpine
  script:
  - lychee --offline --exclude mathbf -n docs/
  stage: test
markdown_lint:
  image: node
  script:
  - npm install -g markdownlint-cli
  - /usr/local/bin/markdownlint docs
  stage: test
mkdocs_build:
  artifacts:
    expire_in: 1 week
    paths:
    - public
  cache:
    key: ${CI_JOB_NAME}
    paths:
    - .build_cache
  script:
  - apt-get update
  - apt-get install --yes nodejs
  - mkdir -p .build_cache
  - pip install --upgrade --cache-dir=.build_cache -r requirements.txt
  - mkdocs --verbose build
  stage: test
  variables:
    GA_TOKEN: $GA_TOKEN
pages:
  artifacts:
    paths:
    - public
  only:
  - main@NERSC/nersc.gitlab.io
  script:
  - gzip -k -6 -r public/search
  - gzip -k -6 -r public/assets/stylesheets
  - gzip -k -6 -r public/assets/javascripts
  - find public -type f -name "*.html" -exec gzip --keep --verbose {} \;
  stage: deploy
stages:
- test
- deploy
variables:
  GA_TOKEN: $GA_TOKEN
