.defaults:
  except: &id001
  - tags
  retry: 2
.deploy:
  dependencies: &id003
  - chrome
  - install
  - unit
  except: *id001
  image: node:10
  only: &id004
  - master@wallzero/jsplumb-react
  retry: 2
  stage: deploy
.e2e:
  dependencies: &id002
  - build
  - install
  except: *id001
  image: registry.hub.docker.com/atlassianlabs/docker-node-jdk-chrome-firefox:latest
  retry: 2
  stage: test
after_script:
- pwd
- ls -alh --color | grep "^d" && ls -alh --color | grep -v "^d"
before_script:
- echo "CPU $(awk '/siblings/ {print $3}' /proc/cpuinfo | uniq)x$(awk '/cpu MHz/ {print
  $4}' /proc/cpuinfo | sort -nrk 1 | head -1) MHz"
- echo "Memory $(($(awk '/MemTotal/ {print $2}' /proc/meminfo)/1024)) gB"
- node -v
- npm -v
- pwd
- ls -alh --color | grep "^d" && ls -alh --color | grep -v "^d"
build:
  artifacts:
    expire_in: 2 hrs
    paths:
    - lib/
    - public/
  dependencies:
  - install
  except: *id001
  retry: 2
  script:
  - yarn build
  - yarn build:demo:gitlab
  - yarn copy:stats
  stage: build
chrome:
  dependencies: *id002
  except: *id001
  image: registry.hub.docker.com/atlassianlabs/docker-node-jdk-chrome-firefox:latest
  retry: 2
  script:
  - ln -sf /opt/google/chrome/google-chrome /usr/bin/google-chrome
  - google-chrome --version
  - npm run e2e:chrome:gitlab
  stage: test
image: node:10-alpine
install:
  artifacts:
    expire_in: 2 hrs
    paths:
    - node_modules/
  except: *id001
  retry: 2
  script:
  - yarn install
  - yarn e2e:install
  stage: install
pages:
  artifacts:
    paths:
    - lib/
    - public/
  dependencies: *id003
  except: *id001
  image: node:10
  only: *id004
  retry: 2
  script:
  - echo "deploying demo to gitlab pages"
  stage: deploy
publish:
  dependencies: *id003
  except: *id001
  image: node:10
  only: *id004
  retry: 2
  script:
  - yarn release:gitlab
  - yarn release:npm
  stage: deploy
stages:
- install
- build
- test
- deploy
unit:
  artifacts:
    expire_in: 2 hrs
    paths:
    - lib/
    - public/
  dependencies:
  - build
  - install
  except: *id001
  retry: 2
  script:
  - yarn unit:ci
  - yarn copy:coverage
  stage: test
