build:
  before_script:
  - docker login -u gitlab-ci-token -p $CI_BUILD_TOKEN registry.gitlab.com
  image: docker:17.05.0-ce
  script:
  - docker build --build-arg VERSION=$VERSION --build-arg APP=$APP_NAME -t registry.gitlab.com/$REPO_PATH:latest
    -t registry.gitlab.com/$REPO_PATH:$VERSION .
  - docker push registry.gitlab.com/$REPO_PATH:$VERSION
  - docker push registry.gitlab.com/$REPO_PATH:latest
  services:
  - docker:17.09.0-ce-dind
  stage: build
  variables:
    APP_NAME: demo
    REPO_PATH: chvanikoff/mnesia-demo
    VERSION: 0.0.1
stages:
- build
