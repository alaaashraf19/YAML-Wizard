.docker:
  services: &id001
  - docker:dind
  tags: &id002
  - docker
  variables: &id003
    DOCKER_DRIVER: overlay2
    DOCKER_HOST: tcp://docker:2375
.unit_tests:
  artifacts: &id004
    expire_in: 1 week
    paths:
    - coverprofile.html
    - coverprofile.txt
    - coverprofile.func.txt
  stage: test
  tags: &id005
  - docker
build ci image:
  image: docker:git
  only:
  - /\Adocker-ci-image\/.*/@tmaczukin/hanging-droplets-cleaner
  script:
  - apk add -U make bash
  - make release_ci_image
  services: *id001
  stage: prepare
  tags: *id002
  variables: *id003
codequality:
  artifacts:
    expire_in: 1 week
    paths:
    - codeclimate.json
  cache: {}
  dependencies: []
  script:
  - make codequality
  services: *id001
  stage: test
  tags: *id002
  variables:
    CODEQUALIT_VERSION: 0.71.0
    DOCKER_DRIVER: overlay2
    DOCKER_HOST: tcp://docker:2375
compile:
  artifacts:
    expire_in: 7d
    paths:
    - gcp-exporter
  script:
  - make compile
  stage: build
  tags:
  - docker
image: $CI_IMAGE
race conditions detector:
  script:
  - make check_race_conditions
  services: *id001
  stage: test
  tags:
  - docker
  variables: *id003
release image:
  only:
  - master
  - tags
  script:
  - make release_image
  services: *id001
  stage: release
  tags: *id002
  variables: *id003
stages:
- prepare
- test
- build
- release
unit tests:
  artifacts: *id004
  script:
  - make race_test
  stage: test
  tags: *id005
unit tests (no race):
  artifacts: *id004
  script:
  - make test
  stage: test
  tags: *id005
variables:
  CI_IMAGE: ${CI_REGISTRY_IMAGE}/ci:1.9-0
  GOROOT: /usr/local/go
