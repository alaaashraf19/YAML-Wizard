.defaults:
  except: &id001
  - tags
  retry: 2
.deploy:
  dependencies: &id003
  - build
  - chrome
  - install
  - unit
  except: *id001
  image: node:17
  only: &id004
  - master@wallzero/react-digest
  retry: 2
  stage: deploy
.e2e:
  dependencies: &id002
  - build
  - install
  except: *id001
  image: registry.hub.docker.com/atlassianlabs/docker-node-jdk-chrome-firefox:latest
  retry: 2
  stage: test
before_script:
- echo "CPU $(awk '/siblings/ {print $3}' /proc/cpuinfo | uniq)x$(awk '/cpu MHz/ {print
  $4}' /proc/cpuinfo | sort -nrk 1 | head -1) MHz"
- echo "Memory $(($(awk '/MemTotal/ {print $2}' /proc/meminfo)/1024)) gB"
- node -v
- npm -v
- pwd
- ls -alh --color | grep "^d" && ls -alh --color | grep -v "^d"
build:
  artifacts:
    expire_in: 2 hrs
    paths:
    - lib/
    - public/
  dependencies:
  - install
  except: *id001
  retry: 2
  script:
  - npm run build:gitlab
  - npm run copy:stats
  stage: build
cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
  - node_modules/
  - packages/ag/node_modules/
  - demo/redux/node_modules/
  - package-lock.json
chrome:
  dependencies: *id002
  except: *id001
  image: registry.hub.docker.com/atlassianlabs/docker-node-jdk-chrome-firefox:latest
  retry: 2
  script:
  - ln -sf /opt/google/chrome/google-chrome /usr/bin/google-chrome
  - google-chrome --version
  - npm run e2e:build
  stage: test
firefox:
  dependencies: *id002
  except: *id001
  image: registry.hub.docker.com/atlassianlabs/docker-node-jdk-chrome-firefox:latest
  retry: 2
  script:
  - ln -sf /usr/lib/firefox-esr/firefox-esr /usr/bin/firefox
  - /usr/bin/firefox --version
  - npm run e2e:build
  stage: test
image: node:17-alpine
install:
  artifacts:
    expire_in: 2 hrs
    paths:
    - node_modules/
  except: *id001
  retry: 2
  script:
  - npm run i
  - npm run e2e:install
  stage: install
pages:
  artifacts:
    paths:
    - lib/
    - public/
  dependencies: *id003
  except: *id001
  image: node:17
  only: *id004
  retry: 2
  script:
  - echo "deploying demo to gitlab pages"
  stage: deploy
publish:
  dependencies: *id003
  except: *id001
  image: node:17
  only: *id004
  retry: 2
  script:
  - npm run release
  stage: deploy
stages:
- install
- build
- test
- deploy
unit:
  artifacts:
    expire_in: 2 hrs
    paths:
    - public/
  dependencies:
  - build
  - install
  except: *id001
  retry: 2
  script:
  - npm run unit:ci
  - npm run copy:stats
  - npm run copy:coverage
  stage: test
