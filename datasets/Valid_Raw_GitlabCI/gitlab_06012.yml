before_script:
- bash ci/docker_install.sh > /dev/null
- curl -sS https://getcomposer.org/installer | php
- cp ci/custom_php.ini /usr/local/etc/php/conf.d/custom.ini
- php composer.phar install
test:7.1:
  image: php:7.1
  script:
  - phpunit --configuration phpunit.xml.dist
