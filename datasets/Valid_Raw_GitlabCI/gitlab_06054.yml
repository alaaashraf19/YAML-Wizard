image: ruby:2.3
test:
  only:
  - master
  script:
  - git config --global user.email "orta+dangersystems@artsy.net"
  - git config --global user.name "Danger.Systems"
  - apt-get update -yqqq
  - curl -sL https://deb.nodesource.com/setup_16.x | bash -
  - export NVM_DIR=$HOME_DIR/.nvm
  - export PROFILE=$HOME_DIR/.profile
  - apt-get install -y build-essential libssl-dev
  - curl -o- https://raw.githubusercontent.com/creationix/nvm/v0.33.4/install.sh |
    bash
  - source /root/.bashrc
  - nvm install 16
  - apt-get install -y apt-transport-https
  - curl -sS https://dl.yarnpkg.com/debian/pubkey.gpg | apt-key add -
  - echo "deb https://dl.yarnpkg.com/debian/ stable main" | tee /etc/apt/sources.list.d/yarn.list
  - apt-get update && apt-get install -y yarn
  - apt-get install -y pngquant
  - gem install bundler -v 1.15.4
  - bundle install
  - bundle update danger
  - export RUBYOPT='-E utf-8'
  - mkdir static/json_data
  - bundle exec rake generate
  - bundle install
  - cd static
  - bundle exec middleman build --clean --verbose
  - cd ..
  - mv static/build public
  - npm install netlify-cli -g
  - netlify deploy --site 83354caf-7886-446f-99eb-f91a58b2a682 --auth $NETLIFY_ACCESS_TOKEN
    --dir public
