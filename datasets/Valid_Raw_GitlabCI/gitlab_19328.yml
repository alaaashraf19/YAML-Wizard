before_script:
- bundle install
image: ruby:2.3
pages:
  artifacts:
    paths:
    - public
  only:
  - source
  script:
  - bundle exec jekyll build -d public
  stage: deploy
test:
  artifacts:
    paths:
    - test
  except:
  - source
  script:
  - bundle exec jekyll build -d test
  stage: test
variables:
  JEKYLL_ENV: production
