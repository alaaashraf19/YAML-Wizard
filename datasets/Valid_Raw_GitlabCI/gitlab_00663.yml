.extended_template:
  artifacts: &id001
    expire_in: 1 week
    name: ${CI_JOB_NAME}_${CI_COMMIT_REF_NAME}
    paths:
    - wheels/*.whl
    when: on_success
  retry: 1
  rules: &id002
  - if: $CI_COMMIT_TAG
  - if: $CI_COMMIT_BRANCH == "master"
  - if: $CI_PIPELINE_SOURCE == "web"
  - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  stage: build
.linux_aarch64_build_template:
  retry: 1
  rules: &id003
  - when: always
  stage: build
  tags: &id006
  - docker
  - aarch
.linux_aarch64_wheel_template:
  artifacts: *id001
  image: $LINUX_AARCH_IMAGE
  retry: 1
  rules: *id002
  stage: build
  tags: &id005
  - docker
  - aarch
.linux_x86_64_build_template:
  retry: 1
  rules: *id003
  stage: build
  tags: &id007
  - docker
  - gumlin
.linux_x86_64_wheel_template:
  artifacts: *id001
  image: $LINUX_64_IMAGE
  retry: 1
  rules: *id002
  stage: build
  tags: &id004
  - docker
  - gumlin
.macos_arm_build_template:
  artifacts: *id001
  cache: &id010
    key: aarch
    paths:
    - build/
  retry: 1
  rules: *id002
  stage: build
  tags: &id011
  - aarch
  - osx
.macos_build_template:
  artifacts: *id001
  cache: &id008
    key: macos
    paths:
    - build/
  retry: 1
  rules: *id002
  stage: build
  tags: &id009
  - macos
  - conda
.main_template:
  retry: 1
  rules: *id003
  stage: build
.windows_build_script: &id013
- powershell -File $WINDOWS_BUILD -CI_JOB_ID $CI_JOB_ID -CI_PROJECT_DIR $CI_PROJECT_DIR
  -CONDA_ENV $CONDA_ENV -TARGET $TARGET -COMPILER $COMPILER
.windows_build_template:
  artifacts: *id001
  cache: &id012
    key: mvsc
    paths:
    - build/
  retry: 1
  rules: *id002
  stage: build
  tags: &id014
  - gumwin
  - conda
.windows_wheel_script: &id015
- powershell -File $WINDOWS_WHEELHOUSE -CI_JOB_ID $CI_JOB_ID -CI_PROJECT_DIR $CI_PROJECT_DIR
  -CONDA_ENV $CONDA_ENV
build_doc:
  artifacts: *id001
  image: agrumery/ubuntu_py310
  retry: 1
  rules: *id002
  script:
  - bash $BUILD_DOC
  stage: build
  tags: *id004
linux_aarch64_nightly_wheel_py310:
  artifacts: *id001
  image: $LINUX_AARCH_IMAGE
  retry: 1
  rules: *id002
  script:
  - bash $LINUX_NIGHTLY_WHEELHOUSE cp310-cp310
  stage: build
  tags: *id005
linux_aarch64_wheel_py310:
  artifacts: *id001
  image: $LINUX_AARCH_IMAGE
  retry: 1
  rules: *id002
  script:
  - bash $LINUX_WHEELHOUSE cp310-cp310
  stage: build
  tags: *id005
linux_aarch64_wheel_py310_sabi_off:
  artifacts: *id001
  image: $LINUX_AARCH_IMAGE
  retry: 1
  rules: *id002
  script:
  - bash $LINUX_WHEELHOUSE cp310-cp310 --stable_abi_off
  stage: build
  tags: *id005
linux_agrum_aarch64:
  image: $LINUX_AARCH_IMAGE
  retry: 1
  rules: *id003
  script:
  - bash $LINUX_BUILD aGrUM cp310-cp310
  stage: build
  tags: *id006
linux_agrum_x86_64:
  image: $LINUX_64_IMAGE
  retry: 1
  rules: *id003
  script:
  - bash $LINUX_BUILD aGrUM cp310-cp310
  stage: build
  tags: *id007
linux_build:
  cache:
    key: linux
    paths:
    - build/
  image: agrumery/ubuntu
  only:
  - tags@agrumery/aGrUM
  retry: 1
  script:
  - apt-get install -y curl
  - curl -X POST -F token=${AGRUM_DEPLOY_TOKEN} -F ref=master -F "variables[AGRUM_TAG]=${CI_COMMIT_TAG}"
    -F "variables[AGRUM_BUILD]=1" -F "variables[DEPLOY_TO_PYPI]=TRUE" -F "variables[DEPLOY_DOC]=TRUE"  https://gitlab.com/api/v4/projects/4935470/trigger/pipeline
  stage: deploy
  tags:
  - docker
  - linux
linux_pyagrum_aarch64_py310:
  image: $LINUX_AARCH_IMAGE
  retry: 1
  rules: *id003
  script:
  - bash $LINUX_BUILD pyAgrum cp310-cp310
  stage: build
  tags: *id006
