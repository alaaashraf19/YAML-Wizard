before_script:
- apt-get update -y
- apt-get -y install g++-4.9
- export CXX=g++-4.9
image: erlang:19.3
test:
  artifacts:
    paths:
    - _build/test/logs
    - _build/test/cover
    when: always
  cache:
    paths:
    - _build/default/lib/rocksdb
    - _build/test/lib/rocksdb
  script:
  - make test cover
