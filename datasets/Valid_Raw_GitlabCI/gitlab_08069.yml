build:wasm32-unknown-unknown:
  before_script:
  - rustc -Vv && cargo -Vv
  - rustup target add wasm32-unknown-unknown
  image: rust:1.80
  script:
  - cargo test --no-run --target wasm32-unknown-unknown --all --features serde-serialize
  stage: test
check:x86_64-apple-darwin:
  before_script:
  - rustc -Vv && cargo -Vv
  - rustup target add x86_64-apple-darwin
  script:
  - cargo check --target=x86_64-apple-darwin --verbose --all --features serde-serialize
  stage: test
image: rust:1.80
prepare:lockfile:
  artifacts:
    paths:
    - Cargo.lock
  image: rust:1
  script:
  - CARGO_RESOLVER_INCOMPATIBLE_RUST_VERSIONS=fallback cargo generate-lockfile
  stage: .pre
test:i686-unknown-linux-gnu:
  before_script:
  - dpkg --add-architecture i386
  - apt-get update -yqq && apt-get install -yqq gcc-multilib libudev-dev libudev1:i386
    libudev-dev:i386
  - rustc -Vv && cargo -Vv
  - rustup target add i686-unknown-linux-gnu
  script:
  - cargo test --verbose --target=i686-unknown-linux-gnu --lib --features serde-serialize
  stage: test
  variables:
    PKG_CONFIG_ALLOW_CROSS: '1'
test:x86_64-unknown-linux-gnu:
  before_script:
  - apt-get update -yqq && apt-get install -yqq libudev-dev
  - apt-get install -yqq libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libspeechd-dev
    libxkbcommon-dev libssl-dev
  - rustc -Vv && cargo -Vv
  script:
  - cargo test --verbose --all --features serde-serialize
  stage: test
variables:
  CARGO_HOME: $CI_PROJECT_DIR/cargo
  GIT_SUBMODULE_STRATEGY: normal
