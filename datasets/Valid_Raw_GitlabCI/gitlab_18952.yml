before_script:
- mkdir -p ~/catkin_ws/src
- pwd
- cd ~/catkin_ws/src
- if [ ! -f CMakeLists.txt ]; then catkin_init_workspace; else echo "CMakeList file
  already there";fi
- ls -a
- echo $CI_SOURCE_PATH
- pwd
- if [ ! -f .rosinstall ]; then wstool init; else echo "rosinstall file already there";fi
- if [ -f $CI_PROJECT_NAME ]; then rm $CI_PROJECT_NAME; else echo "no past symlink";fi
- cd ~/catkin_ws/src
- if [ ! -f .rosinstall ]; then wstool init; else echo "rosinstall file already there";fi
- if [[ -f $ROSINSTALL_FILE ]] ; then wstool merge $ROSINSTALL_FILE ; fi
- wstool up
- cd ~/catkin_ws/src/space_robotics_challenge
- git submodule update --init --recursive
- ls -a
indigo-master:
  artifacts:
    paths:
    - public
  only:
  - master
  script:
  - source /opt/ros/$ROS_DISTRO/setup.bash
  - cd ~/catkin_ws
  - rm -rf devel/ build/
  - catkin_make $( [ -f $CATKIN_OPTIONS ] && cat $CATKIN_OPTIONS )
  - source devel/setup.bash
  - catkin_make
  stage: build
  tags:
  - ros
variables:
  CI_SOURCE_PATH: $CI_PROJECT_DIR
  ROS_DISTRO: indigo
  ROS_PARALLEL_JOBS: -j8 -l6
