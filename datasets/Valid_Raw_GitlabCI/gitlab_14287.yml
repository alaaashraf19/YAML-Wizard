before_script:
- apt-get install -y git
- git submodule init
- git submodule update
image: elecnix/ikiwiki
pages:
  artifacts:
    paths:
    - public
  rules:
  - if: $CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH
  script:
  - ikiwiki --setup ikiwiki.setup --libdir themes/ikistrap/lib
  stage: deploy
test:
  rules:
  - if: $CI_COMMIT_REF_NAME != $CI_DEFAULT_BRANCH
  script:
  - ikiwiki --setup ikiwiki.setup --libdir themes/ikistrap/lib
  stage: test
