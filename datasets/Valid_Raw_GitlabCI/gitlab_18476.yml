.build:
  artifacts:
    name: $CI_JOB_NAME
    paths:
    - '*.apk'
  stage: build
.build-script: &id001
- mkdir build
- cd build
- '/opt/libraries/bin/qt-cmake .. -DCMAKE_PREFIX_PATH=/opt/libraries -DCMAKE_BUILD_TYPE=$BUILD_TYPE
  -DAPI_PASSWORD="$API_PASSWORD" -G Ninja

  '
- ninja
build_debug:
  extends: .build
  script:
  - *id001
  - cp src/android-build/pipboy.apk ../PipBoy-$CI_COMMIT_REF_SLUG-debug.apk
  variables:
    BUILD_TYPE: Debug
build_release:
  extends: .build
  script:
  - *id001
  - '/opt/android-sdk-linux/build-tools/35.0.0/apksigner sign --ks ../android/android_release.keystore
    --ks-pass env:KEYSTORE_PASSWORD src/android-build/pipboy.apk

    '
  - cp src/android-build/pipboy.apk ../PipBoy-$CI_COMMIT_REF_SLUG.apk
  variables:
    BUILD_TYPE: Release
image: registry.gitlab.com/multiversechronicles/zax/zax-qt:master
stages:
- build
- test
