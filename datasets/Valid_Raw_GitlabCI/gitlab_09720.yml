before_script:
- yarn install
build:
  artifacts:
    paths:
    - dist/
  only:
  - tags
  - master
  script:
  - npm run build
  stage: build
cache:
  paths:
  - node_modules/
docs:
  artifacts:
    paths:
    - public/
  only:
  - tags
  - master
  script:
  - npm run docs
  stage: build
image: griest/karma-full-test-env:latest
pages:
  artifacts:
    paths:
    - public/
  dependencies:
  - test
  - docs
  only:
  - master
  script:
  - echo Building Pages
  stage: deploy
publish:
  dependencies:
  - build
  - docs
  - test
  only:
  - tags
  script:
  - echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
  - npm publish
  stage: deploy
stages:
- build
- test
- deploy
test:
  artifacts:
    paths:
    - public/
  script:
  - ./node_modules/.bin/cross-env FD_PASS=$FD_PASS npm run test -- --single-run --browsers
    Chrome
  - mv public/reports/lcov-report public/reports/coverage
  stage: test
