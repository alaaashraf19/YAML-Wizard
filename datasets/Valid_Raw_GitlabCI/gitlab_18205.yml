Python:3.9:
  coverage: /^TOTAL.+?(\d+\%)$/
  script:
  - mkdir $TMPDIR
  - make install-python
  - make prepare
  - make tests
  stage: tests
before_script:
- apt-get update && apt-get install -y python3 python3-pip python3-venv
- pip install --upgrade pip setuptools wheel green twine
- "if [[ $CI_JOB_ID != \"\" ]]; then\n    sed -i -e \"s/version.*/version = $CI_JOB_ID/\"\
  \ setup.cfg\nfi"
- "if [[ $CI_COMMIT_TAG != \"\" ]]; then\n    sed -i -e \"s/version.*/version = $CI_COMMIT_TAG/\"\
  \ setup.cfg\nfi"
cache:
  paths:
  - .cache/pip
deploy_production:
  before_script:
  - pip install --upgrade pip setuptools wheel twine
  image: python:latest
  only:
  - tags
  script:
  - mkdir $TMPDIR
  - python setup.py sdist
  - twine upload --repository-url $PRODUCTION_REPOSITORY_URL dist/*
  stage: publish
  variables:
    TERM: linux
    TWINE_PASSWORD: $PRODUCTION_PASSWORD
    TWINE_USERNAME: $PRODUCTION_USERNAME
deploy_staging:
  before_script:
  - pip install --upgrade pip setuptools wheel twine
  except:
  - tags
  image: python:latest
  script:
  - mkdir $TMPDIR
  - python setup.py sdist
  - twine upload --repository-url $STAGING_REPOSITORY_URL dist/*
  stage: publish
  variables:
    TERM: linux
    TWINE_PASSWORD: $STAGING_PASSWORD
    TWINE_USERNAME: $STAGING_USERNAME
documentations:
  except:
  - tags
  script:
  - mkdir $TMPDIR
  - make install-python
  - make prepare
  - make docs
  stage: documentations
image: python:3.9
stages:
- tests
- publish
- documentations
variables:
  PIP_CACHE_DIR: $CI_PROJECT_DIR/.cache/pip
  TERM: xterm-256color
  TERMINFO: /etc/terminfo
  TMPDIR: $CI_PROJECT_DIR/tmp
