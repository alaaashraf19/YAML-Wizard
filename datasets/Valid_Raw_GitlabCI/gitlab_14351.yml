deploy:
  dependencies: []
  environment:
    name: production
    url: https://docs.pashinin.com
  image: curlimages/curl:7.75.0
  only:
  - master
  script:
  - curl --fail -L -H "Content-Type:application/json" -H "DEPLOY_TOKEN:$DEPLOY_TOKEN"
    --data "{\"project_url\":\"$CI_PROJECT_URL\",\"tag\":\"$CI_COMMIT_TAG\"}" https://api.pashinin.com/deploy
  stage: deploy
  variables:
    GIT_STRATEGY: none
docker image:
  before_script:
  - docker login -u gitlab-ci-token -p $CI_JOB_TOKEN registry.gitlab.com
  cache: null
  only:
  - master
  script:
  - docker build --tag $IMAGE_LATEST .
  - docker push $IMAGE_LATEST
  services:
  - docker:dind
  stage: build
image: docker:stable
stages:
- build
- deploy
variables:
  IMAGE_LATEST: $CI_REGISTRY_IMAGE:latest
