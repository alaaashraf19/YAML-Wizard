after_script:
- ls -l
before_script:
- ls -l
- mkdir bin
- export PATH=$PATH:/usr/local/go/bin
build_cliotesky:
  artifacts:
    name: ClioteSky_${CI_JOB_NAME}_${CI_COMMIT_REF_NAME}
    paths:
    - bin/
    untracked: false
  script:
  - go get google.golang.org/grpc
  - go get github.com/BurntSushi/toml
  - ./buildEverything.sh .
