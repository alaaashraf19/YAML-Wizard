before_script:
- ln -s $PWD data/xonotic-data.pk3dir
- export MAKEFLAGS=-j$(nproc); echo MAKEFLAGS=$MAKEFLAGS
- export CC="gcc -pipe"
- "if wget -nv https://beta.xonotic.org/pipeline-bin/gmqcc ; then\n  export QCC=\"\
  $PWD/gmqcc\"\n  chmod +x \"$QCC\"\nelse\n  git clone --depth=1 --branch=main https://gitlab.com/xonotic/gmqcc.git\
  \ gmqcc\n  make -C gmqcc || exit 1\n  export QCC=\"$PWD/gmqcc/gmqcc\"\nfi\n"
- export QCCFLAGS_WATERMARK=gitlab_pipeline
- export ZIP=/bin/true
test_compilation_units:
  rules:
  - changes:
    - qcsrc/**/*
  script:
  - "if ! make test-diff ; then\n  printf \"\\e[31m %s \\e[0m\\n\" \"Previous script\
    \ in the pipeline produced a change.\"\n  printf \"\\e[31m %s \\e[0m\\n\" \"This\
    \ is treated as a test failure.\"\n  printf \"\\e[31m %s \\e[0m\\n\" \"Please\
    \ run 'make test-diff' locally\"\n  printf \"\\e[31m %s \\e[0m\\n\" \"and address\
    \ the changes somehow in a commit.\"\n  exit 1\nfi\n"
  - make test-comp
  stage: test
test_sv_game:
  script:
  - export EXPECT=5c34854fb0d99f06ffa76929f5008f1f
  - qcsrc/tools/sv_game-hashtest.sh
  - exit $?
  stage: test
workflow:
  rules:
  - if: $CI_COMMIT_MESSAGE =~ /Transifex autosync/
    when: never
  - when: always
