build:
  artifacts:
    paths:
    - dist
    - page
  image: node
  only:
  - master
  script:
  - apt-get update
  - apt-get install -y rpm
  - npm install
  - npm run build
  stage: build
pages:
  artifacts:
    paths:
    - public
  dependencies:
  - build
  image: node
  needs:
  - build
  only:
  - master
  script:
  - mkdir .public
  - cp -r page/* .public
  - mv .public public
  stage: deploy
publish_snap:
  dependencies:
  - build
  image: ubuntu:18.04
  needs:
  - build
  only:
  - master
  script:
  - apt-get update -qy
  - apt-get install -y snapcraft
  - echo $SNAPCRAFT_LOGIN_FILE | base64 --decode --ignore-garbage > snapcraft.login
  - snapcraft login --with snapcraft.login
  - snapcraft push dist/*.snap --release edge
  stage: deploy
