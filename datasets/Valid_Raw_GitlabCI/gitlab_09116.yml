.docker_tag:
  dependencies:
  - go build
  image: docker:stable
  script:
  - docker info
  - docker login -u gitlab-ci-token -p $CI_JOB_TOKEN $CI_REGISTRY
  - export SOURCE_IMAGE=$TMP_IMAGE
  - export TARGET_IMAGE=$CI_REGISTRY_IMAGE:${IMAGE_TAG:-$CI_JOB_NAME}
  - docker pull $SOURCE_IMAGE
  - docker tag $SOURCE_IMAGE $TARGET_IMAGE
  - docker push $TARGET_IMAGE
  stage: tag
.go:
  image: golang:1.13.6
  stage: go
.qa-downstream-ds:
  stage: downstream
  trigger:
    branch: master
    project: ''
    strategy: depend
  variables:
    CONTAINER_SCANNING_DISABLED: 'true'
    DAST_DISABLED: 'true'
    DS_DISABLE_DIND: 'false'
    LICENSE_MANAGEMENT_DISABLED: 'true'
    SAST_DISABLED: 'true'
    SP_VERSION: tmp.$CI_COMMIT_SHA
.release:
  extends: .docker_tag
  only:
  - tags
  stage: deploy
11-10-stable:
  extends: .release
11-11-stable:
  extends: .release
11-7-stable:
  extends: .release
11-8-stable:
  extends: .release
11-9-stable:
  extends: .release
12-0-stable:
  extends: .release
12-1-stable:
  extends: .release
12-10-stable:
  extends: .release
12-2-stable:
  extends: .release
12-3-stable:
  extends: .release
12-4-stable:
  extends: .release
12-5-stable:
