  trigger:
    project: gitlab-org/security-products/tests/scala-sbt
services:
- docker:stable-dind
stages:
- go
- build
- test
- downstream
- tag
- deploy
tag branch:
  except:
  - master
  extends: .docker_tag
  only:
  - branches
  variables:
    IMAGE_TAG: $CI_COMMIT_REF_NAME
tag edge:
  extends: .docker_tag
  only:
  - master
  variables:
    IMAGE_TAG: edge
tag version:
  before_script:
  - export IMAGE_TAG=${CI_COMMIT_TAG/v/}
  - echo "Checking that $CI_COMMIT_TAG is last in the changelog"
  - test "$(grep '^## v' CHANGELOG.md |head -n 1)" = "## $CI_COMMIT_TAG"
  extends: .docker_tag
  only:
  - tags
  when: manual
variables:
  DOCKER_DRIVER: overlay2
  DS_DEFAULT_ANALYZERS: bundler-audit,retire.js,gemnasium,gemnasium-maven,gemnasium-python
  MAJOR: 2
  TMP_IMAGE: $CI_REGISTRY_IMAGE:tmp.$CI_COMMIT_SHA
