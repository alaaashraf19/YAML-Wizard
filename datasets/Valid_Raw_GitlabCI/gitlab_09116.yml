  extends: .release
build commit:
  image: docker:stable
  script:
  - docker info
  - docker login -u gitlab-ci-token -p $CI_JOB_TOKEN $CI_REGISTRY
  - docker build -t $TMP_IMAGE --build-arg DS_ANALYZER_IMAGE_TAG=$MAJOR .
  - docker push $TMP_IMAGE
  stage: build
container_scanning:
  variables:
    CI_APPLICATION_REPOSITORY: $CI_REGISTRY_IMAGE
    CI_APPLICATION_TAG: tmp.$CI_COMMIT_SHA
go build:
  artifacts:
    paths:
    - dependency-scanning
  extends: .go
  script:
  - go get ./...
  - go build -o ${CI_PROJECT_DIR}/dependency-scanning
  variables:
    CGO_ENABLED: 0
go lint:
  extends: .go
  script:
  - go get -u golang.org/x/lint/golint
  - golint -set_exit_status
go test:
  extends: .go
  script:
  - go get ./...
  - go test -race -cover -v ./...
go-modules-qa:
  extends: .qa-downstream-ds
  trigger:
    project: gitlab-org/security-products/tests/go-modules
include:
- template: SAST.gitlab-ci.yml
- template: Container-Scanning.gitlab-ci.yml
- template: License-Management.gitlab-ci.yml
integration test:
  dependencies:
  - go build
  image: docker:stable
  script:
  - ./test.sh
  stage: test
  variables:
    DS_ANALYZER_IMAGE_TAG: $MAJOR
java-gradle-multimodules-qa:
  extends: .qa-downstream-ds
  trigger:
    project: gitlab-org/security-products/tests/java-gradle-multimodules
java-gradle-qa:
  extends: .qa-downstream-ds
  trigger:
    project: gitlab-org/security-products/tests/java-gradle
