build_image:
  image: docker:git
  only:
  - master
  script:
  - docker login -u gitlab-ci-token -p $CI_BUILD_TOKEN registry.gitlab.com
  - docker build -t registry.gitlab.com/living-map/frontend-builder .
  - docker push registry.gitlab.com/living-map/frontend-builder:latest
  services:
  - docker:dind
