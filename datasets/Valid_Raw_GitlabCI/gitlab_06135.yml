pages:
  artifacts:
    paths:
    - public
  image: debian
  script:
  - mkdir -p public
  - cp .local/bin/bootstrap public/
  stage: deploy
  tags:
  - docker
test-bootstrap:
  image: debian
  only:
  - master
  script:
  - rm -rf * || true
  - rm -rf .* || true
  - apt-get update && apt-get install --yes curl git grep
  - curl https://gitlab.com/datenstrom/home/raw/master/.local/bin/bootstrap | bash
  stage: test
  tags:
  - docker
