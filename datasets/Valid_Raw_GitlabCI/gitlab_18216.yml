cache:
  paths:
  - .m2/repository
  - target/
compile:
  script:
  - mvn $MAVEN_CLI_OPTS clean compile
  stage: compile
deploy:
  only:
  - master
  script:
  - mvn $MAVEN_CLI_OPTS -Djga.version=1.0.0.2 deploy
  stage: deploy
deploy-snapshot:
  only:
  - development
  script:
  - mvn $MAVEN_CLI_OPTS -Djga.version=1.0.0.2-SNAPSHOT deploy
  stage: deploy
image: maven:latest
pages:
  artifacts:
    paths:
    - public
  only:
  - master
  - development
  script:
  - mvn $MAVEN_CLI_OPTS -B site
  - mv target/site/apidocs public/
  stage: deploy
stages:
- compile
- static-analysis
- test
- deploy
static-analysis:
  script:
  - mvn $MAVEN_CLI_OPTS -B test-compile checkstyle:check
  - mvn $MAVEN_CLI_OPTS -B pmd:check
  stage: static-analysis
test:
  artifacts:
    expire_in: 30 days
    paths:
    - target/surefire-reports
    - target/site/jacoco
    reports:
      junit:
      - target/surefire-reports/TEST-*.xml
  coverage: /(\d+.\d+ \%) covered/
  script:
  - mvn $MAVEN_CLI_OPTS -B install
  - awk -F"," '{ instructions += $4 + $5; covered += $5 } END { print covered, "/",
    instructions, "instructions covered"; print 100*covered/instructions, "% covered"
    }' target/site/jacoco/jacoco.csv
  stage: test
variables:
  MAVEN_CLI_OPTS: -s .m2/settings.xml --batch-mode
  MAVEN_OPTS: -Dmaven.repo.local=.m2/repository
