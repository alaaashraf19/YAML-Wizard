.BoK Dry Run:
  script:
  - for bok in applications/*.y*l ; do (echo "${bold}Testing $bok$\n{normal}" && mu-deploy
    -d $bok); done
  stage: Smoke Test
  tags:
  - mu-master
Berks:
  script:
  - apt-get -qq update
  - apt-get -qq install git -y
  - rm -rf Berksfile.lock
  - berks install
  - berks verify
  - berks outdated
  stage: Test
ChefSpec:
  script:
  - chef gem install docker-api --version '= 1.34.0'
  - for d in ./cookbooks/*/ ; do (echo "${bold}Testing $d$\n{normal}" && cd "$d" &&
    chef exec rspec --force-color -fd); done
  stage: Test
Cookstyle:
  script:
  - cookstyle cookbooks/
  stage: Lint
Foodcritic:
  script:
  - foodcritic cookbooks/
  stage: Lint
Foodcritic Deprecations:
  script:
  - foodcritic cookbooks/ -t deprecated -t chef13 -t chef14 -t chef15
  stage: Lint
New_Berks:
  script:
  - apt-get -qq update
  - apt-get -qq install git -y
  - for d in ./cookbooks/*/ ; do (cd "$d" && berks install); done
  - for d in ./cookbooks/*/ ; do (cd "$d" && berks verify); done
  - for d in ./cookbooks/*/ ; do (cd "$d" && berks outdated); done
  stage: Test
Rubocop:
  script:
  - rubocop utils/
  stage: Lint
image: chef/chefdk:latest
stages:
- Lint
- Test
- Smoke Test
variables:
  CHEF_LICENSE: accept
