cache:
  paths:
  - ~/.cache
image: docker:stable
services:
- docker:dind
stages:
- test
test:
  coverage: /TOTAL.+ ([0-9]{1,3}%)/
  image: registry.gitlab.com/alex-oleshkevich/base-python:latest
  script:
  - pip install -e .
  - cd __testproject/
  - coverage run ./manage.py test arasari --no-input
  - coverage report
  stage: test
  variables:
    DJANGO_SETTINGS_MODULE: sample.settings
