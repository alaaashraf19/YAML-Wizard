.build_template:
  artifacts: &id001
    expire_in: 4 hours
    paths:
    - meetu-android/app/build/outputs/
    - .android/
  before_script: &id002
  - export ANDROID_COMPILE_SDK=`egrep '^[[:blank:]]+compileSdkVersion'  meetu-android/app/build.gradle
    | awk '{print $2}'`
  - echo $ANDROID_COMPILE_SDK
  - wget --output-document=/tmp/sdk-tools-linux.zip https://dl.google.com/android/repository/sdk-tools-linux-3859397.zip
  - unzip /tmp/sdk-tools-linux.zip -d .android
  - export ANDROID_HOME=$PWD/.android
  - export PATH=$PATH:$PWD/.android/platform-tools/
  - echo y | .android/tools/bin/sdkmanager "platforms;android-${ANDROID_COMPILE_SDK}"
  - chmod +x meetu-android/gradlew
  - cd meetu-android
  stage: build
.package_template:
  before_script: &id003
  - export VERSION_NAME=`egrep '^[[:blank:]]+versionName[[:blank:]]'  meetu-android/app/build.gradle
    | awk '{print $2}' | sed s/\"//g`
  - export VERSION_CODE=`egrep '^[[:blank:]]+versionCode[[:blank:]]'  meetu-android/app/build.gradle
    | awk '{print $2}'`
  - cd meetu-android
  - mkdir -p deliverables
  - touch ./deliverables/info.txt
  - echo "Build date          $(date)"                >> ./deliverables/info.txt
  - echo "App version name    ${VERSION_NAME}"        >> ./deliverables/info.txt
  - echo "App version code    ${VERSION_CODE}"        >> ./deliverables/info.txt
  - echo "Git branch          ${CI_COMMIT_REF_NAME}"  >> ./deliverables/info.txt
  - echo "Git commit          ${CI_COMMIT_SHA}"       >> ./deliverables/info.txt
  - echo "Gitlab pipeline     ${CI_PIPELINE_ID}"      >> ./deliverables/info.txt
  stage: package
.unit_test_template:
  artifacts: &id004
    paths:
    - meetu-android/codeCoverageReport
  before_script: &id005
  - export MINIMUM_COVERAGE=100
  - export ANDROID_HOME=$PWD/.android
  - export PATH=$PATH:$PWD/.android/platform-tools/
  - apt-get update
  - apt-get install bc
  - cd meetu-android
  stage: test
build_debug:
  artifacts: *id001
  before_script: *id002
  except:
  - master
  script:
  - ./gradlew assembleDebug
  stage: build
build_release:
  artifacts: *id001
  before_script: *id002
  only:
  - master
  script:
  - ./gradlew assembleRelease
  stage: build
deploy_production:
  only:
  - master
  script:
  - apt-get update -qy
  - apt-get install -y ruby-dev
  - gem install dpl
  - dpl --provider=heroku --app=meetu-backend --api-key=$HEROKU_API_KEY
  stage: package
deploy_staging:
  only:
  - sit_uat
  script:
  - apt-get update -qy
  - apt-get install -y ruby-dev
  - gem install dpl
  - dpl --provider=heroku --app=meetu-backend-dev --api-key=$HEROKU_API_KEY
  stage: package
image: openjdk:8-jdk
package_develop:
  artifacts:
    expire_in: 3 days
    paths:
    - meetu-android/deliverables
  before_script: *id003
  environment: development
  only:
  - sit_uat
  script:
  - mv app/build/outputs/apk/debug/app-debug.apk ./deliverables/MeetU-v$VERSION_NAME-$VERSION_CODE-debug.apk
  stage: package
package_release:
  artifacts:
    expire_in: 4 weeks
    paths:
    - meetu-android/deliverables
  before_script: *id003
  environment: production
  only:
  - master
  script:
  - mv app/build/outputs/apk/release/app-release.apk ./deliverables/MeetU-v$VERSION_NAME-$VERSION_CODE-release.apk
  stage: package
stages:
- build
- test
- package
unit_test_android_debug:
  artifacts: *id004
  before_script: *id005
  except:
  - master
  script:
  - test `./gradlew lint | grep "0 issues" | wc -l` = `./gradlew lint | grep "issues"
    | wc -l`
  - ./gradlew clean test jacocoTestReport --stacktrace
  - mv app/build/reports/jacoco/jacocoTestReport ./codeCoverageReport
  - MISSED_COUNT=`cat ./codeCoverageReport/jacocoTestReport.xml | grep -Po '<counter
    type="INSTRUCTION"[^>]*>' | tail -n 1 | cut -d '"' -f 4`
  - COVERED_COUNT=`cat ./codeCoverageReport/jacocoTestReport.xml | grep -Po '<counter
    type="INSTRUCTION"[^>]*>' | tail -n 1 | cut -d '"' -f 6`
  - COVERAGE=`bc -l <<< "100.0 * $COVERED_COUNT / ( $MISSED_COUNT + $COVERED_COUNT
    )"`
  - 'echo "Code coverage result: ($(printf "%.2f" $COVERAGE)%) covered from minimum
    of $MINIMUM_COVERAGE%"'
  stage: test
unit_test_android_release:
  artifacts: *id004
  before_script: *id005
  only:
  - master
  script:
  - test `./gradlew lint | grep "0 issues" | wc -l` = 2
  - ./gradlew clean test jacocoTestReport --stacktrace
  - mv app/build/reports/jacoco/jacocoTestReport ./codeCoverageReport
  - MISSED_COUNT=`cat ./codeCoverageReport/jacocoTestReport.xml | grep -Po '<counter
    type="INSTRUCTION"[^>]*>' | tail -n 1 | cut -d '"' -f 4`
  - COVERED_COUNT=`cat ./codeCoverageReport/jacocoTestReport.xml | grep -Po '<counter
    type="INSTRUCTION"[^>]*>' | tail -n 1 | cut -d '"' -f 6`
  - COVERAGE=`bc -l <<< "100.0 * $COVERED_COUNT / ( $MISSED_COUNT + $COVERED_COUNT
    )"`
  - 'echo "Code coverage result: ($(printf "%.2f" $COVERAGE)%) covered from minimum
    of $MINIMUM_COVERAGE%"'
  - test `bc <<< "$COVERAGE>=$MINIMUM_COVERAGE"` = 1
  stage: test
unit_test_backend_debug:
  except:
  - master
  image: python:3.5
  script:
  - export MINIMUM_COVERAGE=100
  - pip install -r requirements.txt
  - cd meetu-backend
  - coverage run manage.py test meetu_backend.tests
  - COVERAGE=`coverage report | tail -n 1 | rev | cut -d ' ' -f 1 | rev | cut -d '%'
    -f 1`
  - 'echo "Code coverage result: ($(printf "%.2f" $COVERAGE)%) covered from minimum
    of $MINIMUM_COVERAGE%"'
  stage: test
unit_test_backend_release:
  before_script:
  - apt-get update
  - apt-get install bc
  image: python:3.5
  only:
  - master
  script:
  - export MINIMUM_COVERAGE=100
  - pip install -r requirements.txt
  - cd meetu-backend
  - coverage run manage.py test meetu_backend.tests
  - COVERAGE=`coverage report | tail -n 1 | rev | cut -d ' ' -f 1 | rev | cut -d '%'
    -f 1`
  - 'echo "Code coverage result: ($(printf "%.2f" $COVERAGE)%) covered from minimum
    of $MINIMUM_COVERAGE%"'
  - test `bc <<< "$COVERAGE>=$MINIMUM_COVERAGE"` = 1
  stage: test
variables:
  ANDROID_HOME: ./android-sdk-linux
  ANDROID_SDK_TOOLS_CHECKSUM: 444e22ce8ca0f67353bda4b85175ed3731cae3ffa695ca18119cbacef1c1bea0
  ANDROID_SDK_TOOLS_VERSION: https://dl.google.com/android/repository/sdk-tools-linux-3859397.zip
