trace-pipeline:
  extends:
  - .with-bundle
  - .common-ci-tokens
  retry: 1
  rules:
  - if: $TRACE_PIPELINE
    start_in: 5 seconds
    when: delayed
  script:
  - bundle exec rake "trace:pipeline_url[$PIPELINE_URL,$SERVICE_NAME]"
  stage: automation
  variables:
    GITLAB_O11Y_URL: https://observe.gitlab.com/v3/9970/430285/ingest/traces
