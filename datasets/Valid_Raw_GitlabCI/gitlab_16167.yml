.build_image_template:
  before_script:
  - dnf install -qy diffutils
  - uname -a
  - cat /etc/os-release
  - echo "SAMBA_CI_CONTAINER_REGISTRY[${SAMBA_CI_CONTAINER_REGISTRY}]"
  - echo "SAMBA_CI_CONTAINER_TAG[${SAMBA_CI_CONTAINER_TAG}]"
  - echo "SAMBA_CI_IS_BROKEN_IMAGE[${SAMBA_CI_IS_BROKEN_IMAGE}]"
  - echo "SAMBA_CI_REBUILD_IMAGES[${SAMBA_CI_REBUILD_IMAGES}]"
  - echo "SAMBA_CI_REBUILD_BROKEN_IMAGES[${SAMBA_CI_REBUILD_BROKEN_IMAGES}]"
  - echo "GITLAB_USER_LOGIN[${GITLAB_USER_LOGIN}]"
  - echo "${SAMBA_CI_CONTAINER_TAG}" > /tmp/sha1sum-tag.txt
  - diff -u bootstrap/sha1sum.txt /tmp/sha1sum-tag.txt
  image: quay.io/podman/stable:latest
  only:
    variables:
    - $SAMBA_CI_REBUILD_IMAGES == "yes"
  script: "set -xueo pipefail\nci_image_name=samba-ci-${CI_JOB_NAME}\npodman build\
    \ --platform ${SAMBA_CI_PLATFORM} --tag ${ci_image_name} --build-arg SHA1SUM=${SAMBA_CI_CONTAINER_TAG}\
    \ bootstrap/generated-dists/${CI_JOB_NAME}\nci_image_path=\"${SAMBA_CI_CONTAINER_REGISTRY}/${ci_image_name}\"\
    \ntimestamp=$(date +%Y%m%d%H%M%S)\ncontainer_hash=$(podman image inspect --format='{{\
    \ .Id }}' ${ci_image_name} | cut -c 1-9)\ntimestamp_tag=${SAMBA_CI_CONTAINER_TAG}-${timestamp}-${GITLAB_USER_LOGIN}-${container_hash}\n\
    samba_repo_root=/home/samba/samba\n# Ensure we are generating the correct container\
    \ that we expect to be in\necho \"${SAMBA_CI_CONTAINER_TAG}\" > /tmp/sha1sum-tag.txt\n\
    diff -u bootstrap/sha1sum.txt /tmp/sha1sum-tag.txt\npodman run --volume $(pwd):${samba_repo_root}\
    \ --workdir ${samba_repo_root} ${ci_image_name} \\\n    /bin/bash -c \"echo \\\
    \"${SAMBA_CI_CONTAINER_TAG}\\\" > /tmp/sha1sum-tag.txt; diff -u bootstrap/sha1sum.txt\
    \ /tmp/sha1sum-tag.txt\"\npodman run --volume $(pwd):${samba_repo_root} --workdir\
    \ ${samba_repo_root} ${ci_image_name} \\\n    diff -u bootstrap/sha1sum.txt /sha1sum.txt\n\
    podman run --volume $(pwd):${samba_repo_root} --workdir ${samba_repo_root} ${ci_image_name}\
    \ \\\n    bootstrap/template.py --sha1sum > /tmp/sha1sum-template.txt\ndiff -u\
    \ bootstrap/sha1sum.txt /tmp/sha1sum-template.txt\n# run smoke test with samba-o3\
    \ or samba-fuzz\npodman run --volume $(pwd):/src:ro ${ci_image_name} \\\n    /bin/bash\
    \ -c \"git config --global --add safe.directory /src/.git && git clone /src samba\
    \ && cd samba && export PKG_CONFIG_PATH=/usr/lib64/compat-gnutls34/pkgconfig:/usr/lib64/compat-nettle32/pkgconfig\
    \ && script/autobuild.py ${SAMBA_CI_TEST_JOB} --verbose --nocleanup --keeplogs\
    \ --tail --testbase /tmp/samba-testbase\"\npodman tag ${ci_image_name} ${ci_image_path}:${SAMBA_CI_CONTAINER_TAG}\n\
    podman tag ${ci_image_name} ${ci_image_path}:${timestamp_tag}\n# We build all\
    \ images, but only upload is it's not marked as broken\ntest x\"${SAMBA_CI_IS_BROKEN_IMAGE}\"\
    \ = x\"yes\" || { \\\n    podman login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD\
    \ $CI_REGISTRY; \\\n    podman push ${ci_image_path}:${SAMBA_CI_CONTAINER_TAG};\
    \ \\\n    podman push ${ci_image_path}:${timestamp_tag}; \\\n}\necho \"Success\
    \ for ${ci_image_path}:${timestamp_tag}\"\ntest x\"${SAMBA_CI_IS_BROKEN_IMAGE}\"\
    \ = x\"no\" || { \\\n     echo \"The image ${CI_JOB_NAME} is marked as broken\
    \ and should have failed!\"; \\\n     echo \"Replace .build_image_template_force_broken\
    \ with .build_image_template!\"; \\\n     echo \"Add a .samba-o3-template section\
    \ at the end of the main .gitlab-ci.yml!\"; \\\n     /bin/false; \\\n}\n"
  stage: images
  tags:
  - saas-linux-small-amd64
  variables:
    SAMBA_CI_IS_BROKEN_IMAGE: 'no'
    SAMBA_CI_PLATFORM: linux/amd64
    SAMBA_CI_TEST_JOB: samba-o3
.build_image_template_force_broken:
  extends: .build_image_template
  only:
    variables:
    - $SAMBA_CI_REBUILD_BROKEN_IMAGES == "yes"
  variables:
    SAMBA_CI_IS_BROKEN_IMAGE: 'yes'
centos9s:
  extends: .build_image_template
debian11:
  extends: .build_image_template
debian11-32bit:
  extends: .build_image_template
  variables:
    SAMBA_CI_PLATFORM: linux/i386
    SAMBA_CI_TEST_JOB: samba-32bit
debian12:
  extends: .build_image_template
fedora42:
  extends: .build_image_template
opensuse155:
  extends: .build_image_template
rocky8:
  extends: .build_image_template
ubuntu2004:
  extends: .build_image_template
ubuntu2204:
  extends: .build_image_template
ubuntu2404:
  extends: .build_image_template
