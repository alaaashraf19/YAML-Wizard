build:
  artifacts:
    paths:
    - helloworld
  before_script:
  - apt update && apt -y install make autoconf gcc g++
  script:
  - g++ -Wall --coverage -fprofile-arcs -ftest-coverage helloworld.cpp -o helloworld
  - ls
  stage: build
coverage:
  before_script:
  - apt-get -qq update && apt-get -qq install -y make autoconf gcc g++ gcovr ggcov
    lcov
  script:
  - ls
  - g++ -Wall -fprofile-arcs -ftest-coverage -fPIC helloworld.cpp -o helloworld
  - ./helloworld
  - gcovr -r .
  stage: deploy
image: ubuntu:16.04
test:
  script:
  - bash verify.sh
  stage: test
