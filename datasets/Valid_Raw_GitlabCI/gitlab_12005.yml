before_script:
- docker version
- docker info
- docker login -u gitlab-ci-token -p $CI_BUILD_TOKEN registry.gitlab.com
build:devserver:
  script:
  - docker build -t $GL_CONTAINER/devserver:$CI_PIPELINE_ID -f docker/Dockerfile_devserver
    .
  - docker push $GL_CONTAINER/devserver:$CI_PIPELINE_ID
  stage: build
build:e2e:
  script:
  - docker build -t $GL_CONTAINER/e2e:$CI_PIPELINE_ID -f docker/Dockerfile_e2e .
  - docker push $GL_CONTAINER/e2e:$CI_PIPELINE_ID
  stage: build
build:wasm:
  script:
  - docker build -t $GL_CONTAINER/wasm:$CI_PIPELINE_ID -f docker/Dockerfile_wasm .
  - docker push $GL_CONTAINER/wasm:$CI_PIPELINE_ID
  stage: build
cache:
  key: $CI_PIPELINE_ID
  untracked: true
deploy:
  before_script:
  - pip install awscli
  dependencies:
  - release:wasm
  - release:js
  image: python:3.6
  only:
  - master
  script:
  - bash scripts/deploy.sh
  stage: deploy
  variables:
    BUCKET: s3://opencvwasm
image: docker:latest
release:js:
  artifacts:
    paths:
    - dist/
  before_script:
  - echo "overwrite before_script"
  image: python:latest
  script:
  - bash ./scripts/build_static.sh
  stage: release
release:wasm:
  artifacts:
    paths:
    - dist/
  script:
  - docker pull $GL_CONTAINER/wasm:$CI_PIPELINE_ID
  - mkdir dist
  - docker run -v "$( cd "$( dirname "${BASH_SOURCE[0]}" )" && pwd )"/dist:/usr/src/app/dist
    $GL_CONTAINER/wasm:$CI_PIPELINE_ID
  stage: release
services:
- docker:dind
stages:
- build
- release
- test
- deploy
test:e2e:
  dependencies:
  - release:wasm
  - release:js
  script:
  - docker pull $GL_CONTAINER/devserver:$CI_PIPELINE_ID
  - docker pull $GL_CONTAINER/e2e:$CI_PIPELINE_ID
  - docker network create test
  - docker run -v $(pwd)/dist:/usr/share/nginx/html --network test --name devserve
    -d $GL_CONTAINER/devserver:$CI_PIPELINE_ID
  - sleep 5
  - docker run -e BROWSERSTACK_ACCESS_KEY -e BROWSERSTACK_USER --env ADDRESS=devserve
    --name tester --network test $GL_CONTAINER/e2e:$CI_PIPELINE_ID
  - (if [ "$(docker inspect tester --format='{{.State.ExitCode}}')" == "0" ]; then
    echo "passed"; else exit "$(docker inspect tester --format='{{.State.ExitCode}}')";
    fi);
  - docker stop devserve
  stage: test
variables:
  DOCKER_DRIVER: overlay2
  GL_CONTAINER: registry.gitlab.com/mattmatters/opencv-wasm
