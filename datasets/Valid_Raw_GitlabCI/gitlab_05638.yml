test:ubuntu_rolling:
  before_script:
  - PACKAGE_MANAGERS=${DEBIAN_PACKAGE_MANAGERS}
  - PACKAGE_MANAGERS=${PACKAGE_MANAGERS/julia/}
  - apt-get update -qq
  - apt-get install -y -qq software-properties-common curl
  - curl -fsSL -o Julia.tar.gz $JULIA
  - tar -xf Julia.tar.gz
  - rm Julia.tar.gz
  - rm dependency_management/requirements/BrewRequirement.py dependency_management/requirements/PacmanRequirement.py
    dependency_management/requirements/PkgRequirement.py dependency_management/requirements/PortageRequirement.py
    dependency_management/requirements/ZypperRequirement.py dependency_management/requirements/DnfRequirement.py
    dependency_management/requirements/YumRequirement.py tests/BrewRequirementTest.py
    tests/PacmanRequirementTest.py tests/PkgRequirementTest.py tests/PortageRequirementTest.py
    tests/ZypperRequirementTest.py tests/DnfRequirementTest.py tests/YumRequirementTest.py
  - mv julia* julia
  - ln -s $PWD/julia/bin/julia /usr/local/bin/julia
  - echo 'oracle-java8-installer shared/accepted-oracle-license-v1-1 select true'
    | /usr/bin/debconf-set-selections
  - add-apt-repository -y ppa:webupd8team/java
  - apt-get update -qq
  - apt-get install -y $PACKAGE_MANAGERS $DEBIAN_OTHER_DEPS $COMMON_DEPS
  - 'export GOPATH=$HOME/go

    export PATH=$PATH:$GOPATH/bin

    export PATH=$PATH:$HOME/miniconda/bin

    PYTHON=${PYTHON} .ci/deps.sh

    '
  image: ubuntu:rolling
  script: *id001
  variables:
    DEBIAN_OTHER_DEPS: openjdk-8-jdk perl-doc libcurl4-openssl-dev libgit2-dev
    PYTHON: python3.7
variables:
  ARCH_OTHER_DEPS: 'jdk8-openjdk

    '
  CI_BUILD_ID: $CI_JOB_ID
  CI_BUILD_REF: $CI_COMMIT_SHA
  CI_BUILD_REF_NAME: $CI_COMMIT_REF_NAME
  CI_BUILD_REPO: $CI_REPOSITORY_URL
  COMMON_DEPS: 'bzip2 curl git make mercurial tar

    '
  DEBIAN_FRONTEND: noninteractive
  DEBIAN_OTHER_DEPS: 'openjdk-8-jdk perl-doc libcurl4-openssl-dev libgit2-dev

    '
  DEBIAN_PACKAGE_MANAGERS: 'cabal-install ghc cargo composer golang julia luarocks
    npm python3-pip r-base rubygems maven php-pear

    '
  FEDORA_OTHER_DEPS: 'lua-devel rubygem-rdoc perl-core R-core R-core-devel R-devel
    libgit2-devel zlib-devel libcurl-devel R-digest

    '
  FREEBSD_OTHER_DEPS: 'rubygem-rdoc

    '
  JULIA: https://julialang-s3.julialang.org/bin/linux/x64/0.6/julia-0.6.2-linux-x86_64.tar.gz
  OPENSUSE_OTHER_DEPS: 'gzip java-1_8_0-openjdk python2 rust-std stack xz

    '
  PYTHON: python3
  R_COMPILE_AND_INSTALL_PACKAGES: never
  R_REMOTES_NO_ERRORS_FROM_WARNINGS: 'true'
  XDG_CACHE_HOME: $CI_PROJECT_DIR/.cache/
  ZYPPER_FLAGS: --no-gpg-checks --non-interactive
