before_script:
- source ci/docker_util.sh
deploy_to_staging:
  script:
  - echo "Pretending to deploy"
  - curl google.com
  stage: deploy
  when: manual
image: logimethods/docker-sbt-docker
run_specifications:
  script:
  - sbt "project appJVM" test
  stage: test
services:
- docker:dind
stages:
- test
- deploy
variables:
  DOCKER_DRIVER: overlay
  SBT_OPTS: -Xmx2G -XX:+UseConcMarkSweepGC -XX:+CMSClassUnloadingEnabled -Xss2M
