build:
  artifacts:
    paths:
    - target/release/crochet
  only:
  - master
  - develop
  script:
  - cargo build --release
  stage: build
image: rust:latest
pages:
  artifacts:
    paths:
    - public
  only:
  - master
  - develop
  script:
  - cargo doc --release
  - mv target/doc/ public/
  stage: deploy
stages:
- test
- build
- deploy
test:
  allow_failure: false
  script:
  - rustc --version && cargo --version
  - cargo test --verbose --jobs 1 --release
  stage: test
