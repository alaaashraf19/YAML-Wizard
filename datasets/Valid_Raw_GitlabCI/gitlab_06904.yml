.test_template:
  cache:
    key: common
    paths:
    - .cache
    - vendor
  script:
  - composer install -o --ansi --no-progress
  - find src/ -name *.php -print0 | xargs -0 -n 1 -P 4 php -ln
  - vendor/bin/phpunit --colors=always
  stage: test
grumphp:
  image: composer
  script:
  - composer require phpro/grumphp-shim ergebnis/composer-normalize enlightn/security-checker
    squizlabs/php_codesniffer --prefer-dist --ansi --no-progress --sort-packages
  - vendor/bin/grumphp run -n
  stage: lint
stages:
- lint
- test
test 8.1:
  extends: .test_template
  image: registry.gitlab.com/behat-chrome/docker-chrome-headless:8.1
test 8.2:
  extends: .test_template
  image: registry.gitlab.com/behat-chrome/docker-chrome-headless:8.2
test 8.3:
  extends: .test_template
  image: registry.gitlab.com/behat-chrome/docker-chrome-headless:8.3
test 8.4:
  extends: .test_template
  image: registry.gitlab.com/behat-chrome/docker-chrome-headless:8.4
test driver:
  before_script:
  - composer config repositories.chrome-mink-driver vcs https://gitlab.com/behat-chrome/chrome-mink-driver.git
  - composer require dmore/chrome-mink-driver:dev-main
  extends: .test_template
  image: registry.gitlab.com/behat-chrome/docker-chrome-headless
variables:
  COMPOSER_CACHE_DIR: .cache/composer
