image: registry.gitlab.com/gluttton/munkres-cpp
stages:
- test
test_job:
  before_script:
  - BUILD_DIR=`pwd`/build
  - mkdir -p ${BUILD_DIR}
  - cd ${BUILD_DIR}
  - cmake -DCMAKE_BUILD_TYPE=Debug ${BUILD_DIR}/..
  - make
  coverage: /^\s*lines.*:\s*\d+.\d+\%/
  script:
  - ./test/bronkerbosch_test
  - make coverage
  stage: test
