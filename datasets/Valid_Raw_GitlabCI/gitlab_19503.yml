before_script:
- export GRADLE_USER_HOME=`pwd`/.gradle
image: gradle:alpine
stages:
- unit-test
unit-test:
  artifacts:
    expire_in: 1 week
    name: ${CI_JOB_NAME}_${CI_COMMIT_REF_NAME}
    paths:
    - build/reports/tests/
    when: on_failure
  only:
  - master
  script:
  - gradle test
  stage: unit-test
variables:
  GRADLE_OPTS: -Dorg.gradle.daemon=false
