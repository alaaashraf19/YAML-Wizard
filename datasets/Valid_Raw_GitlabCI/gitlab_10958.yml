before_script:
- apt-get update
buildbinary:
  image: jozefhajnala/rdev:3.4.4
  script:
  - r -e 'devtools::build(binary = TRUE)'
  stage: build
check_macos:
  image: index.docker.io/jozefhajnala/rhub:rbase
  script:
  - Rscript inst/rhubcheck.R "macos-highsierra-release-cran"
  stage: checkrhub
check_mswin:
  image: index.docker.io/jozefhajnala/rhub:rbase
  script:
  - Rscript inst/rhubcheck.R "windows-x86_64-devel"
  stage: checkrhub
checkerrors:
  image: jozefhajnala/rdev:3.4.4
  script:
  - r -e 'if (!identical(devtools::check(document = FALSE, args = "--no-tests")[["errors"]],
    character(0))) stop("Check with Errors")'
  stage: check
checknotes:
  image: jozefhajnala/rdev:3.4.4
  script:
  - r -e 'if (!identical(devtools::check(document = FALSE, args = "--no-tests")[["notes"]],
    character(0))) stop("Check with Notes")'
  stage: check
checkwarnings:
  image: jozefhajnala/rdev:3.4.4
  script:
  - r -e 'if (!identical(devtools::check(document = FALSE, args = "--no-tests")[["warnings"]],
    character(0))) stop("Check with Warnings")'
  stage: check
codecov:
  image: jozefhajnala/rdev:3.4.4
  script:
  - r -e 'covr::codecov()'
  stage: test
documentation:
  image: jozefhajnala/rdev:3.4.4
  script:
  - r inst/ci/document.R
  stage: document
install:
  image: jozefhajnala/rdev:3.4.4
  script:
  - r -e 'devtools::install()'
  stage: deploy
stages:
- build
- document
- check
- test
- deploy
- checkrhub
unittests:
  image: jozefhajnala/rdev:3.4.4
  script:
  - r -e 'if (any(as.data.frame(devtools::test())[["failed"]] > 0)) stop("Some tests
    failed.")'
  stage: test
variables:
  CODECOV_TOKEN: $JHADDINS_TOKEN_CODECOV
  _R_CHECK_CRAN_INCOMING_: 'false'
  _R_CHECK_FORCE_SUGGESTS_: 'true'
