.pages_template:
  artifacts:
    expire_in: 7 days
    paths:
    - public/
  before_script:
  - python -m pip install -U pip
  - git fetch --tags --prune --quiet
  - git fetch origin "$CI_DEFAULT_BRANCH" --depth 1 --quiet
  - mkdir -p public
  image: $CUSTOM_IMAGE
  script:
  - LATEST_TAG="$(git tag --sort=-v:refname | head -n1)"
  - LATEST_HASH="$(git rev-parse --short HEAD)"
  - git worktree add --force stable "$LATEST_TAG"
  - cd stable
  - pip install ".[documentation,test,optional]"
  - sphinx-build doc/ "$CI_PROJECT_DIR/public/"
  - coverage run -m pytest --verbose --junitxml=report.xml tests/
  - coverage report
  - coverage xml -o coverage.xml
  - coverage html
  - cp -dr htmlcov/ "$CI_PROJECT_DIR/public/coverage/"
  - cd "$CI_PROJECT_DIR"
  - git worktree remove --force stable
  - git worktree add --force latest "origin/$CI_DEFAULT_BRANCH"
  - cd latest
  - pip install ".[documentation,test,optional]"
  - sed -i "s/selector_version = .*/selector_version = 'dev'/" doc/conf.py
  - sphinx-build doc/ "$CI_PROJECT_DIR/public/dev/"
  - coverage run -m pytest --verbose --junitxml=report.xml tests/
  - coverage report
  - coverage xml -o coverage.xml
  - coverage html
  - cp -dr htmlcov/ "$CI_PROJECT_DIR/public/dev/coverage/"
  - cd "$CI_PROJECT_DIR"
  - git worktree remove --force latest
  - cat doc/switcher.json.template | sed "s/_RELEASE_TAG_/$LATEST_TAG/" | sed "s/_GIT_HASH_/$LATEST_HASH/"
    > public/_static/switcher.json
.test_template:
  artifacts:
    expire_in: 2 days
    paths:
    - htmlcov/
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
      junit: report.xml
  before_script:
  - apt-get update -qy
  - apt-get upgrade -qy
  - apt-get install -qy graphviz pandoc
  - python -m pip install -U pip
  - pip install ".[test,optional]"
  coverage: /TOTAL.*? (100(?:\.0+)?\%|[1-9]?\d(?:\.\d+)?\%)$/
  image: python:$PYTHON_VERSION
  needs:
  - build:wheel
  rules:
  - allow_failure: true
    if: $CI_PIPELINE_SOURCE == "schedule"
    when: always
  - allow_failure: true
    when: manual
  script:
  - xdoctest icet
  - coverage run -m pytest --verbose --junitxml=report.xml tests/
  - coverage report
  - coverage xml -o coverage.xml
  - coverage html
  stage: test
build:macos:
  before_script:
  - set -euo pipefail
  - python3 -V
  - python3 -m pip install --upgrade pip
  image: macos-15-xcode-16
  rules:
  - allow_failure: true
    if: $CI_PIPELINE_SOURCE == "schedule"
    when: always
  - allow_failure: true
    when: manual
  script:
  - pip install ".[test,optional]"
  stage: build
  tags:
  - saas-macos-medium-m1
  variables:
    HOMEBREW_NO_AUTO_UPDATE: '1'
build:wheel:
  artifacts:
    expire_in: 7 days
    name: dist-$CI_COMMIT_SHORT_SHA
    paths:
    - dist/
  image: $CUSTOM_IMAGE
  rules:
  - when: always
  script:
  - python -m pip install -U pip build
  - python -m build --wheel --sdist
  - ls -l dist/
  stage: build
build:windows:
  before_script:
  - $ErrorActionPreference = 'Stop'
  - if (-not (Get-Command python -ErrorAction SilentlyContinue)) { choco install python
    -y --no-progress }
  - python -m pip install --upgrade pip
  - New-Item -ItemType Directory -Force -Path $env:INSTDIR | Out-Null
  rules:
  - allow_failure: true
    if: $CI_PIPELINE_SOURCE == "schedule"
    when: always
  - allow_failure: true
    when: manual
  script:
  - pip install ".[test,optional]"
  stage: build
  tags:
  - saas-windows-medium-amd64
cache:
  key:
    files:
    - pyproject.toml
  paths:
  - .pip-cache/
documentation:
  artifacts:
    expire_in: 7 days
    paths:
    - public/
  before_script:
  - python -m pip install -U pip
  - pip install ".[documentation]"
  image: $CUSTOM_IMAGE
  needs:
  - build:wheel
  rules:
  - if: $CI_COMMIT_BRANCH != "master" && $CI_COMMIT_TAG == null && $CI_PIPELINE_SOURCE
      != "schedule"
    when: always
  - when: never
  script:
  - mkdir -p public
  - sphinx-build -b doctest -W doc/ public/
  - sphinx-build -W doc/ public/
  stage: test
pages:
  extends: .pages_template
  rules:
  - if: $CI_COMMIT_BRANCH == "master"
    when: always
  - if: $CI_COMMIT_TAG
    when: always
  - if: $CI_PIPELINE_SOURCE == "schedule"
    when: never
  stage: deploy
pages_verification:
  extends: .pages_template
  needs:
  - build:wheel
  rules:
  - allow_failure: true
    if: $CI_COMMIT_BRANCH != "master" && $CI_COMMIT_TAG == null && $CI_PIPELINE_SOURCE
      != "schedule"
    when: manual
  - when: never
  stage: test
pypi:
  before_script:
  - python -m pip install -U pip build twine
  - git fetch --tags --quiet
  environment:
    name: pypi-upload
  image: $CUSTOM_IMAGE
  rules:
  - if: $CI_PIPELINE_SOURCE == "schedule"
    when: never
  - if: $CI_COMMIT_TAG
    when: manual
  script:
  - echo "tag=$CI_COMMIT_TAG"
  - if [ -n "$CI_COMMIT_TAG" ]; then git checkout "$CI_COMMIT_TAG"; fi
  - rm -fr build dist icet.egg-info
  - python -m build --sdist
  - ls -l dist/
  - twine check dist/*
  - twine upload dist/* -u __token__ -p "$PYPI_TOKEN"
  stage: deploy
stages:
- build
- test
- deploy
style_check:
  image: $CUSTOM_IMAGE
  rules:
  - if: $CI_PIPELINE_SOURCE != "schedule"
    when: always
  - when: never
  script:
  - python -m pip install -U pip flake8
  - flake8 icet/ mchammer/ tests/ benchmark/ doc/ examples/
  stage: test
test:py310:
  extends: .test_template
  variables:
    PYTHON_VERSION: '3.10'
test:py311:
  extends: .test_template
  variables:
    PYTHON_VERSION: '3.11'
test:py312:
  extends: .test_template
  variables:
    PYTHON_VERSION: '3.12'
test:py313:
  extends: .test_template
  rules:
  - allow_failure: false
    when: always
  variables:
    PYTHON_VERSION: '3.13'
test:py39:
  extends: .test_template
  variables:
    PYTHON_VERSION: '3.9'
variables:
  CUSTOM_IMAGE: $CI_REGISTRY/materials-modeling/$CI_PROJECT_NAME/cicd
  PIP_CACHE_DIR: $CI_PROJECT_DIR/.pip-cache
  PIP_DISABLE_PIP_VERSION_CHECK: '1'
  PIP_NO_INPUT: '1'
workflow:
  rules:
  - if: $CI_PIPELINE_SOURCE == "push" && $CI_OPEN_MERGE_REQUESTS
    when: never
  - when: always
