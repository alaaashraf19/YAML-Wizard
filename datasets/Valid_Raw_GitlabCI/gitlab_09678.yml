  after_script:
  - docker logout registry.gitlab.com
  before_script:
  - docker login -u gitlab-ci-token -p $CI_BUILD_TOKEN registry.gitlab.com
  image: docker:latest
  script:
  - docker build -f Dockerfile.git-enricher -t registry.gitlab.com/goern/oe2k/git-enricher:latest
