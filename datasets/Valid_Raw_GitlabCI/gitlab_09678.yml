before_script:
- ln -s /builds /go/src/gitlab.com
- cd /go/src/gitlab.com/goern/oe2k
build:build-finder-image:
  after_script:
  - docker logout registry.gitlab.com
  before_script:
  - docker login -u gitlab-ci-token -p $CI_BUILD_TOKEN registry.gitlab.com
  image: docker:latest
  script:
  - docker build -f Dockerfile.build-finder -t registry.gitlab.com/goern/oe2k/build-finder:latest
    --pull .
  - docker push registry.gitlab.com/goern/oe2k/build-finder:latest
  services:
  - docker:dind
  stage: package
  tags:
  - docker
build:event-pubisher-image:
  after_script:
  - docker logout registry.gitlab.com
  before_script:
  - docker login -u gitlab-ci-token -p $CI_BUILD_TOKEN registry.gitlab.com
  image: docker:latest
  script:
  - docker build -f Dockerfile.oe2k -t registry.gitlab.com/goern/oe2k/event-publisher:latest
    --pull .
  - docker push registry.gitlab.com/goern/oe2k/event-publisher:latest
  services:
  - docker:dind
  stage: package
  tags:
  - docker
