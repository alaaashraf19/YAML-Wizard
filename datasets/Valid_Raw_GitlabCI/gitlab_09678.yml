build:rest-gw-image:
  after_script:
  - docker logout registry.gitlab.com
  before_script:
  - docker login -u gitlab-ci-token -p $CI_BUILD_TOKEN registry.gitlab.com
  image: docker:latest
  script:
  - docker build -f Dockerfile.rest-gw -t registry.gitlab.com/goern/oe2k/rest-gw:latest
    --pull .
  - docker push registry.gitlab.com/goern/oe2k/rest-gw:latest
  services:
  - docker:dind
  stage: package
  tags:
  - docker
compile:
  artifacts:
    paths:
    - bin/oe2k
    - bin/build-finder
    - bin/buildlog2hdfs
    - bin/rest-gw
    - bin/git-enricher
  script:
  - go get -u github.com/Masterminds/glide
  - make vendoring
  - make
  stage: compile
deploy_test:
  environment:
    name: test
  script:
  - echo "Deploy to 'test' environment"
  stage: deploy_test
image: golang:latest
stages:
- compile
- package
- deploy_test
