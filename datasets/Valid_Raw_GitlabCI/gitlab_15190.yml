build:pw:
  image: espressofoundation/ubuntu:latest
  script:
  - ./configure
  - make pw
  tags:
  - docker
intel parallel:
  script:
  - module purge
  - module load intel/pe-xe-2018--binary intelmpi/2018--binary mkl/2018--binary python
  - ./configure --enable-openmp
  - make -j pw cp
  - if [ -z ${SLURM_CPUS_PER_TASK} ]; then export OMP_NUM_THREADS=1; else export OMP_NUM_THREADS=$SLURM_CPUS_PER_TASK;
    fi
  - echo "Using $SLURM_NTASKS procs and $OMP_NUM_THREADS threads"
  - cd test-suite
  - sed -i "s/TESTCODE_NPROCS=4/TESTCODE_NPROCS=$SLURM_NTASKS/" ENVIRONMENT
  - make clean
  - make run-tests-pw-parallel
  - sed -i 's/export PARA_POSTFIX=" "/export PARA_POSTFIX=" -pd=.true."/g' run-pw.sh
  - make clean && make run-tests-pw-parallel
  tags:
  - intel
pgi parallel k80:
  script:
  - module purge
  - module load profile/global hpc-sdk/20.9--binary mkl/2019--binary python
  - ./configure --enable-openmp --with-cuda-runtime=10.1 --with-cuda-cc=35 --with-cuda=yes
    --enable-cuda-env-check=no --with-scalapack=no
  - make -j pw cp
  - if [ -z ${SLURM_CPUS_PER_TASK} ]; then export OMP_NUM_THREADS=1; else export OMP_NUM_THREADS=$SLURM_CPUS_PER_TASK;
    fi
  - echo "Using $SLURM_NTASKS procs and $OMP_NUM_THREADS threads"
  - cd test-suite
  - sed -i "s/TESTCODE_NPROCS=4/TESTCODE_NPROCS=$SLURM_NTASKS/" ENVIRONMENT
  - make clean
  - make run-tests-pw-parallel
  - sed -i 's/export PARA_POSTFIX=" "/export PARA_POSTFIX=" -pd=.true."/g' run-pw.sh
  - make clean && make run-tests-pw-parallel
  - cd .. && cp PW/src/pw.x ./pwgpu-mpi-cuda8-cc35-${CI_COMMIT_SHA:0:8}.x
  tags:
  - k80
pgi parallel v100:
  script:
  - module purge
  - module load profile/global hpc-sdk/20.9--binary mkl/2019--binary cuda/10.1 python
  - ./configure --enable-openmp --with-cuda-runtime=10.1 --with-cuda-cc=70 --with-cuda=$CUDA_HOME
    --with-scalapack=no
  - make -j pw cp
  - if [ -z ${SLURM_CPUS_PER_TASK} ]; then export OMP_NUM_THREADS=1; else export OMP_NUM_THREADS=$SLURM_CPUS_PER_TASK;
    fi
  - echo "Using $SLURM_NTASKS procs and $OMP_NUM_THREADS threads"
  - cd test-suite
  - sed -i "s/TESTCODE_NPROCS=4/TESTCODE_NPROCS=$SLURM_NTASKS/" ENVIRONMENT
  - make clean
  - make run-tests-pw-parallel
  - sed -i 's/export PARA_POSTFIX=" "/export PARA_POSTFIX=" -pd=.true."/g' run-pw.sh
  - make clean && make run-tests-pw-parallel
  tags:
  - galileo
  - v100
pgi serial k80:
  script:
  - module purge
  - module load profile/global hpc-sdk/20.9--binary mkl/2019--binary python
  - ./configure --disable-parallel --enable-openmp --with-cuda-runtime=10.1 --with-cuda-cc=35
    --with-cuda=yes --enable-cuda-env-check=no
  - make -j pw cp
  - if [ -z ${SLURM_CPUS_PER_TASK} ]; then export OMP_NUM_THREADS=1; else export OMP_NUM_THREADS=$SLURM_CPUS_PER_TASK;
    fi
  - echo "Using $OMP_NUM_THREADS threads"
  - cd test-suite
  - make clean
  - make run-tests-pw-serial
  - make run-tests-cp-serial
  tags:
  - k80
pgi207 power v100:
  script:
  - module purge
  - module load profile/global hpc-sdk/2020--binary cuda/10.1 spectrum_mpi/10.3.1--binary
    python/3.8.2
  - pwd
  - cd ..
  - ./configure CC=pgcc F77=pgf90 FC=pgf90 F90=pgf90 MPIF90=mpipgifort --enable-openmp
    --with-cuda=$CUDA_ROOT --with-cuda-runtime=10.1 --with-cuda-cc=70
  - make -j pw cp
  - salloc --nodes=1 --ntasks-per-node=4 --ntasks-per-socket=2 --cpus-per-task=32
    --gres=gpu:4 --mem=230000MB --time 01:00:00 -A $CINECA_QE_ACCOUNT -p m100_usr_prod
  - if [ -z ${SLURM_CPUS_PER_TASK} ]; then export OMP_NUM_THREADS=1; else export OMP_NUM_THREADS=8;
    fi
  - echo "Using $OMP_NUM_THREADS threads"
  - cd test-suite
  - make clean
  - make run-tests-pw-parallel
  - make run-tests-cp-parallel
  - exit
  tags:
  - marconi100
