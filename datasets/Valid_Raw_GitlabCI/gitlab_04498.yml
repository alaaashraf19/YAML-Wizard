before_script:
- composer install --prefer-dist --no-interaction --no-progress
- composer global require drush/drush
- cp $CI_PROJECT_DIR/.boi_ci.example.yml $CI_PROJECT_DIR/.boi_ci.yml
- bin/boi_ci gitlab:init-ci
image: blueoakinteractive/php-ci:7.1.9
job_deploy_packagist:
  script:
  - curl -XPOST -H 'content-type:application/json' "https://packagist.org/api/update-package?username=andyg5000&apiToken=$PACKAGIST_KEY"
    -d'{"repository":{"url":"https://gitlab.com/blueoakinteractive/boi_ci"}}'
  stage: deploy
job_test_all:
  script:
  - vendor/bin/phpunit tests
  stage: test
stages:
- test
- deploy
