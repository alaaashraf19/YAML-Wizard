test:dreamcast-sh4-gcc:
  allow_failure: true
  artifacts:
    paths:
    - ${TARGET}/debug/simulant/*.a
    - ${TARGET}/release/simulant/*.a
    - ${TARGET}/release/*.out
    when: always
  before_script:
  - dnf install -y wget unzip libisofs libpng mesa-libGL gtk2 pulseaudio-libs && dnf
    clean all
  - wget -O artifacts.zip https://gitlab.com/simulant/community/lxdream-nitro/-/jobs/artifacts/master/download?job=linux-x64:build
  - unzip artifacts.zip
  - export PATH=$PATH:`pwd`/build
  dependencies:
  - build:dreamcast-sh4-gcc
  image: fedora:33
  needs:
  - build:dreamcast-sh4-gcc
  script:
  - cd ${TARGET}/debug
  - lxdream-nitro --audio=null -H -b -u -C `pwd` -e tests/simulant_tests.elf
  stage: test
  variables:
    TARGET: dreamcast-sh4-gcc
test:linux-x64-gcc-debug:
  artifacts:
    paths:
    - ${TARGET}/debug/simulant/
    - ${TARGET}/release/simulant/
    reports:
      junit: ${TARGET}/debug/report.xml
  before_script:
  - start-stop-daemon --start --quiet --pidfile /tmp/custom_xvfb_99.pid --make-pidfile
    --background --exec /usr/bin/Xvfb -- :99 -screen 0 320x240x24 -ac +extension RANDR
    +extension GLX +render -noreset
  - sleep 2
  - export DISPLAY=:99
  dependencies:
  - build:linux-x64-gcc
  image: $CI_REGISTRY_IMAGE:linux-x64-gcc
  needs:
  - build:linux-x64-gcc
  script:
  - cd ${TARGET}/debug
  - export SIMULANT_SOUND_DRIVER=null
  - env SEGFAULT_SIGNALS="abrt segv" LD_PRELOAD=/usr/lib64/libSegFault.so ./tests/simulant_tests
    --junit-xml=report.xml
  stage: test
  variables:
    TARGET: linux-x64-gcc
test:linux-x64-gcc-release:
  artifacts:
    paths:
    - ${TARGET}/debug/simulant/*.a
    - ${TARGET}/release/simulant/*.a
    - ${TARGET}/release/*.out
    reports:
      junit: ${TARGET}/release/report.xml
    when: always
  before_script:
  - start-stop-daemon --start --quiet --pidfile /tmp/custom_xvfb_99.pid --make-pidfile
    --background --exec /usr/bin/Xvfb -- :99 -screen 0 320x240x24 -ac +extension RANDR
    +extension GLX +render -noreset
  - sleep 2
  - export DISPLAY=:99
  dependencies:
  - build:linux-x64-gcc
  image: $CI_REGISTRY_IMAGE:linux-x64-gcc
  needs:
  - build:linux-x64-gcc
  script:
  - cd ${TARGET}/release
  - export SIMULANT_SOUND_DRIVER=null
  - env SEGFAULT_SIGNALS="abrt segv" LD_PRELOAD=/usr/lib64/libSegFault.so ./tests/simulant_tests
    --junit-xml=report.xml
