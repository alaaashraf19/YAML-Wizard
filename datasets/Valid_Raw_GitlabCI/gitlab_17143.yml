- template: Jobs/Secret-Detection.latest.gitlab-ci.yml
pages:
  artifacts:
    paths:
    - public
  image: fedora:33
  only:
  - master
  script:
  - dnf install -y doxygen python3 git
  - python3 tools/gendocs.py `pwd` `git describe --abbrev=4 --always --tags | cut
    -d - -f 1-2` `pwd`
  - mv `git describe --abbrev=4 --always --tags | cut -d - -f 1-2`/html public
  stage: prepare
prepare:deploy:
  before_script:
  - echo -e $DOCKERFILE > Dockerfile
  - cat Dockerfile
  image: docker:latest
  rules:
  - changes:
    - .gitlab-ci.yml
    if: $CI_PIPELINE_SOURCE == "merge_request_event"
  - changes:
    - .gitlab-ci.yml
    if: $CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH
  script:
  - docker pull $CI_REGISTRY_IMAGE:deploy || true
  - docker build --cache-from $CI_REGISTRY_IMAGE:deploy -t $CI_REGISTRY_IMAGE:deploy
    .
  - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  - docker push $CI_REGISTRY_IMAGE:deploy
  services:
  - docker:dind
  stage: prepare
  variables:
    DOCKERFILE: FROM fedora:33\n RUN dnf -y install openssl-devel python-devel python-setuptools
      libffi-devel python-pip rsync zip\n RUN pip install gsutil\n
    GIT_STRATEGY: none
