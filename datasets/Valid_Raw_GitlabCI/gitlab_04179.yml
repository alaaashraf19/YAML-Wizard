.test_template:
  script: &id001
  - /opt/julia/bin/julia -e 'Pkg.clone(pwd()); Pkg.test("MyPackage", coverage = true)'
  - /opt/julia/bin/julia -e 'Pkg.add("Coverage"); cd(Pkg.dir("MyPackage")); using
    Coverage; cl, tl = get_summary(process_folder()); println("(", cl/tl*100, "%)
    covered")'
test:0.4.6:
  image: julialang/julia:v0.4.6
  script: *id001
test:0.5.0-dev:
  allow_failure: true
  image: julialang/julia:v0.5.0-dev
  script: *id001
