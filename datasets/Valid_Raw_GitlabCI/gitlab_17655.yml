cache:
  paths:
  - node_modules/
docs:
  artifacts:
    paths:
    - docs/
  script:
  - npm install
  - npm run docs
  stage: test
image: node:latest
pages:
  artifacts:
    expire_in: 30 days
    paths:
    - public/
  dependencies:
  - test
  - docs
  only:
  - develop
  script:
  - mv coverage/ public/
  - mv docs/ public/
  stage: deploy
publish:
  only:
  - tags
  - triggers
  script:
  - npm run build
  - echo '//registry.npmjs.org/:_authToken=${NPM_TOKEN}'>.npmrc
  - npm publish
  stage: deploy
test:
  artifacts:
    paths:
    - coverage/
  script:
  - npm install
  - npm run coverage
  stage: test
