before_script:
- apt-get update -yqq
- apt-get install -yqq libzip-dev unzip git libmcrypt-dev libpq-dev libcurl4-gnutls-dev
  libicu-dev libvpx-dev libjpeg-dev libpng-dev libxpm-dev zlib1g-dev libfreetype6-dev
  libxml2-dev libexpat1-dev libbz2-dev libgmp3-dev libldap2-dev unixodbc-dev libsqlite3-dev
  libaspell-dev libsnmp-dev libpcre3-dev libtidy-dev libonig-dev
- docker-php-ext-install mbstring pdo_mysql pdo_pgsql curl intl gd xml zip bz2 opcache
- pecl install xdebug
- docker-php-ext-enable xdebug
- curl -sS https://getcomposer.org/installer | php
- php composer.phar update
- export IN_GITLAB_CI=1
cache:
  paths:
  - vendor/
services:
- mysql:8.0
- mariadb:10.6
test:8.0:
  image: php:8.0
  script:
  - vendor/bin/phpunit --configuration tests/phpunit-unit.xml --coverage-text --colors=never
  - vendor/bin/phpunit --configuration tests/phpunit-integration-sqlite-ddl.xml --coverage-text
    --colors=never
  - vendor/bin/phpunit --configuration tests/phpunit-integration-mysql-ddl.xml --coverage-text
    --colors=never
  - vendor/bin/phpunit --configuration tests/phpunit-integration-mysql-json.xml --coverage-text
    --colors=never
  - vendor/bin/phpunit --configuration tests/phpunit-integration-mariadb-ddl.xml --coverage-text
    --colors=never
  - vendor/bin/phpunit --configuration tests/phpunit-integration-mariadb-json.xml
    --coverage-text --colors=never
