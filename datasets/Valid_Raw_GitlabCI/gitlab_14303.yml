.build:
  artifacts: &id001
    paths:
    - public
  script: &id002
  - emacs --batch --no-init-file --load publish.el --funcall org-publish-all
image: iquiw/alpine-emacs
pages:
  artifacts: *id001
  rules:
  - if: $CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH
  script: *id002
test:
  artifacts: *id001
  rules:
  - if: $CI_COMMIT_REF_NAME != $CI_DEFAULT_BRANCH
  script: *id002
