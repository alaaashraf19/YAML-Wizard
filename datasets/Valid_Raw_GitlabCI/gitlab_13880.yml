before_script:
- docker info
- docker login -u gitlab-ci-token -p $CI_JOB_TOKEN registry.gitlab.com
build:
  script:
  - docker build --pull -t $CONTAINER_TEST_IMAGE .
  - docker push $CONTAINER_TEST_IMAGE
  stage: build
deploy_feature:
  environment:
    name: Staging Kafeina.co
    url: http://coordinate-staging.kafeina.co/
  only:
  - /^[\d]+[\w-_]+$/
  script:
  - ./bin/deploy.sh
  stage: deploy
  variables:
    TARGET_ENV: staging
  when: manual
deploy_staging:
  environment:
    name: Staging Kafeina.co
    url: http://coordinate-staging.kafeina.co/
  only:
  - master
  script:
  - ./bin/deploy.sh
  stage: deploy
  variables:
    TARGET_ENV: staging
image: docker:latest
release-image:
  only:
  - master
  script:
  - docker pull $CONTAINER_TEST_IMAGE
  - docker tag $CONTAINER_TEST_IMAGE $CONTAINER_RELEASE_IMAGE
  - docker push $CONTAINER_RELEASE_IMAGE
  stage: release
services:
- docker:dind
stages:
- build
- test
- release
- deploy
test:
  script:
  - docker pull $CONTAINER_TEST_IMAGE
  - docker run $CONTAINER_TEST_IMAGE sh -c "COORDINATE_ENV=ci /code/bin/test.sh"
  stage: test
variables:
  CONTAINER_RELEASE_IMAGE: registry.gitlab.com/open-sismo/coordinate-api/image:latest
  CONTAINER_TEST_IMAGE: registry.gitlab.com/open-sismo/coordinate-api/image:$CI_COMMIT_REF_NAME
  DOCKER_DRIVER: overlay2
