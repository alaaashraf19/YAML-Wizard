before_script:
- apt-get update -yqq
- apt-get install git -yqq
- apt-get install zip -yqq
- docker-php-ext-enable curl && docker-php-ext-enable json && docker-php-ext-enable
  zip && docker-php-ext-enable mbstring && docker-php-ext-enable gd && docker-php-ext-enable
  pdo_mysql
- curl -sS https://getcomposer.org/installer | php
- php composer.phar require --dev php-parallel-lint/php-parallel-lint
- php composer.phar require --dev friendsofphp/php-cs-fixer
- php composer.phar install
cache:
  paths:
  - vendor/
image: php:7.3
job_lint_app_phpnextversion:
  allow_failure: true
  image: php:7.4
  script:
  - ./vendor/bin/parallel-lint --exclude vendor .
  - ./vendor/bin/php-cs-fixer -vvv fix . --dry-run --diff --using-cache=no --rules=@PSR2
