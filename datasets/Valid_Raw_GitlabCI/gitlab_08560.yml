.ruby-job:
  before_script:
  - gem install gitlab-sdk sentry-ruby zeitwerk tty-spinner terminal-table
  image: ${GITLAB_DEPENDENCY_PROXY}ruby:${RUBY_VERSION}
  parallel:
    matrix:
    - RUBY_VERSION:
      - '3.2'
      - '3.3'
      - '3.4'
.test-job:
  needs: []
  stage: test
auto-generated:
  extends:
  - .test-job
  - .rules:code-changes
  - .ruby-job
  script:
  - support/ci/verify-auto-generated
checkmake:
  extends:
  - .test-job
  - .rules:code-changes
  image:
    name: golang:latest
  script:
  - go install github.com/mikefarah/yq/v4@latest
  - CHECKMAKE_VERSION=$(yq '.dev.checkmake.version' < gdk.example.yml)
  - go install "github.com/mrtazz/checkmake/cmd/checkmake@$CHECKMAKE_VERSION"
  - cat Makefile support/makefiles/*.mk > tmp/.makefile_combined
  - checkmake tmp/.makefile_combined && echo -e "\b\bOK"
docs-lint:
  extends:
  - .test-job
  - .rules:docs-changes
  image: ${DOCS_LINT_IMAGE}
  script:
  - make lint
gdk-example-yml:
  extends:
  - .test-job
  - .rules:code-changes
  - .ruby-job
  script:
  - make verify-gdk-example-yml
rspec:
  artifacts:
    paths:
    - rspec.xml
    - coverage/
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage/coverage.xml
      junit: rspec.xml
  extends:
  - .test-job
  - .rules:code-changes
  - .ruby-job
  script:
  - make rspec
  - git diff --exit-code
  variables:
    RSPEC_ARGS: --format doc --format RspecJunitFormatter --out rspec.xml
rubocop:
  extends:
  - .test-job
  - .rules:code-changes
  - .ruby-job
  script:
  - make rubocop
ruby-version:
  extends:
  - .test-job
  - .rules:ruby-version-changes
  - .ruby-job
  script:
  - support/ruby-check-versions
shellcheck:
  extends:
  - .test-job
  - .rules:code-changes
  - .ruby-job
  script:
  - apt-get update
  - make shellcheck
