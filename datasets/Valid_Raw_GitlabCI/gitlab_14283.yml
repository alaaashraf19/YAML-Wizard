cache:
  paths:
  - vendor/
image: python:2.7
pages:
  artifacts:
    paths:
    - public
  rules:
  - if: $CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH
  script:
  - pip install hyde
  - hyde gen -d public
  stage: deploy
test:
  rules:
  - if: $CI_COMMIT_REF_NAME != $CI_DEFAULT_BRANCH
  script:
  - pip install hyde
  - hyde gen
  stage: test
