cache:
  paths:
  - node_modules/
image: node:16-slim
pages:
  artifacts:
    paths:
    - public
  environment:
    name: production
    url: https://winni.gitlab.io/$CI_PROJECT_NAME
  only:
  - master
  script:
  - npm install --omit=optional --no-audit --ignore-scripts
  - npm run lint
  - npm run build
  - npm run compress
  - mv dist public
  stage: deploy
