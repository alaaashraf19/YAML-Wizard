.package:
  artifacts:
    name: ${CI_JOB_NAME}_${CI_COMMIT_REF_NAME}
    untracked: true
    when: on_success
  cache: &id001
    key: $CI_COMMIT_REF_NAME
    paths:
    - build
    - .gradle
    policy: pull
  only: &id003
  - master
  - develop
  stage: package
.pullcache:
  cache: *id001
.pushcache:
  cache: &id002
    key: $CI_COMMIT_REF_NAME
    paths:
    - build
    - .gradle
    policy: pull
before_script:
- export GRADLE_USER_HOME=`pwd`/.gradle
build:
  cache: *id002
  script: gradle --build-cache build
  stage: build
image: gradle:alpine
package-client:
  artifacts:
    paths:
    - client/build/distributions/
  cache: *id001
  only: *id003
  script: gradle :client:distZip
  stage: package
package-server:
  artifacts:
    paths:
    - server/build/distributions/
  cache: *id001
  only: *id003
  script: gradle :server:distZip
  stage: package
stages:
- build
- test
- package
test:
  cache: *id001
  script:
  - gradle check jacocoTestReport
  - cat server/build/reports/jacoco/test/html/index.html
  stage: test
variables:
  GRADLE_OPTS: -Dorg.gradle.daemon=false
