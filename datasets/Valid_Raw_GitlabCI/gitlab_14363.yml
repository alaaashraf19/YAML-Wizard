build-ext-assets:
  artifacts:
    paths:
    - web-ext-artifacts/
    - dist-ext/
  cache:
    paths:
    - .npm/
  script:
  - npm ci --force
  - ./set_version.sh
  - npm run build:ext --progress=false
  - bin/remove_eval.sh
  - npm run ext:build
  - mv web-ext-artifacts/*.zip web-ext-artifacts/passit.zip
  - mv dist dist-ext
  stage: build_test
build-push-docker:
  dependencies:
  - build-web-assets
  image: docker:stable
  only:
  - master
  - tags
  script:
  - echo "Start build docker step $CI_REGISTRY_IMAGE commit ref $CI_COMMIT_REF_NAME"
  - trap '' PIPE
  - VERSION=$(awk '/version/{gsub(/("|",)/,"",$2);print $2};' package.json | head
    -n 1)
  - echo "Build version $VERSION ci registry image $CI_REGISTRY_IMAGE commit ref $CI_COMMIT_REF_NAME"
  - docker build -f Dockerfile.prod -t ${CI_REGISTRY_IMAGE}:${CI_COMMIT_REF_NAME}
    -t ${CONTAINER_IMAGE} --build-arg PASSIT_VERSION=$VERSION .
  - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  - docker push ${CI_REGISTRY_IMAGE}:${CI_COMMIT_REF_NAME}
  - docker push ${CONTAINER_IMAGE}
  services:
  - docker:dind
  stage: package
build-web-assets:
  artifacts:
    paths:
    - dist/
  cache:
    paths:
    - .npm/
  script:
  - npm ci --force
  - npm run build -- --configuration=production --progress=false
  stage: build_test
deploy-chrome-ext:
  dependencies:
  - build-ext-assets
  image: debian:trixie
  only:
  - tags
  script:
  - apt-get update
  - apt-get -y install curl jq zip unzip
  - bin/deploy_chrome.sh
  stage: deploy
  when: manual
deploy-dockerhub:
  environment:
    name: production
    url: https://app.passit.io
  image: docker:stable
  only:
  - tags
  script:
  - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  - docker pull ${CI_REGISTRY_IMAGE}:${CI_COMMIT_REF_NAME}
  - docker login -u ${DOCKER_CI_REGISTRY_USER} -p ${DOCKER_CI_REGISTRY_PASSWORD}
  - echo tag image ${CI_REGISTRY_IMAGE}:${CI_COMMIT_REF_NAME} as ${DOCKER_CI_REGISTRY_IMAGE}
  - docker tag ${CI_REGISTRY_IMAGE}:${CI_COMMIT_REF_NAME} ${DOCKER_CI_REGISTRY_IMAGE}
  - docker push ${DOCKER_CI_REGISTRY_IMAGE}
  services:
  - docker:dind
  stage: deploy
  when: manual
deploy-firefox-ext:
  dependencies:
  - build-ext-assets
  only:
  - tags
  script:
  - npm install @wext/shipit
  - npm run ext:publish_firefox
  stage: deploy
  when: manual
deploy-staging:
  environment:
    name: staging
    url: https://staging.passit.io
  image:
    entrypoint:
    - ''
    name: alpine/helm
  only:
  - master
  script:
  - helm repo add django-helm-chart https://burke-software.gitlab.io/django-helm-chart
  - helm upgrade passit-staging django-helm-chart/django --set-string image.tag=${CI_COMMIT_SHORT_SHA}
    --reuse-values
  stage: deploy
image: node:20
stages:
- build_test
- package
- deploy
test:
  cache:
    paths:
    - .npm/
  image: node:20-alpine
  script:
  - apk add --update --no-cache chromium-chromedriver chromium git python3 make g++
  - npm ci --force
  - npm run test -- --progress false --watch=false --browsers=Chromium_CI
  stage: build_test
variables:
  CHROME_BIN: chromium-browser
  CONTAINER_IMAGE: ${CI_REGISTRY_IMAGE}:${CI_COMMIT_SHORT_SHA}
  NODE_VERSION: 20.11.1
  npm_config_cache: $CI_PROJECT_DIR/.npm
