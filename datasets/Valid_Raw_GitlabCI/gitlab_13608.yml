cache:
  paths:
  - .m2
docker_image:
  dependencies:
  - uberjar
  image: docker
  only:
  - master
  script:
  - docker login -u gitlab-ci-token -p $CI_JOB_TOKEN $CI_REGISTRY
  - docker build -t $IMAGE_TAG .
  - docker push $IMAGE_TAG
  services:
  - docker:dind
  stage: docker_image
image: clojure:lein-2.8.1
production_deploy:
  environment:
    name: production
    url: https://relay-chat.com
  image: alpine:latest
  only:
  - master
  script:
  - which ssh-agent || ( apk add --no-cache openssh-client )
  - eval $(ssh-agent -s)
  - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add - > /dev/null
  - mkdir -p ~/.ssh
  - echo "$SSH_SERVER_HOSTKEYS" > ~/.ssh/known_hosts
  - ssh ${DEPLOY_USER}@${DEPLOY_SERVER} "ENV=${ENV} IMAGE_TAG=${IMAGE_TAG} CI_JOB_TOKEN=${CI_JOB_TOKEN}
    CI_REGISTRY=${CI_REGISTRY} RELAY_VAULT_DIR=${RELAY_VAULT_DIR} ${DEPLOY_SCRIPT}"
  stage: production_deploy
  variables:
    DEPLOY_SCRIPT: ${RELAY_OPS_DIR}/bin/deploy-relay-backend
    ENV: production
    RELAY_OPS_DIR: ${HOME}/relay-ops
    RELAY_VAULT_DIR: ${HOME}/relay-vault
  when: manual
stages:
- test
- uberjar
- docker_image
- staging_deploy
- production_deploy
staging_deploy:
  environment:
    name: staging
    url: https://relay-chat.in
  image: alpine:latest
  only:
  - master
  script:
  - which ssh-agent || ( apk add --no-cache openssh-client )
  - eval $(ssh-agent -s)
  - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add - > /dev/null
  - mkdir -p ~/.ssh
  - echo "$SSH_SERVER_HOSTKEYS" > ~/.ssh/known_hosts
  - ssh ${DEPLOY_USER}@${DEPLOY_SERVER} "ENV=${ENV} IMAGE_TAG=${IMAGE_TAG} CI_JOB_TOKEN=${CI_JOB_TOKEN}
    CI_REGISTRY=${CI_REGISTRY} RELAY_VAULT_DIR=${RELAY_VAULT_DIR} ${DEPLOY_SCRIPT}"
  stage: staging_deploy
  variables:
    DEPLOY_SCRIPT: ${RELAY_OPS_DIR}/bin/deploy-relay-backend
    ENV: staging
    RELAY_OPS_DIR: ${HOME}/relay-ops
    RELAY_VAULT_DIR: ${HOME}/relay-vault
test:
  script:
  - lein test
  services:
  - postgres:9.6-alpine
  stage: test
  variables:
    DB_DATABASE_NAME: relay_ci
    DB_PASSWORD: ''
    DB_SERVER_NAME: postgres
    DB_USERNAME: runner
    POSTGRES_DB: relay_ci
    POSTGRES_PASSWORD: ''
    POSTGRES_USER: runner
uberjar:
  artifacts:
    paths:
    - ${UBERJAR_TARGETS}
  only:
  - master
  script:
  - apt-get update
  - apt-get install -y build-essential
  - make uberjar
  stage: uberjar
  variables:
    UBERJAR_TARGETS: ${CI_PROJECT_DIR}/target/relay-backend-*-standalone.jar
variables:
  IMAGE_TAG: $CI_REGISTRY_IMAGE:$CI_COMMIT_REF_NAME-$CI_COMMIT_SHA
