stages:
- build
- test
test:back:
  before_script:
  - cd back/
  - pip install uv==0.8.11
  image: registry.gitlab.com/bagage/batimap/ci-test-back
  only:
    changes:
    - .gitlab-ci.yml
    - back/**/*
    refs:
    - merge_requests
  script:
  - sed -i 's/psycopg2 =/psycopg2-binary =/' pyproject.toml
  - uv sync --dev
  - uv run pre-commit  run --all-files --show-diff-on-failure
  - uv run pytest --color=yes -v -rf
  services:
  - alias: postgis
    name: registry.gitlab.com/bagage/batimap/postgis
  - alias: redis
    name: redis:5-alpine
  stage: test
  variables:
    POSTGRES_DB: testdb
    POSTGRES_HOST_AUTH_METHOD: trust
    POSTGRES_PASSWORD: batimap
    POSTGRES_URI: postgresql://test:batimap@postgis:5432/testdb
    POSTGRES_USER: test
    REDIS_URI: redis://redis
test:front:
  artifacts:
    reports:
      junit: front/src/junit_karma.xml
  before_script:
  - yarn config set cache-folder cache-ci
  cache:
    paths:
    - cache-ci/
    untracked: true
  image: registry.gitlab.com/bagage/batimap/ci-test-front
  only:
    changes:
    - .gitlab-ci.yml
    - front/**/*
    refs:
    - merge_requests
  script:
  - cd front/
  - yarn
  - yarn lint
  - yarn prettier --check
  - yarn test --karma-config karma-ci.conf.js
  stage: test
test:front:buildprod:
  before_script:
  - yarn config set cache-folder cache-ci
  cache:
    paths:
    - cache-ci/
    untracked: true
  image: registry.gitlab.com/bagage/batimap/ci-test-front
  only:
    changes:
    - .gitlab-ci.yml
    - front/**/*
    refs:
    - merge_requests
  script:
  - cd front/
  - yarn
  - yarn build --prod
  stage: test
