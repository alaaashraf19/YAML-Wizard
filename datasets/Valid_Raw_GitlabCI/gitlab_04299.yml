.build_docker_image:
  before_script: &id001
  - echo "$CI_JOB_TOKEN" | docker login -u gitlab-ci-token --password-stdin "$CI_REGISTRY"
  image: docker:24.0.5
  script: &id002
  - docker buildx build --platform linux/amd64 -t registry.gitlab.com/bagage/batimap/$CONTAINER:$CI_COMMIT_REF_SLUG
    -f ${BASE_DIR:-$CONTAINER}/$DOCKERFILE ${BASE_DIR:-$CONTAINER}
  - "if test $CI_COMMIT_REF_NAME = master; then\n  echo docker tag registry.gitlab.com/bagage/batimap/$CONTAINER:$CI_COMMIT_REF_SLUG\
    \ registry.gitlab.com/bagage/batimap/$CONTAINER:latest\n  docker tag registry.gitlab.com/bagage/batimap/$CONTAINER:$CI_COMMIT_REF_SLUG\
    \ registry.gitlab.com/bagage/batimap/$CONTAINER:latest\n  echo docker push registry.gitlab.com/bagage/batimap/$CONTAINER:latest\n\
    \  docker push registry.gitlab.com/bagage/batimap/$CONTAINER:latest\n  echo docker\
    \ push registry.gitlab.com/bagage/batimap/$CONTAINER:$CI_COMMIT_REF_SLUG\n  docker\
    \ push registry.gitlab.com/bagage/batimap/$CONTAINER:$CI_COMMIT_REF_SLUG\nfi\n"
  services: &id003
  - command:
    - --tls=false
    name: docker:24.0.5-dind
  stage: build
  variables:
    DOCKER_BUILDKIT: 1
    DOCKER_DRIVER: overlay2
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ''
.docker_vars:
  DOCKER_BUILDKIT: 1
  DOCKER_DRIVER: overlay2
  DOCKER_HOST: tcp://docker:2375
  DOCKER_TLS_CERTDIR: ''
build:back:
  before_script: *id001
  image: docker:24.0.5
  only:
    changes:
    - .gitlab-ci.yml
    - back/**/*
    refs:
    - merge_requests
    - master
  script: *id002
  services: *id003
  stage: build
  variables:
    CONTAINER: back
    DOCKERFILE: Dockerfile
    DOCKER_BUILDKIT: 1
    DOCKER_DRIVER: overlay2
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ''
