.cachable:
  cache: &id004
    paths:
    - vendor
.docker:
  before_script: &id001
  - 'eval $(grep -e "^version: " config.yaml | sed -e "s/version: /BUNDLE_VERSION=/")'
  - export DOCKER_REPOSITORY="gitlab/cog"
  - export TAG="$DOCKER_REPOSITORY:$BUNDLE_VERSION"
  - echo "TAG VERSION $TAG"
  - docker build -t "$TAG" .
  image: docker:latest
  services: &id002
  - docker:dind
  stage: test
  variables: &id003
    DOCKER_DRIVER: overlay
before_script:
- ruby -v
- which ruby
- gem install bundler --no-ri --no-rdoc
- bundle install --jobs $(nproc)  "${FLAGS[@]}"
deploy_dockerfile:
  before_script: *id001
  image: docker:latest
  only:
  - master
  script:
  - docker login -u "$DOCKER_HUB_USERNAME" -p "$DOCKER_HUB_PASSWORD"
  - docker push "$TAG"
  - docker tag "$TAG" "$DOCKER_REPOSITORY:latest"
  - docker push "$DOCKER_REPOSITORY:latest"
  services: *id002
  stage: deploy
  variables: *id003
image: ruby:2.4
rspec:
  cache: *id004
  script:
  - bundle exec rspec -f d -c -b
rubocop:
  script:
  - $CI_JOB_NAME
test_dockerfile:
  before_script: *id001
  except:
  - master
  image: docker:latest
  script:
  - docker build ./
  services: *id002
  stage: test
  variables: *id003
