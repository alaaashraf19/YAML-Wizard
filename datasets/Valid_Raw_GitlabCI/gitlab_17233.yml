build-branch:
  artifacts:
    paths:
    - build/
  before_script:
  - apt-get update -y
  - apt-get install -y make python3-pip
  - pip3 install -r requirements.txt
  except:
  - tags
  script:
  - make otf ttf webfonts
  stage: build
build-tag:
  artifacts:
    paths:
    - build/
  before_script:
  - apt-get update -y
  - apt-get install -y make python3-pip zip
  - pip3 install -r requirements.txt
  only:
  - tags
  script:
  - make ttf otf webfonts
  - sh tools/artifacts.sh
  stage: build
image: registry.gitlab.com/smc/dockerfiles:font-builder
release:
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  release:
    assets:
      links:
      - name: ${MANJARI_ZIP}
        url: ${PACKAGE_REGISTRY_URL}/${MANJARI_ZIP}
      - name: ${MANJARI_ZIP_MD5}
        url: ${PACKAGE_REGISTRY_URL}/${MANJARI_ZIP_MD5}
      - name: ${MANJARI_ZIP_SHA}
        url: ${PACKAGE_REGISTRY_URL}/${MANJARI_ZIP_SHA}
    description: Release $CI_COMMIT_TAG of $CI_PROJECT_NAME
    name: Release $CI_COMMIT_TAG
    tag_name: $CI_COMMIT_TAG
  rules:
  - if: $CI_COMMIT_TAG
  script:
  - echo "Running release_job"
  stage: release
stages:
- build
- test
- upload
- release
test:
  before_script:
  - apt-get update -y
  - apt-get install -y make libharfbuzz-bin python3-pip
  - pip3 install -r requirements.txt
  script:
  - make test
  stage: test
trigger_job:
  needs:
  - release
  only:
  - tags
  stage: release
  trigger:
    project: smc/smc.org.in
upload:
  dependencies:
  - build-tag
  image: curlimages/curl:latest
  rules:
  - if: $CI_COMMIT_TAG
  script:
  - 'curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" --upload-file build/${MANJARI_ZIP}
    ${PACKAGE_REGISTRY_URL}/${MANJARI_ZIP}

    '
  - 'curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" --upload-file build/${MANJARI_ZIP_MD5}
    ${PACKAGE_REGISTRY_URL}/${MANJARI_ZIP_MD5}

    '
  - 'curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" --upload-file build/${MANJARI_ZIP_SHA}
    ${PACKAGE_REGISTRY_URL}/${MANJARI_ZIP_SHA}

    '
  stage: upload
variables:
  MANJARI_ZIP: manjari-${PACKAGE_VERSION}.zip
  MANJARI_ZIP_MD5: ${MANJARI_ZIP}.md5
  MANJARI_ZIP_SHA: ${MANJARI_ZIP}.sha256
  PACKAGE_REGISTRY_URL: ${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/fontrelease/${PACKAGE_VERSION}
  PACKAGE_VERSION: $CI_COMMIT_TAG
