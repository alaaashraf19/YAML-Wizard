code_quality:
  allow_failure: true
  artifacts:
    paths:
    - gl-code-quality-report.json
  image: docker:stable
  script:
  - export SP_VERSION=$(echo "$CI_SERVER_VERSION" | sed 's/^\([0-9]*\)\.\([0-9]*\).*/\1-\2-stable/')
  - docker run --env SOURCE_CODE="$PWD" --volume "$PWD":/code --volume /var/run/docker.sock:/var/run/docker.sock
    "registry.gitlab.com/gitlab-org/security-products/codequality:$SP_VERSION" /code
  services:
  - docker:stable-dind
  stage: test
  variables:
    DOCKER_DRIVER: overlay2
dependency_scanning:
  allow_failure: true
  artifacts:
    paths:
    - gl-dependency-scanning-report.json
  image: docker:stable
  script:
  - export SP_VERSION=$(echo "$CI_SERVER_VERSION" | sed 's/^\([0-9]*\)\.\([0-9]*\).*/\1-\2-stable/')
  - docker run --env DEP_SCAN_DISABLE_REMOTE_CHECKS="${DEP_SCAN_DISABLE_REMOTE_CHECKS:-false}"
    --volume "$PWD:/code" --volume /var/run/docker.sock:/var/run/docker.sock "registry.gitlab.com/gitlab-org/security-products/dependency-scanning:$SP_VERSION"
    /code
  services:
  - docker:stable-dind
  stage: test
  variables:
    DOCKER_DRIVER: overlay2
image: node:8
integration:
  cache:
    paths:
    - node_modules
  coverage: /^Lines\s*:\s*([^%]+)/
  script:
  - npm install --silent
  - npm run lint
  - npm run coverage
  services:
  - mysql:5
  - diwakar4/rabbitmq-apifie
  - redis:4-alpine
  stage: test
license_management:
  allow_failure: true
  artifacts:
    paths:
    - gl-license-management-report.json
  image: docker:stable
  script:
  - export LICENSE_MANAGEMENT_VERSION=$(echo "$CI_SERVER_VERSION" | sed 's/^\([0-9]*\)\.\([0-9]*\).*/\1-\2-stable/')
  - docker run --volume "$PWD:/code" "registry.gitlab.com/gitlab-org/security-products/license-management:$LICENSE_MANAGEMENT_VERSION"
    analyze /code
  services:
  - docker:stable-dind
  stage: test
  variables:
    DOCKER_DRIVER: overlay2
sast:
  allow_failure: true
  artifacts:
    paths:
    - gl-sast-report.json
  image: docker:stable
  script:
  - export SP_VERSION=$(echo "$CI_SERVER_VERSION" | sed 's/^\([0-9]*\)\.\([0-9]*\).*/\1-\2-stable/')
  - docker run --env SAST_CONFIDENCE_LEVEL="${SAST_CONFIDENCE_LEVEL:-3}" --volume
    "$PWD:/code" --volume /var/run/docker.sock:/var/run/docker.sock "registry.gitlab.com/gitlab-org/security-products/sast:$SP_VERSION"
    /app/bin/run /code
  services:
  - docker:stable-dind
  stage: test
  variables:
    DOCKER_DRIVER: overlay2
stages:
- test
variables:
  DB_CONNECTION_URI: mysql://root:password@mysql/node-microservice
  MYSQL_DATABASE: node-microservice
  MYSQL_ROOT_PASSWORD: password
  RABBITMQ_DEFAULT_PASS: admin
  RABBITMQ_DEFAULT_USER: admin
  RABBITMQ_HOST: diwakar4-rabbitmq-apifie
  RABBITMQ_PORT: '5672'
  RABBITMQ_PWD: admin
  RABBITMQ_USER: admin
  REDIS_HOST: redis
  REDIS_PORT: '6379'
