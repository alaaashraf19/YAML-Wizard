compile:
  artifacts:
    paths:
    - pdf/*.pdf
  image: aergus/latex
  only:
    refs:
    - master
  script:
  - find . -maxdepth 1 -type f ! -name "*.*" -exec python3 statuto2tex.py "{}" \;
  - mkdir pdf
  - cd pdf
  - for i in ../*.tex ; do pdflatex "$i";pdflatex "$i";pdflatex "$i"; done
  stage: production
stages:
- production
