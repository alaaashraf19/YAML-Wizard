.validate:
  script: &id001
  - mvn $MAVEN_CLI_OPTS test-compile
  stage: build
.verify:
  except: &id002
  - master
  script: &id003
  - mvn $MAVEN_CLI_OPTS verify site site:stage
  stage: test
cache:
  paths:
  - .m2/repository
deploy:jdk8:
  artifacts:
    paths:
    - target/st
  image: maven:3.3.9-jdk-8
  only:
  - master
  script:
  - mvn package
  - mkdir target/st
  - mv target/jobmanager-*.jar target/st
  stage: test
pages:
  artifacts:
    paths:
    - public
  dependencies:
  - deploy:jdk8
  image: busybox:latest
  only:
  - master
  script:
  - mv target/st public
  stage: deploy
validate:jdk8:
  image: maven:3.3.9-jdk-8
  script: *id001
  stage: build
variables:
  MAVEN_CLI_OPTS: --batch-mode --errors --fail-at-end --show-version -DinstallAtEnd=true
    -DdeployAtEnd=true
  MAVEN_OPTS: -Dmaven.repo.local=.m2/repository -Dorg.slf4j.simpleLogger.log.org.apache.maven.cli.transfer.Slf4jMavenTransferListener=WARN
    -Dorg.slf4j.simpleLogger.showDateTime=true -Djava.awt.headless=true
verify:jdk8:
  except: *id002
  image: maven:3.3.9-jdk-8
  script: *id003
  stage: test
