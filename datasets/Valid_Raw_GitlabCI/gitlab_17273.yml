.build:
  artifacts:
    expire_in: 1 week
    name: $CI_JOB_NAME
    paths:
    - build
  before_script:
  - export CCACHE_BASEDIR=$CI_PROJECT_DIR
  - export CCACHE_DIR=$CI_PROJECT_DIR/ccache
  - export CCACHE_COMPILERCHECK=content
  - ccache --show-stats
  cache:
    key: $CI_JOB_NAME-$CI_COMMIT_REF_SLUG
    paths:
    - ccache
  script:
  - $CMAKE_GEN_CMD -B build $CMAKE_GEN_FLAGS
  - $CMAKE_CMD --build build
  stage: build
  variables:
    CMAKE_CMD: cmake
    CMAKE_GEN_CMD: cmake
    CMAKE_GEN_FLAGS: -DCMAKE_STAGING_PREFIX=$CI_PROJECT_DIR/staging -DCMAKE_SKIP_INSTALL_ALL_DEPENDENCY=TRUE
      -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache $CMAKE_GEN_EXTRA_FLAGS
.install:
  artifacts:
    expire_in: 1 month
    name: $CI_JOB_NAME
    paths:
    - staging
  script:
  - $CMAKE_CMD --install build --strip
  stage: install
  variables:
    CMAKE_CMD: cmake
.prepare:
  artifacts:
    expire_in: 1 week
    name: $CI_JOB_NAME
    paths:
    - staging
  before_script:
  - "if [[ -z $SOLARUS_REF ]]; then\n  case $CI_COMMIT_REF_NAME in\n    release-*)\
    \ SOLARUS_REF=$CI_COMMIT_REF_NAME ;;\n    *) SOLARUS_REF=${CI_COMMIT_TAG:-dev}\
    \ ;;\n  esac\nfi\n"
  - SOLARUS_ARTIFACTS=$SOLARUS_REPOSITORY/-/jobs/artifacts/$SOLARUS_REF
  - SOLARUS_JOB_ARTIFACT=$SOLARUS_ARTIFACTS/download?job=$SOLARUS_JOB
  - 'echo "Artifact: $SOLARUS_JOB_ARTIFACT"'
  image: $IMAGE_REPOSITORY/utilities-env:$IMAGE_VERSION
  script:
  - TMP_FILE=$(mktemp)
  - wget -O $TMP_FILE $SOLARUS_JOB_ARTIFACT
  - 7za x $TMP_FILE
  stage: prepare
  variables:
    GIT_STRATEGY: none
    SOLARUS_REPOSITORY: https://gitlab.com/solarus-games/solarus
linux-build:
  dependencies:
  - linux-prepare
  extends: .build
  image: $IMAGE_REPOSITORY/linux-build-env:$IMAGE_VERSION
linux-prepare:
  extends: .prepare
  variables:
    SOLARUS_JOB: linux-install
macos-build:
  artifacts:
    expire_in: 1 week
    name: $CI_JOB_NAME
    paths:
    - build
  before_script:
  - echo "started by ${GITLAB_USER_NAME} / @${GITLAB_USER_LOGIN}"
  - brew update
  - brew install coreutils cmake ninja pkg-config sdl2 sdl2_image sdl2_ttf luajit
    libvorbis libmodplug physfs glm openal-soft qt@6
  image: macos-15-xcode-16
  script:
  - cmake --preset macos
  - cmake --build --preset macos
  stage: build
  tags:
  - saas-macos-medium-m1
mingw-x64-build:
  dependencies:
  - mingw-x64-prepare
  extends: .build
  image: $IMAGE_REPOSITORY/mingw-build-env:$IMAGE_VERSION
  variables:
    CMAKE_GEN_CMD: x86_64-w64-mingw32-cmake
    CMAKE_GEN_EXTRA_FLAGS: -DENABLE_QTDEPLOY=OFF
mingw-x64-install:
  dependencies:
  - mingw-x64-prepare
  - mingw-x64-build
  extends: .install
  image: $IMAGE_REPOSITORY/linux-build-env:$IMAGE_VERSION
mingw-x64-package:
  artifacts:
    expire_in: 1 month
    name: $CI_JOB_NAME
    paths:
    - $PACKAGE_PREFIX-*.zip
  before_script:
  - PACKAGE_REF=${CI_COMMIT_TAG:-$CI_COMMIT_SHORT_SHA}
  - PACKAGE=$PACKAGE_PREFIX-$PACKAGE_REF.zip
  - 'echo "Package: $PACKAGE"'
  dependencies:
  - mingw-x64-install
  image: $IMAGE_REPOSITORY/mingw-build-env:$IMAGE_VERSION
  script:
  - mingw_make_pkg.sh $ARCH $PACKAGE $BASE_DIR $BINARIES
  - if [[ -n $EXTRAS ]]; then pkg_add.sh $PACKAGE $BASE_DIR $EXTRAS; fi
  - if [[ -n $TEXT_FILES ]]; then unix2dos -k -o $TEXT_FILES; pkg_add.sh $PACKAGE
    . $TEXT_FILES; fi
  - cp /usr/$ARCH-w64-mingw32/bin/luajit-2.1.dll lua51.dll
  - pkg_add.sh $PACKAGE $BASE_DIR lua51.dll
  stage: package
  variables:
    ARCH: x86_64
    BASE_DIR: solarus
    BINARIES: staging/bin/libsolarus.dll staging/bin/solarus-launcher.exe
    EXTRAS: staging/share/solarus/gamecontrollerdb.txt /usr/$ARCH-w64-mingw32/lib/qt6/plugins/iconengines
      /usr/$ARCH-w64-mingw32/lib/qt6/plugins/imageformats /usr/$ARCH-w64-mingw32/lib/qt6/plugins/platforms
      /usr/$ARCH-w64-mingw32/lib/qt6/plugins/styles
    PACKAGE_PREFIX: solarus-launcher-x64
    TEXT_FILES: CHANGELOG.md LICENSE
mingw-x64-prepare:
  extends: .prepare
  variables:
    SOLARUS_JOB: mingw-x64-install
stages:
- prepare
- build
- install
- package
variables:
  GIT_DEPTH: 1
  IMAGE_REPOSITORY: registry.gitlab.com/solarus-games/solarus-devops
  IMAGE_VERSION: 20250217
