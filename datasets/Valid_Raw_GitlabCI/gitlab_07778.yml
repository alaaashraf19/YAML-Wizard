before_script:
- git --version
- ssh-add ~/.ssh/asic_tools_deploy
install_job:
  artifacts:
    expire_in: 1 week
    paths:
    - tools/
  only:
  - develop
  script:
  - git submodule update --init --recursive
  - tests/scripts/install.sh
  stage: install
stages:
- install
- test
test_CIC:
  artifacts:
    expire_in: 3 months
    paths:
    - test_designs/
    when: always
  dependencies:
  - install_job
  only:
  - develop
  script:
  - tests/scripts/runTest.sh CIC.v
  stage: test
