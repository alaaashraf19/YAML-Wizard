.build_rootfs:
  before_script:
  - mkdir -pv rootfs
  - cp -v output/oc-* rootfs/
  - mkdir -pv rootfs/etc/pki/tls/certs
  - mkdir -pv rootfs/bin-runner
  - cp -v /etc/pki/tls/certs/ca-bundle.crt rootfs/etc/pki/tls/certs/ca-bundle.crt
  - chmod -Rv 777  rootfs
  dependencies:
  - build
  image: centos
  retry: 2
  script:
  - copy --from_text="$ODAGRUN_IMAGE_VERSION" --to_term
  - copy --from_text="$ODAGRUN_IMAGE_DESCRIPTION" --to_term
  - registry_push --rootfs --config --image=$DOCKER_NAMESPACE/$ODAGRUN_IMAGE_REFNAME:$CI_PIPELINE_ID
  stage: build-image
  tags:
  - odagrun
  variables:
    ODAGRUN_POD_SIZE: medium
.review-image-starter:
  allow_failure: true
  dependencies: []
  image: scratch
  retry: 2
  script:
  - 'registry_push --from_image=$DOCKER_NAMESPACE/$ODAGRUN_IMAGE_REFNAME:$CI_PIPELINE_ID
    --name=review --ISR --skip_label

    '
  stage: review_starter
  tags:
  - odagrun-review
  variables:
    WORK_SPACES: '[]

      '
Release_Staging:
  environment:
    name: staging
    url: http://staging.$CI_PROJECT_PATH_SLUG.$DEPLOY_DOMAIN_APP
  except:
  - branches
  only:
  - tags
  script:
  - deployctl release
  stage: staging
  tags:
  - deployctl-gioxapp.com
  variables:
    GIT_STRATEGY: none
Release_production:
  allow_failure: false
  environment:
    name: production
    url: http://$DEPLOY_DOMAIN/$CI_BUILD_REF_SLUG
  except:
  - branches
  only:
  - tags
  script:
  - deployctl release
  stage: production
  tags:
  - deployctl-gioxapp.com
build:
  artifacts:
    paths:
    - output/
  image: gioxa/build-image-4-odagrun
  retry: 2
  script:
  - ./autogen.sh
  - './configure LIBS=-ldl LDFLAGS=-static CFLAGS=''-Wl,-static -Wall -Werror -Wextra
    -Wformat-security -Wformat=2 -Wunused-value -Wchar-subscripts -Wno-missing-field-initializers
    -D_FORTIFY_SOURCE=1 -O -fdata-sections -ffunction-sections -Wl,--gc-sections -Wl,-s
    -fdiagnostics-color=always''

    '
  - export GCC_COLORS='error=01;31:warning=01;35:note=01;36:caret=01;32:locus=01:quote=01'
  - make -j$(nproc)> /dev/null
  - make DESTDIR=$PWD install
  - mkdir output
  - cp usr/local/bin/oc-* output/
  - make clean
  - mkdir -pv rootfs
  - cp -v output/oc-* rootfs/
  - mkdir -pv rootfs/etc/pki/tls/certs
  - mkdir -pv rootfs/bin-runner
  - cp -v /etc/pki/tls/certs/ca-bundle.crt rootfs/etc/pki/tls/certs/ca-bundle.crt
  - chmod -Rv 777  rootfs
  - 'registry_push --rootfs --config --image=$DOCKER_NAMESPACE/$ODAGRUN_IMAGE_REFNAME:$CI_PIPELINE_ID

    '
  stage: build
  tags:
  - odagrun
  variables:
    ODAGRUN_POD_SIZE: large
build_check:
  artifacts:
    paths:
    - tests/*.log
    when: on_failure
  image: gioxa/build-image-4-odagrun
  retry: 2
  script:
  - ./autogen.sh
  - ./configure
  - make -j$(($(nproc)/3+1)) check
  stage: build
  tags:
  - odagrun
  variables:
    ODAGRUN_POD_SIZE: small
build_cov:
  artifacts:
    paths:
    - output
  coverage: '/lines[\.]{6}: (\d+.\d+\%) \(/'
  dependencies: []
  image: gioxa/build-image-4-odagrun
  retry: 2
  script:
  - rm -f src/*.gcno
  - rm -f src/*.gcda
  - rm -f tests/*.gcno
  - rm -f tests/*.gcda
  - ./autogen.sh
  - ./configure  --enable-code-coverage
  - make clean > /dev/null
  - make -j$(($(nproc)/3+1)) check-code-coverage
  - mkdir -pv output
  - mv  tests/odagrun-coverage output/
  - cp tests/coverage.url output/coverage.url
  stage: build
  tags:
  - odagrun
  variables:
    ODAGRUN_POD_SIZE: small
build_dist:
  artifacts:
    paths:
    - output
  image: gioxa/build-image-4-odagrun
  retry: 2
  script:
  - ./autogen.sh
  - ./configure
  - make dist > /dev/null
  - rm -rf output
  - mkdir -pv output/dist
  - ls -la
  - mv -v *.tar.gz output/dist
  - ls -la output/dist
  - make clean
  stage: build
  tags:
  - odagrun
  variables:
    ODAGRUN_POD_SIZE: nano
build_docs:
  artifacts:
    paths:
    - output
  dependencies: []
  image: gioxa/pandoc-centos
  retry: 2
  script:
  - mkdir -pv output/manual
  - copy --to_file=Docs/start_s.md --from_file=Docs/start.md --substitute
  - copy --to_file=output/install_odagrun.yml --from_file=openshift/install_odagrun.in.yml
    --substitute
  - copy --to_file=output/uninstall_template.yml --from_file=openshift/uninstall_template.in.yml
    --substitute
  - copy --from_file=openshift/service_template.yml --to_file=output/service_template.yml
  - copy --to_var=install_odagrun_openshift --from_file=output/install_odagrun.yml
  - copy --to_var=service_template_openshift --from_file=output/service_template.yml
  - copy --to_var=uninstall_template_openshift --from_file=output/uninstall_template.yml
  - copy --to_file=Docs/install.md --from_file=Docs/install.in.md --substitute
  - copy --to_file=Docs/meta.yaml --from_file=Docs/meta.yaml.in --substitute
  - cp -v  Docs/odagrun.css output/manual/odagrun.css
  - cp -vr Docs/*.png output/manual/
  - cp -vr Docs/*.svg output/manual/
  - pandoc -s --highlight-style pygments --toc --toc-depth=2 -c odagrun.css -o output/manual/manual.html
    Docs/start_s.md Docs/intro.md Docs/install.md Docs/podsize.md Docs/dependencies.md
    Docs/artifacts.md Docs/git_cache.md Docs/work_spaces.md Docs/variables.md Docs/registry.md
    Docs/copy.md Docs/dockerHub.md Docs/Quay_api.md Docs/ImageStream.md Docs/MicroBadger.md
  - copy --from_text="manual/manual.html" --to_file=output/User_Guide.url
  stage: build
  tags:
  - odagrun
  variables:
    ODAGRUN_POD_SIZE: nano
cleanup:
  allow_failure: true
  dependencies: []
  script:
  - DockerHub_delete_tag --allow-fail --image=$DOCKER_NAMESPACE/$ODAGRUN_IMAGE_REFNAME
    --tag=$CI_PIPELINE_ID
  - MicroBadger_Update  --allow-fail --image=$DOCKER_NAMESPACE/$ODAGRUN_IMAGE_REFNAME
  stage: cleanup
  tags:
  - odagrun
  variables:
    WORK_SPACES: "- name: pipeline\n  scope: pipeline\n  strategy: clean\n"
  when: always
image: scratch
refresh_cache:
  retry: 2
  script:
  - copy --from_text="$ODAGRUN_GITVERSION" --to_var=ODAGRUN_IMAGE_VERSION
  - copy --if_value="${CI_COMMIT_TAG}" --from_text="https://${DEPLOY_DOMAIN}/${ODAGRUN_COMMIT_TAG_SLUG}"
    --to_var=BASE_DEPLOY_URL
  - copy --if_zero="${CI_COMMIT_TAG}" --if_zero="${CI_COMMIT_REF_NAME#master}" --from_text="http://master.${CI_PROJECT_PATH_SLUG}.${DEPLOY_DOMAIN_APP}"
    --to_var=BASE_DEPLOY_URL
  - copy --if_zero="${BASE_DEPLOY_URL}" --from_text="https://${DEPLOY_DOMAIN}/latest"
    --to_var=BASE_DEPLOY_URL
  - copy --from_text="$BASE_DEPLOY_URL/files/manual/manual.html" --to_var=ODAGRUN_IMAGE_DOCUMENTATION
  - copy --if_zero="${CI_COMMIT_TAG}" --if_zero="${CI_COMMIT_REF_NAME#master}" --from_text="${DOCKER_NAMESPACE}/${ODAGRUN_IMAGE_REFNAME}:master"
    --to_var=ODAGRUN_TEMPLATE_IMAGE
  - copy --if_value="${CI_COMMIT_TAG}" --from_text="${DOCKER_NAMESPACE}/${ODAGRUN_IMAGE_REFNAME}:latest"
    --to_var=ODAGRUN_TEMPLATE_IMAGE
  - 'copy --if_zero="${CI_COMMIT_TAG}" --if_value="${CI_COMMIT_REF_NAME#master}" --from_text="${DOCKER_NAMESPACE}/${ODAGRUN_IMAGE_REFNAME}:review"
    --to_var=ODAGRUN_TEMPLATE_IMAGE   '
  - copy --to_var=ODAGRUN_IMAGE_DESCRIPTION --substitute --from_file=full_description.md
  stage: cache
  tags:
  - odagrun
  variables:
    GIT_CACHE_STRATEGY: push-pull
    GIT_STRATEGY: clone
    WORK_SPACES: "- name: pipeline\n  scope: pipeline\n  environment:\n  - ODAGRUN_GITVERSION\n\
      \  - ODAGRUN_IMAGE_VERSION\n  - ODAGRUN_IMAGE_DESCRIPTION\n  - ODAGRUN_IMAGE_DOCUMENTATION\n\
      \  - ODAGRUN_TEMPLATE_IMAGE\n  - BASE_DEPLOY_URL\n  path: /builds\n  strategy:\
      \ push\n"
release-image:
  allow_failure: false
  dependencies: []
  except:
  - branches
  only:
  - tags
  retry: 1
  script:
  - 'registry_push --from_image=$DOCKER_NAMESPACE/$ODAGRUN_IMAGE_REFNAME:$CI_PIPELINE_ID
    --reference=$CI_COMMIT_TAG --GLR --skip_label

    '
  - registry_tag_image --GLR --reference=$CI_COMMIT_TAG --tag=latest
  stage: release-image
  tags:
  - odagrun
  when: manual
release-image:docker:
  dependencies: []
  except:
  - branches
  only:
  - tags
  retry: 1
  script:
  - DockerHub_set_description --image=$DOCKER_NAMESPACE/$ODAGRUN_IMAGE_REFNAME
  - 'registry_push --from_image=$DOCKER_NAMESPACE/$ODAGRUN_IMAGE_REFNAME:$CI_PIPELINE_ID
    --image=$DOCKER_NAMESPACE/$ODAGRUN_IMAGE_REFNAME:$CI_COMMIT_TAG --skip_label

    '
  - registry_tag_image --image=$DOCKER_NAMESPACE/$ODAGRUN_IMAGE_REFNAME:$CI_COMMIT_TAG
    --tag=latest
  - QUAY_set_description --image="quay.io/$DOCKER_NAMESPACE/$ODAGRUN_IMAGE_REFNAME"
  - 'registry_push --from_image=$DOCKER_NAMESPACE/$ODAGRUN_IMAGE_REFNAME:$CI_PIPELINE_ID
    --image=quay.io/$DOCKER_NAMESPACE/$ODAGRUN_IMAGE_REFNAME:$CI_COMMIT_TAG --skip_label

    '
  - registry_tag_image --image=quay.io/$DOCKER_NAMESPACE/$ODAGRUN_IMAGE_REFNAME:$CI_COMMIT_TAG
    --tag=latest
  stage: production
  tags:
  - odagrun
reviewb:
  allow_failure: true
  environment:
    name: review/$CI_BUILD_REF_NAME
    on_stop: stop_reviewb
    url: http://$CI_ENVIRONMENT_SLUG.$CI_PROJECT_PATH_SLUG.$DEPLOY_DOMAIN_APP
  except:
  - tags
  - master
  only:
  - branches
  script:
  - deployctl release
  stage: review
  tags:
  - deployctl-gioxapp.com
reviewb-image:
  allow_failure: true
  dependencies: []
  except:
  - tags
  - master
  only:
  - branches
  retry: 1
  script:
  - 'registry_push --from_image=$DOCKER_NAMESPACE/$ODAGRUN_IMAGE_REFNAME:$CI_PIPELINE_ID
    --image=$DOCKER_NAMESPACE/$ODAGRUN_IMAGE_REFNAME:review --skip_label

    '
  stage: review
  tags:
  - odagrun
reviewm:
  environment:
    name: master
    on_stop: stop_reviewm
    url: http://master.$CI_PROJECT_PATH_SLUG.$DEPLOY_DOMAIN_APP
  except:
  - tags
  only:
  - master
  script:
  - deployctl release
  stage: review
  tags:
  - deployctl-gioxapp.com
reviewm-image:
  dependencies: []
  except:
  - tags
  only:
  - master
  retry: 2
  script:
  - DockerHub_set_description --image="$DOCKER_NAMESPACE/$ODAGRUN_IMAGE_REFNAME"
  - 'registry_push --from_image=$DOCKER_NAMESPACE/$ODAGRUN_IMAGE_REFNAME:$CI_PIPELINE_ID
    --image="$DOCKER_NAMESPACE/$ODAGRUN_IMAGE_REFNAME:master" --skip_label

    '
  - 'registry_push --from_image=$DOCKER_NAMESPACE/$ODAGRUN_IMAGE_REFNAME:$CI_PIPELINE_ID
    --GLR --reference=master --skip_label

    '
  - QUAY_set_description --image="quay.io/$DOCKER_NAMESPACE/$ODAGRUN_IMAGE_REFNAME"
  - 'registry_push --from_image=$DOCKER_NAMESPACE/$ODAGRUN_IMAGE_REFNAME:$CI_PIPELINE_ID
    --image="quay.io/$DOCKER_NAMESPACE/$ODAGRUN_IMAGE_REFNAME:master" --skip_label

    '
  stage: review
  tags:
  - odagrun
stages:
- cache
- build
- test
- build-image
- review
- review_starter
- staging
- release-image
- production
- cleanup
stop_reviewb:
  dependencies: []
  environment:
    action: stop
    name: review/$CI_BUILD_REF_NAME
  except:
  - tags
  - master
  image: scratch
  only:
  - branches
  script:
  - deployctl delete
  stage: review
  tags:
  - deployctl-gioxapp.com
  when: manual
stop_reviewm:
  allow_failure: true
  dependencies: []
  environment:
    action: stop
    name: master
  except:
  - tags
  only:
  - master
  script:
  - deployctl delete
  stage: review
  tags:
  - deployctl-gioxapp.com
  when: manual
variables:
  DEPLOY_CONFIG_HTTPS: 'True'
  DEPLOY_DOMAIN: downloads.odagrun.com
  DEPLOY_DOMAIN_APP: gioxapp.com
  DEPLOY_RELEASE_PATH: '["output/","output/dist/"]'
  DEPLOY_hrefs: '[ "website": "http://www.odagrun.com"]'
  DOCKER_NAMESPACE: gioxa
  GIT_STRATEGY: none
  ODAGRUN_IMAGE_LICENSE: MIT
  ODAGRUN_IMAGE_REFNAME: odagrun
  ODAGRUN_IMAGE_TITLE: Building Docker Images Without Docker from GitLAB on Openshift
    as non-root with OCI labels.
  ODAGRUN_IMAGE_URL: https://www.odagrun.com
  ODAGRUN_IMAGE_VENDOR: Gioxa Ltd
  ODAGRUN_POD_SIZE: micro
  WORK_SPACES: "- name: pipeline\n  scope: pipeline\n  strategy: pull\n  mandatory:\
    \ True\n"
