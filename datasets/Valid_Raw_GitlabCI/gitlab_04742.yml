  \ \\\n                 --volume \"$PWD:/code\" \\\n                 --volume /var/run/docker.sock:/var/run/docker.sock\
  \ \\\n                 \"registry.gitlab.com/gitlab-org/security-products/dependency-scanning:$SP_VERSION\"\
  \ /code\n      ;;\n    *)\n      echo \"GitLab EE is required\"\n      ;;\n  esac\n\
  }\n\nfunction get_replicas() {\n  track=\"${1:-stable}\"\n  percentage=\"${2:-100}\"\
