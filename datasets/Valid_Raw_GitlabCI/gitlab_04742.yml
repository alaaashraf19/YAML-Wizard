.auto_devops: "# Auto DevOps variables and functions\n[[ \"$TRACE\" ]] && set -x\n\
  export CI_APPLICATION_REPOSITORY=$CI_REGISTRY_IMAGE/$CI_COMMIT_REF_SLUG\nexport\
  \ CI_APPLICATION_TAG=$CI_COMMIT_SHA\nexport CI_CONTAINER_NAME=ci_job_build_${CI_JOB_ID}\n\
  export TILLER_NAMESPACE=$KUBE_NAMESPACE\n# Extract \"MAJOR.MINOR\" from CI_SERVER_VERSION\
  \ and generate \"MAJOR-MINOR-stable\" for Security Products\nexport SP_VERSION=$(echo\
  \ \"$CI_SERVER_VERSION\" | sed 's/^\\([0-9]*\\)\\.\\([0-9]*\\).*/\\1-\\2-stable/')\n\
  \nfunction registry_login() {\n  if [[ -n \"$CI_REGISTRY_USER\" ]]; then\n    echo\
  \ \"Logging to GitLab Container Registry with CI credentials...\"\n    docker login\
  \ -u \"$CI_REGISTRY_USER\" -p \"$CI_REGISTRY_PASSWORD\" \"$CI_REGISTRY\"\n    echo\
  \ \"\"\n  fi\n}\n\nfunction container_scanning() {\n  registry_login\n\n  docker\
  \ run -d --name db arminc/clair-db:latest\n  apk add -U wget ca-certificates\n \
  \ docker pull ${CI_APPLICATION_REPOSITORY}:${CI_APPLICATION_TAG}\n  wget https://github.com/arminc/clair-scanner/releases/download/v8/clair-scanner_linux_amd64\n\
  \  mv clair-scanner_linux_amd64 clair-scanner\n  chmod +x clair-scanner\n  touch\
  \ clair-whitelist.yml\n  retries=0\n  echo \"Waiting for clair daemon to start\"\
  \n  while( ! wget -T 10 -q -O /dev/null http://docker:6060/v1/namespaces ) ; do\
  \ sleep 1 ; echo -n \".\" ; if [ $retries -eq 10 ] ; then echo \" Timeout, aborting.\"\
  \ ; exit 1 ; fi ; retries=$(($retries+1)) ; done\n  ./clair-scanner -c http://docker:6060\
  \ --ip $(hostname -i) -r gl-container-scanning-report.json -l clair.log -w clair-whitelist.yml\
  \ ${CI_APPLICATION_REPOSITORY}:${CI_APPLICATION_TAG} || true\n}\n\nfunction code_quality()\
  \ {\n  docker run --env SOURCE_CODE=\"$PWD\" \\\n             --volume \"$PWD\"\
  :/code \\\n             --volume /var/run/docker.sock:/var/run/docker.sock \\\n\
  \             \"registry.gitlab.com/gitlab-org/security-products/codequality:$SP_VERSION\"\
  \ /code\n}\n\nfunction license_management() {\n  /run.sh analyze .\n}\n\nfunction\
  \ sast() {\n  case \"$CI_SERVER_VERSION\" in\n    *-ee)\n\n      # Deprecation notice\
  \ for CONFIDENCE_LEVEL variable\n      if [ -z \"$SAST_CONFIDENCE_LEVEL\" -a \"\
  $CONFIDENCE_LEVEL\" ]; then\n        SAST_CONFIDENCE_LEVEL=\"$CONFIDENCE_LEVEL\"\
  \n        echo \"WARNING: CONFIDENCE_LEVEL is deprecated and MUST be replaced with\
  \ SAST_CONFIDENCE_LEVEL\"\n      fi\n\n      docker run --env SAST_CONFIDENCE_LEVEL=\"\
  ${SAST_CONFIDENCE_LEVEL:-3}\" \\\n                 --volume \"$PWD:/code\" \\\n\
  \                 --volume /var/run/docker.sock:/var/run/docker.sock \\\n      \
  \           \"registry.gitlab.com/gitlab-org/security-products/sast:$SP_VERSION\"\
  \ /app/bin/run /code\n      ;;\n    *)\n      echo \"GitLab EE is required\"\n \
  \     ;;\n  esac\n}\n\nfunction dependency_scanning() {\n  case \"$CI_SERVER_VERSION\"\
  \ in\n    *-ee)\n      docker run --env DEP_SCAN_DISABLE_REMOTE_CHECKS=\"${DEP_SCAN_DISABLE_REMOTE_CHECKS:-false}\"\
  \ \\\n                 --volume \"$PWD:/code\" \\\n                 --volume /var/run/docker.sock:/var/run/docker.sock\
  \ \\\n                 \"registry.gitlab.com/gitlab-org/security-products/dependency-scanning:$SP_VERSION\"\
  \ /code\n      ;;\n    *)\n      echo \"GitLab EE is required\"\n      ;;\n  esac\n\
  }\n\nfunction get_replicas() {\n  track=\"${1:-stable}\"\n  percentage=\"${2:-100}\"\
  \n\n  env_track=$( echo $track | tr -s  '[:lower:]'  '[:upper:]' )\n  env_slug=$(\
  \ echo ${CI_ENVIRONMENT_SLUG//-/_} | tr -s  '[:lower:]'  '[:upper:]' )\n\n  if [[\
  \ \"$track\" == \"stable\" ]] || [[ \"$track\" == \"rollout\" ]]; then\n    # for\
  \ stable track get number of replicas from `PRODUCTION_REPLICAS`\n    eval new_replicas=\\\
  $${env_slug}_REPLICAS\n    if [[ -z \"$new_replicas\" ]]; then\n      new_replicas=$REPLICAS\n\
  \    fi\n  else\n    # for all tracks get number of replicas from `CANARY_PRODUCTION_REPLICAS`\n\
  \    eval new_replicas=\\$${env_track}_${env_slug}_REPLICAS\n    if [[ -z \"$new_replicas\"\
  \ ]]; then\n      eval new_replicas=\\${env_track}_REPLICAS\n    fi\n  fi\n\n  replicas=\"\
  ${new_replicas:-1}\"\n  replicas=\"$(($replicas * $percentage / 100))\"\n\n  # always\
  \ return at least one replicas\n  if [[ $replicas -gt 0 ]]; then\n    echo \"$replicas\"\
  \n  else\n    echo 1\n  fi\n}\n\nfunction deploy() {\n  track=\"${1-stable}\"\n\
  \  percentage=\"${2:-100}\"\n  name=\"$CI_ENVIRONMENT_SLUG\"\n\n  replicas=\"1\"\
  \n  service_enabled=\"true\"\n\n  # if track is different than stable,\n  # re-use\
  \ all attached resources\n  if [[ \"$track\" != \"stable\" ]]; then\n    name=\"\
  $name-$track\"\n    service_enabled=\"false\"\n  fi\n\n  replicas=$(get_replicas\
  \ \"$track\" \"$percentage\")\n\n  if [[ \"$CI_PROJECT_VISIBILITY\" != \"public\"\
  \ ]]; then\n    secret_name='gitlab-registry'\n  else\n    secret_name=''\n  fi\n\
  \n  if [[ -n \"$DB_INITIALIZE\" && -z \"$(helm ls -q \"^$name$\")\" ]]; then\n \
  \   echo \"Deploying first release with database initialization...\"\n    helm upgrade\
  \ --install \\\n      --wait \\\n      --set service.enabled=\"$service_enabled\"\
  \ \\\n      --set releaseOverride=\"$CI_ENVIRONMENT_SLUG\" \\\n      --set image.repository=\"\
  $CI_APPLICATION_REPOSITORY\" \\\n      --set image.tag=\"$CI_APPLICATION_TAG\" \\\
  \n      --set image.pullPolicy=IfNotPresent \\\n      --set image.secrets[0].name=\"\
  $secret_name\" \\\n      --set application.track=\"$track\" \\\n      --set application.database_url=\"\
  $DATABASE_URL\" \\\n      --set service.url=\"$CI_ENVIRONMENT_URL\" \\\n      --set\
  \ replicaCount=\"$replicas\" \\\n      --namespace=\"$KUBE_NAMESPACE\" \\\n    \
  \  \"$name\" \\\n      chart/\n\n    echo \"Deploying second release...\"\n    helm\
  \ upgrade --reuse-values \\\n      --wait \\\n      --set application.initializeCommand=\"\
  \" \\\n      --set application.migrateCommand=\"$DB_MIGRATE\" \\\n      --namespace=\"\
  $KUBE_NAMESPACE\" \\\n      \"$name\" \\\n      chart/\n  else\n    echo \"Deploying\
  \ new release...\"\n    helm upgrade --install \\\n      --wait \\\n      --set\
  \ service.enabled=\"$service_enabled\" \\\n      --set releaseOverride=\"$CI_ENVIRONMENT_SLUG\"\
  \ \\\n      --set image.repository=\"$CI_APPLICATION_REPOSITORY\" \\\n      --set\
  \ image.tag=\"$CI_APPLICATION_TAG\" \\\n      --set image.pullPolicy=IfNotPresent\
  \ \\\n      --set image.secrets[0].name=\"$secret_name\" \\\n      --set application.track=\"\
  $track\" \\\n      --set application.database_url=\"$DATABASE_URL\" \\\n      --set\
  \ service.url=\"$CI_ENVIRONMENT_URL\" \\\n      --set replicaCount=\"$replicas\"\
  \ \\\n      --namespace=\"$KUBE_NAMESPACE\" \\\n      \"$name\" \\\n      chart/\n\
  \  fi\n\n  kubectl rollout status -n \"$KUBE_NAMESPACE\" -w \"deployment/$name\"\
  \n}\n\nfunction scale() {\n  track=\"${1-stable}\"\n  percentage=\"${2-100}\"\n\
  \  name=\"$CI_ENVIRONMENT_SLUG\"\n\n  if [[ \"$track\" != \"stable\" ]]; then\n\
  \    name=\"$name-$track\"\n  fi\n\n  replicas=$(get_replicas \"$track\" \"$percentage\"\
  )\n\n  if [[ -n \"$(helm ls -q \"^$name$\")\" ]]; then\n    helm upgrade --reuse-values\
  \ \\\n      --wait \\\n      --set replicaCount=\"$replicas\" \\\n      --namespace=\"\
  $KUBE_NAMESPACE\" \\\n      \"$name\" \\\n      chart/\n  fi\n}\n\nfunction install_dependencies()\
  \ {\n  apk add -U openssl curl tar gzip bash ca-certificates git\n  curl -L -o /etc/apk/keys/sgerrand.rsa.pub\
  \ https://alpine-pkgs.sgerrand.com/sgerrand.rsa.pub\n  curl -L -O https://github.com/sgerrand/alpine-pkg-glibc/releases/download/2.28-r0/glibc-2.28-r0.apk\n\
  \  apk add glibc-2.28-r0.apk\n  rm glibc-2.28-r0.apk\n\n  curl \"https://kubernetes-helm.storage.googleapis.com/helm-v${HELM_VERSION}-linux-amd64.tar.gz\"\
  \ | tar zx\n  mv linux-amd64/helm /usr/bin/\n  mv linux-amd64/tiller /usr/bin/\n\
  \  helm version --client\n  tiller -version\n\n  curl -L -o /usr/bin/kubectl \"\
  https://storage.googleapis.com/kubernetes-release/release/v${KUBERNETES_VERSION}/bin/linux/amd64/kubectl\"\
  \n  chmod +x /usr/bin/kubectl\n  kubectl version --client\n}\n\nfunction setup_docker()\
  \ {\n  if ! docker info &>/dev/null; then\n    if [ -z \"$DOCKER_HOST\" -a \"$KUBERNETES_PORT\"\
  \ ]; then\n      export DOCKER_HOST='tcp://localhost:2375'\n    fi\n  fi\n}\n\n\
  function download_chart() {\n  if [[ ! -d chart ]]; then\n    auto_chart=${AUTO_DEVOPS_CHART:-gitlab/auto-deploy-app}\n\
  \    auto_chart_name=$(basename $auto_chart)\n    auto_chart_name=${auto_chart_name%.tgz}\n\
  \    auto_chart_name=${auto_chart_name%.tar.gz}\n  else\n    auto_chart=\"chart\"\
  \n    auto_chart_name=\"chart\"\n  fi\n\n  helm init --client-only\n  helm repo\
  \ add gitlab https://charts.gitlab.io\n  if [[ ! -d \"$auto_chart\" ]]; then\n \
  \   helm fetch ${auto_chart} --untar\n  fi\n  if [ \"$auto_chart_name\" != \"chart\"\
  \ ]; then\n    mv ${auto_chart_name} chart\n  fi\n\n  helm dependency update chart/\n\
  \  helm dependency build chart/\n}\n\nfunction ensure_namespace() {\n  kubectl describe\
  \ namespace \"$KUBE_NAMESPACE\" || kubectl create namespace \"$KUBE_NAMESPACE\"\n\
  }\n\nfunction check_kube_domain() {\n  if [ -z ${AUTO_DEVOPS_DOMAIN+x} ]; then\n\
  \    echo \"In order to deploy or use Review Apps, AUTO_DEVOPS_DOMAIN variable must\
  \ be set\"\n    echo \"You can do it in Auto DevOps project settings or defining\
  \ a variable at group or project level\"\n    echo \"You can also manually add it\
  \ in .gitlab-ci.yml\"\n    false\n  else\n    true\n  fi\n}\n\nfunction build()\
  \ {\n  registry_login\n\n  echo \"Building Dockerfile-based application...\"\n \
  \ docker build \\\n    --build-arg HTTP_PROXY=\"$HTTP_PROXY\" \\\n    --build-arg\
  \ http_proxy=\"$http_proxy\" \\\n    --build-arg HTTPS_PROXY=\"$HTTPS_PROXY\" \\\
  \n    --build-arg https_proxy=\"$https_proxy\" \\\n    --build-arg FTP_PROXY=\"\
  $FTP_PROXY\" \\\n    --build-arg ftp_proxy=\"$ftp_proxy\" \\\n    --build-arg NO_PROXY=\"\
  $NO_PROXY\" \\\n    --build-arg no_proxy=\"$no_proxy\" \\\n    -t \"$CI_APPLICATION_REPOSITORY:$CI_APPLICATION_TAG\"\
  \ .\n\n  echo \"Pushing to GitLab Container Registry...\"\n  docker push \"$CI_APPLICATION_REPOSITORY:$CI_APPLICATION_TAG\"\
  \n  echo \"\"\n}\n\nfunction initialize_tiller() {\n  echo \"Checking Tiller...\"\
  \n\n  export HELM_HOST=\"localhost:44134\"\n  tiller -listen ${HELM_HOST} -alsologtostderr\
  \ > /dev/null 2>&1 &\n  echo \"Tiller is listening on ${HELM_HOST}\"\n\n  if ! helm\
  \ version --debug; then\n    echo \"Failed to init Tiller.\"\n    return 1\n  fi\n\
  \  echo \"\"\n}\n\nfunction create_secret() {\n  echo \"Create secret...\"\n  if\
  \ [[ \"$CI_PROJECT_VISIBILITY\" == \"public\" ]]; then\n    return\n  fi\n\n  kubectl\
  \ create secret -n \"$KUBE_NAMESPACE\" \\\n    docker-registry gitlab-registry \\\
  \n    --docker-server=\"$CI_REGISTRY\" \\\n    --docker-username=\"${CI_DEPLOY_USER:-$CI_REGISTRY_USER}\"\
  \ \\\n    --docker-password=\"${CI_DEPLOY_PASSWORD:-$CI_REGISTRY_PASSWORD}\" \\\n\
  \    --docker-email=\"$GITLAB_USER_EMAIL\" \\\n    -o yaml --dry-run | kubectl replace\
  \ -n \"$KUBE_NAMESPACE\" --force -f -\n}\n\nfunction dast() {\n  export CI_ENVIRONMENT_URL=$(cat\
  \ environment_url.txt)\n\n  mkdir /zap/wrk/\n  /zap/zap-baseline.py -J gl-dast-report.json\
  \ -t \"$CI_ENVIRONMENT_URL\" || true\n  cp /zap/wrk/gl-dast-report.json .\n}\n\n\
  function performance() {\n  export CI_ENVIRONMENT_URL=$(cat environment_url.txt)\n\
  \n  mkdir gitlab-exporter\n  wget -O gitlab-exporter/index.js https://gitlab.com/gitlab-org/gl-performance/raw/10-5/index.js\n\
  \n  mkdir sitespeed-results\n\n  if [ -f .gitlab-urls.txt ]\n  then\n    sed -i\
  \ -e 's@^@'\"$CI_ENVIRONMENT_URL\"'@' .gitlab-urls.txt\n    docker run --shm-size=1g\
  \ --rm -v \"$(pwd)\":/sitespeed.io sitespeedio/sitespeed.io:6.3.1 --plugins.add\
  \ ./gitlab-exporter --outputFolder sitespeed-results .gitlab-urls.txt\n  else\n\
  \    docker run --shm-size=1g --rm -v \"$(pwd)\":/sitespeed.io sitespeedio/sitespeed.io:6.3.1\
  \ --plugins.add ./gitlab-exporter --outputFolder sitespeed-results \"$CI_ENVIRONMENT_URL\"\
  \n  fi\n\n  mv sitespeed-results/data/performance.json performance.json\n}\n\nfunction\
  \ persist_environment_url() {\n    echo $CI_ENVIRONMENT_URL > environment_url.txt\n\
  }\n\nfunction delete() {\n  track=\"${1-stable}\"\n  name=\"$CI_ENVIRONMENT_SLUG\"\
  \n\n  if [[ \"$track\" != \"stable\" ]]; then\n    name=\"$name-$track\"\n  fi\n\
  \n  if [[ -n \"$(helm ls -q \"^$name$\")\" ]]; then\n    helm delete --purge \"\
  $name\"\n  fi\n}\n"
.manual_rollout_template:
  artifacts: &id001
    paths:
    - environment_url.txt
  environment: &id002
    name: production
    url: http://$CI_PROJECT_PATH_SLUG.$AUTO_DEVOPS_DOMAIN
  except: &id007
    variables:
    - $INCREMENTAL_ROLLOUT_MODE == "timed"
  only: &id008
    kubernetes: active
    refs:
    - master
    variables:
    - $INCREMENTAL_ROLLOUT_MODE == "manual"
    - $INCREMENTAL_ROLLOUT_ENABLED
  script: &id003
  - check_kube_domain
  - install_dependencies
  - download_chart
  - ensure_namespace
  - initialize_tiller
  - create_secret
  - deploy rollout $ROLLOUT_PERCENTAGE
  - scale stable $((100-ROLLOUT_PERCENTAGE))
  - delete canary
  - persist_environment_url
  stage: production
  when: manual
.production:
  artifacts: &id004
    paths:
    - environment_url.txt
  environment: &id005
    name: production
    url: http://$AUTO_DEVOPS_DOMAIN
  script: &id006
  - check_kube_domain
  - install_dependencies
  - download_chart
  - ensure_namespace
  - initialize_tiller
  - create_secret
  - deploy
  - delete canary
  - delete rollout
  - persist_environment_url
  stage: production
.rollout:
  artifacts: *id001
  environment: *id002
  script: *id003
.timed_rollout_template:
  artifacts: *id001
  environment: *id002
  only: &id009
    kubernetes: active
    refs:
    - master
    variables:
    - $INCREMENTAL_ROLLOUT_MODE == "timed"
  script: *id003
  start_in: 5 minutes
  when: delayed
before_script:
- apt-get update -qq && apt-get install
- "# Auto DevOps variables and functions\n[[ \"$TRACE\" ]] && set -x\nexport CI_APPLICATION_REPOSITORY=$CI_REGISTRY_IMAGE/$CI_COMMIT_REF_SLUG\n\
