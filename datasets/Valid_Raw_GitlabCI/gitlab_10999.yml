before_script:
- docker login -u gitlab-ci-token -p $CI_JOB_TOKEN registry.gitlab.com
build-master:
  only:
  - master
  script:
  - docker pull $CONTAINER_IMAGE:latest || true
  - docker build --build-arg BUILD_DATE=$(date +'%Y_%m_%d') --cache-from $CONTAINER_IMAGE:latest
    --tag $CONTAINER_IMAGE:$CI_BUILD_REF --tag $CONTAINER_IMAGE:latest .
  - docker push $CONTAINER_IMAGE:$CI_BUILD_REF
  - docker push $CONTAINER_IMAGE:latest
  stage: build
  tags:
  - privileged
deploy:
  script:
  - docker run --rm byrnedo/alpine-curl -X POST www.wotanii.de:8555/hooks/stabbot\?token=$DEPLOY_TOKEN
  stage: deploy
  tags:
  - privileged
image: docker:latest
services:
- docker:dind
variables:
  CONTAINER_IMAGE: registry.gitlab.com/$CI_PROJECT_PATH
  DOCKER_DRIVER: overlay2
  DOCKER_HOST: tcp://docker:2375
