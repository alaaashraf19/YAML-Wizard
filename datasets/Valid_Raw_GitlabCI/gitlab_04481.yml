build:
  artifacts:
    paths:
    - built/
  cache:
    paths:
    - node_modules/
    policy: push
  script:
  - npm i gulp -g
  - npm i
  - gulp
  - gulp build-test
  type: build
deploy:
  only:
  - master
  script:
  - apt-get update
  - apt-get install -y python3-dev python3-pip
  - easy_install3 -U pip
  - pip3 install --upgrade awscli
  - aws s3 sync ./built s3://gitlab-game-demo --region "us-east-1" --grants read=uri=http://acs.amazonaws.com/groups/global/AllUsers
    --cache-control "no-cache, no-store, must-revalidate" --delete
  type: deploy
  variables:
    AWS_ACCESS_KEY_ID: $AWS_KEY_ID
    AWS_SECRET_ACCESS_KEY: $AWS_KEY_SECRET
image: node:6
test:
  artifacts:
    paths:
    - built/
  cache:
    paths:
    - node_modules/
    policy: pull
  script:
  - npm i gulp -g
  - npm i
  - gulp run-test
  type: test
