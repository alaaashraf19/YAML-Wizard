auto-deploy-master:
  environment: staging
  only:
  - master
  script:
  - docker login --username=_ --password=$HEROKU_AUTH_TOKEN registry.heroku.com
  - docker pull $CONTAINER_TEST_IMAGE
  - docker tag $CONTAINER_TEST_IMAGE registry.heroku.com/$HEROKU_STAGING_APP/web
  - docker push registry.heroku.com/$HEROKU_STAGING_APP/web
  stage: staging
auto-deploy-tags:
  environment: production
  only:
  - tags
  script:
  - docker login --username=_ --password=$HEROKU_AUTH_TOKEN registry.heroku.com
  - docker pull $CONTAINER_TEST_IMAGE
  - docker tag $CONTAINER_TEST_IMAGE registry.heroku.com/$HEROKU_PROD_APP/web
  - docker push registry.heroku.com/$HEROKU_PROD_APP/web
  stage: production
before_script:
- docker login -u gitlab-ci-token -p $CI_BUILD_TOKEN registry.gitlab.com
build:
  except:
  - tags
  script:
  - docker build --pull -t $CONTAINER_TEST_IMAGE .
  - docker push $CONTAINER_TEST_IMAGE
  stage: build
  variables:
    GIT_STRATEGY: fetch
deploy to production:
  environment: production
  only:
  - master
  script:
  - docker login --username=_ --password=$HEROKU_AUTH_TOKEN registry.heroku.com
  - docker pull $CONTAINER_TEST_IMAGE
  - docker tag $CONTAINER_TEST_IMAGE registry.heroku.com/$HEROKU_PROD_APP/web
  - docker push registry.heroku.com/$HEROKU_PROD_APP/web
  stage: production
  when: manual
deploy to staging:
  environment: staging
  except:
  - master
  - tags
  script:
  - docker login --username=_ --password=$HEROKU_AUTH_TOKEN registry.heroku.com
  - docker pull $CONTAINER_TEST_IMAGE
  - docker tag $CONTAINER_TEST_IMAGE registry.heroku.com/$HEROKU_STAGING_APP/web
  - docker push registry.heroku.com/$HEROKU_STAGING_APP/web
  stage: staging
  when: manual
image: docker:latest
release-branch:
  except:
  - master
  - tags
  script:
  - docker pull $CONTAINER_TEST_IMAGE
  - docker tag $CONTAINER_TEST_IMAGE $CONTAINER_NAMED_IMAGE
  - docker push $CONTAINER_NAMED_IMAGE
  stage: release
release-master:
  only:
  - master
  script:
  - docker pull $CONTAINER_TEST_IMAGE
  - docker tag $CONTAINER_TEST_IMAGE $CONTAINER_RELEASE_IMAGE
  - docker push $CONTAINER_RELEASE_IMAGE
  stage: release
release-tag:
  only:
  - tags
  script:
  - docker pull $CONTAINER_TEST_IMAGE
  - docker tag $CONTAINER_TEST_IMAGE $CONTAINER_TAG_IMAGE
  - docker push $CONTAINER_TAG_IMAGE
  stage: release
services:
- docker:dind
stages:
- build
- test
- release
- staging
- production
test1:
  except:
  - tags
  script:
  - docker pull $CONTAINER_TEST_IMAGE
  - docker run $CONTAINER_TEST_IMAGE echo "test1"
  stage: test
test2:
  except:
  - tags
  script:
  - docker pull $CONTAINER_TEST_IMAGE
  - docker run $CONTAINER_TEST_IMAGE echo "test2"
  stage: test
variables:
  CONTAINER_NAMED_IMAGE: $CI_REGISTRY_IMAGE:$CI_BUILD_REF_NAME
  CONTAINER_RELEASE_IMAGE: $CI_REGISTRY_IMAGE:latest
  CONTAINER_TAG_IMAGE: $CI_REGISTRY_IMAGE:$CI_BUILD_TAG
  CONTAINER_TEST_IMAGE: $CI_REGISTRY_IMAGE:$CI_BUILD_REF
  DOCKER_DRIVER: overlay
  GIT_STRATEGY: none
