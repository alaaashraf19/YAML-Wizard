before_script:
- apk update
- apk add doxygen
image: alpine
pages:
  artifacts:
    paths:
    - public
  rules:
  - if: $CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH
  script:
  - doxygen doxygen/Doxyfile
  - mv doxygen/documentation/html/ public/
test:
  rules:
  - if: $CI_COMMIT_REF_NAME != $CI_DEFAULT_BRANCH
  script:
  - doxygen doxygen/Doxyfile
