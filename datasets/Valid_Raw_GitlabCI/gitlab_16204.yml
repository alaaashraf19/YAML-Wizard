.tests_template:
  script: &id001
  - cargo test --verbose --jobs 1
  - cargo test --examples --all-features --jobs 1
  stage: test
cache:
  key: ${CI_JOB_NAME}
  paths:
  - target/
  - .cargo/
  policy: pull-push
pages:
  artifacts:
    paths:
    - public
  image: rustdocker/rust:stable
  only:
  - master
  script:
  - cargo doc
  - rm -rf public
  - mkdir public
  - cp -R target/doc/* public
  stage: deploy
stages:
- test
- deploy
tests:nightly:
  image: rustdocker/rust:nightly
  script: *id001
  stage: test
tests:semver:
  allow_failure: true
  before_script:
  - cargo +nightly install semverver
  image: rustdocker/rust:nightly
  script:
  - ./semver.sh
  stage: test
tests:stable:
  image: rustdocker/rust:stable
  script: *id001
  stage: test
variables:
  CARGO_HOME: $CI_PROJECT_DIR/.cargo
