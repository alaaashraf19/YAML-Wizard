before_script:
- yarn config set cache-folder .yarn
- yarn install --frozen-lockfile --prefer-offline
cache:
  paths:
  - node_modules/
  - .yarn
image: node:18-buster
lint:
  script:
  - yarn run lint
  stage: test
pages:
  artifacts:
    paths:
    - public
  before_script:
  - yarn config set cache-folder .yarn
  - yarn install --frozen-lockfile --prefer-offline
  - apt-get update -qq && apt-get install -y hugo python3 python3-toml python3-yaml
  only:
  - main
  script:
  - make -C website build
  - make apply-latest-basename
  - make build
  - rm -rf public/
  - mv website/public public
  - mv build public/releases/latest
  stage: deploy
tests:
  script:
  - make test
  stage: test
typescript:
  script:
  - yarn run tsc --noEmit
  stage: test
