before_script:
- CI_PROJECT_PATH=`echo "${CI_PROJECT_PATH}" | tr '[:upper:]' '[:lower:]'`
- export TEST_IMAGE_NAME=registry.gitlab.com/$CI_PROJECT_PATH:${CI_BUILD_REF_NAME/\//-}-$CI_BUILD_REF
- export RELEASE_IMAGE_NAME=registry.gitlab.com/$CI_PROJECT_PATH:release
- export IMAGE_NAME=registry.gitlab.com/$CI_PROJECT_PATH:latest
build-container:
  script:
  - docker build -t $TEST_IMAGE_NAME .
  - docker login -e gitlab-ci@gitlab.com -u gitlab-ci-token -p $CI_BUILD_TOKEN registry.gitlab.com
  - docker push $TEST_IMAGE_NAME
  stage: build
code-analysis-container:
  except:
  - master
  image: python:3
  script:
  - pip install 'coala-bears[alldeps]'
  - coala --ci
  stage: build
deploy:
  before_script:
  - which ssh-agent || ( apk update && apk add openssh-client )
  - mkdir -p ~/.ssh
  - echo "$DEPLOYMENT_SERVER_PRIVATE_KEY" > ~/.ssh/private_key.pem
  - chmod 0400 ~/.ssh/private_key.pem
  - eval "$(ssh-agent -s)"
  - ssh-add ~/.ssh/private_key.pem
  - ssh-keyscan -H $DEPLOYMENT_SERVER_IP >> ~/.ssh/known_hosts
  - CI_PROJECT_PATH=`echo "${CI_PROJECT_PATH}" | tr '[:upper:]' '[:lower:]'`
  - export RELEASE_IMAGE_NAME=registry.gitlab.com/$CI_PROJECT_PATH:release
  - export IMAGE_NAME=registry.gitlab.com/$CI_PROJECT_PATH:latest
  only:
  - master
  script:
  - ssh -i ~/.ssh/private_key.pem ubuntu@$DEPLOYMENT_SERVER_IP "sudo docker login
    -u ${CI_REGISTRY_USER} -p ${CI_REGISTRY_PASSWORD} ${CI_REGISTRY}; sudo docker
    pull ${RELEASE_IMAGE_NAME}; sudo docker tag ${RELEASE_IMAGE_NAME} ${IMAGE_NAME};
    sudo docker push ${IMAGE_NAME};"
  stage: deploy
image: docker:1.10.3
release:
  only:
  - master
  script:
  - docker login -e gitlab-ci@gitlab.com -u gitlab-ci-token -p $CI_BUILD_TOKEN registry.gitlab.com
  - docker pull $TEST_IMAGE_NAME
  - docker tag $TEST_IMAGE_NAME $RELEASE_IMAGE_NAME
  - docker push $RELEASE_IMAGE_NAME
  stage: release
services:
- docker:dind
stages:
- build
- release
- deploy
variables:
  DOCKER_DRIVER: overlay
