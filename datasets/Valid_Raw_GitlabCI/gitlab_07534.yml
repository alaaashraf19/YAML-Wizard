install_docker:
  before_script:
  - apk add --no-cache py-pip
  - pip install docker-compose
  - docker info
  - docker-compose --version
  image: docker:stable
  only:
  - master
  - dev
  script:
  - docker-compose -f docker-compose.yml build
  stage: install
services:
- docker:dind
stages:
- install
- test
test:
  before_script:
  - apk add --no-cache py-pip
  - pip install docker-compose
  - docker info
  - docker-compose --version
  - apk --update add nodejs nodejs-npm
  dependencies:
  - install_docker
  image: docker:stable
  only:
  - master
  - dev
  script:
  - docker-compose run --rm app npm test
  stage: test
variables:
  DOCKER_DRIVER: overlay2
  DOCKER_HOST: tcp://docker:2375/
