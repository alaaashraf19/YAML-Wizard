build_deliverables:
  artifacts:
    name: utdata
    paths:
    - utdata/
  dependencies:
  - download_deps_npm
  - prebuild_content
  script:
  - npm run-script build
  stage: build
  tags:
  - npm
download_deps_npm:
  artifacts:
    paths:
    - node_modules/
  script:
  - npm install
  stage: download-deps
  tags:
  - npm
pages:
  artifacts:
    paths:
    - public
  dependencies:
  - build_deliverables
  only:
  - master
  script:
  - rm -rf public
  - mkdir public
  - cp -a ./utdata/dokument.html ./public/index.html
  stage: deploy
prebuild_content:
  artifacts:
    name: "Inneh\xE5ll"
    paths:
    - innehall/
  dependencies:
  - download_deps_npm
  script:
  - npm run-script prebuild
  stage: prebuild
  tags:
  - npm
stages:
- download-deps
- prebuild
- build
- deploy
