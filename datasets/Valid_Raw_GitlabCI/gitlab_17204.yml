image: node:latest
production:
  image: ruby:latest
  only:
  - master
  script:
  - apt-get update -qy
  - apt-get install -y ruby-dev
  - gem install dpl
  - dpl --provider=heroku --app=angular-mp --api-key=$HEROKU_API_KEY
  stage: production
  type: deploy
stages:
- test
- production
test:
  script:
  - npm install
  - ./node_modules/@angular/cli/bin/ng test --watch=false
