.build_template:
  before_script: &id001
  - mkdir -pv $APT_CACHE_DIR
  - apt-get -qq update
  - apt-get -o dir::cache::archives="$APT_CACHE_DIR" -qq -y install build-essential
    curl git pkg-config $EXTRA_PACKAGES
  - export PATH="/root/.cargo/bin:$PATH"
  - rustup target add $TARGET || true
  - cargo update
  image: rust:latest
  script: &id002
  - cargo build --target=$TARGET
  - if [[ -z $DISABLE_EXTRA_BUILDS ]]; then cargo build --examples --target=$TARGET;
    fi
  - if [[ -z $DISABLE_EXTRA_BUILDS ]]; then cargo build --tests --target=$TARGET;
    fi
  - if [[ -z $DISABLE_TESTS ]]; then cargo test --no-fail-fast --target=$TARGET; fi
  stage: build
aarch64-linux-android:
  before_script: *id001
  image: rust:latest
  script: *id002
  stage: build
  variables:
    DISABLE_EXTRA_BUILDS: 1
    DISABLE_TESTS: 1
    TARGET: aarch64-linux-android
aarch64-unknown-linux-gnu:
  before_script: *id001
  image: rust:latest
  script: *id002
  stage: build
  variables:
    CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
    DISABLE_EXTRA_BUILDS: 1
    DISABLE_TESTS: 1
    EXTRA_PACKAGES: libudev-dev gcc-aarch64-linux-gnu libc6-dev-arm64-cross
    TARGET: aarch64-unknown-linux-gnu
