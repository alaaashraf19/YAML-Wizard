before_script:
- npm install --silent
cache:
  paths:
  - node_modules/
image: node:latest
staging:
  artifacts:
    paths:
    - dist/
  only:
  - master
  script:
  - npm run build
  - npm run lint
  - apt-get update -qy
  - apt-get install -y ruby-dev
  - apt-get install -y rubygems
  - gem install dpl
  - dpl --provider=heroku --app=urban-snake-2k17 --api-key=$HEROKU_STAGING_API_KEY
  type: deploy
