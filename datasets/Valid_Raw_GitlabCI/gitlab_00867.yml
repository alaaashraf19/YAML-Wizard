before_script:
- which python
- python --version
check-setup:
  except:
  - tags
  image: python:3.6
  script:
  - pip install -r requirements_ci.txt
  - which tox
  - tox -v -e check
conda_build_27:
  image: continuumio/miniconda
  only:
  - tags
  - triggers
  - schedules
  script:
  - export CI_PYTHON_VERSION=2.7
  - bash conda_buildpackage.sh
conda_build_34:
  image: continuumio/miniconda3
  only:
  - tags
  - triggers
  - schedules
  script:
  - export CI_PYTHON_VERSION=3.4
  - bash conda_buildpackage.sh
conda_build_35:
  image: continuumio/miniconda3
  only:
  - tags
  - triggers
  - schedules
  script:
  - export CI_PYTHON_VERSION=3.5
  - bash conda_buildpackage.sh
conda_build_36:
  image: continuumio/miniconda3
  only:
  - tags
  - triggers
  - schedules
  script:
  - export CI_PYTHON_VERSION=3.6
  - bash conda_buildpackage.sh
coverage-report:
  except:
  - tags
  image: python:3.6
  script:
  - pip install -r requirements_ci.txt
  - which tox
  - tox -e report
py27:
  except:
  - tags
  image: python:2.7
  script:
  - pip install -r requirements_ci.txt
  - which tox
  - tox -v -e py27
py34:
  except:
  - tags
  image: python:3.4
  script:
  - pip install -r requirements_ci.txt
  - which tox
  - tox -v -e py34
py35:
  except:
  - tags
  image: python:3.5
  script:
  - pip install -r requirements_ci.txt
  - which tox
  - tox -v -e py35
py36:
  except:
  - tags
  image: python:3.6
  script:
  - pip install -r requirements_ci.txt
  - which tox
  - tox -v -e py36
