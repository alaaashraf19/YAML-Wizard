build:
  artifacts:
    paths:
    - node_modules/
    - frontend/build
    - index.js
  script:
  - rm -rf node_modules
  - npm install --prod-only
  - cd frontend
  - npm run build
  stage: build
deploy:
  dependencies:
  - build
  script:
  - lxc exec unified-marten mkdir -- -p $dest
  - tar cf - . | lxc exec unified-marten -- tar xvf - -C $dest
  - lxc exec unified-marten mv $dest/cnapp.service /etc/systemd/system/
  - lxc exec unified-marten systemctl daemon-reload
  - lxc exec unified-marten systemctl enable cnapp
  - lxc exec unified-marten systemctl start cnapp
  stage: deploy
  variables:
    dest: /opt/cn
    domain: test.devops
install_node_modules:
  artifacts:
    paths:
    - node_modules/
    - frontend/node_modules/
    untracked: true
  script:
  - npm install
  - cd frontend
  - npm install
  stage: install
stages:
- install
- test
- build
- deploy
test:
  script:
  - cd frontend
  - npm run test
  stage: test
