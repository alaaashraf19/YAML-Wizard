before_script:
- bundle install
image: ruby:2.3
pages:
  artifacts:
    paths:
    - public
  only:
  - master
  script:
  - bundle exec jekyll build -d public
  stage: deploy
pages-test:
  artifacts:
    paths:
    - export
  except:
  - master
  script:
  - bundle exec jekyll build -d export
  stage: deploy
variables:
  JEKYLL_ENV: production
