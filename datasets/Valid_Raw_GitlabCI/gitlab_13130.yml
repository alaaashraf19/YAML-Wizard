.node:
  only: &id005
  - master
  - develop
  script: &id006
  - npm run test:ci
  stage: test
build:prod:
  artifacts:
    expire_in: 1 day
    paths:
    - dist/
  dependencies:
  - install:latest
  image: node:10-alpine
  only:
  - master
  script:
  - npm run build:prod
  - sed '/\"devDependencies\"/,/}/ d; /^$/d' -i dist/package.json
  stage: build
coverage:
  dependencies:
  - install:latest
  - test:latest
  image: node:10-alpine
  only:
  - master
  - develop
  script:
  - npx coverage-average ./coverage/text-summary.txt
  stage: analysis
deploy:npm:
  before_script:
  - apk add --no-cache git
  dependencies:
  - install:latest
  - build:prod
  image: node:10-alpine
  only:
  - master
  script:
  - npx semantic-release
  stage: deploy
docs:dev:
  dependencies:
  - install:latest
  image: node:10-alpine
  only:
  - develop
  script:
  - npm run docs:ci
  stage: analysis
docs:prod:
  dependencies:
  - install:latest
  image: node:10-alpine
  only:
  - master
  script:
  - npm run docs:ci:prod
  stage: analysis
documentation:
  artifacts:
    expire_in: 1 day
    paths:
    - documentation/
  dependencies:
  - install:latest
  image: node:10-alpine
  only:
  - master
  script:
  - npm run docs
  stage: build
install:latest:
  artifacts: &id001
    expire_in: 1 day
    paths:
    - node_modules/
  cache: &id002
    key: $CI_COMMIT_REF_SLUG-$CI_JOB_NAME
    paths:
    - node_modules/
  image: node:10-alpine
  only: &id003
  - master
  - develop
  script: &id004
  - npm run install:ci
  stage: install
install:lts:
  artifacts: *id001
  cache: *id002
  image: node:8-alpine
  only: *id003
  script: *id004
  stage: install
pages:
  artifacts:
    paths:
    - public
  dependencies:
  - test:latest
  - documentation
  image: node:10-alpine
  only:
  - master
  script:
  - cp -R documentation/. public
  - mkdir -p public/coverage
  - cp -R coverage/lcov-report/. public/coverage
  - mkdir -p public/tests
  - cp -R coverage/test-report.html public/tests/index.html
  stage: deploy
sonarqube:
  before_script:
  - apk add --no-cache nodejs
  dependencies:
  - install:latest
  - test:latest
  - tslint
  image: electrostar/sonar-scanner:latest
  only:
  - master
  - develop
  script:
  - sonar-scanner -X -D sonar.host.url=$SONAR_URL -D sonar.login=$SONAR_TOKEN
  stage: external
stages:
- install
- test
- analysis
- external
- build
- deploy
test:latest:
  artifacts:
    expire_in: 1 day
    paths:
    - coverage/
  dependencies:
  - install:latest
  image: node:10-alpine
  only: *id005
  script: *id006
  stage: test
test:lts:
  dependencies:
  - install:lts
  image: node:8-alpine
  only: *id005
  script: *id006
  stage: test
tslint:
  dependencies:
  - install:latest
  image: node:10-alpine
  only:
  - master
  - develop
  script:
  - npm run lint:ci
  stage: analysis
