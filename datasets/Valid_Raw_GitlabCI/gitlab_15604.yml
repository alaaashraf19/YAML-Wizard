.artifacts-template:
  artifacts: &id001
    expire_in: 2 weeks
    paths:
    - bus/$CI_JOB_NAME
    when: always
.test-install-deps: &id002
- Rscript -e 'source(".ci/ci.R"); install.packages(dcf.dependencies("DESCRIPTION",
  which="all"), repos=file.path("file:", normalizePath("bus/mirror-packages/cran",
  mustWork=FALSE)), quiet=TRUE)'
.test-lin-template:
  after_script: &id004
  - mkdir -p bus/$CI_JOB_NAME
  - echo $CI_JOB_ID > bus/$CI_JOB_NAME/id
  - echo $CI_JOB_STATUS > bus/$CI_JOB_NAME/status
  - echo $CI_JOB_IMAGE > bus/$CI_JOB_NAME/image
  - '[ -d data.table.Rcheck ] && mv data.table.Rcheck bus/$CI_JOB_NAME/'
  allow_failure: true
  artifacts: *id001
  before_script: &id005
  - cp $(ls -1t bus/build/data.table_*.tar.gz | head -n 1) .
  - mkdir -p ~/.R
  needs: &id003
  - mirror-packages
  - build
  stage: test
  tags: &id006
  - saas-linux-medium-amd64
.test-mac-template:
  after_script: &id007
  - mkdir -p bus/$CI_JOB_NAME
  - '[ -d data.table.Rcheck ] && mv data.table.Rcheck bus/$CI_JOB_NAME/'
  - '[ -f data.table_*.tgz ] && mv $(ls -1t data.table_*.tgz | head -n 1) bus/$CI_JOB_NAME/'
  - echo $CI_JOB_ID > bus/$CI_JOB_NAME/id
  - echo $CI_JOB_STATUS > bus/$CI_JOB_NAME/status
  - echo $CI_JOB_IMAGE > bus/$CI_JOB_NAME/image
  allow_failure: true
  artifacts: *id001
  before_script: &id008
  - curl -LO https://github.com/XQuartz/XQuartz/releases/download/XQuartz-2.8.5/XQuartz-2.8.5.pkg
  - sudo installer -pkg "$(ls -1t XQuartz-*.pkg | head -n 1)" -target /
  - curl -O $R_BIN
  - sudo installer -pkg "$(ls -1t R-*-arm64.pkg | head -n 1)" -target /
  - sudo Rscript -e "source('https://mac.R-project.org/bin/install.R'); install.libs('gettext')"
  - *id002
  - cp $(ls -1t bus/build/data.table_*.tar.gz | head -n 1) .
  needs: *id003
  script: &id009
  - R CMD check --no-manual $(ls -1t data.table_*.tar.gz | head -n 1)
  - R CMD INSTALL --build $(ls -1t data.table_*.tar.gz | head -n 1)
  - 'tail -n 1 data.table.Rcheck/00check.log | grep -q -e ''^Status: [0-9]* NOTEs*$''
    -e ''^Status: OK$'''
  stage: test
  tags: &id010
  - saas-macos-medium-m1
.test-template:
  allow_failure: true
  artifacts: *id001
  needs: *id003
  stage: test
.test-win-template:
  after_script: &id011
  - $env:PATH = "C:\R\bin;C:\rtools\usr\bin;$env:PATH"
  - mkdir.exe -p bus/$CI_JOB_NAME
  - Rscript.exe -e "cat(Sys.getenv('CI_JOB_ID'), file=file.path('bus', Sys.getenv('CI_JOB_NAME'),
    'id'))"
  - Rscript.exe -e "cat(Sys.getenv('CI_JOB_STATUS'), file=file.path('bus', Sys.getenv('CI_JOB_NAME'),
    'status'))"
  - Rscript.exe -e "cat(Sys.getenv('CI_JOB_IMAGE'), file=file.path('bus', Sys.getenv('CI_JOB_NAME'),
    'image'))"
  - Rscript.exe -e "to<-file.path('bus', Sys.getenv('CI_JOB_NAME'), 'data.table.Rcheck');
    if (dir.exists(from<-'data.table.Rcheck')) invisible(file.rename(from, to)); dir.exists(to)"
  - Rscript.exe -e "from<-tail(list.files(pattern='^data\\.table_.*\\.zip$'), 1L);
    to<-file.path('bus', Sys.getenv('CI_JOB_NAME'), from); if (length(from)) invisible(file.rename(from,
    to)); length(to)&&file.exists(to)"
  allow_failure: true
  artifacts: *id001
  before_script: &id012
  - Invoke-WebRequest -Uri $R_BIN -OutFile ../R-win.exe -ErrorAction Stop; if (!(Test-Path
    -Path ..\R-win.exe)) {Write-Error "R-win.exe not found, download failed?"}
  - Start-Process -FilePath ..\R-win.exe -ArgumentList "/VERYSILENT /DIR=C:\R" -NoNewWindow
    -Wait
  - $VERSION = $RTOOLS_VERSION -replace '\.', ''
  - Add-Content -Path ".\.Renviron" -Value "RTOOLS${VERSION}_HOME='/c/rtools'"
  - $RTOOLS_BIN="https://github.com/r-hub/rtools${VERSION}/releases/download/latest/rtools${VERSION}.exe"
  - Invoke-WebRequest -Uri $RTOOLS_BIN -OutFile ../rtools.exe -ErrorAction Stop; if
    (!(Test-Path -Path ..\rtools.exe)) {Write-Error "rtools.exe not found, download
    failed?"}
  - Start-Process -FilePath ..\rtools.exe -ArgumentList "/VERYSILENT /DIR=C:\rtools"
    -NoNewWindow -Wait
  - $env:PATH = "C:\R\bin;C:\rtools\usr\bin;$env:PATH"
  - Rscript.exe -e "source('.ci/ci.R'); install.packages(dcf.dependencies('DESCRIPTION',
    which='all'), repos=file.path('file://',getwd(),'bus/mirror-packages/cran'), quiet=TRUE)"
  - cp.exe $(ls.exe -1t bus/build/data.table_*.tar.gz | head.exe -n 1) .
  needs: *id003
  script: &id013
  - R.exe CMD check --no-manual $(ls.exe -1t data.table_*.tar.gz | head.exe -n 1)
  - R.exe CMD INSTALL --build $(ls.exe -1t data.table_*.tar.gz | head.exe -n 1)
  - -not (grep.exe "warning:" data.table.Rcheck\00install.out)
  stage: test
  tags: &id014
  - saas-windows-medium-amd64
build:
  artifacts: *id001
  before_script:
  - *id002
  - rm -r bus
  image: registry.gitlab.com/rdatatable/dockerfiles/r-base-gcc
  needs:
  - mirror-packages
  script:
  - sed -i '/^[[:space:]]*$/d' ./DESCRIPTION
  - echo "Revision:" $CI_COMMIT_SHA >> ./DESCRIPTION
  - R CMD build .
  - mkdir -p bus/$CI_JOB_NAME/
  - mv $(ls -1t data.table_*.tar.gz | head -n 1) bus/$CI_JOB_NAME/
  stage: build
  tags:
  - saas-linux-medium-amd64
integration:
  artifacts: *id001
  image: registry.gitlab.com/rdatatable/dockerfiles/r-pkgdown
  needs:
  - mirror-packages
  - build
  - test-lin-rel
  - test-lin-rel-cran
  - test-lin-dev-gcc-strict-cran
  - test-lin-dev-clang-cran
  - test-lin-rel-vanilla
  - test-lin-ancient-cran
  - test-lin-dev-clang-san
  - test-lin-dev-gcc-san
  - test-win-rel
  - test-win-dev
  - test-win-old
  - test-mac-rel
  - test-mac-old
  only:
  - master
  script:
  - R --version
  - *id002
  - mkdir -p ./pkgdown/favicon/ && cp .graphics/favicon/* ./pkgdown/favicon/
  - Rscript -e 'pkgdown::build_site(override=list(destination="./website"))'
  - echo 'source(".ci/ci.R"); source(".ci/publish.R")' >> .Rprofile
  - Rscript -e 'cat("\ntest.jobs <- c(\n"); cat(paste0("  \"",list.files("bus",pattern="^test-"),"\"
    = \"data.table\""), sep=",\n"); cat(")\n")' >> .Rprofile
  - Rscript -e 'sapply(names(test.jobs), check.test, pkg="data.table", simplify=FALSE)'
  - mkdir -p bus/$CI_JOB_NAME
  - rm -f bus/mirror-packages/cran/src/contrib/data.table_*.tar.gz
  - rm -f bus/mirror-packages/cran/bin/windows/contrib/$R_REL_VERSION/data.table_*.zip
  - rm -f bus/mirror-packages/cran/bin/windows/contrib/$R_DEV_VERSION/data.table_*.zip
  - rm -f bus/mirror-packages/cran/bin/windows/contrib/$R_OLD_VERSION/data.table_*.zip
  - rm -f bus/mirror-packages/cran/bin/macosx/big-sur-arm64/contrib/$R_REL_VERSION/data.table_*.tgz
  - rm -f bus/mirror-packages/cran/bin/macosx/big-sur-arm64/contrib/$R_OLD_VERSION/data.table_*.tgz
  - mv bus/mirror-packages/cran bus/$CI_JOB_NAME/
  - mkdir -p bus/$CI_JOB_NAME/cran/library bus/$CI_JOB_NAME/cran/doc
  - mv $(ls -1t bus/build/data.table_*.tar.gz | head -n 1) bus/$CI_JOB_NAME/cran/src/contrib
  - Rscript -e 'tools::write_PACKAGES(contrib.url("bus/integration/cran", type="source"),
    type="source", fields="Revision", addFiles=TRUE)'
  - mkdir -p bus/integration/cran/bin/windows/contrib/$R_REL_VERSION/
  - mkdir -p bus/integration/cran/bin/windows/contrib/$R_DEV_VERSION/
  - mkdir -p bus/integration/cran/bin/windows/contrib/$R_OLD_VERSION/
  - '[ -f bus/test-win-rel/data.table_*.zip ] && cp bus/test-win-rel/data.table_*.zip
    bus/integration/cran/bin/windows/contrib/$R_REL_VERSION/'
  - ls -1 "bus/integration/cran/bin/windows/contrib/$R_REL_VERSION"/data.table_*.zip
    || true
  - '[ -f bus/test-win-dev/data.table_*.zip ] && cp bus/test-win-dev/data.table_*.zip
    bus/integration/cran/bin/windows/contrib/$R_DEV_VERSION/'
  - ls -1 "bus/integration/cran/bin/windows/contrib/$R_DEV_VERSION"/data.table_*.zip
    || true
  - '[ -f bus/test-win-old/data.table_*.zip ] && cp bus/test-win-old/data.table_*.zip
    bus/integration/cran/bin/windows/contrib/$R_OLD_VERSION/'
  - ls -1 "bus/integration/cran/bin/windows/contrib/$R_OLD_VERSION"/data.table_*.zip
    || true
  - Rscript -e 'tools::write_PACKAGES(contrib.url("bus/integration/cran", type="win.binary",
    ver=Sys.getenv("R_REL_VERSION")), type="win.binary", fields="Revision", addFiles=TRUE)'
  - Rscript -e 'tools::write_PACKAGES(contrib.url("bus/integration/cran", type="win.binary",
    ver=Sys.getenv("R_DEV_VERSION")), type="win.binary", fields="Revision", addFiles=TRUE)'
  - Rscript -e 'tools::write_PACKAGES(contrib.url("bus/integration/cran", type="win.binary",
    ver=Sys.getenv("R_OLD_VERSION")), type="win.binary", fields="Revision", addFiles=TRUE)'
  - mkdir -p bus/integration/cran/bin/macosx/big-sur-arm64/contrib/$R_REL_VERSION/
  - mkdir -p bus/integration/cran/bin/macosx/big-sur-arm64/contrib/$R_OLD_VERSION/
  - '[ -f bus/test-mac-rel/data.table_*.tgz ] && cp bus/test-mac-rel/data.table_*.tgz
    bus/integration/cran/bin/macosx/big-sur-arm64/contrib/$R_REL_VERSION/'
  - ls -1 "bus/integration/cran/bin/macosx/big-sur-arm64/contrib/$R_REL_VERSION"/data.table_*.tgz
    || true
  - '[ -f bus/test-mac-old/data.table_*.tgz ] && cp bus/test-mac-old/data.table_*.tgz
    bus/integration/cran/bin/macosx/big-sur-arm64/contrib/$R_OLD_VERSION/'
  - ls -1 "bus/integration/cran/bin/macosx/big-sur-arm64/contrib/$R_OLD_VERSION"/data.table_*.tgz
    || true
  - Rscript -e 'tools::write_PACKAGES(contrib.url("bus/integration/cran", type="mac.binary.big-sur-arm64",
    ver=Sys.getenv("R_REL_VERSION")), type="mac.binary", fields="Revision", addFiles=TRUE)'
  - Rscript -e 'tools::write_PACKAGES(contrib.url("bus/integration/cran", type="mac.binary.big-sur-arm64",
    ver=Sys.getenv("R_OLD_VERSION")), type="mac.binary", fields="Revision", addFiles=TRUE)'
  - mkdir -p /tmp/opencran/library /tmp/opencran/doc/html
  - Rscript -e 'install.packages("data.table", lib="/tmp/opencran/library", repos=file.path("file:",normalizePath("bus/integration/cran")),
    INSTALL_opts="--html", quiet=TRUE)'
  - Rscript -e 'packageVersion("data.table", lib.loc="/tmp/opencran/library")'
  - wget -q -P bus/integration/cran/web https://cran.r-project.org/web/CRAN_web.css
  - Rscript -e 'sapply(setNames(nm=rownames(installed.packages(lib.loc="/tmp/opencran/library",
    priority="NA"))), package.index, lib.loc="/tmp/opencran/library")'
  - Rscript -e 'doc.copy(repodir="/tmp/opencran")'
  - Rscript -e 'setwd("/tmp/opencran/doc/html"); make.packages.html(lib.loc="../../library",
    docdir="/tmp/opencran/doc"); tmp<-readLines(f<-"/tmp/opencran/doc/html/packages.html");
    writeLines(gsub("file:///../../library","../../library", tmp, fixed=TRUE), f)'
  - mv /tmp/opencran/doc bus/integration/cran/
  - Rscript -e 'lib.copy(lib.from="/tmp/opencran/library")'
  - Rscript -e 'sapply(names(test.jobs), check.copy)'
  - Rscript -e 'pdf.copy("data.table", "test-lin-rel")'
  - Rscript -e 'check.index("data.table", names(test.jobs))'
  - Rscript -e 'check.flavors(names(test.jobs))'
  - Rscript -e 'common_files<-function(path1, path2) intersect(list.files(path1, all.files=TRUE,
    no..=TRUE), list.files(path2, all.files=TRUE, no..=TRUE)); msg = if (length(f<-common_files("website","bus/integration/cran")))
    paste(c("Following artifacts will be overwritten by pkgdown artifacts:", paste0("  ",
    f)), collapse="\n") else "No overlapping files from pkgdown artifacts"; message(msg);
    q("no")'
  - mv website/* bus/integration/cran/
  - find bus/integration/cran -type f -iname "*.html" | xargs sed -i 's!<head>!<head><script
    defer data-domain="rdatatable.gitlab.io/data.table" src="https://plausible.io/js/script.js"></script>!g'
  stage: integration
  tags:
  - saas-linux-medium-amd64
mirror-packages:
  artifacts: *id001
  cache:
    paths:
    - bus/$CI_JOB_NAME/cran
  image: registry.gitlab.com/rdatatable/dockerfiles/r-base-minimal
  script:
  - echo 'source(".ci/ci.R")' >> .Rprofile
  - mkdir -p bus/$CI_JOB_NAME/cran/src/contrib
  - Rscript -e 'mirror.packages(dcf.dependencies("DESCRIPTION", "all"), repos=Sys.getenv("CRAN_MIRROR"),
    repodir="bus/mirror-packages/cran")'
  - Rscript -e 'sapply(simplify=FALSE, setNames(nm=Sys.getenv(c("R_REL_VERSION","R_DEV_VERSION","R_OLD_VERSION"))),
    function(binary.ver) mirror.packages(type="win.binary", dcf.dependencies("DESCRIPTION",
    "all"), repos=Sys.getenv("CRAN_MIRROR"), repodir="bus/mirror-packages/cran", binary.ver=binary.ver))'
  - Rscript -e 'sapply(simplify=FALSE, setNames(nm=Sys.getenv(c("R_REL_VERSION","R_OLD_VERSION"))),
    function(binary.ver) mirror.packages(type="mac.binary.big-sur-arm64", dcf.dependencies("DESCRIPTION",
    "all"), repos=Sys.getenv("CRAN_MIRROR"), repodir="bus/mirror-packages/cran", binary.ver=binary.ver))'
  stage: dependencies
  tags:
  - saas-linux-medium-amd64
  variables:
    R_DEFAULT_SERIALIZE_VERSION: 2
pages:
  artifacts:
    expire_in: 2 weeks
    paths:
    - public
  environment: production
  image: ubuntu
  needs:
  - integration
  only:
  - master
  script:
  - mkdir -p public
  - cp -r bus/integration/cran/* public
  - cat public/src/contrib/PACKAGES
  stage: deploy
  tags:
  - saas-linux-medium-amd64
stages:
- dependencies
- build
- test
- integration
- deploy
test-lin-ancient-cran:
  after_script: *id004
  allow_failure: true
  artifacts: *id001
  before_script: *id005
  image: registry.gitlab.com/rdatatable/dockerfiles/r-3.4.0
  needs: *id003
  script:
  - *id002
  - R CMD check --no-manual --no-build-vignettes --ignore-vignettes $(ls -1t data.table_*.tar.gz
    | head -n 1)
  stage: test
  tags: *id006
  variables:
    _R_CHECK_FORCE_SUGGESTS_: 'FALSE'
test-lin-dev-clang-cran:
  after_script: *id004
  allow_failure: true
  artifacts: *id001
  before_script: *id005
  image: registry.gitlab.com/rdatatable/dockerfiles/r-devel-clang
  needs: *id003
  script:
  - echo 'CFLAGS=-g -O2 -fno-common -Wall -Wvla -pedantic -fstack-protector-strong
    -D_FORTIFY_SOURCE=2' > ~/.R/Makevars
  - echo 'CXXFLAGS=-g -O2 -fno-common -Wall -Wvla -pedantic -fstack-protector-strong
    -D_FORTIFY_SOURCE=2' >> ~/.R/Makevars
  - *id002
  - clang-tidy -extra-arg=-I/usr/local/lib/R/include -checks='readability-inconsistent-declaration-parameter'
    src/*.c -- -std=c99
  - R CMD check --as-cran $(ls -1t data.table_*.tar.gz | head -n 1)
  - (! grep "warning:" data.table.Rcheck/00install.out)
  - 'Rscript -e ''l=tail(readLines("data.table.Rcheck/00check.log"), 1L); notes<-"Status:
    2 NOTEs"; if (!identical(l, notes)) stop("Last line of ", shQuote("00check.log"),
    " is not ", shQuote(notes), " (non-API calls, V8 package) but ", shQuote(l)) else
    q("no")'''
  stage: test
  tags: *id006
  variables:
    _R_CHECK_COMPILATION_FLAGS_KNOWN_: -Wvla
    _R_CHECK_CRAN_INCOMING_: 'TRUE'
    _R_CHECK_CRAN_INCOMING_REMOTE_: 'FALSE'
    _R_S3_METHOD_LOOKUP_BASEENV_AFTER_GLOBALENV_: 'FALSE'
    _R_S3_METHOD_LOOKUP_REPORT_SEARCH_PATH_USES_: 'TRUE'
test-lin-dev-clang-san:
  after_script: *id004
  allow_failure: true
  artifacts: *id001
  before_script: *id005
  image: registry.gitlab.com/rdatatable/dockerfiles/r-devel-clang-san
  needs: *id003
  script:
  - *id002
  - 'res1=0; ASAN_OPTIONS=detect_leaks=1 R CMD check --no-manual $(ls -1t data.table_*.tar.gz
    | head -n 1) || res1=$?

    res2=0; perl -nle ''(print, $a=1) if /: runtime error: |ERROR: LeakSanitizer/../SUMMARY.*Sanitizer/
    }{ exit $a'' data.table.Rcheck/**/*.Rout* || res2=$?

    res3=0; tail -n 1 data.table.Rcheck/00check.log | grep -q -e ''^Status: [0-9]*
    NOTEs*$'' -e ''^Status: OK$'' || res3=$?

    # fail if R CMD check had failed or if sanitizer output found

    if [ $res1 -ne 0 ] || [ $res2 -ne 0 ] || [ $res3 -ne 0 ]; then exit 1; fi

    '
  stage: test
  tags: *id006
  variables:
    ASAN_OPTIONS: detect_leaks=0
    LSAN_OPTIONS: suppressions=$CI_PROJECT_DIR/.dev/lsan.supp
    UBSAN_OPTIONS: print_stacktrace=1
