test-lin-rel:
  after_script: *id004
  allow_failure: true
  artifacts: *id001
  before_script: *id005
  image: registry.gitlab.com/rdatatable/dockerfiles/r-data.table
  needs: *id003
  script:
  - *id002
  - echo 'CFLAGS=-g -O3 -flto=auto -fno-common -fopenmp -Wall -Wvla -pedantic -fstack-protector-strong
    -D_FORTIFY_SOURCE=2' > ~/.R/Makevars
  - echo 'CXXFLAGS=-g -O3 -flto=auto -fno-common -fopenmp -Wall -Wvla -pedantic -fstack-protector-strong
    -D_FORTIFY_SOURCE=2' >> ~/.R/Makevars
  - echo '_R_CHECK_COMPILATION_FLAGS_KNOWN_=-Wvla' >> ~/.Renviron
  - 'res1=0; R CMD check --as-cran $(ls -1t data.table_*.tar.gz | head -n 1) || res1=$?

    res2=0; grep -v "warning:" data.table.Rcheck/00install.out || res2=$?

    res3=0; Rscript -e ''l=tail(readLines("data.table.Rcheck/00check.log"), 1L); if
    (!identical(l, "Status: 2 NOTEs")) stop("Last line of ", shQuote("00check.log"),
    " is not ", shQuote("Status: 2 NOTEs"), " (CRAN incoming feasibility, non-API)
    but ", shQuote(l))'' || res3=$?

    if [ $res1 -ne 0 ] || [ $res2 -ne 0 ] || [ $res3 -ne 0 ]; then exit 1; fi

    '
  stage: test
  tags: *id006
  variables:
    OPENBLAS_MAIN_FREE: '1'
    _R_CHECK_FORCE_SUGGESTS_: 'TRUE'
    _R_CHECK_RD_CHECKRD_MINLEVEL_: -Inf
test-lin-rel-cran:
  after_script: *id004
  allow_failure: true
  artifacts: *id001
  before_script: *id005
  image: registry.gitlab.com/rdatatable/dockerfiles/r-base
  needs: *id003
  script:
  - *id002
  - echo 'CFLAGS=-g -O2 -fopenmp -Wall -pedantic -fstack-protector-strong -D_FORTIFY_SOURCE=2'
    > ~/.R/Makevars
  - echo 'CXXFLAGS=-g -O2 -fopenmp -Wall -pedantic -fstack-protector-strong -D_FORTIFY_SOURCE=2'
    >> ~/.R/Makevars
  - 'res1=0; R CMD check --as-cran $(ls -1t data.table_*.tar.gz | head -n 1) || res1=$?

    res2=0; Rscript -e ''l=tail(readLines("data.table.Rcheck/00check.log"), 1L); if
    (!identical(l, "Status: 1 NOTE")) stop("Last line of ", shQuote("00check.log"),
    " is not ", shQuote("Status: 1 NOTE"), " (non-API) but ", shQuote(l))'' || res2=$?

    if [ $res1 -ne 0 ] || [ $res2 -ne 0 ]; then exit 1; fi

    '
  stage: test
  tags: *id006
  variables:
    _R_CHECK_CRAN_INCOMING_: 'TRUE'
    _R_CHECK_CRAN_INCOMING_REMOTE_: 'FALSE'
    _R_CHECK_CRAN_INCOMING_TARBALL_THRESHOLD_: '7500000'
