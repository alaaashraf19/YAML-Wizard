  - cat gcov_re.txt
  services:
  - mariadb:10
  stage: secondary
  variables:
    DEBIAN_COMMON_PACKAGES: make zlib1g-dev libpcre3-dev git
    GIT_DEPTH: '3'
    INSTALL_PACKAGES: gcc-8 gcovr mariadb-client libmariadbclient-dev-compat python3
