.bst_before_script:
  before_script: &id001
  - 'export BST_SHA=''06ae434a7017edbf67bf46c3fe2e327466801787''  # 1.1.3

    export BST_EXTERNAL_SHA=''fcd1fc365d0250bffe02937c89dcc31d11c299cf''

    git clone https://gitlab.com/BuildStream/buildstream.git

    # Use specific version of BuildStream

    cd buildstream && git checkout $BST_SHA

    pip3 install .

    cd -

    git clone https://gitlab.com/BuildStream/bst-external.git

    # Use specific version of bst-external plugins

    cd bst-external && git checkout $BST_EXTERNAL_SHA

    pip3 install .

    cd -

    '
  - mkdir -p ~/.ssh
  - "if [ -z \"$baserock_ostree_cache_private_key\" ]; then\n    echo >&2 \"Private\
    \ key for ostree.baserock.org is not available.\"\nelse\n    echo \"$baserock_ostree_cache_private_key\"\
    \ > ~/.ssh/id_rsa\n    chmod 600 ~/.ssh/id_rsa\n    ssh-keygen -y -f ~/.ssh/id_rsa\
    \ > ~/.ssh/id_rsa.pub\nfi\n"
  - ssh-keyscan -p 22200 ostree.baserock.org >> ~/.ssh/known_hosts
  - "if [ -n \"$baserock_ostree_cache_private_key\" ]; then\n    mkdir -p ~/.config\n\
    \    echo \"projects:\" > ~/.config/buildstream.conf\n    echo \"  baserock:\"\
    \ >> ~/.config/buildstream.conf\n    echo \"    artifacts:\" >> ~/.config/buildstream.conf\n\
    \    echo \"      - url: ssh://ostree@ostree.baserock.org:22200/cache\" >> ~/.config/buildstream.conf\n\
    \    echo \"        push: true\" >> ~/.config/buildstream.conf\n    echo \"scheduler:\"\
    \ >> ~/.config/buildstream.conf\n    echo \"  fetchers: 1\" >> ~/.config/buildstream.conf\n\
    \    echo \"  on-error: quit\" >> ~/.config/buildstream.conf\nfi\ncat ~/.config/buildstream.conf\n"
.bst_cache:
  cache: &id002
    key: bst
    paths:
    - ${XDG_CACHE_HOME}/buildstream/sources/
bst-build-base-system:
  before_script: *id001
  cache: *id002
