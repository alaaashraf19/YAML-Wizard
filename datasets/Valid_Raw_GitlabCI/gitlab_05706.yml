.linux:
  image: registry.gitlab.com/colinduquesnoy/mellowplayer/build-images/linux:qt515
  tags:
  - linux
  variables:
    QT_QPA_PLATFORM: offscreen
build:debug:
  artifacts:
    name: build-debug
    paths:
    - build
  extends: .linux
  needs: []
  script:
  - ./scripts/ci/linux/build-debug.sh
  stage: build
build:release:
  artifacts:
    name: build-release
    paths:
    - build
  extends: .linux
  needs: []
  script:
  - ./scripts/ci/linux/build-release.sh
  stage: build
build:release:no-gold-linker:
  extends: .linux
  needs: []
  script:
  - ./scripts/ci/linux/build-release-no-gold-linker.sh
  stage: build
coverage:
  after_script:
  - bash <(curl -s https://codecov.io/bash) -t "${CODECOV_TOKEN}" -f build/coverage.info.cleaned
  dependencies:
  - build:debug
  extends: .linux
  needs:
  - build:debug
  script:
  - ./scripts/ci/linux/coverage.sh
  stage: tests
lint:
  allow_failure: true
  extends: .linux
  needs: []
  script:
  - ./scripts/ci/linux/lint.sh
  stage: tests
pages:
  artifacts:
    paths:
    - public
  image: alpine:latest
  needs: []
  only:
  - master
  script:
  - echo 'Nothing to do...'
  stage: deploy
stages:
- build
- tests
- deploy
test:
  dependencies:
  - build:release
  extends: .linux
  needs:
  - build:release
  script:
  - ./scripts/ci/linux/tests.sh
  stage: tests
variables:
  APP_VERSION: 3.7.0
