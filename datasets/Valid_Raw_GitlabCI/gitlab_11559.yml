.image:
  artifacts:
    paths:
    - deploy/*.info
    - deploy/image*.img.xz
  before_script:
  - apk --update add coreutils bash git
  - git config --global --add safe.directory "${CI_PROJECT_DIR}"
  image: ${GITLAB_CI_IMAGE_DOCKER}-cli
  script:
  - 'if grep -q "^arm_64bit=1$" stage1/00-boot-files/files/config.txt; then

    IMG_NAME="${IMG_NAME}-arm64"

    else

    IMG_NAME="${IMG_NAME}-armhf"

    fi

    '
  - 'echo "IMG_NAME=''$IMG_NAME''

    PI_GEN=''${CI_PROJECT_NAME}''

    PI_GEN_REPO=''${CI_PROJECT_URL}''

    PI_GEN_RELEASE=''Raspberry Pi SatNOGS''

    DEPLOY_COMPRESSION=''xz''

    LOCALE_DEFAULT=''en_US.UTF-8''

    TARGET_HOSTNAME=''satnogs''

    KEYBOARD_KEYMAP=''us''

    KEYBOARD_LAYOUT=''English (US)''

    TIMEZONE_DEFAULT=''Etc/UTC''

    FIRST_USER_NAME=''satnogs''

    ENABLE_SSH=''1''

    STAGE_LIST=''stage0 stage1 stage2''" > config

    '
  - REGISTER_BINFMT_MISC=0 ./build-docker.sh
  services:
  - ${GITLAB_CI_IMAGE_DOCKER}
  stage: build
.imager:
  artifacts:
    expire_in: 4 weeks
    paths:
    - rpi-imager.${SATNOGS_IMAGE_FLAVOUR}{32,64}.json
  image: ${GITLAB_CI_IMAGE_ALPINE}
  script:
  - . contrib/imager_functions.sh
  - 'if grep -q "^arm_64bit=1$" stage1/00-boot-files/files/config.txt; then

    satnogs_image_word_size="64"

    IMAGER_DEVICES=''["pi5-64bit", "pi4-64bit", "pi3-64bit"]''

    else

    satnogs_image_word_size="32"

    IMAGER_DEVICES=''["pi5-32bit", "pi4-32bit", "pi3-32bit", "pi2-32bit"]''

    fi

    '
  - IMAGER_NAME="SatNOGS (${SATNOGS_IMAGE_FLAVOUR}, ${satnogs_image_word_size}-bit)"
  - IMAGER_URL="${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_REF_NAME}/raw/deploy/$(get_metadata_value
    deploy/*.info archive_filename)?job=image_${CI_JOB_NAME#imager_}"
  - IMAGER_RELEASE_DATE="$(get_metadata_value deploy/*.info release_date)"
  - IMAGER_EXTRACT_SIZE="$(get_metadata_value deploy/*.info extract_size)"
  - IMAGER_EXTRACT_SHA256="$(get_metadata_value deploy/*.info extract_sha256)"
  - IMAGER_IMAGE_DOWNLOAD_SIZE="$(get_metadata_value deploy/*.info image_download_size)"
  - IMAGER_IMAGE_DOWNLOAD_SHA256="$(get_metadata_value deploy/*.info image_download_sha256)"
  - generate_imager_sublist "rpi-imager.${SATNOGS_IMAGE_FLAVOUR}${satnogs_image_word_size}.json"
  stage: build
  variables:
    IMAGER_ICON: ${CI_PAGES_URL}/satnogs-logo-40px.png
    IMAGER_INIT_FORMAT: systemd
    IMAGER_WEBSITE: https://satnogs.org/
image_devel:
  artifacts:
    expire_in: 4 weeks
  extends: .image
  rules:
  - if: $CI_COMMIT_TAG == null
  variables:
    IMG_NAME: raspios-SatNOGS-${CI_COMMIT_REF_NAME}
image_release:
  extends: .image
  rules:
  - if: $CI_COMMIT_TAG
  variables:
    IMG_NAME: raspios-SatNOGS
imager_devel:
  extends: .imager
  needs:
  - image_devel
  rules:
  - if: $CI_COMMIT_TAG == null
  variables:
    IMAGER_DESCRIPTION: Open-source global network of ground stations for receiving
      and sharing satellite data. (revision ${CI_COMMIT_SHORT_SHA})
    SATNOGS_IMAGE_FLAVOUR: devel
imager_release:
  extends: .imager
  needs:
  - image_release
  rules:
  - if: $CI_COMMIT_TAG
  variables:
    IMAGER_DESCRIPTION: Open-source global network of ground stations for receiving
      and sharing satellite data. (release ${CI_COMMIT_TAG})
    SATNOGS_IMAGE_FLAVOUR: stable
pages:
  artifacts:
    paths:
    - public
  before_script:
  - apk --update add curl jq
  - pip install jinja2
  image: ${GITLAB_CI_IMAGE_PYTHON}
  resource_group: pages
  rules:
  - if: $CI_COMMIT_BRANCH == 'master'
  - if: $CI_COMMIT_BRANCH == 'arm64'
  - if: $CI_COMMIT_TAG
  script:
  - . contrib/imager_functions.sh
  - merge_imager_sublists "${CI_PAGES_URL}" ${IMAGER_JSON_FILES} > public/rpi-imager.json
  - 'for file in ${IMAGER_JSON_FILES}; do

    if [ -f "$file" ]; then

    cp -f "$file" public/

    fi

    done

    '
  - generate_imager_list "$IMAGER_RPI_ORG_REPO" public/rpi-imager.json > public/satnogs.json
  - ./contrib/create_pages.py
  stage: deploy
  variables:
    IMAGER_DESCRIPTION: Open-source global network of ground stations for receiving
      and sharing satellite data.
    IMAGER_ICON: ${CI_PAGES_URL}/satnogs-logo-40px.png
    IMAGER_JSON_FILES: rpi-imager.stable32.json rpi-imager.devel32.json rpi-imager.stable64.json
      rpi-imager.devel64.json
    IMAGER_NAME: SatNOGS
    IMAGER_RPI_ORG_REPO: https://downloads.raspberrypi.org/os_list_imagingutility_v4.json
    IMAGER_SUBITEMS_URL: ${CI_PAGES_URL}/rpi-imager.json
    IMAGER_WEBSITE: https://satnogs.org/
stages:
- build
- deploy
variables:
  GITLAB_CI_IMAGE_ALPINE: alpine:3.19.0
  GITLAB_CI_IMAGE_DOCKER: docker:24.0.7
  GITLAB_CI_IMAGE_PYTHON: python:3.12.1-alpine3.19
workflow:
  rules:
  - if: $CI_MERGE_REQUEST_IID
  - if: $CI_COMMIT_TAG
  - if: $CI_COMMIT_BRANCH == 'master'
  - if: $CI_COMMIT_BRANCH == 'arm64'
