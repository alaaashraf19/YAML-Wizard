build_job:
  artifacts:
    paths:
    - app-release.apk
    - req.json
  dependencies:
  - install_dependencies
  image: reactnativecommunity/react-native-android
  interruptible: true
  script:
  - apt-get update
  - apt-get install -y gettext-base
  - mv app/config/keys.sample.js app/config/keys.js
  - touch ./android/app/google-services.json && echo $GOOGLE_SERVICES > ./android/app/google-services.json
  - touch ./android/app/keystore.jks && echo $KEYSTORE | base64 --decode > ./android/app/keystore.jks
  - chmod +x ./scripts/fixes.sh
  - ./scripts/fixes.sh
  - chmod +x ./scripts/set_keys.sh
  - ./scripts/set_keys.sh
  - sh generate-gradle-properties.sh > ./android/gradle.properties
  - rm -rf android/app/build
  - echo fs.inotify.max_user_watches=524288 | tee -a /etc/sysctl.conf && sysctl -p
  - cd android && ./gradlew assembleRelease --stacktrace --no-daemon
  - mv ./app/build/outputs/apk/release/app-release.apk ../app-release.apk
  - 'cd .. && touch req.json && echo {\"url\":\"$CI_JOB_URL/artifacts/raw/app-release.apk\",\"platform\":
    \"android\" } > req.json'
  stage: build_apk
deploy_appetize_job:
  dependencies:
  - build_job
  interruptible: true
  script:
  - 'curl -s -X POST -H "Content-Type: application/json" -d @req.json https://$APPETIZE_API@api.appetize.io/v1/apps/$APPETIZE_KEY
    > response.json'
  - sh ./scripts/validate-appetize.sh
  stage: deploy_appetize
install_dependencies:
  artifacts:
    paths:
    - node_modules/
  image: node:8.17.0
  interruptible: true
  script:
  - npm install
  - npx jetify
  stage: dependencies
stages:
- dependencies
- build_apk
- deploy_appetize
