before_script:
- bundle install
image: ruby:2.3
pages:
  artifacts:
    paths:
    - public
  only:
  - master
  script:
  - cp ENTITATS_PARTICIPANTS.md web/_includes/entitats.md
  - cp la_guia/README.md web/_includes/que_es.md
  - sed -z 's/\n\n\*/\n*/g' la_guia/ESTRATEGIES.md | sed -z 's/\n\n\([[:digit:]]\)/\n\1/g'
    > web/_includes/estrategies.md
  - cp COM_CONTRIBUIR.md web/_includes/com_contribuir.md
  - sed -z 's/\n\n\*/\n*/g' locale/es/ESTRATEGIES.md | sed -z 's/\n\n\([[:digit:]]\)/\n\1/g'
    > web/_includes/estrategies-es.md
  - sed -z 's/\n\n\*/\n*/g' locale/en/ESTRATEGIES.md | sed -z 's/\n\n\([[:digit:]]\)/\n\1/g'
    > web/_includes/estrategies-en.md
  - sed -z 's/\n\n\*/\n*/g' la_guia/ESTRATEGIES_AUTONOMIQUES.md | sed -z 's/\n\n\([[:digit:]]\)/\n\1/g'
    > web/_includes/estrategies-autonomiques.md
  - bundle exec jekyll build -s web -d public
  - mv public/.well-known/acme-challenge/X__w03qTHoQuZvPAtYkDrfcm4XR5kIZmcbKeccAr44E.html
    public/.well-known/acme-challenge/X__w03qTHoQuZvPAtYkDrfcm4XR5kIZmcbKeccAr44E
  stage: deploy
test:
  artifacts:
    paths:
    - test
  except:
  - master
  script:
  - bundle exec jekyll build -s web -d test
  stage: test
variables:
  JEKYLL_ENV: production
  LC_ALL: C.UTF-8
