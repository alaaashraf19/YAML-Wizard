build_binary:
  artifacts:
    expire_in: 1 week
    paths:
    - penguin-htdocs.deb
  image: registry.gitlab.com/chusiang/continuous-delivery-workshop/ubuntu:16.04
  script:
  - chmod 755 penguin-htdocs/DEBIAN
  - dpkg -b penguin-htdocs
  stage: build
  tags:
  - docker
check_playbooks:
  image: registry.gitlab.com/chusiang/continuous-delivery-workshop/ansible:2.5.3
  script:
  - ls
  - cd ansible-playbooks/
  - echo "${VAULT_KEY}" > secret.txt
  - make main
  - rm -f secret.txt
  stage: syntax_check
deploy_to_dev:
  environment:
    name: staging
    url: http://stg.cdws.drx.tw
  image: registry.gitlab.com/chusiang/continuous-delivery-workshop/ansible:2.5.3
  only:
  - master@chusiang/continuous-delivery-workshop
  - develop@chusiang/continuous-delivery-workshop
  - tags@chusiang/continuous-delivery-workshop
  script:
  - ls
  - cd ansible-playbooks/
  - echo "${VAULT_KEY}" > secret.txt
  - ansible-playbook deploy.yml
  - rm -f secret.txt
  stage: deploy
  tags:
  - docker
release_to_prd:
  environment:
    name: production
    url: http://cdws.drx.tw
  image: registry.gitlab.com/chusiang/continuous-delivery-workshop/ansible:2.5.3
  only:
  - master@chusiang/continuous-delivery-workshop
  - tags@chusiang/continuous-delivery-workshop
  script:
  - cd ansible-playbooks/
  - echo "${VAULT_KEY}" > secret.txt
  - ansible-playbook -i production deploy.yml
  - rm -f secret.txt
  stage: release
  tags:
  - docker
stages:
- syntax_check
- build
- deploy
- test
- release
test_dev:
  environment:
    name: staging
    url: http://stg.cdws.drx.tw:10080
  image: registry.gitlab.com/chusiang/continuous-delivery-workshop/ansible:2.5.3
  only:
  - master@chusiang/continuous-delivery-workshop
  - develop@chusiang/continuous-delivery-workshop
  - tags@chusiang/continuous-delivery-workshop
  script:
  - cd ansible-playbooks/
  - echo "${VAULT_KEY}" > secret.txt
  - ansible-playbook test.yml
  - rm -f secret.txt
  stage: test
  tags:
  - docker
