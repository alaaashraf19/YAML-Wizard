before_script:
- apt-get update -qq && apt-get install -y -qq sqlite3 libsqlite3-dev nodejs
- gem install bundler --no-ri --no-rdoc
- bundle install -j $(nproc) --path vendor
cache:
  paths:
  - vendor/ruby
image: ruby:2.4
pages:
  artifacts:
    expire_in: 30 days
    paths:
    - public
  script:
  - mv coverage/ public/
  stage: deploy
rails:
  artifacts:
    paths:
    - coverage/
  script:
  - rails db:migrate
  - rails db:seed
  - rails test
  services:
  - postgres:alpine
  variables:
    DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSSWORD}@postgres/${POSTGRES_DB}
    POSTGRES_DB: test
    POSTGRES_PASSSWORD: test-password
    POSTGRES_USER: test
    RAILS_ENV: test
rubocop:
  script:
  - bundle exec rubocop --cache false
