build-graphene:
  artifacts:
    paths:
    - programs/cli_wallet/cli_wallet
    - programs/witness_node/witness_node
    - tests/chain_test
  cache:
    untracked: true
  script:
  - git submodule update --init --recursive
  - tools/build/build_posix.sh tests/chain_test
  stage: build
deploy-graphene:
  before_script:
  - eval $(ssh-agent -s)
  - ssh-add <(echo "$SSH_PRIVATE_KEY")
  - mkdir -p ~/.ssh
  - '[[ -f /.dockerenv ]] && echo -e "Host *\n\tStrictHostKeyChecking no\n\n" > ~/.ssh/config'
  dependencies:
  - build-graphene
  image: denis4inet/ansible-playbook
  only:
  - master
  script:
  - echo $TARGET_HOST > /tmp/hosts
  - ansible-playbook -i /tmp/hosts tools/deploy/main.yml
  stage: deploy
image: denis4inet/graphene-builder
stages:
- build
- test
- deploy
test-graphene:
  dependencies:
  - build-graphene
  script:
  - tests/chain_test
  stage: test
variables:
  BUILD_TYPE: release
  LINK_STATICALLY: 'false'
  VERSION: 0.0.${CI_PROJECT_ID}
