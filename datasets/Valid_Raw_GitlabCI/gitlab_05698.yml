release:
  before_script:
  - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  image: docker:stable
  only:
  - master
  - tags
  script:
  - "if [[ -n \"$CI_COMMIT_TAG\" ]]; then\n  export BUILD_IMAGE_NAME=\"$CI_REGISTRY_IMAGE:latest\"\
    \n  export RELEASE_IMAGE_NAME=\"$CI_REGISTRY_IMAGE:$CI_COMMIT_TAG\"\nfi\n"
  - ./build/src/release.sh
  services:
  - docker:stable-dind
  stage: release
  tags:
  - docker
