.docker_login: 'docker info

  docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"

  '
build_image:
  image: gitlab/dind
  only:
  - feature/docker
  script:
  - 'docker info

    docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"

    '
  - docker build -t "$CI_REGISTRY_IMAGE" dockerfiles/
  - docker push "$CI_REGISTRY_IMAGE"
  stage: build_image
external_pages:
  artifacts:
    paths:
    - public
  only:
  - external
  script:
  - cd docs/
  - make html
  - mv _build/html/* ../public/
  stage: pages
pages:
  artifacts:
    paths:
    - public
  except:
  - external
  image: $CI_REGISTRY_IMAGE
  script:
  - cd docs/
  - make html
  - mv _build/html/* ../public/
  stage: pages
stages:
- build_image
- test_image
- pages
test-image:
  image: $CI_REGISTRY_IMAGE
  only:
  - feature/docker
  script:
  - echo Hello World
  stage: test_image
