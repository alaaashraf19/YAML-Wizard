before_script:
- cat /proc/cpuinfo
- cat /proc/meminfo
- apt-get update
- apt-get install -y --no-upgrade eatmydata
build:
  artifacts:
    paths:
    - artifacts
  script:
  - eatmydata apt-get install -y --no-upgrade make nasm python3 qemu-utils
  - bash test/build_all_variants.sh
  - ls -l build/asmg.x86.exe build/asmg_dbg.x86.exe
  stage: build
  tags:
  - docker
image: giomasce/testenv
ipxe:
  script:
  - eatmydata apt-get install -y --no-upgrade python3 qemu-system-x86
  - cd http && python3 -m http.server 8080 &
  - qemu-system-i386 -hda artifacts/ipxe/boot_asmg.x86.qcow2 -serial file:/dev/stdout
    -display none -m 256M -enable-kvm | ./test/decode_tests.py just_malloc
  stage: test
  tags:
  - privileged
mm0:
  allow_failure: true
  script:
  - eatmydata apt-get install -y --no-upgrade python3 qemu-system-x86
  - qemu-system-i386 -hda artifacts/mm0/boot_asmg.x86.qcow2 -serial file:/dev/stdout
    -display none -m 256M -enable-kvm | ./test/decode_tests.py just_malloc
  stage: test
  tags:
  - privileged
mm0_c:
  script:
  - eatmydata apt-get install -y --no-upgrade python3 qemu-system-x86
  - qemu-system-i386 -hda artifacts/mm0_c/boot_asmg.x86.qcow2 -serial file:/dev/stdout
    -display none -m 256M -enable-kvm | ./test/decode_tests.py just_malloc
  stage: test
  tags:
  - privileged
single_cream:
  allow_failure: true
  script:
  - eatmydata apt-get install -y --no-upgrade python3 qemu-system-x86
  - qemu-system-i386 -hda artifacts/single_cream/boot_asmg.x86.qcow2 -serial file:/dev/stdout
    -display none -m 256M -enable-kvm | ./test/decode_tests.py just_malloc
  stage: test
  tags:
  - privileged
stages:
- build
- test
tests:
  script:
  - eatmydata apt-get install -y --no-upgrade python3 qemu-system-x86
  - qemu-system-i386 -hda artifacts/tests/boot_asmg.x86.qcow2 -serial file:/dev/stdout
    -display none -m 256M -enable-kvm | ./test/decode_tests.py
  stage: test
  tags:
  - privileged
variables:
  GIT_DEPTH: '3'
  GIT_STRATEGY: clone
  GIT_SUBMODULE_STRATEGY: recursive
