.setup-deploy:
  image: python:3.6.4-stretch
  script: &id001
  - apt-get update -qy
  - apt-get install -y rubygems
  - wget -qO- https://cli-assets.heroku.com/install-ubuntu.sh | sh
  - gem install dpl
  - dpl --provider=heroku --app=$APP_NAME --api-key=$HEROKU_API_KEY
  - heroku run python manage.py migrate -a $APP_NAME
  - heroku run python manage.py compilemessages -a $APP_NAME
  tags: &id002
  - python-361
deploy do prd:
  image: python:3.6.4-stretch
  only:
  - production
  script: *id001
  stage: deploy
  tags: *id002
  variables:
    APP_NAME: myproject-prd
    HEROKU_API_KEY: $HEROKU_PRD_API_KEY
deploy to dev:
  image: python:3.6.4-stretch
  only:
  - master
  script: *id001
  stage: deploy
  tags: *id002
  variables:
    APP_NAME: myproject-dev
    HEROKU_API_KEY: $HEROKU_DEV_API_KEY
deploy to qa:
  image: python:3.6.4-stretch
  only:
  - pre-production
  script: *id001
  stage: deploy
  tags: *id002
  variables:
    APP_NAME: myproject-qa
    HEROKU_API_KEY: $HEROKU_QA_API_KEY
deploy to tst:
  image: python:3.6.4-stretch
  only:
  - pre-production
  script: *id001
  stage: deploy
  tags: *id002
  variables:
    APP_NAME: myproject-tst
    HEROKU_API_KEY: $HEROKU_TST_API_KEY
stages:
- test
- deploy
unit test:
  except:
  - tags
  - pre-production
  - production
  image: python:latest
  script:
  - apt-get update -qy
  - apt-get install -y python-dev python-pip
  - make setup-dev
  - make test
  - make code-convention
  services:
  - postgres:latest
  stage: test
  tags:
  - python-361
  variables:
    DATABASE_URL: postgres://postgres@postgres/myproject
