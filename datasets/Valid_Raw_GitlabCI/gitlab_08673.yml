.rails-42:
  before_script: &id002
  - ./scripts/prepare_build.sh
  - ruby -v
  - gem install bundler --no-ri --no-rdoc
  - bundle install --gemfile=gemfiles/rails_42.gemfile -j $(nproc)
.rails-50:
  before_script: &id003
  - ./scripts/prepare_build.sh
  - ruby -v
  - gem install bundler --no-ri --no-rdoc
  - bundle install --gemfile=gemfiles/rails_50.gemfile -j $(nproc)
.static-analysis:
  before_script: &id001
  - ./scripts/prepare_build.sh
  - ruby -v
  - gem install bundler --no-ri --no-rdoc
  - bundle install -j $(nproc)
  image: ruby:2.3.1
bundler:audit:
  before_script: *id001
  image: ruby:2.3.1
  script:
  - bundle exec bundle-audit check --update --ignore OSVDB-115941
cache:
  paths:
  - vendor/ruby
image: ruby:2.1
rspec-ruby21-rails42:
  before_script: *id002
  script:
  - bundle exec rspec spec
rspec-ruby23-rails42:
  before_script: *id002
  image: ruby:2.3.1
  script:
  - bundle exec rspec spec
rspec-ruby23-rails50:
  before_script: *id003
  image: ruby:2.3.1
  script:
  - bundle exec rspec spec
rubocop:
  before_script: *id001
  image: ruby:2.3.1
  script:
  - bundle exec rubocop
