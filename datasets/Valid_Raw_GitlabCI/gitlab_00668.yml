before_script:
- mix local.hex --force
- mix local.rebar --force
- mix deps.get
cache:
  key: $CI_JOB_STAGE
  paths:
  - deps/
  - _build/
credo:
  script:
  - mix credo --ignore refactor list
  stage: styles
image: elixir:latest
stages:
- test
- styles
test:
  script:
  - mix test
  stage: test
  variables:
    MIX_ENV: test
