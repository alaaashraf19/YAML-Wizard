branch::publish:
  only:
  - tags
  script: 'echo ---------------------------------------------- TESTING


    dotnet test -v minimal -c Release /p:CollectCoverage=true


    echo ---------------------------------------------- VERSIONING


    echo VERSION := $CI_COMMIT_TAG


    sed -i -- "s/1\.0\.0\.0/${CI_COMMIT_TAG}/g" ./FunctionalLink/FunctionalLink.csproj


    echo ---------------------------------------------- BUILDING


    cd FunctionalLink

    dotnet pack -c Release

    cd ..


    echo ---------------------------------------------- PUBLISHING


    cd ./FunctionalLink/bin/Release

    NUGET_PKG=$(ls *.nupkg)

    echo PACKAGE := $NUGET_PKG

    dotnet nuget push $NUGET_PKG -k $NUGET_KEY -s https://api.nuget.org/v3/index.json

    cd ../../..

    '
  stage: publish
branch::test:
  except:
  - tags
  script: 'dotnet test -v minimal -c Release /p:CollectCoverage=true

    '
  stage: test
image: mcr.microsoft.com/dotnet/core/sdk:3.1
stages:
- test
- publish
