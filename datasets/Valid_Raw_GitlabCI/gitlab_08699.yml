build:image:
  image: docker:git
  only:
    changes:
    - Dockerfile
    - .dockerignore
    - bin/*
    - config/*
    refs:
    - pushes
  script:
  - "TAGS=\"${CI_REGISTRY_IMAGE}:${CI_COMMIT_SHORT_SHA}\"\n\nif [[ \"$CI_COMMIT_REF_NAME\"\
    \ == \"$CI_DEFAULT_BRANCH\" ]]; then\n  # Default branch: add latest tag\n  TAGS=\"\
    $TAGS ${CI_REGISTRY_IMAGE}:latest\"\nfi\n"
  - ./bin/docker $TAGS
  services:
  - docker:dind
  stage: build
merge:foss:
  cache:
    key: merge:foss:$SOURCE_PROJECT:$TARGET_PROJECT:$SOURCE_BRANCH:$TARGET_BRANCH
    paths:
    - source
    - target
  image: ${CI_REGISTRY_IMAGE}:latest
  only:
    refs:
    - api
    - schedules
    - triggers
    - web
    variables:
    - $MERGE_FOSS == '1'
  resource_group: merge_foss-$SOURCE_PROJECT-$TARGET_PROJECT-$SOURCE_BRANCH-$TARGET_BRANCH
  retry: 1
  script:
  - bash /app/bin/merge-train foss
  stage: merge
  tags:
  - saas-linux-large-amd64
  timeout: 1 hours 10 minutes
  variables:
    SOURCE_PROJECT: gitlab-org/gitlab
    SSH_PRIVATE_KEY: $FOSS_SSH_PRIVATE_KEY
    SSH_PUBLIC_KEY: $FOSS_SSH_PUBLIC_KEY
    TARGET_PROJECT: gitlab-org/gitlab-foss
merge:security:
  artifacts:
    paths:
    - source/.git/lfs/logs/
    - target/.git/lfs/logs/
    when: on_failure
  cache:
    key: merge:security:$SOURCE_PROJECT:$TARGET_PROJECT:$SOURCE_BRANCH:$TARGET_BRANCH
    paths:
    - source
    - target
  image: ${CI_REGISTRY_IMAGE}:latest
  resource_group: merge_security-$SOURCE_PROJECT-$TARGET_PROJECT-$SOURCE_BRANCH-$TARGET_BRANCH
  retry: 2
  rules:
  - if: $MERGE_SECURITY_MASTER
    when: always
  - if: $MERGE_SECURITY
    when: always
  script:
  - bash /app/bin/merge-train security
  stage: merge
  variables:
    SSH_PRIVATE_KEY: $SECURITY_SSH_PRIVATE_KEY
    SSH_PUBLIC_KEY: $SECURITY_SSH_PUBLIC_KEY
shellcheck:
  except:
  - schedules
  - triggers
  - web
  - api
  image: koalaman/shellcheck-alpine
  only:
    changes:
    - bin/*
  script:
  - shellcheck bin/configure-ssh
  - shellcheck bin/docker
  - shellcheck bin/merge-train
  stage: test
stages:
- test
- build
- merge
variables:
  BUILD_IMAGE: '1'
