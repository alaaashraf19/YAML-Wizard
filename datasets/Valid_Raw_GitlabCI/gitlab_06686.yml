.python_tox_matrix:
  image: python:${VERSION}
  parallel:
    matrix:
    - VERSION:
      - '3.8'
      - '3.9'
      - '3.10'
      - '3.11'
  script:
  - tox -vv
before_script:
- pip install tox
build:
  artifacts:
    expire_in: 1 week
    paths:
    - dist/
  script:
  - python setup.py sdist bdist_wheel
  stage: build
coverage:
  script:
  - tox -vv
  - pip install codecov
  - codecov --token=$CODECOV_TOKEN
  stage: coverage
  variables:
    TOXENV: coverage
deploy:
  dependencies:
  - build
  except:
  - branches
  only:
  - /^2\..*$/
  script:
  - pip install twine
  - twine upload -u $PYPI_USER -p $PYPI_PASSWORD dist/*
  stage: deploy
examples:linux:
  extends: .python_tox_matrix
  only:
  - tags
  stage: examples
  variables:
    TOXENV: examples
image: python:3.8
include:
- template: Jobs/SAST.gitlab-ci.yml
stages:
- style
- build
- test
- coverage
- examples
- deploy
style:
  before_script:
  - apt update && apt install -y --no-install-recommends git
  - pip install pre-commit
  cache:
    paths:
    - ${PRE_COMMIT_HOME}
  script:
  - pre-commit run --all-files --show-diff-on-failure
  stage: style
  variables:
    PRE_COMMIT_HOME: ${CI_PROJECT_DIR}/.cache/pre-commit
test:linux:
  extends: .python_tox_matrix
  stage: test
  variables:
    TOXENV: py
