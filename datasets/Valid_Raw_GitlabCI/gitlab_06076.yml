before_script:
- chmod +x gradlew
build:
  cache:
    key: $CI_COMMIT_REF_NAME
    paths:
    - build
    - .gradle
    policy: push
  script: ./gradlew --build-cache assemble
  stage: build
deploy:
  cache:
    key: $CI_COMMIT_REF_NAME
    paths:
    - build
    - .gradle
    policy: pull
  script:
  - ./gradlew dockerPush
  stage: deploy
image: openjdk:10-jdk
test:
  cache:
    key: $CI_COMMIT_REF_NAME
    paths:
    - build
    - .gradle
    policy: pull
  script: ./gradlew check
  stage: test
variables:
  GRADLE_OPTS: -Dorg.gradle.daemon=false
