.if-monthly-release-tag-day:
  if: ($CI_PIPELINE_SOURCE =~ /^(pipeline|web|api)$/) && ($MONTHLY_RELEASE_PIPELINE
    =~ /^(tag_day|true)$/)
.monthly-release-tag-day-base:
  extends:
  - .with-bundle
  - .common-ci-tokens
  rules:
  - if: ($CI_PIPELINE_SOURCE =~ /^(pipeline|web|api)$/) && ($MONTHLY_RELEASE_PIPELINE
      =~ /^(tag_day|true)$/)
  stage: monthly_release:tag_day
monthly_release_tag_day:check_omnibus_packages_tagging:
  extends:
  - .monthly-release-tag-day-base
  - .common-ci-tokens
  needs:
  - monthly_release_tag_day:tag
  rules:
  - if: ($CI_PIPELINE_SOURCE =~ /^(pipeline|web|api)$/) && ($MONTHLY_RELEASE_PIPELINE
      =~ /^(tag_day|true)$/)
    start_in: 90 minutes
    when: delayed
  script:
  - bundle exec rake 'monthly:tag_day:check_omnibus_packages_tagging'
monthly_release_tag_day:ensure_stable_branches_green:
  extends:
  - .monthly-release-tag-day-base
  - .common-ci-tokens
  needs:
  - monthly_release_tag_day:prepare
  script:
  - bundle exec rake 'monthly:tag_day:ensure_stable_branches_green'
monthly_release_tag_day:mirror_status:
  extends:
  - .monthly-release-tag-day-base
  - .common-ci-tokens
  needs:
  - monthly_release_tag_day:prepare
  script:
  - bundle exec rake 'mirror:status'
monthly_release_tag_day:prepare:
  extends:
  - .monthly-release-tag-day-base
  - .common-ci-tokens
  needs:
  - job: monthly_release_final_rc:verify_rc_pipeline
    optional: true
  - job: monthly_release_final_rc:verify_pre_deploy
    optional: true
  script:
  - bundle exec rake 'monthly:tag_day:start'
  stage: monthly_release:tag_day:prepare
  when: manual
monthly_release_tag_day:start_tag:
  extends: .monthly-release-tag-day-base
  needs:
  - monthly_release_tag_day:ensure_stable_branches_green
  - monthly_release_tag_day:mirror_status
  script:
  - bundle exec rake 'monthly:tag_day:start_tag'
  when: manual
monthly_release_tag_day:tag:
  extends: .monthly-release-tag-day-base
  needs:
  - monthly_release_tag_day:start_tag
  script:
  - source scripts/setup_ssh.sh
  - source scripts/setup_git.sh
  - bundle exec rake 'monthly:tag_day:tag'
monthly_release_tag_day:verify_release_deploy:
  extends: .monthly-release-tag-day-base
  needs:
  - monthly_release_tag_day:check_omnibus_packages_tagging
  rules:
  - if: ($CI_PIPELINE_SOURCE =~ /^(pipeline|web|api)$/) && ($MONTHLY_RELEASE_PIPELINE
      =~ /^(tag_day|true)$/)
    start_in: 10 minutes
    when: delayed
  script:
  - bundle exec rake 'monthly:tag_day:validate_release_deployment'
  timeout: 2h
