before_script:
- echo $CI_JOB_TOKEN | docker login -u gitlab-ci-token --password-stdin registry.gitlab.com
build:
  script:
  - docker build -t $TEST_IMAGE .
  - docker push $TEST_IMAGE
  stage: build
image: docker:git
release:
  except:
  - schedules
  only:
  - master
  script:
  - docker pull $TEST_IMAGE
  - docker tag $TEST_IMAGE $RELEASE_IMAGE
  - docker push $RELEASE_IMAGE
  stage: release
services:
- docker:dind
stages:
- build
- test
- release
test:
  script:
  - docker run $TEST_IMAGE --version
  - test -d fdroid || mkdir fdroid
  - cd fdroid
  - docker run -v $(pwd):/repo $TEST_IMAGE init --verbose
  - apk add --no-cache wget
  - wget -O repo/test.apk https://gitlab.com/fdroid/fdroidserver/raw/1.0.3/tests/repo/info.zwanenburg.caffeinetile_4.apk
  - docker run -v $(pwd):/repo $TEST_IMAGE update --verbose --create-metadata
  - test -e repo/index-v1.jar
  - test -e repo/index.jar
  - test -e repo/index.xml
  - grep -F '<application id=' repo/index.xml > /dev/null
  stage: test
variables:
  RELEASE_IMAGE: $CI_REGISTRY_IMAGE:latest
  TEST_IMAGE: $CI_REGISTRY_IMAGE:$CI_COMMIT_REF_NAME
