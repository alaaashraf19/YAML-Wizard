build_cryptodiffer:
  image: docker:latest
  script:
  - docker build -t $HUB/$CONTAINER_IMAGE_CRYPTODIFFER -f cryptodiffer/cryptodiffer.yaml
    .
  - docker login -u $HUB_USER -p $HUB_PASS $HUB
  - docker push $HUB/$CONTAINER_IMAGE_CRYPTODIFFER:latest
  services:
  - docker:dind
  stage: build
deploy_cryptodiffer:
  before_script:
  - mkdir -p ~/.ssh
  - chmod 700 ~/.ssh
  - echo "$DEPLOY_SERVER_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_rsa
  - chmod 600 ~/.ssh/id_rsa
  - eval "$(ssh-agent -s)"
  - ssh-add ~/.ssh/id_rsa
  - ssh-keyscan -H $DEPLOYMENT_SERVER_IP >> ~/.ssh/known_hosts
  image: gitlab/dind:latest
  script:
  - ssh novy@$DEPLOYMENT_SERVER_IP "sudo docker login -u ${HUB_USER} -p ${HUB_PASS}
    ${HUB};sudo docker pull ${HUB}/${CONTAINER_IMAGE_CRYPTODIFFER}:latest;sudo docker
    rm $(sudo docker ps -a -q -f name=cryptodiffer) --force;sudo docker run --restart=always
    --name cryptodiffer -it -d ${HUB}/${CONTAINER_IMAGE_CRYPTODIFFER} python3 /root/cryptodiffer.py"
  stage: deploy
test_cryptodiffer:
  image: docker:latest
  script:
  - docker login -u $HUB_USER -p $HUB_PASS $HUB
  - docker run $HUB/$CONTAINER_IMAGE_CRYPTODIFFER echo "echo cryptodiffer test passed
    succesfully"
  services:
  - docker:dind
  stage: test
variables:
  CONTAINER_IMAGE_CRYPTODIFFER: $HUB_USER/telegram-bot/cryptodiffer-$CI_COMMIT_SHA
