cache:
  paths:
  - .m2/repository
deploy:jdk8:
  artifacts:
    paths:
    - target/staging
  image: maven:3.3.9-jdk-8
  only:
  - master
  script:
  - mvn $MAVEN_CLI_OPTS deploy --settings opt/settings.xml
  stage: test
pages:
  artifacts:
    paths:
    - public
  dependencies:
  - deploy:jdk8
  image: busybox:latest
  only:
  - master
  script:
  - mv target/staging public
  stage: deploy
variables:
  MAVEN_CLI_OPTS: --batch-mode --errors --fail-at-end --show-version -DinstallAtEnd=true
    -DdeployAtEnd=true
  MAVEN_OPTS: -Dhttps.protocols=TLSv1.2 -Dmaven.repo.local=.m2/repository -Dorg.slf4j.simpleLogger.log.org.apache.maven.cli.transfer.Slf4jMavenTransferListener=WARN
    -Dorg.slf4j.simpleLogger.showDateTime=true -Djava.awt.headless=true
