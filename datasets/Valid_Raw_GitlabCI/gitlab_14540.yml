before_script:
- echo '//registry.npmjs.org/:_authToken=${NPM_TOKEN}' > .npmrc
- yarn config set cache-folder /.yarn
- yarn install --frozen-lockfile --pure-lockfile
cache:
  key: frontier
  paths:
  - node_modules/
  - /.yarn
deploy:
  only:
  - tags
  script:
  - npm publish --access=public
  stage: deploy
image: picter/ci-node
pages:
  artifacts:
    paths:
    - public
  only:
  - master
  script:
  - yarn run pages:build
  stage: deploy
stages:
- test
- deploy
test:lint:
  script:
  - npm run lint
  stage: test
test:unit:
  script:
  - npm test
  stage: test
