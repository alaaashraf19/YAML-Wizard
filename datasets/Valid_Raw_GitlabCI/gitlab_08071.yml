before_script:
- dpkg --add-architecture i386
- apt-get update -yqq && apt-get install  -yqq libudev-dev pkg-config git gcc-multilib
  libudev1:i386 libudev-dev:i386
- git submodule sync
- git submodule update --init
- rustc -Vv && cargo -Vv
build:i686-unknown-linux-gnu:
  before_script: &id001
  - dpkg --add-architecture i386
  - apt-get update -yqq && apt-get install  -yqq libudev-dev pkg-config git gcc-multilib
    libudev1:i386 libudev-dev:i386
  - git submodule sync
  - git submodule update --init
  - rustc -Vv && cargo -Vv
  - rustup target add i686-unknown-linux-gnu
  script:
  - cargo test --no-run --verbose --target=i686-unknown-linux-gnu
  stage: build
  variables:
    PKG_CONFIG_ALLOW_CROSS: 1
build:x86_64-unknown-linux-gnu:
  script:
  - cargo test --no-run --verbose
  stage: build
cache:
  paths:
  - cargo
  - target
image: liuchong/rustup:1.22.0
pages:
  artifacts:
    expire_in: 1 week
    paths:
    - public
  except:
  - schedules
  only:
  - master
  script:
  - cargo doc
  - rm -r target/doc/libc
  - rm -r target/doc/src/libc
  - mkdir public
  - mkdir public/img
  - mv target/doc public
  stage: deploy
test:i686-unknown-linux-gnu:
  before_script: *id001
  script:
  - cargo test --verbose --target=i686-unknown-linux-gnu
  stage: test
  variables:
    PKG_CONFIG_ALLOW_CROSS: 1
test:x86_64-unknown-linux-gnu:
  script:
  - cargo test --verbose
  stage: test
variables:
  CARGO_HOME: $CI_PROJECT_DIR/cargo
