build:
  script:
  - ./prepare --disable-dependency-tracking --enable-gpgme --enable-sidebar --enable-compressed
    --enable-pop --enable-imap --enable-smtp --enable-debug --enable-hcache --enable-autocrypt
    --with-sqlite3 --with-gnutls
  - make -j
  stage: build
image: registry.gitlab.com/muttmua/mutt/ubuntu:18.04
pages:
  artifacts:
    paths:
    - public
  only:
  - master
  script:
  - ./prepare
  - make update-doc
  - mkdir -p public
  - cp doc/manual.html public/manual-dev.html
  stage: deploy
shellcheck:
  script:
  - (find . -name \*.sh && echo "gen_defs muttbug prepare") | xargs shellcheck --exclude=SC2003,SC2006,SC2086,SC2162,SC2046
  stage: shellcheck
stages:
- shellcheck
- build
- deploy
