.cells_deployment:
  allow_failure: true
  needs:
  - job: auto_deploy:start
  - job: prepare
  - job: notify_success:gstg-cny
    optional: true
  - job: validate_ownership:gstg-cny
    optional: true
  rules:
  - if: $AUTO_DEPLOY_TAG
  - if: $CI_COMMIT_TAG =~ /^\d+\.\d+\.\d{12}$/
  stage: coordinated:deploy:canary
  variables:
    DEPLOY_VERSION: $DEPLOY_VERSION
.environment-lock-state-metric:
  allow_failure: true
  extends:
  - .common-job-setup
  - .mimir-query-auth
  resource_group: set-environment-locked-state-metric-$DEPLOY_ENVIRONMENT
  tags:
  - release
.environment-state-metric:
  allow_failure: true
  extends:
  - .common-job-setup
  - .mimir-query-auth
  resource_group: set-environment-state-metric-$DEPLOY_ENVIRONMENT
  tags:
  - release
.if-auto-deploy-tag:
  if: $AUTO_DEPLOY_TAG
.if-coordinated-pipeline:
  if: $CI_COMMIT_TAG =~ /^\d+\.\d+\.\d{12}$/
.notify_base:
  allow_failure: true
  extends: .common-job-setup
  script:
  - bundle exec rake 'auto_deploy:notify'
  variables:
    DEPLOY_USER: deployer
    DEPLOY_VERSION: $DEPLOY_VERSION
    TRIGGER_REF: master
.notify_failure:
  extends: .notify_base
  rules:
  - if: $SKIP_REF_CNY_DEPLOYMENT && $DEPLOY_ENVIRONMENT == 'gstg-ref'
    when: never
  - if: $SKIP_GSTG_CNY_DEPLOYMENT && $DEPLOY_ENVIRONMENT == 'gstg-cny'
    when: never
  - if: $AUTO_DEPLOY_TAG
    when: on_failure
  - if: $CI_COMMIT_TAG =~ /^\d+\.\d+\.\d{12}$/
    when: on_failure
.notify_start:
  extends: .notify_base
  rules:
  - if: $SKIP_REF_CNY_DEPLOYMENT && $DEPLOY_ENVIRONMENT == 'gstg-ref'
    when: never
  - if: $SKIP_GSTG_CNY_DEPLOYMENT && $DEPLOY_ENVIRONMENT == 'gstg-cny'
    when: never
  - if: $AUTO_DEPLOY_TAG
    when: on_success
  - if: $CI_COMMIT_TAG =~ /^\d+\.\d+\.\d{12}$/
    when: on_success
.notify_success:
  extends: .notify_base
  rules:
  - if: $SKIP_REF_CNY_DEPLOYMENT && $DEPLOY_ENVIRONMENT == 'gstg-ref'
    when: never
  - if: $SKIP_GSTG_CNY_DEPLOYMENT && $DEPLOY_ENVIRONMENT == 'gstg-cny'
    when: never
  - if: $AUTO_DEPLOY_TAG
    when: on_success
  - if: $CI_COMMIT_TAG =~ /^\d+\.\d+\.\d{12}$/
    when: on_success
.track_deployment_completed:
  allow_failure: true
  extends: .common-job-setup
  rules:
  - if: $SKIP_REF_CNY_DEPLOYMENT && $DEPLOY_ENVIRONMENT == 'gstg-ref'
    when: never
  - if: $SKIP_GSTG_CNY_DEPLOYMENT && $DEPLOY_ENVIRONMENT == 'gstg-cny'
    when: never
  - if: $AUTO_DEPLOY_TAG
  - if: $CI_COMMIT_TAG =~ /^\d+\.\d+\.\d{12}$/
  script:
  - bundle exec rake 'metrics:deployment_completed'
.track_deployment_started:
  extends: .common-job-setup
  rules:
  - if: $SKIP_REF_CNY_DEPLOYMENT && $DEPLOY_ENVIRONMENT == 'gstg-ref'
    when: never
  - if: $SKIP_GSTG_CNY_DEPLOYMENT && $DEPLOY_ENVIRONMENT == 'gstg-cny'
    when: never
  - if: $AUTO_DEPLOY_TAG
  - if: $CI_COMMIT_TAG =~ /^\d+\.\d+\.\d{12}$/
  script:
  - bundle exec rake 'metrics:deployment_started'
.unless-skip-coordinated-build:
  if: $SKIP_COORDINATED_BUILD == 'true'
  when: never
.unless-skip-gstg-cny:
  if: $SKIP_GSTG_CNY_DEPLOYMENT && $DEPLOY_ENVIRONMENT == 'gstg-cny'
  when: never
.unless-skip-staging-ref:
  if: $SKIP_REF_CNY_DEPLOYMENT && $DEPLOY_ENVIRONMENT == 'gstg-ref'
  when: never
