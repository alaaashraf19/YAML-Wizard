.spec:
  script: &id001
  - bundle install --path vendor --without production --jobs $(nproc) > /dev/null
  - gem build lemme-pry.gemspec
  - gem install *.gem
  - echo 'puts "Hello AS " + ActiveSupport.version.to_s;exit' | lemme-pry activesupport
    '~> 4.0'
  tags: &id002
  - docker
spec2.1:
  image: ruby:2.1
  script: *id001
  tags: *id002
spec2.3:
  image: ruby:2.3
  script: *id001
  tags: *id002
spec2.4:
  image: ruby:2.4
