before_script:
- docker info
build:
  script:
  - docker build -t ${EDM_IMAGE} .
  - docker login -u ${CI_REGISTRY_USER} -p ${CI_BUILD_TOKEN} ${CI_REGISTRY}
  - docker push ${EDM_IMAGE}
  stage: build
image: docker:stable
services:
- docker:dind
stages:
- build
variables:
  DOCKER_DRIVER: overlay2
  EDM_IMAGE: ${CI_REGISTRY_IMAGE}/edm:${CI_COMMIT_REF_NAME}
