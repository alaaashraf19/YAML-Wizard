    name: ${DEPENDENCY_PROXY_PREFIX}${MYSQL_IMAGE_NEWEST_SUPPORTED}
  stage: tiki-check
stages:
- build
- lint
- tiki-check
- unit-tests
- package-tiki
- vendors-security
- vendors_update
- composer-stability
tiki-package:
  allow_failure: true
  artifacts:
    expire_in: 2 days
    paths:
    - tiki-${CI_COMMIT_SHORT_SHA}-${CI_COMMIT_REF_SLUG}.tar.gz
  cache:
  - *id001
  image: ${DEPENDENCY_PROXY_PREFIX}${BASE_QA_IMAGE}
  needs:
  - composer
  - node_build
  script:
  - echo "=> Removing Composer dev dependencies ..."
  - composer -V | grep "version 2" || composer self-update --2
  - composer --ansi install -d vendor_bundled --no-dev --optimize-autoloader --no-progress
    --prefer-dist -n
  - php console.php dev:buildwsconfs --generate
  - echo "=> Cleanup ..."
  - rm -fr temp && git checkout temp
  - rm -fr bin
  - echo "=> Files in the folder not tracked in git ..."
  - git ls-files --others | grep -v vendor_bundled/vendor/ | grep -v .composercache/
    || echo "Ignore Failure"
  - echo "=> Optimize language files ..."
  - find lang/ -name language.php -exec php doc/devtools/stripcomments.php {} \;
  - echo "=> Fix permissions ..."
  - find . -type f -exec chmod 0664 {} \;
  - chown 0775 setup.sh
  - find . -type d -exec chmod 0755 {} \;
  - echo "=> Pack tiki ..."
  - tar --exclude *.DS_Store --exclude tests --exclude doc/devtools --exclude .git
    --exclude .gitignore --exclude .composercache -pczf tiki-${CI_COMMIT_SHORT_SHA}-${CI_COMMIT_REF_SLUG}.tar.gz
    *
  stage: package-tiki
translation:
  allow_failure: true
  image: ${DEPENDENCY_PROXY_PREFIX}${BASE_QA_IMAGE}
  needs:
  - composer
  script:
  - git log --first-parent --pretty="format:%h" -1 --skip=1 | xargs -I gitHash php
    -d display_errors=On console.php translation:englishupdate --audit
