      - doc/devtools/dbdiff/composer.lock
      prefix: composer-dbdiff
    paths:
    - .composercache-dbdiff/
    policy: pull-push
  image: ${DEPENDENCY_PROXY_PREFIX}${BASE_QA_IMAGE}
  needs: []
