.cache-composercache: &id001
  key:
    files:
    - vendor_bundled/composer.lock
    prefix: composer
  paths:
  - .composercache/
  policy: pull-push
.cache-vendor_bundled: &id006
  key:
    files:
    - vendor_bundled/composer.lock
    prefix: vendor_bundled
  paths:
  - vendor_bundled/vendor
  policy: pull
.composer-lock:
  after_script:
  - mkdir after || true
  - cp vendor_bundled/composer.json vendor_bundled/composer.lock after
  - diff -u before/composer.lock after/composer.lock
  allow_failure:
    exit_codes: 1
  artifacts:
    expire_in: 2 days
    paths:
    - before
    - after
    when: always
  before_script:
  - mkdir before || true
  - cp vendor_bundled/composer.json vendor_bundled/composer.lock before
  cache:
  - *id001
  image: ${DEPENDENCY_PROXY_PREFIX}${BASE_QA_IMAGE}
  needs:
  - composer
  script:
  - cp $(command -v composer) temp/composer.phar
  - php temp/composer.phar -V | grep "version 2" || php temp/composer.phar self-update
    --2
  - php doc/devtools/update_composer_lock.php
  stage: tiki-check
.node_dependencies_cache:
  cache:
    key:
      files:
      - package-lock.json
    paths:
    - .npm
    policy: pull
  image:
    name: ${DEPENDENCY_PROXY_PREFIX}${NODE_IMAGE}
.template-tiki-schema-upgrade:
  after_script: &id002
  - echo "SHOW CREATE DATABASE tikiold" | mysql -u root --password=$MYSQL_ROOT_PASSWORD
    -h mysql
  - echo "SHOW CREATE DATABASE tikinew" | mysql -u root --password=$MYSQL_ROOT_PASSWORD
    -h mysql
  - mysqldump --column-statistics=0  --default-character-set=utf8mb4 -u root --password=$MYSQL_ROOT_PASSWORD
    -h mysql tikiold > tikiold.sql
  - mysqldump --column-statistics=0  --default-character-set=utf8mb4 -u root --password=$MYSQL_ROOT_PASSWORD
    -h mysql tikinew > tikinew.sql
  artifacts: &id003
    expire_in: 2 days
    paths:
    - tikiold.sql
    - tikinew.sql
    when: always
  image: ${DEPENDENCY_PROXY_PREFIX}${BASE_QA_IMAGE}
  needs: &id004
  - composer
  - composer-dbdiff
  script: &id005
  - 'mysql -u root --password=$MYSQL_ROOT_PASSWORD -h mysql --skip-column-names -B
    -e "SELECT CONCAT(''Version: '', VERSION(), CHAR(13), ''sql_mode: '', @@GLOBAL.sql_mode);SET
    GLOBAL log_bin_trust_function_creators = 1;"'
  - echo "GRANT ALL ON tikiold.* TO '${MYSQL_USER}';" | mysql -u root --password=$MYSQL_ROOT_PASSWORD
    -h mysql
  - echo "GRANT ALL ON tikinew.* TO '${MYSQL_USER}';" | mysql -u root --password=$MYSQL_ROOT_PASSWORD
    -h mysql
  - '[ ! -d doc/devtools/dbdiff/cache ] && mkdir doc/devtools/dbdiff/cache'
  - '[ ! -f doc/devtools/dbdiff/cache/$DBFILE ] && curl -sS https://gitlab.com/tikiwiki/tikiwiki-ci-databases/raw/master/$DBFILE.gz
    -o doc/devtools/dbdiff/cache/$DBFILE.gz && gzip -d doc/devtools/dbdiff/cache/$DBFILE.gz'
  - php -d display_errors=On doc/devtools/check_schema_upgrade.php -m $DBVER -e $ENGINE
    --db1=$MYSQL_USER:$MYSQL_PASSWORD@mysql:tikiold --db2=$MYSQL_USER:$MYSQL_PASSWORD@mysql:tikinew
  services: &id007
  - alias: mysql,
    command:
    - --character-set-server=utf8mb4
    - --collation-server=utf8mb4_unicode_ci
    name: ${DEPENDENCY_PROXY_PREFIX}$IMAGE
  stage: tiki-check
.template-tiki-schema-upgrade-mysql8:
  after_script: *id002
  artifacts: *id003
  image: ${DEPENDENCY_PROXY_PREFIX}${BASE_QA_IMAGE}
  needs: *id004
  script: *id005
  services: &id008
  - alias: mysql
    command:
    - --default-authentication-plugin=mysql_native_password
    - --character-set-server=utf8mb4
    - --collation-server=utf8mb4_unicode_ci
    name: ${DEPENDENCY_PROXY_PREFIX}$IMAGE
  stage: tiki-check
.template-unit-tests:
  artifacts:
    expire_in: 2 days
    paths:
    - report.xml
    reports:
      junit: report.xml
    when: always
  image: ${DEPENDENCY_PROXY_PREFIX}tikiwiki/tikiwiki-ci:${PHP_VERSION}-qa
  needs:
  - composer
  script:
  - 'echo -n "PHP Version: " && php -v | grep "^PHP"'
  - 'echo -n "MySQL/MariaDB Version: " && mysql -u root --password=$MYSQL_ROOT_PASSWORD
    -h mysql --skip-column-names -B -e "SELECT VERSION()" 2>/dev/null'
  - 'echo -n "ElasticSearch Version: " && curl -sS -XGET ''http://elasticsearch:9200''
    | grep ''"number"'' | sed ''s/.*:.*"\(.*\)".*/\1/'''
  - 'echo -n "Manticore Version: " && mysql -h manticore -P 9306 -e "status" | grep
    "Server version:" | sed "s/^[^:]*:[[:space:]]*//"'
  - echo '<?php $host_tiki = "mysql"; $user_tiki = "tikiuser"; $pass_tiki = "tikipass";
    $dbs_tiki = "tikitest"; $client_charset = "utf8mb4"; ' > lib/test/local.php
  - php -d display_errors=On vendor_bundled/vendor/phpunit/phpunit/phpunit --colors=always
    --log-junit report.xml --display-deprecations --display-notices --display-warnings
  services:
  - alias: mysql
    command:
    - --default-authentication-plugin=mysql_native_password
    - --explicit-defaults-for-timestamp=off
    name: ${DEPENDENCY_PROXY_PREFIX}${DB_IMAGE}
  - alias: elasticsearch
    name: ${DEPENDENCY_PROXY_PREFIX}elasticsearch:5
  - alias: manticore
    name: ${DEPENDENCY_PROXY_PREFIX}manticoresearch/manticore:${MANTICORE_NEWEST_SUPPORTED}
  stage: unit-tests
  variables:
    EXTRA: 1
    MCL: 1
.vendor-security-check:
  allow_failure: false
  image: ${DEPENDENCY_PROXY_PREFIX}${BASE_QA_IMAGE}
  needs:
  - composer
  only:
    refs:
    - schedules
    variables:
    - $SCHEDULER == "vendor_check"
  script:
  - composer -V | grep "version 2" || composer self-update --2
  - cp composer.json.dist composer.json
  - composer require jerome-breton/casperjs-installer:dev-master --no-progress
  - composer require enygma/expose:^3.0 --no-progress
  - composer require fakerphp/faker dev-master --no-progress
  - composer require google/apiclient ^2.2.2 --no-progress
  - composer require mpdf/mpdf ^8.0.0 --no-progress
  - composer require xorti/mxgraph-editor ^3.9.12.2 --no-progress
  - composer require tikiwiki/diagram ^10 --no-progress
  - composer require thiagoalessio/tesseract_ocr ^2.7.0 --no-progress
  - composer require mathjax/mathjax ^2.7 --no-progress
  - composer require tikiwiki/media-alchemyst ^4.2 --no-progress
  - composer require npm-asset/pdfjs-dist ~2.0.487 --no-progress
  - composer require bower-asset/wodo.texteditor ^0.5.9 --no-progress
  - composer require j0k3r/php-readability ^1.1.10 --no-progress
  stage: vendors-security
check-alphabetical-list:
