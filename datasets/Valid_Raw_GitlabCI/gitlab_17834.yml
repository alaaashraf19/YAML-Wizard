sql-engine-conversion:
  after_script:
  - echo "SHOW CREATE DATABASE tikiold" | mysql -u root --password=$MYSQL_ROOT_PASSWORD
    -h mysql
  - echo "SHOW CREATE DATABASE tikinew" | mysql -u root --password=$MYSQL_ROOT_PASSWORD
    -h mysql
  - mysqldump --column-statistics=0 -u root --password=$MYSQL_ROOT_PASSWORD -h mysql
    tikiold > tikiold.sql
  - mysqldump --column-statistics=0 -u root --password=$MYSQL_ROOT_PASSWORD -h mysql
    tikinew > tikinew.sql
  artifacts:
    expire_in: 2 days
    paths:
    - tikiold.sql
    - tikinew.sql
    when: always
  image: ${DEPENDENCY_PROXY_PREFIX}${BASE_QA_IMAGE}
  needs:
  - composer
  - composer-dbdiff
  script:
  - 'mysql -u root --password=$MYSQL_ROOT_PASSWORD -h mysql --skip-column-names -B
    -e "SELECT CONCAT(''Version: '', VERSION(), CHAR(13), ''sql_mode: '', @@GLOBAL.sql_mode)"'
  - echo "GRANT ALL ON tikiold.* TO '${MYSQL_USER}';" | mysql -u root --password=$MYSQL_ROOT_PASSWORD
    -h mysql
  - echo "GRANT ALL ON tikinew.* TO '${MYSQL_USER}';" | mysql -u root --password=$MYSQL_ROOT_PASSWORD
    -h mysql
  - php -d display_errors=On doc/devtools/check_sql_engine_conversion.php --db1=$MYSQL_USER:$MYSQL_PASSWORD@mysql:tikiold
    --db2=$MYSQL_USER:$MYSQL_PASSWORD@mysql:tikinew
