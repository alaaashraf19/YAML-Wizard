.default_test:
  image: golang:latest
  stage: test
default:
  image: golang:latest
lint:
  script:
  - wget -O- -nv https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh
    | sh -s v1.23.8
  - apt-get update
  - apt-get -y install python3-pip
  - pip3 install codespell
  - go get -d ./...
  - ./bin/golangci-lint run -c .golangci.yml ./...
  - make markdown-spellcheck
  - make test
  stage: lint
stages:
- lint
- test
tests:
  image: golang:latest
  script:
  - go get -d ./...
  - make test-long pkgs="./" run=.
  stage: test
