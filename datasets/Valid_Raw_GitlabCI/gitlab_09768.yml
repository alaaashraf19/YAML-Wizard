before_script:
- npm install --silent
build:
  script:
  - echo "Building the App"
  - npm run build
  stage: build
cache:
  paths:
  - node_modules/
deploy:
  artifacts:
    paths:
    - public
  before_script:
  - apt-get -qq update
  image: ruby:latest
  only:
  - deploy
  script:
  - apt-get install -yqq ruby ruby-dev --silent
  - gem install dpl
  - dpl --provider=heroku --app=$HEROKU_APP_NAME --api-key=$HEROKU_API_KEY
  stage: deploy
image: node:latest
lint:
  script:
  - echo "Running Linter"
  - npm run lint
  stage: lint
stages:
- lint
- test
- build
- deploy
test:
  script:
  - echo "Running Tests"
  - npm test
  stage: test
