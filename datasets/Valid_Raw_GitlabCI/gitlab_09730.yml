before_script:
- apt-get update
- apt-get -y install graphviz
build:epub:
  allow_failure: true
  artifacts:
    paths:
    - build/docs/asciidocEpub
  only:
  - master
  script:
  - ./gradlew -PsiteHost=https://groovy-lang.gitlab.io asciidoctorEpub
  stage: build
build:html:
  artifacts:
    paths:
    - build/jbake
  only:
  - master
  script:
  - ./gradlew -PsiteHost=https://groovy-lang.gitlab.io bake
  stage: build
build:pdf:
  allow_failure: true
  artifacts:
    paths:
    - build/docs/asciidocPdf
  only:
  - master
  script:
  - ./gradlew -PsiteHost=https://groovy-lang.gitlab.io asciidoctorPdf
  stage: build
image: openjdk:8-jdk
pages:
  artifacts:
    paths:
    - public
  dependencies:
  - build:html
  - build:pdf
  - build:epub
  only:
  - master
  script:
  - mkdir public
  - echo html && [ -d "build/jbake" ] && cp -R build/jbake/* public
  - echo epub && [ -d "build/docs/asciidocPdf" ] && cp -R build/docs/asciidocPdf/*
    public
  - echo pdf  && [ -d "build/docs/asciidocPdf" ] && cp -R build/docs/asciidocPdf/*
    public
  stage: deploy
  when: manual
