  \ \"systemctl $(which systemctl)\"\n  echo \"initctl $(which initctl)\"\n\n}\n\n\
  \ function setup_docker() {\n  if ! docker info &>/dev/null; then\n    if [ -z \"\
  $DOCKER_HOST\" -a \"$KUBERNETES_PORT\" ]; then\n      export DOCKER_HOST='tcp://localhost:2375'\n\
