  }\n\n# NANABOX_APP_NAME\n# NANOBOX_USERNAME\n# NANOBOX_PASSWORD\nfunction install_nanobox()\
  \ {\n  # wget https://s3.amazonaws.com/tools.nanobox.io/nanobox/v2/linux/amd64/nanobox\n\
