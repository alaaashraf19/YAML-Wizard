  \n  echo \"Nanobox is ready to go!\"\n}\n\nfunction deploy() {\n  set -x\n  set\
  \ -e\n  nanobox deploy  --debug --trace --verbose || true\n  cat ~/.nanobox/nanobox.log\n\
  \  exit 1\n}\n"
image: alpine:latest
production:
  environment:
    name: production
    url: https://aeonvera.com
  image: docker:git
  script:
  - ensure_system_dependencies_are_installed
  - print_system_info
  - setup_docker
  - install_nanobox
  - deploy
  services:
  - docker:dind
  stage: production
  variables:
    DOCKER_DRIVER: overlay2
stages:
- build
- test
- production
variables:
  POSTGRES_DB: $CI_ENVIRONMENT_SLUG
  POSTGRES_ENABLED: 'true'
  POSTGRES_PASSWORD: testing-password
  POSTGRES_USER: user
