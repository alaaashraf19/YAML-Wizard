check:
  before_script:
  - npm install npm@5.2.0
  - node_modules/.bin/npm install eslint@4.7.0
  - node --version
  - node_modules/.bin/npm --version
  cache:
    paths:
    - node_modules
    untracked: true
  except:
  - tags
  image: node:7.10.1
  script:
  - node_modules/.bin/eslint test/**/*.js
  - node_modules/.bin/eslint src/**/*.js
  stage: check-style
  variables:
    NODE_ENV: development
coverage:
  artifacts:
    paths:
    - coverage
    untracked: true
  before_script:
  - npm install npm@5.2.0
  - node_modules/.bin/npm install
  - node --version
  - node_modules/.bin/npm --version
  cache:
    paths:
    - node_modules
    untracked: true
  except:
  - tags
  image: node:7.10.1
  script:
  - node_modules/.bin/npm test
  stage: test-coverage
  variables:
    NODE_ENV: test
stages:
- check-style
- test-code
- test-coverage
test:
  before_script:
  - npm install npm@5.2.0
  - node_modules/.bin/npm install
  - node --version
  - node_modules/.bin/npm --version
  cache:
    paths:
    - node_modules
    untracked: true
  except:
  - tags
  image: node:7.10.1
  script:
  - node_modules/.bin/gulp test
  stage: test-code
  variables:
    NODE_ENV: test
