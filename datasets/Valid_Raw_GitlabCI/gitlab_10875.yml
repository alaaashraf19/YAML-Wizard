buildwithsonarqube:
  artifacts:
    paths:
    - target/*.jar
  only:
  - master
  script:
  - mvn package sonar:sonar -Dsonar.host.url=https://sonar.yourdomain.tld/
  stage: build
cache:
  paths:
  - .m2/repository/
  - target/
codeclimate:
  artifacts:
    paths:
    - codeclimate.json
    - codeclimate.html
  image: docker:latest
  script:
  - docker pull codeclimate/codeclimate
  - docker run --env CODECLIMATE_CODE="$PWD" --volume "$PWD":/code --volume /var/run/docker.sock:/var/run/docker.sock
    --volume /tmp/cc:/tmp/cc codeclimate/codeclimate init
  - docker run --env CODECLIMATE_CODE="$PWD" --volume "$PWD":/code --volume /var/run/docker.sock:/var/run/docker.sock
    --volume /tmp/cc:/tmp/cc codeclimate/codeclimate analyze -f json src/ > codeclimate.json
  - docker run --env CODECLIMATE_CODE="$PWD" --volume "$PWD":/code --volume /var/run/docker.sock:/var/run/docker.sock
    --volume /tmp/cc:/tmp/cc codeclimate/codeclimate analyze -f html src/ > codeclimate.html
  services:
  - docker:dind
  stage: test
  variables:
    DOCKER_DRIVER: overlay
deploy:
  only:
  - master
  script:
  - curl -u "$PACKAGECLOUD_TOKEN:" -X DELETE https://packagecloud.io/api/v1/repos/i835864/release/java/maven2/com.example.dep/demo-dep-1.0.jar
  - mvn $MAVEN_CLI_OPTS deploy
  stage: deploy
doc:
  artifacts:
    paths:
    - target/site/javadoc
  script:
  - javadoc -d target/site/javadoc -sourcepath src/main/java com.example.dep
  stage: doc
image: maven:latest
pages:
  artifacts:
    paths:
    - public
  image: alpine:latest
  only:
  - master
  script:
  - cp -r target/site/jacoco-ut pages/codecoverage
  - mkdir pages/codequality && cp codeclimate.html pages/codequality/index.html
  - cp -r target/site/javadoc pages/javadoc
  - mv pages public
  stage: deploy
performance:
  artifacts:
    paths:
    - performance.json
  image: docker:git
  script:
  - export CI_ENVIRONMENT_URL=$(cat environment_url.txt)
  - export DOCKER_HOST=tcp://localhost:2375
  - mkdir gitlab-exporter
  - wget -O ./gitlab-exporter/index.js https://gitlab.com/gitlab-org/gl-performance/raw/master/index.js
  - mkdir sitespeed-results
  - docker run --shm-size=1g --rm -v "$(pwd)":/sitespeed.io sitespeedio/sitespeed.io
    --plugins.add ./gitlab-exporter --outputFolder sitespeed-results $CI_ENVIRONMENT_URL
  - ls -l
  - ls -lR sitespeed-results
  - mv sitespeed-results/data/performance.json performance.json
  services:
  - docker:dind
  stage: performance
production:
  artifacts:
    paths:
    - environment_url.txt
  environment:
    name: production
    url: http://$CI_PROJECT_NAME.$KUBE_DOMAIN
  only:
  - master
  script:
  - command deploy
  - echo $CI_ENVIRONMENT_URL > environment_url.txt
  stage: production
  when: manual
review:
  artifacts:
    paths:
    - environment_url.txt
  environment:
    name: review/$CI_COMMIT_REF_NAME
    on_stop: stop_review
    url: http://$CI_PROJECT_NAME-$CI_ENVIRONMENT_SLUG.$KUBE_DOMAIN
  except:
  - master
  only:
  - branches
  script:
  - command deploy
  - echo $CI_ENVIRONMENT_URL > environment_url.txt
  stage: review
stages:
- build
- test
- performance
- doc
- deploy
- trigger
staging:
  artifacts:
    paths:
    - environment_url.txt
  environment:
    name: staging
    url: http://$CI_PROJECT_NAME-staging.$KUBE_DOMAIN
  only:
  - master
  script:
  - command deploy
  - echo $CI_ENVIRONMENT_URL > environment_url.txt
  stage: staging
stop_review:
  allow_failure: true
  environment:
    action: stop
    name: review/$CI_COMMIT_REF_NAME
  except:
  - master
  only:
  - branches
  script:
  - command destroy
  stage: cleanup
  variables:
    GIT_STRATEGY: none
  when: manual
test:
  artifacts:
    paths:
    - target/site/jacoco-ut
  script:
  - mvn $MAVEN_CLI_OPTS jacoco:prepare-agent test
  - echo -n "Code coverage is "; grep -m1 -Po '(?<=<td class="ctr2">).*?(?=</td>)'
    target/site/jacoco-ut/index.html | head -n1
  stage: test
trigger:
  image: alpine:latest
  only:
  - master
  script:
  - apk update
  - apk add curl
  - curl --request POST --form "token=$CI_JOB_TOKEN" --form ref=master https://gitlab.com/api/v4/projects/3647448/trigger/pipeline
  stage: trigger
variables:
  MAVEN_CLI_OPTS: -s .m2/settings.xml --batch-mode
  MAVEN_OPTS: -Dmaven.repo.local=.m2/repository
