ci:images-list:
  artifacts:
    expire_in: 2 week
    paths:
    - ci_images_list.txt
  image:
    entrypoint:
    - ''
    name: mikefarah/yq:4.6.3
  script: "for file in $(find . -type f -name '*.yml' | grep -v \"/test/\"); do\n\
    \  # images in 'image' field\n  cat ${file} | tr -d ' ' | { grep '^image:' ||\
    \ true; } | sed 's/:/@/' | cut -d '@' -f 2 >> ${IMAGES_LIST_FILE}\n  echo $file\n\
    \  # images in 'image.name' field\n  yq e '.[].image.name as $image | $image'\
    \ ${file} | { grep -v null || true; }  >> ${IMAGES_LIST_FILE}\ndone\ncat ${IMAGES_LIST_FILE}\
    \ | sort -u | { grep -Ev \"^$\" || true; } >> ci_images_list.txt\necho \"List\
    \ of all images used in the CI templates :\" && cat ci_images_list.txt\n"
  stage: info
  variables:
    IMAGES_LIST_FILE: found_images.txt
