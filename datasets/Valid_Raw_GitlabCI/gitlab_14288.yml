before_script:
- gem install bundler
- bundle install
image: ruby:latest
pages:
  artifacts:
    paths:
    - public
  rules:
  - if: $CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH
  script:
  - bundle exec jekyll build -d public
  stage: deploy
test:
  artifacts:
    paths:
    - test
  rules:
  - if: $CI_COMMIT_REF_NAME != $CI_DEFAULT_BRANCH
  script:
  - bundle exec jekyll build -d test
  stage: test
variables:
  JEKYLL_ENV: production
  LC_ALL: C.UTF-8
