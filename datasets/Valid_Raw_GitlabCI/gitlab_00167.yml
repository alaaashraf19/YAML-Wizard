before_script:
- npm install
bundle:chromium:
  artifacts:
    paths:
    - ./*.zip
  script:
  - npm run build:chromium
  - npm run bundle
  stage: bundle
bundle:firefox:
  artifacts:
    paths:
    - ./*.xpi
  only:
  - tags
  script:
  - npm run build:firefox
  - node_modules/web-ext/bin/web-ext sign -a . -s addon --api-key=${MOZILLA_USER}
    --api-secret=${MOZILLA_KEY} --id=${MOZILLA_ID}
  stage: bundle
cache:
  key: $CI_COMMIT_REF_SLUG
  paths:
  - node_modules/
image: node:8
stages:
- test
- bundle
test:lint:
  script:
  - npm run lint
  stage: test
test:unit:
  image: adimit/docker-node-chromium
  script:
  - npm run test
  stage: test
