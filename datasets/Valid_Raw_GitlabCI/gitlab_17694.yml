default:
  interruptible: true
publish:docker:
  image: docker:latest
  only:
  - master
  script:
  - docker login -u "${CI_REGISTRY_USER}" -p "${CI_REGISTRY_PASSWORD}" "${CI_REGISTRY}"
  - cd app && docker build . -t ${CI_REGISTRY_IMAGE}:latest
  services:
  - docker:dind
  tags:
  - docker
  variables:
    DOCKER_DRIVER: overlay2
