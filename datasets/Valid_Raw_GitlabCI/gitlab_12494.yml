before_script:
- apt-get -qq update
- apt-get install -y jq
build_and_test_contracts:
  artifacts:
    expire_in: 1 month
    paths:
    - build/
  script:
  - npm install
  - npm run compile
  - npm run automate-test
  - for file in build/contracts/*.json; do jq '.abi' < "$file" > "${file%.json}.abi";
    done
  - for file in build/contracts/*.json; do jq -r '.bytecode' < "$file" > "${file%.json}.bin";
    done
  - mkdir build/flattened && for solfile in contracts/*.sol; do ./node_modules/.bin/truffle-flattener
    $solfile > build/flattened/${solfile##*/}; done
cache:
  paths:
  - node_modules/
image: node:9.3.0
