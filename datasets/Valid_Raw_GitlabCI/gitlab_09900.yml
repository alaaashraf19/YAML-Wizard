before_script:
- mkdir -p $GOPATH/src/$(dirname $REPO_NAME)
- ln -svf $CI_PROJECT_DIR $GOPATH/src/$REPO_NAME
- cd $GOPATH/src/$REPO_NAME
compile:
  artifacts:
    paths:
    - handler
  script:
  - go build -race -ldflags "-extldflags '-static'" -o $CI_PROJECT_DIR/handler
  stage: build
coverage:
  script:
  - go test -cover
  stage: test
depInstall:
  artifacts:
    untracked: true
  script:
  - dep ensure
  stage: install
deployStaging:
  dependencies:
  - compile
  script:
  - zip $CI_PROJECT_DIR/test0.zip $CI_PROJECT_DIR/handler
  - aws s3 cp $CI_PROJECT_DIR/test0.zip s3://$BUCKET_NAME/test0.zip
  stage: deploy
format:
  dependencies:
  - depInstall
  script:
  - go fmt $(go list ./... | grep -v /vendor/)
  - go vet $(go list ./... | grep -v /vendor/)
  - go test -race $(go list ./... | grep -v /vendor/)
  stage: test
image: lambci/lambda:build-go1.x
stages:
- install
- test
- build
- deploy
unittesting:
  dependencies:
  - depInstall
  script:
  - go test
  stage: test
variables:
  BUCKET_NAME: twiliodemo.operata
  REPO_NAME: gitlab.com/highway900/operata_test
