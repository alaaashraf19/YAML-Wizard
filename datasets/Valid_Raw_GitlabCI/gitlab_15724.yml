before_script:
- npm install -g vsce
build:
  artifacts:
    name: KickAssemblerExtension-$CI_COMMIT_REF_NAME
    paths:
    - ./*.vsix
    - ./*.md
    - ./License.txt
  only:
  - tags
  script:
  - export VER=`node -e "console.log(require('./package.json').version);"`
  - echo $VER
  - npm install --unsafe-perm
  - npm run compile
  - cd client
  - vsce package
  - mv *.vsix ..
  variables:
    TEST: $VER
cache:
  paths:
  - client/node_modules/
  - server/node_modules/
image: node:7.9.0
