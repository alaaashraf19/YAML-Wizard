.bookdown:
  artifacts:
    paths:
    - public
  script:
  - Rscript -e "bookdown::render_book('index.Rmd', 'all', output_dir = 'public')"
  stage: deploy
image: rocker/verse:4.0.2
mr-review:
  after_script:
  - echo "ENVIRONMENT_URL=https://$CI_PROJECT_NAMESPACE.$CI_PAGES_DOMAIN/-/$CI_PROJECT_NAME/-/jobs/$CI_JOB_ID/artifacts/public/index.html"
    >> deploy.env
  artifacts:
    reports:
      dotenv: deploy.env
  environment:
    name: review/$CI_COMMIT_REF_NAME
    url: $ENVIRONMENT_URL
  extends: .bookdown
  only:
  - merge_requests
pages:
  extends: .bookdown
  only:
  - master
