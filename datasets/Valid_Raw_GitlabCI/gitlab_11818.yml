before_script:
- VERSION=$([ ! -z $CI_COMMIT_TAG ] && echo ${CI_COMMIT_TAG} || echo ${CI_COMMIT_REF_NAME})
- echo VERSION=$VERSION
cache:
  key: $CI_BUILD_REF_NAME
  paths:
  - node_modules/
  untracked: true
codestyle:
  script:
  - npm ci
  - npm run lint
  stage: verify
image: node:14
node:10:
  coverage: /^All files[^|]*\|[^|]*\s+([\d\.]+)/
  image: node:10
  only:
  - /^v\d+\.\d+\.\d+(-rc.\d+|)$/
  script:
  - npm i
  - npm run unit
  stage: test
node:12:
  coverage: /^All files[^|]*\|[^|]*\s+([\d\.]+)/
  image: node:12
  only:
  - /^v\d+\.\d+\.\d+(-rc.\d+|)$/
  script:
  - npm i
  - npm run unit
  stage: test
node:14:
  coverage: /^All files[^|]*\|[^|]*\s+([\d\.]+)/
  image: node:14
  script:
  - npm ci
  - npm run unit
  stage: test
npm:
  environment:
    name: npm
    url: https://www.npmjs.com/package/${CI_PROJECT_NAME}
  only:
  - /^v\d+\.\d+\.\d+(-rc.\d+|)$/
  script:
  - VERSION_TAG=$([[ $CI_COMMIT_TAG == *"-rc"* ]] && echo "next" || echo "latest")
  - echo '//registry.npmjs.org/:_authToken=${NPM_TOKEN}' > .npmrc
  - npm ci
  - npm run prepare
  - npm publish --tag $VERSION_TAG
  stage: publish
  when: manual
stages:
- prepare
- verify
- test
- publish
