deterministic_test:
  script:
  - cd tests/deterministic/memcopy
  - go build
  - ./memcopy
  - cd ../../../
  - cd tests/deterministic/empty_kernel
  - go build
  - ./empty_kernel
  stage: acceptance_test
four_discrete_gpu_test:
  script:
  - cd tests/acceptance
  - go build
  - ./acceptance -num-gpu=4 -no-unified-gpu -no-unified-memory
  stage: acceptance_test
  tags:
  - multi_core
four_unified_gpu_test:
  script:
  - cd tests/acceptance
  - go build
  - ./acceptance -num-gpu=4 -only-unified-gpu -no-unified-memory
  stage: acceptance_test
  tags:
  - multi_core
go_build:
  script:
  - go build ./...
  stage: build
image: golang:latest
lint:
  script:
  - curl -sfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh|
    sh -s -- -b $(go env GOPATH)/bin
  - go build ./...
  - golangci-lint run ./...
  stage: build
single_gpu_test:
  script:
  - cd tests/acceptance
  - go build
  - ./acceptance -num-gpu=1
  stage: acceptance_test
  tags:
  - multi_core
stages:
- build
- test
- acceptance_test
two_discrete_gpu_test:
  script:
  - cd tests/acceptance
  - go build
  - ./acceptance -num-gpu=2 -no-unified-gpu -no-unified-memory
  stage: acceptance_test
  tags:
  - multi_core
two_unified_gpu_test:
  script:
  - cd tests/acceptance
  - go build
  - ./acceptance -num-gpu=2 -only-unified-gpu -no-unified-memory
  stage: acceptance_test
  tags:
  - multi_core
unit_test:
  script:
  - go install github.com/onsi/ginkgo/v2/ginkgo@v2.4.0
  - ginkgo -r --randomize-all --randomize-suites --fail-on-pending --cover --trace
    --progress
  - go test -coverprofile=cover.out ./...
  - go tool cover -func=cover.out > coverage.out
  - tail coverage.out
  stage: test
