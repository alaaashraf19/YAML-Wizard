  - merge_requests
  script:
  - ERROR=0 codespell --ignore-words-list=keypair,sorce,ned,nd,ue,pendin || ERROR=1;
    ./.gitlab-ci/clang-format-check.sh || ERROR=1; ./.gitlab-ci/git-check-signoff-trailer.sh
    ${CI_MERGE_REQUEST_DIFF_BASE_SHA} || ERROR=1; ./.gitlab-ci/shellcheck.sh || ERROR=1;
    exit $ERROR
  stage: review
  tags:
  - saas-linux-small-amd64
  variables:
    GIT_DEPTH: 100
