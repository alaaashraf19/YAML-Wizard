coverity:
  artifacts:
    expire_in: 1 week
    paths:
    - obj/cov-int/*.txt
    when: on_failure
  image: $CI_REGISTRY/$BUILD_IMAGES_PROJECT:$CENTOS9_BUILD
  only:
    refs:
    - master
    - schedules
    variables:
    - $COVERITY_SCAN_TOKEN != null
    - $COVERITY_SCAN_PROJECT_NAME != null
    - $COVERITY_SCAN_EMAIL != null
  script:
  - mkdir obj && cd obj
  - wget https://scan.coverity.com/download/linux64 --post-data "token=$COVERITY_SCAN_TOKEN&project=$COVERITY_SCAN_PROJECT_NAME"
    -O /tmp/coverity_tool.tgz
  - tar xf /tmp/coverity_tool.tgz
  - cmake -DCMAKE_BUILD_TYPE=Debug $CMAKE_BUILD_OPTIONS $CMAKE_TEST_OPTIONS ..
  - cov-analysis-linux64-*/bin/cov-build --dir cov-int make -j$(nproc)
  - tar czf cov-int.tar.gz cov-int
  - curl --form token=$COVERITY_SCAN_TOKEN --form email=$COVERITY_SCAN_EMAIL --form
    file=@cov-int.tar.gz --form version="`git describe --tags`" --form description="CI
    build" https://scan.coverity.com/builds?project=$COVERITY_SCAN_PROJECT_NAME
  stage: analysis
  tags:
  - saas-linux-small-amd64
fedora/abidiff:
  before_script:
  - uname -a
  - cat /etc/os-release
  - mount
  - df -h
  - cat /proc/swaps
  - free -h
  - "# for merge requests\nif [[ -n \"$CI_MERGE_REQUEST_DIFF_BASE_SHA\" ]]; then\n\
    \    export CI_COMMIT_BEFORE_SHA=\"$CI_MERGE_REQUEST_DIFF_BASE_SHA\"\nfi\n# for\
    \ branches run\nif [[ -z \"$CI_COMMIT_BEFORE_SHA\" ]]; then\n    export CI_COMMIT_BEFORE_SHA=$(git\
    \ rev-parse \"${CI_COMMIT_SHA}~20\")\nfi\n\n# Check if the commit exists in this\
    \ branch\n# This is not the case for a force push\ngit branch --contains $CI_COMMIT_BEFORE_SHA\
    \ 2>/dev/null || export CI_COMMIT_BEFORE_SHA=$(git rev-parse \"${CI_COMMIT_SHA}~20\"\
    )\n"
  - mkdir -p obj-${CI_COMMIT_BEFORE_SHA}
  - mkdir -p obj-${CI_COMMIT_SHA}
  - export INSTALL_DIR1=$(pwd)/install/${CI_COMMIT_BEFORE_SHA}
  - export INSTALL_DIR2=$(pwd)/install/${CI_COMMIT_SHA}
  except:
  - tags
  image: $CI_REGISTRY/$BUILD_IMAGES_PROJECT:$FEDORA_BUILD
  only:
  - merge_requests
  script:
  - git checkout ${CI_COMMIT_BEFORE_SHA}
  - pushd obj-${CI_COMMIT_BEFORE_SHA}
  - cmake ${CMAKE_OPTIONS} -DCMAKE_INSTALL_PREFIX=${INSTALL_DIR1} .. && make -j$(nproc)
    && make -j$(nproc) install
  - popd
  - ls -l ${INSTALL_DIR1}/lib*/
  - git checkout ${CI_COMMIT_SHA}
  - pushd obj-${CI_COMMIT_SHA}
  - cmake ${CMAKE_OPTIONS} -DCMAKE_INSTALL_PREFIX=${INSTALL_DIR2} .. && make -j$(nproc)
    && make -j$(nproc) install
  - popd
  - ls -l ${INSTALL_DIR2}/lib*/
  - ./.gitlab-ci/checkabi.sh ${INSTALL_DIR1} ${INSTALL_DIR2}
  stage: analysis
  tags:
  - saas-linux-small-amd64
  variables:
    CMAKE_OPTIONS: $CMAKE_DEFAULT_DEBUG_OPTIONS $CMAKE_BUILD_OPTIONS
    GIT_DEPTH: '100'
