.build:
  artifacts:
    expire_in: 1 week
    paths:
    - obj/
    when: on_failure
  before_script: &id001
  - uname -a
  - cat /etc/os-release
  - mount
  - df -h
  - cat /proc/swaps
  - free -h
  - mkdir -p obj && cd obj
  except:
  - tags
  extends: .build_options
  only:
  - merge_requests
  - branches
  script:
  - cmake $CMAKE_OPTIONS $CMAKE_ADDITIONAL_OPTIONS .. && make -j$(nproc) && make -j$(nproc)
    install
  stage: build
  tags:
  - saas-linux-small-amd64
.build_options:
  variables:
    CMAKE_BUILD_OPTIONS: -DWITH_BLOWFISH_CIPHER=ON -DWITH_SFTP=ON -DWITH_SERVER=ON
      -DWITH_ZLIB=ON -DWITH_PCAP=ON -DWITH_FIDO2=ON -DWITH_DEBUG_CRYPTO=ON -DWITH_DEBUG_PACKET=ON
      -DWITH_DEBUG_CALLTRACE=ON
    CMAKE_DEFAULT_DEBUG_OPTIONS: -DCMAKE_C_FLAGS='-O0 -g -ggdb' -DPICKY_DEVELOPER=ON
    CMAKE_DEFAULT_OPTIONS: -DCMAKE_BUILD_TYPE=RelWithDebInfo -DPICKY_DEVELOPER=ON
    CMAKE_OPTIONS: $CMAKE_DEFAULT_OPTIONS $CMAKE_BUILD_OPTIONS $CMAKE_TEST_OPTIONS
    CMAKE_TEST_OPTIONS: -DUNIT_TESTING=ON -DCLIENT_TESTING=ON -DSERVER_TESTING=ON
      -DGSSAPI_TESTING=ON -DWITH_BENCHMARKS=ON -DFUZZ_TESTING=ON
.centos:
  extends: .tests
  variables:
    OPENSSL_ENABLE_SHA1_SIGNATURES: 1
.centos10:
  extends: .centos
  image: $CI_REGISTRY/$BUILD_IMAGES_PROJECT:$CENTOS10_BUILD
.centos9:
  extends: .centos
  image: $CI_REGISTRY/$BUILD_IMAGES_PROJECT:$CENTOS9_BUILD
.csbuild:
  artifacts:
    expire_in: 1 week
    paths:
    - obj-csbuild/
    when: on_failure
  before_script:
  - "# for merge requests\nif [[ -n \"$CI_MERGE_REQUEST_DIFF_BASE_SHA\" ]]; then\n\
    \    export CI_COMMIT_BEFORE_SHA=\"$CI_MERGE_REQUEST_DIFF_BASE_SHA\"\nfi\n# for\
    \ branches run\nif [[ -z \"$CI_COMMIT_BEFORE_SHA\" ]]; then\n    export CI_COMMIT_BEFORE_SHA=$(git\
    \ rev-parse \"${CI_COMMIT_SHA}~20\")\nfi\n\n# Check if the commit exists in this\
    \ branch\n# This is not the case for a force push\ngit branch --contains $CI_COMMIT_BEFORE_SHA\
    \ 2>/dev/null || export CI_COMMIT_BEFORE_SHA=$(git rev-parse \"${CI_COMMIT_SHA}~20\"\
    )\n\nexport CI_COMMIT_RANGE=\"$CI_COMMIT_BEFORE_SHA..$CI_COMMIT_SHA\"\n"
  except:
  - tags
  image: $CI_REGISTRY/$BUILD_IMAGES_PROJECT:$FEDORA_BUILD
  only:
  - merge_requests
  script:
  - csbuild --build-dir=obj-csbuild --build-cmd "rm -rf CMakeFiles CMakeCache.txt
    && cmake $CMAKE_OPTIONS $CMAKE_ADDITIONAL_OPTIONS @SRCDIR@ && make clean && make
    -j$(nproc)" --git-commit-range $CI_COMMIT_RANGE --color --print-current --print-fixed
  stage: analysis
  tags:
  - saas-linux-small-amd64
  variables:
    CMAKE_OPTIONS: -DCMAKE_BUILD_TYPE=Debug -DPICKY_DEVELOPER=ON -DUNIT_TESTING=ON
      -DCLIENT_TESTING=ON -DSERVER_TESTING=ON -DFUZZ_TESTING=ON
    CSCPPC_ADD_OPTS: --library=./.gitlab-ci/cmocka.cfg
    GIT_DEPTH: '100'
.fedora:
  extends: .tests
  image: $CI_REGISTRY/$BUILD_IMAGES_PROJECT:$FEDORA_BUILD
.fedora/memory-sanitizer:
  extends: .fedora
  script:
  - cmake -DCMAKE_BUILD_TYPE=MemorySanitizer -DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++
    -DPICKY_DEVELOPER=ON $CMAKE_BUILD_OPTIONS -DUNIT_TESTING=ON -DFUZZ_TESTING=ON
    .. && make -j$(nproc) && ctest --output-on-failure
  stage: analysis
.fips:
  before_script:
  - *id001
  - echo "# userspace fips" > /etc/system-fips
  - update-crypto-policies --show
  - update-crypto-policies --set FIPS
  - update-crypto-policies --show
  extends: .tests
  variables:
    CMAKE_ADDITIONAL_OPTIONS: -DWITH_PKCS11_URI=ON
.macos:
  before_script:
  - echo "MacOS runner started"
  - brew update
  - brew install cmake openssl cmocka doxygen
  - mkdir obj && cd obj
  extends: .build_options
  image: macos-14-xcode-15
  only:
  - branches@libssh/libssh-mirror
  - branches@cryptomilk/libssh-mirror
  - branches@jjelen/libssh-mirror
  tags:
  - saas-macos-medium-m1
.mingw:
  extends: .tests
  script:
  - $WINEBIN $CMAKE_DEFAULT_OPTIONS -DWITH_SFTP=ON -DWITH_SERVER=ON -DWITH_ZLIB=ON
    -DWITH_PCAP=ON -DWITH_FIDO2=ON -DUNIT_TESTING=ON .. && make -j$(nproc) && ctest
    --output-on-failure -E torture_rand
  variables:
    WINEDEBUG: -all
.tests:
  dependencies: []
  extends: .build
  script:
  - cmake $CMAKE_OPTIONS $CMAKE_ADDITIONAL_OPTIONS .. && make -j$(nproc) && ctest
    --output-on-failure
  stage: test
.tumbleweed:
  extends: .tests
  image: $CI_REGISTRY/$BUILD_IMAGES_PROJECT:$TUMBLEWEED_BUILD
.valgrind:
  extends: .fedora
  script:
  - cmake $CMAKE_OPTIONS $CMAKE_ADDITIONAL_OPTIONS .. && make -j$(nproc) && make test_memcheck
  - cat Testing/Temporary/MemoryChecker.*.log | wc -l | grep "^0$"
  stage: analysis
.vs:
  artifacts:
    expire_in: 1 week
    paths:
    - obj/
    when: on_failure
  before_script:
  - If (!(test-path .vcpkg\archives)) { mkdir -p .vcpkg\archives }
  - $env:VCPKG_DEFAULT_BINARY_CACHE="$PWD\.vcpkg\archives"
  - echo $env:VCPKG_DEFAULT_BINARY_CACHE
  - $env:VCPKG_DEFAULT_TRIPLET="$TRIPLET-windows"
  - vcpkg install cmocka
  - vcpkg install openssl
  - vcpkg install zlib
  - vcpkg install libfido2
  - vcpkg integrate install
  - mkdir -p obj; if ($?) {cd obj}; if (! $?) {exit 1}
  - cmake -A $PLATFORM -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake
    -DPICKY_DEVELOPER=ON -DWITH_SFTP=ON -DWITH_SERVER=ON -DWITH_ZLIB=ON -DWITH_PCAP=ON
    -DWITH_FIDO2=ON -DUNIT_TESTING=ON ..
  cache:
    key: vcpkg.${CI_JOB_NAME}
    paths:
    - .vcpkg
  except:
  - tags
  only:
  - merge_requests
  - branches
  script:
  - cmake --build .
  - ctest --output-on-failure
  stage: test
  tags:
  - saas-windows-medium-amd64
  variables:
    ErrorActionPreference: STOP
