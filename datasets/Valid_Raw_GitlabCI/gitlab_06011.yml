cache:
  paths:
  - node_modules/
image: node:latest
pages:
  artifacts:
    paths:
    - public
  cache:
    paths:
    - node_modules/
  only:
  - master
  - pages
  script:
  - mkdir -p public
  - npm ci
  - sed -i 's#/dist/#/rpn3d/dist/#' src/App.vue
  - npm run build
  - cp -r dist public
  - sed 's#/dist#/rpn3d/dist#' index.html >public/index.html
  - cp public/index.html public/404.html
  stage: deploy
