before_script:
- export GRADLE_USER_HOME=`pwd`/.gradle
build:
  artifacts:
    paths:
    - ./build
  script: gradle assemble
  stage: build
cache:
  paths:
  - .gradle/caches
image: gradle:alpine
stages:
- build
- test
test:
  script: gradle check
  stage: test
variables:
  DOCKER_DRIVER: overlay2
  GRADLE_OPTS: -Dorg.gradle.daemon=false
