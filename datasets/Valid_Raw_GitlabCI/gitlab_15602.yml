cache:
  paths:
  - .cache/pip
  - venv/
image: python:latest
include:
- template: Security/SAST.gitlab-ci.yml
job1:
  before_script:
  - apt-get -qq update
  - apt-get install -y gdb rsync
  - python -V
  - pip install virtualenv
  - virtualenv venv
  - source venv/bin/activate
  coverage: /TOTAL.+ ([0-9]{1,3}%)/
  script:
  - pip install pytest pytest-cov pycodestyle
  - python setup.py install
  - mkdir -p ~/.local/bin
  - touch ~/.local/bin/afl-fuzz
  - chmod +x ~/.local/bin/afl-fuzz
  - export PATH=$PATH:~/.local/bin/
  - pycodestyle afl_utils afl-collect afl-cron afl-minimize afl-multicore afl-multikill
    afl-stats afl-sync afl-vcrash
  - coverage run setup.py test
  - coverage report -m
sast:
  stage: test
stages:
- test
variables:
  PIP_CACHE_DIR: $CI_PROJECT_DIR/.cache
