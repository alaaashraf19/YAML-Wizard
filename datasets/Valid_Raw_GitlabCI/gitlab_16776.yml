cache:
  paths:
  - vendor
image: ruby:2.3.3
pages:
  artifacts:
    paths:
    - public
  only:
  - master
  script:
  - apt-get update -yqqq
  - apt-get install -y nodejs
  - bundle install --path vendor
  - bundle exec middleman build
test:
  except:
  - master
  script:
  - apt-get update -yqqq
  - apt-get install -y nodejs
  - bundle install --path vendor
  - bundle exec middleman build
