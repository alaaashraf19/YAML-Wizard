archive:
  artifacts:
    paths:
    - sane-frontends-*.tar.gz
  before_script:
  - apt-get update --quiet
  - apt-get install --quiet --assume-yes libsane-dev libgtk-3-dev libgimp2.0-dev
  image: $REGISTRY_HUB:debian-buster-full
  script:
  - extra=$(git describe --dirty --match '1.*' | sed 's/^[^-]*//'); sed -i '/AC_INIT/s/AC_INIT([^,]*,
    \[[^]]*/&'$extra'/' configure.ac
  - autoreconf -fvi
  - ./configure
  - make dist
  stage: archive
stages:
- archive
variables:
  REGISTRY_HUB: registry.gitlab.com/sane-project/ci-envs
