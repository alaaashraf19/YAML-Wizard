compile:
  artifacts:
    paths:
    - javascript
    - golang
    - python
  except:
  - /^(dev-)?dist-.*$/
  image: registry.gitlab.com/datadrivendiscovery/images/testing:ubuntu-bionic-python36
  script:
  - "set -o errexit\necho \"Compiling\"\nmkdir javascript golang python\ncp -a d3m_automl_rpc\
    \ setup.py python/\nfor fi in *.proto; do\n    echo \"File $fi\"\n    protoc -I\
    \ . -I /protoc3/include ${fi} --go_out=plugins=grpc:golang/ --go_opt=paths=source_relative\
    \ --js_out=import_style=commonjs,binary:javascript/\n    python3 -m grpc_tools.protoc\
    \ -I . -I /protoc3/include --python_out=python/d3m_automl_rpc/ --grpc_python_out=python/d3m_automl_rpc/\
    \ ${fi}\ndone\n(cd python/d3m_automl_rpc; sed -i -E 's/^import.*_pb2/from . \\\
    0/' *.py)\necho \"__version__ = '$(grep -oP '(?<=option \\(protocol_version\\\
    ) = \")[^\"]+(?=\";)' core.proto)'\" >> python/d3m_automl_rpc/__init__.py\ncp\
    \ README.md python/README.md\necho \"Linting\"\nprotoc -I . -I /protoc3/include\
    \ --lint_out=. *.proto\necho \"Installing and testing Python package\"\npip3 --disable-pip-version-check\
    \ install \"git+https://gitlab.com/datadrivendiscovery/d3m.git@devel#egg=d3m\"\
    \npip3 --disable-pip-version-check install python/\npython3 -I ./run_tests.py\n\
    if [ \"${CI_COMMIT_REF_NAME}\" = master -o \"${CI_COMMIT_REF_NAME}\" = devel ];\
    \ then\n  if [ -n \"${GIT_ACCESS_USER}\" -a -n \"${GIT_ACCESS_TOKEN}\" ]; then\n\
    \    echo \"Pushing generated branches\"\n    if [ \"${CI_COMMIT_REF_NAME}\" =\
    \ master ]; then\n      BRANCH_PREFIX=dist-\n    else\n      BRANCH_PREFIX=dev-dist-\n\
    \    fi\n    git clone https://${GIT_ACCESS_USER}:${GIT_ACCESS_TOKEN}@gitlab.com/${CI_PROJECT_PATH}.git\
    \ --reference . generated &>/dev/null\n    cd generated\n    git config --local\
    \ user.email noreply@datadrivendiscovery.org\n    git config --local user.name\
    \ \"D3M CI\"\n    for lang in javascript golang python; do\n      echo \"Language\
    \ $lang\"\n      git checkout -b ${BRANCH_PREFIX}${lang} --track origin/${BRANCH_PREFIX}${lang}\n\
    \      git rm -rf .\n      cp -r ../${lang}/* ./\n      printf \"*.pyc\\n__pycache__\\\
    n*.egg-info\\n/build\\n\" > ./.gitignore\n      git add .\n      if ! git diff\
    \ --cached --quiet ; then\n        git commit -m \"Generated by CI.\" -m \"Source\
    \ commmit: ${CI_COMMIT_SHA}\" -m \"[skip ci]\"\n        git push https://${GIT_ACCESS_USER}:${GIT_ACCESS_TOKEN}@gitlab.com/${CI_PROJECT_PATH}.git\
    \ HEAD:refs/heads/${BRANCH_PREFIX}${lang} &>/dev/null\n      else\n       echo\
    \ \"Nothing changed.\"\n      fi\n    done\n  fi\nfi\n"
  stage: build
  variables:
    GIT_SUBMODULE_STRATEGY: recursive
