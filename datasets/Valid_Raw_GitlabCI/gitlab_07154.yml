build:
  artifacts:
    expire_in: 1h
    paths:
    - target/*.war
  script:
  - ./mvnw -Pprod package
  stage: build
docker:push:
  artifacts:
    expire_in: 1h
  dependencies:
  - build
  image: docker:stable
  only:
  - master
  script:
  - mv target/*.war ./jhipster-registry.war
  - docker login -u _json_key -p "$GCLOUD_KEY" https://gcr.io
  - docker build -t ${DOCKER_IMAGE} .
  - docker push ${DOCKER_IMAGE}
  services:
  - docker:dind
  stage: release
image: jamesdbloom/docker-java8-maven
kubernetes:deploy:
  artifacts:
    expire_in: 1h
  before_script:
  - apt-get update
  - apt-get --assume-yes install gettext
  dependencies:
  - docker:push
  environment:
    name: prod
  image: google/cloud-sdk:latest
  only:
  - master
  script:
  - echo "$GCLOUD_KEY" > key.json
  - gcloud auth activate-service-account --key-file key.json
  - gcloud container clusters get-credentials ${K8S_CLUSTER} --zone ${K8S_ZONE} --project
    ${K8S_PROJECT}
  - cp -rf k8s/* .
  - ./deploy.sh ${APP_NAME} prod ${DOCKER_IMAGE} prod
  stage: deploy
stages:
- build
- release
- deploy
variables:
  APP_NAME: registry
  DOCKER_IMAGE: gcr.io/${K8S_PROJECT}/${APP_NAME}:${CI_COMMIT_SHA}
  K8S_CLUSTER: cluster-1
  K8S_PROJECT: jhipster-playground
  K8S_ZONE: us-central1-a
