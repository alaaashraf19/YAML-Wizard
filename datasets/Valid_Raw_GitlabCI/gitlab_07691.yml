build_accounts:
  artifacts:
    expire_in: 1 month
    paths:
    - stacks/accounts/dist/
  dependencies:
  - prepare
  - prepare_accounts
  script:
  - cd stacks/accounts
  - yarn run build
  stage: build-backend
build_frontend:
  artifacts:
    expire_in: 1 month
    paths:
    - stacks/frontend/dist/
    - stacks/frontend/package.json
    - stacks/frontend/build/
  dependencies:
  - prepare
  - prepare_frontend
  - deploy_terraform
  script:
  - cd stacks/frontend
  - if [[ $CI_COMMIT_REF_NAME == "master" ]]; then export ORCID_BASE_PATH="$ORCID_BASE_PATH_PRODUCTION";
    export ORCID_CLIENT_ID="$ORCID_CLIENT_ID_PRODUCTION"; fi;
  - export API_URL=`cat ../../api_url`
  - export CODE_BRANCH="$CI_COMMIT_REF_SLUG"
  - if [[ $CI_COMMIT_REF_NAME == $BRANCH_IN_MAINTENANCE ]]; then echo 'Building in
    maintenance mode.'; export MAINTENANCE_MODE=true; fi;
  - yarn run build
  stage: build-frontend
build_periodicals:
  artifacts:
    expire_in: 1 month
    paths:
    - stacks/periodicals/dist/
  dependencies:
  - prepare
  - prepare_periodicals
  script:
  - cd stacks/periodicals
  - yarn run build
  stage: build-backend
build_server:
  artifacts:
    expire_in: 1 month
    paths:
    - server/dist/
  dependencies:
  - prepare_server
  script:
  - cd server
  - yarn run build
  stage: build-backend
build_terraform:
  artifacts:
    expire_in: 1 month
    paths:
    - stacks.tf
    - stacks/*.tf
    - stacks/*/*.tf
    - stacks/*/*_lambda_role_policy.json
    - stacks/*/*_lambda_policy.json
  dependencies: null
  script: echo "Dummy job to preserve artifacts for the undeploy job"
  stage: build-backend
dast:
  artifacts:
    paths:
    - gl-dast-report.json
  dependencies: null
  image: owasp/zap2docker-weekly
  script:
  - mkdir /zap/wrk/
  - if [[ $CI_COMMIT_REF_NAME == "master" ]]; then export SITE_URL=https://flockademic.com;
    else export SITE_URL=https://$CI_COMMIT_REF_SLUG.flockademic.com; fi;
  - /zap/zap-baseline.py -J gl-dast-report.json -t $SITE_URL || true
  - cp /zap/wrk/gl-dast-report.json .
  stage: confidence-check
deploy_frontend:
  dependencies:
  - prepare_frontend
  - build_frontend
  environment:
    name: review/$CI_COMMIT_REF_SLUG
    on_stop: stop_frontend
    url: https://$CI_COMMIT_REF_SLUG.flockademic.com
  except:
  - master
  script:
  - cd stacks/frontend
  - yarn run deploy
  - yarn run awaitDeployTasks
  stage: deploy-frontend
deploy_frontend_prod:
  dependencies:
  - prepare_frontend
  - build_frontend
  environment:
    name: review/$CI_COMMIT_REF_SLUG
    url: https://flockademic.com
  only:
  - master
  script:
  - cd stacks/frontend
  - export AWS_ACCESS_KEY_ID="$AWS_ACCESS_KEY_ID_PRODUCTION"
  - export AWS_SECRET_ACCESS_KEY="$AWS_SECRET_ACCESS_KEY_PRODUCTION"
  - yarn run deploy
  - yarn run awaitDeployTasks
  stage: deploy-frontend
deploy_terraform:
  artifacts:
    expire_in: 1 hour
    paths:
    - api_url
  dependencies:
  - build_terraform
  - build_server
  - build_accounts
  - build_periodicals
  environment:
    name: review_api/$CI_COMMIT_REF_SLUG
    on_stop: stop_terraform
    url: https://api.$CI_COMMIT_REF_SLUG.flockademic.com
  image:
    entrypoint:
    - /usr/bin/env
    - PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    name: hashicorp/terraform:0.11.2
  script:
  - if [[ $CI_COMMIT_REF_NAME == "master" ]]; then export TF_VAR_aws_access_key_id=$AWS_ACCESS_KEY_ID_PRODUCTION;
    else export TF_VAR_aws_access_key_id=$AWS_ACCESS_KEY_ID; fi;
  - export TF_VAR_aws_account_id=$AWS_ACCOUNT_ID
  - export TF_VAR_aws_region=$AWS_REGION
  - export TF_VAR_heroku_email=$HEROKU_EMAIL
  - export TF_VAR_heroku_api_key=$HEROKU_API_KEY
  - if [[ $CI_COMMIT_REF_NAME == "master" ]]; then export TF_VAR_aws_secret_access_key=$AWS_SECRET_ACCESS_KEY_PRODUCTION;
    else export TF_VAR_aws_secret_access_key=$AWS_SECRET_ACCESS_KEY; fi;
  - export TF_VAR_jwt_secret=$(echo "$JWT_SECRET$CI_COMMIT_REF_NAME" | sha512sum)
  - export TF_VAR_frontend_url="https://$CI_COMMIT_REF_SLUG.flockademic.com"
  - if [[ $CI_COMMIT_REF_NAME == "master" ]]; then export TF_VAR_orcid_base_path="$ORCID_BASE_PATH_PRODUCTION";
    export TF_VAR_orcid_client_id="$ORCID_CLIENT_ID_PRODUCTION"; export TF_VAR_orcid_client_secret="$ORCID_CLIENT_SECRET_PRODUCTION";
    else export TF_VAR_orcid_base_path="$ORCID_BASE_PATH"; export TF_VAR_orcid_client_id="$ORCID_CLIENT_ID";
    export TF_VAR_orcid_client_secret="$ORCID_CLIENT_SECRET"; fi;
  - export WORKSPACE_NAME=`echo $CI_COMMIT_REF_SLUG | cut -c 1-26 | sed -e 's/-$//'`
  - terraform version
  - terraform init -backend-config="region=$TF_VAR_aws_region" -input=false
  - terraform workspace select $WORKSPACE_NAME || terraform workspace new $WORKSPACE_NAME
  - terraform get
  - terraform graph
  - terraform plan -out .tfplan -input=false | sed -e "s/$TF_VAR_aws_access_key_id/***/g"
    | sed -e "s/$TF_VAR_aws_secret_access_key/***/g"
  - terraform apply -input=false .tfplan | sed -e "s/$TF_VAR_aws_access_key_id/***/g"
    | sed -e "s/$TF_VAR_aws_secret_access_key/***/g" | sed -e "s/$TF_VAR_orcid_client_secret/***/g"
  - terraform output heroku_web_url | sed s'/\/$//' > api_url
  - terraform output heroku_git_url > heroku_git_url
  - cd server
  - mkdir -p dist/stacks/accounts
  - mkdir -p dist/stacks/periodicals
  - cp package.json yarn.lock dist
  - cp ../package.json ../yarn.lock dist/stacks
  - cp -r ../stacks/accounts/dist ../stacks/accounts/package.json ../stacks/accounts/yarn.lock
    dist/stacks/accounts
  - cp -r ../stacks/periodicals/dist ../stacks/periodicals/package.json ../stacks/periodicals/yarn.lock
    dist/stacks/periodicals
  - cd dist
  - git init .
  - git config user.email "ci@flockademic.com"
  - git config user.name "CI deployment"
  - git add .
  - git commit -m "Create deployment package for Heroku"
  - git remote add heroku `cat ../../heroku_git_url`
  - echo "machine git.heroku.com login \"\" password $HEROKU_API_KEY" > ~/.netrc
  - chmod 600 ~/.netrc
  - git push --force heroku master
  stage: deploy-backend
e2e:chrome:
  artifacts:
    expire_in: 1 week
    paths:
    - __e2e__/results/
    - __e2e__/errorShots/
    when: always
  dependencies:
  - prepare
  retry: 2
  script:
  - if [[ $CI_COMMIT_REF_NAME == $BRANCH_IN_MAINTENANCE ]]; then echo 'Running checks
    in maintenance mode.'; export MAINTENANCE_MODE=true; fi;
  - yarn run confidence-check --host=selenium__standalone-chrome
  services:
  - selenium/standalone-chrome:3.13
  stage: confidence-check
e2e:firefox:
  artifacts:
    expire_in: 1 week
    paths:
    - __e2e__/results/
    - __e2e__/errorShots/
    when: always
  dependencies:
  - prepare
  retry: 2
  script:
  - if [[ $CI_COMMIT_REF_NAME == $BRANCH_IN_MAINTENANCE ]]; then echo 'Running checks
    in maintenance mode.'; export MAINTENANCE_MODE=true; fi;
  - yarn run confidence-check --host=selenium__standalone-firefox
  services:
  - selenium/standalone-firefox:3.13
  stage: confidence-check
image: node:8.10
license_management:
  allow_failure: true
  artifacts:
    paths:
    - gl-license-management-report.json
  image: docker:stable
  script:
  - export LICENSE_MANAGEMENT_VERSION=$(echo "$CI_SERVER_VERSION" | sed 's/^\([0-9]*\)\.\([0-9]*\).*/\1-\2-stable/')
  - docker run --volume "$PWD:/code" "registry.gitlab.com/gitlab-org/security-products/license-management:$LICENSE_MANAGEMENT_VERSION"
    analyze /code
  services:
  - docker:stable-dind
  stage: confidence-check
  variables:
    DOCKER_DRIVER: overlay2
performance:
  artifacts:
    paths:
    - performance.json
  dependencies: null
  image: docker:git
  script:
  - mkdir gitlab-exporter
  - wget -O ./gitlab-exporter/index.js https://gitlab.com/gitlab-org/gl-performance/raw/master/index.js
  - mkdir sitespeed-results
  - if [[ $CI_COMMIT_REF_NAME == "master" ]]; then export SITE_URL=https://flockademic.com;
    else export SITE_URL=https://$CI_COMMIT_REF_SLUG.flockademic.com; fi;
  - docker run --shm-size=1g --rm -v "$(pwd)":/sitespeed.io sitespeedio/sitespeed.io:6.3.1
    --plugins.add ./gitlab-exporter --outputFolder sitespeed-results $SITE_URL
  - mv sitespeed-results/data/performance.json performance.json
  services:
  - docker:stable-dind
  stage: confidence-check
prepare:
  artifacts:
    expire_in: 1 month
    paths:
    - node_modules/
  script:
  - wipCommits=`git log --grep=^WIP`; if [ -n "$wipCommits" ]; then echo "WIP commits
    detected; aborting."; exit 1; fi
  - yarn install --ignore-scripts --frozen-lockfile
  stage: prepare
prepare_accounts:
  artifacts:
    expire_in: 1 month
    paths:
    - stacks/accounts/node_modules/
  script:
  - wipCommits=`git log --grep=^WIP`; if [ -n "$wipCommits" ]; then echo "WIP commits
    detected; aborting."; exit 1; fi
  - cd stacks/accounts
  - yarn install --frozen-lockfile
  stage: prepare
prepare_frontend:
  artifacts:
    expire_in: 1 month
    paths:
    - stacks/frontend/node_modules/
  script:
  - wipCommits=`git log --grep=^WIP`; if [ -n "$wipCommits" ]; then echo "WIP commits
    detected; aborting."; exit 1; fi
  - cd stacks/frontend
  - yarn install --frozen-lockfile
  stage: prepare
prepare_periodicals:
  artifacts:
    expire_in: 1 month
    paths:
    - stacks/periodicals/node_modules/
  script:
  - wipCommits=`git log --grep=^WIP`; if [ -n "$wipCommits" ]; then echo "WIP commits
    detected; aborting."; exit 1; fi
  - cd stacks/periodicals
  - yarn install --frozen-lockfile
  stage: prepare
prepare_server:
  artifacts:
    expire_in: 1 month
    paths:
    - server/node_modules/
  script:
  - wipCommits=`git log --grep=^WIP`; if [ -n "$wipCommits" ]; then echo "WIP commits
    detected; aborting."; exit 1; fi
  - cd server
  - yarn install --frozen-lockfile
  stage: prepare
provision_databases:
  dependencies:
  - deploy_terraform
  image: alpine:3.6
  script:
  - apk add --no-cache curl jq postgresql-client
  - export WORKSPACE_NAME=`echo $CI_COMMIT_REF_SLUG | cut -c 1-26 | sed -e 's/-$//'`
  - 'DATABASE_URL=`curl -X GET "https://api.heroku.com/apps/fl9-${WORKSPACE_NAME}/config-vars"
    -H "Accept: application/vnd.heroku+json; version=3" -H "Authorization: Bearer
    ${HEROKU_API_KEY}" | jq -r ".DATABASE_URL"`'
  - export PGHOST=`echo ${DATABASE_URL:11} | cut -d '@' -f 2 | cut -d ':' -f 1`
  - export PGPORT=`echo ${DATABASE_URL:11} | cut -d '@' -f 2 | cut -d ':' -f 2 | cut
    -d '/' -f 1`
  - export PGUSER=`echo ${DATABASE_URL:11} | cut -d '@' -f 1 | cut -d ':' -f 1`
  - export PGDATABASE=`echo ${DATABASE_URL:11} | cut -d '@' -f 2 | cut -d ':' -f 2
    | cut -d '/' -f 2`
  - echo "$PGHOST:$PGPORT:$PGDATABASE:$PGUSER:`echo ${DATABASE_URL:11} | cut -d '@'
    -f 1 | cut -d ':' -f 2`" > .pgpass.conf
  - chmod 0600 .pgpass.conf
  - export PGPASSFILE=.pgpass.conf
  - sh stacks/provision_databases.sh stacks
  stage: provision-backend
sast:
  artifacts:
    paths:
    - gl-sast-report.json
  dependencies:
  - prepare
  - prepare_frontend
  - prepare_accounts
  - prepare_periodicals
  image: registry.gitlab.com/gitlab-org/gl-sast:latest
  script:
  - /app/bin/run .
  stage: confidence-check
stages:
- prepare
- test
- build-backend
- deploy-backend
- provision-backend
- build-frontend
- deploy-frontend
- confidence-check
stop_frontend:
  dependencies:
  - prepare_frontend
  - build_frontend
  environment:
    action: stop
    name: review/$CI_COMMIT_REF_SLUG
  script:
  - cd stacks/frontend
  - yarn run undeploy
  stage: deploy-frontend
  variables:
    GIT_STRATEGY: none
  when: manual
stop_terraform:
  dependencies:
  - build_terraform
  environment:
    action: stop
    name: review_api/$CI_COMMIT_REF_SLUG
  image:
    entrypoint:
    - /usr/bin/env
    - PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    name: hashicorp/terraform:0.11.2
  script:
  - if [[ $CI_COMMIT_REF_NAME == "master" ]]; then export TF_VAR_aws_access_key_id=$AWS_ACCESS_KEY_ID_PRODUCTION;
    else export TF_VAR_aws_access_key_id=$AWS_ACCESS_KEY_ID; fi;
  - export TF_VAR_aws_account_id=$AWS_ACCOUNT_ID
  - export TF_VAR_aws_region=$AWS_REGION
  - export TF_VAR_heroku_email=$HEROKU_EMAIL
  - export TF_VAR_heroku_api_key=$HEROKU_API_KEY
  - if [[ $CI_COMMIT_REF_NAME == "master" ]]; then export TF_VAR_aws_secret_access_key=$AWS_SECRET_ACCESS_KEY_PRODUCTION;
    else export TF_VAR_aws_secret_access_key=$AWS_SECRET_ACCESS_KEY; fi;
  - export TF_VAR_jwt_secret="irrelevant_for_undeployment"
  - export TF_VAR_orcid_base_path="irrelevant_for_undeployment"
  - export TF_VAR_orcid_client_id="irrelevant_for_undeployment"
  - export TF_VAR_orcid_client_secret="irrelevant_for_undeployment"
  - export TF_VAR_frontend_url="irrelevant_for_undeployment"
  - export WORKSPACE_NAME=`echo $CI_COMMIT_REF_SLUG | cut -c 1-26 | sed -e 's/-$//'`
  - terraform init -backend-config="region=$TF_VAR_aws_region" -input=false
  - terraform workspace select $WORKSPACE_NAME
  - terraform get
  - terraform plan -destroy -input=false
  - terraform destroy -input=false -force
  stage: deploy-backend
  variables:
    GIT_STRATEGY: none
  when: manual
test:
  dependencies:
  - prepare
  script:
  - yarn run test
  stage: test
test_accounts:
  artifacts:
    expire_in: 1 week
    paths:
    - stacks/accounts/__tests__/__coverage__/
    when: always
  dependencies:
  - prepare
  - prepare_accounts
  script:
  - cd stacks/accounts
  - yarn run test --ci
  stage: test
test_frontend:
  artifacts:
    expire_in: 1 week
    paths:
    - stacks/frontend/__tests__/__coverage__/
    when: always
  dependencies:
  - prepare
  - prepare_frontend
  script:
  - cd stacks/frontend
  - yarn run test --ci
  stage: test
test_periodicals:
  artifacts:
    expire_in: 1 week
    paths:
    - stacks/periodicals/__tests__/__coverage__/
    when: always
  dependencies:
  - prepare
  - prepare_periodicals
  script:
  - cd stacks/periodicals
  - yarn run test --ci
  stage: test
