api:
  image: docker:stable
  script:
  - docker pull $CONTAINER_IMAGE:latest || true
  - docker build --cache-from $CONTAINER_IMAGE:latest --tag $CONTAINER_IMAGE:$CI_BUILD_REF
    --tag $CONTAINER_IMAGE:latest -f dockerfiles/api.dockerfile .
  - docker push $CONTAINER_IMAGE:$CI_BUILD_REF
  - docker push $CONTAINER_IMAGE:latest
  services:
  - docker:dind
  stage: release
  variables:
    CONTAINER_IMAGE: gcr.io/yummy-phoenix-graphql/api
before_script:
- mkdir -p $HOME/.docker
- echo "$DOCKER_AUTH_CONFIG" >> "$HOME/.docker/config.json"
frontend:
  image: docker:stable
  script:
  - docker pull $CONTAINER_IMAGE:latest || true
  - docker build --cache-from $CONTAINER_IMAGE:latest --tag $CONTAINER_IMAGE:$CI_BUILD_REF
    --tag $CONTAINER_IMAGE:latest -f dockerfiles/frontend.dockerfile .
  - docker push $CONTAINER_IMAGE:$CI_BUILD_REF
  - docker push $CONTAINER_IMAGE:latest
  services:
  - docker:dind
  stage: release
  variables:
    CONTAINER_IMAGE: gcr.io/yummy-phoenix-graphql/frontend
stages:
- test
- release
test:
  before_script:
  - fakes3 -r .s3bucket -p 4567 > /dev/null 2>&1 &
  - npm run build
  - npm run test.server  > /dev/null 2>&1 &
  - mix deps.get --only test
  - mix ecto.migrate
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
    - deps
    - _build
    - client/node_modules
    untracked: true
  image: registry.gitlab.com/matthieusegret/yummy-phoenix-graphql/ci:1.2
  script:
  - mix test
  services:
  - postgres:latest
  stage: test
  variables:
    MIX_ENV: test
    POSTGRES_DB: yummy_graphql_test
    POSTGRES_HOST: postgres
    POSTGRES_PASSWORD: postgres
    POSTGRES_USER: postgres
