before_script:
- python -V
- pip install pipenv
- pipenv lock
- pipenv install
- $(pipenv --venv)/bin/python -V
cache:
  paths:
  - ~/.cache/pip/
image: python:latest
services:
- postgres:latest
stages:
- test
test:
  only:
  - branches
  script:
  - $(pipenv --venv)/bin/python manage.py test --settings organ.settings_ci
  stage: test
  variables:
    DATABASE_URL: postgresql://postgres:postgres@postgres:5432/$POSTGRES_DB
variables:
  POSTGRES_DB: ci
