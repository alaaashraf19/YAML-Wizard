lint Helm Charts:
  image:
    entrypoint:
    - /bin/sh
    - -c
    name: linkyard/docker-helm
  script:
  - helm lint stable/*
  stage: test
pages:
  artifacts:
    paths:
    - public
  cache:
    key: $CI_BUILD_NAME.$CI_BUILD_REF_NAME
  image:
    entrypoint:
    - /bin/sh
    - -c
    name: linkyard/docker-helm
  only:
  - master
  script:
  - helm init --client-only
  - mkdir -p ./public
  - 'echo "User-Agent: *

    Disallow: /" > ./public/robots.txt'
  - helm package stable/* --destination ./public
  - helm repo index --url https://${CI_PROJECT_NAMESPACE}.gitlab.io/${CI_PROJECT_NAME}
    ./public
  - mv ./public/index.yaml ./public
  stage: deploy
