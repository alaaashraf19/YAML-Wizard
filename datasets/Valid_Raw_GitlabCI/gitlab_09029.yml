.if-security-release-create-versions:
  if: ($CI_PIPELINE_SOURCE =~ /^(pipeline|web|api)$/) && ($SECURITY_RELEASE_PIPELINE
    =~ /^(create_versions|true)$/)
.security-release-create-versions-base:
  extends: .common-job-setup
  rules:
  - if: ($CI_PIPELINE_SOURCE =~ /^(pipeline|web|api)$/) && ($SECURITY_RELEASE_PIPELINE
      =~ /^(create_versions|true)$/)
  stage: security_release:create_versions
security_release_create_versions:create:
  extends:
  - .security-release-create-versions-base
  - .common-ci-tokens
  needs:
  - security_release_create_versions:start
  script:
  - bundle exec rake 'security:create_versions:create'
security_release_create_versions:start:
  extends:
  - .security-release-create-versions-base
  - .common-ci-tokens
  needs: []
  script:
  - bundle exec rake 'security:create_versions:start'
  stage: security_release:create_versions:start
  when: manual
