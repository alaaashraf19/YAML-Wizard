build:
  artifacts:
    name: $CI_COMMIT_REF_SLUG
    paths:
    - '*.log'
    - '*.deb'
    when: always
  dependencies:
  - build-docker
  image: $CI_REGISTRY_IMAGE:$CI_COMMIT_REF_NAME
  only:
    changes:
    - Dockerfile
    - Makefile
    - .config
  script:
  - make build-kernel build-rootfs
  stage: build
  tags:
  - docker
build-docker:
  before_script:
  - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  except:
    variables:
    - $NO_DOCKER_BUILD
  image: docker:latest
  only:
    changes:
    - Dockerfile
  script:
  - docker build -t $IMAGE_TAG .
  - docker push $IMAGE_TAG
  services:
  - docker:dind
  stage: docker
  tags:
  - docker
  variables:
    IMAGE_TAG: $CI_REGISTRY_IMAGE:$CI_COMMIT_REF_NAME
stages:
- docker
- build
