.9xx_qemu_before_test: &id001
- RUN="run_test_qemu_riscv64.sh"
.9xx_qemu_test:
  artifacts: &id008
    expire_in: 2 weeks
    paths:
    - test.log
    when: always
  before_script: *id001
  script: &id007
  - echo 'Prepare to run'
  - mkdir -p output/host/
  - tar -xf output/images/toolchain_*.tar.xz -C output/host
  - if [ -f output/images/vmlinux.xz ]; then xz -d output/images/vmlinux.xz; fi
  - if [ -f output/images/Image.xz ]; then xz -d output/images/Image.xz; fi
  - if [ -f output/images/rootfs.ext2.xz ]; then xz -d output/images/rootfs.ext2.xz;
    fi
  - if [ -f output/images/rootfs.tar.xz ]; then xz -d output/images/rootfs.tar.xz;
    fi
  - if [ -f output/host/csky-ci/${RUN} ]; then ./output/host/csky-ci/${RUN} $BOARD
    $CORENUM; fi
  - if [ -f output/host/csky-ci/generic_analyze.sh ]; then ./output/host/csky-ci/generic_analyze.sh
    || exit 1; fi
  - if [ -f output/host/csky-glibc-ci/csky-glibc-ci.sh ]; then ./output/host/csky-glibc-ci/csky-glibc-ci.sh
    || exit 1; fi
  stage: test
.chip_build_before: &id002
- CPU_ID=${CI_BUILD_NAME%%_*}
- VENDOR_ID=${CI_BUILD_NAME##*libc_}
- PREFIX=${CHIP_PREFIX}${CPU_ID}'_'${VENDOR_ID}
- HELL=${CI_BUILD_NAME%_${VENDOR_ID}}
- MAIN=${HELL#*${CPU_ID}}
.common_build: &id009
  artifacts: &id004
    expire_in: 2 weeks
    paths:
    - output/images/
    - build.log.xz
    when: always
  before_script: *id002
  cache: &id005
    paths:
    - dl/
  dependencies: &id006 []
  script: &id003
  - echo 'Configure buildroot'
  - CONFIG_NAME=${PREFIX}${MAIN}${SUFFIX}
  - export GITLAB_CI_JOB_ID=${CI_JOB_ID}
  - echo ${CONFIG_NAME}
  - echo 'Build buildroot'
  - "make CONF=${CONFIG_NAME} O=output > >(tee build.log |grep '>>>') 2>&1 || {\n\
    \    echo 'Failed build last output'\n    tail -200 build.log\n    xz -z build.log\n\
    \    exit 1\n}\n"
  - xz -z build.log
  - if [ -f output/images/vmlinux ]; then output/host/bin/csky-linux-strip -sg output/images/vmlinux;
    xz -z output/images/vmlinux; fi
  - if [ -f output/images/Image ]; then xz -z output/images/Image; fi
  - if [ -f output/images/usb.img ]; then xz -z output/images/usb.img; fi
  - if [ -f output/images/rootfs.ext2 ]; then xz -z output/images/rootfs.ext2; fi
  - if [ -f output/images/rootfs.cpio ]; then rm -f output/images/rootfs.cpio; fi
  - if [ -f output/images/rootfs.tar ]; then xz -z output/images/rootfs.tar; fi
  - if [ -d output/images/hw ]; then cd output/images/; tar czf hw.tar.gz hw; cd -;
    fi
  stage: build
.common_build_script: *id003
.common_builds:
  artifacts: *id004
  before_script: *id002
  cache: *id005
  dependencies: *id006
  script: *id003
.common_test_script: *id007
.common_tests:
  artifacts: *id008
  script: *id007
9xx_5.10_glibc_compat: *id009
9xx_5.10_glibc_qemu_test:
  artifacts: *id008
  before_script: *id001
  dependencies:
  - 9xx_5.10_glibc_compat
  script: *id007
  stage: test
9xxf_5.10_glibc_enhanced: *id009
9xxf_5.10_glibc_qemu_test_enhanced:
  artifacts: *id008
  before_script: *id001
  dependencies:
  - 9xxf_5.10_glibc_enhanced
  script: *id007
  stage: test
image: guoren83/ubuntu-16.04-buildroot:v1
stages:
- build
- test
variables:
  CHIP_PREFIX: thead_
  CONFIG_NAME: ''
  CPU_ID: ''
  MAIN: ''
  PREFIX: ''
  SUFFIX: _br_defconfig
  VENDOR_ID: ''
