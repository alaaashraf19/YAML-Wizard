dry-run:triage:
  except:
  - schedules
  script:
  - gem install gitlab-triage
  - gitlab-triage --help
  - gitlab-triage --dry-run --token $GITLAB_API_TOKEN --host-url $CI_SERVER_URL --source
    projects --source-id $CI_PROJECT_PATH
  stage: triage
  when: manual
image: ruby:3.0
run:triage:
  only:
  - schedules
  script:
  - gem install gitlab-triage
  - gitlab-triage --token $GITLAB_API_TOKEN --host-url $CI_SERVER_URL --source projects
    --source-id $CI_PROJECT_PATH
  stage: triage
stages:
- triage
