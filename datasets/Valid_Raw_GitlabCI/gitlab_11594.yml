build:
  only:
  - triggers
  - web
  script:
  - "export BUILD_NUMBER=$( (date +%s%N ; echo $CI_PIPELINE_ID; hostname) | openssl\
    \ sha1 | sed -e 's/.*=//g; s/ //g' | cut -c1-10 )\ncd /lineage/${VERSION}\nrm\
    \ -rf .repo/local_manifests/*\nif [ -f /lineage/setup.sh ]; then\n    source /lineage/setup.sh\n\
    fi\nrepo init -u https://github.com/lineageos/android.git -b ${VERSION}\necho\
    \ \"Resetting build tree\"\nrepo forall -vc \"git reset --hard\" > /dev/null 2>\
    \ /dev/null\necho \"Syncing\"\nrepo sync -j32 -d --force-sync > /dev/null 2> /dev/null\n\
    . build/envsetup.sh\nmka clobber\nset +e\nbreakfast lineage_${DEVICE}-${TYPE}\n\
    set -e\nif [ \"$RELEASE_TYPE\" '==' \"experimental\" ]; then\n  repopick $EXP_PICK_CHANGES\n\
    fi\nmka otatools-package target-files-package dist\nssh jenkins@blob.lineageos.org\
    \ mkdir -p  /home/jenkins/incoming/${DEVICE}/${CI_PIPELINE_ID}/\nscp out/dist/*target_files*.zip\
    \ jenkins@blob.lineageos.org:/home/jenkins/incoming/${DEVICE}/${CI_PIPELINE_ID}/\n\
    scp out/target/product/${DEVICE}/otatools.zip jenkins@blob.lineageos.org:/home/jenkins/incoming/${DEVICE}/${CI_PIPELINE_ID}/\n"
  stage: build
  tags:
  - lineage-builder
  variables:
    BUILD_ENFORCE_SELINUX: '1'
    BUILD_NO: $CI_PIPELINE_ID
    BUILD_NUMBER: ''
    CPU_SSE42: 'false'
    PYTHONDONTWRITEBYTECODE: 'true'
    USE_CCACHE: '1'
sign:
  image: python:3.6
  only:
  - triggers
  - web
  script:
  - source /home/gitlab-runner/env.sh
  - pip install -r requirements.txt
  - python sign.py
  stage: sign
  tags:
  - signing-proxy
  variables:
    PYTHONUNBUFFERED: '1'
stages:
- build
- sign
