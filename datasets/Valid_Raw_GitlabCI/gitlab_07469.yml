spellcheckbot:
  allow_failure: true
  rules:
  - if: $CI_PIPELINE_SOURCE == "trigger"
  script:
  - "set -x\nset -e\necho Etc/UTC > /etc/timezone\necho 'quiet \"1\";' \\\n     'APT::Install-Recommends\
    \ \"0\";' \\\n     'APT::Install-Suggests \"0\";' \\\n     'APT::Get::Assume-Yes\
    \ \"true\";' \\\n     'Acquire::Retries \"20\";' \\\n     'Dpkg::Use-Pty \"0\"\
    ;' \\\n    > /etc/apt/apt.conf.d/99gitlab\nsed -i s,http:,https:, /etc/apt/sources.list.d/debian.sources\n\
    echo 'Acquire::https::Verify-Peer \"false\";' > /etc/apt/apt.conf.d/99nocacertificates\n\
    apt-get update\napt-get install ca-certificates\nrm -v /etc/apt/apt.conf.d/99nocacertificates\n\
    apt-get dist-upgrade\nset +x\n"
  - apt-get install git
  - test -n ${FROM_CI_PROJECT_URL}
  - test -n ${FROM_CI_COMMIT_SHA}
  - git fetch ${FROM_CI_PROJECT_URL} ${FROM_CI_COMMIT_SHA}
  - for f in $(git diff --name-only --diff-filter=d HEAD...${FROM_CI_COMMIT_SHA});
    do export CHANGED="$CHANGED $(echo $f | grep '\.md$' || true)"; done
  - if [ -z "$(echo $CHANGED | sed 's,\s*,,g')" ]; then echo "No markdown files changed";
    exit 0; else echo "Spellchecking $CHANGED"; git checkout --force ${FROM_CI_COMMIT_SHA};
    fi
  - apt-get install hunspell-en-us jq nodejs npm python3-gitlab python3-requests
  - ./tools/fetch-spelling-words.py >> .spelling
  - jq --raw-output 'keys[]' _data/android_permissions.json >> .spelling
  - grep --no-filename -rEo 'v[0-9]+(:?\.[0-9]+)+' _* | sort -u >> .spelling
  - npm i markdown-spellcheck -g
  - (mdspell --report --en-gb --ignore-numbers --ignore-acronyms $CHANGED > output.txt
    2>&1) || ./tools/spellcheckbot.py
  - cat output.txt
  stage: deploy
stages:
- deploy
- production
