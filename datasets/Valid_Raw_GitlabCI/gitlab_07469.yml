  ;' \\\n     'APT::Get::Assume-Yes \"true\";' \\\n     'Acquire::Retries \"20\";'\
  \ \\\n     'Dpkg::Use-Pty \"0\";' \\\n    > /etc/apt/apt.conf.d/99gitlab\nsed -i\
  \ s,http:,https:, /etc/apt/sources.list.d/debian.sources\necho 'Acquire::https::Verify-Peer\
  \ \"false\";' > /etc/apt/apt.conf.d/99nocacertificates\napt-get update\napt-get\
  \ install ca-certificates\nrm -v /etc/apt/apt.conf.d/99nocacertificates\napt-get\
  \ dist-upgrade\nset +x\n"
.setup_for_jekyll: "set -x\nset -e\napt-get install --install-recommends git libunicode-linebreak-perl\
  \ po4a\napt-get install \\\n  gettext \\\n  linkchecker \\\n  python3-babel \\\n\
  \  rsync \\\n  rubocop \\\n  ruby-bundler \\\n  ruby-git \\\n  ruby-jekyll-include-cache\
