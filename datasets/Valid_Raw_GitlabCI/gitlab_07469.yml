Jekyll Post filename:
  rules:
  - changes:
    - .gitlab-ci.yml
    - _posts/*.*
    if: $CI_PIPELINE_SOURCE != "trigger"
  script:
  - export EXITVALUE=0
  - for f in _posts/*.*; do echo "$f" | grep -E '20[0-9][0-9]-[0-9][0-9]-[0-9][0-9]-\S+\.(md|html)'
    > /dev/null || { echo "ERROR bad filename $f"; export EXITVALUE=1; } done
  - test $EXITVALUE -eq 0 || echo "See https://jekyllrb.com/docs/posts/"
  - exit $EXITVALUE
  stage: deploy
Vagrantfile:
  rules:
  - changes:
    - .gitlab-ci.yml
    - Vagrantfile
    if: $CI_PIPELINE_SOURCE != "trigger"
  script:
  - "set -x\nset -e\necho Etc/UTC > /etc/timezone\necho 'quiet \"1\";' \\\n     'APT::Install-Recommends\
    \ \"0\";' \\\n     'APT::Install-Suggests \"0\";' \\\n     'APT::Get::Assume-Yes\
    \ \"true\";' \\\n     'Acquire::Retries \"20\";' \\\n     'Dpkg::Use-Pty \"0\"\
    ;' \\\n    > /etc/apt/apt.conf.d/99gitlab\nsed -i s,http:,https:, /etc/apt/sources.list.d/debian.sources\n\
    echo 'Acquire::https::Verify-Peer \"false\";' > /etc/apt/apt.conf.d/99nocacertificates\n\
    apt-get update\napt-get install ca-certificates\nrm -v /etc/apt/apt.conf.d/99nocacertificates\n\
    apt-get dist-upgrade\nset +x\n"
  - apt-get install kmod procps ruby vagrant vagrant-libvirt
  - export EXITVALUE=0
  - function set_error() { export EXITVALUE=1; printf "\x1b[31mERROR $(history|tail
    -2|head -1|cut -b 6-500)\x1b[0m\n"; }
  - ruby -c Vagrantfile || set_error
  - vagrant validate || set_error;
  - exit $EXITVALUE
  stage: deploy
YAML Front Matter:
  rules:
  - changes:
    - .gitlab-ci.yml
    - _docs/*.md
    - _pages/*.md
    - _posts/*.md
    if: $CI_PIPELINE_SOURCE != "trigger"
  script:
  - "set -x\nset -e\necho Etc/UTC > /etc/timezone\necho 'quiet \"1\";' \\\n     'APT::Install-Recommends\
    \ \"0\";' \\\n     'APT::Install-Suggests \"0\";' \\\n     'APT::Get::Assume-Yes\
    \ \"true\";' \\\n     'Acquire::Retries \"20\";' \\\n     'Dpkg::Use-Pty \"0\"\
    ;' \\\n    > /etc/apt/apt.conf.d/99gitlab\nsed -i s,http:,https:, /etc/apt/sources.list.d/debian.sources\n\
    echo 'Acquire::https::Verify-Peer \"false\";' > /etc/apt/apt.conf.d/99nocacertificates\n\
    apt-get update\napt-get install ca-certificates\nrm -v /etc/apt/apt.conf.d/99nocacertificates\n\
    apt-get dist-upgrade\nset +x\n"
  - apt-get install python3-yaml yamllint
  - EXITVALUE=0
  - for f in _docs/*.md _pages/*.md _posts/*.md; do echo $f; python3 -c "import re;
    print(re.match(r'---\n.*?---',  open('$f').read(), re.DOTALL).group())" > ${f}.yml;
    if ! yamllint ${f}.yml; then cat ${f}.yml; export EXITVALUE=1; fi; done
  - ./tools/check-yaml-front-matter.py
  - exit $EXITVALUE
  stage: deploy
check_fdroid_apk_bot:
  artifacts:
    expire_in: 180 days
    name: $apk-failed-${CI_JOB_ID}
    paths:
    - $apk
    - $asc
    when: on_failure
  image: docker.io/alpine:3.16
  rules:
  - if: $CI_PIPELINE_SOURCE == "schedule"
  - if: $CI_COMMIT_REF_NAME == "master" && $CI_PROJECT_PATH == "fdroid/fdroidserver"
  script:
  - apk add --no-cache gnupg curl
  - '! (gpg --list-keys | grep pub)'
  - $curl https://f-droid.org/admin@f-droid.org.gpg | gpg --import || true
  - gpg --recv-key $fingerprint || true
  - gpg --keyserver https://keyserver.ubuntu.com --recv-key $fingerprint || true
  - gpg --list-key $fingerprint
  - echo "${fingerprint}:6:" | gpg --import-ownertrust
  - $curl https://f-droid.org/$apk > $apk
  - $curl https://f-droid.org/$asc > $asc
  - ls -l $apk $asc
  - sha256sum $apk
  - gpg --batch --trust-model always --verify $asc $apk || ( apk add --no-cache python3;
    python3 -m ensurepip; $pip install python-gitlab; ./tools/run-check-fdroid-apk-bot.py;
    )
  stage: deploy
  variables:
    apk: F-Droid.apk
    asc: F-Droid.apk.asc
    curl: curl --fail --user-agent F-Droid --retry 99
    fingerprint: 37D2C98789D8311948394E3E41E7044E1DBA2E89
    pip: pip3 --timeout 100 --retries 10
