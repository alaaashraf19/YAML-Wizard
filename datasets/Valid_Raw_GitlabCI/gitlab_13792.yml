before_script:
- pip3 install -r requirements.txt
cache:
  paths:
  - .cache/pip
  - venv/
image: python:latest
stages:
- test
- build
- deploy
test:
  script:
  - cd autogram
  - wget https://core.telegram.org/bots/api -O tgbotapi.html
  - python3 _gen.py
  - cd ..
  - python3 setup.py install
  - pip3 install -r requirements_tests.txt
  - python3 -m pytest
  stage: test
variables:
  PIP_CACHE_DIR: $CI_PROJECT_DIR/.cache
wheel:
  artifacts:
    paths:
    - dist/Autogram-*.whl
  script:
  - cd autogram
  - wget https://core.telegram.org/bots/api -O tgbotapi.html
  - python3 _gen.py
  - cd ..
  - python3 setup.py bdist_wheel
  stage: build
