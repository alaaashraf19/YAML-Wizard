build:
  artifacts:
    expire_in: 1 hour
    paths:
    - public
  script:
  - echo Build my page
  stage: build
  tags:
  - nginx
  - review-apps
  - deploy
production:
  environment:
    name: production
    url: http://production.$APPS_DOMAIN
  only:
  - master
  script:
  - rsync -av --delete public /srv/nginx/pages/production
  stage: deploy
  tags:
  - nginx
  - review-apps
  - deploy
  when: manual
review:
  environment:
    name: review/$CI_BUILD_REF_NAME
    url: http://$CI_BUILD_REF_NAME.$APPS_DOMAIN
  except:
  - master
  only:
  - branches
  script:
  - rsync -av --delete public /srv/nginx/pages/$CI_BUILD_REF_NAME
  stage: deploy
  tags:
  - nginx
  - review-apps
  - deploy
stages:
- build
- deploy
staging:
  environment:
    name: staging
    url: http://staging.$APPS_DOMAIN
  only:
  - master
  script:
  - rsync -av --delete public /srv/nginx/pages/staging
  stage: deploy
