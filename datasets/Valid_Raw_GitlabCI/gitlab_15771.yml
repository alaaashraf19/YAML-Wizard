code_quality:
  allow_failure: true
  artifacts:
    paths:
    - gl-code-quality-report.json
  image: docker:stable
  script:
  - export SP_VERSION=$(echo "$CI_SERVER_VERSION" | sed 's/^\([0-9]*\)\.\([0-9]*\).*/\1-\2-stable/')
  - docker run --env SOURCE_CODE="$PWD" --volume "$PWD":/code --volume /var/run/docker.sock:/var/run/docker.sock
    "registry.gitlab.com/gitlab-org/security-products/codequality:$SP_VERSION" /code
  services:
  - docker:stable-dind
  stage: check
  variables:
    DOCKER_DRIVER: overlay2
lint-js:
  image: node
  script:
  - npm install -g eslint
  - eslint --ignore-pattern "**/*.min.js" $CI_PROJECT_DIR
  stage: test
  tags:
  - docker
pages:
  allow_failure: true
  artifacts:
    paths:
    - public
  environment:
    name: docs
    url: $CI_PAGES_URL
  image: registry.gitlab.com/pages/hugo:latest
  only:
  - master
  script:
  - git clone https://gitlab.com/ribamar-org/ribamar-docs.git
  - cd ribamar-docs
  - git clone https://github.com/matcornic/hugo-theme-learn.git themes/hugo-theme-learn
  - hugo --baseURL $CI_PAGES_URL -d ../public
  stage: deploy
stages:
- test
- check
- deploy
test-pages:
  except:
  - master
  image: registry.gitlab.com/pages/hugo:latest
  script:
  - git clone https://gitlab.com/ribamar-org/ribamar-docs.git
  - cd ribamar-docs
  - git clone https://github.com/matcornic/hugo-theme-learn.git themes/hugo-theme-learn
  - hugo
  stage: check
unit-test:
  coverage: /Statements\s*:\s*(\d+(?:\.\d+)?\%)/
  image: node
  script:
  - npm i -g mocha
  - npm i -g nyc
  - npm i .
  - nyc --reporter=text-summary npm t
  services:
  - mongo
  - bitnami/mongodb
  - djfarrelly/maildev
  stage: test
  tags:
  - docker
  variables:
    DB_AUTH_URL: mongodb://bitnami-mongodb:27017
    DB_URL: mongodb://mongo:27017
    MONGODB_ROOT_PASSWORD: 234789
    SMTP_HOST: djfarrelly-maildev
