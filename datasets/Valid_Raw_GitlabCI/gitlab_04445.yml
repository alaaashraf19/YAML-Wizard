cache:
  key: $CACHE_KEY
  paths:
  - /root/.cargo
image: registry.gitlab.com/bff/rn
release_build:
  artifacts:
    name: rn
    paths:
    - bin/
  only:
  - tags
  - master
  script:
  - rustup update
  - cargo build --release
  - mkdir -p bin/linux_x64
  - cp target/release/rn bin/linux_x64/rn
  - cp rn.sh bin/
  stage: test
stages:
- test
unit_test:
  script:
  - rustup update
  - ./kcov.sh
  stage: test
