deploy:
  environment:
    name: production
  image: python:3.6
  only:
  - tags
  script:
  - 'curl -s --max-time 300 -X POST -H "Authorization: Bearer: $DEPLOY_API_TOKEN"
    https://api.metachris.com/tasks/deploy-python-boilerplate > response.txt'
  - cat response.txt
  - grep msg response.txt
  stage: deploy
stages:
- test
- deploy
test-with-py2:
  image: python:2.7
  script:
  - export ONLY_TEST_PY2=1
  - python --version
  - pip install -r requirements.txt
  - ./src/gen.py all -t
  stage: test
test-with-py3:
  image: python:3.6
  script:
  - export ONLY_TEST_PY3=1
  - python --version
  - pip install -r requirements.txt
  - ./src/gen.py all -t
  stage: test
