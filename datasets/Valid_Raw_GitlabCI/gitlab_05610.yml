.release_template:
  before_script: &id001
  - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" $CI_REGISTRY
  - docker info | grep Registry
  - apk add --no-cache python py-pip git
  - pip install python-magic
  - apk --purge del py-pip
  image: docker:stable
  services: &id002
  - docker:dind
before_script:
- npm install --quiet
cache:
  paths:
  - node_modules/
image: node:10-jessie
lint:
  allow_failure: true
  script: npm run lint
  stage: check
release-image:
  before_script: *id001
  image: docker:stable
  only:
  - master
  script:
  - docker build --pull -t "$CI_REGISTRY_IMAGE" .
  - docker push "$CI_REGISTRY_IMAGE"
  services: *id002
  stage: release
  tags:
  - docker
  when: manual
stages:
- build
- test
- check
- release
variables:
  REGISTRY_STAGING_URL: ageingarpanetwork/arpa-network
