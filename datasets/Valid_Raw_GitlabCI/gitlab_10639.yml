before_script:
- apt-get update
- apt-get install -y libedit-dev
build:
  artifacts:
    paths:
    - lisp
  script:
  - gcc --std=c99 -Wall lisp.c mpc.c -ledit -lm -o lisp
  stage: build
build-alpine:
  artifacts:
    paths:
    - lisp
  before_script:
  - apk update && apk add libedit-dev build-base
  image: frolvlad/alpine-gcc
  script:
  - gcc --std=c99 -Wall lisp.c mpc.c -ledit -lm -o lisp
  stage: build
image: gcc
stages:
- build
- test
test:
  dependencies:
  - build
  image: python:3-slim
  script:
  - python3 run-tests.py
  stage: test
test-alpine:
  before_script:
  - apk update && apk add libedit-dev build-base
  dependencies:
  - build-alpine
  image: python:3-alpine
  script:
  - python3 run-tests.py
  stage: test
