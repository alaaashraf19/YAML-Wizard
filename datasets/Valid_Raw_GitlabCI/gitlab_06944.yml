.docker-build:
  artifacts: &id001
    expire_in: 1 day
    paths:
    - variables
  script: &id002
  - ./build.sh
before_script:
- apk add --no-cache curl jq
- docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD"
- 'export LAST_COMMIT=$(curl --header "PRIVATE-TOKEN: $CI_TOKEN" "https://gitlab.com/api/v4/projects/$CI_PROJECT_ID/pipelines"
  | jq -r ''.[1].sha'')

  '
build:adnamc:
  artifacts: *id001
  dependencies:
  - build:adntools
  needs:
  - build:adntools
  script: *id002
  stage: adnamc
  variables:
    IMAGE_TAG: adnamc
build:adntools:
  artifacts: *id001
  dependencies:
  - build:tools
  needs:
  - build:tools
  script: *id002
  stage: adntools
  variables:
    IMAGE_TAG: adntools
build:basic:
  artifacts: *id001
  dependencies:
  - build:minimal
  needs:
  - build:minimal
  script: *id002
  stage: standard
  variables:
    IMAGE_TAG: basic
build:custom:
  artifacts: *id001
  dependencies:
  - build:minimal
  needs:
  - build:minimal
  script: *id002
  stage: standard
  variables:
    IMAGE_TAG: custom
build:full:
  artifacts: *id001
  dependencies:
  - build:minimal
  needs:
  - build:minimal
  script: *id002
  stage: standard
  variables:
    IMAGE_TAG: full
build:minimal:
  artifacts: *id001
  script: *id002
  stage: minimal
  variables:
    IMAGE_TAG: minimal
build:tools:
  artifacts: *id001
  dependencies:
  - build:custom
  needs:
  - build:custom
  script: *id002
  stage: tools
  variables:
    IMAGE_TAG: tools
image: docker:git
services:
- docker:dind
stages:
- minimal
- standard
- tools
- adntools
- adnamc
