before_script:
- zypper in -y make tar graphviz graphviz-gnome liberation-fonts texlive-xetex-bin
- zypper in -y texlive-fontspec texlive-dejavu texlive-dejavu-fonts google-worksans-fonts
- zypper in -y 'tex(beamer.cls)' 'tex(bbm.sty)' 'tex(capt-of.sty)' 'tex(textpos.sty)'
  'tex(czech.ldf)' 'tex(pzdr.tfm)' 'tex(fancyvrb.sty)'
- zypper in -y pandoc
build-pdfs:
  artifacts:
    paths:
    - '*/*.pdf'
  script:
  - make -j$(nproc)
  stage: build
image: opensuse/tumbleweed
stages:
- build
