cloud-native-image:
  allow_failure: true
  dependencies: []
  image: ruby:2.6-alpine
  only:
    refs:
    - tags
    variables:
    - $CI_SERVER_HOST == "gitlab.com" && $CI_PROJECT_NAMESPACE == "gitlab-org"
  script:
  - install_gitlab_gem
  - CNG_PROJECT_PATH="gitlab-org/build/CNG" BUILD_TRIGGER_TOKEN=$CI_JOB_TOKEN ./scripts/trigger-build
    cng
  stage: post-test
  variables:
    GIT_DEPTH: '1'
  when: manual
