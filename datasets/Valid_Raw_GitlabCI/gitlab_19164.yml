.deploy:
  before_script: &id001
  - oc login "$OPENSHIFT_SERVER" --token="$OPENSHIFT_TOKEN" --insecure-skip-tls-verify
  - oc project "$CI_PROJECT_NAME-$CI_PROJECT_ID" 2> /dev/null || oc new-project "$CI_PROJECT_NAME-$CI_PROJECT_ID"
  script: &id002
  - oc get services $APP 2> /dev/null || oc new-app . --name=$APP --strategy=docker
  - oc start-build $APP --from-dir=. --follow || sleep 3s && oc start-build $APP --from-dir=.
    --follow
  - oc get routes $APP 2> /dev/null || oc expose service $APP --hostname=$APP_HOST
image: ayufan/openshift-cli
production:
  before_script: *id001
  environment:
    name: production
    url: http://$CI_PROJECT_NAME.$OPENSHIFT_DOMAIN
  only:
  - master
  script: *id002
  stage: production
  variables:
    APP: production
    APP_HOST: $CI_PROJECT_NAME.$OPENSHIFT_DOMAIN
  when: manual
review:
  before_script: *id001
  environment:
    name: review/$CI_COMMIT_REF_NAME
    on_stop: stop-review
    url: http://$CI_PROJECT_NAME-$CI_ENVIRONMENT_SLUG.$OPENSHIFT_DOMAIN
  except:
  - master
  only:
  - branches
  script: *id002
  stage: review
  variables:
    APP: review-$CI_COMMIT_REF_NAME
    APP_HOST: $CI_PROJECT_NAME-$CI_ENVIRONMENT_SLUG.$OPENSHIFT_DOMAIN
stages:
- build
- test
- deploy
- review
- staging
- production
- cleanup
staging:
  before_script: *id001
  environment:
    name: staging
    url: http://$CI_PROJECT_NAME-staging.$OPENSHIFT_DOMAIN
  only:
  - master
  script: *id002
  stage: staging
  variables:
    APP: staging
    APP_HOST: $CI_PROJECT_NAME-staging.$OPENSHIFT_DOMAIN
stop-review:
  before_script: *id001
  environment:
    action: stop
    name: review/$CI_COMMIT_REF_NAME
  except:
  - master
  only:
  - branches
  script:
  - oc delete all -l "app=$APP"
  stage: cleanup
  variables:
    APP: review-$CI_COMMIT_REF_NAME
    GIT_STRATEGY: none
  when: manual
test1:
  before_script: []
  script:
  - echo run tests
  stage: test
test2:
  before_script: []
  script:
  - echo run tests
  stage: test
variables:
  OPENSHIFT_SERVER: openshift.default.svc.cluster.local
