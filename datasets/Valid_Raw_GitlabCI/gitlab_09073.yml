.if-security-release-process:
  if: ($CI_PIPELINE_SOURCE =~ /^(schedule|pipeline|web|api)$/) && ($SECURITY_RELEASE_PIPELINE
    == "process")
security_release:process_security_target_issues:
  extends:
  - .with-bundle
  - .common-ci-tokens
  rules:
  - if: ($CI_PIPELINE_SOURCE =~ /^(schedule|pipeline|web|api)$/) && ($SECURITY_RELEASE_PIPELINE
      == "process")
  script:
  - bundle exec rake 'security:process_security_target_issues'
  stage: security_release:process
