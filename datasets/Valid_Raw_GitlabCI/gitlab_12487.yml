apidoc:
  artifacts:
    expire_in: 1 day
    paths:
    - docs/build/html
  script:
  - cd docs
  - fab make
  stage: test
before_script:
- pip install -r requirements.txt
coverage:
  artifacts:
    expire_in: 1 day
    paths:
    - build
  coverage: /TOTAL.+ ([0-9]{1,3}%)/
  script:
  - nosetests -c .noserc -q --cover-html-dir=build --cover-html
  - coverage report -m
  stage: test
image: python:2.7
pages:
  artifacts:
    paths:
    - public
  before_script:
  - 'true'
  dependencies:
  - coverage
  - apidoc
  script:
  - mkdir -p public/coverage
  - cp -fr docs/build/html/* public/
  - cp -fr build/* public/coverage/
  stage: deploy
runTest:
  script:
  - nosetests -sx
  stage: test
stages:
- test
- deploy
