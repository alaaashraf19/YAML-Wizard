before_script:
- time npm prune && exit 0
- time npm install
cache:
  key: $CI_BUILD_REF_NAME
  paths:
  - node_modules
  untracked: true
commonjs:
  artifacts:
    expire_in: 3 days
    paths:
    - build
  only:
  - branches
  script: time npm run build:cjs
  stage: build
docs:
  artifacts:
    expire_in: 3 days
    paths:
    - build
  only:
  - branches
  script: time npm run build:docs
  stage: build
e2e:
  artifacts:
    expire_in: 3 days
    paths:
    - coverage
  only:
  - branches
  script: time echo npm run test:e2e
  stage: acceptance_test
image: node:8
javascript:
  artifacts:
    expire_in: 3 days
    paths:
    - build
  only:
  - branches
  script: time npm run build:js
  stage: build
lint:
  only:
  - branches
  script: time npm run lint
  stage: commit_test
npm_install:
  artifacts:
    paths:
    - node_modules
  only:
  - branches
  script: echo ' '
  stage: init
pages:
  artifacts:
    paths:
    - public
    - build
  environment:
    name: GitLab Pages
    url: https://td7x.gitlab.io/s6
  only:
  - master
  script:
  - mkdir public
  - mv build/docs/* public
  - mv coverage public/coverage
  stage: deploy
stages:
- init
- commit_test
- build
- acceptance_test
- release
- deploy
unit:
  artifacts:
    expire_in: 3 days
    paths:
    - coverage
  only:
  - branches
  script: time npm run test:unit
  stage: commit_test
variables:
  GET_SOURCES_ATTEMPTS: '2'
