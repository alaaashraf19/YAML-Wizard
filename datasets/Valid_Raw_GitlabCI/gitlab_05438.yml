.deploy_review_template:
  before_script: &id009
  - "set -e\n\nfunction set_if_not_empty() {\n  key=\"$1\"\n  val=\"$2\"\n  if [ -n\
    \ \"$val\" ]; then\n    echo \" --set $key=$val\"\n  fi\n}\n\nfunction elasticsearch_params()\
    \ {\n  set_if_not_empty elasticsearch.host $ELASTICSEARCH_HOST\n  set_if_not_empty\
    \ elasticsearch.port $ELASTICSEARCH_PORT\n  set_if_not_empty elasticsearch.username\
    \ $ELASTICSEARCH_USERNAME\n  set_if_not_empty elasticsearch.password $ELASTICSEARCH_PASSWORD\n\
    \  set_if_not_empty elasticsearch.tls $ELASTICSEARCH_TLS\n}\n\nfunction deploy()\
    \ {\n  export namespace=\"$1\"\n  export release=\"$2\"\n  touch values.yaml\n\
    \  export host=$(echo $CI_ENVIRONMENT_URL | sed 's/^https\\?:\\/\\/\\(.*\\)/\\\
    1/')\n  kubectl describe namespace/$namespace || \\\n    kubectl create namespace\
    \ $namespace\n\n  export image_secret_name=\n  export REGISTRY_IMAGE=\"$(eval\
    \ echo \\$${DEPLOY_REGISTRY}_IMAGE)\"\n  export REGISTRY_USER=\"$(eval echo \\\
    $${DEPLOY_REGISTRY}_USER)\"\n  export REGISTRY_PASSWORD=\"$(eval echo \\\"\\$${DEPLOY_REGISTRY}_PASSWORD\\\
    \")\"\n  if [ \"$DEPLOY_REGISTRY\" = \"CI_REGISTRY\" ]; then\n    if [ \"$CI_PROJECT_VISIBILITY\"\
    \ = \"public\" ]; then\n      export DEPLOY_REGISTRY_AUTH=\n    elif [ -n \"$CI_REGISTRY_USER_PERMANENT\"\
    \ -a -n \"$CI_REGISTRY_PASSWORD_PERMANENT\" ]; then\n      export REGISTRY_USER=\"\
    $CI_REGISTRY_USER_PERMANENT\n      export REGISTRY_PASSWORD=\"$CI_REGISTRY_PASSWORD_PERMANENT\n\
    \    fi\n  fi\n  if [ -n \"$DEPLOY_REGISTRY_AUTH\" ]; then\n    export image_secret_name=registry\n\
    \    kubectl create secret --namespace $namespace \\\n      docker-registry $image_secret_name\
    \ \\\n      --docker-server=$REGISTRY_IMAGE \\\n      --docker-username=$REGISTRY_USER\
    \ \\\n      --docker-password=\"$REGISTRY_PASSWORD\" \\\n      --docker-email=$GITLAB_USER_EMAIL\
    \ \\\n      -o yaml --dry-run | \\\n        kubectl replace --namespace $namespace\
    \ --force -f -\n  fi\n\n  export tls_settings=\n  if [ -n \"$TLS_KEY\" ] && [\
    \ -n \"$TLS_CRT\" ]; then\n    tls_tmpdir=$(mktemp -d)\n    echo \"$TLS_KEY\"\
    \ > $tls_tmpdir/tls.key\n    echo \"$TLS_CRT\" > $tls_tmpdir/tls.crt\n    kubectl\
    \ create secret --namespace $namespace \\\n      tls https \\\n      --key $tls_tmpdir/tls.key\
    \ \\\n      --cert $tls_tmpdir/tls.crt \\\n      -o yaml --dry-run | \\\n    \
    \    kubectl replace --namespace $namespace --force -f -\n    export tls_settings=\"\
    --set http.tlsSecret=https\"\n    rm -rf $tls_tmpdir\n  fi\n\n  helm init --client-only\n\
    \  helm repo update\n  helm dependency update ./chart/mist/\n\n  helm upgrade\
    \ --install --namespace $namespace \\\n    --wait --timeout=600 \\\n    -f values.yaml\
    \ \\\n    --set image.tag=\"$CI_COMMIT_SHA\" \\\n    --set image.registry=\"$REGISTRY_IMAGE\"\
    \ \\\n    --set image.pullPolicy=IfNotPresent \\\n    --set image.secrets[0].name=\"\
    $image_secret_name\" \\\n    --set http.host=\"$host\" \\\n    --set stripe.publicApiKey=\"\
    $STRIPE_PUBLIC_APIKEY\" \\\n    --set stripe.secretApiKey=\"$STRIPE_SECRET_APIKEY\"\
    \ \\\n    --set docker.host=\"$DOCKER_HOST\" \\\n    --set docker.port=\"$DOCKER_PORT\"\
    \ \\\n    --set docker.key=\"$DOCKER_KEY\" \\\n    --set docker.cert=\"$DOCKER_CERT\"\
    \ \\\n    --set docker.ca=\"$DOCKER_CA\" \\\n    --set awsAccessKey=\"$AWS_ACCESS_KEY\"\
    \ \\\n    --set awsSecretKey=\"$AWS_SECRET_KEY\" \\\n    $tls_settings \\\n  \
    \  $(elasticsearch_params) \\\n    $release ./chart/mist/\n  apk add --no-cache\
    \ curl\n  echo \"Waiting for environment to be ready...\"\n  while kubectl --namespace\
    \ $namespace get pods -l release=$release | grep -v -e NAME -e Running -e Completed\
    \ -e Evicted -e OutOfcpu; do\n    sleep 10 && echo '.'\n  done\n  while !(curl\
    \ -sSLf \"$CI_ENVIRONMENT_URL\" >/dev/null); do\n    sleep 5 && echo 'Environment\
    \ not ready yet...'\n  done\n}\n"
  dependencies: &id010 []
  image: dtzar/helm-kubectl:2.10.0
  script: &id011
  - echo "$values" > values.yaml
  - deploy $namespace $release
  stage: deploy
  variables: &id018
    namespace: $CI_PROJECT_NAME
    release: $CI_PROJECT_NAME-$CI_COMMIT_REF_SLUG
    values: "http:\n  tlsSecret: tls-wildcard-review-mist-io\n  tlsHosts:\n    - '*.review.mist.io'\n\
      \  tlsAnnotations:\n    certmanager.k8s.io/cluster-issuer: letsencrypt-prod\n\
      \    certmanager.k8s.io/acme-challenge-type: dns01\n    certmanager.k8s.io/acme-dns01-provider:\
      \ mist-dns\nenableDevUsers: false\nsmtp:\n  host: smtp.sendgrid.net\n  port:\
      \ 2525\n  starttls: true\n  username: apikey\n  password: $SENDGRID_PASSWORD\n"
