discover submodules:
  artifacts:
    expire_in: 10 days
    paths:
    - submodules.csv
  before_script:
  - apk add --no-cache git
  dependencies: []
  image: alpine:3.7
  script:
  - "git submodule status --recursive | \\\n  sed 's/^[ +-]\\([0-9a-f]*\\) \\([^ ]*\\\
    ).*$/\\1,\\2/' > submodules.csv\n"
  stage: discover
prerelease:
  before_script: &id019
  - apk add --no-cache curl jq
  dependencies: &id020 []
  image: python:2.7-alpine
  only:
  - /^v\d+\.\d+\.\d+-.+$/
  script: &id021
  - API_URL="https://gitlab.com/api/v4/projects/$CI_PROJECT_ID"
  - TAG_URL="$API_URL/repository/tags/$CI_COMMIT_TAG"
  - 'req() { curl -sSLf -H "Private-Token: $GITLAB_API_TOKEN" "$@"; }'
  - "if [ \"$(req $TAG_URL | jq -r '.release')\" = \"null\" ]; then\n  echo \"Release\
    \ doesn't already exist, will create.\"\n  METHOD=POST\nelse\n  echo \"Release\
    \ already exists, will update.\"\n  METHOD=PUT\nfi\n"
  - req -X $METHOD "$TAG_URL/release" --data-urlencode "description=$RELEASE_NOTES"
  - echo "Successfully updated gitlab release notes."
  stage: release
  variables:
    RELEASE_ARGS: --prerelease
  when: manual
release:
  before_script: *id019
  dependencies: *id020
  image: python:2.7-alpine
  only:
  - tags
  script: *id021
  stage: release
  variables:
    GIT_STRATEGY: none
    RELEASE_NOTES: '## Installation


      Download the [docker-compose file]($CI_PROJECT_URL/builds/artifacts/$CI_COMMIT_REF_NAME/raw/artifacts/docker-compose.yml?job=compose),

      save it as `docker-compose.yml` and and run `docker-compose up -d`.


      Also see the [README]($CI_PROJECT_URL/blob/master/README.md) instructions.

      '
  when: manual
retag landing: *id022
retag tests: *id022
retag ui: *id022
