.dind_template:
  before_script: &id012
  - "export REGISTRIES=\"\"\n\n# Login to gitlab docker registry.\nif [ -n \"$CI_REGISTRY_IMAGE\"\
    \ ]; then\n  echo \"Logging in to gitlab registry.\"\n  docker login -u \"$CI_REGISTRY_USER\"\
    \ -p \"$CI_REGISTRY_PASSWORD\" \\\n    $CI_REGISTRY\n  export REGISTRIES=\"$REGISTRIES\
    \ $CI_REGISTRY_IMAGE\"\n  echo \"Logged in to gitlab registry.\"\nelse\n  echo\
    \ \"No credentials provided for gitlab registry, skipping.\"\nfi\n\n# Login to\
    \ other registry.\nif [ -n \"$EXT_REGISTRY\" ] && \\\n   [ -n \"$EXT_REGISTRY_IMAGE\"\
    \ ] && \\\n   [ -n \"$EXT_REGISTRY_USER\" ] && \\\n   [ -n \"$EXT_REGISTRY_PASSWORD\"\
    \ ]\nthen\n  echo \"Logging in to $EXT_REGISTRY.\"\n  docker login -u \"$EXT_REGISTRY_USER\"\
    \ -p \"$EXT_REGISTRY_PASSWORD\" \\\n    \"$EXT_REGISTRY\"\n  export REGISTRIES=\"\
    $REGISTRIES $EXT_REGISTRY_IMAGE\"\n  echo \"Logged in to $EXT_REGISTRY.\"\nelse\n\
    \  echo \"No credentials provided for external registry, skipping.\"\nfi\n\n#\
    \ Login to dockerhub.\nif [ -n \"$DOCKERHUB_IMAGE\" ] && \\\n   [ -n \"$DOCKERHUB_USER\"\
    \ ] && \\\n   [ -n \"$DOCKERHUB_PASSWORD\" ]\nthen\n  echo \"Logging in to dockerhub.\"\
    \n  docker login -u \"$DOCKERHUB_USER\" -p \"$DOCKERHUB_PASSWORD\"\n  export REGISTRIES=\"\
    $REGISTRIES $DOCKERHUB_IMAGE\"\n  echo \"Logged in to dockerhub.\"\nelse\n  echo\
    \ \"No credentials provided for dockerhub, skipping.\"\nfi\n\n# Check if any registry\
    \ configured.\nif [ -z \"$REGISTRIES\" ]; then\n  echo \"No registries configured,\
    \ exiting.\"\n  exit 1\nfi\n"
  - "function docker_pull() {\n  # docker_pull <img> : Will retry several times to\
    \ pull image.\n  img=$1\n  tries=60\n  sleep=10\n  echo \"Will try to pull image\
    \ $img ($tries tries, ${sleep}s sleep).\"\n  for i in $(seq 1 $tries); do\n  \
    \  if docker pull $img; then\n      echo \"Image $img pulled successfully!\"\n\
    \      return 0\n    fi\n    sleep $sleep\n  done\n  echo \"Failed too pull image\
    \ $img.\"\n  return 1\n}\n"
  - "function docker_push() {\n  # docker_push <src> <dest>: Retag and push image\n\
    \  # <src> must be the full name of a local image.\n  # <dest> must be just the\
    \ image identifier, registry and tag will be\n  # added automatically.\n  tags=\"\
    $CI_COMMIT_SHA $CI_COMMIT_REF_SLUG\"\n  if [ \"$CI_COMMIT_REF_NAME\" = \"master\"\
    \ ]; then\n    tags=\"$tags latest\"\n  fi\n  src=$1\n  for registry in $REGISTRIES;\
    \ do\n    for tag in $tags; do\n      dest=\"$registry/$2:$tag\"\n      echo \"\
    Tagging image $src as $dest...\"\n      docker tag $src $dest\n      echo \"Pushing\
    \ image $dest...\"\n      docker push $dest\n    done\n  done\n}\n"
  - "function get_submodule_sha() {\n  cat submodules.csv | grep \",$1$\" | cut -d,\
    \ -f1\n}\n"
  - "function docker_retag_submodule() {\n  repo=$1\n  img=$2\n  src_img=\"$img:$(get_submodule_sha\
    \ $repo)\"\n  docker_pull $src_img\n  docker_push $src_img $repo\n}\n"
  dependencies: &id016
  - discover submodules
  image: docker:git
  retry: 2
  services: &id013
  - docker:dind
  stage: build
  tags: &id014
  - cpu
  variables: &id015
    DOCKER_DRIVER: overlay2
    DOCKER_HOST: tcp://localhost:2375
.docker_build_template: &id017
  before_script: *id012
  dependencies: []
  image: docker:git
  retry: 2
  script:
  - export img=$(echo "$CI_JOB_NAME" | cut -d " " -f2)
  - docker build -t $CI_PROJECT_NAME/$img:$CI_COMMIT_SHA docker/$img
  - docker_push $CI_PROJECT_NAME/$img:$CI_COMMIT_SHA $img
  services: *id013
  stage: build
  tags: *id014
  variables: *id015
.docker_retag_template: &id022
  before_script: *id012
  dependencies: *id016
  image: docker:git
  retry: 2
  script:
  - export arg1=$(echo "$CI_JOB_NAME" | cut -d " " -f2)
  - export arg2=$(echo "$CI_JOB_NAME" | cut -d " " -f3)
  - export img="${SUBMODULES_IMAGE:-mist}/${arg1}"
  - export submodule="${arg2:-$arg1}"
  - echo "Will retag image $img from submodule $submodule."
  - docker_retag_submodule $submodule $img
  services: *id013
  stage: build
  tags: *id014
  variables:
    DOCKER_DRIVER: overlay2
    DOCKER_HOST: tcp://localhost:2375
    GIT_STRATEGY: none
