.run_benchmark:
  artifacts: &id003
    paths:
    - .benchmarks
    - prof
  script: &id004
  - apt-get -qq update
  - apt-get -y -qq install graphviz inxi > /dev/null
  - inxi -c0 -v3
  - pip install tox
  - tox
  stage: benchmark
  tags: &id005
  - docker
.run_tox:
  script: &id001
  - pip install tox
  - tox
  stage: test
  tags: &id002
  - docker
before_script:
- test -f /usr/local/bin/pypy && ln -s pypy /usr/local/bin/python
- test -f /usr/local/bin/pypy3 && ln -s pypy3 /usr/local/bin/python
docs:
  artifacts:
    paths:
    - docs/_build/html
  image: python:3.6
  script: *id001
  stage: test
  tags: *id002
  variables:
    TOXENV: docs
lint:
  image: python:3.6
  script: *id001
  stage: test
  tags: *id002
  variables:
    TOXENV: lint
pages:
  artifacts:
    paths:
    - public
  dependencies:
  - docs
  only:
  - /^v[0-9]+.*/
  script:
  - mv docs/_build/html public
  stage: deploy
