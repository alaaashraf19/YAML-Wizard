job_build:
  artifacts:
    paths:
    - build
  image: node:latest
  only:
  - dev
  - staging
  - master
  script:
  - npm i
  - npm run build
  stage: build
job_deploy:
  environment:
    name: production
  image: ruby:latest
  only:
  - tags
  script:
  - gem install dpl
  - dpl --provider=heroku --api-key=$HEROKU_TOKEN --app=git-production --skip_cleanup
  stage: deploy-production
job_staging:
  environment:
    name: staging
  image: ruby:latest
  only:
  - staging
  - master
  script:
  - gem install dpl
  - dpl --provider=heroku --api-key=$HEROKU_TOKEN --app=git-staging --skip_cleanup
  stage: deploy-staging
job_test:
  image: node:latest
  script:
  - npm i
  - npm test
  stage: test
stages:
- test
- build
- deploy-staging
- deploy-production
