.test:
  script:
  - export TOXENV=''
  stage: test
  tags: &id001
  - docker
pages:
  artifacts:
    paths:
    - public
  image: python:3.9
  script:
  - apt-get install make
  - pip install tox
  - TOXENV=docs tox
  - mv .tox/docs/html public
  tags:
  - docker
test:3.6:
  image: python:3.6
  script:
  - pip install tox
  - TOXENV=py36 tox
  stage: test
  tags: *id001
test:3.7:
  image: python:3.7
  script:
  - pip install tox
  - TOXENV=py37 tox
  stage: test
  tags: *id001
test:3.8:
  image: python:3.8
  script:
  - pip install tox
  - TOXENV=py38 tox
  stage: test
  tags: *id001
test:3.9:
  image: python:3.9
  script:
  - pip install tox
  - TOXENV=py39 tox
  stage: test
  tags: *id001
test:pep8:
  image: python:3.6
  script:
  - pip install tox
  - TOXENV=lint tox
  stage: test
  tags: *id001
test:pypy3:
  image: pypy:3
  script:
  - pip install tox
  - TOXENV=pypy3 tox
  stage: test
  tags: *id001
test_cov:
  image: python:3.9
  script:
  - pip install tox
  - TOXENV=py39-cover tox
  stage: test
  tags: *id001
