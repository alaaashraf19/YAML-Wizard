persist-windows-builds-for-tagged-releases:
  artifacts:
    expire_in: never
    paths:
    - openconnect-installer*.exe
  dependencies:
  - MinGW32/GnuTLS
  - MinGW32/OpenSSL
  - MinGW64/GnuTLS
  - MinGW64/OpenSSL
  rules:
  - if: $CI_COMMIT_TAG != null
  script:
  - echo "Preventing openconnect-installer.exe artifacts from expiring since this
    is a tagged build"
  stage: .post
stages:
- signoff
- static-analysis
- test-first
- test-rest
- coverity
- test-sanitizers
- test-windows
- test-android
static-analyzer/GnuTLS/Fedora:
  artifacts:
    expire_in: 1 week
    paths:
    - scan-build-src/*
    when: always
  except:
  - tags
  - schedules
  image: $CI_REGISTRY/$BUILD_IMAGES_PROJECT:$FEDORA_BUILD
  script:
  - ./autogen.sh
  - scan-build ./configure
  - scan-build --status-bugs -o scan-build-src make -j4
  stage: static-analysis
  tags:
  - saas-linux-small-amd64
static-analyzer/OpenSSL/Fedora:
  artifacts:
    expire_in: 1 week
    paths:
    - scan-build-src/*
    when: on_failure
  except:
  - tags
  - schedules
  image: $CI_REGISTRY/$BUILD_IMAGES_PROJECT:$FEDORA_BUILD
  script:
  - ./autogen.sh
  - scan-build ./configure --without-gnutls --with-openssl --without-openssl-version-check
  - scan-build --status-bugs -o scan-build-src make -j4
  stage: static-analysis
  tags:
  - saas-linux-small-amd64
ubsan/GnuTLS/Fedora:
  artifacts:
    expire_in: 1 week
    paths:
    - ./*.log
    - tests/*.log
    when: on_failure
  except:
  - tags
  - schedules
  image: $CI_REGISTRY/$BUILD_IMAGES_PROJECT:$FEDORA_BUILD
  script:
  - ./autogen.sh
  - export UBCFLAGS="-Wall -Wextra -fsanitize=undefined -fsanitize=bool -fsanitize=alignment
    -fsanitize=null -fsanitize=bounds-strict -fsanitize=enum -fno-sanitize-recover
    -g -O2"
  - CFLAGS="$UBCFLAGS" ./configure --with-java --disable-dsa-tests --without-gnutls-version-check
  - make -j4
  - make VERBOSE=1 -j4 check
  stage: test-sanitizers
  tags:
  - saas-linux-small-amd64
