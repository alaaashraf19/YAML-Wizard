Signoff:
  script:
  - 'echo "Checking for new commits without Signed-off-by: tags as described in https://www.infradead.org/openconnect/contribute.html"'
  - git log ceab1765db11c15a18a0c605812dbc11afd63e8b.. --grep "(^Signed-off-by)|(^Merge
    branch)|(^This reverts commit)" --extended-regexp --invert-grep --exit-code
  - echo "None (good)"
  stage: signoff
