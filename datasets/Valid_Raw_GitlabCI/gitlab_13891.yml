  - schedules
  image: $CI_REGISTRY/$BUILD_IMAGES_PROJECT:$CENTOS7_BUILD
  script:
  - ./autogen.sh
  - ./configure --with-java --enable-ppp-tests --disable-flask-tests CFLAGS=-g
