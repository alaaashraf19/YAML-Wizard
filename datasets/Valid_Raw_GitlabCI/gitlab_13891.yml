  - CFLAGS="$UBCFLAGS" ./configure --without-gnutls --with-openssl --without-openssl-version-check
    --disable-dsa-tests
  - make -j4
  - make VERBOSE=1 XFAIL_TESTS="auth-swtpm obsolete-server-crypto" -j4 check
  stage: test-sanitizers
  tags:
  - saas-linux-small-amd64
