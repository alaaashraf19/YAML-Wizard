lint:
  image: python:3
  script:
  - pip install pre-commit
  - pre-commit run --all-files --show-diff-on-failure
publish:
  image: python:3
  needs:
  - test
  - lint
  rules:
  - changes:
    - stqe/__about__.py
    if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PROJECT_PATH == "rh-kernel-stqe/python-stqe"
  script:
  - pip install hatch
  - hatch build
  - hatch publish
test:
  image: fedora:latest
  script:
  - dnf install -y python3-pip python3.6 python3.9 python3.11
  - python3 -m pip install nox virtualenv==20.21.1
  - nox
