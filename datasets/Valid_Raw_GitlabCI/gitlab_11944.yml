before_script:
- apt-get update && apt-get install -y build-essential pulseaudio libpulse-dev libx11-dev
  libxrandr-dev libxext-dev libxi-dev libgl1-mesa-glx libgl1-mesa-dev libwayland-dev
  libwayland-egl-backend-dev libasound2-dev cmake
- gcc --version
- g++ --version
- ldd --version
- cmake --version
- echo ${CI_COMMIT_TAG}
- echo ${CI_COMMIT_SHA}
build-linux:
  artifacts:
    name: ia_linux_x64_${CI_COMMIT_TAG}
    paths:
    - ia_linux_x64_${CI_COMMIT_TAG}
  only:
  - tags
  script:
  - ./build-release.sh
  - ./run-tests.sh
  - mv build/target/ia ia_linux_x64_${CI_COMMIT_TAG}
  stage: build
build-windows:
  artifacts:
    name: ia_windows_x64_${CI_COMMIT_TAG}
    paths:
    - ia_windows_x64_${CI_COMMIT_TAG}
  only:
  - tags
  script:
  - apt-get update && apt-get install -y mingw-w64
  - ./build-release-windows-cross-compile.sh
  - mv build/target/ia ia_windows_x64_${CI_COMMIT_TAG}
  stage: build
image: debian:bullseye
