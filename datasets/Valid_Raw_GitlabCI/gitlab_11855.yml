browser_test:
  artifacts:
    expire_in: 7 days
    paths:
    - ./storage/logs
    - ./tests/Browser/screenshots
    - ./tests/Browser/console
    when: always
  script:
  - apt-get update && apt-get install -y php8.2-mailparse
  - cp .env.dusk.ci .env
  - composer install
  - configure-laravel
  - start-nginx-ci-project
  - php artisan mailcare:email-receive tests/storage/email_with_attachment.eml
  - chmod -R 777 storage/app/emails/
  - php artisan dusk --colors --env=dusk.ci
  services:
  - mysql:5.7
  stage: test
  variables:
    DB_CONNECTION: mysql
    DB_HOST: mysql
    MYSQL_DATABASE: homestead
    MYSQL_PASSWORD: secret
    MYSQL_ROOT_PASSWORD: root
    MYSQL_USER: homestead
image: chilio/laravel-dusk-ci:php-8.2
stages:
- test
test_coding_standard:
  script:
  - apt-get update && apt-get install -y php8.2-mailparse
  - cp .env.example .env
  - composer install
  - vendor/bin/phpcs . --ignore="*/vendor/*,*/node_modules/*,*/public/*,*/database/*,*/autoload.php,*/cache/*,*/*.blade.php,*/storage/*,*/tests/*"
    --standard=PSR2
  stage: test
test_coverage:
  script:
  - apt-get update && apt-get install -y php8.2-mailparse
  - cp .env.example .env
  - composer install
  - php artisan key:generate
  - vendor/bin/phpunit --coverage-text --colors=never
  stage: test
unit_test:
  script:
  - apt-get update && apt-get install -y php8.2-mailparse
  - cp .env.example .env
  - composer install
  - php artisan key:generate
  - vendor/bin/phpunit
  stage: test
