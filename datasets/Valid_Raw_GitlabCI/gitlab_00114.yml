before_script:
- dnf --setopt=cachedir=`pwd`/dnf-cache --quiet --refresh --assumeyes install $BUILDTOOLS_PKGS
  $GLIB2_PKGS $GSIGNOND_PKG $LIBS_PKGS $DOCGEN_PKGS $GIR_PKGS $CI_PKGS $LOCALE_PKGS
build_x86-64:
  artifacts:
    paths:
    - ./
  script:
  - meson build -Db_coverage=true
  - cd build
  - ninja
  stage: build
cache:
  key: dnf-cache
  paths:
  - dnf-cache/
image: fedora:26
pages:
  artifacts:
    paths:
    - public
  dependencies:
  - test_x86-64
  only:
  - tags
  - master@accounts-sso/gsignond-plugin-sasl
  script:
  - cd build
  - ninja install
  - cd ..
  - mkdir public
  - cp -a build/docs/html/* public
  stage: deploy
test_x86-64:
  artifacts:
    paths:
    - ./
  dependencies:
  - build_x86-64
  script:
  - cd build
  - ninja test
  - ninja coverage-html
  stage: test
variables:
  BUILDTOOLS_PKGS: meson gcc redhat-rpm-config
  CI_PKGS: pkgconfig(check) lcov
  DOCGEN_PKGS: pkgconfig(gtk-doc)
  GIR_PKGS: pkgconfig(gobject-introspection-1.0)
  GLIB2_PKGS: pkgconfig(glib-2.0) pkgconfig(gobject-2.0)
  GSIGNOND_PKG: pkgconfig(gsignond)
  LIBS_PKGS: pkgconfig(libgsasl)
  LOCALE_PKGS: langpacks-en
