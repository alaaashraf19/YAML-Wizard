flash-cx3:cmake:
  image: clemolgatsbr/qibuild:latest
  script:
  - cd flash-cx3
  - mkdir build && cd build
  - cmake ..
  - make
  stage: build
flash-cx3:qibuild:
  image: clemolgatsbr/qibuild:latest
  script:
  - cd flash-cx3
  - qibuild init
  - qibuild configure --release
  - qibuild make
  stage: build
flash-cx3:robot:
  image: clemolgatsbr/qibuild:latest
  script:
  - (cd toolchain && ./install_toolchain.sh)
  - cd flash-cx3
  - qibuild init
  - qibuild configure -c robot --release
  - qibuild make -c robot
  stage: build
