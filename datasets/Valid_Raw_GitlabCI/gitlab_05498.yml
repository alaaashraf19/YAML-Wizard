pages:
  artifacts:
    paths:
    - public
  image: clemolgatsbr/qibuild:latest
  only:
  - master
  script:
  - cd test-firmware
  - mkdir build && cd build
  - cmake -DENABLE_DOC=ON ..
  - make doxygen
  - mv doc/html/ ../../public/
  stage: doc
stages:
- build
- doc
