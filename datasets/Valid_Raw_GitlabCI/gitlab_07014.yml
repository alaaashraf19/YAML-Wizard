.tests:
  before_script:
  - apt-get update -y
  - DEBIAN_FRONTEND=noninteractive apt-get -o Acquire::Retires=10 install --no-install-recommends
    -qq qemu-system-x86 openssh-client sshpass
  - mkdir ~/.ssh
  - mv id_rsa ~/.ssh/id_rsa
  - printf '%s\n\t' 'Host *' 'ServerAliveInterval 15' 'UserKnownHostsFile /dev/null'
    'StrictHostKeyChecking no' 'CheckHostIP no' > ~/.ssh/config
  - qemu-system-x86_64 -m 512 -daemonize -drive file=debian-12-nocloud-amd64.qcow2,if=virtio
    -net nic -net user,hostfwd=tcp::10022-:22 -display none -vga none -serial file:/tmp/serial
  - tail -f /tmp/serial &
  - sleep 120
  - scp -P 10022 vps2arch root@127.0.0.1:vps2arch
  - ssh -p 10022 root@127.0.0.1 "chmod +x vps2arch"
  cache:
    paths:
    - debian-12-nocloud-amd64.qcow2
    - id_rsa
    policy: pull
  dependencies:
  - build
  retry: 1
  stage: test
.tests_uefi:
  before_script:
  - apt-get update -y
  - DEBIAN_FRONTEND=noninteractive apt-get -o Acquire::Retires=10 install --no-install-recommends
    -qq qemu-system-x86 openssh-client ovmf sshpass
  - mkdir ~/.ssh
  - mv id_rsa ~/.ssh/id_rsa
  - printf '%s\n\t' 'Host *' 'ServerAliveInterval 15' 'UserKnownHostsFile /dev/null'
    'StrictHostKeyChecking no' 'CheckHostIP no' > ~/.ssh/config
  - qemu-system-x86_64 -m 512 -daemonize -bios /usr/share/OVMF/OVMF_CODE.fd -drive
    file=debian-12-nocloud-amd64.qcow2,if=virtio -net nic -net user,hostfwd=tcp::10022-:22
    -display none -vga none -serial file:/tmp/serial
  - tail -f /tmp/serial &
  - sleep 120
  - scp -P 10022 vps2arch root@127.0.0.1:vps2arch
  - ssh -p 10022 root@127.0.0.1 "chmod +x vps2arch"
  cache:
    paths:
    - debian-12-nocloud-amd64.qcow2
    - id_rsa
    policy: pull
  dependencies:
  - build
  retry: 1
  stage: test
build:
  after_script:
  - mv ~/.ssh/id_rsa id_rsa
  before_script:
  - apt-get update -y
  - DEBIAN_FRONTEND=noninteractive apt-get -o Acquire::Retires=10 install --no-install-recommends
    -qq libguestfs-tools busybox linux-image-amd64 gnupg1 openssh-client
  - ssh-keygen -q -N '' -f ~/.ssh/id_rsa
  cache:
    paths:
    - debian-12-nocloud-amd64.qcow2
    - id_rsa
    policy: push
  script:
  - curl -fOL https://cdimage.debian.org/cdimage/cloud/bookworm/latest/debian-12-nocloud-amd64.qcow2
  - qemu-img create -f qcow2 -o preallocation=metadata newdisk.qcow2 4G
  - LIBGUESTFS_BACKEND=direct virt-resize --expand /dev/sda1 debian-12-nocloud-amd64.qcow2
    newdisk.qcow2
  - mv newdisk.qcow2 debian-12-nocloud-amd64.qcow2
  - LIBGUESTFS_BACKEND=direct virt-customize -a debian-12-nocloud-amd64.qcow2 --root-password
    password:root --ssh-inject root --install wget,ca-certificates,openssh-server
    --firstboot-command "dpkg-reconfigure -f noninteractive openssh-server"
  stage: build
image: debian:stable
test_default:
  extends: .tests
  script:
  - ssh -p 10022 root@127.0.0.1 "./vps2arch && sync ; reboot -f" || true
  - sleep 600
  - sshpass -proot ssh -p 10022 root@127.0.0.1 test -f /etc/arch-release
test_default_uefi:
  extends: .tests_uefi
  script:
  - ssh -p 10022 root@127.0.0.1 "./vps2arch && sync ; reboot -f" || true
  - sleep 600
  - sshpass -proot ssh -p 10022 root@127.0.0.1 test -f /etc/arch-release
test_netctl:
  extends: .tests
  script:
  - ssh -p 10022 root@127.0.0.1 "./vps2arch -n netctl && sync ; reboot -f" || true
  - sleep 600
  - sshpass -proot ssh -p 10022 root@127.0.0.1 test -f /etc/arch-release
test_syslinux:
  extends: .tests
  script:
  - ssh -p 10022 root@127.0.0.1 "./vps2arch -b syslinux && sync ; reboot -f" || true
  - sleep 600
  - sshpass -proot ssh -p 10022 root@127.0.0.1 test -f /etc/arch-release
