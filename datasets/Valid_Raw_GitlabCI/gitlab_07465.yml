pages:
  artifacts:
    paths:
    - public
  script:
  - apt-get update
  - apt-get install -y npm python3-yaml inkscape fonts-roboto-slab fonts-noto-core
    fonts-noto-cjk zopfli iso-codes
  - npm install -g svgo
  - pushd badge
  - ./1-translate-svg.py
  - ./2-optimize-svg.sh
  - ./3-export-png.sh
  - ./4-copy.sh
  - ./5-check.py
  - popd
  - mkdir public
  - cp -r badge public/
  stage: deploy
reuse:
  image:
    entrypoint:
    - ''
    name: fsfe/reuse:latest
  script:
  - reuse lint
