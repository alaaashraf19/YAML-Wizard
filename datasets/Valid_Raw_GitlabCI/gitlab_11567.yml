build_userguide:
  artifacts:
    paths:
    - public
  script:
  - sphinx-build -W doc/userguide/ public
  stage: build
compile_library:
  artifacts:
    paths:
    - build
  script:
  - autoreconf -i
  - mkdir build
  - cd build
  - ../configure
  - make
  - make check
  - make install
  stage: build
image: registry.gitlab.com/libvdwxc/libvdwxc
pages:
  artifacts:
    paths:
    - public
  only:
  - master
  script:
  - ls -l public/
  - chmod go-rwX -R public/
  stage: deploy
