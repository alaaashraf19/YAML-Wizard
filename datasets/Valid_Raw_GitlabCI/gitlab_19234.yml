image: registry.gitlab.com/paddy-hack/nikola
pages:
  artifacts:
    paths:
    - public
  before_script:
  - nikola --version
  only:
  - master
  script:
  - nikola theme -i hack
  - OPTIMUM_SHELL_RELEASE=1 nikola build
  - mkdir public && mv output/* public
test:
  before_script:
  - nikola --version
  script:
  - nikola theme -i hack
  - OPTIMUM_SHELL_RELEASE=1 nikola build
