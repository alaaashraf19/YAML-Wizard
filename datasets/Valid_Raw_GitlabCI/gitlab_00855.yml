image: alpine:latest
ipax:
  only:
  - master
  script:
  - apk --no-cache add lftp
  - lftp -c "set ftp:ssl-allow no; open -u $FTP_USERNAME,$FTP_PASSWORD $HOST; mirror
    -Rnev ./public . --ignore-time --parallel=10"
  stage: deploy
pages:
  artifacts:
    paths:
    - public
  only:
  - master
  script:
  - echo 'Nothing to do...'
  stage: deploy
