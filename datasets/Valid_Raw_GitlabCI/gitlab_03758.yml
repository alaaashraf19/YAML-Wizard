before_script:
- yarn
build:
  artifacts:
    paths:
    - binary/*
  script:
  - yarn babel
  - yarn artifacts
  stage: build
image: node:8.12-alpine
publish:
  before_script:
  - ''
  image: inetprocess/gitlab-release
  only:
  - tags
  script: gitlab-release --message "$CI_BUILD_TAG" binary/Scraper.exe binary/Scraper.exe.sha256
  stage: publish
stages:
- test
- build
- publish
test:
  script:
  - yarn test
  stage: test
