.job_template:
  artifacts: &id001
    expire_in: 1 week
    paths:
    - build
    - super-tux-party-sources.zip
  interruptible: true
  only: &id002
  - dev@SuperTuxParty/SuperTuxParty
  - tags
build:linux:
  artifacts: *id001
  interruptible: true
  only: *id002
  script:
  - mkdir build
  - godot --headless --export-release "Linux Client" "build/supertuxparty"
  stage: build_and_test
build:osx:
  artifacts: *id001
  interruptible: true
  only: *id002
  script:
  - mkdir build
  - godot --headless --export-release "Mac OSX Client" "build/supertuxparty.app"
  stage: build_and_test
build:plugins:
  artifacts: *id001
  interruptible: true
  only: *id002
  script:
  - mkdir -p build/plugins
  - godot --headless --export-release "Resources" "build/plugins/default.pck"
  stage: build_and_test
build:server:
  artifacts: *id001
  interruptible: true
  only: *id002
  script:
  - mkdir build
  - godot --headless --export-release "Linux Server" "build/supertuxparty_server.pck"
  - wget -O godot_linux_server.zip 'https://downloads.tuxfamily.org/godotengine/3.3.2/Godot_v3.3.2-stable_linux_server.64.zip'
  - unzip godot_linux_server.zip
  - mv Godot_v3.3.2-stable_linux_server.64 build/supertuxparty_server
  stage: build_and_test
build:sources:
  artifacts: *id001
  interruptible: true
  only:
  - dev@SuperTuxParty/SuperTuxParty
  - tags
  script:
  - zip -r super-tux-party-sources.zip *
  stage: build_and_test
build:windows:
  artifacts: *id001
  interruptible: true
  only: *id002
  script:
  - mkdir build
  - godot --headless --export-release "Windows Desktop" "build/Supertuxparty.exe"
  stage: build_and_test
deploy_nightly:
  before_script:
  - apt-get update && apt-get install openssh-client -y
  - eval $(ssh-agent -s)
  - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
  - mkdir -p ~/.ssh
  - chmod 700 ~/.ssh
  - echo "$SSH_KNOWN_HOSTS" >> ~/.ssh/known_hosts
  - chmod 644 ~/.ssh/known_hosts
  dependencies:
  - build:linux
  - build:windows
  - build:osx
  - build:plugins
  - build:server
  - build:sources
  only:
  - dev@SuperTuxParty/SuperTuxParty
  script:
  - mkdir .ci-bin && cd .ci-bin
  - wget -O butler.zip https://broth.itch.ovh/butler/linux-amd64/LATEST/archive/default
  - unzip butler.zip
  - chmod +x butler
  - cd ..
  - export PATH=$(realpath .ci-bin):$PATH
  - chmod +x release.sh
  - ./release.sh nightly $CI_COMMIT_SHORT_SHA
  stage: deploy
deploy_release:
  before_script:
  - apt-get update && apt-get install openssh-client -y
  - eval $(ssh-agent -s)
  - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
  - mkdir -p ~/.ssh
  - chmod 700 ~/.ssh
  - echo "$SSH_KNOWN_HOSTS" >> ~/.ssh/known_hosts
  - chmod 644 ~/.ssh/known_hosts
  dependencies:
  - build:linux
  - build:windows
  - build:osx
  - build:plugins
  - build:server
  - build:sources
  only:
  - tags
  script:
  - mkdir .ci-bin && cd .ci-bin
  - apt -qq update && apt -qq install -y curl
  - wget -O butler.zip https://broth.itch.ovh/butler/linux-amd64/LATEST/archive/default
  - unzip butler.zip
  - chmod +x butler
  - cd ..
  - export PATH=$(realpath .ci-bin):$PATH
  - chmod +x release.sh
  - ./release.sh release $CI_COMMIT_REF_NAME
  stage: deploy
image: barichello/godot-ci:4.2
license_test:
  before_script:
  - pip install tqdm
  except:
  - tags
  image: python:latest
  interruptible: true
  script:
  - python check_license.py
  stage: build_and_test
stages:
- build_and_test
- deploy
