deploy:
  only:
  - master
  script:
  - pip install --user --upgrade pip setuptools wheel twine
  - python setup.py sdist bdist_wheel
  - python -m twine upload -u $PYPI_USERNAME -p $PYPI_PASSWORD dist/*
  stage: deploy
image: python:3.7
stages:
- test
- deploy
test:
  script:
  - python setup.py test
  stage: test
