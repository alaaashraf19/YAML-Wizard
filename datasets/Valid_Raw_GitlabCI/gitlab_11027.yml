map:
  artifacts:
    paths:
    - output
  image: jonzelner/rstan:latest
  script:
  - make map
  stage: build
pages:
  artifacts:
    paths:
    - public
  dependencies:
  - map
  image: ruby:2.3
  only:
  - master
  script:
  - mkdir -p web/images
  - cp output/hotspot_map.jpg web/images/.
  - gem install jekyll
  - cd web && jekyll build -d ../public
  stage: deploy
