.component-general-rules:
  rules: &id002
  - if: $CI_MERGE_REQUEST_IID
  - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
.ruby-cache:
  cache: &id001
    key:
      files:
      - Gemfile.lock
    paths:
    - vendor/ruby
    policy: pull
.use-ruby:
  before_script:
  - ruby --version
  - gem install bundler --no-document
  - bundle --version
  - bundle install --jobs $(nproc) --retry 3 --quiet
  - bundle check
  cache: *id001
  image: ruby:3.2
  variables:
    BUNDLE_FROZEN: 'true'
    BUNDLE_PATH: vendor
code_quality:
  allow_failure: false
  cache: *id001
  dependencies:
  - setup-test-env
  rules: *id002
  tags:
  - gitlab-org-docker
default:
  tags:
  - gitlab-org
dry-run:custom:
  extends: dry-run:gitlab-triage
  rules:
  - allow_failure: true
    when: manual
dry-run:gitlab-triage:
  extends: .use-ruby
  needs:
  - setup-test-env
  script:
  - bundle exec rake build
  - gem install pkg/*.gem
  - which gitlab-triage
  - gitlab-triage --version
  - gitlab-triage --help
  - gitlab-triage --init
  - gitlab-triage --dry-run --debug --source-id $CI_PROJECT_PATH
  stage: triage
gemnasium-dependency_scanning:
  rules: *id002
include:
- component: gitlab.com/components/code-quality/code-quality@~latest
- component: gitlab.com/components/sast/sast@~latest
- component: gitlab.com/components/secret-detection/secret-detection@~latest
- component: gitlab.com/gitlab-org/components/danger-review/danger-review@~latest
- component: gitlab.com/gitlab-org/components/gem-release/gem-release@~latest
- template: Jobs/Dependency-Scanning.gitlab-ci.yml
rubocop:
  cache:
    key: $CI_JOB_NAME
    paths:
    - .cache/rubocop_cache/
  dependencies:
  - setup-test-env
  extends: .use-ruby
  needs:
  - setup-test-env
  script:
  - bundle exec rubocop --parallel
  stage: test
secret_detection:
  rules: *id002
semgrep-sast:
  rules: *id002
setup-test-env:
  artifacts:
    paths:
    - Gemfile.lock
  cache:
    policy: pull-push
  extends: .use-ruby
  script:
  - echo "Setup done!"
  stage: prepare
specs:
  extends: .use-ruby
  image: $RUBY_IMAGE
  needs:
  - setup-test-env
  parallel:
    matrix:
    - RUBY_IMAGE:
      - ruby:3.0
      - ruby:3.1
      - ruby:3.2
      - ruby:3.3
  script:
  - bundle exec rake spec
  stage: test
stages:
- prepare
- test
- triage
- deploy
workflow:
  rules:
  - if: $CI_MERGE_REQUEST_IID
  - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  - if: $CI_COMMIT_TAG
