build:
  script:
  - docker login -u gitlab-ci-token -p $CI_JOB_TOKEN $CI_REGISTRY
  - docker build --pull --build-arg BUILD_TESTS=ON --build-arg EXTRA_CMAKE_FLAGS="-DCMAKE_CXX_FLAGS=-O1
    -D_FORTIFY_SOURCE=2" -t $CONTAINER_TEST_IMAGE .
  - docker push $CONTAINER_TEST_IMAGE
  stage: build
check_formatting:
  before_script:
  - apt-get update && apt-get install -y clang-format-6.0 git-core
  image: ubuntu:bionic
  script:
  - echo `which clang-format-6.0`
  - ln -s `which clang-format-6.0` /usr/bin/clang-format
  - cd "$CI_PROJECT_DIR"
  - export CLANG_FORMAT_SINCE_COMMIT="4b825dc642cb6eb9a060e54bf8d69288fbee4904"
  - export CLANG_FORMAT_DIRS="."
  - linter_errors=$(git-clang-format-6.0 --commit "$CLANG_FORMAT_SINCE_COMMIT" -q
    --diff --style file --extensions c,cc,cpp,cxx,h  "$CLANG_FORMAT_DIRS" | grep -v
    --color=never "no modified files to format" || true)
  - echo "$linter_errors"
  - if [[ ! -z "$linter_errors" ]]; then echo "Detected formatting issues; please
    fix"; exit 1; else echo "Formatting is correct"; exit 0; fi
  stage: build
e2e:
  before_script:
  - export DOCKER_SOCKET="/var/run/docker.sock"
  - export DOCKER_HOST="unix://$DOCKER_SOCKET"
  - export E2E_IMAGE="registry.gitlab.com/buildgrid/buildbox/buildbox-e2e/new-e2e"
  - DOCKER_TLS_CERTDIR=/certs dockerd-entrypoint.sh &
  - sleep 3
  - docker version
  - docker pull "$E2E_IMAGE"
  dependencies: []
  image: docker:dind
  script:
  - docker run -v "$DOCKER_SOCKET":"$DOCKER_SOCKET" -v $(pwd):/buildbox-e2e/src/buildbox-worker
    "$E2E_IMAGE"
  services: []
  stage: test
image: docker:stable
release-image:
  only:
  - master
  script:
  - docker login -u gitlab-ci-token -p $CI_JOB_TOKEN $CI_REGISTRY
  - docker build -t $CONTAINER_RELEASE_IMAGE .
  - docker push $CONTAINER_RELEASE_IMAGE
  stage: release
services:
- docker:dind
stages:
- build
- test
- release
tests:
  script:
  - docker login -u gitlab-ci-token -p $CI_JOB_TOKEN $CI_REGISTRY
  - docker pull $CONTAINER_TEST_IMAGE
  - docker run -w /buildbox-worker/build $CONTAINER_TEST_IMAGE sh -c 'ctest -V'
  stage: test
trigger_e2e_rebuild:
  image: ubuntu:bionic
  only:
  - master
  script:
  - apt-get update && apt-get install -y curl
  - curl --request POST --form "token=$CI_JOB_TOKEN" --form ref=master https://gitlab.com/api/v4/projects/buildgrid%2Fbuildbox%2Fbuildbox-e2e/trigger/pipeline
  stage: release
  variables:
    GIT_STRATEGY: none
variables:
  CONTAINER_RELEASE_IMAGE: $CI_REGISTRY_IMAGE:latest
  CONTAINER_TEST_IMAGE: $CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG
  DOCKER_DRIVER: overlay2
  DOCKER_HOST: tcp://docker:2375
