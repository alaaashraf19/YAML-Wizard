- ro
- ru
- sq
- tr
- uk
- zh_Hans
- zh_Hant
pagination:
  enabled: true
plugins:
- jekyll-include-cache
- jekyll-paginate-v2
- jekyll-redirect-from
- jekyll-fdroid
