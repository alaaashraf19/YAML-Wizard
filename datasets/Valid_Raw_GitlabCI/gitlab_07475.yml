baseurl: ''
collections:
  docs:
    output: true
    permalink: /docs/:title/
  tutorials:
    output: true
    permalink: /tutorials/:title/
copyright: "\xA9 2010-2025 F-Droid Contributors"
default_lang: _
error_mode: strict
excerpt_separator: <!--more-->
exclude:
- build
- public
- .jekyll-cache
- vendor/bundle/
- vendor/cache/
- vendor/gems/
- vendor/ruby/
- tools/
- README.md
- LICENSE
- robots.txt.noindex
- Vagrantfile
exclude_from_localization:
- \.htaccess
- \.well-known/
- CONTRIBUTING\.md
- F-Droid\.apk
- LICENSE
- README\.md
- TRANSLATIONS\.md
- archive/
- assets/
- css/
- feed\.xml
- js/
- po/
- repo/
- robots\.txt
- robots\.txt\.noindex
- tools/
- wiki/
- wp-content/
- sitemap\.xml
- funding.json
fdroid-repo: https://f-droid.org/repo
fdroid_apk_download_url: https://f-droid.org/F-Droid.apk
fdroid_apk_pgp_verification_instructions_url: docs/Verifying_Downloaded_APK
gitlab_ci_languages:
- en
- fa
- zh_Hans
header-title: F-Droid
include:
- _pages
- .htaccess
- .well-known
- api
jekyll-fdroid:
  index_version: v1
lang_from_path: true
