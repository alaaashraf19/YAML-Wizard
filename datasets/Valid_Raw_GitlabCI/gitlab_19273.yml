build:
  artifacts:
    paths:
    - Gemfile.lock
  image: ruby:2.6
  script:
  - gem install bundler --no-document
  - bundle update
  stage: build
dependency_scanning:
  artifacts:
    paths:
    - gl-dependency-scanning-report.json
  dependencies:
  - build
  image: docker:stable
  script:
  - export SP_VERSION=$(echo "$CI_SERVER_VERSION" | sed 's/^\([0-9]*\)\.\([0-9]*\).*/\1-\2-stable/')
  - docker run --env DEP_SCAN_DISABLE_REMOTE_CHECKS="${DEP_SCAN_DISABLE_REMOTE_CHECKS:-false}"
    --volume "$PWD:/code" --volume /var/run/docker.sock:/var/run/docker.sock "registry.gitlab.com/gitlab-org/security-products/dependency-scanning:$SP_VERSION"
    /code
  services:
  - docker:stable-dind
  stage: security
  variables:
    DOCKER_DRIVER: overlay2
rubocop:
  image: ruby:2.6
  script:
  - gem install rubocop rubocop-performance rubocop-rails --no-document
  - rubocop
  stage: codequality
stages:
- build
- test
- codequality
- security
test:
  image: ruby:2.6
  script:
  - gem install bundler --no-document
  - bundle update
  - rake test
  stage: test
