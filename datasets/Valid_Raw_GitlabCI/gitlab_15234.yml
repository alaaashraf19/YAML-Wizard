before_script:
- mkdir -p /go/src/gitlab.com/r3dlight/
- cp -r /builds/r3dlight/akabox /go/src/gitlab.com/r3dlight/
cache:
  paths:
  - /apt-cache
  - /go/src/github.com
  - /go/src/golang.org
  - /go/src/google.golang.org
  - /go/src/gopkg.in
compile:
  artifacts:
    paths:
    - akabox
  script:
  - cd /go/src/gitlab.com/r3dlight/akabox && go build -race -ldflags "-extldflags
    '-static'" -o $CI_PROJECT_DIR/akabox
  stage: build
format:
  script:
  - cd /go/src/gitlab.com/r3dlight/akabox
  - go fmt $(go list ./... | grep -v /vendor/)
  - go vet $(go list ./... | grep -v /vendor/)
  - export CC=clang-7
  - go test -msan -short
  - go test -race $(go list ./... | grep -v /vendor/)
  stage: test
image: registry.gitlab.com/r3dlight/akabox/go-clang7:latest
stages:
- test
- build
variables:
  REPO_NAME: gitlab.com/r3dlight/akabox
