stages:
- build
- test
- package
test_debug:
  artifacts:
    paths:
    - codeCoverageReport/
  coverage: /\(\d+.\d+\%\) covered/
  except:
  - sit_uat
  - staging
  - production
  - master
  script:
  - gradle testDebug
  - gradle lint
  - test `gradle lint | grep "0 issues" | wc -l` = `gradle lint | grep "issues" |
    wc -l`
  - mv app/build/reports/jacoco/testDebug ./codeCoverageReport
  - MINIMUM_COVERAGE=0
  - MISSED_COUNT=`cat ./codeCoverageReport/testDebug.xml | grep -Po '<counter type="INSTRUCTION"[^>]*>'
    | tail -n 1 | cut -d '"' -f 4`
  - COVERED_COUNT=`cat ./codeCoverageReport/testDebug.xml | grep -Po '<counter type="INSTRUCTION"[^>]*>'
    | tail -n 1 | cut -d '"' -f 6`
  - COVERAGE=`bc -l <<< "100.0 * $COVERED_COUNT / ( $MISSED_COUNT + $COVERED_COUNT
    )"`
  - echo "Coverage result - ($COVERAGE%) covered, Minimum coverage is $MINIMUM_COVERAGE%"
  - test `bc <<< "$COVERAGE>=$MINIMUM_COVERAGE"` = 1
  stage: test
