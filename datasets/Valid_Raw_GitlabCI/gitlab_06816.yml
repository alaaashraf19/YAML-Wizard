build:
  after_script:
  - docker push $E2E_IMAGE:$CI_COMMIT_SHA
  - docker push $E2E_IMAGE:latest
  - docker push $APP_IMAGE:$CI_COMMIT_SHA
  - docker push $APP_IMAGE:latest
  before_script:
  - docker login -u gitlab-ci-token -p $CI_BUILD_TOKEN registry.gitlab.com
  - docker pull $E2E_IMAGE:latest || true
  - docker build --cache-from $E2E_IMAGE:latest --tag $E2E_IMAGE:$CI_COMMIT_SHA --tag
    $E2E_IMAGE:latest $E2E_DIR
  - docker pull $APP_IMAGE:latest || true
  - docker build --cache-from $APP_IMAGE:latest --tag $APP_IMAGE:$CI_COMMIT_SHA --tag
    $APP_IMAGE:latest $APP_DIR
  script:
  - docker-compose --f docker-compose.ci.yml up --build -d
  - docker-compose exec -T app npm run test-all
  - docker-compose exec -T app npm run build
  - docker-compose exec -T e2e npm run test-all
  stage: build
image: tmaier/docker-compose:latest
pages:
  artifacts:
    paths:
    - public
  only:
  - master
  script:
  - docker-compose --f docker-compose.production.yml build
  - docker-compose --f docker-compose.production.yml run --rm app npx webpack --config
    webpack.config.production.js
  - cp -r app/public public
  stage: deploy
services:
- docker:dind
stages:
- build
- deploy
variables:
  APP_DIR: $CI_PROJECT_DIR/app/
  APP_IMAGE: $CI_REGISTRY_IMAGE/app
  DOCKER_DRIVER: overlay2
  E2E_DIR: $CI_PROJECT_DIR/e2e/
  E2E_IMAGE: $CI_REGISTRY_IMAGE/e2e
