cache:
  paths:
  - .yarn/cache/
  - .yarn/unplugged/
  - .yarn/build-state.yml
ci:
  artifacts:
    paths:
    - dist/public_ip_display-*.zip
  script:
  - apk add --no-cache git make python3 util-linux
  - yarn install --immutable
  - yarn build
  - yarn dlx git-is-clean
image: node:14.18.1-alpine
