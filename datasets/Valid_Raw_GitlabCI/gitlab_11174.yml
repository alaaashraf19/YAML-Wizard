about:
  home: http://gitlab.com/kimlab/jobsubmitter
  license: MIT License
  summary: Package for running jobs on Sun Grid Engine (SGE) / PBS / Slurm clusters.
build:
  number: 0
  script: $PYTHON setup.py install --single-version-externally-managed --record=record.txt
outputs:
- name: jobsubmitter
  type: conda
- type: wheel
package:
  name: jobsubmitter
  version: 0.1.1
requirements:
  build:
  - pandoc
  - pypandoc
  - python
  run:
  - python
  - pyyaml
  - requests
  - retrying
  - paramiko
  - attrs
  - tqdm
  - numpy
  - scipy
  - pandas
  - sqlalchemy
source:
  path: ../
test:
  imports:
  - jobsubmitter
  requires:
  - pytest
  - pytest-cov
  - pytest-benchmark
