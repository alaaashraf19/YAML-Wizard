build:
  artifacts:
    paths:
    - public
  image: ruby:2
  script:
  - bundle install
  - bundle exec jekyll build -d public
  stage: build
pages:
  artifacts:
    paths:
    - public
  only:
  - master
  script:
  - find public
  stage: deploy
test:
  image: 18fgsa/html-proofer:gitlab-ci
  script:
  - htmlproofer public --empty-alt-ignore
