before_script:
- apt-get -qq update
- apt-get install -y jq
build and test:
  artifacts:
    expire_in: 1 month
    paths:
    - artifacts/
  script:
  - npm install
  - npm run compile
  - npm run test
  - for file in build/contracts/*.json; do jq '.abi' < "$file" > "${file%.json}.abi";
    done
  - for file in build/contracts/*.json; do jq -r '.bytecode' < "$file" > "${file%.json}.bin";
    done
  - mkdir artifacts && for solfile in contracts/*.sol; do ./node_modules/.bin/truffle-flattener
    $solfile > artifacts/${solfile##*/}; done
  - for file in contracts/*.sol; do f=$(basename -- ${file%.*}); cp "build/contracts/${f}.abi"
    artifacts/; cp "build/contracts/${f}.bin" artifacts/; done
  - 'echo "Compiler: $(./node_modules/.bin/solcjs --version)" > artifacts/README.md'
  - 'echo "Contracts commit: ${CI_COMMIT_SHA}" >> artifacts/README.md'
cache:
  paths:
  - node_modules/
image: node:latest
