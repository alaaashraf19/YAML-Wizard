image: ruby:2.4
lint:
  script:
  - gem install mdl -v 0.4.0
  - mdl -s <(echo "rule 'MD009', :br_spaces => 4") .
  stage: validate
policy:
  except:
  - master
  - tags
  script:
  - "(\n  # gitect: Check policy compliance\n  output=$(curl -k -H \"Accept: application/json\"\
    \ -H \"X-Gitect-Token: ${GITECT_HOST_TOKEN}\" -G \\\n    --data-urlencode \"target-branch=${TARGET_BRANCH}\"\
    \ \\\n    \"${GITECT_HOST}/api/v1/gitlab.com/${CI_PROJECT_PATH}/~/${CI_COMMIT_REF_NAME}/${CI_COMMIT_SHA}/policy-compliance\"\
    )\n  echo $output\n\n  if [[ \"$output\" != *\"true\"* ]];then\n    echo \"error:\
    \ Policy compliance check failed!\"\n    exit 1\n  fi\n)\n"
  stage: policy
  variables:
    GIT_STRATEGY: none
stages:
- validate
- policy
variables:
  GITECT_HOST: https://gitect2.codethink.co.uk
  TARGET_BRANCH: master
