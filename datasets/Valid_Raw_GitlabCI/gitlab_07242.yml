build:
  image: registry.gitlab.com/ercom/docker:18.03.1-ce-git
  only:
  - tags
  script:
  - ci-scripts/run-job-script.sh
  services:
  - alias: docker
    name: registry.gitlab.com/ercom/docker:18.03.1-ce-dind
  stage: build
  tags:
  - docker
  variables:
    DOCKER_DRIVER: overlay
    DOCKER_HOST: tcp://docker:2375
