pages:
  artifacts:
    paths:
    - public
  image: debian:stable
  only:
  - release
  script:
  - apt-get update -q
  - apt-get install -qy python3-sphinx python3-sphinx-rtd-theme build-essential
  - cd doc
  - make html
  - cd ..
  - mv doc/_build/html public
  stage: deploy
pages_development_branch:
  artifacts:
    paths:
    - pages_development
  image: debian:stable
  only:
  - master
  script:
  - apt-get update -q
  - apt-get install -qy python3-sphinx python3-sphinx-rtd-theme build-essential
  - cd doc
  - make html
  - cd ..
  - mv doc/_build/html pages_development
  stage: deploy
