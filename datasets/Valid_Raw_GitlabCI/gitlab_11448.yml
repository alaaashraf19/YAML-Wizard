.deploy_job:
  before_script: &id001
  - eval $(ssh-agent -s)
  - echo "$DEPLOYER_PRIVATE_KEY" | tr -d '\r' | ssh-add - > /dev/null
  image: registry.gitlab.com/apploud/docker/deployer:latest
  script: &id002
  - dep deploy $CI_ENVIRONMENT_SLUG --revision="$CI_COMMIT_SHA"
  stage: deploy
  when: manual
autodeloy to dev:
  before_script: *id001
  environment:
    name: dev
    url: $DEV_URL
  image: registry.gitlab.com/apploud/docker/deployer:latest
  script: *id002
  stage: deploy
  when: on_success
composer:
  artifacts:
    expire_in: 24h
    paths:
    - vendor/
  script:
  - composer install --no-interaction --ansi --prefer-dist --optimize-autoloader --ignore-platform-reqs
  stage: build
deploy to client:
  before_script: *id001
  environment:
    name: client
    url: $CLIENT_URL
  image: registry.gitlab.com/apploud/docker/deployer:latest
  script: *id002
  stage: deploy
  when: manual
deploy to production:
  before_script: *id001
  environment:
    name: production
    url: $PRODUCTION_URL
  image: registry.gitlab.com/apploud/docker/deployer:latest
  only:
  - master
  script: *id002
  stage: deploy
  when: manual
image: registry.gitlab.com/apploud/docker/webserver:latest
integration tests:
  artifacts:
    expire_in: 48h
    paths:
    - log/
    when: on_failure
  script:
  - vendor/bin/phing tests-integration
  stage: test
lint:
  script:
  - vendor/bin/phing lint
  stage: test
orm validate:
  script:
  - vendor/bin/phing db
  - vendor/bin/phing orm-validate
  stage: test
phpstan:
  script:
  - vendor/bin/phing stan
  stage: test
services:
- alias: mysql
  name: registry.gitlab.com/apploud/docker/mysql:latest
- alias: mailhog
  name: registry.gitlab.com/apploud/docker/mailhog:latest
sniffer:
  script:
  - vendor/bin/phing sniffer
  stage: test
stages:
- build
- test
- deploy
unit tests:
  artifacts:
    expire_in: 48h
    paths:
    - log/
    when: on_failure
  script:
  - vendor/bin/phing tests-unit
  stage: test
variables:
  MYSQL_DATABASE: project
  MYSQL_ROOT_PASSWORD: root
