build:
  script:
  - python -m compileall calculator.py
  stage: build
image: python
module tests:
  before_script:
  - pip install coverage
  coverage: /\d+\%\s*$/
  script:
  - COVRUN="coverage run -a"
  - test $($COVRUN calculator.py 1 + 1) = 2
  - test $($COVRUN calculator.py 100 - 10) = 90
  - test $($COVRUN calculator.py 25 \* 5) = 125
  - (! $COVRUN calculator.py 30 / 5)
  - coverage report
  stage: test
stages:
- static analysis
- build
- test
static analysis:
  allow_failure: true
  before_script:
  - pip install pylint
  script:
  - pylint calculator.py
  stage: static analysis
unit tests:
  before_script:
  - pip install pytest
  script:
  - py.test unit_tests.py
  stage: test
