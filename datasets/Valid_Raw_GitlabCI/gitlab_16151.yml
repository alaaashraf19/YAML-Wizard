package:debian:
  artifacts:
    expire_in: 1d
    paths:
    - deb_dist/*.deb
  script:
  - apt-get update -qy
  - apt-get install -y curl gnupg apt-transport-https wget
  - wget -O- https://repository.salamek.cz/deb/salamek.gpg | tee /usr/share/keyrings/salamek-archive-keyring.gpg
  - echo "deb     [signed-by=/usr/share/keyrings/salamek-archive-keyring.gpg] https://repository.salamek.cz/deb/pub
    all main" | tee /etc/apt/sources.list.d/salamek.cz.list
  - apt-get update -qy
  - apt-get install -y nodejs dh-python npm python3-python-gitlab python3-paramiko
    python3-git python3-flask-celery-tools python3-dev redis-server python3-pip python3-stdeb
    python3-celery nodejs git python3-markupsafe python3-psycopg2 python3-dateutil
    python3-docopt python3-yaml python3-wtforms python3-raven python3-flask-migrate
    python3-flask-babel python3-flask-navigation python3-cron-descriptor python3-flask-login
    python3-kombu rabbitmq-server
  - rm -rf "./deb_dist"
  - cd gitlab_tools/static
  - npm install
  - cd -
  - export DEB_BUILD_OPTIONS=nocheck
  - python3 setup.py --command-packages=stdeb.command bdist_deb
  stage: package
  tags:
  - debian
repoupdate:
  before_script:
  - which ssh-agent || ( apt-get update -y && apt-get install openssh-client -y )
  - eval $(ssh-agent -s)
  - ssh-add <(echo "$SSH_PRIVATE_KEY")
  - mkdir -p ~/.ssh
  - '[[ -f /.dockerenv ]] && echo -e "Host *\n\tStrictHostKeyChecking no\n\n" > ~/.ssh/config'
  dependencies:
  - package:debian
  only:
  - tags
  script:
  - ssh www-data@repository 'rm -rf /var/www/repository.salamek.cz/cache/deb/pub/all/gitlab-tools*.deb'
  - scp deb_dist/*.deb www-data@repository:/var/www/repository.salamek.cz/cache/deb/pub/all
  - ssh www-data@repository '/var/www/repository.salamek.cz/deb-pub-update.sh'
  stage: deploy
  tags:
  - docker
  variables:
    GIT_STRATEGY: none
stages:
- test
- package
- deploy
test:debian:
  script:
  - apt-get update -qy
  - apt-get install -y python3-dev python3-pip tox
  - pip3 install .
  - tox -e py39
  stage: test
  tags:
  - debian
