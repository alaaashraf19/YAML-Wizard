android_build:
  artifacts:
    name: build_${CI_PROJECT_NAME}_${CI_BUILD_REF_NAME}_${CI_JOB_NAME}_${CI_JOB_ID}
    paths:
    - app/build/outputs/apk/
    - app/build/outputs/mapping/
    when: always
  script:
  - ./gradlew clean assembleRelease
  stage: build
android_test_implementation:
  artifacts:
    name: reports_${CI_PROJECT_NAME}_${CI_BUILD_REF_NAME}_${CI_JOB_NAME}_${CI_JOB_ID}
    paths:
    - app/build/reports/androidTests/
    when: always
  script:
  - export EMULATOR_IMAGE="system-images;android-${ANDROID_COMPILE_SDK};google_apis;x86"
  - echo y | sdkmanager "emulator" "$EMULATOR_IMAGE"
  - echo y | sdkmanager --update
  - export PATH=$PATH:$ANDROID_HOME/emulator/:$ANDROID_HOME/platform-tools/
  - echo n | avdmanager -s create avd -n test -k "${EMULATOR_IMAGE}" -f
  - emulator -avd test -no-window -no-audio &
  - "# Wait emulator bootanim stopping\nset +e\n\nbootanim=`adb -e shell getprop init.svc.bootanim\
    \ 2>&1 &`\nfailcounter=0\ntimeout_in_sec=300\n\nuntil [[ \"$bootanim\" =~ \"stopped\"\
    \ ]]; do\n\n  # Bootanim timeout\n  if [[ $failcounter -gt timeout_in_sec ]];\
    \ then\n    echo \"Failed to start emulator : Timeout ($timeout_in_sec seconds)\
    \ reached;\"\n\n    # Send webhook notification\n    #curl -X POST -H 'Content-type:\
    \ application/json' \\\n    #  --data '{\"text\":\"Emulator timeout : ${bootanim}\"\
    }' \\\n    #  $WEBHOOK_NOTIF\n\n    exit 1\n  fi\n\n  # Emulator launch failed\n\
    \  if [[ ! \"$bootanim\" =~ \"daemon not running; starting now\" && ! \"$bootanim\"\
    \ =~ \"device offline\" && ! \"$bootanim\" = \"\" && ! \"$bootanim\" = \"running\"\
    \ ]]; then\n    echo \"Failed to start emulator : ${bootanim}\"\n\n    # Send\
    \ webhook notification\n    #curl -X POST -H 'Content-type: application/json'\
    \ \\\n    #  --data '{\"text\":\"Emulator error : ${bootanim}\"}' \\\n    #  $WEBHOOK_NOTIF\n\
    \n    exit 1\n  fi\n\n  echo \"Wait emulator (state: ${bootanim}) ; Timeout $(($timeout_in_sec-$failcounter))\"\
    \n  sleep 1\n  let \"failcounter += 1\"\n\n  bootanim=`adb -e shell getprop init.svc.bootanim\
    \ 2>&1 &`\ndone\n\necho \"Emulator is ready\""
  - adb shell input keyevent 82
  - ./gradlew connectedAndroidTest
  stage: test
  tags:
  - do
before_script:
- export ANDROID_COMPILE_SDK=`egrep '^[[:blank:]]+compileSdkVersion'  app/build.gradle
  | awk '{print $2}'`
- export ANDROID_BUILD_TOOLS=`egrep '^[[:blank:]]+buildToolsVersion'  app/build.gradle
  | sed s/\"//g | awk '{print $2}'`
- '# Information used for debugging

  echo "/---------------------- JOB INFO ----------------------/"

  echo "CI_JOB_ID ${CI_JOB_ID}"

  echo "CI_JOB_MANUAL ${CI_JOB_MANUAL}"

  echo "CI_JOB_NAME ${CI_JOB_NAME}"

  echo "CI_JOB_STAGE ${CI_JOB_STAGE}"

  echo "/--------------------- RUNNER INFO --------------------/"

  echo "CI_RUNNER_ID ${CI_RUNNER_ID}"

  echo "CI_RUNNER_TAGS ${CI_RUNNER_TAGS}"

  echo "CI_RUNNER_DESCRIPTION ${CI_RUNNER_DESCRIPTION}"

  echo "/---------------------- CPU INFO ----------------------/"

  cat /proc/cpuinfo # To kwow if CPU supports KVM (for Android emulators), the flags
  category must contain "vmx" or "svm" ; egrep ''^flags.*(vmx|svm)'' /proc/cpuinfo

  echo "/-------------------- PROJECT INFO --------------------/"

  echo "ANDROID_COMPILE_SDK ${ANDROID_COMPILE_SDK}"

  echo "ANDROID_BUILD_TOOLS ${ANDROID_BUILD_TOOLS}"

  echo "/------------------------------------------------------/"'
- "# Install SDK Tools\necho \"create ${ANDROID_HOME} folder path\"\nmkdir -p \"${ANDROID_HOME}\"\
  \necho \"download SDK Tools and save to ${ANDROID_HOME}.zip\"\nwget -q -O \"${ANDROID_HOME}.zip\"\
  \ \"${ANDROID_SDK_TOOLS_VERSION}\"\n\nchecksum=`sha256sum ${ANDROID_HOME}.zip |\
  \ awk '{print $1}'`\nif [[ ! \"${checksum}\" = \"${ANDROID_SDK_TOOLS_CHECKSUM}\"\
  \ ]] ; then\n  echo \"Fatal : Bad Android SDK Tools checksum ; calculated ${checksum}\
  \ ; expected ${ANDROID_SDK_TOOLS_CHECKSUM}\"\n\n  # Send webhook notification\n\
  \  #curl -X POST -H 'Content-type: application/json' \\\n  #  --data '{\"text\"\
  :\"SDK Bad Checksum\"}' \\\n  #  $WEBHOOK_NOTIF\n\n  exit 1\nfi\n\necho \"unzip\
  \ SDK Tools to ${ANDROID_HOME}\"\nunzip -q \"${ANDROID_HOME}.zip\" -d \"${ANDROID_HOME}\""
- export PATH=$PATH:$ANDROID_HOME/tools/bin/
- echo y | sdkmanager "platform-tools" "platforms;android-${ANDROID_COMPILE_SDK}"
  "build-tools;${ANDROID_BUILD_TOOLS}" "extras;google;m2repository" "extras;android;m2repository"
  "extras;google;google_play_services"
- echo y | sdkmanager --update
- chmod +x ./gradlew
gradlew_lint:
  artifacts:
    name: reports_${CI_PROJECT_NAME}_${CI_BUILD_REF_NAME}_${CI_JOB_NAME}_${CI_JOB_ID}
    paths:
    - app/build/reports/
    when: always
  script:
  - ./gradlew lint
  stage: quality
image: openjdk:8-jdk
stages:
- test
- quality
- build
test_implementation:
  artifacts:
    name: reports_${CI_PROJECT_NAME}_${CI_BUILD_REF_NAME}_${CI_JOB_NAME}_${CI_JOB_ID}
    paths:
    - app/build/reports/tests/
    when: always
  script:
  - ./gradlew test
  stage: test
variables:
  ANDROID_HOME: ./android-sdk-linux
  ANDROID_SDK_TOOLS_CHECKSUM: 444e22ce8ca0f67353bda4b85175ed3731cae3ffa695ca18119cbacef1c1bea0
  ANDROID_SDK_TOOLS_VERSION: https://dl.google.com/android/repository/sdk-tools-linux-3859397.zip
