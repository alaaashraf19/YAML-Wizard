.swift-release:
  script: &id002
  - swift build -c release
.swift-test:
  script: &id001
  - swift build
  - swift test
cache:
  key: $CI_JOB_NAME-$CI_COMMIT_REF_SLUG
  paths:
  - .build/
linux-4.1:
  image: swift:4.1
  script: *id001
linux-4.2:
  image: norionomura/swift:swift-4.2-branch
  script: *id001
linux-release-4.1:
  image: swift:4.1
  script: *id002
linux-release-4.2:
  image: norionomura/swift:swift-4.2-branch
  script: *id002
swiftlint:
  image: norionomura/swiftlint
  script:
  - swiftlint
