before_script:
- bash ci/docker_install.sh > /dev/null
- curl -sS https://getcomposer.org/installer | php
- cp ci/custom_php.ini /usr/local/etc/php/conf.d/custom.ini
- php composer.phar install
cache:
  paths:
  - vendor/
test:5.6:
  image: php:5.6
  script:
  - phpunit --configuration phpunit.xml.dist
test:7.0:
  image: php:7.0
  script:
  - phpunit --configuration phpunit.xml.dist
test:7.1:
  image: php:7.1
  script:
  - phpunit --configuration phpunit.xml.dist
test:7.2:
  image: php:7.2
  script:
  - phpunit --configuration phpunit.xml.dist
