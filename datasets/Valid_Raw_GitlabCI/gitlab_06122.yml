generate:
  artifacts:
    paths:
    - autogenerate/d3m_sklearn_wrap
  except:
  - dist
  - dev-dist
  image: registry.gitlab.com/datadrivendiscovery/images/testing:ubuntu-bionic-python36
  script:
  - "set -o errexit\necho \"Installing dependencies\"\npip3 install -r requirements.txt\n\
    \necho \"Generating\"\npython3 -m autogenerate.wrap_sklearn --dir autogenerate/resources/primitive-jsons\
    \ --overlays autogenerate/resources/overlay_extras.json autogenerate/resources/overlay_classifiers.json\
    \ autogenerate/resources/overlay_regressors.json autogenerate/resources/overlay_preprocessors.json\
    \ --module_config autogenerate/config/setup.config.json --primitive_id_file autogenerate/d3m_sklearn_wrap_ids.json\
    \ --hyperparams_to_tune autogenerate/resources/hyperparams_to_tune.yml\necho \"\
    Running tests\"\n./run_tests.sh 10\nfind . -name '*.pyc' -or -name __pycache__\
    \ -prune -exec rm -rf {} ';'\nif [ \"${CI_COMMIT_REF_NAME}\" = master -o \"${CI_COMMIT_REF_NAME}\"\
    \ = devel ]; then\n  if [ -n \"${GIT_ACCESS_USER}\" -a -n \"${GIT_ACCESS_TOKEN}\"\
    \ ]; then\n    echo \"Pushing generated package\"\n    if [ \"${CI_COMMIT_REF_NAME}\"\
    \ = master ]; then\n      BRANCH=dist\n    else\n      BRANCH=dev-dist\n    fi\n\
    \    git clone https://${GIT_ACCESS_USER}:${GIT_ACCESS_TOKEN}@gitlab.com/${CI_PROJECT_PATH}.git\
    \ --reference . generated &>/dev/null\n    cd generated\n    git config --local\
    \ user.email noreply@datadrivendiscovery.org\n    git config --local user.name\
    \ \"D3M CI\"\n    git checkout -b $BRANCH --track origin/$BRANCH\n    rm -rf ./*\n\
    \    cp -r ../autogenerate/d3m_sklearn_wrap/* ./\n    git add * || true\n    if\
    \ ! git diff --cached --quiet ; then\n      git commit -m \"Generated by CI.\"\
    \ -m \"Source commmit: ${CI_COMMIT_SHA}\" -m \"[skip ci]\"\n      git push https://${GIT_ACCESS_USER}:${GIT_ACCESS_TOKEN}@gitlab.com/${CI_PROJECT_PATH}.git\
    \ HEAD:refs/heads/$BRANCH &>/dev/null\n    else\n     echo \"Nothing changed\"\
    \n    fi\n  fi\nfi\n"
  stage: build
  variables:
    GIT_SUBMODULE_STRATEGY: recursive
primitive-json:
  artifacts:
    paths:
    - autogenerate
  except:
  - dist
  - dev-dist
  image: registry.gitlab.com/datadrivendiscovery/images/libs:ubuntu-bionic-python36-stable
  only:
    refs:
    - master
  script:
  - "set -o errexit\nls\necho \"Generating primitive jsons\"\nif [ \"${CI_COMMIT_REF_NAME}\"\
    \ = master -o \"${CI_COMMIT_REF_NAME}\" = devel ]; then\n  if [ -n \"${GIT_ACCESS_USER}\"\
    \ -a -n \"${GIT_ACCESS_TOKEN}\" ]; then\n    if [ \"${CI_COMMIT_REF_NAME}\" =\
    \ master ]; then\n      BRANCH=dist\n    else\n      BRANCH=dev-dist\n    fi\n\
    \    git clone https://gitlab.com/datadrivendiscovery/common-primitives.git\n\
    \    cd common-primitives && pip3 install -e . && cd ../\n    git clone https://${GIT_ACCESS_USER}:${GIT_ACCESS_TOKEN}@gitlab.com/${CI_PROJECT_PATH}.git\
    \ --reference . generated &>/dev/null\n    cd generated\n    ls\n    git checkout\
    \ -b $BRANCH --track origin/$BRANCH\n    pip3 install -e .\n    cd ../\n    ls\n\
    \    python3 -m autogenerate.generate_primitive_jsons\n    if [ \"${CI_COMMIT_REF_NAME}\"\
    \ = master ]; then\n      CORE_VERSION=$(python3 -c \"import d3m; print(d3m.__version__)\"\
    )\n      git clone https://${GIT_ACCESS_USER}:${GIT_ACCESS_TOKEN}@gitlab.com/datadrivendiscovery/primitives.git\
    \ primitives_repo &>/dev/null\n      cd primitives_repo/\n      git config --local\
    \ user.email noreply@datadrivendiscovery.org\n      git config --local user.name\
    \ \"D3M CI\"\n      ls\n      git checkout -b JPL\n      rm -rf v$CORE_VERSION/JPL\n\
    \      mv ../autogenerate/$CORE_VERSION/JPL v$CORE_VERSION/\n      git add * ||\
    \ true\n      if ! git diff --cached --quiet ; then\n        echo \"Committing\
    \ annotations\"\n        git commit -m \"sklearn-wrap updates\"\n        COMMIT_BRANCH=\"\
    JPL-${CI_PIPELINE_ID}\"\n        git push https://${GIT_ACCESS_USER}:${GIT_ACCESS_TOKEN}@gitlab.com/datadrivendiscovery/primitives.git\
    \ HEAD:refs/heads/$COMMIT_BRANCH &>/dev/null\n      fi\n    fi\n  fi\nfi\n"
  stage: deploy
