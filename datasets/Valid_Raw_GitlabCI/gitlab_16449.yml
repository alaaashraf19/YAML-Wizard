  artifacts:
    paths:
    - environment_url.txt
  environment:
    name: review/$CI_COMMIT_REF_NAME
    on_stop: stop_review
    url: http://$CI_PROJECT_PATH_SLUG-$CI_ENVIRONMENT_SLUG.$AUTO_DEVOPS_DOMAIN
  except:
    refs:
    - master
    variables:
    - $REVIEW_DISABLED
  only:
    kubernetes: active
    refs:
    - branches
  script:
  - check_kube_domain
  - install_dependencies
  - download_chart
  - ensure_namespace
  - install_tiller
  - create_secret
  - deploy
  - persist_environment_url
  stage: review
