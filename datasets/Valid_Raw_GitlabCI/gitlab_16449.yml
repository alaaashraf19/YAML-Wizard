  false\"\n    postgres_enabled=\"false\"\n  fi\n\n  replicas=$(get_replicas \"$track\"\
  \ \"$percentage\")\n\n  if [[ \"$CI_PROJECT_VISIBILITY\" != \"public\" ]]; then\n\
  \    secret_name='gitlab-registry'\n  else\n    secret_name=''\n  fi\n\n  helm upgrade\
  \ --install \\\n    --wait \\\n    --set service.enabled=\"$service_enabled\" \\\
  \n    --set releaseOverride=\"$CI_ENVIRONMENT_SLUG\" \\\n    --set image.repository=\"\
  $CI_APPLICATION_REPOSITORY\" \\\n    --set image.tag=\"$CI_APPLICATION_TAG\" \\\n\
  \    --set image.pullPolicy=IfNotPresent \\\n    --set image.secrets[0].name=\"\
  $secret_name\" \\\n    --set application.track=\"$track\" \\\n    --set application.database_url=\"\
  $DATABASE_URL\" \\\n    --set service.url=\"$CI_ENVIRONMENT_URL\" \\\n    --set\
  \ replicaCount=\"$replicas\" \\\n    --set postgresql.enabled=\"$postgres_enabled\"\
  \ \\\n    --set postgresql.nameOverride=\"postgres\" \\\n    --set postgresql.postgresUser=\"\
  $POSTGRES_USER\" \\\n    --set postgresql.postgresPassword=\"$POSTGRES_PASSWORD\"\
  \ \\\n    --set postgresql.postgresDatabase=\"$POSTGRES_DB\" \\\n    --namespace=\"\
  $KUBE_NAMESPACE\" \\\n    --version=\"$CI_PIPELINE_ID-$CI_JOB_ID\" \\\n    \"$name\"\
  \ \\\n    chart/\n}\n\nfunction scale() {\n  track=\"${1-stable}\"\n  percentage=\"\
  ${2-100}\"\n  name=\"$CI_ENVIRONMENT_SLUG\"\n\n  if [[ \"$track\" != \"stable\"\
  \ ]]; then\n    name=\"$name-$track\"\n  fi\n\n  replicas=$(get_replicas \"$track\"\
  \ \"$percentage\")\n\n  if [[ -n \"$(helm ls -q \"^$name$\")\" ]]; then\n    helm\
  \ upgrade --reuse-values \\\n      --wait \\\n      --set replicaCount=\"$replicas\"\
  \ \\\n      --namespace=\"$KUBE_NAMESPACE\" \\\n      \"$name\" \\\n      chart/\n\
  \  fi\n}\n\nfunction install_dependencies() {\n  apk add -U openssl curl tar gzip\
  \ bash ca-certificates git\n  wget -q -O /etc/apk/keys/sgerrand.rsa.pub https://raw.githubusercontent.com/sgerrand/alpine-pkg-glibc/master/sgerrand.rsa.pub\n\
  \  wget https://github.com/sgerrand/alpine-pkg-glibc/releases/download/2.23-r3/glibc-2.23-r3.apk\n\
  \  apk add glibc-2.23-r3.apk\n  rm glibc-2.23-r3.apk\n\n  curl \"https://kubernetes-helm.storage.googleapis.com/helm-v${HELM_VERSION}-linux-amd64.tar.gz\"\
  \ | tar zx\n  mv linux-amd64/helm /usr/bin/\n  helm version --client\n\n  curl -L\
  \ -o /usr/bin/kubectl \"https://storage.googleapis.com/kubernetes-release/release/v${KUBERNETES_VERSION}/bin/linux/amd64/kubectl\"\
  \n  chmod +x /usr/bin/kubectl\n  kubectl version --client\n}\n\nfunction setup_docker()\
  \ {\n  if ! docker info &>/dev/null; then\n    if [ -z \"$DOCKER_HOST\" -a \"$KUBERNETES_PORT\"\
  \ ]; then\n      export DOCKER_HOST='tcp://localhost:2375'\n    fi\n  fi\n}\n\n\
  function setup_test_db() {\n  if [ -z ${KUBERNETES_PORT+x} ]; then\n    DB_HOST=postgres\n\
  \  else\n    DB_HOST=localhost\n  fi\n  export DATABASE_URL=\"postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${DB_HOST}:5432/${POSTGRES_DB}\"\
  \n}\n\nfunction download_chart() {\n  if [[ ! -d chart ]]; then\n    auto_chart=${AUTO_DEVOPS_CHART:-gitlab/auto-deploy-app}\n\
  \    auto_chart_name=$(basename $auto_chart)\n    auto_chart_name=${auto_chart_name%.tgz}\n\
  \    auto_chart_name=${auto_chart_name%.tar.gz}\n  else\n    auto_chart=\"chart\"\
  \n    auto_chart_name=\"chart\"\n  fi\n\n  helm init --client-only\n  helm repo\
  \ add gitlab https://charts.gitlab.io\n  if [[ ! -d \"$auto_chart\" ]]; then\n \
  \   helm fetch ${auto_chart} --untar\n  fi\n  if [ \"$auto_chart_name\" != \"chart\"\
  \ ]; then\n    mv ${auto_chart_name} chart\n  fi\n\n  helm dependency update chart/\n\
  \  helm dependency build chart/\n}\n\nfunction ensure_namespace() {\n  kubectl describe\
  \ namespace \"$KUBE_NAMESPACE\" || kubectl create namespace \"$KUBE_NAMESPACE\"\n\
  }\n\nfunction check_kube_domain() {\n  if [ -z ${AUTO_DEVOPS_DOMAIN+x} ]; then\n\
  \    echo \"In order to deploy or use Review Apps, AUTO_DEVOPS_DOMAIN variable must\
  \ be set\"\n    echo \"You can do it in Auto DevOps project settings or defining\
  \ a variable at group or project level\"\n    echo \"You can also manually add it\
  \ in .gitlab-ci.yml\"\n    false\n  else\n    true\n  fi\n}\n\nfunction build()\
  \ {\n  if [[ -n \"$CI_REGISTRY_USER\" ]]; then\n    echo \"Logging to GitLab Container\
  \ Registry with CI credentials...\"\n    docker login -u \"$CI_REGISTRY_USER\" -p\
  \ \"$CI_REGISTRY_PASSWORD\" \"$CI_REGISTRY\"\n    echo \"\"\n  fi\n\n  if [[ -f\
  \ Dockerfile ]]; then\n    echo \"Building Dockerfile-based application...\"\n \
  \   docker build -t \"$CI_APPLICATION_REPOSITORY:$CI_APPLICATION_TAG\" .\n  else\n\
  \    echo \"Building Heroku-based application using gliderlabs/herokuish docker\
  \ image...\"\n    docker run -i -e BUILDPACK_URL --name=\"$CI_CONTAINER_NAME\" -v\
  \ \"$(pwd):/tmp/app:ro\" gliderlabs/herokuish /bin/herokuish buildpack build\n \
  \   docker commit \"$CI_CONTAINER_NAME\" \"$CI_APPLICATION_REPOSITORY:$CI_APPLICATION_TAG\"\
  \n    docker rm \"$CI_CONTAINER_NAME\" >/dev/null\n    echo \"\"\n\n    echo \"\
  Configuring $CI_APPLICATION_REPOSITORY:$CI_APPLICATION_TAG docker image...\"\n \
  \   docker create --expose 5000 --env PORT=5000 --name=\"$CI_CONTAINER_NAME\" \"\
  $CI_APPLICATION_REPOSITORY:$CI_APPLICATION_TAG\" /bin/herokuish procfile start web\n\
  \    docker commit \"$CI_CONTAINER_NAME\" \"$CI_APPLICATION_REPOSITORY:$CI_APPLICATION_TAG\"\
  \n    docker rm \"$CI_CONTAINER_NAME\" >/dev/null\n    echo \"\"\n  fi\n\n  echo\
  \ \"Pushing to GitLab Container Registry...\"\n  docker push \"$CI_APPLICATION_REPOSITORY:$CI_APPLICATION_TAG\"\
  \n  echo \"\"\n}\n\nfunction install_tiller() {\n  echo \"Checking Tiller...\"\n\
  \  helm init --upgrade\n  kubectl rollout status -n \"$TILLER_NAMESPACE\" -w \"\
  deployment/tiller-deploy\"\n  if ! helm version --debug; then\n    echo \"Failed\
  \ to init Tiller.\"\n    return 1\n  fi\n  echo \"\"\n}\n\nfunction create_secret()\
  \ {\n  echo \"Create secret...\"\n  if [[ \"$CI_PROJECT_VISIBILITY\" == \"public\"\
  \ ]]; then\n    return\n  fi\n\n  kubectl create secret -n \"$KUBE_NAMESPACE\" \\\
  \n    docker-registry gitlab-registry \\\n    --docker-server=\"$CI_REGISTRY\" \\\
  \n    --docker-username=\"${CI_DEPLOY_USER:-$CI_REGISTRY_USER}\" \\\n    --docker-password=\"\
  ${CI_DEPLOY_PASSWORD:-$CI_REGISTRY_PASSWORD}\" \\\n    --docker-email=\"$GITLAB_USER_EMAIL\"\
  \ \\\n    -o yaml --dry-run | kubectl replace -n \"$KUBE_NAMESPACE\" --force -f\
  \ -\n}\n\nfunction dast() {\n  export CI_ENVIRONMENT_URL=$(cat environment_url.txt)\n\
  \n  mkdir /zap/wrk/\n  /zap/zap-baseline.py -J gl-dast-report.json -t \"$CI_ENVIRONMENT_URL\"\
  \ || true\n  cp /zap/wrk/gl-dast-report.json .\n}\n\nfunction performance() {\n\
  \  export CI_ENVIRONMENT_URL=$(cat environment_url.txt)\n\n  mkdir gitlab-exporter\n\
  \  wget -O gitlab-exporter/index.js https://gitlab.com/gitlab-org/gl-performance/raw/10-5/index.js\n\
  \n  mkdir sitespeed-results\n\n  if [ -f .gitlab-urls.txt ]\n  then\n    sed -i\
  \ -e 's@^@'\"$CI_ENVIRONMENT_URL\"'@' .gitlab-urls.txt\n    docker run --shm-size=1g\
  \ --rm -v \"$(pwd)\":/sitespeed.io sitespeedio/sitespeed.io:6.3.1 --plugins.add\
  \ ./gitlab-exporter --outputFolder sitespeed-results .gitlab-urls.txt\n  else\n\
  \    docker run --shm-size=1g --rm -v \"$(pwd)\":/sitespeed.io sitespeedio/sitespeed.io:6.3.1\
  \ --plugins.add ./gitlab-exporter --outputFolder sitespeed-results \"$CI_ENVIRONMENT_URL\"\
  \n  fi\n\n  mv sitespeed-results/data/performance.json performance.json\n}\n\nfunction\
  \ persist_environment_url() {\n    echo $CI_ENVIRONMENT_URL > environment_url.txt\n\
  }\n\nfunction delete() {\n  track=\"${1-stable}\"\n  name=\"$CI_ENVIRONMENT_SLUG\"\
  \n\n  if [[ \"$track\" != \"stable\" ]]; then\n    name=\"$name-$track\"\n  fi\n\
  \n  if [[ -n \"$(helm ls -q \"^$name$\")\" ]]; then\n    helm delete \"$name\"\n\
  \  fi\n}\n"
build:
  image: docker:stable-git
  only:
  - branches
  script:
  - setup_docker
  - build
  services:
  - docker:stable-dind
  stage: build
  variables:
    DOCKER_DRIVER: overlay2
canary:
  environment:
    name: production
    url: http://$CI_PROJECT_PATH_SLUG.$AUTO_DEVOPS_DOMAIN
  only:
    kubernetes: active
    refs:
    - master
    variables:
    - $CANARY_ENABLED
  script:
  - check_kube_domain
  - install_dependencies
  - download_chart
  - ensure_namespace
  - install_tiller
  - create_secret
  - deploy canary
  stage: canary
  when: manual
code_quality:
  allow_failure: true
  artifacts:
    paths:
    - gl-code-quality-report.json
  except:
    variables:
    - $CODE_QUALITY_DISABLED
  image: docker:stable
  only:
  - branches
  script:
  - setup_docker
  - code_quality
  services:
  - docker:stable-dind
  stage: test
  variables:
    DOCKER_DRIVER: overlay2
container_scanning:
