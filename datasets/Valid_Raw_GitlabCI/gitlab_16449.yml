production:
  artifacts: *id001
  environment: *id002
  except:
    variables:
    - $STAGING_ENABLED
    - $CANARY_ENABLED
    - $INCREMENTAL_ROLLOUT_ENABLED
  only:
    kubernetes: active
    refs:
    - master
  script: *id003
  stage: production
production_manual:
  allow_failure: false
  artifacts: *id001
  environment: *id002
  except:
    variables:
    - $INCREMENTAL_ROLLOUT_ENABLED
  only:
    kubernetes: active
    refs:
    - master
    variables:
    - $STAGING_ENABLED
    - $CANARY_ENABLED
