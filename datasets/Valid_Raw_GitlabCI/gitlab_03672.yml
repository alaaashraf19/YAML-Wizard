.test:rpkg:
  artifacts:
    name: ${CI_JOB_NAME}-${CI_COMMIT_REF_NAME}
    paths:
    - ${R_CHECK_DIR}/*.Rcheck
    when: always
  script:
  - mkdir -p ${R_CHECK_DIR}
  - R CMD build ${R_BUILD_ARGS} .
  - R CMD check ${R_CHECK_ARGS} -o ${R_CHECK_DIR} $(ls -1t *.tar.gz | head -n 1)
  stage: test
  variables:
    R_CHECK_DIR: ${CI_PROJECT_DIR}/ci/R/logs
    _R_CHECK_CRAN_INCOMING_: 'false'
    _R_CHECK_FORCE_SUGGESTS_: 'true'
    _R_CHECK_LENGTH_1_CONDITION_: 'true'
    _R_CHECK_LENGTH_1_LOGIC2_: 'true'
before_script:
- export PATH="${RPREFIX:-/usr}/bin:${PATH}"
- mkdir -p ${R_LIBS}
- apt-get update
- apt-get install -y --no-install-recommends ${APT_DEPS}
- printf "options(repos = c(CRAN = \"%s\"))\n" ${CRAN} >> ~/.Rprofile
- printf "options(Ncpus = %d)\n" $(nproc --all) >> ~/.Rprofile
- Rscript -e 'install.packages("remotes")'
- Rscript -e 'update(remotes::dev_package_deps(dependencies = TRUE))'
- Rscript -e 'remotes::install_cran(commandArgs(TRUE))' ${R_STAGE_DEPS}
cache:
  key: ${CI_JOB_NAME}
  paths:
  - ${R_LIBS}
code:coverage:
  allow_failure: true
  coverage: '/Coverage: \d+\.\d+\%/'
  image: rhub/debian-gcc-release:latest
  needs:
  - test:release:gcc
  - test:devel:gcc
  script:
  - Rscript -e 'covr::codecov(type = "all", quiet = FALSE)'
  stage: check
  variables:
    R_STAGE_DEPS: covr
  when: on_success
code:lint:
  allow_failure: true
  image: rhub/debian-gcc-release:latest
  needs:
  - test:release:gcc
  only:
    changes:
    - R/*.{r,R}
    - inst/tinytest/*.{r,R}
  script:
  - Rscript -e 'lintr::lint_package()'
  stage: check
  variables:
    R_STAGE_DEPS: lintr
  when: on_success
pages:
  artifacts:
    paths:
    - public
  image: rhub/debian-gcc-release:latest
  needs:
  - test:release:gcc
  only:
  - master
  script:
  - R CMD build ${R_BUILD_ARGS} .
  - R CMD INSTALL ${R_INSTALL_ARGS} $(ls -1t *.tar.gz | head -n 1)
  - Rscript -e 'pkgdown::build_site(devel = TRUE)'
  - mkdir -p public/src/contrib
  - Rscript -e 'drat::insertPackage(commandArgs(TRUE), "public")' $(ls -1t *.tar.gz
    | head -n 1)
  stage: deploy
  variables:
    R_STAGE_DEPS: drat pkgload pkgdown
stages:
- build
- test
- check
- deploy
test:devel:clang:
  extends: .test:rpkg
  image: rhub/debian-clang-devel:latest
test:devel:gcc:
  extends: .test:rpkg
  image: rhub/debian-gcc-devel:latest
test:patched:gcc:
  extends: .test:rpkg
  image: rhub/debian-gcc-patched:latest
test:release:gcc:
  extends: .test:rpkg
  image: rhub/debian-gcc-release:latest
variables:
  APT_DEPS: devscripts libcurl4-openssl-dev libssl-dev libxml2-dev libicu-dev git-core
    qpdf pandoc pandoc-citeproc
  CRAN: http://cran.r-project.org
  DOCKER_DRIVER: overlay2
  GIT_SUBMODULE_STRATEGY: recursive
  R_BUILD_ARGS: --no-manual
  R_CHECK_ARGS: '--no-manual --as-cran '
  R_INSTALL_ARGS: --no-multiarch --with-keep.source
  R_LIBS: ${CI_PROJECT_DIR}/ci/R/library
  R_REMOTES_UPGRADE: always
