.check-base:
  script: &id001
  - cargo check --verbose
  stage: check
before_script:
- apt-get update
- apt-get install -y --no-install-recommends build-essential pkg-config libssl-dev
- 'rustup install $RUST_VERSION

  rustup default $RUST_VERSION

  '
- 'rustc --version

  cargo --version

  '
cache:
  key: $CI_PIPELINE_ID-$RUST_VERSION
  paths:
  - /usr/local/cargo/registry/
  - /usr/local/rustup/toolchains/
  - /usr/local/rustup/update-hashes/
  - target/
cargo-test:
  dependencies: []
  needs:
  - check-stable
  script:
  - cargo test --verbose
  - cargo test --no-default-features --features send3,crypto-ring
  - cargo test --no-default-features --features send2,crypto-openssl
  - cargo test --no-default-features --features send3,crypto-openssl
  - cargo test --no-default-features --features send2,send3,crypto-openssl
  stage: test
check-beta:
  script: *id001
  stage: check
  variables:
    RUST_VERSION: beta
check-nightly:
  script: *id001
  stage: check
  variables:
    RUST_VERSION: nightly
check-old:
  script: *id001
  stage: check
  variables:
    RUST_VERSION: 1.56.1
check-stable:
  script: *id001
  stage: check
crate:
  only:
  - /^v(\d+\.)*\d+.*$/
  script:
  - echo "Creating release crate on crates.io..."
  - echo $CARGO_TOKEN | cargo login
  - echo "Publishing crate to crates.io..."
  - cargo publish --verbose
  stage: release
image: rust:slim
stages:
- check
- test
- release
- trigger
trigger-ffsend:
  only:
  - /^v([0-9]+\.)*[0-9]+.*$/
  script:
  - apt-get install -y --no-install-recommends curl
  - curl -X POST -F token=$FFSEND_TOKEN -F ref=master https://gitlab.com/api/v4/projects/5664378/trigger/pipeline
  stage: trigger
variables:
  RUST_VERSION: stable
