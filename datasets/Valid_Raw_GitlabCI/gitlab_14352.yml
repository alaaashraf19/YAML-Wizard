before_script:
- make deps
compiled_varroa_dev:
  artifacts:
    expire_in: 4 weeks
    name: varroa-dev-${CI_COMMIT_REF_NAME}
    paths:
    - varroa
    - varroa_bash_completion
    - varroa-fuse
    - varroa.user.js
  except:
  - tags
  script:
  - make build-bin
  stage: build
compiled_varroa_released_version:
  artifacts:
    name: varroa-${CI_COMMIT_REF_NAME}
    paths:
    - varroa
    - varroa_bash_completion
    - varroa-fuse
    - varroa.user.js
  only:
  - tags
  script:
  - make build-bin
  stage: build
image: golang:latest
stages:
- build
