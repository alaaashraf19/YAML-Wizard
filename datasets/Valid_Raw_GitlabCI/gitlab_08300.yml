.build_base:
  after_script:
  - '[[ "$(find bin -type f -name docker-machine*)" != "" ]]'
  artifacts:
    expire_in: 1 week
    paths:
    - bin/
  before_script:
  - apk add -U make bash
  - export TARGET_OS=$(echo $CI_JOB_NAME | cut -d ' ' -f 1)
  - export TARGET_ARCH=$(echo $CI_JOB_NAME | cut -d ' ' -f 2)
  extends:
  - .common:docker-in-docker
  - .rules:merge-requests
  needs:
  - prepare done
  stage: build
.build_x: &id001
  extends:
  - .build_base
  script: make build-x
darwin amd64: *id001
linux amd64: *id001
linux arm: *id001
linux arm64: *id001
openbsd amd64: *id001
windows amd64: *id001
