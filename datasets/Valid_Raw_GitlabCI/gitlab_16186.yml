before_script:
- apt-get update && apt-get -y install postgresql-client
- mix local.hex --force
- mix deps.get --only test
- mix ecto.create
- mix ecto.migrate
image: trenpixster/elixir:latest
mix:
  script:
  - mix test
services:
- postgres:latest
variables:
  MIX_ENV: test
  POSTGRES_DB: job_board_test
  POSTGRES_HOST: postgres
  POSTGRES_PASSWORD: postgres
  POSTGRES_USER: postgres
