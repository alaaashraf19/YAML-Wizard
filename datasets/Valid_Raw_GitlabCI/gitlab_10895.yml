before_script:
- cd src
- bundle install
image: ruby:2.3
pages:
  artifacts:
    paths:
    - public
  only:
  - master
  script:
  - jekyll build -d public
  - mv public ..
test:
  artifacts:
    paths:
    - src/test
  except:
  - master
  script:
  - jekyll build -d test
  stage: test
variables:
  JEKYLL_ENV: production
  LC_ALL: C.UTF-8
