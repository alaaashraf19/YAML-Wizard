build:
  artifacts:
    paths:
    - dist/
  script:
  - npm install
  - npm run build
  stage: build
deploy-live:
  environment: live
  only:
  - master
  script:
  - which ssh-agent || ( apt-get update -y && apt-get install openssh-client -y )
  - eval $(ssh-agent -s)
  - ssh-add <(echo "$DEPLOY_KEY")
  - mkdir -p ~/.ssh
  - '[[ -f /.dockerenv ]] && echo -e "Host *\n\tStrictHostKeyChecking no\n\n" > ~/.ssh/config'
  - rsync -av --no-perms --no-owner --no-group --exclude-from '.gitlab-ci-rsync-exclude.txt'
    --exclude '.git' --delete ./ jbennest@allidoisscoregoals.com:/home/brock/web/
  stage: deploy
image: smmccabe/docker:latest
stages:
- build
- deploy
