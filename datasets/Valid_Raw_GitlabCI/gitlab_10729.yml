.template_npm: &id002
  before_script: &id005
  - alias yarn='yarn --non-interactive --frozen-lockfile'
  - yarn config set unsafe-perm true
  - yarn install
  script: &id006
  - yarn run $CI_JOB_NAME
  stage: test
  tags: &id001
  - docker
  variables: &id007
    NPM_CONFIG_LOGLEVEL: warn
.template_publish-npm:
  script: &id003
  - echo "//registry.npmjs.org/:_authToken=$NPM_TOKEN" > ~/.npmrc
  - yarn global add ci-build-version
  - yarn publish --registry https://registry.npmjs.org/ --access public --tag $tag
    --no-git-tag-version --new-version "$(ci-build-version -f package.json)"
  stage: deploy
  tags: &id004
  - npm-registry
.template_tag-docker:
  tags: *id001
cache:
  paths:
  - node_modules/
compile: *id002
deploy:npm-dev:
  environment: dev
  only:
  - develop@janslow/ci-build-version
  script: *id003
  stage: deploy
  tags: *id004
  variables:
    tag: dev
deploy:npm-latest:
  environment: latest
  only:
  - tags@janslow/ci-build-version
  script: *id003
  stage: deploy
  tags: *id004
  variables:
    tag: latest
image: node:8
test:mocha 6:
  before_script: *id005
  image: node:6
  script: *id006
  stage: test
  tags: *id001
  variables: *id007
test:mocha 8: *id002
test:tslint: *id002
