build_packages:
  artifacts:
    paths:
    - public
  before_script:
  - npm install
  image: node:latest
  script:
  - npm run build
  stage: build
deploy_production:
  environment:
    name: production
    url: https://production.example.com
  only:
  - master
  script:
  - echo "Deploy to production server"
  stage: deploy
  when: manual
deploy_staging:
  environment:
    name: staging
    url: https://staging.example.com
  only:
  - master
  script:
  - echo "Deploy to staging server"
  stage: deploy
e2e:
  artifacts:
    paths:
    - codeceptjs/output-error/
    - codeceptjs/snapshots/
  before_script:
  - docker-compose run application npm install
  image: tmaier/docker-compose:latest
  script:
  - NODE_ENV=docker docker-compose run codeceptjs ./node_modules/.bin/codeceptjs run
  services:
  - docker:dind
  stage: test
  variables:
    DOCKER_DRIVER: overlay2
eslint:
  before_script:
  - npm install
  image: node:latest
  script:
  - npm run eslint
  stage: code_quality
stages:
- code_quality
- build
- test
- deploy
unit_test:
  before_script:
  - npm install
  image: node:latest
  script:
  - npm test
  stage: test
