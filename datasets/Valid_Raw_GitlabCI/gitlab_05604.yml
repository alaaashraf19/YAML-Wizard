.vs:
  artifacts:
    expire_in: 1 week
    paths:
    - obj/
    when: on_failure
  before_script:
  - If (!(test-path .vcpkg\archives)) { mkdir -p .vcpkg\archives }
  - mkdir -p obj; if ($?) {cd obj}; if (! $?) {exit 1}
  - cmake -A $PLATFORM -DCMAKE_BUILD_TYPE=Debug -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake
    -DPICKY_DEVELOPER=ON -DUNIT_TESTING=ON ..
  cache:
    key: vcpkg.${CI_JOB_NAME}
    paths:
    - .vcpkg
  except:
  - tags
  script:
  - cmake --build .
  - ctest -C Debug --output-on-failure
  stage: test
  tags:
  - saas-windows-medium-amd64
  variables:
    ErrorActionPreference: STOP
coverity:
  artifacts:
    expire_in: 1 week
    paths:
    - obj/cov-int/*.txt
    when: on_failure
  image: $CI_REGISTRY/$BUILD_IMAGES_PROJECT:$FEDORA_BUILD
  only:
    refs:
    - master
    - schedules
    variables:
    - $COVERITY_SCAN_TOKEN != null
    - $COVERITY_SCAN_PROJECT_NAME != null
    - $COVERITY_SCAN_EMAIL != null
  script:
  - mkdir obj && cd obj
  - wget https://scan.coverity.com/download/linux64 --post-data "token=$COVERITY_SCAN_TOKEN&project=$COVERITY_SCAN_PROJECT_NAME"
    -O /tmp/coverity_tool.tgz
  - tar xf /tmp/coverity_tool.tgz
  - cmake -DCMAKE_BUILD_TYPE=Debug -DPICKY_DEVELOPER=ON -DUNIT_TESTING=ON ..
  - cov-analysis-linux64-*/bin/cov-build --dir cov-int make -j$(nproc)
  - tar czf cov-int.tar.gz cov-int
  - curl --form token=$COVERITY_SCAN_TOKEN --form email=$COVERITY_SCAN_EMAIL --form
    file=@cov-int.tar.gz --form version="`git describe --tags`" --form description="CI
    build" https://scan.coverity.com/builds?project=$COVERITY_SCAN_PROJECT_NAME
  stage: analysis
fedora/address-sanitizer:
  artifacts:
    expire_in: 1 week
    paths:
    - obj/
    when: on_failure
  except:
  - tags
  image: $CI_REGISTRY/$BUILD_IMAGES_PROJECT:$FEDORA_BUILD
  script:
  - mkdir -p obj && cd obj && cmake -DCMAKE_BUILD_TYPE=AddressSanitizer -DPICKY_DEVELOPER=ON
    -DUNIT_TESTING=ON .. && make -j$(nproc) && ctest --output-on-failure
  stage: build
fedora/build:
  artifacts:
    expire_in: 1 week
    paths:
    - obj/
    when: on_failure
  except:
  - tags
  image: $CI_REGISTRY/$BUILD_IMAGES_PROJECT:$FEDORA_BUILD
  script:
  - pushd coverity && make && popd
  - mkdir -p obj && cd obj && cmake -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/tmp/cmocka
    -DPICKY_DEVELOPER=ON .. && make -j$(nproc) && make install
  stage: build
fedora/clang/x86_64:
  artifacts:
    expire_in: 1 week
    paths:
    - obj/
    when: on_failure
  except:
  - tags
  image: $CI_REGISTRY/$BUILD_IMAGES_PROJECT:$FEDORA_BUILD
  script:
  - mkdir -p obj && cd obj && cmake -DCMAKE_C_COMPILER=clang -DCMAKE_BUILD_TYPE=RelWithDebInfo
    -DPICKY_DEVELOPER=ON -DUNIT_TESTING=ON .. && make -j$(nproc) && ctest --output-on-failure
  stage: test
fedora/coverage:
  artifacts:
    expire_in: 1 week
    paths:
    - obj/
    when: on_failure
  coverage: '/Percentage Coverage: \d+.\d+%/'
  except:
  - tags
  image: $CI_REGISTRY/$BUILD_IMAGES_PROJECT:$FEDORA_BUILD
  script:
  - mkdir -p obj && cd obj && cmake -DCMAKE_BUILD_TYPE=Profiling -DCMAKE_INSTALL_PREFIX=/tmp/cmocka
    -DPICKY_DEVELOPER=ON -DUNIT_TESTING=ON .. && make -j$(nproc) && make ExperimentalTest
    && make ExperimentalCoverage
  stage: analysis
fedora/csbuild:
  artifacts:
    expire_in: 1 week
    paths:
    - obj-csbuild/
    when: on_failure
  except:
  - tags
  image: $CI_REGISTRY/$BUILD_IMAGES_PROJECT:$FEDORA_BUILD
  script:
  - "if [[ -z \"$CI_COMMIT_BEFORE_SHA\" ]]; then\n    export CI_COMMIT_BEFORE_SHA=$(git\
    \ rev-parse \"${CI_COMMIT_SHA}~20\")\nfi\n\n# Check if the commit exists in this\
    \ branch\n# This is not the case for a force push\ngit branch --contains $CI_COMMIT_BEFORE_SHA\
    \ 2>/dev/null ||\n  export CI_COMMIT_BEFORE_SHA=$(git rev-parse \"${CI_COMMIT_SHA}~20\"\
    )\n\nexport CI_COMMIT_RANGE=\"$CI_COMMIT_BEFORE_SHA..$CI_COMMIT_SHA\"\n"
  - export CSCPPC_ADD_OPTS="--library=./cppcheck/cmocka.cfg"
  - csbuild --build-dir=obj-csbuild --prep-cmd="cmake -DCMAKE_BUILD_TYPE=Debug -DPICKY_DEVELOPER=ON
    -DUNIT_TESTING=ON @SRCDIR@" --build-cmd "make clean && make -j$(nproc)" --git-commit-range
    $CI_COMMIT_RANGE --color --print-current --print-fixed
  stage: analysis
fedora/gcc/x86_64:
  artifacts:
    expire_in: 1 week
    paths:
    - obj/
    when: on_failure
  except:
  - tags
  image: $CI_REGISTRY/$BUILD_IMAGES_PROJECT:$FEDORA_BUILD
  script:
  - mkdir -p obj && cd obj && cmake -DCMAKE_BUILD_TYPE=RelWithDebInfo -DPICKY_DEVELOPER=ON
    -DUNIT_TESTING=ON .. && make -j$(nproc) && ctest --output-on-failure
  stage: test
fedora/memory-sanitizer:
  artifacts:
    expire_in: 1 week
    paths:
    - obj/
    when: on_failure
  except:
  - tags
  image: $CI_REGISTRY/$BUILD_IMAGES_PROJECT:$FEDORA_BUILD
  script:
  - mkdir -p obj && cd obj && cmake -DCMAKE_BUILD_TYPE=MemorySanitizer -DCMAKE_C_COMPILER=clang
    -DCMAKE_CXX_COMPILER=clang++ -DUNIT_TESTING=ON .. && make -j$(nproc) && ctest
    --output-on-failure
  stage: analysis
fedora/meson:
  artifacts:
    expire_in: 1 week
    paths:
    - build/
    when: on_failure
  except:
  - tags
  image: $CI_REGISTRY/$BUILD_IMAGES_PROJECT:$FEDORA_BUILD
  script:
  - meson build -Dunit_testing=true && meson test -C build --print-errorlogs
  stage: build
fedora/mingw32:
  artifacts:
    expire_in: 1 week
    paths:
    - obj/
    when: on_failure
  except:
  - tags
  image: $CI_REGISTRY/$BUILD_IMAGES_PROJECT:$MINGW_BUILD
  script:
  - export WINEPATH=/usr/i686-w64-mingw32/sys-root/mingw/bin
  - export WINEDEBUG=-all
  - export XDG_RUNTIME_DIR="/run/user/$(id --user)"
  - mkdir -p ${XDG_RUNTIME_DIR}
  - mkdir -p obj && cd obj && mingw32-cmake -DCMAKE_BUILD_TYPE=RelWithDebInfo -DPICKY_DEVELOPER=ON
    -DWITH_SFTP=ON -DWITH_SERVER=ON -DWITH_ZLIB=ON -DWITH_PCAP=ON -DUNIT_TESTING=ON
    .. && make -j$(nproc) && ctest --output-on-failure
  stage: test
fedora/mingw64:
  artifacts:
    expire_in: 1 week
    paths:
    - obj/
    when: on_failure
  except:
  - tags
  image: $CI_REGISTRY/$BUILD_IMAGES_PROJECT:$MINGW_BUILD
  script:
  - export WINEPATH=/usr/x86_64-w64-mingw32/sys-root/mingw/bin
  - export WINEDEBUG=-all
  - export XDG_RUNTIME_DIR="/run/user/$(id --user)"
  - mkdir -p ${XDG_RUNTIME_DIR}
  - mkdir -p obj && cd obj && mingw64-cmake -DCMAKE_BUILD_TYPE=RelWithDebInfo -DPICKY_DEVELOPER=ON
    -DUNIT_TESTING=ON .. && make -j$(nproc) && ctest --output-on-failure
  stage: test
fedora/undefined-sanitizer:
  artifacts:
    expire_in: 1 week
    paths:
    - obj/
    when: on_failure
  except:
