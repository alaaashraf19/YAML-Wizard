    .. && make -j$(nproc) && ctest --output-on-failure
  stage: analysis
freebsd/x86_64:
  artifacts:
    expire_in: 1 week
    paths:
    - obj/
    when: on_failure
  except:
  - tags
  image: null
  only:
  - branches@cmocka/cmocka
  - branches@cryptomilk/cmocka
  script:
  - mkdir -p obj && cd obj && cmake -DCMAKE_BUILD_TYPE=RelWithDebInfo -DPICKY_DEVELOPER=ON
    -DUNIT_TESTING=ON .. && make && ctest --output-on-failure
  stage: test
  tags:
  - freebsd
stages:
- build
- test
- analysis
tumbleweed/docs:
  artifacts:
    expire_in: 1 week
    paths:
    - obj/
    when: on_failure
  except:
  - tags
  image: $CI_REGISTRY/$BUILD_IMAGES_PROJECT:$TUMBLEWEED_BUILD
  script:
  - mkdir -p obj && cd obj && cmake .. && make docs
  stage: build
tumbleweed/static-analysis:
  artifacts:
    expire_in: 1 week
    paths:
    - obj/scan
    when: on_failure
  except:
  - tags
  image: $CI_REGISTRY/$BUILD_IMAGES_PROJECT:$TUMBLEWEED_BUILD
  script:
  - export CCC_CC=clang
  - export CCC_CXX=clang++
  - mkdir -p obj && cd obj && scan-build cmake -DCMAKE_BUILD_TYPE=Debug -DCMAKE_C_COMPILER=clang
    -DCMAKE_CXX_COMPILER=clang++ -DPICKY_DEVELOPER=ON -DUNIT_TESTING=ON .. && scan-build
    --status-bugs -o scan make -j$(nproc)
  stage: analysis
