build:
  artifacts:
    expire_in: 1 day
    name: build-$CI_BUILD_REF
    paths:
    - server/build
    - client/build
    untracked: true
    when: on_success
  image: node:alpine
  script:
  - BASEDIR=$(pwd)
  - cd $BASEDIR/server && npm install && npm run clean && npm run build
  - cd $BASEDIR/client && npm install && npm run build
  stage: build
deploy:
  dependencies:
  - build
  only:
  - master
  script:
  - docker login -u gitlab-ci-token -p $CI_JOB_TOKEN registry.gitlab.com
  - docker build -t $DOCKER_IMAGE .
  - docker push $DOCKER_IMAGE
  stage: deploy
  variables:
    DOCKER_IMAGE: $DOCKER_REGISTRY/annotate:latest
image: docker:latest
services:
- docker:dind
stages:
- build
- deploy
variables:
  DOCKER_REGISTRY: registry.gitlab.com/gfelbing
