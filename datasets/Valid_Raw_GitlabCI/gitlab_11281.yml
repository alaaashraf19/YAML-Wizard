image: docker:stable
job-build-nginx-image:
  after_script:
  - docker logout $REGISTRY
  before_script:
  - docker login -u gitlab-ci-token -p $CI_BUILD_TOKEN $REGISTRY
  dependencies:
  - job-composer-install
  only:
  - master@kube-laravel/hellolara
  script:
  - docker build --no-cache -f ./docker/nginx --tag $NGINX_IMAGE:$CI_BUILD_REF --tag
    $NGINX_IMAGE:latest .
  - docker push $NGINX_IMAGE:$CI_BUILD_REF
  - docker push $NGINX_IMAGE:latest
  stage: build
job-build-php-fpm-image:
  after_script:
  - docker logout $REGISTRY
  before_script:
  - docker login -u gitlab-ci-token -p $CI_BUILD_TOKEN $REGISTRY
  dependencies:
  - job-composer-install
  only:
  - master@kube-laravel/hellolara
  script:
  - docker build --no-cache -f ./docker/php-fpm --tag $PHPFPM_IMAGE:$CI_BUILD_REF
    --tag $PHPFPM_IMAGE:latest .
  - docker push $PHPFPM_IMAGE:$CI_BUILD_REF
  - docker push $PHPFPM_IMAGE:latest
  stage: build
job-composer-install:
  artifacts:
    paths:
    - vendor/
  image: composer
  only:
  - master@kube-laravel/hellolara
  script:
  - composer install
  stage: prepare
services:
- docker:stable-dind
stages:
- prepare
- build
variables:
  DOCKER_DRIVER: overlay2
  DOCKER_HOST: tcp://docker:2375
  GITLAB_HOST: gitlab.com
  NGINX_IMAGE: $REGISTRY/$CI_PROJECT_PATH/nginx
  PHPFPM_IMAGE: $REGISTRY/$CI_PROJECT_PATH/php-fpm
  REGISTRY: registry.gitlab.com
