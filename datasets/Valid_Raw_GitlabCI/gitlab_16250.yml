image: fedora:latest
pages:
  artifacts:
    paths:
    - public
  only:
  - master
  script:
  - dnf --quiet --assumeyes install flatpak flatpak-builder cmake make automake gcc
    gcc-c++
  - flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
  - flatpak install -y flathub org.kde.Sdk//5.15 org.kde.Platform//5.15
  - curl https://raw.githubusercontent.com/flathub/eu.scarpetta.PDFMixTool/master/eu.scarpetta.PDFMixTool.yaml
    > tmp.yaml
  - head -n -3 tmp.yaml > eu.scarpetta.PDFMixTool.yaml
  - 'echo "      - {type: dir, path: .}" >> eu.scarpetta.PDFMixTool.yaml'
  - flatpak-builder --repo=public --force-clean build-dir eu.scarpetta.PDFMixTool.yaml
  - flatpak build-update-repo public
  stage: deploy
variables:
  GIT_SUBMODULE_STRATEGY: recursive
