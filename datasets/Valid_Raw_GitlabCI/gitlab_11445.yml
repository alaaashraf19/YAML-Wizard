run_tests_on_branch:
  except:
  - master
  image: python
  only:
  - branches
  script:
  - python --version
  - pip install awscli
  - pip install pytest
  - pip install boto3
  - pip install pytest-mock
  - cd sam-app/
  - pip install -r requirements.txt
  - pytest tests/
  - cd letmehelp/
  - aws cloudformation validate-template --template-body file://template.yaml
sam_deploy_to_aws:
  image: python
  only:
  - master
  script:
  - python --version
  - pip install awscli
  - pip install pytest
  - pip install boto3
  - pip install pytest-mock
  - cd sam-app/
  - pip install -r requirements.txt
  - pytest tests/
  - pip install -r requirements.txt -t letmehelp/
  - cd letmehelp/
  - aws cloudformation validate-template --template-body file://template.yaml
  - aws cloudformation package --template-file template.yaml --output-template-file
    serverless-output.yaml --s3-bucket letmehelp-lambda-api
  - aws cloudformation deploy --template-file ./serverless-output.yaml --stack-name
    letmehelp-api --capabilities CAPABILITY_IAM
