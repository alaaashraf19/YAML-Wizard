build:
  artifacts:
    paths:
    - public
  dependencies:
  - clean
  - installDeps
  script:
  - ls -ltar
  - npm run build
  stage: build
clean:
  artifacts:
    paths:
    - public
  script:
  - npm run clean
  stage: install
image: node
installDeps:
  artifacts:
    paths:
    - node_modules
  script:
  - npm i
  stage: install
pages:
  artifacts:
    paths:
    - public
  dependencies:
  - build
  only:
  - master
  script: ls -ltarR public
  stage: deploy
stages:
- install
- build
- deploy
