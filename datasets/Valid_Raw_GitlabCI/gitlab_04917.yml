image: registry.gitlab.com/charts/alpine-helm
lint:
  except:
  - master
  script:
  - helm lint .
  stage: test
release-chart:
  only:
  - master
  script:
  - curl --fail --request POST --form "token=$CI_JOB_TOKEN" --form ref=master https://gitlab.com/api/v4/projects/2860651/trigger/pipeline
  stage: release
stages:
- test
- release
