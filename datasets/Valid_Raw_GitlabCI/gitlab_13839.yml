before_script:
- apk add --no-cache nodejs nodejs-npm git python g++ make
- npm i
build:
  artifacts:
    paths:
    - build
  script:
  - npm run build
  - npm run build-contracts
  stage: build
  tags:
  - aireach
cache:
  key: ${CI_PROJECT_ID}
  paths:
  - node_modules/
checkstyle:
  script:
  - npm run linting
  stage: checkstyle
  tags:
  - aireach
deploy:
  before_script:
  - apk add --no-cache nodejs nodejs-npm git python g++ make openssh-client
  - node scripts/exec/retriever
  - node scripts/exec/markdown_parser
  - mkdir -p ~/.ssh
  - echo "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_rsa
  - chmod 700 ~/.ssh/id_rsa
  - eval "$(ssh-agent -s)"
  - ssh-add ~/.ssh/id_rsa
  - ssh-keyscan -H '188.166.218.211' >> ~/.ssh/known_hosts
  only:
  - develop
  script:
  - scp -r ./.temp/* root@188.166.218.211:/var/www/Olympus/Website/contracts/
  - scp -r ./docs/build/* root@188.166.218.211:/var/www/Olympus/Website/docs/
  stage: deploy
  tags:
  - aireach
image: alpine:latest
stages:
- build
- checkstyle
- test
- coverage
- deploy
test:
  script:
  - npm test
  stage: test
  tags:
  - aireach
