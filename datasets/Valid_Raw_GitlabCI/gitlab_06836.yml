image: node:16.20.2
pages:
  artifacts:
    paths:
    - public
  cache:
    paths:
    - docs/node_modules/
  only:
  - master
  script:
  - git remote rm origin
  - git remote add origin https://access_cicd:$ACCESS_TOKEN@gitlab.com/DGothrek/ipyaggrid.git
  - git subtree push --prefix docs/notebooks/ origin binder-demo
  - mkdir public
  - cd docs
  - npm install
  - npm run docs:build
variables:
  GIT_TRACING: '2'
