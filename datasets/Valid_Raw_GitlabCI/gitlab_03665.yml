build:debug:
  artifacts:
    expire_in: 1 hour
    paths:
    - build_debug/kerasify
  dependencies:
  - setup_env
  script:
  - apt update -qq
  - apt install -y cmake clang
  - mkdir build_debug
  - cd build_debug
  - cmake .. -DCMAKE_CXX_COMPILER=clang++ -DCMAKE_C_COMPILER=clang -DCMAKE_BUILD_TYPE=Debug
  - cmake --build .
  stage: build
build:release:
  artifacts:
    expire_in: 1 hour
    paths:
    - build_release/kerasify
  dependencies:
  - setup_env
  script:
  - apt update -qq
  - apt install -y cmake clang
  - mkdir build_release
  - cd build_release
  - cmake .. -DCMAKE_CXX_COMPILER=clang++ -DCMAKE_C_COMPILER=clang -DCMAKE_BUILD_TYPE=Release
  - cmake --build .
  stage: build
image: ubuntu:18.10
setup_env:
  artifacts:
    expire_in: 1 hour
    paths:
    - include/test/
    - models/
  script:
  - apt update -qq
  - apt install -y clang-format python3-pip
  - pip3 install keras tensorflow
  - python3 make_tests.py
  stage: prepare
stages:
- prepare
- build
- test
test:debug:
  dependencies:
  - setup_env
  - build:debug
  script:
  - ./build_debug/kerasify
  stage: test
test:release:
  dependencies:
  - setup_env
  - build:release
  script:
  - ./build_release/kerasify
  stage: test
