build:vendor:php-7.2:
  except:
  - master
  image: registry.gitlab.com/pyrex-fwi/sapar-id3:php-7.2
  script:
  - cat composer.json
  - composer install
  - vendor/bin/phpunit --verbose --debug
  stage: build-7.2
cache:
  key: $CI_JOB_NAME
  paths:
  - vendor/
pages:
  artifacts:
    expire_in: 30 days
    paths:
    - public
  image: registry.gitlab.com/pyrex-fwi/sapar-id3:php-7.4
  only:
  - master
  script:
  - composer install
  - vendor/bin/phpunit --verbose --debug --coverage-html coverage/ --coverage-text
    --colors=never
  - mv coverage/ public/
  - vendor/bin/phpmetrics --report-html=public/report ./src
  stage: publish
stages:
- build-7.2
- build-latest
- publish
- deploy
