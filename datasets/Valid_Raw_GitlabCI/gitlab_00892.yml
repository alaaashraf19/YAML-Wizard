build-project:
  artifacts:
    expire_in: 1 days
    paths:
    - coverage/
    - doc/
    - dist/
  coverage: /Lines\s*:\s*(\d+\.\d+)%/
  image: node:8
  only:
  - master
  - develop
  script:
  - useradd -m -p 123 builder
  - apt-get update
  - apt-get -yq install chromium git
  - npm install -g bower grunt-cli
  - npm install
  - bower install --allow-root
  - chmod 777 -fR .
  - su builder -c "grunt test"
  - find . -name lcov.info | xargs -d '\n' cat | node_modules/.bin/codacy-coverage
    -t $CODACY_PROJECT_TOKEN
  - su builder -c "grunt release"
cache:
  paths:
  - node_modules
image: viraweb/mblowfish-angularjs-builder:1.0.0
pages:
  artifacts:
    expire_in: 90 days
    paths:
    - public
  dependencies:
  - build-project
  only:
  - master
  script:
  - ls -l
  - mkdir .public
  - mv coverage/ .public/coverage/
  - mv doc/ .public/doc/
  - mv .public public
  stage: deploy
