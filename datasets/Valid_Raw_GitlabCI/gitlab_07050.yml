.test:
  artifacts: &id001
    expire_in: 1 hour
    paths:
    - .coverage*
before_script:
- apk update && apk add curl
- curl -O https://bootstrap.pypa.io/get-pip.py
- python get-pip.py
- pip install -q tox
coverage:
  coverage: /TOTAL.*\s+(\d+\.?\d+?)\%/
  script: tox -e coverage-report
  stage: pre-release
flake8:
  script: tox -e flake8
image: python:3.10-alpine
python3.10-django3.2:
  artifacts: *id001
  image: python:3.10-alpine
  script: tox -e python3.10-django3.2
python3.10-django4.0:
  artifacts: *id001
  image: python:3.10-alpine
  script: tox -e python3.10-django4.0
python3.10-djangomaster:
  allow_failure: true
  artifacts: *id001
  image: python:3.10-alpine
  script: tox -e python3.10-djangomaster
python3.9-django3.2:
  artifacts: *id001
  image: python:3.9-alpine
  script: tox -e python3.10-django3.2
python3.9-django4.0:
  artifacts: *id001
  image: python:3.9-alpine
  script: tox -e python3.9-django4.0
release:
  only:
  - tags
  script:
  - pip install -q wheel twine
  - python setup.py bdist_wheel sdist
  - twine upload dist/*
  stage: release
  variables:
    TWINE_PASSWORD: $PYPI_PASSWORD
    TWINE_USERNAME: $PYPI_USERNAME
stages:
- test
- pre-release
- release
