before_script:
- pip install -r test-requirements.txt
lint:
  image: python:3.6
  script: tox -epep8
  stage: lint
pages:
  artifacts:
    paths:
    - public
  image: python:3.6
  only:
  - master
  script:
  - pip install sphinx
  - pip install .
  - cd docs/
  - make html
  - mv _build/html/ ../public/
  stage: deploy
stages:
- lint
- test
- deploy
test_python34:
  image: python:3.4
  script: tox -epy34
  stage: test
test_python35:
  image: python:3.5
  script: tox -epy35
  stage: test
test_python36:
  image: python:3.6
  script: tox -epy36
  stage: test
