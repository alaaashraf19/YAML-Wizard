pages:
  artifacts:
    paths:
    - public
  extends: .pages
  only:
  - master
  - next
  resource_group: pages
  script:
  - UPDATES=docs
  - echo $UPDATES
  - mkdir public
  - wget -q $MASTER_ARTIFACT_URL -O master.zip && unzip -q master.zip -d master &&
    mv -t public master/public/master || true
  - wget -q $NEXT_ARTIFACT_URL -O next.zip && unzip -q next.zip -d next && mv -t public
    next/public/next || true
  - mkdir -p public/$CI_COMMIT_REF_NAME
  - "for PART in $UPDATES\ndo\n  echo \"Updating $PART\"\n  rm -rf public/$CI_COMMIT_REF_NAME/$PART\n\
    \  mv build/$PART public/$CI_COMMIT_REF_NAME/\ndone\n"
  variables:
    MASTER_ARTIFACT_URL: $CI_API_V4_URL/projects/$CI_PROJECT_ID/jobs/artifacts/master/download?job=pages
    NEXT_ARTIFACT_URL: $CI_API_V4_URL/projects/$CI_PROJECT_ID/jobs/artifacts/next/download?job=pages
