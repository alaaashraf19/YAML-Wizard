.amd64:
  variables: &id002
    ARCH: amd64
    ARCH_TRIPLET: x86_64-linux-gnu
.arm64:
  variables: &id003
    ARCH: arm64
    ARCH_TRIPLET: aarch64-linux-gnu
.armhf:
  variables: &id004
    ARCH: armhf
    ARCH_TRIPLET: arm-linux-gnueabihf
.debug:
  variables: &id001
    CLICKABLE_DEBUG_BUILD: '1'
    CLICKABLE_ENV_TDLIB_DEBUG: '1'
  when: manual
.debug-app:
  stage: debug
  variables: *id001
  when: manual
.debug-deps:
  stage: debug-deps
  variables: *id001
  when: manual
.quickflux:
  artifacts:
    expire_in: 1 week
    paths:
    - build/$ARCH_TRIPLET/quickflux/install
  script: clickable build --libs quickflux
  stage: deps
.rlottie:
  artifacts:
    expire_in: 1 week
    paths:
    - build/$ARCH_TRIPLET/rlottie/install
  script: clickable build --libs rlottie
  stage: deps-prepare
.rlottie-qml:
  artifacts:
    expire_in: 1 week
    paths:
    - build/$ARCH_TRIPLET/rlottie-qml/install
  script: clickable build --libs rlottie-qml
  stage: deps
.tdlib:
  artifacts:
    expire_in: 1 week
    paths:
    - build/$ARCH_TRIPLET/tdlib/install
  cache:
    key: $CI_JOB_NAME-$TDLIB_VERSION-A
    paths:
    - build/$ARCH_TRIPLET/tdlib
    untracked: true
  dependencies:
  - tdlib-prepare
  needs:
  - tdlib-prepare
  script: clickable build --libs tdlib
  stage: deps
.teleports:
  artifacts:
    expire_in: 1 week
    paths:
    - build/$ARCH_TRIPLET/app
  script: clickable build --clean
  stage: build
cache:
  key: $CI_JOB_NAME-$TDLIB_VERSION-A
  untracked: true
default:
  image: clickable/ci-$UT_VERSION-$ARCH:$CLICKABLE_VERSION
publish:
  artifacts:
    expire_in: 30 days
    paths:
    - build/arm-linux-gnueabihf/app/*.click
    - build/aarch64-linux-gnu/app/*.click
    - build/x86_64-linux-gnu/app/*.click
  dependencies:
  - teleports-amd64
  - teleports-arm64
  - teleports-armhf
  rules:
  - if: $CI_COMMIT_TAG
  script:
  - clickable publish --arch amd64 -- "$CI_COMMIT_MESSAGE"
  - clickable publish --arch arm64
  - clickable publish --arch armhf
  stage: publish
  variables: *id002
quickflux-amd64:
  extends: .quickflux
  variables: *id002
quickflux-arm64:
  extends: .quickflux
  variables: *id003
quickflux-armhf:
  extends: .quickflux
  variables: *id004
rlottie-amd64:
  extends: .rlottie
  variables: *id002
rlottie-arm64:
  extends: .rlottie
  variables: *id003
rlottie-armhf:
  extends: .rlottie
  variables: *id004
rlottie-qml-amd64:
  dependencies:
  - rlottie-amd64
  extends: .rlottie-qml
  variables: *id002
rlottie-qml-arm64:
  dependencies:
  - rlottie-arm64
  extends: .rlottie-qml
  variables: *id003
rlottie-qml-armhf:
  dependencies:
  - rlottie-armhf
  extends: .rlottie-qml
  variables: *id004
stages:
- deps-prepare
- deps
- build
- publish
- debug-deps
- debug
tdlib-amd64:
  extends: .tdlib
  variables: *id002
tdlib-amd64-debug:
  extends: tdlib-amd64
  stage: debug-deps
  variables: *id001
  when: manual
tdlib-arm64:
  extends: .tdlib
  variables: *id003
tdlib-arm64-debug:
  extends: tdlib-arm64
  stage: debug-deps
  variables: *id001
  when: manual
tdlib-armhf:
  extends: .tdlib
  variables: *id004
tdlib-armhf-debug:
  extends: tdlib-armhf
  stage: debug-deps
  variables: *id001
  when: manual
tdlib-prepare:
  artifacts:
    expire_in: 1 week
    paths:
    - libs/vendor/tdlib
  cache:
    key: $CI_JOB_NAME-$TDLIB_VERSION-A
    paths:
    - build/$ARCH_TRIPLET/tdlib-prepare
    - libs/vendor/tdlib
    untracked: true
  script: clickable build --libs tdlib-prepare
  stage: deps-prepare
  variables: *id002
teleports-amd64:
  dependencies:
  - tdlib-amd64
  - quickflux-amd64
  - rlottie-amd64
  - rlottie-qml-amd64
  extends: .teleports
  variables: *id002
teleports-amd64-debug:
  extends: teleports-amd64
  stage: debug
  variables: *id001
  when: manual
teleports-amd64-tdlib-debug:
  dependencies:
  - tdlib-amd64-debug
  - quickflux-amd64
  - rlottie-amd64
  - rlottie-qml-amd64
  extends: teleports-amd64-debug
teleports-arm64:
  dependencies:
  - tdlib-arm64
  - quickflux-arm64
  - rlottie-arm64
  - rlottie-qml-arm64
  extends: .teleports
  variables: *id003
teleports-arm64-debug:
  extends: teleports-arm64
  stage: debug
  variables: *id001
  when: manual
teleports-arm64-tdlib-debug:
  dependencies:
  - tdlib-arm64-debug
  - quickflux-arm64
  - rlottie-arm64
  - rlottie-qml-arm64
  extends: teleports-arm64-debug
teleports-armhf:
  dependencies:
  - tdlib-armhf
  - quickflux-armhf
  - rlottie-armhf
  - rlottie-qml-armhf
  extends: .teleports
  variables: *id004
teleports-armhf-debug:
  extends: teleports-armhf
  stage: debug
  variables: *id001
  when: manual
teleports-armhf-tdlib-debug:
  dependencies:
  - tdlib-armhf-debug
  - quickflux-armhf
  - rlottie-armhf
  - rlottie-qml-armhf
  extends: teleports-armhf-debug
variables:
  CLICKABLE_VERSION: 8.2.0
  DOCKER_DRIVER: overlay2
  GIT_SUBMODULE_STRATEGY: recursive
  TDLIB_VERSION: 1.8.11
  UT_VERSION: '20.04'
workflow:
  rules:
  - if: $CI_PROJECT_NAMESPACE =~ /^ubports\//
    variables:
      RUNNER_TAG: ubports
  - if: $CI_PROJECT_NAMESPACE !~ /^ubports\//
    variables:
      RUNNER_TAG: saas-linux-small-amd64
