before_script:
- python -V
- pip install virtualenv
- virtualenv venv
- source venv/bin/activate
- pip install -r requirements.txt
cache:
  paths:
  - .cache/pip
  - venv/
image: python:latest
pages:
  artifacts:
    paths:
    - public
  only:
  - master
  script:
  - python ./website-gen.py
variables:
  PIP_CACHE_DIR: $CI_PROJECT_DIR/.cache
