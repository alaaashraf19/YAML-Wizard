before_script:
- apt-get update -yq && apt-get -y install build-essential qt5-qmake qtbase5-dev qtdeclarative5-dev
- apt-get -y install lcov gcovr
build_desktop:
  artifacts:
    paths:
    - build/
  script:
  - export QT_SELECT=qt5
  - mkdir build
  - cd build
  - qmake CONFIG+=debug CONFIG+=coverage ..
  - make -j2
  stage: build
image: ubuntu:bionic
test_desktop:
  dependencies:
  - build_desktop
  script:
  - find build | xargs touch
  - cd build
  - make coverage-html
  stage: test
