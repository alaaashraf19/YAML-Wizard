before_script:
- python3 --version
- python3 -m venv venv
- source venv/bin/activate
- pip install -r requirements/ci.txt -i https://pypi.kbsoftware.co.uk/kb/dev/+simple/
services:
- postgres:14.8
test:
  script:
  - export DATABASE_HOST=postgres
  - export DATABASE_PASS=
  - export DATABASE_PORT=
  - export DATABASE_USER=postgres
  - export DOMAIN=dev
  - export LOG_FOLDER=
  - export LOG_SUFFIX=dev
  - export MAILGUN_SERVER_NAME=test.net
  - export STRIPE_PUBLISH_KEY="pk_test"
  - export STRIPE_SECRET_KEY="sk_test"
  - export USE_OPENID_CONNECT=False
  - pytest --create-db --cov-report term --cov=base
variables:
  POSTGRES_HOST_AUTH_METHOD: trust
