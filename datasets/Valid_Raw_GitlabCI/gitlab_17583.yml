.test-linux:
  stage: test
.test-uactt:
  artifacts: &id007
    expire_in: 1 week
    name: uactt-logs-${CI_COMMIT_REF_SLUG}_${CI_COMMIT_SHA}_job${CI_JOB_ID}
    paths:
    - build/bin/**/*.tap
    - build/bin/**/*.log
    - tests/ClientServer/acceptance_tools/*.log
    - '**/*.*.gcda'
    - '**/*.*.gcno'
    when: always
  image: com.systerel.fr:5000/c838/uactt-linux@sha256:a0ae7d8858cf7da2a5cb02631807a6181f3511cc6c59498a2f2d4d92d95c048f
  script: &id008
  - ulimit -n 1024
  - cd tests/ClientServer/acceptance_tools/ && ./launch_acceptance_tests.sh
