scan_sbom:
  artifacts:
    expire_in: 1 month
    paths:
    - vulnerabilities_table.txt
    when: on_failure
  image: docker.aix.systerel.fr/c838/cyberwatch@sha256:003b648857636b08825c6214c7ae86390e7c958a6814f15ee4c170c737347292
  needs:
  - job: generate_sbom
  rules:
  - changes:
      compare_to: master
      paths:
      - conanfile.py
  - if: $SCAN_SBOM != null
  script:
  - trivy sbom sbom.json --severity HIGH,CRITICAL --exit-code 1 --insecure --output
    vulnerabilities_table.txt
  stage: test
