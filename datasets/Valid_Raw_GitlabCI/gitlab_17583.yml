test-build-from-export:
  artifacts: null
  image: docker.aix.systerel.fr/c838/build@sha256:2fdc121cf7c346c7e46e40fd05fc52ecaf759867b5d0b3ffaab809cbf89f0247
  needs:
  - build-linux64-ASan
  rules:
  - if: $NO_TESTS == null && $WINDOWS_TEST == null && $CROSS_COMPILE == null && $WITH_COVERITY
      == null && $WITH_COVERAGE == null && $WITH_DOC == null && $S2OPC_PUBSUB_ONLY
      == null && $S2OPC_CLIENTSERVER_ONLY == null && $ALL_BUILDS == null && $ALL_TESTS
      == null && $HIL_TESTS == null && $SCAN_SBOM == null && $TEST_NETWORK_FUZZ ==
      null
    when: on_success
  script:
  - mkdir -p -p ${CI_PROJECT_DIR}/samples/ClientServer/write_from_export/build
  - cp ${CI_PROJECT_DIR}/samples/ClientServer/CMakeLists.example.txt ${CI_PROJECT_DIR}/samples/ClientServer/write_from_export/CMakeLists.txt
  - cd ${CI_PROJECT_DIR}/samples/ClientServer/write_from_export/build
  - s2opc_DIR=${CI_PROJECT_DIR}/build cmake ..
  - cmake --build .
  - mkdir -p ${CI_PROJECT_DIR}/samples/ClientServer/build_samples
  - cd ${CI_PROJECT_DIR}/samples/ClientServer/build_samples
  - s2opc_DIR=${CI_PROJECT_DIR}/build cmake ..
  - cmake --build .
  - mkdir -p ${CI_PROJECT_DIR}/samples/PubSub/build_samples
  - cd ${CI_PROJECT_DIR}/samples/PubSub/build_samples
  - s2opc_DIR=${CI_PROJECT_DIR}/build cmake ..
  - cmake --build .
  - mkdir -p ${CI_PROJECT_DIR}/samples/PubSub_ClientServer/build_samples
  - cd ${CI_PROJECT_DIR}/samples/PubSub_ClientServer/build_samples
  - s2opc_DIR=${CI_PROJECT_DIR}/build cmake ..
  - cmake --build .
  - mkdir -p ${CI_PROJECT_DIR}/samples/embedded/build_samples
  - cd ${CI_PROJECT_DIR}/samples/embedded/build_samples
  - s2opc_DIR=${CI_PROJECT_DIR}/build cmake ..
  - cmake --build .
  stage: test
  variables: *id006
test-check:
  artifacts:
    expire_in: 1 week
    name: test-check-results-${CI_COMMIT_REF_SLUG}_${CI_COMMIT_SHA}_job${CI_JOB_ID}
    paths:
    - pre-build-check.log
    - clang_tidy.log
    - build-analyzer/analyzer-report
    when: on_failure
  image: docker.aix.systerel.fr/c838/check@sha256:8be8c50cd484989c987b6c28ded2e03f30e81ec27bb53e41cecde8cdc3bb86c8
  needs: []
  rules:
  - if: $NO_TESTS == null && $WINDOWS_TEST == null && $CROSS_COMPILE == null && $WITH_COVERITY
      == null && $WITH_COVERAGE == null && $WITH_DOC == null && $ALL_TESTS == null
      && $ALL_BUILDS == null && $HIL_TESTS == null && $SCAN_SBOM == null && $TEST_NETWORK_FUZZ
      == null
    when: on_success
  script:
  - ./.check-code.sh
  - ./scripts/gen-sopc-types.py ./schemas/Opc.Ua.Types.bsd
  - ./scripts/generate-embedded-base-type-info.py ./schemas/Opc.Ua.NodeSet2.xml src/Common/opcua_types/sopc_embedded_nodeset2.h
  - ./scripts/gen-sopc-types.py --types_prefix Custom --ns_index 1 ./tests/ClientServer/data/types/customTypes.bsd
    --files_path ./tests/ClientServer/unit_tests/helpers/
  - ./scripts/gen-sopc-types.py --types_prefix Custom2 --ns_index 2 ./tests/ClientServer/data/types/level2Types.bsd
    --files_path ./tests/ClientServer/unit_tests/helpers/ --imported_ns_prefixes Custom
  - ./.format.sh
  - ${CI_PROJECT_DIR}/scripts/generate-s2opc-address-space.py ${CI_PROJECT_DIR}/samples/embedded/cli_pubsub_server/xml/s2opc_pubsub_embedded_nodeset.xml
    ${CI_PROJECT_DIR}/samples/embedded/cli_pubsub_server/src/test_address_space.c
    --const_addspace
  - ${CI_PROJECT_DIR}/scripts/generate-s2opc_pubsub-static-config.py ${CI_PROJECT_DIR}/tests/embedded/validation_test/config_pubsub.xml
    ${CI_PROJECT_DIR}/tests/embedded/validation_test/pubsub_config_static.c
  - ${CI_PROJECT_DIR}/scripts/generate-s2opc-address-space.py ${CI_PROJECT_DIR}/tests/embedded/validation_test/xml/s2opc_pubsub_embedded_nodeset.xml
    ${CI_PROJECT_DIR}/tests/embedded/validation_test/embedded_address_space.c --const_addspace
  - ./.format.sh
  - ./.verify-no-git-changes.sh
  - cd samples/ClientServer/data/address_space && ./generate_demo_nodesets.sh && cd
    -
  - ./.verify-no-git-changes.sh
  - cd samples/PubSub_ClientServer/data/address_space && ./generate_demo_nodesets.sh
    && cd -
  - ./.format.sh
  - ./.verify-no-git-changes.sh
  stage: test
  variables:
    DOCKER_DIGEST: sha256:8be8c50cd484989c987b6c28ded2e03f30e81ec27bb53e41cecde8cdc3bb86c8
test-faulty-packets:
  artifacts:
    expire_in: 1 week
    name: bin-${CI_COMMIT_REF_SLUG}_${CI_COMMIT_SHA}_job${CI_JOB_ID}_test_faulty
    paths:
    - build_faulty/bin/**/*.log
    - /tmp/browse_packets.txt
    - tests/ClientServer/scripts/*.tap
    when: on_failure
  image: docker.aix.systerel.fr/c838/test@sha256:8fbec254f6b8c8467b780d407c6f3c2e87d87899e141b8b2c9013ba30b4f0c8d
  needs:
  - build-linux-faulty-packet
  rules:
  - if: $ALL_BUILDS != null
    when: on_success
  script:
  - ./tests/ClientServer/scripts/faulty_packet_tester_launcher.sh build_faulty/bin
  stage: test-others
test-fuzz:
  artifacts:
    expire_in: 30 days
    name: fuzzing_results_job${CI_JOB_ID}
    paths:
    - ./boofuzz-results
    - ./build_fuzz/bin/toolkit_demo_server_logs
    when: on_failure
  dependencies:
  - build-fuzz
  image: docker.aix.systerel.fr/c838/opcua-network-fuzzer@sha256:35e40ba847bdfe5f3e7112f465adb2c70d1f0694521f6ba8d018c55f651ef205
  needs:
  - build-fuzz
  rules:
  - if: $TEST_NETWORK_FUZZ != null
    when: on_success
  script:
  - ./.network_fuzzing.sh build_fuzz/bin
  stage: test-others
  tags:
  - fuzzing
  timeout: 24 hours
test-pikeos:
  artifacts:
    expire_in: 1 week
    name: test-pikeos-${CI_COMMIT_REF_SLUG}_${CI_COMMIT_SHA}_job${CI_JOB_ID}
    paths:
    - build_pikeos/
    when: on_failure
  image: docker.aix.systerel.fr/c838/pikeos:1.2.1@sha256:3d5dcbab75b0c98a8d27d1cfa239bfa43b5b87bc1bbaca2a7c8a5bfe2adc5aeb
  needs:
  - build-pikeos
  rules:
  - if: $PIKEOS_TEST == null
    when: never
  - if: $CROSS_COMPILE != null || $ALL_BUILDS != null || $CI_PIPELINE_SOURCE == 'merge_request_event'
      || $CI_COMMIT_TAG
    when: on_success
  script:
  - samples/embedded/platform_dep/pikeos/ci/test-embedded-docker.sh
  stage: test-others
  tags: *id003
  variables:
    TEST_CLIENT_XML_CONFIG: S2OPC_Client_Test_Config.xml
    TEST_PASSWORD_CACERT: S2OPC
    TEST_PASSWORD_PRIVATE_KEY: password
    TEST_PASSWORD_USER: password
    TEST_PASSWORD_USER_ME: 1234
    TEST_PASSWORD_USER_SECUADMIN: 1234
    TEST_SERVER_XML_ADDRESS_SPACE: S2OPC_Test_NodeSet.xml
    TEST_SERVER_XML_CONFIG: S2OPC_Server_UACTT_Config.xml
    TEST_USERNAME: user1
    TEST_USERS_XML_CONFIG: S2OPC_UACTT_Users.xml
