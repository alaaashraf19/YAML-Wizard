generate_sbom:
  artifacts:
    expire_in: 1 week
    paths:
    - sbom.json
    - conan.lock
    when: on_success
  image: docker.aix.systerel.fr/c838/cyberwatch@sha256:003b648857636b08825c6214c7ae86390e7c958a6814f15ee4c170c737347292
  needs: []
  rules:
  - changes:
      compare_to: master
      paths:
      - conanfile.py
  - if: $SCAN_SBOM != null
  script:
  - conan remote add gitlab ${CI_API_V4_URL}/projects/$CI_PROJECT_ID/packages/conan
    False
  - conan user ci_user -r gitlab -p ${CI_JOB_TOKEN}
  - conan lock create conanfile.py
  - if [ ! -e sbom.json ]; then touch sbom.json; fi
  - trivy fs --format cyclonedx --output sbom.json --insecure .
