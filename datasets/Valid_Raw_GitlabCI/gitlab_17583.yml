  stage: build
  variables: &id006
    BUILD_DIR: build
    DOCKER_DIGEST: sha256:2fdc121cf7c346c7e46e40fd05fc52ecaf759867b5d0b3ffaab809cbf89f0247
.nominal_build_variables:
