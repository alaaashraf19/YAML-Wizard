cache:
  paths:
  - vendor/
include:
- template: Dependency-Scanning.gitlab-ci.yml
stages:
- test
test:8.3:
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.cobertura.xml
  before_script:
  - apt-get update -yqq
  - apt-get install git -yqq
  - apt-get install wget -yqq
  - apt-get install unzip -yqq
  - docker-php-ext-install bcmath
  - pecl install xdebug && docker-php-ext-enable xdebug
  - wget https://composer.github.io/installer.sig -O - -q | tr -d '\n' > installer.sig
  - php -r "copy('https://getcomposer.org/installer', 'composer-setup.php');"
  - php -r "if (hash_file('SHA384', 'composer-setup.php') === file_get_contents('installer.sig'))
    { echo 'Installer verified'; } else { echo 'Installer corrupt'; unlink('composer-setup.php');
    } echo PHP_EOL;"
  - php composer-setup.php
  - php -r "unlink('composer-setup.php'); unlink('installer.sig');"
  - php composer.phar update
  coverage: /^\s*Lines:\s*\d+.\d+\%/
  image: php:8.3
  script:
  - XDEBUG_MODE=coverage vendor/bin/phpunit --configuration phpunit.xml  --coverage-text
    --colors=never --coverage-cobertura=coverage.cobertura.xml
  stage: test
