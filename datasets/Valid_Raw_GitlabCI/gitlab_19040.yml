.template:
  dependencies: &id001
  - build to deploy
  - unit test lastest coverage
  - integration test lastest coverage
  image: wpdesknet/amazon-svn-deploy
  only: &id002
  - tags
  retry: 2
  stage: deploy
  when: manual
acceptance test:
  allow_failure: true
  artifacts:
    expire_in: 1 day
    name: error logs
    paths:
    - ${CI_PROJECT_DIR}/acceptance
    when: always
  image: wpdesknet/node
  script:
  - cd ${CI_PROJECT_DIR}
  - composer update --no-progress --no-dev
  - if [[ -f ${CI_PROJECT_DIR}/tests/acceptance/prepare.sh ]]; then sh ${CI_PROJECT_DIR}/tests/acceptance/prepare.sh;
    fi
  - export MYSQL_IP=$(awk '/^[[:space:]]*($|#)/{next} /mysqltests/{print $1; exit}'
    /etc/hosts)
  - export WOOTESTS_IP=$(awk '/^[[:space:]]*($|#)/{next} /wootests/{print $1; exit}'
    /etc/hosts)
  - echo "http://wootests/wpdesk_init.php?mysql_ip=${MYSQL_IP}&wootests_ip=${WOOTESTS_IP}"
  - wget -O /tmp/wpdesk_init.txt "http://wootests/wpdesk_init.php?mysql_ip=${MYSQL_IP}&wootests_ip=${WOOTESTS_IP}"
  - tail -50 /tmp/wpdesk_init.txt
  - sh /tmp/clone.sh git@gitlab.com:wpdesk/plugins-tests.git /tmp/tests headless
  - cd /tmp/tests
  - npm install
  - npm install -g grunt-cli
  - cd node_modules/.bin
  - ./webdriver-manager update
  - cd ../
  - mkdir -p ${CI_PROJECT_DIR}/acceptance/reports/html/screenshot
  - grunt chrome-${CI_PROJECT_NAME}
  services:
  - alias: mysqltests
    name: mysql:5.6
  - alias: wootests
    name: wpdesknet/apache-woocommerce:latest
  - alias: selenium
    name: selenium/standalone-chrome
  stage: tests
  variables:
    CI_DEBUG_SERVICES: trace
apigen docs:
  artifacts:
    expire_in: 1 day
    name: docs
    paths:
    - docs/
  image:
    name: wpdesknet/apigen
  only:
  - tags
  script:
  - echo ${WPDESK_CI_VERSION}
  - ls -l
  - /app/vendor/bin/apigen generate
  - php /app/hooks-docs.php ${CI_PROJECT_DIR}
  stage: pre-deploy
before_script:
- cd ${CI_PROJECT_DIR}
build to deploy:
  artifacts:
    expire_in: 1 month
    name: production release
    paths:
    - release
    - release.zip
  image: wpdesknet/phpunit-woocommerce:4-0
  only:
  - tags
  script:
  - echo ${WPDESK_CI_VERSION}
  - php --version
  - ls -l
  - /tmp/set_version.sh ${CI_COMMIT_REF_NAME}
  - rm -rf ${CI_PROJECT_DIR}/release ${CI_PROJECT_DIR}/release.zip /tmp/release
  - mkdir /tmp/release
  - mkdir -p ${CI_PROJECT_DIR}/release/${CI_PROJECT_NAME}
  - cp -rf ${CI_PROJECT_DIR}/* /tmp/release
  - cp -rf /tmp/release/* ${CI_PROJECT_DIR}/release/${CI_PROJECT_NAME}
  - cd ${CI_PROJECT_DIR}/release/${CI_PROJECT_NAME}
  - composer install --no-dev --no-progress --optimize-autoloader
  - rm -rf build-coverage release tests docs .git .editorconfig .gitignore .gitlab-ci.yml
    apigen.neon phpunit.xml acceptance test_soap.php .gitlab
  - rm -rf composer.json composer.lock phpcs.xml.dist phpunit-integration.xml phpunit-unit.xml
    composer.phar wp-cli.phar
  - cd ../
  - zip -r -q ../release.zip ./
  stage: pre-deploy
churn metrics:
  allow_failure: true
  image: wpdesknet/phpunit-woocommerce:0-0
  script:
  - echo ${WPDESK_CI_VERSION}
  - composer require bmitch/churn-php
  - composer update --no-progress
  - vendor/bin/churn run classes inc
  stage: tools
  when: manual
deploy to demo:
  dependencies: *id001
  environment:
    name: wpdesk demo
    url: https://demo.wpdesk.org
  image: wpdesknet/amazon-svn-deploy
  only: *id002
  retry: 2
  script:
  - echo ${WPDESK_CI_VERSION}
  - /tmp/deploy_demo.sh release/${CI_PROJECT_NAME} ${CI_PROJECT_NAME}
  - 'curl -X POST --data-urlencode "payload={\"text\": \"Projekt <https://gitlab.com/wpdesk/${CI_PROJECT_NAME}|${CI_PROJECT_NAME}>
    zdeployowany do demo w wersji ${CI_COMMIT_REF_NAME}\", }" https://hooks.slack.com/services/${SLACK_AUTH}'
  stage: deploy
  when: manual
deploy to repository:
  dependencies: *id001
  environment:
    name: wordpress repository
    url: https://downloads.wordpress.org/plugin/${CI_PROJECT_NAME}.${CI_COMMIT_REF_NAME}.zip
  image: wpdesknet/amazon-svn-deploy
  only: *id002
  retry: 2
  script:
  - echo ${WPDESK_CI_VERSION}
  - rm -rf /tmp/svn-repository
  - mkdir /tmp/svn-repository
  - /tmp/deploy_repository.sh ${CI_PROJECT_NAME} ${CI_PROJECT_DIR}/release/${CI_PROJECT_NAME}
    /tmp/svn-repository
  - 'curl -X POST --data-urlencode "payload={\"text\": \"Projekt <https://gitlab.com/wpdesk/${CI_PROJECT_NAME}|${CI_PROJECT_NAME}>
    zdeployowany do repozytorium WP w wersji ${CI_COMMIT_REF_NAME}\", }" https://hooks.slack.com/services/${SLACK_AUTH}'
  stage: deploy
  when: manual
deploy to shop:
  dependencies: *id001
  environment:
    name: wpdesk shop
    url: https://wpdeskplugin.s3.amazonaws.com/${CI_PROJECT_NAME}.zip
  image: wpdesknet/amazon-svn-deploy
  only: *id002
  retry: 2
  script:
  - echo ${WPDESK_CI_VERSION}
  - /tmp/deploy_shop.sh ${CI_PROJECT_NAME} release.zip ${CI_PROJECT_NAME}.zip
  - 'curl -X POST --data-urlencode "payload={\"text\": \"Projekt <https://gitlab.com/wpdesk/${CI_PROJECT_NAME}|${CI_PROJECT_NAME}>
    zdeployowany do sklepu w wersji ${CI_COMMIT_REF_NAME}\", }" https://hooks.slack.com/services/${SLACK_AUTH}'
  stage: deploy
  when: manual
integration test current woocommerce:
  allow_failure: true
  before_script:
  - cd /tmp
  - rm -rf woocommerce
  - git clone https://github.com/woocommerce/woocommerce.git
  - cd ${CI_PROJECT_DIR}
  coverage: /^\s*Lines:\s*\d+.\d+\%/
  except: &id003
  - tags
  image: wpdesknet/phpunit-woocommerce:0-0
  only: null
  script: &id004
  - echo ${WPDESK_CI_VERSION}
  - ls -l
  - php --version
  - cat /tmp/wordpress-develop/src/wp-includes/version.php
  - cat /tmp/woocommerce/woocommerce.php
  - composer update --no-progress
  - if [[ -f tests/integration/prepare.sh ]]; then sh tests/integration/prepare.sh;
    fi
  - vendor/bin/phpunit --configuration phpunit-integration.xml --no-coverage
  services: &id005
  - mysql:5.6
  stage: tests
integration test lastest:
  coverage: /^\s*Lines:\s*\d+.\d+\%/
  except: *id003
  image: wpdesknet/phpunit-woocommerce:0-0
  only: null
  script: *id004
  services: *id005
  stage: tests
integration test lastest coverage:
  coverage: /^\s*Lines:\s*\d+.\d+\%/
  image: wpdesknet/phpunit-woocommerce:0-0
  only:
  - tags
  script:
  - echo ${WPDESK_CI_VERSION}
  - ls -l
  - php --version
  - cat /tmp/wordpress-develop/src/wp-includes/version.php
  - cat /tmp/woocommerce/woocommerce.php
  - composer update --no-progress
  - if [[ -f tests/integration/prepare.sh ]]; then sh tests/integration/prepare.sh;
    fi
  - vendor/bin/phpunit --configuration phpunit-integration.xml --coverage-text --colors=never
  services: *id005
  stage: tests
integration test php-7 wc-3:
  coverage: /^\s*Lines:\s*\d+.\d+\%/
  except: *id003
  image: wpdesknet/phpunit-woocommerce:2-3
  only: null
  script: *id004
  services: *id005
  stage: tests
integration test php5-5:
  coverage: /^\s*Lines:\s*\d+.\d+\%/
  except: *id003
  image: wpdesknet/phpunit-woocommerce:4-0
  only: null
  script: *id004
  services: *id005
  stage: tests
integration test php5-6:
  coverage: /^\s*Lines:\s*\d+.\d+\%/
  except: *id003
  image: wpdesknet/phpunit-woocommerce:3-0
  only: null
  script: *id004
  services: *id005
  stage: tests
integration test php7 wc-2:
  coverage: /^\s*Lines:\s*\d+.\d+\%/
  except: *id003
  image: wpdesknet/phpunit-woocommerce:2-2
  only: null
  script: *id004
  services: *id005
  stage: tests
integration test php7-1 wc-1:
  coverage: /^\s*Lines:\s*\d+.\d+\%/
  except: *id003
  image: wpdesknet/phpunit-woocommerce:1-1
  only: null
  script: *id004
  services: *id005
  stage: tests
pages:
  artifacts:
    expire_in: 1 day
    paths:
    - public
  dependencies:
  - apigen docs
  only:
  - tags
  script:
  - rm -rf public
  - mv docs/ public/
  - 'curl -X POST --data-urlencode "payload={\"text\": \"Dokumentacja projektu ${CI_PROJECT_NAME}
    w wersji ${CI_COMMIT_REF_NAME} umieszczona w <https://gitlab.com/wpdesk/${CI_PROJECT_NAME}/pages|pages>
    \", }" https://hooks.slack.com/services/${SLACK_AUTH}'
  stage: deploy
phpmetric metrics:
  allow_failure: true
  artifacts:
    expire_in: 1 month
    name: metrics
    paths:
    - ${CI_PROJECT_DIR}/phpmetric
    when: always
  image: wpdesknet/phpunit-woocommerce:0-0
  script:
  - echo ${WPDESK_CI_VERSION}
  - composer require phpmetrics/phpmetrics
  - composer update --no-progress
  - php ./vendor/bin/phpmetrics --report-html=phpmetric .
  stage: tools
  when: manual
stages:
- tools
- tests
- pre-deploy
- deploy
unit test lastest:
  coverage: /^\s*Lines:\s*\d+.\d+\%/
  except:
  - tags
  image: wpdesknet/phpunit-woocommerce:0-0
  only: null
  script:
  - echo ${WPDESK_CI_VERSION}
  - ls -l
  - php --version
  - cat /tmp/wordpress-develop/src/wp-includes/version.php
  - cat /tmp/woocommerce/woocommerce.php
  - composer update --no-progress
  - vendor/bin/phpunit --configuration phpunit-unit.xml --no-coverage
  stage: tests
unit test lastest coverage:
  coverage: /^\s*Lines:\s*\d+.\d+\%/
  image: wpdesknet/phpunit-woocommerce:0-0
  only:
  - tags
  script:
  - echo ${WPDESK_CI_VERSION}
  - ls -l
  - php --version
  - cat /tmp/wordpress-develop/src/wp-includes/version.php
  - cat /tmp/woocommerce/woocommerce.php
  - composer update --no-progress
  - vendor/bin/phpunit --configuration phpunit-unit.xml --coverage-text --colors=never
  stage: tests
variables:
  ACCEPTANCE_ERROR_PATH: ${CI_PROJECT_DIR}/acceptance
  COMPOSER_ALLOW_SUPERUSER: 1
  GIT_STRATEGY: fetch
  MYSQL_DATABASE: wptest
  MYSQL_INNODB_LOG_BUFFER_SIZE: 32M
  MYSQL_PASSWORD: mysql
  MYSQL_ROOT_PASSWORD: mysql
  MYSQL_USER: mysql
  PHP_ERROR_REPORTING: E_ALL
  WPDESK_CI_VERSION: 1.10.19
