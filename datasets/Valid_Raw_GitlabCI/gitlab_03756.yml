bleeding-edge:
  before_script:
  - pip install --upgrade numpy scipy matplotlib
  - pip install --editable .[test]
  - pip freeze
  cache:
    key: bleeding-edge
    paths:
    - $PIP_CACHE_DIR
  image: python:3-alpine
  script:
  - ase test --pytest --ignore gui/ --ignore test_imports.py
  variables:
    PIP_CACHE_DIR: $CI_PROJECT_DIR/pip-cache
calculators:
  after_script:
  - coverage xml --data-file ase/test/.coverage
  - mv ase/test/coverage-html coverage-calculators
  - mv ase/test/.coverage coverage-calculators/coverage.dat
  artifacts:
    expire_in: 1 week
    paths:
    - coverage-calculators/
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
      junit: ase/test/report.xml
  before_script:
  - pip install --no-deps --editable .
  - export ASE_CONFIG_PATH=/home/ase/aseconfig.ini
  - sed 's/binary = /command = /' -i /home/ase/aseconfig.ini
  - ase info --calculators
  cache:
    key: calculators
    paths:
    - $PIP_CACHE_DIR
    policy: pull
  image: registry.gitlab.com/ase/ase:ase-full-monty
  rules:
  - allow_failure: true
    if: $CI_PIPELINE_SOURCE == "push"
    when: manual
  - if: $CI_PIPELINE_SOURCE == "schedule"
  script:
  - 'ase test calculator --calculators abinit,asap,cp2k,dftb,espresso,gpaw,kim,lammpslib,lammpsrun,mopac,nwchem,octopus,siesta
    --coverage --pytest --junit-xml=report.xml

    '
calculators-lite:
  after_script:
  - coverage xml --data-file ase/test/.coverage
  - mv ase/test/coverage-html coverage-calculators-lite
  - mv ase/test/.coverage coverage-calculators-lite/coverage.dat
  artifacts:
    expire_in: 1 week
    paths:
    - coverage-calculators-lite/
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
      junit: ase/test/report.xml
  before_script:
  - pip install --no-deps --editable .
  - export ASE_CONFIG_PATH=/home/ase/aseconfig.ini
  - sed 's/binary = /command = /' -i /home/ase/aseconfig.ini
  cache:
    key: calculators
    paths:
    - $PIP_CACHE_DIR
  image: registry.gitlab.com/ase/ase:ase-full-monty
  script:
  - 'ase test calculator --calculators=auto --coverage --pytest -m calculator_lite
    --junit-xml=report.xml

    '
coverage-combine:
  artifacts:
    expire_in: 1 week
    paths:
    - coverage-html
  coverage: /TOTAL.+ ([0-9]+\.[0-9]+%)/
  dependencies:
  - main
  - calculators-lite
  image: registry.gitlab.com/ase/ase:ase-paperwork
  script:
  - cd ase/test
  - coverage combine ../../coverage-main/coverage.dat ../../coverage-calculators-lite/coverage.dat
  - coverage report
  - coverage html
  - cd ../..
  - mv ase/test/coverage-html .
  stage: paperwork
default:
  interruptible: true
distribution-package:
  artifacts:
    expire_in: 1 week
    paths:
    - dist
  before_script:
  - mkdir dist
  - pip install setuptools build
  image: registry.gitlab.com/ase/ase:ase-main
  rules:
  - if: $CI_PIPELINE_SOURCE == "schedule"
  - allow_failure: true
    if: $CI_PIPELINE_SOURCE == "push"
    when: manual
  script:
  - python -m build
  - ls dist/*
  - pip install dist/ase-*.tar.gz
  - ase test
  - pip uninstall --yes ase
  - pip install dist/ase-*-py3-none-any.whl
  - ase test
doc:
  artifacts:
    expire_in: 1 week
    paths:
    - web-html
  before_script:
  - pip install scriv sphinx_book_theme sphinx-gallery
  - pip install --no-deps .[docs]
  - ase info
  - which sphinx-build
  cache:
    key: doc
    paths:
    - $PIP_CACHE_DIR
  image: registry.gitlab.com/ase/ase:ase-full-monty
  script:
  - scriv collect --keep || echo Not compiling changelog then
  - python -m ase.utils.sphinx run
  - sphinx-build -W doc doc/build
  - mv doc/build web-html
lint:
  before_script:
  - pip install .[lint]
  - pip freeze
  cache:
    key: lint
    paths:
    - $PIP_CACHE_DIR
  image: python:3.12.4-alpine
  script:
  - mypy --version
  - mypy --color-output -p ase
  - python -We:invalid -m compileall -f -q ase/
  - ruff check
  - ruff format --check
  variables:
    PIP_CACHE_DIR: $CI_PROJECT_DIR/pip-cache
main:
  after_script:
  - coverage xml --data-file ase/test/.coverage
  - mv ase/test/coverage-html coverage-main
  - mv ase/test/.coverage coverage-main/coverage.dat
  artifacts:
    expire_in: 1 week
    paths:
    - coverage-main/
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
      junit: ase/test/report.xml
  before_script:
  - python --version
  - pip install --no-deps --editable .
  - ase info --calculators
  - cd $CI_PROJECT_DIR
  cache:
    key: main
    paths:
    - $PIP_CACHE_DIR
  image: registry.gitlab.com/ase/ase:ase-main
  script:
  - 'ase test --calculators asap,ff,lj,morse,tip3p,tip4p --coverage --pytest --junit-xml=report.xml

    '
oldlibs:
  before_script:
  - pwd
  - whoami
  - 'pip install numpy==1.21.6 scipy==1.8.1 matplotlib==3.5.2 pytest==7.0.0 attrs==20.3.0
    pluggy==1.0.0 py==1.11.0 six==1.16.0 pytest-xdist==2.1.0 execnet==1.8.1 pytest-forked==1.4.0

    '
  - pip install --no-deps .
  cache:
    key: oldlibs
    paths:
    - $PIP_CACHE_DIR
  image: registry.gitlab.com/ase/ase:ase-oldlibs
  script:
  - ase test
pages:
  artifacts:
    expire_in: 2 weeks
    paths:
    - public
  dependencies:
  - coverage-combine
  - doc
  only:
  - master
  script:
  - mkdir public
  - mv coverage-html public/
  - pwd
  - ls
  - mv web-html/* public/
  stage: deploy
pipinstall:
  before_script:
  - python --version
  - pip install .[test]
  image: python:3.11
  script:
  - ase test
  when: manual
stages:
- test
- paperwork
- deploy
variables:
  OMP_NUM_THREADS: '1'
  PIP_CACHE_DIR: $CI_PROJECT_DIR/pip-cache
  PYTEST_ADDOPTS: --color=yes --durations=20 -r s
windows_test:
  before_script:
  - Import-Module "$env:ChocolateyInstall\helpers\chocolateyProfile.psm1"
  - choco install python --version=3.10 -y -f
  - refreshenv
  - python --version
  - python -m pip install --upgrade pip
  - python -m pip install pytest
  - python -m pip install .
  script:
  - 'ase test --calculators eam,ff,lj,morse,tip3p,tip4p --pytest -W "ignore:The --rsyncdir
    command line argument" -W "ignore:NumPy will stop allowing conversion of out-of-bound
    Python integers"

    '
  stage: test
  tags:
  - saas-windows-medium-amd64
  when: manual
workflow:
  auto_cancel:
    on_new_commit: interruptible
