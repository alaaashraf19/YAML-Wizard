build_android_image_alpha:
  script:
  - docker login -u gitlab-ci-token -p $CI_BUILD_TOKEN registry.gitlab.com
  - docker build -t registry.gitlab.com/alibitek-flutter/flutter-docker-images/android
    -f Dockerfile_Flutter_Android --build-arg BRANCH=alpha .
  - docker push registry.gitlab.com/alibitek-flutter/flutter-docker-images/android:alpha
  stage: build
  tags:
  - docker
build_android_image_master:
  script:
  - docker login -u gitlab-ci-token -p $CI_BUILD_TOKEN registry.gitlab.com
  - docker build -t registry.gitlab.com/alibitek-flutter/flutter-docker-images/android
    -f Dockerfile_Flutter_Android --build-arg BRANCH=master .
  - docker push registry.gitlab.com/alibitek-flutter/flutter-docker-images/android:master
  stage: build
  tags:
  - docker
image: docker:git
services:
- docker:dind
