before_script:
- pip install '.[test]'
build-job:
  artifacts:
    paths:
    - dist/
  image: python:3-bookworm
  script:
  - python -m pip install -U build
  - python -m build
  stage: build
generate-pypi-attestations:
  artifacts:
    paths:
    - dist/
  id_tokens:
    SIGSTORE_ID_TOKEN:
      aud: sigstore
  image: python:3-bookworm
  needs:
  - artifacts: true
    job: build-job
  rules:
  - if: $CI_COMMIT_TAG
  script:
  - python -m pip install -U pypi-attestations
  - python -m pypi_attestations sign dist/*
  stage: build
publish-job:
  dependencies:
  - build-job
  - generate-pypi-attestations
  id_tokens:
    PYPI_ID_TOKEN:
      aud: pypi
  image: python:3-bookworm
  rules:
  - if: $CI_COMMIT_TAG
  script:
  - python -m pip install -U twine
  - twine upload --attestations dist/*
  stage: deploy
test_job_integration:
  before_script:
  - dnf install -y dbus-daemon python3-pip
  - pip install '.[test,trio]'
  image: fedora:41
  script:
  - dbus-run-session -- pytest
  stage: test
