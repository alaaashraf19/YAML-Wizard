build:
  artifacts:
    paths:
    - build/
  before_script:
  - echo "deb http://apt.llvm.org/stretch/ llvm-toolchain-stretch-10 main" >> /etc/apt/sources.list
  - echo "deb-src http://apt.llvm.org/stretch/ llvm-toolchain-stretch-10 main" >>
    /etc/apt/sources.list
  - wget -O - https://apt.llvm.org/llvm-snapshot.gpg.key | apt-key add -
  - apt update && apt -y install make cmake git wget llvm-10-dev
  script:
  - mkdir build
  - cd build
  - cmake ..
  - make
  stage: build
image: gcc
test:
  artifacts:
    paths:
    - build/check/
  before_script:
  - echo "deb http://apt.llvm.org/stretch/ llvm-toolchain-stretch-10 main" >> /etc/apt/sources.list
  - echo "deb-src http://apt.llvm.org/stretch/ llvm-toolchain-stretch-10 main" >>
    /etc/apt/sources.list
  - wget -O - https://apt.llvm.org/llvm-snapshot.gpg.key | apt-key add -
  - apt update && apt -y install make cmake git wget llvm-10-dev
  script:
  - cd build
  - make runtests
  - make runmoretests
  stage: test
