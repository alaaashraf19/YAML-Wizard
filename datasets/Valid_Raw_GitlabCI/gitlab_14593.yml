pok3rconf:linux:
  artifacts:
    name: $CI_JOB_NAME-$CI_COMMIT_REF_SLUG
    paths:
    - build/pok3rconf
    - build/pok3rtool/pok3rtool
    - build/pok3rtool/libpok3rlib.so
    - build/pok3rtool/rawhid/librawhid.so
    - build/pok3rtool/libchaos/chaos/libchaos.so
  before_script:
  - dnf install -y gcc gcc-c++ cmake make openssl-devel libusb-devel qt5-qtbase-devel
    qt5-qtquickcontrols2-devel
  image: fedora
  script:
  - mkdir build
  - cd build
  - cmake -D CMAKE_BUILD_TYPE="Release" ..
  - make
  stage: build
  tags:
  - linux
  variables:
    GIT_SUBMODULE_STRATEGY: recursive
stages:
- build
- test
test:linux:
  before_script:
  - dnf install -y libstdc++ openssl libusb qt5-qtbase qt5-qtquickcontrols2
  dependencies:
  - pok3rconf:linux
  image: fedora
  script:
  - cd build/pok3rtool
  - ./pok3rtool list
  stage: test
  tags:
  - linux
  variables:
    GIT_STRATEGY: none
