before_script:
- apt-get update -qq
- apt-get install -y -qq make gcc sed clang-tools lcov libjansson-dev libjson-c-dev
  libcjson-dev valgrind flawfinder pkg-config git
build:
  artifacts:
    paths:
    - mustach
    - libmustach*.so*
  script: make
flawfinder:
  script:
  - flawfinder --error-level=5 .
  stage: static-analysis
gcov:
  artifacts:
    paths:
    - gcov-latest
  script:
  - CFLAGS='-Wall -O0 --coverage' LDFLAGS='-Wl,-z,noexecstack --coverage' make -B
  - CFLAGS='-Wall -O0 --coverage' LDFLAGS='-Wl,-z,noexecstack --coverage' make test
  - lcov --capture --directory . --output-file coverage.info
  - genhtml coverage.info --output-directory gcov-latest
  stage: coverage
image: debian:stable-slim
scan-build:
  after_script:
  - cp -R /tmp/scan-build-* scan-build-latest
  artifacts:
    paths:
    - scan-build-latest
  script:
  - scan-build make
  stage: static-analysis
stages:
- build
- test
- coverage
- static-analysis
test:
  script:
  - make -B tool=jsonc libs=none test
