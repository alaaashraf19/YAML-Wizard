.template:
  before_script: &id005
  - COMPOSER_MEMORY_LIMIT=-1 $(which php) -d memory_limit=-1 $(which composer) install
  - echo CREATE DATABASE IF NOT EXISTS wordpress |  mysql -h mysql -proot
  cache: &id001
    paths:
    - vendor
  script: &id002
  - php ./vendor/codeception/codeception/codecept run unit --coverage
  services: &id003
  - alias: mysql
    name: mariadb:latest
  variables: &id004
    MYSQL_ROOT_PASSWORD: root
    PHP_IDE_CONFIG: serverName=localhost
    XDEBUG_CONFIG: idekey=PHPSTORM remote_host=192.168.1.2 remote_enable=1
.template_php7:
  before_script: &id006
  - COMPOSER_MEMORY_LIMIT=-1 $(which php) -d memory_limit=-1 $(which composer) install
  - echo CREATE DATABASE IF NOT EXISTS wordpress |  mysql -h mysql -proot
  - COMPOSER_MEMORY_LIMIT=-1 $(which php) -d memory_limit=-1 $(which composer) require
    "lucatume/wp-browser" "*"
  cache: *id001
  script: *id002
  services: *id003
  variables: *id004
