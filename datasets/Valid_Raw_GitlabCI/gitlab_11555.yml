api:
  artifacts:
    expire_in: 1 week
    paths:
    - satnogs-network-api-client
    when: always
  image: ${GITLAB_CI_IMAGE_OPENAPI_GENERATOR_CLI}
  needs:
  - artifacts: true
    job: schema
  script:
  - docker-entrypoint.sh generate -i satnogs-network-api-client/openapi.yml -g python
    -o satnogs-network-api-client -c satnogs-network-api-client/openapi-generator-config.json
  - docker-entrypoint.sh generate -i satnogs-network-api-client/openapi.yml -g html2
    -o satnogs-network-api-client/html2 -c satnogs-network-api-client/openapi-generator-config.json
  stage: api
build:
  artifacts:
    expire_in: 1 week
    paths:
    - dist
    when: always
  before_script:
  - pip install "$GITLAB_CI_PYPI_TOX"
  image: ${GITLAB_CI_IMAGE_PYTHON}
  needs:
  - artifacts: true
    job: static_js_css
  script:
  - rm -rf dist
  - tox -e build
  stage: build
build_api:
  artifacts:
    expire_in: 1 week
    paths:
    - satnogs-network-api-client/dist
    when: always
  before_script:
  - pip install "$GITLAB_CI_PYPI_TOX"
  image: ${GITLAB_CI_IMAGE_PYTHON}
  needs:
  - artifacts: true
    job: api
  script:
  - cd satnogs-network-api-client
  - rm -rf dist
  - tox -e build
  stage: build
container_scanning:
  needs:
  - artifacts: false
    job: docker
  rules:
  - if: $CI_REGISTRY_IMAGE && $CI_COMMIT_BRANCH == "master"
  - if: $CI_REGISTRY_IMAGE && $CI_COMMIT_TAG
  stage: security
  variables:
    CI_APPLICATION_REPOSITORY: ${CI_REGISTRY_IMAGE}/satnogs-network
    CI_APPLICATION_TAG: ${CI_COMMIT_REF_NAME}
dependency_scanning:
  needs:
  - artifacts: true
    job: api
  stage: security
  variables:
    DS_DEFAULT_ANALYZERS: gemnasium,gemnasium-python,retire.js
deploy:
  before_script:
  - pip install "$GITLAB_CI_PYPI_TOX"
  except:
  - triggers
  image: ${GITLAB_CI_IMAGE_PYTHON}
  only:
    refs:
    - tags
    variables:
    - $PYPI_USERNAME
    - $PYPI_PASSWORD
  script:
  - rm -rf dist
  - tox -e "upload"
  stage: deploy
deploy_api:
  before_script:
  - pip install "$GITLAB_CI_PYPI_TOX"
  except:
  - triggers
  image: ${GITLAB_CI_IMAGE_PYTHON}
  only:
    refs:
    - tags
    variables:
    - $PYPI_USERNAME
    - $PYPI_PASSWORD
  script:
  - cd satnogs-network-api-client
  - rm -rf dist
  - tox -e "upload"
  stage: deploy
docker:
  image: ${GITLAB_CI_IMAGE_DOCKER}
  only:
    refs:
    - master
    - tags
  script:
  - "[ -z \"$CI_REGISTRY_IMAGE\" ] || {\n    CACHE_IMAGE=\"$CI_REGISTRY_IMAGE/satnogs-network:$CI_COMMIT_REF_NAME\"\
    \n    [ -z \"$CI_COMMIT_TAG\" ] || CACHE_IMAGE=\"$CI_REGISTRY_IMAGE/satnogs-network:latest\"\
    \n    export CACHE_IMAGE\n}\n"
  - docker compose -f docker-compose.yml -f docker-compose.cache.yml pull cache_image
    || true
  - docker compose -f docker-compose.yml -f docker-compose.cache.yml build --pull
  - "[ -z \"$CI_REGISTRY_IMAGE\" ] || {\n    docker login -u $CI_REGISTRY_USER -p\
    \ $CI_JOB_TOKEN $CI_REGISTRY\n    docker tag satnogs-network:latest $CI_REGISTRY_IMAGE/satnogs-network:$CI_COMMIT_REF_NAME\n\
    \    docker push $CI_REGISTRY_IMAGE/satnogs-network:$CI_COMMIT_REF_NAME\n    [\
    \ -z \"$CI_COMMIT_TAG\" ] || {\n        docker tag satnogs-network:latest $CI_REGISTRY_IMAGE/satnogs-network:latest\n\
    \        docker push $CI_REGISTRY_IMAGE/satnogs-network:latest\n    }\n}\n[ -z\
    \ \"$DOCKERHUB_PASSWORD\" ] || {\n    docker login -u $DOCKERHUB_USER -p $DOCKERHUB_PASSWORD\n\
    \    docker tag satnogs-network:latest librespace/satnogs-network:$CI_COMMIT_REF_NAME\n\
    \    docker push librespace/satnogs-network:$CI_COMMIT_REF_NAME\n    [ -z \"$CI_COMMIT_TAG\"\
    \ ] || {\n        docker tag satnogs-network:latest librespace/satnogs-network:latest\n\
    \        docker push librespace/satnogs-network:latest\n    }\n}\n"
  services:
  - ${GITLAB_CI_IMAGE_DOCKER}-dind
  stage: deploy
docs:
  artifacts:
    expire_in: 1 week
    paths:
    - docs/_build/html
    when: always
  before_script:
  - pip install "$GITLAB_CI_PYPI_TOX"
  image: ${GITLAB_CI_IMAGE_PYTHON}
  needs: []
  script:
  - rm -rf docs/_build
  - tox -e "docs"
  stage: build
gemnasium-python-dependency_scanning:
  before_script:
  - apt-get -q update
  - apt-get -qy install pkgconf libmariadb-dev
include:
- template: Security/Container-Scanning.gitlab-ci.yml
- template: Security/Dependency-Scanning.gitlab-ci.yml
- template: Security/SAST.gitlab-ci.yml
- template: Security/Secret-Detection.gitlab-ci.yml
pages:
  artifacts:
    paths:
    - public
  image: ${GITLAB_CI_IMAGE_ALPINE}
  only:
  - tags
  script:
  - mv docs/_build/html/ public/
  - mv satnogs-network-api-client/html2/ public/api/
  - mv satnogs-network-api-client/openapi.yml public/api/openapi.yml
  stage: deploy
sast:
  needs:
  - artifacts: true
    job: api
  stage: security
  variables:
    SAST_DISABLE_BABEL: 'true'
schema:
  artifacts:
    expire_in: 1 week
    paths:
    - satnogs-network-api-client
    when: always
  image: ${GITLAB_CI_IMAGE_PYTHON}
  needs: []
  script:
  - pip install --no-cache-dir --no-deps -r "requirements.txt" --force-reinstall .
  - ./manage.py spectacular --file satnogs-network-api-client/openapi.yml --validate
    --fail-on-warn
  stage: schema
secret_detection:
  needs:
  - artifacts: true
    job: api
  stage: security
sentry_release:
  image: ${GITLAB_CI_IMAGE_SENTRY_CLI}
  only:
    refs:
    - tags
    variables:
    - $SENTRY_AUTH_TOKEN
    - $SENTRY_ORG
  script:
  - sentry-cli releases new --finalize -p ${CI_PROJECT_NAME} ${CI_PROJECT_NAME}@${CI_COMMIT_TAG}
  - sentry-cli releases set-commits --auto ${CI_PROJECT_NAME}@${CI_COMMIT_TAG}
  stage: sentry_release
stages:
- schema
- api
- static
- build
- test
- deploy
- sentry_release
- trigger
- security
static:
  before_script:
  - pip install "$GITLAB_CI_PYPI_TOX"
  image: ${GITLAB_CI_IMAGE_PYTHON}
  needs: []
  script:
  - tox -e "flake8,isort,yapf,pylint"
  stage: static
static_js_css:
  artifacts:
    expire_in: 1 week
    paths:
    - network/static/lib
    when: always
  image: ${GITLAB_CI_IMAGE_NODE}
  needs: []
  script:
  - npm ci
  - node_modules/.bin/gulp
  stage: static
test:
  before_script:
  - pip install "$GITLAB_CI_PYPI_TOX"
  - apt-get update
  - apt-get install -y ruby-sass
  image: ${GITLAB_CI_IMAGE_PYTHON}
  needs:
  - artifacts: true
    job: static_js_css
  script:
  - tox -e deps,pytest
  stage: test
trigger_latest:
  before_script:
  - apk add --no-cache curl
  image: ${GITLAB_CI_IMAGE_ALPINE}
  needs:
  - artifacts: false
    job: docker
  only:
    refs:
    - tags
    variables:
    - $PIPELINE_TRIGGERS_LATEST
  script:
  - PIPELINE_TRIGGERS_LATEST=$(echo "$PIPELINE_TRIGGERS_LATEST" | sed 's/{{CI_COMMIT_TAG}}/'"$CI_COMMIT_TAG"'/g')
  - for trigger in $PIPELINE_TRIGGERS_LATEST; do curl -X POST "$trigger"; done
  stage: trigger
trigger_master:
  before_script:
  - apk add --no-cache curl
  image: ${GITLAB_CI_IMAGE_ALPINE}
  needs:
  - artifacts: false
    job: docker
  only:
    refs:
    - master
    variables:
    - $PIPELINE_TRIGGERS_MASTER
  script:
  - PIPELINE_TRIGGERS_MASTER=$(echo "$PIPELINE_TRIGGERS_MASTER" | sed 's/{{CI_COMMIT_SHORT_SHA}}/'"$CI_COMMIT_SHORT_SHA"'/g')
  - for trigger in $PIPELINE_TRIGGERS_MASTER; do curl -X POST "$trigger"; done
  stage: trigger
variables:
  GITLAB_CI_IMAGE_ALPINE: alpine:3.11
  GITLAB_CI_IMAGE_DOCKER: docker:24.0.9
  GITLAB_CI_IMAGE_NODE: node:13.12
  GITLAB_CI_IMAGE_OPENAPI_GENERATOR_CLI: openapitools/openapi-generator-cli:v5.3.0
  GITLAB_CI_IMAGE_PYTHON: python:3.11.9
  GITLAB_CI_IMAGE_SENTRY_CLI: getsentry/sentry-cli
  GITLAB_CI_PYPI_TOX: tox~=4.14.0
