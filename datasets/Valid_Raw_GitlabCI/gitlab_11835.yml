build:
  artifacts:
    expire_in: 1 week
    paths:
    - node_modules/
  script:
  - npm install
  stage: build
  tags:
  - docker
  - shared
build-docker-test-image:
  image: docker:latest
  script:
  - docker info
  - docker login -u gitlab-ci-token -p $CI_JOB_TOKEN $DOCKER_REGISTRY
  - docker build -t $DOCKER_TEST_IMAGE --file="Dockerfile" .
  - docker push $DOCKER_TEST_IMAGE
  services:
  - command:
    - --insecure-registry
    - docker.for.mac.localhost:5063
    name: docker:dind
  stage: build
  tags:
  - docker
  - shared
  variables:
    DOCKER_DRIVER: overlay2
cache:
  paths:
  - node_modules/
image: node:boron
stages:
- build
- test
- release
test-docker-image:
  script:
  - cat /etc/hosts
  - echo "$(cat /etc/hosts | grep -Eo "^([0-9\.]*)\s+runner-[0-9a-f]+-project-[0-9a-f]+-concurrent-[0-9]+"
    | grep -Eo "^.*\s")gitlab-runner.local" >> /etc/hosts
  - cat /etc/hosts
  - cp /etc/hosts $CI_PROJECT_DIR
  - curl http://some-server-from-service:5555/copy-hosts || true
  - npm run start-server-main-background
  - sleep 1
  - curl http://localhost:5000/ || true
  - curl http://gitlab-runner.local:5000/ || true
  - curl http://some-server-from-service:5555/ || true
  services:
  - alias: some-server-from-service
    name: $IMAGE_FULL_NAME:$CI_COMMIT_REF_NAME
  stage: test
  tags:
  - docker
  - shared
variables:
  DOCKER_TEST_IMAGE: $DOCKER_REGISTRY/$IMAGE_NAMESPACE:$CI_COMMIT_REF_NAME
