assembleDebug:
  artifacts:
    paths:
    - app/build/outputs/
  script:
  - ./gradlew assembleDebug
  stage: build
before_script:
- apt-get --quiet update --yes
- apt-get --quiet install --yes wget tar unzip lib32stdc++6 lib32z1
- wget --quiet --output-document=android-sdk.zip https://dl.google.com/android/repository/sdk-tools-linux-${ANDROID_SDK_TOOLS}.zip
- unzip -d android-sdk-linux android-sdk.zip
- echo y | android-sdk-linux/tools/bin/sdkmanager "platforms;android-${ANDROID_COMPILE_SDK}"
  >/dev/null
- echo y | android-sdk-linux/tools/bin/sdkmanager "platform-tools" >/dev/null
- echo y | android-sdk-linux/tools/bin/sdkmanager "build-tools;${ANDROID_BUILD_TOOLS}"
  >/dev/null
- export ANDROID_HOME=$PWD/android-sdk-linux
- export PATH=$PATH:$PWD/android-sdk-linux/platform-tools/
- chmod +x ./gradlew
- set +o pipefail
- yes | android-sdk-linux/tools/bin/sdkmanager --licenses
- set -o pipefail
debugTests:
  script:
  - ./gradlew -Pci --console=plain :app:testFdroidDebug
  - ./gradlew -Pci --console=plain :app:testPaidDebug
  stage: test
image: openjdk:8-jdk
lintDebug:
  script:
  - ./gradlew -Pci --console=plain :app:lintFdroidDebug -PbuildDir=lint
  - ./gradlew -Pci --console=plain :app:lintPaidDebug -PbuildDir=lint
  stage: build
variables:
  ANDROID_BUILD_TOOLS: 28.0.2
  ANDROID_COMPILE_SDK: '28'
  ANDROID_SDK_TOOLS: '4333796'
