.apt-template:
  before_script: &id001
  - echo Etc/UTC > /etc/timezone
  - echo 'APT::Install-Recommends "0";' 'APT::Install-Suggests "0";' 'APT::Get::Assume-Yes
    "true";' 'Acquire::Retries "20";' 'Dpkg::Use-Pty "0";' 'quiet "1";' >> /etc/apt/apt.conf.d/99gitlab
  - grep Debian /etc/issue.net && { find /etc/apt/sources.list* -type f | xargs sed
    -i s,http:,https:, ; }
  - echo 'Acquire::https::Verify-Peer "false";' > /etc/apt/apt.conf.d/99nocacertificates
  - apt-get update
  - apt-get install ca-certificates
  - rm /etc/apt/apt.conf.d/99nocacertificates
  - apt-get dist-upgrade
  variables: &id003
    DEBIAN_FRONTEND: noninteractive
    LANG: C.UTF-8
.python-rules-changes:
  rules: &id002
  - changes:
    - .gitlab-ci.yml
    - fdroid
    - makebuildserver
    - setup.py
    - fdroidserver/*.py
    - tests/*.py
Build documentation:
  artifacts:
    paths:
    - docs/build/html/
  before_script: *id001
  image: debian:bookworm-slim
  rules: *id002
  script:
  - apt-get install make python3-sphinx python3-numpydoc python3-pydata-sphinx-theme
    pydocstyle fdroidserver
  - apt purge fdroidserver
  - pydocstyle --verbose --match='(?!apksigcopier|looseversion|setup|test_).*\.py'
    fdroidserver
  - cd docs
  - sphinx-apidoc -o ./source ../fdroidserver -M -e
  - PYTHONPATH=.. sphinx-autogen -o generated source/*.rst
  - PYTHONPATH=.. make html
  variables: *id003
PUBLISH:
  image: debian:bookworm-backports
  rules: *id002
  script:
  - apt-get update
  - apt-get -qy upgrade
  - apt-get -qy install --no-install-recommends -t bookworm-backports androguard apksigner
    curl default-jdk-headless git gpg gpg-agent python3-asn1crypto python3-defusedxml
    python3-git python3-ruamel.yaml python3-yaml rsync
  - python3 -m unittest tests/test_gpgsign.py tests/test_metadata.py tests/test_publish.py
    tests/test_signatures.py tests/test_signindex.py
  - cd tests
  - mkdir archive
  - mkdir unsigned
  - cp urzip-release-unsigned.apk unsigned/info.guardianproject.urzip_100.apk
  - grep '^key.*pass' config.yml | sed 's,\x3a ,=,' > $CI_PROJECT_DIR/variables
  - sed -Ei 's,^(key.*pass|keystore)\x3a.*,\1\x3a {env\x3a \1},' config.yml
  - printf '\ngpghome\x3a {env\x3a gpghome}\n' >> config.yml
  - "tee --append $CI_PROJECT_DIR/variables <<EOF\n    gpghome=$CI_PROJECT_DIR/tests/gnupghome\n\
    \    keystore=$CI_PROJECT_DIR/tests/keystore.jks\n    serverwebroot=/tmp\n   \
    \ export gpghome keypass keystorepass keystore serverwebroot\nEOF\n"
  - source $CI_PROJECT_DIR/variables
  - chmod 0600 config.yml config/*.yml config/*/*.yml
  - chmod 0700 $gpghome
  - export PATH=$CI_PROJECT_DIR:$PATH
  - fdroid publish --verbose
  - fdroid gpgsign --verbose
  - rsync --progress repo/* $serverwebroot/
  - fdroid gpgsign --verbose
  - fdroid signindex --verbose
  - rsync --stats repo/* $serverwebroot/
Windows:
  after_script:
  - Copy-Item C:\ProgramData\chocolatey\logs\chocolatey.log
  allow_failure:
    exit_codes: 1
  artifacts:
    paths:
    - '*.log'
    when: always
  rules:
  - if: $CI_COMMIT_BRANCH == "windows"
  script:
  - Import-Module "$env:ChocolateyInstall\helpers\chocolateyProfile.psm1"
  - choco install --no-progress -y git --force --params "/GitAndUnixToolsOnPath"
  - choco install --no-progress -y python3 --version=3.10
  - choco install --no-progress -y jdk8
  - choco install --no-progress -y rsync
  - refreshenv
  - python -m pip install --upgrade babel pip setuptools
  - python -m pip install -e .
  - $files = @(Get-ChildItem tests\test_*.py)
  - foreach ($f in $files) { write-output $f; python -m unittest $f; if( $LASTEXITCODE
    -eq 0 ) { write-output "SUCCESS $f"; } else { write-output "ERROR $f failed";
    } }
  - python -m unittest -k checkupdates exception import_subcommand test_lint test_metadata
    test_rewritemeta test_vcs tests.test_init tests.test_main
  tags:
  - windows
bandit:
  before_script: *id001
  image: debian:bookworm-slim
  rules: *id002
  script:
  - apt-get install python3-pip
  - $pip install --break-system-packages bandit
  - bandit -r -ii --ini .bandit
  variables: *id003
black:
  before_script: *id001
  image: debian:bookworm-slim
  script:
  - apt-get install black
  - black --check --diff --color $CI_PROJECT_DIR
  stage: lint
  variables: *id003
buildserver run-tests:
  image: registry.gitlab.com/fdroid/fdroidserver:buildserver
  script:
  - apt-get update
  - apt-get install gnupg-agent python3-babel python3-biplist python3-clint python3-pycountry
  - ./tests/run-tests
  - cd $CI_PROJECT_DIR/locale
  - for locale in *; do test -d $locale || continue; for cmd in `sed -n 's/.*("\(.*\)",
    *_.*/\1/p' $CI_PROJECT_DIR/fdroid`; do LANGUAGE=$locale $CI_PROJECT_DIR/fdroid
    $cmd --help > /dev/null; done done
debian_testing:
  before_script: *id001
  image: debian:testing
  rules:
  - if: $CI_COMMIT_BRANCH == "master" && $CI_PROJECT_PATH == "fdroid/fdroidserver"
  script:
  - apt-get install aapt androguard apksigner dexdump fdroidserver git gnupg ipfs-cid
    python3-biplist python3-defusedxml python3-libcloud python3-pycountry python3-setuptools
    sdkmanager
  - python3 -c 'import fdroidserver'
  - python3 -c 'import androguard'
  - python3 -c 'import sdkmanager'
  - cd tests
  - ./run-tests
  variables: *id003
docker:
  dependencies:
  - fdroid build
  image: docker:dind
  rules:
  - changes:
    - .gitlab-ci.yml
    - makebuildserver
    - buildserver/*
    if: $CI_COMMIT_BRANCH == "master" && $CI_PROJECT_PATH == "fdroid/fdroidserver"
  script:
  - export TEST_IMAGE=$CI_REGISTRY_IMAGE:$(printf $CI_COMMIT_REF_NAME | sed 's,[^a-zA-Z0-9_.-],_,g')
  - cd buildserver
  - docker build -t $TEST_IMAGE --build-arg GIT_REV_PARSE_HEAD=$(git rev-parse HEAD)
    .
  - docker tag $TEST_IMAGE $RELEASE_IMAGE
  - docker tag $TEST_IMAGE ${RELEASE_IMAGE}-bookworm
  - echo $CI_JOB_TOKEN | docker login -u gitlab-ci-token --password-stdin registry.gitlab.com
  - if test -z "$FDROID_PUSH_DOCKER_IMAGE"; then echo "Skipping docker push to save
    quota on your gitlab namespace."; echo "If you want to enable the push, set FDROID_PUSH_DOCKER_IMAGE
    in"; echo "https://gitlab.com/$CI_PROJECT_NAMESPACE/fdroidserver/-/settings/ci_cd#js-cicd-variables-settings";
    exit 0; fi
  - docker push $RELEASE_IMAGE
  - docker push $RELEASE_IMAGE-bookworm
  services:
  - docker:dind
  variables:
    RELEASE_IMAGE: $CI_REGISTRY_IMAGE:buildserver
fdroid build:
  cache:
    key: $CI_JOB_NAME
    paths:
    - .gradle
  image: registry.gitlab.com/fdroid/fdroidserver:buildserver
  rules:
  - changes:
    - .gitlab-ci.yml
    - fdroidserver/build.py
    - fdroidserver/common.py
    - fdroidserver/exception.py
    - fdroidserver/metadata.py
    - fdroidserver/net.py
    - fdroidserver/scanner.py
    - fdroidserver/vmtools.py
    - makebuildserver
    - buildserver/*
  script:
  - apt-get update
  - apt-get dist-upgrade
  - apt-get clean
  - test -n "$fdroidserver" || source /etc/profile.d/bsenv.sh
  - ln -fsv "$CI_PROJECT_DIR" "$fdroidserver"
  - apt-get install sdkmanager
  - rm -rf "$ANDROID_HOME/tools"
  - sdkmanager "tools" "platform-tools" "build-tools;31.0.0"
  - git ls-remote https://gitlab.com/fdroid/fdroiddata.git master
  - git clone --depth 1 https://gitlab.com/fdroid/fdroiddata.git
  - cd fdroiddata
  - for d in build logs repo tmp unsigned $home_vagrant/.android; do test -d $d ||
    mkdir $d; chown -R vagrant $d; done
  - export GRADLE_USER_HOME=$home_vagrant/.gradle
  - export fdroid="sudo --preserve-env --user vagrant env PATH=$fdroidserver:$PATH
    env PYTHONPATH=$fdroidserver:$fdroidserver/examples env PYTHONUNBUFFERED=true
    env TERM=$TERM env HOME=$home_vagrant fdroid"
  - git -C $home_vagrant/gradlew-fdroid pull
  - chown -R vagrant $home_vagrant
  - chown -R vagrant $fdroidserver/.git
  - chown vagrant $fdroidserver/
  - chown -R vagrant .git
  - chown vagrant .
  - $fdroid build --verbose --latest org.fdroid.fdroid.privileged
  - $fdroid build --verbose --on-server --no-tarball --latest org.fdroid.fdroid
  - if dpkg --list sudo; then echo "sudo should not be still there"; exit 1; fi
  - 'if [ ! -f repo/status/running.json ]; then echo "ERROR: running.json does not
    exist!"; exit 1; fi'
  - 'if [ ! -f repo/status/build.json ]; then echo "ERROR: build.json does not exist!";
    exit 1; fi'
fedora_latest:
  image: fedora:39
  script:
  - echo "timeout=600" >> /etc/dnf/dnf.conf
  - echo "retries=50" >> /etc/dnf/dnf.conf
  - echo "keepcache=True" >> /etc/dnf/dnf.conf
  - dnf -y update || dnf -y update
  - dnf -y install @development-tools diffutils findutils git gnupg java-17-openjdk-devel
    openssl python3 python3-babel python3-matplotlib python3-pip python3-pycountry
    rsync which
  - $pip install sdkmanager
  - ./setup.py sdist
  - useradd -m -c "test account" --password "fakepassword"  testuser
  - su testuser --login --command "cd `pwd`; $pip install --user dist/fdroidserver-*.tar.gz"
  - test -e ~testuser/.local/share/locale/de/LC_MESSAGES/fdroidserver.mo
  - export BUILD_TOOLS_VERSION=`sed -n "s,^MINIMUM_APKSIGNER_BUILD_TOOLS_VERSION\s*=\s*['\"]\(.*\)[['\"],\1,p"
    fdroidserver/common.py`
  - export ANDROID_HOME=`pwd`/android-sdk
  - mkdir -p $ANDROID_HOME/licenses/
  - printf "\n8933bad161af4178b1185d1a37fbf41ea5269c55\nd56f5187479451eabf01fb78af6dfcb131a6481e\n24333f8a63b6825ea9c5514f83c2829b004d1fee"
    > $ANDROID_HOME/licenses/android-sdk-license
  - printf "\n84831b9409646a918e30573bab4c9c91346d8abd" > $ANDROID_HOME/licenses/android-sdk-preview-license
  - printf "\n79120722343a6f314e0719f863036c702b0e6b2a\n84831b9409646a918e30573bab4c9c91346d8abd"
    > $ANDROID_HOME/licenses/android-sdk-preview-license-old
  - mkdir ~/.android
  - touch ~/.android/repositories.cfg
  - sdkmanager "platform-tools" "build-tools;$BUILD_TOOLS_VERSION"
  - chown -R testuser .
  - cd tests
  - su testuser --login --command "cd `pwd`; export CI=$CI ANDROID_HOME=$ANDROID_HOME;
    fdroid=~testuser/.local/bin/fdroid ./run-tests"
hooks/pre-commit:
  image: debian:bookworm-slim
  script:
  - apt-get update
  - apt-get -y install --no-install-recommends bash ca-certificates dash gcc git make
    pycodestyle pyflakes3 python3-dev python3-git python3-nose python3-pip python3-yaml
  - ./hooks/pre-commit
  stage: lint
  variables:
    LANG: C.UTF-8
locales:
  image: debian:bookworm-slim
  script:
  - apt-get update
  - apt-get -y install --no-install-recommends gettext make python3-babel
  - export EXITVALUE=0
  - function set_error() { export EXITVALUE=1; printf "\x1b[31mERROR `history|tail
    -2|head -1|cut -b 6-500`\x1b[0m\n"; }
  - make -C locale compile || set_error
  - rm -f locale/*/*/*.mo
  - pybabel compile --domain=fdroidserver --directory locale 2>&1 | { grep -F "error:"
    && exit 1; } || true
  - exit $EXITVALUE
  stage: lint
  variables:
    LANG: C.UTF-8
macOS:
  rules:
  - if: $CI_COMMIT_BRANCH == "master" && $CI_PROJECT_PATH == "fdroid/fdroidserver"
  script:
  - export HOMEBREW_CURL_RETRIES=10
  - brew update > /dev/null
  - brew upgrade
  - brew install fdroidserver
  - brew install --cask android-commandlinetools temurin
  - brew install bash coreutils gnu-sed
  - export PATH="$(brew --prefix fdroidserver)/libexec/bin:$(brew --prefix coreutils)/libexec/gnubin:$PATH"
  - brew autoremove
  - brew info fdroidserver
  - export BUILD_TOOLS_VERSION=`gsed -n "s,^MINIMUM_APKSIGNER_BUILD_TOOLS_VERSION\s*=\s*['\"]\(.*\)[['\"],\1,p"
    fdroidserver/common.py`
  - export ANDROID_HOME="$(brew --prefix)/share/android-commandlinetools"
  - mkdir -p "$ANDROID_HOME/licenses"
  - echo -e "\n8933bad161af4178b1185d1a37fbf41ea5269c55" > "$ANDROID_HOME/licenses/android-sdk-license"
  - echo -e "\nd56f5187479451eabf01fb78af6dfcb131a6481e" >> "$ANDROID_HOME/licenses/android-sdk-license"
  - echo -e "\n24333f8a63b6825ea9c5514f83c2829b004d1fee" >> "$ANDROID_HOME/licenses/android-sdk-license"
  - $(brew --prefix)/bin/sdkmanager "build-tools;$BUILD_TOOLS_VERSION"
  - echo "macOS sticks with bash 3.x because of licenses, so avoid new bash syntax"
  - /bin/bash --version
  - /bin/bash -n tests/run-tests
  - fdroid="$(brew --prefix fdroidserver)/libexec/bin/python3 $PWD/fdroid" ./tests/run-tests
  tags:
  - saas-macos-medium-m1
metadata_v0:
  image: registry.gitlab.com/fdroid/fdroidserver:buildserver
  script:
  - git fetch https://gitlab.com/fdroid/fdroidserver.git $RELEASE_COMMIT_ID
  - cd tests
  - export GITCOMMIT=$(git rev-parse HEAD)
  - git checkout $RELEASE_COMMIT_ID
  - cd ..
  - git clone --depth 1 https://gitlab.com/fdroid/fdroiddata.git
  - rm -f fdroiddata/config.yml
  - cd fdroiddata
  - ../tests/dump_internal_metadata_format.py
  - cd ..
  - git reset --hard
  - git checkout $GITCOMMIT
  - cd fdroiddata
  - ../tests/dump_internal_metadata_format.py
  - sed -i -e '/ArchivePolicy:/d' -e '/FlattrID:/d' -e '/RequiresRoot:/d' metadata/dump_*/*.yaml
  - diff -uw metadata/dump_*
  variables:
    GIT_DEPTH: 1000
    RELEASE_COMMIT_ID: d172d991803b27ad5213d11b5a737e5cb9e5fc3a
pages:
  artifacts:
    paths:
    - public
  image: alpine:latest
  needs:
  - job: Build documentation
    optional: true
  rules:
  - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  script:
  - cp docs/build/html public -r
  stage: deploy
pip-audit:
  image: debian:13-slim
  script:
  - apt update -yyq
  - apt upgrade -yyq
  - apt install -yyq --no-install-recommends python3 python3-venv
  - python3 -m venv env
  - . env/bin/activate
  - python3 -m ensurepip
  - python3 -m pip install --upgrade pip
  - python3 -m pip install pip-audit
  - python3 -m pip_audit -f json | python3 -m json.tool --indent=2 || true
  - python3 -m pip_audit
  stage: lint
plugin_fetchsrclibs:
  before_script: *id001
  image: debian:bookworm-slim
  rules:
  - changes:
    - .gitlab-ci.yml
    - examples/fdroid_fetchsrclibs.py
    - fdroidserver/__main__.py
  script:
  - apt-get install curl git python3-cffi python3-matplotlib python3-nacl python3-paramiko
    python3-pil python3-pip python3-pycparser python3-venv
  - python3 -m venv --system-site-packages env
  - . env/bin/activate
  - export PATH="$CI_PROJECT_DIR:$PATH"
  - export PYTHONPATH="$CI_PROJECT_DIR/examples"
  - export SETUPTOOLS_USE_DISTUTILS=stdlib
  - $pip install -e .
  - fdroid | grep fetchsrclibs
  - mkdir fdroiddata
  - commitid=b9e9a077d720c86ff6fff4dbb341254cc4370b1a
  - curl https://gitlab.com/fdroid/fdroiddata/-/archive/${commitid}/fdroiddata-${commitid}.tar.gz
    | tar -xz --directory=fdroiddata --strip-components=1
  - cd fdroiddata
  - fdroid fetchsrclibs freemap.opentrail:4 --verbose
  - test -d build/freemap.opentrail/.git
  - test -d build/srclib/andromaps/.git
  - test -d build/srclib/freemaplib/.git
  - test -d build/srclib/freemaplibProj/.git
  - test -d build/srclib/JCoord/.git
  - test -d build/srclib/javaproj/.git
  variables: *id003
podman system service:
  before_script: *id001
  image: debian:trixie-slim
  rules:
  - changes:
    - .gitlab-ci.yml
    - fdroidserver/up.py
    - tests/test_up.py
  script:
  - apt-get install python3-asn1crypto python3-defusedxml python3-git python3-pillow
    python3-podman python3-ruamel.yaml python3-yaml
  - python3 -m unittest tests/test_up.py --verbose
  variables: *id003
pylint:
  artifacts:
    reports:
      codequality: pylint-report.json
    when: always
  before_script: *id001
  image: debian:bookworm-slim
  rules: *id002
  script:
  - apt-get install pylint python3-pip
  - $pip install --break-system-packages pylint-gitlab
  - pylint --output-format=colorized,pylint_gitlab.GitlabCodeClimateReporter:pylint-report.json
    fdroid makebuildserver setup.py fdroidserver/*.py tests/*.py
  stage: lint
  variables: *id003
safety:
  before_script: *id001
  image: debian:bookworm-slim
  rules:
  - changes:
    - .gitlab-ci.yml
    - .safety-policy.yml
    - pyproject.toml
    - setup.py
    if: $SAFETY_API_KEY
  script:
  - apt-get install fdroidserver python3-biplist python3-pip python3-pycountry
  - $pip install --break-system-packages .
  - $pip install --break-system-packages safety
  - python3 -m safety --key "$SAFETY_API_KEY" --stage cicd scan
  variables:
    LANG: C.UTF-8
servergitmirrors:
  before_script: *id001
  image: debian:bookworm-slim
  rules:
  - if: $CI_COMMIT_BRANCH == "master" && $CI_PROJECT_PATH == "fdroid/fdroidserver"
  script:
  - apt-get install default-jdk-headless git openssh-client openssl python3-cffi python3-cryptography
    python3-matplotlib python3-nacl python3-pil python3-pip python3-pycparser python3-setuptools
    python3-venv rsync wget
  - apt-get install apksigner
  - python3 -m venv --system-site-packages env
  - . env/bin/activate
  - export PYTHONPATH=`pwd`
  - export SETUPTOOLS_USE_DISTUTILS=stdlib
  - $pip install -e .
  - mkdir /root/.ssh/
  - ./tests/key-tricks.py
  - ssh-keyscan gitlab.com >> /root/.ssh/known_hosts
  - test -d /tmp/fdroid/repo || mkdir -p /tmp/fdroid/repo
  - cp tests/config.yml tests/keystore.jks /tmp/fdroid/
  - cp tests/repo/com.politedroid_6.apk /tmp/fdroid/repo/
  - cd /tmp/fdroid
  - touch fdroid-icon.png
  - printf "\nservergitmirrors\x3a 'git@gitlab.com:fdroid/ci-test-servergitmirrors-repo.git'\n"
    >> config.yml
  - $PYTHONPATH/fdroid update --verbose --create-metadata
  - $PYTHONPATH/fdroid deploy --verbose
  - export DLURL=`grep -Eo 'https://gitlab.com/fdroid/ci-test-servergitmirrors-repo[^"]+'
    repo/index-v1.json`
  - echo $DLURL
  - wget $DLURL/index-v1.jar
  - diff repo/index-v1.jar index-v1.jar
  variables: *id003
shellcheck:
  before_script: *id001
  image: debian:bookworm-slim
  rules:
  - changes:
    - .gitlab-ci.yml
    - hooks/install-hooks.sh
    - hooks/pre-commit
    - tests/run-tests
  script:
  - apt-get install shellcheck
  - shellcheck --exclude SC2046,SC2090 --severity=warning --color hooks/install-hooks.sh
    hooks/pre-commit tests/run-tests
  stage: lint
  variables: *id003
stages:
- lint
- test
- deploy
test_deploy_to_s3_with_rclone:
  before_script:
  - apt-get update
  - apt-get install -y androguard apksigner curl docker.io git python3-venv rclone
  - docker info
  - python3 -m venv --system-site-packages test-venv
  - . test-venv/bin/activate
  - pip install testcontainers[minio]
  - pip install .
  image: debian:trixie-slim
  rules:
  - changes:
    - .gitlab-ci.yml
    - fdroidserver/deploy.py
    - tests/test_deploy.py
    - tests/test_integration.py
  script:
  - python3 -m unittest -k test_update_remote_storage_with_rclone --verbose
  services:
  - command:
    - --tls=false
    name: docker:dind
  tags:
  - saas-linux-small-amd64
  variables:
    DOCKER_DRIVER: overlay2
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ''
ubuntu_jammy_pip:
  before_script: *id001
  image: ubuntu:jammy
  script:
  - apt-get install git default-jdk-headless python3-pip python3-venv rsync
  - python3 -m venv sdist-env
  - . sdist-env/bin/activate
  - ./setup.py sdist
  - deactivate
  - tar tzf dist/fdroidserver-*.tar.gz
  - export ANDROID_HOME=/opt/android-sdk
  - $pip install sdkmanager
  - sdkmanager 'build-tools;35.0.0'
  - $pip install biplist pycountry
  - $pip install dist/fdroidserver-*.tar.gz
  - tar xzf dist/fdroidserver-*.tar.gz
  - cd fdroidserver-*
  - export PATH=$PATH:$ANDROID_HOME/build-tools/35.0.0
  - fdroid=`which fdroid` ./tests/run-tests
  - "LANGUAGE='de' fdroid --help | grep 'G\xFCltige Befehle sind'"
  variables: *id003
ubuntu_lts_ppa:
  before_script: *id001
  image: ubuntu:latest
  rules:
  - if: $CI_COMMIT_BRANCH == "master" && $CI_PROJECT_PATH == "fdroid/fdroidserver"
  script:
  - export ANDROID_HOME=/usr/lib/android-sdk
  - apt-get install gnupg
  - while ! apt-key adv --keyserver keyserver.ubuntu.com --recv-key 9AAC253193B65D4DF1D0A13EEC4632C79C5E0151;
    do sleep 15; done
  - export RELEASE=$(sed -n 's,^Suites\x3a \([a-z]*\).*,\1,p' /etc/apt/sources.list.d/*.sources
    | head -1)
  - echo "deb http://ppa.launchpad.net/fdroid/fdroidserver/ubuntu $RELEASE main" >>
    /etc/apt/sources.list
  - apt-get update
  - apt-get dist-upgrade
  - apt-get install --install-recommends dexdump fdroidserver git python3-biplist
    python3-pycountry python3-setuptools sdkmanager
  - git config --global init.defaultBranch thisisnotmasterormain
  - cd tests
  - ./run-tests
  variables: *id003
variables:
  GIT_DEPTH: 1
  pip: pip3 --timeout 100 --retries 10
workflow:
  rules:
  - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
  - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS
    when: never
  - if: $CI_COMMIT_BRANCH
yamllint:
  before_script: *id001
  image: debian:bookworm-slim
  rules:
  - changes:
    - .gitlab-ci.yml
    - .safety-policy.yml
    - .yamllint
    - tests/*.yml
    - tests/*/*.yml
    - tests/*/*/.*.yml
  script:
  - apt-get install yamllint
  - yamllint .gitlab-ci.yml .safety-policy.yml .yamllint tests/*.yml tests/*/*.yml
    tests/*/*/.*.yml
  stage: lint
  variables:
    LANG: C.UTF-8
