before_script:
- mkdir -p ${GOPATH}/src/${GO_PROJECT}
- mkdir -p ${GOPATH}/src/${GO_PROJECT}/${BIN_NAME}
- mkdir -p ${CI_PROJECT_DIR}/${ARTIFACTS_DIR}
- go get -u github.com/golang/dep/cmd/dep
- go get -u golang.org/x/lint/golint
- cp -r ${CI_PROJECT_DIR}/* ${GOPATH}/src/${GO_PROJECT}/${BIN_NAME}
- cd ${GOPATH}/src/${GO_PROJECT}/${BIN_NAME}
darwin:
  artifacts:
    paths:
    - ${ARTIFACTS_DIR}/darwin_amd64
  only:
  - master
  script:
  - dep ensure -update
  - tools/build.sh darwin
  stage: build
image: golang:1.9
lint:
  only:
  - master
  script:
  - golint -set_exit_status $(go list ./... | grep -v /vendor/)
  stage: lint
linux:
  artifacts:
    paths:
    - ${ARTIFACTS_DIR}/linux_amd64
  only:
  - master
  script:
  - dep ensure -update
  - tools/build.sh linux
  stage: build
race:
  only:
  - master
  script:
  - dep ensure -update
  - go test -race -short $(go list ./... | grep -v /vendor/)
  stage: test
stages:
- lint
- test
- build
test:
  only:
  - master
  script:
  - dep ensure -update
  - go test -short $(go list ./... | grep -v /vendor/)
  stage: test
variables:
  ARTIFACTS_DIR: artifacts
  BIN_NAME: aws-auth
  GO_PROJECT: gitlab.com/severity1
windows:
  artifacts:
    paths:
    - ${ARTIFACTS_DIR}/windows_amd64
  only:
  - master
  script:
  - dep ensure -update
  - tools/build.sh windows
  stage: build
