after_script:
- ls -la
assemble:
  environment:
    name: main
    url: https://muctool.de
  image: docker:stable
  script:
  - echo PASSWORD $PASSWORD
  - cd service
  - docker build --pull --tag loxal/muctool:latest .
  services:
  - docker:dind
  stage: assemble
  variables:
    PASSWORD: value
before_script:
- df -h
build-service:
  artifacts:
    expire_in: 1 month
    paths:
    - service/build/libs/*.jar
  image: openjdk:11-jre
  script:
  - ./gradlew clean build singleJar --info
  stage: build-service
stages:
- build-service
- assemble
