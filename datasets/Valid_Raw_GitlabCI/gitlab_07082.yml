Deployment:
  before_script:
  - gem install dpl
  - wget -qO- https://cli-assets.heroku.com/install-ubuntu.sh | sh
  environment:
    name: production
    url: $HEROKU_APP_HOST
  image: ruby:2.4
  only:
  - master@E3-PPW-1/storytugas1
  script:
  - dpl --provider=heroku --app=$HEROKU_APPNAME --api-key=$HEROKU_APIKEY
  - export HEROKU_API_KEY=$HEROKU_APIKEY
  - heroku run --app $HEROKU_APPNAME migrate
  stage: deploy
Staging:
  before_script:
  - gem install dpl
  - wget -qO- https://cli-assets.heroku.com/install-ubuntu.sh | sh
  environment:
    name: production
    url: $HEROKU_APP_HOST_TEST
  image: ruby:2.4
  only:
  - dev@E3-PPW-1/storytugas1
  script:
  - dpl --provider=heroku --app=$HEROKU_APPNAME_TEST --api-key=$HEROKU_APIKEY
  - export HEROKU_API_KEY=$HEROKU_APIKEY
  - heroku run --app $HEROKU_APPNAME_TEST migrate
  stage: staging
UnitTest:
  before_script:
  - wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | apt-key add
    -
  - echo "deb http://dl.google.com/linux/chrome/deb/ stable main" > /etc/apt/sources.list.d/google.list
  - pip install -r requirements.txt
  - python manage.py makemigrations
  - python manage.py migrate
  - apt-get update -qq && apt-get install -y -qq unzip
  - apt-get install -y google-chrome-stable
  - apt-get install -y xvfb
  - wget https://chromedriver.storage.googleapis.com/2.32/chromedriver_linux64.zip
  - unzip chromedriver_linux64.zip
  - python manage.py collectstatic --no-input
  - python manage.py runserver 8000 &
  image: python:3.6
  script:
  - coverage run --include=landing_page/*,member/*,event_page/*,event/*,about/*,news/*
    manage.py test
  - coverage report -m
  stage: test
  when: on_success
stages:
- test
- staging
- deploy
