before_script:
- python -V
- pip install virtualenv
- virtualenv venv
- source venv/bin/activate
cache:
  paths:
  - .cache/pip
  - venv/
image: python:latest
run:
  artifacts:
    paths:
    - dist/*.whl
  script:
  - python setup.py bdist_wheel
  - pip install dist/*
test:
  script:
  - python setup.py test
variables:
  PIP_CACHE_DIR: $CI_PROJECT_DIR/.cache
