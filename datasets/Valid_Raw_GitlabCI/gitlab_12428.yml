before_script:
- export VERSION="unknown"
- export VERSION=$(cat ./version)
- docker login -u gitlab-ci-token -p $CI_JOB_TOKEN $CI_REGISTRY
encode_gate-amd64:
  dependencies:
  - semver
  image: docker:latest
  only:
  - master
  - /dev(.)*|DEV(.)*/
  - /rc(.)*|RC(.)*/
  script:
  - if [ "$CI_COMMIT_REF_NAME" = "master" ]; then export CI_COMMIT_REF_NAME="Stable";
    fi
  - docker build --pull -t "$CI_REGISTRY_IMAGE/encode_gate:$VERSION-$CI_COMMIT_REF_NAME-amd64"
    -f Dockerfiles/encode_gate .
  - docker push "$CI_REGISTRY_IMAGE/encode_gate:$VERSION-$CI_COMMIT_REF_NAME-amd64"
  stage: deploy
  tags:
  - x86_64
