image: python:3.8.2
lint_yaml_files:
  script:
  - pip install yamllint
  - find . -type f -name '*.yml' | sed 's|\./||g' | egrep -v '(\.kitchen/|\[warning\]|\.molecule/)'
    | xargs yamllint -c yamllint.conf -f parsable
pages:
  artifacts:
    paths:
    - public
  only:
  - master
  script:
  - curl -SL https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_${HUGO_VERSION}_Linux-64bit.tar.gz
    -o /tmp/hugo.tar.gz
  - tar -xzf /tmp/hugo.tar.gz -C /tmp
  - mv /tmp/hugo /usr/local/bin/
  - hugo -s website -d ../public
  - pip install mkdocs mkdocs-material mkdocs-git-revision-date-localized-plugin
  - mkdocs --version
  - ./prep_docs_for_publish.sh
  - mkdocs build
  - mv site public/docs
variables:
  GIT_SUBMODULE_STRATEGY: recursive
  HUGO_VERSION: 0.68.3
