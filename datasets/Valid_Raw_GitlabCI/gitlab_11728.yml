build:
  after_script:
  - rev=`git rev-parse HEAD`
  - cd ../.. && git clone https://github.com/lsilvest/ztsdb_dockerfile.git && cd ztsdb_dockerfile
  - sed -i "1s|.*|# https://gitlab.com/lsilvest/ztsdb/commit/$rev|" Dockerfile
  - git config user.name "lsilvest"
  - git config user.email "lsilvestri@ztsdb.org"
  - git commit -am "automated docker build - https://gitlab.com/lsilvest/ztsdb/commit/$rev"
  - git push https://lsilvest:$GITHUB_PWD@github.com/lsilvest/ztsdb_dockerfile.git
    --all --quiet
  before_script:
  - apt update
  - DEBIAN_FRONTEND=noninteractive apt -y install make cmake libboost-filesystem-dev
    flex bison gcc g++ git gengetopt bzip2 libdouble-conversion-dev software-properties-common
    tzdata
  - ldconfig
  script:
  - mkdir build
  - cd build
  - cmake ..
  - make -j4 -O
  - make rtest
  stage: build
image: ubuntu:18.04
