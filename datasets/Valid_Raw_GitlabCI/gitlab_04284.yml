archive_project:
  artifacts:
    paths:
    - build/ProjectName.ipa
  only:
  - master
  script:
  - xcodebuild clean archive -archivePath build/ProjectName -scheme SchemeName
  - xcodebuild -exportArchive -exportFormat ipa -archivePath "build/ProjectName.xcarchive"
    -exportPath "build/ProjectName.ipa" -exportProvisioningProfile "ProvisioningProfileName"
  stage: archive
  tags:
  - ios_11-3
  - xcode_9-3
  - macos_10-13
build_project:
  script:
  - xcodebuild clean -project ProjectName.xcodeproj -scheme SchemeName | xcpretty
  - xcodebuild test -project ProjectName.xcodeproj -scheme SchemeName -destination
    'platform=iOS Simulator,name=iPhone 8,OS=11.3' | xcpretty -s
  stage: build
  tags:
  - ios_11-3
  - xcode_9-3
  - macos_10-13
stages:
- build
- archive
