before_script:
- apt-get update && apt-get install -y python3
image: debian:9-slim
job 0:
  only:
  - tags
  script:
  - apt-get install -y gnupg
  - gpg --import -v security-pubkey.asc
  - scripts/verify-checksums.py
  stage: verify_chksum
job 1:
  allow_failure: true
  artifacts:
    reports:
      sast: gl-sast-report.json
  image: docker:stable
  script:
  - export SP_VERSION=$(echo "$CI_SERVER_VERSION" | sed 's/^\([0-9]*\)\.\([0-9]*\).*/\1-\2-stable/')
  - docker run --env SAST_CONFIDENCE_LEVEL="${SAST_CONFIDENCE_LEVEL:-3}" --volume
    "$PWD:/code" --volume /var/run/docker.sock:/var/run/docker.sock "registry.gitlab.com/gitlab-org/security-products/sast:$SP_VERSION"
    /app/bin/run /code
  services:
  - docker:stable-dind
  stage: sast
  variables:
    DOCKER_DRIVER: overlay2
stages:
- verify_chksum
- sast
