build:
  artifacts:
    paths:
    - bin_waf
  before_script:
  - apt update && apt -y install libseccomp2 libseccomp-dev wget
  - uname -r
  - wget https://github.com/seccomp/libseccomp/releases/download/v2.3.3/libseccomp-2.3.3.tar.gz
  - tar -xzvf libseccomp-2.3.3.tar.gz
  - cd libseccomp-2.3.3
  - ./configure
  - make && make install
  - cd ..
  script:
  - cd src && make
  stage: build
image: gcc
