style_check:
  image: registry.gitlab.com/datadrivendiscovery/images/testing:ubuntu-xenial-python36
  script:
  - pycodestyle primitive_interfaces
  stage: build
tests:
  before_script:
  - docker info
  image: registry.gitlab.com/datadrivendiscovery/images/testing:ubuntu-xenial-python36
  script:
  - python3 setup.py sdist
  - pip3 install --process-dependency-links dist/*
  - rm -rf primitive_interfaces
  - python3 ./run_tests.py
  services:
  - docker:dind
  stage: build
  variables:
    DOCKER_HOST: tcp://docker:2375
    GIT_SUBMODULE_STRATEGY: recursive
trigger_images_rebuild:
  image: registry.gitlab.com/datadrivendiscovery/images/testing:ubuntu-xenial-python36
  only:
  - devel
  script:
  - if [ -n "$TRIGGER_TOKEN" ]; then curl -X POST -F token=$TRIGGER_TOKEN -F ref=master
    -F variables[REBUILD_IMAGE]=core:ubuntu-xenial-python36-devel https://gitlab.com/api/v4/projects/5024100/trigger/pipeline;
    fi
  stage: deploy
type_check:
  image: registry.gitlab.com/datadrivendiscovery/images/testing:ubuntu-xenial-python36
  script:
  - git clone https://gitlab.com/datadrivendiscovery/metadata.git
  - cd metadata
  - git checkout ${DEPENDENCY_REF}
  - cd ..
  - MYPYPATH=metadata mypy primitive_interfaces
  stage: build
  variables:
    DEPENDENCY_REF: devel
