build:
  artifacts:
    expire_in: 1 week
    paths:
    - dist/
  script:
  - python setup.py sdist bdist_wheel
  stage: build
deploy:
  dependencies:
  - build
  except:
  - /^(?!1\.).*$
  only:
  - tags
  script:
  - pip install twine
  - twine upload -u $PYPI_USER -p $PYPI_PASSWORD dist/*
  stage: deploy
image: python:3.6
stages:
- build
- deploy
