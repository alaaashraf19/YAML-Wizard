clang++:
  except:
  - gitlab-org
  interruptible: false
  script:
  - apt-get -qq update && apt-get -qq install --no-install-recommends -y --quiet clang
    cmake make libboost-timer-dev libboost-serialization-dev libblas-dev libfftw3-dev
    liblapack-dev pkg-config
  - mkdir build && cd build
  - clang++ --version
  - CXX=clang++ cmake .. -DCMAKE_BUILD_TYPE=Debug -DCMAKE_CXX_FLAGS="-D_GLIBCXX_DEBUG=1"
  - cmake --build . --parallel 2 || cmake --build . --parallel 1 --verbose
  - ctest -j 2 --output-on-failure
  stage: build
clang++-latest libc++:
  except:
  - gitlab-org
  interruptible: true
  needs:
  - clang++
  script:
  - apt-get -qq update && apt-get -qq install --no-install-recommends -y --quiet ca-certificates
    clang cmake make libboost-timer-dev libboost-serialization-dev libblas-dev libc++-dev
    libc++abi-dev libfftw3-dev liblapack-dev pkg-config tar wget
  - mkdir build && cd build
  - clang++ --version
  - CXX=clang++ cmake .. -DCMAKE_BUILD_TYPE=Debug -DCMAKE_CXX_FLAGS="-stdlib=libc++
    -DBOOST_NO_CXX98_FUNCTION_BASE -D_LIBCPP_ENABLE_CXX17_REMOVED_AUTO_PTR -D_LIBCPP_HARDENING_MODE=_LIBCPP_HARDENING_MODE_DEBUG"
  - cmake --build . --parallel 2 || cmake --build . --parallel 1 --verbose
  - ctest -j 2 --output-on-failure
  stage: build
g++:
  interruptible: false
  script:
  - apt-get -qq update && apt-get -qq install --no-install-recommends -y --quiet ca-certificates
    cmake g++ make libboost-timer-dev libboost-serialization-dev libblas-dev liblapack-dev
    libfftw3-dev pkg-config
  - g++ --version
  - mkdir build && cd build
  - cmake .. -DCMAKE_BUILD_TYPE=Debug -DCMAKE_CXX_FLAGS="-D_GLIBCXX_DEBUG=1"
  - cmake --build . --parallel 2 || cmake --build . --verbose
  - ctest -j 2 --output-on-failure
  stage: build
image: debian:stable
variables:
  CODECOV_TOKEN: 999feb5b-a599-4d02-b9c5-46d977247f3a
  GIT_DEPTH: '0'
  GIT_SUBMODULE_STRATEGY: recursive
  NVIDIA_DISABLE_REQUIRE: 1
  RT_VERSION: '0.1'
  SONAR_USER_HOME: ${CI_PROJECT_DIR}/.sonar
workflow:
  auto_cancel:
    on_new_commit: interruptible
  rules:
  - if: $CI_COMMIT_TAG
  - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
