before_script:
- apt-get update && apt-get install -y -t unstable curl
image: rocker/r-base
pages:
  artifacts:
    paths:
    - public
  script:
  - Rscript dependencies.R
  - cp -r ./data ./public/
  - cd ./public && zip -o ../website.zip  -r * && cd ..
  - 'curl -H "Content-Type: application/zip" -H "Authorization: Bearer $NETLIFY_TOKEN"
    --data-binary "@website.zip" https://api.netlify.com/api/v1/sites/tinyverse.netlify.com/deploys'
  stage: deploy
