before_script:
- yarn install
build:
  artifacts:
    expire_in: 30 min
    paths:
    - dist
  script:
  - yarn run build
  stage: build
build:documentation:
  artifacts:
    expire_in: 30 min
    paths:
    - documentation
  only:
  - /^v\d\.\d\.\d$/
  script:
  - yarn run compodoc
  stage: build
cache:
  key: $CI_JOB_ID
  paths:
  - node_modules
image: node:carbon-alpine
pages:
  artifacts:
    paths:
    - public
  dependencies:
  - build
  - build:documentation
  - test
  only:
  - /^v\d\.\d\.\d$/
  script:
  - mkdir public
  - cp -r documentation/* public/
  stage: publish
publish:
  dependencies:
  - build
  - build:documentation
  only:
  - /^v\d\.\d\.\d$/
  script:
  - echo '//registry.npmjs.org/:_authToken=${NPM_TOKEN}'>.npmrc
  - npm run publish:lib
  stage: publish
stages:
- test
- build
- publish
test:
  artifacts:
    expire_in: 30 min
    paths:
    - coverage
  coverage: /Functions\s+:\s(\d+(?:\.\d+)?%)/
  image: geekykaran/headless-chrome-node-docker
  script:
  - yarn run test:ci
  stage: test
