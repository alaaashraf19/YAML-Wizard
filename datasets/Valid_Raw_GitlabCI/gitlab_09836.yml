image: node:10
pages:
  artifacts:
    paths:
    - public
  cache:
    paths:
    - node_modules/
  only:
  - master
  script:
  - yarn install
  - yarn build
  - rm -rf public
  - mv build public
  stage: deploy
test:
  cache:
    paths:
    - node_modules/
  script:
  - yarn install
  - yarn test -- --coverage
  - yarn run eslint src
  stage: test
