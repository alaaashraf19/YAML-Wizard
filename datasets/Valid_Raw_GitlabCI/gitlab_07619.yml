.install_dependencies:
  before_script:
  - echo "ha"
image: gitlab-registry.cern.ch/fitters/xfitter:with_docker
job-ceres-fit:
  artifacts:
    expire_in: 2 day
    paths:
    - install.log
    - temp/**/test.log
    - temp/**/xfitter.log
    - temp/**/output
    when: on_failure
  extends: .install_dependencies
  only:
  - merge_requests
  - schedules
  script:
  - ./tools/install-qcdnum
  - ./tools/install-numdiff
  - . setup.sh
  - ./make.sh install
  - ./tools/test.sh CERES-fit
  stage: test
  variables:
    CMAKE_FLAGS: -DCMAKE_DISABLE_FIND_PACKAGE_ROOT=TRUE
job-ceres-parallel:
  artifacts:
    expire_in: 2 day
    paths:
    - install.log
    - temp/**/test.log
    - temp/**/xfitter.log
    - temp/**/output
    when: on_failure
  extends: .install_dependencies
  only:
  - merge_requests
  - schedules
  script:
  - ./tools/install-qcdnum
  - ./tools/install-numdiff
  - . setup.sh
  - ./make.sh install
  - ./tools/test.sh CERES-parallel
  stage: test
  variables:
    CMAKE_FLAGS: -DCMAKE_DISABLE_FIND_PACKAGE_ROOT=TRUE
job-docker:
  image: docker
  only:
  - schedules
  script:
  - docker info
  - echo $CI_REGISTRY_PASSWORD | docker login -u $CI_REGISTRY_USER $CI_REGISTRY --password-stdin
  - docker build -t gitlab-registry.cern.ch/fitters/xfitter:master .
  - docker push gitlab-registry.cern.ch/fitters/xfitter:master
  services:
  - docker:dind
  stage: package
  tags:
  - docker-privileged-xl
  timeout: 120m
job-dyturbo:
  artifacts:
    expire_in: 2 day
    paths:
    - install.log
    - temp/**/test.log
    - temp/**/xfitter.log
    - temp/**/output
    when: on_failure
  extends: .install_dependencies
  only:
  - merge_requests
  - schedules
  script:
  - yum -y install git tar
  - ls /cvmfs
  - ./tools/install-qcdnum
  - ./tools/install-lhapdf
  - ./tools/install-dyturbo
  - ./tools/install-numdiff
  - . setup.sh
  - ./make.sh install
  - git clone -b master https://gitlab.cern.ch/fitters/xfitter-datafiles.git temp-datafiles
  - mv temp-datafiles/.git datafiles/.git
  - rm -rf temp-datafiles
  - cd datafiles
  - git reset --hard HEAD
  - cd -
  - ./tools/test.sh ZPT
  stage: test
  tags:
  - cvmfs
  variables:
    CMAKE_FLAGS: -DCMAKE_DISABLE_FIND_PACKAGE_ROOT=TRUE
job-install-full:
  artifacts:
    expire_in: 2 day
    paths:
    - install.log
    - temp/**/test.log
    - temp/**/xfitter.log
    - temp/**/output
    when: on_failure
  extends: .install_dependencies
  only:
  - merge_requests
  - schedules
  script:
  - yum -y install git tar root perl-CPAN
  - ./tools/install-xfitter deps
  - . setup.sh
  - ./tools/download-lhapdf.sh HERAPDF20_NNLO_EIG HERAPDF20_NNLO_VAR CT14nlo CT14nnlo
    ABMP16_3_nlo ABMP16_5_nnlo HERAPDF20_NLO_FF3B_EIG NNPDF30_nlo_as_0118 NNPDF31_nlo_as_0118_hessian
    NNPDF31_nnlo_as_0118 MMHT2014nnlo68cl nCTEQ15FullNuc_184_74 nCTEQ15FullNuc_1_1
    >& download-lhapdf.log
  - cat *.log
  - ./make.sh install
  - git clone -b master --single-branch https://gitlab.cern.ch/fitters/xfitter-datafiles.git
    temp-datafiles
  - mv temp-datafiles/.git datafiles/.git
  - rm -rf temp-datafiles
  - cd datafiles
  - git reset --hard HEAD
  - cd -
  - ./tools/test.sh
  stage: test
  timeout: 120m
job-install-minimal:
  extends: .install_dependencies
  only:
  - merge_requests
  - schedules
  script:
  - ./make.sh install
  stage: test
  variables:
    CMAKE_FLAGS: -DCMAKE_DISABLE_FIND_PACKAGE_ROOT=TRUE
job-scanmin:
  artifacts:
    expire_in: 2 day
    paths:
    - install.log
    - temp/**/test.log
    - temp/**/xfitter.log
    - temp/**/output
    when: always
  extends: .install_dependencies
  only:
  - merge_requests
  - schedules
  script:
  - ./tools/install-qcdnum
  - ./tools/install-numdiff
  - . setup.sh
  - ./make.sh install
  - ./tools/test.sh scanmin
  stage: test
  variables:
    CMAKE_FLAGS: -DCMAKE_DISABLE_FIND_PACKAGE_ROOT=TRUE
job-tmd:
  artifacts:
    expire_in: 2 day
    paths:
    - install.log
    - temp/**/test.log
    - temp/**/xfitter.log
    - temp/**/output
    when: on_failure
  extends: .install_dependencies
  only:
  - merge_requests
  - schedules
  script:
  - yum -y install git tar
  - ls /cvmfs
  - ./tools/install-qcdnum
  - ./tools/install-lhapdf
  - ./tools/install-dyturbo
  - ./tools/install-numdiff
  - . setup.sh
  - ./tools/download-lhapdf.sh NNPDF40_nnlo_as_01180_hessian >& download-lhapdf.log
  - ./make.sh install
  - git clone -b master https://gitlab.cern.ch/fitters/xfitter-datafiles.git temp-datafiles
  - mv temp-datafiles/.git datafiles/.git
  - rm -rf temp-datafiles
  - cd datafiles
  - git reset --hard HEAD
  - cd -
  - ./tools/test.sh TMD
  stage: test
  tags:
  - cvmfs
  variables:
    CMAKE_FLAGS: -DCMAKE_DISABLE_FIND_PACKAGE_ROOT=TRUE
stages:
- test
- package
