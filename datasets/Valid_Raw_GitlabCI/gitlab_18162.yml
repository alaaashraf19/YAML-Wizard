before_script:
- docker info
- apk --no-cache add make
build-master:
  only:
  - master
  script:
  - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD"
  - docker build -t thereference/drupal-kubernetes-builder:latest .
  - docker push thereference/drupal-kubernetes-builder:latest
  stage: build
image: docker:stable
services:
- docker:dind
variables:
  DOCKER_DRIVER: overlay2
  DOCKER_HOST: tcp://docker:2375/
