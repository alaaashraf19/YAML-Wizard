before_script:
- yarn install
- yarn run install-app-deps
build_job_linux:
  artifacts:
    expire_in: 1 week
    paths:
    - dist/linux
  script:
  - yarn run dist:linux
  - mkdir -p ./dist/linux
  - cp -rf ./dist/*.gz ./dist/linux/
  - cp -rf ./dist/*.deb ./dist/linux/
  stage: build
build_job_macos:
  artifacts:
    expire_in: 1 week
    paths:
    - dist/darwin
  script:
  - yarn run dist:darwin
  - mkdir -p ./dist/darwin
  - cp -rf ./dist/*.dmg ./dist/darwin
  stage: build
build_job_win32:
  artifacts:
    expire_in: 1 week
    paths:
    - dist/win32
  script:
  - mkdir -p ./dist/win32
  - yarn run dist:win32
  - cp -rf ./dist/*.exe ./dist/win32/
  stage: build
cache:
  paths:
  - node_modules
  - .cache/electron
  - .cache/electron-builder
image: electronuserland/builder:wine
pages:
  artifacts:
    paths:
    - public
  only:
  - master
  script:
  - cd website
  - ./build.sh
  - mkdir -p ../public/download/linux/
  - mkdir -p ../public/download/win32/
  - mkdir -p ../public/download/macos/
  - cp -rf ../dist/linux/*.gz ../public/download/linux/
  - cp -rf ../dist/linux/*.deb ../public/download/linux/
  - cp -rf ../dist/win32/*.exe ../public/download/win32/
  - cp -rf ../dist/darwin/* ../public/download/macos/
  stage: deploy
stages:
- build
- deploy
