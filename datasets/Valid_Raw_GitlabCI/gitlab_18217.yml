before_script:
- curl -sSf https://static.rust-lang.org/rustup.sh | sh -s -- --channel=nightly --disable-sudo
  --yes
bench_job:
  script:
  - cargo bench --features="random"
  stage: bench
pages:
  artifacts:
    paths:
    - public
  only:
  - master
  script:
  - cargo doc
  - mv target/doc public
  stage: deploy
stages:
- test
- bench
- deploy
test_job:
  script:
  - cargo test --features="random"
  stage: test
