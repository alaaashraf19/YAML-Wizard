build:release:
  artifacts:
    expire_in: 6h
    paths:
    - public
    untracked: true
    when: on_success
  only:
    variables:
    - $CI_COMMIT_TAG =~ /^isf\-traffic\-.*/
    - $FORCE_RELEASE
  script:
  - ./update.py -sl
  stage: build
build:update:
  artifacts:
    expire_in: 1d
    paths:
    - public
    untracked: true
    when: on_success
  only:
    variables:
    - $DAILY_UPDATE
  script:
  - ./update.py -su
  stage: build
image: registry.gitlab.com/isf-traffic/isf-traffic.gitlab.io
notify:release:
  dependencies:
  - build:release
  except:
    variables:
    - $NO_NOTIFICATION
    - $FORCE_RELEASE
  only:
  - /^isf\-traffic\-.*/
  script:
  - ls -l public/
  - ./notify.py -l
  stage: notify
  when: on_success
notify:update:
  dependencies:
  - build:update
  except:
    variables:
    - $NO_NOTIFICATION
  only:
    variables:
    - $DAILY_UPDATE
  script:
  - ls -l public/
  - ./notify.py -u
  stage: notify
  when: on_success
pages:
  artifacts:
    paths:
    - public
  except:
    variables:
    - $NO_DEPLOY
  only:
    variables:
    - $CI_COMMIT_TAG =~ /^isf\-traffic\-.*/
    - $DAILY_UPDATE
    - $FORCE_RELEASE
  script:
  - ls -l public/
  stage: deploy
  when: on_success
stages:
- build
- deploy
- notify
