.test_template:
  script: &id001
  - npm run lint
  - npm test
before_script:
- npm install
cache:
  key: $CI_JOB_NAME
  paths:
  - node_modules/
  untracked: true
test:node10:
  image: node:10
  script: *id001
test:node4:
  image: node:4
  script: *id001
test:node6:
  image: node:6
  script: *id001
test:node8:
  image: node:8
  script: *id001
