check_deploy_code:
  script:
  - ansible-playbook -i hosts.ini deploy.yaml --check
  - ansible-playbook -i hosts.ini test.yaml --check
  stage: check_syntax
  tags:
  - desktop
deploy_network_config:
  script:
  - ansible-playbook -i hosts.ini deploy.yaml
  stage: deploy
  tags:
  - desktop
stages:
- check_syntax
- deploy
- test
test_network_config:
  script:
  - ansible-playbook -i hosts.ini test.yaml
  stage: test
  tags:
  - desktop
