name: linux-wheel-builder

on:
  pull_request:
  push:
  schedule:
    - cron: "0 7 * * *"  # Run once daily

permissions:
  contents: read  # to fetch code (actions/checkout)

defaults:
  run:
    shell: bash -l {0}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  COMMIT_ID: ${{ github.sha }}
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID_IAM_S3_UPLOADER }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY_IAM_S3_UPLOADER }}

jobs:
  linux-wheel-builder:
    name: Build and test Python wheels (Linux)
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            build-script: ops/build-linux.sh
          - os: ubuntu-22.04-arm
            build-script: ops/build-linux-aarch64.sh

    steps:
      - uses: actions/checkout@v2
        with:
          submodules: 'true'

      - uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-variant: Miniforge3
          miniforge-version: latest
          activate-environment: dev
          environment-file: ops/conda_env/dev.yml
          use-mamba: true

      - name: Display Conda env
        run: |
          conda info
          conda list

      - name: Build wheel
        run: |
          bash ${{ matrix.build-script }}

      - name: Test wheel
        run: |
          bash ops/test-linux-python-wheel.sh

  cpack-builder:
    name: Build CPack
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2
      with:
        submodules: 'true'
    - uses: conda-incubator/setup-miniconda@v3
      with:
        miniforge-variant: Miniforge3
        miniforge-version: latest
        activate-environment: dev
        environment-file: ops/conda_env/dev.yml
        use-mamba: true
    - uses: dbhi/qus/action@main
      with:
        targets: aarch64
    - name: Build CPack
      run: |
        bash ops/build-cpack.sh
