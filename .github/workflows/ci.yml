name: CI

# Trigger on every push and pull request to any branch
on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      # Checkout the repository
      - uses: actions/checkout@v4

      # Set up Python (pinned to 3.11)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # Cache pip dependencies (fallback if setup-python cache fails)
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # Install project dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Install Ruff (linting tool)
      - name: Install Ruff
        run: pip install ruff

      # Lint the codebase
      - name: Lint with Ruff
        run: ruff check .

      # Install test dependencies (if any extra are needed)
      - name: Install test tools
        run: pip install pytest

      # Run the test suite
      - name: Run tests
        run: pytest --color=yes --verbose